vars:
  APPVERSION: 3.7.4
  COMMIT_SHA: f11f402a34f7009368fae2fe3dd823991c147446
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.2-debian13-dev@sha256:2d07671ccc209a0a3e1082dcd0375511e57b8ad6a18439c74924f203d63a461c
  SEMVER_MAJOR_MINOR_VERSION: "40.3"
  SEMVER_MAJOR_VERSION: "40"
