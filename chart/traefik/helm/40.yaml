  TRAEFIK_REFERENCE: dhi/traefik:3.7.4-debian13@sha256:1b76e6844cbf4e0b24767fd499fd88c35a67894e43383cb3efcb2dbd280fe6f0
  VERSION: 40.3.0
contents:
  builds:
    - name: traefik
      uses: dhi.io/helm:3.21.2-debian13-dev@sha256:2d07671ccc209a0a3e1082dcd0375511e57b8ad6a18439c74924f203d63a461c
      contents:
        files:
          - url: git+https://github.com/traefik/traefik-helm-chart.git#v40.3.0
            checksum: f11f402a34f7009368fae2fe3dd823991c147446
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/traefik
          with:
            chart:
              appRef: traefik
              description: Docker Hardened Images Helm chart for Traefik
              images:
                - name: traefik
                  ref: dhi/traefik:3.7.4-debian13@sha256:1b76e6844cbf4e0b24767fd499fd88c35a67894e43383cb3efcb2dbd280fe6f0
              name: traefik-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/traefik/traefik-helm-chart
            cmd: prepare
            registry: dhi.io
        - name: restore upstream chart annotations
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/traefik
          with:
            file: Chart.yaml
            patches:
              - eval(.annotations = (load("${source.dir}/config/chart-annotations.yaml") * (.annotations // {})))
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/traefik
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          with:
            chart: ${source.dir}/helm-charts/traefik
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: traefik
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/traefik
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/traefik/config
