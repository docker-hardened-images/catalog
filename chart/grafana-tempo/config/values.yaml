tempo:
  registry: ${tempo.registry}
  repository: ${tempo.repository}
  tag: ${tempo.tag}@${tempo.digest}

  # Container-level security context.
  # readOnlyRootFilesystem is intentionally false: Tempo requires write access to its
  # WAL path (/var/tempo/wal) and block storage path (/var/tempo/traces) at runtime.
  # Upstream values comment out readOnlyRootFilesystem: true as an example; that only
  # works when all runtime writes go to mounted volumes, while the default chart layout
  # keeps WAL and trace data under /var/tempo on the root filesystem.
  # Non-root enforcement and privilege drop are still applied.
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

# Optional Jaeger Query / tempo-query sidecar. The upstream chart uses `repository` and
# `tag` only (no registry prefix in templates): `image: {{ .Values.tempoQuery.repository }}:{{ .Values.tempoQuery.tag }}`.
tempoQuery:
  repository: ${tempo-query.registry}/${tempo-query.repository}
  tag: ${tempo-query.tag}@${tempo-query.digest}
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

# Pod-level security context. The upstream chart names this `securityContext` at the
# root level (not `podSecurityContext`). We override from the upstream default of UID/GID
# 10001 to the DHI standard of 65532.
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
