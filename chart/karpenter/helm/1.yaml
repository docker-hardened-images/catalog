  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  builds:
    - name: karpenter
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - helm=4.1.4-2
        files:
          - url: git+https://github.com/aws/karpenter-provider-aws.git#v1.14.0
            checksum: 85eeae8f2321be5e58bb0ab2b0abc7e411a43668
            path: ${source.dir}/karpenter-repo
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/karpenter-repo/charts/karpenter
          with:
