# syntax=dhi.io/build:2-helm3

name: Karpenter Helm chart 1.x
image: dhi.io/karpenter-chart
variant: helm
tags:
  - 1.12.1
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 15781e312b8e01d4c2caecd9a4f5c7a70d84a6a0
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:f4a916b146b07955a0f7f705854bfda3af7853e4cedb839335d4d269004cbf00
  KARPENTER_REFERENCE: dhi/karpenter:1.9.0-debian13@sha256:d5c29c8c4e25282284ea49cb230ab6b05ab9eca1313b33b54fa43e6c2bc0f446
  SEMVER_MAJOR_MINOR_VERSION: "1.12"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.12.1
  VERSION: 1.12.1
contents:
  builds:
    - name: karpenter
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:f4a916b146b07955a0f7f705854bfda3af7853e4cedb839335d4d269004cbf00
      contents:
        files:
          - url: git+https://github.com/aws/karpenter-provider-aws.git#v1.12.1
            checksum: 15781e312b8e01d4c2caecd9a4f5c7a70d84a6a0
            path: ${source.dir}/karpenter-repo
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/karpenter-repo/charts/karpenter
          with:
            chart:
              appRef: karpenter
              description: Docker Hardened Images Helm chart for Karpenter
              images:
                - name: karpenter
                  ref: dhi/karpenter:1.9.0-debian13@sha256:d5c29c8c4e25282284ea49cb230ab6b05ab9eca1313b33b54fa43e6c2bc0f446
              name: karpenter-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/aws/karpenter-provider-aws
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/karpenter-repo/charts/karpenter
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: ${source.dir}/karpenter-repo/charts/karpenter
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/karpenter-repo/charts
          with:
            chart: karpenter
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/karpenter-repo/charts/karpenter
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/karpenter/config
