  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:ece8efeb889adab72837b0042d8419283ac7fdf2b5c2c8fe09a34e4b8a34ae2e
  KARPENTER_REFERENCE: dhi/karpenter:1.13.0-debian13@sha256:df65abe5b7c93099f80d686b2cd4aadb8aee51bd9c17a99f15f6ce28300d95a5
  SEMVER_MAJOR_MINOR_VERSION: "1.13"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.13.0
  VERSION: 1.13.0
contents:
  builds:
    - name: karpenter
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:ece8efeb889adab72837b0042d8419283ac7fdf2b5c2c8fe09a34e4b8a34ae2e
      contents:
        files:
          - url: git+https://github.com/aws/karpenter-provider-aws.git#v1.13.0
            checksum: 2be95547983a8948b7172aa66bf92c905fbbf001
            path: ${source.dir}/karpenter-repo
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/karpenter-repo/charts/karpenter
          with:
            chart:
              appRef: karpenter
              description: Docker Hardened Images Helm chart for Karpenter
              images:
                - name: karpenter
                  ref: dhi/karpenter:1.13.0-debian13@sha256:df65abe5b7c93099f80d686b2cd4aadb8aee51bd9c17a99f15f6ce28300d95a5
              name: karpenter-chart
              notes: ${source.dir}/config/NOTES.txt
