# syntax=dhi.io/build:2-helm3

name: Karpenter Helm chart 1.x
image: dhi.io/karpenter-chart
variant: helm
tags:
  - 1.11.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 537b01a52f185e17f4f71ff2bc4fd0a05ba90670
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:7bee3e50c815757f78414dcd850621d0cca82d3660da2376f1111069073f3bd5
  KARPENTER_REFERENCE: dhi/karpenter:1.9.0-debian13@sha256:cad3e8b2df09dbc30b10e015250b3b707b5b30727f793ea6d0a93540c161c617
  SEMVER_MAJOR_MINOR_VERSION: "1.11"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.11.0
  VERSION: 1.11.0
contents:
  builds:
    - name: karpenter
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:7bee3e50c815757f78414dcd850621d0cca82d3660da2376f1111069073f3bd5
      contents:
        files:
          - url: git+https://github.com/aws/karpenter-provider-aws.git#v1.11.0
            checksum: 537b01a52f185e17f4f71ff2bc4fd0a05ba90670
            path: ${source.dir}/karpenter-repo
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/karpenter-repo/charts/karpenter
          with:
            chart:
              appRef: karpenter
              description: Docker Hardened Images Helm chart for Karpenter
              images:
                - name: karpenter
                  ref: dhi/karpenter:1.9.0-debian13@sha256:cad3e8b2df09dbc30b10e015250b3b707b5b30727f793ea6d0a93540c161c617
              name: karpenter-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/aws/karpenter-provider-aws
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/karpenter-repo/charts/karpenter
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: ${source.dir}/karpenter-repo/charts/karpenter
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/karpenter-repo/charts
          with:
            chart: karpenter
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/karpenter-repo/charts/karpenter
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/karpenter/config
