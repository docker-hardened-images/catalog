        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          privileged: true
          with:
            chart: keda
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: keda
            cmd: lint .
        - name: package
