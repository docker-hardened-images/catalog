contents:
  builds:
    - name: keda-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:ce37cdc271f28789f84db63c8fe5d86522cc98922637f8dde8c2aca4f0cc1632
      contents:
        files:
          - url: git+https://github.com/kedacore/charts.git#v2.20.0
            checksum: 4a08986aaa2a5d830ec4603e97a3af35a3294c30
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/keda
          with:
            chart:
              appRef: keda
              description: Docker Hardened Images Helm chart for KEDA
              images:
                - name: keda
                  ref: dhi/keda:2.20.0-debian13@sha256:9940fec7df5f9cbc7c0bd6e101a803a1212d5de084017a2f58ab9f123ddd833a
                - name: keda-admission-webhooks
                  ref: dhi/keda-admission-webhooks:2.20.0-debian13@sha256:4394522fc2b4123d32529a77c294cb09632bc25e2bb4d85a6efa0a623b03e2cf
                - name: keda-metrics-apiserver
                  ref: dhi/keda-metrics-apiserver:2.20.0-debian13@sha256:62f00f297f64c2f360616800a81d4da32051a6ff77b7298fc69f4ff503d1cc29
              name: keda-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/kedacore/charts
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/keda
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          privileged: true
          with:
            chart: keda
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: keda
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: keda
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/keda/config
