  KEDA_ADMISSION_WEBHOOKS_REFERENCE: dhi/keda-admission-webhooks:2.20.0-debian13@sha256:4394522fc2b4123d32529a77c294cb09632bc25e2bb4d85a6efa0a623b03e2cf
  KEDA_METRICS_APISERVER_REFERENCE: dhi/keda-metrics-apiserver:2.20.0-debian13@sha256:62f00f297f64c2f360616800a81d4da32051a6ff77b7298fc69f4ff503d1cc29
  KEDA_REFERENCE: dhi/keda:2.20.0-debian13@sha256:9940fec7df5f9cbc7c0bd6e101a803a1212d5de084017a2f58ab9f123ddd833a
  SEMVER_MAJOR_MINOR_VERSION: "2.20"
  SEMVER_MAJOR_VERSION: "2"
