name: Istio Gateway Helm chart 1.29.x
image: dhi.io/istio-gateway-chart
variant: helm
tags:
  - 1.29.6
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 7019d6d3608e4995e9a36d2977cfec3a341431cd
  CHART_HELM_NAME: istio-gateway-chart
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
