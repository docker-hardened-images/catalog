# syntax=dhi.io/build:2-helm3

name: Neo4j Helm chart 5.x
image: dhi.io/neo4j-chart
variant: helm
tags:
  - 5.26.24
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 63a09bee7ffe0517d8d754a07b3b4a7ef2d57d86
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:d2ca66cc4bd7708b7cdd363360f608a9450f24dac43da8183d9d610031123f81
  KUBECTL_REFERENCE: dhi/kubectl:1.34.6-alpine3.22-dev@sha256:8bda1ad47f45b809bd6ac420fbe487cba3a739ec3bfa45e622f8c134ca5e98fe
  NEO4J_REFERENCE: dhi/neo4j:5.26.23-debian13@sha256:a379d3e4db1d88275c8af0687bd1457a2dc873d0c943a455c70c176d9084a4bd
  SEMVER_MAJOR_MINOR_VERSION: "5.26"
  SEMVER_MAJOR_VERSION: "5"
  SEMVER_VERSION: 5.26.24
  VERSION: 5.26.24
contents:
  builds:
    - name: neo4j
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:d2ca66cc4bd7708b7cdd363360f608a9450f24dac43da8183d9d610031123f81
      contents:
        files:
          - url: git+https://github.com/neo4j/helm-charts.git#5.26.24
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/neo4j
          with:
            chart:
              appRef: neo4j
              description: Docker Hardened Images Helm chart for Neo4j
              images:
                - name: neo4j
                  ref: dhi/neo4j:5.26.23-debian13@sha256:a379d3e4db1d88275c8af0687bd1457a2dc873d0c943a455c70c176d9084a4bd
                - name: kubectl
                  ref: dhi/kubectl:1.34.6-alpine3.22-dev@sha256:8bda1ad47f45b809bd6ac420fbe487cba3a739ec3bfa45e622f8c134ca5e98fe
              name: neo4j-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/neo4j/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update chart values
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/neo4j
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          with:
            chart: ${source.dir}/helm-charts/neo4j
            cmd: dependency update
        - name: blank 3rd party images
          work-dir: ${source.dir}/helm-charts/neo4j
          runs: |
            set -eux -o pipefail

            # Blank out the 3rd party images for neo4j-operations
            sed -i '/- name: .*-operations/{n;s/^\([[:space:]]*image:\).*/\1 "" #THIS IMAGE IS NOT IN THE DHI CATALOG YET, PLEASE CONTACT THE DOCKER TEAM IF NEEDED/;}' ./templates/neo4j-operations.yaml
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: neo4j
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/neo4j
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/neo4j/config
