# syntax=dhi.io/build:2-helm3

name: Neo4j Helm chart 5.x
image: dhi.io/neo4j-chart
variant: helm
tags:
  - 5.26.26
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: e52826984a74339c48a12f0da9f23c29b65b0cf2
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:0e82c726efb7039ffa0875ffb88632189d0082a77f0ee94efa3a048992db3c71
  KUBECTL_REFERENCE: dhi/kubectl:1.34.8-alpine3.22-dev@sha256:43f064a454107b893626124e654a68c4eafde455178d77cb6d63ef79311372cd
  NEO4J_REFERENCE: dhi/neo4j:5.26.25-debian13@sha256:51a4cbc2c69614ddb08e389a68d22c4516639151156b235ff13eef7b014a992f
  SEMVER_MAJOR_MINOR_VERSION: "5.26"
  SEMVER_MAJOR_VERSION: "5"
  SEMVER_VERSION: 5.26.26
  VERSION: 5.26.26
contents:
  builds:
    - name: neo4j
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:0e82c726efb7039ffa0875ffb88632189d0082a77f0ee94efa3a048992db3c71
      contents:
        files:
          - url: git+https://github.com/neo4j/helm-charts.git#5.26.26
            checksum: e52826984a74339c48a12f0da9f23c29b65b0cf2
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/neo4j
          with:
            chart:
              appRef: neo4j
              description: Docker Hardened Images Helm chart for Neo4j
              images:
                - name: neo4j
                  ref: dhi/neo4j:5.26.25-debian13@sha256:51a4cbc2c69614ddb08e389a68d22c4516639151156b235ff13eef7b014a992f
                - name: kubectl
                  ref: dhi/kubectl:1.34.8-alpine3.22-dev@sha256:43f064a454107b893626124e654a68c4eafde455178d77cb6d63ef79311372cd
              name: neo4j-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/neo4j/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update chart values
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/neo4j
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          with:
            chart: ${source.dir}/helm-charts/neo4j
            cmd: dependency update
        - name: blank 3rd party images
          work-dir: ${source.dir}/helm-charts/neo4j
          runs: |
            set -eux -o pipefail

            # Blank out the 3rd party images for neo4j-operations
            sed -i '/- name: .*-operations/{n;s/^\([[:space:]]*image:\).*/\1 "" #THIS IMAGE IS NOT IN THE DHI CATALOG YET, PLEASE CONTACT THE DOCKER TEAM IF NEEDED/;}' ./templates/neo4j-operations.yaml
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: neo4j
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/neo4j
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/neo4j/config
