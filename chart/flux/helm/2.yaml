                - name: fluxcd-notification-controller
                  ref: dhi/fluxcd-notification-controller:1.9.2-debian13@sha256:52986b3aed5ae275492aee0874ff6ca5aa86dd9fc869290d0e6c1db881d1b1e8
                - name: fluxcd-source-controller
                  ref: dhi/fluxcd-source-controller:1.9.2-debian13@sha256:6ad253d037c71373e2b56f418e528578b03d26174f4221d4b911da5356eeb984
                - name: fluxcd-source-watcher
                  ref: dhi/fluxcd-source-watcher:2.2.0-debian13@sha256:6aa4d1a00b719af976bcb84ea9c2d7ab5af3f4f797da7b862c3499d9189e7b95
