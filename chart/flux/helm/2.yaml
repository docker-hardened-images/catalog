                - name: fluxcd-notification-controller
                  ref: dhi/fluxcd-notification-controller:1.9.2-debian13@sha256:d147b559107e40c875ab6426ced89109ba8ee2828713856c9b8d8cb0c3f5fc56
                - name: fluxcd-source-controller
                  ref: dhi/fluxcd-source-controller:1.9.2-debian13@sha256:b11ab91d5557cf7074ba9d0e28e7877b0bf8e525c49d30a7087a4f02d3fdf5f8
                - name: fluxcd-source-watcher
                  ref: dhi/fluxcd-source-watcher:2.2.0-debian13@sha256:3d96e91e1700961fd3f53979798d63ebcd88cc0cb2bb18d93b9d107daa53562a
              name: flux-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/fluxcd/flux2
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/flux/config
