            checksum: b2c8e7838dd7902b6f7b4925e2d611c756858fc8
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: flux-cli
              description: Docker Hardened Images Helm chart for Flux
              images:
