cli:
  image: ${flux-cli.registry}/${flux-cli.repository}
  tag: ${flux-cli.tag}@${flux-cli.digest}

helmController:
  image: ${fluxcd-helm-controller.registry}/${fluxcd-helm-controller.repository}
  tag: ${fluxcd-helm-controller.tag}@${fluxcd-helm-controller.digest}
  podSecurityContext:
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

