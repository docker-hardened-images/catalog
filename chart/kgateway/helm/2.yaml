# syntax=dhi.io/build:2-helm3

name: KGateway Helm chart 2.x
image: dhi.io/kgateway-chart
variant: helm
tags:
  - 2.3.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 4fcd28c459a7ab621d01f8aef72ff7ddacc91774
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:462393863790e8d4b174f63f0da50798da095a059d4fab7692ae4fb7a58e99d3
  KGATEWAY_IMAGE_REFERENCE: dhi/kgateway:2.3.0-debian13
  SEMVER_MAJOR_MINOR_VERSION: "2.3"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.3.0
  VERSION: 2.3.0
contents:
  builds:
    - name: kgateway-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:462393863790e8d4b174f63f0da50798da095a059d4fab7692ae4fb7a58e99d3
      contents:
        files:
          - url: git+https://github.com/kgateway-dev/kgateway.git#v2.3.0
            checksum: 4fcd28c459a7ab621d01f8aef72ff7ddacc91774
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/install/helm/kgateway
          with:
            chart:
              appRef: kgateway
              description: Docker Hardened Images Helm chart for KGateway
              images:
                - name: kgateway
                  ref: dhi/kgateway:2.3.0-debian13
              name: kgateway-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/kgateway-dev/kgateway
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/install/helm/kgateway
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/install/helm
          with:
            chart: kgateway
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/install/helm
          with:
            chart: kgateway
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/kgateway/config
