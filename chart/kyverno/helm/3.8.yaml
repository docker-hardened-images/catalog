      contents:
        files:
          - url: git+https://github.com/kyverno/kyverno.git#kyverno-chart-3.8.1
            checksum: 57908e9b6a9ddd1fea5e3fca2bafdf4ca87f7f9b
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: kyverno
              dependencies:
                - condition: crds.install
                  keep: true
                  name: crds
                - condition: grafana.enabled
                  keep: true
                  name: grafana
                - condition: crds.install
                  keep: true
                  name: kyverno-api
                - condition: openreports.installCrds
                  keep: true
                  name: openreports
                - alias: reports-server
                  condition: reportsServer.enabled
                  name: kyverno-reports-server
                  ref: dhi/kyverno-reports-server-chart:0.1.7@sha256:0966b036a151ab951913edb8bafe38c2ba8e85e15f90b76b2ca68b218b354517
              description: Docker Hardened Images Helm chart for Kyverno
              images:
                - name: kyverno
                  ref: dhi/kyverno:1.18.1-debian13@sha256:5508f4c2154a51ba464085a2e556cff0bbdcabfc93c08667c976bbeb1a1b75cd
                - name: kyverno-cli
                  ref: dhi/kyverno-cli:1.18.1-debian13@sha256:e4837f16fea128bca16cf122a1b13d667b73a89716c140f30276f4b431dd277f
                - name: kyverno-readiness-checker
                  ref: dhi/kyverno-readiness-checker:1.18.1-debian13@sha256:3b74981d226e5071e8f934dcfd496bb171650977c5489dbb1da536236a6533f7
                - name: kubectl
                  ref: dhi/kubectl:1.35.6-debian13@sha256:535d3e2e1bfc09d74f69d2aaca75126d8da520de71bd1c0a52901dc9cad51c9a
                - name: kyverno-init
                  ref: dhi/kyverno-init:1.18.1-debian13@sha256:2e129ab1b2caf5ae56235e908fa6dbb8b56caeac417feb32d7b3b1609a48f84b
                - name: kyverno-background-controller
                  ref: dhi/kyverno-background-controller:1.18.1-debian13@sha256:b5ac61940808dbbfc0b77d5aed7cfdb05f47f8fb59428fe9049db7329dc6141b
                - name: kyverno-cleanup-controller
                  ref: dhi/kyverno-cleanup-controller:1.18.1-debian13@sha256:a293ea383f426dccf4f157edb73552d065e7c1c0d3519cc14c1bdb0478973b91
                - name: kyverno-reports-controller
                  ref: dhi/kyverno-reports-controller:1.18.1-debian13@sha256:b34d5607cac8704bd5f8fbf3aa03aff60dc0a2c20ad355609e86845814de1073
              name: kyverno-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/kyverno/kyverno
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: patch version specific values
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              apply:
                - "on": values.yaml
                  patch: ${source.dir}/config/values-3.8.yaml
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: kyverno
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/kyverno/config
