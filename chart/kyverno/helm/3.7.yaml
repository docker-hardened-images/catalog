contents:
  builds:
    - name: kyverno-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:f4a916b146b07955a0f7f705854bfda3af7853e4cedb839335d4d269004cbf00
      work-dir: ${source.dir}/helm-charts/charts/kyverno
      contents:
        files:
          - url: git+https://github.com/kyverno/kyverno.git#kyverno-chart-3.7.2
            checksum: eafa8fe9fe933a6314feaa9dcb49b700a9bc74a5
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: kyverno
              dependencies:
                - condition: crds.install
                  keep: true
                  name: crds
                - condition: grafana.enabled
                  keep: true
                  name: grafana
                - condition: crds.install
                  keep: true
                  name: kyverno-api
                - condition: openreports.installCrds
                  keep: true
                  name: openreports
                - alias: reports-server
                  condition: reportsServer.enabled
                  name: kyverno-reports-server
                  ref: dhi/kyverno-reports-server-chart:0.1.7@sha256:0a4e42b9202bf5ca43f7cc01fc05a466d9a341e1ebcfa23dd3c757fcd8653afa
              description: Docker Hardened Images Helm chart for Kyverno
              images:
                - name: kyverno
                  ref: dhi/kyverno:1.17.2-debian13@sha256:d7692e2d75577c9030bd779876ca5514e48bacd369fb84a2ad6ea82f8d4ac2aa
                - name: kyverno-cli
                  ref: dhi/kyverno-cli:1.17.2-debian13@sha256:b9d0622bc8a4525bd55cbd57774bdb591f19b4d731fafa3ae267595536408985
                - name: kyverno-readiness-checker
                  ref: dhi/kyverno-readiness-checker:1.17.2-debian13@sha256:576488bf62235040f7ff197fa6d039638983a56076271e3d9a835b468fadd703
                - name: kubectl
                  ref: dhi/kubectl:1.35.5-debian13@sha256:192c542342d8df9418e17303d59a976fa18b3b79b2b6680c1885c912b2ca5417
                - name: kyverno-init
                  ref: dhi/kyverno-init:1.17.2-debian13@sha256:3f44af661a667226a8759ec0a44dfd920376b9c0f163b123aa72967d4eac6dec
                - name: kyverno-background-controller
                  ref: dhi/kyverno-background-controller:1.17.2-debian13@sha256:10c6153d9efa5287c486bf3b132784c4d8b20368b0f2c3afa78d3157047e3c97
                - name: kyverno-cleanup-controller
                  ref: dhi/kyverno-cleanup-controller:1.17.2-debian13@sha256:408f576db09c516f7e12196e86263ae4d339ac4c34bccd4bb8c4abfaf65fdf84
                - name: kyverno-reports-controller
                  ref: dhi/kyverno-reports-controller:1.17.2-debian13@sha256:bdc65dffbebdfb836f7d11dafd5ada306684cc4ed740925c6a9f0eb03f82021d
              name: kyverno-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/kyverno/kyverno
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: kyverno
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/kyverno/config
