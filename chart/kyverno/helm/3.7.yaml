              images:
                - name: kyverno
                  ref: dhi/kyverno:1.17.2-debian13@sha256:1de2b878d9f0a2050b956f61f2ed86f3fcf7c008aea526d88a809217649f2ee0
                - name: kyverno-cli
                  ref: dhi/kyverno-cli:1.17.2-debian13@sha256:8662f9ac75109fbff2aac2588deee237cb973e3698149d5565b184a7e0749897
                - name: kyverno-readiness-checker
                  ref: dhi/kyverno-readiness-checker:1.17.2-debian13@sha256:4149b78cf9735c84b5c3485c7b15cf31d35638c6ea4f2704fd8df7b9cb9b57b7
                - name: kubectl
                  ref: dhi/kubectl:1.35.4-debian13@sha256:0c5f0c2d26ad07e2e0d01ef5a58ec1d7a0c7bf5366ee49de442e54df58feb9cc
