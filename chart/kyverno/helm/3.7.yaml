contents:
  builds:
    - name: kyverno-chart
      uses: dhi.io/helm:3.21.2-debian13-dev@sha256:87f6b4272eaf82c001fd9066bd91608096ffb83cd83cc6dc274419702e170964
      work-dir: ${source.dir}/helm-charts/charts/kyverno
      contents:
        files:
          - url: git+https://github.com/kyverno/kyverno.git#kyverno-chart-3.7.2
            checksum: eafa8fe9fe933a6314feaa9dcb49b700a9bc74a5
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: kyverno
              dependencies:
                - condition: crds.install
                  keep: true
                  name: crds
                - condition: grafana.enabled
                  keep: true
                  name: grafana
                - condition: crds.install
                  keep: true
                  name: kyverno-api
                - condition: openreports.installCrds
                  keep: true
                  name: openreports
                - alias: reports-server
                  condition: reportsServer.enabled
                  name: kyverno-reports-server
                  ref: dhi/kyverno-reports-server-chart:0.1.7@sha256:a888cec7dfef635f900472b950a55759b1b71ba98dbc800f2e5c6249309da1c1
              description: Docker Hardened Images Helm chart for Kyverno
              images:
                - name: kyverno
                  ref: dhi/kyverno:1.17.2-debian13@sha256:bfcc24d322e7f2ead98319f20c25c4202a2e63e87fd580492e5adb564a86958b
                - name: kyverno-cli
                  ref: dhi/kyverno-cli:1.17.2-debian13@sha256:e9bab84ca9ab2ccf05c3fd5ff2b6631d52d96a4651f11b4dc6dd621832238474
                - name: kyverno-readiness-checker
                  ref: dhi/kyverno-readiness-checker:1.17.2-debian13@sha256:a5740e6f0101576bd09e5db26bd92ef29785a4bbe34ee89848eca0ec77597a6f
                - name: kubectl
                  ref: dhi/kubectl:1.35.6-debian13@sha256:535d3e2e1bfc09d74f69d2aaca75126d8da520de71bd1c0a52901dc9cad51c9a
                - name: kyverno-init
                  ref: dhi/kyverno-init:1.17.2-debian13@sha256:194b10c35fd518284fbb9c66846c7ebfaf53246926e27a1549ad2e33205e42ca
                - name: kyverno-background-controller
                  ref: dhi/kyverno-background-controller:1.17.2-debian13@sha256:ed212c16e2069a20e2052b91b469eb791f1eea558b52096ebb8889abef4cd905
                - name: kyverno-cleanup-controller
                  ref: dhi/kyverno-cleanup-controller:1.17.2-debian13@sha256:0a592384445fc948169b492c1fa7334e6d943c55b4b5aba395418f67f06cb741
                - name: kyverno-reports-controller
                  ref: dhi/kyverno-reports-controller:1.17.2-debian13@sha256:ca7055c63cd91019b56546ce559bb9f08da441c0568f7202603805f945acb1bf
              name: kyverno-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/kyverno/kyverno
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: kyverno
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/kyverno/config
