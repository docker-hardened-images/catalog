contents:
  builds:
    - name: kyverno-chart
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:ce95680846fc18d3d179f82f9d633c8274f41cd0d0f8213cbfc4039fbe2cd112
      work-dir: ${source.dir}/helm-charts/charts/kyverno
      contents:
        files:
          - url: git+https://github.com/kyverno/kyverno.git#kyverno-chart-3.7.2
            checksum: eafa8fe9fe933a6314feaa9dcb49b700a9bc74a5
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: kyverno
              dependencies:
                - condition: crds.install
                  keep: true
                  name: crds
                - condition: grafana.enabled
                  keep: true
                  name: grafana
                - condition: crds.install
                  keep: true
                  name: kyverno-api
                - condition: openreports.installCrds
                  keep: true
                  name: openreports
                - alias: reports-server
                  condition: reportsServer.enabled
                  name: kyverno-reports-server
                  ref: dhi/kyverno-reports-server-chart:0.1.6@sha256:c8c484c093ea0be0300309c72d978004c232c083a37fa331334b1e23b18a70d1
              description: Docker Hardened Images Helm chart for Kyverno
              images:
                - name: kyverno
                  ref: dhi/kyverno:1.17.2-debian13@sha256:46b2a4b92b25126d6a19687e2b37d342dc340a3d5b4d9480ddf30b43de2ccdff
                - name: kyverno-cli
                  ref: dhi/kyverno-cli:1.17.2-debian13@sha256:be46b51fab6401d2baa7eade2bdd2f9d96357c29608816fc0ff54fbffd1359e0
                - name: kyverno-readiness-checker
                  ref: dhi/kyverno-readiness-checker:1.17.2-debian13@sha256:b8a1e7d8a5c4997b0190af0d04cb16f0ad0536ef9818f878396974e2ec2a8083
                - name: kubectl
                  ref: dhi/kubectl:1.35.4-debian13@sha256:664ebea9a9f57b02182afc649436075c6ca821296aa594c7e0f289b6a3cef0c3
                - name: kyverno-init
                  ref: dhi/kyverno-init:1.17.2-debian13@sha256:bd954fb3d9d52e3e32950eb6c943ccafc8d13fdeb74f20ab5c3ed481e6d24036
                - name: kyverno-background-controller
                  ref: dhi/kyverno-background-controller:1.17.2-debian13@sha256:dc99a96d3069c083ad33eaf66f16ea3fa384151804c1c4c4033c1adef57866a4
                - name: kyverno-cleanup-controller
                  ref: dhi/kyverno-cleanup-controller:1.17.2-debian13@sha256:3397cd4381fffe455486b0df2668cabb8aca0710ef88b77440d865ae094fb171
                - name: kyverno-reports-controller
                  ref: dhi/kyverno-reports-controller:1.17.2-debian13@sha256:0a228512ac10f39ec7bf6dd64b4954189bedf5652de7ec1f28664d692d262135
              name: kyverno-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/kyverno/kyverno
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: kyverno
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/kyverno/config
