contents:
  builds:
    - name: kyverno-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:e3d7fb6de37608485fd22d3dd04ed6b0f9cc68431cb21697c2383978e2847ed2
      work-dir: ${source.dir}/helm-charts/charts/kyverno
      contents:
        files:
          - url: git+https://github.com/kyverno/kyverno.git#kyverno-chart-3.7.2
            checksum: eafa8fe9fe933a6314feaa9dcb49b700a9bc74a5
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: kyverno
              dependencies:
                - condition: crds.install
                  keep: true
                  name: crds
                - condition: grafana.enabled
                  keep: true
                  name: grafana
                - condition: crds.install
                  keep: true
                  name: kyverno-api
                - condition: openreports.installCrds
                  keep: true
                  name: openreports
                - alias: reports-server
                  condition: reportsServer.enabled
                  name: kyverno-reports-server
                  ref: dhi/kyverno-reports-server-chart:0.1.7@sha256:5c84772ff59a4c3c4af615c650b4fd59a0fd152050b3ba168de2e35532280bcd
              description: Docker Hardened Images Helm chart for Kyverno
              images:
                - name: kyverno
                  ref: dhi/kyverno:1.17.2-debian13@sha256:2e2583ebebe9a627036c2909c8fabf734d9dd680d98a2d4c76e071bd2a4ff858
                - name: kyverno-cli
                  ref: dhi/kyverno-cli:1.17.2-debian13@sha256:8fb0e7d18cc15ef82371ef621161b460326b78c90f65b3ac2220e0581c407cf3
                - name: kyverno-readiness-checker
                  ref: dhi/kyverno-readiness-checker:1.17.2-debian13@sha256:2f135a1d711ed831757c72fde8e31c5d9cf0643719ffa1c9e643e3e3515364ed
                - name: kubectl
                  ref: dhi/kubectl:1.35.5-debian13@sha256:3eee1c1a7d36818c6a4f1701b26ae2840206f739c03b428e26e9b707f365a5d6
                - name: kyverno-init
                  ref: dhi/kyverno-init:1.17.2-debian13@sha256:3ed0d16c552117e246e3be79176ca386ccfae8c3d6a3df2707aa4e2c46fb32cc
                - name: kyverno-background-controller
                  ref: dhi/kyverno-background-controller:1.17.2-debian13@sha256:79d26037f647c5f25c6481a7157806619be0a97a43e371e112460f9280eeb473
                - name: kyverno-cleanup-controller
                  ref: dhi/kyverno-cleanup-controller:1.17.2-debian13@sha256:c393d2aded12c1bcb378c8156fb102fad4b75b79a39b6e08aa0c8f8f68daf132
                - name: kyverno-reports-controller
                  ref: dhi/kyverno-reports-controller:1.17.2-debian13@sha256:f60712ebc6de8cbfda604bdaa8d80b137c56d8fea4640a71cbb6f0fe8d50f826
              name: kyverno-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/kyverno/kyverno
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: kyverno
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/kyverno/config
