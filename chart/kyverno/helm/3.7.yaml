contents:
  builds:
    - name: kyverno-chart
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:bfafe601001f13954055f12d8e3ca13ab35f3af84965902e670824f33f2d2f2c
      work-dir: ${source.dir}/helm-charts/charts/kyverno
      contents:
        files:
          - url: git+https://github.com/kyverno/kyverno.git#kyverno-chart-3.7.2
            checksum: eafa8fe9fe933a6314feaa9dcb49b700a9bc74a5
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: kyverno
              dependencies:
                - condition: crds.install
                  keep: true
                  name: crds
                - condition: grafana.enabled
                  keep: true
                  name: grafana
                - condition: crds.install
                  keep: true
                  name: kyverno-api
                - condition: openreports.installCrds
                  keep: true
                  name: openreports
                - alias: reports-server
                  condition: reportsServer.enabled
                  name: kyverno-reports-server
                  ref: dhi/kyverno-reports-server-chart:0.1.7@sha256:29df33e69139f9eef04b1e25720d51f1c58a8b0471bfff3b0b149d8668fd0c69
              description: Docker Hardened Images Helm chart for Kyverno
              images:
                - name: kyverno
                  ref: dhi/kyverno:1.17.2-debian13@sha256:76b49c49485335a6364b4cf19a57ffacf15077fd14e4461011565c650c524c2c
                - name: kyverno-cli
                  ref: dhi/kyverno-cli:1.17.2-debian13@sha256:d92426c3cd061308fd0a3a737e26f9199a6f0dd792cffbd8d0a71b11fd572afe
                - name: kyverno-readiness-checker
                  ref: dhi/kyverno-readiness-checker:1.17.2-debian13@sha256:1d52d048215b1eca708a9cd1b795bba25dacb54ce43db1843790aa822b112e97
                - name: kubectl
                  ref: dhi/kubectl:1.35.4-debian13@sha256:664ebea9a9f57b02182afc649436075c6ca821296aa594c7e0f289b6a3cef0c3
                - name: kyverno-init
                  ref: dhi/kyverno-init:1.17.2-debian13@sha256:5e65ec6a22eaedcdf79dc41b55128f0081f301324b665f51bdf3deff86251c10
                - name: kyverno-background-controller
                  ref: dhi/kyverno-background-controller:1.17.2-debian13@sha256:f297026f6464e33bd6b8b29ef3536c4bd667fc927ae29a3b0a26d10facefb000
                - name: kyverno-cleanup-controller
                  ref: dhi/kyverno-cleanup-controller:1.17.2-debian13@sha256:b89045b79802a27ef72ef157857a5c820042c6db66404fe3c1874df3ad570b0b
                - name: kyverno-reports-controller
                  ref: dhi/kyverno-reports-controller:1.17.2-debian13@sha256:1049b14a694a0c63749d5e2807a6676de86d59eae60b398b43b246d5a291e24e
              name: kyverno-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/kyverno/kyverno
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: kyverno
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/kyverno/config
