              images:
                - name: kyverno
                  ref: dhi/kyverno:1.17.2-debian13@sha256:86f92d725a1b20d3bf71471cd8a87265d1acccaa48091983b5eb81c1fea4db4f
                - name: kyverno-cli
                  ref: dhi/kyverno-cli:1.17.2-debian13@sha256:74eb9f92d9ee31b7d024d77f50f37b4efdb6ef5e7384b4d722fa056c24ff25ff
                - name: kyverno-readiness-checker
                  ref: dhi/kyverno-readiness-checker:1.17.2-debian13@sha256:d727e6e1c964dca06cb54c640ab261367f2173d04e2a75a0c826e6593bac9520
                - name: kubectl
                  ref: dhi/kubectl:1.35.5-debian13@sha256:7cd5ffd107f82ea7eb14182a005f20b01db1170bf6eab71b0bd9a5f667b6d607
                - name: kyverno-init
                  ref: dhi/kyverno-init:1.17.2-debian13@sha256:8a90667016b5e5bfae9eb1fab9d65567559e8625ebb8132dd07479e5080a4beb
                - name: kyverno-background-controller
                  ref: dhi/kyverno-background-controller:1.17.2-debian13@sha256:4cca6da9075152e3f9ea838a52e93f6ea4bd249167ea55fa99c6295f72042a27
                - name: kyverno-cleanup-controller
                  ref: dhi/kyverno-cleanup-controller:1.17.2-debian13@sha256:a8c17af198ce7e0e1cde8d462866b7167d94516a6d2afff2dc872856787a0f7a
                - name: kyverno-reports-controller
                  ref: dhi/kyverno-reports-controller:1.17.2-debian13@sha256:f282c2f8b1329c81b866a0c9d406c5dca8f46f82adb842863665c11d0f3688aa
              name: kyverno-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/kyverno/kyverno
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: kyverno
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/kyverno/config
