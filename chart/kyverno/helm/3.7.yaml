  KYVERNO_REPORTS_CONTROLLER_IMAGE_REFERENCE: dhi/kyverno-reports-controller:1.17.2-debian13@sha256:07c13bd7069d3ae2ed9241ff1e99759fce29b85538d7c3890a4ce94feda4deed
  KYVERNO_REPORTS_SERVER_CHART_REFERENCE: dhi/kyverno-reports-server-chart:0.1.7@sha256:9a00e1d0d46ce04b4b94b50477cca3d2404333494b1337ae8342181914ae08ff
  SEMVER_MAJOR_MINOR_VERSION: "3.7"
  SEMVER_MAJOR_VERSION: "3"
