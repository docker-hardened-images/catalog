      contents:
        files:
          - url: git+https://github.com/kyverno/kyverno.git#kyverno-chart-3.7.2
            checksum: eafa8fe9fe933a6314feaa9dcb49b700a9bc74a5
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: kyverno
              dependencies:
                - condition: crds.install
                  keep: true
                  name: crds
                - condition: grafana.enabled
                  keep: true
                  name: grafana
                - condition: crds.install
                  keep: true
                  name: kyverno-api
                - condition: openreports.installCrds
                  keep: true
                  name: openreports
                - alias: reports-server
                  condition: reportsServer.enabled
                  name: kyverno-reports-server
                  ref: dhi/kyverno-reports-server-chart:0.1.7@sha256:e9c1e7d5a0cc7e2c8850d28d5d274da92ca524201efa80e15de4387e75e431ae
              description: Docker Hardened Images Helm chart for Kyverno
              images:
                - name: kyverno
                  ref: dhi/kyverno:1.17.2-debian13@sha256:639fb4453092ff7572a588a6c9aced41b509f273eb89518f638f5c1009c54ad3
                - name: kyverno-cli
                  ref: dhi/kyverno-cli:1.17.2-debian13@sha256:7455780878f44445707a1e5e2be22cf6a1cab473d8054ca88aa7d6bd6020d2bf
                - name: kyverno-readiness-checker
                  ref: dhi/kyverno-readiness-checker:1.17.2-debian13@sha256:2a74661b5b48e133669eb8cf7ad6555c754638f7d2a96b481c786a7fea42054b
                - name: kubectl
                  ref: dhi/kubectl:1.35.6-debian13@sha256:535d3e2e1bfc09d74f69d2aaca75126d8da520de71bd1c0a52901dc9cad51c9a
                - name: kyverno-init
                  ref: dhi/kyverno-init:1.17.2-debian13@sha256:9dcf3414dddf275bb9371b53c72d224c3bb087923db5b8210eb50e0685d28648
                - name: kyverno-background-controller
                  ref: dhi/kyverno-background-controller:1.17.2-debian13@sha256:97470866b2dacc9e863392ee67de788cfc5d6d44fd781e55d48f7090db955c8b
                - name: kyverno-cleanup-controller
                  ref: dhi/kyverno-cleanup-controller:1.17.2-debian13@sha256:ab74a9217701fd6c4ed9764cd61b04c54c938a6a52dc498fe2d79b0c7c6148e9
                - name: kyverno-reports-controller
                  ref: dhi/kyverno-reports-controller:1.17.2-debian13@sha256:97c151e80fd8ccf452a12ebc07daa3beae23f1b04252ea6a1b263ee85d174e4e
              name: kyverno-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/kyverno/kyverno
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: patch version specific values
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              apply:
                - "on": values.yaml
                  patch: ${source.dir}/config/values-3.7.yaml
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: kyverno
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/kyverno/config
