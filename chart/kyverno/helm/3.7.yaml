contents:
  builds:
    - name: kyverno-chart
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:0e82c726efb7039ffa0875ffb88632189d0082a77f0ee94efa3a048992db3c71
      work-dir: ${source.dir}/helm-charts/charts/kyverno
      contents:
        files:
          - url: git+https://github.com/kyverno/kyverno.git#kyverno-chart-3.7.2
            checksum: eafa8fe9fe933a6314feaa9dcb49b700a9bc74a5
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: kyverno
              dependencies:
                - condition: crds.install
                  keep: true
                  name: crds
                - condition: grafana.enabled
                  keep: true
                  name: grafana
                - condition: crds.install
                  keep: true
                  name: kyverno-api
                - condition: openreports.installCrds
                  keep: true
                  name: openreports
                - alias: reports-server
                  condition: reportsServer.enabled
                  name: kyverno-reports-server
                  ref: dhi/kyverno-reports-server-chart:0.1.7@sha256:9a00e1d0d46ce04b4b94b50477cca3d2404333494b1337ae8342181914ae08ff
              description: Docker Hardened Images Helm chart for Kyverno
              images:
                - name: kyverno
                  ref: dhi/kyverno:1.17.2-debian13@sha256:76b49c49485335a6364b4cf19a57ffacf15077fd14e4461011565c650c524c2c
                - name: kyverno-cli
                  ref: dhi/kyverno-cli:1.17.2-debian13@sha256:e63f4ce2fd22e4aa68254c5500c513b6d4a5244a74eb9d2a220a98543c32671a
                - name: kyverno-readiness-checker
                  ref: dhi/kyverno-readiness-checker:1.17.2-debian13@sha256:07ba33717a0f6d46829d4817377d7e23eb76e4a9fac42e0410920163253a362c
                - name: kubectl
                  ref: dhi/kubectl:1.35.5-debian13@sha256:01994b188ec6ae939c780ebd908c4cdc94ce0c51043c77c97252f2129f542317
                - name: kyverno-init
                  ref: dhi/kyverno-init:1.17.2-debian13@sha256:5e65ec6a22eaedcdf79dc41b55128f0081f301324b665f51bdf3deff86251c10
                - name: kyverno-background-controller
                  ref: dhi/kyverno-background-controller:1.17.2-debian13@sha256:f297026f6464e33bd6b8b29ef3536c4bd667fc927ae29a3b0a26d10facefb000
                - name: kyverno-cleanup-controller
                  ref: dhi/kyverno-cleanup-controller:1.17.2-debian13@sha256:06988fa146410626629e909dfae1e5cb298a11115aec76fdf8a8412219d840f7
                - name: kyverno-reports-controller
                  ref: dhi/kyverno-reports-controller:1.17.2-debian13@sha256:07c13bd7069d3ae2ed9241ff1e99759fce29b85538d7c3890a4ce94feda4deed
              name: kyverno-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/kyverno/kyverno
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: kyverno
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/kyverno/config
