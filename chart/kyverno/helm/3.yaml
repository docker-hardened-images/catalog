contents:
  builds:
    - name: kyverno-chart
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:f9dd4a356298b0769dc4c2f718b9f564b631ddf37c19e061d61af9081bc7da13
      work-dir: ${source.dir}/helm-charts/charts/kyverno
      contents:
        files:
          - url: git+https://github.com/kyverno/kyverno.git#kyverno-chart-3.7.2
            checksum: eafa8fe9fe933a6314feaa9dcb49b700a9bc74a5
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: kyverno
              dependencies:
                - condition: crds.install
                  keep: true
                  name: crds
                - condition: grafana.enabled
                  keep: true
                  name: grafana
                - condition: crds.install
                  keep: true
                  name: kyverno-api
                - condition: openreports.installCrds
                  keep: true
                  name: openreports
                - alias: reports-server
                  condition: reportsServer.enabled
                  name: kyverno-reports-server
                  ref: dhi/kyverno-reports-server-chart:0.1.6@sha256:c73cc07c7616c0d612f398859d357f2c892ff128c2b0b5ed0e51dd7a12ff5df6
              description: Docker Hardened Images Helm chart for Kyverno
              images:
                - name: kyverno
                  ref: dhi/kyverno:1.17.1-debian13@sha256:5b508e168a523e5a0617d3a096b0e456064c9d1f89891b02c777b321c1cb71a1
                - name: kyverno-cli
                  ref: dhi/kyverno-cli:1.17.1-debian13@sha256:3688f48344a9a24c2371e87d514ab983e1914dc5cbf6569c143a0575e34ba3d7
                - name: kyverno-readiness-checker
                  ref: dhi/kyverno-readiness-checker:1.17.1-debian13@sha256:bb959af855f273c548f428f138cf4231fcbb8596700ffaf0cfa6365db4cace64
                - name: kubectl
                  ref: dhi/kubectl:1.35.4-debian13@sha256:0c5f0c2d26ad07e2e0d01ef5a58ec1d7a0c7bf5366ee49de442e54df58feb9cc
                - name: kyverno-init
                  ref: dhi/kyverno-init:1.17.1-debian13@sha256:38a6fe04dc713229906e130afd53964ff8254ce536cf8ca23acaf2af14fdf9d4
                - name: kyverno-background-controller
                  ref: dhi/kyverno-background-controller:1.17.1-debian13@sha256:d531c2b8b44dce4f9952b4876eea591c6c9300ee1943f5e358d89d4e594af942
                - name: kyverno-cleanup-controller
                  ref: dhi/kyverno-cleanup-controller:1.17.1-debian13@sha256:4a14c4bfa9e4568026daf3589df91180c5fc5f3bc5078a8e5d9304bca75c54f6
                - name: kyverno-reports-controller
                  ref: dhi/kyverno-reports-controller:1.17.1-debian13@sha256:8a3afd04abf37c816e1c8a1a296fc28623c555452b29a02f5717f587bd7b68ae
              name: kyverno-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/kyverno/kyverno
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: kyverno
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/kyverno/config
