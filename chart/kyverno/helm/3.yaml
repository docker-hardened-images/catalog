  KYVERNO_REPORTS_SERVER_CHART_REFERENCE: dhi/kyverno-reports-server-chart:0.1.6@sha256:33c57011a80f03c6bfb36c28bbc23635e77a3e475a0e59125ddde9c2acead5f4
