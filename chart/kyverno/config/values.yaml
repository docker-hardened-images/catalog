crds:
  migration:
    image:
      defaultRegistry: ${kyverno-cli.registry}
      repository: ${kyverno-cli.repository}
      tag: ${kyverno-cli.tag}@${kyverno-cli.digest}

    podSecurityContext:
      runAsNonRoot: true
      runAsGroup: 65532
      runAsUser: 65532

    securityContext:
      runAsUser: 65532
      runAsGroup: 65532
      runAsNonRoot: true
      privileged: false
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

