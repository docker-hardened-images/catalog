image:
  registry: ${kyverno-reports-server.registry}
  repository: ${kyverno-reports-server.repository}
  tag: ${kyverno-reports-server.tag}@${kyverno-reports-server.digest}

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  privileged: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true

podSecurityContext:
  fsGroup: 65532
  runAsUser: 65532
  runAsGroup: 65532
  runAsNonRoot: true

apiServicesManagement:
  image:
    registry: ${kubectl.registry}
    repository: ${kubectl.repository}
    tag: ${kubectl.tag}@${kubectl.digest}

  securityContext:
    runAsUser: 65534
    runAsGroup: 65534
    runAsNonRoot: true
    privileged: false
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true

  podSecurityContext:
    fsGroup: 65532
    runAsUser: 65532
    runAsGroup: 65532
    runAsNonRoot: true

postgresql:
  enabled: false
