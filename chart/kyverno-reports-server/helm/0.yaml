contents:
  builds:
    - name: kyverno-reports-server-chart
      uses: dhi.io/helm:3.21.2-debian13-dev@sha256:e30b522f3f39307b7710b304f082f76d7b8fc0d0140bfc44bdf2892c5411519f
      contents:
        files:
          - url: git+https://github.com/kyverno/reports-server.git#reports-server-chart-0.1.7
            checksum: d2b451bf72c175f25a653265a03002de7c0e0d3c
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/reports-server
          with:
            chart:
              appRef: kyverno-reports-server
              dependencies: null
              description: Docker Hardened Images Helm chart for Kyverno Reports Server
              images:
                - name: kyverno-reports-server
                  ref: dhi/kyverno-reports-server:0.1.7-debian13@sha256:a90e75061f71068cac5aff2688f0ef0f7235e540b2cb0f1ed2e39b2913bbe097
                - name: kubectl
                  ref: dhi/kubectl:1.36.2-debian13-compat@sha256:d9021f0586a972a230aa2a958512fc9ca72f5dabe4df68bf72fc1a26e5383742
                - name: etcd
                  ref: dhi/etcd:3.5.31-debian13@sha256:1e6ff09cd04423bec34a7bbf81b7d0895da7574b60a0505254d5cf3053cff294
              name: kyverno-reports-server-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/kyverno/reports-server
            cmd: prepare
            registry: dhi.io
        - name: patch etcd image
          work-dir: ${source.dir}/helm-charts/charts/reports-server
          runs: |
            set -eux -o pipefail

            grep -qF 'quay.io/coreos/etcd:v3.5.15' templates/etcd.yaml || {
              echo "Error: pattern not found" >&2
              exit 1
            }
            sed -i 's|quay.io/coreos/etcd:v3.5.15|"{{ .Values.config.etcd.image.registry }}/{{ .Values.config.etcd.image.repository }}:{{ .Values.config.etcd.image.tag }}"|' templates/etcd.yaml
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/reports-server
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update chart dependencies
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts/reports-server
          with:
            file: Chart.yaml
            patches:
              - del(.dependencies[] | select(.name == "postgresql"))
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts/reports-server
          with:
            file: values.yaml
            patches:
              - del(.postgresql)
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: reports-server
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: reports-server
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: reports-server
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/kyverno-reports-server/config
