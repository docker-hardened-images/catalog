  HELM_REFERENCE: dhi/helm:3.21.2-debian13-dev@sha256:e30b522f3f39307b7710b304f082f76d7b8fc0d0140bfc44bdf2892c5411519f
  KUBECTL_IMAGE_REFERENCE: dhi/kubectl:1.36.2-debian13-compat@sha256:d9021f0586a972a230aa2a958512fc9ca72f5dabe4df68bf72fc1a26e5383742
  KYVERNO_REPORTS_SERVER_IMAGE_REFERENCE: dhi/kyverno-reports-server:0.1.7-debian13@sha256:a90e75061f71068cac5aff2688f0ef0f7235e540b2cb0f1ed2e39b2913bbe097
  SEMVER_MAJOR_MINOR_VERSION: "0.1"
  SEMVER_MAJOR_VERSION: "0"
