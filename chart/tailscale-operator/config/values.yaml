operatorConfig:
  image:
    repository: ${tailscale-operator.registry}/${tailscale-operator.repository}
    tag: ${tailscale-operator.tag}@${tailscale-operator.digest}
    pullPolicy: IfNotPresent
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

proxyConfig:
  image:
    repository: ${tailscale.registry}/${tailscale.repository}
    tag: ${tailscale.tag}@${tailscale.digest}
