  TEMPORALIO_ADMIN_TOOLS_REFERENCE: dhi/temporalio-admin-tools:1.28.3-cli-1.6.1-debian13@sha256:38e3f04dabafd6b1d362756a57fef40ef882c5b258e71e44def6bdfc6ec16f8c
  TEMPORALIO_SERVER_REFERENCE: dhi/temporalio-server:1.28.3-cli-1.6.1-debian13@sha256:f055b33f2e7b8e880c4e607ebd1c1821b56f0a9c49ffb98b2cb6c914f2fb0564
  TEMPORALIO_UI_REFERENCE: dhi/temporalio-ui:2.48.1-debian13@sha256:fd3cc62d3efe7ff473a198be1c4c38e14bb8caf5295907e1ca08fa4f8ec75584
  VERSION: 0.73.2
contents:
  builds:
    - name: temporalio
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:92e43232140b33018c99c7b178d2f7302cfb0f0017267731b0512ac206cd8690
      work-dir: ${source.dir}/helm-charts/charts/temporal
      contents:
        files:
          - url: git+https://github.com/temporalio/helm-charts.git#temporal-0.73.2
            checksum: 3361ddc934cdf7922f2775982e2844cde9ced46c
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: temporalio-server
              dependencies:
                - alias: prometheus
                  condition: prometheus.enabled
                  name: prometheus
                  ref: dhi/prometheus-chart:28.14.1@sha256:793da299316f1e157969554aa0da1487910c3ceaeb5c766a944a6ec21bf1e538
                - alias: grafana
                  condition: grafana.enabled
                  name: grafana
                  ref: dhi/grafana-chart:11.3.5@sha256:904a7ed4efb727d5d37176308136c70dccf2c8deaa594b03ca1b61567c0d5608
              description: Docker Hardened Images Helm chart for TemporalIO
              images:
                - name: temporalio-server
                  ref: dhi/temporalio-server:1.28.3-cli-1.6.1-debian13@sha256:f055b33f2e7b8e880c4e607ebd1c1821b56f0a9c49ffb98b2cb6c914f2fb0564
                - name: temporalio-admin-tools
                  ref: dhi/temporalio-admin-tools:1.28.3-cli-1.6.1-debian13@sha256:38e3f04dabafd6b1d362756a57fef40ef882c5b258e71e44def6bdfc6ec16f8c
                - name: temporalio-ui
                  ref: dhi/temporalio-ui:2.48.1-debian13@sha256:fd3cc62d3efe7ff473a198be1c4c38e14bb8caf5295907e1ca08fa4f8ec75584
              name: temporalio-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/temporalio/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          with:
            file: values.yaml
            patches:
              - del(.cassandra)
              - del(.elasticsearch)
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: temporal
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/temporalio/config
