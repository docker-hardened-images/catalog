              description: Docker Hardened Images Helm chart for TemporalIO
              images:
                - name: temporalio-server
                  ref: dhi/temporalio-server:1.28.4-cli-1.6.2-debian13@sha256:f43029bbf3ca336f4e8cc3994af34417c0b6eadc394f3dfa21ec18d90042a454
                - name: temporalio-admin-tools
                  ref: dhi/temporalio-admin-tools:1.28.4-cli-1.6.2-debian13@sha256:377424350fdb81e0be06b71d8f385d3da3c3eade9c36f116e36596e39cc30bf3
