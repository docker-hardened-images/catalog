  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:7bee3e50c815757f78414dcd850621d0cca82d3660da2376f1111069073f3bd5
  PROMETHEUS_CHART_REFERENCE: dhi/prometheus-chart:28.16.0@sha256:36c252fb4f7f103fcfdb49e09f81f516e6c08c86cbb5bd2726f7b40f1bb2cce7
  SEMVER_MAJOR_MINOR_VERSION: "0.74"
