# syntax=dhi.io/build:2-helm3

name: Temporal Helm chart 0.x
image: dhi.io/temporalio-chart
variant: helm
tags:
  - 0.74.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: f45aaf0383978350e8fdb81d7de57f238e0e3e7f
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  GRAFANA_CHART_REFERENCE: dhi/grafana-chart:11.6.1@sha256:3bdfa1b5eac6859435f75fee3526bb378942d772a026fcb40bc41cd521b8466b
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:81e04bdcbc4f86f57589672220b5fcd235d616d28038aec4511068678778db66
  PROMETHEUS_CHART_REFERENCE: dhi/prometheus-chart:28.16.0@sha256:daf9b53c6c039df543926026ff48217ae061679cb92ab583381968597dd8d7b6
  SEMVER_MAJOR_MINOR_VERSION: "0.74"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.74.0
  TEMPORALIO_ADMIN_TOOLS_REFERENCE: dhi/temporalio-admin-tools:1.28.4-cli-1.6.2-debian13@sha256:5876675f75e2021e037ae3b9da814f1a0752928c553e58f56c7fbb3d5ee9f443
  TEMPORALIO_SERVER_REFERENCE: dhi/temporalio-server:1.28.4-cli-1.6.2-debian13@sha256:8585a7df12f5193e7e6cfecbc0cc3b379baed14312661d1b50923a3a42b6780e
  TEMPORALIO_UI_REFERENCE: dhi/temporalio-ui:2.48.3-debian13@sha256:22e410074ce2461884f6e57340880a592e19344aa48d6cdd304d913e4d974521
  VERSION: 0.74.0
contents:
  builds:
    - name: temporalio
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:81e04bdcbc4f86f57589672220b5fcd235d616d28038aec4511068678778db66
      work-dir: ${source.dir}/helm-charts/charts/temporal
      contents:
        files:
          - url: git+https://github.com/temporalio/helm-charts.git#temporal-0.74.0
            checksum: f45aaf0383978350e8fdb81d7de57f238e0e3e7f
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: temporalio-server
              dependencies:
                - alias: prometheus
                  condition: prometheus.enabled
                  name: prometheus
                  ref: dhi/prometheus-chart:28.16.0@sha256:daf9b53c6c039df543926026ff48217ae061679cb92ab583381968597dd8d7b6
                - alias: grafana
                  condition: grafana.enabled
                  name: grafana
                  ref: dhi/grafana-chart:11.6.1@sha256:3bdfa1b5eac6859435f75fee3526bb378942d772a026fcb40bc41cd521b8466b
              description: Docker Hardened Images Helm chart for TemporalIO
              images:
                - name: temporalio-server
                  ref: dhi/temporalio-server:1.28.4-cli-1.6.2-debian13@sha256:8585a7df12f5193e7e6cfecbc0cc3b379baed14312661d1b50923a3a42b6780e
                - name: temporalio-admin-tools
                  ref: dhi/temporalio-admin-tools:1.28.4-cli-1.6.2-debian13@sha256:5876675f75e2021e037ae3b9da814f1a0752928c553e58f56c7fbb3d5ee9f443
                - name: temporalio-ui
                  ref: dhi/temporalio-ui:2.48.3-debian13@sha256:22e410074ce2461884f6e57340880a592e19344aa48d6cdd304d913e4d974521
              name: temporalio-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/temporalio/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          with:
            file: values.yaml
            patches:
              - del(.cassandra)
              - del(.elasticsearch)
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: temporal
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/temporalio/config
