  PROMETHEUS_CHART_REFERENCE: dhi/prometheus-chart:28.16.0@sha256:b299f502fb7696c95a9200fbc9752df7b6201d7213915421e059c2890001591a
  SEMVER_MAJOR_MINOR_VERSION: "0.74"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.74.0
  TEMPORALIO_ADMIN_TOOLS_REFERENCE: dhi/temporalio-admin-tools:1.28.4-cli-1.6.2-debian13@sha256:afea2a86e5420c0367aa26574db6498f481ea97dcc094152c420fb37bcfa937f
  TEMPORALIO_SERVER_REFERENCE: dhi/temporalio-server:1.28.4-cli-1.6.2-debian13@sha256:26dbda0e1f9cc4f31bb1acedd01865700056067855c2ac7b6025c6661758901f
  TEMPORALIO_UI_REFERENCE: dhi/temporalio-ui:2.48.3-debian13@sha256:22e410074ce2461884f6e57340880a592e19344aa48d6cdd304d913e4d974521
  VERSION: 0.74.0
contents:
  builds:
    - name: temporalio
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:a1f4d4a67c318361eb9b5ca29f5cb00c0fcf2866fc1f8ac69aa640be743533c6
      work-dir: ${source.dir}/helm-charts/charts/temporal
      contents:
        files:
          - url: git+https://github.com/temporalio/helm-charts.git#temporal-0.74.0
            checksum: f45aaf0383978350e8fdb81d7de57f238e0e3e7f
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: temporalio-server
              dependencies:
                - alias: prometheus
                  condition: prometheus.enabled
                  name: prometheus
                  ref: dhi/prometheus-chart:28.16.0@sha256:b299f502fb7696c95a9200fbc9752df7b6201d7213915421e059c2890001591a
                - alias: grafana
                  condition: grafana.enabled
                  name: grafana
                  ref: dhi/grafana-chart:11.6.1@sha256:3bdfa1b5eac6859435f75fee3526bb378942d772a026fcb40bc41cd521b8466b
              description: Docker Hardened Images Helm chart for TemporalIO
              images:
                - name: temporalio-server
                  ref: dhi/temporalio-server:1.28.4-cli-1.6.2-debian13@sha256:26dbda0e1f9cc4f31bb1acedd01865700056067855c2ac7b6025c6661758901f
                - name: temporalio-admin-tools
                  ref: dhi/temporalio-admin-tools:1.28.4-cli-1.6.2-debian13@sha256:afea2a86e5420c0367aa26574db6498f481ea97dcc094152c420fb37bcfa937f
                - name: temporalio-ui
                  ref: dhi/temporalio-ui:2.48.3-debian13@sha256:22e410074ce2461884f6e57340880a592e19344aa48d6cdd304d913e4d974521
              name: temporalio-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/temporalio/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          with:
            file: values.yaml
            patches:
              - del(.cassandra)
              - del(.elasticsearch)
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: temporal
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/temporalio/config
