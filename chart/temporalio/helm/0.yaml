  TEMPORALIO_SERVER_REFERENCE: dhi/temporalio-server:1.28.3-cli-1.6.2-debian13@sha256:d0b622b4440792354641727e546621f4a8eae0471a78dc927fb3519a306d4fb7
  TEMPORALIO_UI_REFERENCE: dhi/temporalio-ui:2.48.1-debian13@sha256:995974ef9c22c08cf7b7401bc0470f8d48a33a5893756b423998a3f71c610dba
  VERSION: 0.74.0
contents:
  builds:
    - name: temporalio
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:7bee3e50c815757f78414dcd850621d0cca82d3660da2376f1111069073f3bd5
      work-dir: ${source.dir}/helm-charts/charts/temporal
      contents:
        files:
          - url: git+https://github.com/temporalio/helm-charts.git#temporal-0.74.0
            checksum: f45aaf0383978350e8fdb81d7de57f238e0e3e7f
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: temporalio-server
              dependencies:
                - alias: prometheus
                  condition: prometheus.enabled
                  name: prometheus
                  ref: dhi/prometheus-chart:28.15.0@sha256:f57ecc5aeaf5d24d07fbb63a7abb59070f7e06e56548ce38ec347e184f3fa0ec
                - alias: grafana
                  condition: grafana.enabled
                  name: grafana
                  ref: dhi/grafana-chart:11.3.7@sha256:ad428e5c9a2c86e024a2e6c0e7074ab674e242742f2566ab7a2b2f1e2a7b52d5
              description: Docker Hardened Images Helm chart for TemporalIO
              images:
                - name: temporalio-server
                  ref: dhi/temporalio-server:1.28.3-cli-1.6.2-debian13@sha256:d0b622b4440792354641727e546621f4a8eae0471a78dc927fb3519a306d4fb7
                - name: temporalio-admin-tools
                  ref: dhi/temporalio-admin-tools:1.28.3-cli-1.6.2-debian13@sha256:d462b5711aa26b8bc7a27d8fc90ea13e19fe03510cd96d398f2d87988a09630b
                - name: temporalio-ui
                  ref: dhi/temporalio-ui:2.48.1-debian13@sha256:995974ef9c22c08cf7b7401bc0470f8d48a33a5893756b423998a3f71c610dba
              name: temporalio-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/temporalio/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          with:
            file: values.yaml
            patches:
              - del(.cassandra)
              - del(.elasticsearch)
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: temporal
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
