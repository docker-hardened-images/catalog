  TEMPORALIO_ADMIN_TOOLS_REFERENCE: dhi/temporalio-admin-tools:1.28.4-cli-1.6.2-debian13@sha256:900ea792daa6fd8391a01d93b88b4b4bdb490b7d246d0c12996356f42d15fe74
  TEMPORALIO_SERVER_REFERENCE: dhi/temporalio-server:1.28.4-cli-1.6.2-debian13@sha256:994ead21fb25870e761d0b2a7b9a0259714fda84ccb9712937ae689b4a3df387
  TEMPORALIO_UI_REFERENCE: dhi/temporalio-ui:2.48.3-debian13@sha256:4f89a3c782a7a850168ed8bfc93d087cf347ee0ff153c42dc97c7a84270c7ad9
  VERSION: 0.74.0
contents:
  builds:
    - name: temporalio
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:d3fce3e86c736f8a0d6006a879b3b3eb64074766065f62bcd67cef3c0fa6b848
      work-dir: ${source.dir}/helm-charts/charts/temporal
      contents:
        files:
          - url: git+https://github.com/temporalio/helm-charts.git#temporal-0.74.0
            checksum: f45aaf0383978350e8fdb81d7de57f238e0e3e7f
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: temporalio-server
              dependencies:
                - alias: prometheus
                  condition: prometheus.enabled
                  name: prometheus
                  ref: dhi/prometheus-chart:28.16.0@sha256:7d93bf545a3699bd73e777d5a7a0d254a04717e573193c6fcad8156b483c5968
                - alias: grafana
                  condition: grafana.enabled
                  name: grafana
                  ref: dhi/grafana-chart:12.1.1@sha256:d9055e836060b050c49516bbd4d1318d3fa1891ea6d354433c3018f23e0e990a
              description: Docker Hardened Images Helm chart for TemporalIO
              images:
                - name: temporalio-server
                  ref: dhi/temporalio-server:1.28.4-cli-1.6.2-debian13@sha256:994ead21fb25870e761d0b2a7b9a0259714fda84ccb9712937ae689b4a3df387
                - name: temporalio-admin-tools
                  ref: dhi/temporalio-admin-tools:1.28.4-cli-1.6.2-debian13@sha256:900ea792daa6fd8391a01d93b88b4b4bdb490b7d246d0c12996356f42d15fe74
                - name: temporalio-ui
                  ref: dhi/temporalio-ui:2.48.3-debian13@sha256:4f89a3c782a7a850168ed8bfc93d087cf347ee0ff153c42dc97c7a84270c7ad9
              name: temporalio-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/temporalio/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          with:
            file: values.yaml
            patches:
              - del(.cassandra)
              - del(.elasticsearch)
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: temporal
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
