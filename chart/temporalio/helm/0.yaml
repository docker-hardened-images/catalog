# syntax=dhi.io/build:2-helm3

name: Temporal Helm chart 0.x
image: dhi.io/temporalio-chart
variant: helm
tags:
  - 0.74.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: f45aaf0383978350e8fdb81d7de57f238e0e3e7f
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  GRAFANA_CHART_REFERENCE: dhi/grafana-chart:11.6.1@sha256:3bdfa1b5eac6859435f75fee3526bb378942d772a026fcb40bc41cd521b8466b
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:c7510bdef2d5afba3a1c80b20b836748adaab6991684962b98460d7a36dcdfa4
  PROMETHEUS_CHART_REFERENCE: dhi/prometheus-chart:28.16.0@sha256:1d3d5aeb48458fa35866c569c86454f17e5f389737d8dd3c6dcbc8115dc35c7c
  SEMVER_MAJOR_MINOR_VERSION: "0.74"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.74.0
  TEMPORALIO_ADMIN_TOOLS_REFERENCE: dhi/temporalio-admin-tools:1.28.4-cli-1.6.2-debian13@sha256:1f83dc9cea51f0d527a23490baf824b449c8cc02e3877447b0536576146b756a
  TEMPORALIO_SERVER_REFERENCE: dhi/temporalio-server:1.28.4-cli-1.6.2-debian13@sha256:1f98951d82fb27d8403618240ef3458e341c0ca8b959210ad02ffcfb80bbe293
  TEMPORALIO_UI_REFERENCE: dhi/temporalio-ui:2.48.3-debian13@sha256:44defccba427526ebbd6e1e2ac46f777a82d67784db34a0e73e4dfd427e76ff0
  VERSION: 0.74.0
contents:
  builds:
    - name: temporalio
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:c7510bdef2d5afba3a1c80b20b836748adaab6991684962b98460d7a36dcdfa4
      work-dir: ${source.dir}/helm-charts/charts/temporal
      contents:
        files:
          - url: git+https://github.com/temporalio/helm-charts.git#temporal-0.74.0
            checksum: f45aaf0383978350e8fdb81d7de57f238e0e3e7f
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: temporalio-server
              dependencies:
                - alias: prometheus
                  condition: prometheus.enabled
                  name: prometheus
                  ref: dhi/prometheus-chart:28.16.0@sha256:1d3d5aeb48458fa35866c569c86454f17e5f389737d8dd3c6dcbc8115dc35c7c
                - alias: grafana
                  condition: grafana.enabled
                  name: grafana
                  ref: dhi/grafana-chart:11.6.1@sha256:3bdfa1b5eac6859435f75fee3526bb378942d772a026fcb40bc41cd521b8466b
              description: Docker Hardened Images Helm chart for TemporalIO
              images:
                - name: temporalio-server
                  ref: dhi/temporalio-server:1.28.4-cli-1.6.2-debian13@sha256:1f98951d82fb27d8403618240ef3458e341c0ca8b959210ad02ffcfb80bbe293
                - name: temporalio-admin-tools
                  ref: dhi/temporalio-admin-tools:1.28.4-cli-1.6.2-debian13@sha256:1f83dc9cea51f0d527a23490baf824b449c8cc02e3877447b0536576146b756a
                - name: temporalio-ui
                  ref: dhi/temporalio-ui:2.48.3-debian13@sha256:44defccba427526ebbd6e1e2ac46f777a82d67784db34a0e73e4dfd427e76ff0
              name: temporalio-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/temporalio/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          with:
            file: values.yaml
            patches:
              - del(.cassandra)
              - del(.elasticsearch)
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: temporal
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/temporalio/config
