image:
  registry: ${homepage.registry}
  repository: ${homepage.repository}
  tag: ${homepage.tag}
  digest: ${homepage.digest}

podSecurityContext:
  enabled: true
  fsGroup: 65532
  runAsUser: 65532
  runAsGroup: 65532
  runAsNonRoot: true

containerSecurityContext:
  enabled: true
  seLinuxOptions: {}
  runAsUser: 65532
  runAsGroup: 65532
  runAsNonRoot: true
  privileged: false
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: "RuntimeDefault"
