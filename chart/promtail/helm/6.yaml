# syntax=dhi.io/build:2-helm3

name: Promtail Helm chart 6.x
image: dhi.io/promtail-chart
variant: helm
tags:
  - 6.17.1
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: b68e01680c1aa5230134a6620ac5c9c6ac007985
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:20c25fd3dfe3acda51121e86555d2090b3c6720ff8cad90030326774a4b01272
  PROMETHEUS_CONFIG_RELOADER_IMAGE_REFERENCE: dhi/prometheus-config-reloader:0.89.0-debian13@sha256:8a257ae1451e837c1e923791e2fe56a24b25f64a02513b7da1bb9739a6ade345
  PROMTAIL_REFERENCE: dhi/promtail:3.6.7-debian13@sha256:4032e33756eaccfa3adcf9bcc30482aab4b654958f9faf23e6372a111e9323aa
  SEMVER_MAJOR_MINOR_VERSION: "6.17"
  SEMVER_MAJOR_VERSION: "6"
  SEMVER_VERSION: 6.17.1
  VERSION: 6.17.1
contents:
  builds:
    - name: promtail
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:20c25fd3dfe3acda51121e86555d2090b3c6720ff8cad90030326774a4b01272
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/grafana/helm-charts.git#promtail-6.17.1
            checksum: b68e01680c1aa5230134a6620ac5c9c6ac007985
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/promtail
          with:
            chart:
              appRef: promtail
              description: Docker Hardened Images Helm chart for Promtail
              images:
                - name: promtail
                  ref: dhi/promtail:3.6.7-debian13@sha256:4032e33756eaccfa3adcf9bcc30482aab4b654958f9faf23e6372a111e9323aa
                - name: prometheus-config-reloader
                  ref: dhi/prometheus-config-reloader:0.89.0-debian13@sha256:8a257ae1451e837c1e923791e2fe56a24b25f64a02513b7da1bb9739a6ade345
              name: promtail-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/grafana/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: remove default volumes
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: promtail/values.yaml
            patches:
              - del(.defaultVolumes)
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/promtail
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: promtail
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: promtail
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/promtail/config
