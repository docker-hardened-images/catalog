            checksum: b68e01680c1aa5230134a6620ac5c9c6ac007985
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/promtail
          with:
            chart:
              appRef: promtail
              description: Docker Hardened Images Helm chart for Promtail
              images:
                - name: promtail
                  ref: dhi/promtail:3.6.10-debian13@sha256:69127d0c3d192226853093a4264b5bc7c5bc12c399fc90a9dde6821d8830b0f4
