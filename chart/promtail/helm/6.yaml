  PROMTAIL_REFERENCE: dhi/promtail:3.6.10-debian13@sha256:69127d0c3d192226853093a4264b5bc7c5bc12c399fc90a9dde6821d8830b0f4
  SEMVER_MAJOR_MINOR_VERSION: "6.17"
