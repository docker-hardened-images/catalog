global:
  image:
    repository: ${argocd.registry}/${argocd.repository}
    tag: ${argocd.tag}@${argocd.digest}

dex:
  image:
    repository: ${dex.registry}/${dex.repository}
    tag: ${dex.tag}@${dex.digest}
  containerSecurityContext:
    runAsUser: 65532
    runAsGroup: 65532

redis:
  name: redis
  image:
    repository: ${redis.registry}/${redis.repository}
    tag: ${redis.tag}@${redis.digest}
  volumes:
    - name: logs
      emptyDir:
        medium: Memory
  volumeMounts:
    - name: logs
      mountPath: /var/log/redis
  # Required for in-cluster access via Service (e.g. argocd-server → argocd-redis:6379).
  extraArgs:
    - --bind
    - "0.0.0.0"
  exporter:
    image:
      repository: ${redis-exporter.registry}/${redis-exporter.repository}
      tag: ${redis-exporter.tag}@${redis-exporter.digest}

redis-ha:
  redis:
    fullnameOverride: argocd-redis
  sentinel:
    enabled: true
  auth:
    enabled: true
    sentinel: true
    password: ""
    # Default matches redis-secret-init (fixed name argocd-redis, key auth)—not derived from Release.Name.
    existingSecret: argocd-redis
    existingSecretPasswordKey: auth
    usePasswordFiles: true
    usePasswordFileFromSecret: true
  acl:
    enabled: false
    sentinel: false
    users: []
    userSecret: ""

haproxy:
  redis:
    name: argocd-redis
  # When non-empty, must match the redis-ha StatefulSet name prefix (pods {prefix}-node-0). Required if
  # redis-ha uses fullnameOverride; tpl() cannot see parent redis-ha values from the HAProxy subchart.
  redisWorkloadFullnameOverride: ""
  enabled: false
  # When true, add option tcplog on Redis TCP frontends (one line per connection; noisy).
  debug: false
  servicePort: 6379
  # Must match ports bound in haproxy.config. Keys become Kubernetes port names (≤15 chars, [a-z0-9-] only).
  # Nulls drop the HAProxy subchart defaults (http/https/stat) which Helm would otherwise deep-merge in.
  containerPorts:
    http: null
    https: null
    stat: null
    health-http: 8888
    redis: 6379
    readonly: 6380
    metrics: 9101
  timeout:
    connect: 4s
    server: 330s
    client: 330s
    check: 2s
    tunnel: 1h
  tls:
    enabled: false
    secretName: ""
    keyName:
    certMountPath: /tmp/
  readOnly:
    enabled: false
    port: 6380
  replicas: 3

  checkInterval: 30s
  checkFall: 3

  # Env name for tcp-check AUTH ${VAR} (HAProxy expands only inside double quotes). Wired into the pod via
  # extraEnvs below; empty disables AUTH in checks (passwordless Redis only). If you replace extraEnvs entirely,
  # re-add an entry for this name + secretKeyRef or clear redisCheckAuthEnvVar.
  redisCheckAuthEnvVar: ARGOCD_REDIS_HAPROXY_AUTH
  extraEnvs:
    # Must match redis-ha.auth.existingSecret / existingSecretPasswordKey above (same Secret the data nodes use).
    - name: ARGOCD_REDIS_HAPROXY_AUTH
      valueFrom:
        secretKeyRef:
          name: argocd-redis
          key: auth

  # Suffix for the redis-ha headless Service ({redisWorkloadFullname}-headless).
  redisHeadlessServiceSuffix: "-headless"
  # Cluster DNS zone for per-pod addresses (same as redis-ha.clusterDomain when non-default).
  redisClusterDomain: cluster.local
  # Passed to default-server resolve-prefer (k3d/k3s often IPv4-single-stack; HAProxy default can prefer IPv6).
  redisDnsResolvePrefer: ipv4

  IPv6:
    enabled: true

  metrics:
    enabled: false
    port: 9101
    scrapePath: /metrics

  config: |
    {{- $fullName := .Values.redisWorkloadFullnameOverride | default (include "argo-cd.redis-ha.fullname" .) }}
    {{- $replicas := int (toString .Values.replicas) }}
    {{- $checkPwEnv := .Values.redisCheckAuthEnvVar | default "" | trim }}
    {{- $headlessSvc := printf "%s%s" $fullName (default "-headless" .Values.redisHeadlessServiceSuffix) }}
    {{- $redisNS := .Release.Namespace }}
    {{- $dnsZone := default "cluster.local" .Values.redisClusterDomain }}
    {{/*
      Master: tcp-check on data port 6379 expects role:master in INFO replication. Three servers R0-R2 are the
      StatefulSet replicas; exactly one is primary—the others are replicas and intentionally fail this check.
      balance first + first healthy backend = traffic to the current master. Use headless FQDNs only.
    */}}

    global
      log stdout format raw local0
      maxconn 4096

    # Runtime DNS via pod /etc/resolv.conf (CoreDNS). libc-only init-addr resolves at config load; if Redis/Services
    # are not ready yet, HAProxy disables servers permanently. With resolvers + init-addr last,none, names re-resolve.
    resolvers k8s
      parse-resolv-conf
      timeout resolve 5s
      timeout retry 1s
      hold obsolete 10s
      hold valid 10s

    defaults REDIS
      log global
      mode tcp
      timeout connect {{ .Values.timeout.connect }}
      timeout server {{ .Values.timeout.server }}
      timeout client {{ .Values.timeout.client }}
      timeout check {{ .Values.timeout.check }}
      timeout tunnel {{ .Values.timeout.tunnel }}

      # Do not use libc here when resolvers are set (HAProxy manual). last = state file; none = start down until DNS OK.
      default-server init-addr last,none resolvers k8s resolve-prefer {{ default "ipv4" .Values.redisDnsResolvePrefer }}

    listen health_check_http_url
      bind {{ if .Values.IPv6.enabled }}[::]{{ end }}:8888  {{ if .Values.IPv6.enabled }}v4v6{{ end }}
      mode http
      monitor-uri /healthz
      option      dontlognull

    # decide redis backend to use
    #master
    frontend ft_redis_master
      {{- if .Values.debug }}
      option tcplog
      {{- end }}
      {{- if .Values.tls.enabled }}
      bind {{ if .Values.IPv6.enabled }}[::]{{ end }}:{{ .Values.containerPort }} ssl crt {{ .Values.tls.certMountPath }}{{ .Values.tls.keyName }} {{ if .Values.IPv6.enabled }}v4v6{{ end }}
      {{ else }}
      bind {{ if .Values.IPv6.enabled }}[::]{{ end }}:{{ (int .Values.servicePort) }} {{ if .Values.IPv6.enabled }}v4v6{{ end }}
      {{- end }}
      use_backend bk_redis_master
    {{- if .Values.readOnly.enabled }}
    #slave
    frontend ft_redis_slave
      {{- if .Values.debug }}
      option tcplog
      {{- end }}
      bind {{ if .Values.IPv6.enabled }}[::]{{ end }}:{{ .Values.readOnly.port }} {{ if .Values.IPv6.enabled }}v4v6{{ end }}
      use_backend bk_redis_slave
    {{- end }}

    # Route to the node that reports role:master (redis-ha / redis-chart data port).
    backend bk_redis_master
      {{- if .Values.stickyBalancing }}
      balance source
      hash-type consistent
      {{- else }}
      balance first
      {{- end }}
      mode tcp
      option tcp-check
      tcp-check connect
      {{- if $checkPwEnv }}
      tcp-check send "AUTH {{ printf "${%s}" $checkPwEnv }}"\r\n
      tcp-check expect string +OK
      {{- end }}
      tcp-check send PING\r\n
      tcp-check expect string +PONG
      tcp-check send info\ replication\r\n
      tcp-check expect string role:master
      tcp-check send QUIT\r\n
      tcp-check expect string +OK
      {{- range $i := until $replicas }}
      server R{{ $i }} {{ printf "%s-node-%d.%s.%s.svc.%s" $fullName $i $headlessSvc $redisNS $dnsZone }}:{{ $.Values.servicePort }} check inter {{ $.Values.checkInterval }} fall {{ $.Values.checkFall }} rise 3
      {{- end }}
    {{- if .Values.readOnly.enabled }}
    backend bk_redis_slave
      {{- if .Values.stickyBalancing }}
      balance source
      hash-type consistent
      {{- end }}
      mode tcp
      option tcp-check
      tcp-check connect
      {{- if $checkPwEnv }}
      tcp-check send "AUTH {{ printf "${%s}" $checkPwEnv }}"\r\n
      tcp-check expect string +OK
      {{- end }}
      tcp-check send PING\r\n
      tcp-check expect string +PONG
      tcp-check send info\ replication\r\n
      tcp-check expect  string role:slave
      tcp-check send QUIT\r\n
      tcp-check expect string +OK
      {{- range $i := until $replicas }}
      server R{{ $i }} {{ printf "%s-node-%d.%s.%s.svc.%s" $fullName $i $headlessSvc $redisNS $dnsZone }}:{{ $.Values.servicePort }} check inter {{ $.Values.checkInterval }} fall {{ $.Values.checkFall }} rise 3
      {{- end }}
    {{- end }}

    {{- if .Values.metrics.enabled }}
    frontend stats
      mode http
      bind {{ if .Values.IPv6.enabled }}[::]{{ end }}:{{ .Values.metrics.port }} {{ if .Values.IPv6.enabled }}v4v6{{ end }}
      http-request use-service prometheus-exporter if { path {{ .Values.metrics.scrapePath }} }
      stats enable
      stats uri /stats
      stats refresh 10s
    {{- end }}
