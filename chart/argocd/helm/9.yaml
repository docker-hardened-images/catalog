# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.21
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.4.3-debian13@sha256:8aad6546c3f036d2d930c9df62d0260b2ed87ab219e59788b4f2fdec8932309e
  CHART_COMMIT_SHA: 4c9fe87dd72dd8de1d36928546a2716d016af337
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:a466533de978f60a2a1652b468ad51e9e8b6c96dcfa46f7aec98a7a5c5aba58f
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.29.0@sha256:63c8488a9aedf2618f138261682b4b6cfcd5517e058e1e4817497b3985ef0653
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:ece8efeb889adab72837b0042d8419283ac7fdf2b5c2c8fe09a34e4b8a34ae2e
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:983f249a3e67b7481062acae1e3b298d6e5ce1127f3c7451bc42235e0d39e7b4
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.86.0-debian13@sha256:01fb033fe0ab83d39fed95de85078e5c537b3f04da7f3bdd39bfed5b91bd8b0e
  REDIS_REFERENCE: dhi/redis:8.8.0-debian13-compat@sha256:37ca567cf7b8b606737687f9ed9163155adc9cdf77f0696253422da2b822ccd4
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.21
  VERSION: 9.5.21
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:ece8efeb889adab72837b0042d8419283ac7fdf2b5c2c8fe09a34e4b8a34ae2e
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.21
            checksum: 4c9fe87dd72dd8de1d36928546a2716d016af337
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:983f249a3e67b7481062acae1e3b298d6e5ce1127f3c7451bc42235e0d39e7b4
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.29.0@sha256:63c8488a9aedf2618f138261682b4b6cfcd5517e058e1e4817497b3985ef0653
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.4.3-debian13@sha256:8aad6546c3f036d2d930c9df62d0260b2ed87ab219e59788b4f2fdec8932309e
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:a466533de978f60a2a1652b468ad51e9e8b6c96dcfa46f7aec98a7a5c5aba58f
                - name: redis
                  ref: dhi/redis:8.8.0-debian13-compat@sha256:37ca567cf7b8b606737687f9ed9163155adc9cdf77f0696253422da2b822ccd4
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.86.0-debian13@sha256:01fb033fe0ab83d39fed95de85078e5c537b3f04da7f3bdd39bfed5b91bd8b0e
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
