# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.7
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.3.8-debian13@sha256:60372f0713240aacf77e2ca6033ea538f88e715649909d96e305cfca4bb4f231
  CHART_COMMIT_SHA: 3eb00c46693d94c9bec7d1b5a1c78fb22b894837
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:a3660ffd231bfbf875ee8452c96d4bfc20e91fe136c3731605f7a60ee932a26a
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.28.1@sha256:71499b40e76df183dee0cb9adcfa70ecf680daa2dc82d4d999a08436478d556b
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:f9dd4a356298b0769dc4c2f718b9f564b631ddf37c19e061d61af9081bc7da13
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:2564f065cd86f426facb3fd6e73a36ab1d4b92c78913ced9168e883804b0723a
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.82.0-debian13@sha256:b448ed7b6dfb3e61984e11e6acfd91a1a3a7e62062f2a8d5c5506f5a1da2d9c6
  REDIS_REFERENCE: dhi/redis:8.6.2-debian13-compat@sha256:63c89d44d53206957bddd108c20723e6763d05d3ed13474106a51841f4cdd115
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.7
  VERSION: 9.5.7
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:f9dd4a356298b0769dc4c2f718b9f564b631ddf37c19e061d61af9081bc7da13
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.7
            checksum: 3eb00c46693d94c9bec7d1b5a1c78fb22b894837
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:2564f065cd86f426facb3fd6e73a36ab1d4b92c78913ced9168e883804b0723a
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.28.1@sha256:71499b40e76df183dee0cb9adcfa70ecf680daa2dc82d4d999a08436478d556b
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.3.8-debian13@sha256:60372f0713240aacf77e2ca6033ea538f88e715649909d96e305cfca4bb4f231
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:a3660ffd231bfbf875ee8452c96d4bfc20e91fe136c3731605f7a60ee932a26a
                - name: redis
                  ref: dhi/redis:8.6.2-debian13-compat@sha256:63c89d44d53206957bddd108c20723e6763d05d3ed13474106a51841f4cdd115
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.82.0-debian13@sha256:b448ed7b6dfb3e61984e11e6acfd91a1a3a7e62062f2a8d5c5506f5a1da2d9c6
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
