# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.4.15
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.3.4-debian13@sha256:7ba3f31cf9431fb53d36aebd2ddba4710945a553d173a0c9126ab28d1650ec92
  CHART_COMMIT_SHA: 7b3c8fb455e8144fcd17e403f895c44fbb6b152d
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:cc4f97b3d7a901e43fe3f3fec2b56b6ef22ed4ba52a9cc3989823d4c7a0e0c0f
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.28.0@sha256:01237288948ed4759867ebe22ad564d1690a59a14125725099cb7ffb7e3ff60a
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:92e43232140b33018c99c7b178d2f7302cfb0f0017267731b0512ac206cd8690
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:21faa19215da1543234336b0ff0391203ce677c7e8e78baa4c5ac6f96d8a647d
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.82.0-debian13@sha256:948cf4ab36a82da685ecfacb71bc9907211de820876a2ed71067f91e8dce033b
  REDIS_REFERENCE: dhi/redis:8.6.1-debian13-compat@sha256:91b19e406f49b4e203803278fc56523b8fc32a32e24b400a695e5d8b1c94de62
  SEMVER_MAJOR_MINOR_VERSION: "9.4"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.4.15
  VERSION: 9.4.15
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:92e43232140b33018c99c7b178d2f7302cfb0f0017267731b0512ac206cd8690
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.4.15
            checksum: 7b3c8fb455e8144fcd17e403f895c44fbb6b152d
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:21faa19215da1543234336b0ff0391203ce677c7e8e78baa4c5ac6f96d8a647d
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.28.0@sha256:01237288948ed4759867ebe22ad564d1690a59a14125725099cb7ffb7e3ff60a
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.3.4-debian13@sha256:7ba3f31cf9431fb53d36aebd2ddba4710945a553d173a0c9126ab28d1650ec92
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:cc4f97b3d7a901e43fe3f3fec2b56b6ef22ed4ba52a9cc3989823d4c7a0e0c0f
                - name: redis
                  ref: dhi/redis:8.6.1-debian13-compat@sha256:91b19e406f49b4e203803278fc56523b8fc32a32e24b400a695e5d8b1c94de62
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.82.0-debian13@sha256:948cf4ab36a82da685ecfacb71bc9907211de820876a2ed71067f91e8dce033b
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            sed -i 's/redis-ha.fullname/common.names.fullname/' _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
