# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.4.10
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.3.3-debian13@sha256:be097bdc4bf0dbf561e41a8e6ea642d07772c6d1737114ebddc1ca2d97c5a1dc
  CHART_COMMIT_SHA: 2ff039de4f3f5ca1a582392232c607ebe5f58ed5
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:c2a3568ea9f8b1ae96cc88d4b579d7f49d9972287b8e239d70df020d74f5567d
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.28.0@sha256:9eefe68d9fe6213f1435a93ceb9cb870facc2cfe97a0d0e23733c8e924dd6ded
  HELM_REFERENCE: dhi/helm:3.20.0-debian13-dev@sha256:d5dbc06cccf0edbcd1a8f0639a4251484de94052397a5f528b0d019f90a2e1db
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:327c27b57effcd91a17cceb945a3b606e870a0a559bcefb1ebd465f8b1929247
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.82.0-debian13@sha256:0f6fbd60e4d7a91f8ca666e838bd8f1ad28beedbf4dcf9710be28d8ecf526a83
  REDIS_REFERENCE: dhi/redis:8.6.1-debian13-compat@sha256:84c96ea6804b077144471ac73d1bc219cebb75bbfacc57d0c22bac2967b0ad0d
  SEMVER_MAJOR_MINOR_VERSION: "9.4"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.4.10
  VERSION: 9.4.10
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.20.0-debian13-dev@sha256:d5dbc06cccf0edbcd1a8f0639a4251484de94052397a5f528b0d019f90a2e1db
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.4.10
            checksum: 2ff039de4f3f5ca1a582392232c607ebe5f58ed5
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:327c27b57effcd91a17cceb945a3b606e870a0a559bcefb1ebd465f8b1929247
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.28.0@sha256:9eefe68d9fe6213f1435a93ceb9cb870facc2cfe97a0d0e23733c8e924dd6ded
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.3.3-debian13@sha256:be097bdc4bf0dbf561e41a8e6ea642d07772c6d1737114ebddc1ca2d97c5a1dc
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:c2a3568ea9f8b1ae96cc88d4b579d7f49d9972287b8e239d70df020d74f5567d
                - name: redis
                  ref: dhi/redis:8.6.1-debian13-compat@sha256:84c96ea6804b077144471ac73d1bc219cebb75bbfacc57d0c22bac2967b0ad0d
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.82.0-debian13@sha256:0f6fbd60e4d7a91f8ca666e838bd8f1ad28beedbf4dcf9710be28d8ecf526a83
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            sed -i 's/redis-ha.fullname/common.names.fullname/' _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
