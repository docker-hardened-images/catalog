# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.0
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.3.6-debian13@sha256:8cf309b3b92d301d12fd22e964a47f7384e0f5956981e1702a56a250fbc5fb3d
  CHART_COMMIT_SHA: 61a5dec5ce91ec429eecbff8b8865d2a34ba2bea
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:20b98ac73c3713805914ae7b184aa8a0a5bf8d9f77632944db28644b5a863fdb
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.28.1@sha256:a4322789d562f98d55436502a409832457274e2fb23ad6482decccc70ab87f1d
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:d2ca66cc4bd7708b7cdd363360f608a9450f24dac43da8183d9d610031123f81
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:3b1d39ab02dac4141f447caad175113bb894df554bce5224c24f51b35b4796ba
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.82.0-debian13@sha256:fc1de1c782b8a72b6545420a347e46c124bb5f57c7a425d7f44a7f9a8a34086d
  REDIS_REFERENCE: dhi/redis:8.6.2-debian13-compat@sha256:fb82542e2bdee42b091ce8932adf358a873c499645bc219d1444d94b88094b29
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.0
  VERSION: 9.5.0
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:d2ca66cc4bd7708b7cdd363360f608a9450f24dac43da8183d9d610031123f81
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.0
            checksum: 61a5dec5ce91ec429eecbff8b8865d2a34ba2bea
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:3b1d39ab02dac4141f447caad175113bb894df554bce5224c24f51b35b4796ba
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.28.1@sha256:a4322789d562f98d55436502a409832457274e2fb23ad6482decccc70ab87f1d
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.3.6-debian13@sha256:8cf309b3b92d301d12fd22e964a47f7384e0f5956981e1702a56a250fbc5fb3d
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:20b98ac73c3713805914ae7b184aa8a0a5bf8d9f77632944db28644b5a863fdb
                - name: redis
                  ref: dhi/redis:8.6.2-debian13-compat@sha256:fb82542e2bdee42b091ce8932adf358a873c499645bc219d1444d94b88094b29
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.82.0-debian13@sha256:fc1de1c782b8a72b6545420a347e46c124bb5f57c7a425d7f44a7f9a8a34086d
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
