# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.17
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.4.3-debian13@sha256:20d5f8b033448c694cd79397a65ae61b79fbd2391995361fb453b64b11190a5f
  CHART_COMMIT_SHA: dc079e6e243570da7d5ab3bff55feef36f962bc6
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:f12bf98690dd5cf0cbea9789b6d0eb3f26548dd4a00e2649604a9fb60985de60
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.29.0@sha256:408ad50500d2d0b48f6dfeacb5b22069b57642a052f35a303519a844fe9ed372
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:e3d7fb6de37608485fd22d3dd04ed6b0f9cc68431cb21697c2383978e2847ed2
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:2c22348593de743f49bcf4f93f7f9ede6ae50d71460b2b27b9a2685c418a361c
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.84.0-debian13@sha256:fbdfc9e0eab3caaf6aeed97bb9e8940f61e6ec48d78ae5e62a3ab7f7f835696c
  REDIS_REFERENCE: dhi/redis:8.6.3-debian13-compat@sha256:369bb9ae211a7f8cb0f533d3080f206ec5971e73214d7ab6cae6a7c4bb6085ff
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.17
  VERSION: 9.5.17
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:e3d7fb6de37608485fd22d3dd04ed6b0f9cc68431cb21697c2383978e2847ed2
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.17
            checksum: dc079e6e243570da7d5ab3bff55feef36f962bc6
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:2c22348593de743f49bcf4f93f7f9ede6ae50d71460b2b27b9a2685c418a361c
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.29.0@sha256:408ad50500d2d0b48f6dfeacb5b22069b57642a052f35a303519a844fe9ed372
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.4.3-debian13@sha256:20d5f8b033448c694cd79397a65ae61b79fbd2391995361fb453b64b11190a5f
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:f12bf98690dd5cf0cbea9789b6d0eb3f26548dd4a00e2649604a9fb60985de60
                - name: redis
                  ref: dhi/redis:8.6.3-debian13-compat@sha256:369bb9ae211a7f8cb0f533d3080f206ec5971e73214d7ab6cae6a7c4bb6085ff
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.84.0-debian13@sha256:fbdfc9e0eab3caaf6aeed97bb9e8940f61e6ec48d78ae5e62a3ab7f7f835696c
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
