# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.13
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.3.9-debian13@sha256:3db211c331ec324fddfb2aee193d0a4c72acf20fb97b26dc310f07f9629ebb03
  CHART_COMMIT_SHA: 93767040610b2233767ba42da6ffecb9613a15b3
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:b45df9c1a2c098529139976686902f46fcb778b278ff28b9ab64a8cd37a32b0c
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.28.1@sha256:334bbe4bcde64368d21de1888645443d24c7d8bdfbc9eb1011ad3a63da3d267a
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:bf8a03f405f8a317925ae232b32a1d29943a57b019dabfb0b7d0e624f558baf2
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:91275451e92d052d456fb800d3813dfaa791385dcbb388b6eee0a18de1d48756
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.83.0-debian13@sha256:b200538a80fd69eb5cf15c057f1eede401b6b6e4e5d98f0158ea239f6546945e
  REDIS_REFERENCE: dhi/redis:8.6.3-debian13-compat@sha256:76c27985358eecb0bf24fbc294432cb3ee5832be3761b84f340cd2579422fe86
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.13
  VERSION: 9.5.13
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:bf8a03f405f8a317925ae232b32a1d29943a57b019dabfb0b7d0e624f558baf2
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.13
            checksum: 93767040610b2233767ba42da6ffecb9613a15b3
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:91275451e92d052d456fb800d3813dfaa791385dcbb388b6eee0a18de1d48756
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.28.1@sha256:334bbe4bcde64368d21de1888645443d24c7d8bdfbc9eb1011ad3a63da3d267a
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.3.9-debian13@sha256:3db211c331ec324fddfb2aee193d0a4c72acf20fb97b26dc310f07f9629ebb03
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:b45df9c1a2c098529139976686902f46fcb778b278ff28b9ab64a8cd37a32b0c
                - name: redis
                  ref: dhi/redis:8.6.3-debian13-compat@sha256:76c27985358eecb0bf24fbc294432cb3ee5832be3761b84f340cd2579422fe86
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.83.0-debian13@sha256:b200538a80fd69eb5cf15c057f1eede401b6b6e4e5d98f0158ea239f6546945e
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
