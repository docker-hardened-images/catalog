# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.18
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.4.3-debian13@sha256:d1715a393e87445bd30d8df41b45eeea41b8e49c639178bce6897825b09cb161
  CHART_COMMIT_SHA: 73f488eb2c97f72b849ab92bc399ab3ee36c4bd9
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:1b94054cd5b4d56f6167510922dbae254eca83de7ad78bcc8ae587aba6f8bb39
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.29.0@sha256:b34ac2c45e2b7f820314ceb8b30ff130503fcd425f6646e35bfaf321146550fc
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:ed0c764ca91c1084c850f3b00e7248f9127153bb3a5803058a337ac99ba6d479
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:58057b2c7a1bee2d17fb297833e01393d06e0652f6b5a0de21b4def3d16ac385
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.84.0-debian13@sha256:58b4a60df3ecd1efbf359299279eaf6f7164a920494c3267374e7c05cd7dbcf7
  REDIS_REFERENCE: dhi/redis:8.6.3-debian13-compat@sha256:369bb9ae211a7f8cb0f533d3080f206ec5971e73214d7ab6cae6a7c4bb6085ff
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.18
  VERSION: 9.5.18
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:ed0c764ca91c1084c850f3b00e7248f9127153bb3a5803058a337ac99ba6d479
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.18
            checksum: 73f488eb2c97f72b849ab92bc399ab3ee36c4bd9
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:58057b2c7a1bee2d17fb297833e01393d06e0652f6b5a0de21b4def3d16ac385
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.29.0@sha256:b34ac2c45e2b7f820314ceb8b30ff130503fcd425f6646e35bfaf321146550fc
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.4.3-debian13@sha256:d1715a393e87445bd30d8df41b45eeea41b8e49c639178bce6897825b09cb161
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:1b94054cd5b4d56f6167510922dbae254eca83de7ad78bcc8ae587aba6f8bb39
                - name: redis
                  ref: dhi/redis:8.6.3-debian13-compat@sha256:369bb9ae211a7f8cb0f533d3080f206ec5971e73214d7ab6cae6a7c4bb6085ff
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.84.0-debian13@sha256:58b4a60df3ecd1efbf359299279eaf6f7164a920494c3267374e7c05cd7dbcf7
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
