# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.2
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.3.7-debian13@sha256:a0717175fbd94cc09136e70cbe64b2698a78dcea10d2fda29314f021fa03a70e
  CHART_COMMIT_SHA: 27507615b1c943d87470387339a02fe65a95a5c2
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:2b6ec65f514f2fb078f57fd3413b2b00f574d4704208c49d13b10609cda236f5
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.28.1@sha256:232a20288e4e424290bc46017302d619f64bb351fb39c36d0196acdb7e4c0aba
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:d3fce3e86c736f8a0d6006a879b3b3eb64074766065f62bcd67cef3c0fa6b848
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:ca355decc67a439516901a51d76f7f4d252428e4c9f7b4fb83d605abcaa00792
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.82.0-debian13@sha256:a89a131441f25a8b7d98939e9db5694fe09d2520ed5fd724b002e5e23c45d631
  REDIS_REFERENCE: dhi/redis:8.6.2-debian13-compat@sha256:63c89d44d53206957bddd108c20723e6763d05d3ed13474106a51841f4cdd115
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.2
  VERSION: 9.5.2
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:d3fce3e86c736f8a0d6006a879b3b3eb64074766065f62bcd67cef3c0fa6b848
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.2
            checksum: 27507615b1c943d87470387339a02fe65a95a5c2
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:ca355decc67a439516901a51d76f7f4d252428e4c9f7b4fb83d605abcaa00792
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.28.1@sha256:232a20288e4e424290bc46017302d619f64bb351fb39c36d0196acdb7e4c0aba
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.3.7-debian13@sha256:a0717175fbd94cc09136e70cbe64b2698a78dcea10d2fda29314f021fa03a70e
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:2b6ec65f514f2fb078f57fd3413b2b00f574d4704208c49d13b10609cda236f5
                - name: redis
                  ref: dhi/redis:8.6.2-debian13-compat@sha256:63c89d44d53206957bddd108c20723e6763d05d3ed13474106a51841f4cdd115
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.82.0-debian13@sha256:a89a131441f25a8b7d98939e9db5694fe09d2520ed5fd724b002e5e23c45d631
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
