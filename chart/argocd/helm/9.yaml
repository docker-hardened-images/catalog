# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.7.1
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.4.4-debian13@sha256:d63e3552f822765090dd17be4b96fc311e07a888781879aa6774be96fc181ecc
  CHART_COMMIT_SHA: fab75cedead3162a5ab5d2cbcb0eda4afb2de5c3
  CHART_HELM_NAME: argocd-chart
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:48acbe5484ab9419c8e48f7d46dbc02c2dd9eed71d3e00e2775885a603e55a69
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.29.0@sha256:57538993f681a06c9d78445d4c07cb374ebf6193a3efe3ef1756d9d0787bc6f3
  HELM_VERSION: 4.1.4-2
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:73eac356bbd722e9dc1bea59d27839428ec39c4a77b97b27ee2b62c35287d970
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.86.0-debian13@sha256:ddabbc04178322ea2b22b657b8c834a07bbf736ecc7bbc00ca7d84dc9d2699eb
  REDIS_REFERENCE: dhi/redis:8.8.0-debian13-compat@sha256:2786880d32ccac84399086e235e591351e48524a7d3e5f346ae717b1a4f8eba0
  SEMVER_MAJOR_MINOR_VERSION: "9.7"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.7.1
  VERSION: 9.7.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  builds:
    - name: argocd
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - sed
          - yq-go
          - helm=4.1.4-2
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.7.1
            checksum: fab75cedead3162a5ab5d2cbcb0eda4afb2de5c3
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:73eac356bbd722e9dc1bea59d27839428ec39c4a77b97b27ee2b62c35287d970
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.29.0@sha256:57538993f681a06c9d78445d4c07cb374ebf6193a3efe3ef1756d9d0787bc6f3
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.4.4-debian13@sha256:d63e3552f822765090dd17be4b96fc311e07a888781879aa6774be96fc181ecc
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:48acbe5484ab9419c8e48f7d46dbc02c2dd9eed71d3e00e2775885a603e55a69
                - name: redis
                  ref: dhi/redis:8.8.0-debian13-compat@sha256:2786880d32ccac84399086e235e591351e48524a7d3e5f346ae717b1a4f8eba0
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.86.0-debian13@sha256:ddabbc04178322ea2b22b657b8c834a07bbf736ecc7bbc00ca7d84dc9d2699eb
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
