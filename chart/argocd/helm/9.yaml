# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.21
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.4.3-debian13@sha256:23eea7f16c6e77c58aa9a63d164a2fe917d24e27a874a395ab2214d6fd81f331
  CHART_COMMIT_SHA: 4c9fe87dd72dd8de1d36928546a2716d016af337
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:40b722a0d56651e17f62ff891fa8d0b383e558dae96e8cfa001914220f18b64d
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.29.0@sha256:13572988c71005415499fd77e3b8e9ac18576ea533c306e8398b9663786b3ed5
  HELM_REFERENCE: dhi/helm:3.21.1-debian13-dev@sha256:85f1eee85289b262fe18b0b02fbc399c910257f95d45135fa75ad7d6e7c30073
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:fb913fae7751c58fd1c7603e7448b033f80ac2a6aa3de1063a340bf2aa009ecf
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.86.0-debian13@sha256:df36b55d809b6e7c84c91d75b73181a0865dff01a8a83841f6c636a33033bb1a
  REDIS_REFERENCE: dhi/redis:8.8.0-debian13-compat@sha256:5ff0d06d71e0bcf8d1491a2a3f669bcccf8c93d3d6df2199ddad51dfb7ecedd7
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.21
  VERSION: 9.5.21
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.21.1-debian13-dev@sha256:85f1eee85289b262fe18b0b02fbc399c910257f95d45135fa75ad7d6e7c30073
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.21
            checksum: 4c9fe87dd72dd8de1d36928546a2716d016af337
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:fb913fae7751c58fd1c7603e7448b033f80ac2a6aa3de1063a340bf2aa009ecf
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.29.0@sha256:13572988c71005415499fd77e3b8e9ac18576ea533c306e8398b9663786b3ed5
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.4.3-debian13@sha256:23eea7f16c6e77c58aa9a63d164a2fe917d24e27a874a395ab2214d6fd81f331
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:40b722a0d56651e17f62ff891fa8d0b383e558dae96e8cfa001914220f18b64d
                - name: redis
                  ref: dhi/redis:8.8.0-debian13-compat@sha256:5ff0d06d71e0bcf8d1491a2a3f669bcccf8c93d3d6df2199ddad51dfb7ecedd7
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.86.0-debian13@sha256:df36b55d809b6e7c84c91d75b73181a0865dff01a8a83841f6c636a33033bb1a
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
