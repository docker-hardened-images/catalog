# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.15
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.4.2-debian13@sha256:6eae0a2bd03712f525d49985ece2810c196ca5791df086978d6f9467e711323e
  CHART_COMMIT_SHA: 8ae85341e2b2dd2bf87c22ad0f60498598adf008
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:f12bf98690dd5cf0cbea9789b6d0eb3f26548dd4a00e2649604a9fb60985de60
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.29.0@sha256:41e95217bff9a3a6084f107b77dad06a1c2eb35a3643e3568700cb9c46e8115e
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:6506c914dff9353ce03ce64c8d30089cf14419d8d39f026c53917e1451fb8b21
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:99a22940a76a4cdfd98acc8b23d590aefbb07cadef9f5784769514079895ee3f
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.84.0-debian13@sha256:3dafb00d624818573f573fdaba5845b8e3e86b4d5161c3b747fa8f26d86f199a
  REDIS_REFERENCE: dhi/redis:8.6.3-debian13-compat@sha256:b22507f7bbf9874cb6fcbc70cc653b3464b9c5064bb628f631ec3c67e655d9bf
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.15
  VERSION: 9.5.15
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:6506c914dff9353ce03ce64c8d30089cf14419d8d39f026c53917e1451fb8b21
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.15
            checksum: 8ae85341e2b2dd2bf87c22ad0f60498598adf008
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:99a22940a76a4cdfd98acc8b23d590aefbb07cadef9f5784769514079895ee3f
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.29.0@sha256:41e95217bff9a3a6084f107b77dad06a1c2eb35a3643e3568700cb9c46e8115e
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.4.2-debian13@sha256:6eae0a2bd03712f525d49985ece2810c196ca5791df086978d6f9467e711323e
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:f12bf98690dd5cf0cbea9789b6d0eb3f26548dd4a00e2649604a9fb60985de60
                - name: redis
                  ref: dhi/redis:8.6.3-debian13-compat@sha256:b22507f7bbf9874cb6fcbc70cc653b3464b9c5064bb628f631ec3c67e655d9bf
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.84.0-debian13@sha256:3dafb00d624818573f573fdaba5845b8e3e86b4d5161c3b747fa8f26d86f199a
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
