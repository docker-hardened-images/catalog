# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.19
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.4.3-debian13@sha256:2538cc08159eeb867e47a904bacf514858a0d5a9dd9d46a560befc5d7d6d9b58
  CHART_COMMIT_SHA: 02fa0bf064b1a229f12f5ce00e4657b5a43ccb2c
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:1b94054cd5b4d56f6167510922dbae254eca83de7ad78bcc8ae587aba6f8bb39
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.29.0@sha256:b34ac2c45e2b7f820314ceb8b30ff130503fcd425f6646e35bfaf321146550fc
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:ce37cdc271f28789f84db63c8fe5d86522cc98922637f8dde8c2aca4f0cc1632
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:0fe6de2347b4f233d3a8192b8842aa3d64ad523667033bc429127ee15dcd5fc3
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.85.0-debian13@sha256:b8cb6f68a1ac0db8d82957fd51099d4bf5afe41d38677d83381c38e095ba0cac
  REDIS_REFERENCE: dhi/redis:8.6.4-debian13-compat@sha256:6cf04cbf0ffe8f9c631f4e88c93910f38fa6d602e20cb38c8999fb51c13d7aa4
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.19
  VERSION: 9.5.19
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:ce37cdc271f28789f84db63c8fe5d86522cc98922637f8dde8c2aca4f0cc1632
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.19
            checksum: 02fa0bf064b1a229f12f5ce00e4657b5a43ccb2c
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:0fe6de2347b4f233d3a8192b8842aa3d64ad523667033bc429127ee15dcd5fc3
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.29.0@sha256:b34ac2c45e2b7f820314ceb8b30ff130503fcd425f6646e35bfaf321146550fc
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.4.3-debian13@sha256:2538cc08159eeb867e47a904bacf514858a0d5a9dd9d46a560befc5d7d6d9b58
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:1b94054cd5b4d56f6167510922dbae254eca83de7ad78bcc8ae587aba6f8bb39
                - name: redis
                  ref: dhi/redis:8.6.4-debian13-compat@sha256:6cf04cbf0ffe8f9c631f4e88c93910f38fa6d602e20cb38c8999fb51c13d7aa4
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.85.0-debian13@sha256:b8cb6f68a1ac0db8d82957fd51099d4bf5afe41d38677d83381c38e095ba0cac
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
