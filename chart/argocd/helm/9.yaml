# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.14
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.4.2-debian13@sha256:3a4c2dd68d339a8e63b158b0c7b7305cb6bc57f5435c44cbcdc5aa6ed02e8fc9
  CHART_COMMIT_SHA: 8b96b7d918925e9f1f8260f8a1ee3e498a2db63f
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:933bd9cf55ebf23c7f53abb39310ab4dd1c40ecea60b3ad584f66fb4c6150236
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.28.1@sha256:9a8bcbc3ece8cf27972fad019738511d955f994be3373ad941d47a5ee1159ca6
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:dde1e16cc0ad3d2cdeebdb78f1e676b899e6f62a12c529dd620d045bd2fd334a
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:b6cf9dd73b6bb2bda6a73785801aedb6bc66df2d39e754d7ac1ff8d0b02ec5f2
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.83.0-debian13@sha256:054528157ee3adcef8950425252f6b3f1eae28f089d75185b915dbd488f4e2a0
  REDIS_REFERENCE: dhi/redis:8.6.3-debian13-compat@sha256:76c27985358eecb0bf24fbc294432cb3ee5832be3761b84f340cd2579422fe86
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.14
  VERSION: 9.5.14
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:dde1e16cc0ad3d2cdeebdb78f1e676b899e6f62a12c529dd620d045bd2fd334a
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.14
            checksum: 8b96b7d918925e9f1f8260f8a1ee3e498a2db63f
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:b6cf9dd73b6bb2bda6a73785801aedb6bc66df2d39e754d7ac1ff8d0b02ec5f2
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.28.1@sha256:9a8bcbc3ece8cf27972fad019738511d955f994be3373ad941d47a5ee1159ca6
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.4.2-debian13@sha256:3a4c2dd68d339a8e63b158b0c7b7305cb6bc57f5435c44cbcdc5aa6ed02e8fc9
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:933bd9cf55ebf23c7f53abb39310ab4dd1c40ecea60b3ad584f66fb4c6150236
                - name: redis
                  ref: dhi/redis:8.6.3-debian13-compat@sha256:76c27985358eecb0bf24fbc294432cb3ee5832be3761b84f340cd2579422fe86
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.83.0-debian13@sha256:054528157ee3adcef8950425252f6b3f1eae28f089d75185b915dbd488f4e2a0
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
