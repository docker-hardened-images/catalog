# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.13
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.4.1-debian13@sha256:86e6f103a7e338fac35610759c53ec21cb0cc563bc9a05b89f0a0d853de9d126
  CHART_COMMIT_SHA: 93767040610b2233767ba42da6ffecb9613a15b3
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:a518b2f68b53359f9fbec95e5500efebb91c7202589fabc4bc02013122f5d76d
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.28.1@sha256:95e3430270a1a64242f0cd5b9391b38813699348daf2b4a6351821ff0efc7413
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:bfafe601001f13954055f12d8e3ca13ab35f3af84965902e670824f33f2d2f2c
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:5aba1bc84325deedcb9337031b625f1683a96a8403a03831da245070138a4bf5
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.83.0-debian13@sha256:1fcc9bcbccf2664933e0e2d00826e85938a5992636f09c966a9888cfc9953260
  REDIS_REFERENCE: dhi/redis:8.6.3-debian13-compat@sha256:76c27985358eecb0bf24fbc294432cb3ee5832be3761b84f340cd2579422fe86
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.13
  VERSION: 9.5.13
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:bfafe601001f13954055f12d8e3ca13ab35f3af84965902e670824f33f2d2f2c
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.13
            checksum: 93767040610b2233767ba42da6ffecb9613a15b3
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:5aba1bc84325deedcb9337031b625f1683a96a8403a03831da245070138a4bf5
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.28.1@sha256:95e3430270a1a64242f0cd5b9391b38813699348daf2b4a6351821ff0efc7413
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.4.1-debian13@sha256:86e6f103a7e338fac35610759c53ec21cb0cc563bc9a05b89f0a0d853de9d126
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:a518b2f68b53359f9fbec95e5500efebb91c7202589fabc4bc02013122f5d76d
                - name: redis
                  ref: dhi/redis:8.6.3-debian13-compat@sha256:76c27985358eecb0bf24fbc294432cb3ee5832be3761b84f340cd2579422fe86
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.83.0-debian13@sha256:1fcc9bcbccf2664933e0e2d00826e85938a5992636f09c966a9888cfc9953260
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
