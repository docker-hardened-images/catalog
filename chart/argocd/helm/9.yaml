# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.4.6
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.3.2-debian13@sha256:0080d1a1f6a9810a3b7fd35072ee1c208e257f90c642447fecf3af9f79ca6d10
  CHART_COMMIT_SHA: dd40956efda0400ff3f4c2e4fd432159915ff9e0
  DEX_REFERENCE: dhi/dex:2.45.0-debian13@sha256:d1985767d43b68734b8a9088360960a6b5423bbd496e32512d647f48ed2f4671
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.28.0@sha256:dbf5edd6dcef5c1eb8ebaaf75b1b5a947ebb82e46546bb606f7f664ae0f6b465
  HELM_REFERENCE: dhi/helm:3.20.0-debian13-dev@sha256:d9fb15368eec534b9256a049385b9f843bca3f64736f14e4b6d593efdccfeaa9
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.5@sha256:70af82345657f118b374b69b83ff6428c6a0c6506263728fc73a0d5ebfe48d7f
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.81.0-debian13@sha256:c4c275afff755f007c878764941f45f25540f3f8333f90df68470b4be5ff8f0a
  REDIS_REFERENCE: dhi/redis:8.6.1-debian13-compat@sha256:84c96ea6804b077144471ac73d1bc219cebb75bbfacc57d0c22bac2967b0ad0d
  SEMVER_MAJOR_MINOR_VERSION: "9.4"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.4.6
  VERSION: 9.4.6
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.20.0-debian13-dev@sha256:d9fb15368eec534b9256a049385b9f843bca3f64736f14e4b6d593efdccfeaa9
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.4.6
            checksum: dd40956efda0400ff3f4c2e4fd432159915ff9e0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.5@sha256:70af82345657f118b374b69b83ff6428c6a0c6506263728fc73a0d5ebfe48d7f
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.28.0@sha256:dbf5edd6dcef5c1eb8ebaaf75b1b5a947ebb82e46546bb606f7f664ae0f6b465
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.3.2-debian13@sha256:0080d1a1f6a9810a3b7fd35072ee1c208e257f90c642447fecf3af9f79ca6d10
                - name: dex
                  ref: dhi/dex:2.45.0-debian13@sha256:d1985767d43b68734b8a9088360960a6b5423bbd496e32512d647f48ed2f4671
                - name: redis
                  ref: dhi/redis:8.6.1-debian13-compat@sha256:84c96ea6804b077144471ac73d1bc219cebb75bbfacc57d0c22bac2967b0ad0d
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.81.0-debian13@sha256:c4c275afff755f007c878764941f45f25540f3f8333f90df68470b4be5ff8f0a
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            sed -i 's/redis-ha.fullname/common.names.fullname/' _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
