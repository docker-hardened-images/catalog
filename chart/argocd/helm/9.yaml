# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.21
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.4.3-debian13@sha256:6d624ac2c6ea4a49161376cdbcee406531868636fcb5721fa0905970029c1def
  CHART_COMMIT_SHA: 4c9fe87dd72dd8de1d36928546a2716d016af337
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:2ce6d7a21b40323ae94e555d511547ecbe74dd2996d82d8c224814092defd0a6
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.29.0@sha256:e51e5006bcb8901e026e6d9d5e59ea56e32093facd400e70fce6350bf935fc44
  HELM_REFERENCE: dhi/helm:3.21.1-debian13-dev@sha256:210cf8f74216e3b27dc70a0cec01194863ce8b319fe089d97e6e10d8a020b666
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:2a1ac6c2790955bad83ab807b1a3dbcdb2188610db7a0b4454030b6530165f5f
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.86.0-debian13@sha256:01fb033fe0ab83d39fed95de85078e5c537b3f04da7f3bdd39bfed5b91bd8b0e
  REDIS_REFERENCE: dhi/redis:8.8.0-debian13-compat@sha256:5ff0d06d71e0bcf8d1491a2a3f669bcccf8c93d3d6df2199ddad51dfb7ecedd7
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.21
  VERSION: 9.5.21
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.21.1-debian13-dev@sha256:210cf8f74216e3b27dc70a0cec01194863ce8b319fe089d97e6e10d8a020b666
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.21
            checksum: 4c9fe87dd72dd8de1d36928546a2716d016af337
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:2a1ac6c2790955bad83ab807b1a3dbcdb2188610db7a0b4454030b6530165f5f
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.29.0@sha256:e51e5006bcb8901e026e6d9d5e59ea56e32093facd400e70fce6350bf935fc44
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.4.3-debian13@sha256:6d624ac2c6ea4a49161376cdbcee406531868636fcb5721fa0905970029c1def
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:2ce6d7a21b40323ae94e555d511547ecbe74dd2996d82d8c224814092defd0a6
                - name: redis
                  ref: dhi/redis:8.8.0-debian13-compat@sha256:5ff0d06d71e0bcf8d1491a2a3f669bcccf8c93d3d6df2199ddad51dfb7ecedd7
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.86.0-debian13@sha256:01fb033fe0ab83d39fed95de85078e5c537b3f04da7f3bdd39bfed5b91bd8b0e
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
