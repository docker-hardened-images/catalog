# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.4.17
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.3.6-debian13@sha256:c2829b6f18ba4da89aa5b7910143bedaddd4f1777e42f4d9e9eb597be920ae7f
  CHART_COMMIT_SHA: 72af08ca906ad3bca079697340cb07e7fa468dcb
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:1f8b6b6c9b29d1778a454174d126ba90f9f652e12f05749fa3f11e64f6ff4407
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.28.1@sha256:0f3c4609f2c8d53b2338050546aab13103b7cda15e51bc19237c282160a14dd3
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:7bee3e50c815757f78414dcd850621d0cca82d3660da2376f1111069073f3bd5
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:3b1d39ab02dac4141f447caad175113bb894df554bce5224c24f51b35b4796ba
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.82.0-debian13@sha256:516083207efae7207d4bee294faced276de270613dd9352f65f7ac6b6fc35997
  REDIS_REFERENCE: dhi/redis:8.6.2-debian13-compat@sha256:fb82542e2bdee42b091ce8932adf358a873c499645bc219d1444d94b88094b29
  SEMVER_MAJOR_MINOR_VERSION: "9.4"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.4.17
  VERSION: 9.4.17
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:7bee3e50c815757f78414dcd850621d0cca82d3660da2376f1111069073f3bd5
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.4.17
            checksum: 72af08ca906ad3bca079697340cb07e7fa468dcb
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:3b1d39ab02dac4141f447caad175113bb894df554bce5224c24f51b35b4796ba
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.28.1@sha256:0f3c4609f2c8d53b2338050546aab13103b7cda15e51bc19237c282160a14dd3
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.3.6-debian13@sha256:c2829b6f18ba4da89aa5b7910143bedaddd4f1777e42f4d9e9eb597be920ae7f
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:1f8b6b6c9b29d1778a454174d126ba90f9f652e12f05749fa3f11e64f6ff4407
                - name: redis
                  ref: dhi/redis:8.6.2-debian13-compat@sha256:fb82542e2bdee42b091ce8932adf358a873c499645bc219d1444d94b88094b29
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.82.0-debian13@sha256:516083207efae7207d4bee294faced276de270613dd9352f65f7ac6b6fc35997
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            sed -i 's/redis-ha.fullname/common.names.fullname/' _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
