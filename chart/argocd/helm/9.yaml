# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.11
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.3.8-debian13@sha256:b62ec04a2564f956e5d2160553ebe614f088bcda9a19cd3bc09a49df45110712
  CHART_COMMIT_SHA: a855fda3723413d0bf6ece73cff8b21a4be55be2
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:477fd47f2be64c3bba90772a4d1dafa7c07d4318b0c549b8eae90dc955397134
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.28.1@sha256:334bbe4bcde64368d21de1888645443d24c7d8bdfbc9eb1011ad3a63da3d267a
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:b72e12042810e0697eebb51a7862e7699f4df8eca02324029c220ccfd0bce4a4
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:a6031e2f3924ac2cfc315cca29777558b345ffdd9eb6c60a2f89c2375e42df5b
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.83.0-debian13@sha256:1addaf49393e07e109fe19f6b4e5e0305bff6a6d28f93820f2ba705a252941d4
  REDIS_REFERENCE: dhi/redis:8.6.2-debian13-compat@sha256:63c89d44d53206957bddd108c20723e6763d05d3ed13474106a51841f4cdd115
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.11
  VERSION: 9.5.11
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:b72e12042810e0697eebb51a7862e7699f4df8eca02324029c220ccfd0bce4a4
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.11
            checksum: a855fda3723413d0bf6ece73cff8b21a4be55be2
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:a6031e2f3924ac2cfc315cca29777558b345ffdd9eb6c60a2f89c2375e42df5b
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.28.1@sha256:334bbe4bcde64368d21de1888645443d24c7d8bdfbc9eb1011ad3a63da3d267a
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.3.8-debian13@sha256:b62ec04a2564f956e5d2160553ebe614f088bcda9a19cd3bc09a49df45110712
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:477fd47f2be64c3bba90772a4d1dafa7c07d4318b0c549b8eae90dc955397134
                - name: redis
                  ref: dhi/redis:8.6.2-debian13-compat@sha256:63c89d44d53206957bddd108c20723e6763d05d3ed13474106a51841f4cdd115
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.83.0-debian13@sha256:1addaf49393e07e109fe19f6b4e5e0305bff6a6d28f93820f2ba705a252941d4
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
