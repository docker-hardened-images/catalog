# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.4.12
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.3.4-debian13@sha256:0f210a89db5a70192f1f2587858c78f3a894a9cd27572f657e9366df8c6e6add
  CHART_COMMIT_SHA: 387ff8c3f7bec9f845090a23a8e6541dfe652ee8
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:1538d3bd0c7f06b904f68b16dfce2032825893b1247f82cabe8be473a90c67b0
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.28.0@sha256:af7724f4b2ddc31e59b218e259fc1675f419a6b5feb716d1807ba1c769719f58
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:20c25fd3dfe3acda51121e86555d2090b3c6720ff8cad90030326774a4b01272
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:f8e5a034c4bb7522e99a245124bfcfdf718f504236a3af19000ae53ce622b8da
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.82.0-debian13@sha256:1365e7f96fa4037f25f0673b46771269a1d126cf39f863c256e86a5c528a74f0
  REDIS_REFERENCE: dhi/redis:8.6.1-debian13-compat@sha256:84c96ea6804b077144471ac73d1bc219cebb75bbfacc57d0c22bac2967b0ad0d
  SEMVER_MAJOR_MINOR_VERSION: "9.4"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.4.12
  VERSION: 9.4.12
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:20c25fd3dfe3acda51121e86555d2090b3c6720ff8cad90030326774a4b01272
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.4.12
            checksum: 387ff8c3f7bec9f845090a23a8e6541dfe652ee8
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:f8e5a034c4bb7522e99a245124bfcfdf718f504236a3af19000ae53ce622b8da
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.28.0@sha256:af7724f4b2ddc31e59b218e259fc1675f419a6b5feb716d1807ba1c769719f58
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.3.4-debian13@sha256:0f210a89db5a70192f1f2587858c78f3a894a9cd27572f657e9366df8c6e6add
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:1538d3bd0c7f06b904f68b16dfce2032825893b1247f82cabe8be473a90c67b0
                - name: redis
                  ref: dhi/redis:8.6.1-debian13-compat@sha256:84c96ea6804b077144471ac73d1bc219cebb75bbfacc57d0c22bac2967b0ad0d
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.82.0-debian13@sha256:1365e7f96fa4037f25f0673b46771269a1d126cf39f863c256e86a5c528a74f0
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            sed -i 's/redis-ha.fullname/common.names.fullname/' _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
