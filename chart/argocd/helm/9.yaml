# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.4.11
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.3.3-debian13@sha256:c4b54017ee16256249e19c57545d7acfe8b23f82342203864171075ed6f0fdf7
  CHART_COMMIT_SHA: 1a2f80fa123ea2ad10458dc308bb299307af66df
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:b14066a09e68ead7899d6703504e0cb56f21b85018ac0e7c53df7a7de53d1725
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.28.0@sha256:12e0f870003550fb8ee11859bcadc012bedb041f886e727fb7f8527e423a1dce
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:caa7223ddf8951e9bb159f921683e515361321ccf67c103981ffea2ae14a64eb
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:008ce12ae5cbf7b1d0da2f12f5f95dc1b042620534cf4e947635f40a40f4373d
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.82.0-debian13@sha256:0000d20eaa20f54834646fbbe61893a121176a07fedb7fcf049d93887932fd05
  REDIS_REFERENCE: dhi/redis:8.6.1-debian13-compat@sha256:84c96ea6804b077144471ac73d1bc219cebb75bbfacc57d0c22bac2967b0ad0d
  SEMVER_MAJOR_MINOR_VERSION: "9.4"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.4.11
  VERSION: 9.4.11
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:caa7223ddf8951e9bb159f921683e515361321ccf67c103981ffea2ae14a64eb
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.4.11
            checksum: 1a2f80fa123ea2ad10458dc308bb299307af66df
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:008ce12ae5cbf7b1d0da2f12f5f95dc1b042620534cf4e947635f40a40f4373d
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.28.0@sha256:12e0f870003550fb8ee11859bcadc012bedb041f886e727fb7f8527e423a1dce
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.3.3-debian13@sha256:c4b54017ee16256249e19c57545d7acfe8b23f82342203864171075ed6f0fdf7
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:b14066a09e68ead7899d6703504e0cb56f21b85018ac0e7c53df7a7de53d1725
                - name: redis
                  ref: dhi/redis:8.6.1-debian13-compat@sha256:84c96ea6804b077144471ac73d1bc219cebb75bbfacc57d0c22bac2967b0ad0d
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.82.0-debian13@sha256:0000d20eaa20f54834646fbbe61893a121176a07fedb7fcf049d93887932fd05
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            sed -i 's/redis-ha.fullname/common.names.fullname/' _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
