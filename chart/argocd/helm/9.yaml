# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.2
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.3.7-debian13@sha256:8bfdc26c3a15f39e357ec064a845484db3a2ee3a3f091c07e63f920fb4a37aa6
  CHART_COMMIT_SHA: 27507615b1c943d87470387339a02fe65a95a5c2
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:3226f80cf93b0acc53d1483b910b9106a4f55111c43fa5f719951900dd426c21
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.28.1@sha256:5c45e8b66eb657ebc18530d31f07764e9c08f9de421dbc644b2c1fa66e39e1e1
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:81e04bdcbc4f86f57589672220b5fcd235d616d28038aec4511068678778db66
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:6063e642aa4d88642fce53206475c7c0db293e0338b09bbf4a4b16992a4607c6
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.82.0-debian13@sha256:89b1fa4891ba4f6b81873a3b20e31e0cc08f99efe2c91c3c526937246c1da298
  REDIS_REFERENCE: dhi/redis:8.6.2-debian13-compat@sha256:63c89d44d53206957bddd108c20723e6763d05d3ed13474106a51841f4cdd115
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.2
  VERSION: 9.5.2
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:81e04bdcbc4f86f57589672220b5fcd235d616d28038aec4511068678778db66
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.2
            checksum: 27507615b1c943d87470387339a02fe65a95a5c2
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:6063e642aa4d88642fce53206475c7c0db293e0338b09bbf4a4b16992a4607c6
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.28.1@sha256:5c45e8b66eb657ebc18530d31f07764e9c08f9de421dbc644b2c1fa66e39e1e1
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.3.7-debian13@sha256:8bfdc26c3a15f39e357ec064a845484db3a2ee3a3f091c07e63f920fb4a37aa6
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:3226f80cf93b0acc53d1483b910b9106a4f55111c43fa5f719951900dd426c21
                - name: redis
                  ref: dhi/redis:8.6.2-debian13-compat@sha256:63c89d44d53206957bddd108c20723e6763d05d3ed13474106a51841f4cdd115
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.82.0-debian13@sha256:89b1fa4891ba4f6b81873a3b20e31e0cc08f99efe2c91c3c526937246c1da298
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
