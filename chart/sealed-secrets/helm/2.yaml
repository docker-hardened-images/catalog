  CHART_HELM_NAME: sealed-secrets-chart
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_VERSION: 4.1.4-2
  SEALED_SECRETS_CONTROLLER_REFERENCE: dhi/sealed-secrets-controller:0.38.4-debian13@sha256:8c8eb3793c884df017d88c7c068500d9cc492db41f3303ff330bded18addb0b2
  SEMVER_MAJOR_MINOR_VERSION: "2.19"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.19.1
  VERSION: 2.19.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  builds:
    - name: sealed-secrets-chart
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - helm=4.1.4-2
        files:
          - url: git+https://github.com/bitnami-labs/sealed-secrets.git#helm-v2.19.1
            checksum: d6bd5908cc05dd7a9be0f8564ea5e18578020f12
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/helm/sealed-secrets
          with:
            chart:
              appRef: sealed-secrets-controller
              description: Docker Hardened Images Helm chart for Sealed Secrets
              images:
                - name: sealed-secrets-controller
                  ref: dhi/sealed-secrets-controller:0.38.4-debian13@sha256:8c8eb3793c884df017d88c7c068500d9cc492db41f3303ff330bded18addb0b2
              name: sealed-secrets-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/bitnami-labs/sealed-secrets
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/helm/sealed-secrets
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          secrets:
            - id: docker_hub_user
              env: DOCKER_HUB_USER
            - id: docker_hub_password
              env: DOCKER_HUB_PASSWORD
          with:
            chart: ${source.dir}/helm-charts/helm/sealed-secrets
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/helm
          with:
