  SEALED_SECRETS_CONTROLLER_REFERENCE: dhi/sealed-secrets-controller:0.38.4-debian13@sha256:3940df0981a4703c36081b1b96e2834bd452ba9951c7910fde094abb98a1d682
  SEMVER_MAJOR_MINOR_VERSION: "2.19"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.19.1
  VERSION: 2.19.1
contents:
  builds:
    - name: sealed-secrets-chart
      uses: dhi.io/helm:3.21.2-debian13-dev@sha256:e30b522f3f39307b7710b304f082f76d7b8fc0d0140bfc44bdf2892c5411519f
      contents:
        files:
          - url: git+https://github.com/bitnami-labs/sealed-secrets.git#helm-v2.19.1
            checksum: d6bd5908cc05dd7a9be0f8564ea5e18578020f12
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/helm/sealed-secrets
          with:
            chart:
              appRef: sealed-secrets-controller
              description: Docker Hardened Images Helm chart for Sealed Secrets
              images:
                - name: sealed-secrets-controller
                  ref: dhi/sealed-secrets-controller:0.38.4-debian13@sha256:3940df0981a4703c36081b1b96e2834bd452ba9951c7910fde094abb98a1d682
              name: sealed-secrets-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/bitnami-labs/sealed-secrets
            cmd: prepare
