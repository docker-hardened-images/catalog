# syntax=dhi.io/build:2-helm3

name: APISIX Helm chart 2.x
image: dhi.io/apisix-chart
variant: helm
tags:
  - 2.15.0
platforms:
  - linux/amd64
vars:
  APISIX_IMAGE_REFERENCE: dhi/apisix:3.16.0-debian13@sha256:abfeb5a16cfdb2fdcdeb3f7670738e2ea5f03f5dd6fc852e726821254b408e51
  APISIX_INGRESS_CONTROLLER_CHART_REFERENCE: dhi/apisix-ingress-controller-chart:1.2.0@sha256:d4bc4db7dbd8829eb08f36750fe62330b7ea1458214082f1d4c0ba5507002033
  BUSYBOX_IMAGE_REFERENCE: dhi/busybox:1.37.0-debian13@sha256:e0cbe035dd7d7072e088172c5833bf756bfba3618567c0f5e73288e97e3a19bf
  CHART_COMMIT_SHA: 750cb55a0ae84342178c800399964db16de34f0f
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.2-debian13-dev@sha256:e30b522f3f39307b7710b304f082f76d7b8fc0d0140bfc44bdf2892c5411519f
  SEMVER_MAJOR_MINOR_VERSION: "2.15"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.15.0
  VERSION: 2.15.0
contents:
  builds:
    - name: apisix-chart
      uses: dhi.io/helm:3.21.2-debian13-dev@sha256:e30b522f3f39307b7710b304f082f76d7b8fc0d0140bfc44bdf2892c5411519f
      contents:
        files:
          - url: git+https://github.com/apache/apisix-helm-chart.git#apisix-2.15.0
            checksum: 750cb55a0ae84342178c800399964db16de34f0f
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/apisix
          with:
            chart:
              appRef: apisix
              dependencies:
                - alias: ingress-controller
                  condition: ingress-controller.enabled
                  name: apisix-ingress-controller-chart
                  ref: dhi/apisix-ingress-controller-chart:1.2.0@sha256:d4bc4db7dbd8829eb08f36750fe62330b7ea1458214082f1d4c0ba5507002033
              description: Docker Hardened Images Helm chart for APISIX
              images:
                - name: apisix
                  ref: dhi/apisix:3.16.0-debian13@sha256:abfeb5a16cfdb2fdcdeb3f7670738e2ea5f03f5dd6fc852e726821254b408e51
                - name: busybox
                  ref: dhi/busybox:1.37.0-debian13@sha256:e0cbe035dd7d7072e088172c5833bf756bfba3618567c0f5e73288e97e3a19bf
              name: apisix-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/apache/apisix
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/apisix
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts/apisix
          with:
            file: values.yaml
            patches:
              - del(.etcd.image)
              - del(.etcd.auth.rbac)
              - del(.etcd.containerSecurityContext)
              - del(.etcd.service)
              - del(.etcd.replicaCount)
              - del(.etcd.autoCompactionRetention)
              - del(.etcd.autoCompactionMode)
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: apisix
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: apisix
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: apisix
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/apisix/config
