# syntax=dhi.io/build:2-helm3

name: APISIX Helm chart 2.x
image: dhi.io/apisix-chart
variant: helm
tags:
  - 2.16.0
platforms:
  - linux/amd64
vars:
  APISIX_INGRESS_CONTROLLER_CHART_REFERENCE: dhi/apisix-ingress-controller-chart:1.2.1@sha256:03a6d70237477602a92b33471995ff7ddd76756b12127ec879eb833bd491611a
  APISIX_REFERENCE: dhi/apisix:3.17.0-debian13@sha256:316d17c50ce8620883056b27b2f20baa7be9dc8acd2ad6ce2b0b02789ada20ee
  BUSYBOX_REFERENCE: dhi/busybox:1.37.0-debian13@sha256:efb8e4cbdb82facfab75a9cf681570e2aec86414ad0474a6e0580740a3603636
  CHART_COMMIT_SHA: 873c9db60bea54ee2eb258762deb8963e563f3be
  CHART_HELM_NAME: apisix-chart
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_VERSION: 4.1.4-2
  SEMVER_MAJOR_MINOR_VERSION: "2.16"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.16.0
  VERSION: 2.16.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  builds:
    - name: apisix-chart
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - patch
          - yq-go
          - helm=4.1.4-2
        files:
          - url: git+https://github.com/apache/apisix-helm-chart.git#apisix-2.16.0
            checksum: 873c9db60bea54ee2eb258762deb8963e563f3be
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/apisix
          with:
            chart:
              appRef: apisix
              dependencies:
                - alias: ingress-controller
                  condition: ingress-controller.enabled
                  name: apisix-ingress-controller-chart
                  ref: dhi/apisix-ingress-controller-chart:1.2.1@sha256:03a6d70237477602a92b33471995ff7ddd76756b12127ec879eb833bd491611a
              description: Docker Hardened Images Helm chart for APISIX
              images:
                - name: apisix
                  ref: dhi/apisix:3.17.0-debian13@sha256:316d17c50ce8620883056b27b2f20baa7be9dc8acd2ad6ce2b0b02789ada20ee
                - name: busybox
                  ref: dhi/busybox:1.37.0-debian13@sha256:efb8e4cbdb82facfab75a9cf681570e2aec86414ad0474a6e0580740a3603636
              name: apisix-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/apache/apisix
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/apisix
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts/apisix
          with:
            file: values.yaml
            patches:
              - del(.etcd.image)
              - del(.etcd.auth.rbac)
              - del(.etcd.containerSecurityContext)
              - del(.etcd.service)
              - del(.etcd.replicaCount)
              - del(.etcd.autoCompactionRetention)
              - del(.etcd.autoCompactionMode)
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: apisix
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: apisix
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: apisix
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/apisix/config
