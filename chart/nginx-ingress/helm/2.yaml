# syntax=dhi.io/build:2-helm3

name: NGINX Ingress Helm chart 2.x
image: dhi.io/nginx-ingress-chart
variant: helm
tags:
  - 2.6.1
platforms:
  - linux/amd64
vars:
  APP_VERSION: 5.5.1
  CHART_COMMIT_SHA: 814710cbaf43c9a37baed249feec0db5f0868fa9
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.1-debian13-dev@sha256:4a31f16f7a169beeda158b2db462a85c6767889a961726b04907bf4d0a6754f4
  NGINX_INGRESS_IMAGE_REFERENCE: dhi/nginx-ingress:5.5.0-debian13@sha256:540b6b8987904dc21330fe90a21fa66a20256bcea8fe6717e58c987611782e61
  SEMVER_MAJOR_MINOR_VERSION: "2.6"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.6.1
  VERSION: 2.6.1
contents:
  builds:
    - name: nginx-ingress-chart
      uses: dhi.io/helm:3.21.1-debian13-dev@sha256:4a31f16f7a169beeda158b2db462a85c6767889a961726b04907bf4d0a6754f4
      work-dir: ${source.dir}/helm-charts/charts/nginx-ingress
      contents:
        files:
          - url: git+https://github.com/nginx/kubernetes-ingress.git#v5.5.1
            checksum: 814710cbaf43c9a37baed249feec0db5f0868fa9
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: nginx-ingress
              description: Docker Hardened Images Helm chart for NGINX Ingress Controller
              images:
                - name: nginx-ingress
                  ref: dhi/nginx-ingress:5.5.0-debian13@sha256:540b6b8987904dc21330fe90a21fa66a20256bcea8fe6717e58c987611782e61
              name: nginx-ingress-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/nginx/kubernetes-ingress
            cmd: prepare
            registry: dhi.io
        - name: remove plus config
          runs: |
            set -eux -o pipefail

            rm values-icp.yaml
            rm values-plus.yaml
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: .
            cmd: lint .
        - name: remove schema
          runs: |
            set -eux -o pipefail

            rm values.schema.json
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/nginx-ingress/config
