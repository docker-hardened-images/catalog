# syntax=dhi.io/build:2-helm3

name: NGINX Ingress Helm chart 2.x
image: dhi.io/nginx-ingress-chart
variant: helm
tags:
  - 2.6.0
platforms:
  - linux/amd64
vars:
  APP_VERSION: 5.5.0
  CHART_COMMIT_SHA: 7e80d6dbe863b6f848a02bbb2dbc953450e035b6
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:ece8efeb889adab72837b0042d8419283ac7fdf2b5c2c8fe09a34e4b8a34ae2e
  NGINX_INGRESS_IMAGE_REFERENCE: dhi/nginx-ingress:5.5.0-debian13@sha256:d3f05916192fbb7ec59bdc7a991134ddcb1149047392ba8b40672a9d875b6aa0
  SEMVER_MAJOR_MINOR_VERSION: "2.6"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.6.0
  VERSION: 2.6.0
contents:
  builds:
    - name: nginx-ingress-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:ece8efeb889adab72837b0042d8419283ac7fdf2b5c2c8fe09a34e4b8a34ae2e
      work-dir: ${source.dir}/helm-charts/charts/nginx-ingress
      contents:
        files:
          - url: git+https://github.com/nginx/kubernetes-ingress.git#v5.5.0
            checksum: 7e80d6dbe863b6f848a02bbb2dbc953450e035b6
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: nginx-ingress
              description: Docker Hardened Images Helm chart for NGINX Ingress Controller
              images:
                - name: nginx-ingress
                  ref: dhi/nginx-ingress:5.5.0-debian13@sha256:d3f05916192fbb7ec59bdc7a991134ddcb1149047392ba8b40672a9d875b6aa0
              name: nginx-ingress-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/nginx/kubernetes-ingress
            cmd: prepare
            registry: dhi.io
        - name: remove plus config
          runs: |
            set -eux -o pipefail

            rm values-icp.yaml
            rm values-plus.yaml
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: .
            cmd: lint .
        - name: remove schema
          runs: |
            set -eux -o pipefail

            rm values.schema.json
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/nginx-ingress/config
