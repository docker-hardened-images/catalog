# syntax=dhi.io/build:2-helm3

name: NGINX Ingress Helm chart 2.x
image: dhi.io/nginx-ingress-chart
variant: helm
tags:
  - 2.5.3
platforms:
  - linux/amd64
vars:
  APP_VERSION: 5.4.3
  CHART_COMMIT_SHA: b075fc6704e53efe04e5439270ce994253194d6c
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:6506c914dff9353ce03ce64c8d30089cf14419d8d39f026c53917e1451fb8b21
  NGINX_INGRESS_IMAGE_REFERENCE: dhi/nginx-ingress:5.4.2-debian13@sha256:abed49e2715ecfe764bb01e9f6bc53db9e4db79e6e1caecedb0c86864b71ae21
  SEMVER_MAJOR_MINOR_VERSION: "2.5"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.5.3
  VERSION: 2.5.3
contents:
  builds:
    - name: nginx-ingress-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:6506c914dff9353ce03ce64c8d30089cf14419d8d39f026c53917e1451fb8b21
      work-dir: ${source.dir}/helm-charts/charts/nginx-ingress
      contents:
        files:
          - url: git+https://github.com/nginx/kubernetes-ingress.git#v5.4.3
            checksum: b075fc6704e53efe04e5439270ce994253194d6c
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: nginx-ingress
              description: Docker Hardened Images Helm chart for NGINX Ingress Controller
              images:
                - name: nginx-ingress
                  ref: dhi/nginx-ingress:5.4.2-debian13@sha256:abed49e2715ecfe764bb01e9f6bc53db9e4db79e6e1caecedb0c86864b71ae21
              name: nginx-ingress-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/nginx/kubernetes-ingress
            cmd: prepare
            registry: dhi.io
        - name: remove plus config
          runs: |
            set -eux -o pipefail

            rm values-icp.yaml
            rm values-plus.yaml
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: .
            cmd: lint .
        - name: remove schema
          runs: |
            set -eux -o pipefail

            rm values.schema.json
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/nginx-ingress/config
