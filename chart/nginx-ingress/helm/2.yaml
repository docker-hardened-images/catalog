name: NGINX Ingress Helm chart 2.x
image: dhi.io/nginx-ingress-chart
variant: helm
tags:
  - 2.5.2
platforms:
  - linux/amd64
vars:
  APP_VERSION: 5.4.2
  CHART_COMMIT_SHA: cd864d71a5e3b6698b80daee02b2785c4020db10
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:bf8a03f405f8a317925ae232b32a1d29943a57b019dabfb0b7d0e624f558baf2
  NGINX_INGRESS_IMAGE_REFERENCE: dhi/nginx-ingress:5.4.2-debian13@sha256:9893160b7927f177829e0feb681480350fcd4d689ad4192b235af4afd9bc3dbc
  SEMVER_MAJOR_MINOR_VERSION: "2.5"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.5.2
  VERSION: 2.5.2
contents:
  builds:
    - name: nginx-ingress-chart
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:bf8a03f405f8a317925ae232b32a1d29943a57b019dabfb0b7d0e624f558baf2
      work-dir: ${source.dir}/helm-charts/charts/nginx-ingress
      contents:
        files:
          - url: git+https://github.com/nginx/kubernetes-ingress.git#v5.4.2
            checksum: cd864d71a5e3b6698b80daee02b2785c4020db10
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: nginx-ingress
              description: Docker Hardened Images Helm chart for NGINX Ingress Controller
              images:
                - name: nginx-ingress
                  ref: dhi/nginx-ingress:5.4.2-debian13@sha256:9893160b7927f177829e0feb681480350fcd4d689ad4192b235af4afd9bc3dbc
              name: nginx-ingress-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/nginx/kubernetes-ingress
            cmd: prepare
            registry: dhi.io
        - name: remove plus config
          runs: |
            set -eux -o pipefail

            rm values-icp.yaml
            rm values-plus.yaml
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: .
            cmd: lint .
        - name: remove schema
          runs: |
            set -eux -o pipefail

            rm values.schema.json
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/nginx-ingress/config
