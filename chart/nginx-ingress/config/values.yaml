controller:
  image:
    repository: ${nginx-ingress.registry}/${nginx-ingress.repository}
    tag: ${nginx-ingress.tag}
    digest: ${nginx-ingress.digest}

  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
    fsGroup: 101

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 0
    capabilities:
      drop:
        - ALL
      add:
        - NET_BIND_SERVICE

  initContainerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 0
    capabilities:
      drop:
        - ALL
