# syntax=dhi.io/build:2-helm3

name: OAuth2 Proxy Helm chart 10.x
image: dhi.io/oauth2-proxy-chart
variant: helm
tags:
  - 10.4.0
platforms:
  - linux/amd64
vars:
  ALPINE_BASE_REFERENCE: dhi/alpine-base:3.22-alpine3.22@sha256:8650b1d1d7b78da72f6a11b87de14868ae880270c60932f51c10c1329fb95b8a
  CHART_COMMIT_SHA: 727b5ecb2aa1a4d140827cf95e4d69f41e8d3bf0
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:7bee3e50c815757f78414dcd850621d0cca82d3660da2376f1111069073f3bd5
  OAUTH2_PROXY_REFERENCE: dhi/oauth2-proxy:7.15.0-debian13@sha256:2c771fa71882a19252a830cacd82e35e738f58e275bd3c2c5d90b2a9b9bead06
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:21faa19215da1543234336b0ff0391203ce677c7e8e78baa4c5ac6f96d8a647d
  SEMVER_MAJOR_MINOR_VERSION: "10.4"
  SEMVER_MAJOR_VERSION: "10"
  SEMVER_VERSION: 10.4.0
  VERSION: 10.4.0
contents:
  builds:
    - name: oauth2-proxy
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:7bee3e50c815757f78414dcd850621d0cca82d3660da2376f1111069073f3bd5
      contents:
        files:
          - url: git+https://github.com/oauth2-proxy/manifests.git#oauth2-proxy-10.4.0
            checksum: 727b5ecb2aa1a4d140827cf95e4d69f41e8d3bf0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/helm/oauth2-proxy
          with:
            chart:
              appRef: oauth2-proxy
              dependencies:
                - alias: redis
                  condition: redis-ha.enabled
                  name: redis-chart
                  ref: dhi/redis-chart:23.0.7@sha256:21faa19215da1543234336b0ff0391203ce677c7e8e78baa4c5ac6f96d8a647d
              description: Docker Hardened Images Helm chart for OAuth2 Proxy
              images:
                - name: oauth2-proxy
                  ref: dhi/oauth2-proxy:7.15.0-debian13@sha256:2c771fa71882a19252a830cacd82e35e738f58e275bd3c2c5d90b2a9b9bead06
                - name: alpine-base
                  ref: dhi/alpine-base:3.22-alpine3.22@sha256:8650b1d1d7b78da72f6a11b87de14868ae880270c60932f51c10c1329fb95b8a
              name: oauth2-proxy-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/oauth2-proxy/manifests
            cmd: prepare
            registry: dhi.io
        - name: patch helpers
          work-dir: ${source.dir}/helm-charts/helm/oauth2-proxy/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/include "redis-ha.fullname"/include "common.names.fullname"/' _helpers.tpl
            sed -i 's/(dict "Chart" (dict "Name" "redis-ha")/(dict "Chart" (dict "Name" "redis")/' _helpers.tpl
            sed -i 's|printf "redis://%s:%.0f"|printf "redis://%s-master:%.0f"|' _helpers.tpl
            sed -i 's/$redisValues.redis.port/.Values.redis.master.service.ports.redis/' _helpers.tpl
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/helm/oauth2-proxy
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: pull dependencies
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: ${source.dir}/helm-charts/helm/oauth2-proxy
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/helm
          with:
            chart: oauth2-proxy
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/helm/oauth2-proxy
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/oauth2-proxy/config
