name: OAuth2 Proxy Helm chart 9.x
image: dhi.io/oauth2-proxy-chart
variant: helm
tags:
  - 9.0.1
platforms:
  - linux/amd64
vars:
  ALPINE_BASE_REFERENCE: dhi/alpine-base:3.22-alpine3.22@sha256:8af0b90847665089947d448f6c031e1b11ef228e6ff2a664b5a03896fe0a68c4
  CHART_COMMIT_SHA: 4efa93b9158acaa99d439f6b32435cb26401dba0
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.2-debian13-dev@sha256:e30b522f3f39307b7710b304f082f76d7b8fc0d0140bfc44bdf2892c5411519f
  OAUTH2_PROXY_REFERENCE: dhi/oauth2-proxy:7.15.3-debian13@sha256:f6c8360c639f595939f9282855e4b33442af2a48b097369b6180cb3e406d5a58
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:0f7b6c6e9f417078e000e9d4bfab82f09c002f1c3208ca7aad1e1677ac4a1ce4
  SEMVER_MAJOR_MINOR_VERSION: "9.0"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.0.1
  VERSION: 9.0.1
contents:
  builds:
    - name: oauth2-proxy
      uses: dhi.io/helm:3.21.2-debian13-dev@sha256:e30b522f3f39307b7710b304f082f76d7b8fc0d0140bfc44bdf2892c5411519f
      contents:
        files:
          - url: git+https://github.com/oauth2-proxy/manifests.git#oauth2-proxy-9.0.1
            checksum: 4efa93b9158acaa99d439f6b32435cb26401dba0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/helm/oauth2-proxy
          with:
            chart:
              appRef: oauth2-proxy
              dependencies:
                - alias: redis
                  condition: redis.enabled
                  name: redis-chart
                  ref: dhi/redis-chart:23.0.7@sha256:0f7b6c6e9f417078e000e9d4bfab82f09c002f1c3208ca7aad1e1677ac4a1ce4
              description: Docker Hardened Images Helm chart for OAuth2 Proxy Cool version
              images:
                - name: oauth2-proxy
                  ref: dhi/oauth2-proxy:7.15.3-debian13@sha256:f6c8360c639f595939f9282855e4b33442af2a48b097369b6180cb3e406d5a58
                - name: alpine-base
                  ref: dhi/alpine-base:3.22-alpine3.22@sha256:8af0b90847665089947d448f6c031e1b11ef228e6ff2a664b5a03896fe0a68c4
              name: oauth2-proxy-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/oauth2-proxy/manifests
            cmd: prepare
            registry: dhi.io
        - name: patch helpers
          work-dir: ${source.dir}/helm-charts/helm/oauth2-proxy/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/include "redis-ha.fullname"/include "common.names.fullname"/' _helpers.tpl
            sed -i 's|printf "redis://%s:%.0f"|printf "redis://%s-master:%.0f"|' _helpers.tpl
            sed -i 's/.Values.redis.redis.port/.Values.redis.master.service.ports.redis/' _helpers.tpl
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/helm/oauth2-proxy
          with:
            cmd: patch
            debug: true
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: pull dependencies
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: ${source.dir}/helm-charts/helm/oauth2-proxy
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/helm
          with:
            chart: oauth2-proxy
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/helm/oauth2-proxy
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/oauth2-proxy/config
