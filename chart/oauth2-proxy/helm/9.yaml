# syntax=dhi.io/build:2-helm3

name: OAuth2 Proxy Helm chart 9.x
image: dhi.io/oauth2-proxy-chart
variant: helm
tags:
  - 9.0.1
platforms:
  - linux/amd64
vars:
  ALPINE_BASE_REFERENCE: dhi/alpine-base:3.22-alpine3.22@sha256:8650b1d1d7b78da72f6a11b87de14868ae880270c60932f51c10c1329fb95b8a
  CHART_COMMIT_SHA: 4efa93b9158acaa99d439f6b32435cb26401dba0
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:20c25fd3dfe3acda51121e86555d2090b3c6720ff8cad90030326774a4b01272
  OAUTH2_PROXY_REFERENCE: dhi/oauth2-proxy:7.14.3-debian13@sha256:02e6518fd30447f498ff76eb55f834c6e82ecf09f14116870de1685ecdcdcef9
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:f8e5a034c4bb7522e99a245124bfcfdf718f504236a3af19000ae53ce622b8da
  SEMVER_MAJOR_MINOR_VERSION: "9.0"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.0.1
  VERSION: 9.0.1
contents:
  builds:
    - name: oauth2-proxy
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:20c25fd3dfe3acda51121e86555d2090b3c6720ff8cad90030326774a4b01272
      contents:
        files:
          - url: git+https://github.com/oauth2-proxy/manifests.git#oauth2-proxy-9.0.1
            checksum: 4efa93b9158acaa99d439f6b32435cb26401dba0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/helm/oauth2-proxy
          with:
            chart:
              appRef: oauth2-proxy
              dependencies:
                - alias: redis
                  condition: redis.enabled
                  name: redis-chart
                  ref: dhi/redis-chart:23.0.7@sha256:f8e5a034c4bb7522e99a245124bfcfdf718f504236a3af19000ae53ce622b8da
              description: Docker Hardened Images Helm chart for OAuth2 Proxy Cool version
              images:
                - name: oauth2-proxy
                  ref: dhi/oauth2-proxy:7.14.3-debian13@sha256:02e6518fd30447f498ff76eb55f834c6e82ecf09f14116870de1685ecdcdcef9
                - name: alpine-base
                  ref: dhi/alpine-base:3.22-alpine3.22@sha256:8650b1d1d7b78da72f6a11b87de14868ae880270c60932f51c10c1329fb95b8a
              name: oauth2-proxy-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/oauth2-proxy/manifests
            cmd: prepare
            registry: dhi.io
        - name: patch helpers
          work-dir: ${source.dir}/helm-charts/helm/oauth2-proxy/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/include "redis-ha.fullname"/include "common.names.fullname"/' _helpers.tpl
            sed -i 's|printf "redis://%s:%.0f"|printf "redis://%s-master:%.0f"|' _helpers.tpl
            sed -i 's/.Values.redis.redis.port/.Values.redis.master.service.ports.redis/' _helpers.tpl
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/helm/oauth2-proxy
          with:
            cmd: patch
            debug: true
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: pull dependencies
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: ${source.dir}/helm-charts/helm/oauth2-proxy
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/helm
          with:
            chart: oauth2-proxy
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/helm/oauth2-proxy
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/oauth2-proxy/config
