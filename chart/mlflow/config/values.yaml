image:
  repository: ${mlflow.registry}/${mlflow.repository}
  tag: ${mlflow.tag}@${mlflow.digest}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  privileged: false
  runAsUser: 65532
  runAsGroup: 65532
