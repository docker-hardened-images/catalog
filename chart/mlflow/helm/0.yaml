# syntax=dhi.io/build:2-helm3

name: MLFlow Helm chart 0.x
image: dhi.io/mlflow-chart
variant: helm
tags:
  - 0.1.0
platforms:
  - linux/amd64
vars:
  APP_VERSION: 3.14.0
  CHART_HELM_NAME: mlflow-chart
  COMMIT_SHA: 86cd7f5a1dc25a1387ad07c87811bbc30f62951c
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_VERSION: 4.1.4-2
  MLFLOW_REFERENCE: dhi/mlflow:3.14.0-debian13@sha256:f284b1cd5f55590887f483aed61195320771969fd838727a8d108e1f5118b9dc
  SEMVER_MAJOR_MINOR_VERSION: "0.1"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.1.0
  VERSION: 0.1.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  builds:
    - name: mlflow-chart
      work-dir: ${source.dir}/helm-charts/charts
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - helm=4.1.4-2
        files:
          - url: git+https://github.com/mlflow/mlflow.git#v3.14.0
            checksum: 86cd7f5a1dc25a1387ad07c87811bbc30f62951c
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart:
              appRef: mlflow
              dependencies: null
              description: Docker Hardened Images Helm chart for MLFlow
              images:
                - name: mlflow
                  ref: dhi/mlflow:3.14.0-debian13@sha256:f284b1cd5f55590887f483aed61195320771969fd838727a8d108e1f5118b9dc
              name: mlflow-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/mlflow/mlflow/tree/master/charts
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/mlflow/config
