# syntax=dhi.io/build:2-helm3

name: Vault Helm chart 0.x
image: dhi.io/vault-chart
variant: helm
tags:
  - 0.32.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 3e032ad7685f80fc2a021e282a52b6d2fbd37a07
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.0-debian13-dev@sha256:d5dbc06cccf0edbcd1a8f0639a4251484de94052397a5f528b0d019f90a2e1db
  SEMVER_MAJOR_MINOR_VERSION: "0.32"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.32.0
  VAULT_CSI_PROVIDER_REFERENCE: dhi/vault-csi-provider:1.7.0-debian13@sha256:1623376832efff7cd9cd70875838a441af89d9e0a4a8643bf03723eb82c80605
  VAULT_HELM_REFERENCE: dhi/vault:1.21.4-debian13-helm@sha256:9d44f295a7ac642b6eda27608b5373462ad803feb22fe822c83a8874f14dc3c5
  VAULT_K8S_REFERENCE: dhi/vault-k8s:1.7.3-debian13@sha256:1f35fc1d0ddbef409af8df81c51704f3833d14e40846a4e44fb4815938403035
  VAULT_REFERENCE: dhi/vault:1.21.4-debian13@sha256:f462abbcc6e9f790107a4ac9c74040356b656623dbb2d05ca0d93e5db9f0fe4c
  VERSION: 0.32.0
contents:
  builds:
    - name: vault
      uses: dhi.io/helm:3.20.0-debian13-dev@sha256:d5dbc06cccf0edbcd1a8f0639a4251484de94052397a5f528b0d019f90a2e1db
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/hashicorp/vault-helm.git#v0.32.0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart:
              appRef: vault
              description: Docker Hardened Images Helm chart for Vault
              images:
                - name: vault
                  ref: dhi/vault:1.21.4-debian13@sha256:f462abbcc6e9f790107a4ac9c74040356b656623dbb2d05ca0d93e5db9f0fe4c
                - name: vault-helm
                  ref: dhi/vault:1.21.4-debian13-helm@sha256:9d44f295a7ac642b6eda27608b5373462ad803feb22fe822c83a8874f14dc3c5
                - name: vault-k8s
                  ref: dhi/vault-k8s:1.7.3-debian13@sha256:1f35fc1d0ddbef409af8df81c51704f3833d14e40846a4e44fb4815938403035
                - name: vault-csi-provider
                  ref: dhi/vault-csi-provider:1.7.0-debian13@sha256:1623376832efff7cd9cd70875838a441af89d9e0a4a8643bf03723eb82c80605
              name: vault-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/hashicorp/vault-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          with:
            chart: ${source.dir}/helm-charts
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/vault/config
