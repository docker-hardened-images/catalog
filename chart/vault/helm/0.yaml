            checksum: 3e032ad7685f80fc2a021e282a52b6d2fbd37a07
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart:
              appRef: vault
              description: Docker Hardened Images Helm chart for Vault
              images:
                - name: vault
                  ref: dhi/vault:1.21.4-debian13@sha256:aed62e262a65d290846f00afaae220d85b4b701125fe408f1322167f9db38557
                - name: vault-helm
                  ref: dhi/vault:1.21.4-debian13-helm@sha256:78f22e26dba722617c8274f250ea435c50a3a8dba6f7c585141c712154e19778
