# syntax=dhi.io/build:2-helm3

name: Vault Helm chart 0.x
image: dhi.io/vault-chart
variant: helm
tags:
  - 0.32.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 3e032ad7685f80fc2a021e282a52b6d2fbd37a07
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.0-debian13-dev@sha256:6261312ab3d62801e9998b99b320c623846f10685a4cc085ef39aed161a2a42e
  SEMVER_MAJOR_MINOR_VERSION: "0.32"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.32.0
  VAULT_CSI_PROVIDER_REFERENCE: dhi/vault-csi-provider:1.7.0-debian13@sha256:625288ab826c26c9150edb41e3b9cc71363ee35e1a3bad4e6ad51f30b94509c2
  VAULT_HELM_REFERENCE: dhi/vault:1.21.4-debian13-helm@sha256:c2b873b20e27b5c453f3ced2d2e0e7e57735d8b86ac9a01606547139827f8628
  VAULT_K8S_REFERENCE: dhi/vault-k8s:1.7.3-debian13@sha256:6bcb60ad7c4e981ebc7114e92534cd6d1fc0a6d38a47e2c56840292f5f87345a
  VAULT_REFERENCE: dhi/vault:1.21.4-debian13@sha256:0a1ec00c0976f1ee6658e12e76955a477fe041858a8b83507a2f8289e71d26f7
  VERSION: 0.32.0
contents:
  builds:
    - name: vault
      uses: dhi.io/helm:3.20.0-debian13-dev@sha256:6261312ab3d62801e9998b99b320c623846f10685a4cc085ef39aed161a2a42e
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/hashicorp/vault-helm.git#v0.32.0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart:
              appRef: vault
              description: Docker Hardened Images Helm chart for Vault
              images:
                - name: vault
                  ref: dhi/vault:1.21.4-debian13@sha256:0a1ec00c0976f1ee6658e12e76955a477fe041858a8b83507a2f8289e71d26f7
                - name: vault-helm
                  ref: dhi/vault:1.21.4-debian13-helm@sha256:c2b873b20e27b5c453f3ced2d2e0e7e57735d8b86ac9a01606547139827f8628
                - name: vault-k8s
                  ref: dhi/vault-k8s:1.7.3-debian13@sha256:6bcb60ad7c4e981ebc7114e92534cd6d1fc0a6d38a47e2c56840292f5f87345a
                - name: vault-csi-provider
                  ref: dhi/vault-csi-provider:1.7.0-debian13@sha256:625288ab826c26c9150edb41e3b9cc71363ee35e1a3bad4e6ad51f30b94509c2
              name: vault-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/hashicorp/vault-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          with:
            chart: ${source.dir}/helm-charts
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/vault/config
