  VAULT_HELM_REFERENCE: dhi/vault:1.21.4-debian13-helm@sha256:64c73d3196f74d85b6d187704361d18d7f4af6f88e11ea5cac2c79fffb12492d
  VAULT_K8S_REFERENCE: dhi/vault-k8s:1.7.4-debian13@sha256:2eecd11127c1f276ebbc726e0c9f050754f1302662d62085183f6b8a717e5199
