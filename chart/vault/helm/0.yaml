# syntax=dhi.io/build:2-helm3

name: Vault Helm chart 0.x
image: dhi.io/vault-chart
variant: helm
tags:
  - 0.32.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 3e032ad7685f80fc2a021e282a52b6d2fbd37a07
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:a2c1b2e1c9d947d8feabde6c5ae3d2f9b1f0883a4d6cd01d49ccb0e509465920
  SEMVER_MAJOR_MINOR_VERSION: "0.32"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.32.0
  VAULT_CSI_PROVIDER_REFERENCE: dhi/vault-csi-provider:1.7.0-debian13@sha256:cb8dfeeefb152ccb8655a166959cc866d693290a25d4b797aed67684eadef533
  VAULT_HELM_REFERENCE: dhi/vault:1.21.4-debian13-helm@sha256:13c9483e2a297343fdf562fc890ae969b7b4fdd56b6af8e8ca48d728d1909cf4
  VAULT_K8S_REFERENCE: dhi/vault-k8s:1.7.3-debian13@sha256:4b4258e88d2755f16d85bddcae810253d3388c0f054c806d370299089a11244a
  VAULT_REFERENCE: dhi/vault:1.21.4-debian13@sha256:c927564cdc5ea33c59c48f6798eb0765cad86c421adb7aac5e76b62906020167
  VERSION: 0.32.0
contents:
  builds:
    - name: vault
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:a2c1b2e1c9d947d8feabde6c5ae3d2f9b1f0883a4d6cd01d49ccb0e509465920
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/hashicorp/vault-helm.git#v0.32.0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart:
              appRef: vault
              description: Docker Hardened Images Helm chart for Vault
              images:
                - name: vault
                  ref: dhi/vault:1.21.4-debian13@sha256:c927564cdc5ea33c59c48f6798eb0765cad86c421adb7aac5e76b62906020167
                - name: vault-helm
                  ref: dhi/vault:1.21.4-debian13-helm@sha256:13c9483e2a297343fdf562fc890ae969b7b4fdd56b6af8e8ca48d728d1909cf4
                - name: vault-k8s
                  ref: dhi/vault-k8s:1.7.3-debian13@sha256:4b4258e88d2755f16d85bddcae810253d3388c0f054c806d370299089a11244a
                - name: vault-csi-provider
                  ref: dhi/vault-csi-provider:1.7.0-debian13@sha256:cb8dfeeefb152ccb8655a166959cc866d693290a25d4b797aed67684eadef533
              name: vault-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/hashicorp/vault-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          with:
            chart: ${source.dir}/helm-charts
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/vault/config
