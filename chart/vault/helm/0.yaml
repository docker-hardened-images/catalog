  VERSION: 0.32.0
contents:
  builds:
    - name: vault
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:b72e12042810e0697eebb51a7862e7699f4df8eca02324029c220ccfd0bce4a4
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/hashicorp/vault-helm.git#v0.32.0
            checksum: 3e032ad7685f80fc2a021e282a52b6d2fbd37a07
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart:
              appRef: vault
              description: Docker Hardened Images Helm chart for Vault
              images:
                - name: vault
                  ref: dhi/vault:1.21.4-debian13@sha256:2416d348eebbd3264216f21ce24aab8975dccb737c929009cd703145da864208
                - name: vault-helm
                  ref: dhi/vault:1.21.4-debian13-helm@sha256:64c73d3196f74d85b6d187704361d18d7f4af6f88e11ea5cac2c79fffb12492d
                - name: vault-k8s
                  ref: dhi/vault-k8s:1.7.4-debian13@sha256:2eecd11127c1f276ebbc726e0c9f050754f1302662d62085183f6b8a717e5199
                - name: vault-csi-provider
                  ref: dhi/vault-csi-provider:1.7.1-debian13@sha256:7a6ceea26ebf00155a941db124a16bca9c3a7bb606a7a586d5accf0cdf672fc5
              name: vault-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/hashicorp/vault-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          with:
            chart: ${source.dir}/helm-charts
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
