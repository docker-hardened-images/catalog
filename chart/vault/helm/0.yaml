            checksum: 3e032ad7685f80fc2a021e282a52b6d2fbd37a07
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart:
              appRef: vault
              description: Docker Hardened Images Helm chart for Vault
              images:
                - name: vault
                  ref: dhi/vault:1.21.4-debian13@sha256:76681c3b07dcd1cc7b49c151b842b55ae57d2ea209fd653631005c14dc5c7a81
                - name: vault-helm
                  ref: dhi/vault:1.21.4-debian13-helm@sha256:d06c18f734dacbb695fee1c7d9d0be7d66ea2497b0a5b036ad1fc47252a6e834
