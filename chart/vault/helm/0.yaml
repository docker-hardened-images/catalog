name: Vault Helm chart 0.x
image: dhi.io/vault-chart
variant: helm
tags:
  - 0.32.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 3e032ad7685f80fc2a021e282a52b6d2fbd37a07
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:81e04bdcbc4f86f57589672220b5fcd235d616d28038aec4511068678778db66
  SEMVER_MAJOR_MINOR_VERSION: "0.32"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.32.0
  VAULT_CSI_PROVIDER_REFERENCE: dhi/vault-csi-provider:1.7.1-debian13@sha256:9f611756b3fec6b667ad60f6320a580030acbdb9a147bef615a4be8009402fa8
  VAULT_HELM_REFERENCE: dhi/vault:1.21.4-debian13-helm@sha256:45c52de53041741e2db8f8e600c5ef4bbcf48e10b9e165b9e9c05ad688c1f8da
  VAULT_K8S_REFERENCE: dhi/vault-k8s:1.7.3-debian13@sha256:cc647a28c980d54e7896e5cfd003a4c25e1d088e640f460b3128cba7b45ec13c
  VAULT_REFERENCE: dhi/vault:1.21.4-debian13@sha256:14cc83bd03671a64c472b82f7bb0b3d03fd7fd568b88fff812c4282ca094231f
  VERSION: 0.32.0
contents:
  builds:
    - name: vault
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:81e04bdcbc4f86f57589672220b5fcd235d616d28038aec4511068678778db66
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/hashicorp/vault-helm.git#v0.32.0
            checksum: 3e032ad7685f80fc2a021e282a52b6d2fbd37a07
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart:
              appRef: vault
              description: Docker Hardened Images Helm chart for Vault
              images:
                - name: vault
                  ref: dhi/vault:1.21.4-debian13@sha256:14cc83bd03671a64c472b82f7bb0b3d03fd7fd568b88fff812c4282ca094231f
                - name: vault-helm
                  ref: dhi/vault:1.21.4-debian13-helm@sha256:45c52de53041741e2db8f8e600c5ef4bbcf48e10b9e165b9e9c05ad688c1f8da
                - name: vault-k8s
                  ref: dhi/vault-k8s:1.7.3-debian13@sha256:cc647a28c980d54e7896e5cfd003a4c25e1d088e640f460b3128cba7b45ec13c
                - name: vault-csi-provider
                  ref: dhi/vault-csi-provider:1.7.1-debian13@sha256:9f611756b3fec6b667ad60f6320a580030acbdb9a147bef615a4be8009402fa8
              name: vault-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/hashicorp/vault-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          with:
            chart: ${source.dir}/helm-charts
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/vault/config
