# syntax=dhi.io/build:2-helm3

name: Vault Helm chart 0.x
image: dhi.io/vault-chart
variant: helm
tags:
  - 0.32.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 3e032ad7685f80fc2a021e282a52b6d2fbd37a07
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:caa7223ddf8951e9bb159f921683e515361321ccf67c103981ffea2ae14a64eb
  SEMVER_MAJOR_MINOR_VERSION: "0.32"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.32.0
  VAULT_CSI_PROVIDER_REFERENCE: dhi/vault-csi-provider:1.7.0-debian13@sha256:2909f4902720301622932b388983d30720c6ab67bb497c005e646caa95f00e09
  VAULT_HELM_REFERENCE: dhi/vault:1.21.4-debian13-helm@sha256:1e39dbe60bf325a9bd1383cc56f0d76b68bbb4c9c144b4283390cd732677772f
  VAULT_K8S_REFERENCE: dhi/vault-k8s:1.7.3-debian13@sha256:f7e03c6ae106eff264001e03c9a80e7d3701921ce244dfcd4d6ca4b8234111fd
  VAULT_REFERENCE: dhi/vault:1.21.4-debian13@sha256:b31bfb795910eb7b6cd1e8b77525aedc25c015c7cb62272f962286a9508cb163
  VERSION: 0.32.0
contents:
  builds:
    - name: vault
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:caa7223ddf8951e9bb159f921683e515361321ccf67c103981ffea2ae14a64eb
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/hashicorp/vault-helm.git#v0.32.0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart:
              appRef: vault
              description: Docker Hardened Images Helm chart for Vault
              images:
                - name: vault
                  ref: dhi/vault:1.21.4-debian13@sha256:b31bfb795910eb7b6cd1e8b77525aedc25c015c7cb62272f962286a9508cb163
                - name: vault-helm
                  ref: dhi/vault:1.21.4-debian13-helm@sha256:1e39dbe60bf325a9bd1383cc56f0d76b68bbb4c9c144b4283390cd732677772f
                - name: vault-k8s
                  ref: dhi/vault-k8s:1.7.3-debian13@sha256:f7e03c6ae106eff264001e03c9a80e7d3701921ce244dfcd4d6ca4b8234111fd
                - name: vault-csi-provider
                  ref: dhi/vault-csi-provider:1.7.0-debian13@sha256:2909f4902720301622932b388983d30720c6ab67bb497c005e646caa95f00e09
              name: vault-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/hashicorp/vault-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          with:
            chart: ${source.dir}/helm-charts
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/vault/config
