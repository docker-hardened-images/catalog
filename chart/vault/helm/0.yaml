  VAULT_HELM_REFERENCE: dhi/vault:1.21.4-debian13-helm@sha256:043c9602b767d65f2a7afbc9f0193c04a1bc73fc297167ce97f219e960e0a8a2
  VAULT_K8S_REFERENCE: dhi/vault-k8s:1.7.4-debian13@sha256:775fb58ab0ef700b35cddb2cd97be80327f9763db80ca130866fc92f61e180f9
