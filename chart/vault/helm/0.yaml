# syntax=dhi.io/build:2-helm3

name: Vault Helm chart 0.x
image: dhi.io/vault-chart
variant: helm
tags:
  - 0.32.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 3e032ad7685f80fc2a021e282a52b6d2fbd37a07
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:20c25fd3dfe3acda51121e86555d2090b3c6720ff8cad90030326774a4b01272
  SEMVER_MAJOR_MINOR_VERSION: "0.32"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.32.0
  VAULT_CSI_PROVIDER_REFERENCE: dhi/vault-csi-provider:1.7.0-debian13@sha256:292f182847d019ae8f5ef61aeecf734930148ddaeb71a6aba4b65963ac0d9063
  VAULT_HELM_REFERENCE: dhi/vault:1.21.4-debian13-helm@sha256:1f8561e2c30386648d88ebb6173b2c9e04c4eedfbbc891d0276c6fea18eb7587
  VAULT_K8S_REFERENCE: dhi/vault-k8s:1.7.3-debian13@sha256:45262a7737d75eef684315a2e0004ca6f0e7bd98c484ae68c2d785ca7a6cd236
  VAULT_REFERENCE: dhi/vault:1.21.4-debian13@sha256:8869600f6f4bdc806a7d8f49ced4a681bb3b56823203a10979bd1a7deb4cd916
  VERSION: 0.32.0
contents:
  builds:
    - name: vault
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:20c25fd3dfe3acda51121e86555d2090b3c6720ff8cad90030326774a4b01272
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/hashicorp/vault-helm.git#v0.32.0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart:
              appRef: vault
              description: Docker Hardened Images Helm chart for Vault
              images:
                - name: vault
                  ref: dhi/vault:1.21.4-debian13@sha256:8869600f6f4bdc806a7d8f49ced4a681bb3b56823203a10979bd1a7deb4cd916
                - name: vault-helm
                  ref: dhi/vault:1.21.4-debian13-helm@sha256:1f8561e2c30386648d88ebb6173b2c9e04c4eedfbbc891d0276c6fea18eb7587
                - name: vault-k8s
                  ref: dhi/vault-k8s:1.7.3-debian13@sha256:45262a7737d75eef684315a2e0004ca6f0e7bd98c484ae68c2d785ca7a6cd236
                - name: vault-csi-provider
                  ref: dhi/vault-csi-provider:1.7.0-debian13@sha256:292f182847d019ae8f5ef61aeecf734930148ddaeb71a6aba4b65963ac0d9063
              name: vault-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/hashicorp/vault-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          with:
            chart: ${source.dir}/helm-charts
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/vault/config
