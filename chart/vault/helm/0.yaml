# syntax=dhi.io/build:2-helm3

name: Vault Helm chart 0.x
image: dhi.io/vault-chart
variant: helm
tags:
  - 0.32.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 3e032ad7685f80fc2a021e282a52b6d2fbd37a07
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.0-debian13-dev@sha256:a47c7c4dc9515ff085e34c4862a6195c758607dee70883d757eeae8c27fc18da
  SEMVER_MAJOR_MINOR_VERSION: "0.32"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.32.0
  VAULT_CSI_PROVIDER_REFERENCE: dhi/vault-csi-provider:1.7.0-debian13@sha256:637fc223cb07408ab6bb898f10184c6cb5e977e8393a87c0fdc0445f539017e3
  VAULT_HELM_REFERENCE: dhi/vault:1.21.4-debian13-helm@sha256:527918bf4543b9a7c6fb88457f41894bc97fcba341ecdc117389ca91896c347d
  VAULT_K8S_REFERENCE: dhi/vault-k8s:1.7.3-debian13@sha256:8bbb3932a23a8fa559eab0f5cc4c360b55fb87f97ee25b5ed69abcba8f5f9f6d
  VAULT_REFERENCE: dhi/vault:1.21.4-debian13@sha256:bb19c832b7e2ade7efce5625daacb3ca0b99198649f1ba0121b9d5788f8dc936
  VERSION: 0.32.0
contents:
  builds:
    - name: vault
      uses: dhi.io/helm:3.20.0-debian13-dev@sha256:a47c7c4dc9515ff085e34c4862a6195c758607dee70883d757eeae8c27fc18da
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/hashicorp/vault-helm.git#v0.32.0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart:
              appRef: vault
              description: Docker Hardened Images Helm chart for Vault
              images:
                - name: vault
                  ref: dhi/vault:1.21.4-debian13@sha256:bb19c832b7e2ade7efce5625daacb3ca0b99198649f1ba0121b9d5788f8dc936
                - name: vault-helm
                  ref: dhi/vault:1.21.4-debian13-helm@sha256:527918bf4543b9a7c6fb88457f41894bc97fcba341ecdc117389ca91896c347d
                - name: vault-k8s
                  ref: dhi/vault-k8s:1.7.3-debian13@sha256:8bbb3932a23a8fa559eab0f5cc4c360b55fb87f97ee25b5ed69abcba8f5f9f6d
                - name: vault-csi-provider
                  ref: dhi/vault-csi-provider:1.7.0-debian13@sha256:637fc223cb07408ab6bb898f10184c6cb5e977e8393a87c0fdc0445f539017e3
              name: vault-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/hashicorp/vault-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          with:
            chart: ${source.dir}/helm-charts
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/vault/config
