  VERSION: 0.32.0
contents:
  builds:
    - name: vault
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:382206314efea5932384da4cbb019ef72b83d65f2cc8fb2ba0acc7e8a31e5cf8
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/hashicorp/vault-helm.git#v0.32.0
            checksum: 3e032ad7685f80fc2a021e282a52b6d2fbd37a07
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart:
              appRef: vault
              description: Docker Hardened Images Helm chart for Vault
              images:
                - name: vault
                  ref: dhi/vault:1.21.4-debian13@sha256:d68470db5f107c213ddf5f3a6c80fff8f9364a7f5098548f65bef7eaf585aba8
                - name: vault-helm
                  ref: dhi/vault:1.21.4-debian13-helm@sha256:043c9602b767d65f2a7afbc9f0193c04a1bc73fc297167ce97f219e960e0a8a2
                - name: vault-k8s
                  ref: dhi/vault-k8s:1.7.4-debian13@sha256:775fb58ab0ef700b35cddb2cd97be80327f9763db80ca130866fc92f61e180f9
                - name: vault-csi-provider
                  ref: dhi/vault-csi-provider:1.7.1-debian13@sha256:1708698e1e4b92f4ec90b380df579156257b288ad0e1b99a7aa412f7a94627ab
              name: vault-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/hashicorp/vault-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          with:
            chart: ${source.dir}/helm-charts
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/vault/config
