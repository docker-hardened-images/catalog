# syntax=dhi.io/build:2-helm3

name: Cert-Manager Helm chart 1.20.x
image: dhi.io/cert-manager-chart
variant: helm
tags:
  - 1.20.2
platforms:
  - linux/amd64
vars:
  CERT_MANAGER_ACMESOLVER_REFERENCE: dhi/cert-manager-acmesolver:1.20.2-debian13@sha256:48d2ebfe097a5bc5edb72090ff9522686030e6216479600c5fa3f07c466cac1b
  CERT_MANAGER_CAINJECTOR_REFERENCE: dhi/cert-manager-cainjector:1.20.2-debian13@sha256:744fd0c84e13f77371db03220fe045047bc15f6446de48b263e73b36e0a44d2c
  CERT_MANAGER_COMMIT_SHA: e5b7b18450dd2c4b993b95bcd680b1a057205b00
  CERT_MANAGER_CONTROLLER_REFERENCE: dhi/cert-manager-controller:1.20.2-debian13@sha256:f1d9607b57c837cdf1dffffb6324e92ce47aa1bd3fa08bf4450647e5c1d836c7
  CERT_MANAGER_MAJOR_MINOR_VERSION: "1.20"
  CERT_MANAGER_STARTUPAPICHECK_REFERENCE: dhi/cert-manager-startupapicheck:1.20.2-debian13@sha256:ea3cd7310789ae1bc8c0e6e50f320e1504470fb016ece3a888b2e34fdaf4cac1
  CERT_MANAGER_VERSION: 1.20.2
  CERT_MANAGER_WEBHOOK_REFERENCE: dhi/cert-manager-webhook:1.20.2-debian13@sha256:309fe2c732b0f9b3dea73a9de992f455a60f0e201237fcfb3b6dc6ca7fa45ae0
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.1-debian13-dev@sha256:4a31f16f7a169beeda158b2db462a85c6767889a961726b04907bf4d0a6754f4
contents:
  builds:
    - name: cert-manager
      uses: dhi.io/helm:3.21.1-debian13-dev@sha256:4a31f16f7a169beeda158b2db462a85c6767889a961726b04907bf4d0a6754f4
      contents:
        packages:
          - make
          - curl
          - git
        files:
          - url: git+https://github.com/cert-manager/cert-manager.git#v1.20.2
            checksum: e5b7b18450dd2c4b993b95bcd680b1a057205b00
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: Make Chart from template
          work-dir: ${source.dir}/helm-charts/
          privileged: true
          runs: |
            set -eux -o pipefail

            make _bin/helm/cert-manager/Chart.yaml
            cp _bin/helm/cert-manager/Chart.yaml deploy/charts/cert-manager/Chart.yaml
            rm deploy/charts/cert-manager/Chart.template.yaml
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            chart:
              appRef: cert-manager-controller
              description: Docker Hardened Images Helm chart for Cert-Manager
              images:
                - name: cert-manager-controller
                  ref: dhi/cert-manager-controller:1.20.2-debian13@sha256:f1d9607b57c837cdf1dffffb6324e92ce47aa1bd3fa08bf4450647e5c1d836c7
                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.20.2-debian13@sha256:744fd0c84e13f77371db03220fe045047bc15f6446de48b263e73b36e0a44d2c
                - name: cert-manager-acmesolver
                  ref: dhi/cert-manager-acmesolver:1.20.2-debian13@sha256:48d2ebfe097a5bc5edb72090ff9522686030e6216479600c5fa3f07c466cac1b
                - name: cert-manager-startupapicheck
                  ref: dhi/cert-manager-startupapicheck:1.20.2-debian13@sha256:ea3cd7310789ae1bc8c0e6e50f320e1504470fb016ece3a888b2e34fdaf4cac1
                - name: cert-manager-webhook
                  ref: dhi/cert-manager-webhook:1.20.2-debian13@sha256:309fe2c732b0f9b3dea73a9de992f455a60f0e201237fcfb3b6dc6ca7fa45ae0
              name: cert-manager-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/cert-manager/cert-manager
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/
          with:
            chart: cert-manager
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts
          with:
            chart: cert-manager
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/cert-manager/config
