                  ref: dhi/cert-manager-controller:1.20.2-debian13@sha256:a8df55ea3bdc1068f63d63dc069c52f19421251c4c8a1ec97a60238d1461348f
                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.20.2-debian13@sha256:d400c6bd7efc6c32893ec8fbbea304666833d047221a33b843dc8688fb37da4a
                - name: cert-manager-acmesolver
