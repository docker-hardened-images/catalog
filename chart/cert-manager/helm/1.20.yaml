  CERT_MANAGER_CAINJECTOR_REFERENCE: dhi/cert-manager-cainjector:1.20.2-debian13@sha256:8dec6e8a1b10f9d4e15e9d8c381f02cb1a6ba7f9f706fb40841d7da8bb1808f3
