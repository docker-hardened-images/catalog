                - name: cert-manager-startupapicheck
                  ref: dhi/cert-manager-startupapicheck:1.20.2-debian13@sha256:c4863ea1f8632623cf7926d58a3905288c6e082a38350d873870defde70849b1
                - name: cert-manager-webhook
                  ref: dhi/cert-manager-webhook:1.20.2-debian13@sha256:54aff07c182288fe22599aa92549ba0be3107b38ee7d659383b23ee04cc33978
              name: cert-manager-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/cert-manager/cert-manager
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/
          with:
            chart: cert-manager
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts
          with:
            chart: cert-manager
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
