                  ref: dhi/cert-manager-controller:1.20.2-debian13@sha256:713e83dda30f14abf8b74d57ae35f7247c3929bf8a4d2639b6731b14ec048e86
                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.20.2-debian13@sha256:0b6c72b8c9c7cb1b1f8e481cfaf54c079c884f4a65b03a34111041611af0e2b6
                - name: cert-manager-acmesolver
