# syntax=dhi.io/build:2-helm3

name: Cert-Manager Helm chart 1.20.x
image: dhi.io/cert-manager-chart
variant: helm
tags:
  - 1.20.3
platforms:
  - linux/amd64
vars:
  CERT_MANAGER_ACMESOLVER_REFERENCE: dhi/cert-manager-acmesolver:1.20.3-debian13@sha256:a965c856fbc7114064542cef16bdd9394feeaa2eaf9de98923d0ce07ac6f8c91
  CERT_MANAGER_CAINJECTOR_REFERENCE: dhi/cert-manager-cainjector:1.20.2-debian13@sha256:843bad320458486c7738b19887dd9db2d9e084998930fd71d6d79d2ff90341bb
  CERT_MANAGER_COMMIT_SHA: 1e1d16d1744e6d9c80e464e58e8d9ab1caed222b
  CERT_MANAGER_CONTROLLER_REFERENCE: dhi/cert-manager-controller:1.20.3-debian13@sha256:7de49a83b8c950769f5412e7c396efc92505fd5c15f6006864fd21d1d445ac30
  CERT_MANAGER_MAJOR_MINOR_VERSION: "1.20"
  CERT_MANAGER_STARTUPAPICHECK_REFERENCE: dhi/cert-manager-startupapicheck:1.20.3-debian13@sha256:766fe88c60373012a005a2395c991d9603e46634526affe8a7d7a6cb83088235
  CERT_MANAGER_VERSION: 1.20.3
  CERT_MANAGER_WEBHOOK_REFERENCE: dhi/cert-manager-webhook:1.20.3-debian13@sha256:896f1cadad75cdb5c8a2310a98c2e5a15903e887243a0b654e44dabffc95db9b
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.2-debian13-dev@sha256:e30b522f3f39307b7710b304f082f76d7b8fc0d0140bfc44bdf2892c5411519f
contents:
  builds:
    - name: cert-manager
      uses: dhi.io/helm:3.21.2-debian13-dev@sha256:e30b522f3f39307b7710b304f082f76d7b8fc0d0140bfc44bdf2892c5411519f
      contents:
        packages:
          - make
          - curl
          - git
        files:
          - url: git+https://github.com/cert-manager/cert-manager.git#v1.20.3
            checksum: 1e1d16d1744e6d9c80e464e58e8d9ab1caed222b
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: Make Chart from template
          work-dir: ${source.dir}/helm-charts/
          privileged: true
          runs: |
            set -eux -o pipefail

            make _bin/helm/cert-manager/Chart.yaml
            cp _bin/helm/cert-manager/Chart.yaml deploy/charts/cert-manager/Chart.yaml
            rm deploy/charts/cert-manager/Chart.template.yaml
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            chart:
              appRef: cert-manager-controller
              description: Docker Hardened Images Helm chart for Cert-Manager
              images:
                - name: cert-manager-controller
                  ref: dhi/cert-manager-controller:1.20.3-debian13@sha256:7de49a83b8c950769f5412e7c396efc92505fd5c15f6006864fd21d1d445ac30
                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.20.2-debian13@sha256:843bad320458486c7738b19887dd9db2d9e084998930fd71d6d79d2ff90341bb
                - name: cert-manager-acmesolver
                  ref: dhi/cert-manager-acmesolver:1.20.3-debian13@sha256:a965c856fbc7114064542cef16bdd9394feeaa2eaf9de98923d0ce07ac6f8c91
                - name: cert-manager-startupapicheck
                  ref: dhi/cert-manager-startupapicheck:1.20.3-debian13@sha256:766fe88c60373012a005a2395c991d9603e46634526affe8a7d7a6cb83088235
                - name: cert-manager-webhook
                  ref: dhi/cert-manager-webhook:1.20.3-debian13@sha256:896f1cadad75cdb5c8a2310a98c2e5a15903e887243a0b654e44dabffc95db9b
              name: cert-manager-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/cert-manager/cert-manager
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/
          with:
            chart: cert-manager
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts
          with:
            chart: cert-manager
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/cert-manager/config
