contents:
  builds:
    - name: cert-manager
      uses: dhi.io/helm:3.21.1-debian13-dev@sha256:b7ba22256dc8a6a8d11135cef60b1df944f59de9f9cb1a4db07b73c917f01247
      contents:
        packages:
          - make
