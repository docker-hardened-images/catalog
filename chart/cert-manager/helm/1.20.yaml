                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.20.2-debian13@sha256:9b56540b73b3c106dff8f12685b68a9c36182228ab532ae2758a177898d01801
                - name: cert-manager-acmesolver
