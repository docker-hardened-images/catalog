                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.20.2-debian13@sha256:f1e1c536e392d4e384deedc5530d0ec0b50c97271e44fddb3355fb1e0472c371
                - name: cert-manager-acmesolver
