                  ref: dhi/cert-manager-controller:1.20.2-debian13@sha256:15a81281a52a97830c68dc78ece1d1c2bbbbd98a06483bc8cd3db89a87d2b718
                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.20.2-debian13@sha256:89bb44f9f01e065cb240748c74a0332cd07842359475d3dbdd7457d15cb8b3de
                - name: cert-manager-acmesolver
                  ref: dhi/cert-manager-acmesolver:1.20.2-debian13@sha256:2bf3966b7085237e0f86bf9bdbeda889b2a6232c765c65d5bea2997747b252b5
                - name: cert-manager-startupapicheck
