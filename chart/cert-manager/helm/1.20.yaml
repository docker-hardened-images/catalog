  CERT_MANAGER_CAINJECTOR_REFERENCE: dhi/cert-manager-cainjector:1.20.2-debian13@sha256:4c4d94e31cc2479c7bed6589f7d6cf6b1953f4e755e692c9cf07bff7b5992faf
