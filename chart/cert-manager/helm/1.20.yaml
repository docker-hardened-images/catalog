                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.20.2-debian13@sha256:a3308dbfbea7bf78dd577ac2d79b12eaf51747a8476e9c154e9b84a2f4b4725e
                - name: cert-manager-acmesolver
