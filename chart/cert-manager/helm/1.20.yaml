  CERT_MANAGER_MAJOR_MINOR_VERSION: "1.20"
  CERT_MANAGER_STARTUPAPICHECK_REFERENCE: dhi/cert-manager-startupapicheck:1.20.2-debian13@sha256:70c400a59b1b5e25e7bb5edf1206f0d9afa5b47d5568273b4e2f08b5e36e53b0
