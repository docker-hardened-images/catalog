                  ref: dhi/cert-manager-controller:1.19.4-debian13@sha256:d7ee23cacb799309403f3a70e34e62140d3a395b95a0efe5627dcf45b5ff1e67
                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.19.4-debian13@sha256:5cf61fe925af43a1df3edd621d7cab385203d41cb3dd21c69b1f535184cfe47c
                - name: cert-manager-acmesolver
                  ref: dhi/cert-manager-acmesolver:1.19.5-debian13@sha256:7f427bd68280ee70e405c2fe2286feaa1bc0226c4b44084175bd2123670fd0f4
                - name: cert-manager-startupapicheck
                  ref: dhi/cert-manager-startupapicheck:1.19.4-debian13@sha256:5dff9a4bb9405879b04f4908395abefe272da8c5c66db6ba7020b4b4f9b6e5bf
                - name: cert-manager-webhook
                  ref: dhi/cert-manager-webhook:1.19.4-debian13@sha256:f5b28a854656a3b8c6691653291d55e8b04c05f38687cd91ee14648bedc4545d
              name: cert-manager-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/cert-manager/cert-manager
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/
          with:
            chart: cert-manager
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts
          with:
            chart: cert-manager
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
