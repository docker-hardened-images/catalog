                  ref: dhi/cert-manager-controller:1.19.5-debian13@sha256:d3476b85211935eda31a4576bce7eb5bc7dfce7eaad57820481ea8f09865d3c2
                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.19.5-debian13@sha256:c4a821632dd866d142229c8eb423b276c56385588e77787c1af9f1bb36c96140
                - name: cert-manager-acmesolver
                  ref: dhi/cert-manager-acmesolver:1.19.5-debian13@sha256:b92a11f8b6f9c0752b46e622b7e8749b5d3eb720a4218646ce9beace8d7862f6
                - name: cert-manager-startupapicheck
                  ref: dhi/cert-manager-startupapicheck:1.19.5-debian13@sha256:a47aec1d1ebabb999d36b0d0555b40d5e3d94a8ef1ef5c90728461f73fff4c49
                - name: cert-manager-webhook
                  ref: dhi/cert-manager-webhook:1.19.5-debian13@sha256:054c736a8c35114ac90c24463c15bf40dce21c922f66772417887555173f9942
              name: cert-manager-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/cert-manager/cert-manager
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/
          with:
            chart: cert-manager
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts
          with:
            chart: cert-manager
      paths:
        - type: directory
          path: ${source.dir}/config
