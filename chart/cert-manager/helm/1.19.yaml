# syntax=dhi.io/build:2-helm3

name: Cert-Manager Helm chart 1.19.x
image: dhi.io/cert-manager-chart
variant: helm
tags:
  - 1.19.5
platforms:
  - linux/amd64
vars:
  CERT_MANAGER_ACMESOLVER_REFERENCE: dhi/cert-manager-acmesolver:1.19.5-debian13@sha256:e343ace43c1d088567b3713938b46892a32c37dabf35552bb994e435ed1449b6
  CERT_MANAGER_CAINJECTOR_REFERENCE: dhi/cert-manager-cainjector:1.19.5-debian13@sha256:250d67968f8e5f15e473e3794ee2b8009ffa0cfc0fd40a588154c16670cb141e
  CERT_MANAGER_COMMIT_SHA: cda7b7896e70dafb2de66212028cf9997a5e9490
  CERT_MANAGER_CONTROLLER_REFERENCE: dhi/cert-manager-controller:1.19.5-debian13@sha256:5eefeb5500cb656b407ab5f1a1c284c53c26b2b30d1773f07b08da6e1b2eede7
  CERT_MANAGER_MAJOR_MINOR_VERSION: "1.19"
  CERT_MANAGER_STARTUPAPICHECK_REFERENCE: dhi/cert-manager-startupapicheck:1.19.5-debian13@sha256:6ab9406833a338bb1c87939220dc5df0127598671ab61a41454e100b5c1be5ee
  CERT_MANAGER_VERSION: 1.19.5
  CERT_MANAGER_WEBHOOK_REFERENCE: dhi/cert-manager-webhook:1.19.5-debian13@sha256:dcafd776b73ca8fd76dbb1d54adaa7866f695409c5322f8c9864960978561cf3
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:0ee5c30c2d65033300ceb74755e2bd6bc49120d9116a1e8c2880500483315e9b
contents:
  builds:
    - name: cert-manager
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:0ee5c30c2d65033300ceb74755e2bd6bc49120d9116a1e8c2880500483315e9b
      contents:
        packages:
          - make
          - curl
          - git
        files:
          - url: git+https://github.com/cert-manager/cert-manager.git#v1.19.5
            checksum: cda7b7896e70dafb2de66212028cf9997a5e9490
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: Make Chart from template
          work-dir: ${source.dir}/helm-charts/
          privileged: true
          runs: |
            set -eux -o pipefail

            make _bin/helm/cert-manager/Chart.yaml
            cp _bin/helm/cert-manager/Chart.yaml deploy/charts/cert-manager/Chart.yaml
            rm deploy/charts/cert-manager/Chart.template.yaml
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            chart:
              appRef: cert-manager-controller
              description: Docker Hardened Images Helm chart for Cert-Manager
              images:
                - name: cert-manager-controller
                  ref: dhi/cert-manager-controller:1.19.5-debian13@sha256:5eefeb5500cb656b407ab5f1a1c284c53c26b2b30d1773f07b08da6e1b2eede7
                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.19.5-debian13@sha256:250d67968f8e5f15e473e3794ee2b8009ffa0cfc0fd40a588154c16670cb141e
                - name: cert-manager-acmesolver
                  ref: dhi/cert-manager-acmesolver:1.19.5-debian13@sha256:e343ace43c1d088567b3713938b46892a32c37dabf35552bb994e435ed1449b6
                - name: cert-manager-startupapicheck
                  ref: dhi/cert-manager-startupapicheck:1.19.5-debian13@sha256:6ab9406833a338bb1c87939220dc5df0127598671ab61a41454e100b5c1be5ee
                - name: cert-manager-webhook
                  ref: dhi/cert-manager-webhook:1.19.5-debian13@sha256:dcafd776b73ca8fd76dbb1d54adaa7866f695409c5322f8c9864960978561cf3
              name: cert-manager-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/cert-manager/cert-manager
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/
          with:
            chart: cert-manager
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts
          with:
            chart: cert-manager
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/cert-manager/config
