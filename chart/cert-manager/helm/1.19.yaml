  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:f9dd4a356298b0769dc4c2f718b9f564b631ddf37c19e061d61af9081bc7da13
contents:
  builds:
    - name: cert-manager
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:f9dd4a356298b0769dc4c2f718b9f564b631ddf37c19e061d61af9081bc7da13
      contents:
        packages:
          - make
          - curl
          - git
        files:
          - url: git+https://github.com/cert-manager/cert-manager.git#v1.19.5
            checksum: cda7b7896e70dafb2de66212028cf9997a5e9490
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: Make Chart from template
          work-dir: ${source.dir}/helm-charts/
          privileged: true
          runs: |
            set -eux -o pipefail

            make _bin/helm/cert-manager/Chart.yaml
            cp _bin/helm/cert-manager/Chart.yaml deploy/charts/cert-manager/Chart.yaml
            rm deploy/charts/cert-manager/Chart.template.yaml
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            chart:
              appRef: cert-manager-controller
              description: Docker Hardened Images Helm chart for Cert-Manager
              images:
                - name: cert-manager-controller
                  ref: dhi/cert-manager-controller:1.19.5-debian13@sha256:204169d71e810367ef8a941f9bfcbd462a20cdf49096536b6373762deb60bde6
                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.19.5-debian13@sha256:f922ba94d640e7e584fff567e16ac6b4e2104027fb170e363a2db5e77eadb12c
                - name: cert-manager-acmesolver
                  ref: dhi/cert-manager-acmesolver:1.19.5-debian13@sha256:4468c9cf58dff36e98b4ea2f495c8664234a4bee25e023cf0f86e7f99303608d
                - name: cert-manager-startupapicheck
                  ref: dhi/cert-manager-startupapicheck:1.19.5-debian13@sha256:48f4dbd28ba2e832ee0c1bb82005372f17968b66a066aa436ef123cf6c1395ed
                - name: cert-manager-webhook
                  ref: dhi/cert-manager-webhook:1.19.5-debian13@sha256:74f8f26d49b10dca0b2086cb8ad15255ab4945ca2c5cea2bae78ed618e942091
              name: cert-manager-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/cert-manager/cert-manager
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/
          with:
            chart: cert-manager
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts
          with:
            chart: cert-manager
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/cert-manager/config
