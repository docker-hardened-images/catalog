  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.2-debian13-dev@sha256:e30b522f3f39307b7710b304f082f76d7b8fc0d0140bfc44bdf2892c5411519f
contents:
  builds:
    - name: cert-manager
      uses: dhi.io/helm:3.21.2-debian13-dev@sha256:e30b522f3f39307b7710b304f082f76d7b8fc0d0140bfc44bdf2892c5411519f
      contents:
        packages:
          - make
          - curl
          - git
        files:
          - url: git+https://github.com/cert-manager/cert-manager.git#v1.19.6
            checksum: 60b0447cc9a64885d42567ea590862b88a62d1ad
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: Make Chart from template
          work-dir: ${source.dir}/helm-charts/
          privileged: true
          runs: |
            set -eux -o pipefail

            make _bin/helm/cert-manager/Chart.yaml
            cp _bin/helm/cert-manager/Chart.yaml deploy/charts/cert-manager/Chart.yaml
            rm deploy/charts/cert-manager/Chart.template.yaml
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            chart:
              appRef: cert-manager-controller
              description: Docker Hardened Images Helm chart for Cert-Manager
              images:
                - name: cert-manager-controller
                  ref: dhi/cert-manager-controller:1.19.6-debian13@sha256:e6094a24ca071ae40616289b963bdba4047c80ebcff8ae0f38ab844336c712c0
                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.19.6-debian13@sha256:9f0f033b2cfa065b14174ca0150cf06190e58724f4f4aacb780954da68dc40bb
                - name: cert-manager-acmesolver
                  ref: dhi/cert-manager-acmesolver:1.19.6-debian13@sha256:5017ddc589b864bc37499da43122b0fe081c3474c174a877686b147b38f5e6a2
                - name: cert-manager-startupapicheck
                  ref: dhi/cert-manager-startupapicheck:1.19.6-debian13@sha256:2fa7d5ee0472ece77537eb859a2a9c14af9cf064d2374ccc4c98337ab804934b
                - name: cert-manager-webhook
                  ref: dhi/cert-manager-webhook:1.19.6-debian13@sha256:a1bc45a0f73ded6320b8397e0756b3744a4cc39db4833364f38671aa0986f19b
              name: cert-manager-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/cert-manager/cert-manager
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/
          with:
            chart: cert-manager
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts
          with:
            chart: cert-manager
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/cert-manager/config
