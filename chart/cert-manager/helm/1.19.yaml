  CERT_MANAGER_VERSION: 1.19.6
  CERT_MANAGER_WEBHOOK_REFERENCE: dhi/cert-manager-webhook:1.19.6-debian13@sha256:a1bc45a0f73ded6320b8397e0756b3744a4cc39db4833364f38671aa0986f19b
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
