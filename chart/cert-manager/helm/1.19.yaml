name: Cert-Manager Helm chart 1.19.x
image: dhi.io/cert-manager-chart
variant: helm
tags:
  - 1.19.5
platforms:
  - linux/amd64
vars:
  CERT_MANAGER_ACMESOLVER_REFERENCE: dhi/cert-manager-acmesolver:1.19.5-debian13@sha256:e2705e5417723e6209f405a233c7ce8c5553cd546afdb2184e4490269af350fa
  CERT_MANAGER_CAINJECTOR_REFERENCE: dhi/cert-manager-cainjector:1.19.5-debian13@sha256:c005be50a16bde829729a20ee7f7f408d2eeb365477dc241ed65597c694c9e01
  CERT_MANAGER_COMMIT_SHA: cda7b7896e70dafb2de66212028cf9997a5e9490
  CERT_MANAGER_CONTROLLER_REFERENCE: dhi/cert-manager-controller:1.19.5-debian13@sha256:70b81b06082b251ac151db872a77e4ffbd6dd03beb8e27680450337523efb643
  CERT_MANAGER_MAJOR_MINOR_VERSION: "1.19"
  CERT_MANAGER_STARTUPAPICHECK_REFERENCE: dhi/cert-manager-startupapicheck:1.19.5-debian13@sha256:0cfcfba9449aa721a37ad50d699b111a95a52f1e61eb6e75eb63f2a86382fbab
  CERT_MANAGER_VERSION: 1.19.5
  CERT_MANAGER_WEBHOOK_REFERENCE: dhi/cert-manager-webhook:1.19.5-debian13@sha256:72a74eeaf6fb980ab2fb8a9af631e1cbab340a165ed45a3db78a02e400e2aac7
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:b72e12042810e0697eebb51a7862e7699f4df8eca02324029c220ccfd0bce4a4
contents:
  builds:
    - name: cert-manager
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:b72e12042810e0697eebb51a7862e7699f4df8eca02324029c220ccfd0bce4a4
      contents:
        packages:
          - make
          - curl
          - git
        files:
          - url: git+https://github.com/cert-manager/cert-manager.git#v1.19.5
            checksum: cda7b7896e70dafb2de66212028cf9997a5e9490
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: Make Chart from template
          work-dir: ${source.dir}/helm-charts/
          privileged: true
          runs: |
            set -eux -o pipefail

            make _bin/helm/cert-manager/Chart.yaml
            cp _bin/helm/cert-manager/Chart.yaml deploy/charts/cert-manager/Chart.yaml
            rm deploy/charts/cert-manager/Chart.template.yaml
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            chart:
              appRef: cert-manager-controller
              description: Docker Hardened Images Helm chart for Cert-Manager
              images:
                - name: cert-manager-controller
                  ref: dhi/cert-manager-controller:1.19.5-debian13@sha256:70b81b06082b251ac151db872a77e4ffbd6dd03beb8e27680450337523efb643
                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.19.5-debian13@sha256:c005be50a16bde829729a20ee7f7f408d2eeb365477dc241ed65597c694c9e01
                - name: cert-manager-acmesolver
                  ref: dhi/cert-manager-acmesolver:1.19.5-debian13@sha256:e2705e5417723e6209f405a233c7ce8c5553cd546afdb2184e4490269af350fa
                - name: cert-manager-startupapicheck
                  ref: dhi/cert-manager-startupapicheck:1.19.5-debian13@sha256:0cfcfba9449aa721a37ad50d699b111a95a52f1e61eb6e75eb63f2a86382fbab
                - name: cert-manager-webhook
                  ref: dhi/cert-manager-webhook:1.19.5-debian13@sha256:72a74eeaf6fb980ab2fb8a9af631e1cbab340a165ed45a3db78a02e400e2aac7
              name: cert-manager-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/cert-manager/cert-manager
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/
          with:
            chart: cert-manager
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts
          with:
            chart: cert-manager
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/cert-manager/config
