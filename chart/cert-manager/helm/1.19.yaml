                  ref: dhi/cert-manager-controller:1.19.5-debian13@sha256:bf2ca1df872149c4376e6608622ccaa255d1cce6cdbba729f94e936705ac2ae2
                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.19.5-debian13@sha256:7fe2357ad30425506199809475b28556684209c060ba3a36730c3ce93f966f81
                - name: cert-manager-acmesolver
                  ref: dhi/cert-manager-acmesolver:1.19.5-debian13@sha256:7ca6d011df3b4051b813f8a1b43a9f92da9628bf0f6f605edc8865f206346639
                - name: cert-manager-startupapicheck
