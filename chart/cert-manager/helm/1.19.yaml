                - name: cert-manager-startupapicheck
                  ref: dhi/cert-manager-startupapicheck:1.19.5-debian13@sha256:cdfaabb64568940f2603c4fa610cad1b451ee65b1671a6620ab4ec7243a1a45a
                - name: cert-manager-webhook
