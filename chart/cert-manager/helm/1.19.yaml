                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.19.5-debian13@sha256:07d672e7b0b51dfdd497504624a7d6cfc33df96f3bdd124226a6d97625068ae1
                - name: cert-manager-acmesolver
