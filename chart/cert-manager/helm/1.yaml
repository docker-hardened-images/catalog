  SEMVER_MAJOR_MINOR_VERSION: ${VERSION:^v?([0-9]+\.[0-9]+).*$}
  SEMVER_MAJOR_VERSION: ${VERSION:^v?([0-9]+).*$}
  SEMVER_VERSION: ${VERSION:^v?([0-9]+\.[0-9]+\.[0-9]+).*$}
contents:
  builds:
    - name: cert-manager
      uses: dhi.io/helm:3.20.0-debian13-dev@sha256:6261312ab3d62801e9998b99b320c623846f10685a4cc085ef39aed161a2a42e
      contents:
        packages:
          - make
          - curl
          - git
        files:
          - url: git+https://github.com/cert-manager/cert-manager.git#v1.19.4
            checksum: 83820a03ce3e6b8a1084fa765d77a6b5b98e6943
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: Make Chart from template
          work-dir: ${source.dir}/helm-charts/
          privileged: true
          runs: |
            set -eux -o pipefail

            make _bin/helm/cert-manager/Chart.yaml
            cp _bin/helm/cert-manager/Chart.yaml deploy/charts/cert-manager/Chart.yaml
            rm deploy/charts/cert-manager/Chart.template.yaml
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            chart:
              appRef: cert-manager-controller
              description: Docker Hardened Images Helm chart for Cert-Manager
              images:
                - name: cert-manager-controller
                  ref: dhi/cert-manager-controller:1.19.4-debian13@sha256:e17d71d42afd65687880d15d60193aaedb932b7694787ca869abea01151c5c33
                - name: cert-manager-cainjector
                  ref: dhi/cert-manager-cainjector:1.19.4-debian13@sha256:effc76a8f0fbc7c98a5c0404d263a3ee2009c8d5a0c1a9c1c2aca0868970d44a
                - name: cert-manager-acmesolver
                  ref: dhi/cert-manager-acmesolver:1.19.4-debian13@sha256:072bcd0d39ea8990de7cf177b0bac8ab5291b474a54e989236f065336a105447
                - name: cert-manager-startupapicheck
                  ref: dhi/cert-manager-startupapicheck:1.19.4-debian13@sha256:5ab82f977d50fc05012038eaee911e3e2cbf9a950d886c013bb0ff52bd003f1d
                - name: cert-manager-webhook
                  ref: dhi/cert-manager-webhook:1.19.4-debian13@sha256:43e0a97a233eaf6e693c2287fdc374314552bc37d6c22b5afea2c468d6ab2119
              name: cert-manager-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/cert-manager/cert-manager
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/cert-manager
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts/
          with:
            chart: cert-manager
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/deploy/charts
          with:
            chart: cert-manager
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/cert-manager/config
