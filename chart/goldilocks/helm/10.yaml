# syntax=dhi.io/build:2-helm3

name: Goldilocks Helm chart 10.x
image: dhi.io/goldilocks-chart
variant: helm
tags:
  - 10.3.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 711b1723b2d1fa0ef9c63793c8f62d1d407bc469
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  FAIRWINDS_VPA_CHART_REFERENCE: dhi/fairwinds-vpa-chart:4.11.0@sha256:f60ce16c0518d862cf683418de6ac0019dd275e2e5f7a9e135a1368926e43b14
  GOLDILOCKS_REFERENCE: dhi/goldilocks:4.15.1-debian13@sha256:0fbf1d54c75400905b5c7ea0574fcc5fedc95bbac96d96a93b772766d58af869
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:ed0c764ca91c1084c850f3b00e7248f9127153bb3a5803058a337ac99ba6d479
  METRICS_SERVER_CHART_REFERENCE: dhi/metrics-server-chart:3.13.0@sha256:d9f2ecf8a5c4808f64247e3107e7a9ab89dbdbbebec27c77a1026d1e792cf791
  SEMVER_MAJOR_MINOR_VERSION: "10.3"
  SEMVER_MAJOR_VERSION: "10"
  SEMVER_VERSION: 10.3.0
  VERSION: 10.3.0
contents:
  builds:
    - name: goldilocks-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:ed0c764ca91c1084c850f3b00e7248f9127153bb3a5803058a337ac99ba6d479
      contents:
        files:
          - url: git+https://github.com/FairwindsOps/charts.git#711b1723b2d1fa0ef9c63793c8f62d1d407bc469
            checksum: 711b1723b2d1fa0ef9c63793c8f62d1d407bc469
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/stable/goldilocks
          with:
            chart:
              appRef: goldilocks
              dependencies:
                - alias: metrics-server
                  condition: metrics-server.enabled
                  name: metrics-server
                  ref: dhi/metrics-server-chart:3.13.0@sha256:d9f2ecf8a5c4808f64247e3107e7a9ab89dbdbbebec27c77a1026d1e792cf791
                - alias: vpa
                  condition: vpa.enabled
                  name: vpa
                  ref: dhi/fairwinds-vpa-chart:4.11.0@sha256:f60ce16c0518d862cf683418de6ac0019dd275e2e5f7a9e135a1368926e43b14
              description: Docker Hardened Images Helm chart for Goldilocks
              images:
                - name: goldilocks
                  ref: dhi/goldilocks:4.15.1-debian13@sha256:0fbf1d54c75400905b5c7ea0574fcc5fedc95bbac96d96a93b772766d58af869
              name: goldilocks-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/FairwindsOps/charts
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/stable/goldilocks
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/stable
          privileged: true
          with:
            chart: goldilocks
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/stable
          with:
            chart: goldilocks
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/stable
          with:
            chart: goldilocks
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/goldilocks/config
