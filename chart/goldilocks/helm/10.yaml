  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  FAIRWINDS_VPA_REFERENCE: dhi/fairwinds-vpa-chart:4.10.2@sha256:cdfdeec7173047e77c2d07a5e786effd180da1e4d7b55141b35e46b2152f5cd6
  GOLDILOCKS_REFERENCE: dhi/goldilocks:4.14.18-debian13@sha256:065f8aec1fa7facd72264c181e7de14285b307fe822c787cfa2be0cf48c0b272
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:a2c1b2e1c9d947d8feabde6c5ae3d2f9b1f0883a4d6cd01d49ccb0e509465920
  METRICS_SERVER_REFERENCE: dhi/metrics-server-chart:3.13.0@sha256:66b6877029289cf0cde459d790e57d150c059c0d55dcc5984afef26f1af599fd
  SEMVER_MAJOR_MINOR_VERSION: "10.3"
  SEMVER_MAJOR_VERSION: "10"
  SEMVER_VERSION: 10.3.0
  VERSION: 10.3.0
contents:
  builds:
    - name: goldilocks-chart
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:a2c1b2e1c9d947d8feabde6c5ae3d2f9b1f0883a4d6cd01d49ccb0e509465920
      contents:
        files:
          - url: git+https://github.com/FairwindsOps/charts.git#711b1723b2d1fa0ef9c63793c8f62d1d407bc469
            checksum: 711b1723b2d1fa0ef9c63793c8f62d1d407bc469
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/stable/goldilocks
          with:
            chart:
              appRef: goldilocks
              dependencies:
                - alias: metrics-server
                  condition: metrics-server.enabled
                  name: metrics-server
                  ref: dhi/metrics-server-chart:3.13.0@sha256:66b6877029289cf0cde459d790e57d150c059c0d55dcc5984afef26f1af599fd
                - alias: vpa
                  condition: vpa.enabled
                  name: vpa
                  ref: dhi/fairwinds-vpa-chart:4.10.2@sha256:cdfdeec7173047e77c2d07a5e786effd180da1e4d7b55141b35e46b2152f5cd6
              description: Docker Hardened Images Helm chart for Goldilocks
              images:
                - name: goldilocks
                  ref: dhi/goldilocks:4.14.18-debian13@sha256:065f8aec1fa7facd72264c181e7de14285b307fe822c787cfa2be0cf48c0b272
              name: goldilocks-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/FairwindsOps/charts
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/stable/goldilocks
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/stable
          privileged: true
          with:
            chart: goldilocks
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/stable
          with:
            chart: goldilocks
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/stable
          with:
            chart: goldilocks
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/goldilocks/config
