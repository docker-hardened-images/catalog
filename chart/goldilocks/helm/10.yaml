# syntax=dhi.io/build:2-helm3

name: Goldilocks Helm chart 10.x
image: dhi.io/goldilocks-chart
variant: helm
tags:
  - 10.4.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: a20eff7ed5e98de4220b78aedded825447b7cd25
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  FAIRWINDS_VPA_CHART_REFERENCE: dhi/fairwinds-vpa-chart:4.12.2@sha256:576a5985af026531b360992b2d494e70f2240bd73ec1a998d685bd2a3c3623f1
  GOLDILOCKS_REFERENCE: dhi/goldilocks:4.15.1-debian13@sha256:22388f874c7ccd87fb953532264cf0419819ff42c647a43fe72135ba0464c1ea
  HELM_REFERENCE: dhi/helm:3.21.1-debian13-dev@sha256:4a31f16f7a169beeda158b2db462a85c6767889a961726b04907bf4d0a6754f4
  METRICS_SERVER_CHART_REFERENCE: dhi/metrics-server-chart:3.13.1@sha256:5362d590b36abdb939cee1b2ff3e40ab3cdbc46180cac5799514032a9b92067f
  SEMVER_MAJOR_MINOR_VERSION: "10.4"
  SEMVER_MAJOR_VERSION: "10"
  SEMVER_VERSION: 10.4.0
  VERSION: 10.4.0
contents:
  builds:
    - name: goldilocks-chart
      uses: dhi.io/helm:3.21.1-debian13-dev@sha256:4a31f16f7a169beeda158b2db462a85c6767889a961726b04907bf4d0a6754f4
      contents:
        files:
          - url: git+https://github.com/FairwindsOps/charts.git#a20eff7ed5e98de4220b78aedded825447b7cd25
            checksum: a20eff7ed5e98de4220b78aedded825447b7cd25
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/stable/goldilocks
          with:
            chart:
              appRef: goldilocks
              dependencies:
                - alias: metrics-server
                  condition: metrics-server.enabled
                  name: metrics-server
                  ref: dhi/metrics-server-chart:3.13.1@sha256:5362d590b36abdb939cee1b2ff3e40ab3cdbc46180cac5799514032a9b92067f
                - alias: vpa
                  condition: vpa.enabled
                  name: vpa
                  ref: dhi/fairwinds-vpa-chart:4.12.2@sha256:576a5985af026531b360992b2d494e70f2240bd73ec1a998d685bd2a3c3623f1
              description: Docker Hardened Images Helm chart for Goldilocks
              images:
                - name: goldilocks
                  ref: dhi/goldilocks:4.15.1-debian13@sha256:22388f874c7ccd87fb953532264cf0419819ff42c647a43fe72135ba0464c1ea
              name: goldilocks-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/FairwindsOps/charts
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/stable/goldilocks
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/stable
          privileged: true
          with:
            chart: goldilocks
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/stable
          with:
            chart: goldilocks
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/stable
          with:
            chart: goldilocks
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/goldilocks/config
