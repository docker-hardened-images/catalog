# syntax=dhi.io/build:2-helm3

name: Goldilocks Helm chart 10.x
image: dhi.io/goldilocks-chart
variant: helm
tags:
  - 10.4.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: a20eff7ed5e98de4220b78aedded825447b7cd25
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  FAIRWINDS_VPA_CHART_REFERENCE: dhi/fairwinds-vpa-chart:4.12.2@sha256:59db1e4cecde46c2352968ba50035a05d6029fd1ba7bb817fbd797415f299765
  GOLDILOCKS_REFERENCE: dhi/goldilocks:4.15.1-debian13@sha256:22388f874c7ccd87fb953532264cf0419819ff42c647a43fe72135ba0464c1ea
  HELM_REFERENCE: dhi/helm:3.21.1-debian13-dev@sha256:e5cfccc69a0530425518e5a85bf37ebdff9284f7d0e1542cf69ea311dce747ca
  METRICS_SERVER_CHART_REFERENCE: dhi/metrics-server-chart:3.13.1@sha256:58c9c15504b45e4586e0509ed4da85627d687cdc474f2513f4768e4aaf61229c
  SEMVER_MAJOR_MINOR_VERSION: "10.4"
  SEMVER_MAJOR_VERSION: "10"
  SEMVER_VERSION: 10.4.0
  VERSION: 10.4.0
contents:
  builds:
    - name: goldilocks-chart
      uses: dhi.io/helm:3.21.1-debian13-dev@sha256:e5cfccc69a0530425518e5a85bf37ebdff9284f7d0e1542cf69ea311dce747ca
      contents:
        files:
          - url: git+https://github.com/FairwindsOps/charts.git#a20eff7ed5e98de4220b78aedded825447b7cd25
            checksum: a20eff7ed5e98de4220b78aedded825447b7cd25
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/stable/goldilocks
          with:
            chart:
              appRef: goldilocks
              dependencies:
                - alias: metrics-server
                  condition: metrics-server.enabled
                  name: metrics-server
                  ref: dhi/metrics-server-chart:3.13.1@sha256:58c9c15504b45e4586e0509ed4da85627d687cdc474f2513f4768e4aaf61229c
                - alias: vpa
                  condition: vpa.enabled
                  name: vpa
                  ref: dhi/fairwinds-vpa-chart:4.12.2@sha256:59db1e4cecde46c2352968ba50035a05d6029fd1ba7bb817fbd797415f299765
              description: Docker Hardened Images Helm chart for Goldilocks
              images:
                - name: goldilocks
                  ref: dhi/goldilocks:4.15.1-debian13@sha256:22388f874c7ccd87fb953532264cf0419819ff42c647a43fe72135ba0464c1ea
              name: goldilocks-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/FairwindsOps/charts
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/stable/goldilocks
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/stable
          privileged: true
          with:
            chart: goldilocks
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/stable
          with:
            chart: goldilocks
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/stable
          with:
            chart: goldilocks
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/goldilocks/config
