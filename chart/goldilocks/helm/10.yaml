# syntax=dhi.io/build:2-helm3

name: Goldilocks Helm chart 10.x
image: dhi.io/goldilocks-chart
variant: helm
tags:
  - 10.3.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 711b1723b2d1fa0ef9c63793c8f62d1d407bc469
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  FAIRWINDS_VPA_REFERENCE: dhi/fairwinds-vpa-chart:4.11.0@sha256:46a864505d2835fda6131d06a6ad06b521e30d4cd52cfb07d85ae50d14a828eb
  GOLDILOCKS_REFERENCE: dhi/goldilocks:4.15.0-debian13@sha256:8c7f79b15bd7bc913aa35c64c8d7cb4c9479f133bd816f5cd99b6cd851ddb42b
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:dde1e16cc0ad3d2cdeebdb78f1e676b899e6f62a12c529dd620d045bd2fd334a
  METRICS_SERVER_REFERENCE: dhi/metrics-server-chart:3.13.0@sha256:9eb53d39d0e6a204a43eddc71a4041aeb3849db64980beb27233a3ec75c2fe43
  SEMVER_MAJOR_MINOR_VERSION: "10.3"
  SEMVER_MAJOR_VERSION: "10"
  SEMVER_VERSION: 10.3.0
  VERSION: 10.3.0
contents:
  builds:
    - name: goldilocks-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:dde1e16cc0ad3d2cdeebdb78f1e676b899e6f62a12c529dd620d045bd2fd334a
      contents:
        files:
          - url: git+https://github.com/FairwindsOps/charts.git#711b1723b2d1fa0ef9c63793c8f62d1d407bc469
            checksum: 711b1723b2d1fa0ef9c63793c8f62d1d407bc469
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/stable/goldilocks
          with:
            chart:
              appRef: goldilocks
              dependencies:
                - alias: metrics-server
                  condition: metrics-server.enabled
                  name: metrics-server
                  ref: dhi/metrics-server-chart:3.13.0@sha256:9eb53d39d0e6a204a43eddc71a4041aeb3849db64980beb27233a3ec75c2fe43
                - alias: vpa
                  condition: vpa.enabled
                  name: vpa
                  ref: dhi/fairwinds-vpa-chart:4.11.0@sha256:46a864505d2835fda6131d06a6ad06b521e30d4cd52cfb07d85ae50d14a828eb
              description: Docker Hardened Images Helm chart for Goldilocks
              images:
                - name: goldilocks
                  ref: dhi/goldilocks:4.15.0-debian13@sha256:8c7f79b15bd7bc913aa35c64c8d7cb4c9479f133bd816f5cd99b6cd851ddb42b
              name: goldilocks-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/FairwindsOps/charts
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/stable/goldilocks
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/stable
          privileged: true
          with:
            chart: goldilocks
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/stable
          with:
            chart: goldilocks
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/stable
          with:
            chart: goldilocks
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/goldilocks/config
