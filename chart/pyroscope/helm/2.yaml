  CHART_HELM_NAME: pyroscope-chart
  COMMIT_SHA: 8f5e03fbcde0a09a027acfe2a3e3a5be35edb407
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_VERSION: 4.1.4-2
  PYROSCOPE_REFERENCE: dhi/pyroscope:2.2.0-debian13@sha256:65ddbf9711973faeeb6745265adcb4e281e4d5a36185107a54cf446ac8e27e68
  SEMVER_MAJOR_MINOR_VERSION: "2.2"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.2.0
  VERSION: 2.2.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  builds:
    - name: pyroscope
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - helm=4.1.4-2
        files:
          - url: git+https://github.com/grafana/pyroscope.git#d969f943947df3a22525418ac3f9f1ae86b5c13f
            checksum: d969f943947df3a22525418ac3f9f1ae86b5c13f
            path: ${source.dir}
            uid: 0
            gid: 0
      pipeline:
        - name: prepare
          uses: helm/rudder@v1
          work-dir: ${source.dir}/operations/pyroscope/helm/pyroscope
          with:
            chart:
              appRef: pyroscope
              description: Docker Hardened Images Helm chart for Grafana Pyroscope
              images:
                - name: pyroscope
                  ref: dhi/pyroscope:2.2.0-debian13@sha256:65ddbf9711973faeeb6745265adcb4e281e4d5a36185107a54cf446ac8e27e68
              name: pyroscope-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/grafana/pyroscope
            cmd: prepare
            registry: dhi.io
