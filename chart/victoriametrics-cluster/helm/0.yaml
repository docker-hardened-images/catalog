  VERSION: 0.43.0
  VMAUTH_REFERENCE: dhi/victoriametrics-vmauth:1.144.0-debian13@sha256:2067e623b91b2ba102aa402ac7707ba5e96f87126b5808449814e7d8533b8ff7
  VMINSERT_REFERENCE: dhi/victoriametrics-vminsert:1.144.0-debian13@sha256:c885280e16ff2e04f46c46296b4fa4098148efdbfafee4d0f5b1b091a738b2af
  VMSELECT_REFERENCE: dhi/victoriametrics-vmselect:1.144.0-debian13@sha256:ec350ec153fbd229973e017fb89e5dfc67024dd15b5ad44f3fa10d218e122b8e
  VMSTORAGE_REFERENCE: dhi/victoriametrics-vmstorage:1.144.0-debian13@sha256:7ccd4552cdb8d8b1236caa05fa5be1021082fd7b7515833905802e10c18c185f
contents:
  builds:
    - name: victoriametrics-cluster-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:dedafe204585b6ae9934e8936b95d767cdddef288bf56081b1071ed90173bbeb
      contents:
        files:
          - url: git+https://github.com/VictoriaMetrics/helm-charts.git#victoria-metrics-cluster-0.43.0
            checksum: f72311aefe5185100a8df418419b2539a300437e
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            chart:
              appRef: victoriametrics-vmselect
              description: Docker Hardened Images Helm chart for VictoriaMetrics Cluster
              images:
                - name: victoriametrics-vmselect
                  ref: dhi/victoriametrics-vmselect:1.144.0-debian13@sha256:ec350ec153fbd229973e017fb89e5dfc67024dd15b5ad44f3fa10d218e122b8e
                - name: victoriametrics-vmstorage
                  ref: dhi/victoriametrics-vmstorage:1.144.0-debian13@sha256:7ccd4552cdb8d8b1236caa05fa5be1021082fd7b7515833905802e10c18c185f
                - name: victoriametrics-vminsert
                  ref: dhi/victoriametrics-vminsert:1.144.0-debian13@sha256:c885280e16ff2e04f46c46296b4fa4098148efdbfafee4d0f5b1b091a738b2af
                - name: victoriametrics-vmauth
                  ref: dhi/victoriametrics-vmauth:1.144.0-debian13@sha256:2067e623b91b2ba102aa402ac7707ba5e96f87126b5808449814e7d8533b8ff7
              name: victoriametrics-cluster-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/VictoriaMetrics/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update chart values
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update sidecar values
          uses: yq/patch@v1
          with:
            file: ${source.dir}/helm-charts/charts/victoria-metrics-cluster/values-sidecar.yaml
            patches:
              - .extraContainers[0].image = "dhi/victoriametrics-vmauth:1.144.0-debian13@sha256:2067e623b91b2ba102aa402ac7707ba5e96f87126b5808449814e7d8533b8ff7"
              - .extraContainers[0].securityContext.enabled = true
              - .extraContainers[0].securityContext.runAsNonRoot = true
              - .extraContainers[0].securityContext.runAsUser = 65532
              - .extraContainers[0].securityContext.runAsGroup = 65532
        - name: blank 3rd party images
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          runs: |
            set -eux -o pipefail

            # Blank out the 3rd party images for victoriametrics/vmbackupmanager
            sed -i '/- name: vmbackupmanager/{n;s/^\([[:space:]]*image:\).*/\1 "" #THIS IMAGE IS NOT IN THE DHI CATALOG YET, PLEASE CONTACT THE DOCKER TEAM IF NEEDED/;}' ./templates/vmstorage-server.yaml
        - name: update dependencies
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: victoria-metrics-cluster
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/victoriametrics-cluster/config
