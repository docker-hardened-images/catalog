  VMINSERT_REFERENCE: dhi/victoriametrics-vminsert:1.139.0-debian13@sha256:3c2aaee16238795b7ee4109761b3b5ae2531ddf4f157b261dd6f9fc15bb4f059
  VMSELECT_REFERENCE: dhi/victoriametrics-vmselect:1.139.0-debian13@sha256:d176386f93490d5ab0fd239ee5cb8df3f321375c8ca73490f475654910da98b9
  VMSTORAGE_REFERENCE: dhi/victoriametrics-vmstorage:1.139.0-debian13@sha256:c5454bd8971f2563e02dfed593d79760f74a89d03291ddfebba6a1190bdfa867
contents:
  builds:
    - name: victoriametrics-cluster-chart
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:c7510bdef2d5afba3a1c80b20b836748adaab6991684962b98460d7a36dcdfa4
      contents:
        files:
          - url: git+https://github.com/VictoriaMetrics/helm-charts.git#victoria-metrics-cluster-0.38.0
            checksum: 205f2c0a8d19e7cb9e02d76a1efd5df696762d42
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            chart:
              appRef: victoriametrics-vmselect
              description: Docker Hardened Images Helm chart for VictoriaMetrics Cluster
              images:
                - name: victoriametrics-vmselect
                  ref: dhi/victoriametrics-vmselect:1.139.0-debian13@sha256:d176386f93490d5ab0fd239ee5cb8df3f321375c8ca73490f475654910da98b9
                - name: victoriametrics-vmstorage
                  ref: dhi/victoriametrics-vmstorage:1.139.0-debian13@sha256:c5454bd8971f2563e02dfed593d79760f74a89d03291ddfebba6a1190bdfa867
                - name: victoriametrics-vminsert
                  ref: dhi/victoriametrics-vminsert:1.139.0-debian13@sha256:3c2aaee16238795b7ee4109761b3b5ae2531ddf4f157b261dd6f9fc15bb4f059
                - name: victoriametrics-vmauth
                  ref: dhi/victoriametrics-vmauth:1.139.0-debian13@sha256:f04bdff41943062aa9c7423774d71ab8db303afa9840c4eca97ca215ac804153
              name: victoriametrics-cluster-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/VictoriaMetrics/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update chart values
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update sidecar values
          uses: yq/patch@v1
          with:
            file: ${source.dir}/helm-charts/charts/victoria-metrics-cluster/values-sidecar.yaml
            patches:
              - .extraContainers[0].image = "dhi/victoriametrics-vmauth:1.139.0-debian13@sha256:f04bdff41943062aa9c7423774d71ab8db303afa9840c4eca97ca215ac804153"
              - .extraContainers[0].securityContext.enabled = true
              - .extraContainers[0].securityContext.runAsNonRoot = true
              - .extraContainers[0].securityContext.runAsUser = 65532
              - .extraContainers[0].securityContext.runAsGroup = 65532
        - name: blank 3rd party images
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          runs: |
            set -eux -o pipefail

            # Blank out the 3rd party images for victoriametrics/vmbackupmanager
            sed -i '/- name: vmbackupmanager/{n;s/^\([[:space:]]*image:\).*/\1 "" #THIS IMAGE IS NOT IN THE DHI CATALOG YET, PLEASE CONTACT THE DOCKER TEAM IF NEEDED/;}' ./templates/vmstorage-server.yaml
        - name: update dependencies
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: victoria-metrics-cluster
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/victoriametrics-cluster/config
