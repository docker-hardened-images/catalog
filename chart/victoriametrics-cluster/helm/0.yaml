  VMINSERT_REFERENCE: dhi/victoriametrics-vminsert:1.143.0-debian13@sha256:0f778938dd3068decba36204d554de800c42cd059e9fbcb7f6211bd2424056a5
  VMSELECT_REFERENCE: dhi/victoriametrics-vmselect:1.143.0-debian13@sha256:38c47c9ffd60f2c2fb801fd2cb2481122d1fa859a7ec53daf6bbc445ad43fa11
