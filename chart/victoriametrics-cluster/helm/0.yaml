# syntax=dhi.io/build:2-helm3

name: VictoriaMetrics Cluster Helm chart 0.x
image: dhi.io/victoriametrics-cluster-chart
variant: helm
tags:
  - 0.37.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 7f96b67bd703d42feda1566dd14484e62a5a88dc
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:caa7223ddf8951e9bb159f921683e515361321ccf67c103981ffea2ae14a64eb
  SEMVER_MAJOR_MINOR_VERSION: "0.37"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.37.0
  VERSION: 0.37.0
  VMAUTH_REFERENCE: dhi/victoriametrics-vmauth:1.138.0-debian13@sha256:afd202d03194fda6c9d33ecb4d288be2726e33b759a7257ed191a0de91db0429
  VMINSERT_REFERENCE: dhi/victoriametrics-vminsert:1.138.0-debian13@sha256:10452bc9bd237a23beb0fd1321d88b70535c339471fae4db95343783ec8767ff
  VMSELECT_REFERENCE: dhi/victoriametrics-vmselect:1.138.0-debian13@sha256:795d905df4715f9811edebd86549d66a9b14afa53b35df151b1459ab83772e09
  VMSTORAGE_REFERENCE: dhi/victoriametrics-vmstorage:1.138.0-debian13@sha256:9e0e4072b68d4bcce05ecf9ff017912f8558fc98d8876fab99f3896fb1ad87bd
contents:
  builds:
    - name: victoriametrics-cluster-chart
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:caa7223ddf8951e9bb159f921683e515361321ccf67c103981ffea2ae14a64eb
      contents:
        files:
          - url: git+https://github.com/VictoriaMetrics/helm-charts.git#victoria-metrics-cluster-0.37.0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            chart:
              appRef: victoriametrics-vmselect
              description: Docker Hardened Images Helm chart for VictoriaMetrics Cluster
              images:
                - name: victoriametrics-vmselect
                  ref: dhi/victoriametrics-vmselect:1.138.0-debian13@sha256:795d905df4715f9811edebd86549d66a9b14afa53b35df151b1459ab83772e09
                - name: victoriametrics-vmstorage
                  ref: dhi/victoriametrics-vmstorage:1.138.0-debian13@sha256:9e0e4072b68d4bcce05ecf9ff017912f8558fc98d8876fab99f3896fb1ad87bd
                - name: victoriametrics-vminsert
                  ref: dhi/victoriametrics-vminsert:1.138.0-debian13@sha256:10452bc9bd237a23beb0fd1321d88b70535c339471fae4db95343783ec8767ff
                - name: victoriametrics-vmauth
                  ref: dhi/victoriametrics-vmauth:1.138.0-debian13@sha256:afd202d03194fda6c9d33ecb4d288be2726e33b759a7257ed191a0de91db0429
              name: victoriametrics-cluster-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/VictoriaMetrics/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update chart values
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update sidecar values
          uses: yq/patch@v1
          with:
            file: ${source.dir}/helm-charts/charts/victoria-metrics-cluster/values-sidecar.yaml
            patches:
              - .extraContainers[0].image = "dhi/victoriametrics-vmauth:1.138.0-debian13@sha256:afd202d03194fda6c9d33ecb4d288be2726e33b759a7257ed191a0de91db0429"
              - .extraContainers[0].securityContext.enabled = true
              - .extraContainers[0].securityContext.runAsNonRoot = true
              - .extraContainers[0].securityContext.runAsUser = 65532
              - .extraContainers[0].securityContext.runAsGroup = 65532
        - name: blank 3rd party images
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          runs: |
            set -eux -o pipefail

            # Blank out the 3rd party images for victoriametrics/vmbackupmanager
            sed -i '/- name: vmbackupmanager/{n;s/^\([[:space:]]*image:\).*/\1 "" #THIS IMAGE IS NOT IN THE DHI CATALOG YET, PLEASE CONTACT THE DOCKER TEAM IF NEEDED/;}' ./templates/vmstorage-server.yaml
        - name: update dependencies
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: victoria-metrics-cluster
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/victoriametrics-cluster/config
