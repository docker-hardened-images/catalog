  VMINSERT_REFERENCE: dhi/victoriametrics-vminsert:1.142.0-debian13@sha256:6c334c9f2c841a0af4e28b32d052699c7171b3134cc2ca59c6741274c778d965
  VMSELECT_REFERENCE: dhi/victoriametrics-vmselect:1.142.0-debian13@sha256:04dfb3d53e25630d7384e0a917c757c18cc563c99fcb108558ccf92c3b8c0b6e
