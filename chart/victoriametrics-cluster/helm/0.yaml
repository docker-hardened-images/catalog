# syntax=dhi.io/build:2-helm3

name: VictoriaMetrics Cluster Helm chart 0.x
image: dhi.io/victoriametrics-cluster-chart
variant: helm
tags:
  - 0.36.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 38e8f0e29de74029547605678b5bdfd3bb4d02fa
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.0-debian13-dev@sha256:d5dbc06cccf0edbcd1a8f0639a4251484de94052397a5f528b0d019f90a2e1db
  SEMVER_MAJOR_MINOR_VERSION: "0.36"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.36.0
  VERSION: 0.36.0
  VMAUTH_REFERENCE: dhi/victoriametrics-vmauth:1.137.0-debian13@sha256:bb1f7f9aa1c759862463f4bd889c259a49e65b3d383764a111e259adc97c3706
  VMINSERT_REFERENCE: dhi/victoriametrics-vminsert:1.137.0-debian13@sha256:7bc5e2f6afe6279c14d573ec3c86cc3d312ac8da0296a90a762d296a0153a511
  VMSELECT_REFERENCE: dhi/victoriametrics-vmselect:1.137.0-debian13@sha256:76295fd452e14ebee81a4321afdfafe39ab0e86731d00b197a947810e4370b6a
  VMSTORAGE_REFERENCE: dhi/victoriametrics-vmstorage:1.137.0-debian13@sha256:4734f4317062ede5d6672d2116cb7ea4ec72430f726f9b1edbbf98073c6d2180
contents:
  builds:
    - name: victoriametrics-cluster-chart
      uses: dhi.io/helm:3.20.0-debian13-dev@sha256:d5dbc06cccf0edbcd1a8f0639a4251484de94052397a5f528b0d019f90a2e1db
      contents:
        files:
          - url: git+https://github.com/VictoriaMetrics/helm-charts.git#victoria-metrics-cluster-0.36.0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            chart:
              appRef: victoriametrics-vmselect
              description: Docker Hardened Images Helm chart for VictoriaMetrics Cluster
              images:
                - name: victoriametrics-vmselect
                  ref: dhi/victoriametrics-vmselect:1.137.0-debian13@sha256:76295fd452e14ebee81a4321afdfafe39ab0e86731d00b197a947810e4370b6a
                - name: victoriametrics-vmstorage
                  ref: dhi/victoriametrics-vmstorage:1.137.0-debian13@sha256:4734f4317062ede5d6672d2116cb7ea4ec72430f726f9b1edbbf98073c6d2180
                - name: victoriametrics-vminsert
                  ref: dhi/victoriametrics-vminsert:1.137.0-debian13@sha256:7bc5e2f6afe6279c14d573ec3c86cc3d312ac8da0296a90a762d296a0153a511
                - name: victoriametrics-vmauth
                  ref: dhi/victoriametrics-vmauth:1.137.0-debian13@sha256:bb1f7f9aa1c759862463f4bd889c259a49e65b3d383764a111e259adc97c3706
              name: victoriametrics-cluster-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/VictoriaMetrics/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update chart values
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update sidecar values
          uses: yq/patch@v1
          with:
            file: ${source.dir}/helm-charts/charts/victoria-metrics-cluster/values-sidecar.yaml
            patches:
              - .extraContainers[0].image = "dhi/victoriametrics-vmauth:1.137.0-debian13@sha256:bb1f7f9aa1c759862463f4bd889c259a49e65b3d383764a111e259adc97c3706"
              - .extraContainers[0].securityContext.enabled = true
              - .extraContainers[0].securityContext.runAsNonRoot = true
              - .extraContainers[0].securityContext.runAsUser = 65532
              - .extraContainers[0].securityContext.runAsGroup = 65532
        - name: blank 3rd party images
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          runs: |
            set -eux -o pipefail

            # Blank out the 3rd party images for victoriametrics/vmbackupmanager
            sed -i '/- name: vmbackupmanager/{n;s/^\([[:space:]]*image:\).*/\1 "" #THIS IMAGE IS NOT IN THE DHI CATALOG YET, PLEASE CONTACT THE DOCKER TEAM IF NEEDED/;}' ./templates/vmstorage-server.yaml
        - name: update dependencies
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: victoria-metrics-cluster
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/victoriametrics-cluster/config
