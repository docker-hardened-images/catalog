# syntax=dhi.io/build:2-helm3

name: VictoriaMetrics Cluster Helm chart 0.x
image: dhi.io/victoriametrics-cluster-chart
variant: helm
tags:
  - 0.35.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 88a8f627365f71e3885a47677ff9b8baf04db40f
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.0-debian13-dev@sha256:d9fb15368eec534b9256a049385b9f843bca3f64736f14e4b6d593efdccfeaa9
  SEMVER_MAJOR_MINOR_VERSION: "0.35"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.35.0
  VERSION: 0.35.0
  VMAUTH_REFERENCE: dhi/victoriametrics-vmauth:1.137.0-debian13@sha256:7e75084b47bb2b78784ec63b4f2fc88e59228745a3f169c1d5d8ff1f3f99820e
  VMINSERT_REFERENCE: dhi/victoriametrics-vminsert:1.137.0-debian13@sha256:a42e72cad6753b0e5fb144a086d8d48ae9e525bcc153496c1e07ded0268e8855
  VMSELECT_REFERENCE: dhi/victoriametrics-vmselect:1.137.0-debian13@sha256:0f50ee9b563f94f9af5c4e915749b0af5850383aa8194b4dc4fc597aad0d9723
  VMSTORAGE_REFERENCE: dhi/victoriametrics-vmstorage:1.135.0-debian13@sha256:8710617ef6cd3a652bee1869ea777c57dffa64e3ec9ea498fdcfd92304d32e88
contents:
  builds:
    - name: victoriametrics-cluster-chart
      uses: dhi.io/helm:3.20.0-debian13-dev@sha256:d9fb15368eec534b9256a049385b9f843bca3f64736f14e4b6d593efdccfeaa9
      contents:
        files:
          - url: git+https://github.com/VictoriaMetrics/helm-charts.git#victoria-metrics-cluster-0.35.0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            chart:
              appRef: victoriametrics-vmselect
              description: Docker Hardened Images Helm chart for VictoriaMetrics Cluster
              images:
                - name: victoriametrics-vmselect
                  ref: dhi/victoriametrics-vmselect:1.137.0-debian13@sha256:0f50ee9b563f94f9af5c4e915749b0af5850383aa8194b4dc4fc597aad0d9723
                - name: victoriametrics-vmstorage
                  ref: dhi/victoriametrics-vmstorage:1.135.0-debian13@sha256:8710617ef6cd3a652bee1869ea777c57dffa64e3ec9ea498fdcfd92304d32e88
                - name: victoriametrics-vminsert
                  ref: dhi/victoriametrics-vminsert:1.137.0-debian13@sha256:a42e72cad6753b0e5fb144a086d8d48ae9e525bcc153496c1e07ded0268e8855
                - name: victoriametrics-vmauth
                  ref: dhi/victoriametrics-vmauth:1.137.0-debian13@sha256:7e75084b47bb2b78784ec63b4f2fc88e59228745a3f169c1d5d8ff1f3f99820e
              name: victoriametrics-cluster-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/VictoriaMetrics/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update chart values
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update sidecar values
          uses: yq/patch@v1
          with:
            file: ${source.dir}/helm-charts/charts/victoria-metrics-cluster/values-sidecar.yaml
            patches:
              - .extraContainers[0].image = "dhi/victoriametrics-vmauth:1.137.0-debian13@sha256:7e75084b47bb2b78784ec63b4f2fc88e59228745a3f169c1d5d8ff1f3f99820e"
              - .extraContainers[0].securityContext.enabled = true
              - .extraContainers[0].securityContext.runAsNonRoot = true
              - .extraContainers[0].securityContext.runAsUser = 65532
              - .extraContainers[0].securityContext.runAsGroup = 65532
        - name: blank 3rd party images
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          runs: |
            set -eux -o pipefail

            # Blank out the 3rd party images for victoriametrics/vmbackupmanager
            sed -i '/- name: vmbackupmanager/{n;s/^\([[:space:]]*image:\).*/\1 "" #THIS IMAGE IS NOT IN THE DHI CATALOG YET, PLEASE CONTACT THE DOCKER TEAM IF NEEDED/;}' ./templates/vmstorage-server.yaml
        - name: update dependencies
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: victoria-metrics-cluster
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/victoriametrics-cluster/config
