      contents:
        files:
          - url: git+https://github.com/VictoriaMetrics/helm-charts.git#victoria-metrics-cluster-0.42.0
            checksum: 8b2eef4ef69941b54eb5c4e9b69d7d850e84a3eb
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            chart:
              appRef: victoriametrics-vmselect
              description: Docker Hardened Images Helm chart for VictoriaMetrics Cluster
              images:
                - name: victoriametrics-vmselect
                  ref: dhi/victoriametrics-vmselect:1.143.0-debian13@sha256:3db66693e4d2813ada987a67a0f6d91e7a22160f6c2a5c512d105f035faaf051
                - name: victoriametrics-vmstorage
