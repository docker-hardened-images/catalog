      contents:
        files:
          - url: git+https://github.com/VictoriaMetrics/helm-charts.git#victoria-metrics-cluster-0.44.2
            checksum: ae8788ac246d31566a71b9bb7f1e45bdf722db64
            path: ${source.dir}/helm-charts
            uid: 0
