                - name: victoriametrics-vminsert
                  ref: dhi/victoriametrics-vminsert:1.142.0-debian13@sha256:fd8ba8c69d7c9693d172f2f0a6a6b8726e994afbcd65c9874a900c9bfa9636ac
                - name: victoriametrics-vmauth
