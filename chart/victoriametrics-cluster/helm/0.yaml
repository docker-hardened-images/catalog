# syntax=dhi.io/build:2-helm3

name: VictoriaMetrics Cluster Helm chart 0.x
image: dhi.io/victoriametrics-cluster-chart
variant: helm
tags:
  - 0.37.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 7f96b67bd703d42feda1566dd14484e62a5a88dc
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:a2c1b2e1c9d947d8feabde6c5ae3d2f9b1f0883a4d6cd01d49ccb0e509465920
  SEMVER_MAJOR_MINOR_VERSION: "0.37"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.37.0
  VERSION: 0.37.0
  VMAUTH_REFERENCE: dhi/victoriametrics-vmauth:1.138.0-debian13@sha256:ab8e6ae30c02a2ce3d6a2e8447a32ef50bcd5aea52517b9075382fa226fc73ad
  VMINSERT_REFERENCE: dhi/victoriametrics-vminsert:1.138.0-debian13@sha256:4e73e7c10ea1b3d917b239c9ce5c5f13a1d461ebd7ae7e5fc117bad056f2cf91
  VMSELECT_REFERENCE: dhi/victoriametrics-vmselect:1.138.0-debian13@sha256:7477bc8190f57db6ce1ad32031cda6aad24116a9bd20c2fa60f974b3041876b9
  VMSTORAGE_REFERENCE: dhi/victoriametrics-vmstorage:1.138.0-debian13@sha256:b7b25f0662248ec74a47cd4936716e3b37e003b048eb7f7a7b521aec2363bc58
contents:
  builds:
    - name: victoriametrics-cluster-chart
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:a2c1b2e1c9d947d8feabde6c5ae3d2f9b1f0883a4d6cd01d49ccb0e509465920
      contents:
        files:
          - url: git+https://github.com/VictoriaMetrics/helm-charts.git#victoria-metrics-cluster-0.37.0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            chart:
              appRef: victoriametrics-vmselect
              description: Docker Hardened Images Helm chart for VictoriaMetrics Cluster
              images:
                - name: victoriametrics-vmselect
                  ref: dhi/victoriametrics-vmselect:1.138.0-debian13@sha256:7477bc8190f57db6ce1ad32031cda6aad24116a9bd20c2fa60f974b3041876b9
                - name: victoriametrics-vmstorage
                  ref: dhi/victoriametrics-vmstorage:1.138.0-debian13@sha256:b7b25f0662248ec74a47cd4936716e3b37e003b048eb7f7a7b521aec2363bc58
                - name: victoriametrics-vminsert
                  ref: dhi/victoriametrics-vminsert:1.138.0-debian13@sha256:4e73e7c10ea1b3d917b239c9ce5c5f13a1d461ebd7ae7e5fc117bad056f2cf91
                - name: victoriametrics-vmauth
                  ref: dhi/victoriametrics-vmauth:1.138.0-debian13@sha256:ab8e6ae30c02a2ce3d6a2e8447a32ef50bcd5aea52517b9075382fa226fc73ad
              name: victoriametrics-cluster-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/VictoriaMetrics/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update chart values
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update sidecar values
          uses: yq/patch@v1
          with:
            file: ${source.dir}/helm-charts/charts/victoria-metrics-cluster/values-sidecar.yaml
            patches:
              - .extraContainers[0].image = "dhi/victoriametrics-vmauth:1.138.0-debian13@sha256:ab8e6ae30c02a2ce3d6a2e8447a32ef50bcd5aea52517b9075382fa226fc73ad"
              - .extraContainers[0].securityContext.enabled = true
              - .extraContainers[0].securityContext.runAsNonRoot = true
              - .extraContainers[0].securityContext.runAsUser = 65532
              - .extraContainers[0].securityContext.runAsGroup = 65532
        - name: blank 3rd party images
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          runs: |
            set -eux -o pipefail

            # Blank out the 3rd party images for victoriametrics/vmbackupmanager
            sed -i '/- name: vmbackupmanager/{n;s/^\([[:space:]]*image:\).*/\1 "" #THIS IMAGE IS NOT IN THE DHI CATALOG YET, PLEASE CONTACT THE DOCKER TEAM IF NEEDED/;}' ./templates/vmstorage-server.yaml
        - name: update dependencies
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: victoria-metrics-cluster
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/victoriametrics-cluster/config
