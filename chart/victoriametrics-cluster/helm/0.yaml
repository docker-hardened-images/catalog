  VMINSERT_REFERENCE: dhi/victoriametrics-vminsert:1.140.0-debian13@sha256:46a0fa3ec2ea416599e43bbc66b816d89313b9429b6b9245c33c93f1b10ef18d
  VMSELECT_REFERENCE: dhi/victoriametrics-vmselect:1.140.0-debian13@sha256:d0cd007f0e7c3629a91d16d12d565eace26364c398306002cf72b3ad149998f5
  VMSTORAGE_REFERENCE: dhi/victoriametrics-vmstorage:1.140.0-debian13@sha256:62a82459c542d10a1ae7c1e25bcd2aa30660019c0ec4c6561adf811c2350eff6
contents:
  builds:
    - name: victoriametrics-cluster-chart
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:81e04bdcbc4f86f57589672220b5fcd235d616d28038aec4511068678778db66
      contents:
        files:
          - url: git+https://github.com/VictoriaMetrics/helm-charts.git#victoria-metrics-cluster-0.39.0
            checksum: 4b526c32fa0bd605bb1014ceebfb95d7ef2c21c0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            chart:
              appRef: victoriametrics-vmselect
              description: Docker Hardened Images Helm chart for VictoriaMetrics Cluster
              images:
                - name: victoriametrics-vmselect
                  ref: dhi/victoriametrics-vmselect:1.140.0-debian13@sha256:d0cd007f0e7c3629a91d16d12d565eace26364c398306002cf72b3ad149998f5
                - name: victoriametrics-vmstorage
                  ref: dhi/victoriametrics-vmstorage:1.140.0-debian13@sha256:62a82459c542d10a1ae7c1e25bcd2aa30660019c0ec4c6561adf811c2350eff6
                - name: victoriametrics-vminsert
                  ref: dhi/victoriametrics-vminsert:1.140.0-debian13@sha256:46a0fa3ec2ea416599e43bbc66b816d89313b9429b6b9245c33c93f1b10ef18d
                - name: victoriametrics-vmauth
                  ref: dhi/victoriametrics-vmauth:1.140.0-debian13@sha256:0e830dc73b2145f8d077164b99e6260cb0ccd7f6c2cbff3e01aec2c20fcb7722
              name: victoriametrics-cluster-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/VictoriaMetrics/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update chart values
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update sidecar values
          uses: yq/patch@v1
          with:
            file: ${source.dir}/helm-charts/charts/victoria-metrics-cluster/values-sidecar.yaml
            patches:
              - .extraContainers[0].image = "dhi/victoriametrics-vmauth:1.140.0-debian13@sha256:0e830dc73b2145f8d077164b99e6260cb0ccd7f6c2cbff3e01aec2c20fcb7722"
              - .extraContainers[0].securityContext.enabled = true
              - .extraContainers[0].securityContext.runAsNonRoot = true
              - .extraContainers[0].securityContext.runAsUser = 65532
              - .extraContainers[0].securityContext.runAsGroup = 65532
        - name: blank 3rd party images
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          runs: |
            set -eux -o pipefail

            # Blank out the 3rd party images for victoriametrics/vmbackupmanager
            sed -i '/- name: vmbackupmanager/{n;s/^\([[:space:]]*image:\).*/\1 "" #THIS IMAGE IS NOT IN THE DHI CATALOG YET, PLEASE CONTACT THE DOCKER TEAM IF NEEDED/;}' ./templates/vmstorage-server.yaml
        - name: update dependencies
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: victoria-metrics-cluster
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/victoriametrics-cluster/config
