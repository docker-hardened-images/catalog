  VMINSERT_REFERENCE: dhi/victoriametrics-vminsert:1.144.0-debian13@sha256:7d91ae92348b86f5ef1c93061f9a6b8db155a5521d71d63c38d964ddf4200f41
  VMSELECT_REFERENCE: dhi/victoriametrics-vmselect:1.144.0-debian13@sha256:10c64a692ea81cb90745ccc82101b4238d8756b60e74cb4ab3bd08d042202287
