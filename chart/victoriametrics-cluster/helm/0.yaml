contents:
  builds:
    - name: victoriametrics-cluster-chart
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:c7510bdef2d5afba3a1c80b20b836748adaab6991684962b98460d7a36dcdfa4
      contents:
        files:
          - url: git+https://github.com/VictoriaMetrics/helm-charts.git#victoria-metrics-cluster-0.39.0
            checksum: 4b526c32fa0bd605bb1014ceebfb95d7ef2c21c0
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            chart:
              appRef: victoriametrics-vmselect
              description: Docker Hardened Images Helm chart for VictoriaMetrics Cluster
              images:
                - name: victoriametrics-vmselect
                  ref: dhi/victoriametrics-vmselect:1.140.0-debian13@sha256:9712575634d9ce6e8c51801c53cd8de05beef67736502d57ced8a4ccf2d5ec38
                - name: victoriametrics-vmstorage
                  ref: dhi/victoriametrics-vmstorage:1.140.0-debian13@sha256:2a01bb0b7cf9a4016a8535f4181ab1713a3bd2e75efd41b6ba8df724bc0568ff
                - name: victoriametrics-vminsert
                  ref: dhi/victoriametrics-vminsert:1.140.0-debian13@sha256:c530da876fb0e2420eca31a6ff0e0529172f6517557c93161a9b6fffcef6deb5
                - name: victoriametrics-vmauth
                  ref: dhi/victoriametrics-vmauth:1.140.0-debian13@sha256:df6790a42f978e3029b5f4b1afc0f99b17f0c4c1bc794268863b0d06a42c45b1
              name: victoriametrics-cluster-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/VictoriaMetrics/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: update chart values
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update sidecar values
          uses: yq/patch@v1
          with:
            file: ${source.dir}/helm-charts/charts/victoria-metrics-cluster/values-sidecar.yaml
            patches:
              - .extraContainers[0].image = "dhi/victoriametrics-vmauth:1.140.0-debian13@sha256:df6790a42f978e3029b5f4b1afc0f99b17f0c4c1bc794268863b0d06a42c45b1"
              - .extraContainers[0].securityContext.enabled = true
              - .extraContainers[0].securityContext.runAsNonRoot = true
              - .extraContainers[0].securityContext.runAsUser = 65532
              - .extraContainers[0].securityContext.runAsGroup = 65532
        - name: blank 3rd party images
          work-dir: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
          runs: |
            set -eux -o pipefail

            # Blank out the 3rd party images for victoriametrics/vmbackupmanager
            sed -i '/- name: vmbackupmanager/{n;s/^\([[:space:]]*image:\).*/\1 "" #THIS IMAGE IS NOT IN THE DHI CATALOG YET, PLEASE CONTACT THE DOCKER TEAM IF NEEDED/;}' ./templates/vmstorage-server.yaml
        - name: update dependencies
          uses: helm/cmd@v1
          privileged: true
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: victoria-metrics-cluster
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/charts/victoria-metrics-cluster
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/victoriametrics-cluster/config
