controller:
  image:
    registry: ${agentgateway-controller.registry}
    repository: ${agentgateway-controller.repository}
    tag: ${agentgateway-controller.tag}@${agentgateway-controller.digest}
    pullPolicy: IfNotPresent
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
proxy:
  image:
    registry: ${agentgateway.registry}
    repository: ${agentgateway.repository}
    tag: ${agentgateway.tag}@${agentgateway.digest}
