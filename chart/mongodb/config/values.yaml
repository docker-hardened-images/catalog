# Can't specify digest as we're having only the linux/amd64 image.
# If digest is specified, the multi-platform digest is used or updated on tracking.
# This will break the tests
# mongodb application/vnd.oci.image.index.v1+json: sha256:647d12f9efe6580f2e4f702a93b204e4babc4ae960e0eae89b8e8c7704fda020
# mongodb application/vnd.oci.image.manifest.v1+json: sha256:b40097929ea32d9a826b14969d21e2278db0afa856d267212fb9b7289b3288fb


image:
  registry: ${mongodb.registry}
  repository: ${mongodb.repository}
  tag: ${mongodb.tag}

# set persistence mountPath to match mongod's default data directory so no
# extra emptyDir workaround is needed for either standalone or replicaset
persistence:
  mountPath: /data/db

# dhi/mongodb runs as user/group 999; keep volumePermissions chown, fsGroup, and
# workload UIDs aligned with the image (upstream chart defaults differ).
podSecurityContext:
  fsGroup: 999

containerSecurityContext:
  runAsUser: 999
  runAsGroup: 999

passwordUpdateJob:
  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999
  podSecurityContext:
    fsGroup: 999

backup:
  cronjob:
    containerSecurityContext:
      runAsUser: 999
      runAsGroup: 999

arbiter:
  # setup-arbiter.sh runs mongod + mongosh during bootstrap; upstream small (768Mi) OOMs on DHI.
  resourcesPreset: medium
  podSecurityContext:
    fsGroup: 999
  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999

hidden:
  podSecurityContext:
    fsGroup: 999
  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999

tls:
  image:
    registry: ${nginx.registry}
    repository: ${nginx.repository}
    tag: ${nginx.tag}
  # Stock nginx TLS image USER differs from dhi/mongodb (999). Bitnami nginx+mongodb both use 1001,
  # so upstream needs no tls.securityContext; we pin the cert init to match mongod so chmod-only PEMs work.
  securityContext:
    runAsUser: 999
    runAsGroup: 999
externalAccess:
  autoDiscovery:
    image:
      registry: ${kubectl.registry}
      repository: ${kubectl.repository}
      tag: ${kubectl.tag}
  dnsCheck:
    image:
      registry: ${bash.registry}
      repository: ${bash.repository}
      tag: ${bash.tag}
volumePermissions:
  image:
    registry: ${bash.registry}
    repository: ${bash.repository}
    tag: ${bash.tag}
metrics:
  image:
    registry: ${mongodb-exporter.registry}
    repository: ${mongodb-exporter.repository}
    tag: ${mongodb-exporter.tag}
