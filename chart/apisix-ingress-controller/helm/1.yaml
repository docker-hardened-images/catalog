contents:
  builds:
    - name: apisix-ingress-controller-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:e3d7fb6de37608485fd22d3dd04ed6b0f9cc68431cb21697c2383978e2847ed2
      contents:
        files:
          - url: git+https://github.com/apache/apisix-helm-chart.git#apisix-ingress-controller-1.1.2
            checksum: 737c1639924ed705e6b561df0ac258683f7d323b
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/apisix-ingress-controller
          with:
            chart:
              appRef: apisix-ingress-controller
              description: Docker Hardened Images Helm chart for APISIX Ingress Controller
              images:
                - name: apisix-ingress-controller
                  ref: dhi/apisix-ingress-controller:2.1.0-debian13@sha256:7759ee8e4f0c0b263747da95db1867b98efa26bd1aa5b89d87fb5b1aa4cd1437
                - name: adc
