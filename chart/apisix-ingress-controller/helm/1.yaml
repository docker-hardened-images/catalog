              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/apache/apisix-ingress-controller
            cmd: prepare
            registry: dhi.io
        - name: add image pull secrets
          work-dir: ${source.dir}/helm-charts/charts/apisix-ingress-controller
          runs: |
            set -eux -o pipefail

            sed -i '/^      containers:/i\
                  {{- with .Values.imagePullSecrets }}\
                  imagePullSecrets:\
                    {{- range $.Values.imagePullSecrets }}\
                    - name: {{ . }}\
                    {{- end }}\
                  {{- end }}' templates/deployment.yaml
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/apisix-ingress-controller
