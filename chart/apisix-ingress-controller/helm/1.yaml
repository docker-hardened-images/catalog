  APISIX_INGRESS_CONTROLLER_IMAGE_REFERENCE: dhi/apisix-ingress-controller:2.0.1-debian13@sha256:a420ccb1716f7c1c7b6fb02f15537ebd228651025a91162a3cfdb06317bb6ca5
  CHART_COMMIT_SHA: 737c1639924ed705e6b561df0ac258683f7d323b
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.1-debian13-dev@sha256:7bee3e50c815757f78414dcd850621d0cca82d3660da2376f1111069073f3bd5
  SEMVER_MAJOR_MINOR_VERSION: "1.1"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.1.2
  VERSION: 1.1.2
contents:
  builds:
    - name: apisix-ingress-controller-chart
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:7bee3e50c815757f78414dcd850621d0cca82d3660da2376f1111069073f3bd5
      contents:
        files:
          - url: git+https://github.com/apache/apisix-helm-chart.git#apisix-ingress-controller-1.1.2
            checksum: 737c1639924ed705e6b561df0ac258683f7d323b
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/apisix-ingress-controller
          with:
            chart:
              appRef: apisix-ingress-controller
              description: Docker Hardened Images Helm chart for APISIX Ingress Controller
              images:
                - name: apisix-ingress-controller
                  ref: dhi/apisix-ingress-controller:2.0.1-debian13@sha256:a420ccb1716f7c1c7b6fb02f15537ebd228651025a91162a3cfdb06317bb6ca5
                - name: adc
                  ref: dhi/adc:0.24.2-debian13@sha256:b2fcf3dde490bb279cb31f38bea217b16066709f783ed79e58a313bf17674ecf
              name: apisix-ingress-controller-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/apache/apisix-ingress-controller
            cmd: prepare
            registry: dhi.io
        - name: add image pull secrets
          work-dir: ${source.dir}/helm-charts/charts/apisix-ingress-controller
          runs: |
            set -eux -o pipefail

            sed -i '/^      containers:/i\
                  {{- with .Values.imagePullSecrets }}\
                  imagePullSecrets:\
                    {{- range $.Values.imagePullSecrets }}\
                    - name: {{ . }}\
                    {{- end }}\
                  {{- end }}' templates/deployment.yaml
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/apisix-ingress-controller
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: apisix-ingress-controller
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: apisix-ingress-controller
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/apisix-ingress-controller/config
