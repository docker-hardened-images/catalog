# syntax=dhi.io/build:2-helm3

name: Strimzi Kafka Operator Helm chart 1.x
image: dhi.io/strimzi-kafka-operator-chart
variant: helm
tags:
  - 1.1.0
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: e5c3ea05e90d6211ddb544bf4da82946cd4ede1a
  CHART_HELM_NAME: strimzi-kafka-operator-chart
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_VERSION: 4.1.4-2
  KAFKA_SUPPORTED: "true"
  KAFKA_VERSION: 4.2.1
  SEMVER_MAJOR_MINOR_VERSION: "1.1"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.1.0
  STRIMZI_KAFKA_REFERENCE: dhi/strimzi-kafka:1.1.0-debian13-kafka-4.2.1@sha256:9436a14b1bd318e270926b3dcf5f54b078a84f597b08abd25626bb3b1cb0bf3f
  STRIMZI_KAFKA_VERSION_MATCH: 1.1.0
  STRIMZI_OPERATOR_REFERENCE: dhi/strimzi-operator:1.1.0-debian13@sha256:8ea1e538204af79d5a67dd91a4ad813a76591c8abb14378cbe07c8be15a248b1
  VERSION: 1.1.0
  VERSION_MATCH: 1.1.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  builds:
    - name: strimzi-kafka-operator
      work-dir: ${source.dir}/helm-charts/helm-charts/helm3/strimzi-kafka-operator
      contents:
        packages:
          - bash
          - coreutils
          - yq-go
          - helm=4.1.4-2
        files:
          - url: git+https://github.com/strimzi/strimzi-kafka-operator.git#1.1.0
            checksum: e5c3ea05e90d6211ddb544bf4da82946cd4ede1a
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: verify kafka version is supported by strimzi
          runs: |
            set -eux -o pipefail

            if [ "true" != "true" ]; then
              echo "ERROR: Kafka 4.2.1 is not supported by Strimzi 1.1.0 (KAFKA_SUPPORTED=true)" >&2
              exit 1
            fi
            echo "Kafka 4.2.1 is supported by Strimzi 1.1.0"
        - name: verify image and chart version matches
          runs: |
            set -eux -o pipefail

            if [ "1.1.0" != "1.1.0" ] || [ "1.1.0" != "1.1.0" ]; then
              echo "ERROR: version mismatch: VERSION_MATCH=1.1.0, STRIMZI_KAFKA_VERSION_MATCH=1.1.0, VERSION=1.1.0" >&2
              exit 1
            fi
            echo "Versions are consistent: VERSION_MATCH=1.1.0, STRIMZI_KAFKA_VERSION_MATCH=1.1.0, VERSION=1.1.0"
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/helm-charts/helm3/strimzi-kafka-operator
          with:
            chart:
              appRef: strimzi-operator
              description: Docker Hardened Images Helm chart for Strimzi Kafka Operator
              images:
                - name: strimzi-operator
                  ref: dhi/strimzi-operator:1.1.0-debian13@sha256:8ea1e538204af79d5a67dd91a4ad813a76591c8abb14378cbe07c8be15a248b1
                - name: strimzi-kafka
                  ref: dhi/strimzi-kafka:1.1.0-debian13-kafka-4.2.1@sha256:9436a14b1bd318e270926b3dcf5f54b078a84f597b08abd25626bb3b1cb0bf3f
              name: strimzi-kafka-operator-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/strimzi/strimzi-kafka-operator
              version: 1.1.0
            cmd: prepare
            registry: dhi.io
        - name: update version
          uses: yq/patch@v1
          with:
            file: Chart.yaml
            patches:
              - .version = "1.1.0"
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/strimzi-kafka-operator/config
