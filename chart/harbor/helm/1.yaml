platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: ae011519ef17a47478a3639d7680902c6adcb0a5
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HARBOR_CORE_REFERENCE: dhi/harbor-core:2.15.1-debian13@sha256:6bac6c8993dd0195ae26b5ffd639ae1b9589082ec8ea209f130db6745ee73174
  HARBOR_DB_REFERENCE: dhi/harbor-db:2.15.1-debian13@sha256:753736c7191eb9b4cd81f10afe681c1b37e20cbd84ce8ee5a1c156adcc638cc3
  HARBOR_EXPORTER_REFERENCE: dhi/harbor-exporter:2.15.1-debian13@sha256:e9308394d4f2e07549417a42ff0c0b2884a59af798d4321d3bc251eafacfe951
  HARBOR_JOBSERVICE_REFERENCE: dhi/harbor-jobservice:2.15.1-debian13@sha256:40366f9335abd52127e43bced6ca3a6ea9542a7e2b0fe50573fcaefee2047558
  HARBOR_PORTAL_REFERENCE: dhi/harbor-portal:2.15.1-debian13@sha256:2f5c1fa09abc4010c9e50cbcca33a11747eafd6587dbc919cd0c0c734c8c7fce
  HARBOR_REDIS_REFERENCE: dhi/harbor-redis:2.15.1-debian13@sha256:14f76b76492c0cc32f18edc7794bd41605aafd4270952ca802abf1fccb014986
  HARBOR_REGISTRY_REFERENCE: dhi/harbor-registry:2.15.1-debian13@sha256:1f86ed967a0aa0190768602b0f37fa408f38dbc84112412821943aaf34d83824
  HARBOR_REGISTRYCTL_REFERENCE: dhi/harbor-registryctl:2.15.1-debian13@sha256:d145a482c98c95878a0db3142802268b419501368f488d88c9cdf05bfccd258f
  HARBOR_TRIVY_ADAPTER_REFERENCE: dhi/harbor-trivy-adapter:2.15.1-debian13@sha256:a4f5fcb10750d4f8432242ff22e9898957dcccf5215fbb446478e26c5d878c5e
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:6506c914dff9353ce03ce64c8d30089cf14419d8d39f026c53917e1451fb8b21
  NGINX_REFERENCE: dhi/nginx:1.31.1-debian13@sha256:454667aa4f91f9baf820cfaa99008ea7d5b3ec6c9214cab9df4b58e704490680
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
  SEMVER_MAJOR_VERSION: "1"
