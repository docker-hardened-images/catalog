vars:
  CHART_COMMIT_SHA: ae011519ef17a47478a3639d7680902c6adcb0a5
  CHART_HELM_NAME: harbor-chart
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HARBOR_CORE_REFERENCE: dhi/harbor-core:2.15.1-debian13@sha256:565bcac1d17e89743bb13d777ffd3700ba8f2d92d0d16ca8b00dcf401afecca0
  HARBOR_DB_REFERENCE: dhi/harbor-db:2.15.1-debian13@sha256:533b2236dbd0bce0a32b8dc3fc54371d1067098f0016af31b496d79240ddfb11
  HARBOR_EXPORTER_REFERENCE: dhi/harbor-exporter:2.15.1-debian13@sha256:70d2623eaba20201c55d46bea8d1623a98375f8fad8373b4bc0a2d99a819cb8f
  HARBOR_JOBSERVICE_REFERENCE: dhi/harbor-jobservice:2.15.1-debian13@sha256:d790c8c5bd0d5d680f8b91ea91d42b298ac547c7ed58e1ce67546843881d2130
  HARBOR_PORTAL_REFERENCE: dhi/harbor-portal:2.15.1-debian13@sha256:fcc7b401f078bfa7c519eaa596926073a870f555ef608cc78b0abbc88adc30c9
  HARBOR_REDIS_REFERENCE: dhi/harbor-redis:2.15.1-debian13@sha256:1a0cb500eb49b12a260b1517c3ed7cf4f020df46a1651984c4485e880ac19bc6
  HARBOR_REGISTRY_REFERENCE: dhi/harbor-registry:2.15.1-debian13@sha256:66fc877c247fa62ca5752d6abbb921385c9fb48efad20ebc9cfc7bc0da743215
  HARBOR_REGISTRYCTL_REFERENCE: dhi/harbor-registryctl:2.15.1-debian13@sha256:a1546a0d69a5fca0ce4a519dbdecf253a929e93e09af397832ec48fc27c498fd
  HARBOR_TRIVY_ADAPTER_REFERENCE: dhi/harbor-trivy-adapter:2.15.1-debian13@sha256:4be39613ff9dc2f4d8bc768d5338f54430cbc74a31322138ce40fa83b26d54a2
  HELM_REFERENCE: dhi/helm:3.21.2-debian13-dev@sha256:e30b522f3f39307b7710b304f082f76d7b8fc0d0140bfc44bdf2892c5411519f
  NGINX_REFERENCE: dhi/nginx:1.31.2-debian13@sha256:de8730b879576024c97094e2b5d2001a7a4f10f46d1058ec5bad48fe64f740c4
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.19.1
