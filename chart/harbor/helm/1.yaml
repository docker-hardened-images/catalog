vars:
  CHART_COMMIT_SHA: ae011519ef17a47478a3639d7680902c6adcb0a5
  CHART_HELM_NAME: harbor-chart
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HARBOR_CORE_REFERENCE: dhi/harbor-core:2.15.2-debian13@sha256:affc592d684dd987494be305485cc8b8731e6e034e3eefb10cdda387f5c352b6
  HARBOR_DB_REFERENCE: dhi/harbor-db:2.15.2-debian13@sha256:9f61e2fcf235f159adbff60271b7b106013fed976f3e1d96f991ab37b34f9e17
  HARBOR_EXPORTER_REFERENCE: dhi/harbor-exporter:2.15.2-debian13@sha256:baef6534b7c03881b7b0287d17c71cfb9a97b81250b680f69cb0bf13add16f73
  HARBOR_JOBSERVICE_REFERENCE: dhi/harbor-jobservice:2.15.2-debian13@sha256:2521498b224a27db77f68f3684f9bff30f11230d40ad98c8d229c4cdddd6084a
  HARBOR_PORTAL_REFERENCE: dhi/harbor-portal:2.15.1-debian13@sha256:464844a6baf1e125d63f148ff7c8720e2ad3a5674946401f64d77c3e610ddb6f
  HARBOR_REDIS_REFERENCE: dhi/harbor-redis:2.15.1-debian13@sha256:4d3dfd85b13b51ed9288ded7a188c214635445fffd42177a37f536bf4a94dd40
  HARBOR_REGISTRY_REFERENCE: dhi/harbor-registry:2.15.2-debian13@sha256:67c64a754657434448b9e872a1bd0ca5af85f9ef19294e5d4bc02fd34ba7cb7e
  HARBOR_REGISTRYCTL_REFERENCE: dhi/harbor-registryctl:2.15.2-debian13@sha256:2ac247d486cce3212021449b5fd00e46f6c616c1cc260f81437e1bc0171140cc
  HARBOR_TRIVY_ADAPTER_REFERENCE: dhi/harbor-trivy-adapter:2.15.2-debian13@sha256:3d4740e3fe7ef3c0d7bc08ded80e9c53788956ba35e9c0b66a16b2de44e06cb1
  HELM_VERSION: 4.1.4-2
  NGINX_REFERENCE: dhi/nginx:1.31.3-debian13@sha256:9c85848a89c938b4c2ce5ea515f1107774cd7aa61a5e430f3fed80790c6ceeb7
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.19.1
  VERSION: 1.19.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  builds:
    - name: harbor-chart
      work-dir: ${source.dir}/harbor-helm
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - perl
          - helm=4.1.4-2
        files:
          - url: git+https://github.com/goharbor/harbor-helm.git#v1.19.1
            checksum: ae011519ef17a47478a3639d7680902c6adcb0a5
            path: ${source.dir}/harbor-helm
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: harbor-core
              description: Docker Hardened Images Helm chart for Harbor
              images:
                - name: harbor-core
                  ref: dhi/harbor-core:2.15.2-debian13@sha256:affc592d684dd987494be305485cc8b8731e6e034e3eefb10cdda387f5c352b6
                - name: harbor-jobservice
                  ref: dhi/harbor-jobservice:2.15.2-debian13@sha256:2521498b224a27db77f68f3684f9bff30f11230d40ad98c8d229c4cdddd6084a
                - name: harbor-registry
                  ref: dhi/harbor-registry:2.15.2-debian13@sha256:67c64a754657434448b9e872a1bd0ca5af85f9ef19294e5d4bc02fd34ba7cb7e
                - name: harbor-registryctl
                  ref: dhi/harbor-registryctl:2.15.2-debian13@sha256:2ac247d486cce3212021449b5fd00e46f6c616c1cc260f81437e1bc0171140cc
                - name: harbor-trivy-adapter
                  ref: dhi/harbor-trivy-adapter:2.15.2-debian13@sha256:3d4740e3fe7ef3c0d7bc08ded80e9c53788956ba35e9c0b66a16b2de44e06cb1
                - name: harbor-exporter
                  ref: dhi/harbor-exporter:2.15.2-debian13@sha256:baef6534b7c03881b7b0287d17c71cfb9a97b81250b680f69cb0bf13add16f73
                - name: harbor-portal
                  ref: dhi/harbor-portal:2.15.1-debian13@sha256:464844a6baf1e125d63f148ff7c8720e2ad3a5674946401f64d77c3e610ddb6f
                - name: harbor-db
                  ref: dhi/harbor-db:2.15.2-debian13@sha256:9f61e2fcf235f159adbff60271b7b106013fed976f3e1d96f991ab37b34f9e17
                - name: harbor-redis
                  ref: dhi/harbor-redis:2.15.1-debian13@sha256:4d3dfd85b13b51ed9288ded7a188c214635445fffd42177a37f536bf4a94dd40
                - name: nginx
                  ref: dhi/nginx:1.31.3-debian13@sha256:9c85848a89c938b4c2ce5ea515f1107774cd7aa61a5e430f3fed80790c6ceeb7
              name: harbor-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/goharbor/harbor
            cmd: prepare
            registry: dhi.io
        - name: patch security contexts
          runs: |
            set -eux -o pipefail

            TMPL="${source.dir}/harbor-helm/templates"

            # Replace each pod-level securityContext block with a Helm {{- with }} block
            # sourced from values.yaml. The indentation is read dynamically from the
            # securityContext: line itself so the replacement is correct regardless of
            # nesting depth, and the block match consumes all deeper-indented lines so
            # it is resilient to new fields being added upstream.
            patch_security_context() {
              local file="$1" path="$2"
              perl -i -0pe \
                's/( +)securityContext:\n(\1 +[^\n]*\n)+/my ($i,$n)=($1,length($1)+2); "${i}{{- with .Values.'"${path}"' }}\n${i}securityContext:\n${i}  {{- toYaml . | nindent $n }}\n${i}{{- end }}\n"/ge' \
                "$file"
            }

            patch_security_context "$TMPL/core/core-dpl.yaml" "core.podSecurityContext"
            patch_security_context "$TMPL/exporter/exporter-dpl.yaml" "exporter.podSecurityContext"
            patch_security_context "$TMPL/jobservice/jobservice-dpl.yaml" "jobservice.podSecurityContext"
            patch_security_context "$TMPL/portal/deployment.yaml" "portal.podSecurityContext"
            patch_security_context "$TMPL/trivy/trivy-sts.yaml" "trivy.podSecurityContext"
            patch_security_context "$TMPL/nginx/deployment.yaml" "nginx.podSecurityContext"
            patch_security_context "$TMPL/registry/registry-dpl.yaml" "registry.podSecurityContext"
            patch_security_context "$TMPL/database/database-ss.yaml" "database.internal.podSecurityContext"
            patch_security_context "$TMPL/redis/statefulset.yaml" "redis.internal.podSecurityContext"
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/harbor/config
