vars:
  CHART_COMMIT_SHA: ae011519ef17a47478a3639d7680902c6adcb0a5
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HARBOR_CORE_REFERENCE: dhi/harbor-core:2.15.1-debian13@sha256:6bac6c8993dd0195ae26b5ffd639ae1b9589082ec8ea209f130db6745ee73174
  HARBOR_DB_REFERENCE: dhi/harbor-db:2.15.1-debian13@sha256:7523e8fec9c000dac60fbea258f8ca35d99e9c3b74cde90b5776adfb179f5d39
  HARBOR_EXPORTER_REFERENCE: dhi/harbor-exporter:2.15.1-debian13@sha256:f27041ceea9d41d7f675c90f237ff76c550730338eaf72c34eb3ca11e27a7846
  HARBOR_JOBSERVICE_REFERENCE: dhi/harbor-jobservice:2.15.1-debian13@sha256:c0f2ef1c9b4c3219dc59d064397b0c19fa017b62a33234b841b572acb4cb77d7
  HARBOR_PORTAL_REFERENCE: dhi/harbor-portal:2.15.1-debian13@sha256:5c553032e84fde69fe7f8b4db3479706a6a8f661be8c59f60c7670ae684fc78c
  HARBOR_REDIS_REFERENCE: dhi/harbor-redis:2.15.1-debian13@sha256:14f76b76492c0cc32f18edc7794bd41605aafd4270952ca802abf1fccb014986
  HARBOR_REGISTRY_REFERENCE: dhi/harbor-registry:2.15.1-debian13@sha256:1f86ed967a0aa0190768602b0f37fa408f38dbc84112412821943aaf34d83824
  HARBOR_REGISTRYCTL_REFERENCE: dhi/harbor-registryctl:2.15.1-debian13@sha256:a81aeda06abbdfe9558b01251977e8f9476561d4a69e3bd85efc1fa3d1dbfc24
  HARBOR_TRIVY_ADAPTER_REFERENCE: dhi/harbor-trivy-adapter:2.15.1-debian13@sha256:8c713c20d999656128de0983ede1f16fd946de11793482722cc65281ec9ad342
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:ed0c764ca91c1084c850f3b00e7248f9127153bb3a5803058a337ac99ba6d479
  NGINX_REFERENCE: dhi/nginx:1.31.1-debian13@sha256:3e12e26a1531c9f5f809c09e29c06a0ff9438829905fd60cb91c4bcb1f2d4308
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
  SEMVER_MAJOR_VERSION: "1"
