vars:
  CHART_COMMIT_SHA: ae011519ef17a47478a3639d7680902c6adcb0a5
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HARBOR_CORE_REFERENCE: dhi/harbor-core:2.15.1-debian13@sha256:2baab5fc039ab4c0ba4ec0609805a3c58c5cb94392406fdde332635826772366
  HARBOR_DB_REFERENCE: dhi/harbor-db:2.15.1-debian13@sha256:bc679706198582f3ede8087981e0e977da462928e8f3aeb386eab2f0c308fddc
  HARBOR_EXPORTER_REFERENCE: dhi/harbor-exporter:2.15.1-debian13@sha256:4183b8620b9ab676bde1de4a528fd431a52f26b70b01501c9241b66924b6b846
  HARBOR_JOBSERVICE_REFERENCE: dhi/harbor-jobservice:2.15.1-debian13@sha256:729e562099b5e7fa7eda34eaa57aecc6c9cd7bb73be1e8dcdddfd3a9f0a1d199
  HARBOR_PORTAL_REFERENCE: dhi/harbor-portal:2.15.1-debian13@sha256:8e84c3da666c62c52498f461bf92d40c0c108e109902b5ab9afa5ec7a098dcb6
