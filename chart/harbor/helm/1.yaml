vars:
  CHART_COMMIT_SHA: ae011519ef17a47478a3639d7680902c6adcb0a5
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HARBOR_CORE_REFERENCE: dhi/harbor-core:2.15.1-debian13@sha256:6bac6c8993dd0195ae26b5ffd639ae1b9589082ec8ea209f130db6745ee73174
  HARBOR_DB_REFERENCE: dhi/harbor-db:2.15.1-debian13@sha256:87eada075e0ab543d2c741bb2394b73aba11ba913ed6c3ca8e5b4518c58adf29
  HARBOR_EXPORTER_REFERENCE: dhi/harbor-exporter:2.15.1-debian13@sha256:5a5d9a46e92620f5add76199ca835204f47021001517ab788d7ab2725b6877dc
  HARBOR_JOBSERVICE_REFERENCE: dhi/harbor-jobservice:2.15.1-debian13@sha256:3a55530b63fa9efddc71b6c3bcf0eb800c08a20f54fa1d6965f92a342b171649
  HARBOR_PORTAL_REFERENCE: dhi/harbor-portal:2.15.1-debian13@sha256:a5f0682b92f209fbc9ec24ac7d9c30640f3233ddb16d3c634331b8d61f6e9b0e
  HARBOR_REDIS_REFERENCE: dhi/harbor-redis:2.15.1-debian13@sha256:14f76b76492c0cc32f18edc7794bd41605aafd4270952ca802abf1fccb014986
  HARBOR_REGISTRY_REFERENCE: dhi/harbor-registry:2.15.1-debian13@sha256:1f86ed967a0aa0190768602b0f37fa408f38dbc84112412821943aaf34d83824
  HARBOR_REGISTRYCTL_REFERENCE: dhi/harbor-registryctl:2.15.1-debian13@sha256:f4bf1132935962b78eeb71a1d07264998e22864e86e360bd9bcaab285602e4b2
  HARBOR_TRIVY_ADAPTER_REFERENCE: dhi/harbor-trivy-adapter:2.15.1-debian13@sha256:214354f7345bf6f48004ce71152f2561dd215fc34ac44857f7be19c85fc5399c
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:ce37cdc271f28789f84db63c8fe5d86522cc98922637f8dde8c2aca4f0cc1632
  NGINX_REFERENCE: dhi/nginx:1.31.1-debian13@sha256:3e12e26a1531c9f5f809c09e29c06a0ff9438829905fd60cb91c4bcb1f2d4308
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
  SEMVER_MAJOR_VERSION: "1"
