vars:
  CHART_COMMIT_SHA: ae011519ef17a47478a3639d7680902c6adcb0a5
  CHART_HELM_NAME: harbor-chart
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HARBOR_CORE_REFERENCE: dhi/harbor-core:2.15.2-debian13@sha256:c4f9229c4e9bfc9fbb2919fb6c5d164528b50b870e8c286aeca5f2f669bfa9ae
  HARBOR_DB_REFERENCE: dhi/harbor-db:2.15.2-debian13@sha256:8af96c4dd090b8f24590e69969a458e5a78e220e8fb726a8a507500f278ed014
  HARBOR_EXPORTER_REFERENCE: dhi/harbor-exporter:2.15.2-debian13@sha256:d7eb212c42dd7d2270514f46a9b8076f73dea8fa5f298a82ae66cfe8faad1d6e
  HARBOR_JOBSERVICE_REFERENCE: dhi/harbor-jobservice:2.15.2-debian13@sha256:287479cad50ac5b8e19e5a56d7362573e3a373ebfd267138b9ffe7211b82a966
  HARBOR_PORTAL_REFERENCE: dhi/harbor-portal:2.15.1-debian13@sha256:ae22784ba014f7de83252a224dc7eea3cf83368090a2e6797efe77a381602365
  HARBOR_REDIS_REFERENCE: dhi/harbor-redis:2.15.1-debian13@sha256:4d3dfd85b13b51ed9288ded7a188c214635445fffd42177a37f536bf4a94dd40
  HARBOR_REGISTRY_REFERENCE: dhi/harbor-registry:2.15.2-debian13@sha256:faef8615ed54b3d14aaea209701f9a5df0d403a925852ef54a6e24cd7218c1c0
  HARBOR_REGISTRYCTL_REFERENCE: dhi/harbor-registryctl:2.15.2-debian13@sha256:0c2119118fd4b7060577e3ea09b98b562d14cba63ec8eee7d821c671935175c2
  HARBOR_TRIVY_ADAPTER_REFERENCE: dhi/harbor-trivy-adapter:2.15.2-debian13@sha256:fe9d1e4015e43afe7202ea5440adb0250175ce74e46532d7557584b2926ef97c
  HELM_VERSION: 4.1.4-2
  NGINX_REFERENCE: dhi/nginx:1.31.2-debian13@sha256:a4b8a6bc5cefcbad0da8a65b6ee5a8f09882a9e05be3979525cd59cca2619392
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.19.1
  VERSION: 1.19.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  builds:
    - name: harbor-chart
      work-dir: ${source.dir}/harbor-helm
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - perl
          - helm=4.1.4-2
        files:
          - url: git+https://github.com/goharbor/harbor-helm.git#v1.19.1
            checksum: ae011519ef17a47478a3639d7680902c6adcb0a5
            path: ${source.dir}/harbor-helm
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: harbor-core
              description: Docker Hardened Images Helm chart for Harbor
              images:
                - name: harbor-core
                  ref: dhi/harbor-core:2.15.2-debian13@sha256:c4f9229c4e9bfc9fbb2919fb6c5d164528b50b870e8c286aeca5f2f669bfa9ae
                - name: harbor-jobservice
                  ref: dhi/harbor-jobservice:2.15.2-debian13@sha256:287479cad50ac5b8e19e5a56d7362573e3a373ebfd267138b9ffe7211b82a966
                - name: harbor-registry
                  ref: dhi/harbor-registry:2.15.2-debian13@sha256:faef8615ed54b3d14aaea209701f9a5df0d403a925852ef54a6e24cd7218c1c0
                - name: harbor-registryctl
                  ref: dhi/harbor-registryctl:2.15.2-debian13@sha256:0c2119118fd4b7060577e3ea09b98b562d14cba63ec8eee7d821c671935175c2
                - name: harbor-trivy-adapter
                  ref: dhi/harbor-trivy-adapter:2.15.2-debian13@sha256:fe9d1e4015e43afe7202ea5440adb0250175ce74e46532d7557584b2926ef97c
                - name: harbor-exporter
                  ref: dhi/harbor-exporter:2.15.2-debian13@sha256:d7eb212c42dd7d2270514f46a9b8076f73dea8fa5f298a82ae66cfe8faad1d6e
                - name: harbor-portal
                  ref: dhi/harbor-portal:2.15.1-debian13@sha256:ae22784ba014f7de83252a224dc7eea3cf83368090a2e6797efe77a381602365
                - name: harbor-db
                  ref: dhi/harbor-db:2.15.2-debian13@sha256:8af96c4dd090b8f24590e69969a458e5a78e220e8fb726a8a507500f278ed014
                - name: harbor-redis
                  ref: dhi/harbor-redis:2.15.1-debian13@sha256:4d3dfd85b13b51ed9288ded7a188c214635445fffd42177a37f536bf4a94dd40
                - name: nginx
                  ref: dhi/nginx:1.31.2-debian13@sha256:a4b8a6bc5cefcbad0da8a65b6ee5a8f09882a9e05be3979525cd59cca2619392
              name: harbor-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/goharbor/harbor
            cmd: prepare
            registry: dhi.io
        - name: patch security contexts
          runs: |
            set -eux -o pipefail

            TMPL="${source.dir}/harbor-helm/templates"

            # Replace each pod-level securityContext block with a Helm {{- with }} block
            # sourced from values.yaml. The indentation is read dynamically from the
            # securityContext: line itself so the replacement is correct regardless of
            # nesting depth, and the block match consumes all deeper-indented lines so
            # it is resilient to new fields being added upstream.
            patch_security_context() {
              local file="$1" path="$2"
              perl -i -0pe \
                's/( +)securityContext:\n(\1 +[^\n]*\n)+/my ($i,$n)=($1,length($1)+2); "${i}{{- with .Values.'"${path}"' }}\n${i}securityContext:\n${i}  {{- toYaml . | nindent $n }}\n${i}{{- end }}\n"/ge' \
                "$file"
            }

            patch_security_context "$TMPL/core/core-dpl.yaml" "core.podSecurityContext"
            patch_security_context "$TMPL/exporter/exporter-dpl.yaml" "exporter.podSecurityContext"
            patch_security_context "$TMPL/jobservice/jobservice-dpl.yaml" "jobservice.podSecurityContext"
            patch_security_context "$TMPL/portal/deployment.yaml" "portal.podSecurityContext"
            patch_security_context "$TMPL/trivy/trivy-sts.yaml" "trivy.podSecurityContext"
            patch_security_context "$TMPL/nginx/deployment.yaml" "nginx.podSecurityContext"
            patch_security_context "$TMPL/registry/registry-dpl.yaml" "registry.podSecurityContext"
            patch_security_context "$TMPL/database/database-ss.yaml" "database.internal.podSecurityContext"
            patch_security_context "$TMPL/redis/statefulset.yaml" "redis.internal.podSecurityContext"
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/harbor/config
