  HARBOR_REGISTRY_REFERENCE: dhi/harbor-registry:2.15.1-debian13@sha256:66fc877c247fa62ca5752d6abbb921385c9fb48efad20ebc9cfc7bc0da743215
  HARBOR_REGISTRYCTL_REFERENCE: dhi/harbor-registryctl:2.15.1-debian13@sha256:58aa9551127f5db1e3856fe30680e65760fff15a7c4763c07fcc52e66b0775c3
  HARBOR_TRIVY_ADAPTER_REFERENCE: dhi/harbor-trivy-adapter:2.15.1-debian13@sha256:038174c91e070600999d0f22cb309e652268f61e9d051ec45b19c1a2233ec109
  HELM_REFERENCE: dhi/helm:3.21.2-debian13-dev@sha256:fc6fdd4be364fc8d33537d170a24eccb64b6c087c17f81ce2f31029301909d91
  NGINX_REFERENCE: dhi/nginx:1.31.2-debian13@sha256:aab2ca78c082615fc079fb0a850703a0dc93320a3f0cf4fc1303b2984bd8cf45
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
