vars:
  CHART_COMMIT_SHA: ae011519ef17a47478a3639d7680902c6adcb0a5
  CHART_HELM_NAME: harbor-chart
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HARBOR_CORE_REFERENCE: dhi/harbor-core:2.15.2-debian13@sha256:9527fc2681bce5a445ec34787d21c3638c41fd2dec033eb0b25bfb74fe2ee535
  HARBOR_DB_REFERENCE: dhi/harbor-db:2.15.2-debian13@sha256:b04afad6b5de4c405b7b7d0a204dc23d269be733c73f08929acd8254564a614a
  HARBOR_EXPORTER_REFERENCE: dhi/harbor-exporter:2.15.2-debian13@sha256:88aa72bb843cb1c60574c3df0ebf4482bedf1ad81b7b55ddd14daa52bae93504
  HARBOR_JOBSERVICE_REFERENCE: dhi/harbor-jobservice:2.15.2-debian13@sha256:44eaab1943abb3f7102dac3fdc5ce13d83b87305673a3b7682d8504f82f5c669
  HARBOR_PORTAL_REFERENCE: dhi/harbor-portal:2.15.1-debian13@sha256:d27c3b0699b5bd758bf11ebc38ccae9799ad26b3933109f54158d695c7a78e90
  HARBOR_REDIS_REFERENCE: dhi/harbor-redis:2.15.1-debian13@sha256:1a0cb500eb49b12a260b1517c3ed7cf4f020df46a1651984c4485e880ac19bc6
  HARBOR_REGISTRY_REFERENCE: dhi/harbor-registry:2.15.2-debian13@sha256:9198250af9b978fe7f91f9679fc8d45c86f56256472ccf81b25b46376ae1300a
  HARBOR_REGISTRYCTL_REFERENCE: dhi/harbor-registryctl:2.15.2-debian13@sha256:30b44930fd74c6aa2e0dc9dc9d6dc015ac5b914ea4378993439666738828db67
  HARBOR_TRIVY_ADAPTER_REFERENCE: dhi/harbor-trivy-adapter:2.15.2-debian13@sha256:575bff767e66703a53c723f863b05cad180b63671a6d91e11b088bec67b1fd90
  HELM_VERSION: 4.1.4-2
  NGINX_REFERENCE: dhi/nginx:1.31.2-debian13@sha256:de8730b879576024c97094e2b5d2001a7a4f10f46d1058ec5bad48fe64f740c4
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.19.1
  VERSION: 1.19.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  builds:
    - name: harbor-chart
      work-dir: ${source.dir}/harbor-helm
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - perl
          - helm=4.1.4-2
        files:
          - url: git+https://github.com/goharbor/harbor-helm.git#v1.19.1
            checksum: ae011519ef17a47478a3639d7680902c6adcb0a5
            path: ${source.dir}/harbor-helm
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: harbor-core
              description: Docker Hardened Images Helm chart for Harbor
              images:
                - name: harbor-core
                  ref: dhi/harbor-core:2.15.2-debian13@sha256:9527fc2681bce5a445ec34787d21c3638c41fd2dec033eb0b25bfb74fe2ee535
                - name: harbor-jobservice
                  ref: dhi/harbor-jobservice:2.15.2-debian13@sha256:44eaab1943abb3f7102dac3fdc5ce13d83b87305673a3b7682d8504f82f5c669
                - name: harbor-registry
                  ref: dhi/harbor-registry:2.15.2-debian13@sha256:9198250af9b978fe7f91f9679fc8d45c86f56256472ccf81b25b46376ae1300a
                - name: harbor-registryctl
                  ref: dhi/harbor-registryctl:2.15.2-debian13@sha256:30b44930fd74c6aa2e0dc9dc9d6dc015ac5b914ea4378993439666738828db67
                - name: harbor-trivy-adapter
                  ref: dhi/harbor-trivy-adapter:2.15.2-debian13@sha256:575bff767e66703a53c723f863b05cad180b63671a6d91e11b088bec67b1fd90
                - name: harbor-exporter
                  ref: dhi/harbor-exporter:2.15.2-debian13@sha256:88aa72bb843cb1c60574c3df0ebf4482bedf1ad81b7b55ddd14daa52bae93504
                - name: harbor-portal
                  ref: dhi/harbor-portal:2.15.1-debian13@sha256:d27c3b0699b5bd758bf11ebc38ccae9799ad26b3933109f54158d695c7a78e90
                - name: harbor-db
                  ref: dhi/harbor-db:2.15.2-debian13@sha256:b04afad6b5de4c405b7b7d0a204dc23d269be733c73f08929acd8254564a614a
                - name: harbor-redis
                  ref: dhi/harbor-redis:2.15.1-debian13@sha256:1a0cb500eb49b12a260b1517c3ed7cf4f020df46a1651984c4485e880ac19bc6
                - name: nginx
                  ref: dhi/nginx:1.31.2-debian13@sha256:de8730b879576024c97094e2b5d2001a7a4f10f46d1058ec5bad48fe64f740c4
              name: harbor-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/goharbor/harbor
            cmd: prepare
            registry: dhi.io
        - name: patch security contexts
          runs: |
            set -eux -o pipefail

            TMPL="${source.dir}/harbor-helm/templates"

            # Replace each pod-level securityContext block with a Helm {{- with }} block
            # sourced from values.yaml. The indentation is read dynamically from the
            # securityContext: line itself so the replacement is correct regardless of
            # nesting depth, and the block match consumes all deeper-indented lines so
            # it is resilient to new fields being added upstream.
            patch_security_context() {
              local file="$1" path="$2"
              perl -i -0pe \
                's/( +)securityContext:\n(\1 +[^\n]*\n)+/my ($i,$n)=($1,length($1)+2); "${i}{{- with .Values.'"${path}"' }}\n${i}securityContext:\n${i}  {{- toYaml . | nindent $n }}\n${i}{{- end }}\n"/ge' \
                "$file"
            }

            patch_security_context "$TMPL/core/core-dpl.yaml" "core.podSecurityContext"
            patch_security_context "$TMPL/exporter/exporter-dpl.yaml" "exporter.podSecurityContext"
            patch_security_context "$TMPL/jobservice/jobservice-dpl.yaml" "jobservice.podSecurityContext"
            patch_security_context "$TMPL/portal/deployment.yaml" "portal.podSecurityContext"
            patch_security_context "$TMPL/trivy/trivy-sts.yaml" "trivy.podSecurityContext"
            patch_security_context "$TMPL/nginx/deployment.yaml" "nginx.podSecurityContext"
            patch_security_context "$TMPL/registry/registry-dpl.yaml" "registry.podSecurityContext"
            patch_security_context "$TMPL/database/database-ss.yaml" "database.internal.podSecurityContext"
            patch_security_context "$TMPL/redis/statefulset.yaml" "redis.internal.podSecurityContext"
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/harbor/config
