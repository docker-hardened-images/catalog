contents:
  builds:
    - name: harbor-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:6506c914dff9353ce03ce64c8d30089cf14419d8d39f026c53917e1451fb8b21
      work-dir: ${source.dir}/harbor-helm
      contents:
        files:
          - url: git+https://github.com/goharbor/harbor-helm.git#v1.19.1
            checksum: ae011519ef17a47478a3639d7680902c6adcb0a5
            path: ${source.dir}/harbor-helm
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: harbor-core
              description: Docker Hardened Images Helm chart for Harbor
              images:
                - name: harbor-core
                  ref: dhi/harbor-core:2.15.1-debian13@sha256:6bac6c8993dd0195ae26b5ffd639ae1b9589082ec8ea209f130db6745ee73174
                - name: harbor-jobservice
                  ref: dhi/harbor-jobservice:2.15.1-debian13@sha256:40366f9335abd52127e43bced6ca3a6ea9542a7e2b0fe50573fcaefee2047558
                - name: harbor-registry
                  ref: dhi/harbor-registry:2.15.1-debian13@sha256:1f86ed967a0aa0190768602b0f37fa408f38dbc84112412821943aaf34d83824
                - name: harbor-registryctl
                  ref: dhi/harbor-registryctl:2.15.1-debian13@sha256:d145a482c98c95878a0db3142802268b419501368f488d88c9cdf05bfccd258f
                - name: harbor-trivy-adapter
                  ref: dhi/harbor-trivy-adapter:2.15.1-debian13@sha256:a4f5fcb10750d4f8432242ff22e9898957dcccf5215fbb446478e26c5d878c5e
                - name: harbor-exporter
                  ref: dhi/harbor-exporter:2.15.1-debian13@sha256:e9308394d4f2e07549417a42ff0c0b2884a59af798d4321d3bc251eafacfe951
                - name: harbor-portal
                  ref: dhi/harbor-portal:2.15.1-debian13@sha256:2f5c1fa09abc4010c9e50cbcca33a11747eafd6587dbc919cd0c0c734c8c7fce
                - name: harbor-db
                  ref: dhi/harbor-db:2.15.1-debian13@sha256:753736c7191eb9b4cd81f10afe681c1b37e20cbd84ce8ee5a1c156adcc638cc3
                - name: harbor-redis
                  ref: dhi/harbor-redis:2.15.1-debian13@sha256:14f76b76492c0cc32f18edc7794bd41605aafd4270952ca802abf1fccb014986
                - name: nginx
                  ref: dhi/nginx:1.31.1-debian13@sha256:454667aa4f91f9baf820cfaa99008ea7d5b3ec6c9214cab9df4b58e704490680
              name: harbor-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/goharbor/harbor
            cmd: prepare
            registry: dhi.io
        - name: patch security contexts
          runs: |
            set -eux -o pipefail

            TMPL="${source.dir}/harbor-helm/templates"

            # Replace each pod-level securityContext block with a Helm {{- with }} block
            # sourced from values.yaml. The indentation is read dynamically from the
            # securityContext: line itself so the replacement is correct regardless of
            # nesting depth, and the block match consumes all deeper-indented lines so
            # it is resilient to new fields being added upstream.
            patch_security_context() {
              local file="$1" path="$2"
              perl -i -0pe \
                's/( +)securityContext:\n(\1 +[^\n]*\n)+/my ($i,$n)=($1,length($1)+2); "${i}{{- with .Values.'"${path}"' }}\n${i}securityContext:\n${i}  {{- toYaml . | nindent $n }}\n${i}{{- end }}\n"/ge' \
                "$file"
            }

            patch_security_context "$TMPL/core/core-dpl.yaml" "core.podSecurityContext"
            patch_security_context "$TMPL/exporter/exporter-dpl.yaml" "exporter.podSecurityContext"
            patch_security_context "$TMPL/jobservice/jobservice-dpl.yaml" "jobservice.podSecurityContext"
            patch_security_context "$TMPL/portal/deployment.yaml" "portal.podSecurityContext"
            patch_security_context "$TMPL/trivy/trivy-sts.yaml" "trivy.podSecurityContext"
            patch_security_context "$TMPL/nginx/deployment.yaml" "nginx.podSecurityContext"
            patch_security_context "$TMPL/registry/registry-dpl.yaml" "registry.podSecurityContext"
            patch_security_context "$TMPL/database/database-ss.yaml" "database.internal.podSecurityContext"
            patch_security_context "$TMPL/redis/statefulset.yaml" "redis.internal.podSecurityContext"
        - name: relocate chart
          uses: helm/rudder@v1
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: .
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/harbor/config
