  HARBOR_TRIVY_ADAPTER_REFERENCE: dhi/harbor-trivy-adapter:2.15.1-debian13@sha256:4e9a6931a3ba919ca7d112de0e087c6c03776563d8b7e0cee52e9d48a3301e7e
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:7b9ee43cc77e81e2dcbb1b0f6e8ce376b71d63c90c81f2863e24aefff774a8da
  NGINX_REFERENCE: dhi/nginx:1.31.1-debian13@sha256:9f9e05ef1d4bcf38c19dc601affeabc212fcf577e424bf77a6f2cdb52caeb143
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
