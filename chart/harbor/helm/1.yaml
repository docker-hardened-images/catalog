vars:
  CHART_COMMIT_SHA: ae011519ef17a47478a3639d7680902c6adcb0a5
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HARBOR_CORE_REFERENCE: dhi/harbor-core:2.15.1-debian13@sha256:5f71e73f40cc42cefefc68504a8c92b519f0c368d573de59efa91d25d57c598f
  HARBOR_DB_REFERENCE: dhi/harbor-db:2.15.1-debian13@sha256:c48ee895e8c6501b155176a48091f6b74151d82e60f4c71a21c679f39d110f37
  HARBOR_EXPORTER_REFERENCE: dhi/harbor-exporter:2.15.1-debian13@sha256:288c8cacefc7ac59032a2e41a79da50f261b6511ce5ccdd5d434930529325186
  HARBOR_JOBSERVICE_REFERENCE: dhi/harbor-jobservice:2.15.1-debian13@sha256:5d7bede75e8b9571e926ad1a90194054c592bbb7497df397b3552c1679ad37ba
  HARBOR_PORTAL_REFERENCE: dhi/harbor-portal:2.15.1-debian13@sha256:3c541bea2cdbea3da5eea85af51bcccb8fdfb93626d7859ae83be79d1a88ba2b
  HARBOR_REDIS_REFERENCE: dhi/harbor-redis:2.15.1-debian13@sha256:a4fab4f3128e95f5d7eee38c5d6aebbfbcbd66d380f90c6449eb0a7ab5a09de5
  HARBOR_REGISTRY_REFERENCE: dhi/harbor-registry:2.15.1-debian13@sha256:43f9a59593ca975dab2e298480548648cd2a59d2ee2a76fbc6d44f316fa462b4
  HARBOR_REGISTRYCTL_REFERENCE: dhi/harbor-registryctl:2.15.1-debian13@sha256:d54af5e1cbd242eb0239638d7146cb2af40fc3547bd89a47e769cfb848ed46c7
  HARBOR_TRIVY_ADAPTER_REFERENCE: dhi/harbor-trivy-adapter:2.15.1-debian13@sha256:b0e064e78900c51975751933638a9bd20aa1688e214e60b799d9e0731bc3042d
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:ece8efeb889adab72837b0042d8419283ac7fdf2b5c2c8fe09a34e4b8a34ae2e
  NGINX_REFERENCE: dhi/nginx:1.31.1-debian13@sha256:4aca154cf2aaa8fe05bb6c156d963227c0498e756b40b97c86aa76685c5ec3e3
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
  SEMVER_MAJOR_VERSION: "1"
