vars:
  CHART_COMMIT_SHA: ae011519ef17a47478a3639d7680902c6adcb0a5
  CHART_HELM_NAME: harbor-chart
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HARBOR_CORE_REFERENCE: dhi/harbor-core:2.15.2-debian13@sha256:325c097c77f6bd5946aa031ab4fcbf241bd0adc681acaa906ece59866376f776
  HARBOR_DB_REFERENCE: dhi/harbor-db:2.15.2-debian13@sha256:759f1eb6835a063245be10a7b8e5d4c8d7444d24f91bf8cd4f1fcd72fc468fb7
  HARBOR_EXPORTER_REFERENCE: dhi/harbor-exporter:2.15.2-debian13@sha256:c227eea2158947dc82fb692fa498996c4a350f25e56a763f28db8bd70c03d337
  HARBOR_JOBSERVICE_REFERENCE: dhi/harbor-jobservice:2.15.2-debian13@sha256:a2a706a6a53b84fdfac7508a59ec542adc8342f9259b435da55a637cfa7ccb15
  HARBOR_PORTAL_REFERENCE: dhi/harbor-portal:2.15.1-debian13@sha256:0e95c567dec86026aa26043dcbb9ac3a5fb55fc6080c90b9aa1851b0f021d480
  HARBOR_REDIS_REFERENCE: dhi/harbor-redis:2.15.1-debian13@sha256:1a0cb500eb49b12a260b1517c3ed7cf4f020df46a1651984c4485e880ac19bc6
  HARBOR_REGISTRY_REFERENCE: dhi/harbor-registry:2.15.2-debian13@sha256:ab0335e1410428be2d46b281b3d8954c88f2f9d55d0f999d62effda6357b4542
  HARBOR_REGISTRYCTL_REFERENCE: dhi/harbor-registryctl:2.15.2-debian13@sha256:3c667d26642e1b50c133f4b05b65bf04312c73e84e13a8547dafd92b2eac0a43
  HARBOR_TRIVY_ADAPTER_REFERENCE: dhi/harbor-trivy-adapter:2.15.2-debian13@sha256:419b66eb0b198cf4e30e7fe8f73a34e7b05391f784b4e0e28c26e40912800d0f
  HELM_REFERENCE: dhi/helm:3.21.2-debian13-dev@sha256:e30b522f3f39307b7710b304f082f76d7b8fc0d0140bfc44bdf2892c5411519f
  NGINX_REFERENCE: dhi/nginx:1.31.2-debian13@sha256:de8730b879576024c97094e2b5d2001a7a4f10f46d1058ec5bad48fe64f740c4
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.19.1
