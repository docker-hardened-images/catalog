core:
  image:
    repository: ${harbor-core.registry}/${harbor-core.repository}
    tag: ${harbor-core.tag}@${harbor-core.digest}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532

