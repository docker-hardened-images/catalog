  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.5.1@sha256:13308afb46e545abd6ec6fc1912ae90890232ad61c2dd807d53abfba60215f2d
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:f392090dca44d043b5fe1cf343bf14239ef218ad8022fdfb0fd6ec00b9126703
