  PUSHGATEWAY_CHART_REFERENCE: dhi/pushgateway-chart:3.6.1@sha256:64e3b87e481c22445e5fce9ffecc59fe8daff16406eb0b713b8db326a667e80c
  SEMVER_MAJOR_MINOR_VERSION: "28.16"
