  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:6506c914dff9353ce03ce64c8d30089cf14419d8d39f026c53917e1451fb8b21
  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.4.0@sha256:fc987438404b9a0a5f0622e614a7285af7391bac84c540bb6cd8b6ea3283cd8f
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:434f557ff556a81809f7fdc29c108cfcf7eec1a66c20d65846b93386cbb546b1
  PROMETHEUS_CONFIG_RELOADER_REFERENCE: dhi/prometheus-config-reloader:0.91.0-debian13@sha256:9059451f6d9cc61a5c88f5c59033739b7ab69fd13b78fdbfa50d7264fd57aed8
  PROMETHEUS_REFERENCE: dhi/prometheus:3.11.3-debian13@sha256:e7e82ee5d73f7b5eaabc0e23e0160059dcfe01bfbd78609e4ca865a10cfa995a
  PUSHGATEWAY_CHART_REFERENCE: dhi/pushgateway-chart:3.6.0@sha256:32d6a65df20285dda969eb2a9c4b385cb59acde409965623bfebe088f6f7188c
  SEMVER_MAJOR_MINOR_VERSION: "28.16"
  SEMVER_MAJOR_VERSION: "28"
  SEMVER_VERSION: 28.16.0
