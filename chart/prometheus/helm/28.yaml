contents:
  builds:
    - name: prometheus-chart
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:caa7223ddf8951e9bb159f921683e515361321ccf67c103981ffea2ae14a64eb
      contents:
        files:
          - url: git+https://github.com/prometheus-community/helm-charts.git#prometheus-28.13.0
            checksum: f738b5d4d5a325223701e4d5ba30d95c46e10bb9
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/prometheus
          with:
            chart:
              appRef: prometheus
              dependencies:
                - alias: alertmanager
                  condition: alertmanager.enabled
                  name: alertmanager
                  ref: dhi/alertmanager-chart:1.33.1@sha256:0670e14da407af6c2a6f614d6b028bcfa45d775cf48380a828f4bc4bb27a86cf
                - alias: kube-state-metrics
