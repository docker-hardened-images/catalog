  PUSHGATEWAY_CHART_REFERENCE: dhi/pushgateway-chart:3.6.1@sha256:728bbc084f1fc9e876b41aab9d2f664c72dcf9484486fc18a3bcc6505526dc5a
  SEMVER_MAJOR_MINOR_VERSION: "28.16"
