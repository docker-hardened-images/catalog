  PUSHGATEWAY_CHART_REFERENCE: dhi/pushgateway-chart:3.6.0@sha256:35e6fae8f9a539811469dc452bff54c4efec399d64d81b08ace782eb963bc595
  SEMVER_MAJOR_MINOR_VERSION: "28.16"
