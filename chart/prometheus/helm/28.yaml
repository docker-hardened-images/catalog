  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.5.1@sha256:5b431de40e43c031c0e0065f0a4dff8bf6516d26c9dfbdd5b33a2da238793ea2
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:101f27dbaf217fc25670ae4a9cc1c8813ccf5636be02d94c3ac387ffc1668ba8
  PROMETHEUS_CONFIG_RELOADER_REFERENCE: dhi/prometheus-config-reloader:0.92.0-debian13@sha256:8dab4f459f8d9fee5c5c90aa72cff68507ad7a44042c2917b5def13b5d8ff857
