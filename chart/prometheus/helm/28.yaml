  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.3.0@sha256:432cc6404093ce1860cde36940d8a861e53db1f02778eaf395cd894f765acb2e
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:02c03bf85f640a6e23e87b19d563630f1b0ff39dccaaa74d4e5094de82c800cb
