  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.4.1@sha256:d44a4210f04c67f8bc838a0a3e894d7556f098538c5323cf69e96d65dec0856c
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:40980b5ff48ca673f4589c65abdc8a43241152cf36473fbcd1c5d32bb2e99c1c
  PROMETHEUS_CONFIG_RELOADER_REFERENCE: dhi/prometheus-config-reloader:0.91.0-debian13@sha256:b1c2fee8e80da925328f7a24f940468dda23164c56ef7674a3d60deb79e2441d
