  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.5.1@sha256:e08fd5253806f2fe8d38958e7a6e9538aaf6c62b85d29def0364ace9c413ccd5
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:058307ef26bbf8a33636ad2be0aeb6742f864eff859e1b117a166784cb3186c7
