contents:
  builds:
    - name: prometheus-chart
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:5c85f22e85fe6e1299ff8fff613b5868320b157297a8b3ff08e5d0bbbbf6cbe9
      contents:
        files:
          - url: git+https://github.com/prometheus-community/helm-charts.git#prometheus-28.13.0
            checksum: f738b5d4d5a325223701e4d5ba30d95c46e10bb9
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/prometheus
          with:
            chart:
              appRef: prometheus
              dependencies:
                - alias: alertmanager
                  condition: alertmanager.enabled
                  name: alertmanager
                  ref: dhi/alertmanager-chart:1.33.1@sha256:3d871653a97cd00ff656362adf330dadb7baf58746ab3d896bf683b5ee05c2bd
                - alias: kube-state-metrics
                  condition: kube-state-metrics.enabled
                  name: kube-state-metrics
                  ref: dhi/kube-state-metrics-chart:7.2.0@sha256:3a65beb2c5a6a3796af3b8c2633131a89236998435db2327c50c15a347f454f7
                - alias: prometheus-node-exporter
                  condition: prometheus-node-exporter.enabled
                  name: prometheus-node-exporter
                  ref: dhi/node-exporter-chart:4.52.0@sha256:15deb98bd1436c39ff8b1a6da373d2c6a2b9e5f53fabaad861c442ff01d24fe2
                - alias: prometheus-pushgateway
                  condition: prometheus-pushgateway.enabled
                  name: prometheus-pushgateway
                  ref: dhi/pushgateway-chart:3.6.0@sha256:1a4cdcb8faab121737114f69c93a5018e9b0e79abeaa57650cde5f260f56618a
              description: Docker Hardened Images Helm chart for Prometheus
              images:
                - name: prometheus
                  ref: dhi/prometheus:3.10.0-debian13@sha256:8227ed84fe2a297c5f8f9138391c1717351babead4dc085c98a23164c6afd11f
                - name: prometheus-config-reloader
                  ref: dhi/prometheus-config-reloader:0.89.0-debian13@sha256:1b89f998db370c01034d298d9eaf28d6d6804c89fcc169e3b952b46f16dcd14d
              name: prometheus-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/prometheus-community/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/prometheus
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: prometheus
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: prometheus
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: prometheus
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/prometheus/config
