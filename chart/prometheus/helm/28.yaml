  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.3.0@sha256:00f03ef70a9b8470fb2b8164b542d5ec61e1c55d354cb93c0680ea6a6c2fa2da
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:bcca73f44ac3ab21fd8da1cf049ebb34121897379e73a32eb62b703ebe1d7d34
  PROMETHEUS_CONFIG_RELOADER_REFERENCE: dhi/prometheus-config-reloader:0.91.0-debian13@sha256:24919cbe711d49dc829edab4d6fcf0b1f1f5f5ec5d2ebf256c0f4ff904501e68
