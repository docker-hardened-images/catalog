vars:
  ALERTMANAGER_CHART_REFERENCE: dhi/alertmanager-chart:1.37.0@sha256:99376aabb0d35a3ff7a2a84682ebf002a11ed0e70a41194ed21a3358b0be5dfa
  CHART_COMMIT_SHA: 97de013b787ae602d8c24e12f6a82c9bb716927e
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
