  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.2.0@sha256:f90fa906ce5a8e3f13f20d22f2f897bf7eb7c69011b3360ef30e5ad0d0e2d872
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.52.0@sha256:94e4cd4f063305fbd1221fdd180c99cf3160496ea094bb2e0c13af648ea59990
  PROMETHEUS_CONFIG_RELOADER_REFERENCE: dhi/prometheus-config-reloader:0.89.0-debian13@sha256:d5714037f45b1375838a0ddd0886b24385cc00d5c503d92878668d8da431b88d
