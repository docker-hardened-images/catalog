  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.4.0@sha256:a33f7f892369650410b16c396f35116fc211628edc50e8d29728de57257ed9ed
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:1fb8c04be094919fb5add4a371e68b331184c4c8ad46f36c73c79c1dc1e5887b
