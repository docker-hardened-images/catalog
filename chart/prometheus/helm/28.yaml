  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.4.0@sha256:20df4159bdc1c9ad2b4619d4ce44c405cb1e621cd7384287a02fe58ae241678e
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:f1d3e636060c44bc1f4d0d9603d471fd7ad4a267db25e06a316d01789f7212c5
