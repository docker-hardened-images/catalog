contents:
  builds:
    - name: prometheus-chart
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:a2c1b2e1c9d947d8feabde6c5ae3d2f9b1f0883a4d6cd01d49ccb0e509465920
      contents:
        files:
          - url: git+https://github.com/prometheus-community/helm-charts.git#prometheus-28.13.0
            checksum: f738b5d4d5a325223701e4d5ba30d95c46e10bb9
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/prometheus
          with:
            chart:
              appRef: prometheus
              dependencies:
                - alias: alertmanager
                  condition: alertmanager.enabled
                  name: alertmanager
                  ref: dhi/alertmanager-chart:1.33.1@sha256:94e3bf9de46db0fc7523d24ea6eef003943ed5b9b8c4a88ac5bbced54b20783b
                - alias: kube-state-metrics
                  condition: kube-state-metrics.enabled
