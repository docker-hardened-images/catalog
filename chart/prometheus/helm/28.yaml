  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.5.1@sha256:9b7a309f77994b019effc3719ad4876f994b436fc6005e3b43ae013598964dda
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:75710fe711fc50685b9d321fd9e47a5993fe3f3f24cad6989deca1eafef3fb3c
  PROMETHEUS_CONFIG_RELOADER_REFERENCE: dhi/prometheus-config-reloader:0.92.0-debian13@sha256:8dab4f459f8d9fee5c5c90aa72cff68507ad7a44042c2917b5def13b5d8ff857
