  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.5.1@sha256:168c9d7d9facd305eb9318a28c9610155c25894dd0ce633fa08220622cdbc153
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:f12e63e9869e9e51c31bb7588c403b03dd551a8128230f6db2b34196fd3210e7
