  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.4.0@sha256:4a214f391e057dd6a64ff0035c0940a18225d2924f5419637a602b9de309d449
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:3004f61c2868318fd9258b480c2bc33f573258879a811f230fc98ced076d92a5
