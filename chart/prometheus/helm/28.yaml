  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:81e04bdcbc4f86f57589672220b5fcd235d616d28038aec4511068678778db66
  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.2.2@sha256:00f4ce6c439dda6dd8ddd8081c3de90dc547de7b30de4c3ef17651f65e1ac5cf
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.53.1@sha256:117af470e20391c54c507b91af58c3a6c8aee74a71dee48eaaa4a54e030c8d24
  PROMETHEUS_CONFIG_RELOADER_REFERENCE: dhi/prometheus-config-reloader:0.90.1-debian13@sha256:750497b751f579e7b294be5c9e72d07032107675c17468575c18f45452aaf94a
  PROMETHEUS_REFERENCE: dhi/prometheus:3.11.2-debian13@sha256:5ed8d94e3bed201d1894dceff763545dbaf4bbbe3ab5d72d7e0494a26abe92b9
  PUSHGATEWAY_CHART_REFERENCE: dhi/pushgateway-chart:3.6.0@sha256:89bbad18f153a23641536b3d58017b213890e626baf80e97d8dca211f8c7612c
  SEMVER_MAJOR_MINOR_VERSION: "28.16"
  SEMVER_MAJOR_VERSION: "28"
  SEMVER_VERSION: 28.16.0
