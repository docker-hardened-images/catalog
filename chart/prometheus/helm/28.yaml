  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.2.1@sha256:514f06506cc50a5831d7b1c2dc79e768ef77586b7b26b19b138123a5d599fe55
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.52.1@sha256:cdd0ef3b4f23c330ca7b152bbcb1bd790915742adc23421a97ce0b781f222781
