contents:
  builds:
    - name: prometheus-chart
      uses: dhi.io/helm:3.20.0-debian13-dev@sha256:a47c7c4dc9515ff085e34c4862a6195c758607dee70883d757eeae8c27fc18da
      contents:
        files:
          - url: git+https://github.com/prometheus-community/helm-charts.git#prometheus-28.13.0
            checksum: f738b5d4d5a325223701e4d5ba30d95c46e10bb9
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/prometheus
          with:
            chart:
              appRef: prometheus
              dependencies:
                - alias: alertmanager
                  condition: alertmanager.enabled
                  name: alertmanager
                  ref: dhi/alertmanager-chart:1.33.1@sha256:22a931a4140745f0914ea91c3685a6f7bfeab005deb32e0abccc1beae9605275
                - alias: kube-state-metrics
                  condition: kube-state-metrics.enabled
                  name: kube-state-metrics
                  ref: dhi/kube-state-metrics-chart:7.2.0@sha256:f90fa906ce5a8e3f13f20d22f2f897bf7eb7c69011b3360ef30e5ad0d0e2d872
                - alias: prometheus-node-exporter
                  condition: prometheus-node-exporter.enabled
                  name: prometheus-node-exporter
                  ref: dhi/node-exporter-chart:4.52.0@sha256:94e4cd4f063305fbd1221fdd180c99cf3160496ea094bb2e0c13af648ea59990
                - alias: prometheus-pushgateway
                  condition: prometheus-pushgateway.enabled
                  name: prometheus-pushgateway
                  ref: dhi/pushgateway-chart:3.6.0@sha256:00f73ca246eb29187cee0097c30accfe9f04d95bb2f8c0690cf1947271b4beec
              description: Docker Hardened Images Helm chart for Prometheus
              images:
                - name: prometheus
                  ref: dhi/prometheus:3.10.0-debian13@sha256:a2e7e38627a345f5ba4107836a75ead92565231b7c51f42ee0541e5d027ae266
                - name: prometheus-config-reloader
                  ref: dhi/prometheus-config-reloader:0.89.0-debian13@sha256:d5714037f45b1375838a0ddd0886b24385cc00d5c503d92878668d8da431b88d
              name: prometheus-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/prometheus-community/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/prometheus
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: prometheus
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: prometheus
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: prometheus
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/prometheus/config
