  PUSHGATEWAY_CHART_REFERENCE: dhi/pushgateway-chart:3.6.1@sha256:445f16f1792df2d56078c196e01296f2dd1c097a30a6ea104728ec7669a13d62
  SEMVER_MAJOR_MINOR_VERSION: "28.16"
