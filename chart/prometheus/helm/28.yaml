contents:
  builds:
    - name: prometheus-chart
      uses: dhi.io/helm:3.21.2-debian13-dev@sha256:aa1acd0afb2bea944b2f95bf3e3e675892ff28fb38bed35d2894cf0e20f5fc68
      contents:
        files:
          - url: git+https://github.com/prometheus-community/helm-charts.git#prometheus-28.16.0
            checksum: 97de013b787ae602d8c24e12f6a82c9bb716927e
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/prometheus
          with:
            chart:
              appRef: prometheus
              dependencies:
                - alias: alertmanager
                  condition: alertmanager.enabled
                  name: alertmanager
                  ref: dhi/alertmanager-chart:1.40.0@sha256:e7d3f54ac03646c8ba296f5434536096eec0eba5351aaa1f04394b58810ce8ca
                - alias: kube-state-metrics
