  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.4.0@sha256:4e82b6ea115f34364b4788b85180c23176b2e503555426d02195557b53577b28
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:1191a3a009ecc5a4db8a8c7441e2ef2700c6432953954c838eee8674c4113c61
  PROMETHEUS_CONFIG_RELOADER_REFERENCE: dhi/prometheus-config-reloader:0.91.0-debian13@sha256:6e7365520cc30a2eebf42b72fdbe9bdc7629d26fe939bad24af2aa2f05c9bcdd
