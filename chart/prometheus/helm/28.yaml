  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.4.0@sha256:2640b6a5fbb13cd83a48202d40c47b7ee0735da5d222aff43a4cb1d56b3c6233
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:20ba150ad1b2ed3145db888b792264a24f10415a33918a77a38d6092193ba755
