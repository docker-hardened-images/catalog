contents:
  builds:
    - name: prometheus-chart
      uses: dhi.io/helm:3.21.1-debian13-dev@sha256:85f1eee85289b262fe18b0b02fbc399c910257f95d45135fa75ad7d6e7c30073
      contents:
        files:
          - url: git+https://github.com/prometheus-community/helm-charts.git#prometheus-28.16.0
            checksum: 97de013b787ae602d8c24e12f6a82c9bb716927e
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/prometheus
          with:
            chart:
              appRef: prometheus
              dependencies:
                - alias: alertmanager
                  condition: alertmanager.enabled
                  name: alertmanager
                  ref: dhi/alertmanager-chart:1.39.2@sha256:c936eaa59e4859560088a6ad5e5e0b52870c1ab7fc934259f35cdf548e3a3d7f
                - alias: kube-state-metrics
                  condition: kube-state-metrics.enabled
                  name: kube-state-metrics
                  ref: dhi/kube-state-metrics-chart:7.5.1@sha256:e08fd5253806f2fe8d38958e7a6e9538aaf6c62b85d29def0364ace9c413ccd5
                - alias: prometheus-node-exporter
                  condition: prometheus-node-exporter.enabled
                  name: prometheus-node-exporter
                  ref: dhi/node-exporter-chart:4.55.0@sha256:058307ef26bbf8a33636ad2be0aeb6742f864eff859e1b117a166784cb3186c7
                - alias: prometheus-pushgateway
                  condition: prometheus-pushgateway.enabled
                  name: prometheus-pushgateway
                  ref: dhi/pushgateway-chart:3.6.1@sha256:e718475ece37afa3e8ecce512a8070537ddbbf1393594c2c63e590ed988a9461
              description: Docker Hardened Images Helm chart for Prometheus
              images:
                - name: prometheus
                  ref: dhi/prometheus:3.12.0-debian13@sha256:7136ea7a0ef99cf403c6733075af4a92df595a4737e5ba94b3f6334b6a5fbb14
                - name: prometheus-config-reloader
                  ref: dhi/prometheus-config-reloader:0.92.0-debian13@sha256:8dab4f459f8d9fee5c5c90aa72cff68507ad7a44042c2917b5def13b5d8ff857
              name: prometheus-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/prometheus-community/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/prometheus
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: prometheus
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: prometheus
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: prometheus
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/prometheus/config
