  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.2.2@sha256:5c9a64b59d8af1d8b18945f09684a2d5f044ec8c3d4f527a7a0565d8b0e8945e
