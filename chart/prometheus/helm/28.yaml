contents:
  builds:
    - name: prometheus-chart
      uses: dhi.io/helm:3.21.1-debian13-dev@sha256:e5cfccc69a0530425518e5a85bf37ebdff9284f7d0e1542cf69ea311dce747ca
      contents:
        files:
          - url: git+https://github.com/prometheus-community/helm-charts.git#prometheus-28.16.0
            checksum: 97de013b787ae602d8c24e12f6a82c9bb716927e
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/prometheus
          with:
            chart:
              appRef: prometheus
              dependencies:
                - alias: alertmanager
                  condition: alertmanager.enabled
                  name: alertmanager
                  ref: dhi/alertmanager-chart:1.40.0@sha256:cc1310fda5aba689485b8d09844cf528ae28bb72f444aba34a0a451356bebc2a
                - alias: kube-state-metrics
                  condition: kube-state-metrics.enabled
                  name: kube-state-metrics
                  ref: dhi/kube-state-metrics-chart:7.5.1@sha256:5b431de40e43c031c0e0065f0a4dff8bf6516d26c9dfbdd5b33a2da238793ea2
                - alias: prometheus-node-exporter
                  condition: prometheus-node-exporter.enabled
                  name: prometheus-node-exporter
                  ref: dhi/node-exporter-chart:4.55.0@sha256:101f27dbaf217fc25670ae4a9cc1c8813ccf5636be02d94c3ac387ffc1668ba8
                - alias: prometheus-pushgateway
                  condition: prometheus-pushgateway.enabled
                  name: prometheus-pushgateway
                  ref: dhi/pushgateway-chart:3.6.1@sha256:64e3b87e481c22445e5fce9ffecc59fe8daff16406eb0b713b8db326a667e80c
              description: Docker Hardened Images Helm chart for Prometheus
              images:
                - name: prometheus
                  ref: dhi/prometheus:3.12.0-debian13@sha256:7136ea7a0ef99cf403c6733075af4a92df595a4737e5ba94b3f6334b6a5fbb14
                - name: prometheus-config-reloader
                  ref: dhi/prometheus-config-reloader:0.92.0-debian13@sha256:8dab4f459f8d9fee5c5c90aa72cff68507ad7a44042c2917b5def13b5d8ff857
              name: prometheus-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/prometheus-community/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/prometheus
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: prometheus
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: prometheus
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: prometheus
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/prometheus/config
