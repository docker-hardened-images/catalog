contents:
  builds:
    - name: prometheus-chart
      uses: dhi.io/helm:3.20.1-debian13-dev@sha256:d2ca66cc4bd7708b7cdd363360f608a9450f24dac43da8183d9d610031123f81
      contents:
        files:
          - url: git+https://github.com/prometheus-community/helm-charts.git#prometheus-28.16.0
            checksum: 97de013b787ae602d8c24e12f6a82c9bb716927e
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/prometheus
          with:
            chart:
              appRef: prometheus
              dependencies:
                - alias: alertmanager
                  condition: alertmanager.enabled
                  name: alertmanager
                  ref: dhi/alertmanager-chart:1.35.0@sha256:559762c86dc6daeaf3b4ef3d7b7f29c38b862d46a359725ff64b3246a515b345
                - alias: kube-state-metrics
                  condition: kube-state-metrics.enabled
                  name: kube-state-metrics
                  ref: dhi/kube-state-metrics-chart:7.2.2@sha256:559297e8bd4b10824be0879d820f355a195621b113d5cbda17e9b644c3080134
                - alias: prometheus-node-exporter
                  condition: prometheus-node-exporter.enabled
                  name: prometheus-node-exporter
                  ref: dhi/node-exporter-chart:4.53.1@sha256:f71656a6d18ae4282ee6f41b71a9ab0e6202acff2f35368b7bb097ac3839d08c
                - alias: prometheus-pushgateway
                  condition: prometheus-pushgateway.enabled
                  name: prometheus-pushgateway
                  ref: dhi/pushgateway-chart:3.6.0@sha256:f01e8ebbe829c874441678097ff30ef78a46a9d7c09620283a431ca7dcc02b23
              description: Docker Hardened Images Helm chart for Prometheus
              images:
                - name: prometheus
                  ref: dhi/prometheus:3.11.1-debian13@sha256:83914d1d67fd13765603e2734e9b6796fe713a2e7e03c6b06587f056bbcee7f6
                - name: prometheus-config-reloader
                  ref: dhi/prometheus-config-reloader:0.90.1-debian13@sha256:750497b751f579e7b294be5c9e72d07032107675c17468575c18f45452aaf94a
              name: prometheus-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/prometheus-community/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/prometheus
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: prometheus
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: prometheus
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: prometheus
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/prometheus/config
