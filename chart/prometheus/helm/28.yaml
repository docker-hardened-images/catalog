contents:
  builds:
    - name: prometheus-chart
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:bf8a03f405f8a317925ae232b32a1d29943a57b019dabfb0b7d0e624f558baf2
      contents:
        files:
          - url: git+https://github.com/prometheus-community/helm-charts.git#prometheus-28.16.0
            checksum: 97de013b787ae602d8c24e12f6a82c9bb716927e
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/prometheus
          with:
            chart:
              appRef: prometheus
              dependencies:
                - alias: alertmanager
                  condition: alertmanager.enabled
                  name: alertmanager
                  ref: dhi/alertmanager-chart:1.36.0@sha256:0fae9ab09e657f6eef1ac72acf8761389219cafdfc40ba808db6bbe4ce9ac2c8
