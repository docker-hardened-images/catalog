  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.3.0@sha256:4ae9c57195c06c43b5fe38f17ddd1855a5581d154e817aa612cf8f12e29ecac5
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:c4a265d330d27f6ca3c9edee4b31a5875b3f99a1852b668d0c5a055a876841aa
  PROMETHEUS_CONFIG_RELOADER_REFERENCE: dhi/prometheus-config-reloader:0.90.1-debian13@sha256:5c852e2deb315e7e6c1fef1295a2ef1c205aec8fd7671a13b370bf324cc169bb
