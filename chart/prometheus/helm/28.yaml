  PUSHGATEWAY_CHART_REFERENCE: dhi/pushgateway-chart:3.6.0@sha256:00f73ca246eb29187cee0097c30accfe9f04d95bb2f8c0690cf1947271b4beec
  SEMVER_MAJOR_MINOR_VERSION: "28.13"
  SEMVER_MAJOR_VERSION: "28"
