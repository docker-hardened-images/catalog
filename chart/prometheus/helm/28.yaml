  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.4.0@sha256:0d6b636177ef551753e6cc93ce0b4e78b19c8f092f4fe957c91dc6ef7d41b34d
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.55.0@sha256:2b81eeb4ac74a5e567cb94bbcb4d53dd028887d414f1d92a8592dd2f398ff628
  PROMETHEUS_CONFIG_RELOADER_REFERENCE: dhi/prometheus-config-reloader:0.91.0-debian13@sha256:37dd0f54c4859d13d42d5cc711c3fc8235f65af8cbbd8723d7a56dcade163a27
