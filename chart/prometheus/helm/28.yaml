  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:81e04bdcbc4f86f57589672220b5fcd235d616d28038aec4511068678778db66
  KUBE_STATE_METRICS_CHART_REFERENCE: dhi/kube-state-metrics-chart:7.2.2@sha256:8881d55dc56b6a8465e6c0c1f0f4d9d81e51e8082f84320ffafed49b6dedb8b7
  NODE_EXPORTER_CHART_REFERENCE: dhi/node-exporter-chart:4.53.1@sha256:3aba435b958c9fc2b8ad19171b95e7081e5428f854bdcac12f911299671b1efe
  PROMETHEUS_CONFIG_RELOADER_REFERENCE: dhi/prometheus-config-reloader:0.90.1-debian13@sha256:750497b751f579e7b294be5c9e72d07032107675c17468575c18f45452aaf94a
  PROMETHEUS_REFERENCE: dhi/prometheus:3.11.2-debian13@sha256:62a22ea6ee0fa15715367a09be58adf6ca0304cd6d628305fa3c442c3c479b86
  PUSHGATEWAY_CHART_REFERENCE: dhi/pushgateway-chart:3.6.0@sha256:932d761d9f5e8be57ca487af035d9a006b61274ad77f1606a9bc8c0d797d61bd
  SEMVER_MAJOR_MINOR_VERSION: "28.16"
  SEMVER_MAJOR_VERSION: "28"
  SEMVER_VERSION: 28.16.0
