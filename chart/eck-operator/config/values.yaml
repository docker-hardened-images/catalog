# Docker Hardened Images configuration for ECK Operator

image:
  repository: ${eck-operator.registry}/${eck-operator.repository}
  tag: ${eck-operator.tag}@${eck-operator.digest}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
