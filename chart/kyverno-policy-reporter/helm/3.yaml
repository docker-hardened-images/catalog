# syntax=dhi.io/build:2-helm3

name: Kyverno Policy Reporter Helm chart 3.x
image: dhi.io/kyverno-policy-reporter-chart
variant: helm
tags:
  - 3.7.4
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 71a856db524dd10d99dd6a7891aef34408a53ca4
  CHART_HELM_NAME: kyverno-policy-reporter-chart
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.2-debian13-dev@sha256:e30b522f3f39307b7710b304f082f76d7b8fc0d0140bfc44bdf2892c5411519f
  POLICY_REPORTER_IMAGE_TAG: 3.7.5
  POLICY_REPORTER_REFERENCE: dhi/kyverno-policy-reporter:3.7.5-debian13@sha256:c470139c4622e89f345bef44a15ff385ecec2f09aacf4a003a3acbbc89cd25ab
  POLICY_REPORTER_UI_IMAGE_TAG: 2.5.4
  POLICY_REPORTER_UI_REFERENCE: dhi/kyverno-policy-reporter-ui:2.5.4-debian13@sha256:05f771bb69230ff0a9b49656c92311466514fc7656da3f17eaf43b763abf0d9f
  SEMVER_MAJOR_MINOR_VERSION: "3.7"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.7.4
  TRIVY_IMAGE_TAG: 0.71.2
  TRIVY_REFERENCE: dhi/trivy:0.71.2-debian13@sha256:2c37b26805b44e1003dfd58679166efce12ba6b01ecf1b39b802a5d4fe3230f4
  VERSION: 3.7.4
contents:
  builds:
    - name: kyverno-policy-reporter
      uses: dhi.io/helm:3.21.2-debian13-dev@sha256:e30b522f3f39307b7710b304f082f76d7b8fc0d0140bfc44bdf2892c5411519f
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/kyverno/policy-reporter.git#policy-reporter-3.7.4
            checksum: 71a856db524dd10d99dd6a7891aef34408a53ca4
            path: ${source.dir}/policy-reporter
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/policy-reporter/charts/policy-reporter
          with:
            chart:
              appRef: kyverno-policy-reporter
              description: Docker Hardened Images Helm chart for Kyverno Policy Reporter
              images:
                - name: kyverno-policy-reporter
                  ref: dhi/kyverno-policy-reporter:3.7.5-debian13@sha256:c470139c4622e89f345bef44a15ff385ecec2f09aacf4a003a3acbbc89cd25ab
                - name: kyverno-policy-reporter-ui
                  ref: dhi/kyverno-policy-reporter-ui:2.5.4-debian13@sha256:05f771bb69230ff0a9b49656c92311466514fc7656da3f17eaf43b763abf0d9f
                - name: trivy
                  ref: dhi/trivy:0.71.2-debian13@sha256:2c37b26805b44e1003dfd58679166efce12ba6b01ecf1b39b802a5d4fe3230f4
              name: kyverno-policy-reporter-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/kyverno/policy-reporter
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/policy-reporter/charts/policy-reporter
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: blank 3rd party plugin images
          work-dir: ${source.dir}/policy-reporter/charts/policy-reporter
          runs: |
            set -eux -o pipefail

            # Blank out the 3rd party image for kyverno-plugin by matching the specific values path
            sed -i 's|^\([[:space:]]*\)image: "{{ .Values.plugin.kyverno.image.registry }}/{{ .Values.plugin.kyverno.image.repository }}:{{ .Values.plugin.kyverno.image.tag }}"|\1image: "" #THIS IMAGE IS NOT IN THE DHI CATALOG YET, PLEASE CONTACT THE DOCKER TEAM IF NEEDED|' ./templates/plugins/kyverno/deployment.yaml

            # Blank out the 3rd party image for trivy-plugin (NOT the trivy CLI which uses plugin.trivy.cli.image)
            sed -i 's|^\([[:space:]]*\)image: "{{ .Values.plugin.trivy.image.registry }}/{{ .Values.plugin.trivy.image.repository }}:{{ .Values.plugin.trivy.image.tag }}"|\1image: "" #THIS IMAGE IS NOT IN THE DHI CATALOG YET, PLEASE CONTACT THE DOCKER TEAM IF NEEDED|' ./templates/plugins/trivy/deployment.yaml
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/policy-reporter/charts
          with:
            chart: policy-reporter
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/policy-reporter/charts/policy-reporter
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/kyverno-policy-reporter/config
