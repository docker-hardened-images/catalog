# syntax=dhi.io/build:2-helm3

name: Kyverno Policy Reporter Helm chart 3.x
image: dhi.io/kyverno-policy-reporter-chart
variant: helm
tags:
  - 3.7.3
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: 844d8d870b8ab5ced05a44c6d887add4dc57516a
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:d3fce3e86c736f8a0d6006a879b3b3eb64074766065f62bcd67cef3c0fa6b848
  POLICY_REPORTER_IMAGE_TAG: 3.7.3
  POLICY_REPORTER_REFERENCE: dhi/kyverno-policy-reporter:3.7.3-debian13@sha256:e0ed876b9e494df53c72da95f6504173daa22a1c09ca96239386c65d4d9b75f4
  POLICY_REPORTER_UI_IMAGE_TAG: 2.5.1
  POLICY_REPORTER_UI_REFERENCE: dhi/kyverno-policy-reporter-ui:2.5.1-debian13@sha256:b8427dd7f434c03311fd5ab7e7089db79e0e14d32162163106f402a5b623339d
  SEMVER_MAJOR_MINOR_VERSION: "3.7"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.7.3
  TRIVY_IMAGE_TAG: 0.69.3
  TRIVY_REFERENCE: dhi/trivy:0.69.3-debian13@sha256:fb3f35dd57cb9bb62b115069b3f29a3797da9040513a166b29a7e1541875e6ca
  VERSION: 3.7.3
contents:
  builds:
    - name: kyverno-policy-reporter
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:d3fce3e86c736f8a0d6006a879b3b3eb64074766065f62bcd67cef3c0fa6b848
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/kyverno/policy-reporter.git#policy-reporter-3.7.3
            checksum: 844d8d870b8ab5ced05a44c6d887add4dc57516a
            path: ${source.dir}/policy-reporter
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/policy-reporter/charts/policy-reporter
          with:
            chart:
              appRef: kyverno-policy-reporter
              description: Docker Hardened Images Helm chart for Kyverno Policy Reporter
              images:
                - name: kyverno-policy-reporter
                  ref: dhi/kyverno-policy-reporter:3.7.3-debian13@sha256:e0ed876b9e494df53c72da95f6504173daa22a1c09ca96239386c65d4d9b75f4
                - name: kyverno-policy-reporter-ui
                  ref: dhi/kyverno-policy-reporter-ui:2.5.1-debian13@sha256:b8427dd7f434c03311fd5ab7e7089db79e0e14d32162163106f402a5b623339d
                - name: trivy
                  ref: dhi/trivy:0.69.3-debian13@sha256:fb3f35dd57cb9bb62b115069b3f29a3797da9040513a166b29a7e1541875e6ca
              name: kyverno-policy-reporter-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/kyverno/policy-reporter
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/policy-reporter/charts/policy-reporter
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: blank 3rd party plugin images
          work-dir: ${source.dir}/policy-reporter/charts/policy-reporter
          runs: |
            set -eux -o pipefail

            # Blank out the 3rd party image for kyverno-plugin by matching the specific values path
            sed -i 's|^\([[:space:]]*\)image: "{{ .Values.plugin.kyverno.image.registry }}/{{ .Values.plugin.kyverno.image.repository }}:{{ .Values.plugin.kyverno.image.tag }}"|\1image: "" #THIS IMAGE IS NOT IN THE DHI CATALOG YET, PLEASE CONTACT THE DOCKER TEAM IF NEEDED|' ./templates/plugins/kyverno/deployment.yaml

            # Blank out the 3rd party image for trivy-plugin (NOT the trivy CLI which uses plugin.trivy.cli.image)
            sed -i 's|^\([[:space:]]*\)image: "{{ .Values.plugin.trivy.image.registry }}/{{ .Values.plugin.trivy.image.repository }}:{{ .Values.plugin.trivy.image.tag }}"|\1image: "" #THIS IMAGE IS NOT IN THE DHI CATALOG YET, PLEASE CONTACT THE DOCKER TEAM IF NEEDED|' ./templates/plugins/trivy/deployment.yaml
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/policy-reporter/charts
          with:
            chart: policy-reporter
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/policy-reporter/charts/policy-reporter
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/kyverno-policy-reporter/config
