image:
  repository: ${kured.registry}/${kured.repository}
  tag: ${kured.tag}@${kured.digest}


# We use rebootMethod "signal" and useRebootSentinelHostPath to avoid running the container with privileges.
configuration:
  rebootMethod: "signal"
  # useRebootSentinelHostPath: true

# containerSecurityContext:
#   privileged: true  # Give permission to nsenter /proc/1/ns/mnt
#   readOnlyRootFilesystem: true
# #  allowPrivilegeEscalation: true # Needed when using defaultAllowPrivilegedEscalation: false in psp

# Use the following security-context when "configuration.rebootMethod=signal and configuration.useRebootSentinelHostPath=true"
# These configuration options are supported when running in unprivileged mode.
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  privileged: false
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    add:
    - KILL
    drop:
    - 'ALL'
  seccompProfile:
    type: RuntimeDefault
