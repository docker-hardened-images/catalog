name: Grafana Alloy Helm chart 1.x
image: dhi.io/alloy-chart
variant: helm
tags:
  - 1.10.0
platforms:
  - linux/amd64
vars:
  ALLOY_REFERENCE: dhi/alloy:1.16.2-debian13@sha256:094d090c58c8ce5ca7a724b38f70344c0a03ee64865643b7b303e70d23e3c67d
  CHART_COMMIT_SHA: c2f5b4fea656bc1162987216ca9ef5c60297473f
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.1-debian13-dev@sha256:210cf8f74216e3b27dc70a0cec01194863ce8b319fe089d97e6e10d8a020b666
  PROMETHEUS_CONFIG_RELOADER_REFERENCE: dhi/prometheus-config-reloader:0.91.0-debian13@sha256:b1c2fee8e80da925328f7a24f940468dda23164c56ef7674a3d60deb79e2441d
  SEMVER_MAJOR_MINOR_VERSION: "1.10"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.10.0
  VERSION: 1.10.0
contents:
  builds:
    - name: alloy
      uses: dhi.io/helm:3.21.1-debian13-dev@sha256:210cf8f74216e3b27dc70a0cec01194863ce8b319fe089d97e6e10d8a020b666
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/grafana/alloy.git#helm-chart/1.10.0
            checksum: c2f5b4fea656bc1162987216ca9ef5c60297473f
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/operations/helm/charts/alloy
          with:
            chart:
              appRef: alloy
              dependencies:
                - keep: true
                  name: crds
              description: Docker Hardened Images Helm chart for Grafana Alloy
              images:
                - name: alloy
                  ref: dhi/alloy:1.16.2-debian13@sha256:094d090c58c8ce5ca7a724b38f70344c0a03ee64865643b7b303e70d23e3c67d
                - name: prometheus-config-reloader
                  ref: dhi/prometheus-config-reloader:0.91.0-debian13@sha256:b1c2fee8e80da925328f7a24f940468dda23164c56ef7674a3d60deb79e2441d
              name: alloy-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/grafana/alloy
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/operations/helm/charts/alloy
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/operations/helm/charts
          with:
            chart: alloy
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/operations/helm/charts
          with:
            chart: alloy
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/alloy/config
