# syntax=dhi.io/build:2-helm3

name: Grafana Alloy Helm chart 1.x
image: dhi.io/alloy-chart
variant: helm
tags:
  - 1.6.1
platforms:
  - linux/amd64
vars:
  ALLOY_IMAGE_TAG: 1.12.0
  ALLOY_REFERENCE: dhi/alloy:1.13.2-debian13@sha256:84612082f801d1dd39581dea4e039e80f8cafc13edbc8542a8edb3ae24da876f
  CHART_COMMIT_SHA: e245c7effefdc283c75e0b5b4a03b4ecfa1f4552
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.20.0-debian13-dev@sha256:6261312ab3d62801e9998b99b320c623846f10685a4cc085ef39aed161a2a42e
  PROMETHEUS_CONFIG_RELOADER_REFERENCE: dhi/prometheus-config-reloader:0.89.0-debian13@sha256:1049adf98708050246a86533b31c7ab229e6033e3b9566581e673cc6a29730dc
  SEMVER_MAJOR_MINOR_VERSION: "1.6"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.6.1
  VERSION: 1.6.1
contents:
  builds:
    - name: alloy
      uses: dhi.io/helm:3.20.0-debian13-dev@sha256:6261312ab3d62801e9998b99b320c623846f10685a4cc085ef39aed161a2a42e
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/grafana/alloy.git#helm-chart/1.6.1
            checksum: e245c7effefdc283c75e0b5b4a03b4ecfa1f4552
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/operations/helm/charts/alloy
          with:
            chart:
              appRef: alloy
              dependencies:
                - keep: true
                  name: crds
              description: Docker Hardened Images Helm chart for Grafana Alloy
              images:
                - name: alloy
                  ref: dhi/alloy:1.13.2-debian13@sha256:84612082f801d1dd39581dea4e039e80f8cafc13edbc8542a8edb3ae24da876f
                - name: prometheus-config-reloader
                  ref: dhi/prometheus-config-reloader:0.89.0-debian13@sha256:1049adf98708050246a86533b31c7ab229e6033e3b9566581e673cc6a29730dc
              name: alloy-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/grafana/alloy
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/operations/helm/charts/alloy
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/operations/helm/charts
          with:
            chart: alloy
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/operations/helm/charts
          with:
            chart: alloy
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/alloy/config
