  CHART_COMMIT_SHA: c2f5b4fea656bc1162987216ca9ef5c60297473f
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.2-debian13-dev@sha256:fc6fdd4be364fc8d33537d170a24eccb64b6c087c17f81ce2f31029301909d91
  PROMETHEUS_CONFIG_RELOADER_REFERENCE: dhi/prometheus-config-reloader:0.92.0-debian13@sha256:8dab4f459f8d9fee5c5c90aa72cff68507ad7a44042c2917b5def13b5d8ff857
  SEMVER_MAJOR_MINOR_VERSION: "1.10"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.10.0
  VERSION: 1.10.0
contents:
  builds:
    - name: alloy
      uses: dhi.io/helm:3.21.2-debian13-dev@sha256:fc6fdd4be364fc8d33537d170a24eccb64b6c087c17f81ce2f31029301909d91
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/grafana/alloy.git#helm-chart/1.10.0
            checksum: c2f5b4fea656bc1162987216ca9ef5c60297473f
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/operations/helm/charts/alloy
          with:
            chart:
              appRef: alloy
              dependencies:
                - keep: true
                  name: crds
              description: Docker Hardened Images Helm chart for Grafana Alloy
              images:
                - name: alloy
                  ref: dhi/alloy:1.17.0-debian13@sha256:1bb277420bf9735ce2b5234a269d4abdc203d8b73d610732d8c0e80bda542bc9
                - name: prometheus-config-reloader
                  ref: dhi/prometheus-config-reloader:0.92.0-debian13@sha256:8dab4f459f8d9fee5c5c90aa72cff68507ad7a44042c2917b5def13b5d8ff857
              name: alloy-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/grafana/alloy
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/operations/helm/charts/alloy
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/operations/helm/charts
          with:
            chart: alloy
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/operations/helm/charts
          with:
            chart: alloy
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/alloy/config
