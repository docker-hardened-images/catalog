  GRAFANA_AGENT_REFERENCE: dhi/grafana-agent:0.44.8-debian13@sha256:05d57a2c43db52a1ec88f62eec3bff241c7813ab1f93fe0e0e757a2e883a6eb9
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:b72e12042810e0697eebb51a7862e7699f4df8eca02324029c220ccfd0bce4a4
  SEMVER_MAJOR_MINOR_VERSION: "0.5"
  SEMVER_MAJOR_VERSION: "0"
