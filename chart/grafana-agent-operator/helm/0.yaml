contents:
  builds:
    - name: grafana-agent-operator-chart
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:f9dd4a356298b0769dc4c2f718b9f564b631ddf37c19e061d61af9081bc7da13
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/grafana/helm-charts.git#grafana-agent-operator-0.5.2
            checksum: af9ef28257450b1bbf292a9de8bc42d3eeef3c42
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/agent-operator
          with:
            chart:
              appRef: grafana-agent-operator
              description: Docker Hardened Images Helm chart for Grafana Agent Operator
              images:
                - name: grafana-agent-operator
                  ref: dhi/grafana-agent-operator:0.44.8-debian13@sha256:42835577092dc7bec9be4849c20aeed9d10a5876371380df62277cb8d88ae459
                - name: grafana-agent
                  ref: dhi/grafana-agent:0.44.8-debian13@sha256:2e5214fc7905f1299e5667fb086b125af61496e15e6d255d5bea5cc222f5091a
                - name: busybox
                  ref: dhi/busybox:1.37.0-debian13@sha256:a91d3f23f20f9ab231ebefa0acf1799dd7dbad424fa4dca099762790e900f4f7
              name: grafana-agent-operator-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/grafana/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/agent-operator
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/agent-operator/templates/tests
          runs: |
            set -eux -o pipefail

            sed -i '/image: "{{ .Values.image.registry }}.*/a\
              securityContext:\
                runAsNonRoot: true\
                runAsUser: 65532\
                allowPrivilegeEscalation: false\
                seccompProfile:\
                  type: RuntimeDefault\
            ' test-grafanaagent.yaml
            sed -i 's/image: "{{ .Values.image.registry }}\/grafana\/agent:{{ .Values.image.tag }}"/image: "{{ .Values.test.grafana.image.registry }}\/{{ .Values.test.grafana.image.repository}}:{{ .Values.test.grafana.image.tag }}"/' test-grafanaagent.yaml
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: ${source.dir}/helm-charts/charts/agent-operator
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/charts/agent-operator
      paths:
        - type: directory
