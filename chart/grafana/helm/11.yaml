                - name: bats
                  ref: dhi/bats:1.13.0-debian13@sha256:d4e3d771225f4becb87d5e152e4c9c28d74a8d9595cda5cd310ce192cd310cb9
                - name: busybox
                  ref: dhi/busybox:1.37.0-debian13@sha256:ee1f963dd3d57a59ae3f99fca81b06d19d1bef7c8289ff84001e0c65f39a8464
