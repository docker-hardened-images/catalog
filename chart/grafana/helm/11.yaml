                  ref: dhi/curl:8.14.1-debian13@sha256:571b666b14e3a39be196b9b8118d2a81a1d09a206139f6e3299e2dc587725e01
                - name: k8s-sidecar
                  ref: dhi/k8s-sidecar:2.5.1-debian13@sha256:0df9e24ad6010427ac81fd51f25bee0c420404fc9f7d6ce97997c7ec53ec1469
              name: grafana-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/grafana-community/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/grafana
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: grafana
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: grafana
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/grafana/config
