global:
  images:
    envoyGateway:
      image: ${envoy-gateway.registry}/${envoy-gateway.repository}:${envoy-gateway.tag}@${envoy-gateway.digest}
      pullPolicy: IfNotPresent
    ratelimit:
      image: ${envoy-ratelimit.registry}/${envoy-ratelimit.repository}:${envoy-ratelimit.tag}@${envoy-ratelimit.digest}

config:
  envoyGateway:
    provider:
      type: Kubernetes
      kubernetes:
        envoyDeployment:
          container:
            image: ${envoy.registry}/${envoy.repository}:${envoy.tag}@${envoy.digest}
          # NOTE: Users must also configure imagePullSecrets on their EnvoyProxy CR
          # to allow proxy pods to pull from dhi.io. For example:
          #   spec.provider.kubernetes.envoyDeployment.pod.imagePullSecrets

deployment:
  envoyGateway:
    securityContext:
      runAsNonRoot: true
      runAsGroup: 65532
      runAsUser: 65532
certgen:
  job:
    securityContext:
      runAsNonRoot: true
      runAsGroup: 65532
      runAsUser: 65532
# The upstream chart already specifies this security context, repeat it here in case it would change
