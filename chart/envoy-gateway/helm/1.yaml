  VERSION: 1.7.3
contents:
  builds:
    - name: envoy-gateway-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:ed0c764ca91c1084c850f3b00e7248f9127153bb3a5803058a337ac99ba6d479
      contents:
        files:
          - url: git+https://github.com/envoyproxy/gateway.git#v1.7.3
            checksum: 669e4568e99bc3299164c27422edd5ffb0d82aba
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          with:
            chart:
              appRef: envoy-gateway
              description: Docker Hardened Images Helm chart for Envoy Gateway
              images:
                - name: envoy-gateway
                  ref: dhi/envoy-gateway:1.7.3-debian13@sha256:795d33ca1ae71b5c785347eeb6fed5b1344775223d56130914a9892b957d61c9
                - name: envoy-ratelimit
                  ref: dhi/envoy-ratelimit:58496ffc2966202624df20d74a0b47d0c30a36be-debian13@sha256:887b92e234ea6fa85b22523e81703e72254410f6632a3a4d38f42d3ab357de73
                - name: envoy
                  ref: dhi/envoy:1.38.0-debian13@sha256:d07eac39b7adcf7b8f84b2391698d91740779cbb6980912c829eefae01e7476a
              name: envoy-gateway-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/envoyproxy/gateway
            cmd: prepare
            registry: dhi.io
        - name: update version
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          with:
            file: Chart.yaml
            patches:
              - .version = "1.7.3"
        - name: rename values file
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          runs: |
            set -eux -o pipefail

            mv values.tmpl.yaml values.yaml
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: verify templated variables
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          runs: |
            set -eux -o pipefail

            if grep -E '\$\{[^}]+\}' values.yaml; then
              exit 1
            fi
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: gateway-helm
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: gateway-helm
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/envoy-gateway/config
