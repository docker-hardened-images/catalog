  ENVOY_IMAGE_REFERENCE: dhi/envoy:1.37.2-debian13@sha256:01e908d6508aaf4a251a431f26cc1a04c051fb5173efee1839f6047946faf4f4
  ENVOY_RATELIMIT_IMAGE_REFERENCE: dhi/envoy-ratelimit:05c08d0394737a24729e01519629420a4d86b865-debian13@sha256:6cee23c1c650118f095be0cdbde67dc1c8f456563e7335c8ce46f517dd9bd77c
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:81e04bdcbc4f86f57589672220b5fcd235d616d28038aec4511068678778db66
  SEMVER_MAJOR_MINOR_VERSION: "1.7"
  SEMVER_MAJOR_VERSION: "1"
