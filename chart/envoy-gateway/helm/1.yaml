  ENVOY_IMAGE_REFERENCE: dhi/envoy:1.37.1-debian13@sha256:034dc62dc83b95d7817fe19851de847efa1e03f972e71c227e01abb2a2515878
  ENVOY_RATELIMIT_IMAGE_REFERENCE: dhi/envoy-ratelimit:05c08d0394737a24729e01519629420a4d86b865-debian13@sha256:9588a76dfbb1c7fabd4bbbf83f577185821bee600ab4e56d6c3319a5deca9d61
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:c7510bdef2d5afba3a1c80b20b836748adaab6991684962b98460d7a36dcdfa4
  SEMVER_MAJOR_MINOR_VERSION: "1.7"
  SEMVER_MAJOR_VERSION: "1"
