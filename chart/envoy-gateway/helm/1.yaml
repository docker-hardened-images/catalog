contents:
  builds:
    - name: envoy-gateway-chart
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:81e04bdcbc4f86f57589672220b5fcd235d616d28038aec4511068678778db66
      contents:
        files:
          - url: git+https://github.com/envoyproxy/gateway.git#v1.7.2
            checksum: 097611e4ec6f2736ef601515a4126fc4e9fdb0fb
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          with:
            chart:
              appRef: envoy-gateway
              description: Docker Hardened Images Helm chart for Envoy Gateway
              images:
                - name: envoy-gateway
                  ref: dhi/envoy-gateway:1.7.2-debian13@sha256:cb19e1e2f7d8ff365cc9c129f6e7a7664f191b15618f54fa1cb82f0327c17730
                - name: envoy-ratelimit
                  ref: dhi/envoy-ratelimit:05c08d0394737a24729e01519629420a4d86b865-debian13@sha256:6cee23c1c650118f095be0cdbde67dc1c8f456563e7335c8ce46f517dd9bd77c
                - name: envoy
                  ref: dhi/envoy:1.37.2-debian13@sha256:01e908d6508aaf4a251a431f26cc1a04c051fb5173efee1839f6047946faf4f4
              name: envoy-gateway-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/envoyproxy/gateway
            cmd: prepare
            registry: dhi.io
        - name: rename values file
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          runs: |
            set -eux -o pipefail

            mv values.tmpl.yaml values.yaml
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: verify templated variables
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          runs: |
            set -eux -o pipefail

            if grep -E '\$\{[^}]+\}' values.yaml; then
              exit 1
            fi
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: gateway-helm
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: gateway-helm
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/envoy-gateway/config
