  VERSION: 1.7.3
contents:
  builds:
    - name: envoy-gateway-chart
      uses: dhi.io/helm:3.20.2-debian13-dev@sha256:0e82c726efb7039ffa0875ffb88632189d0082a77f0ee94efa3a048992db3c71
      contents:
        files:
          - url: git+https://github.com/envoyproxy/gateway.git#v1.7.3
            checksum: 669e4568e99bc3299164c27422edd5ffb0d82aba
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          with:
            chart:
              appRef: envoy-gateway
              description: Docker Hardened Images Helm chart for Envoy Gateway
              images:
                - name: envoy-gateway
                  ref: dhi/envoy-gateway:1.7.3-debian13@sha256:71f432120e0a23a12b7a8c7d96a82a24cb9c1204a612bcac5820c5f86c7750fc
                - name: envoy-ratelimit
                  ref: dhi/envoy-ratelimit:05c08d0394737a24729e01519629420a4d86b865-debian13@sha256:6cee23c1c650118f095be0cdbde67dc1c8f456563e7335c8ce46f517dd9bd77c
                - name: envoy
                  ref: dhi/envoy:1.38.0-debian13@sha256:e5790102e35daadefe97ed7b3b234888d74d8bf2893ab39acfd4189af0a3f62c
              name: envoy-gateway-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/envoyproxy/gateway
            cmd: prepare
            registry: dhi.io
        - name: update version
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          with:
            file: Chart.yaml
            patches:
              - .version = "1.7.3"
        - name: rename values file
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          runs: |
            set -eux -o pipefail

            mv values.tmpl.yaml values.yaml
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: verify templated variables
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          runs: |
            set -eux -o pipefail

            if grep -E '\$\{[^}]+\}' values.yaml; then
              exit 1
            fi
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: gateway-helm
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: gateway-helm
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/envoy-gateway/config
