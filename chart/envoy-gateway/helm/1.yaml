  VERSION: 1.7.4
contents:
  builds:
    - name: envoy-gateway-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:ce37cdc271f28789f84db63c8fe5d86522cc98922637f8dde8c2aca4f0cc1632
      contents:
        files:
          - url: git+https://github.com/envoyproxy/gateway.git#v1.7.4
            checksum: 062b176235b72d339fac340d23dd37679b36dca6
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          with:
            chart:
              appRef: envoy-gateway
              description: Docker Hardened Images Helm chart for Envoy Gateway
              images:
                - name: envoy-gateway
                  ref: dhi/envoy-gateway:1.7.4-debian13@sha256:5032d3b9aa9515aa532e0038baa14c11d66b0380380a5ecb7ab43deb19d00bd5
                - name: envoy-ratelimit
                  ref: dhi/envoy-ratelimit:1631871c92e531b5a0c19f1e5661887c0d9bd8f0-debian13@sha256:f0f58a0ea131c19caa1cdd4a4ea568dce36e7755ecc211e48e2031e5bb6a7c81
                - name: envoy
                  ref: dhi/envoy:1.38.1-debian13@sha256:a66fa9ef0676f6fb46e53b37a7fee3653e9697e362777f68858bf2bca827504a
              name: envoy-gateway-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/envoyproxy/gateway
            cmd: prepare
            registry: dhi.io
        - name: update version
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          with:
            file: Chart.yaml
            patches:
              - .version = "1.7.4"
        - name: rename values file
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          runs: |
            set -eux -o pipefail

            mv values.tmpl.yaml values.yaml
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: verify templated variables
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          runs: |
            set -eux -o pipefail

            if grep -E '\$\{[^}]+\}' values.yaml; then
              exit 1
            fi
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: gateway-helm
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: gateway-helm
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/envoy-gateway/config
