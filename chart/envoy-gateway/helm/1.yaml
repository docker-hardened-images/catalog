contents:
  builds:
    - name: envoy-gateway-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:382206314efea5932384da4cbb019ef72b83d65f2cc8fb2ba0acc7e8a31e5cf8
      contents:
        files:
          - url: git+https://github.com/envoyproxy/gateway.git#v1.7.3
            checksum: 669e4568e99bc3299164c27422edd5ffb0d82aba
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          with:
            chart:
              appRef: envoy-gateway
              description: Docker Hardened Images Helm chart for Envoy Gateway
              images:
                - name: envoy-gateway
                  ref: dhi/envoy-gateway:1.7.3-debian13@sha256:d9ed3cdea35a9501d0e334082e567bf279516cc6a260ff2836e0f66ad8daf0c0
                - name: envoy-ratelimit
                  ref: dhi/envoy-ratelimit:58496ffc2966202624df20d74a0b47d0c30a36be-debian13@sha256:36432a5790d3567d705c41afc3214d03ce5b580857dfb37180582db1a4693c42
                - name: envoy
                  ref: dhi/envoy:1.38.0-debian13@sha256:b7697cf49c82675247a7ce746c8631b466ec3b0ae57f01825227e8bd95f17e3c
              name: envoy-gateway-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/envoyproxy/gateway
            cmd: prepare
            registry: dhi.io
        - name: update version
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          with:
            file: Chart.yaml
            patches:
              - .version = "1.7.3"
        - name: rename values file
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          runs: |
            set -eux -o pipefail

            mv values.tmpl.yaml values.yaml
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: verify templated variables
          work-dir: ${source.dir}/helm-charts/charts/gateway-helm
          runs: |
            set -eux -o pipefail

            if grep -E '\$\{[^}]+\}' values.yaml; then
              exit 1
            fi
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: gateway-helm
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: gateway-helm
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
