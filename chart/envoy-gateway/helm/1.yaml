  ENVOY_IMAGE_REFERENCE: dhi/envoy:1.38.0-debian13@sha256:e5790102e35daadefe97ed7b3b234888d74d8bf2893ab39acfd4189af0a3f62c
  ENVOY_RATELIMIT_IMAGE_REFERENCE: dhi/envoy-ratelimit:05c08d0394737a24729e01519629420a4d86b865-debian13@sha256:6cee23c1c650118f095be0cdbde67dc1c8f456563e7335c8ce46f517dd9bd77c
  HELM_REFERENCE: dhi/helm:3.20.2-debian13-dev@sha256:0e82c726efb7039ffa0875ffb88632189d0082a77f0ee94efa3a048992db3c71
  SEMVER_MAJOR_MINOR_VERSION: "1.7"
  SEMVER_MAJOR_VERSION: "1"
