  ENVOY_IMAGE_REFERENCE: dhi/envoy:1.38.1-debian13@sha256:a66fa9ef0676f6fb46e53b37a7fee3653e9697e362777f68858bf2bca827504a
  ENVOY_RATELIMIT_IMAGE_REFERENCE: dhi/envoy-ratelimit:1631871c92e531b5a0c19f1e5661887c0d9bd8f0-debian13@sha256:f0f58a0ea131c19caa1cdd4a4ea568dce36e7755ecc211e48e2031e5bb6a7c81
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:ce37cdc271f28789f84db63c8fe5d86522cc98922637f8dde8c2aca4f0cc1632
  SEMVER_MAJOR_MINOR_VERSION: "1.7"
  SEMVER_MAJOR_VERSION: "1"
