  ENVOY_IMAGE_REFERENCE: dhi/envoy:1.38.0-debian13@sha256:d07eac39b7adcf7b8f84b2391698d91740779cbb6980912c829eefae01e7476a
  ENVOY_RATELIMIT_IMAGE_REFERENCE: dhi/envoy-ratelimit:58496ffc2966202624df20d74a0b47d0c30a36be-debian13@sha256:887b92e234ea6fa85b22523e81703e72254410f6632a3a4d38f42d3ab357de73
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:ed0c764ca91c1084c850f3b00e7248f9127153bb3a5803058a337ac99ba6d479
  SEMVER_MAJOR_MINOR_VERSION: "1.7"
  SEMVER_MAJOR_VERSION: "1"
