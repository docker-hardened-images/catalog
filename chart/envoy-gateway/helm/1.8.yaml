  ENVOY_RATELIMIT_REFERENCE: dhi/envoy-ratelimit:1631871c92e531b5a0c19f1e5661887c0d9bd8f0-debian13@sha256:f0f58a0ea131c19caa1cdd4a4ea568dce36e7755ecc211e48e2031e5bb6a7c81
  ENVOY_REFERENCE: dhi/envoy:1.38.3-debian13@sha256:b63b5a9d9b7deefdc6cc85f32b03dee31c2add6d21862f7750f3983646b4e990
  HELM_VERSION: 4.1.4-2
