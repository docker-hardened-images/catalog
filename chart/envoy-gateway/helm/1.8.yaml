contents:
  builds:
    - name: envoy-gateway-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:7c201a9174a2b56cb13136f19d87b23309d09eb2fc8a24e8c08a31ebd907a943
      work-dir: ${source.dir}/helm-charts/charts/gateway-helm
      contents:
        files:
          - url: git+https://github.com/envoyproxy/gateway.git#v1.8.1
            checksum: 097ab899b9d041452d02f15d738514eda10ea21b
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          with:
            chart:
              appRef: envoy-gateway
              description: Docker Hardened Images Helm chart for Envoy Gateway
              images:
                - name: envoy-gateway
                  ref: dhi/envoy-gateway:1.8.1-debian13@sha256:b5fb6647f0de11fdcc33966e84f7615de2a1ff9207eb195781d02bef83221782
                - name: envoy-ratelimit
