# syntax=dhi.io/build:2-debian13

name: csi-provisioner 6.3.x (dev)
image: dhi.io/csi-provisioner
variant: dev
tags:
  - 6-dev
  - 6.3-dev
  - 6.3.0-dev
  - 6-debian-dev
  - 6-debian13-dev
  - 6.3-debian-dev
  - 6.3-debian13-dev
  - 6.3.0-debian-dev
  - 6.3.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 34c6fc2149a354cea116724d1836262516f83225
  SEMVER_MAJOR_MINOR_VERSION: "6.3"
  SEMVER_MAJOR_VERSION: "6"
  SEMVER_VERSION: 6.3.0
  VERSION: 6.3.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: csi-provisioner
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kubernetes-csi/external-provisioner.git#v6.3.0
            checksum: 34c6fc2149a354cea116724d1836262516f83225
            path: /go/src/github.com/kubernetes-csi/external-provisioner
            spdx:
              name: csi-provisioner
              version: 6.3.0
              packages:
                - name: csi-provisioner
                  purl: pkg:golang/github.com/kubernetes-csi/external-provisioner@6.3.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: remove vendor directory
          work-dir: /go/src/github.com/kubernetes-csi/external-provisioner
          runs: |
            set -eux -o pipefail

            rm -rf vendor
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/kubernetes-csi/external-provisioner
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/kubernetes-csi/external-provisioner
          with:
            ldflags:
              - -X main.version=6.3.0
            output: ${target.dir}/usr/local/bin/csi-provisioner
            packages: ./cmd/csi-provisioner
      outputs:
        - source: ${target.dir}/usr/local/bin/csi-provisioner
          target: /usr/local/bin/csi-provisioner
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/csi-provisioner
          target: /opt/docker/sbom/csi-provisioner
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal csi-provisioner image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/csi-provisioner
