# syntax=dhi.io/build:2-debian13

name: Notion MCP Server 2.x
image: dhi.io/notion-mcp
variant: runtime
tags:
  - "2"
  - "2.1"
  - 2.1.0
  - 2-debian
  - 2-debian13
  - 2.1-debian
  - 2.1-debian13
  - 2.1.0-debian
  - 2.1.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-12-24"
vars:
  COMMIT_SHA: 7e254df95e805861db8c052f5c325a1bb77a7560
  SEMVER_MAJOR_MINOR_VERSION: "2.1"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.1.0
  VERSION: 2.1.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - libc6
    - libgomp1
    - libstdc++6
    - netbase
    - nodejs-24
    - tzdata
  builds:
    - name: notion-mcp
      work-dir: ${source.dir}/notion-mcp
      caches:
        - path: /root/.npm
      contents:
        packages:
          - base-files
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - git
          - libc6
          - libstdc++6
          - mawk
          - nodejs-24
          - node-corepack
          - npm
          - sed
          - yarn-classic
        files:
          - url: git+https://github.com/makenotion/notion-mcp-server.git#v2.1.0
            checksum: 7e254df95e805861db8c052f5c325a1bb77a7560
            path: ${source.dir}/notion-mcp
            spdx:
              name: notion-mcp
              version: 2.1.0
              packages:
                - name: notion-mcp
                  purl: pkg:npm/%40notionhq/notion-mcp-server@2.1.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: bump
          uses: npm/bump@v1
          privileged: true
          environment:
            DHI_NO_SFW: "true"
            NPM_CONFIG_IGNORE_SCRIPTS: "true"
          with:
            bumps: ${source.dir}/patch/npm-bumps.json
            npm-root: ${source.dir}/notion-mcp
        - name: install
          privileged: true
          runs: |
            set -eux -o pipefail

            npm install
            npm run build

            rm -rf node_modules

            npm ci --ignore-scripts --omit=dev
      paths:
        - type: file
          path: ${source.dir}/patch/npm-bumps.json
          uid: 0
          gid: 0
          source: image/notion-mcp/patch/npm-bumps.json
      outputs:
        - source: ${source.dir}/notion-mcp/bin/cli.mjs
          target: /app/bin/cli.mjs
          uid: 0
          gid: 0
        - source: ${source.dir}/notion-mcp/scripts/notion-openapi.json
          target: /app/scripts/notion-openapi.json
          uid: 0
          gid: 0
        - source: ${source.dir}/notion-mcp/node_modules
          target: /app/node_modules
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/notion-mcp
          target: /opt/docker/sbom/notion-mcp
          uid: 0
          gid: 0
    - name: server.json
      contents:
        packages:
          - bash
          - sed
      pipeline:
        - runs: |
            set -eux -o pipefail

            sed -i "s/_VERSION_/2.1.0/g" "${source.dir}/config/server.json"
      paths:
        - type: file
          path: ${source.dir}/config/server.json
          uid: 0
          gid: 0
          source: image/notion-mcp/config/server.json
      attestations:
        - predicate-type: https://modelcontextprotocol.io/server.json/v1
          source: ${source.dir}/config/server.json
accounts:
  run-as: node
  users:
    - name: node
      uid: 1000
      gid: 1000
  groups:
    - name: node
      gid: 1000
      members:
        - node
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  NODE_ENV: production
  OPENAPI_MCP_HEADERS: '{}'
annotations:
  org.opencontainers.image.description: A minimal Notion MCP Server image
  org.opencontainers.image.licenses: MIT
labels:
  io.modelcontextprotocol.server.name: io.github.makenotion/notion-mcp-server
entrypoint:
  - node
  - /app/bin/cli.mjs
