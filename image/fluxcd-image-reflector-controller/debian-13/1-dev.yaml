# syntax=dhi.io/build:2-debian13

name: fluxcd image reflector controller 1.2.x (dev)
image: dhi.io/fluxcd-image-reflector-controller
variant: dev
tags:
  - 1-dev
  - 1.2-dev
  - 1.2.1-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.2-debian-dev
  - 1.2-debian13-dev
  - 1.2.1-debian-dev
  - 1.2.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-12"
vars:
  COMMIT_SHA: 28f54adc2e97095e9d4b37e87c59812854e6db77
  SEMVER_MAJOR_MINOR_VERSION: "1.2"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.2.1
  VERSION: 1.2.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: fluxcd-image-reflector-controller
      work-dir: /go/src/github.com/fluxcd/image-reflector-controller
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/fluxcd/image-reflector-controller#v1.2.1
            checksum: 28f54adc2e97095e9d4b37e87c59812854e6db77
            path: /go/src/github.com/fluxcd/image-reflector-controller
            spdx:
              name: fluxcd-image-reflector-controller
              version: 1.2.1
              packages:
                - name: fluxcd-image-reflector-controller
                  purl: pkg:golang/github.com/fluxcd/image-reflector-controller@1.2.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v2
          with:
            deps: []
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Exclude packages that cannot run in the build environment:
            # - internal/controller: requires testenv
            CGO_ENABLED=0 go test $(go list ./internal/... | grep -vE '/internal/(controller)')
        - name: build
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/image-reflector-controller
      outputs:
        - source: ${target.dir}/usr/local/bin/image-reflector-controller
          target: /usr/local/bin/image-reflector-controller
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-image-reflector-controller
          target: /opt/docker/sbom/fluxcd-image-reflector-controller
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Flux CD image-reflector-controller image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/image-reflector-controller
