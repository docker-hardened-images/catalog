# syntax=dhi.io/build:2-debian13

name: Velero 1.x (dev)
image: dhi.io/velero
variant: dev
tags:
  - 1-dev
  - 1.18-dev
  - 1.18.2-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.18-debian-dev
  - 1.18-debian13-dev
  - 1.18.2-debian-dev
  - 1.18.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: c253c7fe37d78c9b7e55c68544f7c5b2608712d8
  RESTIC_COMMIT_SHA: 6aa3a516ce654808a1f28f9fa21e9b7c8e6e90bf
  RESTIC_VERSION: 0.19.1
  SEMVER_MAJOR_MINOR_VERSION: "1.18"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.18.2
  VERSION: 1.18.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: restic
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/restic/restic.git#v0.19.1
            checksum: 6aa3a516ce654808a1f28f9fa21e9b7c8e6e90bf
            path: /go/src/github.com/restic/restic
            spdx:
              name: restic
              version: 0.19.1
              packages:
                - name: restic
                  purl: pkg:dhi/restic@0.19.1
                  license: BSD-2-Clause
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/restic/restic
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/restic/restic
          with:
            ldflags:
              - -X main.Version=0.19.1
            output: ${target.dir}/usr/local/bin/restic
            packages: ./cmd/restic
            tags:
              - disable_grpc_modules
      outputs:
        - source: ${target.dir}/usr/local/bin/restic
          target: /usr/local/bin/restic
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/restic
          target: /opt/docker/sbom/restic
          uid: 0
          gid: 0
    - name: velero
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/vmware-tanzu/velero.git#v1.18.2
            checksum: c253c7fe37d78c9b7e55c68544f7c5b2608712d8
            path: /go/src/github.com/vmware-tanzu/velero
            spdx:
              name: velero
              version: 1.18.2
              packages:
                - name: velero
                  purl: pkg:dhi/velero@1.18.2
                  license: Apache-2.0
                - name: velero-restore-helper
                  purl: pkg:dhi/velero-restore-helper@1.18.2
                  license: Apache-2.0
                - name: velero-helper
                  purl: pkg:dhi/velero-helper@1.18.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/vmware-tanzu/velero
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
            download: true
        - name: build
          runs: |
            set -eux -o pipefail

            GOLDFLAGS="-X github.com/vmware-tanzu/velero/pkg/buildinfo.Version=1.18.2
                       -X github.com/vmware-tanzu/velero/pkg/buildinfo.GitSHA=c253c7fe37d78c9b7e55c68544f7c5b2608712d8"

            mkdir -p "${target.dir}/usr/local/bin"
            for bin in velero velero-restore-helper velero-helper; do
              CGO_ENABLED=0 go build -C /go/src/github.com/vmware-tanzu/velero \
                -ldflags="$GOLDFLAGS" \
                -o "${target.dir}/usr/local/bin/$bin" \
                ./cmd/$bin
            done
      outputs:
        - source: ${target.dir}/usr/local/bin/velero
          target: /usr/local/bin/velero
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/velero-restore-helper
          target: /usr/local/bin/velero-restore-helper
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/velero-helper
          target: /usr/local/bin/velero-helper
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/velero
          target: /opt/docker/sbom/velero
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: cnb
      uid: 1001
      gid: 1000
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: cnb
      gid: 1000
      members:
        - cnb
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /velero
    uid: 0
    gid: 0
    source: /usr/local/bin/velero
  - type: symlink
    path: /velero-restore-helper
    uid: 0
    gid: 0
    source: /usr/local/bin/velero-restore-helper
  - type: symlink
    path: /velero-helper
    uid: 0
    gid: 0
    source: /usr/local/bin/velero-helper
annotations:
  org.opencontainers.image.description: A minimal Velero image
  org.opencontainers.image.licenses: Apache-2.0
