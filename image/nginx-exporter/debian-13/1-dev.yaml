# syntax=dhi.io/build:2-debian13

name: nginx-exporter 1.x (dev)
image: dhi.io/nginx-exporter
variant: dev
tags:
  - 1-dev
  - 1.5-dev
  - 1.5.1-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.5-debian-dev
  - 1.5-debian13-dev
  - 1.5.1-debian-dev
  - 1.5.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 3c38a4c27ce2c2784739064da5c9acf5b2021680
  SEMVER_MAJOR_MINOR_VERSION: "1.5"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.5.1
  VERSION: 1.5.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: nginx-exporter
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/nginx/nginx-prometheus-exporter.git#v1.5.1
            checksum: 3c38a4c27ce2c2784739064da5c9acf5b2021680
            path: /go/src/github.com/nginx/nginx-prometheus-exporter
            spdx:
              name: nginx-exporter
              version: 1.5.1
              packages:
                - name: nginx-exporter
                  purl: pkg:golang/github.com/nginx/nginx-prometheus-exporter@1.5.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/nginx/nginx-prometheus-exporter
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
        - name: test
          work-dir: /go/src/github.com/nginx/nginx-prometheus-exporter
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test .
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/nginx/nginx-prometheus-exporter
          with:
            ldflags:
              - -X github.com/prometheus/common/version.Version=1.5.1
              - -X github.com/prometheus/common/version.Revision=3c38a4c27ce2c2784739064da5c9acf5b2021680
              - -X github.com/prometheus/common/version.Branch=1.5.1
              - -X github.com/prometheus/common/version.BuildUser=dhi
              - -X github.com/prometheus/common/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/local/bin/nginx-prometheus-exporter
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/nginx-exporter
          target: /opt/docker/sbom/nginx-exporter
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal nginx-exporter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - nginx-prometheus-exporter
