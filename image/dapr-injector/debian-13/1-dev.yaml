# syntax=dhi.io/build:2-debian13

name: dapr injector 1.x (dev)
image: dhi.io/dapr-injector
variant: dev
tags:
  - 1-dev
  - 1.18-dev
  - 1.18.2-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.18-debian-dev
  - 1.18-debian13-dev
  - 1.18.2-debian-dev
  - 1.18.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-09-16"
vars:
  COMMIT_SHA: d2dd3747145e38e4d85db4714e26d7569c9c37db
  SEMVER_MAJOR_MINOR_VERSION: "1.18"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.18.2
  VERSION: 1.18.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: dapr-injector
      work-dir: /go/src/github.com/dapr/dapr/cmd/injector
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/dapr/dapr#v1.18.2
            checksum: d2dd3747145e38e4d85db4714e26d7569c9c37db
            path: /go/src/github.com/dapr/dapr
            spdx:
              name: dapr
              version: 1.18.2
              packages:
                - name: dapr
                  purl: pkg:golang/github.com/dapr/dapr@1.18.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/dapr/dapr
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
            download: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            cd /go/src/github.com/dapr/dapr
            CGO_ENABLED=0 go test -short ./pkg/injector/...
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X github.com/dapr/dapr/pkg/buildinfo.gitcommit=d2dd3747145e38e4d85db4714e26d7569c9c37db
              - -X github.com/dapr/dapr/pkg/buildinfo.gitversion=1.18.2
              - -X github.com/dapr/dapr/pkg/buildinfo.version=1.18.2
            output: ${target.dir}/usr/local/bin/injector
            tags: allcomponents
      outputs:
        - source: ${target.dir}/usr/local/bin/injector
          target: /usr/local/bin/injector
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/dapr
          target: /opt/docker/sbom/dapr
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /app/cmd/injector
    uid: 0
    gid: 0
  - type: symlink
    path: /injector
    uid: 0
    gid: 0
    source: /usr/local/bin/injector
annotations:
  org.opencontainers.image.description: A minimal Dapr sidecar injector admission controller image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/injector
ports:
  - 4000/tcp
  - 8080/tcp
  - 9090/tcp
