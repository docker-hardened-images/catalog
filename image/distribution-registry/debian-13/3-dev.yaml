# syntax=dhi.io/build:2-debian13

name: Distribution Registry 3.x (dev)
image: dhi.io/distribution-registry
variant: dev
tags:
  - 3-dev
  - 3.1-dev
  - 3.1.1-dev
  - 3-debian13-dev
  - 3.1-debian13-dev
  - 3.1.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-04-03"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 9a8d98b679740cd514aa7e7d84d23d442a5ef54c
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:4209a08b8d03addadd22d98483519296d2f1fb78e6dd84c459b2b3d6d478ac4b
  SEMVER_MAJOR_MINOR_VERSION: "3.1"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.1.1
  VERSION: 3.1.1
contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: distribution-registry
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:4209a08b8d03addadd22d98483519296d2f1fb78e6dd84c459b2b3d6d478ac4b
      work-dir: /go/src/github.com/distribution/distribution/v3
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/distribution/distribution.git#v3.1.1
            checksum: 9a8d98b679740cd514aa7e7d84d23d442a5ef54c
            path: /go/src/github.com/distribution/distribution/v3
            spdx:
              name: distribution
              version: 3.1.1
              packages:
                - name: distribution-registry
                  purl: pkg:golang/github.com/distribution/distribution/v3@3.1.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps: []
            download: true
        - name: patch vendored dependencies
          privileged: true
          environment:
            GODEBUG: ""
            GOFIPS140: ""
          runs: |
            set -eux -o pipefail

            # CVE-2026-33186: grpc >=1.79.3
            # Drop retired grpc/stats/opentelemetry sub-module (folded into grpc >=1.69)
            # then bump storage to v1.50.0 which no longer imports it separately
            go mod edit -droprequire google.golang.org/grpc/stats/opentelemetry
            go get google.golang.org/grpc@v1.79.3
            go get cloud.google.com/go/storage@v1.50.0
            go get google.golang.org/api@v0.214.0

            # CVE-2026-24051: otel/sdk >=1.40.0
            # CVE-2026-39882, CVE-2026-39883: otel/sdk >=1.43.0
            # Match distribution main branch versions for ecosystem compatibility
            go get go.opentelemetry.io/otel@v1.43.0
            go get go.opentelemetry.io/otel/sdk@v1.43.0
            go get go.opentelemetry.io/otel/trace@v1.43.0
            go get go.opentelemetry.io/otel/metric@v1.43.0
            go get go.opentelemetry.io/otel/sdk/metric@v1.43.0
            go get go.opentelemetry.io/otel/exporters/stdout/stdouttrace@v1.43.0
            go get go.opentelemetry.io/contrib/exporters/autoexport@v0.67.0
            go get go.opentelemetry.io/contrib/instrumentation/net/http/otelhttp@v0.67.0
            go get go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
            go get go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
            go get go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0

            go mod tidy
            go mod vendor
        - name: test
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -short ./cmd/registry/... -count=1 -v
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/distribution/distribution/v3/version.version=v3.1.1
              - -X github.com/distribution/distribution/v3/version.revision=9a8d98b679740cd514aa7e7d84d23d442a5ef54c
              - -X github.com/distribution/distribution/v3/version.mainpkg=github.com/distribution/distribution/v3
            output: ${target.dir}/usr/local/bin/registry
            packages: ./cmd/registry
            strip: true
      outputs:
        - source: ${target.dir}/usr/local/bin/registry
          target: /usr/local/bin/registry
          uid: 0
          gid: 0
        - source: /go/src/github.com/distribution/distribution/v3/cmd/registry/config-dev.yml
          target: /etc/distribution/config.yml
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/distribution
          target: /opt/docker/sbom/distribution
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  OTEL_TRACES_EXPORTER: none
paths:
  - type: directory
    path: /var/lib/registry
    uid: 65532
    gid: 65532
    mode: "0770"
  - type: symlink
    path: /bin/registry
    uid: 0
    gid: 0
    source: /usr/local/bin/registry
annotations:
  org.opencontainers.image.description: A minimal Distribution Registry image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /bin/registry
cmd:
  - serve
  - /etc/distribution/config.yml
ports:
  - 5000/tcp
