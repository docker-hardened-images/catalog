# syntax=dhi.io/build:2-debian13

name: Descheduler 0.x (dev)
image: dhi.io/descheduler
variant: dev
tags:
  - 0-dev
  - 0.36-dev
  - 0.36.0-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.36-debian-dev
  - 0.36-debian13-dev
  - 0.36.0-debian-dev
  - 0.36.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-09"
vars:
  COMMIT_SHA: 8005cdf78391e2c071cfa653c462dfefc2de8856
  SEMVER_MAJOR_MINOR_VERSION: "0.36"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.36.0
  VERSION: 0.36.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: descheduler
      work-dir: /go/src/github.com/kubernetes-sigs/descheduler
      caches:
        - path: /go/pkg/mod
        - path: /root/.cache/go-build
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kubernetes-sigs/descheduler.git#v0.36.0
            checksum: 8005cdf78391e2c071cfa653c462dfefc2de8856
            path: /go/src/github.com/kubernetes-sigs/descheduler
            spdx:
              name: descheduler
              version: 0.36.0
              packages:
                - name: descheduler
                  purl: pkg:golang/kubernetes-sigs/descheduler@0.36.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/kubernetes-sigs/descheduler
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - go.opentelemetry.io/otel@v1.43.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          work-dir: /go/src/github.com/kubernetes-sigs/descheduler
          runs: |
            set -eux -o pipefail

            # Exclude e2e tests as they require a running Kubernetes cluster
            go test -short $(go list ./... | grep -v '/test/e2e$')
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/kubernetes-sigs/descheduler/cmd/descheduler
          with:
            ldflags:
              - -X sigs.k8s.io/descheduler/pkg/version.version=v0.36.0
              - -X sigs.k8s.io/descheduler/pkg/version.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
              - -X sigs.k8s.io/descheduler/pkg/version.gitsha1=8005cdf78391e2c071cfa653c462dfefc2de8856
            output: ${target.dir}/usr/local/bin/descheduler
      outputs:
        - source: ${target.dir}/usr/local/bin/descheduler
          target: /usr/local/bin/descheduler
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/descheduler
          target: /opt/docker/sbom/descheduler
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /bin/descheduler
    uid: 0
    gid: 0
    source: /usr/local/bin/descheduler
annotations:
  org.opencontainers.image.description: A minimal Descheduler image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/descheduler
