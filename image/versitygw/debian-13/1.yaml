# syntax=dhi.io/build:2-debian13

name: Versity S3 Gateway 1.x
image: dhi.io/versitygw
variant: runtime
tags:
  - "1"
  - "1.5"
  - 1.5.0
  - 1-debian
  - 1-debian13
  - 1.5-debian
  - 1.5-debian13
  - 1.5.0-debian
  - 1.5.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 31ae498609039229efb51a6e260982a0da94717d
  SEMVER_MAJOR_MINOR_VERSION: "1.5"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.5.0
  VERSION: 1.5.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: versitygw
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/versity/versitygw.git#v1.5.0
            checksum: 31ae498609039229efb51a6e260982a0da94717d
            path: /go/src/github.com/versity/versitygw
            spdx:
              name: versitygw
              version: 1.5.0
              packages:
                - name: versitygw
                  purl: pkg:golang/github.com/versity/versitygw@1.5.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          work-dir: /go/src/github.com/versity/versitygw
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - github.com/Azure/go-ntlmssp@v0.1.1
              - github.com/gofiber/fiber/v2@v2.52.13
            download: true
        - name: test
          work-dir: /go/src/github.com/versity/versitygw
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -skip TestNewMultiAddrListener ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/versity/versitygw
          with:
            ldflags:
              - -X main.Version=1.5.0
              - -X main.Build=31ae498609039229efb51a6e260982a0da94717d
              - -X main.BuildTime=$(date -d @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/local/bin/versitygw
            packages: ./cmd/versitygw
      outputs:
        - source: ${target.dir}/usr/local/bin/versitygw
          target: /usr/local/bin/versitygw
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/versitygw
          target: /opt/docker/sbom/versitygw
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Versity S3 Gateway image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/versitygw
