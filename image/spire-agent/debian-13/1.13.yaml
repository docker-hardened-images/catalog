# syntax=dhi.io/build:2-debian13

name: Spiffe Spire Agent 1.13.x
image: dhi.io/spire-agent
variant: runtime
tags:
  - "1.13"
  - 1.13.6
  - 1.13-debian
  - 1.13-debian13
  - 1.13.6-debian
  - 1.13.6-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-23"
vars:
  COMMIT_SHA: 746331571d5563bb28bf1dc1c2cd04e1570453d8
  SEMVER_MAJOR_MINOR_VERSION: "1.13"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.13.6
  VERSION: 1.13.6
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: spire-agent
      work-dir: /go/src/github.com/spiffe/spire
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/spiffe/spire.git#v1.13.6
            checksum: 746331571d5563bb28bf1dc1c2cd04e1570453d8
            path: /go/src/github.com/spiffe/spire
            spdx:
              name: spire-agent
              version: 1.13.6
              packages:
                - name: spire-agent
                  purl: pkg:golang/github.com/spiffe/spire@1.13.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.13 only)
          uses: go/bump@v2
          with:
            deps:
              - github.com/go-chi/chi/v5@v5.2.4
              - github.com/in-toto/in-toto-golang@v0.11.0
              - github.com/sigstore/sigstore@v1.10.4
              - github.com/theupdateframework/go-tuf/v2@v2.4.1
              - go.mongodb.org/mongo-driver@v1.17.7
              - github.com/sigstore/rekor@v1.5.0
              - github.com/sigstore/cosign/v2@v2.6.2
            download: true
            replaces:
              - github.com/sigstore/timestamp-authority=github.com/docker-hardened-images/sigstore-timestamp-authority@v1.2.10-0.20251207163215-621a8cc1532f
        - name: pin go-spiffe
          uses: go/bump@v2
          with:
            deps:
              - github.com/spiffe/go-spiffe/v2@v2.6.0
            downgrade: true
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Exclude agent tests, server runtime tests (require full server setup), peertracker (flaky timing test), and diskcertmanager (flaky)
            EXCLUDES='/cmd/spire-agent|/pkg/agent|/cmd/spire-server/cli/run|/pkg/server|/pkg/common/peertracker|/pkg/common/diskcertmanager'
            PKGS=$(go list ./... | egrep -v "${EXCLUDES}")
            CGO_ENABLED=0 go test $PKGS
        - name: build spire-agent
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/spiffe/spire/pkg/common/version.gittag=1.13.6
              - -X github.com/spiffe/spire/pkg/common/version.githash=746331571d5563bb28bf1dc1c2cd04e1570453d8
            output: ${target.dir}/usr/local/bin/spire-agent
            packages: ./cmd/spire-agent
      outputs:
        - source: ${target.dir}/usr/local/bin/spire-agent
          target: /usr/local/bin/spire-agent
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/spire-agent
          target: /opt/docker/sbom/spire-agent
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /opt/spire
paths:
  - type: directory
    path: /opt/spire/bin
    uid: 0
    gid: 0
  - type: symlink
    path: /opt/spire/bin/spire-agent
    uid: 0
    gid: 0
    source: /usr/local/bin/spire-agent
annotations:
  org.opencontainers.image.description: A minimal Spiffe Spire Agent image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /opt/spire/bin/spire-agent
  - run
