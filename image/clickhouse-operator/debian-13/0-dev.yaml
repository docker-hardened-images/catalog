# syntax=dhi.io/build:2-debian13

name: clickhouse-operator 0.x (dev)
image: dhi.io/clickhouse-operator
variant: dev
tags:
  - 0-dev
  - 0.27-dev
  - 0.27.1-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.27-debian-dev
  - 0.27-debian13-dev
  - 0.27.1-debian-dev
  - 0.27.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: dae4e5be79b9f259aa5cd8c469c2b4cf48856be4
  SEMVER_MAJOR_MINOR_VERSION: "0.27"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.27.1
  VERSION: 0.27.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: clickhouse-operator-go
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/Altinity/clickhouse-operator.git#release-0.27.1
            checksum: dae4e5be79b9f259aa5cd8c469c2b4cf48856be4
            path: /go/src/github.com/altinity/clickhouse-operator
            spdx:
              name: clickhouse-operator
              version: 0.27.1
              packages:
                - name: clickhouse-operator
                  purl: pkg:dhi/clickhouse-operator@0.27.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          work-dir: /go/src/github.com/altinity/clickhouse-operator
          privileged: true
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
            download: true
            upgrade: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/altinity/clickhouse-operator
          with:
            ldflags:
              - -X github.com/altinity/clickhouse-operator/pkg/version.Version=0.27.1
              - -X github.com/altinity/clickhouse-operator/pkg/version.GitSHA=dae4e5be79b9f259aa5cd8c469c2b4cf48856be4
              - -X github.com/altinity/clickhouse-operator/pkg/version.BuiltAt=$(date -u -d @${SOURCE_DATE_EPOCH} +'%F-%T')
            output: ${target.dir}/usr/local/bin/clickhouse-operator
            packages: ./cmd/operator/main.go
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/clickhouse-operator
          target: /opt/docker/sbom/clickhouse-operator
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal clickhouse-operator image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/clickhouse-operator
