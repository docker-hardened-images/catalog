# syntax=dhi.io/build:2-debian13

name: Pyroscope 1.17.x
image: dhi.io/pyroscope
variant: runtime
tags:
  - "1.17"
  - 1.17.4
  - 1.17-debian
  - 1.17-debian13
  - 1.17.4-debian
  - 1.17.4-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 85747673e948eb2441e8d804d3a5e63ca8d9ad70
  SEMVER_MAJOR_MINOR_VERSION: "1.17"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.17.4
  VERSION: 1.17.4
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: pyroscope-go
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - findutils
          - git
          - golang-1.26
          - grep
          - mawk
          - sed
        files:
          - url: git+https://github.com/grafana/pyroscope.git#v1.17.4
            checksum: 85747673e948eb2441e8d804d3a5e63ca8d9ad70
            path: /go/src/github.com/grafana/pyroscope
            spdx:
              name: pyroscope
              version: 1.17.4
              packages:
                - name: pyroscope
                  purl: pkg:golang/github.com/grafana/pyroscope@1.17.4
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.17 only)
          uses: go/bump@v2
          work-dir: /go/src/github.com/grafana/pyroscope
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.mongodb.org/mongo-driver@v1.17.7
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/stdout/stdoutlog@v0.19.0
            tidy: true
        - name: test
          work-dir: /go/src/github.com/grafana/pyroscope
          privileged: true
          runs: |
            set -eux -o pipefail

            # Skip TestDLQRecovery: upstream flake (~17% CI failure rate) where the mockdiscovery
            # expectations aren't all met before the assertion runs. TestDLQRecoveryMock covers
            # the same DLQ recovery logic without the race.
            # Skip TestLoader_ShouldCacheIndexNotFoundOnBackgroundUpdates: flaky metrics
            # assertion under golang 1.26 during image builds.
            CGO_ENABLED=0 go test -v -count=1 -skip '^TestDLQRecovery$|^TestLoader_ShouldCacheIndexNotFoundOnBackgroundUpdates$' $(go list ./... ./lidia/... | grep -v /test/integration)
        - name: build pyroscope
          uses: go/build@v1
          work-dir: /go/src/github.com/grafana/pyroscope
          with:
            output: ${target.dir}/usr/local/bin/pyroscope
            packages: ./cmd/pyroscope
        - name: build profilecli
          uses: go/build@v1
          work-dir: /go/src/github.com/grafana/pyroscope
          with:
            output: ${target.dir}/usr/local/bin/profilecli
            packages: ./cmd/profilecli
      outputs:
        - source: ${target.dir}/usr/local/bin/pyroscope
          target: /usr/bin/pyroscope
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/profilecli
          target: /usr/bin/profilecli
          uid: 0
          gid: 0
        - source: /go/src/github.com/grafana/pyroscope/cmd/pyroscope/pyroscope.yaml
          target: /etc/pyroscope/config.yaml
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/pyroscope
          target: /opt/docker/sbom/pyroscope
          uid: 0
          gid: 0
accounts:
  run-as: pyroscope
  users:
    - name: pyroscope
      uid: 10001
      gid: 10001
  groups:
    - name: pyroscope
      gid: 10001
      members:
        - pyroscope
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /data
    uid: 10001
    gid: 10001
    mode: "0755"
  - type: directory
    path: /data-compactor
    uid: 10001
    gid: 10001
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Grafana Pyroscope image
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - /usr/bin/pyroscope
cmd:
  - -config.file=/etc/pyroscope/config.yaml
ports:
  - 4040/tcp
