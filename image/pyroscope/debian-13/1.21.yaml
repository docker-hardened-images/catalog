# syntax=dhi.io/build:2-debian13

name: Pyroscope 1.21.x
image: dhi.io/pyroscope
variant: runtime
tags:
  - "1.21"
  - 1.21.1
  - 1.21-debian13
  - 1.21.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-17"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: d6cb8c3db58edf6c0ea26daa1dd40d84f11a4ef0
  GOLANG_REFERENCE: dhi/golang:1.25.10-debian13-dev@sha256:6ab2431d046a2e21dbcbcb5111e94bec59650d302ec0ac34e696e7e44f708044
  SEMVER_MAJOR_MINOR_VERSION: "1.21"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.21.1
  VERSION: 1.21.1
contents:
  packages:
    - '!base-files'
  builds:
    - name: pyroscope-go
      uses: dhi.io/golang:1.25.10-debian13-dev@sha256:6ab2431d046a2e21dbcbcb5111e94bec59650d302ec0ac34e696e7e44f708044
      contents:
        files:
          - url: git+https://github.com/grafana/pyroscope.git#v1.21.1
            checksum: d6cb8c3db58edf6c0ea26daa1dd40d84f11a4ef0
            path: /go/src/github.com/grafana/pyroscope
            spdx:
              name: pyroscope
              version: 1.21.1
              packages:
                - name: pyroscope
                  purl: pkg:golang/github.com/grafana/pyroscope@1.21.1
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.21 or 2.0 only)
          uses: go/bump@v2
          work-dir: /go/src/github.com/grafana/pyroscope
          with:
            deps:
              - golang.org/x/net@v0.53.0
            tidy: true
        - name: test
          work-dir: /go/src/github.com/grafana/pyroscope
          privileged: true
          runs: |
            set -eux -o pipefail

            # Match upstream Makefile go/test: exclude pkg/test/integration (Docker/K8s integration).
            # Skip TestDLQRecovery: upstream flake (~17% CI failure rate) where the mockdiscovery
            # expectations aren't all met before the assertion runs. TestDLQRecoveryMock covers
            # the same DLQ recovery logic without the race.
            CGO_ENABLED=0 go test -v -count=1 -skip '^TestDLQRecovery$' $(go list ./... ./lidia/... | grep -v /test/integration)
        - name: build pyroscope
          uses: go/build@v1
          work-dir: /go/src/github.com/grafana/pyroscope
          with:
            output: ${target.dir}/usr/local/bin/pyroscope
            packages: ./cmd/pyroscope
        - name: build profilecli
          uses: go/build@v1
          work-dir: /go/src/github.com/grafana/pyroscope
          with:
            output: ${target.dir}/usr/local/bin/profilecli
            packages: ./cmd/profilecli
      outputs:
        - source: ${target.dir}/usr/local/bin/pyroscope
          target: /usr/bin/pyroscope
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/profilecli
          target: /usr/bin/profilecli
          uid: 0
          gid: 0
        - source: /go/src/github.com/grafana/pyroscope/cmd/pyroscope/pyroscope.yaml
          target: /etc/pyroscope/config.yaml
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/pyroscope
          target: /opt/docker/sbom/pyroscope
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: pyroscope
  users:
    - name: pyroscope
      uid: 10001
      gid: 10001
  groups:
    - name: pyroscope
      gid: 10001
      members:
        - pyroscope
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /data
    uid: 10001
    gid: 10001
    mode: "0755"
  - type: directory
    path: /data-compactor
    uid: 10001
    gid: 10001
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Grafana Pyroscope image
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - /usr/bin/pyroscope
cmd:
  - -config.file=/etc/pyroscope/config.yaml
ports:
  - 4040/tcp
