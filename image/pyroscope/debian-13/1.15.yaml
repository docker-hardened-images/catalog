# syntax=dhi.io/build:2-debian13

name: Pyroscope 1.15.x
image: dhi.io/pyroscope
variant: runtime
tags:
  - "1.15"
  - 1.15.3
  - 1.15-debian13
  - 1.15.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: c7f6f34e8b697db6ae09771e983638cfcdb67c1a
  GOLANG_REFERENCE: dhi/golang:1.25.10-debian13-dev@sha256:375eb677024bb497cf14a3a63048d5b63e800451878d3fca7a3dd5970b9baec0
  SEMVER_MAJOR_MINOR_VERSION: "1.15"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.15.3
  VERSION: 1.15.3
contents:
  packages:
    - '!base-files'
  builds:
    - name: pyroscope-go
      uses: dhi.io/golang:1.25.10-debian13-dev@sha256:375eb677024bb497cf14a3a63048d5b63e800451878d3fca7a3dd5970b9baec0
      contents:
        files:
          - url: git+https://github.com/grafana/pyroscope.git#v1.15.3
            checksum: c7f6f34e8b697db6ae09771e983638cfcdb67c1a
            path: /go/src/github.com/grafana/pyroscope
            spdx:
              name: pyroscope
              version: 1.15.3
              packages:
                - name: pyroscope
                  purl: pkg:golang/github.com/grafana/pyroscope@1.15.3
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.15 or 1.16 or 1.17 or 1.18 or 1.19 or 1.20 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/grafana/pyroscope
          with:
            deps:
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/stdout/stdoutlog@v0.19.0
              - google.golang.org/grpc@v1.79.3
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            download: true
        - name: patch 1.15 filterAndGroupBlocks clock
          uses: patch@v1
          work-dir: /go/src/github.com/grafana/pyroscope
          with:
            options: -p1
            patches:
              - ${source.dir}/patch/handlers-time-fix-1.15.patch
        - name: test
          work-dir: /go/src/github.com/grafana/pyroscope
          privileged: true
          runs: |
            set -eux -o pipefail

            # Match upstream Makefile go/test: exclude pkg/test/integration (Docker/K8s integration).
            # Skip TestDLQRecovery: upstream flake (~17% CI failure rate) where the mockdiscovery
            # expectations aren't all met before the assertion runs. TestDLQRecoveryMock covers
            # the same DLQ recovery logic without the race.
            CGO_ENABLED=0 go test -v -count=1 -skip '^TestDLQRecovery$' $(go list ./... ./lidia/... | grep -v /test/integration)
        - name: build pyroscope
          uses: go/build@v1
          work-dir: /go/src/github.com/grafana/pyroscope
          with:
            output: ${target.dir}/usr/local/bin/pyroscope
            packages: ./cmd/pyroscope
        - name: build profilecli
          uses: go/build@v1
          work-dir: /go/src/github.com/grafana/pyroscope
          with:
            output: ${target.dir}/usr/local/bin/profilecli
            packages: ./cmd/profilecli
      paths:
        - type: file
          path: ${source.dir}/patch/handlers-time-fix-1.15.patch
          uid: 0
          gid: 0
          source: image/pyroscope/debian-13/patch/handlers-time-fix-1.15.patch
      outputs:
        - source: ${target.dir}/usr/local/bin/pyroscope
          target: /usr/bin/pyroscope
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/profilecli
          target: /usr/bin/profilecli
          uid: 0
          gid: 0
        - source: /go/src/github.com/grafana/pyroscope/cmd/pyroscope/pyroscope.yaml
          target: /etc/pyroscope/config.yaml
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/pyroscope
          target: /opt/docker/sbom/pyroscope
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: pyroscope
  users:
    - name: pyroscope
      uid: 10001
      gid: 10001
  groups:
    - name: pyroscope
      gid: 10001
      members:
        - pyroscope
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /data
    uid: 10001
    gid: 10001
    mode: "0755"
  - type: directory
    path: /data-compactor
    uid: 10001
    gid: 10001
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Grafana Pyroscope image
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - /usr/bin/pyroscope
cmd:
  - -config.file=/etc/pyroscope/config.yaml
ports:
  - 4040/tcp
