# syntax=dhi.io/build:2-debian13

name: Kapacitor 1.x (dev)
image: dhi.io/kapacitor
variant: dev
tags:
  - 1-dev
  - 1.8-dev
  - 1.8.4-dev
  - 1-debian13-dev
  - 1.8-debian13-dev
  - 1.8.4-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-09-29"
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
  COMMIT_SHA: 2d023aa388254b81a4eec25da6902c1c7082af4f
  GO_REFERENCE: dhi/golang:1.26.2-debian13-dev@sha256:086c893153f92793f3a1541793cd4a8e8b23bfd4ccaf70c8f4261f496080fb0e
  GO_VERSION: 1.24.7
  PROTOC_GEN_GO_VERSION: v1.34.1
  PYTHON_REFERENCE: dhi/python:3.12.12-debian13@sha256:8fdf129968594c319caf810dcf15b2541d08d2b166a9306f6aaf3637c3168e06
  RUST_REFERENCE: dhi/rust:1.92.0-debian13@sha256:7cfae5cf29c2d25155618749fb9bde3db0e37c1accfbbb86a7194f5fddca9ac1
  SEMVER_MAJOR_MINOR_VERSION: "1.8"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.8.4
  VERSION: 1.8.4
contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: kapacitor-go
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:086c893153f92793f3a1541793cd4a8e8b23bfd4ccaf70c8f4261f496080fb0e
      contents:
        packages:
          - autoconf
          - automake
          - build-essential
          - curl
          - gcc-aarch64-linux-gnu
          - git
          - grep
          - gzip
          - libtool
          - make
          - musl-tools
          - pkg-config
          - protobuf-compiler
          - unzip
          - zip
        files:
          - url: git+https://github.com/influxdata/kapacitor.git#v1.8.4
            checksum: 2d023aa388254b81a4eec25da6902c1c7082af4f
            path: /go/src/github.com/influxdata/kapacitor
            spdx:
              name: kapacitor
              version: 1.8.4
              packages:
                - name: kapacitor
                  purl: pkg:golang/github.com/influxdata/kapacitor@1.8.4
                  license: MIT
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/rust:1.92.0-debian13@sha256:7cfae5cf29c2d25155618749fb9bde3db0e37c1accfbbb86a7194f5fddca9ac1
            includes:
              - usr/local/bin/**
              - usr/local/lib/**
            uid: 0
            gid: 0
      pipeline:
        - name: update kapacitor go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/influxdata/kapacitor
          with:
            deps:
              - github.com/dvsekhvalnov/jose2go@v1.7.0
              - github.com/eclipse/paho.mqtt.golang@v1.5.1
              - github.com/prometheus/client_golang@v1.11.1
              - github.com/sirupsen/logrus@v1.9.1
              - google.golang.org/api@v0.214.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: sync vendor directory
          work-dir: /go/src/github.com/influxdata/kapacitor
          privileged: true
          runs: |
            set -eux -o pipefail

            go mod vendor
        - name: patch prometheus go
          uses: patch@v1
          work-dir: /go/src/github.com/influxdata/kapacitor/vendor/github.com/prometheus/prometheus
          with:
            options: -p1
            patch: ${source.dir}/patch/prometheus-api-compat.patch
        - name: patch flux-core strict warnings
          work-dir: /go/src/github.com/influxdata/kapacitor
          runs: |
            set -eux -o pipefail

            # go mod vendor excludes non-Go files, so the Rust source only
            # exists in the module cache. Locate it, make it writable, and
            # apply the patch file.
            flux_dir="$(go list -mod=mod -m -f '{{.Dir}}' github.com/influxdata/flux)"
            chmod -R u+w "$flux_dir/libflux/flux-core"
            patch -p1 -d "$flux_dir/libflux/flux-core" < ${source.dir}/patch/flux-core-strict-warnings.patch
        - name: install extra go tools
          work-dir: /go/src/github.com/influxdata/kapacitor
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi
            go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.34.1
            go install github.com/influxdata/pkg-config
            go install github.com/benbjohnson/tmpl
            go install github.com/mailru/easyjson/easyjson
        - name: go build
          work-dir: /go/src/github.com/influxdata/kapacitor
          privileged: true
          runs: |
            set -eux -o pipefail

            export CARGO=${source.dir}/helpers/bin/cargo-wrapper.sh

            # CGO_ENABLED=1 required for flux libflux integration (Rust FFI)
            GOLDFLAGS="-extldflags \"-fno-PIC -Wl,--allow-multiple-definition\"
                      -X main.version=1.8.4
                      -X main.branch=HEAD
                      -X main.commit=2d023aa388254b81a4eec25da6902c1c7082af4f
                      -X main.platform=OSS"

            TAGS="netgo osusergo"
            test '${target.arch}' = 'arm64' && TAGS+=" noasm"

            CGO_ENABLED=1 go build \
              -o ${target.dir}/usr/local/bin/kapacitord \
              -tags "${TAGS}" \
              -ldflags "$GOLDFLAGS" \
              ./cmd/kapacitord

            # These tools are only included for dev variants.
            if [ '${target.dev}' = true ]; then
              CGO_ENABLED=1 go build \
                -o ${target.dir}/usr/local/bin/kapacitor \
                -tags "${TAGS}" \
                -ldflags "$GOLDFLAGS" \
                ./cmd/kapacitor

              CGO_ENABLED=1 go build \
                -o ${target.dir}/usr/local/bin/tickfmt \
                -tags "${TAGS}" \
                -ldflags "$GOLDFLAGS" \
                ./tick/cmd/tickfmt
            fi
        - name: install config
          work-dir: /go/src/github.com/influxdata/kapacitor
          runs: |
            set -eux -o pipefail

            install -D -m 644 etc/kapacitor/kapacitor.conf ${target.dir}/etc/kapacitor/kapacitor.conf
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/kapacitor/patch
        - type: file
          path: ${source.dir}/helpers/bin/cargo-wrapper.sh
          uid: 0
          gid: 0
          mode: "0755"
          source: image/kapacitor/bin/cargo-wrapper.sh
      outputs:
        - source: ${target.dir}/usr/local/bin/kapacitord
          target: /usr/local/bin/kapacitord
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/kapacitor
          target: /usr/local/bin/kapacitor
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/tickfmt
          target: /usr/local/bin/tickfmt
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/kapacitor/kapacitor.conf
          target: /etc/kapacitor/kapacitor.conf
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kapacitor
          target: /opt/docker/sbom/kapacitor
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /var/log/kapacitor
    uid: 65532
    gid: 65532
    mode: "0744"
  - type: directory
    path: /var/lib/kapacitor
    uid: 65532
    gid: 65532
    mode: "0744"
annotations:
  org.opencontainers.image.description: A minimal Kapacitor image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /usr/local/bin/kapacitord
cmd:
  - -config
  - /etc/kapacitor/kapacitor.conf
ports:
  - 9092/tcp
