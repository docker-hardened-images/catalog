# syntax=dhi.io/build:2-debian13

name: dapr daprd 1.x
image: dhi.io/dapr-daprd
variant: runtime
tags:
  - "1"
  - "1.17"
  - 1.17.5
  - 1-debian13
  - 1.17-debian13
  - 1.17.5-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-09-16"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 3974797d4325124650f3a6c9bf220ba327f84e6c
  FIPS_SUFFIX: ""
  GOLANG_REFERENCE: dhi/golang:1.26.2-debian13-dev@sha256:086c893153f92793f3a1541793cd4a8e8b23bfd4ccaf70c8f4261f496080fb0e
  SEMVER_MAJOR_MINOR_VERSION: "1.17"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.17.5
  VERSION: 1.17.5
contents:
  packages:
    - '!base-files'
  builds:
    - name: dapr-daprd
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:086c893153f92793f3a1541793cd4a8e8b23bfd4ccaf70c8f4261f496080fb0e
      work-dir: /go/src/github.com/dapr/dapr
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/dapr/dapr#v1.17.5
            checksum: 3974797d4325124650f3a6c9bf220ba327f84e6c
            path: /go/src/github.com/dapr/dapr
            spdx:
              name: dapr
              version: 1.17.5
              packages:
                - name: dapr
                  purl: pkg:golang/github.com/dapr/dapr@1.17.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - filippo.io/edwards25519@v1.1.1
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/bedrockruntime@v1.50.4
              - github.com/aws/aws-sdk-go-v2/service/kinesis@v1.43.5
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/go-chi/chi/v5@v5.2.4
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            download: true
        - name: test go dependencies
          runs: |
            set -eux -o pipefail

            # Build system injects OTEL_EXPORTER_OTLP_TRACES_* vars which take priority
            # over OTEL_EXPORTER_OTLP_* and break unit tests that set the latter
            unset OTEL_EXPORTER_OTLP_TRACES_ENDPOINT || true
            unset OTEL_EXPORTER_OTLP_TRACES_PROTOCOL || true

            # Build containers have no outbound network or non-loopback interfaces;
            # provide a fallback so GetHostAddress() doesn't fail
            export DAPR_HOST_IP="${DAPR_HOST_IP:-127.0.0.1}"

            if [ "${target.fips}" = "true" ]; then
              # Tests use non-FIPS algorithms (X25519, SHA-1, GCM with arbitrary IVs);
              # use lenient mode to match the runtime image's GODEBUG=fips140=on setting
              export GODEBUG=fips140=on
            fi

            # CGO_ENABLED=0: build container has no linker (binutils not installed)
            # -tags unit: required to compile unit test helpers (WithAppChannel, mock, diag utils etc.)
            # Exclude tests/: those are integration/e2e tests, not unit tests.
            # Also exclude the dnslookup package because upstream added an
            # integration-style reconnect test there that depends on mixed
            # IPv4/IPv6 loopback behavior and is flaky in the DHI build sandbox.
            CGO_ENABLED=0 go test -tags unit \
              $(go list -tags unit ./... \
                | grep -v 'github.com/dapr/dapr/tests/' \
                | grep -v 'github.com/dapr/dapr/pkg/actors/internal/placement/connector/dnslookup$')
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/dapr/dapr/cmd/daprd
          with:
            ldflags:
              - -X github.com/dapr/dapr/pkg/buildinfo.gitcommit=3974797d4325124650f3a6c9bf220ba327f84e6c
              - -X github.com/dapr/dapr/pkg/buildinfo.gitversion=1.17.5
              - -X github.com/dapr/dapr/pkg/buildinfo.version=1.17.5
            output: ${target.dir}/usr/local/bin/daprd
            tags: allcomponents
      outputs:
        - source: ${target.dir}/usr/local/bin/daprd
          target: /usr/local/bin/daprd
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/dapr
          target: /opt/docker/sbom/dapr
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
