# syntax=dhi.io/build:2-debian13

name: Envoy 1.35.x (dev)
image: dhi.io/envoy
variant: dev
tags:
  - 1.35-dev
  - 1.35.13-dev
  - 1.35-debian-dev
  - 1.35-debian13-dev
  - 1.35.13-debian-dev
  - 1.35.13-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-07-23"
  end-of-life: "2026-07-23"
vars:
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:c15d7b64f2933c44a0572422287bfa97eb43bfb1c5e15c1b82e997bc5a1ba16d
  BAZEL_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "arm64" }'
  BAZEL_VERSION: 7.7.1
  CLANG_VERSION: "18"
  COMMIT_SHA: adb998f2875986005be294d10231a9c9a497e30d
  SEMVER_MAJOR_MINOR_VERSION: "1.35"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.35.13
  VERSION: 1.35.13
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libc6
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: envoy
      shell: /bin/bash
      caches:
        - path: /bazel-disk-cache
        - path: /bazel-repo-cache
      contents:
        packages:
          - autoconf
          - automake
          - bash
          - build-essential
          - ca-certificates
          - clang-18
          - cmake
          - coreutils
          - curl
          - findutils
          - git
          - golang-1.26
          - grep
          - gzip
          - libc++-18-dev
          - libc++abi-18-dev
          - libclang-18-dev
          - lld-18
          - llvm-18-dev
          - libtool
          - mawk
          - ninja-build
          - patch
          - patchelf
          - pkg-config
          - python-3.13
          - sed
          - unzip
          - zip
        files:
          - url: git+https://github.com/envoyproxy/envoy.git#v1.35.13
            checksum: adb998f2875986005be294d10231a9c9a497e30d
            path: ${source.dir}/envoy
            spdx:
              name: envoy
              version: 1.35.13
              packages:
                - name: envoy
                  purl: pkg:dhi/envoy@1.35.13
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://github.com/bazelbuild/bazel/releases/download/7.7.1/bazel-7.7.1-linux-${BAZEL_ARCH}
            checksum: https://github.com/bazelbuild/bazel/releases/download/7.7.1/bazel-7.7.1-linux-${BAZEL_ARCH}.sha256
            path: /opt/bazel/bin/bazel
            uid: 0
            gid: 0
            mode: "0755"
      pipeline:
        - name: setup
          work-dir: ${source.dir}/envoy
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ -f bazel/setup_clang.sh ]; then
              BAZELRC_FILE="${PWD}/clang.bazelrc" bash bazel/setup_clang.sh "/usr/lib/llvm-18"
            fi
        - name: build
          work-dir: ${source.dir}/envoy
          privileged: true
          runs: |
            set -eux -o pipefail

            export CC="clang-18" CXX="clang++-18"

            BAZEL_BUILD_OPTS=(
              -c opt
              --curses=no
              --verbose_failures
              --sandbox_debug
              --jobs=auto
              --experimental_ui_max_stdouterr_bytes=11712829
              --disk_cache=/bazel-disk-cache
              --repository_cache=/bazel-repo-cache
              --experimental_disk_cache_gc_max_size=5G
              --experimental_disk_cache_gc_max_age=30d
            )

            if grep -q "clang-local" .bazelrc; then
              BAZEL_BUILD_OPTS+=(
                --config=clang-local
                --repo_env=BAZEL_LLVM_PATH=/usr/lib/llvm-18
                --repo_env=BAZEL_USE_HOST_SYSROOT=True
              )
            else
              BAZEL_BUILD_OPTS+=(--config=clang)
            fi

            if [ "${target.fips}" = "true" ]; then
              if grep -q "boringssl-fips" .bazelrc; then
                BAZEL_BUILD_OPTS+=(--config=boringssl-fips)
              else
                BAZEL_BUILD_OPTS+=(--define=boringssl=fips)
              fi
            fi

            test "${target.arch}" = "arm64" && BAZEL_BUILD_OPTS+=(--cpu=aarch64)

            /opt/bazel/bin/bazel --batch build "${BAZEL_BUILD_OPTS[@]}" \
              //source/exe:envoy-static.stripped

            install -D -m0755 bazel-bin/source/exe/envoy-static.stripped \
              "${target.dir}/usr/local/bin/envoy"
        - name: envoy bazel sbom
          work-dir: ${source.dir}/envoy
          privileged: true
          runs: |
            set -eux -o pipefail

            mkdir -p /opt/docker/sbom/envoy
            python3 "${source.dir}/bin/envoy-bazel-to-spdx.py" envoy "1.35.13" \
              > /opt/docker/sbom/envoy/.spdx.envoy.json
      paths:
        - type: file
          path: ${source.dir}/bin/envoy-bazel-to-spdx.py
          uid: 0
          gid: 0
          source: image/envoy/bin/envoy-bazel-to-spdx.py
        - type: file
          path: ${source.dir}/patch/boringssl-fips-disable-tests.patch
          uid: 0
          gid: 0
          source: image/envoy/debian-13/patch/boringssl-fips-disable-tests.patch
      outputs:
        - source: ${target.dir}/usr/local/bin/envoy
          target: /usr/local/bin/envoy
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Envoy image
  org.opencontainers.image.licenses: Apache-2.0
cmd:
  - envoy
