# syntax=dhi.io/build:2-debian13

name: Envoy 1.36.x (dev)
image: dhi.io/envoy
variant: dev
tags:
  - 1.36-dev
  - 1.36.7-dev
  - 1.36-debian-dev
  - 1.36-debian13-dev
  - 1.36.7-debian-dev
  - 1.36.7-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-14"
  end-of-life: "2026-10-14"
vars:
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:b618aa4d5527e8c7994df10674702729ffbbc16840d77507a73947e4b10bcbec
  ENVOY_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch_64" }'
  SEMVER_MAJOR_MINOR_VERSION: "1.36"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.36.7
  VERSION: 1.36.7
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: envoy
      contents:
        packages:
          - coreutils
          - bash
          - grep
          - dirmngr
          - gpg
          - gpg-agent
        files:
          - url: https://github.com/envoyproxy/envoy/releases/download/v1.36.7/checksums.txt.asc
            path: ${source.dir}/checksums.txt.asc
            uid: 0
            gid: 0
          - url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x0AFCE836BA4D1D35763C8523D8CDC3750181F31F
            path: ${source.dir}/envoy-maintainers.gpg
            uid: 0
            gid: 0
          - url: https://github.com/envoyproxy/envoy/releases/download/v1.36.7/envoy-1.36.7-linux-${ENVOY_ARCH}
            path: ${source.dir}/envoy-1.36.7-linux-${ENVOY_ARCH}
            spdx:
              name: envoy
              version: 1.36.7
              packages:
                - name: envoy
                  purl: pkg:dhi/envoy@1.36.7
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: verify
          runs: |
            set -eux -o pipefail

            # GPG verification
            gpg --batch --yes --import envoy-maintainers.gpg
            gpg --batch --yes --output checksums.txt --decrypt checksums.txt.asc

            # Extract and rewrite checksum line
            awk "/envoy-1.36.7-linux-${ENVOY_ARCH}\$/ {
              printf \"%s  envoy-%s-linux-%s\\n\", \$1, \"1.36.7\", \"${ENVOY_ARCH}\"
            }" checksums.txt > checksum-single.txt

            [ -s checksum-single.txt ] || {
              echo "Error: Checksum for envoy-1.36.7-linux-${ENVOY_ARCH} not found in checksums.txt.asc"
              exit 1
            }

            # Validate directly in ${source.dir}
            sha256sum -c checksum-single.txt
        - name: install
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/local/bin"
            cp "${source.dir}/envoy-1.36.7-linux-${ENVOY_ARCH}" "${target.dir}/usr/local/bin/envoy"
      outputs:
        - source: ${target.dir}/usr/local/bin/envoy
          target: /usr/local/bin/envoy
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-glibc-debian13@sha256:b618aa4d5527e8c7994df10674702729ffbbc16840d77507a73947e4b10bcbec
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Envoy image
  org.opencontainers.image.licenses: Apache-2.0
cmd:
  - envoy
