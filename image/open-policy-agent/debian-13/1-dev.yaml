vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 37b80cb7b620c82049fb5775fe83b841ff3677ba
  GOLANG_REFERENCE: dhi/golang:1.26.2-debian13-dev@sha256:086c893153f92793f3a1541793cd4a8e8b23bfd4ccaf70c8f4261f496080fb0e
  SEMVER_MAJOR_MINOR_VERSION: "1.15"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.15.2
  VERSION: 1.15.2
contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: open-policy-agent
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:086c893153f92793f3a1541793cd4a8e8b23bfd4ccaf70c8f4261f496080fb0e
      work-dir: /go/src/github.com/open-policy-agent
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/open-policy-agent/opa.git#v1.15.2
            checksum: 37b80cb7b620c82049fb5775fe83b841ff3677ba
            path: /go/src/github.com/open-policy-agent
            spdx:
              name: open-policy-agent
              version: 1.15.2
              packages:
                - name: open-policy-agent
                  purl: pkg:dhi/open-policy-agent@1.15.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              # Use lenient mode for the build-time sanity step so Go can still fetch
              # modules during generate/test; the final FIPS image itself remains in
              # strict fips140=only mode.
              export GODEBUG=fips140=on
              export GOFIPS140=v1.0.0
            fi

            # Mirrors upstream's generate target before running unit tests and build.
            CGO_ENABLED=0 GOFLAGS="-buildmode=exe" go generate
            # Run a focused product-relevant Go unit-test subset during the image build;
            # the full image behavior is validated by the image test suite.
            CGO_ENABLED=0 GOFLAGS="-buildmode=exe" go test ./v1/rego ./v1/topdown ./v1/bundle ./v1/runtime ./v1/server/... ./v1/sdk
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/open-policy-agent/opa/version.Hostname=dhi
              - -X github.com/open-policy-agent/opa/version.Version=1.15.2
            output: ${target.dir}/usr/bin/opa
            packages: .
      outputs:
        - source: ${target.dir}/usr/bin/opa
          target: /usr/bin/opa
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/open-policy-agent
          target: /opt/docker/sbom/open-policy-agent
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
