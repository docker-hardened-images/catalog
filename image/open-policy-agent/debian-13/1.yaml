# syntax=dhi.io/build:2-debian13

name: Open Policy Agent 1.x
image: dhi.io/open-policy-agent
variant: runtime
tags:
  - "1"
  - "1.18"
  - 1.18.0
  - 1-debian
  - 1-debian13
  - 1.18-debian
  - 1.18-debian13
  - 1.18.0-debian
  - 1.18.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2024-12-20"
vars:
  COMMIT_SHA: cc2c5c60a4c486f15a5e8de457e96ed0fefaf5fe
  SEMVER_MAJOR_MINOR_VERSION: "1.18"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.18.0
  VERSION: 1.18.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: open-policy-agent
      work-dir: /go/src/github.com/open-policy-agent
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/open-policy-agent/opa.git#v1.18.0
            checksum: cc2c5c60a4c486f15a5e8de457e96ed0fefaf5fe
            path: /go/src/github.com/open-policy-agent
            spdx:
              name: open-policy-agent
              version: 1.18.0
              packages:
                - name: open-policy-agent
                  purl: pkg:dhi/open-policy-agent@1.18.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
            download: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GOFIPS140=v1.0.0
            fi

            # Mirrors upstream's generate target before running unit tests and build.
            CGO_ENABLED=0 GOFLAGS="-buildmode=exe" go generate
            # Run a focused product-relevant Go unit-test subset during the image build;
            # the full image behavior is validated by the image test suite.
            CGO_ENABLED=0 GOFLAGS="-buildmode=exe" go test ./v1/rego ./v1/topdown ./v1/bundle ./v1/runtime ./v1/server/... ./v1/sdk
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/open-policy-agent/opa/version.Hostname=dhi
              - -X github.com/open-policy-agent/opa/version.Version=1.18.0
            output: ${target.dir}/usr/bin/opa
            packages: .
      outputs:
        - source: ${target.dir}/usr/bin/opa
          target: /usr/bin/opa
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/open-policy-agent
          target: /opt/docker/sbom/open-policy-agent
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Open Policy Agent image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/opa
