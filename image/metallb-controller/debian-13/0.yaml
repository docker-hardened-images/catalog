# syntax=dhi.io/build:2-debian13

name: MetalLB controller 0.x
image: dhi.io/metallb-controller
variant: runtime
tags:
  - "0"
  - "0.16"
  - 0.16.1
  - 0-debian
  - 0-debian13
  - 0.16-debian
  - 0.16-debian13
  - 0.16.1-debian
  - 0.16.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 791dfcc63ced7a6b3e869131eae75e645150fff0
  SEMVER_MAJOR_MINOR_VERSION: "0.16"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.16.1
  VERSION: 0.16.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: metallb controller
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/metallb/metallb.git#v0.16.1
            checksum: 791dfcc63ced7a6b3e869131eae75e645150fff0
            path: /go/src/github.com/metallb/metallb
            spdx:
              name: metallb-controller
              version: 0.16.1
              packages:
                - name: metallb-controller
                  purl: pkg:docker/dhi/metallb-controller@0.16.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: download metallb dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/metallb/metallb/controller
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - go.opentelemetry.io/otel@v1.41.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.82.1
            download: true
        - name: test
          work-dir: /go/src/github.com/metallb/metallb/controller
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test ./...
        - name: build metallb controller
          uses: go/build@v1
          work-dir: /go/src/github.com/metallb/metallb/controller
          with:
            ldflags:
              - -X go.universe.tf/metallb/internal/version.gitCommit=791dfcc63ced7a6b3e869131eae75e645150fff0
              - -X go.universe.tf/metallb/internal/version.gitBranch=0.16.1
            output: ${target.dir}/usr/bin/controller
      outputs:
        - source: ${target.dir}/usr/bin/controller
          target: /usr/bin/controller
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/metallb-controller
          target: /opt/docker/sbom/metallb-controller
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal MetalLB controller image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/controller
