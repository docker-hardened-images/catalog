# syntax=dhi.io/build:2-debian13

name: Linstor Affinity Controller 1.x
image: dhi.io/linstor-affinity-controller
variant: runtime
tags:
  - "1"
  - "1.4"
  - 1.4.2
  - 1-debian
  - 1-debian13
  - 1.4-debian
  - 1.4-debian13
  - 1.4.2-debian
  - 1.4.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-07-15"
vars:
  COMMIT_SHA: aab1a3a951c19207fec1103d75f9e24a66e07d08
  SEMVER_MAJOR_MINOR_VERSION: "1.4"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.4.2
  VERSION: 1.4.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: linstor-affinity-controller
      work-dir: /go/src/github.com/piraeusdatastore/linstor-affinity-controller
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/piraeusdatastore/linstor-affinity-controller.git#v1.4.2
            checksum: aab1a3a951c19207fec1103d75f9e24a66e07d08
            path: /go/src/github.com/piraeusdatastore/linstor-affinity-controller
            spdx:
              name: linstor-affinity-controller
              version: 1.4.2
              packages:
                - name: linstor-affinity-controller
                  purl: pkg:golang/github.com/piraeusdatastore/linstor-affinity-controller@1.4.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test ./...
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/piraeusdatastore/linstor-affinity-controller/pkg/version.Version=1.4.2
            output: ${target.dir}/usr/local/bin/linstor-affinity-controller
            packages: ./cmd/linstor-affinity-controller
      outputs:
        - source: ${target.dir}/usr/local/bin/linstor-affinity-controller
          target: /usr/local/bin/linstor-affinity-controller
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/linstor-affinity-controller
          target: /opt/docker/sbom/linstor-affinity-controller
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /linstor-affinity-controller
    uid: 0
    gid: 0
    source: /usr/local/bin/linstor-affinity-controller
annotations:
  org.opencontainers.image.description: A minimal linstor affinity controller image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /linstor-affinity-controller
  - -v=2
