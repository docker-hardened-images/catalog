# syntax=dhi.io/build:2-debian13

name: External Secrets 2.x
image: dhi.io/external-secrets
variant: runtime
tags:
  - "2"
  - "2.7"
  - 2.7.0
  - 2-debian
  - 2-debian13
  - 2.7-debian
  - 2.7-debian13
  - 2.7.0-debian
  - 2.7.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-06"
vars:
  COMMIT_SHA: e215053f3e68504de7483f9542b49f19f98293a1
  SEMVER_MAJOR_MINOR_VERSION: "2.7"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.7.0
  VERSION: 2.7.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: external-secrets
      work-dir: /go/src/github.com/external-secrets/external-secrets
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/external-secrets/external-secrets#v2.7.0
            checksum: e215053f3e68504de7483f9542b49f19f98293a1
            path: /go/src/github.com/external-secrets/external-secrets
            spdx:
              name: external-secrets
              version: 2.7.0
              packages:
                - name: external-secrets
                  purl: pkg:dhi/external-secrets@2.7.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (2 only)
          uses: go/bump@v2
          with:
            deps:
              - github.com/Azure/go-ntlmssp@v0.1.1
              - go.mongodb.org/mongo-driver@v1.17.7
              - software.sslmate.com/src/go-pkcs12@v0.7.2
            download: true
        - uses: go/hermetic@v1
        - name: build external-secrets
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/external-secrets
            tags: all_providers
        - name: build esoctl
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/esoctl
            packages: ./cmd/esoctl
      outputs:
        - source: ${target.dir}/usr/local/bin/external-secrets
          target: /usr/local/bin/external-secrets
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/esoctl
          target: /usr/local/bin/esoctl
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/external-secrets
          target: /opt/docker/sbom/external-secrets
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal External Secrets Operator image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - external-secrets
