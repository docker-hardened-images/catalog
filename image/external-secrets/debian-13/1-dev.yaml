# syntax=dhi.io/build:2-debian13

name: External Secrets 1.x (dev)
image: dhi.io/external-secrets
variant: dev
tags:
  - 1-dev
  - 1.3-dev
  - 1.3.2-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.3-debian-dev
  - 1.3-debian13-dev
  - 1.3.2-debian-dev
  - 1.3.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: a2ec42276c5ec6ed46232648f2397823b9b84aaf
  SEMVER_MAJOR_MINOR_VERSION: "1.3"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.3.2
  VERSION: 1.3.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: external-secrets
      work-dir: /go/src/github.com/external-secrets/external-secrets
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
        files:
          - url: git+https://github.com/external-secrets/external-secrets#v1.3.2
            checksum: a2ec42276c5ec6ed46232648f2397823b9b84aaf
            path: /go/src/github.com/external-secrets/external-secrets
            spdx:
              name: external-secrets
              version: 1.3.2
              packages:
                - name: external-secrets
                  purl: pkg:dhi/external-secrets@1.3.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - github.com/Azure/go-ntlmssp@v0.1.1
              - github.com/go-git/go-billy/v5@v5.9.0
              - github.com/go-git/go-git/v5@v5.19.1
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel@v1.41.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: patch security fixes
          uses: git/patch@v1
          with:
            patches:
              - ${source.dir}/patch/security-pr5884.patch
              - ${source.dir}/patch/remove-gethostbyname.patch
              - ${source.dir}/patch/cve-2026-42875-ca-provider-namespace.patch
        - uses: go/hermetic@v1
        - name: build external-secrets
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/external-secrets
            tags: all_providers
        - name: build esoctl
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/esoctl
            packages: ./cmd/esoctl
      paths:
        - type: file
          path: ${source.dir}/patch/security-pr5884.patch
          uid: 0
          gid: 0
          source: image/external-secrets/patch/security-pr5884.patch
        - type: file
          path: ${source.dir}/patch/remove-gethostbyname.patch
          uid: 0
          gid: 0
          source: image/external-secrets/patch/remove-gethostbyname.patch
        - type: file
          path: ${source.dir}/patch/cve-2026-42875-ca-provider-namespace.patch
          uid: 0
          gid: 0
          source: image/external-secrets/patch/cve-2026-42875-ca-provider-namespace.patch
      outputs:
        - source: ${target.dir}/usr/local/bin/external-secrets
          target: /usr/local/bin/external-secrets
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/esoctl
          target: /usr/local/bin/esoctl
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/external-secrets
          target: /opt/docker/sbom/external-secrets
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal External Secrets Operator image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - external-secrets
