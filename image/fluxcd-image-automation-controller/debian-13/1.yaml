# syntax=dhi.io/build:2-debian13

name: fluxcd image automation controller 1.2.x
image: dhi.io/fluxcd-image-automation-controller
variant: runtime
tags:
  - "1"
  - "1.2"
  - 1.2.2
  - 1-debian
  - 1-debian13
  - 1.2-debian
  - 1.2-debian13
  - 1.2.2-debian
  - 1.2.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-12"
vars:
  COMMIT_SHA: 5ab5a198751115db0613716dbac4847e21c19f3e
  SEMVER_MAJOR_MINOR_VERSION: "1.2"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.2.2
  VERSION: 1.2.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: fluxcd-image-automation-controller
      work-dir: /go/src/github.com/fluxcd/image-automation-controller
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - git
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/fluxcd/image-automation-controller#v1.2.2
            checksum: 5ab5a198751115db0613716dbac4847e21c19f3e
            path: /go/src/github.com/fluxcd/image-automation-controller
            spdx:
              name: fluxcd-image-automation-controller
              version: 1.2.2
              packages:
                - name: fluxcd-image-automation-controller
                  purl: pkg:golang/github.com/fluxcd/image-automation-controller@1.2.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v2
          with:
            deps:
              - github.com/go-git/go-git/v5@v5.19.1
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Exclude packages that cannot run in the build environment:
            # - internal/controller: requires testenv
            CGO_ENABLED=0 go test $(go list ./internal/... | grep -vE '/internal/(controller)')
        - name: build
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/image-automation-controller
      outputs:
        - source: ${target.dir}/usr/local/bin/image-automation-controller
          target: /usr/local/bin/image-automation-controller
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-image-automation-controller
          target: /opt/docker/sbom/fluxcd-image-automation-controller
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Flux CD image-automation-controller image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/image-automation-controller
