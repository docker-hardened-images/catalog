metadata:
  display-name: Varnish Cache
  short-description: Varnish Cache is a high-performance HTTP accelerator and caching reverse proxy designed to speed up web applications by caching content in memory and serving it at very high throughput.
  featured: false
  home-url: https://github.com/varnishcache/varnish-cache
  categories:
    - networking
  included-tools:
    - name: varnishd
      description: Varnish Cache HTTP accelerator daemon
    - name: varnishadm
      description: CLI for interacting with the varnishd management interface
    - name: varnishlog
      description: Live viewer for shared-memory (SHMLOG) request logs
    - name: varnishstat
      description: Display runtime counters and statistics from a running varnishd
    - name: varnishhist
      description: Terminal histogram of request latencies read from SHMLOG
    - name: varnishncsa
      description: Emit NCSA-style (Apache/Common Log Format) access logs from SHMLOG
    - name: varnishtop
      description: Top-like live view of the most frequent SHMLOG tags
    - name: varnishtest
      description: Varnish Test Case (VTC) harness for VCL and HTTP behavior tests
