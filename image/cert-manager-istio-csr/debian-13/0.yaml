    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: cert-manager-istio-csr
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/cert-manager/istio-csr.git#v0.16.0
            checksum: 65eca69f870fc08f191efb5b8a6e7b890f61bb95
            path: /go/src/github.com/cert-manager/istio-csr
            spdx:
              name: cert-manager-istio-csr
              version: 0.16.0
              packages:
                - name: cert-manager-istio-csr
                  purl: pkg:golang/github.com/cert-manager/istio-csr@0.16.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/cert-manager/istio-csr
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/Azure/go-ntlmssp@v0.1.1
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
              - istio.io/api@v1.29.0-alpha.0.0.20260327042620-ea30db2515c3
              - istio.io/client-go@v1.29.0-alpha.0.0.20260325050017-f170fce292ba
              - istio.io/istio@v0.0.0-20260410004459-189832a289c1
            download: true
        - name: test
          work-dir: /go/src/github.com/cert-manager/istio-csr
          privileged: true
          runs: |
            set -eux -o pipefail

            # Skip e2e tests that require Kubernetes cluster
            CGO_ENABLED=0 go test $(go list ./... | grep -v '/test/e2e')
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/cert-manager/istio-csr
          with:
            ldflags:
              - -X github.com/cert-manager/istio-csr/internal/version.AppVersion=0.16.0
            output: ${target.dir}/usr/local/bin/manager
            packages: ./cmd
      outputs:
        - source: ${target.dir}/usr/local/bin/manager
          target: /usr/local/bin/manager
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/cert-manager-istio-csr
          target: /opt/docker/sbom/cert-manager-istio-csr
