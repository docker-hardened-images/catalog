metadata:
  display-name: Virt Launcher
  short-description: Virt Launcher provides the runtime environment for virtual machines in KubeVirt
  featured: false
  home-url: https://kubevirt.io/user-guide
  categories:
    - integration-and-delivery
  included-tools:
    - name: virt-launcher
      description: KubeVirt VM supervisor; spawns and monitors the qemu process for one VirtualMachineInstance.
    - name: virt-launcher-monitor
      description: Parent process the KubeVirt operator runs as the pod entrypoint; supervises virt-launcher and applies cap_net_bind_service to the child.
    - name: virt-probe
      description: Liveness and readiness probe binary the KubeVirt operator wires into the VirtualMachineInstance pod spec.
    - name: virt-tail
      description: Streams the qemu serial console log to the VM owner via kubectl logs.
    - name: virt-freezer
      description: Issues qemu-guest-agent freeze/thaw commands so guest filesystems are quiesced before snapshots.
    - name: libvirt-hook-client
      description: Go binary that replaces the static /etc/libvirt/hooks/qemu shell hook when the LibvirtHooksServerAndClient feature gate is enabled.
    - name: container-disk
      description: Static C binary embedded in customer-built ContainerDisk images to publish the disk over a unix socket.
    - name: qemu-system-x86_64
      description: x86_64 KVM hypervisor (Debian qemu-system-x86 package).
    - name: libvirtd
      description: Connection manager for qemu; KubeVirt invokes it via the virtqemud driver subset.
