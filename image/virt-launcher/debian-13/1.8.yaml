        - source: ${target.dir}/usr/bin/virt-tail
          target: /usr/bin/virt-tail
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/bin/virt-freezer
          target: /usr/bin/virt-freezer
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/bin/libvirt-hook-client
          target: /usr/bin/libvirt-hook-client
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/bin/container-disk
          target: /usr/bin/container-disk
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/bin/node-labeller.sh
          target: /usr/bin/node-labeller.sh
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/libvirt/qemu.conf
          target: /etc/libvirt/qemu.conf
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/libvirt/virtqemud.conf
          target: /etc/libvirt/virtqemud.conf
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/libvirt/hooks/qemu
          target: /etc/libvirt/hooks/qemu
          uid: 0
