# syntax=dhi.io/build:2-debian13

name: Virt Launcher 1.8.x
image: dhi.io/virt-launcher
variant: runtime
tags:
  - "1"
  - "1.8"
  - 1.8.3
  - 1-debian
  - 1-debian13
  - 1.8-debian
  - 1.8-debian13
  - 1.8.3-debian
  - 1.8.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-18"
vars:
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:c15d7b64f2933c44a0572422287bfa97eb43bfb1c5e15c1b82e997bc5a1ba16d
  COMMIT_SHA: 540f37cfa3caed601ac6710cb002b11a249d0639
  GOLANG_REFERENCE: dhi/golang:1.26.4-debian13-dev@sha256:9a675e23c51e343854caccdcf56c40a9f39b5c3024ca02ae045b48786d0d7a42
  SEMVER_MAJOR_MINOR_VERSION: "1.8"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.8.3
  VERSION: 1.8.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - curl
    - dbus
    - diffutils
    - dmidecode
    - dpkg
    - ethtool
    - findutils
    - gnutls-bin
