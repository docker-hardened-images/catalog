        - source: ${target.dir}/etc/nsswitch.conf
          target: /etc/nsswitch.conf
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/virt-launcher
          target: /opt/docker/sbom/virt-launcher
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-glibc-debian13@sha256:c15d7b64f2933c44a0572422287bfa97eb43bfb1c5e15c1b82e997bc5a1ba16d
      includes:
