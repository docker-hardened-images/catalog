    - kmod
    - libc-bin
    - libcap2-bin
    - libnbd-bin
    - libnbd0
    - libusbredirhost1t64
    - libusbredirparser1t64
    - libvirt-clients
    - libvirt-daemon-driver-qemu
    - libvirt-daemon-system
    - libvirt0
    - mawk
    - ncat
    - nftables
    - numactl
    - numad
    - ovmf
    - passt
    - perl-base
    - procps
    - psmisc
    - qemu-system-common
    - qemu-system-data
    - qemu-system-x86
    - qemu-utils
    - seabios
    - sed
    - swtpm
    - swtpm-tools
    - tzdata
    - util-linux
    - virtiofsd
    - xorriso
  builds:
    - name: virt-launcher
      uses: dhi.io/golang:1.26.4-debian13-dev@sha256:9a675e23c51e343854caccdcf56c40a9f39b5c3024ca02ae045b48786d0d7a42
      work-dir: /go/src/kubevirt.io/kubevirt
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - pkg-config
          - libvirt-dev
          - libnbd-dev
          - gcc
          - libc6-dev
          - libcap2-bin
        files:
          - url: git+https://github.com/kubevirt/kubevirt.git#v1.8.3
            checksum: 540f37cfa3caed601ac6710cb002b11a249d0639
            path: /go/src/kubevirt.io/kubevirt
            spdx:
              name: virt-launcher
              version: 1.8.3
              packages:
                - name: virt-launcher
                  purl: pkg:golang/kubevirt.io/kubevirt@1.8.3
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch go dependencies
          uses: go/bump@v2
          with:
            deps:
              - github.com/containers/common@v0.60.4
              - github.com/opencontainers/runc@v1.2.8
              - golang.org/x/oauth2@v0.36.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: patch runc cgroup devices API compat
          uses: patch@v1
          with:
            options: -p1
            patch: ${source.dir}/patch/runc-cgroup-devices-api-compat.patch
        - name: test
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              # Some unit tests will try to use X25519 which fips140=only rejects.
              # We run lenient mode in test to match the runtime variant.
              export GODEBUG=fips140=on
            fi

            # Build test helper binary required by monitor_test.go
            CGO_ENABLED=0 go build -o _out/cmd/fake-qemu-process/fake-qemu-process ./cmd/fake-qemu-process/

            # -vet=off: virt-launcher v1.5.x has non-constant format strings caught by Go 1.26's linting
            # CGO_ENABLED=1: upstream requires libvirt C bindings (libvirt-dev)
            CGO_ENABLED=1 go test -vet=off ./cmd/virt-launcher/... ./pkg/virt-launcher/...
        - name: build virt-launcher
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 1
            ldflags:
              - -X kubevirt.io/client-go/version.gitVersion=v1.8.3
              - -X kubevirt.io/client-go/version.gitCommit=540f37cfa3caed601ac6710cb002b11a249d0639
            output: ${target.dir}/usr/bin/virt-launcher
            packages: ./cmd/virt-launcher
        - name: build virt-launcher-monitor
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            ldflags:
              - -X kubevirt.io/client-go/version.gitVersion=v1.8.3
              - -X kubevirt.io/client-go/version.gitCommit=540f37cfa3caed601ac6710cb002b11a249d0639
            output: ${target.dir}/usr/bin/virt-launcher-monitor
            packages: ./cmd/virt-launcher-monitor
        - name: build virt-probe
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            output: ${target.dir}/usr/bin/virt-probe
            packages: ./cmd/virt-probe
        - name: build virt-tail
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            output: ${target.dir}/usr/bin/virt-tail
            packages: ./cmd/virt-tail
        - name: build virt-freezer
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            output: ${target.dir}/usr/bin/virt-freezer
            packages: ./cmd/virt-freezer
        - name: build libvirt-hook-client
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            output: ${target.dir}/usr/bin/libvirt-hook-client
            packages: ./cmd/virt-launcher/libvirt-hook-client
        - name: build container-disk
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/usr/bin
            gcc -static -O2 -Wall \
              -o ${target.dir}/usr/bin/container-disk \
              ./cmd/container-disk-v2alpha/main.c
            chmod 0755 ${target.dir}/usr/bin/container-disk
        - name: set file capabilities
          runs: |
            set -eux -o pipefail

            setcap cap_net_bind_service+ep ${target.dir}/usr/bin/virt-launcher-monitor
            getcap ${target.dir}/usr/bin/virt-launcher-monitor
        - name: install scripts and config
          runs: |
            set -eux -o pipefail

            install -m 0755 -D ./cmd/virt-launcher/node-labeller/node-labeller.sh ${target.dir}/usr/bin/node-labeller.sh
            install -m 0644 -D ./cmd/virt-launcher/qemu.conf ${target.dir}/etc/libvirt/qemu.conf
            install -m 0644 -D ./cmd/virt-launcher/virtqemud.conf ${target.dir}/etc/libvirt/virtqemud.conf
            install -m 0755 -D ./cmd/virt-launcher/qemu ${target.dir}/etc/libvirt/hooks/qemu
            install -m 0644 -D ./cmd/virt-launcher/nsswitch.conf ${target.dir}/etc/nsswitch.conf
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/virt-launcher/patch
      outputs:
        - source: ${target.dir}/usr/bin/virt-launcher
          target: /usr/bin/virt-launcher
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/bin/virt-launcher-monitor
          target: /usr/bin/virt-launcher-monitor
          uid: 0
