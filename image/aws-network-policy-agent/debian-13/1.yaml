# syntax=dhi.io/build:2-debian13

name: AWS Network Policy Agent 1.x
image: dhi.io/aws-network-policy-agent
variant: runtime
tags:
  - "1"
  - "1.3"
  - 1.3.4
  - 1-debian13
  - 1.3-debian13
  - 1.3.4-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-12-19"
vars:
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
  COMMIT_SHA: 6dc7ebddf4485b78b9e80c4db763d6530bc33e4d
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:6e257a15c0aa81a30cd698e950469f07dd71d6c7e4c6a30e0badbf9494b1d6f3
  SEMVER_MAJOR_MINOR_VERSION: "1.3"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.3.4
  VERSION: 1.3.4
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: aws-network-policy-agent
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:6e257a15c0aa81a30cd698e950469f07dd71d6c7e4c6a30e0badbf9494b1d6f3
      work-dir: /go/src/github.com/aws/aws-network-policy-agent
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bpftool
          - clang
          - libbpf-dev
          - llvm
        files:
          - url: git+https://github.com/aws/aws-network-policy-agent.git#v1.3.4
            checksum: 6dc7ebddf4485b78b9e80c4db763d6530bc33e4d
            path: /go/src/github.com/aws/aws-network-policy-agent
            spdx:
              name: aws-network-policy-agent
              version: 1.3.4
              packages:
                - name: aws-network-policy-agent
                  purl: pkg:golang/github.com/aws/aws-network-policy-agent@1.3.4
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/cloudwatchlogs@v1.65.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: run go tests
          runs: |
            set -eux -o pipefail

            # For FIPS builds, use lenient mode to allow SHA-1 usage in interface name generation
            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            go test $(go list ./... | grep -v 'test/integration')
        - name: generate vmlinux.h
          privileged: true
          runs: |
            set -eux -o pipefail

            bpftool btf dump file /sys/kernel/btf/vmlinux format c > pkg/ebpf/c/vmlinux.h
        - name: build BPF programs
          runs: |
            set -eux -o pipefail

            # Determine architecture for TC programs (events programs are x86-only upstream)
            ARCH=$(uname -m | sed 's/x86_64/amd64/g; s/aarch64/arm64/g')
            EBPF_DIR=./pkg/ebpf/c
            # Include path mirrors upstream Makefile: CLANG_INCLUDE := -I../../.
            CLANG_INCLUDE="-I../../."
            CLANG_FLAGS="${CLANG_INCLUDE} -g -O2 -Wall -fpie -target bpf -DCORE -D__BPF_TRACING__"

            # Events programs (hardcoded x86 per upstream Makefile)
            clang ${CLANG_FLAGS} -D__TARGET_ARCH_x86 -c ${EBPF_DIR}/v4events.bpf.c -o ${EBPF_DIR}/v4events.bpf.o
            clang ${CLANG_FLAGS} -D__TARGET_ARCH_x86 -c ${EBPF_DIR}/v6events.bpf.c -o ${EBPF_DIR}/v6events.bpf.o

            # TC programs (architecture-specific per upstream Makefile)
            clang ${CLANG_FLAGS} -D__TARGET_ARCH_${ARCH} -c ${EBPF_DIR}/tc.v4ingress.bpf.c -o ${EBPF_DIR}/tc.v4ingress.bpf.o
            clang ${CLANG_FLAGS} -D__TARGET_ARCH_${ARCH} -c ${EBPF_DIR}/tc.v4egress.bpf.c -o ${EBPF_DIR}/tc.v4egress.bpf.o
            clang ${CLANG_FLAGS} -D__TARGET_ARCH_${ARCH} -c ${EBPF_DIR}/tc.v6ingress.bpf.c -o ${EBPF_DIR}/tc.v6ingress.bpf.o
            clang ${CLANG_FLAGS} -D__TARGET_ARCH_${ARCH} -c ${EBPF_DIR}/tc.v6egress.bpf.c -o ${EBPF_DIR}/tc.v6egress.bpf.o
        - name: build controller
          uses: go/build@v1
          with:
            cgo_enabled: 1
            extra-args: -buildmode=pie
            ldflags:
              - -X github.com/aws/aws-network-policy-agent/pkg/version.GitVersion=1.3.4
              - -X github.com/aws/aws-network-policy-agent/pkg/version.GitCommit=6dc7ebddf4485b78b9e80c4db763d6530bc33e4d
              - -X github.com/aws/aws-network-policy-agent/pkg/version.BuildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
              - -extldflags=-static
            output: ${target.dir}/controller
            packages: .
            strip: true
            tags: netgo,ebpf,core
        - name: build aws-eks-na-cli
          uses: go/build@v1
          with:
            output: ${target.dir}/aws-eks-na-cli
            packages: ./cmd/cli
            strip: true
        - name: build aws-eks-na-cli-v6
          uses: go/build@v1
          with:
            output: ${target.dir}/aws-eks-na-cli-v6
            packages: ./cmd/cliv6
            strip: true
      outputs:
        - source: ${target.dir}/controller
          target: /controller
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/aws-eks-na-cli
          target: /aws-eks-na-cli
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/aws-eks-na-cli-v6
          target: /aws-eks-na-cli-v6
          uid: 0
          gid: 0
          mode: "0755"
        - source: /go/src/github.com/aws/aws-network-policy-agent/pkg/ebpf/c/tc.v4ingress.bpf.o
          target: /tc.v4ingress.bpf.o
          uid: 0
          gid: 0
          mode: "0644"
        - source: /go/src/github.com/aws/aws-network-policy-agent/pkg/ebpf/c/tc.v4egress.bpf.o
          target: /tc.v4egress.bpf.o
          uid: 0
          gid: 0
          mode: "0644"
        - source: /go/src/github.com/aws/aws-network-policy-agent/pkg/ebpf/c/tc.v6ingress.bpf.o
          target: /tc.v6ingress.bpf.o
          uid: 0
          gid: 0
          mode: "0644"
        - source: /go/src/github.com/aws/aws-network-policy-agent/pkg/ebpf/c/tc.v6egress.bpf.o
          target: /tc.v6egress.bpf.o
          uid: 0
          gid: 0
          mode: "0644"
        - source: /go/src/github.com/aws/aws-network-policy-agent/pkg/ebpf/c/v4events.bpf.o
          target: /v4events.bpf.o
          uid: 0
          gid: 0
          mode: "0644"
        - source: /go/src/github.com/aws/aws-network-policy-agent/pkg/ebpf/c/v6events.bpf.o
          target: /v6events.bpf.o
          uid: 0
          gid: 0
          mode: "0644"
  artifacts:
    - name: dhi.io/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
