# syntax=dhi.io/build:2-debian13

name: Apache NiFi 2.x
image: dhi.io/nifi
variant: runtime
tags:
  - "2"
  - "2.10"
  - 2.10.0
  - 2-debian
  - 2-debian13
  - 2.10-debian
  - 2.10-debian13
  - 2.10.0-debian
  - 2.10.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-18"
vars:
  COMMIT_SHA: 2baff691128fa782983fb79bb1087adff027a4c1
  JAVA_HOME: /usr/lib/jvm/temurin-21
  JAVA_MAJOR_VERSION: "21"
  MAVEN_REFERENCE: dhi/maven:3.9.16-jdk21-debian13-dev@sha256:d5345690e9a38322275e734fcd87854e2bed7b0be9e4150137019480c56d28fc
  MAVEN_VERSION: 3.9.16
  NIFI_HOME: /opt/nifi/nifi-current
  PYTHON_REFERENCE: dhi/python:3.13.14-debian13@sha256:f97073bcfd7f380ad2479fc49371709a345763b10687b5bb4b61bbc9a318bfd9
  PYTHON_VERSION: 3.13.14
  SEMVER_MAJOR_MINOR_VERSION: "2.10"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.10.0
  UV_ARCH: '#{ target.arch == "amd64" ? "x86_64-unknown-linux-gnu" : "aarch64-unknown-linux-gnu" }'
  UV_VERSION: 0.11.30
  VERSION: 2.10.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - coreutils
    - eclipse-temurin-21-jre
    - eclipse-temurin-21-jre-oci-config
    - grep
    - hostname
    - libstdc++6
    - mawk
    - procps
    - python-3.13
    - python-3.13-dev
    - python3-pip
    - python3-setuptools
    - python3-wheel
    - sed
    - xmlstarlet
  builds:
    - name: nifi
      uses: dhi.io/maven:3.9.16-jdk21-debian13-dev@sha256:d5345690e9a38322275e734fcd87854e2bed7b0be9e4150137019480c56d28fc
      environment:
        MAVEN_OPTS: -Xmx2g -XX:ReservedCodeCacheSize=1g
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - curl
          - git
          - gpg
          - gpg-agent
          - grep
          - gzip
          - jq
          - libstdc++6
          - tar
          - unzip
          - xmlstarlet
        files:
          - url: git+https://github.com/apache/nifi.git#rel/nifi-2.10.0
            checksum: 2baff691128fa782983fb79bb1087adff027a4c1
            path: ${source.dir}/nifi
            spdx:
              name: nifi
              version: 2.10.0
              packages:
                - name: nifi
                  purl: pkg:github/apache/nifi@2.10.0
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://github.com/astral-sh/uv/releases/download/0.11.30/uv-${UV_ARCH}.tar.gz
            checksum: https://github.com/astral-sh/uv/releases/download/0.11.30/uv-${UV_ARCH}.tar.gz.sha256
            path: ${source.dir}/uv-${UV_ARCH}.tar.gz
            spdx:
              name: uv-binary
              version: 0.11.30
              packages:
                - name: uv
                  purl: pkg:github/astral-sh/uv@0.11.30
                  license: MIT OR Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: setup uv
          runs: |
            set -eux -o pipefail

            # Create target directory first
            mkdir -p "${target.dir}/nifi-uv/.local/bin"

            # Extract UV binary to target location
            UV_TAR="${source.dir}/uv-${UV_ARCH}.tar.gz"
            UV_ARCH_DIR="uv-${UV_ARCH}"
            echo "Extracting UV binary from $UV_TAR"
            tar -xzf "$UV_TAR" -C "${target.dir}/nifi-uv/.local/bin" --strip-components=1 "${UV_ARCH_DIR}/uv"

            # Make binary executable
            chmod +x "${target.dir}/nifi-uv/.local/bin/uv"

            # Verify uv binary was installed correctly
            "${target.dir}/nifi-uv/.local/bin/uv" --version
        - name: patch
          uses: mvn/patch@v1
          with:
            dependencies: ${source.dir}/patch/mvn-deps.json
            mvn-root: ${source.dir}/nifi
            properties: ${source.dir}/patch/mvn-properties.json
        - name: remove develocity maven extension
          work-dir: ${source.dir}/nifi
          runs: |
            set -eux -o pipefail

            # Remove the Gradle Develocity extension — it's optional build analytics tooling
            # and version 2.1 is not available on Maven Central, causing resolution failures.
            if [ -f ".mvn/extensions.xml" ]; then
              xmlstarlet ed -P -L \
                -d "//*[local-name()='extension'][*[local-name()='groupId'][text()='com.gradle']]" \
                .mvn/extensions.xml
            fi
        - name: configure maven mirror
          runs: |
            set -eux -o pipefail

            mkdir -p /root/.m2
            cat > /root/.m2/settings.xml << 'EOF'
            <?xml version="1.0" encoding="UTF-8"?>
            <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
              <mirrors>
                <mirror>
                  <id>google-maven-central</id>
                  <name>GCS Maven Central mirror</name>
                  <url>https://maven-central.storage-download.googleapis.com/maven2/</url>
                  <mirrorOf>central</mirrorOf>
                </mirror>
              </mirrors>
            </settings>
            EOF
        - name: patch nifi toolkit cli
          work-dir: ${source.dir}/nifi/nifi-toolkit/nifi-toolkit-cli
          runs: |
            set -eux -o pipefail

            xmlstarlet ed -P -L \
              -N m="http://maven.apache.org/POM/4.0.0" \
              -u "/m:project/m:properties/m:jline.version" \
              -v "4.2.1" \
              pom.xml

            test "$(xmlstarlet sel -N m="http://maven.apache.org/POM/4.0.0" -t -v "/m:project/m:properties/m:jline.version" pom.xml)" = "4.2.1"
        - name: patch minifi commons daemon download
          work-dir: ${source.dir}/nifi
          runs: |
            set -eux -o pipefail

            file="minifi/minifi-assembly/pom.xml"
            grep -q "https://repo1.maven.org/maven2/commons-daemon/commons-daemon/" "$file"
            sed -i 's#https://repo1.maven.org/maven2/commons-daemon/commons-daemon/#https://maven-central.storage-download.googleapis.com/maven2/commons-daemon/commons-daemon/#g' "$file"
            grep -q "https://maven-central.storage-download.googleapis.com/maven2/commons-daemon/commons-daemon/" "$file"
        - name: build nifi web api
          work-dir: ${source.dir}/nifi/nifi-framework-bundle/nifi-framework/nifi-web/nifi-web-api
          privileged: true
          runs: |
            set -eux -o pipefail

            # Build NiFi-WebAPI
            mvn package -DskipTests
        - name: build nifi toolkit
          work-dir: ${source.dir}/nifi/nifi-toolkit
          privileged: true
          runs: |
            set -eux -o pipefail

            # Build NiFi-Toolkit
            mvn package -DskipTests
        - name: build nifi
          work-dir: ${source.dir}/nifi
          privileged: true
          runs: |
            set -eux -o pipefail

            # Build NiFi
            mvn package -T1C -DskipTests
        - name: extract nifi
          work-dir: ${source.dir}/nifi
          runs: |
            set -eux -o pipefail

            # Extract the built NiFi distribution
            nifi_dist=$(find nifi-assembly/target -name "nifi-*-bin.zip" | head -1)
            if [ -z "$nifi_dist" ]; then
                echo "unable to find nifi zip" 1>&2
                exit 1
            fi
            mkdir -p "${target.dir}/nifi/nifi-current"
            unzip "$nifi_dist" -d "${target.dir}/nifi/nifi-current"

            # Secure directory flattening
            shopt -s nullglob dotglob
            nifi_dirs=("${target.dir}"/nifi/nifi-current/nifi-[0-9]*.[0-9]*.[0-9]*)
            case ${#nifi_dirs[@]} in
                0) echo "Error: No NiFi directory found"; exit 1 ;;
                1) mv "${nifi_dirs[0]}"/* "${target.dir}/nifi/nifi-current/"; rmdir "${nifi_dirs[0]}" ;;
                *) echo "Error: Multiple NiFi directories found"; exit 1 ;;
            esac
        - name: extract nifi toolkit
          work-dir: ${source.dir}/nifi/nifi-toolkit
          runs: |
            set -eux -o pipefail

            TOOLKIT_DIST=$(find nifi-toolkit-assembly/target -name "nifi-toolkit-*-bin.zip" | head -1)
            mkdir -p "${target.dir}/nifi/nifi-toolkit-current"
            unzip "$TOOLKIT_DIST" -d "${target.dir}/nifi/nifi-toolkit-current"

            # Secure toolkit directory flattening
            shopt -s nullglob dotglob
            toolkit_dirs=("${target.dir}"/nifi/nifi-toolkit-current/nifi-toolkit-[0-9]*.[0-9]*.[0-9]*)
            case ${#toolkit_dirs[@]} in
                0) echo "Error: No NiFi toolkit directory found"; exit 1 ;;
                1) mv "${toolkit_dirs[0]}"/* "${target.dir}/nifi/nifi-toolkit-current/"; rmdir "${toolkit_dirs[0]}" ;;
                *) echo "Error: Multiple NiFi toolkit directories found"; exit 1 ;;
            esac
        - name: final setup
          runs: |
            set -eux -o pipefail

            # IMPORTANT: Order matters - set execute permissions before ownership changes
            # Step 1: Set executable permissions on root-owned files
            chmod +x "${target.dir}/nifi/nifi-current/bin/"*.sh
            chmod +x "${target.dir}/nifi/nifi-toolkit-current/bin/"*.sh

            # Step 2: Transfer conf ownership to runtime user for modifications
            chown -R 1000:1000 ${target.dir}/nifi/nifi-current/conf
            chmod -R u+rwX,g+rX,o+rX ${target.dir}/nifi/nifi-current/conf

            # Step 3: Set "other" permissions on root-owned bin files for user 1000 access
            chmod o+rX ${target.dir}/nifi/nifi-current/bin/*.sh
            chmod o+rX ${target.dir}/nifi/nifi-toolkit-current/bin/*.sh

            # NiFi lib directory - needed for bootstrap and runtime (read-only access)
            if [ -d "${target.dir}/nifi/nifi-current/lib" ]; then
              # Give nifi user read and execute access to lib directory and subdirectories
              chmod -R u+rX,g+rX,o+rX ${target.dir}/nifi/nifi-current/lib
            fi

            # NiFi toolkit lib directory - needed for CLI tool JAR access
            if [ -d "${target.dir}/nifi/nifi-toolkit-current/lib" ]; then
              # Give nifi user read and execute access to toolkit lib directory and subdirectories
              chmod -R u+rX,g+rX,o+rX ${target.dir}/nifi/nifi-toolkit-current/lib
            fi
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/nifi/patch/
      outputs:
        - source: ${target.dir}/nifi
          target: /opt/nifi
          uid: 0
          gid: 0
        - source: ${source.dir}/nifi/nifi-docker/dockerhub/sh
          target: /opt/nifi/scripts
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/nifi-uv/.local
          target: /home/nifi/.local
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
accounts:
  run-as: nifi
  users:
    - name: nifi
      uid: 1000
      gid: 1000
  groups:
    - name: nifi
      gid: 1000
      members:
        - nifi
os-release:
