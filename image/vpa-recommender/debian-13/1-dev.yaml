# syntax=dhi.io/build:2-debian13

name: Vertical Pod Autoscaler Recommender 1.x (dev)
image: dhi.io/vpa-recommender
variant: dev
tags:
  - 1-dev
  - 1.7-dev
  - 1.7.0-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.7-debian-dev
  - 1.7-debian13-dev
  - 1.7.0-debian-dev
  - 1.7.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-05"
vars:
  COMMIT_SHA: 6a616ea0c5ea0cb6111240073a9273b3467c064e
  SEMVER_MAJOR_MINOR_VERSION: "1.7"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.7.0
  VERSION: 1.7.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: vpa-recommender
      work-dir: /go/src/k8s.io/autoscaler/vertical-pod-autoscaler
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kubernetes/autoscaler.git#vertical-pod-autoscaler-1.7.0
            checksum: 6a616ea0c5ea0cb6111240073a9273b3467c064e
            path: /go/src/k8s.io/autoscaler
            spdx:
              name: vpa-recommender
              version: 1.7.0
              packages:
                - name: vpa-recommender
                  purl: pkg:golang/k8s.io/autoscaler/vertical-pod-autoscaler@1.7.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/text@v0.39.0
              - golang.org/x/net@v0.56.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            cd pkg/recommender
            go test -short ./...
        - name: build recommender
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/recommender
            packages: ./pkg/recommender
      outputs:
        - source: ${target.dir}/usr/local/bin/recommender
          target: /usr/local/bin/recommender
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/vpa-recommender
          target: /opt/docker/sbom/vpa-recommender
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /home/nonroot
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /recommender
    uid: 0
    gid: 0
    source: /usr/local/bin/recommender
  - type: directory
    path: /home/nonroot
    uid: 0
    gid: 0
annotations:
  org.opencontainers.image.description: A minimal Kubernetes VPA Recommender image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /recommender
