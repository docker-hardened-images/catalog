# syntax=dhi.io/build:2-debian13

name: Jenkins Agent (latest)
image: dhi.io/jenkins-agent
variant: runtime
tags:
  - "3383"
  - 3383-debian
  - 3383-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BCFIPS_VERSION: 2.1.2
  BCPKIXFIPS_VERSION: 2.1.11
  BCRNGJENT_VERSION: 1.3.6
  BCTLSFIPS_VERSION: 2.1.23
  BCUTILFIPS_VERSION: 2.1.6
  JAVA_FIPS_SUFFIX: ""
  JAVA_HOME_PATH: /usr/lib/jvm/temurin-21
  JAVA_MAJOR_VERSION: "21"
  JAVA_VARIANT: jre
  JDK_MAJOR_VERSION: "21"
  MAVEN_REFERENCE: dhi/maven:3.9.16-jdk21-debian13-dev@sha256:8c1617093f48df1384cb595bfc8000649bd2e62e140f40a3fc2076880fd3a11c
  REMOTING_COMMIT_SHA: c8881d4b0e7634b01d6851ccdfdfad8d9272ad3a
  REMOTING_SEMVER_VERSION: "3383"
  VERSION: 3383.vc8881d4b_0e76
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - ca-certificates
    - eclipse-temurin-21-jre
    - eclipse-temurin-21-jre-oci-config
    - tzdata
  builds:
    - name: jenkins-agent
      uses: dhi.io/maven:3.9.16-jdk21-debian13-dev@sha256:8c1617093f48df1384cb595bfc8000649bd2e62e140f40a3fc2076880fd3a11c
      caches:
        - path: /root/.m2/repository
      contents:
        packages:
          - coreutils
          - findutils
          - bash
          - curl
          - git
          - gzip
          - sed
          - tar
        files:
          - url: git+https://github.com/jenkinsci/remoting.git#3383.vc8881d4b_0e76
            checksum: c8881d4b0e7634b01d6851ccdfdfad8d9272ad3a
            path: ${source.dir}/remoting
            spdx:
              name: jenkins-remoting
              version: 3383.vc8881d4b_0e76
              packages:
                - name: jenkins-remoting
                  purl: pkg:dhi/jenkins-remoting@3383.vc8881d4b_0e76
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: build
          work-dir: ${source.dir}/remoting
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            # Replace changelist property in pom.xml with VERSION to ensure reproducible builds
            sed -i "s|<changelist>.*</changelist>|<changelist>3383.vc8881d4b_0e76</changelist>|" pom.xml

            # Build remoting (single-module project, produces remoting JAR)
            mvn clean install -DskipTests -Dmaven.test.skip=true -Dspotless.check.skip=true

            # Verify the JAR has Main-Class in manifest (maven-shade-plugin should set this)
            JAR_FILE="target/remoting-3383.vc8881d4b_0e76.jar"
            if [ ! -f "$JAR_FILE" ]; then
              echo "ERROR: JAR file not found: $JAR_FILE" >&2
              exit 1
            fi
            jar xf "$JAR_FILE" META-INF/MANIFEST.MF 2> /dev/null || {
              echo "ERROR: Could not extract manifest from JAR: $JAR_FILE" >&2
              exit 1
            }
            if ! grep -q "Main-Class:" META-INF/MANIFEST.MF; then
              echo "ERROR: JAR file missing Main-Class in manifest: $JAR_FILE" >&2
              echo "Manifest contents:" >&2
              cat META-INF/MANIFEST.MF
              rm -rf META-INF
              exit 1
            fi
            rm -rf META-INF
      outputs:
        - source: ${source.dir}/remoting/target/remoting-3383.vc8881d4b_0e76.jar
          target: /usr/share/jenkins/agent.jar
          uid: 0
          gid: 0
          mode: "0644"
        - source: /opt/docker/sbom/jenkins-remoting
          target: /opt/docker/sbom/jenkins-remoting
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
accounts:
  run-as: jenkins
  users:
    - name: jenkins
      uid: 1000
      gid: 1000
  groups:
    - name: jenkins
      gid: 1000
      members:
        - jenkins
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /home/jenkins
environment:
  AGENT_WORKDIR: /home/jenkins/agent
  JAVA_HOME: /usr/lib/jvm/temurin-21
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  TZ: Etc/UTC
  USER: jenkins
paths:
  - type: directory
    path: /home/jenkins
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /home/jenkins/agent
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /home/jenkins/.jenkins
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: symlink
    path: /usr/share/jenkins/slave.jar
    uid: 0
    gid: 0
    mode: "0644"
    source: /usr/share/jenkins/agent.jar
annotations:
  org.opencontainers.image.description: A minimal Jenkins Agent image
  org.opencontainers.image.licenses: MIT
cmd:
  - /usr/bin/java
  - -jar
  - /usr/share/jenkins/agent.jar
