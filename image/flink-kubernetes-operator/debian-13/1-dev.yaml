  - 1-debian-dev
  - 1-debian13-dev
  - 1.15-debian-dev
  - 1.15-debian13-dev
  - 1.15.0-debian-dev
  - 1.15.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-07"
vars:
  COMMIT_SHA: 79d730bab4d8403f3a447fb027f879f5cbdc59ad
  FLINK_HOME: /opt/flink
  JAVA_VARIANT: jdk
  JDK_MAJOR_VERSION: "17"
  MAVEN_REFERENCE: dhi/maven:3.9.16-jdk17-debian13-dev@sha256:253e981dc81b8db852c76248a979d36fc26e41af96890d9fa53d086385998a59
  MAVEN_VERSION: 3.9.16
  OPERATOR_HOME: /flink-kubernetes-operator
  SEMVER_MAJOR_MINOR_VERSION: "1.15"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.15.0
  VERSION: 1.15.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - eclipse-temurin-17-jdk
    - eclipse-temurin-17-jdk-oci-config
    - findutils
    - grep
    - libc-bin
    - libjemalloc-dev
    - libstdc++6
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: flink-kubernetes-operator
      uses: dhi.io/maven:3.9.16-jdk17-debian13-dev@sha256:253e981dc81b8db852c76248a979d36fc26e41af96890d9fa53d086385998a59
      work-dir: ${source.dir}/flink-kubernetes-operator
      environment:
        JAVA_HOME: /opt/java/openjdk/17
        MAVEN_ARGS: --batch-mode --no-transfer-progress
        MAVEN_HOME: /opt/java/apache-maven-3.9.16
      caches:
        - path: /root/.m2/repository
      contents:
        packages:
          - bash
          - coreutils
        files:
          - url: git+https://github.com/apache/flink-kubernetes-operator.git#release-1.15.0
            checksum: 79d730bab4d8403f3a447fb027f879f5cbdc59ad
            path: ${source.dir}/flink-kubernetes-operator
            spdx:
              name: flink-kubernetes-operator
              version: 1.15.0
              packages:
                - name: flink-kubernetes-operator
                  purl: pkg:github/apache/flink-kubernetes-operator@release-1.15.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: patch maven dependencies
          uses: mvn/patch@v1
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          with:
            dependencies: ${source.dir}/patch/mvn-dependencies.json
            dependencies-key: dependencyManagement.dependencies
            mvn-root: ${source.dir}/flink-kubernetes-operator
            properties: ${source.dir}/patch/mvn-properties.json
        - name: build
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            mvn clean install \
              -pl flink-kubernetes-standalone,flink-kubernetes-operator-api,flink-kubernetes-operator,flink-autoscaler,flink-kubernetes-webhook \
              -DskipTests=true \
              -Dxml.skip=true \
              -Dfabric8.httpclient.impl=okhttp
        - name: install
          runs: |
            set -eux -o pipefail

            install -d "${target.dir}/flink-kubernetes-operator"
            install -d "${target.dir}/opt/flink/operator-lib"
            install -d "${target.dir}/opt/flink/log/log4j"
            install -d "${target.dir}/opt/flink/log/logback"
            install -d "${target.dir}/opt/flink/plugins"

            install -m 0644 \
              "flink-kubernetes-operator/target/flink-kubernetes-operator-1.15.0-shaded.jar" \
              "${target.dir}/flink-kubernetes-operator/flink-kubernetes-operator-1.15.0-shaded.jar"
            install -m 0644 \
              "flink-kubernetes-webhook/target/flink-kubernetes-webhook-1.15.0-shaded.jar" \
              "${target.dir}/flink-kubernetes-operator/flink-kubernetes-webhook-1.15.0-shaded.jar"
            install -m 0644 \
              "flink-kubernetes-standalone/target/flink-kubernetes-standalone-1.15.0.jar" \
              "${target.dir}/flink-kubernetes-operator/flink-kubernetes-standalone-1.15.0.jar"

            cp -a flink-kubernetes-operator/target/plugins/. "${target.dir}/opt/flink/plugins/"
            cp -a flink-kubernetes-operator/target/log4j/. "${target.dir}/opt/flink/log/log4j/"
            cp -a flink-kubernetes-operator/target/logback/. "${target.dir}/opt/flink/log/logback/"

            chown -R 9999:9999 "${target.dir}/opt/flink" "${target.dir}/flink-kubernetes-operator"
        - name: maven sbom
          uses: sbom@v1
          with:
            extra-scanners: java-archive-cataloger
            prefix: flink-kubernetes-operator-maven
            source: ${target.dir}/flink-kubernetes-operator
      paths:
        - type: file
          path: ${source.dir}/patch/mvn-dependencies.json
          uid: 0
          gid: 0
          source: image/flink-kubernetes-operator/patch/mvn-dependencies.json
        - type: file
          path: ${source.dir}/patch/mvn-properties.json
          uid: 0
          gid: 0
          source: image/flink-kubernetes-operator/patch/mvn-properties.json
      outputs:
        - source: ${target.dir}/flink-kubernetes-operator
          target: /flink-kubernetes-operator
          uid: 0
          gid: 0
        - source: ${target.dir}/opt/flink
          target: /opt/flink
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/flink-kubernetes-operator
          target: /opt/docker/sbom/flink-kubernetes-operator
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/flink-kubernetes-operator-maven
          target: /opt/docker/sbom/flink-kubernetes-operator-maven
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: flink
      uid: 9999
      gid: 9999
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: flink
      gid: 9999
os-release:
  name: Docker Hardened Images (Debian)
