# syntax=dhi.io/build:2-debian13

name: NATS 2.14.x
image: dhi.io/nats
variant: runtime
tags:
  - "2"
  - "2.14"
  - 2.14.3
  - 2-debian
  - 2-debian13
  - 2.14-debian
  - 2.14-debian13
  - 2.14.3-debian
  - 2.14.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-09-22"
  end-of-life: "2026-09-22"
vars:
  COMMIT_SHA: 9b17a586be69c9ff36e4c84a421ca47da410b561
  SEMVER_MAJOR_MINOR_VERSION: "2.14"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.14.3
  VERSION: 2.14.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: nats
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/nats-io/nats-server.git#v2.14.3
            checksum: 9b17a586be69c9ff36e4c84a421ca47da410b561
            path: /go/src/github.com/nats-io/nats-server/v2
            spdx:
              name: nats-server
              version: 2.14.3
              packages:
                - name: nats-server
                  purl: pkg:golang/github.com/nats-io/nats-server/v2@2.14.3
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/nats-io/nats-server/v2
          with:
            deps: []
            download: true
        - name: unit test
          work-dir: /go/src/github.com/nats-io/nats-server/v2
          privileged: true
          runs: |
            set -eux -o pipefail

            # NATS has a extense parallel test suite. This is a minimal set to catch possible breaking changes.
            # We do also skip tests that won't work or are flaky in buildkit.
            go test -v -p=1 $(go list ./... | grep -v "/server") -skip 'TestQueueDistributionAcrossRoutes|TestSysLogger|TestOCSPMust|TestOCSPAlways|TestOCSPPeerBadDelegatedCAResponseSigner|TestOCSPPeerUnknownAndRevokedIntermediate|TestOCSPPeerAllowWhenCAUnreachableOption|TestTLSGateway|TestGatewayTLS|TestTLSPinned|TestStress' -count=1 -vet=off -timeout=30m -failfast
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/nats-io/nats-server/v2
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X server.serverVersion=2.14.3
              - -X server.gitCommit=9b17a586be69c9ff36e4c84a421ca47da410b561
            output: ${target.dir}/nats-server
            packages: .
        - name: configure
          work-dir: /go/src/github.com/nats-io/nats-server/v2
          runs: |
            set -eux -o pipefail

            cp docker/nats-server.conf ${target.dir}/nats-server.conf
      outputs:
        - source: ${target.dir}/nats-server
          target: /nats-server
          uid: 0
          gid: 0
        - source: ${target.dir}/nats-server.conf
          target: /nats-server.conf
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/nats-server
          target: /opt/docker/sbom/nats-server
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal NATS server image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /nats-server
cmd:
  - --config
  - nats-server.conf
ports:
  - 4222/tcp
  - 8222/tcp
  - 6222/tcp
