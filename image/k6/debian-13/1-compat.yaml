# syntax=dhi.io/build:2-debian13

name: Grafana k6 1.x (compat)
image: dhi.io/k6
variant: runtime
flavor: compat
tags:
  - 1-compat
  - 1.6-compat
  - 1.6.1-compat
  - 1-debian13-compat
  - 1.6-debian13-compat
  - 1.6.1-debian13-compat
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 2ac2bb560e70b33735692642231c8bd53acbe4fd
  GOLANG_REFERENCE: dhi/golang:1.26.1-debian13-dev@sha256:2eaf3936008b4a31091eda26511748c1b872925fa5f674f13fbf5b53e7e777c2
  SEMVER_MAJOR_MINOR_VERSION: "1.6"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.6.1
  VERSION: 1.6.1
contents:
  packages:
    - '!base-files'
    - coreutils
    - dash
    - grep
  builds:
    - name: k6
      uses: dhi.io/golang:1.26.1-debian13-dev@sha256:2eaf3936008b4a31091eda26511748c1b872925fa5f674f13fbf5b53e7e777c2
      contents:
        files:
          - url: git+https://github.com/grafana/k6.git#v1.6.1
            checksum: 2ac2bb560e70b33735692642231c8bd53acbe4fd
            path: /go/src/github.com/grafana/k6
            spdx:
              name: k6
              version: 1.6.1
              packages:
                - name: k6
                  purl: pkg:golang/github.com/grafana/k6@1.6.1
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/grafana/k6
          with:
            deps:
              - go.opentelemetry.io/otel/sdk@v1.40.0
              - google.golang.org/grpc@v1.79.3
        - name: test
          work-dir: /go/src/github.com/grafana/k6
          privileged: true
          runs: |
            set -eux -o pipefail

            # Exclude browser packages from the test list
            PKGS=$(go list ./... | grep -v "internal/js/modules/k6/browser")
            # Skip flaky tests: TestMachineReadableSummary (known issue #5456), TestEventSystemError, TestEventLoopDoesntCrossIterations, TestEventLoopCrossScenario (flaky with otel SDK v1.40.0)
            CGO_ENABLED=0 go test $PKGS -skip "TestMachineReadableSummary|TestEventSystemError|TestEventLoopDoesntCrossIterations|TestEventLoopCrossScenario"
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/grafana/k6
          with:
            output: ${target.dir}/usr/local/bin/k6
      outputs:
        - source: ${target.dir}/usr/local/bin/k6
          target: /usr/local/bin/k6
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/k6
          target: /opt/docker/sbom/k6
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Grafana k6 image
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - /usr/local/bin/k6
