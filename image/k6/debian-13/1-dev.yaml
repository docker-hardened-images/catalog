# syntax=dhi.io/build:2-debian13

name: Grafana k6 1.x (dev)
image: dhi.io/k6
variant: dev
tags:
  - 1-dev
  - 1.8-dev
  - 1.8.0-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.8-debian-dev
  - 1.8-debian13-dev
  - 1.8.0-debian-dev
  - 1.8.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 23d89b9b7cf7c0c352ac3e90a58f23ad9e2f7eac
  SEMVER_MAJOR_MINOR_VERSION: "1.8"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.8.0
  VERSION: 1.8.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: k6
      work-dir: /go/src/github.com/grafana/k6
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/grafana/k6.git#v1.8.0
            checksum: 23d89b9b7cf7c0c352ac3e90a58f23ad9e2f7eac
            path: /go/src/github.com/grafana/k6
            spdx:
              name: k6
              version: 1.8.0
              packages:
                - name: k6
                  purl: pkg:golang/github.com/grafana/k6@1.8.0
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/Azure/go-ntlmssp@v0.1.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.82.1
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            # Exclude browser packages from the test list
            PKGS=$(go list ./... | grep -v "internal/js/modules/k6/browser")

            # Skip flaky tests with otel SDK v1.40.0+ (REST API port races worsen at v1.43.0).
            SKIP_TESTS="TestMachineReadableSummary|TestEventSystemError|TestEventLoopDoesntCrossIterations|TestEventLoopCrossScenario|TestEventLoop|TestRelativeLogPathWithSetupAndTeardown|TestAbortedByUserWithRestAPI|TestEventSystemOK|TestActiveVUsCount|TestRampingVUsHandleRemainingVUs|TestVURunInterrupt|TestVUStateTagsSafeConcurrent|TestConstantArrivalRateRunCorrectTiming|TestWrongEnvVarIterations|TestExecutionInfoVUSharing"
            if [ "${target.fips}" = "true" ]; then
              # FIPS rejects TLS 1.0/1.1, CBC cipher suites, and certain ECC curves
              SKIP_TESTS="${SKIP_TESTS}|TestRequestAndBatchTLS"
              # Non-deterministic tar timestamps under FIPS builder
              SKIP_TESTS="${SKIP_TESTS}|TestUploadTest"
            fi

            for i in {1..5}; do
              if CGO_ENABLED=0 go test -count=1 $PKGS -skip "$SKIP_TESTS"; then
                exit 0
              fi
              echo "Retry $i/5..."
              sleep 2
            done

            exit 1
        - name: build
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/k6
      outputs:
        - source: ${target.dir}/usr/local/bin/k6
          target: /usr/local/bin/k6
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/k6
          target: /opt/docker/sbom/k6
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Grafana k6 image
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - /usr/local/bin/k6
