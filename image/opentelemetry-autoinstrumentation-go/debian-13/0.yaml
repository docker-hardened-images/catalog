# syntax=dhi.io/build:2-debian13

name: OpenTelemetry Go Autoinstrumentation 0.24.x
image: dhi.io/opentelemetry-autoinstrumentation-go
variant: runtime
tags:
  - "0"
  - "0.24"
  - 0.24.0
  - 0-debian
  - 0-debian13
  - 0.24-debian
  - 0.24-debian13
  - 0.24.0-debian
  - 0.24.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-09-11"
vars:
  COMMIT_SHA: a84bd4026aa12006d53d65986e86eabdbfc32567
  SEMVER_MAJOR_MINOR_VERSION: "0.24"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.24.0
  VERSION: 0.24.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: opentelemetry-autoinstrumentation-go
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - clang
          - llvm
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/open-telemetry/opentelemetry-go-instrumentation.git#v0.24.0
            checksum: a84bd4026aa12006d53d65986e86eabdbfc32567
            path: /go/src/go.opentelemetry.io/auto
            spdx:
              name: opentelemetry-autoinstrumentation-go
              version: 0.24.0
              packages:
                - name: opentelemetry-autoinstrumentation-go
                  purl: pkg:golang/go.opentelemetry.io/auto@0.24.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          work-dir: /go/src/go.opentelemetry.io/auto
          with:
            deps:
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            download: true
        - name: generate
          work-dir: /go/src/go.opentelemetry.io/auto
          environment:
            BPF2GO_CFLAGS: -I/go/src/go.opentelemetry.io/auto/internal/include/libbpf -I/go/src/go.opentelemetry.io/auto/internal/include
          runs: |
            set -eux -o pipefail

            go generate ./...
        - name: test
          work-dir: /go/src/go.opentelemetry.io/auto
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -v ./... -skip "TestLoadProbes|TestGetCPUCountFromProc|TestGetLockdownMode"
        - name: build
          uses: go/build@v1
          work-dir: /go/src/go.opentelemetry.io/auto/cli
          with:
            output: ${target.dir}/otel-go-instrumentation
      outputs:
        - source: ${target.dir}/otel-go-instrumentation
          target: /otel-go-instrumentation
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/opentelemetry-autoinstrumentation-go
          target: /opt/docker/sbom/opentelemetry-autoinstrumentation-go
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal OpenTelemetry Go Autoinstrumentation image
  org.opencontainers.image.licenses: Apache-2.0
cmd:
  - /otel-go-instrumentation
