# syntax=dhi.io/build:2-debian13

name: fluxcd helm controller 1.4.x (dev)
image: dhi.io/fluxcd-helm-controller
variant: dev
tags:
  - 1.4-dev
  - 1.4.5-dev
  - 1.4-debian-dev
  - 1.4-debian13-dev
  - 1.4.5-debian-dev
  - 1.4.5-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-11-27"
vars:
  COMMIT_SHA: 3ebc2f57b7323371bf0d067bfb4e411592124bdf
  SEMVER_MAJOR_MINOR_VERSION: "1.4"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.4.5
  VERSION: 1.4.5
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: fluxcd-helm-controller
      work-dir: /go/src/github.com/fluxcd/helm-controller
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/fluxcd/helm-controller#v1.4.5
            checksum: 3ebc2f57b7323371bf0d067bfb4e411592124bdf
            path: /go/src/github.com/fluxcd/helm-controller
            spdx:
              name: fluxcd-helm-controller
              version: 1.4.5
              packages:
                - name: fluxcd-helm-controller
                  purl: pkg:golang/github.com/fluxcd/helm-controller@1.4.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch (1.4 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel@v1.41.0
              - google.golang.org/grpc@v1.79.3
              - github.com/containerd/containerd@v1.7.33
              - helm.sh/helm/v3@v3.20.2
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Exclude packages that require envtest (live k8s API server via etcd):
            # internal/controller, internal/controller_test, internal/action, internal/reconcile
            CGO_ENABLED=0 go test $(go list ./internal/... | grep -vE '/internal/(controller|action|reconcile)')
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/helm-controller
      outputs:
        - source: ${target.dir}/usr/local/bin/helm-controller
          target: /usr/local/bin/helm-controller
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-helm-controller
          target: /opt/docker/sbom/fluxcd-helm-controller
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Flux CD helm-controller image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/helm-controller
