# syntax=dhi.io/build:2-debian13

name: fluxcd helm controller 1.6.x
image: dhi.io/fluxcd-helm-controller
variant: runtime
tags:
  - "1"
  - "1.6"
  - 1.6.1
  - 1-debian
  - 1-debian13
  - 1.6-debian
  - 1.6-debian13
  - 1.6.1-debian
  - 1.6.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-17"
vars:
  COMMIT_SHA: 2695d9be70da620bbf4833989c0adeb69d15d051
  SEMVER_MAJOR_MINOR_VERSION: "1.6"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.6.1
  VERSION: 1.6.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: fluxcd-helm-controller
      work-dir: /go/src/github.com/fluxcd/helm-controller
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/fluxcd/helm-controller#v1.6.1
            checksum: 2695d9be70da620bbf4833989c0adeb69d15d051
            path: /go/src/github.com/fluxcd/helm-controller
            spdx:
              name: fluxcd-helm-controller
              version: 1.6.1
              packages:
                - name: fluxcd-helm-controller
                  purl: pkg:golang/github.com/fluxcd/helm-controller@1.6.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch (1.6 only)
          uses: go/bump@v2
          with:
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Exclude packages that require envtest (live k8s API server via etcd):
            # internal/controller, internal/controller_test, internal/action, internal/reconcile
            CGO_ENABLED=0 go test $(go list ./internal/... | grep -vE '/internal/(controller|action|reconcile)')
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/helm-controller
      outputs:
        - source: ${target.dir}/usr/local/bin/helm-controller
          target: /usr/local/bin/helm-controller
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-helm-controller
          target: /opt/docker/sbom/fluxcd-helm-controller
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Flux CD helm-controller image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/helm-controller
