# syntax=dhi.io/build:2-debian13

name: Spiffe Spire Server 1.13.x
image: dhi.io/spire-server
variant: runtime
tags:
  - "1.13"
  - 1.13.6
  - 1.13-debian
  - 1.13-debian13
  - 1.13.6-debian
  - 1.13.6-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 746331571d5563bb28bf1dc1c2cd04e1570453d8
  SEMVER_MAJOR_MINOR_VERSION: "1.13"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.13.6
  VERSION: 1.13.6
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - libc6
    - tzdata
  builds:
    - name: spire-server
      work-dir: /go/src/github.com/spiffe/spire
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/spiffe/spire.git#746331571d5563bb28bf1dc1c2cd04e1570453d8
            checksum: 746331571d5563bb28bf1dc1c2cd04e1570453d8
            path: /go/src/github.com/spiffe/spire
            spdx:
              name: spire-server
              version: 1.13.6
              packages:
                - name: spire-server
                  purl: pkg:golang/github.com/spiffe/spire@1.13.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.13 only)
          uses: go/bump@v2
          with:
            deps:
              - filippo.io/edwards25519@v1.1.1
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
            tidy: true
        - uses: go/hermetic@v1
        - name: test
          runs: |
            set -eux -o pipefail

            # Exclude agent tests, server runtime tests (require full server setup), and known flaky tests.
            EXCLUDES='/cmd/spire-agent|/pkg/agent|/cmd/spire-server/cli/run|/pkg/server|/pkg/common/peertracker|/pkg/common/diskcertmanager'
            PKGS=$(go list ./... | egrep -v "${EXCLUDES}")
            CGO_ENABLED=0 go test $PKGS
        - name: build spire-server
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 1
            ldflags:
              - -X github.com/spiffe/spire/pkg/common/version.gittag=1.13.6
              - -X github.com/spiffe/spire/pkg/common/version.githash=746331571d5563bb28bf1dc1c2cd04e1570453d8
            output: ${target.dir}/usr/local/bin/spire-server
            packages: ./cmd/spire-server
      outputs:
        - source: ${target.dir}/usr/local/bin/spire-server
          target: /usr/local/bin/spire-server
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/spire-server
          target: /opt/docker/sbom/spire-server
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Spiffe Spire Server image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/spire-server
  - run
