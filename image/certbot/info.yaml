metadata:
  display-name: Certbot
  short-description: EFF's ACME client for obtaining and renewing TLS certificates from Let's Encrypt and any ACME-compatible CA.
  featured: false
  home-url: https://certbot.eff.org
  categories:
    - security
  included-tools:
    - name: certbot
      description: EFF's command-line ACME client for obtaining and renewing TLS certificates from Let's Encrypt and any ACME-compatible certificate authority.
    - name: acme
      description: Python library implementing the IETF RFC 8555 ACME protocol, used by certbot to communicate with ACME servers.
