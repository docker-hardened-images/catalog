# syntax=dhi.io/build:2-debian13

name: Certbot 5.x (dev)
image: dhi.io/certbot
variant: dev
tags:
  - 5-dev
  - 5.7-dev
  - 5.7.0-dev
  - 5-debian-dev
  - 5-debian13-dev
  - 5.7-debian-dev
  - 5.7-debian13-dev
  - 5.7.0-debian-dev
  - 5.7.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-09-02"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: e75e7378cd024d74d18a22c66d5aea32abd474c7
  SEMVER_MAJOR_MINOR_VERSION: "5.7"
  SEMVER_MAJOR_VERSION: "5"
  SEMVER_VERSION: 5.7.0
  VERSION: 5.7.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libffi8
    - libstdc++6
    - mawk
    - perl-base
    - python-3.14
    - python-3.14-dev
    - python3-pip
    - python3-setuptools
    - python3-wheel
    - sed
    - tzdata
    - util-linux
  builds:
    - name: certbot
      work-dir: ${source.dir}/certbot-src
      environment:
        CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      caches:
        - path: /root/.cache/pip
        - path: /root/.cargo
      contents:
        packages:
          - build-essential
          - libssl-dev
          - libffi-dev
          - pkg-config
          - cargo
          - rustc
          - git
          - ca-certificates
          - bash
          - coreutils
          - findutils
          - python-3.14
          - python-3.14-dev
          - python3-pip
          - python3-setuptools
          - python3-wheel
          - libstdc++6
          - diffutils
          - gawk
          - grep
          - sed
        files:
          - url: git+https://github.com/certbot/certbot.git#e75e7378cd024d74d18a22c66d5aea32abd474c7
            checksum: e75e7378cd024d74d18a22c66d5aea32abd474c7
            path: ${source.dir}/certbot-src
            spdx:
              name: certbot
              version: 5.7.0
              packages:
                - name: certbot
                  purl: pkg:pypi/certbot@5.7.0
                  license: Apache-2.0
                - name: acme
                  purl: pkg:pypi/acme@5.7.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: create virtual environment
          runs: |
            set -eux -o pipefail

            VENV=/opt/certbot/.venv
            mkdir -p /opt/certbot
            python3 -m venv "$VENV"
        - name: install certbot
          privileged: true
          runs: |
            set -eux -o pipefail

            VENV=/opt/certbot/.venv
            "$VENV/bin/python3" -m pip install --upgrade pip setuptools wheel
            # Install acme and certbot from source. Force cryptography to build
            # from source via --no-binary so it links against the image's
            # OpenSSL (dhi/pkg-openssl, FIPS-validated in the -fips variants)
            # instead of the non-FIPS OpenSSL statically bundled in the
            # cryptography manylinux wheel.
            "$VENV/bin/python3" -m pip install --no-cache-dir \
              --no-binary=cryptography \
              ./acme \
              ./certbot

            # Upgrade pip to fix CVE-2026-8643 (26.1.1 -> 26.1.2)
            "$VENV/bin/python3" -m pip install --no-cache-dir --upgrade pip==26.1.2
        - name: clean python cache and tests
          runs: |
            set -eux -o pipefail

            VENV=/opt/certbot/.venv
            find "$VENV" \
              \( -type d -a \( -name test -o -name tests -o -name __pycache__ \) \) \
              -o \( -type f -a \( -name '*.pyc' -o -name '*.pyo' \) \) \
              -exec rm -rf '{}' + || true
        - name: python dependencies sbom
          uses: sbom@v1
          with:
            extra-scanners: python-package-cataloger
            prefix: certbot-python
            source: /opt/certbot/.venv
      outputs:
        - source: /opt/certbot
          target: /opt/certbot
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /opt/certbot
environment:
  DEBIAN_FRONTEND: noninteractive
  PATH: /opt/certbot/.venv/bin:/opt/python/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  PYTHONUNBUFFERED: "1"
paths:
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
    mode: "0755"
  - type: symlink
    path: /usr/local/bin/certbot
    uid: 0
    gid: 0
    source: /opt/certbot/.venv/bin/certbot
  - type: directory
    path: /etc/letsencrypt
    uid: 65532
    gid: 65532
    mode: "0770"
  - type: directory
    path: /var/lib/letsencrypt
    uid: 65532
    gid: 65532
    mode: "0770"
  - type: directory
    path: /var/log/letsencrypt
    uid: 65532
    gid: 65532
    mode: "0770"
annotations:
  org.opencontainers.image.description: Certbot - EFF's ACME client for obtaining TLS certificates from Let's Encrypt and any ACME-compatible CA
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/certbot
ports:
  - 80/tcp
  - 443/tcp
