# syntax=dhi.io/build:2-debian13

name: AWS EFS CSI Driver 3.x
image: dhi.io/aws-efs-csi-driver
variant: runtime
tags:
  - "3"
  - "3.4"
  - 3.4.0
  - 3-debian
  - 3-debian13
  - 3.4-debian
  - 3.4-debian13
  - 3.4.0-debian
  - 3.4.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-01-20"
vars:
  COMMIT_SHA: 5a8c44a9d70cd4046b0c4e9542b1869b8bc8913c
  SEMVER_MAJOR_MINOR_VERSION: "3.4"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.4.0
  VERSION: 3.4.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - mount
    - nfs-common
    - stunnel4
    - tzdata
  builds:
    - name: aws-efs-csi-driver
      work-dir: /go/src/github.com/kubernetes-sigs/aws-efs-csi-driver
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kubernetes-sigs/aws-efs-csi-driver.git#v3.4.0
            checksum: 5a8c44a9d70cd4046b0c4e9542b1869b8bc8913c
            path: /go/src/github.com/kubernetes-sigs/aws-efs-csi-driver
            spdx:
              name: aws-efs-csi-driver
              version: 3.4.0
              packages:
                - name: aws-efs-csi-driver
                  purl: pkg:golang/github.com/kubernetes-sigs/aws-efs-csi-driver@3.4.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (3 only)
          uses: go/bump@v2
          with:
            deps:
              - google.golang.org/grpc@v1.82.1
            download: true
        - name: run unit tests
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -count=1 -v ./cmd/... ./pkg/...
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X github.com/kubernetes-sigs/aws-efs-csi-driver/pkg/driver.driverVersion=3.4.0
              - -X github.com/kubernetes-sigs/aws-efs-csi-driver/pkg/driver.gitCommit=5a8c44a9d70cd4046b0c4e9542b1869b8bc8913c
              - -X github.com/kubernetes-sigs/aws-efs-csi-driver/pkg/driver.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
              - -X github.com/kubernetes-sigs/aws-efs-csi-driver/pkg/driver.efsClientSource=k8s
            output: ${target.dir}/usr/local/bin/aws-efs-csi-driver
            packages: ./cmd
      outputs:
        - source: ${target.dir}/usr/local/bin/aws-efs-csi-driver
          target: /usr/bin/aws-efs-csi-driver
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/aws-efs-csi-driver
          target: /opt/docker/sbom/aws-efs-csi-driver
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal AWS EFS CSI Driver image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /bin/aws-efs-csi-driver
