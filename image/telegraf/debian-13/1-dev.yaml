# syntax=dhi.io/build:2-debian13

name: Telegraf 1.39.x (dev)
image: dhi.io/telegraf
variant: dev
tags:
  - 1-dev
  - 1.39-dev
  - 1.39.2-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.39-debian-dev
  - 1.39-debian13-dev
  - 1.39.2-debian-dev
  - 1.39.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2016-09-02"
vars:
  COMMIT_SHA: e8162a94b458a5a6a311c0c4b1e24a1248c3063b
  SEMVER_MAJOR_MINOR_VERSION: "1.39"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.39.2
  VERSION: 1.39.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: telegraf
      work-dir: /go/src/github.com/influxdata/telegraf
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/influxdata/telegraf.git#v1.39.2
            checksum: e8162a94b458a5a6a311c0c4b1e24a1248c3063b
            path: /go/src/github.com/influxdata/telegraf
            spdx:
              name: telegraf
              version: 1.39.2
              packages:
                - name: telegraf
                  purl: pkg:golang/github.com/influxdata/telegraf@1.39.2
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: patch-go
          uses: go/bump@v1
          with:
            deps:
              - github.com/rclone/rclone@v1.74.3
            download: true
        - name: patch rclone compat
          uses: git/patch@v1
          with:
            patch: ${source.dir}/patch/rclone-v1.74-compat.patch
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test ./cmd/telegraf
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/influxdata/telegraf/internal.Version=1.39.2
              - -X github.com/influxdata/telegraf/internal.Commit=e8162a94b458a5a6a311c0c4b1e24a1248c3063b
            output: ${target.dir}/usr/local/bin/telegraf
            packages: ./cmd/telegraf
      paths:
        - type: file
          path: ${source.dir}/patch/rclone-v1.74-compat.patch
          uid: 0
          gid: 0
          source: image/telegraf/patch/rclone-v1.74-compat.patch
      outputs:
        - source: ${target.dir}/usr/local/bin/telegraf
          target: /usr/local/bin/telegraf
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/telegraf
          target: /opt/docker/sbom/telegraf
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /usr/bin/telegraf
    uid: 0
    gid: 0
    source: /usr/local/bin/telegraf
  - type: directory
    path: /etc/telegraf
    uid: 65532
    gid: 65532
    mode: "0770"
  - type: directory
    path: /etc/telegraf/telegraf.d
    uid: 65532
    gid: 65532
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal Telegraf image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - telegraf
ports:
  - 8092/udp
  - 8094/tcp
  - 8125/udp
