# syntax=dhi.io/build:2-debian13

name: Harbor Job Service 2.x
image: dhi.io/harbor-jobservice
variant: runtime
tags:
  - "2"
  - "2.15"
  - 2.15.2
  - 2-debian
  - 2-debian13
  - 2.15-debian
  - 2.15-debian13
  - 2.15.2-debian
  - 2.15.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-19"
vars:
  COMMIT_SHA: 080b0220574cc853ae1e2946ce7a5610ba855757
  GO_SWAGGER_VERSION: v0.33.1
  SEMVER_MAJOR_MINOR_VERSION: "2.15"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.15.2
  VERSION: 2.15.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: harbor-jobservice
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/goharbor/harbor.git#v2.15.2
            path: /go/src/github.com/goharbor/harbor
            spdx:
              name: harbor-jobservice
              version: 2.15.2
              packages:
                - name: harbor-jobservice
                  purl: pkg:golang/github.com/goharbor/harbor@2.15.2
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://github.com/go-swagger/go-swagger/releases/download/v0.33.1/swagger_linux_${target.arch}
            path: /usr/local/bin/swagger
            uid: 0
            gid: 0
            mode: "755"
      pipeline:
        - name: generate-swagger
          work-dir: /go/src/github.com/goharbor/harbor
          runs: |
            set -eux -o pipefail

            SWAGGER_TARGET="src/server/v2.0"

            /usr/local/bin/swagger generate server \
              --template-dir=tools/swagger/templates \
              --exclude-main \
              --additional-initialism=CVE \
              --additional-initialism=GC \
              --additional-initialism=OIDC \
              -f api/v2.0/swagger.yaml \
              -A harbor \
              --target ${SWAGGER_TARGET}
        - name: Patch vulnerable Go dependencies (2.15 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/goharbor/harbor/src
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - go.mongodb.org/mongo-driver@v1.17.7
              - google.golang.org/grpc@v1.82.1
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
              - helm.sh/helm/v3@v3.20.2
            download: true
        - name: test
          work-dir: /go/src/github.com/goharbor/harbor/src/jobservice
          privileged: true
          runs: |
            set -eux -o pipefail

            # Run tests excluding multiple packages since those require external connections or environment setup
            CGO_ENABLED=0 go test $(go list ./... | grep -v -E '(/job$|/job/|common/dao|common/rds|logger|hook|lcm|mgt|migration|period|runner|runtime|sync|worker/cworker)')
        - name: build-binary
          uses: go/build@v1
          work-dir: /go/src/github.com/goharbor/harbor/src/jobservice
          with:
            ldflags:
              - -X github.com/goharbor/harbor/src/pkg/version.ReleaseVersion=2.15.2
              - -X github.com/goharbor/harbor/src/pkg/version.GitCommit=080b0220574cc853ae1e2946ce7a5610ba855757
            output: ${target.dir}/usr/local/bin/harbor-jobservice
      outputs:
        - source: ${target.dir}/usr/local/bin/harbor-jobservice
          target: /usr/local/bin/harbor-jobservice
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/harbor-jobservice
          target: /opt/docker/sbom/harbor-jobservice
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Harbor Job Service image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/harbor-jobservice
cmd:
  - -c
  - /etc/jobservice/config.yml
ports:
  - 8080/tcp
  - 8443/tcp
