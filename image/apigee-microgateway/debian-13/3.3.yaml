# syntax=dhi.io/build:2-debian13

name: Apigee Microgateway 3.3.x
image: dhi.io/apigee-microgateway
variant: runtime
tags:
  - "3.3"
  - 3.3.11
  - 3.3-debian
  - 3.3-debian13
  - 3.3.11-debian
  - 3.3.11-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: f2817cbceab4dd0f84df49d9d9bd6d687ca3a233
  SEMVER_MAJOR_MINOR_VERSION: "3.3"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.3.11
  VERSION: 3.3.11
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - libc6
    - libgomp1
    - libstdc++6
    - netbase
    - nodejs-24
    - tzdata
  builds:
    - name: apigee-npm
      contents:
        packages:
          - nodejs-24
          - npm
          - node-corepack
          - yarn-classic
          - base-files
          - ca-certificates
          - libc6
          - libstdc++6
          - bash
          - coreutils
          - findutils
          - git
          - sed
          - tar
          - gzip
        files:
          - url: git+https://github.com/apigee-internal/microgateway.git#v3.3.11
            checksum: f2817cbceab4dd0f84df49d9d9bd6d687ca3a233
            path: ${source.dir}/edgemicro
            spdx:
              name: edgemicro
              version: 3.3.11
              packages:
                - name: edgemicro
                  purl: pkg:npm/edgemicro@3.3.11
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://registry.npmjs.org/qs/-/qs-6.15.2.tgz
            path: ${source.dir}/qs-6.15.2.tgz
            uid: 0
            gid: 0
          - url: https://registry.npmjs.org/diff/-/diff-8.0.3.tgz
            path: ${source.dir}/diff-8.0.3.tgz
            uid: 0
            gid: 0
          - url: https://registry.npmjs.org/minimatch/-/minimatch-10.2.3.tgz
            path: ${source.dir}/minimatch-10.2.3.tgz
            uid: 0
            gid: 0
          - url: https://registry.npmjs.org/lodash/-/lodash-4.18.0.tgz
            path: ${source.dir}/lodash-4.18.0.tgz
            uid: 0
            gid: 0
          - url: https://registry.npmjs.org/underscore/-/underscore-1.13.8.tgz
            path: ${source.dir}/underscore-1.13.8.tgz
            uid: 0
            gid: 0
          - url: https://registry.npmjs.org/jsrsasign/-/jsrsasign-11.1.1.tgz
            path: ${source.dir}/jsrsasign-11.1.1.tgz
            uid: 0
            gid: 0
          - url: https://registry.npmjs.org/brace-expansion/-/brace-expansion-5.0.7.tgz
            path: ${source.dir}/brace-expansion-5.0.7.tgz
            uid: 0
            gid: 0
          - url: https://registry.npmjs.org/uuid/-/uuid-11.1.1.tgz
            path: ${source.dir}/uuid-11.1.1.tgz
            uid: 0
            gid: 0
          - url: https://registry.npmjs.org/tmp/-/tmp-0.2.7.tgz
            path: ${source.dir}/tmp-0.2.7.tgz
            uid: 0
            gid: 0
          - url: https://registry.npmjs.org/js-yaml/-/js-yaml-4.3.0.tgz
            path: ${source.dir}/js-yaml-4.3.0.tgz
            uid: 0
            gid: 0
          - url: https://registry.npmjs.org/body-parser/-/body-parser-1.20.6.tgz
            path: ${source.dir}/body-parser-1.20.6.tgz
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: npm/bump@v1
          privileged: true
          with:
            bumps: ${source.dir}/npm-patches.json
            npm-root: ${source.dir}/edgemicro
        - name: install dependencies
          work-dir: ${source.dir}/edgemicro
          privileged: true
          runs: |
            set -eux -o pipefail

            npm install --omit=dev
        - name: patch nested qs packages
          work-dir: ${source.dir}/edgemicro
          privileged: true
          runs: |
            set -eux -o pipefail

            # Extract fixed qs version (downloaded in files section)
            mkdir -p /tmp/qs-fix
            tar -xzf ${source.dir}/qs-6.15.2.tgz -C /tmp/qs-fix

            # Find and replace ALL qs packages in node_modules
            find node_modules -type d -name "qs" -print0 | while IFS= read -r -d '' qs_dir; do
              echo "Replacing $qs_dir"
              rm -rf "$qs_dir"
              cp -r /tmp/qs-fix/package "$qs_dir"
            done

            rm -rf /tmp/qs-fix
        - name: patch nested diff packages
          work-dir: ${source.dir}/edgemicro
          privileged: true
          runs: |
            set -eux -o pipefail

            # Extract fixed diff version (downloaded in files section)
            mkdir -p /tmp/diff-fix
            tar -xzf ${source.dir}/diff-8.0.3.tgz -C /tmp/diff-fix

            # Find and replace ALL diff packages in node_modules
            # Only match directories named "diff" that contain package.json (actual npm packages)
            find node_modules -type d -name "diff" -exec test -f {}/package.json \; -print0 | while IFS= read -r -d '' diff_dir; do
              echo "Replacing $diff_dir"
              rm -rf "$diff_dir"
              cp -r /tmp/diff-fix/package "$diff_dir"
            done

            rm -rf /tmp/diff-fix
        - name: patch nested minimatch packages
          work-dir: ${source.dir}/edgemicro
          privileged: true
          runs: |
            set -eux -o pipefail

            # Extract fixed minimatch version (downloaded in files section)
            mkdir -p /tmp/minimatch-fix
            tar -xzf ${source.dir}/minimatch-10.2.3.tgz -C /tmp/minimatch-fix

            # Find and replace ALL minimatch packages in node_modules
            # Only match directories named "minimatch" that contain package.json (actual npm packages)
            find node_modules -type d -name "minimatch" -exec test -f {}/package.json \; -print0 | while IFS= read -r -d '' mm_dir; do
              echo "Replacing $mm_dir"
              rm -rf "$mm_dir"
              cp -r /tmp/minimatch-fix/package "$mm_dir"
            done

            rm -rf /tmp/minimatch-fix
        - name: patch nested lodash packages
          work-dir: ${source.dir}/edgemicro
          privileged: true
          runs: |
            set -eux -o pipefail

            mkdir -p /tmp/lodash-fix
            tar -xzf ${source.dir}/lodash-4.18.0.tgz -C /tmp/lodash-fix
            find node_modules -type d -name "lodash" -exec test -f {}/package.json \; -print0 | while IFS= read -r -d '' lodash_dir; do
              echo "Replacing $lodash_dir"
              rm -rf "$lodash_dir"
              cp -r /tmp/lodash-fix/package "$lodash_dir"
            done

            rm -rf /tmp/lodash-fix
        - name: patch nested underscore packages
          work-dir: ${source.dir}/edgemicro
          privileged: true
          runs: |
            set -eux -o pipefail

            mkdir -p /tmp/underscore-fix
            tar -xzf ${source.dir}/underscore-1.13.8.tgz -C /tmp/underscore-fix
            find node_modules -type d -name "underscore" -exec test -f {}/package.json \; -print0 | while IFS= read -r -d '' underscore_dir; do
              echo "Replacing $underscore_dir"
              rm -rf "$underscore_dir"
              cp -r /tmp/underscore-fix/package "$underscore_dir"
            done

            rm -rf /tmp/underscore-fix
        - name: patch nested jsrsasign packages
          work-dir: ${source.dir}/edgemicro
          privileged: true
          runs: |
            set -eux -o pipefail

            mkdir -p /tmp/jsrsasign-fix
            tar -xzf ${source.dir}/jsrsasign-11.1.1.tgz -C /tmp/jsrsasign-fix
            find node_modules -type d -name "jsrsasign" -exec test -f {}/package.json \; -print0 | while IFS= read -r -d '' jsrsasign_dir; do
              echo "Replacing $jsrsasign_dir"
              rm -rf "$jsrsasign_dir"
              cp -r /tmp/jsrsasign-fix/package "$jsrsasign_dir"
            done

            rm -rf /tmp/jsrsasign-fix
        - name: patch nested brace-expansion packages
          work-dir: ${source.dir}/edgemicro
          privileged: true
          runs: |
            set -eux -o pipefail

            mkdir -p /tmp/brace-expansion-fix
            tar -xzf ${source.dir}/brace-expansion-5.0.7.tgz -C /tmp/brace-expansion-fix
            find node_modules -type d -name "brace-expansion" -exec test -f {}/package.json \; -print0 | while IFS= read -r -d '' be_dir; do
              echo "Replacing $be_dir"
              rm -rf "$be_dir"
              cp -r /tmp/brace-expansion-fix/package "$be_dir"
            done

            rm -rf /tmp/brace-expansion-fix
        - name: patch nested uuid packages
          work-dir: ${source.dir}/edgemicro
          privileged: true
          runs: |
            set -eux -o pipefail

            mkdir -p /tmp/uuid-fix
            tar -xzf ${source.dir}/uuid-11.1.1.tgz -C /tmp/uuid-fix
            find node_modules -type d -name "uuid" -exec test -f {}/package.json \; -print0 | while IFS= read -r -d '' uuid_dir; do
              echo "Replacing $uuid_dir"
              rm -rf "$uuid_dir"
              cp -r /tmp/uuid-fix/package "$uuid_dir"
            done

            rm -rf /tmp/uuid-fix
        - name: patch nested tmp packages
          work-dir: ${source.dir}/edgemicro
          privileged: true
          runs: |
            set -eux -o pipefail

            mkdir -p /tmp/tmp-fix
            tar -xzf ${source.dir}/tmp-0.2.7.tgz -C /tmp/tmp-fix
            find node_modules -type d -name "tmp" -exec test -f {}/package.json \; -print0 | while IFS= read -r -d '' tmp_dir; do
              echo "Replacing $tmp_dir"
              rm -rf "$tmp_dir"
              cp -r /tmp/tmp-fix/package "$tmp_dir"
            done

            rm -rf /tmp/tmp-fix
        - name: patch nested js-yaml packages
          work-dir: ${source.dir}/edgemicro
          privileged: true
          runs: |
            set -eux -o pipefail

            mkdir -p /tmp/js-yaml-fix
            tar -xzf ${source.dir}/js-yaml-4.3.0.tgz -C /tmp/js-yaml-fix
            find node_modules -type d -name "js-yaml" -exec test -f {}/package.json \; -print0 | while IFS= read -r -d '' js_yaml_dir; do
              echo "Replacing $js_yaml_dir"
              rm -rf "$js_yaml_dir"
              cp -r /tmp/js-yaml-fix/package "$js_yaml_dir"
            done

            rm -rf /tmp/js-yaml-fix
        - name: patch nested body-parser packages
          work-dir: ${source.dir}/edgemicro
          privileged: true
          runs: |
            set -eux -o pipefail

            mkdir -p /tmp/body-parser-fix
            tar -xzf ${source.dir}/body-parser-1.20.6.tgz -C /tmp/body-parser-fix
            find node_modules -type d -name "body-parser" -exec test -f {}/package.json \; -print0 | while IFS= read -r -d '' bp_dir; do
              echo "Replacing $bp_dir"
              rm -rf "$bp_dir"
              cp -r /tmp/body-parser-fix/package "$bp_dir"
            done

            rm -rf /tmp/body-parser-fix
        - name: create config
          work-dir: ${source.dir}/edgemicro
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/nonroot/config"

            npx edgemicro init -c "${target.dir}/nonroot/config"
        - name: install
          work-dir: ${source.dir}/edgemicro
          runs: |
            set -eux -o pipefail

            npm install -g
      paths:
        - type: file
          path: /src/npm-patches.json
          uid: 0
          gid: 0
          source: image/apigee-microgateway/patch/npm-patches.json
      outputs:
        - source: /usr/lib/node_modules/edgemicro
          target: /usr/lib/node_modules/edgemicro
          uid: 0
          gid: 0
        - source: ${target.dir}/nonroot/config
          target: /home/nonroot/.edgemicro
          uid: 65532
          gid: 65532
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /usr/bin/edgemicro
    uid: 0
    gid: 0
    source: /usr/lib/node_modules/edgemicro/cli/edgemicro
annotations:
  org.opencontainers.image.description: A minimal apigee microgateway image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - node
  - /usr/bin/edgemicro
cmd:
  - start
