# syntax=dhi.io/build:2-debian13

name: Prometheus Statsd Exporter 0.30.x
image: dhi.io/prometheus-statsd-exporter
variant: runtime
tags:
  - "0"
  - "0.30"
  - 0.30.0
  - 0-debian
  - 0-debian13
  - 0.30-debian
  - 0.30-debian13
  - 0.30.0-debian
  - 0.30.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 4a7feb4d0ec9f1061b9e2f548810dd6efc6a294a
  SEMVER_MAJOR_MINOR_VERSION: "0.30"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.30.0
  VERSION: 0.30.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: statsd-exporter-go
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/prometheus/statsd_exporter.git#v0.30.0
            checksum: 4a7feb4d0ec9f1061b9e2f548810dd6efc6a294a
            path: /go/src/github.com/prometheus/statsd_exporter
            spdx:
              name: statsd_exporter
              version: 0.30.0
              packages:
                - name: statsd_exporter
                  purl: pkg:golang/github.com/prometheus/statsd_exporter@0.30.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/prometheus/statsd_exporter
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/prometheus/statsd_exporter
          with:
            ldflags:
              - -X github.com/prometheus/common/version.Version=0.30.0
              - -X github.com/prometheus/common/version.Revision=4a7feb4d0ec9f1061b9e2f548810dd6efc6a294a
              - -X github.com/prometheus/common/version.GoVersion=$(go env GOVERSION)
              - -X github.com/prometheus/common/version.GoOS=$(go env GOOS)
              - -X github.com/prometheus/common/version.GoArch=$(go env GOARCH)
              - -X github.com/prometheus/common/version.Branch=main
              - -X github.com/prometheus/common/version.BuildUser=ci@docker-build
              - -X github.com/prometheus/common/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%F-%T')
            output: ${target.dir}/usr/local/bin/statsd_exporter
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin/statsd_exporter
          target: /usr/local/bin/statsd_exporter
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/statsd_exporter
          target: /opt/docker/sbom/statsd_exporter
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal statsd-exporter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/statsd_exporter
ports:
  - 9102/tcp
