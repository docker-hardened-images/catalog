# syntax=dhi.io/build:2-debian13

name: Grafana Image Renderer 5.x (dev)
image: dhi.io/grafana-image-renderer
variant: dev
tags:
  - 5-dev
  - 5.9-dev
  - 5.9.1-dev
  - 5-debian-dev
  - 5-debian13-dev
  - 5.9-debian-dev
  - 5.9-debian13-dev
  - 5.9.1-debian-dev
  - 5.9.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-03"
vars:
  COMMIT_SHA: 6d2d090beb3d7d9170639005c52d9b0a95e86bef
  SEMVER_MAJOR_MINOR_VERSION: "5.9"
  SEMVER_MAJOR_VERSION: "5"
  SEMVER_VERSION: 5.9.1
  VERSION: 5.9.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - chromium
    - chromium-driver
    - chromium-sandbox
    - chromium-shell
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - fonts-freefont-ttf
    - fonts-inter
    - fonts-ipaexfont-gothic
    - fonts-kacst-one
    - fonts-khmeros
    - fonts-open-sans
    - fonts-recommended
    - fonts-roboto
    - fonts-thai-tlwg
    - fonts-wqy-zenhei
    - grep
    - libc-bin
    - libnss3-tools
    - libxss1
    - mawk
    - perl-base
    - sed
    - tini
    - tzdata
    - unifont
    - util-linux
  builds:
    - name: grafana-image-renderer
      work-dir: /go/src/github.com/grafana/grafana-image-renderer
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/grafana/grafana-image-renderer.git#v5.9.1
            checksum: 6d2d090beb3d7d9170639005c52d9b0a95e86bef
            path: /go/src/github.com/grafana/grafana-image-renderer
            spdx:
              name: grafana-image-renderer
              version: 5.9.1
              packages:
                - name: grafana-image-renderer
                  purl: pkg:golang/github.com/grafana/grafana-image-renderer@5.9.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          environment:
            GODEBUG: ${GODEBUG}
          with:
            deps:
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Exclude acceptance tests which require Docker/testcontainers
            go test $(go list ./... | grep -v '/tests/acceptance')
        - name: build grafana-image-renderer
          uses: go/build@v1
          with:
            ldflags:
              - -s
              - -w
            output: ${target.dir}/usr/bin/grafana-image-renderer
            packages: .
      outputs:
        - source: ${target.dir}/usr/bin/grafana-image-renderer
          target: /usr/bin/grafana-image-renderer
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/grafana-image-renderer
          target: /opt/docker/sbom/grafana-image-renderer
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /home/nonroot
environment:
  BROWSER_PATH: /usr/lib/chromium/chromium
  DEBIAN_FRONTEND: noninteractive
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
paths:
  - type: directory
    path: /home/nonroot
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /tmp
    uid: 65532
    gid: 65532
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal Grafana Image Renderer image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/tini
  - --
  - /usr/bin/grafana-image-renderer
cmd:
  - server
ports:
  - "8081"
