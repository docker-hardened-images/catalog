# syntax=dhi.io/build:2-debian13

name: Grafana Image Renderer 5.x
image: dhi.io/grafana-image-renderer
variant: runtime
tags:
  - "5"
  - "5.8"
  - 5.8.8
  - 5-debian13
  - 5.8-debian13
  - 5.8.8-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-03"
vars:
  COMMIT_SHA: d33dd0155c7cb34f7900fe96f8c6d8ac6b0440bc
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:5d1f9634fc21d351b8712212864d435bfe4204eca3d60b61cc7cfd491d776357
  SEMVER_MAJOR_MINOR_VERSION: "5.8"
  SEMVER_MAJOR_VERSION: "5"
  SEMVER_VERSION: 5.8.8
  VERSION: 5.8.8
contents:
  packages:
    - '!base-files'
    - ca-certificates
    - chromium
    - chromium-driver
    - chromium-sandbox
    - chromium-shell
    - fonts-freefont-ttf
    - fonts-inter
    - fonts-ipaexfont-gothic
    - fonts-kacst-one
    - fonts-khmeros
    - fonts-open-sans
    - fonts-recommended
    - fonts-roboto
    - fonts-thai-tlwg
    - fonts-wqy-zenhei
    - libnss3-tools
    - libxss1
    - tini
    - unifont
  builds:
    - name: grafana-image-renderer
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:5d1f9634fc21d351b8712212864d435bfe4204eca3d60b61cc7cfd491d776357
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/grafana/grafana-image-renderer.git#v5.8.8
            checksum: d33dd0155c7cb34f7900fe96f8c6d8ac6b0440bc
            path: /go/src/github.com/grafana/grafana-image-renderer
            spdx:
              name: grafana-image-renderer
              version: 5.8.8
              packages:
                - name: grafana-image-renderer
                  purl: pkg:golang/github.com/grafana/grafana-image-renderer@5.8.8
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/grafana/grafana-image-renderer
          environment:
            GODEBUG: ${GODEBUG}
          with:
            deps:
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          work-dir: /go/src/github.com/grafana/grafana-image-renderer
          runs: |
            set -eux -o pipefail

            # Exclude acceptance tests which require Docker/testcontainers
            go test $(go list ./... | grep -v '/tests/acceptance')
        - name: build grafana-image-renderer
          uses: go/build@v1
          work-dir: /go/src/github.com/grafana/grafana-image-renderer
          with:
            ldflags:
              - -s
              - -w
            output: ${target.dir}/usr/bin/grafana-image-renderer
            packages: .
      outputs:
        - source: ${target.dir}/usr/bin/grafana-image-renderer
          target: /usr/bin/grafana-image-renderer
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/grafana-image-renderer
          target: /opt/docker/sbom/grafana-image-renderer
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /home/nonroot
environment:
  BROWSER_PATH: /usr/lib/chromium/chromium
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
paths:
  - type: directory
    path: /home/nonroot
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /tmp
    uid: 65532
    gid: 65532
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal Grafana Image Renderer image with Chromium for headless screenshot rendering
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/tini
  - --
  - /usr/bin/grafana-image-renderer
cmd:
  - server
ports:
  - "8081"
