# syntax=dhi.io/build:2-debian13

name: Calico Whisker 3.x (dev)
image: dhi.io/calico-whisker
variant: dev
tags:
  - 3-dev
  - 3.32-dev
  - 3.32.0-dev
  - 3-debian-dev
  - 3-debian13-dev
  - 3.32-debian-dev
  - 3.32-debian13-dev
  - 3.32.0-debian-dev
  - 3.32.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-30"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: eb1cf57823a1dd8d25c48b82fd023ea9e3e17996
  NGINX_REFERENCE: dhi/nginx:1.31.2-debian13@sha256:736b0f376addce2ef7ee7cef9ebf7a8b207d112060e225976cace336adb5090e
  NODE_BUILD_REFERENCE: dhi/node:22.23.0-0-debian13-dev@sha256:a9fcbdc0a6fe8eb31dec0977a5c4a444a18f3a474fc1e2fc2de5d7de16410dc1
  SEMVER_MAJOR_MINOR_VERSION: "3.32"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.32.0
  VERSION: 3.32.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - dash
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: calico-whisker
      uses: dhi.io/node:22.23.0-0-debian13-dev@sha256:a9fcbdc0a6fe8eb31dec0977a5c4a444a18f3a474fc1e2fc2de5d7de16410dc1
      work-dir: ${source.dir}/calico/whisker
      caches:
        - path: ${source.dir}/calico/whisker/node_modules
        - path: /root/.cache/yarn
      contents:
        packages:
          - jq
        files:
          - url: git+https://github.com/projectcalico/calico.git#v3.32.0
            checksum: eb1cf57823a1dd8d25c48b82fd023ea9e3e17996
            path: ${source.dir}/calico
            spdx:
              name: calico-whisker
              version: 3.32.0
              packages:
                - name: calico-whisker
                  purl: pkg:golang/github.com/projectcalico/calico/whisker@3.32.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump yarn dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

            # CVE-2026-41907
            # CVE-2026-33532
            # CVE-2026-40181
            # CVE-2026-53655
            jq '.resolutions += {
              "uuid": "11.1.1",
              "yaml": "1.10.3",
              "react-router": "6.30.4",
              "@remix-run/router": "1.23.3",
              "tar": "7.5.16"
            }' package.json > package.tmp.json
            mv package.tmp.json package.json
        - name: install dependencies
          privileged: true
          environment:
            HUSKY: "0"
          runs: |
            set -eux -o pipefail

            yarn install --ignore-scripts
            yarn upgrade uuid@11.1.1 yaml@1.10.3 react-router@6.30.4 @remix-run/router@1.23.3 tar@7.5.16
        - name: build whisker ui
          runs: |
            set -eux -o pipefail

            node_opts="--max_old_space_size=8192"
            if [ "${target.fips}" = "true" ]; then
              # rsbuild/jiti hashes config with MD5. The FIPS node builder sets
              # OPENSSL_CONF with default_properties=fips=yes, which rejects MD5
              # even with --openssl-legacy-provider. Drop FIPS conf for this
              # compile-only step; the runtime image still ships FIPS OpenSSL.
              unset OPENSSL_CONF
              node_opts="${node_opts} --openssl-legacy-provider"
            fi

            NODE_OPTIONS="${node_opts}" \
              CNX_APP_VERSION="v3.32.0" \
              yarn build

            mkdir -p "${target.dir}/usr/share/nginx/html"
            cp -r dist/. "${target.dir}/usr/share/nginx/html/"
        - name: install nginx configs
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/etc/nginx/conf.d"

            # Apply upstream nginx-start.sh runtime edits at build time so the
            # non-root entrypoint does not need write access to /etc/nginx.
            sed 's!/var/run/nginx.pid!/tmp/nginx.pid!g; /user  nginx;/d' \
              docker-image/nginx.conf > "${target.dir}/etc/nginx/nginx.conf"
            cp docker-image/default.conf "${target.dir}/etc/nginx/conf.d/default.conf"

            # Drop in-place sed edits; nginx.conf is already patched above.
            mkdir -p "${target.dir}/usr/bin"
            grep -v 'sed -i.*nginx.conf' docker-image/nginx-start.sh \
              > "${target.dir}/usr/bin/nginx-start.sh"
            chmod 0755 "${target.dir}/usr/bin/nginx-start.sh"

            mkdir -p "${target.dir}/licenses"
            cp ../LICENSE.md "${target.dir}/licenses/LICENSE"
        - name: reinstall production dependencies for sbom
          privileged: true
          environment:
            HUSKY: "0"
          runs: |
            set -eux -o pipefail

            rm -rf node_modules
            yarn install --production --ignore-scripts
        - name: generate sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: calico-whisker
            source: ${source.dir}/calico/whisker
      outputs:
        - source: ${target.dir}/usr/share/nginx/html
          target: /usr/share/nginx/html
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/etc/nginx/nginx.conf
          target: /etc/nginx/nginx.conf
          uid: 0
          gid: 0
          mode: "0644"
        - source: ${target.dir}/etc/nginx/conf.d/default.conf
          target: /etc/nginx/conf.d/default.conf
          uid: 0
          gid: 0
          mode: "0644"
        - source: ${target.dir}/usr/bin/nginx-start.sh
          target: /usr/bin/nginx-start.sh
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/licenses/LICENSE
          target: /licenses/LICENSE
          uid: 0
          gid: 0
          mode: "0644"
        - source: /opt/docker/sbom/calico-whisker
          target: /opt/docker/sbom/calico-whisker
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/nginx:1.31.2-debian13@sha256:736b0f376addce2ef7ee7cef9ebf7a8b207d112060e225976cace336adb5090e
      excludes:
        - etc/nginx/conf.d/default.conf
        - etc/nginx/nginx.conf
        - usr/share/nginx/html/**
      uid: 0
      gid: 0
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
