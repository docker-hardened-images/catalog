# syntax=dhi.io/build:2-debian13

name: Knative Serving Webhook 1.22.x
image: dhi.io/knative-webhook
variant: runtime
tags:
  - "1"
  - "1.22"
  - 1.22.1
  - 1-debian
  - 1-debian13
  - 1.22-debian
  - 1.22-debian13
  - 1.22.1-debian
  - 1.22.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-28"
  end-of-life: "2026-11-03"
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "1.22"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.22.1
  SUFFIX: ""
  VERSION: 1.22.1-0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
    - webhook-1.22=1.22.1-0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /ko-app
    uid: 0
    gid: 0
    mode: "0755"
  - type: symlink
    path: /ko-app/webhook
    uid: 0
    gid: 0
    source: /usr/bin/webhook
annotations:
  org.opencontainers.image.description: A minimal Knative Serving webhook image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - webhook
