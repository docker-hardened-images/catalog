metadata:
  display-name: Knative Serving Webhook
  short-description: |
    Admission webhook for Knative Serving resources.

    The webhook is a control-plane component of Knative Serving. It defaults
    and validates Knative Serving custom resources through Kubernetes
    admission control, and validates the Serving ConfigMaps.
