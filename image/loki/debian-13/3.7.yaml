# syntax=dhi.io/build:2-debian13

name: Loki 3.7.x
image: dhi.io/loki
variant: runtime
tags:
  - "3"
  - "3.7"
  - 3.7.3
  - 3-debian
  - 3-debian13
  - 3.7-debian
  - 3.7-debian13
  - 3.7.3-debian
  - 3.7.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-26"
vars:
  COMMIT_SHA: 82cdcdc0410650624141a6225d1b449053f9cdf9
  SEMVER_MAJOR_MINOR_VERSION: "3.7"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.7.3
  VERSION: 3.7.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: loki
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - make
          - bash
          - sed
          - hostname
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
        files:
          - url: git+https://github.com/grafana/loki.git#v3.7.3
            checksum: 82cdcdc0410650624141a6225d1b449053f9cdf9
            path: ${source.dir}/loki
            spdx:
              name: loki
              version: 3.7.3
              packages:
                - name: loki
                  purl: pkg:dhi/loki@3.7.3
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies and vendor (3.7 only)
          uses: go/bump@v2
          work-dir: ${source.dir}/loki
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/buger/jsonparser@v1.1.2
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/exporters/stdout/stdoutlog@v0.19.0
              - google.golang.org/grpc@v1.82.1
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
            download: true
        - name: bump thrift and testify (3.7 only)
          work-dir: ${source.dir}/loki
          privileged: true
          runs: |
            set -eux -o pipefail

            # The FIPS builder defaults to fips140=only, but Go module downloads use TLS curves
            # that require lenient mode during this networked dependency update.

            go get github.com/apache/thrift@v0.23.0 # CVE-2026-41602
            # go-openapi/testify is a multi-module repo where enable/yaml/v2 has a
            # require on testify/v2 at the same version. Pin both together to avoid
            # a version skew across the v2.1.0 rename (assert/yaml -> enable/stubs/yaml).
            go get github.com/go-openapi/testify/v2@v2.5.1
            go get github.com/go-openapi/testify/enable/yaml/v2@v2.5.1
            go mod tidy
            go mod vendor
        - name: build
          uses: go/build@v1
          work-dir: ${source.dir}/loki
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -extldflags "-static"
              - -X github.com/grafana/loki/v3/pkg/util/build.Branch=3.7.3
              - -X github.com/grafana/loki/v3/pkg/util/build.Version=3.7.3
              - -X github.com/grafana/loki/v3/pkg/util/build.Revision=82cdcdc0410650624141a6225d1b449053f9cdf9
              - -X github.com/grafana/loki/v3/pkg/util/build.BuildUser=dhi@build
              - -X github.com/grafana/loki/v3/pkg/util/build.BuildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/local/bin/loki
            packages: ./cmd/loki
            tags: netgo
        - name: install
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/etc/loki"
            cp -a "${source.dir}/loki/cmd/loki/loki-docker-config.yaml" "${target.dir}/etc/loki/local-config.yaml"
      outputs:
        - source: ${target.dir}/usr/local/bin/loki
          target: /usr/local/bin/loki
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/loki/local-config.yaml
          target: /etc/loki/local-config.yaml
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/loki
          target: /opt/docker/sbom/loki
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /loki
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /loki/rules
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /loki/rules-temp
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Loki image
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - /usr/local/bin/loki
cmd:
  - -config.file=/etc/loki/local-config.yaml
ports:
  - 3100/tcp
