# syntax=dhi.io/build:2-debian13

name: Loki 3.7.x
image: dhi.io/loki
variant: runtime
tags:
  - "3"
  - "3.7"
  - 3.7.2
  - 3-debian13
  - 3.7-debian13
  - 3.7.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-26"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 7486c4a755a089363f07403dfa1c5fe727f25f4a
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:5d1f9634fc21d351b8712212864d435bfe4204eca3d60b61cc7cfd491d776357
  SEMVER_MAJOR_MINOR_VERSION: "3.7"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.7.2
  VERSION: 3.7.2
contents:
  packages:
    - '!base-files'
  builds:
    - name: loki
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:5d1f9634fc21d351b8712212864d435bfe4204eca3d60b61cc7cfd491d776357
      contents:
        packages:
          - make
          - bash
          - sed
          - hostname
        files:
          - url: git+https://github.com/grafana/loki.git#v3.7.2
            checksum: 7486c4a755a089363f07403dfa1c5fe727f25f4a
            path: ${source.dir}/loki
            spdx:
              name: loki
              version: 3.7.2
              packages:
                - name: loki
                  purl: pkg:dhi/loki@3.7.2
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies and vendor (3.7 only)
          uses: go/bump@v2
          work-dir: ${source.dir}/loki
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/buger/jsonparser@v1.1.2
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/stdout/stdoutlog@v0.19.0
            download: true
        - name: bump thrift and testify (3.7 only)
          work-dir: ${source.dir}/loki
          privileged: true
          runs: |
            set -eux -o pipefail

            # The FIPS builder defaults to fips140=only, but Go module downloads use TLS curves
            # that require lenient mode during this networked dependency update.
            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            go get github.com/apache/thrift@v0.23.0 # CVE-2026-41602
            # go-openapi/testify is a multi-module repo where enable/yaml/v2 has a
            # require on testify/v2 at the same version. Pin both together to avoid
            # a version skew across the v2.1.0 rename (assert/yaml -> enable/stubs/yaml).
            go get github.com/go-openapi/testify/v2@v2.5.1
            go get github.com/go-openapi/testify/enable/yaml/v2@v2.5.1
            go mod tidy
            go mod vendor
        - name: build
          uses: go/build@v1
          work-dir: ${source.dir}/loki
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -extldflags "-static"
              - -X github.com/grafana/loki/v3/pkg/util/build.Branch=3.7.2
              - -X github.com/grafana/loki/v3/pkg/util/build.Version=3.7.2
              - -X github.com/grafana/loki/v3/pkg/util/build.Revision=7486c4a755a089363f07403dfa1c5fe727f25f4a
              - -X github.com/grafana/loki/v3/pkg/util/build.BuildUser=dhi@build
              - -X github.com/grafana/loki/v3/pkg/util/build.BuildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/local/bin/loki
            packages: ./cmd/loki
            tags: netgo
        - name: install
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/etc/loki"
            cp -a "${source.dir}/loki/cmd/loki/loki-docker-config.yaml" "${target.dir}/etc/loki/local-config.yaml"
      outputs:
        - source: ${target.dir}/usr/local/bin/loki
          target: /usr/local/bin/loki
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/loki/local-config.yaml
          target: /etc/loki/local-config.yaml
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/loki
          target: /opt/docker/sbom/loki
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /loki
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /loki/rules
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /loki/rules-temp
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Loki image
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - /usr/local/bin/loki
cmd:
  - -config.file=/etc/loki/local-config.yaml
ports:
  - 3100/tcp
