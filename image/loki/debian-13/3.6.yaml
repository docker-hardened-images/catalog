# syntax=dhi.io/build:2-debian13

name: Loki 3.6.x
image: dhi.io/loki
variant: runtime
tags:
  - "3.6"
  - 3.6.12
  - 3.6-debian
  - 3.6-debian13
  - 3.6.12-debian
  - 3.6.12-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: a25e0d91117416439be4998d3c714e48cd7e5a2b
  SEMVER_MAJOR_MINOR_VERSION: "3.6"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.6.12
  VERSION: 3.6.12
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: loki
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - make
          - bash
          - sed
          - hostname
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
        files:
          - url: git+https://github.com/grafana/loki.git#v3.6.12
            checksum: a25e0d91117416439be4998d3c714e48cd7e5a2b
            path: ${source.dir}/loki
            spdx:
              name: loki
              version: 3.6.12
              packages:
                - name: loki
                  purl: pkg:dhi/loki@3.6.12
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: remove godoc
          work-dir: ${source.dir}/loki
          privileged: true
          runs: |
            set -eux -o pipefail

            # Fixes golang.org/x/tools/godoc@v0.1.0-deprecated: is explicitly
            # required in go.mod, but not marked as explicit in vendor/modules.txt.
            # The following go/bump@v2 step re-syncs vendor after this edit.
            go get golang.org/x/tools/godoc@none
        - name: update go dependencies and vendor (3.6 only)
          uses: go/bump@v2
          work-dir: ${source.dir}/loki
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/buger/jsonparser@v1.1.2
              - github.com/go-jose/go-jose/v4@v4.1.4
              - google.golang.org/grpc@v1.82.1
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
            download: true
        - name: bump prometheus for 3.6.11+ compatibility
          work-dir: ${source.dir}/loki
          privileged: true
          runs: |
            set -eux -o pipefail

            # Loki 3.6.11 requires Prometheus v0.311.x for API compatibility
            go get github.com/prometheus/prometheus@v0.311.2-0.20260410083055-07c6232d159b
            go mod tidy
            go mod vendor
        - name: build
          uses: go/build@v1
          work-dir: ${source.dir}/loki
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -extldflags "-static"
              - -X github.com/grafana/loki/v3/pkg/util/build.Branch=3.6.12
              - -X github.com/grafana/loki/v3/pkg/util/build.Version=3.6.12
              - -X github.com/grafana/loki/v3/pkg/util/build.Revision=a25e0d91117416439be4998d3c714e48cd7e5a2b
              - -X github.com/grafana/loki/v3/pkg/util/build.BuildUser=dhi@build
              - -X github.com/grafana/loki/v3/pkg/util/build.BuildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/local/bin/loki
            packages: ./cmd/loki
            tags: netgo
        - name: install
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/etc/loki"
            cp -a "${source.dir}/loki/cmd/loki/loki-docker-config.yaml" "${target.dir}/etc/loki/local-config.yaml"
      outputs:
        - source: ${target.dir}/usr/local/bin/loki
          target: /usr/local/bin/loki
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/loki/local-config.yaml
          target: /etc/loki/local-config.yaml
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/loki
          target: /opt/docker/sbom/loki
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /loki
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /loki/rules
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /loki/rules-temp
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Loki image
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - /usr/local/bin/loki
cmd:
  - -config.file=/etc/loki/local-config.yaml
ports:
  - 3100/tcp
