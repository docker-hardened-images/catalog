# syntax=dhi.io/build:2-debian13

name: Loki 3.6.x
image: dhi.io/loki
variant: runtime
tags:
  - "3"
  - "3.6"
  - 3.6.8
  - 3-debian13
  - 3.6-debian13
  - 3.6.8-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 138c391fd0237b8bf1eb9ecf9eb14d8ce04727c5
  GOLANG_REFERENCE: dhi/golang:1.26.1-debian13-dev@sha256:2eaf3936008b4a31091eda26511748c1b872925fa5f674f13fbf5b53e7e777c2
  SEMVER_MAJOR_MINOR_VERSION: "3.6"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.6.8
  VERSION: 3.6.8
contents:
  packages:
    - '!base-files'
  builds:
    - name: loki
      uses: dhi.io/golang:1.26.1-debian13-dev@sha256:2eaf3936008b4a31091eda26511748c1b872925fa5f674f13fbf5b53e7e777c2
      contents:
        packages:
          - make
          - bash
          - sed
          - hostname
        files:
          - url: git+https://github.com/grafana/loki.git#v3.6.8
            checksum: 138c391fd0237b8bf1eb9ecf9eb14d8ce04727c5
            path: ${source.dir}/loki
            spdx:
              name: loki
              version: 3.6.8
              packages:
                - name: loki
                  purl: pkg:dhi/loki@3.6.8
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies and vendor
          uses: go/bump@v1
          with:
            deps:
              - go.opentelemetry.io/otel/sdk@v1.40.0
              - google.golang.org/grpc@v1.79.3
              - github.com/buger/jsonparser@v1.1.2
            dir: ${source.dir}/loki
            download: true
        - name: remove godoc
          work-dir: ${source.dir}/loki
          runs: |
            set -eux -o pipefail

            #Fixes golang.org/x/tools/godoc@v0.1.0-deprecated: is explicitly required in go.mod, but not marked as explicit in vendor/modules.txt
            #by removing what it seems a non runtime dependency
            go get golang.org/x/tools/godoc@none
        - name: build
          uses: go/build@v1
          work-dir: ${source.dir}/loki
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -extldflags "-static"
              - -X github.com/grafana/loki/v3/pkg/util/build.Branch=3.6.8
              - -X github.com/grafana/loki/v3/pkg/util/build.Version=3.6.8
              - -X github.com/grafana/loki/v3/pkg/util/build.Revision=138c391fd0237b8bf1eb9ecf9eb14d8ce04727c5
              - -X github.com/grafana/loki/v3/pkg/util/build.BuildUser=dhi@build
              - -X github.com/grafana/loki/v3/pkg/util/build.BuildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/local/bin/loki
            packages: ./cmd/loki
            tags: netgo
        - name: install
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/etc/loki"
            cp -a "${source.dir}/loki/cmd/loki/loki-docker-config.yaml" "${target.dir}/etc/loki/local-config.yaml"
      outputs:
        - source: ${target.dir}/usr/local/bin/loki
          target: /usr/local/bin/loki
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/loki/local-config.yaml
          target: /etc/loki/local-config.yaml
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/loki
          target: /opt/docker/sbom/loki
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /loki
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /loki/rules
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /loki/rules-temp
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Loki image
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - /usr/local/bin/loki
cmd:
  - -config.file=/etc/loki/local-config.yaml
ports:
  - 3100/tcp
