# syntax=dhi.io/build:2-debian12

name: Go 1.25.x
image: dhi.io/golang
variant: runtime
tags:
  - 1.25-debian12
  - 1.25.8-debian12
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-08-12"
vars:
  MAJOR_MINOR_VERSION: "1.25"
  MAJOR_VERSION: "1"
  PKG_GOLANG_REFERENCE: dhi/pkg-golang:1.25.8-debian12@sha256:aea900ce718e00f3de0088508e32c80df1283e10496c155a2772e6beeff1f1e0
  VERSION: 1.25.8
contents:
  packages:
    - '!libelogind0'
    - '!original-awk'
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - findutils
    - tzdata
  artifacts:
    - name: dhi.io/pkg-golang:1.25.8-debian12@sha256:aea900ce718e00f3de0088508e32c80df1283e10496c155a2772e6beeff1f1e0
      includes:
        - opt/docker/sbom
        - usr/local/go
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "12"
  version-codename: bookworm
  pretty-name: Docker Hardened Images/Debian GNU/Linux 12 (bookworm)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /go
environment:
  GOLANG_VERSION: 1.25.8
  GOPATH: /go
  GOTOOLCHAIN: local
  PATH: /go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: directory
    path: /home/nonroot/.config/go/telemetry/
    uid: 65532
    gid: 65532
    mode: "0744"
  - type: file
    path: /home/nonroot/.config/go/telemetry/mode
    content: |
      off 1970-01-01
    uid: 65532
    gid: 65532
    mode: "0644"
  - type: directory
    path: /go
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /go/bin
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /go/src
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /usr/src
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Golang image
  org.opencontainers.image.licenses: BSD-3-Clause
cmd:
  - go
  - help
