# syntax=dhi.io/build:2-debian13

name: Go 1.26.x / Socket Firewall Enterprise (sfw-ent, dev)
image: dhi.io/golang
variant: dev
flavor: sfw-ent
tags:
  - 1-sfw-ent-dev
  - 1.26-sfw-ent-dev
  - 1.26.2-sfw-ent-dev
  - 1-debian13-sfw-ent-dev
  - 1.26-debian13-sfw-ent-dev
  - 1.26.2-debian13-sfw-ent-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-02-03"
vars:
  BINUTILS_DIGEST: sha256:5333b3178ad52e503d8c44eb5a4073a039842ebc3403f6b6c6658a11c0b200e7
  BINUTILS_VERSION: "2.46"
  EXPAT_DIGEST: sha256:6bb36827ea9fdd0cb5064de572070fc0c82a1443054c91c60a63a80da0552897
  EXPAT_VERSION: 2.7.5
  MAJOR_MINOR_VERSION: "1.26"
  MAJOR_VERSION: "1"
  PKG_GOLANG_REFERENCE: dhi/pkg-golang:1.26.2-debian13@sha256:2c512be805d88c21a826f304a54dc0e8083061c4e6f60243f523873571493b18
  SFW_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "arm64" }'
  SFW_VERSION: 1.7.2
  VERSION: 1.26.2
contents:
  packages:
    - '!binutils'
    - '!binutils-aarch64-linux-gnu'
    - '!binutils-common'
    - '!binutils-x86-64-linux-gnu'
    - '!gawk'
    - '!libbinutils'
    - '!libctf-nobfd0'
    - '!libctf0'
    - '!libelogind0'
    - '!libexpat1'
    - '!libgprofng0'
    - '!libsframe1'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - g++
    - gcc
    - git
    - grep
    - libc-bin
    - libc6-dev
    - libslang2
    - libstdc++6
    - make
    - mawk
    - perl-base
    - sed
    - tar
    - tzdata
    - util-linux
  builds:
    - name: golang-sfw-ent
      contents:
        packages:
          - bash
          - coreutils
          - findutils
        files:
          - url: https://github.com/SocketDev/firewall-release/releases/download/v1.7.2/sfw-linux-${SFW_ARCH}
            path: ${target.dir}/opt/socket/bin/sfw
            uid: 0
            gid: 0
            mode: "0755"
      pipeline:
        - name: create alias
          runs: |
            set -eux -o pipefail

            echo "Creating go alias"

            cat > "${target.dir}/opt/socket/bin/go" << 'EOF'
            #!/bin/sh

            # if DHI_NO_SFW is set to true, run the command without sfw, otherwise run with sfw
            if [ "${DHI_NO_SFW}" = "true" ]; then
              /usr/local/go/bin/go "$@"
            else
              sfw /usr/local/go/bin/go "$@"
            fi
            EOF

            chmod +x "${target.dir}/opt/socket/bin/go"
      outputs:
        - source: ${target.dir}/opt/socket
          target: /opt/socket
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/pkg-golang:1.26.2-debian13@sha256:2c512be805d88c21a826f304a54dc0e8083061c4e6f60243f523873571493b18
      includes:
        - opt/docker/sbom
        - usr/local/go
      uid: 0
      gid: 0
    - name: dhi.io/pkg-binutils:2.46-debian13@sha256:5333b3178ad52e503d8c44eb5a4073a039842ebc3403f6b6c6658a11c0b200e7
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
    - name: dhi.io/pkg-expat:2.7.5-debian13@sha256:6bb36827ea9fdd0cb5064de572070fc0c82a1443054c91c60a63a80da0552897
      includes:
        - usr/**
        - var/lib/dpkg/status.d
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /go
environment:
  DEBIAN_FRONTEND: noninteractive
  GOLANG_VERSION: 1.26.2
  GOPATH: /go
  GOTOOLCHAIN: local
  PATH: /opt/socket/bin:/go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: directory
    path: /home/nonroot/.config/go/telemetry/
    uid: 65532
    gid: 65532
    mode: "0744"
  - type: file
    path: /home/nonroot/.config/go/telemetry/mode
    content: |
      off 1970-01-01
    uid: 65532
    gid: 65532
    mode: "0644"
  - type: file
    path: /root/.config/go/telemetry/mode
    content: |
      off 1970-01-01
    uid: 0
    gid: 0
    mode: "0644"
  - type: directory
    path: /go
    uid: 0
    gid: 0
    mode: "0755"
  - type: directory
    path: /go/bin
    uid: 0
    gid: 0
    mode: "0755"
  - type: directory
    path: /go/src
    uid: 0
    gid: 0
    mode: "0755"
  - type: directory
    path: /usr/src
    uid: 0
    gid: 0
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Golang image
  org.opencontainers.image.licenses: BSD-3-Clause
cmd:
  - go
  - help
