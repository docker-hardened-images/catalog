# syntax=dhi.io/build:2-debian13

name: Temporal Server 1.30.x
image: dhi.io/temporalio-server
variant: runtime
tags:
  - "1.30"
  - 1.30.4
  - 1.30-debian13
  - 1.30.4-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-10"
vars:
  ARCH: '#{ target.arch == "amd64" ? "amd64" : "arm64" }'
  COMMIT_SHA: 50391837b273c6344c9f7d87870f13c6e6373337
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:972b3b41ae70170229bd24c019dd60465130be297739a9bb64d834c21ac1a27b
  SEMVER_MAJOR_MINOR_VERSION: "1.30"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.30.4
  VERSION: 1.30.4
contents:
  packages:
    - bash
    - ca-certificates
    - coreutils
    - grep
    - tzdata
  builds:
    - name: build-temporal-server-binaries
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:972b3b41ae70170229bd24c019dd60465130be297739a9bb64d834c21ac1a27b
      work-dir: /go/src/go.temporal.io/server
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/temporalio/temporal.git#v1.30.4
            checksum: 50391837b273c6344c9f7d87870f13c6e6373337
            path: /go/src/go.temporal.io/server
            spdx:
              name: temporalio-server
              version: 1.30.4
              packages:
                - name: temporal-server
                  purl: pkg:golang/go.temporal.io/server@1.30.4
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v2
          with:
            deps:
              - filippo.io/edwards25519@v1.1.1
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - github.com/apache/thrift@v0.23.0
              - golang.org/x/net@v0.53.0
            download: true
        - name: build server
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/temporal-server
            packages: ./cmd/server
        - name: test temporal server binaries
          runs: |
            set -eux -o pipefail

            ${target.dir}/usr/local/bin/temporal-server --help

            echo "Running core temporal unit tests..."
            go test -C /go/src/go.temporal.io/server -v -timeout=3m ./common/log/...
            go test -C /go/src/go.temporal.io/server -v -timeout=3m ./common/config/...
            go test -C /go/src/go.temporal.io/server -v -timeout=3m ./common/util/...
        - name: Update entrypoint script
          runs: |
            set -eux -o pipefail

            # make a copy before modifying
            mkdir -p "${target.dir}/etc/temporal"
            cp "/go/src/go.temporal.io/server/docker/scripts/sh/entrypoint.sh" "${source.dir}/entrypoint.sh"

            # Replace getent commands with /etc/hosts parsing to avoid the getent dependency.
            sed -i 's/getent hosts "\$(hostname)"/cat \/etc\/hosts | grep -v ^# | grep "\$HOSTNAME"/g' "/go/src/go.temporal.io/server/docker/scripts/sh/entrypoint.sh"

            install -m 755 /go/src/go.temporal.io/server/docker/scripts/sh/entrypoint.sh ${target.dir}/etc/temporal/entrypoint.sh

            # Sanity check: Verify exactly 8 diff lines (2 getent replacements)
            diff_count=$(diff "/go/src/go.temporal.io/server/docker/scripts/sh/entrypoint.sh" "${source.dir}/entrypoint.sh" | wc -l || true)
            if [ "$diff_count" -ne 8 ]; then
              echo "ERROR: Expected exactly 8 diff lines (2 getent replacements), got $diff_count"
              echo "This suggests the upstream entrypoint.sh has changed significantly."
              echo "Diff output:"
              diff "/go/src/go.temporal.io/server/docker/scripts/sh/entrypoint.sh" "${source.dir}/entrypoint.sh" || true
              exit 1
            fi

            # Verify the modified script contains our expected /etc/hosts logic
            if ! grep -q "cat /etc/hosts | grep -v \^#" "${target.dir}/etc/temporal/entrypoint.sh"; then
              echo "ERROR: Modified entrypoint script does not contain expected /etc/hosts logic"
              exit 1
            fi
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/temporal/entrypoint.sh
          target: /etc/temporal/entrypoint.sh
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/temporalio-server
          target: /opt/docker/sbom/temporalio-server
          uid: 0
          gid: 0
accounts:
  run-as: temporal
  users:
    - name: temporal
      uid: 1000
      gid: 1000
  groups:
    - name: temporal
      gid: 1000
      members:
        - temporal
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /etc/temporal
environment:
  TEMPORAL_HOME: /etc/temporal
paths:
  - type: directory
    path: /etc/temporal/config
    uid: 1000
    gid: 1000
    mode: "0777"
annotations:
  org.opencontainers.image.description: Temporal Server - Workflow as Code to build and operate resilient applications
  org.opencontainers.image.licenses: MIT
cmd:
  - /etc/temporal/entrypoint.sh
