# syntax=dhi.io/build:2-debian13

name: Temporal Server 1.31.x
image: dhi.io/temporalio-server
variant: runtime
tags:
  - "1"
  - "1.31"
  - 1.31.0
  - 1-debian13
  - 1.31-debian13
  - 1.31.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-29"
vars:
  ARCH: '#{ target.arch == "amd64" ? "amd64" : "arm64" }'
  COMMIT_SHA: 83881961df2bad7d78d93a2d50778dbc8bd1a2fc
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:972b3b41ae70170229bd24c019dd60465130be297739a9bb64d834c21ac1a27b
  SEMVER_MAJOR_MINOR_VERSION: "1.31"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.31.0
  VERSION: 1.31.0
contents:
  packages:
    - bash
    - ca-certificates
    - coreutils
    - grep
    - tzdata
  builds:
    - name: temporal-server
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:972b3b41ae70170229bd24c019dd60465130be297739a9bb64d834c21ac1a27b
      work-dir: /go/src/go.temporal.io/server
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/temporalio/temporal.git#v1.31.0
            checksum: 83881961df2bad7d78d93a2d50778dbc8bd1a2fc
            path: /go/src/go.temporal.io/server
            spdx:
              name: temporalio-server
              version: 1.31.0
              packages:
                - name: temporal-server
                  purl: pkg:golang/go.temporal.io/server@v1.31.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.31 only)
          uses: go/bump@v2
          with:
            deps:
              - filippo.io/edwards25519@v1.1.1
              - github.com/apache/thrift@v0.23.0
              - github.com/aws/aws-sdk-go-v2/service/lambda@v1.88.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - golang.org/x/net@v0.53.0
            download: true
        - name: unit test
          runs: |
            set -eux -o pipefail

            echo "Running core temporal unit tests..."
            go test -C /go/src/go.temporal.io/server -v -timeout=3m ./common/log/...
            go test -C /go/src/go.temporal.io/server -v -timeout=3m ./common/config/...
            go test -C /go/src/go.temporal.io/server -v -timeout=3m ./common/util/...
        - name: build server
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/temporal-server
            packages: ./cmd/server
      outputs:
        - source: ${target.dir}/usr/local/bin/temporal-server
          target: /usr/local/bin/temporal-server
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/temporalio-server
          target: /opt/docker/sbom/temporalio-server
          uid: 0
          gid: 0
    - name: entrypoint
      work-dir: /go/src/go.temporal.io/server
      contents:
        packages:
          - bash
          - coreutils
        files:
          - url: git+https://github.com/temporalio/temporal.git#v1.31.0
            checksum: 83881961df2bad7d78d93a2d50778dbc8bd1a2fc
            path: /go/src/go.temporal.io/server
            uid: 0
            gid: 0
      pipeline:
        - name: patch entrypoint
          uses: patch@v1
          with:
            options: -p1
            patches:
              - ${source.dir}/patch/entrypoint-getent_hostname.30.patch
        - name: install entrypoint
          runs: |
            set -eux -o pipefail

            mkdir -p '${target.dir}/etc/temporal'
            install -m 755 docker/scripts/sh/entrypoint.sh '${target.dir}/etc/temporal/entrypoint.sh'
      paths:
        - type: directory
          path: /src/patch/entrypoint-getent_hostname.30.patch
          uid: 0
          gid: 0
          source: image/temporalio-server/patch/entrypoint-getent_hostname.30.patch
      outputs:
        - source: ${target.dir}/etc/temporal/entrypoint.sh
          target: /etc/temporal/entrypoint.sh
          uid: 0
          gid: 0
accounts:
  run-as: temporal
  users:
    - name: temporal
      uid: 1000
      gid: 1000
  groups:
    - name: temporal
      gid: 1000
      members:
        - temporal
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /etc/temporal
environment:
  TEMPORAL_HOME: /etc/temporal
paths:
  - type: directory
    path: /etc/temporal/config
    uid: 1000
    gid: 1000
    mode: "0777"
annotations:
  org.opencontainers.image.description: Temporal Server - Workflow as Code to build and operate resilient applications
  org.opencontainers.image.licenses: MIT
cmd:
  - /etc/temporal/entrypoint.sh
ports:
  - 6933/tcp
  - 6934/tcp
  - 6935/tcp
  - 6939/tcp
  - 7233/tcp
  - 7234/tcp
  - 7235/tcp
  - 7239/tcp
