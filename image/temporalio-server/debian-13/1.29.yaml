            path: /go/src/github.com/temporalio/cli
            spdx:
              name: temporal-cli
              version: 1.7.0
              packages:
                - name: temporal-cli
                  purl: pkg:dhi/temporal-cli@1.7.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies (1.29 only)
          uses: go/bump@v2
          with:
            deps:
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/gomarkdown/markdown@v0.0.0-20260411013819-759bbc3e3207
              - github.com/jackc/pgx/v5@v5.9.2
              - go.opentelemetry.io/otel/sdk@v1.43.0
            download: true
        - name: build temporal CLI binary
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/temporal
            packages: ./cmd/temporal
        - name: test temporal CLI binary
          shell: bash
          runs: |
            set -eux -o pipefail

            ${target.dir}/usr/local/bin/temporal --help
      outputs:
        - source: ${target.dir}/usr/local/bin/temporal
          target: /usr/local/bin/temporal
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/temporal-cli
          target: /opt/docker/sbom/temporal-cli
