metadata:
  display-name: Temporal Server
  short-description: Temporal is a durable execution platform that enables developers to build scalable applications without sacrificing productivity or reliability.
  featured: false
  home-url: https://temporal.io/
  categories:
    - monitoring-and-observability
  included-tools:
    - name: temporal-server
      description: The Temporal server
    - name: temporal
      description: Modern CLI for Temporal (replaces tctl) (Included until v1.29)
    - name: temporal-cassandra-tool (Included until v1.29)
      description: Database schema management for Cassandra
    - name: temporal-sql-tool
      description: Database schema management for SQL databases (Included until v1.29)
    - name: tdbg (Included until v1.29)
      description: Temporal debugging tool
