# syntax=dhi.io/build:2-debian13

name: Docker Scout SBOM Indexer 1.x
image: dhi.io/scout-sbom-indexer
variant: runtime
tags:
  - "1"
  - "1.23"
  - 1.23.1
  - 1-debian
  - 1-debian13
  - 1.23-debian
  - 1.23-debian13
  - 1.23.1-debian
  - 1.23.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "1.23"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.23.1
  SUFFIX: ""
  VERSION: 1.23.1-0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - scout-sbom-indexer=1.23.1-0
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  BUILDKIT_SCAN_SELECT-CATALOGERS: -binary-classifier-cataloger,-java-jvm-cataloger,-php-interpreter-cataloger,+erlang-otp-application-cataloger,+lua-rock-cataloger
  COLORTERM: "true"
annotations:
  org.opencontainers.image.description: Docker Scout SBOM Indexer
entrypoint:
  - /sbom-indexer
