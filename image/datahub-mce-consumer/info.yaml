metadata:
  display-name: DataHub MCE Consumer
  short-description: The DataHub MCE Consumer is a Kafka consumer service that processes MetadataChangeProposal events from upstream sources (ingestion CLI, actions framework) and applies them to DataHub's metadata storage layer via the GMS API, writing failures back to the FailedMetadataChangeProposal topic for retry.
  featured: false
  home-url: https://datahub.com
  categories:
    - data-science
    - integration-and-delivery
  included-tools:
    - name: java
      description: Eclipse Temurin OpenJDK 17 JRE runtime used to launch the MCE Consumer JAR via start.sh.
    - name: dockerize
      description: Service-readiness wait utility (powerman/dockerize) used by start.sh to block on Kafka (and optionally Schema Registry) availability before the JVM starts.
