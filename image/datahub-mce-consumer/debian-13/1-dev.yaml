  DOCKERIZE_VERSION: 0.24.3
  GRADLE_REFERENCE: dhi/gradle:8.14.5-jdk17-debian13-dev@sha256:41b5a91db3cf0210c45f00543a5317c86ed4456051f59cc0f8980fb22337c910
  JMX_PROMETHEUS_SHA256: 8b67ed40485d475648c36d11d21464b484406f85faf912b3363f71a6a7861320
  JMX_PROMETHEUS_VERSION: 0.20.0
  JRE_REFERENCE: dhi/eclipse-temurin:17.0.19.10-debian13@sha256:662dc35b17b9de4db61f914af1012e2051147bc8a6d33c4b6d5f183dee80b8c0
  OTEL_JAVAAGENT_SHA256: bd01fea1304e8c8803fff827a0bdda02b2266742a85c62548053c6761474bb5b
