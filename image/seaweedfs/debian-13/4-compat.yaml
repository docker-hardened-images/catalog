# syntax=dhi.io/build:2-debian13

name: Seaweedfs 4.x (compat)
image: dhi.io/seaweedfs
variant: runtime
flavor: compat
tags:
  - 4-compat
  - 4.40-compat
  - 4-debian-compat
  - 4-debian13-compat
  - 4.40-debian-compat
  - 4.40-debian13-compat
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 875cd1f67ea25e8965a4f5ba1e6aaf501ba6b6fa
  MAJOR_VERSION: "4"
  VERSION: "4.40"
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - bash
    - bzip2
    - ca-certificates-bundle
    - coreutils
    - dash
    - tzdata
  builds:
    - name: seaweedfs
      work-dir: /go/src/github.com/seaweedfs/seaweedfs
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - git
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/seaweedfs/seaweedfs.git#4.40
            checksum: 875cd1f67ea25e8965a4f5ba1e6aaf501ba6b6fa
            path: /go/src/github.com/seaweedfs/seaweedfs
            spdx:
              name: seaweedfs
              version: "4.40"
              packages:
                - name: seaweedfs
                  purl: pkg:golang/github.com/seaweedfs/seaweedfs@4.40
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/image@v0.43.0
              - github.com/go-git/go-billy/v5@v5.9.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
            download: true
            replaces:
              - github.com/apache/thrift=github.com/apache/thrift@v0.23.0
        - name: test
          work-dir: /go/src/github.com/seaweedfs/seaweedfs/weed
          privileged: true
          runs: |
            set -eux -o pipefail

            # weed/command and weed/cluster include timing-sensitive tests that fail on arm64 builders
            EXCLUSIONS='/(s3|logstore|kafka|client|mq|command|cluster)'

            CGO_ENABLED=0 go test $(go list ./... | egrep -v "$EXCLUSIONS")
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/seaweedfs/seaweedfs/weed
          with:
            ldflags:
              - -X github.com/seaweedfs/seaweedfs/weed/util/version.COMMIT=875cd1f67ea25e8965a4f5ba1e6aaf501ba6b6fa
            output: ${target.dir}/usr/bin/weed
      outputs:
        - source: ${target.dir}/usr/bin/weed
          target: /usr/bin/weed
          uid: 0
          gid: 0
        - source: /go/src/github.com/seaweedfs/seaweedfs/docker/filer.toml
          target: /etc/seaweedfs/filer.toml
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/seaweedfs
          target: /opt/docker/sbom/seaweedfs
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /data
paths:
  - type: directory
    path: /data/filerldb2
    uid: 65532
    gid: 65532
  - type: directory
    path: /etc/seadweedfs
    uid: 65532
    gid: 65532
annotations:
  org.opencontainers.image.description: A minimal SeaweedFS image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/weed
ports:
  - 7333/tcp
  - 8080/tcp
  - 8333/tcp
  - 8888/tcp
  - 9333/tcp
  - 18080/tcp
  - 18888/tcp
  - 19333/tcp
