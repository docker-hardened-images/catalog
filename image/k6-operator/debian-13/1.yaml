# syntax=dhi.io/build:2-debian13

name: Grafana k6-operator 1.x
image: dhi.io/k6-operator
variant: runtime
tags:
  - "1"
  - "1.4"
  - 1.4.0
  - 1-debian
  - 1-debian13
  - 1.4-debian
  - 1.4-debian13
  - 1.4.0-debian
  - 1.4.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: eba3637e82f06800eac750ec81817d5660be1dfa
  SEMVER_MAJOR_MINOR_VERSION: "1.4"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.4.0
  VERSION: 1.4.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: k6-operator
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - make
          - mawk
          - sed
        files:
          - url: git+https://github.com/grafana/k6-operator.git#v1.4.0
            checksum: eba3637e82f06800eac750ec81817d5660be1dfa
            path: /go/src/github.com/grafana/k6-operator
            spdx:
              name: k6-operator
              version: 1.4.0
              packages:
                - name: k6-operator
                  purl: pkg:golang/github.com/grafana/k6-operator@1.4.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/grafana/k6-operator
          with:
            deps:
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            download: true
        - name: test
          work-dir: /go/src/github.com/grafana/k6-operator
          privileged: true
          runs: |
            set -eux -o pipefail

            make test
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/grafana/k6-operator
          with:
            output: ${target.dir}/usr/local/bin/manager
            packages: ./cmd
      outputs:
        - source: ${target.dir}/usr/local/bin/manager
          target: /usr/local/bin/manager
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/k6-operator
          target: /opt/docker/sbom/k6-operator
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /manager
    uid: 0
    gid: 0
    source: /usr/local/bin/manager
annotations:
  org.opencontainers.image.description: A minimal Grafana k6-operator image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/manager
