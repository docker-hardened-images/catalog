  builds:
    - name: agentgateway-ui
      uses: dhi.io/node:24.14.0-debian13-dev
      work-dir: ${source.dir}/agentgateway/ui
      contents:
        files:
          - url: git+https://github.com/agentgateway/agentgateway.git#v1.2.1
            checksum: 6a2d02dbb35a289738d0fdba88e5a474e432a72a
            path: ${source.dir}/agentgateway
            uid: 0
            gid: 0
      pipeline:
        - name: build ui
          runs: |
            set -eux -o pipefail

            npm install
            npm run build
      outputs:
        - source: ${source.dir}/agentgateway/ui/out
          target: /ui/out
          uid: 0
          gid: 0
    - name: agentgateway
      uses: dhi.io/rust:1.95.0-debian13-dev@sha256:1e64686b22eb66e73775d799a68b9e647267d93b9966b969216448da6b9620e1
      contents:
        packages:
