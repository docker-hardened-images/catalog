  NODE_REFERENCE: dhi/node:22.22.1-alpine3.23-dev@sha256:placeholder
  SEMVER_MAJOR_MINOR_VERSION: "1.2"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.2.1
  VERSION: 1.2.1
contents:
  packages:
    - alpine-baselayout-data
    - ca-certificates-bundle
  builds:
    - name: agentgateway-ui
      uses: dhi.io/node:22.22.1-alpine3.23-dev
      work-dir: ${source.dir}/agentgateway/ui
      contents:
        files:
          - url: git+https://github.com/agentgateway/agentgateway.git#v1.2.1
            checksum: 6a2d02dbb35a289738d0fdba88e5a474e432a72a
            path: ${source.dir}/agentgateway
            uid: 0
            gid: 0
      pipeline:
        - name: build ui
          runs: |
            set -eux -o pipefail

            npm install
            npm run build
      outputs:
        - source: ${source.dir}/agentgateway/ui/out
          target: /ui/out
          uid: 0
          gid: 0
    - name: agentgateway
      uses: dhi.io/rust:1.95.0-alpine3.23-dev
      contents:
        packages:
          - build-essential
          - pkg-config
          - libssl-dev
          - ca-certificates-bundle
        files:
          - url: git+https://github.com/agentgateway/agentgateway.git#v1.2.1
            checksum: 6a2d02dbb35a289738d0fdba88e5a474e432a72a
            path: ${source.dir}/agentgateway
            spdx:
              name: agentgateway
              version: 1.2.1
              packages:
                - name: agentgateway
                  purl: pkg:cargo/agentgateway@1.2.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build
          work-dir: ${source.dir}/agentgateway
          privileged: true
          runs: |
            set -eux -o pipefail

            # Copy pre-built UI assets
            cp -r /ui/out ui/out

            export VERSION="${vars.VERSION}"
            export GIT_REVISION="${vars.COMMIT_SHA}"

            cargo build --release --no-default-features --features "agentgateway/ui,agentgateway-app/glibc"

            install -D target/release/agentgateway \
              '${target.dir}/app/agentgateway'
      outputs:
        - source: ${target.dir}/app/agentgateway
          target: /app/agentgateway
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/agentgateway
          target: /opt/docker/sbom/agentgateway
