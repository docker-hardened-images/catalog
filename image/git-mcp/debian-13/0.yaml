# syntax=dhi.io/build:2-debian13

name: Git MCP Server 2026.x
image: dhi.io/git-mcp
variant: runtime
tags:
  - "2026"
  - "2026.6"
  - latest
  - 2026.6.16
  - 2026-debian
  - 2026-debian13
  - 2026.6-debian
  - 2026.6-debian13
  - 2026.6.16-debian
  - 2026.6.16-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  COMMIT_SHA: 2182f5959fcea9fe8f033708242919a18a14d113
  SEMVER_MAJOR_MINOR_VERSION: "2026.6"
  SEMVER_MAJOR_VERSION: "2026"
  SEMVER_VERSION: 2026.6.16
  UV_VERSION: 0.11.26
  VERSION: 2026.6.16
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - git
    - libstdc++6
    - python-3.14
    - python-3.14-dev
    - python3-pip
    - python3-setuptools
    - python3-wheel
  builds:
    - name: git-mcp
      environment:
        UV_COMPILE_BYTECODE: "1"
      contents:
        packages:
          - gzip
          - tar
          - python-3.14
          - python-3.14-dev
          - python3-pip
          - python3-setuptools
          - python3-wheel
          - libstdc++6
          - bash
          - coreutils
          - diffutils
          - findutils
          - gawk
          - grep
          - sed
          - sfw-free-pip
          - sfw-free-oci-config
        files:
          - url: https://github.com/astral-sh/uv/releases/download/0.11.26/uv-${ARCH}-unknown-linux-gnu.tar.gz
            path: ${source.dir}/uv-unknown-linux-gnu.tar.gz
            uid: 0
            gid: 0
          - url: git+https://github.com/modelcontextprotocol/servers.git#2026.6.16
            checksum: 2182f5959fcea9fe8f033708242919a18a14d113
            path: ${source.dir}/servers
            spdx:
              name: git-mcp
              version: 2026.6.16
              packages:
                - name: git-mcp
                  purl: pkg:dhi/git-mcp@2026.6.16
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: setup uv
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            tar -xzf "${source.dir}/uv-unknown-linux-gnu.tar.gz" -C /usr/local/bin --strip-components=1
            chmod +x /usr/local/bin/uv
        - name: patch dependencies for CVE fixes
          runs: |
            set -eux -o pipefail

            # starlette is a transitive dep from mcp/uvicorn, explicitly stating it will bump it to the desired version
            # CVE-2026-54283
            sed -i '/^dependencies = \[/a"starlette>=1.3.1",' "${source.dir}/servers/src/git/pyproject.toml"

            # pydantic-settings is a transitive dep from mcp, explicitly stating it will bump it to the desired version
            # GHSA-4xgf-cpjx-pc3j
            sed -i '/^dependencies = \[/a"pydantic-settings>=2.14.2",' "${source.dir}/servers/src/git/pyproject.toml"
        - name: move to /app
          runs: |
            set -eux -o pipefail

            cp -r "${source.dir}/servers/src/git" /app
        - name: align pyproject version with monorepo tag
          work-dir: /app
          runs: |
            set -eux -o pipefail

            sed -i 's/^version = ".*"/version = "2026.6.16"/' pyproject.toml
            grep -E '^version = ' pyproject.toml
        - name: build python package
          work-dir: /app
          privileged: true
          runs: |
            set -eux -o pipefail

            rm .python-version

            sfw uv lock --upgrade
            sfw uv sync --locked --no-install-project --no-dev --no-editable
            sfw uv sync --locked --no-dev --no-editable
      outputs:
        - source: /app/.venv
          target: /app/.venv
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/git-mcp
          target: /opt/docker/sbom/git-mcp
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  PATH: /app/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: file
    path: /home/nonroot/.gitconfig
    content: |
      [safe]
          directory = *
    uid: 65532
    gid: 65532
    mode: "0644"
  - type: file
    path: /root/.gitconfig
    content: |
      [safe]
          directory = *
    uid: 0
    gid: 0
    mode: "0644"
annotations:
  org.opencontainers.image.description: Git MCP Server
  org.opencontainers.image.licenses: MIT
labels:
  io.modelcontextprotocol.server.name: io.github.modelcontextprotocol/server-git
entrypoint:
  - mcp-server-git
