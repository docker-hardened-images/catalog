# syntax=dhi.io/build:2-debian13

name: Git MCP Server 2026.x
image: dhi.io/git-mcp
variant: runtime
tags:
  - "2026"
  - "2026.1"
  - latest
  - 2026.1.14
  - 2026-debian13
  - 2026.1-debian13
  - 2026.1.14-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  COMMIT_SHA: 3e805376da81c063c2798410906b5fd134334a43
  PYTHON_DEV_REFERENCE: dhi/python:3.14.3-debian13-sfw-dev@sha256:9002ebcffc235f9c4c195750652c414bdee18a3375ae9dfd2bc5b8223192259a
  PYTHON_REFERENCE: dhi/python:3.14.3-debian13@sha256:e9a0e8e8462ff6d260b761648199226ccdbbb9fbbe55e354264f871fb25fa270
  SEMVER_MAJOR_MINOR_VERSION: "2026.1"
  SEMVER_MAJOR_VERSION: "2026"
  SEMVER_VERSION: 2026.1.14
  UV_VERSION: 0.11.1
  VERSION: 2026.1.14
contents:
  packages:
    - base-files
    - git
  builds:
    - name: git-mcp
      uses: dhi.io/python:3.14.3-debian13-sfw-dev@sha256:9002ebcffc235f9c4c195750652c414bdee18a3375ae9dfd2bc5b8223192259a
      environment:
        UV_COMPILE_BYTECODE: "1"
      contents:
        packages:
          - gzip
          - tar
        files:
          - url: https://github.com/astral-sh/uv/releases/download/0.11.1/uv-${ARCH}-unknown-linux-gnu.tar.gz
            path: ${source.dir}/uv-unknown-linux-gnu.tar.gz
            uid: 0
            gid: 0
          - url: git+https://github.com/modelcontextprotocol/servers.git#2026.1.14
            checksum: 3e805376da81c063c2798410906b5fd134334a43
            path: ${source.dir}/servers
            spdx:
              name: git-mcp
              version: 2026.1.14
              packages:
                - name: git-mcp
                  purl: pkg:dhi/git-mcp@2026.1.14
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: setup uv
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            tar -xzf "${source.dir}/uv-unknown-linux-gnu.tar.gz" -C /usr/local/bin --strip-components=1
            chmod +x /usr/local/bin/uv
        - name: move to /app
          runs: |
            set -eux -o pipefail

            cp -r "${source.dir}/servers/src/git" /app
        - name: build python package
          work-dir: /app
          privileged: true
          runs: |
            set -eux -o pipefail

            rm .python-version

            sfw uv lock --upgrade
            sfw uv sync --locked --no-install-project --no-dev --no-editable
            sfw uv sync --locked --no-dev --no-editable
      outputs:
        - source: /app/.venv
          target: /app/.venv
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/git-mcp
          target: /opt/docker/sbom/git-mcp
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.14.3-debian13@sha256:e9a0e8e8462ff6d260b761648199226ccdbbb9fbbe55e354264f871fb25fa270
      excludes:
        - etc/group
        - etc/passwd
        - etc/shadow
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  PATH: /app/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: file
    path: /home/nonroot/.gitconfig
    content: |
      [safe]
          directory = *
    uid: 65532
    gid: 65532
    mode: "0644"
  - type: file
    path: /root/.gitconfig
    content: |
      [safe]
          directory = *
    uid: 0
    gid: 0
    mode: "0644"
annotations:
  org.opencontainers.image.description: Git MCP Server
  org.opencontainers.image.licenses: MIT
labels:
  io.modelcontextprotocol.server.name: io.github.modelcontextprotocol/server-git
entrypoint:
  - mcp-server-git
