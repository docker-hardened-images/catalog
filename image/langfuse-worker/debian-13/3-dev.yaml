# syntax=dhi.io/build:2-debian13

name: Langfuse Worker 3.x (dev)
image: dhi.io/langfuse-worker
variant: dev
tags:
  - 3-dev
  - 3.187-dev
  - 3.187.0-dev
  - 3-debian-dev
  - 3-debian13-dev
  - 3.187-debian-dev
  - 3.187-debian13-dev
  - 3.187.0-debian-dev
  - 3.187.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2024-12-09"
vars:
  NODEJS_MAJOR: "24"
  NODEJS_VERSION: 24.16.0-0
  SEMVER_MAJOR_MINOR_VERSION: "3.187"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.187.0
  VERSION: 3.187.0-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - dash
    - diffutils
    - dpkg
    - dumb-init
    - findutils
    - grep
    - langfuse-worker-3=3.187.0-1
    - libc-bin
    - libssl3t64
    - libstdc++6
    - libzstd1
    - mawk
    - nodejs-24=24.16.0-0
    - perl-base
    - sed
    - tzdata
    - util-linux
    - zlib1g
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  DEBIAN_FRONTEND: noninteractive
  NODE_ENV: production
  PORT: "3030"
paths:
  - type: directory
    path: /app
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: symlink
    path: /app/worker
    uid: 0
    gid: 0
    source: /usr/lib/nodejs/langfuse-worker
annotations:
  org.opencontainers.image.description: A minimal Langfuse worker image
  org.opencontainers.image.licenses: MIT AND LicenseRef-Langfuse-EE
entrypoint:
  - dumb-init
  - --
  - /app/worker/entrypoint.sh
cmd:
  - node
  - worker/dist/index.js
ports:
  - 3030/tcp
