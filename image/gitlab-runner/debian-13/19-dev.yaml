    - mawk
    - openssh-client
    - perl-base
    - sed
    - util-linux
  builds:
    - name: gitlab-runner
      work-dir: /go/src/gitlab.com/gitlab-org/gitlab-runner
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://gitlab.com/gitlab-org/gitlab-runner.git#v19.1.1
            checksum: 24b9b726e614dab77eee89b001745cf9f890e0ce
            path: /go/src/gitlab.com/gitlab-org/gitlab-runner
            spdx:
              name: gitlab-runner
              version: 19.1.1
              packages:
                - name: gitlab-runner
                  purl: pkg:golang/gitlab.com/gitlab-org/gitlab-runner@19.1.1
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (19 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/sys@v0.45.0
              - golang.org/x/net@v0.55.0
              - github.com/Azure/go-ntlmssp@v0.1.1
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/go-git/go-billy/v5@v5.9.0
              - github.com/go-git/go-git/v5@v5.19.1
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/moby/spdystream@v0.5.1
        - name: test after bump
          privileged: true
          runs: |
            set -eux -o pipefail

            # compile-check all test binaries; many gitlab-runner tests require CI
            # infrastructure (mocks, env vars, executors) not available in BuildKit
            CGO_ENABLED=0 go test -run='^$' ./...
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X gitlab.com/gitlab-org/gitlab-runner/common.NAME=gitlab-runner
              - -X gitlab.com/gitlab-org/gitlab-runner/common.VERSION=19.1.1
              - -w
            output: ${target.dir}/usr/local/bin/gitlab-runner
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin/gitlab-runner
          target: /usr/local/bin/gitlab-runner
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/gitlab-runner
          target: /opt/docker/sbom/gitlab-runner
          uid: 0
          gid: 0
    - name: docker-machine
      work-dir: /go/src/github.com/docker/machine
      caches:
