        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://gitlab.com/gitlab-org/ci-cd/docker-machine.git#v0.16.2-gitlab.46
            checksum: 497fb7cdce6c5129fce8117f0591c3a36fe4cf88
            path: /go/src/github.com/docker/machine
            spdx:
              name: docker-machine
              version: 0.16.2-gitlab.46
              packages:
                - name: docker-machine
                  purl: pkg:golang/github.com/docker/machine@0.16.2-gitlab.46
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
