# syntax=dhi.io/build:2-debian13

name: GitLab Runner 18.x (dev)
image: dhi.io/gitlab-runner
variant: dev
tags:
  - 18-dev
  - 18.11-dev
  - 18.11.3-dev
  - 18-debian13-dev
  - 18.11-debian13-dev
  - 18.11.3-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-16"
  end-of-life: "2026-07-16"
vars:
  COMMIT_SHA: ad1797b33167da20f3d158339e0081c0fa9c4dab
  DOCKER_MACHINE_COMMIT_SHA: 497fb7cdce6c5129fce8117f0591c3a36fe4cf88
  DOCKER_MACHINE_VERSION: 0.16.2-gitlab.46
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:5d1f9634fc21d351b8712212864d435bfe4204eca3d60b61cc7cfd491d776357
  SEMVER_MAJOR_MINOR_VERSION: "18.11"
  SEMVER_MAJOR_VERSION: "18"
  SEMVER_VERSION: 18.11.3
  VERSION: 18.11.3
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - git
    - grep
    - hostname
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: gitlab-runner
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:5d1f9634fc21d351b8712212864d435bfe4204eca3d60b61cc7cfd491d776357
      work-dir: /go/src/gitlab.com/gitlab-org/gitlab-runner
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://gitlab.com/gitlab-org/gitlab-runner.git#v18.11.3
            checksum: ad1797b33167da20f3d158339e0081c0fa9c4dab
            path: /go/src/gitlab.com/gitlab-org/gitlab-runner
            spdx:
              name: gitlab-runner
              version: 18.11.3
              packages:
                - name: gitlab-runner
                  purl: pkg:golang/gitlab.com/gitlab-org/gitlab-runner@18.11.3
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (18 only)
          uses: go/bump@v2
          with:
            deps:
              - github.com/Azure/go-ntlmssp@v0.1.1
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/buger/jsonparser@v1.1.2
              - github.com/go-git/go-git/v5@v5.19.1
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
        - name: test after bump
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            # compile-check all test binaries; many gitlab-runner tests require CI
            # infrastructure (mocks, env vars, executors) not available in BuildKit
            CGO_ENABLED=0 go test -run='^$' ./...
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X gitlab.com/gitlab-org/gitlab-runner/common.NAME=gitlab-runner
              - -X gitlab.com/gitlab-org/gitlab-runner/common.VERSION=18.11.3
              - -w
            output: ${target.dir}/usr/local/bin/gitlab-runner
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin/gitlab-runner
          target: /usr/local/bin/gitlab-runner
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/gitlab-runner
          target: /opt/docker/sbom/gitlab-runner
          uid: 0
          gid: 0
    - name: docker-machine
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:5d1f9634fc21d351b8712212864d435bfe4204eca3d60b61cc7cfd491d776357
      work-dir: /go/src/github.com/docker/machine
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://gitlab.com/gitlab-org/ci-cd/docker-machine.git#v0.16.2-gitlab.46
            checksum: 497fb7cdce6c5129fce8117f0591c3a36fe4cf88
            path: /go/src/github.com/docker/machine
            spdx:
              name: docker-machine
              version: 0.16.2-gitlab.46
              packages:
                - name: docker-machine
                  purl: pkg:golang/github.com/docker/machine@0.16.2-gitlab.46
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - go.opentelemetry.io/otel@v1.41.0
              - google.golang.org/grpc@v1.79.3
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/docker/machine/version.GitCommit=497fb7cdce6c5129fce8117f0591c3a36fe4cf88
              - -w
            output: ${target.dir}/usr/local/bin/docker-machine
            packages: ./cmd/docker-machine
            tags:
              - static_build
              - netgo
      outputs:
        - source: ${target.dir}/usr/local/bin/docker-machine
          target: /usr/local/bin/docker-machine
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/docker-machine
          target: /opt/docker/sbom/docker-machine
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
stop-signal: SIGQUIT
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /etc/gitlab-runner
    uid: 65532
    gid: 65532
    mode: "0770"
  - type: directory
    path: /home/gitlab-runner
    uid: 65532
    gid: 65532
    mode: "0770"
  - type: symlink
    path: /usr/bin/gitlab-runner
    uid: 0
    gid: 0
    source: /usr/local/bin/gitlab-runner
annotations:
  org.opencontainers.image.description: A minimal GitLab Runner image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - gitlab-runner
cmd:
  - run
  - --working-directory=/home/gitlab-runner
  - --config=/etc/gitlab-runner/config.toml
