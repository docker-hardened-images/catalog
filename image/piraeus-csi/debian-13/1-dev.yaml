# syntax=dhi.io/build:2-debian13

name: Piraeus CSI 1.11.x (dev)
image: dhi.io/piraeus-csi
variant: dev
tags:
  - 1-dev
  - 1.11-dev
  - 1.11.2-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.11-debian-dev
  - 1.11-debian13-dev
  - 1.11.2-debian-dev
  - 1.11.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "amd64" : "arm64" }'
  COMMIT_SHA: 2327edf58f0a9cd0c1c52dd9f8442e5b074a1313
  LINSTOR_WAIT_UNTIL_COMMIT_SHA: ff24035aa7486a36123a58dbdb7566b5dbca99f8
  LINSTOR_WAIT_UNTIL_VERSION: v0.3.3
  SEMVER_MAJOR_MINOR_VERSION: "1.11"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.11.2
  VERSION: 1.11.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - curl
    - diffutils
    - dpkg
    - e2fsprogs
    - findutils
    - grep
    - libc-bin
    - libncursesw6
    - libtinfo6
    - mawk
    - mount
    - nfs-common
    - perl-base
    - sed
    - tzdata
    - util-linux
    - xfsprogs
  builds:
    - name: piraeus-csi
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
        files:
          - url: git+https://github.com/piraeusdatastore/linstor-csi.git#v1.11.2
            checksum: 2327edf58f0a9cd0c1c52dd9f8442e5b074a1313
            path: /go/src/github.com/piraeusdatastore/linstor-csi
            spdx:
              name: piraeus-csi
              version: 1.11.2
              packages:
                - name: piraeus-csi
                  purl: pkg:golang/github.com/piraeusdatastore/linstor-csi@1.11.2
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: git+https://github.com/LINBIT/linstor-wait-until.git#v0.3.3
            checksum: ff24035aa7486a36123a58dbdb7566b5dbca99f8
            path: /go/src/github.com/LINBIT/linstor-wait-until
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/piraeusdatastore/linstor-csi
          with:
            deps:
              - golang.org/x/sys@v0.44.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          work-dir: /go/src/github.com/piraeusdatastore/linstor-csi
          privileged: true
          runs: |
            set -eux -o pipefail

            # pkg/driver runs CSI sanity tests that need a live driver socket; skip during image build.
            CGO_ENABLED=0 go test $(go list ./... | grep -v '/pkg/driver$')
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/piraeusdatastore/linstor-csi
          with:
            ldflags:
              - -X github.com/piraeusdatastore/linstor-csi/pkg/driver.Version=1.11.2
            output: ${target.dir}/usr/local/bin/linstor-csi
            packages: ./cmd/linstor-csi/linstor-csi.go
        - name: build-linstor-wait-until
          uses: go/build@v1
          work-dir: /go/src/github.com/LINBIT/linstor-wait-until
          with:
            output: ${target.dir}/usr/local/bin/linstor-wait-until
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin/linstor-csi
          target: /usr/local/bin/linstor-csi
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/linstor-wait-until
          target: /usr/local/bin/linstor-wait-until
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/piraeus-csi
          target: /opt/docker/sbom/piraeus-csi
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /etc/mtab
    uid: 0
    gid: 0
    source: /proc/mounts
  - type: symlink
    path: /linstor-csi
    uid: 0
    gid: 0
    source: /usr/local/bin/linstor-csi
  - type: symlink
    path: /linstor-wait-until
    uid: 0
    gid: 0
    source: /usr/local/bin/linstor-wait-until
annotations:
  org.opencontainers.image.description: CSI (Container Storage Interface) driver for LINSTOR/Piraeus that enables Kubernetes to provision persistent volumes using LINSTOR storage.
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /linstor-csi
