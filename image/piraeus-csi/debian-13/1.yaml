# syntax=dhi.io/build:2-debian13

name: Piraeus CSI 1.11.x
image: dhi.io/piraeus-csi
variant: runtime
tags:
  - "1"
  - "1.11"
  - 1.11.2
  - 1-debian
  - 1-debian13
  - 1.11-debian
  - 1.11-debian13
  - 1.11.2-debian
  - 1.11.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  FLAVORED_SUFFIX: ""
  LINSTOR_WAIT_UNTIL_COMMIT_SHA: ff24035aa7486a36123a58dbdb7566b5dbca99f8
  LINSTOR_WAIT_UNTIL_VERSION: v0.3.3
  SEMVER_MAJOR_MINOR_VERSION: "1.11"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.11.2
  SUFFIX: ""
  VERSION: 1.11.2-2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libpython3-stdlib'
    - '!libpython3.13-minimal'
    - '!libpython3.13-stdlib'
    - '!python3'
    - '!python3-dbus'
    - '!python3-minimal'
    - '!python3.13'
    - '!python3.13-minimal'
    - base-files
    - ca-certificates-bundle
    - e2fsprogs
    - linstor-csi=1.11.2-2
    - mount
    - nfs-common
    - tzdata
    - util-linux
    - xfsprogs
  builds:
    - name: linstor-wait-until
      work-dir: /go/src/github.com/LINBIT/linstor-wait-until
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
        files:
          - url: git+https://github.com/LINBIT/linstor-wait-until.git#v0.3.3
            checksum: ff24035aa7486a36123a58dbdb7566b5dbca99f8
            path: /go/src/github.com/LINBIT/linstor-wait-until
            spdx:
              name: linstor-wait-until
              version: v0.3.3
              packages:
                - name: linstor-wait-until
                  purl: pkg:golang/github.com/LINBIT/linstor-wait-until@v0.3.3
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/sys@v0.44.0
            download: true
        - name: build-linstor-wait-until
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/linstor-wait-until
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin/linstor-wait-until
          target: /usr/local/bin/linstor-wait-until
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/linstor-wait-until
          target: /opt/docker/sbom/linstor-wait-until
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /etc/mtab
    uid: 0
    gid: 0
    source: /proc/mounts
  - type: symlink
    path: /linstor-csi
    uid: 0
    gid: 0
    source: /usr/bin/linstor-csi
  - type: symlink
    path: /linstor-wait-until
    uid: 0
    gid: 0
    source: /usr/local/bin/linstor-wait-until
annotations:
  org.opencontainers.image.description: CSI (Container Storage Interface) driver for LINSTOR/Piraeus that enables Kubernetes to provision persistent volumes using LINSTOR storage.
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /linstor-csi
