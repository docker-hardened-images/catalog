# syntax=dhi.io/build:2-debian13

name: Grafana Alloy 1.x (dev)
image: dhi.io/alloy
variant: dev
tags:
  - 1-dev
  - 1.14-dev
  - 1.14.1-dev
  - 1-debian13-dev
  - 1.14-debian13-dev
  - 1.14.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
  COMMIT_SHA: fea47a9a98414bbb5603053b906c71152c30c192
  GOLANG_REFERENCE: dhi/golang:1.25.8-debian13-dev@sha256:b2c03c829a4df4f724712501d18321e46a2ac770377f0b6e2f383bc9d02b99d3
  NODE_REFERENCE: dhi/pkg-node:24.14.0-debian13@sha256:7347125e76fe38994778a4d5c667ec6702bb7781462ce9806bd5300176806b5f
  SEMVER_MAJOR_MINOR_VERSION: "1.14"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.14.1
  VERSION: 1.14.1
contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libc6'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libsystemd0
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: alloy
      uses: dhi.io/golang:1.25.8-debian13-dev@sha256:b2c03c829a4df4f724712501d18321e46a2ac770377f0b6e2f383bc9d02b99d3
      contents:
        packages:
          - libsystemd-dev
        files:
          - url: git+https://github.com/grafana/alloy.git#v1.14.1
            checksum: fea47a9a98414bbb5603053b906c71152c30c192
            path: /go/src/github.com/grafana/alloy
            spdx:
              name: alloy
              version: 1.14.1
              packages:
                - name: alloy
                  purl: pkg:golang/github.com/grafana/alloy@1.14.1
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/pkg-node:24.14.0-debian13@sha256:7347125e76fe38994778a4d5c667ec6702bb7781462ce9806bd5300176806b5f
            includes:
              - opt/nodejs
              - opt/npm
              - usr/local/bin/node
              - usr/local/bin/npm
            uid: 0
            gid: 0
      pipeline:
        - name: bump ui dependencies
          uses: npm/bump@v1
          work-dir: /go/src/github.com/grafana/alloy/internal/web/ui
          privileged: true
          with:
            bumps: ${source.dir}/patch/npm-bumps.json
            npm-root: /go/src/github.com/grafana/alloy/internal/web/ui
        - name: build ui
          work-dir: /go/src/github.com/grafana/alloy/internal/web/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            npm install
            npm run build
        - name: fix semconv schema URL for otel SDK v1.40.0
          work-dir: /go/src/github.com/grafana/alloy
          runs: |
            set -eux -o pipefail

            # Update semconv import to match otel SDK v1.40.0 (uses semconv v1.39.0)
            sed -i.bak -e 's|semconv "go.opentelemetry.io/otel/semconv/v1.26.0"|semconv "go.opentelemetry.io/otel/semconv/v1.39.0"|' \
              -e 's|semconv "go.opentelemetry.io/otel/semconv/v1.37.0"|semconv "go.opentelemetry.io/otel/semconv/v1.39.0"|' \
              internal/runtime/tracing/tracing.go
            rm -f internal/runtime/tracing/tracing.go.bak

            # Verify the change was applied
            if ! grep -q 'semconv "go.opentelemetry.io/otel/semconv/v1.39.0"' internal/runtime/tracing/tracing.go; then
              echo "ERROR: Failed to update semconv import" >&2
              exit 1
            fi
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/grafana/alloy/collector
          environment:
            GODEBUG: fips140=on
          with:
            deps:
              - github.com/antchfx/xpath@v1.3.6
              - github.com/buger/jsonparser@v1.1.2
              - github.com/cloudflare/circl@v1.6.3
              - github.com/mholt/archives@v0.1.5
              - go.opentelemetry.io/otel/sdk@v1.40.0
              - golang.org/x/net@v0.51.0
              - github.com/burningalchemist/sql_exporter@v0.0.0-20240708200932-cb883e06441c
              - google.golang.org/grpc@v1.79.3
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/go-git/go-git/v5@v5.17.1
            download: true
        - name: fix sql_exporter NewTarget call for v0.15.0 API
          uses: git/patch@v1
          work-dir: /go/src/github.com/grafana/alloy
          with:
            patch: /src/patch/fix-sql-exporter-newtarget.patch
        - name: test
          work-dir: /go/src/github.com/grafana/alloy/collector
          runs: |
            set -eux -o pipefail

            go test -v -count=1 ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/grafana/alloy/collector
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -X github.com/grafana/alloy/internal/build.Version=1.14.1
              - -X github.com/grafana/alloy/syntax/internal/stdlib.Version=1.14.1
              - -X github.com/grafana/alloy/internal/build.Revision=fea47a9a98414bbb5603053b906c71152c30c192
              - -X github.com/grafana/alloy/internal/build.Branch=dhi
              - -X github.com/grafana/alloy/internal/build.BuildUser=dhi
              - -X github.com/grafana/alloy/internal/build.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
            output: ${target.dir}/usr/local/bin/alloy
            tags:
              - netgo
              - embedalloyui
              - promtail_journal_enabled
              - pyroscope_ebpf
        - name: install production ui deps for sbom
          work-dir: /go/src/github.com/grafana/alloy/internal/web/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            rm -rf node_modules
            npm install --omit=dev --ignore-scripts
        - name: ui sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: alloy-ui
            source: /go/src/github.com/grafana/alloy/internal/web/ui
      paths:
        - type: file
          path: /go/src/patch/fix-semconv-schema-url.patch
          uid: 0
          gid: 0
          source: image/alloy/patch/fix-semconv-schema-url.patch
        - type: file
          path: /src/patch/fix-sql-exporter-newtarget.patch
          uid: 0
          gid: 0
          source: image/alloy/patch/fix-sql-exporter-newtarget.patch
        - type: file
          path: ${source.dir}/patch/npm-bumps.json
          uid: 0
          gid: 0
          source: image/alloy/patch/npm-bumps.json
      outputs:
        - source: /go/src/github.com/grafana/alloy/example-config.alloy
          target: /etc/alloy/config.alloy
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/alloy-ui
          target: /opt/docker/sbom/alloy-ui
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/alloy
          target: /usr/local/bin/alloy
          uid: 0
          gid: 0
          mode: "0755"
  artifacts:
    - name: dhi.io/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
