# syntax=dhi.io/build:2-debian13

name: Grafana Alloy 1.x (dev)
image: dhi.io/alloy
variant: dev
tags:
  - 1-dev
  - 1.16-dev
  - 1.16.2-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.16-debian-dev
  - 1.16-debian13-dev
  - 1.16.2-debian-dev
  - 1.16.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 401dc6b25cd2cfaa88669f2b0f642d5aa1e3c96c
  NODE_REFERENCE: dhi/pkg-node:24.16.0-debian13@sha256:495eebfb2f2d6b180d1eb8240dc981c14b7b02a7d23fe7a5b9ba86184a4d8e8d
  SEMVER_MAJOR_MINOR_VERSION: "1.16"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.16.2
  VERSION: 1.16.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libc6
    - libsystemd0
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: alloy
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - libsystemd-dev
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
        files:
          - url: git+https://github.com/grafana/alloy.git#v1.16.2
            checksum: 401dc6b25cd2cfaa88669f2b0f642d5aa1e3c96c
            path: /go/src/github.com/grafana/alloy
            spdx:
              name: alloy
              version: 1.16.2
              packages:
                - name: alloy
                  purl: pkg:golang/github.com/grafana/alloy@1.16.2
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/pkg-node:24.16.0-debian13@sha256:495eebfb2f2d6b180d1eb8240dc981c14b7b02a7d23fe7a5b9ba86184a4d8e8d
            includes:
              - opt/nodejs
              - opt/npm
              - usr/local/bin/node
              - usr/local/bin/npm
            uid: 0
            gid: 0
      pipeline:
        - name: bump ui dependencies
          uses: npm/bump@v1
          work-dir: /go/src/github.com/grafana/alloy/internal/web/ui
          privileged: true
          with:
            bumps: ${source.dir}/patch/npm-bumps.json
            npm-root: /go/src/github.com/grafana/alloy/internal/web/ui
        - name: build ui
          work-dir: /go/src/github.com/grafana/alloy/internal/web/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            npm install
            npm run build
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/grafana/alloy/collector
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/aws/aws-sdk-go-v2/service/cloudwatchlogs@v1.65.0
              - github.com/burningalchemist/sql_exporter@v0.0.0-20240708200932-cb883e06441c
              - github.com/go-git/go-git/v5@v5.19.1
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            download: true
        - name: cap otel sdk to schema 1.40.0
          uses: go/bump@v1
          work-dir: /go/src/github.com/grafana/alloy/collector
          with:
            deps:
              - go.opentelemetry.io/otel/sdk@v1.43.0
            downgrade: true
            download: true
        - name: fix sql_exporter NewTarget call for v0.15.0 API
          uses: git/patch@v1
          work-dir: /go/src/github.com/grafana/alloy
          with:
            patch: /src/patch/fix-sql-exporter-newtarget.patch
        - name: test
          work-dir: /go/src/github.com/grafana/alloy/collector
          runs: |
            set -eux -o pipefail

            go test -v -count=1 ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/grafana/alloy/collector
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -X github.com/grafana/alloy/internal/build.Version=1.16.2
              - -X github.com/grafana/alloy/syntax/internal/stdlib.Version=1.16.2
              - -X github.com/grafana/alloy/internal/build.Revision=401dc6b25cd2cfaa88669f2b0f642d5aa1e3c96c
              - -X github.com/grafana/alloy/internal/build.Branch=dhi
              - -X github.com/grafana/alloy/internal/build.BuildUser=dhi
              - -X github.com/grafana/alloy/internal/build.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
            output: ${target.dir}/usr/local/bin/alloy
            tags:
              - netgo
              - embedalloyui
              - promtail_journal_enabled
              - pyroscope_ebpf
        - name: install production ui deps for sbom
          work-dir: /go/src/github.com/grafana/alloy/internal/web/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            rm -rf node_modules
            npm install --omit=dev --ignore-scripts
        - name: ui sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: alloy-ui
            source: /go/src/github.com/grafana/alloy/internal/web/ui
      paths:
        - type: file
          path: /src/patch/fix-sql-exporter-newtarget.patch
          uid: 0
          gid: 0
          source: image/alloy/patch/fix-sql-exporter-newtarget.patch
        - type: file
          path: ${source.dir}/patch/npm-bumps.json
          uid: 0
          gid: 0
          source: image/alloy/patch/npm-bumps.json
      outputs:
        - source: /go/src/github.com/grafana/alloy/example-config.alloy
          target: /etc/alloy/config.alloy
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/alloy-ui
          target: /opt/docker/sbom/alloy-ui
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/alloy
          target: /usr/local/bin/alloy
          uid: 0
          gid: 0
          mode: "0755"
accounts:
  root: true
  run-as: root
  users:
    - name: alloy
      uid: 473
      gid: 473
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: alloy
      gid: 473
      members:
        - alloy
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  ALLOY_DEPLOY_MODE: docker
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /var/lib/alloy
    uid: 473
    gid: 473
    mode: "0770"
  - type: directory
    path: /var/lib/alloy/data
    uid: 473
    gid: 473
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal Grafana Alloy image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/alloy
cmd:
  - run
  - /etc/alloy/config.alloy
  - --storage.path=/var/lib/alloy/data
ports:
  - 12345/tcp
