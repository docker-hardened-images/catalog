# syntax=dhi.io/build:2-debian13

name: Grafana Alloy 1.x
image: dhi.io/alloy
variant: runtime
tags:
  - "1"
  - "1.14"
  - 1.14.0
  - 1-debian13
  - 1.14-debian13
  - 1.14.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BASE_DIGEST: sha256:d46a757d9ec2c6f6d9b7c4cdcfdb9bc65c9614c53ee28e0f489ed844fd2b79c8
  BASE_TAG: 20250419-glibc-debian13
  COMMIT_SHA: 9c463f233171efef2ddd5f272f09a7adac4078fe
  GOLANG_REFERENCE: dhi/golang:1.25.8-debian13-dev@sha256:cebfb9f36d5446cbbde91df615209668fe656e6276f5a7a0b3472bf102fba3c3
  NODE_REFERENCE: dhi/pkg-node:24.14.0-debian13@sha256:15c5bca4a1190d0060b81b6a955aa270b2e180d776936e85d42c60ffbd785b2b
  SEMVER_MAJOR_MINOR_VERSION: "1.14"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.14.0
  VERSION: 1.14.0
contents:
  packages:
    - '!base-files'
    - '!libc6'
    - libsystemd0
  builds:
    - name: alloy
      uses: dhi.io/golang:1.25.8-debian13-dev@sha256:cebfb9f36d5446cbbde91df615209668fe656e6276f5a7a0b3472bf102fba3c3
      contents:
        packages:
          - libsystemd-dev
        files:
          - url: git+https://github.com/grafana/alloy.git#v1.14.0
            checksum: 9c463f233171efef2ddd5f272f09a7adac4078fe
            path: /go/src/github.com/grafana/alloy
            spdx:
              name: alloy
              version: 1.14.0
              packages:
                - name: alloy
                  purl: pkg:golang/github.com/grafana/alloy@1.14.0
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/pkg-node:24.14.0-debian13@sha256:15c5bca4a1190d0060b81b6a955aa270b2e180d776936e85d42c60ffbd785b2b
            includes:
              - opt/nodejs
              - opt/npm
              - usr/local/bin/node
              - usr/local/bin/npm
            uid: 0
            gid: 0
      pipeline:
        - name: bump ui dependencies
          uses: npm/bump@v1
          work-dir: /go/src/github.com/grafana/alloy/internal/web/ui
          privileged: true
          with:
            bumps: ${source.dir}/patch/npm-bumps.json
            npm-root: /go/src/github.com/grafana/alloy/internal/web/ui
        - name: build ui
          work-dir: /go/src/github.com/grafana/alloy/internal/web/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            npm install
            npm run build
        - name: fix semconv schema URL for otel SDK v1.40.0
          work-dir: /go/src/github.com/grafana/alloy
          runs: |
            set -eux -o pipefail

            # Update semconv import to match otel SDK v1.40.0 (uses semconv v1.39.0)
            sed -i.bak -e 's|semconv "go.opentelemetry.io/otel/semconv/v1.26.0"|semconv "go.opentelemetry.io/otel/semconv/v1.39.0"|' \
              -e 's|semconv "go.opentelemetry.io/otel/semconv/v1.37.0"|semconv "go.opentelemetry.io/otel/semconv/v1.39.0"|' \
              internal/runtime/tracing/tracing.go
            rm -f internal/runtime/tracing/tracing.go.bak

            # Verify the change was applied
            if ! grep -q 'semconv "go.opentelemetry.io/otel/semconv/v1.39.0"' internal/runtime/tracing/tracing.go; then
              echo "ERROR: Failed to update semconv import" >&2
              exit 1
            fi
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/grafana/alloy/collector
          environment:
            GODEBUG: fips140=on
          with:
            deps:
              - go.opentelemetry.io/otel/sdk@v1.40.0
              - golang.org/x/net@v0.51.0
              - github.com/cloudflare/circl@v1.6.3
              - github.com/mholt/archives@v0.1.5
            download: true
        - name: test
          work-dir: /go/src/github.com/grafana/alloy/collector
          runs: |
            set -eux -o pipefail

            go test -v -count=1 ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/grafana/alloy/collector
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -X github.com/grafana/alloy/internal/build.Version=1.14.0
              - -X github.com/grafana/alloy/syntax/internal/stdlib.Version=1.14.0
              - -X github.com/grafana/alloy/internal/build.Revision=9c463f233171efef2ddd5f272f09a7adac4078fe
              - -X github.com/grafana/alloy/internal/build.Branch=dhi
              - -X github.com/grafana/alloy/internal/build.BuildUser=dhi
              - -X github.com/grafana/alloy/internal/build.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
            output: ${target.dir}/usr/local/bin/alloy
            tags:
              - netgo
              - embedalloyui
              - promtail_journal_enabled
              - pyroscope_ebpf
        - name: install production ui deps for sbom
          work-dir: /go/src/github.com/grafana/alloy/internal/web/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            rm -rf node_modules
            npm install --omit=dev --ignore-scripts
        - name: ui sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: alloy-ui
            source: /go/src/github.com/grafana/alloy/internal/web/ui
      paths:
        - type: file
          path: /go/src/patch/fix-semconv-schema-url.patch
          uid: 0
          gid: 0
          source: image/alloy/patch/fix-semconv-schema-url.patch
        - type: file
          path: ${source.dir}/patch/npm-bumps.json
          uid: 0
          gid: 0
          source: image/alloy/patch/npm-bumps.json
      outputs:
        - source: /go/src/github.com/grafana/alloy/example-config.alloy
          target: /etc/alloy/config.alloy
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/alloy-ui
          target: /opt/docker/sbom/alloy-ui
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/alloy
          target: /usr/local/bin/alloy
          uid: 0
          gid: 0
          mode: "0755"
  artifacts:
    - name: dhi.io/static:20250419-glibc-debian13@sha256:d46a757d9ec2c6f6d9b7c4cdcfdb9bc65c9614c53ee28e0f489ed844fd2b79c8
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: alloy
  users:
    - name: alloy
      uid: 473
      gid: 473
  groups:
    - name: alloy
      gid: 473
      members:
        - alloy
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  ALLOY_DEPLOY_MODE: docker
paths:
  - type: directory
    path: /var/lib/alloy
    uid: 473
    gid: 473
    mode: "0770"
  - type: directory
    path: /var/lib/alloy/data
    uid: 473
    gid: 473
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal Grafana Alloy image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/alloy
cmd:
  - run
  - /etc/alloy/config.alloy
  - --storage.path=/var/lib/alloy/data
ports:
  - 12345/tcp
