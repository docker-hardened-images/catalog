# syntax=dhi.io/build:2-debian13

name: Grafana Alloy 1.x
image: dhi.io/alloy
variant: runtime
tags:
  - "1"
  - "1.18"
  - 1.18.0
  - 1-debian
  - 1-debian13
  - 1.18-debian
  - 1.18-debian13
  - 1.18.0-debian
  - 1.18.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: a435563ff073d5355952c1a8d1821110b1392691
  NODE_REFERENCE: dhi/pkg-node:24.18.0-debian13@sha256:f1617b19b6e3b6459c88b5bc3591bfbc0a5e71a318a0bc4ed1cac6d416e63c52
  SEMVER_MAJOR_MINOR_VERSION: "1.18"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.18.0
  VERSION: 1.18.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - libc6
    - liblzma5
    - libsystemd0
    - libzstd1
    - tzdata
  builds:
    - name: alloy
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - libsystemd-dev
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/grafana/alloy.git#v1.18.0
            checksum: a435563ff073d5355952c1a8d1821110b1392691
            path: /go/src/github.com/grafana/alloy
            spdx:
              name: alloy
              version: 1.18.0
              packages:
                - name: alloy
                  purl: pkg:golang/github.com/grafana/alloy@1.18.0
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/pkg-node:24.18.0-debian13@sha256:f1617b19b6e3b6459c88b5bc3591bfbc0a5e71a318a0bc4ed1cac6d416e63c52
            includes:
              - opt/nodejs
              - opt/npm
              - usr/local/bin/node
              - usr/local/bin/npm
            uid: 0
            gid: 0
      pipeline:
        - name: bump ui dependencies
          uses: npm/bump@v1
          work-dir: /go/src/github.com/grafana/alloy/internal/web/ui
          privileged: true
          with:
            bumps: ${source.dir}/patch/npm-bumps.json
            npm-root: /go/src/github.com/grafana/alloy/internal/web/ui
        - name: build ui
          work-dir: /go/src/github.com/grafana/alloy/internal/web/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            npm install
            npm run build
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/grafana/alloy/collector
          with:
            deps:
              - github.com/go-git/go-git/v5@v5.19.1
              - google.golang.org/grpc@v1.82.1
            download: true
        - name: test
          work-dir: /go/src/github.com/grafana/alloy/collector
          runs: |
            set -eux -o pipefail

            go test -v -count=1 ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/grafana/alloy/collector
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -X github.com/grafana/alloy/internal/build.Version=1.18.0
              - -X github.com/grafana/alloy/syntax/internal/stdlib.Version=1.18.0
              - -X github.com/grafana/alloy/internal/build.Revision=a435563ff073d5355952c1a8d1821110b1392691
              - -X github.com/grafana/alloy/internal/build.Branch=dhi
              - -X github.com/grafana/alloy/internal/build.BuildUser=dhi
              - -X github.com/grafana/alloy/internal/build.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
            output: ${target.dir}/usr/local/bin/alloy
            tags:
              - netgo
              - embedalloyui
              - promtail_journal_enabled
              - pyroscope_ebpf
        - name: install production ui deps for sbom
          work-dir: /go/src/github.com/grafana/alloy/internal/web/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            rm -rf node_modules
            npm install --omit=dev --ignore-scripts
        - name: ui sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: alloy-ui
            source: /go/src/github.com/grafana/alloy/internal/web/ui
      paths:
        - type: file
          path: ${source.dir}/patch/npm-bumps.json
          uid: 0
          gid: 0
          source: image/alloy/patch/npm-bumps.json
      outputs:
        - source: /go/src/github.com/grafana/alloy/example-config.alloy
          target: /etc/alloy/config.alloy
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/alloy-ui
          target: /opt/docker/sbom/alloy-ui
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/alloy
          target: /usr/local/bin/alloy
          uid: 0
          gid: 0
          mode: "0755"
accounts:
  run-as: alloy
  users:
    - name: alloy
      uid: 473
      gid: 473
  groups:
    - name: alloy
      gid: 473
      members:
        - alloy
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  ALLOY_DEPLOY_MODE: docker
paths:
  - type: directory
    path: /var/lib/alloy
    uid: 473
    gid: 473
    mode: "0770"
  - type: directory
    path: /var/lib/alloy/data
    uid: 473
    gid: 473
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal Grafana Alloy image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/alloy
cmd:
  - run
  - /etc/alloy/config.alloy
  - --storage.path=/var/lib/alloy/data
ports:
  - 12345/tcp
