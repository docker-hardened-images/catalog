# syntax=dhi.io/build:2-debian13

name: Notation 1.x
image: dhi.io/notation
variant: runtime
tags:
  - "1"
  - "1.3"
  - 1.3.2
  - 1-debian
  - 1-debian13
  - 1.3-debian
  - 1.3-debian13
  - 1.3.2-debian
  - 1.3.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 001cc919603c1dc16c6aad387c94b4209cb9c901
  SEMVER_MAJOR_MINOR_VERSION: "1.3"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.3.2
  VERSION: 1.3.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: notation
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/notaryproject/notation.git#v1.3.2
            checksum: 001cc919603c1dc16c6aad387c94b4209cb9c901
            path: /go/src/github.com/notaryproject/notation
            spdx:
              name: notation
              version: 1.3.2
              packages:
                - name: notation
                  purl: pkg:golang/github.com/notaryproject/notation/v1@1.3.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/notaryproject/notation
          with:
            deps:
              - github.com/Azure/go-ntlmssp@v0.1.1
              - golang.org/x/crypto@v0.52.0
              - oras.land/oras-go/v2@v2.6.2
            download: true
        - name: test
          work-dir: /go/src/github.com/notaryproject/notation
          runs: |
            set -eux -o pipefail

            EXCLUDES='cmd/notation/internal/truststore|/internal/tree|/internal/osutil|cmd/notation/plugin|pkg/configutil'
            PKGS=$(go list ./... | egrep -v "${EXCLUDES}")

            CGO_ENABLED=0 go test $PKGS
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/notaryproject/notation
          with:
            output: ${target.dir}/usr/local/bin/notation
            packages: ./cmd/notation
      outputs:
        - source: ${target.dir}/usr/local/bin/notation
          target: /usr/local/bin/notation
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/notation
          target: /opt/docker/sbom/notation
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Notation image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - notation
