# syntax=dhi.io/build:2-alpine3.23

name: Snyk 1.x
image: dhi.io/snyk
variant: runtime
tags:
  - 1-alpine
  - 1-alpine3.24
  - 1.1306-alpine
  - 1.1306.0-alpine
  - 1.1306-alpine3.24
  - 1.1306.0-alpine3.24
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-23"
vars:
  APK_MAJOR_MINOR_VERSION: "1.1306"
  APK_MAJOR_VERSION: "1"
  APK_VERSION: 1.1306.0
  SEMVER_VERSION: 1.1306.0
  VERSION: 1.1306.0-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - ca-certificates-bundle
    - musl
    - snyk=1.1306.0-r0
  builds:
    - name: server.json
      contents:
        packages:
          - bash
          - sed
      pipeline:
        - runs: |
            set -eux -o pipefail

            sed -i "s/_VERSION_/1.1306.0/g" "${source.dir}/config/server.json"
      paths:
        - type: file
          path: ${source.dir}/config/server.json
          uid: 0
          gid: 0
          source: image/snyk/config/server.json
      attestations:
        - predicate-type: https://modelcontextprotocol.io/server.json/v1
          source: ${source.dir}/config/server.json
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  HOME: /home/nonroot
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
paths:
  - type: directory
    path: /home/nonroot
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Snyk CLI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - snyk
