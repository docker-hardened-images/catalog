# syntax=dhi.io/build:2-debian13

name: Snyk 1.x
image: dhi.io/snyk
variant: runtime
tags:
  - "1"
  - "1.1306"
  - 1-debian
  - 1.1306.0
  - 1-debian13
  - 1.1306-debian
  - 1.1306-debian13
  - 1.1306.0-debian
  - 1.1306.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-23"
vars:
  DEBIAN_EPOCH_MAJOR_MINOR_VERSION: "1.1306"
  DEBIAN_EPOCH_MAJOR_VERSION: "1"
  DEBIAN_EPOCH_VERSION: 1.1306.0
  SEMVER_VERSION: 1.1306.0
  VERSION: 1.1306.0-0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - ca-certificates
    - snyk=1.1306.0-0
  builds:
    - name: server.json
      contents:
        packages:
          - bash
          - sed
      pipeline:
        - runs: |
            set -eux -o pipefail

            sed -i "s/_VERSION_/1.1306.0/g" "${source.dir}/config/server.json"
      paths:
        - type: file
          path: ${source.dir}/config/server.json
          uid: 0
          gid: 0
          source: image/snyk/config/server.json
      attestations:
        - predicate-type: https://modelcontextprotocol.io/server.json/v1
          source: ${source.dir}/config/server.json
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  HOME: /home/nonroot
paths:
  - type: directory
    path: /home/nonroot
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Snyk CLI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - snyk
