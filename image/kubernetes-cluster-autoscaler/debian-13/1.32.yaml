# syntax=dhi.io/build:2-debian13

name: Kubernetes Cluster Autoscaler 1.32.x
image: dhi.io/kubernetes-cluster-autoscaler
variant: runtime
tags:
  - "1.32"
  - 1.32.7
  - 1.32-debian
  - 1.32-debian13
  - 1.32.7-debian
  - 1.32.7-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: f645beb1ec472b785e5c196b3768c0d93195a75a
  SEMVER_MAJOR_MINOR_VERSION: "1.32"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.32.7
  VERSION: 1.32.7
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: kubernetes-cluster-autoscaler
      work-dir: /go/src/k8s.io/autoscaler/cluster-autoscaler
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - grep
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kubernetes/autoscaler.git#cluster-autoscaler-1.32.7
            checksum: f645beb1ec472b785e5c196b3768c0d93195a75a
            path: /go/src/k8s.io/autoscaler
            spdx:
              name: kubernetes-cluster-autoscaler
              version: 1.32.7
              packages:
                - name: kubernetes-cluster-autoscaler
                  purl: pkg:golang/k8s.io/autoscaler/cluster-autoscaler@1.32.7
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.32 only)
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/oauth2@v0.27.0
              - github.com/golang-jwt/jwt/v4@v4.5.2
              - github.com/golang-jwt/jwt/v5@v5.2.2
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Exclude cloudprovider tests (require cloud provider credentials)
            # Exclude simulator/dynamicresources/snapshot tests (upstream format string bug in snapshot_test.go:636)
            EXCLUDES='/cloudprovider/|/simulator/dynamicresources/snapshot'
            PKGS=$(go list ./... | grep -v -E "${EXCLUDES}")
            # Go 1.25 vet flags klog format strings in upstream autoscaler (non-constant format string).
            CGO_ENABLED=0 go test -vet=off $PKGS
        - name: build
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/cluster-autoscaler
      outputs:
        - source: ${target.dir}/usr/local/bin/cluster-autoscaler
          target: /cluster-autoscaler
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kubernetes-cluster-autoscaler
          target: /opt/docker/sbom/kubernetes-cluster-autoscaler
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Kubernetes Cluster Autoscaler image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /cluster-autoscaler
