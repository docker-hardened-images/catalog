# syntax=dhi.io/build:2-debian13

name: Valkey 7.2.x (sentinel)
image: dhi.io/valkey
variant: runtime
flavor: sentinel
tags:
  - 7-sentinel
  - 7.2-sentinel
  - 7.2.14-sentinel
  - 7-debian-sentinel
  - 7-debian13-sentinel
  - 7.2-debian-sentinel
  - 7.2-debian13-sentinel
  - 7.2.14-debian-sentinel
  - 7.2.14-debian13-sentinel
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2023-08-15"
  end-of-life: "2029-04-16"
vars:
  COMMIT_SHA: 499cfb9431c7cebec4d91f81bb4932a742a8c8ae
  DEBIAN_EPOCH_MAJOR_MINOR_VERSION: "7.2"
  DEBIAN_EPOCH_MAJOR_VERSION: "7"
  DEBIAN_EPOCH_VERSION: 7.2.14
  VERSION: 7.2.14
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!adduser'
    - '!audit'
    - '!cdebconf'
    - '!debconf'
    - '!dpkg'
    - '!elogind'
    - '!gcc-14'
    - '!gcc-14-base'
    - '!gcc-base'
    - '!install-info'
    - '!libaudit-common'
    - '!libaudit1'
    - '!libdebian-installer'
    - '!libdebian-installer4'
    - '!libelogind0'
    - '!libnewt0.52'
    - '!libslang2'
    - '!libtextwrap'
    - '!libtextwrap1'
    - '!mawk'
    - '!openssl'
    - '!openssl-provider-legacy'
    - '!original-awk'
    - '!pam'
    - '!passwd'
    - '!pcre2'
    - '!readline-common'
    - '!shadow'
    - '!sysvinit'
    - '!sysvinit-utils'
    - '!tar'
    - base-files
    - bash
    - coreutils
    - hostname
    - libc-bin
    - libpcre2-8-0
    - libssl3t64
    - tini
  builds:
    - name: valkey
      contents:
        packages:
          - bash
          - clang
          - coreutils
          - gawk
          - gnu-which
          - grep
          - hostname
          - libssl-dev
          - make
          - pkg-config
          - python3
          - sed
        files:
          - url: git+https://github.com/valkey-io/valkey.git#7.2.14
            checksum: 499cfb9431c7cebec4d91f81bb4932a742a8c8ae
            path: ${source.dir}/valkey
            spdx:
              name: valkey
              version: 7.2.14
              packages:
                - name: valkey
                  purl: pkg:dhi/valkey@7.2.14
                  license: BSD-3-Clause
            uid: 0
            gid: 0
      pipeline:
        - name: build
          work-dir: ${source.dir}/valkey
          runs: |
            set -eux -o pipefail

            make BUILD_TLS=yes CC=clang

            mkdir -p "${target.dir}/usr/local/bin"
            cp src/valkey-server "${target.dir}/usr/local/bin/valkey-server"
            cp src/valkey-cli "${target.dir}/usr/local/bin/valkey-cli"
            cp src/valkey-benchmark "${target.dir}/usr/local/bin/valkey-benchmark"
      outputs:
        - source: ${target.dir}/usr/local/bin/valkey-server
          target: /usr/local/bin/valkey-server
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/valkey-cli
          target: /usr/local/bin/valkey-cli
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/valkey-benchmark
          target: /usr/local/bin/valkey-benchmark
          uid: 0
          gid: 0
          mode: "0755"
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /data
paths:
  - type: symlink
    path: /usr/local/bin/redis-sentinel
    uid: 0
    gid: 0
    source: /usr/local/bin/valkey-server
  - type: symlink
    path: /usr/local/bin/redis-server
    uid: 0
    gid: 0
    source: /usr/local/bin/valkey-server
  - type: symlink
    path: /usr/local/bin/redis-cli
    uid: 0
    gid: 0
    source: /usr/local/bin/valkey-cli
  - type: symlink
    path: /usr/local/bin/redis-check-rdb
    uid: 0
    gid: 0
    source: /usr/local/bin/valkey-server
  - type: symlink
    path: /usr/local/bin/redis-check-aof
    uid: 0
    gid: 0
    source: /usr/local/bin/valkey-server
  - type: symlink
    path: /usr/local/bin/redis-benchmark
    uid: 0
    gid: 0
    source: /usr/local/bin/valkey-benchmark
  - type: symlink
    path: /usr/local/bin/valkey-sentinel
    uid: 0
    gid: 0
    source: /usr/local/bin/valkey-server
  - type: symlink
    path: /usr/local/bin/valkey-check-aof
    uid: 0
    gid: 0
    source: /usr/local/bin/valkey-server
  - type: symlink
    path: /usr/local/bin/valkey-check-rdb
    uid: 0
    gid: 0
    source: /usr/local/bin/valkey-server
  - type: directory
    path: /var/lib/valkey
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /var/log/valkey
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /run/valkey/
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /data
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: file
    path: /usr/local/bin/docker-entrypoint.sh
    content: |
      #!/bin/sh
      set -e

      # first arg is `-f` or `--some-option`
      # or first arg is `something.conf`
      if [ "${1#-}" != "$1" ] || [ "${1%.conf}" != "$1" ]; then
        set -- valkey-server "$@"
      fi

      # set an appropriate umask (if one isn't set)
      um="$(umask)"
      if [ "$um" = '0022' ]; then
        umask 0077
      fi

      exec "$@"
    uid: 0
    gid: 0
    mode: "0755"
  - type: directory
    path: /etc/valkey
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: file
    path: /etc/valkey/sentinel.conf
    content: |
      # Default Valkey Sentinel configuration for Docker Hardened Images.
      #
      # valkey-sentinel REWRITES this file at runtime (CONFIG REWRITE), so both
      # this file and its directory (/etc/valkey) are owned by the nonroot
      # runtime user (uid/gid 65532) and must stay writable. Do NOT mount your
      # own config over it read-only (:ro) or Sentinel will fail to persist
      # state. 'dir' must also point at a writable location; /data is owned by
      # 65532.
      port 26379
      dir "/data"

      # Declare the primaries (masters) to monitor, for example:
      # sentinel monitor mymaster 127.0.0.1 6379 2
      # sentinel down-after-milliseconds mymaster 5000
      # sentinel failover-timeout mymaster 60000
      # sentinel parallel-syncs mymaster 1
    uid: 65532
    gid: 65532
    mode: "0644"
annotations:
  org.opencontainers.image.description: A minimal Valkey Sentinel image
  org.opencontainers.image.licenses: BSD-3-Clause
entrypoint:
  - /usr/bin/tini
  - --
  - /usr/local/bin/docker-entrypoint.sh
cmd:
  - valkey-sentinel
  - /etc/valkey/sentinel.conf
ports:
  - 26379/tcp
