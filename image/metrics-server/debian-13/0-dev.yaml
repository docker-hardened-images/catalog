# syntax=dhi.io/build:2-debian13

name: Metrics Server 0.x (dev)
image: dhi.io/metrics-server
variant: dev
tags:
  - 0-dev
  - 0.9-dev
  - 0.9.0-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.9-debian-dev
  - 0.9-debian13-dev
  - 0.9.0-debian-dev
  - 0.9.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 2a7c4b2c7d46552ff47f4aeaa3a735c582587ecd
  SEMVER_MAJOR_MINOR_VERSION: "0.9"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.9.0
  VERSION: 0.9.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: metrics-server
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kubernetes-sigs/metrics-server.git#v0.9.0
            checksum: 2a7c4b2c7d46552ff47f4aeaa3a735c582587ecd
            path: /go/src/sigs.k8s.io/metrics-server
            spdx:
              name: metrics-server
              version: 0.9.0
              packages:
                - name: metrics-server
                  purl: pkg:golang/sigs.k8s.io/metrics-server@0.9.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/sigs.k8s.io/metrics-server
          with:
            deps: []
            download: true
        - name: tidy go modules
          work-dir: /go/src/sigs.k8s.io/metrics-server
          runs: |
            set -eux -o pipefail

            go mod tidy
        - name: build
          uses: go/build@v1
          work-dir: /go/src/sigs.k8s.io/metrics-server
          with:
            ldflags:
              - -X k8s.io/client-go/pkg/version.gitVersion=0.9.0
              - -X k8s.io/client-go/pkg/version.gitCommit=2a7c4b2c7d46552ff47f4aeaa3a735c582587ecd
              - -X k8s.io/client-go/pkg/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
            output: ${target.dir}/usr/local/bin/metrics-server
            packages: ./cmd/metrics-server
      outputs:
        - source: ${target.dir}/usr/local/bin/metrics-server
          target: /usr/local/bin/metrics-server
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/metrics-server
          target: /opt/docker/sbom/metrics-server
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /metrics-server
    uid: 0
    gid: 0
    source: /usr/local/bin/metrics-server
annotations:
  org.opencontainers.image.description: A minimal Metrics Server image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - metrics-server
