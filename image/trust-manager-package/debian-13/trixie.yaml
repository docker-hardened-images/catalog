# syntax=dhi.io/build:2-debian13

name: Trust Manager Package for Debian 13 (trixie)
image: dhi.io/trust-manager-package
variant: runtime
tags:
  - trixie
  - trixie-20230311
  - trixie-debian13
  - trixie-20230311-deb12u1
  - trixie-20230311-debian13
  - trixie-20230311-deb12u1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-08-09"
  end-of-life: "2028-08-09"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  CA_CERTIFICATES_VERSION: 20230311+deb12u1
  CA_CERTIFICATES_VERSION_DATE: "20230311"
  CA_CERTIFICATES_VERSION_DEB: deb12u1
  CODENAME: trixie
  DISTRO_PRETTY_VERSION: Debian 13 (trixie)
  DISTRO_VERSION: "13"
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:4209a08b8d03addadd22d98483519296d2f1fb78e6dd84c459b2b3d6d478ac4b
  TRUST_MANAGER_COMMIT_SHA: 3b91d5d448a0edf4fed012ea82a809a939ce31f0
  TRUST_MANAGER_VERSION: 0.22.1
contents:
  packages:
    - '!base-files'
  builds:
    - name: trust-pkg-debian-trixie
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:4209a08b8d03addadd22d98483519296d2f1fb78e6dd84c459b2b3d6d478ac4b
      contents:
        files:
          - url: git+https://github.com/cert-manager/trust-manager.git#v0.22.1
            checksum: 3b91d5d448a0edf4fed012ea82a809a939ce31f0
            path: /go/src/github.com/cert-manager/trust-manager
            spdx:
              name: trust-manager
              version: 0.22.1
              packages:
                - name: trust-manager-debian-bundle-static
                  purl: pkg:golang/github.com/cert-manager/trust-manager@0.22.1#trust-packages/debian
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          work-dir: /go/src/github.com/cert-manager/trust-manager/trust-packages/debian
          with:
            deps: []
            download: true
        - name: build debian-bundle-static binary
          uses: go/build@v1
          work-dir: /go/src/github.com/cert-manager/trust-manager/trust-packages/debian
          with:
            output: ${target.dir}/usr/local/bin/debian-bundle-static
            packages: .
        - name: create trust bundle JSON
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/debian-package

            # ca-certificates and jq are pre-installed in the golang builder
            # Create the JSON trust bundle matching upstream format
            jq -n \
              --rawfile bundle /etc/ssl/certs/ca-certificates.crt \
              --arg name "cert-manager-debian-trixie" \
              --arg version "20230311+deb12u1" \
              '.name = $name | .bundle = $bundle | .version = $version' \
              > ${target.dir}/debian-package/cert-manager-package-debian.json
      outputs:
        - source: ${target.dir}/usr/local/bin/debian-bundle-static
          target: /usr/local/bin/debian-bundle-static
          uid: 0
          gid: 0
        - source: ${target.dir}/debian-package/cert-manager-package-debian.json
          target: /debian-package/cert-manager-package-debian.json
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/trust-manager
          target: /opt/docker/sbom/trust-manager
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: "65532"
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /ko-app
    uid: 0
    gid: 0
    mode: "0755"
  - type: symlink
    path: /ko-app/debian-bundle-static
    uid: 0
    gid: 0
    source: /usr/local/bin/debian-bundle-static
annotations:
  org.opencontainers.image.description: A minimal trust package image providing CA certificates for cert-manager trust-manager
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/debian-bundle-static
