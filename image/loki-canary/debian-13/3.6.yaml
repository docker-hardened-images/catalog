# syntax=dhi.io/build:2-debian13

name: Loki Canary 3.6.x
image: dhi.io/loki-canary
variant: runtime
tags:
  - "3.6"
  - 3.6.12
  - 3.6-debian
  - 3.6-debian13
  - 3.6.12-debian
  - 3.6.12-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-11-17"
vars:
  COMMIT_SHA: a25e0d91117416439be4998d3c714e48cd7e5a2b
  SEMVER_MAJOR_MINOR_VERSION: "3.6"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.6.12
  VERSION: 3.6.12
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: loki-canary
      work-dir: /go/src/github.com/grafana/loki
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - make
          - bash
          - sed
          - hostname
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
        files:
          - url: git+https://github.com/grafana/loki.git#v3.6.12
            checksum: a25e0d91117416439be4998d3c714e48cd7e5a2b
            path: /go/src/github.com/grafana/loki
            spdx:
              name: loki-canary
              version: 3.6.12
              packages:
                - name: loki-canary
                  purl: pkg:golang/github.com/grafana/loki@3.6.12
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: remove godoc
          privileged: true
          runs: |
            set -eux -o pipefail

            # Fixes golang.org/x/tools/godoc@v0.1.0-deprecated: is explicitly
            # required in go.mod, but not marked as explicit in vendor/modules.txt.
            # The following go/bump@v2 step re-syncs vendor after this edit.
            go get golang.org/x/tools/godoc@none
        - name: update go dependencies and vendor (3.6 only)
          uses: go/bump@v2
          work-dir: /go/src/github.com/grafana/loki
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/buger/jsonparser@v1.1.2
              - github.com/go-jose/go-jose/v4@v4.1.4
              - google.golang.org/grpc@v1.82.1
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
            download: true
        - name: patch Makefile for no VCS stamping in 3.6
          uses: git/patch@v1
          with:
            patch: ${source.dir}/patch/buildvcs-3.6.patch
        - name: install
          privileged: true
          runs: |
            set -eux -o pipefail

            make loki-canary

            mkdir -p "${target.dir}/usr/local/bin"
            cp cmd/loki-canary/loki-canary "${target.dir}/usr/local/bin/loki-canary"
      paths:
        - type: file
          path: ${source.dir}/patch/buildvcs-2.9.patch
          uid: 0
          gid: 0
          source: image/loki-canary/patch/buildvcs-2.9.patch
        - type: file
          path: ${source.dir}/patch/buildvcs-3.6.patch
          uid: 0
          gid: 0
          source: image/loki-canary/patch/buildvcs-3.6.patch
        - type: file
          path: ${source.dir}/patch/buildvcs-3.7.patch
          uid: 0
          gid: 0
          source: image/loki-canary/patch/buildvcs-3.7.patch
      outputs:
        - source: ${target.dir}/usr/local/bin/loki-canary
          target: /usr/local/bin/loki-canary
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/loki-canary
          target: /opt/docker/sbom/loki-canary
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Loki Canary image
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - /usr/local/bin/loki-canary
