name: Loki Canary 3.7.x
image: dhi.io/loki-canary
variant: runtime
tags:
  - "3"
  - "3.7"
  - 3.7.1
  - 3-debian13
  - 3.7-debian13
  - 3.7.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-26"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 2c8fff222bab6813374b973ae0eb49043d3ed14e
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:6e257a15c0aa81a30cd698e950469f07dd71d6c7e4c6a30e0badbf9494b1d6f3
  SEMVER_MAJOR_MINOR_VERSION: "3.7"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.7.1
  VERSION: 3.7.1
contents:
  packages:
    - '!base-files'
  builds:
    - name: loki-canary
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:6e257a15c0aa81a30cd698e950469f07dd71d6c7e4c6a30e0badbf9494b1d6f3
      work-dir: /go/src/github.com/grafana/loki
      contents:
        packages:
          - make
          - bash
          - sed
          - hostname
        files:
          - url: git+https://github.com/grafana/loki.git#v3.7.1
            checksum: 2c8fff222bab6813374b973ae0eb49043d3ed14e
            path: /go/src/github.com/grafana/loki
            spdx:
              name: loki-canary
              version: 3.7.1
              packages:
                - name: loki-canary
                  purl: pkg:golang/github.com/grafana/loki@3.7.1
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies and vendor (3.6 and 3.7)
          uses: go/bump@v2
          work-dir: /go/src/github.com/grafana/loki
          with:
            deps:
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/buger/jsonparser@v1.1.2
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/stdout/stdoutlog@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            download: true
        - name: bump prometheus with upstream testify replace (3.7 only)
          privileged: true
          runs: |
            set -eux -o pipefail

            # The FIPS builder defaults to fips140=only, but Go module downloads use TLS curves
            # that require lenient mode during this networked dependency update.
            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            go get github.com/prometheus/prometheus@v0.311.3
            go mod edit -replace=github.com/go-openapi/testify/v2=github.com/go-openapi/testify/v2@v2.0.2
            go mod tidy
            go mod vendor
        - name: patch Makefile for no VCS stamping in 3.7
          uses: git/patch@v1
          with:
            patch: ${source.dir}/patch/buildvcs-3.7.patch
        - name: install
          privileged: true
          runs: |
            set -eux -o pipefail

            make loki-canary

            mkdir -p "${target.dir}/usr/local/bin"
            cp cmd/loki-canary/loki-canary "${target.dir}/usr/local/bin/loki-canary"
      paths:
        - type: file
          path: ${source.dir}/patch/buildvcs-2.9.patch
          uid: 0
          gid: 0
          source: image/loki-canary/patch/buildvcs-2.9.patch
        - type: file
          path: ${source.dir}/patch/buildvcs-3.6.patch
          uid: 0
          gid: 0
          source: image/loki-canary/patch/buildvcs-3.6.patch
        - type: file
          path: ${source.dir}/patch/buildvcs-3.7.patch
          uid: 0
          gid: 0
          source: image/loki-canary/patch/buildvcs-3.7.patch
      outputs:
        - source: ${target.dir}/usr/local/bin/loki-canary
          target: /usr/local/bin/loki-canary
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/loki-canary
          target: /opt/docker/sbom/loki-canary
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
