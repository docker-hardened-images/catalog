                  purl: pkg:golang/github.com/anchore/grype@0.111.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/anchore/grype
          with:
