# syntax=dhi.io/build:2-debian13

name: Cilium Operator Generic 1.x
image: dhi.io/cilium-operator-generic
variant: runtime
tags:
  - "1"
  - "1.19"
  - 1.19.5
  - 1-debian
  - 1-debian13
  - 1.19-debian
  - 1.19-debian13
  - 1.19.5-debian
  - 1.19.5-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-03"
vars:
  COMMIT_SHA: 20eaccfef029cb046d70219717fb6dbbdf27a59f
  GOPS_REFERENCE: dhi/pkg-gops:0.3.29-debian13@sha256:e347a47b6653c6e80c8c63ac594a39d1192d7079551fa5b3434fb3e7d2ffbca0
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.19.5
  VERSION: 1.19.5
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: cilium-operator
      work-dir: /go/src/github.com/cilium/cilium/operator
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/cilium/cilium.git#v1.19.5
            checksum: 20eaccfef029cb046d70219717fb6dbbdf27a59f
            path: /go/src/github.com/cilium/cilium
            spdx:
              name: cilium-operator-generic
              version: 1.19.5
              packages:
                - name: cilium-operator-generic
                  purl: pkg:golang/github.com/cilium/cilium@1.19.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.19 only)
          uses: go/bump@v2
          work-dir: /go/src/github.com/cilium/cilium
          with:
            deps:
              - golang.org/x/sys@v0.45.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.mongodb.org/mongo-driver@v1.17.7
              - go.opentelemetry.io/otel@v1.41.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Skip TestUpdateUsedCIDIsReverted and TestDeleteUsedCIDIsRecreated:
            # upstream tests use t.Fatalf inside require.EventuallyWithT instead
            # of ct (CollectT), causing immediate failure on first poll instead
            # of retrying. This is a race condition in upstream cilium v1.18.9
            # that manifests on arm64.
            CGO_ENABLED=0 go test -mod=vendor -v -skip 'TestUpdateUsedCIDIsReverted|TestDeleteUsedCIDIsRecreated' ./...
        - name: build
          uses: go/build@v1
          with:
            extra-args: -mod=vendor
            ldflags:
              - -X github.com/cilium/cilium/pkg/version.ciliumVersion=v1.19.5
            output: ${target.dir}/usr/local/bin/cilium-operator-generic
            tags: osusergo,ipam_provider_operator
      outputs:
        - source: ${target.dir}/usr/local/bin/cilium-operator-generic
          target: /usr/local/bin/cilium-operator-generic
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/cilium-operator-generic
          target: /opt/docker/sbom/cilium-operator-generic
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/pkg-gops:0.3.29-debian13@sha256:e347a47b6653c6e80c8c63ac594a39d1192d7079551fa5b3434fb3e7d2ffbca0
      includes:
        - opt/**
        - usr/local/**
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /usr/bin/cilium-operator-generic
    uid: 0
    gid: 0
    source: /usr/local/bin/cilium-operator-generic
annotations:
  org.opencontainers.image.description: A minimal Cilium Operator Generic image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/cilium-operator-generic
