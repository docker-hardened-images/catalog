metadata:
  display-name: Datadog Operator
  short-description: The Datadog Operator is a Kubernetes operator that manages Datadog Agent deployments and related Datadog resources through custom resources.
  featured: false
  home-url: https://github.com/DataDog/datadog-operator
  categories:
    - monitoring-and-observability
  included-tools:
    - name: manager
      description: The Datadog Operator controller; reconciles DatadogAgent and related custom resources.
    - name: helpers
      description: Helper utilities invoked inside the operator container (e.g. secret handling).
    - name: yaml-mapper
      description: Utility that maps legacy Datadog Agent YAML configuration to the DatadogAgent custom resource.
