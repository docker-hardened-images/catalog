# syntax=dhi.io/build:2-debian13

name: datadog-operator 1.x (dev)
image: dhi.io/datadog-operator
variant: dev
tags:
  - 1-dev
  - 1.28-dev
  - 1.28.0-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.28-debian-dev
  - 1.28-debian13-dev
  - 1.28.0-debian-dev
  - 1.28.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2022-10-13"
vars:
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "1.28"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.28.0
  SUFFIX: -dev
  VERSION: 1.28.0-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - datadog-operator-dev=1.28.0-1
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /manager
    uid: 0
    gid: 0
    source: /usr/bin/manager
  - type: symlink
    path: /helpers
    uid: 0
    gid: 0
    source: /usr/bin/helpers
  - type: symlink
    path: /yaml-mapper
    uid: 0
    gid: 0
    source: /usr/bin/yaml-mapper
annotations:
  org.opencontainers.image.description: A minimal Datadog Operator image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /manager
ports:
  - 8080/tcp
  - 8081/tcp
