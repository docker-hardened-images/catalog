# syntax=dhi.io/build:2-alpine3.23

name: datadog-operator 1.x
image: dhi.io/datadog-operator
variant: runtime
tags:
  - 1-alpine
  - 1.28-alpine
  - 1-alpine3.24
  - 1.28.0-alpine
  - 1.28-alpine3.24
  - 1.28.0-alpine3.24
platforms:
  - linux/amd64
  - linux/arm64
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "1.28"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.28.0
  SUFFIX: ""
  VERSION: 1.28.0-r2
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - ca-certificates-bundle
    - datadog-operator=1.28.0-r2
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /manager
    uid: 0
    gid: 0
    source: /usr/bin/manager
  - type: symlink
    path: /helpers
    uid: 0
    gid: 0
    source: /usr/bin/helpers
  - type: symlink
    path: /yaml-mapper
    uid: 0
    gid: 0
    source: /usr/bin/yaml-mapper
annotations:
  org.opencontainers.image.description: A minimal Datadog Operator image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /manager
ports:
  - 8080/tcp
  - 8081/tcp
