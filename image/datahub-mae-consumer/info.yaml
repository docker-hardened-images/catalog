metadata:
  display-name: DataHub MAE Consumer
  short-description: The DataHub MAE Consumer is a Kafka consumer service that ingests MetadataChangeLog and PlatformEvent topics into DataHub's Elasticsearch search index and Neo4j graph store, keeping the search and lineage indices in sync with metadata changes produced by the DataHub GMS.
  featured: false
  home-url: https://datahub.com
  categories:
    - databases-and-storage
  included-tools:
    - name: java
      description: Eclipse Temurin OpenJDK 17 JRE runtime used to launch the MAE Consumer JAR via start.sh.
    - name: dockerize
      description: Service-readiness wait utility (powerman/dockerize) used by start.sh to block on Kafka, Elasticsearch, Schema Registry, and Neo4j availability before the JVM starts.
