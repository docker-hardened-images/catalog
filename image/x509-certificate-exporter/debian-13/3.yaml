# syntax=dhi.io/build:2-debian13

name: x509-certificate-exporter 3.x
image: dhi.io/x509-certificate-exporter
variant: runtime
tags:
  - "3"
  - "3.21"
  - 3.21.0
  - 3-debian
  - 3-debian13
  - 3.21-debian
  - 3.21-debian13
  - 3.21.0-debian
  - 3.21.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2022-06-21"
vars:
  BUILD_TIME_LDFLAG: github.com/enix/x509-certificate-exporter/v3/internal.BuildDateTime
  COMMIT_SHA: 26f924dd44fb76eecd12ab69bef2676606da42b0
  REVISION_LDFLAG: github.com/enix/x509-certificate-exporter/v3/internal.Revision
  SEMVER_MAJOR_MINOR_VERSION: "3.21"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.21.0
  VERSION: 3.21.0
  VERSION_LDFLAG: github.com/enix/x509-certificate-exporter/v3/internal.Version
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: x509-certificate-exporter
      work-dir: /go/src/github.com/enix/x509-certificate-exporter
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/enix/x509-certificate-exporter.git#v3.21.0
            checksum: 26f924dd44fb76eecd12ab69bef2676606da42b0
            path: /go/src/github.com/enix/x509-certificate-exporter
            spdx:
              name: x509-certificate-exporter
              version: 3.21.0
              packages:
                - name: x509-certificate-exporter
                  purl: pkg:golang/github.com/enix/x509-certificate-exporter/v3@3.21.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (3 only)
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.56.0
              - golang.org/x/text@v0.39.0
            tidy: true
        - uses: go/hermetic@v1
        - name: test
          work-dir: /go/src/github.com/enix/x509-certificate-exporter
          runs: |
            set -eux -o pipefail

            # Upstream v4.0.0 has a symlink watcher regression in unit tests, and
            # its PKCS#12 tests use SHA-1 fixtures that fail in any FIPS context.
            SKIP_TESTS="TestSkipUnchangedSymlinkTargetSwap"
            if [ "${target.fips}" = "true" ]; then
              SKIP_TESTS="${SKIP_TESTS}|TestAllParseWithExporter|TestParseChain"
            fi

            go test -short ./... -skip "${SKIP_TESTS}"
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/enix/x509-certificate-exporter
          with:
            ldflags:
              - -X github.com/enix/x509-certificate-exporter/v3/internal.Version=3.21.0
              - -X github.com/enix/x509-certificate-exporter/v3/internal.Revision=26f924dd44fb76eecd12ab69bef2676606da42b0
              - -X github.com/enix/x509-certificate-exporter/v3/internal.BuildDateTime=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: /usr/local/bin/x509-certificate-exporter
            packages: ./cmd/x509-certificate-exporter
            tags:
              - netgo
              - osusergo
      outputs:
        - source: /usr/local/bin/x509-certificate-exporter
          target: /usr/local/bin/x509-certificate-exporter
          uid: 0
          gid: 0
          mode: "0555"
        - source: /opt/docker/sbom/x509-certificate-exporter
          target: /opt/docker/sbom/x509-certificate-exporter
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal x509-certificate-exporter image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /usr/local/bin/x509-certificate-exporter
ports:
  - 9793/tcp
