# syntax=dhi.io/build:2-debian13

name: Cilium Hubble UI 0.x (dev)
image: dhi.io/hubble-ui
variant: dev
tags:
  - 0-dev
  - 0.13-dev
  - 0.13.5-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.13-debian-dev
  - 0.13-debian13-dev
  - 0.13.5-debian-dev
  - 0.13.5-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 47edb389de8870defe1bb511e931dbc164866bac
  SEMVER_MAJOR_MINOR_VERSION: "0.13"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.13.5
  VERSION: 0.13.5
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - base-passwd
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libc6
    - libcrypt1
    - libpcre2-8-0
    - libssl3t64
    - mawk
    - nginx-mainline
    - perl-base
    - sed
    - tzdata
    - util-linux
    - zlib1g
  builds:
    - name: hubble-ui
      contents:
        packages:
          - base-files
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - git
          - libc6
          - libstdc++6
          - mawk
          - nodejs-24
          - node-corepack
          - npm
          - sed
          - yarn-classic
        files:
          - url: git+https://github.com/cilium/hubble-ui.git#v0.13.5
            checksum: 47edb389de8870defe1bb511e931dbc164866bac
            path: ${source.dir}/hubble-ui
            spdx:
              name: hubble-ui
              version: 0.13.5
              packages:
                - name: hubble-ui
                  purl: pkg:github/cilium/hubble-ui@v0.13.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: remove unused decompress dependency
          uses: patch@v1
          work-dir: ${source.dir}/hubble-ui
          with:
            options: -p1
            patches:
              - ${source.dir}/patch/remove-decompress.patch
        - name: build hubble-ui
          work-dir: ${source.dir}/hubble-ui
          privileged: true
          runs: |
            set -eux -o pipefail

            # Sync package-lock.json after the package.json patch above.
            npm install --package-lock-only --ignore-scripts

            # Install dependencies
            npm ci

            NODE_ENV=production npm run build

            # Copy built files to target
            mkdir -p "${target.dir}/app"
            cp -r server/public/* "${target.dir}/app/"
        - name: prepare for sbom
          work-dir: ${source.dir}/hubble-ui
          runs: |
            set -eux -o pipefail

            # Add version to package.json for SBOM generation
            tmp=$(mktemp)
            jq --arg version "0.13.5" '.version = $version' package.json > "$tmp" && mv "$tmp" package.json
        - name: bump dependencies
          uses: npm/bump@v1
          work-dir: ${source.dir}/hubble-ui
          privileged: true
          with:
            bumps: ${source.dir}/patch/npm-bumps.json
            npm-root: ${source.dir}/hubble-ui
        - name: reinstall dependencies for sbom
          work-dir: ${source.dir}/hubble-ui
          privileged: true
          runs: |
            set -eux -o pipefail

            # Clean and reinstall only production dependencies for accurate SBOM
            rm -rf node_modules
            npm install --omit=dev --ignore-scripts
        - name: generate sbom
          uses: sbom@v1
          with:
            prefix: hubble-ui
            source: ${source.dir}/hubble-ui
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/hubble-ui/patch
      outputs:
        - source: ${target.dir}/app
          target: /app
          uid: 65532
          gid: 65532
          mode: "0755"
        - source: /opt/docker/sbom/hubble-ui
          target: /opt/docker/sbom/hubble-ui
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nginx
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nginx
      gid: 65532
      members:
        - nginx
    - name: www-data
      gid: 82
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /run/nginx
    uid: 65532
    gid: 65532
    mode: "0777"
  - type: directory
    path: /var/cache/nginx
    uid: 65532
    gid: 65532
    mode: "0777"
  - type: symlink
    path: /var/log/nginx/access.log
    uid: 0
    gid: 0
    source: /dev/stdout
  - type: symlink
    path: /var/log/nginx/error.log
    uid: 0
    gid: 0
    source: /dev/stderr
  - type: file
    path: /etc/nginx/nginx.conf
    uid: 0
    gid: 0
    mode: "0644"
    source: image/hubble-ui/config/nginx.conf
  - type: file
    path: /etc/nginx/conf.d/default.conf
    uid: 0
    gid: 0
    mode: "0644"
    source: image/hubble-ui/config/default.conf
annotations:
  org.opencontainers.image.description: A minimal Cilium Hubble UI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - nginx
cmd:
  - -g
  - daemon off;
ports:
  - 8080/tcp
