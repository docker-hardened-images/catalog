# syntax=dhi.io/build:2-debian13

name: Cilium Hubble UI 0.x
image: dhi.io/hubble-ui
variant: runtime
tags:
  - "0"
  - "0.13"
  - 0.13.5
  - 0-debian
  - 0-debian13
  - 0.13-debian
  - 0.13-debian13
  - 0.13.5-debian
  - 0.13.5-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 47edb389de8870defe1bb511e931dbc164866bac
  NODE_BUILD_REFERENCE: dhi/node:22.22.3-debian13-dev@sha256:cbe1cbec93a0eb5ca704355825021de4362704a5181768afc24fac2082d13fca
  SEMVER_MAJOR_MINOR_VERSION: "0.13"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.13.5
  VERSION: 0.13.5
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - libc6
    - libcrypt1
    - libpcre2-8-0
    - libssl3t64
    - nginx-mainline
    - tzdata
    - zlib1g
  builds:
    - name: hubble-ui
      uses: dhi.io/node:22.22.3-debian13-dev@sha256:cbe1cbec93a0eb5ca704355825021de4362704a5181768afc24fac2082d13fca
      contents:
        files:
          - url: git+https://github.com/cilium/hubble-ui.git#v0.13.5
            checksum: 47edb389de8870defe1bb511e931dbc164866bac
            path: ${source.dir}/hubble-ui
            spdx:
              name: hubble-ui
              version: 0.13.5
              packages:
                - name: hubble-ui
                  purl: pkg:github/cilium/hubble-ui@v0.13.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build hubble-ui
          work-dir: ${source.dir}/hubble-ui
          privileged: true
          runs: |
            set -eux -o pipefail

            # Install dependencies
            npm ci

            NODE_ENV=production npm run build

            # Copy built files to target
            mkdir -p "${target.dir}/app"
            cp -r server/public/* "${target.dir}/app/"
        - name: prepare for sbom
          work-dir: ${source.dir}/hubble-ui
          runs: |
            set -eux -o pipefail

            # Add version to package.json for SBOM generation
            tmp=$(mktemp)
            jq --arg version "0.13.5" '.version = $version' package.json > "$tmp" && mv "$tmp" package.json
        - name: bump dependencies
          uses: npm/bump@v1
          work-dir: ${source.dir}/hubble-ui
          privileged: true
          with:
            bumps: ${source.dir}/patch/npm-bumps.json
            npm-root: ${source.dir}/hubble-ui
        - name: reinstall dependencies for sbom
          work-dir: ${source.dir}/hubble-ui
          privileged: true
          runs: |
            set -eux -o pipefail

            # Clean and reinstall only production dependencies for accurate SBOM
            rm -rf node_modules
            npm install --omit=dev --ignore-scripts
        - name: generate sbom
          uses: sbom@v1
          with:
            prefix: hubble-ui
            source: ${source.dir}/hubble-ui
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/hubble-ui/patch
      outputs:
        - source: ${target.dir}/app
          target: /app
          uid: 65532
          gid: 65532
          mode: "0755"
        - source: /opt/docker/sbom/hubble-ui
          target: /opt/docker/sbom/hubble-ui
          uid: 0
          gid: 0
accounts:
  run-as: nginx
  users:
    - name: nginx
      uid: 65532
      gid: 65532
  groups:
    - name: nginx
      gid: 65532
      members:
        - nginx
    - name: www-data
      gid: 82
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /run/nginx
    uid: 65532
    gid: 65532
    mode: "0777"
  - type: directory
    path: /var/cache/nginx
    uid: 65532
    gid: 65532
    mode: "0777"
  - type: symlink
    path: /var/log/nginx/access.log
    uid: 0
    gid: 0
    source: /dev/stdout
  - type: symlink
    path: /var/log/nginx/error.log
    uid: 0
    gid: 0
    source: /dev/stderr
  - type: file
    path: /etc/nginx/nginx.conf
    uid: 0
    gid: 0
    mode: "0644"
    source: image/hubble-ui/config/nginx.conf
  - type: file
    path: /etc/nginx/conf.d/default.conf
    uid: 0
    gid: 0
    mode: "0644"
    source: image/hubble-ui/config/default.conf
annotations:
  org.opencontainers.image.description: A minimal Cilium Hubble UI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - nginx
cmd:
  - -g
  - daemon off;
ports:
  - 8080/tcp
