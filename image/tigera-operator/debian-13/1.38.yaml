# syntax=dhi.io/build:2-debian13

name: Tigera Operator 1.38.x
image: dhi.io/tigera-operator
variant: runtime
tags:
  - "1.38"
  - 1.38.16
  - 1.38-debian
  - 1.38-debian13
  - 1.38.16-debian
  - 1.38.16-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 9cbd52a5cd61725bf149efc9d643dcd7f1178ab5
  SEMVER_MAJOR_MINOR_VERSION: "1.38"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.38.16
  VERSION: 1.38.16
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: tigera-operator
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/tigera/operator.git#v1.38.16
            checksum: 9cbd52a5cd61725bf149efc9d643dcd7f1178ab5
            path: /go/src/github.com/tigera/operator
            spdx:
              name: tigera-operator
              version: 1.38.16
              packages:
                - name: tigera-operator
                  purl: pkg:golang/github.com/tigera/operator@1.38.16
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump go dependencies (1.38 only)
          uses: go/bump@v2
          work-dir: /go/src/github.com/tigera/operator
          with:
            deps:
              - golang.org/x/crypto@v0.53.0
              - golang.org/x/net@v0.56.0
              - github.com/envoyproxy/gateway@v1.7.4
            download: true
        - name: patch gatewayapi for envoy-gateway api (1.38)
          uses: git/patch@v1
          work-dir: /go/src/github.com/tigera/operator
          with:
            patch: ${source.dir}/patch/fix-envoy-gateway-api-1.38.patch
        - name: test
          work-dir: /go/src/github.com/tigera/operator
          runs: |
            set -eux -o pipefail

            # Exclude controller tests (e.g. installation reconciler) that block on
            # in-cluster service account paths and hit the 10m go test timeout in CI.
            CGO_ENABLED=0 go test $(go list ./pkg/... | grep -v -E 'pkg/(crds|controller|render)')
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/tigera/operator
          with:
            ldflags:
              - -X github.com/tigera/operator/version.VERSION=v1.38.16
            output: ${target.dir}/usr/local/bin/operator
            packages: ./cmd/
      paths:
        - type: file
          path: ${source.dir}/patch/fix-envoy-gateway-api-1.38.patch
          uid: 0
          gid: 0
          source: image/tigera-operator/patch/fix-envoy-gateway-api-1.38.patch
      outputs:
        - source: ${target.dir}/usr/local/bin/operator
          target: /usr/local/bin/operator
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/tigera-operator
          target: /opt/docker/sbom/tigera-operator
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal tigera-operator image for managing Calico installations
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/operator
