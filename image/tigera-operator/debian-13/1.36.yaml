# syntax=dhi.io/build:2-debian13

name: Tigera Operator 1.36.x
image: dhi.io/tigera-operator
variant: runtime
tags:
  - "1.36"
  - 1.36.16
  - 1.36-debian
  - 1.36-debian13
  - 1.36.16-debian
  - 1.36.16-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: fdb10d5c1b619137f2e50cbdcb4c9012364d6ed7
  SEMVER_MAJOR_MINOR_VERSION: "1.36"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.36.16
  VERSION: 1.36.16
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: tigera-operator
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/tigera/operator.git#v1.36.16
            checksum: fdb10d5c1b619137f2e50cbdcb4c9012364d6ed7
            path: /go/src/github.com/tigera/operator
            spdx:
              name: tigera-operator
              version: 1.36.16
              packages:
                - name: tigera-operator
                  purl: pkg:golang/github.com/tigera/operator@1.36.16
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump go dependencies (1.36 only)
          uses: go/bump@v2
          work-dir: /go/src/github.com/tigera/operator
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.56.0
              - golang.org/x/text@v0.39.0
            download: true
        - name: test
          work-dir: /go/src/github.com/tigera/operator
          runs: |
            set -eux -o pipefail

            # Exclude controller tests (e.g. installation reconciler) that block on
            # in-cluster service account paths and hit the 10m go test timeout in CI.
            for i in {1..3}; do
              if CGO_ENABLED=0 go test $(go list ./pkg/... | grep -v -E 'pkg/(crds|controller)'); then
                exit 0
              fi
              echo "Retry $i/3..."
              sleep 2
            done

            exit 1
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/tigera/operator
          with:
            ldflags:
              - -X github.com/tigera/operator/version.VERSION=v1.36.16
            output: ${target.dir}/usr/local/bin/operator
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin/operator
          target: /usr/local/bin/operator
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/tigera-operator
          target: /opt/docker/sbom/tigera-operator
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal tigera-operator image for managing Calico installations
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/operator
