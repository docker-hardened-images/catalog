# syntax=dhi.io/build:2-debian13

name: Tigera Operator 1.42.x
image: dhi.io/tigera-operator
variant: runtime
tags:
  - "1.42"
  - 1.42.3
  - 1.42-debian
  - 1.42-debian13
  - 1.42.3-debian
  - 1.42.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-30"
vars:
  COMMIT_SHA: 40f3e3d35845ec159148b0a726ca069bf104d680
  ISTIO_VERSION: 1.29.4
  SEMVER_MAJOR_MINOR_VERSION: "1.42"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.42.3
  VERSION: 1.42.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: tigera-operator
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/tigera/operator.git#v1.42.3
            checksum: 40f3e3d35845ec159148b0a726ca069bf104d680
            path: /go/src/github.com/tigera/operator
            spdx:
              name: tigera-operator
              version: 1.42.3
              packages:
                - name: tigera-operator
                  purl: pkg:golang/github.com/tigera/operator@1.42.3
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://istio-release.storage.googleapis.com/charts/base-1.29.4.tgz
            path: /go/src/github.com/tigera/operator/pkg/render/istio/base.tgz
            uid: 0
            gid: 0
          - url: https://istio-release.storage.googleapis.com/charts/istiod-1.29.4.tgz
            path: /go/src/github.com/tigera/operator/pkg/render/istio/istiod.tgz
            uid: 0
            gid: 0
          - url: https://istio-release.storage.googleapis.com/charts/cni-1.29.4.tgz
            path: /go/src/github.com/tigera/operator/pkg/render/istio/cni.tgz
            uid: 0
            gid: 0
          - url: https://istio-release.storage.googleapis.com/charts/ztunnel-1.29.4.tgz
            path: /go/src/github.com/tigera/operator/pkg/render/istio/ztunnel.tgz
            uid: 0
            gid: 0
      pipeline:
        - name: patch 1.36 dependencies (1.42 only)
          uses: go/bump@v2
          work-dir: /go/src/github.com/tigera/operator
          with:
            deps:
              - github.com/containerd/containerd@v1.7.33
              - oras.land/oras-go/v2@v2.6.1
            download: true
        - name: test
          work-dir: /go/src/github.com/tigera/operator
          runs: |
            set -eux -o pipefail

            # Exclude controller tests (e.g. installation reconciler) that block on
            # in-cluster service account paths and hit the 10m go test timeout in CI.
            for i in {1..3}; do
              if CGO_ENABLED=0 go test $(go list ./pkg/... | grep -v -E 'pkg/(crds|controller)'); then
                exit 0
              fi
              echo "Retry $i/3..."
              sleep 2
            done

            exit 1
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/tigera/operator
          with:
            ldflags:
              - -X github.com/tigera/operator/version.VERSION=v1.42.3
            output: ${target.dir}/usr/local/bin/operator
            packages: ./cmd/
      outputs:
        - source: ${target.dir}/usr/local/bin/operator
          target: /usr/local/bin/operator
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/tigera-operator
          target: /opt/docker/sbom/tigera-operator
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal tigera-operator image for managing Calico installations
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/operator
