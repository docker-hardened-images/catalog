# syntax=dhi.io/build:2-debian13

name: Cilium Operator Azure 1.17.x
image: dhi.io/cilium-operator-azure
variant: runtime
tags:
  - "1.17"
  - 1.17.17
  - 1.17-debian
  - 1.17-debian13
  - 1.17.17-debian
  - 1.17.17-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-02-04"
vars:
  COMMIT_SHA: 0db95967f554c95ee21a1fb7268bb5785e563d9d
  GOPS_REFERENCE: dhi/pkg-gops:0.3.29-debian13@sha256:5d78225b32a53d1822cb7f6f6f7dc1860166dbd598fd485f0bed9cf1a24c1570
  SEMVER_MAJOR_MINOR_VERSION: "1.17"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.17.17
  VERSION: 1.17.17
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: cilium-operator-azure
      work-dir: /go/src/github.com/cilium/cilium
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/cilium/cilium.git#v1.17.17
            checksum: 0db95967f554c95ee21a1fb7268bb5785e563d9d
            path: /go/src/github.com/cilium/cilium
            spdx:
              name: cilium-operator-azure
              version: 1.17.17
              packages:
                - name: cilium-operator-azure
                  purl: pkg:golang/github.com/cilium/cilium@1.17.17
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.17 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.mongodb.org/mongo-driver@v1.17.7
              - go.opentelemetry.io/otel@v1.41.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Skip TestRouterIDAllocation due to race condition in upstream cilium
            # that causes resource version conflicts on arm64 builds.
            CGO_ENABLED=0 go test -mod=vendor -v -skip 'TestRouterIDAllocation' ./operator/...
        - name: build
          uses: go/build@v1
          with:
            extra-args: -mod=vendor
            ldflags:
              - -X github.com/cilium/cilium/pkg/version.ciliumVersion=v1.17.17
            output: ${target.dir}/usr/local/bin/cilium-operator-azure
            packages: ./operator
            tags: osusergo,ipam_provider_azure
      outputs:
        - source: ${target.dir}/usr/local/bin/cilium-operator-azure
          target: /usr/local/bin/cilium-operator-azure
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/cilium-operator-azure
          target: /opt/docker/sbom/cilium-operator-azure
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/pkg-gops:0.3.29-debian13@sha256:5d78225b32a53d1822cb7f6f6f7dc1860166dbd598fd485f0bed9cf1a24c1570
      includes:
        - opt/**
        - usr/local/**
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  GOPS_CONFIG_DIR: /home/gops
paths:
  - type: directory
    path: /home/gops
    uid: 65532
    gid: 65532
    mode: "0777"
  - type: directory
    path: /run/cilium
    uid: 65532
    gid: 65532
    mode: "0777"
annotations:
  org.opencontainers.image.description: A minimal Cilium Operator Azure image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/cilium-operator-azure
