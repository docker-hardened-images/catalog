metadata:
  display-name: Kubernetes Proxy (kube-proxy)
  short-description: |
    Maintains network rules on nodes to enable service virtual IPs and load balancing.

    kube-proxy reflects services defined in the Kubernetes API and maintains network
    rules on nodes to implement service behavior.
