metadata:
  display-name: Datadog Cluster Agent
  short-description: Datadog Cluster Agent runs centralized Kubernetes cluster-level checks, serves a custom-metrics provider for HPA, and acts as a proxy between node agents and the Kubernetes API.
  featured: false
  home-url: https://docs.datadoghq.com/agent/cluster_agent/
  categories:
    - monitoring-and-observability
  included-tools:
    - name: datadog-cluster-agent
      description: Cluster Agent binary — cluster-level checks, custom-metrics provider for HPA, and node-agent/API-server proxy.
    - name: cws-instrumentation
      description: Cloud Workload Security instrumentation helper injected into workloads by the admission controller.
    - name: secret-generic-connector
      description: Generic secret-backend connector referenced from secret_backend_command to resolve ENC[...] references at runtime.
