# syntax=dhi.io/build:2-debian13

name: Rook Ceph 1.20.x
image: dhi.io/rook-ceph
variant: runtime
tags:
  - "1"
  - "1.20"
  - 1.20.1
  - 1-debian
  - 1-debian13
  - 1.20-debian
  - 1.20-debian13
  - 1.20.1-debian
  - 1.20.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-02"
vars:
  CEPH_REFERENCE: dhi/ceph:20.3.0-debian13@sha256:4518d11d117b4a16cb2cb1f6569beab142eb3fcd5d2aeec7b621be8981ba116b
  COMMIT_SHA: 6eab73f29700b60038d1f3f465e2d8b5b15eb479
  ROOK_GO_BUILD_TAGS: ceph_preview
  S5CMD_COMMIT_SHA: 991c9fbc16709341b4bac04513232a1445941f63
  S5CMD_VERSION: 2.3.0
  SEMVER_MAJOR_MINOR_VERSION: "1.20"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.20.1
  VERSION: 1.20.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - iproute2
    - tzdata
  builds:
    - name: rook
      work-dir: /go/src/github.com/rook/rook
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - git
          - ca-certificates-bundle
          - golang-1.26
          - mawk
          - sed
        files:
          - url: git+https://github.com/rook/rook.git#v1.20.1
            checksum: 6eab73f29700b60038d1f3f465e2d8b5b15eb479
            path: /go/src/github.com/rook/rook
            spdx:
              name: rook
              version: 1.20.1
              packages:
                - name: rook
                  purl: pkg:golang/github.com/rook/rook@1.20.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump go dependencies (1.20 only)
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
            download: true
        - name: run targeted go tests
          work-dir: /go/src/github.com/rook/rook
          privileged: true
          environment:
            CGO_ENABLED: "0"
            GOFLAGS: -buildvcs=false
          runs: |
            set -eux -o pipefail

            go_test_tags=()
            if [ -n "ceph_preview" ]; then
              go_test_tags=(-tags="ceph_preview")
            fi
            go test "${go_test_tags[@]}" ./cmd/rook/...
        - name: build rook
          uses: go/build@v1
          work-dir: /go/src/github.com/rook/rook
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            ldflags:
              - -X github.com/rook/rook/pkg/version.Version=1.20.1
            output: ${target.dir}/usr/local/bin/rook
            packages: ./cmd/rook
            tags: ceph_preview
        - name: stage rook helper assets
          work-dir: /go/src/github.com/rook/rook
          runs: |
            set -eux -o pipefail

            install -D -m 0755 images/ceph/toolbox.sh "${target.dir}/usr/local/bin/toolbox.sh"
            install -D -m 0755 images/ceph/set-ceph-debug-level "${target.dir}/usr/local/bin/set-ceph-debug-level"

            mkdir -p "${target.dir}/etc/ceph-monitoring"
            cp -a deploy/examples/monitoring/. "${target.dir}/etc/ceph-monitoring/"

            mkdir -p "${target.dir}/etc/rook-external/test-data"
            cp -a deploy/examples/create-external-cluster-resources.* "${target.dir}/etc/rook-external/"
      outputs:
        - source: ${target.dir}/usr/local/bin/rook
          target: /usr/local/bin/rook
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/toolbox.sh
          target: /usr/local/bin/toolbox.sh
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/set-ceph-debug-level
          target: /usr/local/bin/set-ceph-debug-level
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/etc/ceph-monitoring
          target: /etc/ceph-monitoring
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/rook-external
          target: /etc/rook-external
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/rook
          target: /opt/docker/sbom/rook
          uid: 0
          gid: 0
    - name: s5cmd
      work-dir: /go/src/github.com/peak/s5cmd
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - ca-certificates
          - git
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/peak/s5cmd.git#v2.3.0
            checksum: 991c9fbc16709341b4bac04513232a1445941f63
            path: /go/src/github.com/peak/s5cmd
            spdx:
              name: s5cmd
              version: 2.3.0
              packages:
                - name: s5cmd
                  purl: pkg:golang/github.com/peak/s5cmd/v2@2.3.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/sys@v0.44.0
            download: true
        - name: build s5cmd
          uses: go/build@v1
          work-dir: /go/src/github.com/peak/s5cmd
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            output: ${target.dir}/usr/local/bin/s5cmd
      outputs:
        - source: ${target.dir}/usr/local/bin/s5cmd
          target: /usr/local/bin/s5cmd
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/s5cmd
          target: /opt/docker/sbom/s5cmd
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/ceph:20.3.0-debian13@sha256:4518d11d117b4a16cb2cb1f6569beab142eb3fcd5d2aeec7b621be8981ba116b
      includes:
        - etc/ld.so.conf.d/ceph.conf
        - etc/logrotate.d/ceph
        - opt/**
        - run/ceph
        - run/ceph/**
        - usr/**
        - var/lib/ceph
        - var/lib/ceph/**
        - var/log/ceph
        - var/log/ceph/**
      excludes:
        - usr/lib/ssl/certs
        - usr/lib/ssl/private
      uid: 0
      gid: 0
accounts:
  run-as: rook
  users:
    - name: ceph
      uid: 167
      gid: 167
    - name: rook
      uid: 2016
      gid: 2016
  groups:
    - name: ceph
      gid: 167
      members:
        - ceph
    - name: rook
      gid: 2016
      members:
        - rook
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  LD_LIBRARY_PATH: /usr/local/lib
  PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  PYTHONPATH: /usr/local/lib/python3.13/site-packages
paths:
  - type: directory
    path: /etc/ceph
    uid: 167
    gid: 167
    mode: "0755"
  - type: directory
    path: /etc/ceph-monitoring
    uid: 0
    gid: 0
    mode: "0755"
  - type: directory
    path: /etc/rook-external
    uid: 0
    gid: 0
    mode: "0755"
  - type: directory
    path: /etc/rook-external/test-data
    uid: 0
    gid: 0
    mode: "0755"
  - type: directory
    path: /run/ceph
    uid: 167
    gid: 167
    mode: "0755"
  - type: directory
    path: /var/lib/ceph
    uid: 167
    gid: 167
    mode: "0755"
  - type: directory
    path: /var/log/ceph
    uid: 167
    gid: 167
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Rook Ceph image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/rook
