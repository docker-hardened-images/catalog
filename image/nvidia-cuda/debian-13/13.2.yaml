# syntax=dhi.io/build:2-debian13

name: NVIDIA CUDA 13.2.x
image: dhi.io/nvidia-cuda
variant: runtime
tags:
  - "13"
  - "13.2"
  - 13.2.1
  - 13-debian
  - 13-debian13
  - 13.2-debian
  - 13.2-debian13
  - 13.2.1-debian
  - 13.2.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-03"
vars:
  NVIDIA_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "sbsa" }'
  SEMVER_MAJOR_MINOR_VERSION: "13.2"
  SEMVER_MAJOR_VERSION: "13"
  SEMVER_MINOR_VERSION: "2"
  SEMVER_VERSION: 13.2.1
  VERSION: 13.2.1-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/8793F200.gpg] https://developer.download.nvidia.com/compute/cuda/repos/debian13/${NVIDIA_ARCH}/ /
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://developer.download.nvidia.com/compute/cuda/repos/debian13/${NVIDIA_ARCH}/8793F200.pub
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - ca-certificates
    - cuda-runtime-13-2
  mappings:
    cuda-runtime-13-2: pkg:deb/nvidia/cuda-runtime-13-2@13.2.1-1?os_name=debian&os_version=13
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /workspace
environment:
  CUDA_VERSION: 13.2.1
  LD_LIBRARY_PATH: /usr/local/nvidia/lib:/usr/local/nvidia/lib64:/usr/local/cuda/lib64
  NVARCH: ${NVIDIA_ARCH}
  NVIDIA_DRIVER_CAPABILITIES: compute,utility
  NVIDIA_PRODUCT_NAME: CUDA
  NVIDIA_REQUIRE_CUDA: cuda>=13.2
  NVIDIA_VISIBLE_DEVICES: all
  PATH: /usr/local/nvidia/bin:/usr/local/cuda/bin:/usr/local/bin:/usr/bin:/bin
paths:
  - type: symlink
    path: /usr/local/cuda
    uid: 0
    gid: 0
    source: /usr/local/cuda-13.2
  - type: symlink
    path: /usr/local/cuda-13
    uid: 0
    gid: 0
    source: /usr/local/cuda-13.2
  - type: directory
    path: /workspace
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  com.nvidia.volumes.needed: nvidia_driver
  org.opencontainers.image.description: NVIDIA CUDA - GPU-accelerated computing toolkit and runtime libraries
  org.opencontainers.image.licenses: LicenseRef-NVIDIA-CUDA-EULA
