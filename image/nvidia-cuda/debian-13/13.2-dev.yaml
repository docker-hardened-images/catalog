# syntax=dhi.io/build:2-debian13

name: NVIDIA CUDA 13.2.x (dev)
image: dhi.io/nvidia-cuda
variant: dev
tags:
  - 13-dev
  - 13.2-dev
  - 13.2.1-dev
  - 13-debian-dev
  - 13-debian13-dev
  - 13.2-debian-dev
  - 13.2-debian13-dev
  - 13.2.1-debian-dev
  - 13.2.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-03"
vars:
  BINUTILS_ARCH: '#{ target.arch == "amd64" ? "x86-64" : "aarch64" }'
  NVIDIA_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "sbsa" }'
  SEMVER_MAJOR_MINOR_VERSION: "13.2"
  SEMVER_MAJOR_VERSION: "13"
  SEMVER_MINOR_VERSION: "2"
  SEMVER_VERSION: 13.2.1
  VERSION: 13.2.1-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/8793F200.gpg] https://developer.download.nvidia.com/compute/cuda/repos/debian13/${NVIDIA_ARCH}/ /
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://developer.download.nvidia.com/compute/cuda/repos/debian13/${NVIDIA_ARCH}/8793F200.pub
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!binutils'
    - '!binutils-aarch64-linux-gnu'
    - '!binutils-common'
    - '!binutils-x86-64-linux-gnu'
    - '!gawk'
    - '!libbinutils'
    - '!libctf-nobfd0'
    - '!libctf0'
    - '!libelogind0'
    - '!libgprofng0'
    - '!libsframe1'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - binutils-latest
    - binutils-latest-${BINUTILS_ARCH}-linux-gnu
    - build-essential
    - ca-certificates
    - coreutils
    - cuda-minimal-build-13-2
    - cuda-runtime-13-2
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libctf-nobfd0-latest
    - libctf0-latest
    - libgprofng0-latest
    - mawk
    - perl-base
    - sed
    - util-linux
  mappings:
    cuda-minimal-build-13-2: pkg:deb/nvidia/cuda-minimal-build-13-2@13.2.1-1?os_name=debian&os_version=13
    cuda-runtime-13-2: pkg:deb/nvidia/cuda-runtime-13-2@13.2.1-1?os_name=debian&os_version=13
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /workspace
environment:
  CUDA_VERSION: 13.2.1
  DEBIAN_FRONTEND: noninteractive
  LD_LIBRARY_PATH: /usr/local/nvidia/lib:/usr/local/nvidia/lib64:/usr/local/cuda/lib64
  LIBRARY_PATH: /usr/local/cuda/lib64/stubs
  NVARCH: ${NVIDIA_ARCH}
  NVIDIA_DRIVER_CAPABILITIES: compute,utility
  NVIDIA_PRODUCT_NAME: CUDA
  NVIDIA_REQUIRE_CUDA: cuda>=13.2
  NVIDIA_VISIBLE_DEVICES: all
  PATH: /usr/local/nvidia/bin:/usr/local/cuda/bin:/usr/local/bin:/usr/bin:/bin
paths:
  - type: symlink
    path: /usr/local/cuda
    uid: 0
    gid: 0
    source: /usr/local/cuda-13.2
  - type: symlink
    path: /usr/local/cuda-13
    uid: 0
    gid: 0
    source: /usr/local/cuda-13.2
  - type: directory
    path: /workspace
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  com.nvidia.volumes.needed: nvidia_driver
  org.opencontainers.image.description: NVIDIA CUDA - GPU-accelerated computing toolkit and runtime libraries
  org.opencontainers.image.licenses: LicenseRef-NVIDIA-CUDA-EULA
cmd:
  - /bin/bash
