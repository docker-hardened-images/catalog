metadata:
  display-name: NVIDIA CUDA
  short-description: |-
    NVIDIA CUDA base image. The runtime variant ships the CUDA runtime
    libraries (cudart, cublas, cufft, curand, cusolver, cusparse, npp); the
    dev variant adds the nvcc compiler and development headers. Intended as a
    base image for GPU-accelerated workloads.
  featured: false
  home-url: https://developer.nvidia.com/cuda-toolkit
  categories:
    - languages-and-frameworks
    - machine-learning-and-ai
