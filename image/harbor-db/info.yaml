metadata:
  display-name: Harbor DB
  short-description: |
    Harbor DB is the PostgreSQL database component used by the Harbor container registry for
    persistent storage of metadata, users, projects, and policies. It ships Harbor-specific
    initialization and upgrade scripts on top of PostgreSQL 14 and 15.
  featured: false
  home-url: https://goharbor.io/
  categories:
    - databases-and-storage
  included-tools:
    - name: postgres
      description: The PostgreSQL database server daemon.
    - name: psql
      description: The PostgreSQL interactive terminal and command-line client.
    - name: pg_dump
      description: Database export utility for creating backups in various formats.
    - name: pg_restore
      description: Utility for restoring databases from pg_dump archives.
    - name: pg_upgrade
      description: In-place upgrade utility for migrating between PostgreSQL major versions.
