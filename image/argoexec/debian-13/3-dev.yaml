# syntax=dhi.io/build:2-debian13

name: Argo executor 3.7.x (dev)
image: dhi.io/argoexec
variant: dev
tags:
  - 3-dev
  - 3.7-dev
  - 3.7.15-dev
  - 3-debian-dev
  - 3-debian13-dev
  - 3.7-debian-dev
  - 3.7-debian13-dev
  - 3.7.15-debian-dev
  - 3.7.15-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 358cc3968c8f06f1be0967e41df191088db0b662
  MODULE_MAJOR_VERSION: v3
  SEMVER_MAJOR_MINOR_VERSION: "3.7"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.7.15
  VERSION: 3.7.15
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: argoexec
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
        files:
          - url: git+https://github.com/argoproj/argo-workflows.git#v3.7.15
            checksum: 358cc3968c8f06f1be0967e41df191088db0b662
            path: /go/src/github.com/argoproj/argo-workflows
            spdx:
              name: argoexec
              version: 3.7.15
              packages:
                - name: argoexec
                  purl: pkg:golang/github.com/argoproj/argo-workflows@3.7.15
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          work-dir: /go/src/github.com/argoproj/argo-workflows
          with:
            deps:
              - github.com/go-git/go-git/v5@v5.19.1
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
            download: true
        - name: test
          work-dir: /go/src/github.com/argoproj/argo-workflows
          runs: |
            set -eux -o pipefail

            echo "Testing core functionality after patching..."

            # Test core workflow functionality
            go test -v -count=1 -timeout=3m ./workflow/validate -run="TestDAG"
            go test -v -count=1 -timeout=3m ./workflow/common

            # Test all util packages except telemetry (which fails due to network requirements)
            UTIL_PACKAGES=$(go list ./util/... | grep -v './util/telemetry')
            go test -v -count=1 -timeout=4m $UTIL_PACKAGES
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/argoproj/argo-workflows
          with:
            ldflags:
              - -X github.com/argoproj/argo-workflows/v3.version=3.7.15
              - -X github.com/argoproj/argo-workflows/v3.gitCommit=358cc3968c8f06f1be0967e41df191088db0b662
            output: ${target.dir}/usr/local/bin/argoexec
            packages: ./cmd/argoexec
      outputs:
        - source: ${target.dir}/usr/local/bin/argoexec
          target: /usr/local/bin/argoexec
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/argoexec
          target: /opt/docker/sbom/argoexec
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: argoexec
      uid: 8737
      gid: 8737
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: argoexec
      gid: 8737
      members:
        - argoexec
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Argo executor image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - argoexec
