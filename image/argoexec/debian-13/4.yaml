# syntax=dhi.io/build:2-debian13

name: Argo executor 4.0.x
image: dhi.io/argoexec
variant: runtime
tags:
  - "4"
  - "4.0"
  - 4.0.6
  - 4-debian
  - 4-debian13
  - 4.0-debian
  - 4.0-debian13
  - 4.0.6-debian
  - 4.0.6-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 277e9cef0ad16d7eaaab253573d0695951a65dbd
  MODULE_MAJOR_VERSION: v4
  SEMVER_MAJOR_MINOR_VERSION: "4.0"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.0.6
  VERSION: 4.0.6
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: argoexec
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
        files:
          - url: git+https://github.com/argoproj/argo-workflows.git#v4.0.6
            checksum: 277e9cef0ad16d7eaaab253573d0695951a65dbd
            path: /go/src/github.com/argoproj/argo-workflows
            spdx:
              name: argoexec
              version: 4.0.6
              packages:
                - name: argoexec
                  purl: pkg:golang/github.com/argoproj/argo-workflows@4.0.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          work-dir: /go/src/github.com/argoproj/argo-workflows
          with:
            deps:
              - github.com/go-git/go-git/v5@v5.19.1
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
            download: true
        - name: test
          work-dir: /go/src/github.com/argoproj/argo-workflows
          runs: |
            set -eux -o pipefail

            echo "Testing core functionality after patching..."

            # Test core workflow functionality
            go test -v -count=1 -timeout=3m ./workflow/validate -run="TestDAG"
            go test -v -count=1 -timeout=3m ./workflow/common

            # Test all util packages except telemetry (which fails due to network requirements)
            UTIL_PACKAGES=$(go list ./util/... | grep -v './util/telemetry')
            go test -v -count=1 -timeout=4m $UTIL_PACKAGES
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/argoproj/argo-workflows
          with:
            ldflags:
              - -X github.com/argoproj/argo-workflows/v4.version=4.0.6
              - -X github.com/argoproj/argo-workflows/v4.gitCommit=277e9cef0ad16d7eaaab253573d0695951a65dbd
            output: ${target.dir}/usr/local/bin/argoexec
            packages: ./cmd/argoexec
      outputs:
        - source: ${target.dir}/usr/local/bin/argoexec
          target: /usr/local/bin/argoexec
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/argoexec
          target: /opt/docker/sbom/argoexec
          uid: 0
          gid: 0
accounts:
  run-as: argoexec
  users:
    - name: argoexec
      uid: 8737
      gid: 8737
  groups:
    - name: argoexec
      gid: 8737
      members:
        - argoexec
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Argo executor image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - argoexec
