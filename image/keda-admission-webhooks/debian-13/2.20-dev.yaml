# syntax=dhi.io/build:2-debian13

name: KEDA Admission Webhooks 2.20.x (dev)
image: dhi.io/keda-admission-webhooks
variant: dev
tags:
  - 2-dev
  - 2.20-dev
  - 2.20.1-dev
  - 2-debian-dev
  - 2-debian13-dev
  - 2.20-debian-dev
  - 2.20-debian13-dev
  - 2.20.1-debian-dev
  - 2.20.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-01"
vars:
  COMMIT_SHA: 875675ce5cd1d34772fe00a228a71b8bf05b3b43
  SEMVER_MAJOR_MINOR_VERSION: "2.20"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.20.1
  VERSION: 2.20.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: keda-go
      work-dir: /go/src/github.com/kedacore/keda
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kedacore/keda.git#v2.20.1
            checksum: 875675ce5cd1d34772fe00a228a71b8bf05b3b43
            path: /go/src/github.com/kedacore/keda
            spdx:
              name: keda-admission-webhooks
              version: 2.20.1
              packages:
                - name: keda-admission-webhooks
                  purl: pkg:dhi/keda-admission-webhooks@2.20.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (2.20 only)
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X=github.com/kedacore/keda/v2/version.GitCommit=875675ce5cd1d34772fe00a228a71b8bf05b3b43
              - -X=github.com/kedacore/keda/v2/version.Version=2.20.1
            output: ${target.dir}/keda-admission-webhooks
            packages: ./cmd/webhooks/main.go
      outputs:
        - source: ${target.dir}/keda-admission-webhooks
          target: /keda-admission-webhooks
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/keda-admission-webhooks
          target: /opt/docker/sbom/keda-admission-webhooks
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal KEDA Admission Webhooks image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /keda-admission-webhooks
  - --zap-log-level=info
  - --zap-encoder=console
