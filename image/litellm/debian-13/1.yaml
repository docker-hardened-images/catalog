name: LiteLLM 1.x
image: dhi.io/litellm
variant: runtime
tags:
  - "1"
  - "1.84"
  - 1.84.0
  - 1-debian
  - 1-debian13
  - 1.84-debian
  - 1.84-debian13
  - 1.84.0-debian
  - 1.84.0-debian13
