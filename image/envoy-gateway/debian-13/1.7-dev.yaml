              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
            download: true
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/envoyproxy/gateway/internal/cmd/version.envoyGatewayVersion=v1.7.2
              - -X github.com/envoyproxy/gateway/internal/cmd/version.gitCommitID=097611e4ec6f2736ef601515a4126fc4e9fdb0fb
            output: ${target.dir}/usr/local/bin/envoy-gateway
            packages: ./cmd/envoy-gateway
      outputs:
        - source: ${target.dir}/usr/local/bin/envoy-gateway
          target: /usr/local/bin/envoy-gateway
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/envoy-gateway
