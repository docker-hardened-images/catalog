# syntax=dhi.io/build:2-debian13

name: Envoy Gateway 1.x (dev)
image: dhi.io/envoy-gateway
variant: dev
tags:
  - 1.7-dev
  - 1.7.5-dev
  - 1.7-debian-dev
  - 1.7-debian13-dev
  - 1.7.5-debian-dev
  - 1.7.5-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-05"
vars:
  COMMIT_SHA: c038192c87574a0a3d04794ce2ec4d9849471b2e
  SEMVER_MAJOR_MINOR_VERSION: "1.7"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.7.5
  VERSION: 1.7.5
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: envoy-gateway
      work-dir: /go/src/github.com/envoyproxy/gateway
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/envoyproxy/gateway.git#v1.7.5
            checksum: c038192c87574a0a3d04794ce2ec4d9849471b2e
            path: /go/src/github.com/envoyproxy/gateway
            spdx:
              name: envoy-gateway
              version: 1.7.5
              packages:
                - name: envoy-gateway
                  purl: pkg:golang/github.com/envoyproxy/gateway@v1.7.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies for 1.7 (1.7 only)
          uses: go/bump@v2
          with:
            deps:
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/moby/spdystream@v0.5.1
              - go.mongodb.org/mongo-driver@v1.17.7
            download: true
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/envoyproxy/gateway/internal/cmd/version.envoyGatewayVersion=v1.7.5
              - -X github.com/envoyproxy/gateway/internal/cmd/version.gitCommitID=c038192c87574a0a3d04794ce2ec4d9849471b2e
            output: ${target.dir}/usr/local/bin/envoy-gateway
            packages: ./cmd/envoy-gateway
      outputs:
        - source: ${target.dir}/usr/local/bin/envoy-gateway
          target: /usr/local/bin/envoy-gateway
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/envoy-gateway
          target: /opt/docker/sbom/envoy-gateway
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /home/nonroot
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /var/lib/eg
    uid: 65532
    gid: 65532
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal Envoy Gateway image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/envoy-gateway
