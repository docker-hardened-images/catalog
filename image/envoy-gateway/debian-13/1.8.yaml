# syntax=dhi.io/build:2-debian13

name: Envoy Gateway 1.x
image: dhi.io/envoy-gateway
variant: runtime
tags:
  - "1"
  - "1.8"
  - 1.8.1
  - 1-debian
  - 1-debian13
  - 1.8-debian
  - 1.8-debian13
  - 1.8.1-debian
  - 1.8.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-13"
vars:
  COMMIT_SHA: 097ab899b9d041452d02f15d738514eda10ea21b
  SEMVER_MAJOR_MINOR_VERSION: "1.8"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.8.1
  VERSION: 1.8.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: envoy-gateway
      work-dir: /go/src/github.com/envoyproxy/gateway
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/envoyproxy/gateway.git#v1.8.1
            checksum: 097ab899b9d041452d02f15d738514eda10ea21b
            path: /go/src/github.com/envoyproxy/gateway
            spdx:
              name: envoy-gateway
              version: 1.8.1
              packages:
                - name: envoy-gateway
                  purl: pkg:golang/github.com/envoyproxy/gateway@v1.8.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies for 1.7 (1.8 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/envoyproxy/gateway/internal/cmd/version.envoyGatewayVersion=v1.8.1
              - -X github.com/envoyproxy/gateway/internal/cmd/version.gitCommitID=097ab899b9d041452d02f15d738514eda10ea21b
            output: ${target.dir}/usr/local/bin/envoy-gateway
            packages: ./cmd/envoy-gateway
      outputs:
        - source: ${target.dir}/usr/local/bin/envoy-gateway
          target: /usr/local/bin/envoy-gateway
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/envoy-gateway
          target: /opt/docker/sbom/envoy-gateway
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /home/nonroot
paths:
  - type: directory
    path: /var/lib/eg
    uid: 65532
    gid: 65532
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal Envoy Gateway image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/envoy-gateway
