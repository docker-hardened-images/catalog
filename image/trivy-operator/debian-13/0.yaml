# syntax=dhi.io/build:2-debian13

name: Trivy Operator 0.x
image: dhi.io/trivy-operator
variant: runtime
tags:
  - "0"
  - "0.31"
  - 0.31.1
  - 0-debian
  - 0-debian13
  - 0.31-debian
  - 0.31-debian13
  - 0.31.1-debian
  - 0.31.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-11"
vars:
  _COMMIT_SHA: 5746743cb6c49c633c6334fb36060578b599a45d
  _VERSION: 0.31.1
  COMMIT_SHA: 5746743cb6c49c633c6334fb36060578b599a45d
  SEMVER_MAJOR_MINOR_VERSION: "0.31"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.31.1
  VERSION: 0.31.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: trivy-operator
      work-dir: /go/src/github.com/aquasecurity/trivy-operator
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - coreutils
          - findutils
          - make
          - ca-certificates-bundle
          - golang-1.26
          - mawk
          - sed
        files:
          - url: git+https://github.com/aquasecurity/trivy-operator.git#v0.31.1
            checksum: 5746743cb6c49c633c6334fb36060578b599a45d
            path: /go/src/github.com/aquasecurity/trivy-operator
            spdx:
              name: trivy-operator
              version: 0.31.1
              packages:
                - name: trivy-operator
                  purl: pkg:golang/github.com/aquasecurity/trivy-operator@0.31.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - github.com/containerd/containerd/v2@v2.3.2
              - oras.land/oras-go/v2@v2.6.2
            download: true
        - name: run unit tests
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 GOEXPERIMENT=jsonv2 \
              go test -v -short -timeout 60s ./...
        - name: build
          uses: go/build@v1
          with:
            experiments: jsonv2
            output: ${target.dir}/usr/local/bin/trivy-operator
            packages: ./cmd/trivy-operator/main.go
      outputs:
        - source: ${target.dir}/usr/local/bin/trivy-operator
          target: /usr/local/bin/trivy-operator
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/trivy-operator
          target: /opt/docker/sbom/trivy-operator
          uid: 0
          gid: 0
accounts:
  run-as: trivyoperator
  users:
    - name: trivyoperator
      uid: 10000
      gid: 10000
  groups:
    - name: trivyoperator
      gid: 10000
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Trivy Operator image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/trivy-operator
