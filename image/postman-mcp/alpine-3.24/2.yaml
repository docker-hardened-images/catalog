# syntax=dhi.io/build:2-alpine3.24

name: Postman MCP Server 2.x
image: dhi.io/postman-mcp
variant: runtime
tags:
  - 2-alpine
  - 2.11-alpine
  - 2-alpine3.24
  - 2.11.1-alpine
  - 2.11-alpine3.24
  - 2.11.1-alpine3.24
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-08"
vars:
  FLAVORED_SUFFIX: ""
  NODEJS_MAJOR: "22"
  NODEJS_VERSION: 22.23.1-r0
  SEMVER_MAJOR_MINOR_VERSION: "2.11"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.11.1
  SUFFIX: ""
  VERSION: 2.11.1-r1
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - ca-certificates-bundle
    - nodejs-22=22.23.1-r0
    - postman-mcp=2.11.1-r1
    - tzdata
  builds:
    - name: server.json
      contents:
        packages:
          - bash
          - sed
      pipeline:
        - runs: |
            set -eux -o pipefail

            sed -i "s/_VERSION_/2.11.1/g" "${source.dir}/config/server.json"
      paths:
        - type: file
          path: ${source.dir}/config/server.json
          uid: 0
          gid: 0
          source: image/postman-mcp/config/server.json
      attestations:
        - predicate-type: https://modelcontextprotocol.io/server.json/v1
          source: ${source.dir}/config/server.json
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  NODE_ENV: production
paths:
  - type: symlink
    path: /app
    uid: 0
    gid: 0
    source: /usr/lib/nodejs/postman-mcp
annotations:
  org.opencontainers.image.description: A minimal Postman MCP Server image
  org.opencontainers.image.licenses: Apache-2.0
labels:
  io.modelcontextprotocol.server.name: com.postman/postman-mcp-server
entrypoint:
  - node
  - /app/dist/src/index.js
