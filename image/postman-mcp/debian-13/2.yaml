# syntax=dhi.io/build:2-debian13

name: Postman MCP Server 2.x
image: dhi.io/postman-mcp
variant: runtime
tags:
  - "2"
  - "2.11"
  - 2.11.1
  - 2-debian
  - 2-debian13
  - 2.11-debian
  - 2.11-debian13
  - 2.11.1-debian
  - 2.11.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-08"
vars:
  NODEJS_MAJOR: "22"
  NODEJS_VERSION: 22.23.1-0
  SEMVER_MAJOR_MINOR_VERSION: "2.11"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.11.1
  VERSION: 2.11.1-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - ca-certificates
    - libgomp1
    - libstdc++6
    - netbase
    - nodejs-22=22.23.1-0
    - postman-mcp=2.11.1-1
    - tzdata
  builds:
    - name: server.json
      contents:
        packages:
          - bash
          - sed
      pipeline:
        - runs: |
            set -eux -o pipefail

            sed -i "s/_VERSION_/2.11.1/g" "${source.dir}/config/server.json"
      paths:
        - type: file
          path: ${source.dir}/config/server.json
          uid: 0
          gid: 0
          source: image/postman-mcp/config/server.json
      attestations:
        - predicate-type: https://modelcontextprotocol.io/server.json/v1
          source: ${source.dir}/config/server.json
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  NODE_ENV: production
paths:
  - type: symlink
    path: /app
    uid: 0
    gid: 0
    source: /usr/lib/nodejs/postman-mcp
annotations:
  org.opencontainers.image.description: A minimal Postman MCP Server image
  org.opencontainers.image.licenses: Apache-2.0
labels:
  io.modelcontextprotocol.server.name: com.postman/postman-mcp-server
entrypoint:
  - node
  - /app/dist/src/index.js
