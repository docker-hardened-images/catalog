# syntax=dhi.io/build:2-debian13

name: Ruby 3.3.x (dev)
image: dhi.io/ruby
variant: dev
tags:
  - 3.3-dev
  - 3.3.11-dev
  - 3.3-debian13-dev
  - 3.3.11-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2023-12-25"
  end-of-life: "2027-03-31"
vars:
  BINUTILS_DIGEST: sha256:5333b3178ad52e503d8c44eb5a4073a039842ebc3403f6b6c6658a11c0b200e7
  BINUTILS_VERSION: "2.46"
  EXPAT_DIGEST: sha256:3f7e47c85e35abd2031652077771f838457f8762e6045d7cfdf5a68664d67310
  EXPAT_VERSION: 2.8.0
  GEM_HOME: /usr/local/bundle
  JSON_COMMIT_SHA: 54f8a878aebee090476a53c851c943128894be62
  RUST_DIGEST: sha256:c3316083a024b7fda826ffc5c0708cafbc32b4a7bd52292a197b7705b6debdaf
  RUST_VERSION: 1.95.0
  SEMVER_MAJOR_MINOR_VERSION: "3.3"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.3.11
  SHA256: 9116bb2e313203bd78cd3e8dc09284d34b2645f725877623a7185bf3807c8ca3
  VERSION: 3.3.11
contents:
  packages:
    - '!binutils'
    - '!binutils-aarch64-linux-gnu'
    - '!binutils-common'
    - '!binutils-x86-64-linux-gnu'
    - '!gawk'
    - '!libbinutils'
    - '!libctf-nobfd0'
    - '!libctf0'
    - '!libelogind0'
    - '!libexpat1'
    - '!libgprofng0'
    - '!libsframe1'
    - '!make-guile'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - build-essential
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - git
    - grep
    - libc-bin
    - libcrypt1
    - libjemalloc-dev
    - libjemalloc2
    - libyaml-0-2
    - libyaml-dev
    - make
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: ruby
      contents:
        packages:
          - autoconf
          - base-files
          - bash
          - binutils
          - bison
          - build-essential
          - coreutils
          - dpkg-dev
          - findutils
          - g++
          - gawk
          - gcc
          - grep
          - libc-bin
          - libc6-dev
          - libffi-dev
          - libgdbm-dev
          - libgmp-dev
          - libjemalloc-dev
          - libncurses-dev
          - libreadline-dev
          - libssl-dev
          - libyaml-dev
          - make
          - openssl
          - sed
          - zlib1g-dev
        files:
          - url: https://cache.ruby-lang.org/pub/ruby/3.3/ruby-3.3.11.tar.xz
            checksum: sha256:9116bb2e313203bd78cd3e8dc09284d34b2645f725877623a7185bf3807c8ca3
            path: ${source.dir}/ruby.tar.xz
            spdx:
              name: ruby
              version: 3.3.11
              packages:
                - name: ruby
                  purl: pkg:dhi/ruby@3.3.11
                  license: BSD-2-Clause
            uid: 0
            gid: 0
          - url: git+https://github.com/ruby/json.git#v2.19.2
            checksum: 54f8a878aebee090476a53c851c943128894be62
            path: ${source.dir}/json
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/rust:1.95.0-debian13@sha256:c3316083a024b7fda826ffc5c0708cafbc32b4a7bd52292a197b7705b6debdaf
            includes:
              - usr/local/bin/rustc
              - usr/local/lib
            uid: 0
            gid: 0
      pipeline:
        - name: unpack
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/src/ruby
            tar -xaf ruby.tar.xz -C /usr/src/ruby --strip-components=1
        - name: install
          runs: |
            set -eux -o pipefail

            # skip installing gem documentation with `gem install`/`gem update`
            mkdir -p /usr/local/etc
            echo 'gem: --no-document' >> /usr/local/etc/gemrc
            cd /usr/src/ruby

            autoconf

            gnuArch="$(dpkg-architecture --query DEB_BUILD_GNU_TYPE)"
            ./configure \
              --build="$gnuArch" \
              --disable-install-doc \
              --enable-shared \
              --enable-yjit \
              --with-jemalloc

            ncpus=$(getconf _NPROCESSORS_ONLN)
            ncpus=$((ncpus > 6 ? 6 : ncpus))

            make -j${ncpus}
            # make -j${ncpus} check test-bundle
            make install

            # ensure ruby binary is installed in /usr/local/bin
            [ "$(command -v ruby)" = '/usr/local/bin/ruby' ]

            ruby --version
            ruby -e 'puts "hello world"'
        - name: test-dev
          runs: |
            set -eux -o pipefail

            bundle --version
            bundler --version
            erb --version
            gem --version
            irb --version
            racc --version
            rake --version
            rbs --version
            rdbg --version
            rdoc --version
            ri --version
            typeprof --version

            # syntax_suggest is broken in ruby 3.2+
            # shellcheck disable=SC1083
            if [[ "$(ruby -v | awk '{print $2}')" != "3.2"* ]]; then
              syntax_suggest --version
            fi
      paths:
        - type: directory
          path: /tmp
          uid: 0
          gid: 0
      outputs:
        - source: /usr/local
          target: /usr/local
          uid: 0
          gid: 0
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/pkg-binutils:2.46-debian13@sha256:5333b3178ad52e503d8c44eb5a4073a039842ebc3403f6b6c6658a11c0b200e7
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
    - name: dhi.io/pkg-expat:2.8.0-debian13@sha256:3f7e47c85e35abd2031652077771f838457f8762e6045d7cfdf5a68664d67310
      includes:
        - usr/**
        - var/lib/dpkg/status.d
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  BUNDLE_APP_CONFIG: /usr/local/bundle
  BUNDLE_SILENCE_ROOT_WARNING: "true"
  DEBIAN_FRONTEND: noninteractive
  GEM_HOME: /usr/local/bundle
  LD_LIBRARY_PATH: /usr/local/lib:${LD_LIBRARY_PATH}
  PATH: /usr/local/bin:/usr/local/bundle/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  RUBY_VERSION: 3.3.11
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
paths:
  - type: directory
    path: /usr/local/bundle
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Ruby image
  org.opencontainers.image.licenses: BSD-2-Clause
cmd:
  - /bin/bash
