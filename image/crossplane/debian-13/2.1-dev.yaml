# syntax=dhi.io/build:2-debian13

name: Crossplane 2.1.x (dev)
image: dhi.io/crossplane
variant: dev
tags:
  - 2.1-dev
  - 2.1.6-dev
  - 2.1-debian-dev
  - 2.1-debian13-dev
  - 2.1.6-debian-dev
  - 2.1.6-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-11-05"
vars:
  COMMIT_SHA: 3507c92e9f0580c50d8949df8f38210282d3d063
  CROSSPLANE_MODULE_BASE: github.com/crossplane/crossplane/v2
  CROSSPLANE_VERSION_LDFLAG: github.com/crossplane/crossplane/v2/internal/version.version
  SEMVER_MAJOR_MINOR_VERSION: "2.1"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.1.6
  VERSION: 2.1.6
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: crossplane
      work-dir: /go/src/github.com/crossplane/crossplane
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - nix-bin
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/crossplane/crossplane.git#v2.1.6
            checksum: 3507c92e9f0580c50d8949df8f38210282d3d063
            path: /go/src/github.com/crossplane/crossplane
            spdx:
              name: crossplane
              version: 2.1.6
              packages:
                - name: crossplane
                  purl: pkg:golang/github.com/crossplane/crossplane/v2@2.1.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (2.1 only)
          uses: go/bump@v1
          with:
            deps:
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/google/go-containerregistry@v0.21.2
              - github.com/in-toto/in-toto-golang@v0.11.0
              - github.com/sigstore/timestamp-authority/v2@v2.0.6
            download: true
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/crossplane/crossplane/v2/internal/version.version=2.1.6
            output: ${target.dir}/usr/local/bin/crossplane
            packages: ./cmd/crossplane
            tidy: true
      outputs:
        - source: ${target.dir}/usr/local/bin/crossplane
          target: /usr/local/bin/crossplane
          uid: 0
          gid: 0
          mode: "0755"
        - source: /go/src/github.com/crossplane/crossplane/cluster/webhookconfigurations/usage.yaml
          target: /webhookconfigurations/usage.yaml
          uid: 0
          gid: 0
        - source: /go/src/github.com/crossplane/crossplane/cluster/crds
          target: /crds
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/crossplane
          target: /opt/docker/sbom/crossplane
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Crossplane image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/crossplane
