# syntax=dhi.io/build:2-debian13

name: CoreDNS 1.x (dev)
image: dhi.io/coredns
variant: dev
tags:
  - 1-dev
  - 1.14-dev
  - 1.14.6-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.14-debian-dev
  - 1.14-debian13-dev
  - 1.14.6-debian-dev
  - 1.14.6-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "1.14"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.14.6
  SUFFIX: -dev
  VERSION: 1.14.6-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coredns-dev=1.14.6-1
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /coredns
    uid: 0
    gid: 0
    source: /usr/bin/coredns
annotations:
  org.opencontainers.image.description: A minimal CoreDNS image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - coredns
ports:
  - 53/udp
