# syntax=dhi.io/build:2-debian13

name: CoreDNS 1.x
image: dhi.io/coredns
variant: runtime
tags:
  - "1"
  - "1.14"
  - 1.14.4
  - 1-debian
  - 1-debian13
  - 1.14-debian
  - 1.14-debian13
  - 1.14.4-debian
  - 1.14.4-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "1.14"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.14.4
  SUFFIX: ""
  VERSION: 1.14.4-2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - coredns=1.14.4-2
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /coredns
    uid: 0
    gid: 0
    source: /usr/bin/coredns
annotations:
  org.opencontainers.image.description: A minimal CoreDNS image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - coredns
ports:
  - 53/udp
