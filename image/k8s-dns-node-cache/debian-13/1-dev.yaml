# syntax=dhi.io/build:2-debian13

name: NodeLocal DNS Cache 1.x (dev)
image: dhi.io/k8s-dns-node-cache
variant: dev
tags:
  - 1-dev
  - 1.26-dev
  - 1.26.8-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.26-debian-dev
  - 1.26-debian13-dev
  - 1.26.8-debian-dev
  - 1.26.8-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-01-07"
vars:
  COMMIT_SHA: 9aa70b8f97dc751445a7370960cd45e411506003
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "1.26"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.26.8
  SUFFIX: -dev
  VERSION: 1.26.8-2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - iproute2
    - iptables
    - kubernetes-dns-node-cache-dev=1.26.8-2
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /usr/sbin/iptables
    uid: 0
    gid: 0
    source: iptables-nft
  - type: symlink
    path: /usr/sbin/ip6tables
    uid: 0
    gid: 0
    source: ip6tables-nft
  - type: symlink
    path: /node-cache
    uid: 0
    gid: 0
    source: /usr/bin/node-cache
annotations:
  org.opencontainers.image.description: A minimal NodeLocal DNS Cache image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /node-cache
ports:
  - 53/tcp
  - 53/udp
