metadata:
  display-name: Selenium Node Chromium
  short-description: Selenium Grid worker node running Chromium with chromedriver, the arm64-capable browser node for Selenium Grid 4.x. Registers with a Selenium Hub and serves WebDriver sessions backed by the open-source Chromium browser.
  featured: false
  home-url: https://selenium.dev
  categories:
    - developer-tools
  included-tools:
    - name: selenium-server
      description: Selenium Grid 4.x server jar running in node mode (registers with a Selenium Hub).
    - name: chromium
      description: Open-source Chromium browser, the arm64-capable counterpart to Google Chrome.
    - name: chromedriver
      description: WebDriver implementation for Chromium, spawned by selenium-server in response to /session requests.
