# syntax=dhi.io/build:2-debian13

name: csi-resizer 2.2.x
image: dhi.io/csi-resizer
variant: runtime
tags:
  - "2"
  - "2.2"
  - 2.2.0
  - 2-debian
  - 2-debian13
  - 2.2-debian
  - 2.2-debian13
  - 2.2.0-debian
  - 2.2.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 314a8de697f801a368042d808a0834bebbfd97d1
  SEMVER_MAJOR_MINOR_VERSION: "2.2"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.2.0
  VERSION: 2.2.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: csi-resizer
      work-dir: /go/src/github.com/kubernetes-csi/external-resizer
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kubernetes-csi/external-resizer.git#v2.2.0
            checksum: 314a8de697f801a368042d808a0834bebbfd97d1
            path: /go/src/github.com/kubernetes-csi/external-resizer
            spdx:
              name: csi-resizer
              version: 2.2.0
              packages:
                - name: csi-resizer
                  purl: pkg:golang/github.com/kubernetes-csi/external-resizer@2.2.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: remove vendor directory
          runs: |
            set -eux -o pipefail

            rm -rf vendor
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X main.version=2.2.0
            output: ${target.dir}/usr/local/bin/csi-resizer
            packages: ./cmd/csi-resizer
      outputs:
        - source: ${target.dir}/usr/local/bin/csi-resizer
          target: /usr/local/bin/csi-resizer
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/csi-resizer
          target: /opt/docker/sbom/csi-resizer
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal csi-resizer image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/csi-resizer
