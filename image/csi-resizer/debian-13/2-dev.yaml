# syntax=dhi.io/build:2-debian13

name: csi-resizer 2.2.x (dev)
image: dhi.io/csi-resizer
variant: dev
tags:
  - 2-dev
  - 2.2-dev
  - 2.2.1-dev
  - 2-debian-dev
  - 2-debian13-dev
  - 2.2-debian-dev
  - 2.2-debian13-dev
  - 2.2.1-debian-dev
  - 2.2.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 32c003dbad0ec50d449b69cdddc5a7ba07a80cb8
  SEMVER_MAJOR_MINOR_VERSION: "2.2"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.2.1
  VERSION: 2.2.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: csi-resizer
      work-dir: /go/src/github.com/kubernetes-csi/external-resizer
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kubernetes-csi/external-resizer.git#v2.2.1
            checksum: 32c003dbad0ec50d449b69cdddc5a7ba07a80cb8
            path: /go/src/github.com/kubernetes-csi/external-resizer
            spdx:
              name: csi-resizer
              version: 2.2.1
              packages:
                - name: csi-resizer
                  purl: pkg:golang/github.com/kubernetes-csi/external-resizer@2.2.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: remove vendor directory
          runs: |
            set -eux -o pipefail

            rm -rf vendor
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X main.version=2.2.1
            output: ${target.dir}/usr/local/bin/csi-resizer
            packages: ./cmd/csi-resizer
      outputs:
        - source: ${target.dir}/usr/local/bin/csi-resizer
          target: /usr/local/bin/csi-resizer
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/csi-resizer
          target: /opt/docker/sbom/csi-resizer
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal csi-resizer image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/csi-resizer
