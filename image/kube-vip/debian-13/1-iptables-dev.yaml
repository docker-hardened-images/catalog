# syntax=dhi.io/build:2-debian13

name: kube-vip 1.x (iptables, dev)
image: dhi.io/kube-vip
variant: dev
flavor: iptables
tags:
  - 1-iptables-dev
  - 1.2-iptables-dev
  - 1.2.0-iptables-dev
  - 1-debian-iptables-dev
  - 1-debian13-iptables-dev
  - 1.2-debian-iptables-dev
  - 1.2-debian13-iptables-dev
  - 1.2.0-debian-iptables-dev
  - 1.2.0-debian13-iptables-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: e2a0e815fe3e0727896464ed184f649785f5dbb7
  SEMVER_MAJOR_MINOR_VERSION: "1.2"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.2.0
  VERSION: 1.2.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - iptables
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: kube-vip
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - libcap2-bin
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kube-vip/kube-vip.git#v1.2.0
            checksum: e2a0e815fe3e0727896464ed184f649785f5dbb7
            path: /go/src/github.com/kube-vip/kube-vip
            spdx:
              name: kube-vip
              version: 1.2.0
              packages:
                - name: kube-vip
                  purl: pkg:golang/github.com/kube-vip/kube-vip@1.2.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          work-dir: /go/src/github.com/kube-vip/kube-vip
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          work-dir: /go/src/github.com/kube-vip/kube-vip
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -v ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/kube-vip/kube-vip
          with:
            ldflags:
              - -X main.Version=v1.2.0
              - -X main.Build=e2a0e815fe3e0727896464ed184f649785f5dbb7
            output: ${target.dir}/usr/bin/kube-vip
        - name: setcap
          runs: |
            set -eux -o pipefail

            setcap 'cap_net_admin,cap_net_raw+ep' "${target.dir}/usr/bin/kube-vip"
      outputs:
        - source: ${target.dir}/usr/bin/kube-vip
          target: /usr/bin/kube-vip
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kube-vip
          target: /opt/docker/sbom/kube-vip
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal kube-vip image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/kube-vip
