# syntax=dhi.io/build:2-debian13

name: Hyperledger Fabric Orderer 3.x
image: dhi.io/hyperledger-fabric-orderer
variant: runtime
tags:
  - "3"
  - "3.1"
  - 3.1.5
  - 3-debian
  - 3-debian13
  - 3.1-debian
  - 3.1-debian13
  - 3.1.5-debian
  - 3.1.5-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 86c1172bec37e6590c6b1ae6f847833df48d65fc
  SEMVER_MAJOR_MINOR_VERSION: "3.1"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.1.5
  VERSION: 3.1.5
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: hyperledger-fabric-orderer
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/hyperledger/fabric.git#v3.1.5
            checksum: 86c1172bec37e6590c6b1ae6f847833df48d65fc
            path: /go/src/github.com/hyperledger/fabric
            spdx:
              name: hyperledger-fabric-orderer
              version: 3.1.5
              packages:
                - name: hyperledger-fabric-orderer
                  purl: pkg:golang/github.com/hyperledger/fabric@3.1.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/hyperledger/fabric
          with:
            deps: []
        - name: test
          work-dir: /go/src/github.com/hyperledger/fabric
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test ./cmd/orderer
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/hyperledger/fabric/cmd/orderer
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X github.com/hyperledger/fabric/common/metadata.Version=3.1.5
            output: ${target.dir}/usr/local/bin/orderer
        - name: copy configs
          work-dir: /go/src/github.com/hyperledger/fabric/sampleconfig
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/etc/hyperledger/fabric
            cp orderer.yaml configtx.yaml ${target.dir}/etc/hyperledger/fabric
      outputs:
        - source: ${target.dir}/usr/local/bin/orderer
          target: /usr/local/bin/orderer
          uid: 0
          gid: 0
        - source: /go/src/github.com/hyperledger/fabric/sampleconfig/orderer.yaml
          target: /etc/hyperledger/fabric/orderer.yaml
          uid: 0
          gid: 0
          mode: "0644"
        - source: /go/src/github.com/hyperledger/fabric/sampleconfig/configtx.yaml
          target: /etc/hyperledger/fabric/configtx.yaml
          uid: 0
          gid: 0
          mode: "0644"
        - source: /opt/docker/sbom/hyperledger-fabric-orderer
          target: /opt/docker/sbom/hyperledger-fabric-orderer
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /var/hyperledger/production/orderer
    uid: 65532
    gid: 65532
annotations:
  org.opencontainers.image.description: A minimal Hyperledger Fabric Orderer image
  org.opencontainers.image.licenses: Apache-2.0
cmd:
  - /usr/local/bin/orderer
  - start
ports:
  - 7050/tcp
