  BASE_TAG: 20250419-debian13
  COMMIT_SHA: b0f4742ff99aadd559493b887b071c1fa4e92092
  GOLANG_REFERENCE: dhi/golang:1.26.2-debian13-dev@sha256:086c893153f92793f3a1541793cd4a8e8b23bfd4ccaf70c8f4261f496080fb0e
  SEMVER_MAJOR_MINOR_VERSION: "1.7"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.7.2
  VERSION: 1.7.2
contents:
  packages:
    - '!base-files'
  builds:
    - name: virt-controller
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:086c893153f92793f3a1541793cd4a8e8b23bfd4ccaf70c8f4261f496080fb0e
      work-dir: /go/src/kubevirt.io/kubevirt
      contents:
        files:
          - url: git+https://github.com/kubevirt/kubevirt.git#v1.7.2
            checksum: b0f4742ff99aadd559493b887b071c1fa4e92092
            path: /go/src/kubevirt.io/kubevirt
            spdx:
              name: virt-controller
              version: 1.7.2
              packages:
                - name: virt-controller
                  purl: pkg:golang/kubevirt.io/kubevirt@1.7.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch no-op
          uses: go/bump@v1
          environment:
            GOWORK: "off"
          caches:
            - path: /go/pkg/mod
          with:
            deps: []
            download: false
        - name: manual patch vulnerable Go dependencies
          privileged: true
          environment:
            GODEBUG: ""
            GOFIPS140: ""
          caches:
            - path: /go/pkg/mod
          runs: |
            set -eux -o pipefail

            go get golang.org/x/crypto@v0.47.0               # CVE-2025-47913, CVE-2025-22869
            go get github.com/opencontainers/selinux@v1.13.0 # CVE-2025-52881
            go get golang.org/x/oauth2@v0.27.0               # CVE-2025-22868
            go get golang.org/x/net@v0.45.0                  # CVE-2025-58190, CVE-2025-47911
            go get google.golang.org/grpc@v1.79.3            # CVE-2026-33186

            if [ "1.7.2" = "1.8.1" ]; then
              go get github.com/opencontainers/runc@v1.2.8 # CVE-2025-52881, CVE-2025-52565, CVE-2025-31133
            fi

            go mod tidy
            # requires manual patch due to go/bump not supporting GOWORK=true (uses go mod vendor)
            if [ -f go.work ]; then
              go work vendor
            else
              go mod vendor
            fi
        - name: test
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              # Some unit tests will actually try to use X25519 which is not allowed in FIPS mode
              export GODEBUG=fips140=on
            fi

            # -vet=off: virt-controller v1.5.x has non-constant format strings caught by Go 1.26's linting
            CGO_ENABLED=0 go test -vet=off ./cmd/virt-controller/... ./pkg/virt-controller/...
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X kubevirt.io/client-go/version.gitVersion=v1.7.2
              - -X kubevirt.io/client-go/version.gitCommit=b0f4742ff99aadd559493b887b071c1fa4e92092
            output: ${target.dir}/usr/local/bin/virt-controller
            packages: ./cmd/virt-controller
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/virt-controller/patch
      outputs:
        - source: ${target.dir}/usr/local/bin/virt-controller
          target: /usr/local/bin/virt-controller
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/virt-controller
          target: /opt/docker/sbom/virt-controller
          uid: 0
          gid: 0
