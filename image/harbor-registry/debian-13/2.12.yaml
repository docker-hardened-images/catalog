# syntax=dhi.io/build:2-debian13

name: Harbor Registry 2.12.x
image: dhi.io/harbor-registry
variant: runtime
tags:
  - "2.12"
  - 2.12.4
  - 2.12-debian13
  - 2.12.4-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-01-15"
vars:
  COMMIT_SHA: 6b4981d4dd46a20481be5a3a7cdf435bc20f4dcb
  GOLANG_REFERENCE: dhi/golang:1.26.2-debian13-dev@sha256:f23dec55948a320ec1663d6d40d7fd052fcf7b2ecb43c3ecdf1900843403d301
  REGISTRY_COMMIT_SHA: 4772604ae973031ab32dd9805a4bccf61d94909f
  REGISTRY_DISTRIBUTION_VERSION: 2.8.3
  REGISTRY_SRC_TAG: v2.8.3
  REGISTRYVERSION: v2.8.3-patch-redis
  SEMVER_MAJOR_MINOR_VERSION: "2.12"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.12.4
  VERSION: 2.12.4
contents:
  packages:
    - '!base-files'
  builds:
    - name: harbor-registry
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:f23dec55948a320ec1663d6d40d7fd052fcf7b2ecb43c3ecdf1900843403d301
      work-dir: /go/src/github.com/docker/distribution
      contents:
        files:
          - url: git+https://github.com/goharbor/distribution.git#v2.8.3
            checksum: 4772604ae973031ab32dd9805a4bccf61d94909f
            path: /go/src/github.com/docker/distribution
            spdx:
              name: harbor-registry
              version: v2.8.3-patch-redis
              packages:
                - name: harbor-registry
                  purl: pkg:golang/github.com/goharbor/distribution@v2.8.3-patch-redis
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build
          uses: go/build@v1
          environment:
            GO111MODULE: "off"
          with:
            ldflags:
              - -s
              - -w
              - -X github.com/docker/distribution/version.Version=v2.8.3-patch-redis
              - -X github.com/docker/distribution/version.Package=github.com/docker/distribution
            output: ${target.dir}/usr/local/bin/registry
            packages: ./cmd/registry
      outputs:
        - source: ${target.dir}/usr/local/bin/registry
          target: /usr/local/bin/registry
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/harbor-registry
          target: /opt/docker/sbom/harbor-registry
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /etc/registry
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /storage
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Harbor Registry image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/registry
cmd:
  - serve
  - /etc/registry/config.yml
ports:
  - 5000/tcp
  - 5443/tcp
