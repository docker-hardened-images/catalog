# syntax=dhi.io/build:2-debian13

name: TruffleHog 3.x (dev)
image: dhi.io/trufflehog
variant: dev
tags:
  - 3-dev
  - 3.95-dev
  - 3.95.9-dev
  - 3-debian-dev
  - 3-debian13-dev
  - 3.95-debian-dev
  - 3.95-debian13-dev
  - 3.95.9-debian-dev
  - 3.95.9-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "3.95"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.95.9
  SUFFIX: -dev
  VERSION: 3.95.9-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - trufflehog-dev=3.95.9-1
    - tzdata
    - util-linux
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: file
    path: /root/.git/config
    content: |
      [safe]
          directory = *
    uid: 0
    gid: 0
    mode: "0644"
annotations:
  org.opencontainers.image.description: A minimal TruffleHog image for finding credentials in git repositories, filesystems, and more
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - trufflehog
