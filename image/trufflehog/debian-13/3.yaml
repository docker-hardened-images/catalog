# syntax=dhi.io/build:2-debian13

name: TruffleHog 3.x
image: dhi.io/trufflehog
variant: runtime
tags:
  - "3"
  - "3.95"
  - 3.95.6
  - 3-debian
  - 3-debian13
  - 3.95-debian
  - 3.95-debian13
  - 3.95.6-debian
  - 3.95.6-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "3.95"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.95.6
  SUFFIX: ""
  VERSION: 3.95.6-0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - trufflehog=3.95.6-0
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: file
    path: /home/nonroot/.git/config
    content: |
      [safe]
          directory = *
    uid: 65532
    gid: 65532
    mode: "0644"
annotations:
  org.opencontainers.image.description: A minimal TruffleHog image for finding credentials in git repositories, filesystems, and more
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - trufflehog
