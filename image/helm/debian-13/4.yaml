# syntax=dhi.io/build:2-debian13

name: Helm 4.x
image: dhi.io/helm
variant: runtime
tags:
  - "4"
  - "4.2"
  - 4.2.2
  - 4-debian
  - 4-debian13
  - 4.2-debian
  - 4.2-debian13
  - 4.2.2-debian
  - 4.2.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-14"
vars:
  COMMIT_SHA: b05881cf967a5a09e19866799d0edfd40675803a
  SEMVER_MAJOR_MINOR_VERSION: "4.2"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.2.2
  VERSION: 4.2.2
  YQ_REFERENCE: dhi/pkg-go-yq:4.53.3-debian13@sha256:9f1556d67c59de84a8ffc9bcef16db35007f5e6da29fc05b9516aa9f6c7e51e2
  YQ_VERSION: 4.53.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: helm
      work-dir: /go/src/github.com/helm/helm
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - sed
          - bash
          - ca-certificates-bundle
          - coreutils
          - findutils
          - git
          - golang-1.26
          - mawk
        files:
          - url: git+https://github.com/helm/helm.git#v4.2.2
            checksum: b05881cf967a5a09e19866799d0edfd40675803a
            path: /go/src/github.com/helm/helm
            spdx:
              name: helm
              version: 4.2.2
              packages:
                - name: helm
                  purl: pkg:golang/helm.sh/helm/v3@4.2.2
                  license: Apache-2.0
            uid: 65532
            gid: 65532
      pipeline:
        - name: update go dependencies (4 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "4" = "4" ]; then
              # v4 tests that fail in the builder (root, no make, no local registry):
              # - TestRuntimeExtismV1InvokePlugin: compiles testdata plugins with make
              # - TestOCIPusher_Push_ChartOperations: chmod 0000 subtest expects "permission
              #   denied" as nonroot; root reads the file and hits localhost:5000 instead
              CGO_ENABLED=0 go test ./... -skip '^(TestRuntimeExtismV1InvokePlugin|TestOCIPusher_Push_ChartOperations)$'
            else
              CGO_ENABLED=0 go test ./...
            fi
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            ldflags:
              - -X helm.sh/helm/v4/internal/version.version=4.2.2
              - -X helm.sh/helm/v4/internal/version.gitCommit=b05881cf967a5a09e19866799d0edfd40675803a
              - -X helm.sh/helm/v4/internal/version.gitTreeState=clean
              - -X helm.sh/helm/v4/internal/version.metadata=
            output: ${target.dir}/usr/local/bin/helm
            packages: ./cmd/helm
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/helm
          target: /opt/docker/sbom/helm
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /workspace
paths:
  - type: directory
    path: /workspace
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Helm image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - helm
cmd:
  - help
