# syntax=dhi.io/build:2-debian13

name: Helm 4.x
image: dhi.io/helm
variant: runtime
tags:
  - "4"
  - "4.2"
  - 4.2.3
  - 4-debian
  - 4-debian13
  - 4.2-debian
  - 4.2-debian13
  - 4.2.3-debian
  - 4.2.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-14"
vars:
  COMMIT_SHA: 43e8b7feece8beb0fcba47059ec9b522fd929a64
  SEMVER_MAJOR_MINOR_VERSION: "4.2"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.2.3
  VERSION: 4.2.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
    - yq-go
  builds:
    - name: helm
      work-dir: /go/src/github.com/helm/helm
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - sed
          - bash
          - ca-certificates-bundle
          - coreutils
          - findutils
          - git
          - golang-1.26
          - mawk
        files:
          - url: git+https://github.com/helm/helm.git#v4.2.3
            checksum: 43e8b7feece8beb0fcba47059ec9b522fd929a64
            path: /go/src/github.com/helm/helm
            spdx:
              name: helm
              version: 4.2.3
              packages:
                - name: helm
                  purl: pkg:golang/helm.sh/helm/v4@4.2.3
                  license: Apache-2.0
            uid: 65532
            gid: 65532
      pipeline:
        - name: update go dependencies (4 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/net@v0.56.0
              - oras.land/oras-go/v2@v2.6.2
            download: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "4" = "4" ]; then
              CGO_ENABLED=0 go test ./... -skip '^(TestRuntimeExtismV1InvokePlugin|TestOCIPusher_Push_ChartOperations)$'
            else
              CGO_ENABLED=0 go test ./...
            fi
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            ldflags:
              - -X helm.sh/helm/v4/internal/version.version=4.2.3
              - -X helm.sh/helm/v4/internal/version.gitCommit=43e8b7feece8beb0fcba47059ec9b522fd929a64
              - -X helm.sh/helm/v4/internal/version.gitTreeState=clean
              - -X helm.sh/helm/v4/internal/version.metadata=
            output: ${target.dir}/usr/local/bin/helm
            packages: ./cmd/helm
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/helm
          target: /opt/docker/sbom/helm
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /workspace
paths:
  - type: directory
    path: /workspace
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Helm image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - helm
cmd:
  - help
