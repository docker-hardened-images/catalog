name: Helm 4.x
image: dhi.io/helm
variant: runtime
tags:
  - "4"
  - "4.2"
  - 4.2.2
  - 4-debian
  - 4-debian13
  - 4.2-debian
  - 4.2-debian13
  - 4.2.2-debian
  - 4.2.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-14"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: b05881cf967a5a09e19866799d0edfd40675803a
  GOLANG_REFERENCE: dhi/golang:1.26.4-debian13-dev@sha256:17e7e33c3c31ec622fe56db4e7f20babf8d4829f41a8e6657da5d06b348a5577
  SEMVER_MAJOR_MINOR_VERSION: "4.2"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.2.2
  VERSION: 4.2.2
  YQ_REFERENCE: dhi/pkg-go-yq:4.53.3-debian13@sha256:71e4e1bb3ff331c65e76445a7a43a4acc37e3b836527dcfdd19f5ef8d1ced717
  YQ_VERSION: 4.53.3
contents:
  packages:
    - '!base-files'
  builds:
    - name: helm
      uses: dhi.io/golang:1.26.4-debian13-dev@sha256:17e7e33c3c31ec622fe56db4e7f20babf8d4829f41a8e6657da5d06b348a5577
      work-dir: /go/src/github.com/helm/helm
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - sed
        files:
          - url: git+https://github.com/helm/helm.git#v4.2.2
            checksum: b05881cf967a5a09e19866799d0edfd40675803a
            path: /go/src/github.com/helm/helm
            spdx:
              name: helm
              version: 4.2.2
              packages:
                - name: helm
                  purl: pkg:golang/helm.sh/helm/v3@4.2.2
                  license: Apache-2.0
            uid: 65532
            gid: 65532
      pipeline:
        - name: update go dependencies (4 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "4" = "4" ]; then
              # v4 tests that fail in the builder (root, no make, no local registry):
              # - TestRuntimeExtismV1InvokePlugin: compiles testdata plugins with make
              # - TestOCIPusher_Push_ChartOperations: chmod 0000 subtest expects "permission
              #   denied" as nonroot; root reads the file and hits localhost:5000 instead
              CGO_ENABLED=0 go test ./... -skip '^(TestRuntimeExtismV1InvokePlugin|TestOCIPusher_Push_ChartOperations)$'
            else
              CGO_ENABLED=0 go test ./...
            fi
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            ldflags:
              - -X helm.sh/helm/v4/internal/version.version=4.2.2
              - -X helm.sh/helm/v4/internal/version.gitCommit=b05881cf967a5a09e19866799d0edfd40675803a
              - -X helm.sh/helm/v4/internal/version.gitTreeState=clean
              - -X helm.sh/helm/v4/internal/version.metadata=
            output: ${target.dir}/usr/local/bin/helm
            packages: ./cmd/helm
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/helm
          target: /opt/docker/sbom/helm
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /workspace
paths:
  - type: directory
    path: /workspace
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Helm image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - helm
cmd:
  - help
