# syntax=dhi.io/build:2-debian13

name: Helm 3.x (dev)
image: dhi.io/helm
variant: dev
tags:
  - 3-dev
  - 3.21-dev
  - 3.21.2-dev
  - 3-debian-dev
  - 3-debian13-dev
  - 3.21-debian-dev
  - 3.21-debian13-dev
  - 3.21.2-debian-dev
  - 3.21.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-12"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 125963406833fe0525be91f46c8b5b0f22fb9e32
  GOLANG_REFERENCE: dhi/golang:1.26.4-debian13-dev@sha256:c02293a491c454b4fa27653b9d1ff8991b7355ce7b71a9ff6bc6b827e3eb9379
  SEMVER_MAJOR_MINOR_VERSION: "3.21"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.21.2
  VERSION: 3.21.2
  YQ_REFERENCE: dhi/pkg-go-yq:4.53.3-debian13@sha256:7a4cf753ddf9b539da69b1eaa4d0a7bd022be02a4988eaecd3294744d5d4210e
  YQ_VERSION: 4.53.3
contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: helm
      uses: dhi.io/golang:1.26.4-debian13-dev@sha256:c02293a491c454b4fa27653b9d1ff8991b7355ce7b71a9ff6bc6b827e3eb9379
      work-dir: /go/src/github.com/helm/helm
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - sed
        files:
          - url: git+https://github.com/helm/helm.git#v3.21.2
            checksum: 125963406833fe0525be91f46c8b5b0f22fb9e32
            path: /go/src/github.com/helm/helm
            spdx:
              name: helm
              version: 3.21.2
              packages:
                - name: helm
                  purl: pkg:golang/helm.sh/helm/v3@3.21.2
                  license: Apache-2.0
            uid: 65532
            gid: 65532
      pipeline:
        - name: update go dependencies (3 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - github.com/containerd/containerd@v1.7.32
            download: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "3" = "4" ]; then
              # v4 tests that fail in the builder (root, no make, no local registry):
              # - TestRuntimeExtismV1InvokePlugin: compiles testdata plugins with make
              # - TestOCIPusher_Push_ChartOperations: chmod 0000 subtest expects "permission
              #   denied" as nonroot; root reads the file and hits localhost:5000 instead
              CGO_ENABLED=0 go test ./... -skip '^(TestRuntimeExtismV1InvokePlugin|TestOCIPusher_Push_ChartOperations)$'
            else
              CGO_ENABLED=0 go test ./...
            fi
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            ldflags:
              - -X helm.sh/helm/v3/internal/version.version=3.21.2
              - -X helm.sh/helm/v3/internal/version.gitCommit=125963406833fe0525be91f46c8b5b0f22fb9e32
              - -X helm.sh/helm/v3/internal/version.gitTreeState=clean
              - -X helm.sh/helm/v3/internal/version.metadata=
            output: ${target.dir}/usr/local/bin/helm
            packages: ./cmd/helm
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/helm
          target: /opt/docker/sbom/helm
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/pkg-go-yq:4.53.3-debian13@sha256:7a4cf753ddf9b539da69b1eaa4d0a7bd022be02a4988eaecd3294744d5d4210e
      includes:
        - opt/docker/sbom/yq
        - usr/local/bin/yq
      uid: 0
      gid: 0
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /workspace
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /workspace
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Helm image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - helm
cmd:
  - help
