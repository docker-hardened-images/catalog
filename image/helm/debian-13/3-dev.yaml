# syntax=dhi.io/build:2-debian13

name: Helm 3.x (dev)
image: dhi.io/helm
variant: dev
tags:
  - 3-dev
  - 3.21-dev
  - 3.21.2-dev
  - 3-debian-dev
  - 3-debian13-dev
  - 3.21-debian-dev
  - 3.21-debian13-dev
  - 3.21.2-debian-dev
  - 3.21.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-12"
vars:
  COMMIT_SHA: 125963406833fe0525be91f46c8b5b0f22fb9e32
  SEMVER_MAJOR_MINOR_VERSION: "3.21"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.21.2
  VERSION: 3.21.2
  YQ_REFERENCE: dhi/pkg-go-yq:4.53.3-debian13@sha256:898b400d0eb7046c47a496d3b75b2b3c0d263f98f5827bc1bb6e3c325181295e
  YQ_VERSION: 4.53.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: helm
      work-dir: /go/src/github.com/helm/helm
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - sed
          - bash
          - ca-certificates-bundle
          - coreutils
          - findutils
          - git
          - golang-1.26
          - mawk
        files:
          - url: git+https://github.com/helm/helm.git#v3.21.2
            checksum: 125963406833fe0525be91f46c8b5b0f22fb9e32
            path: /go/src/github.com/helm/helm
            spdx:
              name: helm
              version: 3.21.2
              packages:
                - name: helm
                  purl: pkg:golang/helm.sh/helm/v3@3.21.2
                  license: Apache-2.0
            uid: 65532
            gid: 65532
      pipeline:
        - name: update go dependencies (3 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - github.com/containerd/containerd@v1.7.33
            download: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "3" = "4" ]; then
              # v4 tests that fail in the builder (root, no make, no local registry):
              # - TestRuntimeExtismV1InvokePlugin: compiles testdata plugins with make
              # - TestOCIPusher_Push_ChartOperations: chmod 0000 subtest expects "permission
              #   denied" as nonroot; root reads the file and hits localhost:5000 instead
              CGO_ENABLED=0 go test ./... -skip '^(TestRuntimeExtismV1InvokePlugin|TestOCIPusher_Push_ChartOperations)$'
            else
              CGO_ENABLED=0 go test ./...
            fi
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            ldflags:
              - -X helm.sh/helm/v3/internal/version.version=3.21.2
              - -X helm.sh/helm/v3/internal/version.gitCommit=125963406833fe0525be91f46c8b5b0f22fb9e32
              - -X helm.sh/helm/v3/internal/version.gitTreeState=clean
              - -X helm.sh/helm/v3/internal/version.metadata=
            output: ${target.dir}/usr/local/bin/helm
            packages: ./cmd/helm
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/helm
          target: /opt/docker/sbom/helm
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/pkg-go-yq:4.53.3-debian13@sha256:898b400d0eb7046c47a496d3b75b2b3c0d263f98f5827bc1bb6e3c325181295e
      includes:
        - opt/docker/sbom/go-yq
        - usr/local/bin/yq
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /workspace
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /workspace
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Helm image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - helm
cmd:
  - help
