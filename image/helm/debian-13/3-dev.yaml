# syntax=dhi.io/build:2-debian13

name: Helm 3.x (dev)
image: dhi.io/helm
variant: dev
tags:
  - 3-dev
  - 3.21-dev
  - 3.21.3-dev
  - 3-debian-dev
  - 3-debian13-dev
  - 3.21-debian-dev
  - 3.21-debian13-dev
  - 3.21.3-debian-dev
  - 3.21.3-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-12"
vars:
  COMMIT_SHA: 1ad6e68924fdf6fb0c7dcef8e9e1dfc0f36eaed6
  SEMVER_MAJOR_MINOR_VERSION: "3.21"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.21.3
  VERSION: 3.21.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
    - yq-go
  builds:
    - name: helm
      work-dir: /go/src/github.com/helm/helm
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - sed
          - bash
          - ca-certificates-bundle
          - coreutils
          - findutils
          - git
          - golang-1.26
          - mawk
        files:
          - url: git+https://github.com/helm/helm.git#v3.21.3
            checksum: 1ad6e68924fdf6fb0c7dcef8e9e1dfc0f36eaed6
            path: /go/src/github.com/helm/helm
            spdx:
              name: helm
              version: 3.21.3
              packages:
                - name: helm
                  purl: pkg:golang/helm.sh/helm/v3@3.21.3
                  license: Apache-2.0
            uid: 65532
            gid: 65532
      pipeline:
        - name: update go dependencies (3 only)
          uses: go/bump@v2
          with:
            deps:
              - oras.land/oras-go/v2@v2.6.2
            download: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "3" = "4" ]; then
              CGO_ENABLED=0 go test ./... -skip '^(TestRuntimeExtismV1InvokePlugin|TestOCIPusher_Push_ChartOperations)$'
            else
              CGO_ENABLED=0 go test ./...
            fi
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            ldflags:
              - -X helm.sh/helm/v3/internal/version.version=3.21.3
              - -X helm.sh/helm/v3/internal/version.gitCommit=1ad6e68924fdf6fb0c7dcef8e9e1dfc0f36eaed6
              - -X helm.sh/helm/v3/internal/version.gitTreeState=clean
              - -X helm.sh/helm/v3/internal/version.metadata=
            output: ${target.dir}/usr/local/bin/helm
            packages: ./cmd/helm
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/helm
          target: /opt/docker/sbom/helm
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /workspace
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /workspace
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Helm image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - helm
cmd:
  - help
