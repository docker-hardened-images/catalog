    - ca-certificates
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: opencost
      work-dir: /go/src/github.com/opencost/opencost
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/opencost/opencost.git#v1.120.4
            checksum: 1741baaf3682445acba7dfd28c5c5a2a01d4006b
            path: /go/src/github.com/opencost/opencost
            spdx:
              name: opencost
              version: 1.120.4
              packages:
