                  purl: pkg:golang/github.com/opencost/opencost@1.120.4
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch (1 only)
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -v ./...
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/opencost/opencost/core/pkg/version.Version=1.120.4
              - -X github.com/opencost/opencost/core/pkg/version.GitCommit=1741baaf3682445acba7dfd28c5c5a2a01d4006b
            output: ${target.dir}/go/bin/app
            packages: ./cmd/costmodel
