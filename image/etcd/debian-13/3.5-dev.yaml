# syntax=dhi.io/build:2-debian13

name: etcd 3.5.x (dev)
image: dhi.io/etcd
variant: dev
tags:
  - 3.5-dev
  - 3.5.32-dev
  - 3.5-debian-dev
  - 3.5-debian13-dev
  - 3.5.32-debian-dev
  - 3.5.32-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2021-06-15"
vars:
  COMMIT_SHA: 32c8992df2e62e8a99decde1e7abcb3cc40cb5e6
  SEMVER_MAJOR_MINOR_VERSION: "3.5"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.5.32
  VERSION: 3.5.32
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: etcd
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - ca-certificates
          - protobuf-compiler
          - tar
          - xz-utils
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/etcd-io/etcd.git#v3.5.32
            checksum: 32c8992df2e62e8a99decde1e7abcb3cc40cb5e6
            path: /go/src/github.com/etcd-io/etcd
            spdx:
              name: etcd
              version: 3.5.32
              packages:
                - name: etcd
                  purl: pkg:golang/github.com/etcd-io/etcd@3.5.32
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/etcd-io/etcd/server
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - go.opentelemetry.io/otel@v1.43.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.81.0
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/etcd-io/etcd/server
          with:
            cgo_enabled: 0
            ldflags:
              - -X go.etcd.io/etcd/api/v3/version.GitSHA=32c8992df2e62e8a99decde1e7abcb3cc40cb5e6
            output: ${target.dir}/usr/local/bin/etcd
            packages: .
        - name: update etcdutl go dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/etcd-io/etcd/etcdutl
          with:
            deps:
              - google.golang.org/grpc@v1.81.0
            download: true
        - name: update etcdctl go dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/etcd-io/etcd/etcdctl
          with:
            deps:
              - google.golang.org/grpc@v1.81.0
            download: true
        - name: build etcdutl
          uses: go/build@v1
          work-dir: /go/src/github.com/etcd-io/etcd/etcdutl
          with:
            cgo_enabled: 0
            ldflags:
              - -X go.etcd.io/etcd/api/v3/version.GitSHA=32c8992df2e62e8a99decde1e7abcb3cc40cb5e6
            output: ${target.dir}/usr/local/bin/etcdutl
            packages: .
        - name: build etcdctl
          uses: go/build@v1
          work-dir: /go/src/github.com/etcd-io/etcd/etcdctl
          with:
            cgo_enabled: 0
            ldflags:
              - -X go.etcd.io/etcd/api/v3/version.GitSHA=32c8992df2e62e8a99decde1e7abcb3cc40cb5e6
            output: ${target.dir}/usr/local/bin/etcdctl
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/etcd
          target: /opt/docker/sbom/etcd
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: etcd
      uid: 100
      gid: 101
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: etcd
      gid: 101
      members:
        - etcd
        - nonroot
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /var/lib/etcd
environment:
  DEBIAN_FRONTEND: noninteractive
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
paths:
  - type: directory
    path: /var/lib/etcd
    uid: 100
    gid: 101
    mode: "1770"
annotations:
  org.opencontainers.image.description: A minimal and secure etcd image
  org.opencontainers.image.licenses: Apache-2.0
cmd:
  - /usr/local/bin/etcd
ports:
  - 2379/tcp
  - 2380/tcp
