# syntax=dhi.io/build:2-debian13

name: Kustomize 5.x (dev)
image: dhi.io/kustomize
variant: dev
tags:
  - 5-dev
  - 5.8-dev
  - 5.8.1-dev
  - 5-debian-dev
  - 5-debian13-dev
  - 5.8-debian-dev
  - 5.8-debian13-dev
  - 5.8.1-debian-dev
  - 5.8.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 9790a1c3efd2fd35f1b768d495112834176581c1
  SEMVER_MAJOR_MINOR_VERSION: "5.8"
  SEMVER_MAJOR_VERSION: "5"
  SEMVER_VERSION: 5.8.1
  VERSION: 5.8.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!dash'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - dash
    - diffutils
    - dpkg
    - git
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: kustomize-go
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kubernetes-sigs/kustomize.git#kustomize/v5.8.1
            checksum: 9790a1c3efd2fd35f1b768d495112834176581c1
            path: /go/src/github.com/kubernetes-sigs/kustomize
            spdx:
              name: kustomize
              version: 5.8.1
              packages:
                - name: kustomize
                  purl: pkg:golang/sigs.k8s.io/kustomize/kustomize@5.8.1#v5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (kustomize)
          uses: go/bump@v1
          work-dir: /go/src/github.com/kubernetes-sigs/kustomize/kustomize
          with:
            deps: []
            download: true
        - name: test (kustomize)
          work-dir: /go/src/github.com/kubernetes-sigs/kustomize/kustomize
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -v -timeout 5m ./...
        - name: build (kustomize)
          work-dir: /go/src/github.com/kubernetes-sigs/kustomize/kustomize
          runs: |
            set -eux -o pipefail

            GOLDFLAGS="-X sigs.k8s.io/kustomize/api/provenance.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
                       -X sigs.k8s.io/kustomize/api/provenance.version=5.8.1"

            CGO_ENABLED=0 go build -ldflags="$GOLDFLAGS" -o "${target.dir}/usr/local/bin/kustomize" .
      outputs:
        - source: ${target.dir}/usr/local/bin/kustomize
          target: /usr/local/bin/kustomize
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kustomize
          target: /opt/docker/sbom/kustomize
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Kustomize image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/kustomize
