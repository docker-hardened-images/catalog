# syntax=dhi.io/build:2-debian13

name: Kustomize 5.x (dev)
image: dhi.io/kustomize
variant: dev
tags:
  - 5-dev
  - 5.8-dev
  - 5.8.1-dev
  - 5-debian-dev
  - 5-debian13-dev
  - 5.8-debian-dev
  - 5.8-debian13-dev
  - 5.8.1-debian-dev
  - 5.8.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "5.8"
  SEMVER_MAJOR_VERSION: "5"
  SEMVER_VERSION: 5.8.1
  SUFFIX: -dev
  VERSION: 5.8.1-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!dash'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - dash
    - diffutils
    - dpkg
    - findutils
    - git
    - grep
    - kustomize-dev=5.8.1-1
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Kustomize image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - kustomize
