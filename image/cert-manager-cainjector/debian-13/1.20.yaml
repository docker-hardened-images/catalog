# syntax=dhi.io/build:2-debian13

name: cert-manager cainjector 1.20.x
image: dhi.io/cert-manager-cainjector
variant: runtime
tags:
  - "1"
  - "1.20"
  - 1.20.3
  - 1-debian
  - 1-debian13
  - 1.20-debian
  - 1.20-debian13
  - 1.20.3-debian
  - 1.20.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-10"
vars:
  COMMIT_SHA: 1e1d16d1744e6d9c80e464e58e8d9ab1caed222b
  SEMVER_MAJOR_MINOR_VERSION: "1.20"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.20.3
  VERSION: 1.20.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: cert-manager-cainjector
      work-dir: /go/src/github.com/cert-manager/cert-manager/cmd/cainjector
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - curl
          - rsync
          - bash
          - ca-certificates-bundle
          - coreutils
          - git
          - golang-1.26
          - findutils
          - mawk
          - sed
          - make
        files:
          - url: git+https://github.com/cert-manager/cert-manager.git#v1.20.3
            checksum: 1e1d16d1744e6d9c80e464e58e8d9ab1caed222b
            path: /go/src/github.com/cert-manager/cert-manager
            spdx:
              name: cert-manager
              version: 1.20.3
              packages:
                - name: cert-manager
                  purl: pkg:golang/github.com/cert-manager/cert-manager@1.20.3
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies for cert-manager(1.19 only) (1.20 only)
          uses: go/bump@v2
          work-dir: /go/src/github.com/cert-manager/cert-manager
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - golang.org/x/sys@v0.45.0
              - github.com/Azure/go-ntlmssp@v0.1.1
            download: true
            tidy: true
        - name: update cainjector go dependencies for cainjector (1.20 only)
          uses: go/bump@v2
          work-dir: /go/src/github.com/cert-manager/cert-manager/cmd/cainjector
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - golang.org/x/sys@v0.45.0
              - github.com/Azure/go-ntlmssp@v0.1.1
            download: true
            tidy: true
        - name: Unit tests
          work-dir: /go/src/github.com/cert-manager/cert-manager
          privileged: true
          runs: |
            set -eux -o pipefail

            sed -i 's/tools += gotestsum=v1\.12\.1/tools += gotestsum=v1.13.0/' make/_shared/tools/00_mod.mk

            make unit-test-cainjector
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/cert-manager/cert-manager/cmd/cainjector
          with:
            ldflags:
              - -X github.com/cert-manager/cert-manager/pkg/util.AppVersion=1.20.3
              - -X github.com/cert-manager/cert-manager/pkg/util.AppGitCommit=1e1d16d1744e6d9c80e464e58e8d9ab1caed222b
            output: ${target.dir}/usr/local/bin/cainjector
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin/cainjector
          target: /usr/local/bin/cainjector
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/cert-manager
          target: /opt/docker/sbom/cert-manager
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /app/cmd/cainjector
    uid: 0
    gid: 0
  - type: symlink
    path: /app/cmd/cainjector/cainjector
    uid: 0
    gid: 0
    source: /usr/local/bin/cainjector
annotations:
  org.opencontainers.image.description: A minimal Cert Manager CA Injector image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/cainjector
