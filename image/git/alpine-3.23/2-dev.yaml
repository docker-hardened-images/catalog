# syntax=dhi.io/build:2-alpine3.23

name: Git 2.x (dev)
image: dhi.io/git
variant: dev
tags:
  - 2-alpine3.23-dev
  - 2.52-alpine3.23-dev
  - 2.52.0-alpine3.23-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-06-14"
vars:
  APK_MAJOR_MINOR_VERSION: "2.52"
  APK_MAJOR_VERSION: "2"
  APK_VERSION: 2.52.0
  LFS_VERSION: 3.7.1-r1
  VERSION: 2.52.0-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - apk-tools
    - bash
    - ca-certificates-bundle
    - coreutils
    - curl
    - findutils
    - git-lfs=3.7.1-r1
    - git=2.52.0-r0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
annotations:
  org.opencontainers.image.description: A minimal git image
  org.opencontainers.image.licenses: GPL-2.0-only
entrypoint:
  - git
