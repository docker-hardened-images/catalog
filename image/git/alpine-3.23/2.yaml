# syntax=dhi.io/build:2-alpine3.23

name: Git 2.x
image: dhi.io/git
variant: runtime
tags:
  - 2-alpine3.23
  - 2.52-alpine3.23
  - 2.52.0-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  GIT_VERSION: 2.52.0
  GIT_VERSION_MAJOR: "2"
  GIT_VERSION_MAJOR_MINOR: "2.52"
  VERSION: 2.52.0-r0
contents:
  repositories:
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  packages:
    - alpine-baselayout-data
    - ca-certificates-bundle
    - git=2.52.0-r0
    - curl
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal git image
  org.opencontainers.image.licenses: GPL-2.0-only
entrypoint:
  - git
