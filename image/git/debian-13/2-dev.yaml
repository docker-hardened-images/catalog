# syntax=dhi.io/build:2-debian13

name: Git 2.x (dev)
image: dhi.io/git
variant: dev
tags:
  - 2-dev
  - 2.47-dev
  - 2.47.3-dev
  - 2-debian-dev
  - 2-debian13-dev
  - 2.47-debian-dev
  - 2.47-debian13-dev
  - 2.47.3-debian-dev
  - 2.47.3-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-06-14"
vars:
  DEBIAN_EPOCH_MAJOR_MINOR_VERSION: "2.47"
  DEBIAN_EPOCH_MAJOR_VERSION: "2"
  DEBIAN_EPOCH_VERSION: 2.47.3
  VERSION: 1:2.47.3-0+deb13u1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - curl
    - diffutils
    - dpkg
    - findutils
    - git-lfs
    - git=1:2.47.3-0+deb13u1
    - grep
    - libc-bin
    - libcurl3t64-gnutls
    - liberror-perl
    - libpcre2-8-0
    - mawk
    - perl
    - perl-base
    - sed
    - util-linux
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
  - type: symlink
    path: /usr/local/bin/git-lfs
    uid: 0
    gid: 0
    source: /usr/bin/git-lfs
annotations:
  org.opencontainers.image.description: A minimal git image
  org.opencontainers.image.licenses: GPL-2.0-only
entrypoint:
  - git
