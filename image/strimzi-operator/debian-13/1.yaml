  YQ_REFERENCE: dhi/pkg-go-yq:4.53.3-debian13@sha256:94141be7ac780ce9430da538705ea533b9e6233f8e3c93a171c3b5fbdd212e97
  YQ_VERSION: 4.53.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - bash
    - coreutils
    - eclipse-temurin-21-jre
    - eclipse-temurin-21-jre-oci-config
    - libc-bin
    - openssl
    - sed
    - tini
  builds:
    - name: strimzi-kafka-operator
      uses: dhi.io/maven:3.9.16-jdk21-debian13-dev@sha256:d5345690e9a38322275e734fcd87854e2bed7b0be9e4150137019480c56d28fc
      work-dir: ${source.dir}/strimzi
      environment:
        JAVA_HOME: /usr/lib/jvm/temurin-21
        MAVEN_ARGS: --batch-mode --no-transfer-progress
      contents:
        packages:
          - bash
          - unzip
        files:
          - url: git+https://github.com/strimzi/strimzi-kafka-operator.git#1.1.0
            checksum: e5c3ea05e90d6211ddb544bf4da82946cd4ede1a
            path: ${source.dir}/strimzi
            spdx:
              name: strimzi
              version: 1.1.0
              packages:
                - name: strimzi
                  purl: pkg:maven/io.strimzi/strimzi@1.1.0
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/pkg-go-yq:4.53.3-debian13@sha256:94141be7ac780ce9430da538705ea533b9e6233f8e3c93a171c3b5fbdd212e97
            includes:
              - usr/local/bin/yq
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: patch maven dependencies
          uses: mvn/patch@v1
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          with:
            mvn-root: ${source.dir}/strimzi
            properties: ${source.dir}/patch/mvn-properties.json
        - name: build
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            mvn -DskipTests -Dcheckstyle.skip -Dmaven.javadoc.skip install
        - name: install
          runs: |
            set -eux -o pipefail

            mkdir -p '${target.dir}/opt/strimzi'
            for bundle in cluster-operator topic-operator user-operator kafka-init; do
              unzip -qo "docker-images/artifacts/binaries/${bundle}-1.1.0-dist.zip" -d '${target.dir}/opt/strimzi'
            done
            cp -a docker-images/operator/scripts/. '${target.dir}/opt/strimzi/bin'
      paths:
        - type: file
          path: ${source.dir}/patch/mvn-properties.json
          uid: 0
          gid: 0
          source: image/strimzi-operator/patch/mvn-properties.json
      outputs:
        - source: ${target.dir}/opt/strimzi
          target: /opt/strimzi
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/strimzi
          target: /opt/docker/sbom/strimzi
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
