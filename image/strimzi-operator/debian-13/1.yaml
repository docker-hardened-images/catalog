  JAVA_FIPS_SUFFIX: ""
  JAVA_VARIANT: jre
  JDK_MAJOR_VERSION: "21"
  MAVEN_REFERENCE: dhi/maven:3.9.16-jdk21-debian13-dev@sha256:d5345690e9a38322275e734fcd87854e2bed7b0be9e4150137019480c56d28fc
  MAVEN_VERSION: 3.9.16
  SEMVER_MAJOR_MINOR_VERSION: "1.1"
  SEMVER_MAJOR_VERSION: "1"
