# syntax=dhi.io/build:2-debian13

name: Calico Kube Controllers 3.31.x
image: dhi.io/calico-kube-controllers
variant: runtime
tags:
  - "3.31"
  - 3.31.6
  - v3.31.6
  - 3.31-debian
  - 3.31-debian13
  - 3.31.6-debian
  - 3.31.6-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: cc4364f81fbb6dc6fe6e140456c98169dac99f1c
  SEMVER_MAJOR_MINOR_VERSION: "3.31"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.31.6
  VERSION: 3.31.6
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: calico-kube-controllers
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/projectcalico/calico.git#v3.31.6
            checksum: cc4364f81fbb6dc6fe6e140456c98169dac99f1c
            path: /go/src/github.com/projectcalico/calico
            spdx:
              name: calico-kube-controllers
              version: 3.31.6
              packages:
                - name: calico-kube-controllers
                  purl: pkg:golang/github.com/projectcalico/calico@3.31.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies (3.31 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/projectcalico/calico
          with:
            deps:
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.82.1
            download: true
        - name: test
          work-dir: /go/src/github.com/projectcalico/calico/kube-controllers
          runs: |
            set -eux -o pipefail

            # Run unit tests only, skip packages with Functional or Integration tests that require Docker
            CGO_ENABLED=0 go test ./pkg/cache/... ./pkg/converter/... ./pkg/status/... ./pkg/controllers/utils/...
        - name: build-kube-controllers
          uses: go/build@v1
          work-dir: /go/src/github.com/projectcalico/calico/kube-controllers
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X github.com/projectcalico/calico/pkg/buildinfo.BuildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
              - -X github.com/projectcalico/calico/pkg/buildinfo.Version=3.31.6
              - -X github.com/projectcalico/calico/pkg/buildinfo.GitRevision=cc4364f81fbb6dc6fe6e140456c98169dac99f1c
            output: ${target.dir}/usr/local/bin/calico-kube-controllers
            packages: ./cmd/kube-controllers
        - name: build-check-status
          uses: go/build@v1
          work-dir: /go/src/github.com/projectcalico/calico/kube-controllers
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/bin/check-status
            packages: ./cmd/check-status
      outputs:
        - source: ${target.dir}/usr/local/bin/calico-kube-controllers
          target: /usr/local/bin/calico-kube-controllers
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/bin/check-status
          target: /usr/bin/check-status
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/calico-kube-controllers
          target: /opt/docker/sbom/calico-kube-controllers
          uid: 0
          gid: 0
accounts:
  run-as: "999"
  users:
    - name: calico-kube
      uid: 999
      gid: 999
  groups:
    - name: calico-kube
      gid: 999
      members:
        - calico-kube
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /status
    uid: 999
    gid: 999
annotations:
  org.opencontainers.image.description: A minimal Calico Kube Controllers image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/calico-kube-controllers
