              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test ./cmd/sd/...
        - name: build
          uses: go/build@v1
          with:
            ldflags:
