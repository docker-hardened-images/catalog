# syntax=dhi.io/build:2-debian13

name: DHI Source Build 2.x (dev)
image: dhi.io/build
variant: dev
tags:
  - 2-source
  - 2.8-source
  - 2.8.1-source
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BINUTILS_REFERENCE: dhi/pkg-binutils:2.45-debian13@sha256:ec7e4a2bd685757646c09915f5d71be3613d0bec266926caceccbb5da84e6916
  COMMIT_SHA: 25785d6aca79e860fe5e9fa86c0f62fec7486ce9
  DEBIAN_REFERENCE: dhi/debian-base:trixie-debian13@sha256:9ef766670af4743904b0f992a26b525c6c914648b56ea597ec23452adcf1a95d
  DHI_TAGS_OVERWRITE: "true"
  GOLANG_REFERENCE: dhi/golang:1.25.8-debian13-dev@sha256:66091823d8adc76e504bb9848115f9944a2c1d7283f92347180f631f0ba35934
  SEMVER_MAJOR_MINOR_VERSION: "2.8"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.8.1
  VERSION: 2.8.1
contents:
  packages:
    - '!binutils'
    - '!binutils-aarch64-linux-gnu'
    - '!binutils-common'
    - '!binutils-x86-64-linux-gnu'
    - '!gawk'
    - '!libbinutils'
    - '!libctf-nobfd0'
    - '!libctf0'
    - '!libelogind0'
    - '!libgprofng0'
    - '!libsframe1'
    - '!libxml2'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - binutils
    - ca-certificates
    - coreutils
    - curl
    - diffutils
    - dpkg
    - equivs
    - findutils
    - gpg
    - grep
    - jq
    - libc-bin
    - mawk
    - perl-base
    - sed
    - unzip
    - util-linux
  builds:
    - name: frontend
      contents:
        packages:
          - bash
          - ca-certificates
        files:
          - url: git+https://github.com/docker-hardened-images/frontend.git#v2.8.1
            checksum: 25785d6aca79e860fe5e9fa86c0f62fec7486ce9
            path: /go/src/github.com/docker-hardened-images/frontend
            spdx:
              name: dhi-build
              version: 2.8.1
              packages:
                - name: dhi-build
                  purl: pkg:golang/github.com/docker-hardened-images/frontend@2.8.1
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/golang:1.25.8-debian13-dev@sha256:66091823d8adc76e504bb9848115f9944a2c1d7283f92347180f631f0ba35934
            includes:
              - usr/local/go
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          work-dir: /go/src/github.com/docker-hardened-images/frontend
          privileged: true
          runs: |
            set -eux -o pipefail

            go get go.opentelemetry.io/otel/sdk@v1.40.0 # CVE-2026-24051

            go mod tidy
            go mod vendor
        - name: compile
          work-dir: /go/src/github.com/docker-hardened-images/frontend
          environment:
            PATH: /usr/local/go/bin:$PATH
          runs: |
            set -eux -o pipefail

            go build --ldflags="-s -w" -o "${target.dir}/bin/dhi-build" ./cmd/dhi-build
        - name: compile source
          work-dir: /go/src/github.com/docker-hardened-images/frontend
          environment:
            PATH: /usr/local/go/bin:$PATH
          runs: |
            set -eux -o pipefail

            go build --ldflags="-s -w" -o "${target.dir}/bin/dhi-source" ./cmd/dhi-source
      outputs:
        - source: ${target.dir}/bin/dhi-build
          target: /opt/docker/dhi/build
          uid: 0
          gid: 0
          mode: "0744"
        - source: ${target.dir}/bin/dhi-source
          target: /opt/docker/dhi/source
          uid: 0
          gid: 0
          mode: "0744"
        - source: /opt/docker/sbom/dhi-build
          target: /opt/docker/sbom/dhi-build
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/pkg-binutils:2.45-debian13@sha256:ec7e4a2bd685757646c09915f5d71be3613d0bec266926caceccbb5da84e6916
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  DHI_BUILD_TYPE: source
annotations:
  org.opencontainers.image.description: DHI Build
labels:
  moby.buildkit.frontend.caps: moby.buildkit.frontend.contexts,moby.buildkit.frontend.inputs
  moby.buildkit.frontend.network.none: "true"
entrypoint:
  - /opt/docker/dhi/build
