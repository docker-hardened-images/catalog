# syntax=dhi.io/build:2-alpine3.23

name: DHI Build 2.x (dev)
image: dhi.io/build
variant: dev
tags:
  - 2-alpine3.24
  - 2.20-alpine3.24
  - 2.20.0-alpine3.24
platforms:
  - linux/amd64
  - linux/arm64
vars:
