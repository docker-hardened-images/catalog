contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: kserve-localmodelnode-agent
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kserve/kserve.git#v0.19.0
            checksum: b0eda63d2c105479140af8ec9149d992b7e44be5
            path: /go/src/github.com/kserve/kserve
            spdx:
              name: kserve-localmodelnode-agent
              version: 0.19.0
              packages:
                - name: kserve
                  purl: pkg:golang/github.com/kserve/kserve@0.19.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/kedacore/keda/v2@v2.18.3
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: test
          work-dir: /go/src/github.com/kserve/kserve
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -C /go/src/github.com/kserve/kserve/cmd/localmodelnode ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            output: ${target.dir}/usr/local/bin/localmodelnode-agent
            packages: ./cmd/localmodelnode
      outputs:
        - source: ${target.dir}/usr/local/bin/localmodelnode-agent
          target: /usr/local/bin/localmodelnode-agent
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/kserve-localmodelnode-agent
          target: /opt/docker/sbom/kserve-localmodelnode-agent
          uid: 0
          gid: 0
accounts:
