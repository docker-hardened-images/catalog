# syntax=dhi.io/build:2-debian13

name: Istio Ztunnel 1.28.x
image: dhi.io/ztunnel
variant: runtime
tags:
  - "1.28"
  - 1.28.6
  - 1.28-debian13
  - 1.28.6-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-11-05"
  end-of-life: "2026-07-31"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 20aa5e285bb59200de0d7d61e177ab199538a7b5
  RUST_REFERENCE: dhi/rust:1.95.0-debian13-dev@sha256:761109f92317b86745ee74afae850a87cb24dea7f8be5215b12178c4a49b82b1
  RUST_VERSION: 1.95.0
  SEMVER_MAJOR_MINOR_VERSION: "1.28"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.28.6
  VERSION: 1.28.6
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: ztunnel
      uses: dhi.io/rust:1.95.0-debian13-dev@sha256:761109f92317b86745ee74afae850a87cb24dea7f8be5215b12178c4a49b82b1
      work-dir: ${source.dir}/ztunnel
      environment:
        VERSION: 1.28.6
      contents:
        packages:
          - bash
          - sed
          - protobuf-compiler
          - pkg-config
          - libssl-dev
        files:
          - url: git+https://github.com/istio/ztunnel.git#1.28.6
            checksum: 20aa5e285bb59200de0d7d61e177ab199538a7b5
            path: ${source.dir}/ztunnel
            spdx:
              name: ztunnel
              version: 1.28.6
              packages:
                - name: ztunnel
                  purl: pkg:dhi/ztunnel@1.28.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch Cargo.lock
          uses: git/patch@v1
          with:
            patch: ${source.dir}/patch/lru-1.28.patch
        - name: patch CVEs
          privileged: true
          runs: |
            set -eux -o pipefail

            # Removed test dependencies
            rm -rf ./fuzz/Cargo.*

            # Fixes CVE-2024-7254 & CVE-2025-53605
            sed -i \
              's/pprof = { version = "0\.14"/pprof = { version = "0\.15"/g' \
              Cargo.toml

            # Fixes CVE-2025-58160 (ANSI escape sequence injection in tracing-subscriber)
            sed -i \
              's/tracing-subscriber = { version = "0\.3[^"]*"/tracing-subscriber = { version = ">=0.3.20, <0.4"/g' \
              Cargo.toml

            # CVE-2026-41676/41677/41678/41681/41898/42327 → openssl-rs ≥0.10.79
            sed -i '/^openssl = /s/version = "0\.10"/version = ">=0.10.79, <0.11"/' Cargo.toml

            # GHSA-82j2-j2ch-gfr8 / GHSA-pwjx-qhcg-rvj4 / GHSA-965h-392x-2mh5 / GHSA-xgp8-3hg3-c2mh
            sed -i '/rustls-webpki/s/version = "0\.103"/version = ">=0.103.13, <0.104"/' Cargo.toml

            # Update patched transitive deps (hickory 0.25.x cannot move to patched 0.26 without Istio ≥1.30)
            cargo update --ignore-rust-version --recursive \
              pprof tracing-subscriber aws-lc-rs time \
              openssl

            # rustls-webpki: Cargo.lock may list both 0.102.x (boring-rustls-provider) and 0.103.x,
            # so bare `cargo update rustls-webpki` fails as ambiguous — bump each 0.103 line explicitly.
            awk '
            /^name = "rustls-webpki"$/ {
              getline
              if ($0 ~ /^version = "0\.103\./) {
                split($0, parts, "\"")
                print parts[2]
              }
            }' Cargo.lock | sort -u | while read -r __rw_v; do
              [ -z "${__rw_v}" ] && continue
              cargo update --ignore-rust-version -p "rustls-webpki@${__rw_v}" --precise 0.103.13 || true
            done

            # GHSA-cq8v-f236-94qc — disambiguate multiple rand versions (do not pass bare `rand`)
            cargo update --ignore-rust-version -p rand@0.8.5 --precise 0.8.6 || true
            cargo update --ignore-rust-version -p rand@0.9.2 --precise 0.9.3 || true
        - name: cargo sbom
          uses: sbom@v1
          with:
            extra-scanners: rust-cargo-lock-cataloger
            prefix: ztunnel-cargo
            source: ${source.dir}/ztunnel
        - name: build
          privileged: true
          runs: |
            set -eux -o pipefail

            CARGO_FLAGS=$([ "${target.fips}" = "true" ] && echo "--no-default-features --features tls-openssl" || echo "")

            cargo build --release --locked --target-dir "${target.dir}" $CARGO_FLAGS
            install -D -m 755 "${target.dir}/release/ztunnel" "${target.dir}/usr/local/bin/ztunnel"
      paths:
        - type: file
          path: ${source.dir}/patch/lru-1.28.patch
          uid: 0
          gid: 0
          source: image/ztunnel/patch/lru-1.28.patch
      outputs:
        - source: ${target.dir}/usr/local/bin/ztunnel
          target: /usr/local/bin/ztunnel
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/ztunnel
          target: /opt/docker/sbom/ztunnel
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/ztunnel-cargo
          target: /opt/docker/sbom/ztunnel-cargo
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: Istio Ztunnel - Rust L4 proxy for Istio ambient mesh
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - ztunnel
