// Gradle init script: force CVE-remediated dependency versions at resolution time.
//
// Each rule matches the exact old version the upstream tag ships with, so this
// is a deterministic override (not a blanket "always-bump" rule). To support a
// new upstream point release, update only the version literals below.

allprojects {
    // Override DataHub's `ext.nettyVersion` after the project's build.gradle
    // has been evaluated (where it sets ext.nettyVersion = '4.2.13.Final').
    // `afterEvaluate` ensures our assignment wins over the project's own
    // `allprojects { ext.nettyVersion = ... }` block.
    afterEvaluate {
        rootProject.ext['nettyVersion'] = '4.2.16.Final'
    }

    configurations.all {
        resolutionStrategy.eachDependency { details ->
            def grp = details.requested.group
            def name = details.requested.name
            def ver = details.requested.version

            // Jackson 2.x -> 2.21.4. Closes the jackson-databind
            // PolymorphicTypeValidator bypass family (CVE-2026-54512, -54513,
            // -54514, -54516, -54517, -54518) and GHSA-72hv-8253-57qq
            // (jackson-core DoS). 2.21.4 is the highest published 2.x fix.
            // jackson-annotations is excluded: 2.21.4 does not exist for it on
            // Maven Central (annotations ship on a lagging line), so a
            // group-wide force would break the build. CVE-2026-54515's fix
            // (2.21.5) is unpublished -> handled via VEX.
            if (grp != null && grp.startsWith("com.fasterxml.jackson")
                    && name != "jackson-annotations") {
                details.useVersion("2.21.4")
                details.because("CVE remediation: GHSA-72hv-8253-57qq, CVE-2026-54512, CVE-2026-54513, CVE-2026-54514, CVE-2026-54516, CVE-2026-54517, CVE-2026-54518")
            }

            // Jackson 3.x (tools.jackson.*) -> 3.1.4. Same PTV bypass family;
            // 3.1.4 additionally fixes CVE-2026-54515. Force the whole 3.x line
            // so jackson-dataformat-* and other tools.jackson modules cannot
            // linger at 3.1.2 beside a bumped databind.
            if (grp != null && grp.startsWith("tools.jackson")) {
                details.useVersion("3.1.4")
                details.because("CVE remediation: CVE-2026-54512, CVE-2026-54513, CVE-2026-54514, CVE-2026-54515, CVE-2026-54516, CVE-2026-54517, CVE-2026-54518")
            }

            // commons-configuration2 2.10.1 -> 2.15.0 (CVE-2026-45205)
            if (grp == "org.apache.commons" && name == "commons-configuration2"
                    && ver == "2.10.1") {
                details.useVersion("2.15.0")
                details.because("CVE remediation: CVE-2026-45205")
            }

            // opentelemetry-extension-trace-propagators 1.49.0 -> 1.62.0 (CVE-2026-45292)
            if (grp == "io.opentelemetry" && name == "opentelemetry-extension-trace-propagators"
                    && ver == "1.49.0") {
                details.useVersion("1.62.0")
                details.because("CVE remediation: CVE-2026-45292")
            }

            // Netty 4.2.13.Final -> 4.2.16.Final (belt-and-suspenders with ext.nettyVersion)
            // CVE-2026-44891: netty-codec-stomp DoS fixed in 4.2.16.Final
            if (grp == "io.netty" && !name.startsWith("netty-tcnative")
                    && ver == "4.2.13.Final") {
                details.useVersion("4.2.16.Final")
                details.because("CVE remediation: CVE-2026-44891")
            }

            // spring-kafka 4.0.5 -> 4.0.6 (CVE-2026-41731, CVE-2026-41726)
            if (grp == "org.springframework.kafka" && name == "spring-kafka"
                    && ver == "4.0.5") {
                details.useVersion("4.0.6")
                details.because("CVE remediation: CVE-2026-41731, CVE-2026-41726")
            }

            // jline bundle -> 4.2.1 (GHSA-47qp-hqvx-6r3f, GHSA-2r2c-cx56-8933)
            // remote-telnet ships inside BOOT-INF/lib/jline-*.jar; overriding
            // jline-remote-telnet alone leaves the fat jar at 3.25.1.
            if (grp == "org.jline" && name == "jline") {
                details.useVersion("4.2.1")
                details.because("CVE remediation: GHSA-47qp-hqvx-6r3f, GHSA-2r2c-cx56-8933")
            }

            // logback-core, logback-classic -> 1.5.35 (CVE-2026-9828, CVE-2026-10532)
            if (grp == "ch.qos.logback" && name.startsWith("logback-")) {
                details.useVersion("1.5.35")
                details.because("CVE remediation: CVE-2026-9828, CVE-2026-10532")
            }
        }
    }
}
