metadata:
  display-name: DataHub Upgrade
  short-description: Run-to-completion batch container that applies DataHub schema migrations, rebuilds Elasticsearch indices, and emits upgrade readiness signals before the rest of the DataHub stack starts.
  featured: false
  home-url: https://datahubproject.io
  categories:
    - data-science
    - integration-and-delivery
  included-tools:
    - name: kubectl
      description: Kubernetes CLI for cluster-side operations during upgrade jobs
    - name: dockerize
      description: Readiness/wait wrapper used by the entrypoint to gate startup on Elasticsearch, Ebean, Cassandra, and Neo4j
    - name: java
      description: Eclipse Temurin JRE 17 used to run the Spring Boot datahub-upgrade application
