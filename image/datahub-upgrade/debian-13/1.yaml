# syntax=dhi.io/build:2-debian13

name: DataHub Upgrade 1.x
image: dhi.io/datahub-upgrade
variant: runtime
tags:
  - "1"
  - "1.5"
  - 1.5.0
  - 1.5.0.6
  - 1-debian13
  - 1.5-debian13
  - 1.5.0-debian13
  - 1.5.0.6-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-03-17"
vars:
  COMMIT_SHA: d0fce948555c06b3083479d40e8fa270d156c71f
  DOCKERIZE_COMMIT_SHA: a21f69ff60cdf1b2d54dadb7d04f28c8b6723c19
  DOCKERIZE_VERSION: 0.24.3
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  GRADLE_REFERENCE: dhi/gradle:8.14.5-jdk17-debian13-dev@sha256:a6d57632575d2fca4c5a8d4881b67ce79999ba1b77bade83178d552a901872c6
  GRADLE_VERSION: 8.14.5
  JMX_PROMETHEUS_SHA256: 7d61f737fd661610ccc14aea79764faa1ea94a340cbc8f0029b3d2edea3d80c1
  JMX_PROMETHEUS_VERSION: 1.0.1
  JRE_REFERENCE: dhi/eclipse-temurin:17.0.19.10-debian13@sha256:1c392e32c2e2b4f200e9a9b1db8dcea7f6329619bd448b98a8e37bcee56fef1c
  JRE_VERSION: 17.0.19.10
  KUBECTL_REFERENCE: dhi/kubectl:1.34.8-debian13@sha256:bdd1353c0f66a5284eacee9189e522dcc08151fba2a2467980ea6bf2062b2ef6
  KUBECTL_VERSION: 1.34.8
  OTEL_JAVAAGENT_SHA256: bd01fea1304e8c8803fff827a0bdda02b2266742a85c62548053c6761474bb5b
  OTEL_JAVAAGENT_VERSION: 2.27.0
  SEMVER_MAJOR_MINOR_VERSION: "1.5"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.5.0.6
  VERSION: 1.5.0.6
  VERSION_MAJOR_MINOR_PATCH: 1.5.0
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - coreutils
    - grep
    - libsnappy1v5
  builds:
    - name: datahub-upgrade
      uses: dhi.io/gradle:8.14.5-jdk17-debian13-dev@sha256:a6d57632575d2fca4c5a8d4881b67ce79999ba1b77bade83178d552a901872c6
      work-dir: ${source.dir}/datahub
      environment:
        GRADLE_OPTS: -Dorg.gradle.daemon=false
        JAVA_HOME: /opt/java/openjdk/17
      caches:
        - path: /root/.gradle/caches
        - path: /root/.gradle/wrapper
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - curl
          - findutils
          - git
          - python3
          - tar
        files:
          - url: git+https://github.com/datahub-project/datahub.git#v1.5.0.6
            checksum: d0fce948555c06b3083479d40e8fa270d156c71f
            path: ${source.dir}/datahub
            spdx:
              name: datahub
              version: 1.5.0.6
              packages:
                - name: datahub
                  purl: pkg:github/datahub-project/datahub@1.5.0.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: fetch java agents
          privileged: true
          runs: |
            set -eux -o pipefail

            mkdir -p "${source.dir}/agents"

            # Try each URL in order; the multi-mirror chain dodges per-IP
            # 429s on repo1.maven.org during heavy build cycles.
            fetch() {
              local out="$1"
              shift
              local urls="$*"
              for url in $urls; do
                echo "fetch: $url" >&2
                if curl --fail --silent --show-error --location \
                  --retry 4 --retry-delay 5 --retry-all-errors \
                  --connect-timeout 30 --max-time 600 \
                  -o "$out" "$url"; then
                  return 0
                fi
                sleep 3
              done
              echo "fetch: all mirrors exhausted for $out" >&2
              return 1
            }

            jmx_path="io/prometheus/jmx/jmx_prometheus_javaagent/1.0.1/jmx_prometheus_javaagent-1.0.1.jar"
            fetch "${source.dir}/agents/jmx_prometheus_javaagent.jar" \
              "https://repo.maven.apache.org/maven2/${jmx_path}" \
              "https://maven-central.storage-download.googleapis.com/maven2/${jmx_path}" \
              "https://repo1.maven.org/maven2/${jmx_path}"

            fetch "${source.dir}/agents/opentelemetry-javaagent.jar" \
              "https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v2.27.0/opentelemetry-javaagent.jar"

            echo "bd01fea1304e8c8803fff827a0bdda02b2266742a85c62548053c6761474bb5b  ${source.dir}/agents/opentelemetry-javaagent.jar" \
              | sha256sum -c -
            echo "7d61f737fd661610ccc14aea79764faa1ea94a340cbc8f0029b3d2edea3d80c1  ${source.dir}/agents/jmx_prometheus_javaagent.jar" \
              | sha256sum -c -
        - name: opentelemetry-javaagent sbom
          uses: spdx@v1
          with:
            license: Apache-2.0
            name: opentelemetry-javaagent
            purl: pkg:maven/io.opentelemetry.javaagent/opentelemetry-javaagent@2.27.0
            version: 2.27.0
        - name: jmx_prometheus_javaagent sbom
          uses: spdx@v1
          with:
            license: Apache-2.0
            name: jmx_prometheus_javaagent
            purl: pkg:maven/io.prometheus.jmx/jmx_prometheus_javaagent@1.0.1
            version: 1.0.1
        - name: build
          work-dir: ${source.dir}/datahub
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            # Stale lockfiles in the persistent `caches:` mount cause
            # "Timeout waiting to lock journal cache" on the next build
            # after a crash; PID-matching doesn't help (builders reuse PIDs).
            find /root/.gradle/caches -name '*.lock' -delete 2> /dev/null || true
            find /root/.gradle/caches/journal-* -mindepth 1 -maxdepth 1 \
              -name '*.lock' -delete 2> /dev/null || true

            # `:assemble` over `:build -x test -x check`: `-x` skips task
            # execution but NOT configuration, so `:build` still walks
            # the test/Spotless task graph across DataHub's many
            # subprojects and exhausts the 90-min builder budget on
            # config alone. `:assemble` skips that graph entirely.
            # `--no-watch-fs` avoids journal lock contention on the
            # shared cache mount. `-PapacheMavenRepositoryUrl` covers
            # DataHub's `repositories.gradle` hook; the init script
            # handles plugin/buildscript classpaths the property doesn't.
            ./gradlew :datahub-upgrade:assemble -x test \
              --no-daemon --no-watch-fs --parallel --max-workers=4 \
              --init-script "${source.dir}/files/init.gradle" \
              -PapacheMavenRepositoryUrl=https://maven-central.storage-download.googleapis.com/maven2/

            # Fail loudly if upstream renames the jar path; otherwise
            # we'd silently ship an empty install step.
            test -f datahub-upgrade/build/libs/datahub-upgrade.jar
        - name: install
          work-dir: ${source.dir}/datahub
          runs: |
            set -eux -o pipefail

            install -D -m 0644 \
              datahub-upgrade/build/libs/datahub-upgrade.jar \
              "${target.dir}/datahub/datahub-upgrade/bin/datahub-upgrade.jar"

            install -D -m 0644 \
              "${source.dir}/agents/opentelemetry-javaagent.jar" \
              "${target.dir}/datahub/datahub-upgrade/lib/opentelemetry-javaagent.jar"

            install -D -m 0644 \
              "${source.dir}/agents/jmx_prometheus_javaagent.jar" \
              "${target.dir}/datahub/datahub-upgrade/lib/jmx_prometheus_javaagent.jar"

            install -D -m 0644 \
              metadata-models/src/main/resources/entity-registry.yml \
              "${target.dir}/datahub/datahub-gms/resources/entity-registry.yml"

            # ⚠️ Path is /datahub/datahub-gms/scripts/, not /datahub-upgrade/scripts/.
            # Upstream start.sh hard-codes the GMS path when ENABLE_PROMETHEUS=true:
            #   -javaagent:.../jmx_prometheus_javaagent.jar=4318:\
            #     /datahub/datahub-gms/scripts/prometheus-config.yaml
            # Installing elsewhere silently breaks the JMX agent at startup.
            install -D -m 0644 \
              docker/monitoring/client-prometheus-config.yaml \
              "${target.dir}/datahub/datahub-gms/scripts/prometheus-config.yaml"

            install -D -m 0755 \
              docker/datahub-upgrade/start.sh \
              "${target.dir}/datahub/datahub-upgrade/scripts/start.sh"
      paths:
        - type: file
          path: ${source.dir}/files/init.gradle
          uid: 0
          gid: 0
          source: image/datahub-upgrade/files/init.gradle
      outputs:
        - source: ${target.dir}/datahub
          target: /datahub
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/datahub
          target: /opt/docker/sbom/datahub
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/opentelemetry-javaagent
          target: /opt/docker/sbom/opentelemetry-javaagent
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/jmx_prometheus_javaagent
          target: /opt/docker/sbom/jmx_prometheus_javaagent
          uid: 0
          gid: 0
    - name: dockerize
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/powerman/dockerize
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - coreutils
          - git
        files:
          - url: git+https://github.com/powerman/dockerize.git#v0.24.3
            checksum: a21f69ff60cdf1b2d54dadb7d04f28c8b6723c19
            path: /go/src/github.com/powerman/dockerize
            spdx:
              name: dockerize
              version: 0.24.3
              packages:
                - name: dockerize
                  purl: pkg:golang/github.com/powerman/dockerize@v0.24.3
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v2
          with:
            deps: []
            download: true
        - name: build
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/dockerize
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin/dockerize
          target: /usr/local/bin/dockerize
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/dockerize
          target: /opt/docker/sbom/dockerize
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:17.0.19.10-debian13@sha256:1c392e32c2e2b4f200e9a9b1db8dcea7f6329619bd448b98a8e37bcee56fef1c
      includes:
        - opt/**
        - usr/local/bin/**
      uid: 0
      gid: 0
    - name: dhi.io/kubectl:1.34.8-debian13@sha256:bdd1353c0f66a5284eacee9189e522dcc08151fba2a2467980ea6bf2062b2ef6
      includes:
        - opt/docker/sbom/kubernetes
        - usr/local/bin/kubectl
        - var/lib/dpkg/status.d/**
      uid: 0
      gid: 0
accounts:
  run-as: datahub
  users:
    - name: datahub
      uid: 65532
      gid: 65532
  groups:
    - name: datahub
      gid: 65532
      members:
