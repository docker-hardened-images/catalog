# syntax=dhi.io/build:2-debian13

name: DataHub Upgrade 1.x
image: dhi.io/datahub-upgrade
variant: runtime
tags:
  - "1"
  - "1.6"
  - 1.6.0
  - 1-debian
  - 1-debian13
  - 1.6-debian
  - 1.6-debian13
  - 1.6.0-debian
  - 1.6.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-03-17"
vars:
  COMMIT_SHA: 059a36c0b035a6057de00114ccac0ea9003d6bc2
  FLAVORED_SUFFIX: ""
  GRADLE_REFERENCE: dhi/gradle:8.14.5-jdk21-debian13-dev@sha256:81369d1c568895f85486d73cfaade43b8fe7f8d14e275a654f470a893550e508
  GRADLE_VERSION: 8.14.5
  JMX_PROMETHEUS_SHA256: 7d61f737fd661610ccc14aea79764faa1ea94a340cbc8f0029b3d2edea3d80c1
  JMX_PROMETHEUS_VERSION: 1.0.1
  JRE_REFERENCE: dhi/eclipse-temurin:21.0.11.10-debian13@sha256:d3c099f29d6d0a0b804d1a253186f5273af3a22c07de03b7e1370f0f27990b81
  JRE_VERSION: 21.0.11.10
  KUBECTL_VERSION: 1.36.1-6
  OTEL_JAVAAGENT_SHA256: bd01fea1304e8c8803fff827a0bdda02b2266742a85c62548053c6761474bb5b
  OTEL_JAVAAGENT_VERSION: 2.27.0
  SEMVER_MAJOR_MINOR_VERSION: "1.6"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.6.0
  SUFFIX: ""
  VERSION: 1.6.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - curl
    - grep
    - kubectl=1.36.1-6
    - libsnappy1v5
  builds:
    - name: datahub-upgrade
      uses: dhi.io/gradle:8.14.5-jdk21-debian13-dev@sha256:81369d1c568895f85486d73cfaade43b8fe7f8d14e275a654f470a893550e508
      work-dir: ${source.dir}/datahub
      environment:
        GRADLE_OPTS: -Dorg.gradle.daemon=false
        JAVA_HOME: /opt/java/openjdk/21
      caches:
        - path: /root/.gradle/caches
        - path: /root/.gradle/wrapper
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - curl
          - findutils
          - git
          - python3
          - tar
        files:
          - url: git+https://github.com/datahub-project/datahub.git#v1.6.0
            checksum: 059a36c0b035a6057de00114ccac0ea9003d6bc2
            path: ${source.dir}/datahub
            spdx:
              name: datahub
              version: 1.6.0
              packages:
                - name: datahub
                  purl: pkg:github/datahub-project/datahub@1.6.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: fetch java agents
          privileged: true
          runs: |
            set -eux -o pipefail

            mkdir -p "${source.dir}/agents"

            # Try each URL in order; the multi-mirror chain dodges per-IP
            # 429s on repo1.maven.org during heavy build cycles.
            fetch() {
              local out="$1"
              shift
              local urls="$*"
              for url in $urls; do
                echo "fetch: $url" >&2
                if curl --fail --silent --show-error --location \
                  --retry 4 --retry-delay 5 --retry-all-errors \
                  --connect-timeout 30 --max-time 600 \
                  -o "$out" "$url"; then
                  return 0
                fi
                sleep 3
              done
              echo "fetch: all mirrors exhausted for $out" >&2
              return 1
            }

            jmx_path="io/prometheus/jmx/jmx_prometheus_javaagent/1.0.1/jmx_prometheus_javaagent-1.0.1.jar"
            fetch "${source.dir}/agents/jmx_prometheus_javaagent.jar" \
              "https://repo.maven.apache.org/maven2/${jmx_path}" \
              "https://maven-central.storage-download.googleapis.com/maven2/${jmx_path}" \
              "https://repo1.maven.org/maven2/${jmx_path}"

            fetch "${source.dir}/agents/opentelemetry-javaagent.jar" \
              "https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v2.27.0/opentelemetry-javaagent.jar"

            echo "bd01fea1304e8c8803fff827a0bdda02b2266742a85c62548053c6761474bb5b  ${source.dir}/agents/opentelemetry-javaagent.jar" \
              | sha256sum -c -
            echo "7d61f737fd661610ccc14aea79764faa1ea94a340cbc8f0029b3d2edea3d80c1  ${source.dir}/agents/jmx_prometheus_javaagent.jar" \
              | sha256sum -c -
        - name: opentelemetry-javaagent sbom
          uses: spdx@v1
          with:
            license: Apache-2.0
            name: opentelemetry-javaagent
            purl: pkg:maven/io.opentelemetry.javaagent/opentelemetry-javaagent@2.27.0
            version: 2.27.0
        - name: jmx_prometheus_javaagent sbom
          uses: spdx@v1
          with:
            license: Apache-2.0
            name: jmx_prometheus_javaagent
            purl: pkg:maven/io.prometheus.jmx/jmx_prometheus_javaagent@1.0.1
            version: 1.0.1
        - name: stage gradle dependency overrides init script
          work-dir: ${source.dir}/datahub
          runs: |
            set -eux -o pipefail

            cp "${source.dir}/patch/1.overrides.gradle" \
              "${source.dir}/datahub/dhi-overrides.init.gradle"
        - uses: gradle/mirror@v1
        - name: build
          work-dir: ${source.dir}/datahub
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            # Stale lockfiles in the persistent `caches:` mount cause
            # "Timeout waiting to lock journal cache" on the next build
            # after a crash; PID-matching doesn't help (builders reuse PIDs).
            find /root/.gradle/caches -name '*.lock' -delete 2> /dev/null || true
            find /root/.gradle/caches/journal-* -mindepth 1 -maxdepth 1 \
              -name '*.lock' -delete 2> /dev/null || true

            # `:assemble` over `:build -x test -x check`: `-x` skips task
            # execution but NOT configuration, so `:build` still walks
            # the test/Spotless task graph across DataHub's many
            # subprojects and exhausts the builder budget on config alone.
            # `:assemble` skips that graph entirely. `--no-watch-fs` avoids
            # journal lock contention on the shared cache mount.
            # `--update-locks` lets Gradle's dependency-locking refresh
            # the pinned versions for the modules our resolutionStrategy
            # forces. Without this, the override.gradle's `useVersion`
            # calls hit gradle's lockfile and fail with
            #   "Did not resolve <module>:<old> which has been forced /
            #    substituted to a different version: <new>".
            # Patterns mirror the groups force-substituted in
            # patch/1.overrides.gradle.
            ./gradlew :datahub-upgrade:assemble -x test \
              --no-daemon --no-watch-fs --parallel --max-workers=4 \
              --update-locks 'com.fasterxml.jackson.core:*,com.fasterxml.jackson.dataformat:*,com.fasterxml.jackson.datatype:*,com.fasterxml.jackson.module:*,org.apache.commons:*,io.opentelemetry:*,io.netty:*' \
              --init-script "${source.dir}/datahub/dhi-overrides.init.gradle"

            # Fail loudly if upstream renames the jar path; otherwise
            # we'd silently ship an empty install step.
            test -f datahub-upgrade/build/libs/datahub-upgrade.jar
        - name: install
          work-dir: ${source.dir}/datahub
          runs: |
            set -eux -o pipefail

            install -D -m 0644 \
              datahub-upgrade/build/libs/datahub-upgrade.jar \
              "${target.dir}/datahub/datahub-upgrade/bin/datahub-upgrade.jar"

            install -D -m 0644 \
              "${source.dir}/agents/opentelemetry-javaagent.jar" \
              "${target.dir}/datahub/datahub-upgrade/lib/opentelemetry-javaagent.jar"

            install -D -m 0644 \
              "${source.dir}/agents/jmx_prometheus_javaagent.jar" \
              "${target.dir}/datahub/datahub-upgrade/lib/jmx_prometheus_javaagent.jar"

            install -D -m 0644 \
              metadata-models/src/main/resources/entity-registry.yml \
              "${target.dir}/datahub/datahub-gms/resources/entity-registry.yml"

            # ⚠️ Path is /datahub/datahub-gms/scripts/, not /datahub-upgrade/scripts/.
            # Upstream start.sh hard-codes the GMS path when ENABLE_PROMETHEUS=true:
            #   -javaagent:.../jmx_prometheus_javaagent.jar=4318:\
            #     /datahub/datahub-gms/scripts/prometheus-config.yaml
            # Installing elsewhere silently breaks the JMX agent at startup.
            install -D -m 0644 \
              docker/monitoring/client-prometheus-config.yaml \
              "${target.dir}/datahub/datahub-gms/scripts/prometheus-config.yaml"

            install -D -m 0755 \
              docker/datahub-upgrade/start.sh \
              "${target.dir}/datahub/datahub-upgrade/scripts/start.sh"
            install -D -m 0644 \
              docker/snippets/wait_for_deps.sh \
              "${target.dir}/usr/local/lib/datahub/wait_for_deps.sh"
      paths:
        - type: file
          path: ${source.dir}/patch/1.overrides.gradle
          uid: 0
          gid: 0
          source: image/datahub-upgrade/patch/1.overrides.gradle
      outputs:
        - source: ${target.dir}/datahub
          target: /datahub
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/lib/datahub
          target: /usr/local/lib/datahub
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/datahub
          target: /opt/docker/sbom/datahub
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/opentelemetry-javaagent
          target: /opt/docker/sbom/opentelemetry-javaagent
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/jmx_prometheus_javaagent
          target: /opt/docker/sbom/jmx_prometheus_javaagent
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.11.10-debian13@sha256:d3c099f29d6d0a0b804d1a253186f5273af3a22c07de03b7e1370f0f27990b81
      includes:
        - opt/**
        - usr/local/bin/**
      uid: 0
      gid: 0
accounts:
