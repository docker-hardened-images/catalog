# syntax=dhi.io/build:2-debian13

name: cert-manager webhook 1.20.x
image: dhi.io/cert-manager-webhook
variant: runtime
tags:
  - "1.20"
  - 1.20.3
  - 1.20-debian
  - 1.20-debian13
  - 1.20.3-debian
  - 1.20.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-10"
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "1.20"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.20.3
  SUFFIX: ""
  VERSION: 1.20.3-0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - ca-certificates-bundle
    - tzdata
    - webhook-1.20=1.20.3-0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /app/cmd/webhook
    uid: 0
    gid: 0
    mode: "0755"
  - type: symlink
    path: /app/cmd/webhook/webhook
    uid: 0
    gid: 0
    source: /usr/bin/webhook
annotations:
  org.opencontainers.image.description: A minimal Cert Manager webhook image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /app/cmd/webhook/webhook
