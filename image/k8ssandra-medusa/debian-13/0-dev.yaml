# syntax=dhi.io/build:2-debian13

name: k8ssandra-medusa 0.29.x (dev)
image: dhi.io/k8ssandra-medusa
variant: dev
tags:
  - 0-dev
  - 0.29-dev
  - 0.29.1-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.29-debian-dev
  - 0.29-debian13-dev
  - 0.29.1-debian-dev
  - 0.29.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-17"
vars:
  COMMIT_SHA: 5f49ea6e247479c6006722b0bc64bbe96c866410
  GRPC_HEALTH_PROBE_COMMIT_SHA: 64350b746e427bb84b0f1bf3572dabe03a73fe0b
  GRPC_HEALTH_PROBE_VERSION: 0.4.53
  SEMVER_MAJOR_MINOR_VERSION: "0.29"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.29.1
  VERSION: 0.29.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - curl
    - diffutils
    - dpkg
    - findutils
    - gawk
    - grep
    - jq
    - libc-bin
    - libstdc++6
    - mawk
    - perl-base
    - python-3.12
    - python-3.12-dev
    - python3-pip
    - python3-setuptools
    - python3-wheel
    - sed
    - util-linux
    - wget
  builds:
    - name: grpc health probe
      work-dir: /go/src/github.com/grpc-ecosystem/grpc-health-probe
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/grpc-ecosystem/grpc-health-probe.git#v0.4.53
            checksum: 64350b746e427bb84b0f1bf3572dabe03a73fe0b
            path: /go/src/github.com/grpc-ecosystem/grpc-health-probe
            spdx:
              name: grpc-health-probe
              version: 0.4.53
              packages:
                - name: grpc-health-probe
                  purl: pkg:golang/github.com/grpc-ecosystem/grpc-health-probe@0.4.53
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/net@v0.56.0
              - golang.org/x/text@v0.39.0
              - google.golang.org/grpc@v1.82.1
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            go test ./...
        - name: compile
          uses: go/build@v1
          with:
            ldflags:
              - -s
              - -w
              - -X main.versionTag=0.4.53
            output: ${target.dir}/usr/bin/grpc_health_probe
            packages: ./main.go
      outputs:
        - source: ${target.dir}/usr/bin/grpc_health_probe
          target: /usr/bin/grpc_health_probe
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/grpc-health-probe
          target: /opt/docker/sbom/grpc-health-probe
          uid: 0
          gid: 0
    - name: k8ssandra-medusa
      work-dir: /build/cassandra-medusa
      caches:
        - path: /root/.cache/pip
        - path: /root/.cache/pypoetry
      contents:
        packages:
          - python3
          - python3-dev
          - python3-pip
          - python3-venv
          - build-essential
          - ca-certificates
          - git
          - curl
          - jq
          - wget
          - python-3.12
          - python-3.12-dev
          - python3-setuptools
          - python3-wheel
          - libstdc++6
          - bash
          - coreutils
          - diffutils
          - findutils
          - gawk
          - grep
          - sed
        files:
          - url: git+https://github.com/thelastpickle/cassandra-medusa.git#v0.29.1
            checksum: 5f49ea6e247479c6006722b0bc64bbe96c866410
            path: /build/cassandra-medusa
            spdx:
              name: k8ssandra-medusa
              version: 0.29.1
              packages:
                - name: k8ssandra-medusa
                  purl: pkg:pypi/cassandra-medusa@0.29.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch setuptools pin
          runs: |
            set -eux -o pipefail

            sed -i 's/^setuptools = "78\.1\.1"$/setuptools = "83.0.0"/' pyproject.toml
            grep -E '^setuptools = ' pyproject.toml
        - name: patch python dependencies for CVEs
          runs: |
            set -eux -o pipefail

            # Add or update urllib3 constraint
            if grep -q '^urllib3 = ' pyproject.toml; then
              sed -i 's/^urllib3 = "[^"]*"$/urllib3 = ">=2.7.0"/' pyproject.toml
            else
              # Insert after [tool.poetry.dependencies] section header
              sed -i '/^\[tool\.poetry\.dependencies\]/a urllib3 = ">=2.7.0"' pyproject.toml
            fi

            # Add or update idna constraint
            if grep -q '^idna = ' pyproject.toml; then
              sed -i 's/^idna = "[^"]*"$/idna = ">=3.15"/' pyproject.toml
            else
              sed -i '/^\[tool\.poetry\.dependencies\]/a idna = ">=3.15"' pyproject.toml
            fi

            # Add or update pip constraint
            if grep -q '^pip = ' pyproject.toml; then
              sed -i 's/^pip = "[^"]*"$/pip = ">=26.1"/' pyproject.toml
            else
              sed -i '/^\[tool\.poetry\.dependencies\]/a pip = ">=26.1"' pyproject.toml
            fi

            # Add or update pyjwt constraint
            if grep -q '^pyjwt = ' pyproject.toml; then
              sed -i 's/^pyjwt = "[^"]*"$/pyjwt = ">=2.13.0"/' pyproject.toml
            else
              sed -i '/^\[tool\.poetry\.dependencies\]/a pyjwt = ">=2.13.0"' pyproject.toml
            fi

            # Add or update aiohttp constraint
            if grep -q '^aiohttp = ' pyproject.toml; then
              sed -i 's/^aiohttp = "[^"]*"$/aiohttp = ">=3.14.0"/' pyproject.toml
            else
              sed -i '/^\[tool\.poetry\.dependencies\]/a aiohttp = ">=3.14.0"' pyproject.toml
            fi

            # Add or update cryptography constraint
            if grep -q '^cryptography = ' pyproject.toml; then
              sed -i 's/^cryptography = "[^"]*"$/cryptography = ">=48.0.1"/' pyproject.toml
            else
              sed -i '/^\[tool\.poetry\.dependencies\]/a cryptography = ">=48.0.1"' pyproject.toml
            fi

            # Add or update pyOpenSSL constraint
            if grep -q '^pyOpenSSL = ' pyproject.toml; then
              sed -i 's/^pyOpenSSL = "[^"]*"$/pyOpenSSL = ">=26.2.0,<27.0.0"/' pyproject.toml
            else
              sed -i '/^\[tool\.poetry\.dependencies\]/a pyOpenSSL = ">=26.2.0,<27.0.0"' pyproject.toml
            fi

            # Add or update click constraint
            if grep -q '^click = ' pyproject.toml; then
              sed -i 's/^click = "[^"]*"$/click = ">=8.3.3"/' pyproject.toml
            else
              sed -i '/^\[tool\.poetry\.dependencies\]/a click = ">=8.3.3"' pyproject.toml
            fi

            # Add or update pyasn1 constraint
            if grep -q '^pyasn1 = ' pyproject.toml; then
              sed -i 's/^pyasn1 = "[^"]*"$/pyasn1 = ">=0.6.4"/' pyproject.toml
            else
              sed -i '/^\[tool\.poetry\.dependencies\]/a pyasn1 = ">=0.6.4"' pyproject.toml
            fi

            echo "Updated dependencies:"
            grep -E '^(urllib3|idna|pip|pyjwt|aiohttp|cryptography|pyOpenSSL|click|pyasn1) = ' pyproject.toml || true
        - name: install poetry and build
          privileged: true
          runs: |
            set -eux -o pipefail

            # Install poetry
            python3 -m pip install -U pip
            pip3 install --ignore-installed poetry==1.8.5

            # Set poetry to create venv in project
            export POETRY_VIRTUALENVS_IN_PROJECT=true

            # Regenerate lock file
            poetry lock --no-update

            # Build and install medusa
            poetry install

            # Copy installed files to target
            mkdir -p ${target.dir}/home/cassandra
            cp -r .venv ${target.dir}/home/cassandra/.venv
            cp pyproject.toml ${target.dir}/home/cassandra/pyproject.toml
            cp -r medusa ${target.dir}/home/cassandra/medusa

            # Copy scripts
            mkdir -p ${target.dir}/home/cassandra/bin
            cp k8s/docker-entrypoint.sh ${target.dir}/home/cassandra/
            cp k8s/medusa.sh ${target.dir}/home/cassandra/bin/medusa

            python3 - << 'PY'
            from pathlib import Path

            entrypoint = Path("${target.dir}/home/cassandra/docker-entrypoint.sh")
            text = entrypoint.read_text()
            text = text.replace(
                "poetry run python -m medusa.service.grpc.restore",
                "/home/cassandra/.venv/bin/python -m medusa.service.grpc.restore",
            )
            text = text.replace(
                "exec poetry run python -m medusa.service.grpc.server server.py &",
                "/home/cassandra/.venv/bin/python -m medusa.service.grpc.server server.py &",
            )
            entrypoint.write_text(text)
            PY

            chmod +x ${target.dir}/home/cassandra/docker-entrypoint.sh
            chmod +x ${target.dir}/home/cassandra/bin/medusa
      outputs:
        - source: ${target.dir}/home/cassandra
          target: /home/cassandra
          uid: 999
          gid: 999
        - source: /opt/docker/sbom/k8ssandra-medusa
          target: /opt/docker/sbom/k8ssandra-medusa
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: cassandra
      uid: 999
      gid: 999
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: cassandra
      gid: 999
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /home/cassandra
environment:
  DEBIAN_FRONTEND: noninteractive
  DEBUG_SLEEP: "0"
  DEBUG_VERSION: "1"
  LANG: C.UTF-8
  LC_ALL: C.UTF-8
  PYTHONPATH: /home/cassandra
paths:
  - type: directory
    path: /home/cassandra
    uid: 999
    gid: 999
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal K8ssandra Medusa image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /home/cassandra/docker-entrypoint.sh
