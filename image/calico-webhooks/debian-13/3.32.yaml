# syntax=dhi.io/build:2-debian13

name: Calico Webhooks 3.32.x
image: dhi.io/calico-webhooks
variant: runtime
tags:
  - "3"
  - "3.32"
  - 3.32.1
  - 3-debian
  - 3-debian13
  - 3.32-debian
  - 3.32-debian13
  - 3.32.1-debian
  - 3.32.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-30"
vars:
  COMMIT_SHA: 0ca9d1b93644778cafdf1812f3dda02ac0c361e8
  SEMVER_MAJOR_MINOR_VERSION: "3.32"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.32.1
  VERSION: 3.32.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: calico-webhooks
      work-dir: /go/src/github.com/projectcalico/calico
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/projectcalico/calico.git#v3.32.1
            checksum: 0ca9d1b93644778cafdf1812f3dda02ac0c361e8
            path: /go/src/github.com/projectcalico/calico
            spdx:
              name: calico-webhooks
              version: 3.32.1
              packages:
                - name: calico-webhooks
                  purl: pkg:golang/github.com/projectcalico/calico@3.32.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps: []
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test ./webhooks/... -count=1
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/projectcalico/calico/pkg/buildinfo.Version=v3.32.1
              - -X github.com/projectcalico/calico/pkg/buildinfo.GitRevision=0ca9d1b93644778cafdf1812f3dda02ac0c361e8
              - -X github.com/projectcalico/calico/pkg/buildinfo.BuildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%FT%T%z')
            output: ${target.dir}/usr/local/bin/webhook
            packages: ./webhooks/cmd/
      outputs:
        - source: ${target.dir}/usr/local/bin/webhook
          target: /usr/local/bin/webhook
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/calico-webhooks
          target: /opt/docker/sbom/calico-webhooks
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /webhook
    uid: 0
    gid: 0
    source: /usr/local/bin/webhook
  - type: directory
    path: /certs
    uid: 65532
    gid: 65532
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal Calico Webhooks admission controller image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /webhook
ports:
  - 6443/tcp
