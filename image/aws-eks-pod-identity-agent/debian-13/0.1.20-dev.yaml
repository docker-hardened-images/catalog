# syntax=dhi.io/build:2-debian13

name: AWS EKS Pod Identity Agent 0.1.x (dev)
image: dhi.io/aws-eks-pod-identity-agent
variant: dev
tags:
  - 0.1.20-dev
  - 0.1.20-debian-dev
  - 0.1.20-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-01-22"
vars:
  COMMIT_SHA: 37a7de0dbbbc1200e5d75875c0d2a62c0a6b64fc
  SEMVER_MAJOR_MINOR_VERSION: "0.1"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.1.20
  VERSION: 0.1.20
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: aws-eks-pod-identity-agent
      work-dir: /go/src/github.com/aws/eks-pod-identity-agent
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/aws/eks-pod-identity-agent.git#v0.1.20
            checksum: 37a7de0dbbbc1200e5d75875c0d2a62c0a6b64fc
            path: /go/src/github.com/aws/eks-pod-identity-agent
            spdx:
              name: eks-pod-identity-agent
              version: 0.1.20
              packages:
                - name: eks-pod-identity-agent
                  purl: pkg:golang/go.amzn.com/eks/eks-pod-identity-agent@0.1.20
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (0.1.20 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/sys@v0.44.0
              - github.com/golang-jwt/jwt/v5@v5.2.2
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -short ./... -count=1
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X k8s.io/component-base/version.gitVersion=v0.1.20
              - -X k8s.io/component-base/version.gitCommit=37a7de0dbbbc1200e5d75875c0d2a62c0a6b64fc
              - -X k8s.io/component-base/version/verflag.programName=eks-pod-identity-agent
              - -X go.amzn.com/eks/eks-pod-identity-agent/configuration.AgentVersion=0.1.20
            output: ${target.dir}/usr/local/bin/eks-pod-identity-agent
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin/eks-pod-identity-agent
          target: /usr/local/bin/eks-pod-identity-agent
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/eks-pod-identity-agent
          target: /opt/docker/sbom/eks-pod-identity-agent
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /eks-pod-identity-agent
    uid: 0
    gid: 0
    source: /usr/local/bin/eks-pod-identity-agent
annotations:
  org.opencontainers.image.description: A minimal AWS EKS Pod Identity Agent image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /eks-pod-identity-agent
