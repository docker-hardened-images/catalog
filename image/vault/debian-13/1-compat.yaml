# syntax=dhi.io/build:2-debian13

name: Vault 1.x (compat)
image: dhi.io/vault
variant: runtime
flavor: compat
tags:
  - 1-compat
  - 1.21-compat
  - 1.21.4-compat
  - 1-debian13-compat
  - 1.21-debian13-compat
  - 1.21.4-debian13-compat
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-21"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: ffe7023c481dc1ea2d8550bbaca8d85f8e611e0b
  GO_VERSION: "1"
  GOLANG_REFERENCE: dhi/golang:1.26.2-debian13-dev@sha256:086c893153f92793f3a1541793cd4a8e8b23bfd4ccaf70c8f4261f496080fb0e
  GOSU_REFERENCE: dhi/pkg-gosu:1.19-debian13@sha256:a3308555520131306868f68c8a4da3b546f4c47ae4a4b4e6ae5e6781b76716d6
  SEMVER_MAJOR_MINOR_VERSION: "1.21"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.21.4
  VERSION: 1.21.4
contents:
  packages:
    - bash
    - coreutils
    - findutils
    - grep
    - libcap2-bin
    - sed
    - tini
  builds:
    - name: vault
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:086c893153f92793f3a1541793cd4a8e8b23bfd4ccaf70c8f4261f496080fb0e
      contents:
        packages:
          - binutils
          - libcap2-bin
        files:
          - url: git+https://github.com/hashicorp/vault.git#v1.21.4
            checksum: ffe7023c481dc1ea2d8550bbaca8d85f8e611e0b
            path: /go/src/github.com/hashicorp/vault
            spdx:
              name: vault
              version: 1.21.4
              packages:
                - name: vault
                  purl: pkg:dhi/vault@1.21.4
                  license: BUSL-1.1
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/hashicorp/vault
          with:
            deps:
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: bootstrap
          work-dir: /go/src/github.com/hashicorp/vault
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              # Use lenient FIPS mode during bootstrap because tool downloads
              # require X25519 for TLS connections to proxy.golang.org
              export GODEBUG=fips140=on
            fi

            make bootstrap
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/hashicorp/vault
          with:
            ldflags:
              - -X github.com/hashicorp/vault/version.fullVersion=1.21.4
              - -X github.com/hashicorp/vault/version.GitCommit=ffe7023c481dc1ea2d8550bbaca8d85f8e611e0b
              - -X github.com/hashicorp/vault/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
            output: ${target.dir}/usr/local/bin/vault
            tags: vault
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/vault
          target: /opt/docker/sbom/vault
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/pkg-gosu:1.19-debian13@sha256:a3308555520131306868f68c8a4da3b546f4c47ae4a4b4e6ae5e6781b76716d6
      includes:
        - opt/docker/sbom/gosu
        - usr/local/sbin/gosu
      uid: 0
      gid: 0
accounts:
  run-as: vault
  users:
    - name: vault
      uid: 1000
      gid: 1000
  groups:
    - name: vault
      gid: 1000
      members:
        - vault
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: file
    path: /usr/local/bin/docker-entrypoint.sh
    uid: 0
    gid: 0
    mode: "0755"
    source: image/vault/bin/docker-entrypoint-compat.sh
  - type: directory
    path: /vault/data
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /vault/config
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /vault/logs
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /vault/file
    uid: 1000
    gid: 1000
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Vault image
  org.opencontainers.image.licenses: BUSL-1.1
entrypoint:
  - /usr/local/bin/docker-entrypoint.sh
cmd:
  - server
  - -config=/vault/config
ports:
  - 8200/tcp
