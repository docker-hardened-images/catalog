# syntax=dhi.io/build:2-debian13

name: Virt Handler 1.8.x
image: dhi.io/virt-handler
variant: runtime
tags:
  - "1"
  - "1.8"
  - 1.8.1
  - 1-debian13
  - 1.8-debian13
  - 1.8.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-18"
vars:
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
  COMMIT_SHA: ae865b624b443450f7aedadc30cf9223a6176015
  GOLANG_REFERENCE: dhi/golang:1.26.2-debian13-dev@sha256:39947402d8e52fcaeb8f8a3b00f4377414464fb89437c7ba67358cf4c5caaac9
  SEMVER_MAJOR_MINOR_VERSION: "1.8"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.8.1
  VERSION: 1.8.1
contents:
  packages:
    - '!base-files'
  builds:
    - name: virt-handler
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:39947402d8e52fcaeb8f8a3b00f4377414464fb89437c7ba67358cf4c5caaac9
      work-dir: /go/src/kubevirt.io/kubevirt
      contents:
        packages:
          - libnbd-dev
          - pkg-config
          - libvirt-dev
        files:
          - url: git+https://github.com/kubevirt/kubevirt.git#v1.8.1
            checksum: ae865b624b443450f7aedadc30cf9223a6176015
            path: /go/src/kubevirt.io/kubevirt
            spdx:
              name: virt-handler
              version: 1.8.1
              packages:
                - name: virt-handler
                  purl: pkg:golang/kubevirt.io/kubevirt@1.8.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch no-op
          uses: go/bump@v1
          caches:
            - path: /go/pkg/mod
          with:
            deps: []
            download: false
        - name: manual patch vulnerable Go dependencies
          privileged: true
          environment:
            GODEBUG: ""
            GOFIPS140: ""
          caches:
            - path: /go/pkg/mod
          runs: |
            set -eux -o pipefail

            go get golang.org/x/crypto@v0.47.0                  # CVE-2025-47913, CVE-2025-22869
            go get github.com/opencontainers/runc@v1.2.8        # CVE-2025-52881, CVE-2025-52565, CVE-2025-31133
            go get github.com/cyphar/filepath-securejoin@v0.6.0 # runc v1.2.8 dependency
            go get github.com/opencontainers/selinux@v1.13.0    # runc v1.2.8 dependency
            go get golang.org/x/oauth2@v0.27.0                  # CVE-2025-22868
            go get github.com/containers/common@v0.60.4         # CVE-2024-9341
            go get golang.org/x/net@v0.45.0                     # CVE-2025-58190, CVE-2025-47911
            go get google.golang.org/grpc@v1.79.3               # CVE-2026-33186

            go mod tidy
            # requires manual patch due to go/bump not supporting GOWORK=true (uses go mod vendor)
            if [ -f go.work ]; then
              go work vendor
            else
              go mod vendor
            fi
        - name: patch runc cgroup devices API compat
          uses: patch@v1
          with:
            options: -p1
            patch: ${source.dir}/patch/runc-cgroup-devices-api-compat.patch
        - name: test
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              # Some unit tests will actually try to use X25519 which is not allowed in FIPS mode
              export GODEBUG=fips140=on
            fi

            # -vet=off: virt-handler v1.5.x has non-constant format strings caught by Go 1.26's linting
            # CGO_ENABLED=1: upstream requires libvirt C bindings (libvirt-dev)
            CGO_ENABLED=1 go test -vet=off ./cmd/virt-handler/... ./pkg/virt-handler/...
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 1
            ldflags:
              - -X kubevirt.io/client-go/version.gitVersion=v1.8.1
              - -X kubevirt.io/client-go/version.gitCommit=ae865b624b443450f7aedadc30cf9223a6176015
            output: ${target.dir}/usr/local/bin/virt-handler
            packages: ./cmd/virt-handler
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/virt-handler/patch
      outputs:
        - source: ${target.dir}/usr/local/bin/virt-handler
          target: /usr/local/bin/virt-handler
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/virt-handler
          target: /opt/docker/sbom/virt-handler
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: "65532"
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Virt Handler image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/virt-handler
ports:
  - 8185/tcp
