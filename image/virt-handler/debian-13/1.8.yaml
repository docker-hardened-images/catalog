# syntax=dhi.io/build:2-debian13

name: Virt Handler 1.8.x
image: dhi.io/virt-handler
variant: runtime
tags:
  - "1"
  - "1.8"
  - 1.8.4
  - 1-debian
  - 1-debian13
  - 1.8-debian
  - 1.8-debian13
  - 1.8.4-debian
  - 1.8.4-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-18"
vars:
  COMMIT_SHA: dfaa398f086692d19e01be21d83a01036e07815f
  SEMVER_MAJOR_MINOR_VERSION: "1.8"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.8.4
  VERSION: 1.8.4
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - libc6
    - procps
    - tzdata
  builds:
    - name: virt-handler
      work-dir: /go/src/kubevirt.io/kubevirt
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - libnbd-dev
          - pkg-config
          - libvirt-dev
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kubevirt/kubevirt.git#v1.8.4
            checksum: dfaa398f086692d19e01be21d83a01036e07815f
            path: /go/src/kubevirt.io/kubevirt
            spdx:
              name: virt-handler
              version: 1.8.4
              packages:
                - name: virt-handler
                  purl: pkg:golang/kubevirt.io/kubevirt@1.8.4
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch go dependencies
          uses: go/bump@v2
          with:
            deps:
              - github.com/containers/common@v0.60.4
              - github.com/opencontainers/runc@v1.2.8
              - golang.org/x/oauth2@v0.36.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: patch runc cgroup devices API compat
          uses: patch@v1
          with:
            options: -p1
            patch: ${source.dir}/patch/runc-cgroup-devices-api-compat.patch
        - name: test
          runs: |
            set -eux -o pipefail

            # -vet=off: virt-handler v1.5.x has non-constant format strings caught by Go 1.26's linting
            # CGO_ENABLED=1: upstream requires libvirt C bindings (libvirt-dev)
            CGO_ENABLED=1 go test -vet=off ./cmd/virt-handler/... ./pkg/virt-handler/...
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 1
            ldflags:
              - -X kubevirt.io/client-go/version.gitVersion=v1.8.4
              - -X kubevirt.io/client-go/version.gitCommit=dfaa398f086692d19e01be21d83a01036e07815f
            output: ${target.dir}/usr/local/bin/virt-handler
            packages: ./cmd/virt-handler
        - name: build virt-chroot
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            output: ${target.dir}/usr/local/bin/virt-chroot
            packages: ./cmd/virt-chroot
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/virt-handler/patch
      outputs:
        - source: ${target.dir}/usr/local/bin/virt-handler
          target: /usr/local/bin/virt-handler
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/virt-chroot
          target: /usr/local/bin/virt-chroot
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/virt-handler
          target: /opt/docker/sbom/virt-handler
          uid: 0
          gid: 0
accounts:
  run-as: "65532"
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /usr/bin/virt-chroot
    uid: 0
    gid: 0
    source: /usr/local/bin/virt-chroot
annotations:
  org.opencontainers.image.description: A minimal Virt Handler image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/virt-handler
ports:
  - 8185/tcp
