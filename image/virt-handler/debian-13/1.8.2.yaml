    gid: 0
    source: /usr/sbin/iptables-nft-restore
  - type: symlink
    path: /usr/sbin/iptables-save
    uid: 0
    gid: 0
    source: /usr/sbin/iptables-nft-save
  - type: symlink
    path: /usr/sbin/ip6tables
    uid: 0
    gid: 0
    source: /usr/sbin/ip6tables-nft
  - type: symlink
    path: /usr/sbin/ip6tables-restore
    uid: 0
    gid: 0
    source: /usr/sbin/ip6tables-nft-restore
  - type: symlink
    path: /usr/sbin/ip6tables-save
    uid: 0
    gid: 0
    source: /usr/sbin/ip6tables-nft-save
  - type: symlink
    path: /usr/sbin/arptables
    uid: 0
    gid: 0
    source: /usr/sbin/arptables-nft
  - type: symlink
    path: /usr/sbin/arptables-restore
    uid: 0
    gid: 0
    source: /usr/sbin/arptables-nft-restore
  - type: symlink
    path: /usr/sbin/arptables-save
    uid: 0
    gid: 0
    source: /usr/sbin/arptables-nft-save
  - type: symlink
    path: /usr/sbin/ebtables
    uid: 0
    gid: 0
    source: /usr/sbin/ebtables-nft
  - type: symlink
    path: /usr/sbin/ebtables-restore
    uid: 0
    gid: 0
    source: /usr/sbin/ebtables-nft-restore
  - type: symlink
    path: /usr/sbin/ebtables-save
    uid: 0
    gid: 0
    source: /usr/sbin/ebtables-nft-save
annotations:
  org.opencontainers.image.description: A minimal Virt Handler image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
