# syntax=dhi.io/build:2-alpine3.24

name: Knative Serving Autoscaler 1.22.x (dev)
image: dhi.io/knative-autoscaler
variant: dev
tags:
  - 1-alpine-dev
  - 1.22-alpine-dev
  - 1-alpine3.24-dev
  - 1.22.1-alpine-dev
  - 1.22-alpine3.24-dev
  - 1.22.1-alpine3.24-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-28"
  end-of-life: "2026-11-03"
vars:
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "1.22"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.22.1
  SUFFIX: -dev
  VERSION: 1.22.1-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - apk-tools
    - autoscaler-1.22-dev=1.22.1-r0
    - busybox
    - ca-certificates
    - ca-certificates-bundle
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /ko-app
    uid: 0
    gid: 0
    mode: "0755"
  - type: symlink
    path: /ko-app/autoscaler
    uid: 0
    gid: 0
    source: /usr/bin/autoscaler
annotations:
  org.opencontainers.image.description: A minimal Knative Serving autoscaler image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - autoscaler
ports:
  - 8080/tcp
  - 9090/tcp
  - 8008/tcp
