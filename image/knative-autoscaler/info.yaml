metadata:
  display-name: Knative Serving Autoscaler
  short-description: |
    Scales Knative Services in response to request-driven load metrics.

    The autoscaler is a control-plane component of Knative Serving. It collects
    per-revision load statistics from the activator and queue-proxies, computes
    the desired number of pods for each Revision, and drives scaling decisions
    including scale-to-zero.
  featured: false
  home-url: https://knative.dev/docs/serving/
  categories:
    - networking
