# syntax=dhi.io/build:2-debian13

name: Knative Serving Autoscaler 1.22.x (dev)
image: dhi.io/knative-autoscaler
variant: dev
tags:
  - 1-dev
  - 1.22-dev
  - 1.22.1-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.22-debian-dev
  - 1.22-debian13-dev
  - 1.22.1-debian-dev
  - 1.22.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-28"
  end-of-life: "2026-11-03"
vars:
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "1.22"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.22.1
  SUFFIX: -dev
  VERSION: 1.22.1-0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - autoscaler-1.22-dev=1.22.1-0
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /ko-app
    uid: 0
    gid: 0
    mode: "0755"
  - type: symlink
    path: /ko-app/autoscaler
    uid: 0
    gid: 0
    source: /usr/bin/autoscaler
annotations:
  org.opencontainers.image.description: A minimal Knative Serving autoscaler image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - autoscaler
ports:
  - 8080/tcp
  - 9090/tcp
  - 8008/tcp
