# syntax=dhi.io/build:2-debian13

name: mongodb-exporter 0.51.x (compat)
image: dhi.io/mongodb-exporter
variant: runtime
flavor: compat
tags:
  - 0-compat
  - 0.51-compat
  - 0.51.0-compat
  - 0-debian-compat
  - 0-debian13-compat
  - 0.51-debian-compat
  - 0.51-debian13-compat
  - 0.51.0-debian-compat
  - 0.51.0-debian13-compat
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: d0d33e679dcc7f30bafe6d6d23cf84a4fc1cd6d2
  SEMVER_MAJOR_MINOR_VERSION: "0.51"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.51.0
  VERSION: 0.51.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: mongodb-exporter-go
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/percona/mongodb_exporter.git#v0.51.0
            checksum: d0d33e679dcc7f30bafe6d6d23cf84a4fc1cd6d2
            path: /go/src/github.com/percona/mongodb_exporter
            spdx:
              name: mongodb-exporter
              version: 0.51.0
              packages:
                - name: mongodb-exporter
                  purl: pkg:golang/github.com/percona/mongodb_exporter@0.51.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/percona/mongodb_exporter
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.56.0
              - golang.org/x/text@v0.39.0
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.82.1
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/percona/mongodb_exporter
          with:
            ldflags:
              - -X main.version=0.51.0
              - -X main.commit=d0d33e679dcc7f30bafe6d6d23cf84a4fc1cd6d2
              - -X main.buildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%F-%T')
            output: ${target.dir}/usr/local/bin/mongodb-exporter
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin/mongodb-exporter
          target: /usr/local/bin/mongodb-exporter
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/mongodb-exporter
          target: /opt/docker/sbom/mongodb-exporter
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal mongodb-exporter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/mongodb-exporter
ports:
  - 9216/tcp
