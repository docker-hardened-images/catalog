# syntax=dhi.io/build:2-debian13

name: Kibana 9.4.x
image: dhi.io/kibana
variant: runtime
tags:
  - "9"
  - "9.4"
  - 9.4.3
  - 9-debian
  - 9-debian13
  - 9.4-debian
  - 9.4-debian13
  - 9.4.3-debian
  - 9.4.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-05"
vars:
  ARCH: '#{ target.arch == "amd64" ? "amd64" : "arm64" }'
  COMMIT_SHA: 9e9848d35f973e1f40f65d79760037228c54b7ab
  GO_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  NODE_ARCH: '#{ target.arch == "amd64" ? "x64" : "arm64" }'
  NODE_BINARIES_EXTRA_SUBDIR: glibc-217
  NODE_BINARIES_SUBDIR: default
  NODE_DEB_VERSION: 24.18.0-0
  NODE_MAJOR_VERSION: "24"
  NODE_VERSION: 24.18.0
  SEMVER_MAJOR_MINOR_VERSION: "9.4"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.4.3
  VERSION: 9.4.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - coreutils
    - findutils
    - grep
    - libstdc++6
    - tini
  builds:
    - name: kibana
      contents:
        packages:
          - bash
          - gzip
          - jq
          - base-files
          - ca-certificates
          - coreutils
          - findutils
          - git
          - libc6
          - libstdc++6
          - mawk
          - nodejs-24
          - node-corepack
          - npm
          - sed
          - yarn-classic
        files:
          - url: git+https://github.com/elastic/kibana.git#v9.4.3
            checksum: 9e9848d35f973e1f40f65d79760037228c54b7ab
            path: ${source.dir}/kibana
            spdx:
              name: kibana
              version: 9.4.3
              packages:
                - name: kibana
                  purl: pkg:dhi/kibana@9.4.3
                  license: Apache-2.0
            uid: 65532
            gid: 65532
      pipeline:
        - name: update node engine
          work-dir: ${source.dir}/kibana
          runs: |
            set -eux -o pipefail

            ls -la package.json

            # Upstream pins a patch version of Node, which may not receive security-related updates,
            # so update this requirement to the current version of Node.

            # First, check the major version of Node against the build version;
            # this prevents unintentional major version bumps
            REQUIRED_VERSION=$(sed -nr "s/\"node\": \"([0-9]+)\.[0-9]+\.[0-9]+\".*/\1/p" package.json | tr -d " ")
            if [ "$REQUIRED_VERSION" != "24" ]; then
              echo "Error: upstream requirement for Node v$REQUIRED_VERSION not met by build v24."
              echo "Error: if version change is intentional, update this version verification logic."
              exit 1
            fi

            # Then, update the "engines.node" requirement to reference the current Node build version;
            # otherwise the upstream version check logic will fail
            sed -ir "s/\"node\": \"[0-9]\+\.[0-9]\+\.[0-9]\+\"/\"node\": \"$(node --version | sed 's/^v//')\"/g" package.json
        - name: bump yarn deps (9.4)
          uses: yarn/bump@v2
          run-as: "65532"
          privileged: true
          with:
            bumps: ${source.dir}/patches/yarn-patches_9.4.json
            yarn-root: ${source.dir}/kibana
        - name: force vulnerable lockfile bumps (9.4)
          run-as: "65532"
          work-dir: ${source.dir}/kibana
          privileged: true
          runs: |
            set -eux -o pipefail

            # yarn 1's resolutions field can't reach the @elastic/elasticsearch/@elastic/transport
            # nested undici consumer. Multiple resolution forms were tried and silently dropped:
            #   - "@elastic/elasticsearch/@elastic/transport/undici" (anchored, 3-segment)
            #   - "**/@elastic/elasticsearch/@elastic/transport/undici" (globbed)
            #   - "**/@elastic/elasticsearch/undici" (globbed, post-hoist path)
            #   - "@elastic/elasticsearch/undici" (anchored, 2-segment)
            # All left the consumer's range "^7.19.1" locked at the vulnerable 7.22.0.
            # Workaround: drop the cached lockfile block so yarn re-resolves against the registry,
            # which currently publishes 7.25.0+ as the latest 7.x.
            sed -i '/^undici@\^7\.19\.1:/,/^$/d' yarn.lock

            # Same nesting issue for the 6.x consumer "@elastic/transport@^8.x" (undici "^6.21.1"),
            # which no resolution reaches. Drop its cached block so yarn re-resolves to the latest
            # 6.x (>=6.27.0), fixing CVE-2026-12151.
            sed -i '/^undici@\^6\.21\.1/,/^$/d' yarn.lock

            yarn install --package-lock-only
        - name: build kibana
          work-dir: ${source.dir}/kibana
          privileged: true
          runs: |
            set -eux -o pipefail

            echo "startup --batch" > .bazelrc.user

            mkdir -p ~/.moon/plugins/toolchains
            # Work around intermittent Moon CI rename failures while installing
            # toolchain plugins from ~/.moon/temp into the global store.
            export MOON_TOOLCHAIN_FORCE_GLOBALS=1

            yarn kbn bootstrap

            # Populate `.node_binaries` with the HSP Node layout Kibana expects (LICENSE and
            # bin/node), since the build copies extract/ into the distributable and reads
            # LICENSE for NOTICE.txt. The dhi/node image exposed a full tarball tree at
            # /opt/nodejs/node-vX.Y.Z; the HSP package only installs /usr/bin/node.
            # Note: There's a hardcoded dependency on `linux-x64` directory in the build tooling
            # when it gathers package info to create NOTICE.txt, so create that directory always,
            # regardless of arch.
            NODE_RUNTIME_VERSION="$(node --version | sed 's/^v//')"
            populate_node_extract() {
              local variant="$1"
              local platform="$2"
              local extract="${source.dir}/kibana/.node_binaries/${NODE_RUNTIME_VERSION}/${variant}/${platform}/extract"

              mkdir -p "${extract}/bin"
              cp -a /usr/bin/node "${extract}/bin/node"
              node << EOF
            const fs = require('fs');
            const https = require('https');
            const url = 'https://raw.githubusercontent.com/nodejs/node/v${NODE_RUNTIME_VERSION}/LICENSE';
            https.get(url, (res) => {
              if (res.statusCode !== 200) {
                console.error('failed to download Node LICENSE:', res.statusCode);
                process.exit(1);
              }
              const chunks = [];
              res.on('data', (chunk) => chunks.push(chunk));
              res.on('end', () => fs.writeFileSync('${extract}/LICENSE', Buffer.concat(chunks)));
            }).on('error', (err) => {
              console.error(err);
              process.exit(1);
            });
            EOF
            }
            for node_subdir in default glibc-217; do
              if [ -z "${node_subdir}" ]; then
                continue
              fi
              populate_node_extract "${node_subdir}" "linux-x64"
              if [ ${NODE_ARCH} != "x64" ]; then
                populate_node_extract "${node_subdir}" "linux-${NODE_ARCH}"
              fi
            done

            # 1. Invoke the build script directly (instead of using "yarn build"), since the option to
            # build the application for all platforms is hard-coded in "yarn build".
            # 2. The initializing logic of Kibana's internal tooling will check the required Node version,
            # download a version of Node, and verify the checksums of the downloaded binaries. These steps
            # are not needed for our build environment, since Node is already present. This behavior is
            # disabled with `--skip-initialize`. Other builds that aren't needed for this image are disabled
            # with the other `--skip` options.
            node --no-experimental-require-module -- \
              scripts/build --skip-os-packages --skip-initialize \
              --skip-docker-cloud-fips --skip-docker-contexts --skip-docker-ubi \
              --skip-docker-wolfi --skip-docker-cloud --skip-docker-cloud-fips \
              --skip-docker-serverless --skip-docker-fips

            KBN_DIST="${source.dir}/kibana/build/default/kibana-9.4.3-SNAPSHOT-linux-${GO_ARCH}"
            if [ ! -x "${KBN_DIST}/bin/kibana" ]; then
              cd "${source.dir}/kibana"
              KBN_VERSION="9.4.3" KBN_GO_ARCH="${GO_ARCH}" \
                node --no-experimental-require-module scripts/render-bin-scripts.js
            fi

            mkdir -p "${target.dir}/opt/kibana/kibana-9.4.3"

            cp -r "${KBN_DIST}"/* "${target.dir}/opt/kibana/kibana-9.4.3"

            cd "${target.dir}/opt/kibana/kibana-9.4.3"
            rm -rf data
      paths:
        - type: file
          path: ${source.dir}/patches/yarn-patches_9.1.json
          uid: 65532
          gid: 65532
          mode: "0444"
          source: image/kibana/patch/yarn-patches_9.1.json
        - type: file
          path: ${source.dir}/patches/yarn-patches_9.2.json
          uid: 65532
          gid: 65532
          mode: "0444"
          source: image/kibana/patch/yarn-patches_9.2.json
        - type: file
          path: ${source.dir}/patches/yarn-patches_9.3.json
          uid: 65532
          gid: 65532
          mode: "0444"
          source: image/kibana/patch/yarn-patches_9.3.json
        - type: file
          path: ${source.dir}/patches/yarn-patches_9.4.json
          uid: 65532
          gid: 65532
          mode: "0444"
          source: image/kibana/patch/yarn-patches_9.4.json
        - type: file
          path: ${source.dir}/patches/expr-eval_9.1.patch
          uid: 65532
          gid: 65532
          mode: "0444"
          source: image/kibana/patch/expr-eval_9.1.patch
        - type: file
          path: ${source.dir}/kibana/scripts/render-bin-scripts.js
          uid: 65532
          gid: 65532
          mode: "0444"
          source: image/kibana/scripts/render-bin-scripts.js
      accounts:
        run-as: node
        users:
          - name: node
            uid: 65532
            gid: 65532
      outputs:
        - source: ${target.dir}/opt/kibana/kibana-9.4.3
          target: /opt/kibana/kibana-9.4.3
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kibana
          target: /opt/docker/sbom/kibana
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  ELASTIC_CONTAINER: "true"
  KIBANA_VERSION: 9.4.3
  PATH: /opt/kibana/kibana-9.4.3/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: directory
    path: /usr/share
    uid: 0
    gid: 0
    mode: "0755"
  - type: symlink
    path: /usr/share/kibana
    uid: 0
    gid: 0
    source: /opt/kibana/kibana-9.4.3
  - type: directory
    path: /opt/kibana/kibana-9.4.3/data
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: file
    path: /usr/local/bin/kibana-docker
    uid: 0
    gid: 0
    mode: "0755"
    source: image/kibana/bin/kibana-docker
  - type: file
    path: /opt/kibana/kibana-9.4.3/config/kibana.yml
    uid: 65532
    gid: 65532
    mode: "0644"
    source: image/kibana/config/kibana.yml
  - type: symlink
    path: /usr/local/bin/tini
    uid: 0
    gid: 0
    source: /usr/bin/tini
annotations:
  org.opencontainers.image.description: A minimal Kibana image
  org.opencontainers.image.licenses: Elastic-License-2.0
entrypoint:
  - /usr/local/bin/tini
  - --
cmd:
  - /usr/local/bin/kibana-docker
ports:
  - 5601/tcp
