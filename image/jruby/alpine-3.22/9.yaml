# syntax=dhi.io/build:2-alpine3.22

name: JRuby 9.x
image: dhi.io/jruby
variant: runtime
tags:
  - 9-alpine3.22
  - 9.4-alpine3.22
  - 9.4.14-alpine3.22
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x64" : "aarch64" }'
  COMMIT_SHA: ddda6d5992f584190edb99ceccc0de9d63c9ca35
  JRE_REF: dhi/eclipse-temurin:21.0.10.7-alpine3.22@sha256:ef1a003ee223a362010ba4a700bed045174c9a74b977dcbcca07f4b7b3fc1ae7
  MAVEN_REF: dhi/maven:3.9.15-jdk21-alpine3.22-dev@sha256:1697be0dd8267e69b4606a4b5132c834095b69e2897baf462eef9c03fb214ac6
  SEMVER_MAJOR_MINOR_VERSION: "9.4"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.4.14
  VERSION: 9.4.14.0
contents:
  repositories:
    - https://dl-cdn.alpinelinux.org/alpine/v3.22/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.22/community
  packages:
    - alpine-baselayout-data
    - bash
    - ca-certificates-bundle
    - coreutils
  builds:
    - name: jruby
      uses: dhi.io/maven:3.9.15-jdk21-alpine3.22-dev@sha256:1697be0dd8267e69b4606a4b5132c834095b69e2897baf462eef9c03fb214ac6
      environment:
        JRE_TRUST_STORE: ${JRE_TRUST_STORE}
      contents:
        repositories:
          - https://dl-cdn.alpinelinux.org/alpine/v3.22/main
          - https://dl-cdn.alpinelinux.org/alpine/v3.22/community
        packages:
          - bash
        files:
          - url: git+https://github.com/jruby/jruby.git#9.4.14.0
            checksum: ddda6d5992f584190edb99ceccc0de9d63c9ca35
            path: ${source.dir}/jruby
            spdx:
              name: jruby
              version: 9.4.14.0
              packages:
                - name: jruby
                  purl: pkg:dhi/jruby@9.4.14.0
                  license: EPL-2.0 and GPL-2.0 and LGPL-2.1
            uid: 0
            gid: 0
      pipeline:
        - name: patch jruby stdlibs
          work-dir: ${source.dir}/jruby/lib
          privileged: true
          runs: |
            set -eux -o pipefail

            # update rexml for CVE-2025-58767
            ${source.dir}/patches/patch.sh rexml 3.4.4

            # update cgi for CVE-2025-27221 and CVE-2025-27220
            ${source.dir}/patches/patch.sh cgi 0.4.2

            # update json for CVE-2026-33210
            ${source.dir}/patches/patch.sh json 2.19.2

            # update uri for CVE-2025-61594
            ${source.dir}/patches/patch.sh uri 1.0.4

            # update uri for CVE-2026-0636 and CVE-2026-5588
            ${source.dir}/patches/patch.sh jruby-openssl 0.16.0
        - name: configure maven mirror
          runs: |
            set -eux -o pipefail

            mkdir -p /root/.m2
            cat > /root/.m2/settings.xml << 'EOF'
            <?xml version="1.0" encoding="UTF-8"?>
            <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
              <mirrors>
                <mirror>
                  <id>google-maven-central</id>
                  <name>GCS Maven Central mirror</name>
                  <url>https://maven-central.storage-download.googleapis.com/maven2/</url>
                  <mirrorOf>central</mirrorOf>
                </mirror>
              </mirrors>
            </settings>
            EOF
        - name: install jruby
          work-dir: ${source.dir}/jruby
          privileged: true
          runs: |
            set -eux -o pipefail

            # Point mvnw bootstrap at GCS mirror; it ignores settings.xml.
            sed -i "s|https://repo.maven.apache.org/maven2|https://maven-central.storage-download.googleapis.com/maven2|g" \
              .mvn/wrapper/maven-wrapper.properties

            # Set platform-specific Maven properties
            if [ "${ARCH}" = "aarch64" ]; then
              export MAVEN_OPTS="-Dos.arch=aarch64 -Dos.name=Linux -Dos.version=arm64"
              export JAVA_OPTS="-Dos.arch=aarch64"
            fi

            ./mvnw
        - name: Add lib and etc
          work-dir: ${source.dir}/jruby
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/opt/jruby/etc/
            echo 'install: --no-document' >> ${target.dir}/opt/jruby/etc/gemrc
            echo 'update: --no-document' >> ${target.dir}/opt/jruby/etc/gemrc

            cp -r lib ${target.dir}/opt/jruby
        - name: add jruby binaries
          work-dir: ${source.dir}/jruby/bin
          runs: |
            set -eux -o pipefail

            install -D -m 755 -t ${target.dir}/opt/jruby/bin jruby* ruby*
      paths:
        - type: file
          path: ${source.dir}/patches/patch.sh
          uid: 0
          gid: 0
          mode: "0777"
          source: image/jruby/patch/patch.sh
      outputs:
        - source: ${target.dir}/opt/jruby
          target: /opt/jruby
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/jruby
          target: /opt/docker/sbom/jruby
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.10.7-alpine3.22@sha256:ef1a003ee223a362010ba4a700bed045174c9a74b977dcbcca07f4b7b3fc1ae7
      includes:
        - opt/**
        - usr/local/bin/**
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.22"
  pretty-name: Docker Hardened Images/Alpine Linux v3.22
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  LD_LIBRARY_PATH: /usr/local/lib:${LD_LIBRARY_PATH}
  PATH: /opt/jruby/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
annotations:
  org.opencontainers.image.description: A minimal JRuby image
  org.opencontainers.image.licenses: EPL-2.0 and GPL-2.0 and LGPL-2.1
cmd:
  - jruby
