# syntax=dhi.io/build:2-debian13

name: KEDA Metrics API Server 2.20.x
image: dhi.io/keda-metrics-apiserver
variant: runtime
tags:
  - "2"
  - "2.20"
  - 2.20.1
  - 2-debian
  - 2-debian13
  - 2.20-debian
  - 2.20-debian13
  - 2.20.1-debian
  - 2.20.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-01"
vars:
  COMMIT_SHA: 875675ce5cd1d34772fe00a228a71b8bf05b3b43
  SEMVER_MAJOR_MINOR_VERSION: "2.20"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.20.1
  VERSION: 2.20.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: keda-go
      work-dir: /go/src/github.com/kedacore/keda
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kedacore/keda.git#v2.20.1
            checksum: 875675ce5cd1d34772fe00a228a71b8bf05b3b43
            path: /go/src/github.com/kedacore/keda
            spdx:
              name: keda-metrics-apiserver
              version: 2.20.1
              packages:
                - name: keda-metrics-apiserver
                  purl: pkg:dhi/keda-metrics-apiserver@2.20.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: remove vendor directory
          work-dir: /go/src/github.com/kedacore/keda
          runs: |
            set -eux -o pipefail

            rm -rf vendor
        - name: update go dependencies (2.20 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/kedacore/keda
          with:
            deps: []
            download: true
        - name: sync vendor directory
          work-dir: /go/src/github.com/kedacore/keda
          runs: |
            set -eux -o pipefail

            go mod vendor
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X=github.com/kedacore/keda/v2/version.GitCommit=875675ce5cd1d34772fe00a228a71b8bf05b3b43
              - -X=github.com/kedacore/keda/v2/version.Version=2.20.1
            output: ${target.dir}/keda-adapter
            packages: ./cmd/adapter/main.go
      outputs:
        - source: ${target.dir}/keda-adapter
          target: /keda-adapter
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/keda-metrics-apiserver
          target: /opt/docker/sbom/keda-metrics-apiserver
          uid: 0
          gid: 0
accounts:
  run-as: "65532"
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal KEDA Admission Webhooks image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /keda-adapter
cmd:
  - --secure-port=6443
  - --logtostderr=true
  - --v=0
