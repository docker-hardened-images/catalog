# syntax=dhi.io/build:2-debian13

name: Prometheus Operator 0.x (dev)
image: dhi.io/prometheus-operator
variant: dev
tags:
  - 0-dev
  - 0.91-dev
  - 0.91.0-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.91-debian-dev
  - 0.91-debian13-dev
  - 0.91.0-debian-dev
  - 0.91.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: e138807d6fce676cdc34cc60ca45d02dd36b0a53
  SEMVER_MAJOR_MINOR_VERSION: "0.91"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.91.0
  TAG: v0.91.0
  VERSION: 0.91.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: prometheus-operator
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
        files:
          - url: git+https://github.com/prometheus-operator/prometheus-operator.git#v0.91.0
            checksum: e138807d6fce676cdc34cc60ca45d02dd36b0a53
            path: /go/src/github.com/prometheus-operator/prometheus-operator
            spdx:
              name: prometheus-operator
              version: 0.91.0
              packages:
                - name: prometheus-operator
                  purl: pkg:golang/github.com/prometheus-operator/prometheus-operator@0.91.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/prometheus-operator/prometheus-operator
          with:
            deps:
              - golang.org/x/net@v0.55.0
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/prometheus-operator/prometheus-operator
          with:
            ldflags:
              - -X github.com/prometheus/common/version.Version=0.91.0
              - -X github.com/prometheus/common/version.Revision=e138807d6fce676cdc34cc60ca45d02dd36b0a53
              - -X github.com/prometheus/common/version.Branch=dhi
              - -X github.com/prometheus/common/version.BuildUser=dhi
              - -X github.com/prometheus/common/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%F-%T')
            output: ${target.dir}/usr/local/bin/prometheus-operator
            packages: ./cmd/operator/
      outputs:
        - source: ${target.dir}/usr/local/bin/prometheus-operator
          target: /usr/local/bin/prometheus-operator
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/prometheus-operator
          target: /opt/docker/sbom/prometheus-operator
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal prometheus-operator image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/prometheus-operator
