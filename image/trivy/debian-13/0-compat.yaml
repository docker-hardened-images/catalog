# syntax=dhi.io/build:2-debian13

name: Trivy 0.x (compat)
image: dhi.io/trivy
variant: runtime
flavor: compat
tags:
  - 0-compat
  - 0.71-compat
  - 0.71.2-compat
  - 0-debian-compat
  - 0-debian13-compat
  - 0.71-debian-compat
  - 0.71-debian13-compat
  - 0.71.2-debian-compat
  - 0.71.2-debian13-compat
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 055a5c8a53bfd61f7a8e276a5b2f0c3fc1673420
  MAGE_VERSION: 1.15.0
  SEMVER_MAJOR_MINOR_VERSION: "0.71"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.71.2
  VERSION: 0.71.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - bzip2
    - ca-certificates
    - coreutils
    - dash
  builds:
    - name: trivy
      work-dir: /go/src/github.com/aquasecurity/trivy
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - git
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/aquasecurity/trivy.git#v0.71.2
            checksum: 055a5c8a53bfd61f7a8e276a5b2f0c3fc1673420
            path: /go/src/github.com/aquasecurity/trivy
            spdx:
              name: trivy
              version: 0.71.2
              packages:
                - name: trivy
                  purl: pkg:golang/github.com/aquasecurity/trivy@0.71.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: install mage
          privileged: true
          runs: |
            set -eux -o pipefail

            GODEBUG="" GOFIPS140="" go install "github.com/magefile/mage@v1.15.0"
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - github.com/containerd/containerd/v2@v2.3.2
            download: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            export PATH="$(go env GOPATH)/bin:$PATH"

            GODEBUG="" GOFIPS140="" CGO_ENABLED=0 GOEXPERIMENT=jsonv2 mage test:unit
        - name: build
          uses: go/build@v1
          with:
            experiments: jsonv2
            ldflags:
              - -X github.com/aquasecurity/trivy/pkg/version/app.ver=0.71.2
              - -X main.version=0.71.2
              - -X main.commit=055a5c8a53bfd61f7a8e276a5b2f0c3fc1673420
              - -X main.date=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/local/bin/trivy
            packages: ./cmd/trivy
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/trivy
          target: /opt/docker/sbom/trivy
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Trivy image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - trivy
