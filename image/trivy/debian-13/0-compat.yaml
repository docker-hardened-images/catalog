# syntax=dhi.io/build:2-debian13

name: Trivy 0.x (compat)
image: dhi.io/trivy
variant: runtime
flavor: compat
tags:
  - 0-compat
  - 0.71-compat
  - 0.71.2-compat
  - 0-debian-compat
  - 0-debian13-compat
  - 0.71-debian-compat
  - 0.71-debian13-compat
  - 0.71.2-debian-compat
  - 0.71.2-debian13-compat
platforms:
  - linux/amd64
  - linux/arm64
vars:
  FLAVORED_SUFFIX: -compat
  SEMVER_MAJOR_MINOR_VERSION: "0.71"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.71.2
  SUFFIX: ""
  VERSION: 0.71.2-2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - bzip2
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - dash
    - trivy=0.71.2-2
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Trivy image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - trivy
