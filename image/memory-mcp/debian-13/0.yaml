# syntax=dhi.io/build:2-debian13

name: Memory MCP Server 2026.x
image: dhi.io/memory-mcp
variant: runtime
tags:
  - "2026"
  - "2026.7"
  - 2026.7.10
  - 2026-debian
  - 2026-debian13
  - 2026.7-debian
  - 2026.7-debian13
  - 2026.7.10-debian
  - 2026.7.10-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 9a96ea6e5913736f92b88345bf51caeaaa8e719f
  SEMVER_MAJOR_MINOR_VERSION: "2026.7"
  SEMVER_MAJOR_VERSION: "2026"
  SEMVER_VERSION: 2026.7.10
  VERSION: 2026.7.10
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - libc6
    - libgomp1
    - libstdc++6
    - netbase
    - nodejs-24
    - tzdata
  builds:
    - name: memory-mcp
      contents:
        packages:
          - base-files
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - git
          - libc6
          - libstdc++6
          - mawk
          - nodejs-24
          - node-corepack
          - npm
          - sed
          - yarn-classic
        files:
          - url: git+https://github.com/modelcontextprotocol/servers.git#2026.7.10
            checksum: 9a96ea6e5913736f92b88345bf51caeaaa8e719f
            path: ${source.dir}/servers
            spdx:
              name: memory-mcp
              version: 2026.7.10
              packages:
                - name: memory-mcp
                  purl: pkg:dhi/memory-mcp@2026.7.10
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: bump
          uses: npm/bump@v1
          privileged: true
          environment:
            DHI_NO_SFW: "true"
            NPM_CONFIG_IGNORE_SCRIPTS: "true"
          with:
            bumps: ${source.dir}/patch/npm-bumps.json
            npm-root: ${source.dir}/servers/src/memory
        - name: install
          work-dir: ${source.dir}/servers/src/memory
          privileged: true
          runs: |
            set -eux -o pipefail

            rm -rf ../../package.json
            rm -rf ../../package-lock.json

            npm install
            npm run build

            rm -rf node_modules

            npm ci --ignore-scripts --omit=dev
      paths:
        - type: file
          path: ${source.dir}/patch/npm-bumps.json
          uid: 0
          gid: 0
          source: image/memory-mcp/patch/npm-bumps.json
      outputs:
        - source: ${source.dir}/servers/src/memory/node_modules
          target: /app/node_modules
          uid: 0
          gid: 0
        - source: ${source.dir}/servers/src/memory/dist
          target: /app/dist
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/memory-mcp
          target: /opt/docker/sbom/memory-mcp
          uid: 0
          gid: 0
accounts:
  run-as: node
  users:
    - name: node
      uid: 1000
      gid: 1000
  groups:
    - name: node
      gid: 1000
      members:
        - node
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  MEMORY_FILE_PATH: /data/memory.json
  NODE_ENV: production
paths:
  - type: directory
    path: /data
    uid: 1000
    gid: 1000
    mode: "0755"
annotations:
  org.opencontainers.image.description: Memory MCP Server
  org.opencontainers.image.licenses: MIT
labels:
  io.modelcontextprotocol.server.name: io.github.modelcontextprotocol/server-memory
entrypoint:
  - node
  - /app/dist/index.js
