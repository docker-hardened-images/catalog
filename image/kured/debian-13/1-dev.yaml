contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: kured
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:b50864310796206ff91b76f04e0cd4f13c29b7721d7571336bfc75a116c40693
      work-dir: /go/src/github.com/kubereboot/kured
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - binutils-gold
          - libcap2-bin
        files:
          - url: git+https://github.com/kubereboot/kured.git#1.21.0
            checksum: 779a3328671312eaef105190467a542c5863e91a
            path: /go/src/github.com/kubereboot/kured
            spdx:
