                - name: kured
                  purl: pkg:golang/github.com/kubereboot@1.21.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/net@v0.45.0
              - github.com/moby/spdystream@v0.5.1
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            # Skip kind tests as they require kind binary and cluster setup
            go test $(go list ./... | grep -v '/tests/kind')
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -s -w
              - -X main.version=1.21.0
            output: ${target.dir}/usr/bin/kured
            packages: ./cmd/kured
        - name: setcap
          runs: |
            set -eux -o pipefail

            setcap cap_kill+ep ${target.dir}/usr/bin/kured
      outputs:
        - source: ${target.dir}/usr/bin/kured
          target: /usr/bin/kured
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kured
          target: /opt/docker/sbom/kured
          uid: 0
          gid: 0
  artifacts:
