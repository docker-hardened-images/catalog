# syntax=dhi.io/build:2-debian13

name: Kured 1.22.x (dev)
image: dhi.io/kured
variant: dev
tags:
  - 1-dev
  - 1.22-dev
  - 1.22.1-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.22-debian-dev
  - 1.22-debian13-dev
  - 1.22.1-debian-dev
  - 1.22.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-01-22"
vars:
  COMMIT_SHA: 5e3699d68d8a707fa0404a7771f6ae372a930d0e
  SEMVER_MAJOR_MINOR_VERSION: "1.22"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.22.1
  VERSION: 1.22.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: kured
      work-dir: /go/src/github.com/kubereboot/kured
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - binutils-gold
          - libcap2-bin
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kubereboot/kured.git#1.22.1
            checksum: 5e3699d68d8a707fa0404a7771f6ae372a930d0e
            path: /go/src/github.com/kubereboot/kured
            spdx:
              name: kured
              version: 1.22.1
              packages:
                - name: kured
                  purl: pkg:golang/github.com/kubereboot@1.22.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - github.com/moby/spdystream@v0.5.1
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Skip kind tests as they require kind binary and cluster setup
            go test $(go list ./... | grep -v '/tests/kind')
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -s -w
              - -X main.version=1.22.1
            output: ${target.dir}/usr/bin/kured
            packages: ./cmd/kured
        - name: setcap
          runs: |
            set -eux -o pipefail

            setcap cap_kill+ep ${target.dir}/usr/bin/kured
      outputs:
        - source: ${target.dir}/usr/bin/kured
          target: /usr/bin/kured
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kured
          target: /opt/docker/sbom/kured
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Kubernetes Reboot Daemon image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/kured
