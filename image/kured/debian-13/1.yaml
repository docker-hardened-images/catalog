# syntax=dhi.io/build:2-debian13

name: Kured 1.23.x
image: dhi.io/kured
variant: runtime
tags:
  - "1"
  - "1.23"
  - 1.23.0
  - 1-debian
  - 1-debian13
  - 1.23-debian
  - 1.23-debian13
  - 1.23.0-debian
  - 1.23.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-01-22"
vars:
  COMMIT_SHA: ef3c90b2bd58c0571e6eae7b893f0de3709cc98f
  SEMVER_MAJOR_MINOR_VERSION: "1.23"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.23.0
  VERSION: 1.23.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates
    - ca-certificates-bundle
    - tzdata
    - util-linux
  builds:
    - name: kured
      work-dir: /go/src/github.com/kubereboot/kured
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - binutils-gold
          - libcap2-bin
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kubereboot/kured.git#1.23.0
            checksum: ef3c90b2bd58c0571e6eae7b893f0de3709cc98f
            path: /go/src/github.com/kubereboot/kured
            spdx:
              name: kured
              version: 1.23.0
              packages:
                - name: kured
                  purl: pkg:golang/github.com/kubereboot@1.23.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - github.com/moby/spdystream@v0.5.1
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Skip kind tests as they require kind binary and cluster setup
            go test $(go list ./... | grep -v '/tests/kind')
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -s -w
              - -X main.version=1.23.0
            output: ${target.dir}/usr/bin/kured
            packages: ./cmd/kured
        - name: setcap
          runs: |
            set -eux -o pipefail

            setcap cap_kill+ep ${target.dir}/usr/bin/kured
      outputs:
        - source: ${target.dir}/usr/bin/kured
          target: /usr/bin/kured
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kured
          target: /opt/docker/sbom/kured
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Kubernetes Reboot Daemon image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/kured
