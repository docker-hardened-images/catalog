// Gradle init script: CVE-remediated dependency versions at resolution time.
//
// Upstream version catalog for OpenSearch 3.6.x (example tag context):
// https://github.com/opensearch-project/OpenSearch/blob/main/gradle/libs.versions.toml
//
// Mirrors the Elasticsearch DHI pattern (per-minor overrides + --init-script):
// deterministic eachDependency substitutions for versions this upstream line ships.

allprojects {
    configurations.all {
        resolutionStrategy.eachDependency { details ->
            def grp = details.requested.group
            def ver = details.requested.version

            // log4j 2.25.3 -> 2.25.4 (CVE-2026-34477, CVE-2026-34478, CVE-2026-34480)
            if (grp == "org.apache.logging.log4j" && ver == "2.25.3") {
                details.useVersion("2.25.4")
                details.because("CVE remediation: pin log4j")
            }

            // Netty 4.2.12.Final -> 4.2.13.Final (CVE-2026-41417, CVE-2026-42578,
            // CVE-2026-42580-42585, CVE-2026-42587)
            if (grp == "io.netty" && ver == "4.2.12.Final") {
                details.useVersion("4.2.13.Final")
                details.because("CVE remediation: pin netty")
            }

            // httpclient5 5.6 / 5.6.0 -> 5.6.1 (CVE-2026-40542)
            if (grp == "org.apache.httpcomponents.client5"
                    && (ver == "5.6" || ver == "5.6.0")) {
                details.useVersion("5.6.1")
                details.because("CVE remediation: pin httpclient5")
            }
        }
    }
}
