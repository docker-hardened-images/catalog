# Default pipeline shipped with the Docker Hardened Image so the container starts
# cleanly out of the box. Override by mounting your own pipelines.yaml at
# /usr/share/data-prepper/pipelines/ at runtime. This default emits random sample
# events to stdout once per minute; it does not connect to any external sink.
sample-pipeline:
  workers: 1
  delay: "60000"
  source:
    random:
  sink:
    - stdout:
