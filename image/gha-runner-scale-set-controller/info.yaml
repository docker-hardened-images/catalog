metadata:
  display-name: Actions Runner Controller
  short-description: Kubernetes controller that orchestrates ephemeral self-hosted GitHub Actions runners using autoscaling runner scale sets.
  featured: false
  home-url: https://github.com/actions/actions-runner-controller
  categories:
    - developer-tools
    - integration-and-delivery
  included-tools:
    - name: manager
      description: Controller manager that reconciles runner scale set resources.
    - name: ghalistener
      description: Listener that polls GitHub for queued jobs and scales runners.
    - name: github-webhook-server
      description: Optional webhook server for webhook-driven runner autoscaling.
    - name: actions-metrics-server
      description: Optional server that exposes GitHub Actions workflow metrics.
