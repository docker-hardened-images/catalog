name: Trino 479 (compat, dev)
image: dhi.io/trino
variant: dev
flavor: compat
tags:
  - 479-compat-dev
  - 479-debian13-compat-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-29"
vars:
  ARCH: '#{ target.arch == "amd64" ? "amd64" : "arm64" }'
  COMMIT_SHA: 1b3a3e39a657642b0c4f76a5439dae859f93b4b1
  DEBIAN_REFERENCE: dhi/debian-base:trixie-debian13@sha256:75eec9a1a76a02ddf88761684efd9a72de6a5ec2c5d1abd002c03a475d5d23b7
  GOLANG_REFERENCE: dhi/golang:1.26.1-debian13-dev@sha256:0517a2c5ce6ab35fadf27bc7e2a2e3188c379af9fa9f59c20b3cfea7d926aca6
  JAVA_MAJOR_VERSION: "25"
  JAVA_VERSION: 25.0.2
  JDK_REF: dhi/eclipse-temurin:25.0.1-jdk-debian13-dev@sha256:79208312bdfd04cb8d73821c60a9b5225c2b9c1a42ee0e497c42d3a051615a9a
  JRE_REF: dhi/eclipse-temurin:25.0.2.10-debian13@sha256:31fe1821e725cea0cbbf4593eb3a5e9a2ebb5c1bc0a7047f43d36270a9aa56c0
  JVM_KILL_COMMIT: 8a6ae95b38905f98ce6b7b727efb2dc75da16e11
  LAUNCHER_COMMIT_SHA: 313376f4c586673d640ce901c5d5e4e077e44e8a
  LAUNCHER_VERSION: "315"
  MAVEN_REF: dhi/maven:3.9.14-jdk25-debian13-dev@sha256:8b7d83c30c511ce62adff7677bbb5ae6b5da1b59c06cea3301a7d9ef807afe00
  MAVEN_VERSION: 3.9.14
  NODE_REF: dhi/node:22.22.1-debian13@sha256:b03d357da4519d517266938d12da8df1c01be3453bce97c50700a8e8131cbc0c
  VERSION: "479"
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - curl
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libstdc++6
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: jvmkill
      uses: dhi.io/eclipse-temurin:25.0.1-jdk-debian13-dev@sha256:79208312bdfd04cb8d73821c60a9b5225c2b9c1a42ee0e497c42d3a051615a9a
      contents:
        packages:
          - gcc
          - libc6-dev
        files:
          - url: git+https://github.com/airlift/jvmkill.git#8a6ae95b38905f98ce6b7b727efb2dc75da16e11
            checksum: 8a6ae95b38905f98ce6b7b727efb2dc75da16e11
            path: ${source.dir}/jvmkill
            spdx:
              name: jvmkill
              packages:
                - name: jvmkill
                  purl: pkg:generic/airlift/jvmkill
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build jvmkill
          work-dir: ${source.dir}/jvmkill
          runs: |
            set -eux -o pipefail

            INCLUDE="-I${JAVA_HOME}/include -I${JAVA_HOME}/include/linux"
            CFLAGS="-Wall -Werror -fPIC -shared ${INCLUDE}"
            gcc ${CFLAGS} -o libjvmkill.so jvmkill.c
      outputs:
        - source: ${source.dir}/jvmkill/libjvmkill.so
          target: /usr/lib/trino/bin/libjvmkill.so
          uid: 1000
          gid: 1000
          mode: "0644"
        - source: /opt/docker/sbom/jvmkill
          target: /opt/docker/sbom/jvmkill
          uid: 0
          gid: 0
    - name: trino
      uses: dhi.io/golang:1.26.1-debian13-dev@sha256:0517a2c5ce6ab35fadf27bc7e2a2e3188c379af9fa9f59c20b3cfea7d926aca6
      environment:
        JAVA_HOME: /opt/java/openjdk/25
      contents:
        packages:
          - gzip
        files:
          - url: git+https://github.com/trinodb/trino.git#479
            checksum: 1b3a3e39a657642b0c4f76a5439dae859f93b4b1
            path: ${source.dir}/trino
            spdx:
              name: trino
              version: "479"
              packages:
                - name: trino
                  purl: pkg:dhi/trino@479
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: git+https://github.com/airlift/launcher.git#315
            checksum: 313376f4c586673d640ce901c5d5e4e077e44e8a
            path: /go/src/github.com/airlift/launcher
            spdx:
              name: launcher
              version: "315"
              packages:
                - name: launcher
                  purl: pkg:golang/launcher@315
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/at/yawk/lz4/lz4-java/1.10.1/lz4-java-1.10.1.jar
            path: ${source.dir}/patch/at.yawk.lz4.lz4-java-1.10.1.jar
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:22.22.1-debian13@sha256:b03d357da4519d517266938d12da8df1c01be3453bce97c50700a8e8131cbc0c
            includes:
              - opt/nodejs
              - usr/local/bin
            uid: 0
            gid: 0
          - name: dhi.io/eclipse-temurin:25.0.1-jdk-debian13-dev@sha256:79208312bdfd04cb8d73821c60a9b5225c2b9c1a42ee0e497c42d3a051615a9a
            includes:
              - opt/**
            uid: 0
            gid: 0
          - name: dhi.io/maven:3.9.14-jdk25-debian13-dev@sha256:8b7d83c30c511ce62adff7677bbb5ae6b5da1b59c06cea3301a7d9ef807afe00
            includes:
              - opt/**
              - usr/local/bin/**
            uid: 0
            gid: 0
      pipeline:
        - name: patch dependencies
          uses: patch@v1
          work-dir: ${source.dir}/trino
          with:
            options: -p1
            patches:
              - /src/patch/ch-guava-grpc.patch
              - /src/patch/lz4.patch
        - name: maven patch
          uses: mvn/patch@v1
          with:
            dependencies: ${source.dir}/patch/mvn-deps.json
            dependencies-key: dependencyManagement.dependencies
            downgrade: false
            mvn-root: ${source.dir}/trino
        - name: opensearch plugin - maven patch
          uses: mvn/patch@v1
          with:
            downgrade: false
            mvn-root: ${source.dir}/trino/plugin/trino-opensearch
            properties: ${source.dir}/patch/opensearch-mvn-properties.json
        - name: build
          work-dir: ${source.dir}/trino
          privileged: true
          runs: |
            set -eux -o pipefail

            ./mvnw sortpom:sort -Ddep.jackson.version=2.21.1 -Ddep.logback.version=1.5.25 -Ddep.aircompressor.version=2.0.3
            ./mvnw package -q -DskipTests -Dair.check.skip-all -Dmaven.enforcer.skip=true -Dmaven.test.failure.ignore=true -Ddep.jackson.version=2.21.1 -Ddep.logback.version=1.5.25 -Ddep.aircompressor.version=2.0.3 \
              -pl '!:trino-docs' -am

            tar -C "${target.dir}" -xzf "${source.dir}/trino/core/trino-server/target/trino-server-479.tar.gz" --wildcards \
              "trino-server-479/lib" \
              "trino-server-479/plugin" \
              "trino-server-479/secrets-plugin" \
              "trino-server-479/bin/launcher*" \
              "trino-server-479/bin/linux-${ARCH}"
        - name: replace vulnerable secrets-plugin jackson jars
          work-dir: ${target.dir}/trino-server-479/secrets-plugin/keystore-secrets-plugin
          shell: bash
          runs: |
            set -eux -o pipefail

            for old_jar in jackson-*-2.20.1.jar; do
              [ -f "$old_jar" ] || continue
              new_jar="${old_jar/2.20.1/2.21.1}"
              src=$(find "${HOME}/.m2/repository" -name "$new_jar" -print -quit 2> /dev/null)
              if [ -n "$src" ]; then
                echo "Replacing $old_jar with $new_jar"
                rm "$old_jar"
                cp "$src" .
              else
                echo "ERROR: Could not find $new_jar in Maven cache"
                exit 1
              fi
            done
        - name: address plugin cves
          work-dir: ${target.dir}/trino-server-479/plugin
          runs: |
            set -eux -o pipefail

            rm -r ranger
        - name: replace vulnerable plugin jars
          work-dir: ${target.dir}/trino-server-479/plugin
          shell: bash
          runs: |
            set -eux -o pipefail

            mapfile -t OLD_JARS_ARR < <(find . -type f -name org.lz4_lz4-java-1.8.0.jar)
            FIRST_DIR=$(dirname "${OLD_JARS_ARR[0]}")
            for i in "${!OLD_JARS_ARR[@]}"; do
              FILE_DIR=$(dirname "${OLD_JARS_ARR[$i]}")
              echo "Removing vulnerable jar from ${FILE_DIR}..."
              rm "${OLD_JARS_ARR[$i]}"
              if [ "$i" == 0 ]; then
                echo "Copying replacement jar..."
                cp "${source.dir}/patch/at.yawk.lz4.lz4-java-1.10.1.jar" "${FILE_DIR}"
              else
                echo "Linking replacement jar..."
                ln "${FIRST_DIR}/at.yawk.lz4.lz4-java-1.10.1.jar" "${FILE_DIR}/at.yawk.lz4.lz4-java-1.10.1.jar"
              fi
            done
        - name: patch launcher
          uses: go/bump@v1
          work-dir: /go/src/github.com/airlift/launcher/src/main/go
          with:
            deps: []
            download: true
        - name: build launcher
          uses: go/build@v1
          work-dir: /go/src/github.com/airlift/launcher/src/main/go
          with:
            ldflags:
              - -extldflags=-static
              - -X launcher/args.Version=315
            output: ${target.dir}/trino-server-479/bin/linux-${ARCH}/launcher
      paths:
        - type: file
          path: /src/patch/ch-guava-grpc.patch
          uid: 0
          gid: 0
          source: image/trino/patch/ch-guava-grpc.patch
        - type: file
          path: /src/patch/lz4.patch
          uid: 0
          gid: 0
          source: image/trino/patch/lz4.patch
        - type: file
          path: /src/patch/minimal-plugins.json
          uid: 0
          gid: 0
          source: image/trino/patch/minimal-plugins.json
        - type: file
          path: /src/patch/mvn-deps.json
          uid: 0
          gid: 0
          source: image/trino/patch/mvn-deps.json
        - type: file
          path: /src/patch/opensearch-mvn-properties.json
          uid: 0
          gid: 0
          source: image/trino/patch/opensearch-mvn-properties.json
      outputs:
        - source: ${source.dir}/trino/client/trino-cli/target/trino-cli-479-executable.jar
          target: /usr/bin/trino
          uid: 1000
          gid: 1000
        - source: ${target.dir}/trino-server-479
          target: /usr/lib/trino
          uid: 1000
          gid: 1000
        - source: ${source.dir}/trino/core/docker/bin
          target: /usr/lib/trino/bin
          uid: 1000
          gid: 1000
        - source: ${source.dir}/trino/core/docker/default/etc
          target: /etc/trino
          uid: 1000
          gid: 1000
        - source: /opt/docker/sbom/trino
          target: /opt/docker/sbom/trino
          uid: 0
          gid: 0
    - name: locale
      uses: dhi.io/debian-base:trixie-debian13@sha256:75eec9a1a76a02ddf88761684efd9a72de6a5ec2c5d1abd002c03a475d5d23b7
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:25.0.2.10-debian13@sha256:31fe1821e725cea0cbbf4593eb3a5e9a2ebb5c1bc0a7047f43d36270a9aa56c0
      includes:
        - opt/**
      uid: 0
      gid: 0
accounts:
