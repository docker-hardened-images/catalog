# syntax=dhi.io/build:2-debian13

name: Trino 480
image: dhi.io/trino
variant: runtime
tags:
  - "480"
  - 480-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-29"
vars:
  ARCH: '#{ target.arch == "amd64" ? "amd64" : "arm64" }'
  COMMIT_SHA: 0ace945c7bbffa0d89b18cbae09151f4ae293c30
  GOLANG_REFERENCE: dhi/golang:1.26.2-debian13-dev@sha256:086c893153f92793f3a1541793cd4a8e8b23bfd4ccaf70c8f4261f496080fb0e
  JAVA_MAJOR_VERSION: "25"
  JAVA_VERSION: 25.0.2
  JDK_REF: dhi/eclipse-temurin:25.0.1-jdk-debian13-dev@sha256:79208312bdfd04cb8d73821c60a9b5225c2b9c1a42ee0e497c42d3a051615a9a
  JRE_REF: dhi/eclipse-temurin:25.0.2.10-debian13@sha256:94c1b39de66634ed637c1f1f3646c3d717af11b6dd63535cab16ca2fb8626e3b
  JVM_KILL_COMMIT: 8a6ae95b38905f98ce6b7b727efb2dc75da16e11
  LAUNCHER_COMMIT_SHA: 313376f4c586673d640ce901c5d5e4e077e44e8a
  LAUNCHER_VERSION: "315"
  MAVEN_REF: dhi/maven:3.9.14-jdk25-debian13-dev@sha256:2eee0b99c8e296473c0b366771efc7809591f70c5984c8e834411251ff917723
  MAVEN_VERSION: 3.9.14
  NODE_REF: dhi/node:22.22.2-debian13@sha256:630af71fcc709a1f1a5da4f541f4aae89692838b9828cd2e8b511fab001cfa64
  VERSION: "480"
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - coreutils
    - curl
    - grep
    - libstdc++6
  builds:
    - name: jvmkill
      uses: dhi.io/eclipse-temurin:25.0.1-jdk-debian13-dev@sha256:79208312bdfd04cb8d73821c60a9b5225c2b9c1a42ee0e497c42d3a051615a9a
      contents:
        packages:
          - gcc
          - libc6-dev
        files:
          - url: git+https://github.com/airlift/jvmkill.git#8a6ae95b38905f98ce6b7b727efb2dc75da16e11
            checksum: 8a6ae95b38905f98ce6b7b727efb2dc75da16e11
            path: ${source.dir}/jvmkill
            spdx:
              name: jvmkill
              packages:
                - name: jvmkill
                  purl: pkg:generic/airlift/jvmkill
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build jvmkill
          work-dir: ${source.dir}/jvmkill
          runs: |
            set -eux -o pipefail

            INCLUDE="-I${JAVA_HOME}/include -I${JAVA_HOME}/include/linux"
            CFLAGS="-Wall -Werror -fPIC -shared ${INCLUDE}"
            gcc ${CFLAGS} -o libjvmkill.so jvmkill.c
      outputs:
        - source: ${source.dir}/jvmkill/libjvmkill.so
          target: /usr/lib/trino/bin/libjvmkill.so
          uid: 1000
          gid: 1000
          mode: "0644"
        - source: /opt/docker/sbom/jvmkill
          target: /opt/docker/sbom/jvmkill
          uid: 0
          gid: 0
    - name: trino
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:086c893153f92793f3a1541793cd4a8e8b23bfd4ccaf70c8f4261f496080fb0e
      environment:
        JAVA_HOME: /opt/java/openjdk/25
      contents:
        packages:
          - gzip
        files:
          - url: git+https://github.com/trinodb/trino.git#480
            checksum: 0ace945c7bbffa0d89b18cbae09151f4ae293c30
            path: ${source.dir}/trino
            spdx:
              name: trino
              version: "480"
              packages:
                - name: trino
                  purl: pkg:dhi/trino@480
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: git+https://github.com/airlift/launcher.git#315
            checksum: 313376f4c586673d640ce901c5d5e4e077e44e8a
            path: /go/src/github.com/airlift/launcher
            spdx:
              name: launcher
              version: "315"
              packages:
                - name: launcher
                  purl: pkg:golang/launcher@315
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:22.22.2-debian13@sha256:630af71fcc709a1f1a5da4f541f4aae89692838b9828cd2e8b511fab001cfa64
            includes:
              - opt/nodejs
              - usr/local/bin
            uid: 0
            gid: 0
          - name: dhi.io/eclipse-temurin:25.0.1-jdk-debian13-dev@sha256:79208312bdfd04cb8d73821c60a9b5225c2b9c1a42ee0e497c42d3a051615a9a
            includes:
              - opt/**
            uid: 0
            gid: 0
          - name: dhi.io/maven:3.9.14-jdk25-debian13-dev@sha256:2eee0b99c8e296473c0b366771efc7809591f70c5984c8e834411251ff917723
            includes:
              - opt/**
              - usr/local/bin/**
            uid: 0
            gid: 0
      pipeline:
        - name: patch dependencies
          uses: patch@v1
          work-dir: ${source.dir}/trino
          with:
            options: -p1
            patches:
              - /src/patch/ch-guava-grpc.patch
        - name: maven patch
          uses: mvn/patch@v1
          with:
            dependencies: ${source.dir}/patch/mvn-deps.json
            dependencies-key: dependencyManagement.dependencies
            downgrade: false
            mvn-root: ${source.dir}/trino
            properties: ${source.dir}/patch/mvn-properties.json
        - name: build
          work-dir: ${source.dir}/trino
          privileged: true
          runs: |
            set -eux -o pipefail

            ./mvnw sortpom:sort
            ./mvnw package -q -DskipTests -Dair.check.skip-all -Dmaven.enforcer.skip=true -Dmaven.test.failure.ignore=true -pl '!:trino-docs' -am

            tar -C "${target.dir}" -xzf "${source.dir}/trino/core/trino-server/target/trino-server-480.tar.gz" --wildcards \
              "trino-server-480/lib" \
              "trino-server-480/plugin" \
              "trino-server-480/secrets-plugin" \
              "trino-server-480/bin/launcher*" \
              "trino-server-480/bin/linux-${ARCH}"
        - name: replace vulnerable secrets-plugin jackson jars
          work-dir: ${target.dir}/trino-server-480/secrets-plugin/keystore-secrets-plugin
          shell: bash
          runs: |
            set -eux -o pipefail

            for old_jar in jackson-*-2.20.1.jar; do
              [ -f "$old_jar" ] || continue
              new_jar="${old_jar/2.20.1/2.21.1}"
              src=$(find "${HOME}/.m2/repository" -name "$new_jar" -print -quit 2> /dev/null)
              if [ -n "$src" ]; then
                echo "Replacing $old_jar with $new_jar"
                rm "$old_jar"
                cp "$src" .
              else
                echo "ERROR: Could not find $new_jar in Maven cache"
                exit 1
              fi
            done
        - name: remove optional plugins
          work-dir: ${target.dir}/trino-server-480/plugin
          runs: |
            set -eux -o pipefail

            PLUGINS_TO_REMOVE=$(ls | jq -R -r -n --slurpfile allowlist ${source.dir}/patch/minimal-plugins.json '[inputs] - $allowlist[0] | .[]')

            echo "Removing all plugins that aren't in essential list..."

            for plugin_folder in $PLUGINS_TO_REMOVE; do
              rm -r "${plugin_folder}"
            done
        - name: patch launcher
          uses: go/bump@v1
          work-dir: /go/src/github.com/airlift/launcher/src/main/go
          with:
            deps: []
            download: true
        - name: build launcher
          uses: go/build@v1
          work-dir: /go/src/github.com/airlift/launcher/src/main/go
          with:
            ldflags:
              - -extldflags=-static
              - -X launcher/args.Version=315
            output: ${target.dir}/trino-server-480/bin/linux-${ARCH}/launcher
      paths:
        - type: file
          path: /src/patch/bc-fips-hkdf.diff
          uid: 0
          gid: 0
          source: image/trino/patch/bc-fips-hkdf.diff
        - type: file
          path: /src/patch/ch-guava-grpc.patch
          uid: 0
          gid: 0
          source: image/trino/patch/ch-guava-grpc.patch
        - type: file
          path: /src/patch/minimal-plugins.json
          uid: 0
          gid: 0
          source: image/trino/patch/minimal-plugins.json
        - type: file
          path: /src/patch/mvn-deps.json
          uid: 0
          gid: 0
          source: image/trino/patch/mvn-deps.json
        - type: file
          path: /src/patch/mvn-properties.json
          uid: 0
          gid: 0
          source: image/trino/patch/mvn-properties.json
      outputs:
        - source: ${source.dir}/trino/client/trino-cli/target/trino-cli-480-executable.jar
          target: /usr/bin/trino
          uid: 1000
          gid: 1000
        - source: ${target.dir}/trino-server-480
          target: /usr/lib/trino
          uid: 1000
          gid: 1000
        - source: ${source.dir}/trino/core/docker/bin
          target: /usr/lib/trino/bin
          uid: 1000
          gid: 1000
        - source: ${source.dir}/trino/core/docker/default/etc
          target: /etc/trino
          uid: 1000
          gid: 1000
        - source: /opt/docker/sbom/trino
          target: /opt/docker/sbom/trino
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:25.0.2.10-debian13@sha256:94c1b39de66634ed637c1f1f3646c3d717af11b6dd63535cab16ca2fb8626e3b
      includes:
        - opt/**
      uid: 0
      gid: 0
accounts:
  run-as: trino
  users:
    - name: trino
      uid: 1000
      gid: 1000
  groups:
    - name: trino
      gid: 1000
      members:
        - trino
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  CATALOG_MANAGEMENT: static
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/java/openjdk/25-jre/bin
paths:
  - type: directory
    path: /data/trino
    uid: 1000
    gid: 1000
annotations:
  org.opencontainers.image.description: A minimal Trino image
  org.opencontainers.image.licenses: Apache-2.0
cmd:
  - /usr/lib/trino/bin/run-trino
ports:
  - 8080/tcp
