# syntax=dhi.io/build:2-debian13

name: Trino 482 (dev)
image: dhi.io/trino
variant: dev
tags:
  - 482-dev
  - 482-debian-dev
  - 482-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-29"
vars:
  ARCH: '#{ target.arch == "amd64" ? "amd64" : "arm64" }'
  COMMIT_SHA: f04d222fbeedaf888ac3c907748209c7e716a4c2
  GOLANG_REFERENCE: dhi/golang:1.26.5-debian13-dev@sha256:ae1f6a80aec9e82d8431115d9148f4c8e932efe04d706a51a30a5c0609a72ab9
  JAVA_FIPS_SUFFIX: ""
  JAVA_VARIANT: jdk
  JDK_MAJOR_VERSION: "25"
  JVM_KILL_COMMIT: 8a6ae95b38905f98ce6b7b727efb2dc75da16e11
  LAUNCHER_COMMIT_SHA: e0e239b162b4dd45f60aacd5c58394d2832d0d13
  LAUNCHER_VERSION: "318"
  MAVEN_REFERENCE: dhi/maven:3.9.16-jdk25-debian13-dev@sha256:7aa9ce329c418fb20951be218997e77c57c62b4faec4e67e30bbf98c1d5e0d06
  MAVEN_VERSION: 3.9.16
  VERSION: "482"
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - curl
    - diffutils
    - dpkg
    - eclipse-temurin-25-jdk
    - eclipse-temurin-25-jdk-oci-config
    - findutils
    - grep
    - libc-bin
    - libstdc++6
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: jvmkill
      environment:
        JAVA_HOME: /usr/lib/jvm/temurin-25
      contents:
        packages:
          - bash
          - coreutils
          - eclipse-temurin-25-jdk
          - gcc
          - libc6-dev
        files:
          - url: git+https://github.com/airlift/jvmkill.git#8a6ae95b38905f98ce6b7b727efb2dc75da16e11
            checksum: 8a6ae95b38905f98ce6b7b727efb2dc75da16e11
            path: ${source.dir}/jvmkill
            spdx:
              name: jvmkill
              packages:
                - name: jvmkill
                  purl: pkg:generic/airlift/jvmkill
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build jvmkill
          work-dir: ${source.dir}/jvmkill
          runs: |
            set -eux -o pipefail

            INCLUDE="-I${JAVA_HOME}/include -I${JAVA_HOME}/include/linux"
            CFLAGS="-Wall -Werror -fPIC -shared ${INCLUDE}"
            gcc ${CFLAGS} -o libjvmkill.so jvmkill.c
      outputs:
        - source: ${source.dir}/jvmkill/libjvmkill.so
          target: /usr/lib/trino/bin/libjvmkill.so
          uid: 1000
          gid: 1000
          mode: "0644"
        - source: /opt/docker/sbom/jvmkill
          target: /opt/docker/sbom/jvmkill
          uid: 0
          gid: 0
    - name: trino
      uses: dhi.io/maven:3.9.16-jdk25-debian13-dev@sha256:7aa9ce329c418fb20951be218997e77c57c62b4faec4e67e30bbf98c1d5e0d06
      work-dir: ${source.dir}/trino
      environment:
        JAVA_HOME: /usr/lib/jvm/temurin-25
        MAVEN_ARGS: --batch-mode --no-transfer-progress
      caches:
        - path: /root/.m2/repository
      contents:
        packages:
          - gzip
          - base-files
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - git
          - libc6
          - libstdc++6
          - mawk
          - nodejs-24
          - node-corepack
          - npm
          - sed
          - yarn-classic
        files:
          - url: git+https://github.com/trinodb/trino.git#482
            checksum: f04d222fbeedaf888ac3c907748209c7e716a4c2
            path: ${source.dir}/trino
            spdx:
              name: trino
              version: "482"
              packages:
                - name: trino
                  purl: pkg:dhi/trino@482
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: patch dependencies
          uses: patch@v1
          with:
            options: -p1
            patches:
              - /src/patch/ch-guava-grpc.patch
        - name: maven patch
          uses: mvn/patch@v1
          with:
            dependencies: ${source.dir}/patch/mvn-deps.json
            dependencies-key: dependencyManagement.dependencies
            downgrade: false
            mvn-root: ${source.dir}/trino
            properties: ${source.dir}/patch/mvn-properties.json
        - name: build
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            mvn sortpom:sort
            mvn package -q -DskipTests -Dair.check.skip-all -Dmaven.enforcer.skip=true -Dmaven.test.failure.ignore=true -pl '!:trino-docs' -am

            # The launcher binary is specifically excluded here as we build it in a later step.
            tar -C "${target.dir}" -xzf "${source.dir}/trino/core/trino-server/target/trino-server-482.tar.gz" --wildcards \
              "trino-server-482/lib" \
              "trino-server-482/plugin" \
              "trino-server-482/secrets-plugin" \
              "trino-server-482/bin/launcher"{,.properties} \
              "trino-server-482/bin/linux-${ARCH}/libprocname.so"
        - name: patch secrets plugin dependencies
          runs: |
            set -eux -o pipefail

            SECRETS_PLUGIN="${target.dir}/trino-server-482/secrets-plugin/keystore-secrets-plugin"

            rm "${SECRETS_PLUGIN}"/jackson-databind-*.jar
            cp /root/.m2/repository/com/fasterxml/jackson/core/jackson-databind/2.21.5/jackson-databind-2.21.5.jar "${SECRETS_PLUGIN}/"

            rm "${SECRETS_PLUGIN}"/opentelemetry-api-*.jar
            cp /root/.m2/repository/io/opentelemetry/opentelemetry-api/1.63.0/opentelemetry-api-1.63.0.jar "${SECRETS_PLUGIN}/"
        - name: remove optional plugins
          work-dir: ${target.dir}/trino-server-482/plugin
          runs: |
            set -eux -o pipefail

            PLUGINS_TO_REMOVE=$(ls | jq -R -r -n --slurpfile allowlist ${source.dir}/patch/minimal-plugins.json '[inputs] - $allowlist[0] | .[]')

            echo "Removing all plugins that aren't in essential list..."

            for plugin_folder in $PLUGINS_TO_REMOVE; do
              rm -r "${plugin_folder}"
            done
      paths:
        - type: file
          path: /src/patch/bc-fips-hkdf.diff
          uid: 0
          gid: 0
          source: image/trino/patch/bc-fips-hkdf.diff
        - type: file
          path: /src/patch/ch-guava-grpc.patch
          uid: 0
          gid: 0
          source: image/trino/patch/ch-guava-grpc.patch
        - type: file
          path: /src/patch/minimal-plugins.json
          uid: 0
          gid: 0
          source: image/trino/patch/minimal-plugins.json
        - type: file
          path: /src/patch/mvn-deps.json
          uid: 0
          gid: 0
          source: image/trino/patch/mvn-deps.json
        - type: file
          path: /src/patch/mvn-properties.json
          uid: 0
          gid: 0
          source: image/trino/patch/mvn-properties.json
      outputs:
        - source: ${source.dir}/trino/client/trino-cli/target/trino-cli-482-executable.jar
          target: /usr/bin/trino
          uid: 1000
          gid: 1000
        - source: ${target.dir}/trino-server-482
          target: /usr/lib/trino
          uid: 1000
          gid: 1000
        - source: ${source.dir}/trino/core/docker/bin
          target: /usr/lib/trino/bin
          uid: 1000
          gid: 1000
        - source: ${source.dir}/trino/core/docker/default/etc
          target: /etc/trino
          uid: 1000
          gid: 1000
        - source: /opt/docker/sbom/trino
          target: /opt/docker/sbom/trino
          uid: 0
          gid: 0
    - name: launcher
      work-dir: /go/src/github.com/airlift/launcher/src/main/go
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/airlift/launcher.git#318
            checksum: e0e239b162b4dd45f60aacd5c58394d2832d0d13
            path: /go/src/github.com/airlift/launcher
            spdx:
              name: launcher
              version: "318"
              packages:
                - name: launcher
                  purl: pkg:golang/launcher@318
            uid: 0
            gid: 0
      pipeline:
        - name: bump go dependencies
          uses: go/bump@v1
          with:
            deps: []
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/airlift/launcher/src/main/go
          with:
            ldflags:
              - -extldflags=-static
              - -X launcher/args.Version=318
            output: ${target.dir}/launcher
      paths:
        - type: directory
          path: ""
          uid: 0
          gid: 0
      outputs:
        - source: ${target.dir}/launcher
          target: /usr/lib/trino/bin/linux-${ARCH}/launcher
          uid: 1000
          gid: 1000
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: trino
      uid: 1000
      gid: 1000
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: trino
      gid: 1000
      members:
        - trino
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  CATALOG_MANAGEMENT: static
  DEBIAN_FRONTEND: noninteractive
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/lib/jvm/temurin-25/bin
paths:
  - type: directory
    path: /data/trino
    uid: 1000
    gid: 1000
annotations:
  org.opencontainers.image.description: A minimal Trino image
  org.opencontainers.image.licenses: Apache-2.0
cmd:
  - /usr/lib/trino/bin/run-trino
ports:
  - 8080/tcp
