      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/projectcalico/calico.git#v3.32.0
            checksum: eb1cf57823a1dd8d25c48b82fd023ea9e3e17996
            path: /go/src/github.com/projectcalico/calico
            spdx:
              name: calico-whisker-backend
              version: 3.32.0
              packages:
                - name: calico-whisker-backend
                  purl: pkg:golang/github.com/projectcalico/calico/whisker-backend@3.32.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/projectcalico/calico
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: test
          work-dir: /go/src/github.com/projectcalico/calico/whisker-backend
          runs: |
            set -eux -o pipefail

            # Run unit tests only; skip fv packages that require a running Goldmane daemon.
            CGO_ENABLED=0 go test $(go list ./... | grep -v -E '/fv$')
        - name: build-whisker-backend
          uses: go/build@v1
          work-dir: /go/src/github.com/projectcalico/calico/whisker-backend
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X github.com/projectcalico/calico/pkg/buildinfo.BuildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
              - -X github.com/projectcalico/calico/pkg/buildinfo.Version=3.32.0
              - -X github.com/projectcalico/calico/pkg/buildinfo.GitRevision=eb1cf57823a1dd8d25c48b82fd023ea9e3e17996
            output: ${target.dir}/usr/local/bin/whisker-backend
            packages: ./cmd
        - name: install license
          work-dir: /go/src/github.com/projectcalico/calico
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/licenses"
            cp LICENSE.md "${target.dir}/licenses/LICENSE"
      outputs:
        - source: ${target.dir}/usr/local/bin/whisker-backend
          target: /usr/local/bin/whisker-backend
          uid: 0
          gid: 0
        - source: ${target.dir}/licenses/LICENSE
          target: /licenses/LICENSE
          uid: 0
          gid: 0
