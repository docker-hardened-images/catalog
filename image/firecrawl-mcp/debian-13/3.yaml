name: Firecrawl MCP Server 3.x
image: dhi.io/firecrawl-mcp
variant: runtime
tags:
  - "3"
  - "3.2"
  - 3.2.1
  - latest
  - 3-debian13
  - 3.2-debian13
  - 3.2.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: d22f144eee0754fd819b5b976b32294d8d234ea5
  NODE_BUILD_REFERENCE: dhi/node:24.16.0-debian13-sfw-dev@sha256:a88f40da00da78285d479074eac5f52b1aec57c11254c25f76affbc226c227fb
  NODE_RUNTIME_REFERENCE: dhi/node:24.16.0-debian13@sha256:a3e34cada0613cf354961fd51d6b127eef21390d9d55db2273dbd3df7b3e3fba
  SEMVER_MAJOR_MINOR_VERSION: "3.2"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.2.1
  VERSION: 3.2.1
contents:
  packages:
    - '!base-files'
  builds:
    - name: firecrawl-mcp
      uses: dhi.io/node:24.16.0-debian13-sfw-dev@sha256:a88f40da00da78285d479074eac5f52b1aec57c11254c25f76affbc226c227fb
      contents:
        files:
          - url: git+https://github.com/firecrawl/firecrawl-mcp-server.git#v3.2.1
            checksum: d22f144eee0754fd819b5b976b32294d8d234ea5
            path: ${source.dir}/firecrawl-mcp
            spdx:
              name: firecrawl-mcp
              version: 3.2.1
              packages:
                - name: firecrawl-mcp
                  purl: pkg:dhi/firecrawl-mcp@3.2.1
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: bump dependencies
          uses: npm/bump@v1
          privileged: true
          environment:
            DHI_NO_SFW: "true"
          with:
            bumps: ${source.dir}/patch/npm-bump.json
            npm-root: ${source.dir}/firecrawl-mcp
        - name: install and build
          work-dir: ${source.dir}/firecrawl-mcp
          privileged: true
          runs: |
            set -eux -o pipefail

            # CVE-2026-42338: ip-address <=10.1.0; override + lock refresh so npm ci stays consistent
            npm pkg set "overrides.ip-address"="10.1.1"
            npm install --package-lock-only --ignore-scripts

            npm ci --ignore-scripts
            npm run build
            rm -rf node_modules
            npm ci --omit=dev --ignore-scripts

            # Required because we are updating @modelcontextprotocol/sdk
            # See https://github.com/punkpeye/fastmcp/issues/208
            sed -i 's|this.#capabilities.logging = {};|this.#capabilities.logging = {};\n\tthis.#capabilities.completions = {};|g' \
              ${source.dir}/firecrawl-mcp/node_modules/firecrawl-fastmcp/dist/FastMCP.js
      paths:
        - type: file
          path: ${source.dir}/patch/npm-bump.json
          uid: 0
          gid: 0
          source: image/firecrawl-mcp/patch/npm-bump.json
      outputs:
        - source: ${source.dir}/firecrawl-mcp/node_modules
          target: /app/node_modules
          uid: 0
          gid: 0
        - source: ${source.dir}/firecrawl-mcp/dist
          target: /app/dist
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/firecrawl-mcp
          target: /opt/docker/sbom/firecrawl-mcp
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/node:24.16.0-debian13@sha256:a3e34cada0613cf354961fd51d6b127eef21390d9d55db2273dbd3df7b3e3fba
      uid: 0
      gid: 0
accounts:
  run-as: node
  users:
    - name: node
      uid: 1000
      gid: 1000
  groups:
    - name: node
      gid: 1000
      members:
        - node
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
