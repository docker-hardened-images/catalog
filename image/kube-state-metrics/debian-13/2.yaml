# syntax=dhi.io/build:2-debian13

name: kube-state-metrics 2.x
image: dhi.io/kube-state-metrics
variant: runtime
tags:
  - "2"
  - "2.19"
  - 2.19.1
  - 2-debian
  - 2-debian13
  - 2.19-debian
  - 2.19-debian13
  - 2.19.1-debian
  - 2.19.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 45e1513e95beaaa2f2df92af9958cd9837bb66ab
  SEMVER_MAJOR_MINOR_VERSION: "2.19"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.19.1
  VERSION: 2.19.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: kube-state-metrics
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kubernetes/kube-state-metrics.git#v2.19.1
            checksum: 45e1513e95beaaa2f2df92af9958cd9837bb66ab
            path: /go/src/github.com/kubernetes/kube-state-metrics
            spdx:
              name: kube-state-metrics
              version: 2.19.1
              packages:
                - name: kube-state-metrics
                  purl: pkg:golang/github.com/kubernetes/kube-state-metrics@2.19.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/kubernetes/kube-state-metrics
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/go-viper/mapstructure/v2@v2.4.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/kubernetes/kube-state-metrics
          with:
            ldflags:
              - -X github.com/prometheus/common/version.Version=2.19.1
              - -X github.com/prometheus/common/version.Revision=45e1513e95beaaa2f2df92af9958cd9837bb66ab
              - -X github.com/prometheus/common/version.Branch=dhi
              - -X github.com/prometheus/common/version.BuildUser=dhi
              - -X github.com/prometheus/common/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
            output: ${target.dir}/usr/local/bin/kube-state-metrics
      outputs:
        - source: ${target.dir}/usr/local/bin/kube-state-metrics
          target: /usr/local/bin/kube-state-metrics
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kube-state-metrics
          target: /opt/docker/sbom/kube-state-metrics
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /kube-state-metrics
    uid: 0
    gid: 0
    source: /usr/local/bin/kube-state-metrics
annotations:
  org.opencontainers.image.description: A minimal kube-state-metrics image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - kube-state-metrics
  - --port=8080
  - --telemetry-port=8081
ports:
  - 8080/tcp
  - 8081/tcp
