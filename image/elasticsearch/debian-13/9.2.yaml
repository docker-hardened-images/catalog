# syntax=dhi.io/build:2-debian13

name: Elasticsearch 9.2.x
image: dhi.io/elasticsearch
variant: runtime
tags:
  - "9.2"
  - 9.2.8
  - 9.2-debian13
  - 9.2.8-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-21"
vars:
  ARCH: '#{ target.arch == "amd64" ? "amd64" : "arm64" }'
  ELASTICSEARCH_COMMIT_SHA: cdb2d7a7a46dfe4ef7c3f859b94fb86ba8e652e1
  ELASTICSEARCH_HOME: /usr/share/elasticsearch
  ELASTICSEARCH_OUTPUT_ARCHIVE_DIR: '#{ target.arch == "amd64" ? "linux-tar" : "linux-aarch64-tar" }'
  GO_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  JAVA_BUILD_REFERENCE: dhi/eclipse-temurin:21.0.11.10-jdk-debian13-dev@sha256:94af871b695a132ebc47af06f5acb29aa53632092047e5622a4fd6b2c85ecc34
  JAVA_HOME: /opt/java/openjdk/21
  JAVA_MAJOR_VERSION: "21"
  JAVA_REFERENCE: dhi/eclipse-temurin:21.0.11.10-jdk-debian13-dev@sha256:94af871b695a132ebc47af06f5acb29aa53632092047e5622a4fd6b2c85ecc34
  JAVA_VERSION: 21.0.11.10
  SEMVER_MAJOR_MINOR_VERSION: "9.2"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.2.8
  SKIP_PATCHING: "FALSE"
  VERSION: 9.2.8
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - coreutils
    - findutils
    - grep
    - libstdc++6
    - netcat-openbsd
    - tini
  builds:
    - name: elasticsearch
      uses: dhi.io/eclipse-temurin:21.0.11.10-jdk-debian13-dev@sha256:94af871b695a132ebc47af06f5acb29aa53632092047e5622a4fd6b2c85ecc34
      environment:
        ES_JAVA_HOME: /opt/java/openjdk/21
      contents:
        packages:
          - bash
          - coreutils
          - findutils
          - sed
          - tini
        files:
          - url: git+https://github.com/elastic/elasticsearch.git#v9.2.8
            checksum: cdb2d7a7a46dfe4ef7c3f859b94fb86ba8e652e1
            path: ${source.dir}/elasticsearch
            spdx:
              name: elasticsearch
              version: 9.2.8
              packages:
                - name: elasticsearch
                  purl: pkg:dhi/elasticsearch@9.2.8
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/org/elasticsearch/plugin/x-pack-core/9.2.8/x-pack-core-9.2.8.jar
            checksum: https://repo1.maven.org/maven2/org/elasticsearch/plugin/x-pack-core/9.2.8/x-pack-core-9.2.8.jar.sha256
            path: ${source.dir}/x-pack-core/x-pack-core-9.2.8.jar
            uid: 0
            gid: 0
      pipeline:
        - name: git patch elasticsearch
          uses: patch@v1
          work-dir: ${source.dir}/elasticsearch
          with:
            options: -p1
            patches:
              - ${source.dir}/patch/9.2.patch
              - ${source.dir}/patch/docker-entrypoint-fips-keystore.patch
        - name: extract Elastic public key to be properly compatible with Elastic licenses
          work-dir: ${source.dir}/x-pack-core
          runs: |
            set -eux -o pipefail

            jar xf x-pack-core-9.2.8.jar public.key
        - name: build
          work-dir: ${source.dir}/elasticsearch
          privileged: true
          runs: |
            set -eux -o pipefail

            # DefaultSslContext is unavailable under the FIPS JDK TLS stack, which breaks the Gradle
            # wrapper download. Compile with the tracked non-FIPS builder image; runtime still ships FIPS Java.
            unset JDK_JAVA_OPTIONS
            unset JAVA_TOOL_OPTIONS
            unset _JAVA_OPTIONS

            ./gradlew localDistro -Dbuild.snapshot=false -Dlicense.key=${source.dir}/x-pack-core/public.key
        - name: extract built tarball
          runs: |
            set -eux -o pipefail

            # remove bundled jdk
            rm -r "${source.dir}/elasticsearch/distribution/archives/${ELASTICSEARCH_OUTPUT_ARCHIVE_DIR}/build/install/elasticsearch-9.2.8/jdk"

            mkdir -p "${target.dir}/usr/share/elasticsearch/"
            cp -r "${source.dir}/elasticsearch/distribution/archives/${ELASTICSEARCH_OUTPUT_ARCHIVE_DIR}/build/install/elasticsearch-9.2.8/." "${target.dir}/usr/share/elasticsearch"
      paths:
        - type: file
          path: ${source.dir}/patch/9.2.patch
          uid: 0
          gid: 0
          source: image/elasticsearch/patch/9.2.patch
        - type: file
          path: ${source.dir}/patch/docker-entrypoint-fips-keystore.patch
          uid: 0
          gid: 0
          source: image/elasticsearch/patch/docker-entrypoint-fips-keystore.patch
      outputs:
        - source: ${target.dir}/usr/share/elasticsearch
          target: /usr/share/elasticsearch
          uid: 1000
          gid: 1000
        - source: /opt/docker/sbom/elasticsearch
          target: /opt/docker/sbom/elasticsearch
          uid: 0
          gid: 0
        - source: ${source.dir}/elasticsearch/distribution/docker/src/docker/bin/docker-entrypoint.sh
          target: /usr/local/bin/docker-entrypoint.sh
          uid: 1000
          gid: 1000
          mode: "0755"
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.11.10-jdk-debian13-dev@sha256:94af871b695a132ebc47af06f5acb29aa53632092047e5622a4fd6b2c85ecc34
      includes:
        - opt/**
        - usr/local/bin/**
      uid: 0
      gid: 0
accounts:
  run-as: elasticsearch
  users:
    - name: elasticsearch
      uid: 1000
      gid: 1000
  groups:
    - name: elasticsearch
      gid: 1000
      members:
        - elasticsearch
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /usr/share/elasticsearch
environment:
  ELASTIC_CONTAINER: "true"
  ELASTICSEARCH_VERSION: 9.2.8
  ES_JAVA_HOME: /opt/java/openjdk/21
  PATH: /usr/share/elasticsearch/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: symlink
    path: /usr/bin/nc
    uid: 0
    gid: 0
    source: /usr/bin/nc.openbsd
  - type: file
    path: /usr/share/elasticsearch/config/elasticsearch.yml
    uid: 1000
    gid: 1000
    mode: "0644"
    source: image/elasticsearch/config/elasticsearch.yml
  - type: file
    path: /usr/share/elasticsearch/config/log4j2.properties
    uid: 1000
    gid: 1000
    mode: "0644"
    source: image/elasticsearch/config/log4j2.properties
annotations:
  org.opencontainers.image.description: A minimal Elasticsearch image
  org.opencontainers.image.licenses: Elastic-License-2.0
entrypoint:
  - /usr/bin/tini
  - --
  - /usr/local/bin/docker-entrypoint.sh
cmd:
  - eswrapper
ports:
  - 9200/tcp
  - 9300/tcp
