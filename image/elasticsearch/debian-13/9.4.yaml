# syntax=dhi.io/build:2-debian13

name: Elasticsearch 9.4.x
image: dhi.io/elasticsearch
variant: runtime
tags:
  - "9"
  - "9.4"
  - 9.4.0
  - 9-debian13
  - 9.4-debian13
  - 9.4.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-30"
vars:
  ARCH: '#{ target.arch == "amd64" ? "amd64" : "arm64" }'
  ELASTICSEARCH_COMMIT_SHA: 2e8528e92361c3399724226deaf2b46f933e925b
  ELASTICSEARCH_HOME: /usr/share/elasticsearch
  ELASTICSEARCH_OUTPUT_ARCHIVE_DIR: '#{ target.arch == "amd64" ? "linux-tar" : "linux-aarch64-tar" }'
  GO_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  HAS_SOURCE_SHIMS: "TRUE"
  JAVA_BUILD_REFERENCE: dhi/eclipse-temurin:21.0.11.10-jdk-debian13-dev@sha256:94af871b695a132ebc47af06f5acb29aa53632092047e5622a4fd6b2c85ecc34
  JAVA_HOME: /opt/java/openjdk/21
  JAVA_MAJOR_VERSION: "21"
  JAVA_REFERENCE: dhi/eclipse-temurin:21.0.11.10-jdk-debian13-dev@sha256:94af871b695a132ebc47af06f5acb29aa53632092047e5622a4fd6b2c85ecc34
  JAVA_VERSION: 21.0.11.10
  SEMVER_MAJOR_MINOR_VERSION: "9.4"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.4.0
  VERSION: 9.4.0
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - coreutils
    - findutils
    - grep
    - libstdc++6
    - netcat-openbsd
    - tini
  builds:
    - name: elasticsearch
      uses: dhi.io/eclipse-temurin:21.0.11.10-jdk-debian13-dev@sha256:94af871b695a132ebc47af06f5acb29aa53632092047e5622a4fd6b2c85ecc34
      environment:
        ES_JAVA_HOME: /opt/java/openjdk/21
      contents:
        packages:
          - bash
          - coreutils
          - findutils
          - sed
          - tini
        files:
          - url: git+https://github.com/elastic/elasticsearch.git#v9.4.0
            checksum: 2e8528e92361c3399724226deaf2b46f933e925b
            path: ${source.dir}/elasticsearch
            spdx:
              name: elasticsearch
              version: 9.4.0
              packages:
                - name: elasticsearch
                  purl: pkg:dhi/elasticsearch@9.4.0
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/org/elasticsearch/plugin/x-pack-core/9.4.0/x-pack-core-9.4.0.jar
            checksum: https://repo1.maven.org/maven2/org/elasticsearch/plugin/x-pack-core/9.4.0/x-pack-core-9.4.0.jar.sha256
            path: ${source.dir}/x-pack-core/x-pack-core-9.4.0.jar
            uid: 0
            gid: 0
      pipeline:
        - name: git patch elasticsearch docker-entrypoint for FIPS keystore
          uses: patch@v1
          work-dir: ${source.dir}/elasticsearch
          with:
            options: -p1
            patches:
              - ${source.dir}/patch/docker-entrypoint-fips-keystore.patch
        - name: git patch elasticsearch source-code shims for dependency overrides
          uses: patch@v1
          work-dir: ${source.dir}/elasticsearch
          with:
            options: -p1
            patches:
              - ${source.dir}/patch/9.4.source-shims.patch
        - name: stage gradle dependency overrides init script
          work-dir: ${source.dir}/elasticsearch
          runs: |
            set -eux -o pipefail

            cp "${source.dir}/patch/9.4.overrides.gradle" \
              "${source.dir}/elasticsearch/dhi-overrides.init.gradle"
        - name: extract Elastic public key to be properly compatible with Elastic licenses
          work-dir: ${source.dir}/x-pack-core
          runs: |
            set -eux -o pipefail

            jar xf x-pack-core-9.4.0.jar public.key
        - name: build
          work-dir: ${source.dir}/elasticsearch
          privileged: true
          runs: |
            set -eux -o pipefail

            # DefaultSslContext is unavailable under the FIPS JDK TLS stack, which breaks the Gradle
            # wrapper download. Compile with the tracked non-FIPS builder image; runtime still ships FIPS Java.
            unset JDK_JAVA_OPTIONS
            unset JAVA_TOOL_OPTIONS
            unset _JAVA_OPTIONS

            # Two-pass Gradle build. Pass 1 regenerates gradle/verification-metadata.xml
            # for the forced dependency versions declared in dhi-overrides.init.gradle so
            # strict dependency verification passes; --write-verification-metadata
            # short-circuits task execution. Pass 2 runs the actual localDistro build with
            # the same overrides in effect.
            ./gradlew \
              --init-script "${source.dir}/elasticsearch/dhi-overrides.init.gradle" \
              --write-verification-metadata sha256 \
              localDistro \
              -Dbuild.snapshot=false \
              -Dlicense.key=${source.dir}/x-pack-core/public.key

            ./gradlew \
              --init-script "${source.dir}/elasticsearch/dhi-overrides.init.gradle" \
              localDistro \
              -Dbuild.snapshot=false \
              -Dlicense.key=${source.dir}/x-pack-core/public.key
        - name: extract built tarball
          runs: |
            set -eux -o pipefail

            # remove bundled jdk
            rm -r "${source.dir}/elasticsearch/distribution/archives/${ELASTICSEARCH_OUTPUT_ARCHIVE_DIR}/build/install/elasticsearch-9.4.0/jdk"

            mkdir -p "${target.dir}/usr/share/elasticsearch/"
            cp -r "${source.dir}/elasticsearch/distribution/archives/${ELASTICSEARCH_OUTPUT_ARCHIVE_DIR}/build/install/elasticsearch-9.4.0/." "${target.dir}/usr/share/elasticsearch"
      paths:
        - type: file
          path: ${source.dir}/patch/docker-entrypoint-fips-keystore.patch
          uid: 0
          gid: 0
          source: image/elasticsearch/patch/docker-entrypoint-fips-keystore.patch
        - type: file
          path: ${source.dir}/patch/9.4.overrides.gradle
          uid: 0
          gid: 0
          source: image/elasticsearch/patch/9.4.overrides.gradle
        - type: file
          path: ${source.dir}/patch/9.4.source-shims.patch
          uid: 0
          gid: 0
          source: image/elasticsearch/patch/9.4.source-shims.patch
      outputs:
        - source: ${target.dir}/usr/share/elasticsearch
          target: /usr/share/elasticsearch
          uid: 1000
          gid: 1000
        - source: /opt/docker/sbom/elasticsearch
          target: /opt/docker/sbom/elasticsearch
          uid: 0
          gid: 0
        - source: ${source.dir}/elasticsearch/distribution/docker/src/docker/bin/docker-entrypoint.sh
          target: /usr/local/bin/docker-entrypoint.sh
          uid: 1000
          gid: 1000
          mode: "0755"
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.11.10-jdk-debian13-dev@sha256:94af871b695a132ebc47af06f5acb29aa53632092047e5622a4fd6b2c85ecc34
      includes:
        - opt/**
        - usr/local/bin/**
      uid: 0
      gid: 0
accounts:
  run-as: elasticsearch
  users:
    - name: elasticsearch
      uid: 1000
      gid: 1000
  groups:
    - name: elasticsearch
      gid: 1000
      members:
        - elasticsearch
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /usr/share/elasticsearch
environment:
  ELASTIC_CONTAINER: "true"
  ELASTICSEARCH_VERSION: 9.4.0
  ES_JAVA_HOME: /opt/java/openjdk/21
  PATH: /usr/share/elasticsearch/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: symlink
    path: /usr/bin/nc
    uid: 0
    gid: 0
    source: /usr/bin/nc.openbsd
  - type: file
    path: /usr/share/elasticsearch/config/elasticsearch.yml
    uid: 1000
    gid: 1000
    mode: "0644"
    source: image/elasticsearch/config/elasticsearch.yml
  - type: file
    path: /usr/share/elasticsearch/config/log4j2.properties
    uid: 1000
    gid: 1000
    mode: "0644"
    source: image/elasticsearch/config/log4j2.properties
annotations:
  org.opencontainers.image.description: A minimal Elasticsearch image
  org.opencontainers.image.licenses: Elastic-License-2.0
entrypoint:
  - /usr/bin/tini
  - --
  - /usr/local/bin/docker-entrypoint.sh
cmd:
  - eswrapper
ports:
  - 9200/tcp
  - 9300/tcp
