// Gradle init script: force CVE-remediated dependency versions at resolution time.
//
// Replaces the per-version `.patch` files that previously edited
// `build-tools-internal/version.properties`, `gradle/build.versions.toml`,
// `gradle/verification-metadata.xml`, and individual module build.gradle files.
// The matching definition step regenerates verification-metadata.xml via
// `./gradlew --write-verification-metadata sha256 ...` so the forced artifacts
// pass strict dependency verification.
//
// Each rule matches the exact old version the upstream tag ships with, so this
// is a deterministic override (not a blanket "always-bump" rule). To support a
// new upstream point release, update only the version literals below.

allprojects {
    configurations.all {
        resolutionStrategy.eachDependency { details ->
            def grp = details.requested.group
            def name = details.requested.name
            def ver = details.requested.version

            // Jackson 2.15.0 / 2.17.2 -> 2.18.6. Upstream pins 2.15.0 in
            // version.properties and 2.17.2 separately in libs/x-content/impl.
            if (grp != null && grp.startsWith("com.fasterxml.jackson")
                    && (ver == "2.15.0" || ver == "2.17.2")) {
                details.useVersion("2.18.6")
                details.because("CVE remediation: pin jackson")
            }

            // Netty 4.1.130.Final -> 4.1.133.Final
            if (grp == "io.netty" && ver == "4.1.130.Final") {
                details.useVersion("4.1.133.Final")
                details.because("CVE remediation: pin netty")
            }

            // Reactor Netty 1.0.45 -> 1.2.8 (modules/repository-azure pins
            // azureReactorNetty=1.0.45 which feeds reactor-netty-* artifacts)
            if (grp == "io.projectreactor.netty"
                    && (name == "reactor-netty-core" || name == "reactor-netty-http")
                    && ver == "1.0.45") {
                details.useVersion("1.2.8")
                details.because("CVE remediation: pin reactor-netty")
            }

            // Log4j 2.19.0 -> 2.25.4
            if (grp == "org.apache.logging.log4j" && ver == "2.19.0") {
                details.useVersion("2.25.4")
                details.because("CVE remediation: pin log4j")
            }

            // SLF4J 2.0.6 -> 2.0.17
            if (grp == "org.slf4j" && ver == "2.0.6") {
                details.useVersion("2.0.17")
                details.because("CVE remediation: pin slf4j")
            }

            // commons-lang3 3.9 -> 3.18.0
            if (grp == "org.apache.commons" && name == "commons-lang3" && ver == "3.9") {
                details.useVersion("3.18.0")
                details.because("CVE remediation: pin commons-lang3")
            }

            // BouncyCastle 1.79 -> 1.84 (covers bcprov-jdk18on, bcpkix-jdk18on, etc.)
            if (grp == "org.bouncycastle" && ver == "1.79") {
                details.useVersion("1.84")
                details.because("CVE remediation: pin bouncycastle")
            }

            // Elastic APM agent 1.55.0 -> 1.55.6 (modules/apm)
            if (grp == "co.elastic.apm" && name == "elastic-apm-agent-java8"
                    && ver == "1.55.0") {
                details.useVersion("1.55.6")
                details.because("CVE remediation: pin elastic-apm-agent-java8")
            }
        }
    }
}
