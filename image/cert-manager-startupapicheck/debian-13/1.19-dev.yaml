name: cert-manager startupapicheck 1.19.x (dev)
image: dhi.io/cert-manager-startupapicheck
variant: dev
tags:
  - 1.19-dev
  - 1.19.6-dev
  - 1.19-debian-dev
  - 1.19-debian13-dev
  - 1.19.6-debian-dev
  - 1.19.6-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-07"
vars:
  COMMIT_SHA: 60b0447cc9a64885d42567ea590862b88a62d1ad
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.19.6
  VERSION: 1.19.6
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: cert-manager-startupapicheck
      work-dir: /go/src/github.com/cert-manager/cert-manager/cmd/startupapicheck
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/cert-manager/cert-manager.git#v1.19.6
            checksum: 60b0447cc9a64885d42567ea590862b88a62d1ad
            path: /go/src/github.com/cert-manager/cert-manager
            spdx:
              name: cert-manager
              version: 1.19.6
              packages:
                - name: cert-manager
                  purl: pkg:golang/github.com/cert-manager/cert-manager@1.19.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.19 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/cert-manager/cert-manager
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - golang.org/x/sys@v0.45.0
              - github.com/Azure/go-ntlmssp@v0.1.1
            download: true
        - name: update go dependencies (startupapicheck) (1.19 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/cert-manager/cert-manager/cmd/startupapicheck
          with:
            deps: []
            download: true
        - name: unit test
          work-dir: /go/src/github.com/cert-manager/cert-manager/cmd/startupapicheck
          runs: |
            set -eux -o pipefail

            go mod download
            go test ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/cert-manager/cert-manager/cmd/startupapicheck
          with:
            ldflags:
              - -X github.com/cert-manager/cert-manager/pkg/util.AppVersion=1.19.6
              - -X github.com/cert-manager/cert-manager/pkg/util.AppGitCommit=60b0447cc9a64885d42567ea590862b88a62d1ad
            output: ${target.dir}/startupapicheck
      outputs:
        - source: ${target.dir}/startupapicheck
          target: /usr/local/bin/startupapicheck
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/cert-manager
          target: /opt/docker/sbom/cert-manager
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
