# syntax=dhi.io/build:2-debian13

name: HAProxy 3.0.x
image: dhi.io/haproxy
variant: runtime
tags:
  - "3.0"
  - 3.0.20
  - 3.0-debian13
  - 3.0.20-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2024-05-29"
  end-of-life: "2029-04-01"
vars:
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
  SEMVER_MAJOR_MINOR_VERSION: "3.0"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.0.20
  SHA256: sha256:b581a3599bd13a2849957dd059cc12aa7aa371d70b47feb85465dbe573a0b9a3
  VERSION: 3.0.20
contents:
  packages:
    - libcrypt1
    - liblua5.4-0
    - libpcre2-8-0
    - libssl3t64
  builds:
    - name: haproxy
      contents:
        packages:
          - bash
          - coreutils
          - diffutils
          - gcc
          - grep
          - gzip
          - libc6-dev
          - liblua5.4-dev
          - libpcre2-dev
          - libssl-dev
          - make
          - tar
        files:
          - url: https://www.haproxy.org/download/3.0/src/haproxy-3.0.20.tar.gz
            checksum: sha256:b581a3599bd13a2849957dd059cc12aa7aa371d70b47feb85465dbe573a0b9a3
            path: ${source.dir}/haproxy.tar.gz
            spdx:
              name: haproxy
              version: 3.0.20
              packages:
                - name: haproxy
                  purl: pkg:dhi/haproxy@3.0.20
                  license: GPL-2.0-only
            uid: 0
            gid: 0
      pipeline:
        - name: extract
          runs: |
            set -eux -o pipefail

            tar -xzvf haproxy.tar.gz
        - name: compile
          runs: |
            set -eux -o pipefail

            nproc="$(nproc)"
            make -C 'haproxy-3.0.20' -j "$nproc" \
              TARGET=linux-glibc \
              CC=gcc \
              \
              USE_GETADDRINFO=1 \
              USE_LUA=1 LUA_LIB_NAME=lua5.4 LUA_INC=/usr/include/lua5.4 \
              USE_OPENSSL=1 \
              USE_PCRE2=1 USE_PCRE2_JIT=1 \
              USE_PROMEX=1 \
              \
              EXTRA_OBJS='' \
              \
              all
        - name: install
          runs: |
            set -eux -o pipefail

            make -C 'haproxy-3.0.20' \
              \
              PREFIX='${target.dir}/opt/haproxy' \
              SBINDIR='${target.dir}/opt/haproxy/bin' \
              \
              install-bin
      outputs:
        - source: ${target.dir}/opt/haproxy
          target: /opt/haproxy
          uid: 0
          gid: 0
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  HAPROXY_VERSION: 3.0.20
  PATH: /opt/haproxy/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
annotations:
  org.opencontainers.image.description: A minimal HAProxy image
  org.opencontainers.image.licenses: GPL-2.0-only
entrypoint:
  - haproxy
