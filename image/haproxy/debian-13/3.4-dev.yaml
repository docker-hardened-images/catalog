# syntax=dhi.io/build:2-debian13

name: HAProxy 3.4.x (dev)
image: dhi.io/haproxy
variant: dev
tags:
  - 3-dev
  - 3.4-dev
  - 3.4.0-dev
  - 3-debian-dev
  - 3-debian13-dev
  - 3.4-debian-dev
  - 3.4-debian13-dev
  - 3.4.0-debian-dev
  - 3.4.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-03"
  end-of-life: "2031-04-01"
vars:
  SEMVER_MAJOR_MINOR_VERSION: "3.4"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.4.0
  SHA256: sha256:9298f565c2a9ba8a4e7f89c54be2c5d3fd960b5b304eb5515e15d29d2c15d4f7
  VERSION: 3.4.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - gawk
    - gcc-14-base
    - grep
    - libc-bin
    - libc6
    - libcrypt1
    - libgcc-s1
    - liblua5.4-0
    - libpcre2-8-0
    - libssl3t64
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: haproxy
      contents:
        packages:
          - bash
          - coreutils
          - diffutils
          - gcc
          - grep
          - gzip
          - libc6-dev
          - liblua5.4-dev
          - libpcre2-dev
          - libssl-dev
          - make
          - tar
        files:
          - url: https://www.haproxy.org/download/3.4/src/haproxy-3.4.0.tar.gz
            checksum: sha256:9298f565c2a9ba8a4e7f89c54be2c5d3fd960b5b304eb5515e15d29d2c15d4f7
            path: ${source.dir}/haproxy.tar.gz
            spdx:
              name: haproxy
              version: 3.4.0
              packages:
                - name: haproxy
                  purl: pkg:dhi/haproxy@3.4.0
                  license: GPL-2.0-only
            uid: 0
            gid: 0
      pipeline:
        - name: extract
          runs: |
            set -eux -o pipefail

            tar -xzvf haproxy.tar.gz
        - name: compile
          runs: |
            set -eux -o pipefail

            nproc="$(nproc)"
            make -C 'haproxy-3.4.0' -j "$nproc" \
              TARGET=linux-glibc \
              CC=gcc \
              \
              USE_GETADDRINFO=1 \
              USE_LUA=1 LUA_LIB_NAME=lua5.4 LUA_INC=/usr/include/lua5.4 \
              USE_OPENSSL=1 \
              USE_PCRE2=1 USE_PCRE2_JIT=1 \
              USE_PROMEX=1 \
              \
              EXTRA_OBJS='' \
              \
              all
        - name: install
          runs: |
            set -eux -o pipefail

            make -C 'haproxy-3.4.0' \
              \
              PREFIX='${target.dir}/opt/haproxy' \
              SBINDIR='${target.dir}/opt/haproxy/bin' \
              \
              install-bin
      outputs:
        - source: ${target.dir}/opt/haproxy
          target: /opt/haproxy
          uid: 0
          gid: 0
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  HAPROXY_VERSION: 3.4.0
  PATH: /opt/haproxy/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: file
    path: /usr/local/bin/entrypoint.sh
    uid: 0
    gid: 0
    mode: "0755"
    source: image/haproxy/bin/entrypoint.sh
annotations:
  org.opencontainers.image.description: A minimal HAProxy image
  org.opencontainers.image.licenses: GPL-2.0-only
entrypoint:
  - entrypoint.sh
cmd:
  - haproxy
  - -f
  - /usr/local/etc/haproxy/haproxy.cfg
