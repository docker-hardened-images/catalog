# syntax=dhi.io/build:2-debian13

name: Tailscale Kubernetes Operator 1.x (dev)
image: dhi.io/tailscale-operator
variant: dev
tags:
  - 1-dev
  - 1.98-dev
  - 1.98.5-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.98-debian-dev
  - 1.98-debian13-dev
  - 1.98.5-debian-dev
  - 1.98.5-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates: {}
vars:
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "1.98"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.98.5
  SUFFIX: -dev
  VERSION: 1.98.5-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tailscale-k8s-operator-dev=1.98.5-1
    - util-linux
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
    mode: "0755"
  - type: symlink
    path: /usr/local/bin/operator
    uid: 0
    gid: 0
    source: /usr/bin/k8s-operator
annotations:
  org.opencontainers.image.description: A minimal Tailscale Kubernetes Operator image
  org.opencontainers.image.licenses: BSD-3-Clause
entrypoint:
  - /usr/bin/k8s-operator
