# syntax=dhi.io/build:2-debian13

name: Docker SBX Agent Templates (Kiro) (dev)
image: dhi.io/sbx-templates
output: squashed
variant: dev
tags:
  - kiro
  - kiro-2
  - kiro-2.14
  - kiro-2.14.1
platforms:
  - linux/amd64
  - linux/arm64
vars:
  CENTERED_KIT_NAME: '               kiro 2.14.1'
  DHI_TAGS_OVERWRITE: "true"
  KIT_NAME: kiro
  SANDBOXES_COMMIT_SHA: 54a695035350bab5f126a88c892a9bc3b5ae162a
  SEMVER_MAJOR_MINOR_VERSION: "2.14"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.14.1
  VERSION: 2.14.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main
    - deb [signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/debian trixie stable
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://cli.github.com/packages/githubcli-archive-keyring.gpg
    - https://download.docker.com/linux/debian/gpg
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - bc
    - bind9-dnsutils
    - bubblewrap
    - ca-certificates
    - coreutils
    - curl
    - default-jdk-headless
    - diffutils
    - dpkg
    - findutils
    - gh
    - git
    - gnu-which
    - gnupg
    - golang-1.26
    - golang-1.26-oci-config
    - grep
    - gzip
    - htop
    - iproute2
    - iputils-ping
    - jq
    - less
    - libc-bin
    - libpam-modules
    - libpam-runtime
    - locales
    - lsof
    - make
    - man-db
    - mawk
    - nano
    - ncurses-base
    - ncurses-bin
    - net-tools
    - netcat-openbsd
    - node-corepack
    - nodejs-24
    - npm
    - openssh-client
    - perl-base
    - procps
    - psmisc
    - python-3.14
    - python3-pip
    - ripgrep
    - rsync
    - sed
    - socat
    - sudo
    - tini
    - tmux
    - traceroute
    - tree
    - unzip
    - util-linux
    - uv
    - vim
    - wget
    - yarn-classic
  builds:
    - name: install-kiro
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - curl
          - sed
          - grep
          - unzip
      pipeline:
        - name: install
          run-as: agent
          privileged: true
          runs: |
            set -eux -o pipefail

            curl -fsSL https://cli.kiro.dev/install | bash
            /home/agent/.local/bin/kiro-cli setup --no-confirm
      paths:
        - type: file
          path: /home/agent/.local/bin/kiro
          content: |
            #!/bin/bash

            # Informational invocations don't need auth; pass them straight through.
            case "$1" in
                version|--version|help|--help|help-all|--help-all)
                    exec kiro-cli "$@"
                    ;;
            esac

            echo "Performing authentication check"
            kiro-cli whoami > /dev/null 2>&1

            if [ $? -eq 0 ]; then
                echo "✅ Currently authenticated"
                kiro-cli $@
            else
                echo "❌ Not authenticated. Starting login flow..."
                kiro-cli login --use-device-flow
                if [ $? -ne 0 ]; then
                    echo "❌ Login failed. Exiting."
                    exit 1
                fi
                echo "✅ Currently authenticated"
                kiro-cli "$@"
            fi
          uid: 1000
          gid: 1000
          mode: "0755"
      accounts:
        run-as: agent
        users:
          - name: agent
            uid: 1000
            gid: 1000
        groups:
          - name: agent
            gid: 1000
      outputs:
        - source: /home/agent/.local/bin
          target: /home/agent/.local/bin
          uid: 1000
          gid: 1000
        - source: /home/agent/.local/share/kiro-cli
          target: /home/agent/.local/share/kiro-cli
          uid: 1000
          gid: 1000
    - name: filesystem
      contents:
        packages:
          - bash
          - gzip
          - findutils
          - coreutils
      pipeline:
        - name: verify
          runs: |
            set -eux -o pipefail
      paths:
        - type: directory
          path: /home/agent/workspace
          uid: 1000
          gid: 1000
          mode: "0755"
        - type: directory
          path: /home/agent/.docker/sandbox/locks
          uid: 1000
          gid: 1000
          mode: "0755"
        - type: directory
          path: /usr/local/share/npm-global
          uid: 1000
          gid: 1000
          mode: "0755"
        - type: directory
          path: /usr/local/share/ca-certificates
          uid: 0
          gid: 0
          mode: "0755"
        - type: directory
          path: /home/agent/.local/bin
          uid: 1000
          gid: 1000
          mode: "0755"
        - type: directory
          path: /home/agent/.local/share
          uid: 1000
          gid: 1000
          mode: "0755"
        - type: directory
          path: /home/agent/.local/state
          uid: 1000
          gid: 1000
          mode: "0755"
        - type: directory
          path: /etc/sudoers.d
          uid: 0
          gid: 0
          mode: "0755"
        - type: file
          path: /etc/sudoers.d/agent
          content: |
            agent ALL=(ALL) NOPASSWD:ALL
          uid: 0
          gid: 0
          mode: "0440"
        - type: directory
          path: /etc/pam.d
          uid: 0
          gid: 0
          mode: "0755"
        - type: file
          path: /etc/pam.d/common-auth
          content: |
            auth    [success=1 default=ignore]    pam_unix.so nullok
            auth    requisite                      pam_deny.so
            auth    required                       pam_permit.so
          uid: 0
          gid: 0
          mode: "0644"
        - type: file
          path: /etc/pam.d/common-account
          content: |
            account [success=1 new_authtok_reqd=done default=ignore]    pam_unix.so
            account requisite                      pam_deny.so
            account required                       pam_permit.so
          uid: 0
          gid: 0
          mode: "0644"
        - type: file
          path: /etc/pam.d/common-session-noninteractive
          content: |
            session [default=1]                    pam_permit.so
            session requisite                      pam_deny.so
            session required                       pam_permit.so
            session required                       pam_unix.so
          uid: 0
          gid: 0
          mode: "0644"
        - type: file
          path: /etc/pam.d/common-session
          content: |
            session [default=1]                    pam_permit.so
            session requisite                      pam_deny.so
            session required                       pam_permit.so
            session required                       pam_unix.so
          uid: 0
          gid: 0
          mode: "0644"
        - type: file
          path: /etc/pam.d/common-password
          content: |
            password [success=1 default=ignore]    pam_unix.so obscure yescrypt
            password requisite                     pam_deny.so
            password required                      pam_permit.so
          uid: 0
          gid: 0
          mode: "0644"
        - type: file
          path: /etc/pam.d/sudo
          content: |
            @include common-auth
            @include common-account
            @include common-session-noninteractive
          uid: 0
          gid: 0
          mode: "0644"
        - type: file
          path: /etc/pam.d/su
          content: |
            # Let root su to any user without a password (standard Debian
            # behavior). Required by the sandbox durable-startup dispatcher,
            # which runs per-user `commands.startup` entries as root via
            # `su -s /bin/sh -c '...' <user>`. Without pam_rootok the hardened
            # base falls straight through to common-auth, so even root is
            # prompted for a password — which hangs the first startup command
            # (e.g. claude's apt-cache refresh) and starves every later one.
            auth    sufficient    pam_rootok.so
            @include common-auth
            @include common-account
            @include common-session
          uid: 0
          gid: 0
          mode: "0644"
        - type: file
          path: /etc/sudoers.d/proxyconfig
          content: |
            Defaults:%sudo env_keep += "http_proxy https_proxy no_proxy HTTP_PROXY HTTPS_PROXY NO_PROXY SSL_CERT_FILE NODE_EXTRA_CA_CERTS REQUESTS_CA_BUNDLE JAVA_TOOL_OPTIONS"
          uid: 0
          gid: 0
          mode: "0440"
        - type: emptyfile
          path: /etc/sandbox-persistent.sh
          uid: 1000
          gid: 1000
          mode: "0644"
        - type: file
          path: /etc/profile.d/sandbox-persistent.sh
          content: |
            if [ -f /etc/sandbox-persistent.sh ]; then
                . /etc/sandbox-persistent.sh
            fi
            export BASH_ENV=/etc/sandbox-persistent.sh
          uid: 0
          gid: 0
          mode: "0644"
        - type: file
          path: /etc/profile
          content: |
            if [ -d /etc/profile.d ]; then
                for _f in /etc/profile.d/*.sh; do
                    [ -r "$_f" ] && . "$_f"
                done
                unset _f
            fi
          uid: 0
          gid: 0
          mode: "0644"
        - type: file
          path: /etc/bash.bashrc
          content: |
            if [ -f /etc/sandbox-persistent.sh ]; then
                . /etc/sandbox-persistent.sh
            fi
            export BASH_ENV=/etc/sandbox-persistent.sh
            # Show the DHI banner on the first interactive shell. profile.d only
            # runs for login shells, but `docker run -it ... bash` is an
            # interactive non-login shell, so source it here too (the marker in
            # the script keeps it to once per sandbox).
            if [ -f /etc/profile.d/01-dhi.sh ]; then
                . /etc/profile.d/01-dhi.sh
            fi
          uid: 0
          gid: 0
          mode: "0644"
        - type: file
          path: /home/agent/.bashrc
          content: |
            if [ -f /etc/sandbox-persistent.sh ]; then
                . /etc/sandbox-persistent.sh
            fi
            export BASH_ENV=/etc/sandbox-persistent.sh
            # Colored prompt matching the DHI banner: bold cyan user@host, bold
            # blue working dir, preceded by a status glyph showing whether the
            # last command succeeded (green ✓) or failed (red ✗ with exit code).
            # The glyph is computed in a PROMPT_COMMAND hook because $? must be
            # captured before the prompt is rebuilt. Color escapes are wrapped in
            # \[ \] so bash tracks the prompt width correctly. Falls back to a
            # plain prompt with a +/- indicator on dumb terminals.
            case "$TERM" in
                ""|dumb)
                    __dhi_set_prompt() {
                        local rc=$?
                        local mark='+'
                        [ "$rc" -eq 0 ] || mark="-:$rc"
                        PS1="$mark \u@\h:\w\$ "
                    }
                    ;;
                *)
                    __dhi_set_prompt() {
                        local rc=$?
                        local mark
                        if [ "$rc" -eq 0 ]; then
                            mark='\[\e[1;32m\]✓\[\e[0m\]'
                        else
                            mark="\[\e[1;31m\]✗ $rc\[\e[0m\]"
                        fi
                        PS1="$mark \[\e[1;36m\]\u@\h\[\e[0m\]:\[\e[1;34m\]\w\[\e[0m\]\$ "
                    }
                    ;;
            esac
            PROMPT_COMMAND=__dhi_set_prompt
          uid: 1000
          gid: 1000
          mode: "0644"
        - type: file
          path: /home/agent/.bash_profile
          content: |
            if [ -f ~/.bashrc ]; then . ~/.bashrc; fi
          uid: 1000
          gid: 1000
          mode: "0644"
      outputs:
        - source: /home/agent
          target: /home/agent
          uid: 1000
          gid: 1000
          mode: "0755"
        - source: /usr/local/share/npm-global
          target: /usr/local/share/npm-global
          uid: 1000
          gid: 1000
        - source: /usr/local/share/ca-certificates
          target: /usr/local/share/ca-certificates
          uid: 0
          gid: 0
          mode: "0755"
        - source: /etc/sandbox-persistent.sh
          target: /etc/sandbox-persistent.sh
          uid: 0
          gid: 0
          mode: "0644"
        - source: /etc/sudoers.d
          target: /etc/sudoers.d
          uid: 0
          gid: 0
        - source: /etc/pam.d
          target: /etc/pam.d
          uid: 0
          gid: 0
        - source: /etc/profile.d/sandbox-persistent.sh
          target: /etc/profile.d/sandbox-persistent.sh
          uid: 0
          gid: 0
        - source: /etc/profile
          target: /etc/profile
          uid: 0
          gid: 0
        - source: /etc/bash.bashrc
          target: /etc/bash.bashrc
          uid: 0
          gid: 0
    - name: build-clipboard-bridge
      work-dir: /go/src/github.com/docker/sandboxes
      environment:
        GOPATH: /go
        GOTOOLCHAIN: local
      contents:
        packages:
          - golang-1.26
          - ca-certificates
          - git
          - bash
          - coreutils
        files:
          - url: git+https://github.com/docker/sandboxes.git#54a695035350bab5f126a88c892a9bc3b5ae162a
            checksum: 54a695035350bab5f126a88c892a9bc3b5ae162a
            path: /go/src/github.com/docker/sandboxes
            spdx:
              name: clipboard-bridge
              version: 54a695035350bab5f126a88c892a9bc3b5ae162a
              packages:
                - name: clipboard-bridge
                  purl: pkg:golang/github.com/docker/sandboxes@54a695035350bab5f126a88c892a9bc3b5ae162a
                  license: LicenseRef-Proprietary
                - name: golang.org/x/sys
                  purl: pkg:golang/golang.org/x/sys@v0.46.0
                  license: BSD-3-Clause
            uid: 0
            gid: 0
      pipeline:
        - name: build
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/clipboard-bridge
            packages: ./sandboxlib/agent/clipboardbridge/cmd/clipboard-bridge
      outputs:
        - source: ${target.dir}/usr/local/bin/clipboard-bridge
          target: /usr/local/bin/clipboard-bridge
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/clipboard-bridge
          target: /opt/docker/sbom/clipboard-bridge
          uid: 0
          gid: 0
