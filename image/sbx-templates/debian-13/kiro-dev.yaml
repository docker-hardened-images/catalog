os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /home/agent/workspace
environment:
  BASH_ENV: /etc/sandbox-persistent.sh
  DEBIAN_FRONTEND: noninteractive
  NO_PROXY: localhost,127.0.0.1,::1,172.17.0.0/16
  NPM_CONFIG_PREFIX: /usr/local/share/npm-global
  PATH: /home/agent/.local/bin:/opt/python/bin:/go/bin:/usr/local/go/bin:/usr/local/share/npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  no_proxy: localhost,127.0.0.1,::1,172.17.0.0/16
paths:
  - type: file
    path: /etc/profile.d/01-dhi.sh
    content: |
      #!/bin/sh
      _dhi_marker="${HOME:-/home/agent}/.local/state/dhi-banner-shown"
      [ -f "$_dhi_marker" ] && { return 0 2>/dev/null || exit 0; }
      # SANDBOX_VM_ID is only known at runtime, so center it here the same way the
      # build-time CENTERED_KIT_NAME var is padded. Its placeholder sits 2 columns
      # right of the kit-name placeholder, hence pad = 18 - len/2 (vs 20) so both
      # labels center on the same column under the banner. Unquoted heredoc below
      # lets the shell expand $_dhi_vmid; the art has no $ or backticks to escape.
      _dhi_vmid="${SANDBOX_VM_ID:-}"
      if [ -n "$_dhi_vmid" ]; then
        _dhi_pad=$(( 18 - ${#_dhi_vmid} / 2 ))
        [ "$_dhi_pad" -lt 0 ] && _dhi_pad=0
        _dhi_vmid="$(printf '%*s' "$_dhi_pad" '')$_dhi_vmid"
      fi
      printf '%b\n' "$(cat <<EOF

                        \033[36m.=****=.\033[0m
                  \033[36m:+*******#******+:\033[0m
              \033[36m.*********\033[0m        \033[36m*********.\033[0m
            \033[36m:******:\033[0m                \033[36m:******:\033[0m
            \033[36m***:\033[0m                        \033[36m:***\033[0m
            \033[36m***\033[0m         \033[34m=******=\033[0m         \033[36m***\033[0m
            \033[36m***\033[0m        \033[34m**********\033[0m        \033[36m*#*\033[0m
            \033[36m**#\033[0m       \033[34m***=\033[0m    \033[34m=***\033[0m       \033[36m***\033[0m
            \033[36m***\033[0m       \033[34m*#*\033[0m      \033[34m*#*\033[0m       \033[36m**#\033[0m
            \033[36m***\033[0m       \033[34m+***\033[0m    \033[34m***+\033[0m       \033[36m***\033[0m
            \033[36m**#\033[0m        \033[34m=***  *#*=\033[0m        \033[36m***\033[0m
            \033[36m***\033[0m        \033[34m**#*  ****\033[0m        \033[36m***\033[0m
            \033[36m****\033[0m       \033[34m***    ***\033[0m        \033[36m=+\033[0m
            \033[36m***=\033[0m     \033[34m**#******#**\033[0m    \033[36m**=\033[0m
              \033[36m****\033[0m     \033[34m**********\033[0m    \033[36m:***\033[0m
              \033[36m****-\033[0m                 \033[36m:***\033[0m
                \033[36m-****\033[0m           \033[96m**************\033[0m      Docker Sandbox / DHI
                  \033[36m*****\033[0m         \033[96m+*****#*******\033[0m
                    \033[36m+****+\033[0m    \033[96m+*\033[0m     \033[96m:***\033[0m  $_dhi_vmid
                      \033[36m.**********\033[0m    \033[96m:***\033[0m
                        \033[36m.****.       \033[96m=+\033[0m                 kiro 2.14.1

      EOF
      )"
      echo ""
      mkdir -p "$(dirname "$_dhi_marker")" 2>/dev/null || true
      : > "$_dhi_marker" 2>/dev/null || true
    uid: 0
    gid: 0
    mode: "0755"
