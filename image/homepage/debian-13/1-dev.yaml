# syntax=dhi.io/build:2-debian13

name: Homepage 1.x (dev)
image: dhi.io/homepage
variant: dev
tags:
  - 1-dev
  - 1.13-dev
  - 1.13.2-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.13-debian-dev
  - 1.13-debian13-dev
  - 1.13.2-debian-dev
  - 1.13.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-01"
vars:
  COMMIT_SHA: 5d9ad0632b8cb6558d7a28e98b513bd783265388
  SEMVER_MAJOR_MINOR_VERSION: "1.13"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.13.2
  VERSION: 1.13.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - gosu
    - grep
    - libc-bin
    - libc6
    - libgomp1
    - libstdc++6
    - mawk
    - netbase
    - nodejs-24
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: homepage
      work-dir: ${source.dir}/homepage
      caches:
        - path: /root/.local/share/pnpm
        - path: /root/.cache
      contents:
        packages:
          - base-files
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - git
          - libc6
          - libstdc++6
          - mawk
          - nodejs-24
          - node-corepack
          - npm
          - sed
          - yarn-classic
          - yq
        files:
          - url: git+https://github.com/gethomepage/homepage.git#v1.13.2
            checksum: 5d9ad0632b8cb6558d7a28e98b513bd783265388
            path: ${source.dir}/homepage
            spdx:
              name: homepage
              version: 1.13.2
              packages:
                - name: homepage
                  purl: pkg:dhi/homepage@1.13.2
                  license: GPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update entrypoint
          runs: |
            set -eux -o pipefail

            sed -i 's/su-exec/gosu/g' docker-entrypoint.sh
        - name: bump pnpm dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable
            corepack prepare pnpm@latest --activate

            # CVE-2026-25896, CVE-2026-33036, CVE-2026-26278, CVE-2026-25128, CVE-2026-41650, CVE-2026-33349, CVE-2026-27942
            yq -Y -i '.overrides."gamedig>fast-xml-parser" = "5.7.0"' pnpm-workspace.yaml

            # CVE-2026-41305
            yq -Y -i '.overrides."postcss@8.4.31" = "8.5.10"' pnpm-workspace.yaml

            # CVE-2025-54798, CVE-2026-44705, CVE-2026-49982
            yq -Y -i '.overrides."tmp" = "0.2.7"' pnpm-workspace.yaml

            # CVE-2026-45736, CVE-2026-48779
            yq -Y -i '.overrides."ws" = "8.21.0"' pnpm-workspace.yaml

            # CVE-2026-44291, CVE-2026-44293, CVE-2026-44289, CVE-2026-44290, CVE-2026-44288, CVE-2026-44292, CVE-2026-44294, CVE-2026-48712, CVE-2026-54269
            yq -Y -i '.overrides."protobufjs" = "7.6.3"' pnpm-workspace.yaml

            # CVE-2026-53655
            yq -Y -i '.overrides."tar" = "7.5.16"' pnpm-workspace.yaml

            # CVE-2026-53550
            yq -Y -i '.overrides."js-yaml" = "4.2.0"' pnpm-workspace.yaml

            # CVE-2026-44288
            yq -Y -i '.overrides."@protobufjs/utf8" = "1.1.1"' pnpm-workspace.yaml

            # CVE-2026-44724, CVE-2026-50289
            yq -Y -i '.overrides."systeminformation" = "5.31.7"' pnpm-workspace.yaml

            # CVE-2026-44578, CVE-2026-44574, CVE-2026-45109, CVE-2026-44579, CVE-2026-44575, CVE-2026-44573, CVE-2026-44580, CVE-2026-44577, CVE-2026-44576, CVE-2026-44581, CVE-2026-44582, CVE-2026-44572
            pnpm up next@16.2.6
        - name: build
          privileged: true
          runs: |
            set -eux -o pipefail

            pnpm install --prefer-offline \
              && NEXT_TELEMETRY_DISABLED=1 \
                NEXT_PUBLIC_BUILDTIME=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ') \
                NEXT_PUBLIC_VERSION=1.13.2 \
                NEXT_PUBLIC_REVISION=5d9ad0632b8cb6558d7a28e98b513bd783265388 \
                pnpm run build

            mkdir ${target.dir}/app
            cp -r ./.next/standalone/. ${target.dir}/app
            cp -r ./.next/static/. ${target.dir}/app/.next/static
      outputs:
        - source: ${target.dir}/app
          target: /app
          uid: 65532
          gid: 65532
        - source: ${source.dir}/homepage/docker-entrypoint.sh
          target: /usr/local/bin/docker-entrypoint.sh
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/homepage
          target: /opt/docker/sbom/homepage
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  DEBIAN_FRONTEND: noninteractive
  HOSTNAME: '::'
  NODE_ENV: production
  PORT: "3000"
annotations:
  org.opencontainers.image.description: A minimal Homepage image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - docker-entrypoint.sh
cmd:
  - node
  - server.js
ports:
  - 3000/tcp
