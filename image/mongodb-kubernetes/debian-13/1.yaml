# syntax=dhi.io/build:2-debian13

name: MongoDB Controllers for Kubernetes 1.x
image: dhi.io/mongodb-kubernetes
variant: runtime
tags:
  - "1"
  - "1.9"
  - 1.9.1
  - 1-debian
  - 1-debian13
  - 1.9-debian
  - 1.9-debian13
  - 1.9.1-debian
  - 1.9.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: f935a71a503c0c98f8caf517d7bfed09c4c691e2
  SEMVER_MAJOR_MINOR_VERSION: "1.9"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.9.1
  VERSION: 1.9.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: mongodb-kubernetes
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/mongodb/mongodb-kubernetes.git#1.9.1
            checksum: f935a71a503c0c98f8caf517d7bfed09c4c691e2
            path: /go/src/github.com/mongodb/mongodb-kubernetes
            spdx:
              name: mongodb-kubernetes
              version: 1.9.1
              packages:
                - name: mongodb-kubernetes
                  purl: pkg:golang/github.com/mongodb/mongodb-kubernetes@1.9.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/mongodb/mongodb-kubernetes
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - github.com/go-jose/go-jose/v4@v4.1.4
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/mongodb/mongodb-kubernetes
          with:
            ldflags:
              - -X github.com/mongodb/mongodb-kubernetes/pkg/util.OperatorVersion=1.9.1
              - -X github.com/mongodb/mongodb-kubernetes/pkg/util.LogAutomationConfigDiff=false
            output: ${target.dir}/usr/local/bin/mongodb-kubernetes-operator
      outputs:
        - source: ${target.dir}/usr/local/bin/mongodb-kubernetes-operator
          target: /usr/local/bin/mongodb-kubernetes-operator
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/mongodb-kubernetes
          target: /opt/docker/sbom/mongodb-kubernetes
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal MongoDB Controllers for Kubernetes image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/mongodb-kubernetes-operator
