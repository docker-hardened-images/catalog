# syntax=dhi.io/build:2-debian13

name: Kubectl Argo Rollouts 1.9.x (dev)
image: dhi.io/kubectl-argo-rollouts
variant: dev
tags:
  - 1-dev
  - 1.9-dev
  - 1.9.1-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.9-debian-dev
  - 1.9-debian13-dev
  - 1.9.1-debian-dev
  - 1.9.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-06-05"
vars:
  COMMIT_SHA: b6bd3bcf8f60d717a98763d26acc983db7f97cb0
  SEMVER_MAJOR_MINOR_VERSION: "1.9"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.9.1
  VERSION: 1.9.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: kubectl-argo-rollouts
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - binutils-gold
          - bash
          - ca-certificates-bundle
          - coreutils
          - git
          - golang-1.26
          - findutils
          - mawk
          - sed
          - base-files
          - ca-certificates
          - libc6
          - libstdc++6
          - nodejs-24
          - node-corepack
          - npm
          - yarn-classic
        files:
          - url: git+https://github.com/argoproj/argo-rollouts.git#v1.9.1
            checksum: b6bd3bcf8f60d717a98763d26acc983db7f97cb0
            path: /go/src/github.com/argoproj/argo-rollouts
            spdx:
              name: kubectl-argo-rollouts
              version: 1.9.1
              packages:
                - name: kubectl-argo-rollouts
                  purl: pkg:golang/github.com/argoproj/argo-rollouts@1.9.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          work-dir: /go/src/github.com/argoproj/argo-rollouts
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/aws/aws-sdk-go@v1.55.5
              - github.com/expr-lang/expr@v1.17.7
              - github.com/moby/spdystream@v0.5.1
              - github.com/slack-go/slack@v0.23.1
              - go.opentelemetry.io/otel@v1.41.0
              - go.opentelemetry.io/otel/sdk@v1.40.0
            download: true
            replaces:
              - github.com/whilp/git-urls=github.com/chainguard-dev/git-urls@v1.0.2
            tidy: true
        - name: build ui
          work-dir: /go/src/github.com/argoproj/argo-rollouts/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            yarn install --network-timeout 300000
            NODE_ENV='production' yarn build

            cp -r dist/app/* ../server/static
        - name: test
          work-dir: /go/src/github.com/argoproj/argo-rollouts
          runs: |
            set -eux -o pipefail

            go test $(go list ./... | grep -v -e ./test/cmd/metrics-plugin-sample -e github.com/argoproj/argo-rollouts/rollout$)
        - name: build kubectl rollots
          uses: go/build@v1
          work-dir: /go/src/github.com/argoproj/argo-rollouts
          with:
            ldflags:
              - -X github.com/argoproj/argo-rollouts/utils/version.version=1.9.1
              - -X github.com/argoproj/argo-rollouts/utils/version.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
              - -X github.com/argoproj/argo-rollouts/utils/version.gitCommit=b6bd3bcf8f60d717a98763d26acc983db7f97cb0
              - -X github.com/argoproj/argo-rollouts/utils/version.gitTreeState=clean
            output: ${target.dir}/usr/local/bin/kubectl-argo-rollouts
            packages: ./cmd/kubectl-argo-rollouts
      outputs:
        - source: ${target.dir}/usr/local/bin/kubectl-argo-rollouts
          target: /usr/local/bin/kubectl-argo-rollouts
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kubectl-argo-rollouts
          target: /opt/docker/sbom/kubectl-argo-rollouts
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /home/argo-rollouts
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /bin/kubectl-argo-rollouts
    uid: 0
    gid: 0
    source: /usr/local/bin/kubectl-argo-rollouts
  - type: directory
    path: /home/argo-rollouts
    uid: 0
    gid: 0
annotations:
  org.opencontainers.image.description: A minimal Kubectl Argo Rollouts image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /bin/kubectl-argo-rollouts
cmd:
  - dashboard
