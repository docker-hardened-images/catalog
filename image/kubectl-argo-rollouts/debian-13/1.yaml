            includes:
              - opt/nodejs
              - opt/yarn
              - usr/local/bin/node
              - usr/local/bin/yarn
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          work-dir: /go/src/github.com/argoproj/argo-rollouts
          with:
            deps:
              - github.com/aws/aws-sdk-go@v1.55.5
              - go.opentelemetry.io/otel/sdk@v1.40.0
              - golang.org/x/crypto@v0.45.0
