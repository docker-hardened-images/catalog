              - github.com/expr-lang/expr@v1.17.7
              - github.com/moby/spdystream@v0.5.1
            download: true
            replaces:
              - github.com/whilp/git-urls=github.com/chainguard-dev/git-urls@v1.0.2
            tidy: true
        - name: build ui
          work-dir: /go/src/github.com/argoproj/argo-rollouts/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            yarn install --network-timeout 300000
            NODE_ENV='production' yarn build

            cp -r dist/app/* ../server/static
        - name: test
          work-dir: /go/src/github.com/argoproj/argo-rollouts
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            go test $(go list ./... | grep -v ./test/cmd/metrics-plugin-sample)
