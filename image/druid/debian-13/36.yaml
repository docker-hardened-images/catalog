# syntax=dhi.io/build:2-debian13

name: Apache Druid 36.x
image: dhi.io/druid
variant: runtime
tags:
  - "36"
  - "36.0"
  - 36.0.0
  - 36-debian13
  - 36.0-debian13
  - 36.0.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-09"
vars:
  COMMIT_SHA: 18ee9bce703ff13bf62094b07b1ebd9257225655
  DRUID_HOME: /opt/druid
  JAVA_HOME: /opt/java/openjdk/21-jre
  JAVA_MAJOR_VERSION: "21"
  JAVA_REFERENCE: dhi/eclipse-temurin:21.0.10.7-debian13@sha256:5691e83dfdba43d0bf72a09cb793f5ac78563e7e1b76d31544c7b310a797c8aa
  JAVA_VERSION: 21.0.10.7
  MAVEN_REFERENCE: dhi/maven:3.9.14-jdk21-debian13-dev@sha256:65f448b4a08a41ada20fd50c68fe771ed60fc55a298361a69aa303f26c42bb84
  MAVEN_VERSION: 3.9.14
  SEMVER_MAJOR_MINOR_VERSION: "36.0"
  SEMVER_MAJOR_VERSION: "36"
  SEMVER_VERSION: 36.0.0
  VERSION: 36.0.0
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - findutils
    - grep
    - iproute2
    - procps
    - sed
  builds:
    - name: druid
      uses: dhi.io/maven:3.9.14-jdk21-debian13-dev@sha256:65f448b4a08a41ada20fd50c68fe771ed60fc55a298361a69aa303f26c42bb84
      work-dir: ${source.dir}/druid
      environment:
        MAVEN_ARGS: -Dmaven.wagon.http.retryHandler.class=standard -Dmaven.wagon.http.retryHandler.count=5 -Dmaven.wagon.http.retryHandler.requestSentEnabled=true -Dmaven.wagon.httpconnectionManager.ttlSeconds=120 -Daether.connector.http.retryHandler.count=5
        MAVEN_OPTS: -Xmx3g
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - curl
          - grep
          - gzip
          - python3
          - python3-yaml
          - sed
          - tar
          - unzip
        files:
          - url: git+https://github.com/apache/druid.git#druid-36.0.0
            checksum: 18ee9bce703ff13bf62094b07b1ebd9257225655
            path: ${source.dir}/druid
            spdx:
              name: druid
              version: 36.0.0
              packages:
                - name: druid
                  purl: pkg:github/apache/druid@36.0.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch deps
          uses: mvn/patch@v1
          with:
            dependencies: ${source.dir}/patch/mvn-deps-36.0.json
            dependencies-key: dependencyManagement.dependencies
            downgrade: false
            mvn-root: ${source.dir}/druid
            properties: ${source.dir}/patch/mvn-properties-36.0.json
        - name: build druid
          privileged: true
          runs: |
            set -eux -o pipefail

            # Use --no-transfer-progress instead of -q: same noise reduction
            # (no per-byte progress) but preserves the underlying Aether/Wagon
            # error stack traces when artifact resolution actually fails.
            mvn install -B -ff --no-transfer-progress \
              -Pdist,bundle-contrib-exts \
              -Pskip-static-checks,skip-tests \
              -Dmaven.javadoc.skip=true \
              -T1C
        - name: extract distribution
          runs: |
            set -eux -o pipefail

            DIST_FILE=$(find distribution/target -name "apache-druid-36.0.0-bin.tar.gz" | head -1)
            if [ -z "$DIST_FILE" ]; then
              echo "Distribution tarball not found" >&2
              exit 1
            fi

            mkdir -p "${target.dir}/opt/druid"
            tar -xzf "$DIST_FILE" \
              --strip-components=1 \
              -C "${target.dir}/opt/druid"

            chown -R 1000:1000 "${target.dir}/opt/druid"
        - name: remove unused extensions
          runs: |
            set -eux -o pipefail

            # These extensions are removed to reduce CVE surface area.
            # Users can add them back via pull-deps in the -dev image. See guides.md.
            #
            # Contrib extensions (high CVE transitive dep trees, legacy or niche use cases):
            #   druid-cassandra-storage     - uses Astyanax (archived 2021), targets Cassandra 1.x
            #   aliyun-oss-extensions       - Alibaba-specific, not needed in most deployments
            #   druid-cloudfiles-extensions - Rackspace Cloud Files is near end-of-life
            #   druid-testing-tools         - test infrastructure, not for production use
            #   druid-hdfs-storage          - HDFS deep storage, brings in Hadoop + Netty 3.x (20+ CVEs)
            #
            # Core extensions (specialized, not needed in most deployments):
            #   druid-kerberos              - Kerberos auth, only for Kerberized Hadoop environments
            for ext in \
              druid-testing-tools \
              druid-cassandra-storage \
              aliyun-oss-extensions \
              druid-cloudfiles-extensions \
              druid-hdfs-storage \
              druid-kerberos; do
              rm -rf "${target.dir}/opt/druid/extensions/${ext}"

              # Also strip the extension from any bundled
              # druid.extensions.loadList defaults so the image starts cleanly
              # with its own conf/ directory. Upstream's quickstart configs
              # reference druid-hdfs-storage by default.
              find "${target.dir}/opt/druid/conf" \
                -type f -name common.runtime.properties \
                -exec sed -i \
                -e "s/\"${ext}\", *//g" \
                -e "s/, *\"${ext}\"//g" \
                -e "s/\"${ext}\"//g" \
                {} +
            done
        - name: install scripts
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/local/bin"
            install -m 0755 distribution/docker/druid.sh "${target.dir}/usr/local/bin/druid.sh"
            install -m 0755 distribution/docker/peon.sh "${target.dir}/usr/local/bin/peon.sh"
      paths:
        - type: file
          path: ${source.dir}/patch/mvn-properties-36.0.json
          uid: 0
          gid: 0
          source: image/druid/patch/mvn-properties-36.0.json
        - type: file
          path: ${source.dir}/patch/mvn-deps-36.0.json
          uid: 0
          gid: 0
          source: image/druid/patch/mvn-deps-36.0.json
      outputs:
        - source: ${target.dir}/opt/druid
          target: /opt/druid
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/druid.sh
          target: /usr/local/bin/druid.sh
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/peon.sh
          target: /usr/local/bin/peon.sh
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.10.7-debian13@sha256:5691e83dfdba43d0bf72a09cb793f5ac78563e7e1b76d31544c7b310a797c8aa
      includes:
        - opt/**
      uid: 0
      gid: 0
accounts:
  run-as: druid
  users:
    - name: druid
      uid: 1000
      gid: 1000
  groups:
    - name: druid
      gid: 1000
      members:
        - druid
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /opt/druid
environment:
  DRUID_HOME: /opt/druid
  JAVA_HOME: /opt/java/openjdk/21-jre
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  PATH: /opt/java/openjdk/21-jre/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: directory
    path: /opt/druid/var
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /opt/shared
    uid: 1000
    gid: 1000
    mode: "0775"
  - type: symlink
    path: /druid.sh
    uid: 0
    gid: 0
    source: /usr/local/bin/druid.sh
  - type: symlink
    path: /peon.sh
    uid: 0
    gid: 0
    source: /usr/local/bin/peon.sh
annotations:
  org.opencontainers.image.description: A minimal Apache Druid image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
