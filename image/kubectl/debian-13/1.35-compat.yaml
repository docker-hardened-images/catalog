# syntax=dhi.io/build:2-debian13

name: kubectl 1.35.x (compat)
image: dhi.io/kubectl
variant: runtime
flavor: compat
tags:
  - 1.35-compat
  - 1.35.5-compat
  - 1.35-debian-compat
  - 1.35-debian13-compat
  - 1.35.5-debian-compat
  - 1.35.5-debian13-compat
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-12-17"
  end-of-life: "2027-02-28"
vars:
  FLAVORED_SUFFIX: -compat
  SEMVER_MAJOR_MINOR_VERSION: "1.35"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.35.5
  SUFFIX: ""
  VERSION: 1.35.5-6
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - findutils
    - gnu-which
    - kubectl=1.35.5-6
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
  - type: symlink
    path: /usr/local/bin/kubectl
    uid: 0
    gid: 0
    source: /usr/bin/kubectl
  - type: symlink
    path: /usr/local/bin/kubectl-convert
    uid: 0
    gid: 0
    source: /usr/bin/kubectl-convert
annotations:
  org.opencontainers.image.description: A minimal kubectl image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/kubectl
cmd:
  - --help
