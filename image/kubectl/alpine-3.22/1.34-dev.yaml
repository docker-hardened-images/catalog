# syntax=dhi.io/build:2-alpine3.22

name: kubectl 1.34.x (dev)
image: dhi.io/kubectl
variant: dev
tags:
  - 1.34-alpine3.22-dev
  - 1.34.5-alpine3.22-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-08-27"
  end-of-life: "2026-10-27"
vars:
  COMMIT_SHA: ebfac057369b21558006b8815821ab2fb1e29f2d
  DBG: '#{ target.dev ? "1" : "0" }'
  GO_VERSION: 1.24.13
  GOLANG_REFERENCE: dhi/golang:1.24.13-alpine3.22-dev@sha256:b427a17e493b89091c18674b81a7638b2c53f305b00baa21f04c2a9727fd3d79
  SEMVER_MAJOR_MINOR_VERSION: "1.34"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.34.5
  VERSION: 1.34.5
contents:
  repositories:
    - https://dl-cdn.alpinelinux.org/alpine/v3.22/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.22/community
  packages:
    - alpine-baselayout-data
    - apk-tools
    - busybox
    - ca-certificates-bundle
  builds:
    - name: kubectl
      work-dir: /go/src/k8s.io/kubernetes
      environment:
        PATH: /usr/local/go/bin:$PATH
      contents:
        packages:
          - bash
          - coreutils
          - findutils
          - jq
          - make
          - rsync
          - ca-certificates-bundle
          - git
        files:
          - url: git+https://github.com/kubernetes/kubernetes.git#v1.34.5
            checksum: ebfac057369b21558006b8815821ab2fb1e29f2d
            path: /go/src/k8s.io/kubernetes
            spdx:
              name: kubernetes
              version: 1.34.5
              packages:
                - name: kubernetes
                  purl: pkg:golang/k8s.io/kubernetes@1.34.5
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/golang:1.24.13-alpine3.22-dev@sha256:b427a17e493b89091c18674b81a7638b2c53f305b00baa21f04c2a9727fd3d79
            includes:
              - usr/local/go
            uid: 0
            gid: 0
      pipeline:
        - name: update dependencies
          privileged: true
          environment:
            GOFIPS140: "off"
          runs: |
            set -eux -o pipefail

            ./hack/pin-dependency.sh golang.org/x/net v0.45.0 # CVE-2025-47911, CVE-2025-58190
            ./hack/pin-dependency.sh golang.org/x/oauth2 v0.27.0
            ./hack/update-vendor.sh
        - name: build
          runs: |
            set -eux -o pipefail

            make WHAT=cmd/kubectl DBG=${DBG}
            make WHAT=cmd/kubectl-convert DBG=${DBG}
        - name: install
          runs: |
            set -eux -o pipefail

            install -D -m 0755 _output/bin/kubectl \
              '${target.dir}/usr/local/bin/kubectl'
            install -D -m 0755 _output/bin/kubectl-convert \
              '${target.dir}/usr/local/bin/kubectl-convert'
      outputs:
        - source: ${target.dir}/usr/local/bin/kubectl
          target: /usr/local/bin/kubectl
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/kubectl-convert
          target: /usr/local/bin/kubectl-convert
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kubernetes
          target: /opt/docker/sbom/kubernetes
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.22"
  pretty-name: Docker Hardened Images/Alpine Linux v3.22
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal kubectl image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/kubectl
cmd:
  - --help
