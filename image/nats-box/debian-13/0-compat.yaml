# syntax=dhi.io/build:2-debian13

name: NATS Box 0.x (compat)
image: dhi.io/nats-box
variant: runtime
flavor: compat
tags:
  - 0-compat
  - 0.19-compat
  - 0.19.7-compat
  - 0-debian-compat
  - 0-debian13-compat
  - 0.19-debian-compat
  - 0.19-debian13-compat
  - 0.19.7-debian-compat
  - 0.19.7-debian13-compat
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-01-21"
vars:
  COMMIT_SHA: 2bcfc4004c2104958b931e714d49afe52f0a7d26
  NATS_TOP_COMMIT_SHA: 8d79e0bb87577ed33fc9aba5415cc41b22b63a9b
  NATS_TOP_VERSION: 0.6.4
  NATSCLI_REFERENCE: dhi/natscli:0.4.0-debian13@sha256:f0f2732c88571c402579d8a8490e2ff9992369f9973b6430c29020a4e3b783e9
  NATSCLI_VERSION: 0.4.0
  NKEYS_COMMIT_SHA: c1eebf38bd8b1b1021b45b5f8f403052ac042dc5
  NKEYS_VERSION: 0.4.16
  NSC_COMMIT_SHA: c8d67c23c187ed0db496ce5b2b66e96715bb72bf
  NSC_VERSION: 2.15.0
  SEMVER_MAJOR_MINOR_VERSION: "0.19"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.19.7
  VERSION: 0.19.7
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - curl
    - jq
    - tzdata
  builds:
    - name: nsc
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/nats-io/nsc.git#v2.15.0
            checksum: c8d67c23c187ed0db496ce5b2b66e96715bb72bf
            path: /go/src/github.com/nats-io/nsc/v2
            spdx:
              name: nsc
              version: 2.15.0
              packages:
                - name: nsc
                  purl: pkg:golang/github.com/nats-io/nsc/v2@2.15.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/nats-io/nsc/v2
          caches:
            - path: /go/pkg/mod
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          work-dir: /go/src/github.com/nats-io/nsc/v2
          privileged: true
          runs: |
            set -eux -o pipefail

            # nsc uses X25519 which is not allowed in FIPS mode
            # -vet=off: nsc v2.12.0 has non-constant format strings that Go 1.26's
            # stricter go vet flags; no upstream fix released yet
            CGO_ENABLED=0 go test -vet=off ./...
        - name: build nsc
          uses: go/build@v1
          work-dir: /go/src/github.com/nats-io/nsc/v2
          with:
            ldflags:
              - -s -w
              - -X main.version=2.15.0
              - -X main.commit=c8d67c23c187ed0db496ce5b2b66e96715bb72bf
              - -X main.date=${SOURCE_DATE_EPOCH}
            output: ${target.dir}/usr/local/bin/nsc
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin/nsc
          target: /usr/local/bin/nsc
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/nsc
          target: /opt/docker/sbom/nsc
          uid: 0
          gid: 0
    - name: nats-top
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/nats-io/nats-top.git#v0.6.4
            checksum: 8d79e0bb87577ed33fc9aba5415cc41b22b63a9b
            path: /go/src/github.com/nats-io/nats-top
            spdx:
              name: nats-top
              version: 0.6.4
              packages:
                - name: nats-top
                  purl: pkg:golang/github.com/nats-io/nats-top@0.6.4
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/nats-io/nats-top
          caches:
            - path: /go/pkg/mod
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/nats-io/nats-server/v2@v2.12.6
            download: true
        - name: test
          work-dir: /go/src/github.com/nats-io/nats-top
          privileged: true
          runs: |
            set -eux -o pipefail

            # Regenerate the test certificates (Expired March 2, 2026)
            go install github.com/cloudflare/cfssl/cmd/...@latest
            export PATH="$(go env GOPATH)/bin:$PATH"
            cd ./util/test
            ./make-new-certs.sh
            cd ../..

            CGO_ENABLED=0 go test ./...
        - name: build nats-top
          uses: go/build@v1
          work-dir: /go/src/github.com/nats-io/nats-top
          with:
            ldflags:
              - -s -w
              - -X main.version=0.6.4
              - -X main.commit=8d79e0bb87577ed33fc9aba5415cc41b22b63a9b
              - -X main.date=${SOURCE_DATE_EPOCH}
            output: ${target.dir}/usr/local/bin/nats-top
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin/nats-top
          target: /usr/local/bin/nats-top
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/nats-top
          target: /opt/docker/sbom/nats-top
          uid: 0
          gid: 0
    - name: nkeys
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/nats-io/nkeys.git#v0.4.16
            checksum: c1eebf38bd8b1b1021b45b5f8f403052ac042dc5
            path: /go/src/github.com/nats-io/nkeys
            spdx:
              name: nkeys
              version: 0.4.16
              packages:
                - name: nkeys
                  purl: pkg:golang/github.com/nats-io/nkeys@0.4.16
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/nats-io/nkeys
          caches:
            - path: /go/pkg/mod
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
            download: true
        - name: test
          work-dir: /go/src/github.com/nats-io/nkeys
          privileged: true
          runs: |
            set -eux -o pipefail

            # nk uses X25519 which is not allowed in FIPS mode
            CGO_ENABLED=0 go test ./...
        - name: build nk
          uses: go/build@v1
          work-dir: /go/src/github.com/nats-io/nkeys
          with:
            ldflags:
              - -X main.Version=v0.4.16_c1eebf38bd8b1b1021b45b5f8f403052ac042dc5
            output: ${target.dir}/usr/local/bin/nk
            packages: ./nk
      outputs:
        - source: ${target.dir}/usr/local/bin/nk
          target: /usr/local/bin/nk
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/nkeys
          target: /opt/docker/sbom/nkeys
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/natscli:0.4.0-debian13@sha256:f0f2732c88571c402579d8a8490e2ff9992369f9973b6430c29020a4e3b783e9
      includes:
        - opt/docker/sbom/natscli
        - usr/local/bin/nats
      uid: 0
      gid: 0
accounts:
