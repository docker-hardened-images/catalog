# syntax=dhi.io/build:2-debian13

name: Gitleaks 8.x (dev)
image: dhi.io/gitleaks
variant: dev
tags:
  - 8-dev
  - 8.30-dev
  - 8.30.1-dev
  - 8-debian-dev
  - 8-debian13-dev
  - 8.30-debian-dev
  - 8.30-debian13-dev
  - 8.30.1-debian-dev
  - 8.30.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e
  SEMVER_MAJOR_MINOR_VERSION: "8.30"
  SEMVER_MAJOR_VERSION: "8"
  SEMVER_VERSION: 8.30.1
  VERSION: 8.30.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - git
    - grep
    - libc-bin
    - mawk
    - openssh-client
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: gitleaks
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/gitleaks/gitleaks.git#v8.30.1
            checksum: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e
            path: /go/src/github.com/zricethezav/gitleaks
            spdx:
              name: gitleaks
              version: 8.30.1
              packages:
                - name: gitleaks
                  purl: pkg:golang/github.com/zricethezav/gitleaks/v8@8.30.1
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/zricethezav/gitleaks
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/ulikunitz/xz@v0.5.15
              - github.com/mholt/archives@v0.1.5
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/zricethezav/gitleaks
          with:
            ldflags:
              - -X github.com/zricethezav/gitleaks/v8/version.Version=8.30.1
            output: ${target.dir}/usr/local/bin/gitleaks
      outputs:
        - source: ${target.dir}/usr/local/bin/gitleaks
          target: /usr/local/bin/gitleaks
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/gitleaks
          target: /opt/docker/sbom/gitleaks
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: file
    path: /root/.git/config
    content: |
      [safe]
          directory = *
    uid: 0
    gid: 0
    mode: "0644"
annotations:
  org.opencontainers.image.description: A minimal Gitleaks image for detecting secrets in git repositories
  org.opencontainers.image.licenses: MIT
entrypoint:
  - gitleaks
