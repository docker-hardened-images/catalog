# syntax=dhi.io/build:2-debian13

name: Gatekeeper 3.22.x (dev)
image: dhi.io/gatekeeper
variant: dev
tags:
  - 3-dev
  - 3.22-dev
  - 3.22.2-dev
  - 3-debian-dev
  - 3-debian13-dev
  - 3.22-debian-dev
  - 3.22-debian13-dev
  - 3.22.2-debian-dev
  - 3.22.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-09"
vars:
  COMMIT_SHA: eda110bdaf2510288dccd73a1be4dd0c6442a4aa
  SEMVER_MAJOR_MINOR_VERSION: "3.22"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.22.2
  VERSION: 3.22.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: gatekeeper
      work-dir: /go/src/github.com/open-policy-agent/gatekeeper
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/open-policy-agent/gatekeeper.git#v3.22.2
            checksum: eda110bdaf2510288dccd73a1be4dd0c6442a4aa
            path: /go/src/github.com/open-policy-agent/gatekeeper
            spdx:
              name: gatekeeper
              version: 3.22.2
              packages:
                - name: gatekeeper
                  purl: pkg:golang/github.com/open-policy-agent/gatekeeper/v3@3.22.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (3.22 only)
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Scope: pure-Go packages that don't require envtest binaries
            # (etcd/kube-apiserver). Covers the manager's mutation/target/
            # webhook surface plus pkg/metrics (which exercises the otel/sdk
            # and otlpmetric CVE bumps applied above) and cmd/gator/... as a
            # smoke check that the shared module still compiles end-to-end.
            go test -short -count=1 \
              ./apis/... \
              ./cmd/gator/... \
              ./pkg/mutation/... \
              ./pkg/target/... \
              ./pkg/webhook/... \
              ./pkg/metrics/...
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/open-policy-agent/gatekeeper/v3/pkg/version.Version=v3.22.2
            output: ${target.dir}/usr/local/bin/gatekeeper
      outputs:
        - source: ${target.dir}/usr/local/bin/gatekeeper
          target: /usr/local/bin/gatekeeper
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/gatekeeper
          target: /opt/docker/sbom/gatekeeper
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /manager
    uid: 0
    gid: 0
    source: /usr/local/bin/gatekeeper
annotations:
  org.opencontainers.image.description: A minimal Gatekeeper image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/gatekeeper
ports:
  - 8443/tcp
  - 9090/tcp
