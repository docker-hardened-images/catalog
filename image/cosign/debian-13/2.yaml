# syntax=dhi.io/build:2-debian13

name: Cosign 2.x
image: dhi.io/cosign
variant: runtime
tags:
  - "2"
  - "2.6"
  - 2.6.4
  - 2-debian
  - 2-debian13
  - 2.6-debian
  - 2.6-debian13
  - 2.6.4-debian
  - 2.6.4-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "2.6"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.6.4
  SUFFIX: ""
  VERSION: 2.6.4-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - cosign-2=2.6.4-1
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
  - type: symlink
    path: /usr/local/bin/cosign
    uid: 0
    gid: 0
    source: /usr/bin/cosign
annotations:
  org.opencontainers.image.description: A minimal Cosign image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - cosign
