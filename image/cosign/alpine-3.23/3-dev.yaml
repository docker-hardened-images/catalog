# syntax=dhi.io/build:2-alpine3.23

name: Cosign 3.x (dev)
image: dhi.io/cosign
variant: dev
tags:
  - 3-alpine-dev
  - 3.1-alpine-dev
  - 3-alpine3.23-dev
  - 3.1.1-alpine-dev
  - 3.1-alpine3.23-dev
  - 3.1.1-alpine3.23-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "3.1"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.1.1
  SUFFIX: -dev
  VERSION: 3.1.1-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - apk-tools
    - busybox
    - ca-certificates
    - ca-certificates-bundle
    - cosign-3-dev
    - tzdata
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
  - type: symlink
    path: /usr/local/bin/cosign
    uid: 0
    gid: 0
    source: /usr/bin/cosign
annotations:
  org.opencontainers.image.description: A minimal Cosign image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - cosign
