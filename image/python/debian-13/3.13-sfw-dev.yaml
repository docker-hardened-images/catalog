# syntax=dhi.io/build:2-debian13

name: Python 3.13.x / Socket Firewall (sfw, dev)
image: dhi.io/python
variant: dev
flavor: sfw
tags:
  - 3.13-sfw-dev
  - 3.13.13-sfw-dev
  - 3.13-debian-sfw-dev
  - 3.13-debian13-sfw-dev
  - 3.13.13-debian-sfw-dev
  - 3.13.13-debian13-sfw-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2024-10-07"
  end-of-life: "2029-10-31"
vars:
  PIP_VERSION: 26.1.2dhi0
  PYTHON_MAJOR_MINOR_VERSION: "3.13"
  PYTHON_MAJOR_VERSION: "3"
  PYTHON_VERSION: 3.13.13
  SFW_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "arm64" }'
  SFW_VERSION: 1.12.0
  VERSION: 3.13.13-3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!gnupg2'
    - '!gpg'
    - '!gpgconf'
    - '!libassuan'
    - '!libassuan9'
    - '!libcom-err2'
    - '!libelogind0'
    - '!libexpat1'
    - '!libksba'
    - '!libksba8'
    - '!libmpfr6'
    - '!libnpth0t64'
    - '!libnsl'
    - '!libnsl2'
    - '!libsigseg'
    - '!libsigsegv2'
    - '!libtirpc'
    - '!libtirpc-common'
    - '!libtirpc3t64'
    - '!mpfr4'
    - '!original-awk'
    - '!usrmerge'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libbz2-1.0
    - libc-bin
    - libcrypt1
    - libdb5.3t64
    - libffi8
    - libgcrypt20
    - libgdbm-compat4t64
    - libgdbm6t64
    - libgpg-error0
    - liblzma5
    - libncursesw6
    - libpython-3.13-minimal=3.13.13-3
    - libpython-3.13-stdlib=3.13.13-3
    - libreadline8t64
    - libsqlite3-0
    - libssl3t64
    - libtinfo6
    - libuuid1
    - mawk
    - netbase
    - perl-base
    - python-3.13-minimal=3.13.13-3
    - python-3.13=3.13.13-3
    - python3-pip=26.1.2dhi0
    - sed
    - tzdata
    - util-linux
    - zlib1g
  builds:
    - name: sfw
      contents:
        packages:
          - bash
          - coreutils
          - findutils
          - libstdc++6
        files:
          - url: https://github.com/SocketDev/sfw-free/releases/download/v1.12.0/sfw-free-linux-${SFW_ARCH}
            path: ${target.dir}/opt/socket/bin/sfw
            uid: 0
            gid: 0
            mode: "0755"
          - url: https://raw.githubusercontent.com/SocketDev/sfw-free/refs/tags/v1.12.0/LICENSE.md
            path: ${target.dir}/opt/socket/LICENSE.md
            uid: 0
            gid: 0
      pipeline:
        - name: create alias
          runs: |
            set -eux -o pipefail

            echo "Creating pip alias"

            cat > "${target.dir}/opt/socket/bin/pip" << 'EOF'
            #!/bin/bash

            # if DHI_NO_SFW is set to true, run the command without sfw, otherwise run with sfw
            if [ "${DHI_NO_SFW}" = "true" ]; then
              /usr/bin/pip3 "$@"
            else
              sfw /usr/bin/pip3 "$@"
            fi
            EOF

            chmod +x "${target.dir}/opt/socket/bin/pip"
      outputs:
        - source: ${target.dir}/opt/socket
          target: /opt/socket
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  PATH: /opt/socket/bin:/usr/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  PYTHON_VERSION: 3.13.13
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
paths:
  - type: file
    path: /usr/lib/python3.13/site-packages/dhi-dist-packages.pth
    content: |
      /usr/lib/python3/dist-packages
    uid: 0
    gid: 0
    mode: "0644"
annotations:
  org.opencontainers.image.description: A minimal Python image
  org.opencontainers.image.licenses: PSF-2.0
cmd:
  - python3
