# syntax=dhi.io/build:2-debian13

name: Python 3.14.x / Socket Firewall (sfw, dev)
image: dhi.io/python
variant: dev
flavor: sfw
tags:
  - 3-sfw-dev
  - 3.14-sfw-dev
  - 3.14.6-sfw-dev
  - 3-debian-sfw-dev
  - 3.14.6-5-sfw-dev
