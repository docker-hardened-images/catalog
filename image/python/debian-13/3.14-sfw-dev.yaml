    - findutils
    - grep
    - libbz2-1.0
    - libc-bin
    - libc6
    - libc6-dev
    - libcrypt1
    - libdb5.3t64
    - libexpat1-dev
    - libffi8
    - libgcc-s1
    - libgdbm-compat4t64
    - liblzma5
    - libncursesw6
    - libpython-3.14
    - libpython-3.14-dev
