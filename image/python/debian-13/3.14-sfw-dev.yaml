    - libpython-3.14-minimal
    - libpython-3.14-minimal=3.14.6-5
    - libpython-3.14-stdlib
    - libpython-3.14-stdlib=3.14.6-5
    - libpython-3.14=3.14.6-5
    - libreadline8t64
    - libsqlite3-0
    - libstdc++6
    - libtinfo6
    - libuuid1
    - libzstd1
    - mawk
    - ncurses-base
    - ncurses-bin
    - netbase
    - perl-base
    - python-3.14
    - python-3.14-dev
    - python-3.14-dev=3.14.6-5
    - python-3.14-minimal
    - python-3.14-minimal=3.14.6-5
    - python-3.14=3.14.6-5
    - python3-pip
    - python3-pip-whl
    - python3-pip-whl=26.1.2-4
    - python3-pip=26.1.2-4
    - python3-setuptools
    - python3-setuptools-whl
    - python3-setuptools-whl=83.0.0-0
    - python3-setuptools=83.0.0-0
    - python3-wheel
    - python3-wheel-whl
    - python3-wheel-whl=0.47.0-3
    - python3-wheel=0.47.0-3
    - sed
    - sfw-free
    - sfw-free-oci-config
    - sfw-free-pip
    - sqv
    - tzdata
    - util-linux
    - zlib1g
    - zlib1g-dev
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  PYTHON_VERSION: 3.14.6
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
annotations:
  org.opencontainers.image.description: A minimal Python image
  org.opencontainers.image.licenses: PSF-2.0
cmd:
  - python3
