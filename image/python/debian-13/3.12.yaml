# syntax=dhi.io/build:2-debian13

name: Python 3.12.x
image: dhi.io/python
variant: runtime
tags:
  - "3.12"
  - 3.12.13
  - 3.12-debian
  - 3.12-debian13
  - 3.12.13-debian
  - 3.12.13-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2023-10-02"
  end-of-life: "2028-10-31"
vars:
  PIP_VERSION: 26.1.2-4
  PYTHON_MAJOR_MINOR_VERSION: "3.12"
  PYTHON_MAJOR_VERSION: "3"
  PYTHON_VERSION: 3.12.13
  SETUPTOOLS_VERSION: 83.0.0-0
  VERSION: 3.12.13-11
  WHEEL_VERSION: 0.47.0-3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates
    - libbz2-1.0
    - libc6
    - libc6-dev
    - libcrypt1
    - libdb5.3t64
    - libexpat1-dev
    - libffi8
    - libgcc-s1
    - libgdbm-compat4t64
    - liblzma5
    - libncursesw6
    - libpython-3.12
    - libpython-3.12-dev
    - libpython-3.12-dev=3.12.13-11
    - libpython-3.12-minimal
    - libpython-3.12-minimal=3.12.13-11
    - libpython-3.12-stdlib
    - libpython-3.12-stdlib=3.12.13-11
    - libpython-3.12=3.12.13-11
    - libreadline8t64
    - libsqlite3-0
    - libstdc++6
    - libtinfo6
    - libuuid1
    - libzstd1
    - ncurses-base
    - ncurses-bin
    - netbase
    - python-3.12
    - python-3.12-dev
    - python-3.12-dev=3.12.13-11
    - python-3.12-minimal
    - python-3.12-minimal=3.12.13-11
    - python-3.12=3.12.13-11
    - python3-pip
    - python3-pip-whl
    - python3-pip-whl=26.1.2-4
    - python3-pip=26.1.2-4
    - python3-setuptools
    - python3-setuptools-whl
    - python3-setuptools-whl=83.0.0-0
    - python3-setuptools=83.0.0-0
    - python3-wheel
    - python3-wheel-whl
    - python3-wheel-whl=0.47.0-3
    - python3-wheel=0.47.0-3
    - tzdata
    - zlib1g
    - zlib1g-dev
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  PYTHON_VERSION: 3.12.13
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
annotations:
  org.opencontainers.image.description: A minimal Python image
  org.opencontainers.image.licenses: PSF-2.0
cmd:
  - python3
