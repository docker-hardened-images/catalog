# syntax=dhi.io/build:2-debian13

name: Python 3.12.x
image: dhi.io/python
variant: runtime
tags:
  - "3.12"
  - 3.12.13
  - 3.12-debian
  - 3.12-debian13
  - 3.12.13-debian
  - 3.12.13-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2023-10-02"
  end-of-life: "2028-10-31"
vars:
  PYTHON_MAJOR_MINOR_VERSION: "3.12"
  PYTHON_MAJOR_VERSION: "3"
  PYTHON_VERSION: 3.12.13
  VERSION: 3.12.13-3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gnupg2'
    - '!gpg'
    - '!gpgconf'
    - '!libassuan'
    - '!libassuan9'
    - '!libcom-err2'
    - '!libexpat1'
    - '!libksba'
    - '!libksba8'
    - '!libmpfr6'
    - '!libnpth0t64'
    - '!libnsl'
    - '!libnsl2'
    - '!libsigseg'
    - '!libsigsegv2'
    - '!libtirpc'
    - '!libtirpc-common'
    - '!libtirpc3t64'
    - '!mpfr4'
    - '!usrmerge'
    - base-files
    - ca-certificates
    - libbz2-1.0
    - libcrypt1
    - libdb5.3t64
    - libffi8
    - libgcrypt20
    - libgdbm-compat4t64
    - libgdbm6t64
    - libgpg-error0
    - liblzma5
    - libncursesw6
    - libpython-3.12-minimal=3.12.13-3
    - libpython-3.12-stdlib=3.12.13-3
    - libreadline8t64
    - libsqlite3-0
    - libssl3t64
    - libtinfo6
    - libuuid1
    - netbase
    - python-3.12-minimal=3.12.13-3
    - python-3.12=3.12.13-3
    - tzdata
    - zlib1g
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  PYTHON_VERSION: 3.12.13
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
annotations:
  org.opencontainers.image.description: A minimal Python image
  org.opencontainers.image.licenses: PSF-2.0
cmd:
  - python3
