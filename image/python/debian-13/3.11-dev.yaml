# syntax=dhi.io/build:2-debian13

name: Python 3.11.x (dev)
image: dhi.io/python
variant: dev
tags:
  - 3.11-dev
  - 3.11.15-dev
  - 3.11-debian-dev
  - 3.11-debian13-dev
  - 3.11.15-debian-dev
  - 3.11.15-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2022-10-24"
  end-of-life: "2027-10-31"
vars:
  PIP_VERSION: 26.1.2dhi0
  PYTHON_MAJOR_MINOR_VERSION: "3.11"
  PYTHON_MAJOR_VERSION: "3"
  PYTHON_VERSION: 3.11.15
  VERSION: 3.11.15-3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!gnupg2'
    - '!gpg'
    - '!gpgconf'
    - '!libassuan'
    - '!libassuan9'
    - '!libcom-err2'
    - '!libelogind0'
    - '!libexpat1'
    - '!libksba'
    - '!libksba8'
    - '!libmpfr6'
    - '!libnpth0t64'
    - '!libnsl'
    - '!libnsl2'
    - '!libsigseg'
    - '!libsigsegv2'
    - '!libtirpc'
    - '!libtirpc-common'
    - '!libtirpc3t64'
    - '!mpfr4'
    - '!original-awk'
    - '!usrmerge'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libbz2-1.0
    - libc-bin
    - libcrypt1
    - libdb5.3t64
    - libffi8
    - libgcrypt20
    - libgdbm-compat4t64
    - libgdbm6t64
    - libgpg-error0
    - liblzma5
    - libncursesw6
    - libpython-3.11-minimal=3.11.15-3
    - libpython-3.11-stdlib=3.11.15-3
    - libreadline8t64
    - libsqlite3-0
    - libssl3t64
    - libtinfo6
    - libuuid1
    - mawk
    - netbase
    - perl-base
    - python-3.11-minimal=3.11.15-3
    - python-3.11=3.11.15-3
    - python3-pip=26.1.2dhi0
    - sed
    - tzdata
    - util-linux
    - zlib1g
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  PYTHON_VERSION: 3.11.15
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
paths:
  - type: file
    path: /usr/lib/python3.11/site-packages/dhi-dist-packages.pth
    content: |
      /usr/lib/python3/dist-packages
    uid: 0
    gid: 0
    mode: "0644"
annotations:
  org.opencontainers.image.description: A minimal Python image
  org.opencontainers.image.licenses: PSF-2.0
cmd:
  - python3
