# syntax=dhi.io/build:2-alpine3.23

name: Python 3.13.x / Socket Firewall (sfw, dev)
image: dhi.io/python
variant: dev
flavor: sfw
tags:
  - 3.13-alpine3.23-sfw-dev
  - 3.13.13-alpine3.23-sfw-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2024-10-07"
  end-of-life: "2029-10-31"
vars:
  PYTHON_MAJOR_MINOR_VERSION: "3.13"
  PYTHON_MAJOR_VERSION: "3"
  PYTHON_PIP_VERSION: 26.0.1-r1
  PYTHON_SETUPTOOLS_VERSION: 82.0.1-r1
  PYTHON_VERSION: 3.13.13
  SFW_VERSION: 1.8.0-r1
  VERSION: 3.13.13-r4
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - apk-tools
    - busybox
    - bzip2
    - ca-certificates
    - ca-certificates-bundle
    - expat
    - gcc
    - gdbm
    - libffi
    - libffi-dev
    - libgcc
    - libstdc++
    - mpdecimal
    - musl
    - musl-dev
    - ncurses
    - openssl
    - py3.13-pip=26.0.1-r1
    - py3.13-setuptools=82.0.1-r1
    - python-3.13=3.13.13-r4
    - readline
    - sfw-free-oci-config=1.8.0-r1
    - sfw-free-pip=1.8.0-r1
    - sfw-free=1.8.0-r1
    - sqlite-libs
    - tzdata
    - zlib
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  PYTHON_VERSION: 3.13.13
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
annotations:
  org.opencontainers.image.description: A minimal Python image
  org.opencontainers.image.licenses: PSF-2.0
cmd:
  - python3
