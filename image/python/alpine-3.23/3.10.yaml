# syntax=dhi.io/build:2-alpine3.23

name: Python 3.10.x
image: dhi.io/python
variant: runtime
tags:
  - 3.10-alpine3.23
  - 3.10.20-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2021-10-04"
  end-of-life: "2026-10-31"
vars:
  PYTHON_MAJOR_MINOR_VERSION: "3.10"
  PYTHON_MAJOR_VERSION: "3"
  PYTHON_PIP_VERSION: 26.0.1-r1
  PYTHON_SETUPTOOLS_VERSION: 82.0.1-r1
  PYTHON_VERSION: 3.10.20
  VERSION: 3.10.20-r4
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - bzip2
    - ca-certificates-bundle
    - expat
    - gdbm
    - libffi
    - mpdecimal
    - musl
    - ncurses
    - openssl
    - python-3.10=3.10.20-r4
    - readline
    - sqlite-libs
    - tzdata
    - zlib
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  PYTHON_VERSION: 3.10.20
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
annotations:
  org.opencontainers.image.description: A minimal Python image
  org.opencontainers.image.licenses: PSF-2.0
cmd:
  - python3
