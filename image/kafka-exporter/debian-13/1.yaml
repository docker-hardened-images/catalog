# syntax=dhi.io/build:2-debian13

name: kafka-exporter 1.9.x
image: dhi.io/kafka-exporter
variant: runtime
tags:
  - "1"
  - "1.9"
  - 1.9.0
  - 1-debian
  - 1-debian13
  - 1.9-debian
  - 1.9-debian13
  - 1.9.0-debian
  - 1.9.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 8ec24078707d4d3b349e71522ebd7f179746072d
  SEMVER_MAJOR_MINOR_VERSION: "1.9"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.9.0
  VERSION: 1.9.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: kafka-exporter
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/danielqsj/kafka_exporter.git#v1.9.0
            checksum: 8ec24078707d4d3b349e71522ebd7f179746072d
            path: /go/src/github.com/danielqsj/kafka_exporter
            spdx:
              name: kafka-exporter
              version: 1.9.0
              packages:
                - name: kafka-exporter
                  purl: pkg:dhi/kafka-exporter@1.9.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/danielqsj/kafka_exporter
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.56.0
              - golang.org/x/text@v0.39.0
            download: true
        - name: test
          work-dir: /go/src/github.com/danielqsj/kafka_exporter
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/danielqsj/kafka_exporter
          with:
            ldflags:
              - -X github.com/prometheus/common/version.Version=1.9.0
              - -X github.com/prometheus/common/version.Revision=8ec24078707d4d3b349e71522ebd7f179746072d-modified
              - -X main.version=1.9.0
              - -X main.commit=8ec24078707d4d3b349e71522ebd7f179746072d
              - -X main.buildDate=$(date -d @${SOURCE_DATE_EPOCH} +'%F-%T')
            output: ${target.dir}/usr/local/bin/kafka-exporter
            packages: .
            tags:
              - netgo
      outputs:
        - source: ${target.dir}/usr/local/bin/kafka-exporter
          target: /usr/local/bin/kafka-exporter
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/kafka-exporter
          target: /opt/docker/sbom/kafka-exporter
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
