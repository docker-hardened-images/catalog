metadata:
  display-name: Jupyter Data Science Notebook
  short-description: A minimal Jupyter Notebook image with Python, R, and Julia for multi-language data science workflows.
  featured: false
  home-url: https://jupyter.org/
  categories:
    - data-science
  included-tools:
    - name: jupyter
      description: JupyterLab and Notebook frontends for interactive computing
    - name: python
      description: Python 3.13 with the scipy scientific computing stack (pandas, numpy, scikit-learn, matplotlib, ...)
    - name: R
      description: R with tidyverse, caret, tidymodels, IRkernel for Jupyter, and rpy2 for Python-R interop
    - name: julia
      description: Julia 1.12 with IJulia, HDF5, and Pluto packages preinstalled
