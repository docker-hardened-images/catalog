# syntax=dhi.io/build:2-debian13

name: Kyverno 1.x (dev)
image: dhi.io/kyverno
variant: dev
tags:
  - 1.16-dev
  - 1.16.4-dev
  - 1.16-debian-dev
  - 1.16-debian13-dev
  - 1.16.4-debian-dev
  - 1.16.4-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-11-10"
vars:
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "1.16"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.16.4
  SUFFIX: -dev
  VERSION: 1.16.4-15
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - kyverno-1.16-dev=1.16.4-15
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Kyverno image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/kyverno
ports:
  - 9443/tcp
  - 443/tcp
