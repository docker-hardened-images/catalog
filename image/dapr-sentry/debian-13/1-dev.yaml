# syntax=dhi.io/build:2-debian13

name: Dapr Sentry 1.x (dev)
image: dhi.io/dapr-sentry
variant: dev
tags:
  - 1-dev
  - 1.18-dev
  - 1.18.0-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.18-debian-dev
  - 1.18-debian13-dev
  - 1.18.0-debian-dev
  - 1.18.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-16"
vars:
  COMMIT_SHA: 7c4f540efa3e6f768a45010f2fc0d4b4c287cac3
  SEMVER_MAJOR_MINOR_VERSION: "1.18"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.18.0
  VERSION: 1.18.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: dapr-sentry
      work-dir: /go/src/github.com/dapr/dapr
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/dapr/dapr.git#v1.18.0
            checksum: 7c4f540efa3e6f768a45010f2fc0d4b4c287cac3
            path: /go/src/github.com/dapr/dapr
            spdx:
              name: dapr-sentry
              version: 1.18.0
              packages:
                - name: dapr-sentry
                  purl: pkg:golang/github.com/dapr/dapr@1.18.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
            download: true
        - name: test go dependencies
          runs: |
            set -eux -o pipefail

            # Build system injects OTEL_EXPORTER_OTLP_TRACES_* vars which take priority
            # over OTEL_EXPORTER_OTLP_* and break unit tests that set the latter
            unset OTEL_EXPORTER_OTLP_TRACES_ENDPOINT || true
            unset OTEL_EXPORTER_OTLP_TRACES_PROTOCOL || true

            # Build containers have no outbound network or non-loopback interfaces;
            # provide a fallback so GetHostAddress() doesn't fail
            export DAPR_HOST_IP="${DAPR_HOST_IP:-127.0.0.1}"

            # Pre-download all dependencies to avoid network errors during test execution
            go mod download

            # CGO_ENABLED=0: build container has no linker (binutils not installed)
            # -tags unit: required to compile unit test helpers
            # Exclude tests/: those are integration/e2e tests, not unit tests.
            # Also exclude the dnslookup package because upstream added an
            # integration-style reconnect test there that depends on mixed
            # IPv4/IPv6 loopback behavior and is flaky in the DHI build sandbox.
            CGO_ENABLED=0 go test -tags unit \
              $(go list -tags unit ./... \
                | grep -v 'github.com/dapr/dapr/tests/' \
                | grep -v 'github.com/dapr/dapr/pkg/actors/internal/placement/connector/dnslookup$')
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/dapr/dapr/pkg/buildinfo.gitcommit=7c4f540efa3e6f768a45010f2fc0d4b4c287cac3
              - -X github.com/dapr/dapr/pkg/buildinfo.gitversion=1.18.0
              - -X github.com/dapr/dapr/pkg/buildinfo.version=1.18.0
            output: ${target.dir}/usr/local/bin/sentry
            packages: ./cmd/sentry
      outputs:
        - source: ${target.dir}/usr/local/bin/sentry
          target: /usr/local/bin/sentry
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/dapr-sentry
          target: /opt/docker/sbom/dapr-sentry
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /sentry
    uid: 0
    gid: 0
    source: /usr/local/bin/sentry
annotations:
  org.opencontainers.image.description: A minimal Dapr Sentry certificate authority image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/sentry
ports:
  - "50001"
  - "8080"
  - "9080"
