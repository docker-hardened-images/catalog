# syntax=dhi.io/build:2-alpine3.23

name: Kube Webhook Certgen 1.x (dev)
image: dhi.io/kube-webhook-certgen
variant: dev
tags:
  - 1-alpine3.23-dev
  - 1.8-alpine3.23-dev
  - 1.8.2-alpine3.23-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "1.8"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.8.2
  SUFFIX: -dev
  VERSION: 1.8.2-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - apk-tools
    - busybox
    - ca-certificates
    - ca-certificates-bundle
    - kube-webhook-certgen-dev
    - tzdata
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /kube-webhook-certgen
    uid: 0
    gid: 0
    source: /usr/bin/kube-webhook-certgen
annotations:
  org.opencontainers.image.description: A minimal Kubernetes webhook certificate generator and patcher
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - kube-webhook-certgen
