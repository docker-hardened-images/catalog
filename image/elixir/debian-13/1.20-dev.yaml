# syntax=dhi.io/build:2-debian13

name: Elixir 1.20.x (dev)
image: dhi.io/elixir
variant: dev
tags:
  - 1-dev
  - 1.20-dev
  - 1.20.2-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.20-debian-dev
  - 1.20-debian13-dev
  - 1.20.2-debian-dev
  - 1.20.2-debian13-dev
platforms:
  - linux/amd64
dates:
  release: "2026-06-03"
vars:
  ERLANG_OTP_REFERENCE: dhi/erlang-otp:28.5-debian13@sha256:770cf2ea7a28a78812e6c18031092403a26b34f3794825fd4c269f91b71d1b1e
  PACKAGE_NAME: elixir-1.20
  SEMVER_MAJOR_MINOR_VERSION: "1.20"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.20.2
  VERSION: 1.20.2-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - elixir-1.20=1.20.2-1
    - findutils
    - gawk
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/erlang-otp:28.5-debian13@sha256:770cf2ea7a28a78812e6c18031092403a26b34f3794825fd4c269f91b71d1b1e
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - usr/lib/ssl/certs
        - usr/lib/ssl/private
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  ELIXIR_ERL_OPTIONS: +fnu
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
annotations:
  org.opencontainers.image.description: A minimal Elixir image
  org.opencontainers.image.licenses: Apache-2.0
cmd:
  - iex
  - /bin/bash
