  builds:
    - name: elixir
      uses: dhi.io/erlang-otp:28.5-debian13-dev@sha256:8966962a840d21b810f126745af240640debab50a97f72372e25d38603f40066
      work-dir: /usr/src/elixir
      contents:
        packages:
          - bash
          - coreutils
          - findutils
          - grep
          - make
          - sed
        files:
          - url: git+https://github.com/elixir-lang/elixir.git#v1.19.5
            checksum: d33fd8e413fe98e0e54dde7ef94fadb272b1ef67
            path: /usr/src/elixir
            spdx:
              name: elixir
              version: 1.19.5
              packages:
                - name: elixir
                  purl: pkg:github/elixir-lang/elixir@v1.19.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build and install
          runs: |
            set -eux -o pipefail

            export ERL_COMPILER_OPTIONS=deterministic
            make -j"$(nproc)"
            make install DESTDIR=${target.dir} PREFIX=/usr/local
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/lib/elixir
          target: /usr/local/lib/elixir
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/elixir
          target: /opt/docker/sbom/elixir
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
