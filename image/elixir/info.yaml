metadata:
  display-name: Elixir
  short-description: Elixir is a dynamic, functional language built on the Erlang VM (BEAM) for building scalable, fault-tolerant applications.
  featured: false
  home-url: https://elixir-lang.org/
  categories:
    - languages-and-frameworks
  included-tools:
    - name: elixir
      description: Runs Elixir scripts and compiled .beam files
    - name: elixirc
      description: Elixir compiler for compiling source files to BEAM bytecode
    - name: iex
      description: Interactive Elixir shell (REPL) for running and evaluating Elixir code
    - name: mix
      description: Elixir build tool for creating, compiling, testing, and managing projects and dependencies
