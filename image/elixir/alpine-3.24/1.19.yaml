# syntax=dhi.io/build:2-alpine3.24

name: Elixir 1.19.x
image: dhi.io/elixir
variant: runtime
tags:
  - 1.19-alpine
  - 1.19.5-alpine
  - 1.19-alpine3.24
  - 1.19.5-alpine3.24
platforms:
  - linux/amd64
dates:
  release: "2025-10-16"
vars:
  ERLANG_PACKAGE: erlang28
  ERLANG_VERSION: 28.5.0.3-r2
  PACKAGE_NAME: elixir-1.19
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.19.5
  VERSION: 1.19.5-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - elixir-1.19=1.19.5-r0
    - erlang28=28.5.0.3-r2
    - gawk
    - grep
    - sed
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
