# syntax=dhi.io/build:2-debian13

name: Cilium Certgen 0.x
image: dhi.io/cilium-certgen
variant: runtime
tags:
  - "0"
  - "0.4"
  - 0.4.5
  - 0-debian
  - 0-debian13
  - 0.4-debian
  - 0.4-debian13
  - 0.4.5-debian
  - 0.4.5-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: b5c0ff1d377fae0bef923ff45ee66a8e17aec8e7
  SEMVER_MAJOR_MINOR_VERSION: "0.4"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.4.5
  VERSION: 0.4.5
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: cilium-certgen
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/cilium/certgen.git#v0.4.5
            checksum: b5c0ff1d377fae0bef923ff45ee66a8e17aec8e7
            path: /go/src/github.com/cilium/certgen
            spdx:
              name: cilium-certgen
              version: 0.4.5
              packages:
                - name: certgen
                  purl: pkg:golang/github.com/cilium/certgen@0.4.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/cilium/certgen
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          work-dir: /go/src/github.com/cilium/certgen
          privileged: true
          runs: |
            set -eux -o pipefail

            go test ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/cilium/certgen
          with:
            output: ${target.dir}/usr/local/bin/cilium-certgen
      outputs:
        - source: ${target.dir}/usr/local/bin/cilium-certgen
          target: /usr/local/bin/cilium-certgen
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/cilium-certgen
          target: /opt/docker/sbom/cilium-certgen
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Cilium Certgen image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/cilium-certgen
