# syntax=dhi.io/build:2-alpine3.23

name: Prometheus Pushgateway 1.x
image: dhi.io/pushgateway
variant: runtime
tags:
  - 1-alpine
  - 1.11-alpine
  - 1-alpine3.23
  - 1.11.3-alpine
  - 1.11-alpine3.23
  - 1.11.3-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "1.11"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.11.3
  SUFFIX: ""
  VERSION: 1.11.3-r1
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - ca-certificates-bundle
    - pushgateway
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
  - type: symlink
    path: /usr/local/bin/pushgateway
    uid: 0
    gid: 0
    source: /usr/bin/pushgateway
annotations:
  org.opencontainers.image.description: A minimal Prometheus Pushgateway image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - pushgateway
