# syntax=dhi.io/build:2-alpine3.24

name: Knative Serving Controller 1.22.x
image: dhi.io/knative-controller
variant: runtime
tags:
  - 1-alpine
  - 1.22-alpine
  - 1-alpine3.24
  - 1.22.1-alpine
  - 1.22-alpine3.24
  - 1.22.1-alpine3.24
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-28"
  end-of-life: "2026-11-03"
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "1.22"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.22.1
  SUFFIX: ""
  VERSION: 1.22.1-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - ca-certificates-bundle
    - controller-1.22=1.22.1-r0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
