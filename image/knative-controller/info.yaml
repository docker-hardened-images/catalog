metadata:
  display-name: Knative Serving Controller
  short-description: |
    Reconciles Knative Serving resources into running Kubernetes workloads.

    The controller is a control-plane component of Knative Serving. It watches
    Services, Configurations, Routes, and Revisions and reconciles them into the
    underlying Deployments, autoscaling resources, and networking objects that
    run and route serverless workloads.
  featured: false
  home-url: https://knative.dev/docs/serving/
  categories:
    - networking
