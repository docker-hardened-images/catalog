  GO_REFERENCE: dhi/golang:1.25.8-debian13-dev@sha256:cebfb9f36d5446cbbde91df615209668fe656e6276f5a7a0b3472bf102fba3c3
  SEMVER_MAJOR_MINOR_VERSION: "1.5"
  SEMVER_MAJOR_VERSION: "1"
