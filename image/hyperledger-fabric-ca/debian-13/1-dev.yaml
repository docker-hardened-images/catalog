    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: hyperledger-fabric-ca
      uses: dhi.io/golang:1.25.8-debian13-dev@sha256:cebfb9f36d5446cbbde91df615209668fe656e6276f5a7a0b3472bf102fba3c3
      contents:
        packages:
          - build-essential
          - curl
          - gcc
          - git
          - grep
          - gzip
          - make
        files:
          - url: git+https://github.com/hyperledger/fabric-ca.git#v1.5.18
            checksum: 6751d60c977d721cdb5458257d6a3a56853b40c1
            path: /go/src/github.com/hyperledger/fabric-ca
            spdx:
              name: fabric-ca
              version: 1.5.18
              packages:
                - name: fabric-ca
                  purl: pkg:golang/github.com/hyperledger/fabric-ca@1.5.18
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/hyperledger/fabric-ca
          with:
            deps: []
            download: true
        - name: go test
          work-dir: /go/src/github.com/hyperledger/fabric-ca
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG='fips140=on'
            fi

            CGO_ENABLED=1 go test \
              -timeout 15m -p 1 \
              ./cmd/fabric-ca-server/... ./cmd/fabric-ca-client/...

            CGO_ENABLED=1 go test \
              -timeout 15m -p 1 \
              -tags pkcs11 \
              ./cmd/fabric-ca-server/... ./cmd/fabric-ca-client/...
        - name: go build server
          uses: go/build@v1
          work-dir: /go/src/github.com/hyperledger/fabric-ca
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -X github.com/hyperledger/fabric-ca/lib/metadata.Version=1.5.18
              - -linkmode external
              - -extldflags -lpthread
            output: ${target.dir}/usr/local/bin/fabric-ca-server
            packages: ./cmd/fabric-ca-server
            tags:
              - pkcs11
        - name: go build client
          uses: go/build@v1
          work-dir: /go/src/github.com/hyperledger/fabric-ca
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -X github.com/hyperledger/fabric-ca/lib/metadata.Version=1.5.18
              - -linkmode external
              - -extldflags -lpthread
            output: ${target.dir}/usr/local/bin/fabric-ca-client
            packages: ./cmd/fabric-ca-client
            tags:
              - pkcs11
              - caclient
      outputs:
        - source: ${target.dir}/usr/local/bin/fabric-ca-server
          target: /usr/local/bin/fabric-ca-server
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/fabric-ca-client
          target: /usr/local/bin/fabric-ca-client
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fabric-ca
          target: /opt/docker/sbom/fabric-ca
          uid: 0
          gid: 0
  artifacts:
