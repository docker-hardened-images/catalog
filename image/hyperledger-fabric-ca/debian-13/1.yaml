# syntax=dhi.io/build:2-debian13

name: Hyperledger Fabric CA 1.5.x
image: dhi.io/hyperledger-fabric-ca
variant: runtime
tags:
  - "1"
  - "1.5"
  - 1.5.21
  - 1-debian
  - 1-debian13
  - 1.5-debian
  - 1.5-debian13
  - 1.5.21-debian
  - 1.5.21-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-06"
vars:
  COMMIT_SHA: f355456a72323ae2a4a250fdecb8744a8c041150
  SEMVER_MAJOR_MINOR_VERSION: "1.5"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.5.21
  VERSION: 1.5.21
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates
    - ca-certificates-bundle
    - libc6
    - tzdata
  builds:
    - name: hyperledger-fabric-ca
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - build-essential
          - curl
          - gcc
          - git
          - grep
          - gzip
          - make
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/hyperledger/fabric-ca.git#v1.5.21
            checksum: f355456a72323ae2a4a250fdecb8744a8c041150
            path: /go/src/github.com/hyperledger/fabric-ca
            spdx:
              name: fabric-ca
              version: 1.5.21
              packages:
                - name: fabric-ca
                  purl: pkg:golang/github.com/hyperledger/fabric-ca@1.5.21
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/hyperledger/fabric-ca
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: go test
          work-dir: /go/src/github.com/hyperledger/fabric-ca
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=1 go test \
              -timeout 15m -p 1 \
              ./cmd/fabric-ca-server/... ./cmd/fabric-ca-client/...

            CGO_ENABLED=1 go test \
              -timeout 15m -p 1 \
              -tags pkcs11 \
              ./cmd/fabric-ca-server/... ./cmd/fabric-ca-client/...
        - name: go build server
          uses: go/build@v1
          work-dir: /go/src/github.com/hyperledger/fabric-ca
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -X github.com/hyperledger/fabric-ca/lib/metadata.Version=1.5.21
              - -linkmode external
              - -extldflags -lpthread
            output: ${target.dir}/usr/local/bin/fabric-ca-server
            packages: ./cmd/fabric-ca-server
            tags:
              - pkcs11
        - name: go build client
          uses: go/build@v1
          work-dir: /go/src/github.com/hyperledger/fabric-ca
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -X github.com/hyperledger/fabric-ca/lib/metadata.Version=1.5.21
              - -linkmode external
              - -extldflags -lpthread
            output: ${target.dir}/usr/local/bin/fabric-ca-client
            packages: ./cmd/fabric-ca-client
            tags:
              - pkcs11
              - caclient
      outputs:
        - source: ${target.dir}/usr/local/bin/fabric-ca-server
          target: /usr/local/bin/fabric-ca-server
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/fabric-ca-client
          target: /usr/local/bin/fabric-ca-client
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fabric-ca
          target: /opt/docker/sbom/fabric-ca
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  FABRIC_CA_HOME: /etc/hyperledger/fabric-ca-server
paths:
  - type: directory
    path: /etc/hyperledger/fabric-ca-server
    uid: 65532
    gid: 65532
    mode: "0744"
annotations:
  org.opencontainers.image.description: A minimal Hyperledger Fabric CA image
  org.opencontainers.image.licenses: Apache-2.0
cmd:
  - fabric-ca-server
  - version
ports:
  - 7054/tcp
