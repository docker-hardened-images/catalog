# syntax=dhi.io/build:2-debian13

name: csi-addons-k8s-sidecar 0.14.x (dev)
image: dhi.io/csi-addons-k8s-sidecar
variant: dev
tags:
  - 0-dev
  - 0.14-dev
  - 0.14.0-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.14-debian-dev
  - 0.14-debian13-dev
  - 0.14.0-debian-dev
  - 0.14.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2022-01-13"
vars:
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "0.14"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.14.0
  SUFFIX: -dev
  VERSION: 0.14.0-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - csi-addons-dev=0.14.0-1
    - csi-addons-sidecar-dev=0.14.0-1
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /usr/sbin/csi-addons-sidecar
    uid: 0
    gid: 0
    source: /usr/bin/csi-addons-sidecar
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
  - type: symlink
    path: /usr/local/bin/csi-addons-sidecar
    uid: 0
    gid: 0
    source: /usr/bin/csi-addons-sidecar
  - type: symlink
    path: /usr/local/bin/csi-addons
    uid: 0
    gid: 0
    source: /usr/bin/csi-addons
annotations:
  org.opencontainers.image.description: A minimal CSI-Addons sidecar image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/sbin/csi-addons-sidecar
