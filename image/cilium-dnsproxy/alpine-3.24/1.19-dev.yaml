    path: /usr/local/bin/standalone-dns-proxy
    uid: 0
    gid: 0
    source: /usr/bin/standalone-dns-proxy
annotations:
  org.opencontainers.image.description: A minimal Cilium DNS Proxy image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/standalone-dns-proxy
ports:
  - 10095/tcp
