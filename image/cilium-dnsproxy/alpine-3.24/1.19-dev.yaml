# syntax=dhi.io/build:2-alpine3.24

name: Cilium DNS Proxy 1.19.x (dev)
image: dhi.io/cilium-dnsproxy
variant: dev
tags:
  - 1-alpine-dev
  - 1.19-alpine-dev
  - 1-alpine3.24-dev
  - 1.19.6-alpine-dev
  - 1.19-alpine3.24-dev
  - 1.19.6-alpine3.24-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-03"
vars:
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.19.6
  SUFFIX: -dev
  VERSION: 1.19.6-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - apk-tools
    - bash
    - busybox
    - ca-certificates
    - ca-certificates-bundle
    - cilium-dnsproxy-dev
    - coreutils
    - findutils
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
