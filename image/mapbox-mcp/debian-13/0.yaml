# syntax=dhi.io/build:2-debian13

name: Mapbox MCP Server 0.12.x
image: dhi.io/mapbox-mcp
variant: runtime
tags:
  - "0"
  - "0.12"
  - 0.12.7
  - 0-debian
  - 0-debian13
  - 0.12-debian
  - 0.12-debian13
  - 0.12.7-debian
  - 0.12.7-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-15"
vars:
  COMMIT_SHA: 9aeac5deaa06eef59d932a7a1896ab2b8aed5613
  SEMVER_MAJOR_MINOR_VERSION: "0.12"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.12.7
  VERSION: 0.12.7
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - libc6
    - libgomp1
    - libstdc++6
    - netbase
    - nodejs-24
    - tzdata
  builds:
    - name: mapbox-mcp
      work-dir: ${source.dir}/mapbox-mcp
      caches:
        - path: /root/.npm
      contents:
        packages:
          - base-files
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - git
          - libc6
          - libstdc++6
          - mawk
          - nodejs-24
          - node-corepack
          - npm
          - sed
          - yarn-classic
        files:
          - url: git+https://github.com/mapbox/mcp-server.git#v0.12.7
            checksum: 9aeac5deaa06eef59d932a7a1896ab2b8aed5613
            path: ${source.dir}/mapbox-mcp
            spdx:
              name: mapbox-mcp
              version: 0.12.7
              packages:
                - name: mapbox-mcp
                  purl: pkg:npm/%40mapbox/mcp-server@0.12.7
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: bump dependencies
          uses: npm/bump@v1
          privileged: true
          environment:
            DHI_NO_SFW: "true"
          with:
            bumps: ${source.dir}/patch/npm-bump.json
            npm-root: ${source.dir}/mapbox-mcp
        - name: install and build
          privileged: true
          runs: |
            set -eux -o pipefail

            npm pkg set \
              "overrides.protobufjs@7"="7.6.3" \
              "overrides.protobufjs@8"="8.6.0"
            npm install --package-lock-only --ignore-scripts

            npm ci --ignore-scripts

            ./node_modules/.bin/tshy

            rm -rf node_modules
            npm ci --omit=dev --ignore-scripts
            ./node_modules/.bin/patch-package
      paths:
        - type: file
          path: ${source.dir}/patch/npm-bump.json
          uid: 0
          gid: 0
          source: image/mapbox-mcp/patch/npm-bump.json
      outputs:
        - source: ${source.dir}/mapbox-mcp/node_modules
          target: /app/node_modules
          uid: 0
          gid: 0
        - source: ${source.dir}/mapbox-mcp/dist
          target: /app/dist
          uid: 0
          gid: 0
        - source: ${source.dir}/mapbox-mcp/package.json
          target: /app/package.json
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/mapbox-mcp
          target: /opt/docker/sbom/mapbox-mcp
          uid: 0
          gid: 0
    - name: server.json
      contents:
        packages:
          - bash
          - sed
      pipeline:
        - runs: |
            set -eux -o pipefail

            sed -i "s/_VERSION_/0.12.7/g" "${source.dir}/config/server.json"
      paths:
        - type: file
          path: ${source.dir}/config/server.json
          uid: 0
          gid: 0
          source: image/mapbox-mcp/config/server.json
      attestations:
        - predicate-type: https://modelcontextprotocol.io/server.json/v1
          source: ${source.dir}/config/server.json
accounts:
  run-as: node
  users:
    - name: node
      uid: 1000
      gid: 1000
  groups:
    - name: node
      gid: 1000
      members:
        - node
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  MAPBOX_ACCESS_TOKEN: ""
annotations:
  org.opencontainers.image.description: Mapbox MCP Server - Model Context Protocol server for Mapbox geospatial APIs
  org.opencontainers.image.licenses: MIT
labels:
  io.modelcontextprotocol.server.name: io.github.mapbox/mcp-server
entrypoint:
  - node
  - /app/dist/esm/index.js
