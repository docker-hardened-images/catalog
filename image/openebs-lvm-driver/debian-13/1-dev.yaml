# syntax=dhi.io/build:2-debian13

name: openebs-lvm-driver 1.x (dev)
image: dhi.io/openebs-lvm-driver
variant: dev
tags:
  - 1-dev
  - 1.9-dev
  - 1.9.1-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.9-debian-dev
  - 1.9-debian13-dev
  - 1.9.1-debian-dev
  - 1.9.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 66b59b997db7dd428f9b6fc874c21e87755e0caa
  SEMVER_MAJOR_MINOR_VERSION: "1.9"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.9.1
  VERSION: 1.9.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - btrfs-progs
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - curl
    - diffutils
    - dpkg
    - e2fsprogs
    - findutils
    - grep
    - libc-bin
    - libncursesw6
    - libtinfo6
    - lvm2
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
    - xfsprogs
  builds:
    - name: openebs-lvm-driver
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/openebs/lvm-localpv.git#v1.9.1
            checksum: 66b59b997db7dd428f9b6fc874c21e87755e0caa
            path: /go/src/github.com/openebs/lvm-localpv
            spdx:
              name: openebs-lvm-driver
              version: 1.9.1
              packages:
                - name: openebs-lvm-driver
                  purl: pkg:golang/github.com/openebs/lvm-localpv@1.9.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/openebs/lvm-localpv
          with:
            deps:
              - golang.org/x/net@v0.45.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: test
          work-dir: /go/src/github.com/openebs/lvm-localpv
          privileged: true
          runs: |
            set -eux -o pipefail

            # Run unit tests in pkg/ directory (skip integration tests in tests/)
            go test ./pkg/...
        - name: build lvm-driver
          uses: go/build@v1
          work-dir: /go/src/github.com/openebs/lvm-localpv
          with:
            ldflags:
              - -X github.com/openebs/lvm-localpv/pkg/version.GitCommit=66b59b997db7dd428f9b6fc874c21e87755e0caa
              - -X github.com/openebs/lvm-localpv/pkg/version.Version=1.9.1
            output: ${target.dir}/usr/local/bin/lvm-driver
            packages: ./cmd
      outputs:
        - source: ${target.dir}/usr/local/bin/lvm-driver
          target: /usr/local/bin/lvm-driver
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/openebs-lvm-driver
          target: /opt/docker/sbom/openebs-lvm-driver
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal OpenEBS LVM LocalPV Driver image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/lvm-driver
ports:
  - 7676/tcp
