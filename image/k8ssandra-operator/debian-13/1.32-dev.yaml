  SEMVER_MAJOR_MINOR_VERSION: "1.32"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.32.4
  VERSION: 1.32.4
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: k8ssandra-operator
      work-dir: /go/src/github.com/k8ssandra/k8ssandra-operator
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates
          - git
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/k8ssandra/k8ssandra-operator.git#v1.32.4
            checksum: d913f2050e278129a1c626a4660932e67e43a7c4
            path: /go/src/github.com/k8ssandra/k8ssandra-operator
            spdx:
              name: k8ssandra-operator
              version: 1.32.4
              packages:
                - name: k8ssandra-operator
                  purl: pkg:golang/github.com/k8ssandra/k8ssandra-operator@1.32.4
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/k8ssandra/k8ssandra-operator
          with:
            deps:
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: test after bump
          work-dir: /go/src/github.com/k8ssandra/k8ssandra-operator
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -count=1 ./pkg/...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/k8ssandra/k8ssandra-operator
          with:
            output: ${target.dir}/manager
      outputs:
        - source: ${target.dir}/manager
          target: /manager
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/k8ssandra-operator
          target: /opt/docker/sbom/k8ssandra-operator
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
