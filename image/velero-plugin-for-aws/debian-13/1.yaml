# syntax=dhi.io/build:2-debian13

name: Velero Plugin for AWS 1.x
image: dhi.io/velero-plugin-for-aws
variant: runtime
tags:
  - "1"
  - "1.14"
  - 1.14.1
  - 1-debian
  - 1-debian13
  - 1.14-debian
  - 1.14-debian13
  - 1.14.1-debian
  - 1.14.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 96a651c432ccee177ad2f0d416a74c3bd62a4f59
  SEMVER_MAJOR_MINOR_VERSION: "1.14"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.14.1
  VERSION: 1.14.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: velero-plugin-for-aws
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/vmware-tanzu/velero-plugin-for-aws.git#v1.14.1
            checksum: 96a651c432ccee177ad2f0d416a74c3bd62a4f59
            path: /go/src/github.com/vmware-tanzu/velero-plugin-for-aws
            spdx:
              name: velero-plugin-for-aws
              version: 1.14.1
              packages:
                - name: velero-plugin-for-aws
                  purl: pkg:dhi/velero-plugin-for-aws@1.14.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/vmware-tanzu/velero-plugin-for-aws
          with:
            deps:
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: build cp-plugin
          uses: go/build@v1
          work-dir: /go/src/github.com/vmware-tanzu/velero-plugin-for-aws/hack/cp-plugin
          with:
            output: ${target.dir}/usr/local/bin/cp-plugin
        - name: build plugin
          uses: go/build@v1
          work-dir: /go/src/github.com/vmware-tanzu/velero-plugin-for-aws/velero-plugin-for-aws
          with:
            output: ${target.dir}/plugins/velero-plugin-for-aws
      outputs:
        - source: ${target.dir}/plugins/velero-plugin-for-aws
          target: /plugins/velero-plugin-for-aws
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/cp-plugin
          target: /usr/local/bin/cp-plugin
          uid: 0
          gid: 0
          mode: "0755"
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Velero Plugin for AWS image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - cp-plugin
  - /plugins/velero-plugin-for-aws
  - /target/velero-plugin-for-aws
