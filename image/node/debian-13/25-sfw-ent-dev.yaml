# syntax=dhi.io/build:2-debian13

name: Node.js 25.x / Socket Firewall Enterprise (sfw-ent, dev)
image: dhi.io/node
variant: dev
flavor: sfw-ent
tags:
  - 25-sfw-ent-dev
  - 25.9-sfw-ent-dev
  - 25.9.0-0-sfw-ent-dev
  - 25-debian-sfw-ent-dev
  - 25-debian13-sfw-ent-dev
  - 25.9-debian-sfw-ent-dev
  - 25.9-debian13-sfw-ent-dev
  - 25.9.0-0-debian-sfw-ent-dev
  - 25.9.0-0-debian13-sfw-ent-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-15"
  end-of-life: "2026-06-01"
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "arm64" }'
  COREPACK_VERSION: 0.35.0-0
  NODEJS_VERSION_MAJOR: "25"
  NODEJS_VERSION_MAJOR_MINOR: "25.9"
  NPM_VERSION: 11.17.0-0
  SFW_VERSION: 1.12.0
  VERSION: 25.9.0-0
  YARN_VERSION: 1.22.22-0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - git
    - grep
    - libatomic1
    - libc-bin
    - libc6
    - libstdc++6
    - mawk
    - node-corepack=0.35.0-0
    - nodejs-25=25.9.0-0
    - npm=11.17.0-0
    - perl-base
    - sed
    - util-linux
    - yarn-classic=1.22.22-0
  builds:
    - name: node
      contents:
        packages:
          - bash
          - coreutils
        files:
          - url: https://github.com/SocketDev/firewall-release/releases/download/v1.12.0/sfw-linux-${ARCH}
            path: ${target.dir}/opt/socket/bin/sfw
            uid: 0
            gid: 0
            mode: "0755"
      pipeline:
        - name: create alias
          runs: |
            set -eux -o pipefail

            echo "Creating npm alias"

            cat > "${target.dir}/opt/socket/bin/npm" << 'EOF'
            #!/bin/bash

            # if DHI_NO_SFW is set to true, run the command without sfw, otherwise run with sfw
            if [ "${DHI_NO_SFW}" = "true" ]; then
              /usr/bin/npm "$@"
            else
              sfw /usr/bin/npm "$@"
            fi
            EOF

            chmod +x "${target.dir}/opt/socket/bin/npm"

            echo "Creating yarn alias"

            cat > "${target.dir}/opt/socket/bin/yarn" << 'EOF'
            #!/bin/bash

            # if DHI_NO_SFW is set to true, run the command without sfw, otherwise run with sfw
            if [ "${DHI_NO_SFW}" = "true" ]; then
              /usr/bin/yarn "$@"
            else
              sfw /usr/bin/yarn "$@"
            fi
            EOF

            chmod +x "${target.dir}/opt/socket/bin/yarn"
      outputs:
        - source: ${target.dir}/opt/socket
          target: /opt/socket
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: node
      uid: 1000
      gid: 1000
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: node
      gid: 1000
      members:
        - node
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  DEBIAN_FRONTEND: noninteractive
  NODE_VERSION: 25.9.0-0
  NPM_CONFIG_UPDATE_NOTIFIER: "false"
  PATH: /opt/socket/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: directory
    path: /app
    uid: 0
    gid: 0
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Node.JS image
  org.opencontainers.image.licenses: MIT
cmd:
  - node
