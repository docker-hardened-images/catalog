  - 25.8-dev
  - 25.8.1-dev
  - 25-debian13-dev
  - 25.8-debian13-dev
  - 25.8.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-15"
  end-of-life: "2026-06-01"
vars:
  DEBIAN_REFERENCE: dhi/debian-base:trixie-debian13@sha256:75eec9a1a76a02ddf88761684efd9a72de6a5ec2c5d1abd002c03a475d5d23b7
  DIGEST: sha256:2f8e1f86a79e91df10663d41c6883a1fedfa042fe6982c7bfe73f45a80f660e5
  EXPAT_DIGEST: sha256:6bb36827ea9fdd0cb5064de572070fc0c82a1443054c91c60a63a80da0552897
  EXPAT_VERSION: 2.7.5
  NODEJS_VERSION_MAJOR: "25"
  NODEJS_VERSION_MAJOR_MINOR: "25.8"
  VERSION: 25.8.1
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!libexpat1'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - git
    - grep
    - libatomic1
    - libc-bin
    - libc6
    - libstdc++6
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: locale
      uses: dhi.io/debian-base:trixie-debian13@sha256:75eec9a1a76a02ddf88761684efd9a72de6a5ec2c5d1abd002c03a475d5d23b7
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/pkg-expat:2.7.5-debian13@sha256:6bb36827ea9fdd0cb5064de572070fc0c82a1443054c91c60a63a80da0552897
      includes:
        - usr/**
        - var/lib/dpkg/status.d
      uid: 0
      gid: 0
    - name: dhi.io/pkg-node:25.8.1-debian13@sha256:2f8e1f86a79e91df10663d41c6883a1fedfa042fe6982c7bfe73f45a80f660e5
      includes:
        - opt/docker
        - opt/nodejs
        - opt/yarn
        - usr/local/bin
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: node
      uid: 1000
      gid: 1000
    - name: _apt
      uid: 42
      gid: 65532
  groups:
