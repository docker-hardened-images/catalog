# syntax=dhi.io/build:2-debian13

name: Node.js 25.x (dev)
image: dhi.io/node
variant: dev
tags:
  - 25-dev
  - 25.9-dev
  - 25.9.0-0-dev
  - 25-debian-dev
  - 25-debian13-dev
  - 25.9-debian-dev
  - 25.9-debian13-dev
  - 25.9.0-0-debian-dev
  - 25.9.0-0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-15"
  end-of-life: "2026-06-01"
vars:
  COREPACK_VERSION: 0.35.0-0
  NODEJS_VERSION_MAJOR: "25"
  NODEJS_VERSION_MAJOR_MINOR: "25.9"
  NPM_VERSION: 11.16.0-0
  VERSION: 25.9.0-0
  YARN_VERSION: 1.22.22-0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - git
    - grep
    - libatomic1
    - libc-bin
    - libc6
    - libstdc++6
    - mawk
    - node-corepack=0.35.0-0
    - nodejs-25=25.9.0-0
    - npm=11.16.0-0
    - perl-base
    - sed
    - util-linux
    - yarn-classic=1.22.22-0
  builds:
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: node
      uid: 1000
      gid: 1000
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: node
      gid: 1000
      members:
        - node
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  DEBIAN_FRONTEND: noninteractive
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  NODE_VERSION: 25.9.0-0
  NPM_CONFIG_UPDATE_NOTIFIER: "false"
paths:
  - type: directory
    path: /app
    uid: 0
    gid: 0
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Node.JS image
  org.opencontainers.image.licenses: MIT
cmd:
  - node
