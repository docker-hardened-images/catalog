# syntax=dhi.io/build:2-debian13

name: Node.js 26.x
image: dhi.io/node
variant: runtime
tags:
  - "26"
  - "26.3"
  - 26.3.0-0
  - 26-debian
  - 26-debian13
  - 26.3-debian
  - 26.3-debian13
  - 26.3.0-0-debian
  - 26.3.0-0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-05"
vars:
  NODEJS_VERSION_MAJOR: "26"
  NODEJS_VERSION_MAJOR_MINOR: "26.3"
  VERSION: 26.3.0-0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!acl'
    - '!bzip2'
    - '!cdebconf'
    - '!debconf'
    - '!dpkg'
    - '!gawk'
    - '!gcc-12'
    - '!gcc-12-base'
    - '!gcc-base'
    - '!gmp'
    - '!install-info'
    - '!libacl1'
    - '!libbz2-1.0'
    - '!libdebian-installer'
    - '!libdebian-installer4'
    - '!libgmp10'
    - '!liblzma5'
    - '!libmd'
    - '!libmd0'
    - '!libmpfr6'
    - '!libnewt0.52'
    - '!libpcre2-8-0'
    - '!libreadline8'
    - '!libselinux'
    - '!libselinux1'
    - '!libsigsegv'
    - '!libsigsegv2'
    - '!libslang2'
    - '!libtextwrap'
    - '!libtextwrap1'
    - '!libtinfo6'
    - '!mawk'
    - '!openssl'
    - '!original-awk'
    - '!pcre2'
    - '!readline-common'
    - '!tar'
    - base-files
    - ca-certificates
    - libatomic1
    - libc6
    - libgomp1
    - libstdc++6
    - netbase
    - nodejs-26=26.3.0-0
    - tzdata
accounts:
  root: true
  run-as: node
  users:
    - name: node
      uid: 1000
      gid: 1000
  groups:
    - name: node
      gid: 1000
      members:
        - node
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  NODE_VERSION: 26.3.0-0
paths:
  - type: directory
    path: /app
    uid: 0
    gid: 0
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Node.JS image
  org.opencontainers.image.licenses: MIT
cmd:
  - node
