# syntax=dhi.io/build:2-debian13

name: Node.js 20.x / Socket Firewall Enterprise (sfw-ent, dev)
image: dhi.io/node
variant: dev
flavor: sfw-ent
tags:
  - 20-sfw-ent-dev
  - 20.20-sfw-ent-dev
  - 20.20.2-sfw-ent-dev
  - 20-debian13-sfw-ent-dev
  - 20.20-debian13-sfw-ent-dev
  - 20.20.2-debian13-sfw-ent-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2023-04-18"
  end-of-life: "2026-04-30"
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "arm64" }'
  DIGEST: sha256:373342cedf4c03da2056b748d6b32947ea2a1778fe2a18462f49eefad863e9ef
  EXPAT_DIGEST: sha256:3f7e47c85e35abd2031652077771f838457f8762e6045d7cfdf5a68664d67310
  EXPAT_VERSION: 2.8.0
  NODEJS_VERSION_MAJOR: "20"
  NODEJS_VERSION_MAJOR_MINOR: "20.20"
  SFW_VERSION: 1.8.0
  VERSION: 20.20.2
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!libexpat1'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - git
    - grep
    - libc-bin
    - libc6
    - libstdc++6
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: node
      contents:
        packages:
          - bash
          - coreutils
          - findutils
          - libstdc++6
        files:
          - url: https://github.com/SocketDev/firewall-release/releases/download/v1.8.0/sfw-linux-${ARCH}
            path: ${target.dir}/opt/socket/bin/sfw
            uid: 0
            gid: 0
            mode: "0755"
        artifacts:
          - name: dhi.io/pkg-node:20.20.2-debian13@sha256:373342cedf4c03da2056b748d6b32947ea2a1778fe2a18462f49eefad863e9ef
            includes:
              - opt/docker
              - opt/nodejs
              - opt/yarn
              - usr/local/bin
            uid: 0
            gid: 0
      pipeline:
        - name: create alias
          runs: |
            set -eux -o pipefail

            echo "Creating npm alias"

            cat > "${target.dir}/opt/socket/bin/npm" << 'EOF'
            #!/bin/bash

            # if DHI_NO_SFW is set to true, run the command without sfw, otherwise run with sfw
            if [ "${DHI_NO_SFW}" = "true" ]; then
              /opt/nodejs/node-v20.20.2/bin/npm "$@"
            else
              sfw /opt/nodejs/node-v20.20.2/bin/npm "$@"
            fi
            EOF

            chmod +x "${target.dir}/opt/socket/bin/npm"

            echo "Creating yarn alias"

            YARN_PATH="$(find /opt/yarn -type f -executable -name "yarn" | head -n 1)"
            export YARN_PATH

            cat > "${target.dir}/opt/socket/bin/yarn" << EOF
            #!/bin/bash

            # if DHI_NO_SFW is set to true, run the command without sfw, otherwise run with sfw
            if [ "\${DHI_NO_SFW}" = "true" ]; then
              $YARN_PATH "\$@"
            else
              sfw $YARN_PATH "\$@"
            fi
            EOF

            chmod +x "${target.dir}/opt/socket/bin/yarn"
      outputs:
        - source: /opt/nodejs
          target: /opt/nodejs
          uid: 0
          gid: 0
        - source: /opt/yarn
          target: /opt/yarn
          uid: 0
          gid: 0
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
        - source: /usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: ${target.dir}/opt/socket
          target: /opt/socket
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/pkg-expat:2.8.0-debian13@sha256:3f7e47c85e35abd2031652077771f838457f8762e6045d7cfdf5a68664d67310
      includes:
        - usr/**
        - var/lib/dpkg/status.d
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: node
      uid: 1000
      gid: 1000
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: node
      gid: 1000
      members:
        - node
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  DEBIAN_FRONTEND: noninteractive
  NODE_VERSION: 20.20.2
  NPM_CONFIG_UPDATE_NOTIFIER: "false"
  PATH: /opt/socket/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: directory
    path: /app
    uid: 0
    gid: 0
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Node.JS image
  org.opencontainers.image.licenses: MIT
cmd:
  - node
