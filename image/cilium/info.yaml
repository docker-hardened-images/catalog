metadata:
  display-name: Cilium
  short-description: Cilium is a networking, observability, and security solution with an eBPF-based dataplane.
  featured: false
  home-url: https://github.com/cilium/cilium
  categories:
    - monitoring-and-observability
    - networking
  included-tools:
    - name: cilium-agent
      description: Main Cilium daemon that manages eBPF datapath, network policy enforcement, and service load balancing.
    - name: cilium-bugtool
      description: Diagnostic utility for collecting Cilium logs, configuration, and system state for troubleshooting.
    - name: cilium-dbg
      description: Command-line client for interacting with the Cilium agent API and inspecting datapath state.
    - name: cilium-health
      description: Client tool for querying cluster-wide connectivity health status from the Cilium health responder.
    - name: cilium-health-responder
      description: Background daemon that performs periodic health checks and responds to connectivity probes.
    - name: cilium-mount
      description: Utility for managing BPF filesystem mounts required by Cilium for eBPF map persistence.
    - name: cilium-sysctlfix
      description: Helper tool for adjusting kernel sysctl parameters to meet Cilium's operational requirements.
