# syntax=dhi.io/build:2-debian13

name: Cilium 1.17.x
image: dhi.io/cilium
variant: runtime
tags:
  - "1.17"
  - 1.17.18
  - 1.17-debian
  - 1.17-debian13
  - 1.17.18-debian
  - 1.17.18-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-02-04"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  CILLIUM_ENVOY_REFERENCE: dhi/cilium-envoy:1.17.17-debian13@sha256:47bda240dd01e1caf3e81c7269b4618ab66b8d04bcd747d0872da4cb9408f6c3
  CLANG_VERSION: "18"
  CNI_PLUGINS_VERSION: 1.9.1-3
  COMMIT_SHA: e5796ad1eb6003acf44d8f6a7dc726699a37c1c0
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "1.17"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.17.18
  SUFFIX: ""
  VERSION: 1.17.18
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - bash
    - bpftool
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - iproute2
    - ipset
    - iptables
    - kmod
    - libatomic1
    - libc++1-18
    - libc++abi1-18
    - libc6
    - libclang-cpp18
    - libllvm18
    - mount
    - tzdata
    - util-linux
  builds:
    - name: cilium
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - adduser
          - ca-certificates
          - coreutils
          - git
          - iproute2
          - iptables
          - ipset
          - kmod
          - make
          - sed
          - bash
          - ca-certificates-bundle
          - golang-1.26
          - findutils
          - mawk
          - clang-18
          - cni=1.9.1-3
        files:
          - url: git+https://github.com/cilium/cilium.git#v1.17.18
            checksum: e5796ad1eb6003acf44d8f6a7dc726699a37c1c0
            path: /go/src/github.com/cilium/cilium
            spdx:
              name: cilium
              version: 1.17.18
              packages:
                - name: cilium
                  purl: pkg:golang/github.com/cilium/cilium@1.17.18
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.17 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/cilium/cilium
          with:
            deps:
              - go.mongodb.org/mongo-driver@v1.17.7
            download: true
        - name: test
          work-dir: /go/src/github.com/cilium/cilium
          privileged: true
          runs: |
            set -eux -o pipefail

            go test ./daemon/cmd/...
        - name: build
          work-dir: /go/src/github.com/cilium/cilium
          runs: |
            set -eux -o pipefail

            # ex: '1.16.18 ab500221 2025-12-17T04:09:29Z'
            CILIUM_FULL_VERSION="1.17.18 $(git --no-pager show -s --format='format:%h %aI')"
            # Envoy version is pinned via ARG in Dockerfile, extract the commit sha from ref string.
            CILIUM_ENVOY_IMAGE=$(sed -nE 's/^ARG CILIUM_ENVOY_IMAGE=([^ ]*)/\1/p' images/cilium/Dockerfile)
            CILIUM_ENVOY_SHA=$(echo ${CILIUM_ENVOY_IMAGE} | sed -E 's/[^/]*\/[^:]*:(.*-)?([^:@]*).*/\2/p;d')

            GOLDFLAGS="-s -w \
              -X 'github.com/cilium/cilium/pkg/version.ciliumVersion=${CILIUM_FULL_VERSION}' \
              -X 'github.com/cilium/cilium/pkg/envoy.requiredEnvoyVersionSHA=${CILIUM_ENVOY_SHA}' \
            "

            CGO_ENABLED=0 go -C ./cilium-dbg build -mod=vendor \
              -ldflags "${GOLDFLAGS}" \
              -tags=osusergo \
              -o cilium-dbg

            CGO_ENABLED=0 go -C ./daemon build -mod=vendor \
              -ldflags "${GOLDFLAGS}" \
              -tags=osusergo \
              -o cilium-agent

            CGO_ENABLED=0 go -C ./cilium-health build -mod=vendor \
              -ldflags "${GOLDFLAGS}" \
              -tags=osusergo \
              -o cilium-health

            CGO_ENABLED=0 go -C ./cilium-health/responder build -mod=vendor \
              -ldflags "${GOLDFLAGS}" \
              -tags=osusergo \
              -o cilium-health-responder

            CGO_ENABLED=0 go -C ./bugtool build -mod=vendor \
              -ldflags "${GOLDFLAGS}" \
              -tags=osusergo \
              -o cilium-bugtool

            CGO_ENABLED=0 go -C ./tools/mount build -mod=vendor \
              -ldflags "${GOLDFLAGS}" \
              -tags=osusergo \
              -o cilium-mount

            CGO_ENABLED=0 go -C ./tools/sysctlfix build -mod=vendor \
              -ldflags "${GOLDFLAGS}" \
              -tags=osusergo \
              -o cilium-sysctlfix

            CGO_ENABLED=0 go -C ./plugins/cilium-cni build -mod=vendor \
              -ldflags "${GOLDFLAGS}" \
              -tags=osusergo \
              -o cilium-cni
        - name: install
          work-dir: /go/src/github.com/cilium/cilium
          runs: |
            set -eux -o pipefail

            make install-container-binary \
              DESTDIR=${target.dir}

            # Copies over the BPF source files from bpf/ to /var/lib/cilium/bpf/
            make install-bpf \
              DESTDIR=${target.dir}

            # Copy clang-18 binary for BPF alignchecker compilation at runtime
            install -D -m 755 /usr/bin/clang-18 ${target.dir}/usr/bin/clang

            # Wrap iptables for compat
            ln -sf /usr/sbin/iptables-nft /usr/sbin/iptables
            ln -sf /usr/sbin/ip6tables-nft /usr/sbin/ip6tables
            ./images/runtime/iptables-wrapper-installer.sh --no-sanity-check

            # install-plugin.sh reads loopback from /cni/loopback
            install -D -m 755 /usr/bin/loopback ${target.dir}/cni/loopback

            # Container entrypoints
            install -m 755 images/cilium/init-container.sh ${target.dir}/init-container.sh
            install -m 755 plugins/cilium-cni/install-plugin.sh ${target.dir}/install-plugin.sh
            install -m 755 plugins/cilium-cni/cni-uninstall.sh ${target.dir}/cni-uninstall.sh
      outputs:
        - source: /usr/sbin/iptables
          target: /usr/sbin/iptables
          uid: 0
          gid: 0
        - source: /usr/sbin/ip6tables
          target: /usr/sbin/ip6tables
          uid: 0
          gid: 0
        - source: ${target.dir}/var/lib/cilium/bpf/
          target: /var/lib/cilium/bpf/
          uid: 0
          gid: 0
        - source: ${target.dir}/init-container.sh
          target: /init-container.sh
          uid: 0
          gid: 0
        - source: ${target.dir}/install-plugin.sh
          target: /install-plugin.sh
          uid: 0
          gid: 0
        - source: ${target.dir}/cni-uninstall.sh
          target: /cni-uninstall.sh
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/bin/
          target: /usr/bin/
          uid: 0
          gid: 0
        - source: ${target.dir}/opt/cni/bin/cilium-cni
          target: /opt/cni/bin/cilium-cni
          uid: 0
          gid: 0
        - source: ${target.dir}/cni/loopback
          target: /cni/loopback
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/cni/net.d/05-cilium-cni.conf
          target: /etc/cni/net.d/05-cilium-cni.conf
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/cilium
          target: /opt/docker/sbom/cilium
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/cilium-envoy:1.17.17-debian13@sha256:47bda240dd01e1caf3e81c7269b4618ab66b8d04bcd747d0872da4cb9408f6c3
      includes:
        - usr/bin/cilium-envoy
        - usr/bin/cilium-envoy-starter
      uid: 0
      gid: 0
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  HUBBLE_SERVER: unix:///var/run/cilium/hubble.sock
  INITSYSTEM: SYSTEMD
annotations:
  org.opencontainers.image.description: A minimal Cilium image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/cilium
