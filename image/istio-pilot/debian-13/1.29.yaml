contents:
  packages:
    - '!base-files'
  builds:
    - name: istio-pilot
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:086c893153f92793f3a1541793cd4a8e8b23bfd4ccaf70c8f4261f496080fb0e
      contents:
        packages:
          - grep
        files:
          - url: git+https://github.com/istio/istio.git#1.29.2
            checksum: 0c774325b938c4dbda4ea4ad4fb6156e80a12de8
            path: /go/src/github.com/istio/istio
            spdx:
              name: istio-pilot
              version: 1.29.2
              packages:
                - name: istio
                  purl: pkg:golang/istio.io/istio@1.29.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch (1.29 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/istio/istio
          with:
            deps:
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
            download: true
        - name: run-upstream-pilot-tests
          work-dir: /go/src/github.com/istio/istio
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            # Find all test packages, exclude tests with networking requirements or FIPS violations
            go list ./pilot/... \
              | grep -v 'istio.io/istio/pilot/pkg/config/kube/gateway' \
              | grep -v 'istio.io/istio/pilot/cmd/pilot-agent/status' \
              | grep -v 'istio.io/istio/pilot/pkg/model' \
              | grep -v 'istio.io/istio/pilot/pkg/bootstrap' \
              | grep -v 'istio.io/istio/pilot/pkg/controllers/ipallocate' \
              | grep -v 'istio.io/istio/pilot/pkg/trustbundle' \
              | while read pkg; do
                echo "Testing: $pkg"
                go test -v "$pkg" || exit 1
              done
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/istio/istio
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X istio.io/istio/pkg/version.buildVersion=1.29.2
              - -X istio.io/istio/pkg/version.buildGitRevision=0c774325b938c4dbda4ea4ad4fb6156e80a12de8
              - -X istio.io/istio/pkg/version.buildStatus=Clean
              - -X istio.io/istio/pkg/version.buildTag=1.29.2
              - -X istio.io/istio/pkg/version.buildHub=docker.io/dhi
              - -X istio.io/istio/pkg/version.buildOS=$(go env GOOS)
              - -X istio.io/istio/pkg/version.buildArch=$(go env GOARCH)
            output: ${target.dir}/usr/local/bin/pilot-discovery
            packages: ./pilot/cmd/pilot-discovery
            tags: vtprotobuf,disable_pgv
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/istio-pilot/patch
      outputs:
        - source: ${target.dir}/usr/local/bin/pilot-discovery
          target: /usr/local/bin/pilot-discovery
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/istio-pilot
          target: /opt/docker/sbom/istio-pilot
          uid: 0
          gid: 0
