              - usr/local/bin/yarn
            uid: 0
            gid: 0
          - name: dhi.io/helm:3.20.2-debian13@sha256:ba27c299614df6cb958a5922dab4c91fb1446cfe383dc4c25005670ea9a1d954
            includes:
              - opt/**
              - usr/**
            uid: 0
            gid: 0
          - name: dhi.io/pkg-git-lfs:3.7.1-debian13@sha256:2fbc870889703e10a6e1543ddad4fc40fe7e289e63a1d2e08492016e75125a39
            includes:
              - opt/**
              - usr/**
            uid: 0
            gid: 0
