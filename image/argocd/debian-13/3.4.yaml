                  purl: pkg:dhi/argocd@3.4.2
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:24.16.0-debian13-dev@sha256:835b4312f1fb95020bec832a171e7d6d6d338e1313c05de2bd6335a762656f3e
            includes:
              - opt/nodejs
              - opt/yarn
              - usr/local/bin/node
              - usr/local/bin/yarn
            uid: 0
            gid: 0
          - name: dhi.io/helm:3.21.0-debian13@sha256:6d06a5dff32fc28702e55493105a9a1f1d3ce607c97e110fbd32cfc81db3fe3b
            includes:
              - opt/**
              - usr/**
            uid: 0
            gid: 0
          - name: dhi.io/pkg-git-lfs:3.7.1-debian13@sha256:672fd9fae0b1d14513191f888a8a8289062ff276a02738766b426d0a3f91bd8a
            includes:
              - opt/**
              - usr/**
            uid: 0
            gid: 0
          - name: dhi.io/kustomize:5.8.1-debian13@sha256:7569f7385671ee138854cb95f93dd2539f78411147247dde22cf6ed8414df7f9
            includes:
              - opt/**
              - usr/**
            uid: 0
            gid: 0
      pipeline:
        - name: patch-go (3.4 only)
          uses: go/bump@v2
          work-dir: /go/src/github.com/argoproj/argo-cd/v3
          caches:
            - path: /go/pkg/mod
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - github.com/cloudflare/circl@v1.6.3
              - github.com/go-git/go-git/v5@v5.19.1
              - github.com/moby/spdystream@v0.5.1
              - github.com/slack-go/slack@v0.23.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
            download: true
        - name: patch-node
          uses: yarn/bump@v2
          caches:
            - path: /usr/local/share/.cache/yarn
          with:
            bumps: ${source.dir}/patches/yarn-patches-3.4.json
            yarn-root: /go/src/github.com/argoproj/argo-cd/v3/ui
        - name: build-ui
          work-dir: /go/src/github.com/argoproj/argo-cd/v3/ui
          privileged: true
          caches:
            - path: /usr/local/share/.cache/yarn
          runs: |
            set -eux -o pipefail

            yarn
            yarn run build
        - name: prepare ui for sbom
          work-dir: /go/src/github.com/argoproj/argo-cd/v3/ui
          privileged: true
          caches:
            - path: /usr/local/share/.cache/yarn
          runs: |
            set -eux -o pipefail

            rm -rf node_modules
            # tsx is included in the dependencies of argocd-ui but should not.
            yarn remove tsx
            # Issue opened: https://github.com/argoproj/argo-cd/issues/24978
            yarn remove react-hot-loader # CVE-2025-57352
            yarn install --production
        - name: ui-sbom
          uses: sbom@v1
          with:
            prefix: argocd-ui
            source: /go/src/github.com/argoproj/argo-cd/v3/ui
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/argoproj/argo-cd/v3
          environment:
            GODEBUG: tarinsecurepath=0,zipinsecurepath=0
          caches:
            - path: /go/pkg/mod
          with:
            ldflags:
              - -extldflags '-static'
              - -X github.com/argoproj/argo-cd/v3/common.version=3.4.2
              - -X github.com/argoproj/argo-cd/v3/common.gitTag=v3.4.2
              - -X github.com/argoproj/argo-cd/v3/common.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
              - -X github.com/argoproj/argo-cd/v3/common.gitCommit=0dc6b1b57dd5bb925d5b03c3d09419ab9fb4225e
              - -X github.com/argoproj/argo-cd/v3/common.gitTreeState=clean
              - -X github.com/argoproj/argo-cd/v3/common.kubectlVersion=$(go list -m k8s.io/client-go | head -n 1 | rev | cut -d' ' -f1 | rev)
            output: ${target.dir}/usr/local/bin/argocd
            packages: ./cmd
            tidy: true
      paths:
        - type: file
          path: /src/patches/yarn-patches-3.4.json
          uid: 0
          gid: 0
          source: image/argocd/patch/yarn-patches-3.4.json
      outputs:
        - source: ${target.dir}/usr/local/bin/argocd
          target: /usr/local/bin/argocd
          uid: 0
          gid: 0
        - source: /go/src/github.com/argoproj/argo-cd/v3/hack/gpg-wrapper.sh
