                  purl: pkg:dhi/argocd@3.4.1
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:20.20.2-debian13-dev@sha256:f1a76fe106cffe8bb415ff517d7cbbe3378a4b59248b5f977ef75e226287d4cc
