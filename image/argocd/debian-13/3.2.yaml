        files:
          - url: git+https://github.com/argoproj/argo-cd.git#v3.2.11
            checksum: 6d66c1b29e4f25dccfb5b0c7a939785b0071ef9a
            path: /go/src/github.com/argoproj/argo-cd/v3
            spdx:
