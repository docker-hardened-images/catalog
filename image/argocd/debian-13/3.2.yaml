                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:24.15.0-debian13-dev@sha256:2b7a995efdf9ff85ab6cd2e91e2e2f9eba8c2c05d8c19dc28c28a10b30617659
            includes:
