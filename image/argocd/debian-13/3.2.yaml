                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:20.20.2-debian13-dev@sha256:93677b7b5628eb98fb8ec7a2d0cb8e358c40af02e3a41ff331f325b8749485e0
            includes:
