            uid: 0
            gid: 0
          - name: dhi.io/kustomize:5.8.1-debian13@sha256:ddd139469fb458ea2e88dd8bb1253b8bf1c14c53a2085efeaa1fac34a8c6e4d3
            includes:
              - opt/**
              - usr/**
            uid: 0
            gid: 0
      pipeline:
        - name: patch source
          uses: patch@v1
          work-dir: /go/src/github.com/argoproj/argo-cd/v3
          with:
            options: -p1
            patches:
              - /src/patch/3.2.patch
        - name: patch-go (3.2 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/argoproj/argo-cd/v3
          caches:
            - path: /go/pkg/mod
          with:
            deps:
              - github.com/cloudflare/circl@v1.6.3
              - github.com/go-git/go-git/v5@v5.18.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: patch-node
          uses: yarn/bump@v2
          caches:
            - path: /usr/local/share/.cache/yarn
          with:
            bumps: ${source.dir}/patches/yarn-patches-3.2.json
            yarn-root: /go/src/github.com/argoproj/argo-cd/v3/ui
        - name: build-ui
          work-dir: /go/src/github.com/argoproj/argo-cd/v3/ui
          privileged: true
          caches:
            - path: /usr/local/share/.cache/yarn
          runs: |
            set -eux -o pipefail

            yarn
            yarn run build
        - name: prepare ui for sbom
          work-dir: /go/src/github.com/argoproj/argo-cd/v3/ui
          privileged: true
          caches:
            - path: /usr/local/share/.cache/yarn
          runs: |
            set -eux -o pipefail

            rm -rf node_modules
            # tsx is included in the dependencies of argocd-ui but should not.
            yarn remove tsx
            # Issue opened: https://github.com/argoproj/argo-cd/issues/24978
            yarn remove react-hot-loader # CVE-2025-57352
            yarn install --production
        - name: ui-sbom
          uses: sbom@v1
          with:
            prefix: argocd-ui
            source: /go/src/github.com/argoproj/argo-cd/v3/ui
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/argoproj/argo-cd/v3
          environment:
            GODEBUG: tarinsecurepath=0,zipinsecurepath=0
          caches:
            - path: /go/pkg/mod
          with:
            ldflags:
              - -extldflags '-static'
              - -X github.com/argoproj/argo-cd/v3/common.version=3.2.11
              - -X github.com/argoproj/argo-cd/v3/common.gitTag=v3.2.11
              - -X github.com/argoproj/argo-cd/v3/common.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
              - -X github.com/argoproj/argo-cd/v3/common.gitCommit=6d66c1b29e4f25dccfb5b0c7a939785b0071ef9a
              - -X github.com/argoproj/argo-cd/v3/common.gitTreeState=clean
              - -X github.com/argoproj/argo-cd/v3/common.kubectlVersion=$(go list -m k8s.io/client-go | head -n 1 | rev | cut -d' ' -f1 | rev)
            output: ${target.dir}/usr/local/bin/argocd
            packages: ./cmd
            tidy: true
      paths:
        - type: file
          path: /src/patches/yarn-patches-3.2.json
          uid: 0
          gid: 0
          source: image/argocd/patch/yarn-patches-3.2.json
        - type: file
          path: /src/patch/3.2.patch
