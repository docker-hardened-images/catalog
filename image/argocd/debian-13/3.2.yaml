              - usr/local/bin/node
              - usr/local/bin/yarn
            uid: 0
            gid: 0
          - name: dhi.io/helm:3.20.2-debian13@sha256:6ef51b58fa96189d68cb3277370300f3ce5eb02973a814fe75c3bdaf153d2155
            includes:
