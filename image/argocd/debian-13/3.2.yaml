              - opt/yarn
              - usr/local/bin/node
              - usr/local/bin/yarn
            uid: 0
            gid: 0
          - name: dhi.io/helm:3.20.2-debian13@sha256:c92416ff1d0e0c38a3a5c605a4c285eaf3fe5b7e13fcd532569c1b2ffa16bbc5
            includes:
              - opt/**
              - usr/**
            uid: 0
            gid: 0
          - name: dhi.io/pkg-git-lfs:3.7.1-debian13@sha256:8026fbcaeb6faa3828cb827e856a025e42254cb61ffe03993311ee3cdbf07ec9
            includes:
