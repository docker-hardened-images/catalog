  builds:
    - name: argocd-go
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:e5665fc794272538695ee2534c3c83843af6747c98ac64b46bed9fe9a60fed1d
      contents:
        packages:
          - curl
          - git
          - gnupg
          - gpg
          - gpg-agent
          - grep
          - gzip
          - openssh-client
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-cd.git#v3.2.12
            checksum: 4caf2709419b4f172d5a7adbe95d20cb1d86e3bd
            path: /go/src/github.com/argoproj/argo-cd/v3
            spdx:
              name: argocd
              version: 3.2.12
              packages:
                - name: argocd
                  purl: pkg:dhi/argocd@3.2.12
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:24.16.0-debian13-dev@sha256:6bb4122a37921714e72d0895abe11b3c8931a309e720d6b022bc20925a848150
            includes:
              - opt/nodejs
              - opt/yarn
              - usr/local/bin/node
              - usr/local/bin/yarn
            uid: 0
            gid: 0
          - name: dhi.io/helm:3.21.0-debian13@sha256:96ba8abd5a2167d025fb47f59301952cf7e08dc77dd290a026e46c3074328f18
            includes:
              - opt/**
              - usr/**
            uid: 0
            gid: 0
          - name: dhi.io/pkg-git-lfs:3.7.1-debian13@sha256:1b16fcf200bbe4aba3871481fd0f28b012547fa7c9b4549d6f295b648d529c84
            includes:
              - opt/**
              - usr/**
            uid: 0
            gid: 0
          - name: dhi.io/kustomize:5.8.1-debian13@sha256:7ad7055d18a27e4fec63343e4953702c6f8f62c589f8dc31527823acf2ddf78d
            includes:
              - opt/**
              - usr/**
            uid: 0
            gid: 0
      pipeline:
        - name: patch source
          uses: patch@v1
          work-dir: /go/src/github.com/argoproj/argo-cd/v3
          with:
            options: -p1
            patches:
              - /src/patch/3.2.patch
        - name: patch-go (3.2 only)
          uses: go/bump@v2
          work-dir: /go/src/github.com/argoproj/argo-cd/v3
          caches:
            - path: /go/pkg/mod
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/cloudflare/circl@v1.6.3
              - github.com/go-git/go-git/v5@v5.19.1
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/moby/spdystream@v0.5.1
              - github.com/slack-go/slack@v0.23.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: patch-node
          uses: yarn/bump@v2
          caches:
            - path: /usr/local/share/.cache/yarn
          with:
            bumps: ${source.dir}/patches/yarn-patches-3.2.json
            yarn-root: /go/src/github.com/argoproj/argo-cd/v3/ui
        - name: build-ui
          work-dir: /go/src/github.com/argoproj/argo-cd/v3/ui
          privileged: true
          caches:
            - path: /usr/local/share/.cache/yarn
          runs: |
            set -eux -o pipefail

            yarn
            yarn run build
        - name: prepare ui for sbom
          work-dir: /go/src/github.com/argoproj/argo-cd/v3/ui
          privileged: true
          caches:
            - path: /usr/local/share/.cache/yarn
          runs: |
            set -eux -o pipefail

            rm -rf node_modules
            # tsx is included in the dependencies of argocd-ui but should not.
            yarn remove tsx
            # Issue opened: https://github.com/argoproj/argo-cd/issues/24978
            yarn remove react-hot-loader # CVE-2025-57352
            yarn install --production
        - name: ui-sbom
          uses: sbom@v1
          with:
            prefix: argocd-ui
            source: /go/src/github.com/argoproj/argo-cd/v3/ui
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/argoproj/argo-cd/v3
          environment:
            GODEBUG: tarinsecurepath=0,zipinsecurepath=0
          caches:
            - path: /go/pkg/mod
          with:
            ldflags:
              - -extldflags '-static'
              - -X github.com/argoproj/argo-cd/v3/common.version=3.2.12
              - -X github.com/argoproj/argo-cd/v3/common.gitTag=v3.2.12
              - -X github.com/argoproj/argo-cd/v3/common.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
              - -X github.com/argoproj/argo-cd/v3/common.gitCommit=4caf2709419b4f172d5a7adbe95d20cb1d86e3bd
              - -X github.com/argoproj/argo-cd/v3/common.gitTreeState=clean
              - -X github.com/argoproj/argo-cd/v3/common.kubectlVersion=$(go list -m k8s.io/client-go | head -n 1 | rev | cut -d' ' -f1 | rev)
            output: ${target.dir}/usr/local/bin/argocd
            packages: ./cmd
            tidy: true
      paths:
        - type: file
          path: /src/patches/yarn-patches-3.2.json
          uid: 0
          gid: 0
          source: image/argocd/patch/yarn-patches-3.2.json
        - type: file
          path: /src/patch/3.2.patch
          uid: 0
          gid: 0
          source: image/argocd/patch/3.2.patch
      outputs:
        - source: ${target.dir}/usr/local/bin/argocd
