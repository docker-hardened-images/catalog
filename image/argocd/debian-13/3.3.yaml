          uid: 0
          gid: 0
        - source: /opt/docker/sbom/argocd
          target: /opt/docker/sbom/argocd
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/argocd-ui
          target: /opt/docker/sbom/argocd-ui
          uid: 0
          gid: 0
