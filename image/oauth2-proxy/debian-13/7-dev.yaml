contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: oauth2-proxy-go
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/oauth2-proxy/oauth2-proxy.git#v7.15.3
            checksum: 66b3a17db09f0b51a4bc3159d4c7fe3fbeca1288
            path: /go/src/github.com/oauth2-proxy/oauth2-proxy
            spdx:
              name: oauth2-proxy
              version: 7.15.3
              packages:
                - name: oauth2-proxy
                  purl: pkg:golang/github.com/oauth2-proxy/oauth2-proxy@7.15.3
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/oauth2-proxy/oauth2-proxy
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/oauth2-proxy/oauth2-proxy
          with:
            ldflags:
              - -X github.com/oauth2-proxy/oauth2-proxy/v7/pkg/version.VERSION=7.15.3
            output: ${target.dir}/usr/local/bin/oauth2-proxy
            packages: github.com/oauth2-proxy/oauth2-proxy/v7
      outputs:
        - source: ${target.dir}/usr/local/bin/oauth2-proxy
          target: /usr/local/bin/oauth2-proxy
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/oauth2-proxy
          target: /opt/docker/sbom/oauth2-proxy
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
