# syntax=dhi.io/build:2-debian13

name: KServe Storage Initializer 0.18.x (dev)
image: dhi.io/kserve-storage-initializer
variant: dev
tags:
  - 0-dev
  - 0.18-dev
  - 0.18.0-dev
  - 0-debian13-dev
  - 0-python3.11-dev
  - 0.18-debian13-dev
  - 0.18-python3.11-dev
  - 0.18.0-debian13-dev
  - 0.18.0-python3.11-dev
  - 0-python3.11-debian13-dev
  - 0.18-python3.11-debian13-dev
  - 0.18.0-python3.11-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 3a432a84880407b15c63f458080258838eff2792
  DEBIAN_TRIPLE: '#{ (target.arch == "amd64" ? "x86-64" : "aarch64") + "-linux-gnu" }'
  POETRY_VERSION: 2.1.3
  PYTHON_BUILD_REFERENCE: dhi/python:3.11.15-debian13-dev@sha256:4a9816fd9daf864d542fbfc955f673c6d3d5d86155ca9e19a6e1921762dfa918
  PYTHON_MAJOR_MINOR_VERSION: "3.11"
  PYTHON_REFERENCE: dhi/python:3.11.15-debian13@sha256:28676a55d15982ce12661b773744b03c8cde5075145c5da2b32f7ebc41e30217
  PYTHON_VERSION: 3.11.15
  SEMVER_MAJOR_MINOR_VERSION: "0.18"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.18.0
  VERSION: 0.18.0
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: kserve-storage-initializer
      uses: dhi.io/python:3.11.15-debian13-dev@sha256:4a9816fd9daf864d542fbfc955f673c6d3d5d86155ca9e19a6e1921762dfa918
      contents:
        packages:
          - binutils-${DEBIAN_TRIPLE}
          - build-essential
          - ca-certificates
          - git
          - krb5-config
          - libkrb5-dev
        files:
          - url: git+https://github.com/kserve/kserve.git#v0.18.0
            checksum: 3a432a84880407b15c63f458080258838eff2792
            path: ${source.dir}/kserve
            spdx:
              name: kserve
              version: 0.18.0
              packages:
                - name: kserve
                  purl: pkg:pypi/kserve@0.18.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: install
          privileged: true
          runs: |
            set -eux -o pipefail

            export POETRY_HOME=/opt/poetry
            export VIRTUAL_ENV='${target.dir}/opt/kserve/storage-initializer-env'
            export PATH="$VIRTUAL_ENV/bin:$POETRY_HOME/bin:$PATH"

            python3 -m venv "$POETRY_HOME"
            "$POETRY_HOME/bin/pip" install 'poetry==2.1.3'

            python3 -m venv "$VIRTUAL_ENV"
            cp -r '${source.dir}/kserve/python/kserve' '${target.dir}/opt/kserve/kserve-python'

            poetry install --no-interaction --extras 'storage' --project '${target.dir}/opt/kserve/kserve-python'
            pip install 'krbcontext==0.10' 'hdfs~=2.6.0' 'requests-kerberos==0.14.0'

            # CVE remediation
            pip install --upgrade 'urllib3>=2.6.3'       # CVE-2026-21441
            pip install --upgrade 'cryptography>=46.0.6' # CVE-2026-26007, CVE-2026-34073
            pip install --upgrade 'aiohttp>=3.13.4'      # CVE-2026-22815, CVE-2026-34515, CVE-2026-34516, CVE-2026-34525, CVE-2026-34513, CVE-2026-34514, CVE-2026-34517, CVE-2026-34518, CVE-2026-34519, CVE-2026-34520
            pip install --upgrade 'requests>=2.33.0'     # CVE-2026-25645
        - name: pth and entrypoint
          runs: |
            set -eux -o pipefail

            sed -i 's#^${target.dir}##' '${target.dir}/opt/kserve/storage-initializer-env/lib/python3.11/site-packages/kserve.pth'

            sed '1c#!/opt/kserve/storage-initializer-env/bin/python3' \
              '${source.dir}/kserve/python/storage-initializer/scripts/initializer-entrypoint' \
              > '${target.dir}/opt/kserve/storage-initializer-entrypoint'

            chmod +x '${target.dir}/opt/kserve/storage-initializer-entrypoint'
      outputs:
        - source: ${target.dir}/opt/kserve
          target: /opt/kserve
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kserve
          target: /opt/docker/sbom/kserve
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.11.15-debian13@sha256:28676a55d15982ce12661b773744b03c8cde5075145c5da2b32f7ebc41e30217
      includes:
        - opt/**
        - usr/**
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /work
environment:
  DEBIAN_FRONTEND: noninteractive
  PYTHONUNBUFFERED: "1"
paths:
  - type: directory
    path: /work
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /mnt
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /opt/kserve/storage-initializer-entrypoint
