# syntax=dhi.io/build:2-debian13

name: Karma 0.x
image: dhi.io/karma
variant: runtime
tags:
  - "0"
  - "0.131"
  - 0-debian
  - 0-debian13
  - 0.131-debian
  - 0.131-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-18"
vars:
  COMMIT_SHA: dc3f23a69797745d0869d833f3c162a07a8793fa
  SEMVER_MAJOR_MINOR_VERSION: "0.131"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: "0.131"
  VERSION: "0.131"
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: karma
      work-dir: /go/src/github.com/prymitive/karma
      caches:
        - path: /go/pkg/mod
        - path: /root/.npm
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - findutils
          - git
          - golang-1.26
          - mawk
          - nodejs-24
          - npm
          - sed
        files:
          - url: git+https://github.com/prymitive/karma.git#v0.131
            checksum: dc3f23a69797745d0869d833f3c162a07a8793fa
            path: /go/src/github.com/prymitive/karma
            spdx:
              name: karma
              version: "0.131"
              packages:
                - name: karma
                  purl: pkg:golang/github.com/prymitive/karma@0.131
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build ui
          work-dir: /go/src/github.com/prymitive/karma/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            npm ci
            npm run build
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/sys@v0.44.0
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            go test ./internal/... -count=1
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X main.version=0.131
            output: ${target.dir}/usr/local/bin/karma
            packages: ./cmd/karma
            strip: true
      outputs:
        - source: ${target.dir}/usr/local/bin/karma
          target: /usr/local/bin/karma
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/karma
          target: /opt/docker/sbom/karma
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /karma
    uid: 0
    gid: 0
    source: /usr/local/bin/karma
annotations:
  org.opencontainers.image.description: A minimal Karma image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/karma
ports:
  - 8080/tcp
