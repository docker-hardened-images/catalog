# syntax=dhi.io/build:2-alpine3.23

name: PHP 8.2.x (dev)
image: dhi.io/php
variant: dev
tags:
  - 8.2-alpine3.23-dev
  - 8.2.31-alpine3.23-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2022-12-08"
  end-of-life: "2026-12-31"
vars:
  PHP_SRC_DIR: /usr/include/php/src
  PHP_SYSCONFDIR: /etc/php-8.2
  SEMVER_MAJOR_MINOR_VERSION: "8.2"
  SEMVER_MAJOR_VERSION: "8"
  SEMVER_VERSION: 8.2.31
  VERSION: 8.2.31-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - apk-tools
    - argon2-libs
    - autoconf
    - bison
    - busybox
    - ca-certificates-bundle
    - curl
    - file
    - g++
    - gcc
    - git
    - gzip
    - icu-data-full
    - icu-libs
    - libc-dev
    - libcrypto3
    - libcurl
    - libsodium
    - libssl3
    - libtool
    - libxml2
    - make
    - oniguruma
    - pcre2
    - php-8.2-dev=8.2.31-r0
    - php-8.2-phpdbg=8.2.31-r0
    - php-8.2=8.2.31-r0
    - pkgconf
    - re2c
    - readline
    - sqlite-libs
    - tar
    - zlib
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  CFLAGS: -fstack-protector-strong -fpic -fpie -O2 -D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64
  CPPFLAGS: -fstack-protector-strong -fpic -fpie -O2 -D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64
  LDFLAGS: -Wl,-O1 -pie
  PHP_INI_DIR: /usr/local/etc/php
  PHP_SRC_DIR: /usr/include/php/src
  PHP_VERSION: 8.2.31-r0
paths:
  - type: directory
    path: /usr/local/etc
    uid: 0
    gid: 0
  - type: symlink
    path: /usr/local/etc/php
    uid: 0
    gid: 0
    source: /etc/php-8.2/php
  - type: directory
    path: /var/www/html
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: file
    path: /etc/php-8.2/php/conf.d/opcache.ini
    content: |
      # https://wiki.php.net/rfc/make_opcache_required
      zend_extension=opcache
    uid: 0
    gid: 0
    mode: "0644"
annotations:
  org.opencontainers.image.description: A minimal PHP image
  org.opencontainers.image.licenses: PHP-3.01
entrypoint:
  - php
