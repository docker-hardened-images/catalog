# syntax=dhi.io/build:2-alpine3.23

name: PHP 8.5.x
image: dhi.io/php
variant: runtime
tags:
  - 8-alpine3.23
  - 8.5-alpine3.23
  - 8.5.6-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-11-20"
  end-of-life: "2029-12-31"
vars:
  OPCACHE_BUILTIN: "true"
  PHP_SYSCONFDIR: /etc/php-8.5
  SEMVER_MAJOR_MINOR_VERSION: "8.5"
  SEMVER_MAJOR_VERSION: "8"
  SEMVER_VERSION: 8.5.6
  VERSION: 8.5.6-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - argon2-libs
    - busybox
    - ca-certificates-bundle
    - icu-data-full
    - icu-libs
    - libcrypto3
    - libcurl
    - libsodium
    - libssl3
    - libxml2
    - oniguruma
    - pcre2
    - php-8.5=8.5.6-r0
    - readline
    - sqlite-libs
    - zlib
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  PHP_INI_DIR: /usr/local/etc/php
  PHP_VERSION: 8.5.6-r0
paths:
  - type: directory
    path: /usr/local/etc
    uid: 0
    gid: 0
  - type: symlink
    path: /usr/local/etc/php
    uid: 0
    gid: 0
    source: /etc/php-8.5/php
  - type: directory
    path: /var/www/html
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal PHP image
  org.opencontainers.image.licenses: PHP-3.01
entrypoint:
  - php
