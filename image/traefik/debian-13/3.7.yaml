# syntax=dhi.io/build:2-debian13

name: Traefik 3.x
image: dhi.io/traefik
variant: runtime
tags:
  - "3"
  - "3.7"
  - 3.7.5
  - 3-debian
  - 3-debian13
  - 3.7-debian
  - 3.7-debian13
  - 3.7.5-debian
  - 3.7.5-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-05"
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "3.7"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.7.5
  SUFFIX: ""
  VERSION: 3.7.5-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - traefik=3.7.5-1
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal traefik image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /usr/bin/traefik
