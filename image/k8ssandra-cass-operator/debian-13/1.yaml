    - name: k8ssandra-cass-operator
      work-dir: /go/src/github.com/k8ssandra/cass-operator
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates
          - git
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/k8ssandra/cass-operator.git#v1.31.0
            checksum: 78300f18d415da60d656a4c01119799a113b2047
            path: /go/src/github.com/k8ssandra/cass-operator
            spdx:
              name: k8ssandra-cass-operator
