                  purl: pkg:golang/github.com/k8ssandra/cass-operator@1.31.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/k8ssandra/cass-operator
          with:
