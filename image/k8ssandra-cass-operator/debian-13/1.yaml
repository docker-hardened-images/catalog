              - google.golang.org/grpc@v1.79.3
            download: true
        - name: test after bump
          work-dir: /go/src/github.com/k8ssandra/cass-operator
          runs: |
            set -eux -o pipefail

            go test -v -count=1 ./pkg/...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/k8ssandra/cass-operator
