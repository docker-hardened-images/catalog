              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
              - github.com/prometheus/prometheus@v0.305.1-0.20250806170547-208187eaa19b
            download: true
            work-dir: /go/src/github.com/grafana/loki
        - name: build
          uses: go/build@v1
          with:
            commit: 4a27a08b8f204bd83e143ccdee06844b91d4d462
            output: ${target.dir}/usr/bin/promtail
            packages: ./clients/cmd/promtail
            version: 3.6.10
        - name: install-config
          runs: |
            set -eux -o pipefail

            install -D -m 0644 \
              clients/cmd/promtail/promtail-docker-config.yaml \
              "${target.dir}/etc/promtail/config.yaml"
      outputs:
        - source: ${target.dir}/usr/bin/promtail
          target: /usr/bin/promtail
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/promtail
          target: /etc/promtail
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/loki
