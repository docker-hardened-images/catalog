            uid: 0
            gid: 0
      pipeline:
        - name: remove vendored modules for dependency refresh
          work-dir: /go/src/github.com/grafana/loki
          runs: |
            set -eux -o pipefail

            rm -rf vendor
        - name: update go dependencies and vendor (3.6 only)
          uses: go/bump@v2
          with:
