# syntax=dhi.io/build:2-debian13

name: Stargate 2.0.x (dev)
image: dhi.io/stargate
variant: dev
tags:
  - 2-dev
  - 2.0-dev
  - 2.0.51-dev
  - 2-debian-dev
  - 2-debian13-dev
  - 2.0-debian-dev
  - 2.0-debian13-dev
  - 2.0.51-debian-dev
  - 2.0.51-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-14"
vars:
  ARCH_TRIPLET: '#{ target.arch == "amd64" ? "x86_64-linux-gnu" : "aarch64-linux-gnu" }'
  COMMIT_SHA: 7e81d606bc44c39d211fd39c3c92444e3f8da349
  JAVA_FIPS_SUFFIX: ""
  JAVA_VARIANT: jdk
  JDK_MAJOR_VERSION: "8"
  JRE_PATH: /usr/lib/jvm/temurin-8
  SEMVER_MAJOR_MINOR_VERSION: "2.0"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.0.51
  VERSION: 2.0.51
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - eclipse-temurin-8-jdk
    - eclipse-temurin-8-jdk-oci-config
    - findutils
    - grep
    - iproute2
    - libaio1t64
    - libc-bin
    - libjemalloc2
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: stargate
      work-dir: ${source.dir}/stargate/coordinator
      environment:
        JAVA_HOME: /usr/lib/jvm/temurin-8
        MAVEN_ARGS: --batch-mode --no-transfer-progress
      contents:
        packages:
          - bash
          - coreutils
          - findutils
          - sed
          - curl
          - ca-certificates
          - libstdc++6
          - base-files
          - eclipse-temurin-8-jdk
        files:
          - url: git+https://github.com/stargate/stargate.git#v2.0.51
            checksum: 7e81d606bc44c39d211fd39c3c92444e3f8da349
            path: ${source.dir}/stargate
            spdx:
              name: stargate
              version: 2.0.51
              packages:
                - name: stargate
                  purl: pkg:dhi/stargate@2.0.51
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch deps
          uses: mvn/patch@v1
          with:
            dependencies: ${source.dir}/patch/mvn-dependencies-2.0.json
            dependencies-key: dependencyManagement.dependencies
            mvn-root: ${source.dir}/stargate/coordinator
            properties: ${source.dir}/patch/mvn-properties-2.0.json
        - name: patch source
          uses: patch@v1
          with:
            options: -p1
            patches:
              - ${source.dir}/patch/cassandra-all-2.0.patch
              - ${source.dir}/patch/graphql-java-2.0.patch
        - name: install
          privileged: true
          runs: |
            set -eux -o pipefail

            chmod +x ./mvnw

            ./mvnw clean install -Dmaven.test.skip=true -Dxml-format.skip=true \
              -pl '!persistence-cassandra-3.11,!testing,!testing-services,!grpc-examples'

            mkdir -p "${target.dir}/stargate-lib"

            # Keep all non-persistence jars plus persistence-api and persistence-cassandra-4.0.
            cp stargate-lib/*.jar "${target.dir}/stargate-lib/"
            cp stargate-lib/logback.xml "${target.dir}/stargate-lib/"
            rm -f "${target.dir}/stargate-lib/persistence-"*.jar
            cp stargate-lib/persistence-api*.jar "${target.dir}/stargate-lib/"
            cp stargate-lib/persistence-cassandra-4.0*.jar "${target.dir}/stargate-lib/"

            cp starctl "${target.dir}/starctl"
            chmod +x "${target.dir}/starctl"
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            # Test exclusions:
            #   !*IT                                                  integration tests (need ccm + real Cassandra)
            #   !CreateIndexFetcherTest, !CreateTableFetcherTest,
            #   !DropIndexFetcherTest                                 graphql-java 19.x reworded error strings; tests
            #                                                         hardcoded the 18.x format. Runtime validation works.
            #   !ReactiveDocumentServiceTest                          v1-only (Document API removed in v2). Brittle Mockito
            #                                                         strict-stubbing fails on patched dep paths.
            # -DfailIfNoTests=false: surefire's -Dtest filter otherwise errors on
            #                        modules with no matching tests (e.g. persistence-test).
            ./mvnw clean test -Dxml-format.skip=true \
              -Dtest='!*IT,!CreateIndexFetcherTest,!CreateTableFetcherTest,!DropIndexFetcherTest,!ReactiveDocumentServiceTest' \
              -DfailIfNoTests=false \
              -pl '!persistence-cassandra-3.11,!testing,!testing-services,!grpc-examples'
      paths:
        - type: directory
          path: /src/patch
          uid: 0
          gid: 0
          source: image/stargate/patch
      outputs:
        - source: ${target.dir}/starctl
          target: /stargate/starctl
          uid: 0
          gid: 0
        - source: ${target.dir}/stargate-lib
          target: /stargate/stargate-lib
          uid: 0
          gid: 0
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /stargate
environment:
  CASSANDRA_LIBJEMALLOC: /usr/lib/${ARCH_TRIPLET}/libjemalloc.so.2
  DEBIAN_FRONTEND: noninteractive
  JAVA_HOME: /usr/lib/jvm/temurin-8
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
paths:
  - type: directory
    path: /stargate
    uid: 65532
    gid: 65532
  - type: directory
    path: /stargate/log
    uid: 65532
    gid: 65532
annotations:
  org.opencontainers.image.description: A minimal Stargate image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /stargate/starctl
ports:
  - 8080/tcp
  - 8081/tcp
  - 8084/tcp
  - 9042/tcp
