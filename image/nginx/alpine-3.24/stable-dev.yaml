# syntax=dhi.io/build:2-alpine3.23

name: Nginx stable (dev)
image: dhi.io/nginx
variant: dev
tags:
  - 1.30-alpine-dev
  - 1.30.3-alpine-dev
  - 1.30-alpine3.24-dev
  - 1.30.3-alpine3.24-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-14"
vars:
  APK_MAJOR_MINOR_VERSION: "1.30"
  APK_MAJOR_VERSION: "1"
  APK_VERSION: 1.30.3
  NGINX_PACKAGE: nginx-stable
  NGINX_VERSION: 1.30.3
  PKG_RELEASE: "3"
  VERSION: 1.30.3-r3
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - apk-tools
    - busybox
    - gettext-envsubst
    - musl-utils
    - nginx-stable=1.30.3-r3
  builds:
    - name: nginx
      contents:
        repositories:
          - https://dhi.io/apk/alpine/v3.24/main
          - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
          - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
        keyring:
          - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
        packages:
          - alpine-baselayout-data
          - bash
          - busybox
          - musl-utils
          - nginx-stable=1.30.3-r3
      pipeline:
        - name: install
          runs: |
            set -eux -o pipefail

            ln -sf /dev/stdout /var/log/nginx/access.log
            ln -sf /dev/stderr /var/log/nginx/error.log

            # The Alpine nginx package lays its config out differently from the
            # nginx.org package the shared entrypoint scripts and tests target:
            # it includes /etc/nginx/conf.d/*.conf at the main (root) context and
            # ships virtual hosts under /etc/nginx/http.d. Normalize to the
            # nginx.org contract: server blocks live in /etc/nginx/conf.d and are
            # included from the http{} context.
            sed -i '/^include \/etc\/nginx\/conf\.d\/\*\.conf;/d' /etc/nginx/nginx.conf
            sed -i 's,/etc/nginx/http\.d/,/etc/nginx/conf.d/,' /etc/nginx/nginx.conf

            # Drop the packaged 'user nginx;' directive; the image runs as the
            # unprivileged nonroot user (uid 65532), not as root.
            sed -i '/^user nginx;/d' /etc/nginx/nginx.conf

            # Alpine logs errors at 'warn', which suppresses nginx's startup
            # banner. nginx.org images log at 'notice' so the startup banner
            # (and the "nginx/<version>" line consumers wait on) reaches stderr.
            sed -i 's,error_log /var/log/nginx/error.log warn;,error_log /var/log/nginx/error.log notice;,' /etc/nginx/nginx.conf

            # server_tokens off is already set by the Alpine package's nginx.conf,
            # and the compiled-in pid path (/run/nginx/nginx.pid) is used as-is.

            # Alpine serves its welcome content from /var/lib/nginx/html, but the
            # default server config and the dev templating test expect it under
            # /usr/share/nginx/html.
            mkdir -p /usr/share/nginx/html
            cp -a /var/lib/nginx/html/. /usr/share/nginx/html/

            # Alpine ships a 404-only sample at /usr/share/nginx/http-default_server.conf
            # and does not enable it. Provide the conf.d/default.conf welcome
            # server the shared tests expect, listening on 8080.
            mkdir -p /etc/nginx/conf.d
            cat > /etc/nginx/conf.d/default.conf << 'CONF'
            server {
                listen       8080;
                server_name  localhost;

                location / {
                    root   /usr/share/nginx/html;
                    index  index.html index.htm;
                }

                error_page   500 502 503 504  /50x.html;
                location = /50x.html {
                    root   /usr/share/nginx/html;
                }
            }
            CONF

            mkdir -p /run/nginx
            chown -R 65532:65532 /etc/nginx
            chmod -R g+w /etc/nginx
            chown -R 65532:65532 /run/nginx
            chown -R 65532:65532 /var/lib/nginx
            chown -R 65532:65532 /var/log/nginx
      outputs:
        - source: /
          target: /
          uid: 0
          gid: 0
          diff: true
accounts:
  root: true
  run-as: root
  users:
    - name: nginx
      uid: 65532
      gid: 65532
  groups:
    - name: nginx
      gid: 65532
      members:
        - nginx
    - name: www-data
      gid: 82
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  NGINX_VERSION: 1.30.3
  PKG_RELEASE: "3"
paths:
  - type: file
    path: /usr/local/bin/entrypoint.sh
    uid: 0
    gid: 0
    mode: "0755"
    source: image/nginx/bin/entrypoint.sh
  - type: file
    path: /docker-entrypoint.d/10-listen-on-ipv6-by-default.sh
    uid: 0
    gid: 0
    mode: "0755"
    source: image/nginx/bin/10-listen-on-ipv6-by-default.sh
  - type: file
    path: /docker-entrypoint.d/15-local-resolvers.envsh
    uid: 0
    gid: 0
    mode: "0755"
    source: image/nginx/bin/15-local-resolvers.envsh
  - type: file
    path: /docker-entrypoint.d/20-envsubst-on-templates.sh
    uid: 0
    gid: 0
    mode: "0755"
    source: image/nginx/bin/20-envsubst-on-templates.sh
  - type: file
    path: /docker-entrypoint.d/30-tune-worker-processes.sh
    uid: 0
    gid: 0
    mode: "0755"
    source: image/nginx/bin/30-tune-worker-processes.sh
annotations:
  org.opencontainers.image.description: A minimal Nginx image
  org.opencontainers.image.licenses: BSD-2-Clause
entrypoint:
  - /usr/local/bin/entrypoint.sh
cmd:
  - nginx
  - -g
  - daemon off;
ports:
  - 8080/tcp
