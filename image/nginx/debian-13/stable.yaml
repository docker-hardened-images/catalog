# syntax=dhi.io/build:2-debian13

name: Nginx stable
image: dhi.io/nginx
variant: runtime
tags:
  - "1.26"
  - 1.26.3
  - 1.26-debian13
  - 1.26.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-04-23"
vars:
  DEBIAN_EPOCH_MAJOR_MINOR_VERSION: "1.26"
  DEBIAN_EPOCH_MAJOR_VERSION: "1"
  DEBIAN_EPOCH_VERSION: 1.26.3
  NGINX_REPOSITORY: deb [signed-by=/usr/share/keyrings/nginx-archive-keyring.gpg] https://nginx.org/packages/debian trixie nginx
  VERSION: 1.26.3-3+deb13u5+dhi2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/nginx-archive-keyring.gpg] https://nginx.org/packages/debian trixie nginx
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://nginx.org/keys/nginx_signing.key
    - https://dhi.io/keyring/dhi-deb-els-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - coreutils
    - libcrypt1
    - nginx-common=1.26.3-3+deb13u5+dhi2
    - nginx=1.26.3-3+deb13u5+dhi2
  builds:
    - name: nginx
      contents:
        repositories:
          - deb [signed-by=/usr/share/keyrings/nginx-archive-keyring.gpg] https://nginx.org/packages/debian trixie nginx
          - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
        keyring:
          - https://nginx.org/keys/nginx_signing.key
          - https://dhi.io/keyring/dhi-deb-els-gpg.D46852F6925E9F71.key
        packages:
          - base-files
          - libcrypt1
          - nginx=1.26.3-3+deb13u5+dhi2
          - nginx-common=1.26.3-3+deb13u5+dhi2
          - bash
          - coreutils
          - sed
        mappings:
          nginx: pkg:deb/debian/nginx@1.26.3-3+deb13u5+dhi2?os_distro=trixie&os_name=debian&os_version=13
          nginx-common: pkg:deb/debian/nginx-common@1.26.3-3+deb13u5+dhi2?os_distro=trixie&os_name=debian&os_version=13
      pipeline:
        - name: install
          runs: |
            set -eux -o pipefail

            mkdir -p /etc/nginx/conf.d /run/nginx /var/cache/nginx /var/lib/nginx /var/log/nginx
            ln -sf /dev/stdout /var/log/nginx/access.log
            ln -sf /dev/stderr /var/log/nginx/error.log

            if [ -f /etc/nginx/conf.d/default.conf ]; then
              sed -i "s,listen       80;,listen       8080;," /etc/nginx/conf.d/default.conf
            elif [ -d /usr/share/nginx/html ]; then
              cat > /etc/nginx/conf.d/default.conf << 'EOF'
            server {
                listen       8080;
                listen  [::]:8080;
                server_name  localhost;

                location / {
                    root   /usr/share/nginx/html;
                    index  index.html index.htm;
                }

                error_page   500 502 503 504  /50x.html;
                location = /50x.html {
                    root   /usr/share/nginx/html;
                }
            }
            EOF
            elif [ -f /etc/nginx/sites-enabled/default ]; then
              sed -i "s,listen 80 default_server;,listen 8080 default_server;," /etc/nginx/sites-enabled/default
              sed -i "s,listen \\[::\\]:80 default_server;,listen [::]:8080 default_server;," /etc/nginx/sites-enabled/default
            fi
            sed -i -E "/^[[:space:]]*user[[:space:]]+[^;]+;/d" /etc/nginx/nginx.conf
            sed -i -E "s,^[[:space:]]*pid[[:space:]]+/run/nginx.pid;,pid        /run/nginx/nginx.pid;," /etc/nginx/nginx.conf
            sed -i -E "s,^[[:space:]]*error_log[[:space:]]+/var/log/nginx/error.log.*;,error_log /var/log/nginx/error.log notice;," /etc/nginx/nginx.conf
            sed -i -E "/^[[:space:]]*server_tokens[[:space:]]+[^;]+;/d" /etc/nginx/nginx.conf
            sed -i '/^http {$/a\    server_tokens off;' /etc/nginx/nginx.conf

            chown -R 65532:65532 /var/cache/nginx
            chmod -R g+w /var/cache/nginx
            chown -R 65532:65532 /var/lib/nginx
            chmod -R g+w /var/lib/nginx
            chown -R 65532:65532 /etc/nginx
            chmod -R g+w /etc/nginx
            mkdir -p /run/nginx
            chown -R 65532:65532 /run/nginx
            chown -R 65532:65532 /var/log/nginx
      outputs:
        - source: /
          target: /
          uid: 0
          gid: 0
          diff: true
  mappings:
    nginx: pkg:deb/debian/nginx@1.26.3-3+deb13u5+dhi2?os_distro=trixie&os_name=debian&os_version=13
    nginx-common: pkg:deb/debian/nginx-common@1.26.3-3+deb13u5+dhi2?os_distro=trixie&os_name=debian&os_version=13
accounts:
  run-as: nginx
  users:
    - name: nginx
      uid: 65532
      gid: 65532
  groups:
    - name: nginx
      gid: 65532
      members:
        - nginx
    - name: www-data
      gid: 82
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  NGINX_VERSION: 1.26.3-3+deb13u5+dhi2
annotations:
  org.opencontainers.image.description: A minimal Nginx image
  org.opencontainers.image.licenses: BSD-2-Clause
entrypoint:
  - nginx
cmd:
  - -g
  - daemon off;
ports:
  - 8080/tcp
