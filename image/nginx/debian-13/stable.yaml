# syntax=dhi.io/build:2-debian13

name: Nginx stable
image: dhi.io/nginx
variant: runtime
tags:
  - "1.30"
  - 1.30.4
  - 1.30-debian
  - 1.30-debian13
  - 1.30.4-debian
  - 1.30.4-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-04-23"
vars:
  DEBIAN_EPOCH_MAJOR_MINOR_VERSION: "1.30"
  DEBIAN_EPOCH_MAJOR_VERSION: "1"
  DEBIAN_EPOCH_VERSION: 1.30.4
  NGINX_PACKAGE: nginx-stable
  NGINX_VERSION: 1.30.4
  PKG_RELEASE: "0"
  VERSION: 1.30.4-0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - coreutils
    - libc6
    - libcrypt1
    - libpcre2-8-0
    - libssl3t64
    - nginx-stable=1.30.4-0
    - zlib1g
  builds:
    - name: nginx
      contents:
        repositories:
          - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
        keyring:
          - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
        packages:
          - base-files
          - nginx-stable=1.30.4-0
          - bash
          - coreutils
      pipeline:
        - name: install
          runs: |
            set -eux -o pipefail

            ln -sf /dev/stdout /var/log/nginx/access.log
            ln -sf /dev/stderr /var/log/nginx/error.log

            mkdir -p /run/nginx

            chown -R 65532:65532 /var/cache/nginx
            chmod -R g+w /var/cache/nginx
            chown -R 65532:65532 /etc/nginx
            chmod -R g+w /etc/nginx
            chown -R 65532:65532 /run/nginx
            chown -R 65532:65532 /var/log/nginx
            chown -R 65532:65532 /usr/share/nginx/html
      outputs:
        - source: /
          target: /
          uid: 0
          gid: 0
          diff: true
accounts:
  run-as: nginx
  users:
    - name: nginx
      uid: 65532
      gid: 65532
  groups:
    - name: nginx
      gid: 65532
      members:
        - nginx
    - name: www-data
      gid: 82
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  NGINX_VERSION: 1.30.4
  PKG_RELEASE: "0"
annotations:
  org.opencontainers.image.description: A minimal Nginx image
  org.opencontainers.image.licenses: BSD-2-Clause
entrypoint:
  - nginx
cmd:
  - -g
  - daemon off;
ports:
  - 8080/tcp
