# syntax=dhi.io/build:2-debian13

name: Nginx mainline (compat)
image: dhi.io/nginx
variant: runtime
flavor: compat
tags:
  - 1-compat
  - 1.31-compat
  - 1.31.3-compat
  - 1-debian-compat
  - 1-debian13-compat
  - 1.31-debian-compat
  - 1.31-debian13-compat
  - 1.31.3-debian-compat
  - 1.31.3-debian13-compat
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-06-24"
vars:
  DEBIAN_EPOCH_MAJOR_MINOR_VERSION: "1.31"
  DEBIAN_EPOCH_MAJOR_VERSION: "1"
  DEBIAN_EPOCH_VERSION: 1.31.3
  NGINX_PACKAGE: nginx-mainline
  NGINX_VERSION: 1.31.3
  PKG_RELEASE: "1"
  VERSION: 1.31.3-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - ca-certificates
    - coreutils
    - dash
    - findutils
    - hostname
    - libc6
    - libcrypt1
    - libpcre2-8-0
    - libssl3t64
    - nginx-mainline=1.31.3-1
    - openssl
    - zlib1g
  builds:
    - name: nginx
      contents:
        repositories:
          - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
        keyring:
          - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
        packages:
          - base-files
          - nginx-mainline=1.31.3-1
          - bash
          - coreutils
      pipeline:
        - name: install
          runs: |
            set -eux -o pipefail

            ln -sf /dev/stdout /var/log/nginx/access.log
            ln -sf /dev/stderr /var/log/nginx/error.log

            mkdir -p /run/nginx

            chown -R 65532:65532 /var/cache/nginx
            chmod -R g+w /var/cache/nginx
            chown -R 65532:65532 /etc/nginx
            chmod -R g+w /etc/nginx
            chown -R 65532:65532 /run/nginx
            chown -R 65532:65532 /var/log/nginx
            chown -R 65532:65532 /usr/share/nginx/html
      outputs:
        - source: /
          target: /
          uid: 0
          gid: 0
          diff: true
accounts:
  run-as: nginx
  users:
    - name: nginx
      uid: 65532
      gid: 65532
  groups:
    - name: nginx
      gid: 65532
      members:
        - nginx
    - name: www-data
      gid: 82
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  NGINX_VERSION: 1.31.3
  PKG_RELEASE: "1"
annotations:
  org.opencontainers.image.description: A minimal Nginx image
  org.opencontainers.image.licenses: BSD-2-Clause
entrypoint:
  - nginx
cmd:
  - -g
  - daemon off;
ports:
  - 8080/tcp
