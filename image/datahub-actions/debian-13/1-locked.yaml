  - 1.5.0.7-debian-locked
  - 1.5.0.7-debian13-locked
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-01"
vars:
  ACRYL_DATAHUB_ACTIONS_SDIST_CHECKSUM: sha256:95de3e54e8b2d455cc23ad48923a2d7f08268a4c4a38e5866b3014611ab915a3
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 9fa880ef1890ce1052cc06d5fb3b7f9e114f528c
  EXTRAS: base
  PYTHON_BUILD_REFERENCE: dhi/python:3.10.20-debian13-dev@sha256:3d6db545cbb90eb8e4ce995d4656db67cc71e3ff44da0a3b12f592ca5defc387
  PYTHON_BUILD_VERSION: 3.10.20
  PYTHON_MAJOR_MINOR_VERSION: "3.10"
  PYTHON_REFERENCE: dhi/python:3.10.20-debian13@sha256:a8c12ece5c6256edeeb3beafd8240078754448565b86c43da554c36aa5916df2
  PYTHON_VERSION: 3.10.20
  SEMVER_MAJOR_MINOR_VERSION: "1.5"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.5.0.7
  VERSION: 1.5.0.7
  VERSION_MAJOR_MINOR_PATCH: 1.5.0
contents:
  packages:
    - '!base-files'
    - bash
    - ca-certificates
    - coreutils
    - curl
    - krb5-config
    - krb5-user
    - libaio1t64
    - libffi8
    - libkrb5-3
    - libkrb5support0
    - libldap2
    - libodbc2
    - librdkafka1
    - libsasl2-2
    - libsasl2-modules
    - libsasl2-modules-gssapi-mit
    - libsasl2-modules-ldap
    - tzdata
    - unixodbc
  builds:
    - name: datahub-actions
      uses: dhi.io/python:3.10.20-debian13-dev@sha256:3d6db545cbb90eb8e4ce995d4656db67cc71e3ff44da0a3b12f592ca5defc387
      work-dir: ${source.dir}
      environment:
        UV_NO_MANAGED_PYTHON: "true"
        UV_PYTHON_DOWNLOADS: never
      caches:
        - path: /root/.cache/uv
      contents:
        packages:
          - bash
          - build-essential
          - cargo
          - g++
          - libaio-dev
          - libffi-dev
          - libkrb5-dev
          - libldap2-dev
          - librdkafka-dev
          - libsasl2-dev
          - libssl-dev
          - libxml2-dev
          - libxslt1-dev
          - pkg-config
          - unixodbc-dev
        files:
          - url: https://files.pythonhosted.org/packages/source/a/acryl-datahub-actions/acryl_datahub_actions-1.5.0.7.tar.gz
            checksum: sha256:95de3e54e8b2d455cc23ad48923a2d7f08268a4c4a38e5866b3014611ab915a3
            path: ${source.dir}/acryl_datahub_actions.tar.gz
            spdx:
              name: acryl-datahub-actions
              version: 1.5.0.7
              packages:
                - name: acryl-datahub-actions
                  purl: pkg:pypi/acryl-datahub-actions@1.5.0.7
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: git+https://github.com/datahub-project/datahub.git#v1.5.0.7
            checksum: 9fa880ef1890ce1052cc06d5fb3b7f9e114f528c
            path: ${source.dir}/datahub-src
            spdx:
              name: datahub
              version: 1.5.0.7
              packages:
                - name: datahub
                  purl: pkg:github/datahub-project/datahub@v1.5.0.7
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: install uv
          privileged: true
          runs: |
            set -eux -o pipefail

            pip install uv
        - name: install datahub-actions
          privileged: true
          runs: |
            set -eux -o pipefail

            cat > ${source.dir}/overrides.txt << 'EOF'
            urllib3>=2.7.0
            lxml>=6.1.0
            EOF

            UV_LINK_MODE=copy uv pip install \
              --prefix ${target.dir}/opt/datahub \
              --override ${source.dir}/overrides.txt \
              --no-binary cryptography \
              "${source.dir}/acryl_datahub_actions.tar.gz[base]"
        - name: install datahub-actions glue from the monorepo checkout
          work-dir: ${source.dir}/datahub-src/docker/datahub-actions
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/opt/datahub/scripts \
              ${target.dir}/etc/datahub/actions/system/conf

            python3 - start.sh "${target.dir}/opt/datahub/scripts/start.sh" << 'PY'
            import sys

            src, dst = sys.argv[1], sys.argv[2]
            s = open(src).read()
            n = s.count("/home/datahub")
            assert n == 6, f"expected 6 /home/datahub refs in start.sh, found {n}; upstream changed, re-evaluate the swap"
            open(dst, "w").write(s.replace("/home/datahub", "/home/nonroot"))
            PY
            chmod 0755 ${target.dir}/opt/datahub/scripts/start.sh

            install -m 0644 config/executor.yaml \
              config/doc_propagation_action.yaml \
              config/slack_action.yaml \
              config/teams_action.yaml \
              ${target.dir}/etc/datahub/actions/system/conf/
        - name: python dependencies sbom
          uses: sbom@v1
          with:
            extra-scanners: python-package-cataloger
            prefix: datahub-actions
            source: ${target.dir}/opt/datahub
        - name: clean python cache and tests
          runs: |
            set -eux -o pipefail

            find ${target.dir}/opt/datahub \
              \( -type d -a \( -name test -o -name tests -o -name __pycache__ \) \) \
              -o \( -type f -a \( -name '*.pyc' -o -name '*.pyo' \) \) \
              -exec rm -rf '{}' + || true
      outputs:
        - source: ${target.dir}/opt/datahub
          target: /opt/datahub
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/datahub/actions/system/conf
          target: /etc/datahub/actions/system/conf
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/datahub-actions
          target: /opt/docker/sbom/datahub-actions
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.10.20-debian13@sha256:a8c12ece5c6256edeeb3beafd8240078754448565b86c43da554c36aa5916df2
      includes:
        - opt/**
        - usr/**
      uid: 0
      gid: 0
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
