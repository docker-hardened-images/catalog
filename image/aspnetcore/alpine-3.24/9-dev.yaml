# syntax=dhi.io/build:2-alpine3.23

name: ASP.NET Core 9.x (dev)
image: dhi.io/aspnetcore
variant: dev
tags:
  - 9-alpine-dev
  - 9.0-alpine-dev
  - 9-alpine3.24-dev
  - 9.0.18-alpine-dev
  - 9.0-alpine3.24-dev
  - 9.0.18-alpine3.24-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2024-11-12"
  end-of-life: "2026-11-10"
vars:
  APK_MAJOR_MINOR_VERSION: "9.0"
  APK_MAJOR_VERSION: "9"
  APK_VERSION: 9.0.18
  VERSION: 9.0.18-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - apk-tools
    - aspnetcore9-runtime=9.0.18-r0
    - bash
    - busybox
    - ca-certificates-bundle
    - coreutils
    - curl
    - findutils
    - tzdata
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  ASPNETCORE_HTTP_PORTS: "8080"
  ASPNETCORE_VERSION: 9.0.18
  DOTNET_RUNNING_IN_CONTAINER: "true"
  PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
annotations:
  org.opencontainers.image.description: A minimal ASP.NET Core image
  org.opencontainers.image.licenses: MIT
cmd:
  - dotnet
  - --help
