# syntax=dhi.io/build:2-debian13

name: ASP.NET Core 10.x (dev)
image: dhi.io/aspnetcore
variant: dev
tags:
  - 10-dev
  - 10.0-dev
  - 10.0.10-dev
  - 10-debian-dev
  - 10-debian13-dev
  - 10.0-debian-dev
  - 10.0-debian13-dev
  - 10.0.10-debian-dev
  - 10.0.10-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-11-11"
  end-of-life: "2028-11-14"
vars:
  ARCH: '#{ target.arch == "amd64" ? "x64" : "arm64" }'
  SEMVER_MAJOR_MINOR_VERSION: "10.0"
  SEMVER_MAJOR_VERSION: "10"
  SEMVER_VERSION: 10.0.10
  VERSION: 10.0.10
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libc6
    - libgcc-s1
    - libgssapi-krb5-2
    - libicu76
    - libssl3t64
    - libstdc++6
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
    - zlib1g
  files:
    - url: https://builds.dotnet.microsoft.com/dotnet/aspnetcore/Runtime/10.0.10/aspnetcore-runtime-10.0.10-linux-${ARCH}.tar.gz
      path: /opt/dotnet
      spdx:
        name: aspnetcore-runtime
        version: 10.0.10
        packages:
          - name: aspnetcore-runtime
            purl: pkg:dhi/microsoft/aspnetcore-runtime@10.0.10
            license: MIT
          - name: dotnet-runtime
            purl: pkg:dhi/microsoft/dotnet-runtime@10.0.10
            license: MIT
          - name: microsoft.aspnetcore.app.runtime.linux-${ARCH}
            purl: pkg:nuget/microsoft.aspnetcore.app.runtime.linux-${ARCH}@10.0.10
            license: MIT
          - name: microsoft.netcore.app.runtime.linux-${ARCH}
            purl: pkg:nuget/microsoft.netcore.app.runtime.linux-${ARCH}@10.0.10
            license: MIT
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  ASPNETCORE_HTTP_PORTS: "8080"
  DEBIAN_FRONTEND: noninteractive
  DOTNET_ROOT: /opt/dotnet
  DOTNET_RUNNING_IN_CONTAINER: "true"
  DOTNET_VERSION: 10.0.10
  PATH: /opt/dotnet:/opt/dotnet/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
annotations:
  org.opencontainers.image.description: A minimal ASP.NET Core image
  org.opencontainers.image.licenses: MIT
cmd:
  - dotnet
  - --help
