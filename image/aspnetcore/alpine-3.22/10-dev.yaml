# syntax=dhi.io/build:2-alpine3.22

name: ASP.NET Core 10.x (dev)
image: dhi.io/aspnetcore
variant: dev
tags:
  - 10-alpine3.22-dev
  - 10.0-alpine3.22-dev
  - 10.0.10-alpine3.22-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-11-11"
  end-of-life: "2028-11-14"
vars:
  APK_MAJOR_MINOR_VERSION: "10.0"
  APK_MAJOR_VERSION: "10"
  APK_VERSION: 10.0.10
  VERSION: 10.0.10-r0
contents:
  repositories:
    - https://dl-cdn.alpinelinux.org/alpine/v3.22/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.22/community
    - https://dl-cdn.alpinelinux.org/alpine/edge/community
  packages:
    - alpine-baselayout-data
    - apk-tools
    - aspnetcore10-runtime=10.0.10-r0
    - bash
    - busybox
    - ca-certificates-bundle
    - coreutils
    - curl
    - findutils
    - tzdata
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.22"
  pretty-name: Docker Hardened Images/Alpine Linux v3.22
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  ASPNETCORE_HTTP_PORTS: "8080"
  ASPNETCORE_VERSION: 10.0.10
  DOTNET_RUNNING_IN_CONTAINER: "true"
  PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
annotations:
  org.opencontainers.image.description: A minimal ASP.NET Core image
  org.opencontainers.image.licenses: MIT
cmd:
  - dotnet
  - --help
