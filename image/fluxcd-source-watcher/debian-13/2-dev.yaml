# syntax=dhi.io/build:2-debian13

name: fluxcd source watcher 2.x (dev)
image: dhi.io/fluxcd-source-watcher
variant: dev
tags:
  - 2-dev
  - 2.2-dev
  - 2.2.2-dev
  - 2-debian-dev
  - 2-debian13-dev
  - 2.2-debian-dev
  - 2.2-debian13-dev
  - 2.2.2-debian-dev
  - 2.2.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-12"
vars:
  COMMIT_SHA: e29d07bf96317cae3964424de446940dcaac494f
  SEMVER_MAJOR_MINOR_VERSION: "2.2"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.2.2
  VERSION: 2.2.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: source-watcher
      work-dir: /go/src/github.com/fluxcd/source-watcher
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/fluxcd/source-watcher#v2.2.2
            checksum: e29d07bf96317cae3964424de446940dcaac494f
            path: /go/src/github.com/fluxcd/source-watcher
            spdx:
              name: fluxcd-source-watcher
              version: 2.2.2
              packages:
                - name: fluxcd-source-watcher
                  purl: pkg:golang/github.com/fluxcd/source-watcher@2.2.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/text@v0.39.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test $(go list ./internal/... | grep -vE '/internal/(controller|controller_test|builder)')
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/source-watcher
            packages: ./cmd
      outputs:
        - source: ${target.dir}/usr/local/bin/source-watcher
          target: /usr/local/bin/source-watcher
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-source-watcher
          target: /opt/docker/sbom/fluxcd-source-watcher
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Flux CD source-watcher image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/source-watcher
