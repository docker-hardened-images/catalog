# syntax=dhi.io/build:2-debian13

name: fluxcd source watcher 2.x
image: dhi.io/fluxcd-source-watcher
variant: runtime
tags:
  - "2"
  - "2.2"
  - 2.2.0
  - 2-debian
  - 2-debian13
  - 2.2-debian
  - 2.2-debian13
  - 2.2.0-debian
  - 2.2.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-12"
vars:
  COMMIT_SHA: a3d95d9310ac8dad536abfe8daa31103b888801f
  SEMVER_MAJOR_MINOR_VERSION: "2.2"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.2.0
  VERSION: 2.2.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: source-watcher
      work-dir: /go/src/github.com/fluxcd/source-watcher
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/fluxcd/source-watcher#v2.2.0
            checksum: a3d95d9310ac8dad536abfe8daa31103b888801f
            path: /go/src/github.com/fluxcd/source-watcher
            spdx:
              name: fluxcd-source-watcher
              version: 2.2.0
              packages:
                - name: fluxcd-source-watcher
                  purl: pkg:golang/github.com/fluxcd/source-watcher@2.2.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: patch with downgrade
          uses: go/bump@v2
          with:
            deps:
              - github.com/docker/cli@v29.2.0
            downgrade: true
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Exclude packages that cannot run in the build environment:
            # - internal/controller: requires testenv (live k8s API server via etcd)
            # - internal/controller_test: requires testenv (live k8s API server via etcd)
            # - internal/builder: upstream test has stale error-message assertion (TestBuildErrors)
            CGO_ENABLED=0 go test $(go list ./internal/... | grep -vE '/internal/(controller|controller_test|builder)')
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/source-watcher
            packages: ./cmd
      outputs:
        - source: ${target.dir}/usr/local/bin/source-watcher
          target: /usr/local/bin/source-watcher
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-source-watcher
          target: /opt/docker/sbom/fluxcd-source-watcher
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Flux CD source-watcher image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/source-watcher
