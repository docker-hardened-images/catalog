vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: a010aa80481edcae26f8094af73d14e1597f9e96
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:5d1f9634fc21d351b8712212864d435bfe4204eca3d60b61cc7cfd491d776357
  SEMVER_MAJOR_MINOR_VERSION: "2.1"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.1.1
  VERSION: 2.1.1
contents:
  packages:
    - '!base-files'
  builds:
    - name: source-watcher
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:5d1f9634fc21d351b8712212864d435bfe4204eca3d60b61cc7cfd491d776357
      work-dir: /go/src/github.com/fluxcd/source-watcher
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/fluxcd/source-watcher#v2.1.1
            checksum: a010aa80481edcae26f8094af73d14e1597f9e96
            path: /go/src/github.com/fluxcd/source-watcher
            spdx:
              name: fluxcd-source-watcher
              version: 2.1.1
              packages:
                - name: fluxcd-source-watcher
                  purl: pkg:golang/github.com/fluxcd/source-watcher@2.1.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/net@v0.53.0
            download: true
        - name: patch with downgrade
          uses: go/bump@v2
          with:
            deps:
              - github.com/docker/cli@v29.2.0
            downgrade: true
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            # Exclude packages that cannot run in the build environment:
            # - internal/controller: requires testenv (live k8s API server via etcd)
            # - internal/controller_test: requires testenv (live k8s API server via etcd)
            # - internal/builder: upstream test has stale error-message assertion (TestBuildErrors)
            CGO_ENABLED=0 go test $(go list ./internal/... | grep -vE '/internal/(controller|controller_test|builder)')
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/source-watcher
            packages: ./cmd
      outputs:
        - source: ${target.dir}/usr/local/bin/source-watcher
          target: /usr/local/bin/source-watcher
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-source-watcher
          target: /opt/docker/sbom/fluxcd-source-watcher
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
