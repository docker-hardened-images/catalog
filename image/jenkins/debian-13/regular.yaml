# syntax=dhi.io/build:2-debian13

name: Jenkins 2.x (weekly)
image: dhi.io/jenkins
variant: runtime
tags:
  - "2.573"
  - 2.573-debian
  - 2.573-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BCFIPS_VERSION: 2.1.2
  BCPKIXFIPS_VERSION: 2.1.11
  BCRNGJENT_VERSION: 1.3.6
  BCTLSFIPS_VERSION: 2.1.23
  BCUTILFIPS_VERSION: 2.1.6
  COMMIT_SHA: 203312f5719252fdb76416976afffe42b52d7819
  DOCKER_REPO_COMMIT_SHA: fdd19400e4fe9298dee80874e7d6fd02c0a2006a
  DOCKER_REPO_VERSION: "2.573"
  JAVA_FIPS_SUFFIX: ""
  JAVA_HOME_PATH: /usr/lib/jvm/temurin-21
  JAVA_MAJOR_VERSION: "21"
  JAVA_VARIANT: jre
  JDK_MAJOR_VERSION: "21"
  MAVEN_REFERENCE: dhi/maven:3.9.16-jdk21-debian13-dev@sha256:d5345690e9a38322275e734fcd87854e2bed7b0be9e4150137019480c56d28fc
  MAVEN_VERSION: 3.9.16
  SEMVER_MAJOR_MINOR_VERSION: "2.573"
  SEMVER_MAJOR_VERSION: "2"
  VERSION: "2.573"
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - coreutils
    - eclipse-temurin-21-jre
    - eclipse-temurin-21-jre-oci-config
    - findutils
    - fontconfig
    - fonts-dejavu-core
    - git
    - libpng16-16t64
    - openssh-client
    - procps
    - sed
    - tini
    - tzdata
    - unzip
  builds:
    - name: jenkins
      uses: dhi.io/maven:3.9.16-jdk21-debian13-dev@sha256:d5345690e9a38322275e734fcd87854e2bed7b0be9e4150137019480c56d28fc
      environment:
        JAVA_HOME: /usr/lib/jvm/temurin-21
      caches:
        - path: /root/.m2/repository
      contents:
        packages:
          - coreutils
          - findutils
          - bash
          - curl
          - git
          - gzip
          - sed
          - tar
          - unzip
          - zip
          - xmlstarlet
        files:
          - url: git+https://github.com/jenkinsci/jenkins.git#jenkins-2.573
            checksum: 203312f5719252fdb76416976afffe42b52d7819
            path: ${source.dir}/jenkins
            spdx:
              name: jenkins
              version: "2.573"
              packages:
                - name: jenkins
                  purl: pkg:dhi/jenkins@2.573
                  license: MIT
            uid: 0
            gid: 0
          - url: git+https://github.com/jenkinsci/docker.git#fdd19400e4fe9298dee80874e7d6fd02c0a2006a
            checksum: fdd19400e4fe9298dee80874e7d6fd02c0a2006a
            path: ${source.dir}/docker-builds
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/org/apache/mina/mina-core/2.2.7/mina-core-2.2.7.jar
            checksum: sha256:b4fed29776eaf632144aca9471ed867d3105631e87ff8dd4cb85669eeb3e5c58
            path: ${source.dir}/patch/deps/mina-core-2.2.7.jar
            spdx:
              name: mina-core
              version: 2.2.7
              packages:
                - name: mina-core
                  purl: pkg:maven/org.apache.mina/mina-core@2.2.7
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: remove git-changelist-maven-extension
          work-dir: ${source.dir}/jenkins
          runs: |
            set -eux -o pipefail

            # git-changelist-maven-extension is unavailable in the DHI Maven mirror.
            # It derives changelist values from Git metadata for Jenkins incremental
            # builds, which are unnecessary when DHI builds a tagged release.
            # Use local-name() so the XPath matches regardless of whether the
            # file declares an xmlns or not.
            ext_xml=".mvn/extensions.xml"
            if [ -f "${ext_xml}" ]; then
              xmlstarlet ed -L \
                -d "//*[local-name()='extension'][*[local-name()='artifactId']='git-changelist-maven-extension']" \
                "${ext_xml}"
            fi
        - name: build
          work-dir: ${source.dir}/jenkins
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            mvn clean install -DskipTests -Dmaven.test.skip=true -Dspotless.check.skip=true
        - name: patch bundled mina-core
          work-dir: ${source.dir}/jenkins
          runs: |
            set -eux -o pipefail

            patch_dir="$(mktemp -d)"
            trap 'rm -rf "${patch_dir}"' EXIT

            war_file="war/target/jenkins.war"
            hpi_path="WEB-INF/detached-plugins/mina-sshd-api-core.hpi"
            old_mina_path="WEB-INF/lib/mina-core-2.2.4.jar"
            new_mina_path="WEB-INF/lib/mina-core-2.2.7.jar"

            unzip -q "${war_file}" "${hpi_path}" -d "${patch_dir}"
            hpi_file="${patch_dir}/${hpi_path}"

            if jar tf "${hpi_file}" | grep -q "${old_mina_path}"; then
              zip -q -d "${hpi_file}" "${old_mina_path}"
            fi

            mkdir -p "${patch_dir}/hpi-overlay/WEB-INF/lib"
            cp "${source.dir}/patch/deps/mina-core-2.2.7.jar" "${patch_dir}/hpi-overlay/${new_mina_path}"
            (cd "${patch_dir}/hpi-overlay" && jar --update --file "${hpi_file}" "${new_mina_path}")

            if jar tf "${hpi_file}" | grep -q "${old_mina_path}"; then
              echo "ERROR: ${old_mina_path} is still present in ${hpi_path}" >&2
              exit 1
            fi
            jar tf "${hpi_file}" | grep -q "${new_mina_path}"

            (cd "${patch_dir}" && jar --update --file "${source.dir}/jenkins/${war_file}" "${hpi_path}")

            unzip -p "${war_file}" "${hpi_path}" > "${patch_dir}/verified-mina-sshd-api-core.hpi"
            if jar tf "${patch_dir}/verified-mina-sshd-api-core.hpi" | grep -q "${old_mina_path}"; then
              echo "ERROR: ${old_mina_path} is still present in repacked ${war_file}" >&2
              exit 1
            fi
            jar tf "${patch_dir}/verified-mina-sshd-api-core.hpi" | grep -q "${new_mina_path}"
        - name: install
          work-dir: ${source.dir}/jenkins
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/share/jenkins"
            cp war/target/jenkins.war "${target.dir}/usr/share/jenkins/jenkins.war"
        - name: copy-entrypoint-scripts
          work-dir: ${source.dir}/docker-builds
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/local/bin"
            mkdir -p "${target.dir}/usr/share/jenkins/ref/init.groovy.d"

            # Copy jenkins.sh entrypoint script from upstream docker repo
            cp jenkins.sh "${target.dir}/usr/local/bin/jenkins.sh"

            # Copy jenkins-support script (required by jenkins.sh)
            cp jenkins-support "${target.dir}/usr/local/bin/jenkins-support"
      outputs:
        - source: ${target.dir}/usr/share/jenkins
          target: /usr/share/jenkins
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/jenkins
          target: /opt/docker/sbom/jenkins
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/share/jenkins/ref
          target: /usr/share/jenkins/ref
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
accounts:
  run-as: jenkins
  users:
    - name: jenkins
      uid: 1000
      gid: 1000
  groups:
    - name: jenkins
      gid: 1000
      members:
        - jenkins
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /var/jenkins_home
environment:
  COPY_REFERENCE_FILE_LOG: /var/jenkins_home/copy_reference_file.log
  JAVA_HOME: /usr/lib/jvm/temurin-21
  JENKINS_HOME: /var/jenkins_home
  JENKINS_INCREMENTALS_REPO_MIRROR: https://repo.jenkins-ci.org/incrementals
  JENKINS_SLAVE_AGENT_PORT: "50000"
  JENKINS_UC: https://updates.jenkins.io
  JENKINS_UC_EXPERIMENTAL: https://updates.jenkins.io/experimental
  JENKINS_VERSION: "2.573"
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  PATH: /usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
  REF: /usr/share/jenkins/ref
paths:
  - type: directory
    path: /var/jenkins_home
    uid: 1000
    gid: 1000
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Jenkins image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /usr/bin/tini
  - --
  - /usr/local/bin/jenkins.sh
ports:
  - 8080/tcp
  - 50000/tcp
