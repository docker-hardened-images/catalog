# syntax=dhi.io/build:2-debian13

name: Vector 0.57.x (dev)
image: dhi.io/vector
variant: dev
tags:
  - 0-dev
  - 0.57-dev
  - 0.57.0-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.57-debian-dev
  - 0.57-debian13-dev
  - 0.57.0-debian-dev
  - 0.57.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 8832452f57afb536ea0de53a093f9fd1b669ccec
  SEMVER_MAJOR_MINOR_VERSION: "0.57"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.57.0
  VERSION: 0.57.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libc6
    - libgcc-s1
    - libsasl2-2
    - libstdc++6
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: vector
      caches:
        - path: /root/.cargo
      contents:
        packages:
          - build-essential
          - cargo-1.97
          - rustc-1.97
          - curl
          - git
          - pkg-config
          - libssl-dev
          - libclang-dev
          - cmake
          - protobuf-compiler
          - grep
          - sed
          - gzip
          - bash
          - coreutils
          - findutils
          - gawk
          - ca-certificates
          - libsasl2-dev
        files:
          - url: git+https://github.com/vectordotdev/vector.git#v0.57.0
            checksum: 8832452f57afb536ea0de53a093f9fd1b669ccec
            path: ${source.dir}/vector-8832452f57afb536ea0de53a093f9fd1b669ccec
            spdx:
              name: vector
              version: 0.57.0
              packages:
                - name: vector
                  purl: pkg:dhi/vector@0.57.0
                  license: MPL-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch source
          uses: patch@v1
          work-dir: ${source.dir}/vector-8832452f57afb536ea0de53a093f9fd1b669ccec
          privileged: true
          with:
            options: -p1
            patches:
              - ${source.dir}/patch/allow_dead_code.patch
              - ${source.dir}/patch/allow_unstable_name_collisions.patch
              - ${source.dir}/patch/allow_deprecated.patch
        - name: bump cargo dependencies
          work-dir: ${source.dir}/vector-8832452f57afb536ea0de53a093f9fd1b669ccec
          privileged: true
          runs: |
            set -eux -o pipefail

            # CVE-2026-42327, CVE-2026-44662 → openssl ≥0.10.79
            sed -i '/^openssl = /s/version = "[^"]*"/version = ">=0.10.79, <0.11"/' Cargo.toml

            # Update dependencies to pull in patched versions
            cargo update --ignore-rust-version --recursive openssl
            # vector 0.56.0's Cargo.lock already ships rustls-webpki 0.103.13
            # (GHSA-82j2-j2ch-gfr8) and rand 0.8.6 (GHSA-cq8v-f236-94qc); the
            # explicit precise pins anchored versions that no longer exist.

            # RUSTSEC-2026-0179 → postgres-protocol ≥0.6.12 (SCRAM PBKDF2 iteration-count DoS)
            cargo update --ignore-rust-version --precise 0.6.12 postgres-protocol

            # GHSA-4w2j-m93h-cj5j / RUSTSEC-2026-0185 → quinn-proto ≥0.11.15 (QUIC stream reassembly memory DoS)
            cargo update --ignore-rust-version --precise 0.11.15 quinn-proto
        - name: ui sbom
          uses: sbom@v1
          with:
            extra-scanners: rust-cargo-lock-cataloger
            prefix: vector-cargo
            source: ${source.dir}/vector-8832452f57afb536ea0de53a093f9fd1b669ccec
        - name: build and install
          work-dir: ${source.dir}/vector-8832452f57afb536ea0de53a093f9fd1b669ccec
          privileged: true
          runs: |
            set -eux -o pipefail

            cargo build --release --no-default-features --features default

            install -D target/release/vector \
              '${target.dir}/usr/local/bin/vector'
            install -D -m 0644 -o 65532 -g 65532 config/vector.yaml \
              '${target.dir}/etc/vector/vector.yaml'
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/vector/patch
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/vector
          target: /etc/vector
          uid: 65532
          gid: 65532
          mode: "0755"
        - source: /opt/docker/sbom/vector
          target: /opt/docker/sbom/vector
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/vector-cargo
          target: /opt/docker/sbom/vector-cargo
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /var/lib/vector
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Vector observability data pipeline
  org.opencontainers.image.licenses: MPL-2.0
entrypoint:
  - /usr/local/bin/vector
cmd:
  - --config
  - /etc/vector/vector.yaml
ports:
  - 8686/tcp
