# syntax=dhi.io/build:2-debian13

name: Jsonnet 0.22.x
image: dhi.io/go-jsonnet
variant: runtime
tags:
  - "0"
  - "0.22"
  - 0.22.0
  - 0-debian
  - 0-debian13
  - 0.22-debian
  - 0.22-debian13
  - 0.22.0-debian
  - 0.22.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 567b61ac4a6c23546a62d79324bb4aaed6bdc941
  SEMVER_MAJOR_MINOR_VERSION: "0.22"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.22.0
  VERSION: 0.22.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: go-jsonnet
      work-dir: /go/src/github.com/google/go-jsonnet
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - sed
          - bash
          - ca-certificates-bundle
          - coreutils
          - diffutils
          - findutils
          - gcc
          - g++
          - git
          - golang-1.26
          - libc6-dev
          - mawk
        files:
          - url: git+https://github.com/google/go-jsonnet.git#v0.22.0
            checksum: 567b61ac4a6c23546a62d79324bb4aaed6bdc941
            path: /go/src/github.com/google/go-jsonnet
            spdx:
              name: go-jsonnet
              version: 0.22.0
              packages:
                - name: go-jsonnet
                  purl: pkg:dhi/go-jsonnet@0.22.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
            download: true
        - name: build jsonnet
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/jsonnet
            packages: ./cmd/jsonnet
        - name: build jsonnetfmt
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/jsonnetfmt
            packages: ./cmd/jsonnetfmt
        - name: build jsonnet-deps
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/jsonnet-deps
            packages: ./cmd/jsonnet-deps
        - name: build jsonnet-lint
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/jsonnet-lint
            packages: ./cmd/jsonnet-lint
        - name: test
          runs: |
            set -eux -o pipefail

            export SKIP_PYTHON_BINDINGS_TESTS=1
            ./tests.sh
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Jsonnet image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/jsonnet
cmd:
  - --help
