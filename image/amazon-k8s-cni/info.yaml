metadata:
  display-name: amazon-k8s-cni
  short-description: Networking plugin for pod networking in Kubernetes using Elastic Network Interfaces on AWS.
  featured: false
  home-url: https://github.com/aws/amazon-vpc-cni-k8s
  categories:
    - integration-and-delivery
    - networking
  included-tools:
    - name: aws-vpc-cni
      description: Main image entrypoint that bootstraps the aws-node container and starts the Amazon VPC CNI components.
    - name: aws-cni
      description: Binary invoked by kubelet on every pod creation and deletion to physically wire up or tear down a pod's network namespace.
    - name: aws-k8s-agent
      description: IPAMD daemon that maintains a warm pool of pre-allocated VPC IP addresses by managing ENI attachment and IP assignment on the node.
    - name: grpc-health-probe
      description: Binary used as a Kubernetes exec liveness/readiness probe.
    - name: egress-cni
      description: CNI plugin that gives pods the ability to reach endpoints via SNAT.
