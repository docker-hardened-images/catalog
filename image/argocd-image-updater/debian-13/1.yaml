# syntax=dhi.io/build:2-debian13

name: Argo CD Image Updater 1.x
image: dhi.io/argocd-image-updater
variant: runtime
tags:
  - "1"
  - "1.2"
  - 1.2.1
  - 1-debian
  - 1-debian13
  - 1.2-debian
  - 1.2-debian13
  - 1.2.1-debian
  - 1.2.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-12-15"
vars:
  AWSCLI_REFERENCE: dhi/awscli:2.35.11-debian13@sha256:816004f78444d30a76befd0a394a12597a33ba0bf8826fd7d7438f054c4134d4
  AWSCLI_VERSION: 2.35.11
  COMMIT_SHA: 1b622412d7ecc2392e86bd5d1d2fee755fc71ca1
  SEMVER_MAJOR_MINOR_VERSION: "1.2"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.2.1
  VERSION: 1.2.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates
    - ca-certificates-bundle
    - git
    - gpg
    - gpg-agent
    - libcurl4t64
    - openssh-client
    - tini
    - tzdata
  builds:
    - name: argocd-image-updater
      work-dir: /go/src/github.com/argoproj-labs/argocd-image-updater
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - binutils
          - binutils-gold
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/argoproj-labs/argocd-image-updater.git#v1.2.1
            checksum: 1b622412d7ecc2392e86bd5d1d2fee755fc71ca1
            path: /go/src/github.com/argoproj-labs/argocd-image-updater
            spdx:
              name: argocd-image-updater
              version: 1.2.1
              packages:
                - name: argocd-image-updater
                  purl: pkg:golang/github.com/argoproj-labs/argocd-image-updater@1.2.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/go-git/go-git/v5@v5.19.1
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
            download: true
            tidy: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            # Run unit tests, skip e2e tests and packages that require external access
            go test $(go list ./... | egrep -v '(test/|mocks/|ext/|e2e/)') -short -count=1 -v
        - name: build argocd-image-updater
          uses: go/build@v1
          with:
            ldflags:
              - -extldflags "-static"
              - -X github.com/argoproj-labs/argocd-image-updater/pkg/version.version=1.2.1
              - -X github.com/argoproj-labs/argocd-image-updater/pkg/version.gitCommit=1b622412d7ecc2392e86bd5d1d2fee755fc71ca1
              - -X github.com/argoproj-labs/argocd-image-updater/pkg/version.buildDate=${SOURCE_DATE_EPOCH}
            output: ${target.dir}/usr/local/bin/argocd-image-updater
            packages: ./cmd
      outputs:
        - source: ${target.dir}/usr/local/bin/argocd-image-updater
          target: /usr/local/bin/argocd-image-updater
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/argocd-image-updater
          target: /opt/docker/sbom/argocd-image-updater
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/awscli:2.35.11-debian13@sha256:816004f78444d30a76befd0a394a12597a33ba0bf8826fd7d7438f054c4134d4
      includes:
        - opt/aws-cli
        - opt/docker/sbom/awscli
      uid: 0
      gid: 0
accounts:
  run-as: "1000"
  users:
    - name: argocd
      uid: 1000
      gid: 1000
  groups:
    - name: argocd
      gid: 1000
      members:
        - argocd
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  AWS_CLI_VERSION: 2.35.11
  PATH: /opt/aws-cli/bin:/usr/sbin:/sbin:/usr/bin:/bin
paths:
  - type: directory
    path: /app/config
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: symlink
    path: /manager
    uid: 0
    gid: 0
    source: /usr/local/bin/argocd-image-updater
annotations:
  org.opencontainers.image.description: A minimal Argo CD Image Updater image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/tini
  - --
  - /manager
ports:
  - 8081/tcp
