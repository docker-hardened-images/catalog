# syntax=dhi.io/build:2-debian13

name: Selenium Hub 4.x (dev)
image: dhi.io/selenium-hub
variant: dev
tags:
  - 4-dev
  - 4.44-dev
  - 4.44.0-dev
  - 4-debian-dev
  - 4-debian13-dev
  - 4.44-debian-dev
  - 4.44-debian13-dev
  - 4.44.0-debian-dev
  - 4.44.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2021-10-13"
vars:
  BAZEL_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "arm64" }'
  BAZEL_VERSION: 9.0.1
  COMMIT_SHA: da2039bd1456a161d0c284de16f9f4f179f1e8ca
  JRE_PATH: /opt/java/openjdk/21-jre
  JRE_REFERENCE: dhi/eclipse-temurin:21.0.11.10-debian13@sha256:800bdc5077c5bbb1c8bfd6fb3c6009279c6d6502b802be53f7f89b49189d8552
  SEMVER_MAJOR_MINOR_VERSION: "4.44"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.44.0
  VERSION: 4.44.0
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: selenium-server
      work-dir: ${source.dir}/selenium
      caches:
        - path: /bazel-disk-cache
        - path: /bazel-repo-cache
      contents:
        packages:
          - bash
          - build-essential
          - ca-certificates
          - coreutils
          - curl
          - findutils
          - git
          - python3
          - unzip
          - zip
        files:
          - url: git+https://github.com/SeleniumHQ/selenium.git#selenium-4.44.0
            checksum: da2039bd1456a161d0c284de16f9f4f179f1e8ca
            path: ${source.dir}/selenium
            spdx:
              name: selenium
              version: 4.44.0
              packages:
                - name: selenium-server
                  purl: pkg:maven/org.seleniumhq.selenium/selenium-server@4.44.0
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://github.com/bazelbuild/bazel/releases/download/9.0.1/bazel-9.0.1-linux-${BAZEL_ARCH}
            checksum: https://github.com/bazelbuild/bazel/releases/download/9.0.1/bazel-9.0.1-linux-${BAZEL_ARCH}.sha256
            path: /opt/bazel/bin/bazel
            uid: 0
            gid: 0
            mode: "0755"
      pipeline:
        - name: build selenium-server
          privileged: true
          runs: |
            set -eux -o pipefail

            # repo1.maven.org rate-limits CI (429); mirror through Google's CDN.
            cat > /tmp/bazel-downloader.cfg << 'EOF'
            rewrite repo1\.maven\.org/maven2/(.*) maven-central.storage-download.googleapis.com/maven2/$1
            EOF

            /opt/bazel/bin/bazel \
              build \
              --experimental_downloader_config=/tmp/bazel-downloader.cfg \
              --disk_cache=/bazel-disk-cache \
              --repository_cache=/bazel-repo-cache \
              --curses=no \
              --color=no \
              --repo_env=RULES_JVM_EXTERNAL_FETCH_SOURCES=false \
              //java/src/org/openqa/selenium/grid:selenium_server_deploy.jar

            mkdir -p "${target.dir}/opt/selenium"
            cp -a \
              bazel-bin/java/src/org/openqa/selenium/grid/selenium_server_deploy.jar \
              "${target.dir}/opt/selenium/selenium-server.jar"
      outputs:
        - source: ${target.dir}/opt/selenium/selenium-server.jar
          target: /opt/selenium/selenium-server.jar
          uid: 0
          gid: 0
          mode: "0644"
        - source: /opt/docker/sbom/selenium
          target: /opt/docker/sbom/selenium
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.11.10-debian13@sha256:800bdc5077c5bbb1c8bfd6fb3c6009279c6d6502b802be53f7f89b49189d8552
      includes:
        - opt/**
        - usr/local/bin
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  CONFIG_FILE: /opt/selenium/config.toml
  DEBIAN_FRONTEND: noninteractive
  JAVA_HOME: /opt/java/openjdk/21-jre
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  SE_BIND_HOST: "false"
  SE_ENABLE_TLS: "false"
  SE_ENABLE_TRACING: "true"
  SE_HEALTHCHECK_INTERVAL: "120"
  SE_HTTPS_CERTIFICATE: /opt/selenium/secrets/tls.crt
  SE_HTTPS_PRIVATE_KEY: /opt/selenium/secrets/tls.key
  SE_HUB_PORT: "4444"
  SE_JAVA_DISABLE_HOSTNAME_VERIFICATION: "true"
  SE_JAVA_HTTPCLIENT_VERSION: HTTP_1_1
  SE_JAVA_SSL_TRUST_STORE: /opt/selenium/secrets/server.jks
  SE_JAVA_SSL_TRUST_STORE_PASSWORD: /opt/selenium/secrets/server.pass
  SE_LOG_LEVEL: INFO
  SE_OTEL_JAVA_GLOBAL_AUTOCONFIGURE_ENABLED: "true"
  SE_OTEL_SERVICE_NAME: selenium-hub
  SE_OTEL_TRACES_EXPORTER: otlp
  SE_REJECT_UNSUPPORTED_CAPS: "false"
  SE_RELAX_CHECKS: "true"
  SE_SESSION_REQUEST_TIMEOUT: "300"
  SE_SESSION_RETRY_INTERVAL: "15"
  SE_TCP_TUNNEL: "false"
paths:
  - type: file
    path: /usr/local/bin/selenium-hub
    uid: 0
    gid: 0
    mode: "0755"
    source: image/selenium-hub/bin/selenium-hub.sh
  - type: directory
    path: /opt/selenium/secrets
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /opt/selenium/logs
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Selenium Grid Hub image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/selenium-hub
ports:
  - 4442/tcp
  - 4443/tcp
  - 4444/tcp
