# syntax=dhi.io/build:2-debian13

name: Neo4j 2026.x
image: dhi.io/neo4j
variant: runtime
tags:
  - "2026"
  - "2026.03"
  - 2026.03.1
  - 2026-debian13
  - 2026.03-debian13
  - 2026.03.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x64" : "aarch64" }'
  COMMIT_SHA: ee131f556496e4f0aef355abb891170a8424ce73
  GOSU_REFERENCE: dhi/pkg-gosu:1.19-debian13@sha256:4c637ab35d0b541adbdb8d978d7ab27e070115bb32826af980814bd5da541d68
  JRE_REFERENCE: dhi/eclipse-temurin:21.0.10.7-debian13@sha256:5691e83dfdba43d0bf72a09cb793f5ac78563e7e1b76d31544c7b310a797c8aa
  MAVEN_REFERENCE: dhi/maven:3.9.14-jdk21-debian13-dev@sha256:65f448b4a08a41ada20fd50c68fe771ed60fc55a298361a69aa303f26c42bb84
  MVN_PROPS_VARIANT: stable
  NEO4J_HOME: /var/lib/neo4j
  SEMVER_MAJOR_MINOR_VERSION: "2026.03"
  SEMVER_MAJOR_VERSION: "2026"
  SEMVER_VERSION: 2026.03.1
  VERSION: 2026.03.1
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - coreutils
    - grep
    - sed
    - tini
  builds:
    - name: neo4j
      uses: dhi.io/maven:3.9.14-jdk21-debian13-dev@sha256:65f448b4a08a41ada20fd50c68fe771ed60fc55a298361a69aa303f26c42bb84
      contents:
        packages:
          - coreutils
          - tar
          - gzip
        files:
          - url: git+https://github.com/neo4j/neo4j.git#2026.03.1
            checksum: ee131f556496e4f0aef355abb891170a8424ce73
            path: ${source.dir}/neo4j
            spdx:
              name: neo4j
              version: 2026.03.1
              packages:
                - name: neo4j
                  purl: pkg:dhi/neo4j@2026.03.1
                  license: GPL-3.0
            uid: 0
            gid: 0
          - url: git+https://github.com/neo4j/docker-neo4j-publish#master
            path: ${source.dir}/docker-neo4j-publish
            spdx:
              name: docker-neo4j-publish
              version: 2026.03.1
              packages:
                - name: docker-neo4j-publish
                  purl: pkg:dhi/docker-neo4j-publish@2026.03.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: copy startup scripts
          work-dir: ${source.dir}/docker-neo4j-publish
          runs: |
            set -eux -o pipefail

            cp -R 2026.03.1/bullseye/community/local-package ${target.dir}/startup
        - name: patch entrypoint to use gosu instead of su-exec
          work-dir: ${target.dir}/startup
          runs: |
            set -eux -o pipefail

            # Replace su-exec with gosu in docker-entrypoint.sh
            # su-exec syntax: su-exec user command args
            # gosu syntax: gosu user command args (same syntax, so simple replacement works)
            sed -i 's/su-exec/gosu/g' docker-entrypoint.sh
        - name: patch properties
          uses: mvn/patch@v1
          with:
            dependencies: ${source.dir}/patch/mvn-deps-stable.json
            dependencies-key: dependencyManagement.dependencies
            mvn-root: ${source.dir}/neo4j
            properties: ${source.dir}/patch/mvn-properties-stable.json
        - name: build
          work-dir: ${source.dir}/neo4j
          privileged: true
          runs: |
            set -eux -o pipefail

            # Set platform-specific Maven properties
            if [ "${ARCH}" = "aarch64" ]; then
              export MAVEN_OPTS="-Dos.arch=aarch64 -Dos.name=Linux -Dos.version=arm64"
              export JAVA_OPTS="-Dos.arch=aarch64"
            fi

            # Set release version (source pom.xml uses SNAPSHOT versioning)
            mvn versions:set -DnewVersion=2026.03.1 -DgenerateBackupPoms=false -q

            mvn clean install -DskipTests -Doverwrite=true
        - name: install
          work-dir: ${source.dir}/neo4j
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/var/lib/neo4j
            TARFILE=$(find packaging/standalone/target -name "neo4j-community-*-unix.tar.gz")
            tar -xzf ${TARFILE} -C ${target.dir}/var/lib/neo4j --strip-components=1
      paths:
        - type: file
          path: /src/patch/mvn-properties-stable.json
          uid: 0
          gid: 0
          source: image/neo4j/patch/mvn-properties-stable.json
        - type: file
          path: /src/patch/mvn-deps-stable.json
          uid: 0
          gid: 0
          source: image/neo4j/patch/mvn-deps-stable.json
      outputs:
        - source: ${target.dir}/var/lib/neo4j
          target: /var/lib/neo4j
          uid: 7474
          gid: 7474
          mode: "0744"
        - source: ${target.dir}/startup
          target: /startup
          uid: 0
          gid: 0
        - source: ${target.dir}/startup/docker-entrypoint.sh
          target: /usr/local/bin/docker-entrypoint.sh
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/neo4j
          target: /opt/docker/sbom/neo4j
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.10.7-debian13@sha256:5691e83dfdba43d0bf72a09cb793f5ac78563e7e1b76d31544c7b310a797c8aa
      includes:
        - opt/**
      uid: 0
      gid: 0
    - name: dhi.io/pkg-gosu:1.19-debian13@sha256:4c637ab35d0b541adbdb8d978d7ab27e070115bb32826af980814bd5da541d68
      includes:
        - opt/docker/sbom/gosu
        - usr/local/sbin/gosu
      uid: 0
      gid: 0
accounts:
  run-as: neo4j
  users:
    - name: neo4j
      uid: 7474
      gid: 7474
  groups:
    - name: neo4j
      gid: 7474
      members:
        - neo4j
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  NEO4J_EDITION: community
  NEO4J_HOME: /var/lib/neo4j
  PATH: /usr/local/sbin:/var/lib/neo4j/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: symlink
    path: /data
    uid: 7474
    gid: 7474
    source: /var/lib/neo4j/data
  - type: symlink
    path: /logs
    uid: 7474
    gid: 7474
    source: /var/lib/neo4j/logs
annotations:
  org.opencontainers.image.description: A minimal Neo4j image
  org.opencontainers.image.licenses: GPL-3.0
entrypoint:
  - /usr/bin/tini
  - -g
  - --
  - /startup/docker-entrypoint.sh
cmd:
  - neo4j
ports:
  - 7473/tcp
  - 7474/tcp
  - 7687/tcp
