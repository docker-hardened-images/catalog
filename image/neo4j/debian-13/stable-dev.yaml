name: Neo4j 2026.x (dev)
image: dhi.io/neo4j
variant: dev
tags:
  - 2026-dev
  - 2026.02-dev
  - 2026.02.3-dev
  - 2026-debian13-dev
  - 2026.02-debian13-dev
  - 2026.02.3-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x64" : "aarch64" }'
  COMMIT_SHA: 362648c4de7ebb39ea88a5fb8da72f4d674ed0bd
  DEBIAN_REFERENCE: dhi/debian-base:trixie-debian13@sha256:75eec9a1a76a02ddf88761684efd9a72de6a5ec2c5d1abd002c03a475d5d23b7
  GOSU_REFERENCE: dhi/pkg-gosu:1.19-debian13@sha256:97555de7353b25917cd06d4794734916011285cf5a9a2cd201a7b998619f626e
  JRE_REFERENCE: dhi/eclipse-temurin:21.0.10.7-debian13@sha256:c23e635c723671b7283df738f813938b5f0683e5d1987d128130f13373c250b8
  MAVEN_REFERENCE: dhi/maven:3.9.14-jdk21-debian13-dev@sha256:cc59f0d9df92b37861a1269db1184362f6ff47e3d24f7bfac25004de1c5a5875
  MVN_PROPS_VARIANT: stable
  NEO4J_HOME: /var/lib/neo4j
  SEMVER_MAJOR_MINOR_VERSION: "2026.02"
  SEMVER_MAJOR_VERSION: "2026"
  SEMVER_VERSION: 2026.02.3
  VERSION: 2026.02.3
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tini
    - util-linux
  builds:
    - name: neo4j
      uses: dhi.io/maven:3.9.14-jdk21-debian13-dev@sha256:cc59f0d9df92b37861a1269db1184362f6ff47e3d24f7bfac25004de1c5a5875
      contents:
        packages:
          - coreutils
          - tar
          - gzip
        files:
          - url: git+https://github.com/neo4j/neo4j.git#2026.02.3
            checksum: 362648c4de7ebb39ea88a5fb8da72f4d674ed0bd
            path: ${source.dir}/neo4j
            spdx:
              name: neo4j
              version: 2026.02.3
              packages:
                - name: neo4j
                  purl: pkg:dhi/neo4j@2026.02.3
                  license: GPL-3.0
            uid: 0
            gid: 0
          - url: git+https://github.com/neo4j/docker-neo4j-publish#master
            path: ${source.dir}/docker-neo4j-publish
            spdx:
              name: docker-neo4j-publish
              version: 2026.02.3
              packages:
                - name: docker-neo4j-publish
                  purl: pkg:dhi/docker-neo4j-publish@2026.02.3
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: copy startup scripts
          work-dir: ${source.dir}/docker-neo4j-publish
          runs: |
            set -eux -o pipefail

            cp -R 2026.02.3/bullseye/community/local-package ${target.dir}/startup
        - name: patch entrypoint to use gosu instead of su-exec
          work-dir: ${target.dir}/startup
          runs: |
            set -eux -o pipefail

            # Replace su-exec with gosu in docker-entrypoint.sh
            # su-exec syntax: su-exec user command args
            # gosu syntax: gosu user command args (same syntax, so simple replacement works)
            sed -i 's/su-exec/gosu/g' docker-entrypoint.sh
        - name: patch properties
          uses: mvn/patch@v1
          with:
            dependencies: ${source.dir}/patch/mvn-deps-stable.json
            dependencies-key: dependencyManagement.dependencies
            mvn-root: ${source.dir}/neo4j
            properties: ${source.dir}/patch/mvn-properties-stable.json
        - name: build
          work-dir: ${source.dir}/neo4j
          privileged: true
          runs: |
            set -eux -o pipefail

            # Set platform-specific Maven properties
            if [ "${ARCH}" = "aarch64" ]; then
              export MAVEN_OPTS="-Dos.arch=aarch64 -Dos.name=Linux -Dos.version=arm64"
              export JAVA_OPTS="-Dos.arch=aarch64"
            fi

            # Set release version (source pom.xml uses SNAPSHOT versioning)
            mvn versions:set -DnewVersion=2026.02.3 -DgenerateBackupPoms=false -q

            mvn clean install -DskipTests -Doverwrite=true
        - name: install
          work-dir: ${source.dir}/neo4j
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/var/lib/neo4j
            TARFILE=$(find packaging/standalone/target -name "neo4j-community-*-unix.tar.gz")
            tar -xzf ${TARFILE} -C ${target.dir}/var/lib/neo4j --strip-components=1
      paths:
        - type: file
          path: /src/patch/mvn-properties-stable.json
          uid: 0
          gid: 0
          source: image/neo4j/patch/mvn-properties-stable.json
        - type: file
          path: /src/patch/mvn-deps-stable.json
          uid: 0
          gid: 0
          source: image/neo4j/patch/mvn-deps-stable.json
      outputs:
        - source: ${target.dir}/var/lib/neo4j
          target: /var/lib/neo4j
          uid: 7474
          gid: 7474
          mode: "0744"
        - source: ${target.dir}/startup
          target: /startup
          uid: 0
          gid: 0
        - source: ${target.dir}/startup/docker-entrypoint.sh
          target: /usr/local/bin/docker-entrypoint.sh
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/neo4j
          target: /opt/docker/sbom/neo4j
          uid: 0
          gid: 0
    - name: locale
      uses: dhi.io/debian-base:trixie-debian13@sha256:75eec9a1a76a02ddf88761684efd9a72de6a5ec2c5d1abd002c03a475d5d23b7
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.10.7-debian13@sha256:c23e635c723671b7283df738f813938b5f0683e5d1987d128130f13373c250b8
      includes:
        - opt/**
      uid: 0
      gid: 0
    - name: dhi.io/pkg-gosu:1.19-debian13@sha256:97555de7353b25917cd06d4794734916011285cf5a9a2cd201a7b998619f626e
      includes:
        - opt/docker/sbom/gosu
        - usr/local/sbin/gosu
      uid: 0
      gid: 0
accounts:
