# syntax=dhi.io/build:2-debian13

name: Polaris 10.x (compat)
image: dhi.io/polaris
variant: runtime
flavor: compat
tags:
  - 10-compat
  - 10.1-compat
  - 10.1.8-compat
  - 10-debian-compat
  - 10-debian13-compat
  - 10.1-debian-compat
  - 10.1-debian13-compat
  - 10.1.8-debian-compat
  - 10.1.8-debian13-compat
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 9dfb4262e6c52fa870940a544c6fb1cad1dd4a0e
  SEMVER_MAJOR_MINOR_VERSION: "10.1"
  SEMVER_MAJOR_VERSION: "10"
  SEMVER_VERSION: 10.1.8
  VERSION: 10.1.8
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - findutils
    - grep
    - procps
    - tzdata
  builds:
    - name: polaris
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/fairwindsops/polaris.git#10.1.8
            checksum: 9dfb4262e6c52fa870940a544c6fb1cad1dd4a0e
            path: /go/src/github.com/fairwindsops/polaris
            spdx:
              name: polaris
              version: 10.1.8
              packages:
                - name: polaris
                  purl: pkg:golang/github.com/fairwindsops/polaris@10.1.8
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/fairwindsops/polaris
          with:
            deps:
              - golang.org/x/text@v0.39.0
              - golang.org/x/net@v0.56.0
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/fairwindsops/polaris
          with:
            ldflags:
              - -s -w
              - -X main.Version=10.1.8
              - -X main.Commit=9dfb4262e6c52fa870940a544c6fb1cad1dd4a0e
              - -X main.buildDate=$(date -d @${SOURCE_DATE_EPOCH} +'%F-%T')
            output: ${target.dir}/usr/local/bin/polaris
            packages: main.go
      outputs:
        - source: ${target.dir}/usr/local/bin/polaris
          target: /usr/local/bin/polaris
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/polaris
          target: /opt/docker/sbom/polaris
          uid: 0
          gid: 0
accounts:
  run-as: "1200"
  users:
    - name: polaris
      uid: 1200
      gid: 101
  groups:
    - name: polaris
      gid: 101
      members:
        - polaris
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Polaris image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - polaris
