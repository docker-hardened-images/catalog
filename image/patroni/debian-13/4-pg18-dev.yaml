  PATH: /opt/patroni/bin:/opt/postgresql/18/bin:/opt/python/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  PATRONI_POSTGRESQL_DATA_DIR: /var/lib/postgresql/18/data
  PG_MAJOR: "18"
  PGDATA: /var/lib/postgresql/18/data
  PYTHONPATH: /opt/patroni/lib/python3.13/site-packages
paths:
