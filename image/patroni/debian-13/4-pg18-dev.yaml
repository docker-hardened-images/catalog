        - etc/os-release
        - var/lib/dpkg/status
      uid: 0
      gid: 0
    - name: dhi.io/pkg-gosu:1.19-debian13@sha256:fc41f434294f5397fed2c3a2437604e46e54217b53f25425cc734e54a63e9a91
      includes:
        - opt/docker/sbom/gosu
        - usr/local/sbin/gosu
      uid: 0
      gid: 0
accounts:
