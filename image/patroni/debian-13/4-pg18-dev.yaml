    path: /var/lib/postgresql/18/data
    uid: 70
    gid: 70
    mode: "0700"
  - type: directory
    path: /etc/patroni
    uid: 70
    gid: 70
    mode: "0755"
  - type: directory
    path: /run/postgresql
    uid: 70
    gid: 70
    mode: "0755"
  - type: file
    path: /usr/local/bin/docker-entrypoint.sh
    uid: 0
    gid: 0
    mode: "0755"
    source: image/patroni/bin/docker-entrypoint.sh
annotations:
  org.opencontainers.image.description: A minimal Patroni image
  org.opencontainers.image.licenses: MIT
entrypoint:
