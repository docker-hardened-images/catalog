contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - ca-certificates
    - libgssapi-krb5-2
    - libicu76
    - libldap2
    - liblz4-1
    - libpam0g
    - libpq5
    - libreadline8t64
    - libselinux1
    - libssl3t64
    - libxml2
    - libxslt1.1
    - libzstd1
    - locales
    - tzdata
    - zlib1g
  builds:
    - name: patroni
      uses: dhi.io/python:3.13.14-debian13-dev@sha256:404f6874dca8bc3608956442dfc689fabfdf1ba6669c8676c72a27563482a238
      work-dir: ${source.dir}/patroni
      caches:
        - path: /root/.cache/pip
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - curl
          - dpkg
          - findutils
          - libpq-dev
        files:
          - url: git+https://github.com/patroni/patroni.git#v4.1.4
            checksum: d701f7b9c3d7e8cb400092d30170ff507697bce9
            path: ${source.dir}/patroni
            spdx:
              name: patroni
              version: 4.1.4
              packages:
                - name: patroni
                  purl: pkg:pypi/patroni@4.1.4
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: install patroni
          privileged: true
          runs: |
            set -eux -o pipefail

            pip install \
              --prefix ${target.dir}/opt/patroni \
              ".[etcd3,kubernetes]" \
              "psycopg[c]>=3.0"
      outputs:
        - source: ${target.dir}/opt/patroni
          target: /opt/patroni
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/patroni
          target: /opt/docker/sbom/patroni
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.13.14-debian13@sha256:1842a6b9ce76177a8df5b5c9dbde6e0be15bfc317055d66b340ae5d8eada6470
      includes:
