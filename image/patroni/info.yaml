metadata:
  display-name: Patroni
  short-description: A template for PostgreSQL High Availability with Etcd, Consul, ZooKeeper, or Kubernetes.
  featured: false
  home-url: https://github.com/patroni/patroni
  categories:
    - databases-and-storage
  included-tools:
    - name: patroni
      description: PostgreSQL HA daemon that manages a Postgres instance and elects a leader via the configured DCS.
    - name: patronictl
      description: Command-line client for inspecting and controlling a Patroni cluster (list members, failover, switchover, reload, restart).
