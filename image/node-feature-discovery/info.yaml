metadata:
  display-name: Node Feature Discovery
  short-description: Node feature discovery for Kubernetes.
  featured: false
  home-url: https://github.com/kubernetes-sigs/node-feature-discovery
  categories:
    - monitoring-and-observability
  included-tools:
    - name: nfd-master
      description: Node Feature Discovery control-plane binary.
    - name: nfd-worker
      description: Node Feature Discovery node worker binary.
    - name: nfd-topology-updater
      description: Publishes node resource topology information.
    - name: nfd-gc
      description: Garbage collector for Node Feature Discovery resources.
    - name: kubectl-nfd
      description: kubectl plugin for Node Feature Discovery.
    - name: nfd
      description: Node Feature Discovery client utility.
