            tags: osusergo,netgo
        - name: build nfd-topology-updater
          uses: go/build@v1
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -extldflags=-static
              - -X sigs.k8s.io/node-feature-discovery/pkg/version.version=v0.18.3
              - -X sigs.k8s.io/node-feature-discovery/pkg/utils/hostpath.pathPrefix=/
            output: ${target.dir}/usr/local/bin/nfd-topology-updater
            packages: ./cmd/nfd-topology-updater
            tags: osusergo,netgo
        - name: build nfd-gc
          uses: go/build@v1
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -extldflags=-static
              - -X sigs.k8s.io/node-feature-discovery/pkg/version.version=v0.18.3
              - -X sigs.k8s.io/node-feature-discovery/pkg/utils/hostpath.pathPrefix=/
            output: ${target.dir}/usr/local/bin/nfd-gc
            packages: ./cmd/nfd-gc
            tags: osusergo,netgo
        - name: build kubectl-nfd
          uses: go/build@v1
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -extldflags=-static
              - -X sigs.k8s.io/node-feature-discovery/pkg/version.version=v0.18.3
              - -X sigs.k8s.io/node-feature-discovery/pkg/utils/hostpath.pathPrefix=/
            output: ${target.dir}/usr/local/bin/kubectl-nfd
            packages: ./cmd/kubectl-nfd
            tags: osusergo,netgo
        - name: build nfd
          uses: go/build@v1
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -extldflags=-static
              - -X sigs.k8s.io/node-feature-discovery/pkg/version.version=v0.18.3
              - -X sigs.k8s.io/node-feature-discovery/pkg/utils/hostpath.pathPrefix=/
            output: ${target.dir}/usr/local/bin/nfd
            packages: ./cmd/nfd
            tags: osusergo,netgo
