              - go.opentelemetry.io/otel/sdk@v1.43.0
              - k8s.io/kubernetes@v1.34.2
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=1 go test ./pkg/version ./pkg/utils/hostpath ./source/cpu
        - name: build nfd-master
          uses: go/build@v1
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -extldflags=-static
              - -X sigs.k8s.io/node-feature-discovery/pkg/version.version=v0.18.3
              - -X sigs.k8s.io/node-feature-discovery/pkg/utils/hostpath.pathPrefix=/
            output: ${target.dir}/usr/local/bin/nfd-master
            packages: ./cmd/nfd-master
            tags: osusergo,netgo
        - name: build nfd-worker
          uses: go/build@v1
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -extldflags=-static
              - -X sigs.k8s.io/node-feature-discovery/pkg/version.version=v0.18.3
              - -X sigs.k8s.io/node-feature-discovery/pkg/utils/hostpath.pathPrefix=/
