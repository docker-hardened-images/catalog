          - url: git+https://github.com/kubernetes-sigs/node-feature-discovery.git#v0.18.3
            checksum: f39ef6267b20ddeb79e717940b71bb98979c49a0
            path: /go/src/sigs.k8s.io/node-feature-discovery
            spdx:
              name: node-feature-discovery
