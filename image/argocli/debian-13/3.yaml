# syntax=dhi.io/build:2-debian13

name: Argo CLI 3.7.x
image: dhi.io/argocli
variant: runtime
tags:
  - "3"
  - "3.7"
  - 3.7.17
  - 3-debian
  - 3-debian13
  - 3.7-debian
  - 3.7-debian13
  - 3.7.17-debian
  - 3.7.17-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: a75ff7d6ab50d1c80affc8895cdce89679741d7c
  MODULE_MAJOR_VERSION: v3
  SEMVER_MAJOR_MINOR_VERSION: "3.7"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.7.17
  VERSION: 3.7.17
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: argocli
      work-dir: /go/src/github.com/argoproj/argo-workflows
      contents:
        packages:
          - base-files
          - bash
          - ca-certificates
          - ca-certificates-bundle
          - coreutils
          - findutils
          - git
          - golang-1.26
          - libc6
          - libstdc++6
          - mawk
          - node-corepack
          - nodejs-24
          - npm
          - sed
          - yarn-classic
        files:
          - url: git+https://github.com/argoproj/argo-workflows.git#v3.7.17
            checksum: a75ff7d6ab50d1c80affc8895cdce89679741d7c
            path: /go/src/github.com/argoproj/argo-workflows
            spdx:
              name: argocli
              version: 3.7.17
              packages:
                - name: argocli
                  purl: pkg:golang/github.com/argoproj/argo-workflows@3.7.17
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v2
          with:
            deps:
              - github.com/cloudflare/circl@v1.6.3
              - github.com/expr-lang/expr@v1.17.7
              - github.com/go-git/go-git/v5@v5.19.1
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
            tidy: true
        - uses: go/hermetic@v1
        - name: test
          runs: |
            set -eux -o pipefail

            echo "Testing core functionality after patching..."

            # Test core workflow functionality
            go test -v -count=1 -timeout=3m ./workflow/validate -run="TestDAG"
            go test -v -count=1 -timeout=3m ./workflow/common

            # Test all util packages except telemetry (which fails due to network requirements)
            UTIL_PACKAGES=$(go list ./util/... | grep -v './util/telemetry')
            go test -v -count=1 -timeout=4m $UTIL_PACKAGES
        - name: build ui
          work-dir: /go/src/github.com/argoproj/argo-workflows/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            export JOBS=max
            yarn install --network-timeout 1000000

            export YARN_CACHE_FOLDER=/root/.yarn
            export NODE_OPTIONS="--max-old-space-size=2048"
            yarn build
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/argoproj/argo-workflows/v3.version=3.7.17
              - -X github.com/argoproj/argo-workflows/v3.gitCommit=a75ff7d6ab50d1c80affc8895cdce89679741d7c
            output: ${target.dir}/usr/local/bin/argo
            packages: ./cmd/argo
      outputs:
        - source: ${target.dir}/usr/local/bin/argo
          target: /usr/local/bin/argo
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/argocli
          target: /opt/docker/sbom/argocli
          uid: 0
          gid: 0
accounts:
  run-as: argocli
  users:
    - name: argocli
      uid: 8737
      gid: 8737
  groups:
    - name: argocli
      gid: 8737
      members:
        - argocli
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Argo CLI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - argo
