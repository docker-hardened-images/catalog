  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: hubble-relay
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/cilium/cilium.git#v1.19.5
            checksum: 20eaccfef029cb046d70219717fb6dbbdf27a59f
            path: /go/src/github.com/cilium/cilium
            spdx:
              name: hubble-relay
              version: 1.19.5
              packages:
                - name: hubble-relay
                  purl: pkg:golang/github.com/cilium/cilium@1.19.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: remove vendor directory
          work-dir: /go/src/github.com/cilium/cilium
          runs: |
            set -eux -o pipefail

            rm -rf vendor
        - name: patch
          uses: go/bump@v1
          work-dir: /go/src/github.com/cilium/cilium/hubble-relay
          with:
            deps:
              - golang.org/x/sys@v0.45.0
              - go.mongodb.org/mongo-driver@v1.17.7
              - go.opentelemetry.io/otel@v1.41.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: test
          work-dir: /go/src/github.com/cilium/cilium/hubble-relay
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -v ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/cilium/cilium/hubble-relay
          with:
            ldflags:
              - -X github.com/cilium/cilium/pkg/version.ciliumVersion=v1.19.5
            output: ${target.dir}/usr/local/bin/hubble-relay
            tags:
              - osusergo
      outputs:
        - source: ${target.dir}/usr/local/bin/hubble-relay
          target: /usr/local/bin/hubble-relay
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/hubble-relay
          target: /opt/docker/sbom/hubble-relay
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/pkg-gops:0.3.29-debian13@sha256:e347a47b6653c6e80c8c63ac594a39d1192d7079551fa5b3434fb3e7d2ffbca0
