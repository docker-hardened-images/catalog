# syntax=dhi.io/build:2-debian13

name: Tempo Query 3.x
image: dhi.io/tempo-query
variant: runtime
tags:
  - "3"
  - "3.0"
  - 3.0.2
  - 3-debian
  - 3-debian13
  - 3.0-debian
  - 3.0-debian13
  - 3.0.2-debian
  - 3.0.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-28"
vars:
  COMMIT_SHA: 0c4b926d09234186de39833e9c7ecb5b7614c8b9
  SEMVER_MAJOR_MINOR_VERSION: "3.0"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.0.2
  VERSION: 3.0.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: tempo-query
      work-dir: /go/src/github.com/grafana/tempo
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/grafana/tempo.git#v3.0.2
            checksum: 0c4b926d09234186de39833e9c7ecb5b7614c8b9
            path: /go/src/github.com/grafana/tempo
            spdx:
              name: tempo
              version: 3.0.2
              packages:
                - name: tempo
                  purl: pkg:golang/github.com/grafana/tempo@v3.0.2
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - github.com/apache/thrift@v0.23.0
            download: true
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X main.Version=v3.0.2
              - -X main.Branch=3.0.2
              - -X main.Revision=0c4b926d09234186de39833e9c7ecb5b7614c8b9
            output: ${target.dir}/opt/tempo-query/tempo-query
            packages: ./cmd/tempo-query
      outputs:
        - source: ${target.dir}/opt/tempo-query
          target: /opt/tempo-query
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/tempo
          target: /opt/docker/sbom/tempo
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Grafana Tempo Query (Jaeger storage plugin) image
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - /opt/tempo-query/tempo-query
ports:
  - 7777/tcp
