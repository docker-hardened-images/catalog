# syntax=dhi.io/build:2-debian13

name: Tempo Query 2.x (dev)
image: dhi.io/tempo-query
variant: dev
tags:
  - 2-dev
  - 2.10-dev
  - 2.10.7-dev
  - 2-debian-dev
  - 2-debian13-dev
  - 2.10-debian-dev
  - 2.10-debian13-dev
  - 2.10.7-debian-dev
  - 2.10.7-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 8100f5a7b8f0986edf1fcd2ff6552d174b25ec18
  SEMVER_MAJOR_MINOR_VERSION: "2.10"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.10.7
  VERSION: 2.10.7
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: tempo-query
      work-dir: /go/src/github.com/grafana/tempo
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/grafana/tempo.git#v2.10.7
            checksum: 8100f5a7b8f0986edf1fcd2ff6552d174b25ec18
            path: /go/src/github.com/grafana/tempo
            spdx:
              name: tempo
              version: 2.10.7
              packages:
                - name: tempo
                  purl: pkg:golang/github.com/grafana/tempo@v2.10.7
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - github.com/apache/thrift@v0.23.0
            download: true
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X main.Version=v2.10.7
              - -X main.Branch=2.10.7
              - -X main.Revision=8100f5a7b8f0986edf1fcd2ff6552d174b25ec18
            output: ${target.dir}/opt/tempo-query/tempo-query
            packages: ./cmd/tempo-query
      outputs:
        - source: ${target.dir}/opt/tempo-query
          target: /opt/tempo-query
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/tempo
          target: /opt/docker/sbom/tempo
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Grafana Tempo Query (Jaeger storage plugin) image
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - /opt/tempo-query/tempo-query
ports:
  - 7777/tcp
