# syntax=dhi.io/build:2-debian13

name: JMX Exporter 1.x
image: dhi.io/jmx-exporter
variant: runtime
tags:
  - "1"
  - "1.6"
  - 1.6.0
  - 1-debian
  - 1-debian13
  - 1.6-debian
  - 1.6-debian13
  - 1.6.0-debian
  - 1.6.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 3a7e22607bf069cdb6c78f76553b5d3259a91bd2
  JAVA_FIPS_SUFFIX: ""
  JAVA_VARIANT: jre
  JDK_MAJOR_VERSION: "21"
  MAVEN_REFERENCE: dhi/maven:3.9.11-jdk23-debian13-dev@sha256:97e4283d662a0a0dd680bc67c7cfa519d9cf6ef21567f0a727d050a760df3ff8
  SEMVER_MAJOR_MINOR_VERSION: "1.6"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.6.0
  VERSION: v1.6.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - ca-certificates
    - eclipse-temurin-21-jre
    - eclipse-temurin-21-jre-oci-config
    - libstdc++6
  builds:
    - name: jmx-exporter
      uses: dhi.io/maven:3.9.11-jdk23-debian13-dev@sha256:97e4283d662a0a0dd680bc67c7cfa519d9cf6ef21567f0a727d050a760df3ff8
      contents:
        packages:
          - coreutils
          - tar
          - unzip
          - wget
          - xmlstarlet
        files:
          - url: git+https://github.com/prometheus/jmx_exporter.git#v1.6.0
            checksum: 3a7e22607bf069cdb6c78f76553b5d3259a91bd2
            path: ${source.dir}/jmx-exporter-3a7e22607bf069cdb6c78f76553b5d3259a91bd2
            spdx:
              name: jmx-exporter
              version: 1.6.0
              packages:
                - name: jmx-exporter
                  purl: pkg:dhi/jmx-exporter@1.6.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: build
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            cd "${source.dir}/jmx-exporter-3a7e22607bf069cdb6c78f76553b5d3259a91bd2"

            mvn -B versions:set -DnewVersion="v1.6.0" -DprocessAllModules
            mvn -B clean package -Dmaven.test.skip=true

            mkdir -p /opt/jmx-exporter
            cp jmx_prometheus_javaagent/target/jmx_prometheus_javaagent-v1.6.0.jar /opt/jmx-exporter/jmx_prometheus_javaagent.jar
            cp jmx_prometheus_standalone/target/jmx_prometheus_standalone-v1.6.0.jar /opt/jmx-exporter/jmx_prometheus_standalone.jar
        - name: copy examples
          runs: |
            set -eux -o pipefail

            cp -r "${source.dir}/jmx-exporter-3a7e22607bf069cdb6c78f76553b5d3259a91bd2/examples" /opt/jmx-exporter
        - name: copy jars for sbom
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            cd "${source.dir}/jmx-exporter-3a7e22607bf069cdb6c78f76553b5d3259a91bd2"

            # maven-shade-plugin is incorrectly scoped as "compile" which causes it and its transitive dependencies to
            # be considered necessary for running the application.
            # Upstream works around this bug by explicitly excluding it from the uber jar, but that doesn't fix the
            # underlying issue, so copy-dependencies will still include them.
            # We fix the issue directly by correcting the scope to "test".
            xmlstarlet ed -L -N m="http://maven.apache.org/POM/4.0.0" \
              -u "//m:dependency[m:groupId='org.apache.maven.plugins' and m:artifactId='maven-shade-plugin']/m:scope" \
              -v "test" pom.xml

            # Install the local dependencies so that copy-dependencies will find them.
            mvn install -pl collector,jmx_prometheus_common -Dmaven.test.skip=true

            mkdir -p "${source.dir}/jmx-exporter-3a7e22607bf069cdb6c78f76553b5d3259a91bd2-deps"
            mvn dependency:copy-dependencies \
              -pl collector,jmx_prometheus_common,jmx_prometheus_javaagent,jmx_prometheus_standalone \
              -DincludeScope=runtime \
              -DoutputDirectory="${source.dir}/jmx-exporter-3a7e22607bf069cdb6c78f76553b5d3259a91bd2-deps"
        - name: maven sbom
          uses: sbom@v1
          with:
            extra-scanners: java-archive-cataloger
            prefix: jmx-exporter-maven
            source: ${source.dir}/jmx-exporter-3a7e22607bf069cdb6c78f76553b5d3259a91bd2-deps
      outputs:
        - source: /opt/jmx-exporter
          target: /opt/jmx-exporter
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/jmx-exporter
          target: /opt/docker/sbom/jmx-exporter
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/jmx-exporter-maven
          target: /opt/docker/sbom/jmx-exporter-maven
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /opt/jmx-exporter
environment:
  JAVA_HOME: /usr/lib/jvm/temurin-21
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
annotations:
  org.opencontainers.image.description: A minimal JMX Exporter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - java
  - -jar
  - jmx_prometheus_standalone.jar
cmd:
