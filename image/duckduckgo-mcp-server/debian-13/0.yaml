# syntax=dhi.io/build:2-debian13

name: DuckDuckGo MCP Server 0.x
image: dhi.io/duckduckgo-mcp-server
variant: runtime
tags:
  - "0"
  - "0.4"
  - 0.4.0
  - latest
  - 0-debian
  - 0-debian13
  - 0.4-debian
  - 0.4-debian13
  - 0.4.0-debian
  - 0.4.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-08"
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  COMMIT_SHA: 959bb84c3f6a08b17a009254883ab6ea8785a131
  PYTHON_DEV_REFERENCE: dhi/python:3.14.5-debian13-sfw-dev@sha256:caca2d137d6c71608471c534b7316abee1224e5327b7a5391331f7a930c9d7f0
  SEMVER_MAJOR_MINOR_VERSION: "0.4"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.4.0
  UV_VERSION: 0.11.18
  VERSION: 0.4.0
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: duckduckgo-mcp-server
      uses: dhi.io/python:3.14.5-debian13-sfw-dev@sha256:caca2d137d6c71608471c534b7316abee1224e5327b7a5391331f7a930c9d7f0
      environment:
        UV_COMPILE_BYTECODE: "1"
      contents:
        packages:
          - gzip
          - tar
        files:
          - url: https://github.com/astral-sh/uv/releases/download/0.11.18/uv-${ARCH}-unknown-linux-gnu.tar.gz
            path: ${source.dir}/uv-unknown-linux-gnu.tar.gz
            spdx:
              name: uv
              version: 0.11.18
              packages:
                - name: uv
                  purl: pkg:github/astral-sh/uv@0.11.18
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: git+https://github.com/nickclyde/duckduckgo-mcp-server.git#v0.4.0
            checksum: 959bb84c3f6a08b17a009254883ab6ea8785a131
            path: ${source.dir}/duckduckgo-mcp-server
            spdx:
              name: duckduckgo-mcp-server
              version: 0.4.0
              packages:
                - name: duckduckgo-mcp-server
                  purl: pkg:dhi/duckduckgo-mcp-server@0.4.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: setup uv
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            tar -xzf "${source.dir}/uv-unknown-linux-gnu.tar.gz" -C /usr/local/bin --strip-components=1
            chmod +x /usr/local/bin/uv
        - name: move source to /app
          runs: |
            set -eux -o pipefail

            cp -r "${source.dir}/duckduckgo-mcp-server" /app
        - name: build python package
          work-dir: /app
          privileged: true
          runs: |
            set -eux -o pipefail

            rm -f .python-version

            sfw uv lock --upgrade
            sfw uv sync --locked --no-install-project --no-dev --no-editable
            sfw uv sync --locked --no-dev --no-editable
      outputs:
        - source: /app/.venv
          target: /app/.venv
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/duckduckgo-mcp-server
          target: /opt/docker/sbom/duckduckgo-mcp-server
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.14.5-debian13-sfw-dev@sha256:caca2d137d6c71608471c534b7316abee1224e5327b7a5391331f7a930c9d7f0
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  PATH: /app/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
annotations:
  org.opencontainers.image.description: A minimal DuckDuckGo MCP Server image
  org.opencontainers.image.licenses: MIT
labels:
  io.modelcontextprotocol.server.name: io.github.nickclyde/duckduckgo-mcp-server
entrypoint:
  - duckduckgo-mcp-server
