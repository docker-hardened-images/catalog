# syntax=dhi.io/build:2-debian13

name: Hyperledger Fabric Tools 3.x
image: dhi.io/hyperledger-fabric-tools
variant: runtime
tags:
  - "3"
  - "3.1"
  - 3.1.5
  - 3-debian
  - 3-debian13
  - 3.1-debian
  - 3.1-debian13
  - 3.1.5-debian
  - 3.1.5-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 86c1172bec37e6590c6b1ae6f847833df48d65fc
  SEMVER_MAJOR_MINOR_VERSION: "3.1"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.1.5
  VERSION: 3.1.5
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: hyperledger-fabric-tools
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - findutils
          - golang-1.26
          - grep
          - mawk
          - sed
        files:
          - url: git+https://github.com/hyperledger/fabric.git#v3.1.5
            checksum: 86c1172bec37e6590c6b1ae6f847833df48d65fc
            path: /go/src/github.com/hyperledger/fabric
            spdx:
              name: hyperledger-fabric-tools
              version: 3.1.5
              packages:
                - name: hyperledger-fabric-tools
                  purl: pkg:golang/github.com/hyperledger/fabric@3.1.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/hyperledger/fabric
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/consensys/gnark-crypto@v0.20.1
        - name: test
          work-dir: /go/src/github.com/hyperledger/fabric
          runs: |
            set -eux -o pipefail

            # Exclude peer and orderer packages (not included in tools image)
            EXCLUDES='/peer|/orderer'
            PKGS=$(go list ./cmd/... | egrep -v "${EXCLUDES}")

            # Skip TestUnsuccessfulChannelTxFileCreation (test expects permission-denied error, but container has write access)
            CGO_ENABLED=0 go test -skip '^TestUnsuccessfulChannelTxFileCreation$' $PKGS
        - name: build
          work-dir: /go/src/github.com/hyperledger/fabric
          runs: |
            set -eux -o pipefail

            GOLDFLAGS="-X github.com/hyperledger/fabric/common/metadata.Version=3.1.5 \
                       -X github.com/hyperledger/fabric/common/metadata.CommitSHA=86c1172bec37e6590c6b1ae6f847833df48d65fc"

            # Build CLI tools
            for binary in configtxgen configtxlator cryptogen discover ledgerutil osnadmin; do
              CGO_ENABLED=0 go build \
                -ldflags="$GOLDFLAGS" -buildvcs=false -o "${target.dir}/usr/local/bin/$binary" ./cmd/$binary
            done
      outputs:
        - source: ${target.dir}/usr/local/bin/
          target: /usr/local/bin/
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/hyperledger-fabric-tools
          target: /opt/docker/sbom/hyperledger-fabric-tools
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Hyperledger Fabric Tools image
  org.opencontainers.image.licenses: Apache-2.0
cmd:
  - configtxgen
  - --help
