# syntax=dhi.io/build:2-debian13

name: Jaeger Ingester 2.x (dev)
image: dhi.io/jaeger-ingester
variant: dev
tags:
  - 2-dev
  - 2.19-dev
  - 2.19.0-dev
  - 2-debian-dev
  - 2-debian13-dev
  - 2.19-debian-dev
  - 2.19-debian13-dev
  - 2.19.0-debian-dev
  - 2.19.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2024-11-04"
vars:
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "2.19"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.19.0
  SUFFIX: -dev
  VERSION: 2.19.0-3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - jaeger-dev=2.19.0-3
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  files:
    - url: https://raw.githubusercontent.com/jaegertracing/jaeger/v2.19.0/cmd/jaeger/config-kafka-ingester.yaml
      checksum: sha256:9264c316b1a9ee50e7d05678f983758ac0fbf5b27954d339e45c9b854412cc5b
      path: /etc/jaeger/config-kafka-ingester.yaml
      uid: 65532
      gid: 65532
      mode: "0644"
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
  - type: symlink
    path: /usr/local/bin/jaeger-ingester
    uid: 0
    gid: 0
    source: /usr/bin/jaeger
  - type: directory
    path: /cmd/jaeger
    uid: 0
    gid: 0
  - type: symlink
    path: /cmd/jaeger/jaeger-linux
    uid: 0
    gid: 0
    source: /usr/bin/jaeger
annotations:
  org.opencontainers.image.description: A minimal Jaeger v2 ingester image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/jaeger-ingester
cmd:
  - --config
  - /etc/jaeger/config-kafka-ingester.yaml
ports:
  - 16686/tcp
  - 14133/tcp
  - 8889/tcp
