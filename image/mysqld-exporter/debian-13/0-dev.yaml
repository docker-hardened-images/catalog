name: mysqld-exporter 0.19.x (dev)
image: dhi.io/mysqld-exporter
variant: dev
tags:
  - 0-dev
  - 0.19-dev
  - 0.19.0-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.19-debian-dev
  - 0.19-debian13-dev
  - 0.19.0-debian-dev
  - 0.19.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 464bc5de74325c3ba85b237561e4b6c0bc3ca6d7
  SEMVER_MAJOR_MINOR_VERSION: "0.19"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.19.0
  VERSION: 0.19.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: mysqld-exporter-go
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/prometheus/mysqld_exporter.git#v0.19.0
            checksum: 464bc5de74325c3ba85b237561e4b6c0bc3ca6d7
            path: /go/src/github.com/prometheus/mysqld_exporter
            spdx:
              name: mysqld-exporter
              version: 0.19.0
              packages:
                - name: mysqld-exporter
                  purl: pkg:dhi/mysqld-exporter@0.19.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - filippo.io/edwards25519@v1.1.1
            dir: /go/src/github.com/prometheus/mysqld_exporter
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/prometheus/mysqld_exporter
          with:
            ldflags:
              - -X github.com/prometheus/common/version.Version=0.19.0
              - -X github.com/prometheus/common/version.Revision=464bc5de74325c3ba85b237561e4b6c0bc3ca6d7
              - -X github.com/prometheus/common/version.Branch=main
              - -X github.com/prometheus/common/version.BuildUser=docker
              - -X github.com/prometheus/common/version.BuildDate=$(date -d @${SOURCE_DATE_EPOCH} +'%Y%m%d-%H:%M:%S')
            output: ${target.dir}/usr/local/bin/mysqld-exporter
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/mysqld-exporter
          target: /opt/docker/sbom/mysqld-exporter
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /usr/bin/mysqld_exporter
    uid: 0
    gid: 0
    source: /usr/local/bin/mysqld-exporter
annotations:
  org.opencontainers.image.description: A minimal mysqld-exporter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/mysqld-exporter
ports:
  - 9104/tcp
