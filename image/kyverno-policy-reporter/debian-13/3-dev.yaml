# syntax=dhi.io/build:2-debian13

name: Kyverno Policy Reporter 3.x (dev)
image: dhi.io/kyverno-policy-reporter
variant: dev
tags:
  - 3-dev
  - 3.8-dev
  - 3.8.1-dev
  - 3-debian-dev
  - 3-debian13-dev
  - 3.8-debian-dev
  - 3.8-debian13-dev
  - 3.8.1-debian-dev
  - 3.8.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-07-31"
vars:
  COMMIT_SHA: 67c8419291e71bbe874660e0d8d13adea520378f
  SEMVER_MAJOR_MINOR_VERSION: "3.8"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.8.1
  VERSION: 3.8.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libc6
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: kyverno-policy-reporter
      work-dir: /go/src/github.com/kyverno/policy-reporter
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kyverno/policy-reporter.git#v3.8.1
            checksum: 67c8419291e71bbe874660e0d8d13adea520378f
            path: /go/src/github.com/kyverno/policy-reporter
            spdx:
              name: kyverno-policy-reporter
              version: 3.8.1
              packages:
                - name: kyverno-policy-reporter
                  purl: pkg:golang/github.com/kyverno/policy-reporter@3.8.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          with:
            deps:
              - filippo.io/edwards25519@v1.2.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.44.0
            replaces:
              - github.com/sigstore/timestamp-authority=github.com/docker-hardened-images/sigstore-timestamp-authority@v1.2.10-0.20251207163215-621a8cc1532f
            tidy: true
        - uses: go/hermetic@v1
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=1 go test ./...
        - name: build
          uses: go/build@v1
          with:
            cgo_enabled: 1
            ldflags:
              - -X github.com/kyverno/policy-reporter/cmd/version.BuildVersion=3.8.1
            output: ${target.dir}/usr/local/bin/kyverno-policy-reporter
            tags: sqlite_unlock_notify
      outputs:
        - source: ${target.dir}/usr/local/bin/kyverno-policy-reporter
          target: /usr/local/bin/kyverno-policy-reporter
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kyverno-policy-reporter
          target: /opt/docker/sbom/kyverno-policy-reporter
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Kyverno Policy Reporter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/kyverno-policy-reporter
  - run
ports:
  - 8080/tcp
