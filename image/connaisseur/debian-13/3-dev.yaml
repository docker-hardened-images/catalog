# syntax=dhi.io/build:2-debian13

name: Connaisseur 3.x (dev)
image: dhi.io/connaisseur
variant: dev
tags:
  - 3-dev
  - 3.10-dev
  - 3.10.0-dev
  - 3-debian-dev
  - 3-debian13-dev
  - 3.10-debian-dev
  - 3.10-debian13-dev
  - 3.10.0-debian-dev
  - 3.10.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-01-30"
vars:
  COMMIT_SHA: d2fdfc17d346539079f9fc1ea2b37fc08bfd67f9
  SEMVER_MAJOR_MINOR_VERSION: "3.10"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.10.0
  VERSION: 3.10.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: connaisseur
      work-dir: /go/src/github.com/sse-secure-systems/connaisseur
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/sse-secure-systems/connaisseur.git#v3.10.0
            checksum: d2fdfc17d346539079f9fc1ea2b37fc08bfd67f9
            path: /go/src/github.com/sse-secure-systems/connaisseur
            spdx:
              name: connaisseur
              version: 3.10.0
              packages:
                - name: connaisseur
                  purl: pkg:golang/github.com/sse-secure-systems/connaisseur@3.10.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - github.com/Azure/go-ntlmssp@v0.1.1
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/theupdateframework/go-tuf/v2@v2.4.1
              - google.golang.org/grpc@v1.79.3
              - github.com/in-toto/in-toto-golang@v0.11.0
              - github.com/sigstore/fulcio@v1.8.6
              - github.com/sigstore/rekor@v1.5.2
              - github.com/sigstore/timestamp-authority/v2@v2.1.0
            download: true
        - name: unit test
          privileged: true
          runs: |
            set -eux -o pipefail

            # Skip TestNew test: dependency updates changed how the registry
            # gets prefixed for localhost references. The test expects localhost to be
            # normalized to index.docker.io, but the updated dependencies correctly
            # treat localhost as a local registry without prefixing.
            go test ./internal/... -race -skip '^TestNew$'
        - name: build
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/connaisseur
            packages: ./cmd/connaisseur
      outputs:
        - source: ${target.dir}/usr/local/bin/connaisseur
          target: /usr/local/bin/connaisseur
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/connaisseur
          target: /opt/docker/sbom/connaisseur
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /app/bin
    uid: 0
    gid: 0
  - type: symlink
    path: /app/bin/connaisseur
    uid: 0
    gid: 0
    source: /usr/local/bin/connaisseur
annotations:
  org.opencontainers.image.description: A minimal Connaisseur image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/connaisseur
ports:
  - 5000/tcp
