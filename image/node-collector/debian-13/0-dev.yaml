# syntax=dhi.io/build:2-debian13

name: node-collector 0.x (dev)
image: dhi.io/node-collector
variant: dev
tags:
  - 0-dev
  - 0.3-dev
  - 0.3.1-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.3-debian-dev
  - 0.3-debian13-dev
  - 0.3.1-debian-dev
  - 0.3.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2024-06-24"
vars:
  COMMIT_SHA: badb8b1bfb7d52c911b554dbad98931aa33fb1a1
  SEMVER_MAJOR_MINOR_VERSION: "0.3"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.3.1
  VERSION: 0.3.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - procps
    - sed
    - tzdata
    - util-linux
  builds:
    - name: node-collector
      work-dir: /go/src/github.com/aquasecurity/k8s-node-collector
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/aquasecurity/k8s-node-collector.git#v0.3.1
            checksum: badb8b1bfb7d52c911b554dbad98931aa33fb1a1
            path: /go/src/github.com/aquasecurity/k8s-node-collector
            spdx:
              name: node-collector
              version: 0.3.1
              packages:
                - name: node-collector
                  purl: pkg:golang/github.com/aquasecurity/k8s-node-collector@0.3.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - golang.org/x/oauth2@v0.27.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test ./...
        - name: build
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/node-collector
            packages: ./cmd/node-collector
      outputs:
        - source: ${target.dir}/usr/local/bin/node-collector
          target: /usr/local/bin/node-collector
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/node-collector
          target: /opt/docker/sbom/node-collector
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal node-collector image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - node-collector
