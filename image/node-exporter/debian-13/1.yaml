# syntax=dhi.io/build:2-debian13

name: node-exporter 1.x
image: dhi.io/node-exporter
variant: runtime
tags:
  - "1"
  - "1.11"
  - 1.11.1
  - 1-debian
  - 1-debian13
  - 1.11-debian
  - 1.11-debian13
  - 1.11.1-debian
  - 1.11.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-07"
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "1.11"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.11.1
  SUFFIX: ""
  VERSION: 1.11.1-6
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - node-exporter=1.11.1-6
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
  - type: symlink
    path: /usr/local/bin/node_exporter
    uid: 0
    gid: 0
    source: /usr/bin/node_exporter
annotations:
  org.opencontainers.image.description: A minimal node-exporter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - node_exporter
ports:
  - 9100/tcp
