# syntax=dhi.io/build:2-debian13

name: API Declarative CLI 0.x (dev)
image: dhi.io/adc
variant: dev
tags:
  - 0-dev
  - 0.28-dev
  - 0.28.0-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.28-debian-dev
  - 0.28-debian13-dev
  - 0.28.0-debian-dev
  - 0.28.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-04"
vars:
  COMMIT_SHA: 07103cc0f086c93fa8792a4fffd1607cc1a24426
  SEMVER_MAJOR_MINOR_VERSION: "0.28"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.28.0
  VERSION: 0.28.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libc6
    - libgomp1
    - libstdc++6
    - mawk
    - netbase
    - nodejs-24
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: adc
      caches:
        - path: /root/.local/share/pnpm
        - path: /root/.cache
      contents:
        packages:
          - nodejs-24
          - npm
          - node-corepack
          - yarn-classic
          - base-files
          - ca-certificates
          - libc6
          - libstdc++6
          - bash
          - coreutils
          - findutils
          - git
          - sed
        files:
          - url: git+https://github.com/api7/adc.git#v0.28.0
            checksum: 07103cc0f086c93fa8792a4fffd1607cc1a24426
            path: ${source.dir}/adc
            spdx:
              name: adc
              version: 0.28.0
              packages:
                - name: adc
                  purl: pkg:dhi/adc@0.28.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build
          work-dir: ${source.dir}/adc
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable pnpm

            corepack pnpm install nx -w
            corepack pnpm install
            NX_DAEMON=false NODE_ENV=production npx nx build cli

            install -m 0644 ./dist/apps/cli/main.cjs ${target.dir}/main.cjs
      outputs:
        - source: ${target.dir}/main.cjs
          target: /opt/adc/main.cjs
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/adc
          target: /opt/docker/sbom/adc
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal API Declarative CLI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - node
  - /opt/adc/main.cjs
