# syntax=dhi.io/build:2-debian13

name: API Declarative CLI 0.x
image: dhi.io/adc
variant: runtime
tags:
  - "0"
  - "0.27"
  - 0.27.0
  - 0-debian
  - 0-debian13
  - 0.27-debian
  - 0.27-debian13
  - 0.27.0-debian
  - 0.27.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-04"
vars:
  COMMIT_SHA: 25590ecb0a0fa49995271ea9c9ed6de4fc09fed5
  SEMVER_MAJOR_MINOR_VERSION: "0.27"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.27.0
  VERSION: 0.27.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - ca-certificates-bundle
    - libc6
    - libgomp1
    - libstdc++6
    - netbase
    - nodejs-24
    - tzdata
  builds:
    - name: adc
      caches:
        - path: /root/.local/share/pnpm
        - path: /root/.cache
      contents:
        packages:
          - nodejs-24
          - npm
          - node-corepack
          - yarn-classic
          - base-files
          - ca-certificates
          - libc6
          - libstdc++6
          - bash
          - coreutils
          - findutils
          - git
          - sed
        files:
          - url: git+https://github.com/api7/adc.git#v0.27.0
            checksum: 25590ecb0a0fa49995271ea9c9ed6de4fc09fed5
            path: ${source.dir}/adc
            spdx:
              name: adc
              version: 0.27.0
              packages:
                - name: adc
                  purl: pkg:dhi/adc@0.27.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build
          work-dir: ${source.dir}/adc
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable pnpm

            corepack pnpm install nx -w
            corepack pnpm install
            NX_DAEMON=false NODE_ENV=production npx nx build cli

            install -m 0644 ./dist/apps/cli/main.cjs ${target.dir}/main.cjs
      outputs:
        - source: ${target.dir}/main.cjs
          target: /opt/adc/main.cjs
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/adc
          target: /opt/docker/sbom/adc
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal API Declarative CLI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - node
  - /opt/adc/main.cjs
