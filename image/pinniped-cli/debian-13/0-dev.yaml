# syntax=dhi.io/build:2-debian13

name: Pinniped CLI 0.x (dev)
image: dhi.io/pinniped-cli
variant: dev
tags:
  - 0-dev
  - 0.47-dev
  - 0.47.0-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.47-debian-dev
  - 0.47-debian13-dev
  - 0.47.0-debian-dev
  - 0.47.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 74b326dd2c595e40111f1ae6c987a8963ef1f9a9
  SEMVER_MAJOR_MINOR_VERSION: "0.47"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.47.0
  VERSION: 0.47.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: pinniped-cli
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/vmware/pinniped.git#v0.47.0
            checksum: 74b326dd2c595e40111f1ae6c987a8963ef1f9a9
            path: /go/src/github.com/vmware/pinniped
            spdx:
              name: pinniped
              version: 0.47.0
              packages:
                - name: pinniped
                  purl: pkg:golang/go.pinniped.dev@v0.47.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          work-dir: /go/src/github.com/vmware/pinniped
          with:
            deps:
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            download: true
        - name: test
          work-dir: /go/src/github.com/vmware/pinniped
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -C ./cmd/pinniped ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/vmware/pinniped
          with:
            ldflags:
              - -X go.pinniped.dev/internal/pversion.gitVersion=0.47.0
            output: ${target.dir}/usr/local/bin/pinniped
            packages: ./cmd/pinniped
      outputs:
        - source: ${target.dir}/usr/local/bin/pinniped
          target: /usr/local/bin/pinniped
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/pinniped
          target: /opt/docker/sbom/pinniped
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Pinniped CLI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/pinniped
