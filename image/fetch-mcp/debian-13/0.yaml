# syntax=dhi.io/build:2-debian13

name: Fetch MCP Server 2026.x
image: dhi.io/fetch-mcp
variant: runtime
tags:
  - "2026"
  - "2026.6"
  - latest
  - 2026.6.3
  - 2026-debian
  - 2026-debian13
  - 2026.6-debian
  - 2026.6-debian13
  - 2026.6.3-debian
  - 2026.6.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  COMMIT_SHA: 0e5f1582b8ca07916a884abaf2f8f5fd26d0142a
  PYTHON_DEV_REFERENCE: dhi/python:3.14.5-debian13-sfw-dev@sha256:caca2d137d6c71608471c534b7316abee1224e5327b7a5391331f7a930c9d7f0
  PYTHON_REFERENCE: dhi/python:3.14.5-debian13@sha256:4c20a9a5ea50f6cbce78dc399e535462df723e05d805e81bea68e626f44706ec
  SEMVER_MAJOR_MINOR_VERSION: "2026.6"
  SEMVER_MAJOR_VERSION: "2026"
  SEMVER_VERSION: 2026.6.3
  UV_VERSION: 0.11.19
  VERSION: 2026.6.3
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: fetch-mcp
      uses: dhi.io/python:3.14.5-debian13-sfw-dev@sha256:caca2d137d6c71608471c534b7316abee1224e5327b7a5391331f7a930c9d7f0
      environment:
        UV_COMPILE_BYTECODE: "1"
      contents:
        packages:
          - gzip
          - tar
        files:
          - url: https://github.com/astral-sh/uv/releases/download/0.11.19/uv-${ARCH}-unknown-linux-gnu.tar.gz
            path: ${source.dir}/uv-unknown-linux-gnu.tar.gz
            uid: 0
            gid: 0
          - url: git+https://github.com/modelcontextprotocol/servers.git#2026.6.3
            checksum: 0e5f1582b8ca07916a884abaf2f8f5fd26d0142a
            path: ${source.dir}/servers
            spdx:
              name: fetch-mcp
              version: 2026.6.3
              packages:
                - name: fetch-mcp
                  purl: pkg:dhi/fetch-mcp@2026.6.3
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: setup uv
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            tar -xzf "${source.dir}/uv-unknown-linux-gnu.tar.gz" -C /usr/local/bin --strip-components=1
            chmod +x /usr/local/bin/uv
        - name: fix CVE and move to /app
          runs: |
            set -eux -o pipefail

            # urllib3 is a transitive dep from requests, explicitly stating it will bump it to the desired version
            # CVE-2026-44432, CVE-2026-44431
            sed -i '/"requests>=2\.32\.3",/a\"urllib3==2.7.0",' "${source.dir}/servers/src/fetch/pyproject.toml"
            # starlette is a transitive dep from mcp/uvicorn, explicitly stating it will bump it to the desired version
            # GHSA-86qp-5c8j-p5mr
            sed -i '/"urllib3==2\.7\.0",/a\"starlette>=1.0.1",' "${source.dir}/servers/src/fetch/pyproject.toml"
            cp -r "${source.dir}/servers/src/fetch" /app
        - name: build python package
          work-dir: /app
          privileged: true
          runs: |
            set -eux -o pipefail

            rm .python-version

            sfw uv lock --upgrade
            sfw uv sync --locked --no-install-project --no-dev --no-editable
            sfw uv sync --locked --no-dev --no-editable
      outputs:
        - source: /app/.venv
          target: /app/.venv
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fetch-mcp
          target: /opt/docker/sbom/fetch-mcp
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.14.5-debian13-sfw-dev@sha256:caca2d137d6c71608471c534b7316abee1224e5327b7a5391331f7a930c9d7f0
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  PATH: /app/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
annotations:
  org.opencontainers.image.description: Fetch MCP Server
  org.opencontainers.image.licenses: MIT
labels:
  io.modelcontextprotocol.server.name: io.github.modelcontextprotocol/server-fetch
entrypoint:
  - mcp-server-fetch
