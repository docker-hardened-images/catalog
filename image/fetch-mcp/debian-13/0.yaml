# syntax=dhi.io/build:2-debian13

name: Fetch MCP Server 2026.x
image: dhi.io/fetch-mcp
variant: runtime
tags:
  - "2026"
  - "2026.7"
  - latest
  - 2026.7.10
  - 2026-debian
  - 2026-debian13
  - 2026.7-debian
  - 2026.7-debian13
  - 2026.7.10-debian
  - 2026.7.10-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  COMMIT_SHA: 9a96ea6e5913736f92b88345bf51caeaaa8e719f
  PYTHON_DEV_REFERENCE: dhi/python:3.14.6-5-debian13-sfw-dev@sha256:36d47adf35d25ddd353d49004bb673d2e41ecbc2306f995f63e84b9f2bfb39e7
  PYTHON_REFERENCE: dhi/python:3.14.6-debian13@sha256:c43e37b1d2c740bf924149f7ce015a79636a084a3fd755ac8c5ffc2f4a850b3e
  SEMVER_MAJOR_MINOR_VERSION: "2026.7"
  SEMVER_MAJOR_VERSION: "2026"
  SEMVER_VERSION: 2026.7.10
  UV_VERSION: 0.11.32
  VERSION: 2026.7.10
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - python-3.14
    - python-3.14-dev
    - python3-pip
    - python3-setuptools
    - python3-wheel
    - tzdata
  builds:
    - name: fetch-mcp
      environment:
        UV_COMPILE_BYTECODE: "1"
      contents:
        packages:
          - gzip
          - tar
          - python-3.14
          - python-3.14-dev
          - python3-pip
          - python3-setuptools
          - python3-wheel
          - libstdc++6
          - bash
          - coreutils
          - diffutils
          - findutils
          - gawk
          - grep
          - sed
          - sfw-free-pip
          - sfw-free-oci-config
        files:
          - url: https://github.com/astral-sh/uv/releases/download/0.11.32/uv-${ARCH}-unknown-linux-gnu.tar.gz
            path: ${source.dir}/uv-unknown-linux-gnu.tar.gz
            uid: 0
            gid: 0
          - url: git+https://github.com/modelcontextprotocol/servers.git#2026.7.10
            checksum: 9a96ea6e5913736f92b88345bf51caeaaa8e719f
            path: ${source.dir}/servers
            spdx:
              name: fetch-mcp
              version: 2026.7.10
              packages:
                - name: fetch-mcp
                  purl: pkg:dhi/fetch-mcp@2026.7.10
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: setup uv
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            tar -xzf "${source.dir}/uv-unknown-linux-gnu.tar.gz" -C /usr/local/bin --strip-components=1
            chmod +x /usr/local/bin/uv
        - name: fix CVE and move to /app
          runs: |
            set -eux -o pipefail

            # urllib3 is a transitive dep from requests, explicitly stating it will bump it to the desired version
            # CVE-2026-44432, CVE-2026-44431
            sed -i '/"requests>=2\.32\.3",/a\"urllib3==2.7.0",' "${source.dir}/servers/src/fetch/pyproject.toml"
            # starlette is a transitive dep from mcp/uvicorn, explicitly stating it will bump it to the desired version
            # GHSA-86qp-5c8j-p5mr, CVE-2026-54283
            sed -i '/"urllib3==2\.7\.0",/a\"starlette>=1.3.1",' "${source.dir}/servers/src/fetch/pyproject.toml"
            # pydantic-settings is a transitive dep from mcp, explicitly stating it will bump it to the desired version
            # GHSA-4xgf-cpjx-pc3j
            sed -i '/"starlette>=1\.3\.1",/a\"pydantic-settings>=2.14.2",' "${source.dir}/servers/src/fetch/pyproject.toml"
            cp -r "${source.dir}/servers/src/fetch" /app
        - name: build python package
          work-dir: /app
          privileged: true
          runs: |
            set -eux -o pipefail

            rm .python-version

            sfw uv lock --upgrade
            sfw uv sync --locked --no-install-project --no-dev --no-editable
            sfw uv sync --locked --no-dev --no-editable
      outputs:
        - source: /app/.venv
          target: /app/.venv
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fetch-mcp
          target: /opt/docker/sbom/fetch-mcp
          uid: 0
          gid: 0
    - name: server.json
      contents:
        packages:
          - bash
          - sed
      pipeline:
        - runs: |
            set -eux -o pipefail

            sed -i "s/_VERSION_/2026.7.10/g" "${source.dir}/config/server.json"
      paths:
        - type: file
          path: ${source.dir}/config/server.json
          uid: 0
          gid: 0
          source: image/fetch-mcp/config/server.json
      attestations:
        - predicate-type: https://modelcontextprotocol.io/server.json/v1
          source: ${source.dir}/config/server.json
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  PATH: /app/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
annotations:
  org.opencontainers.image.description: Fetch MCP Server
  org.opencontainers.image.licenses: MIT
labels:
  io.modelcontextprotocol.server.name: io.github.modelcontextprotocol/server-fetch
entrypoint:
  - mcp-server-fetch
