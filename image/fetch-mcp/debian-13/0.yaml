# syntax=dhi.io/build:2-debian13

name: Fetch MCP Server 2026.x
image: dhi.io/fetch-mcp
variant: runtime
tags:
  - "2026"
  - "2026.6"
  - latest
  - 2026.6.16
  - 2026-debian
  - 2026-debian13
  - 2026.6-debian
  - 2026.6-debian13
  - 2026.6.16-debian
  - 2026.6.16-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  COMMIT_SHA: 2182f5959fcea9fe8f033708242919a18a14d113
  PYTHON_DEV_REFERENCE: dhi/python:3.14.6-debian13-sfw-dev@sha256:325558c55bf52064b9c961137806ba33e07c43d424668e83450d3090601af5ab
  PYTHON_REFERENCE: dhi/python:3.14.6-debian13@sha256:a48290584a7fcec5935cecf4093ab9f293e3d57b3617b356316c781744e218c7
  SEMVER_MAJOR_MINOR_VERSION: "2026.6"
  SEMVER_MAJOR_VERSION: "2026"
  SEMVER_VERSION: 2026.6.16
  UV_VERSION: 0.11.23
  VERSION: 2026.6.16
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: fetch-mcp
      uses: dhi.io/python:3.14.6-debian13-sfw-dev@sha256:325558c55bf52064b9c961137806ba33e07c43d424668e83450d3090601af5ab
      environment:
        UV_COMPILE_BYTECODE: "1"
      contents:
        packages:
          - gzip
          - tar
        files:
          - url: https://github.com/astral-sh/uv/releases/download/0.11.23/uv-${ARCH}-unknown-linux-gnu.tar.gz
            path: ${source.dir}/uv-unknown-linux-gnu.tar.gz
            uid: 0
            gid: 0
          - url: git+https://github.com/modelcontextprotocol/servers.git#2026.6.16
            checksum: 2182f5959fcea9fe8f033708242919a18a14d113
            path: ${source.dir}/servers
            spdx:
              name: fetch-mcp
              version: 2026.6.16
              packages:
                - name: fetch-mcp
                  purl: pkg:dhi/fetch-mcp@2026.6.16
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: setup uv
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            tar -xzf "${source.dir}/uv-unknown-linux-gnu.tar.gz" -C /usr/local/bin --strip-components=1
            chmod +x /usr/local/bin/uv
        - name: fix CVE and move to /app
          runs: |
            set -eux -o pipefail

            # urllib3 is a transitive dep from requests, explicitly stating it will bump it to the desired version
            # CVE-2026-44432, CVE-2026-44431
            sed -i '/"requests>=2\.32\.3",/a\"urllib3==2.7.0",' "${source.dir}/servers/src/fetch/pyproject.toml"
            # starlette is a transitive dep from mcp/uvicorn, explicitly stating it will bump it to the desired version
            # GHSA-86qp-5c8j-p5mr, CVE-2026-54283
            sed -i '/"urllib3==2\.7\.0",/a\"starlette>=1.3.1",' "${source.dir}/servers/src/fetch/pyproject.toml"
            # pydantic-settings is a transitive dep from mcp, explicitly stating it will bump it to the desired version
            # GHSA-4xgf-cpjx-pc3j
            sed -i '/"starlette>=1\.3\.1",/a\"pydantic-settings>=2.14.2",' "${source.dir}/servers/src/fetch/pyproject.toml"
            cp -r "${source.dir}/servers/src/fetch" /app
        - name: build python package
          work-dir: /app
          privileged: true
          runs: |
            set -eux -o pipefail

            rm .python-version

            sfw uv lock --upgrade
            sfw uv sync --locked --no-install-project --no-dev --no-editable
            sfw uv sync --locked --no-dev --no-editable
      outputs:
        - source: /app/.venv
          target: /app/.venv
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fetch-mcp
          target: /opt/docker/sbom/fetch-mcp
          uid: 0
          gid: 0
    - name: server.json
      contents:
        packages:
          - bash
          - sed
      pipeline:
        - runs: |
            set -eux -o pipefail

            sed -i "s/_VERSION_/2026.6.16/g" "${source.dir}/config/server.json"
      paths:
        - type: file
          path: ${source.dir}/config/server.json
          uid: 0
          gid: 0
          source: image/fetch-mcp/config/server.json
      attestations:
        - predicate-type: https://modelcontextprotocol.io/server.json/v1
          source: ${source.dir}/config/server.json
  artifacts:
    - name: dhi.io/python:3.14.6-debian13-sfw-dev@sha256:325558c55bf52064b9c961137806ba33e07c43d424668e83450d3090601af5ab
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  PATH: /app/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
annotations:
  org.opencontainers.image.description: Fetch MCP Server
  org.opencontainers.image.licenses: MIT
labels:
  io.modelcontextprotocol.server.name: io.github.modelcontextprotocol/server-fetch
entrypoint:
  - mcp-server-fetch
