            checksum: ad1797b33167da20f3d158339e0081c0fa9c4dab
            path: /go/src/gitlab.com/gitlab-org/gitlab-runner
            spdx:
              name: gitlab-runner-helper
              version: 18.11.3
              packages:
                - name: gitlab-runner-helper
                  purl: pkg:golang/gitlab.com/gitlab-org/gitlab-runner@18.11.3
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (18 only)
          uses: go/bump@v2
          with:
