# syntax=dhi.io/build:2-debian13

name: GitLab Runner Helper 19.x
image: dhi.io/gitlab-runner-helper
variant: runtime
tags:
  - "19"
  - "19.0"
  - 19.0.0
  - 19-debian13
  - 19.0-debian13
  - 19.0.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-22"
  end-of-life: "2026-07-16"
vars:
  COMMIT_SHA: d4bac16c639ce0e7a778f1e88ca05b6d18dde57a
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:7d76fa1df4e959cbe9d4adc87f2b399168b96ee51c2418c2a1197e4d687d66ba
  SEMVER_MAJOR_MINOR_VERSION: "19.0"
  SEMVER_MAJOR_VERSION: "19"
  SEMVER_VERSION: 19.0.0
  VERSION: 19.0.0
contents:
  packages:
    - bash
    - ca-certificates
    - coreutils
    - findutils
    - git
    - git-lfs
    - grep
  builds:
    - name: gitlab-runner-helper
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:7d76fa1df4e959cbe9d4adc87f2b399168b96ee51c2418c2a1197e4d687d66ba
      work-dir: /go/src/gitlab.com/gitlab-org/gitlab-runner
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://gitlab.com/gitlab-org/gitlab-runner.git#v19.0.0
            checksum: d4bac16c639ce0e7a778f1e88ca05b6d18dde57a
            path: /go/src/gitlab.com/gitlab-org/gitlab-runner
            spdx:
              name: gitlab-runner-helper
              version: 19.0.0
              packages:
                - name: gitlab-runner-helper
                  purl: pkg:golang/gitlab.com/gitlab-org/gitlab-runner@19.0.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (19 only)
          uses: go/bump@v2
          with:
            deps:
              - github.com/Azure/go-ntlmssp@v0.1.1
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/buger/jsonparser@v1.1.2
              - github.com/go-git/go-git/v5@v5.19.1
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
            download: true
        - name: test after bump
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            CGO_ENABLED=0 go test ./apps/gitlab-runner-helper/...
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X gitlab.com/gitlab-org/gitlab-runner/common.NAME=gitlab-runner-helper
              - -X gitlab.com/gitlab-org/gitlab-runner/common.VERSION=19.0.0
              - -w
            output: ${target.dir}/usr/local/bin/gitlab-runner-helper
            packages: ./apps/gitlab-runner-helper
      outputs:
        - source: ${target.dir}/usr/local/bin/gitlab-runner-helper
          target: /usr/local/bin/gitlab-runner-helper
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/gitlab-runner-helper
          target: /opt/docker/sbom/gitlab-runner-helper
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal GitLab Runner Helper image
  org.opencontainers.image.licenses: MIT
cmd:
  - /usr/local/bin/gitlab-runner-helper
