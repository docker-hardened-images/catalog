# syntax=dhi.io/build:2-debian13

name: unleash 8.x (dev)
image: dhi.io/unleash
variant: dev
tags:
  - 8-dev
  - 8.0-dev
  - 8.0.1-dev
  - 8-debian-dev
  - 8-debian13-dev
  - 8.0-debian-dev
  - 8.0-debian13-dev
  - 8.0.1-debian-dev
  - 8.0.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-09"
vars:
  COMMIT_SHA: f6125bdb437d506b7bb43e6b61f9e9364fdb7e7c
  NODE_BUILD_REFERENCE: dhi/node:22.22.3-debian13-dev@sha256:cbe1cbec93a0eb5ca704355825021de4362704a5181768afc24fac2082d13fca
  NODE_RUNTIME_REFERENCE: dhi/node:22.22.3-debian13@sha256:c9990145d92701f8955d5f08c9016ec8b9a1bf2ca569a7c33681374b97e880ec
  SEMVER_MAJOR_MINOR_VERSION: "8.0"
  SEMVER_MAJOR_VERSION: "8"
  SEMVER_VERSION: 8.0.1
  VERSION: 8.0.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - curl
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - readline-common
    - sed
    - util-linux
  builds:
    - name: unleash
      uses: dhi.io/node:22.22.3-debian13-dev@sha256:cbe1cbec93a0eb5ca704355825021de4362704a5181768afc24fac2082d13fca
      work-dir: ${source.dir}/unleash
      caches:
        - path: /root/.local/share/pnpm/store
      contents:
        files:
          - url: git+https://github.com/Unleash/unleash.git#v8.0.1
            checksum: f6125bdb437d506b7bb43e6b61f9e9364fdb7e7c
            path: ${source.dir}/unleash
            spdx:
              name: unleash
              version: 8.0.1
              packages:
                - name: unleash
                  purl: pkg:npm/unleash-server@8.0.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: install and build
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable
            pnpm install --frozen-lockfile --ignore-scripts
            pnpm prepare:backend
            pnpm local:package
            pnpm build:frontend:if-needed
        - name: reorganize build
          runs: |
            set -eux -o pipefail

            mkdir -p build/frontend
            mv frontend/build build/frontend/build
        - name: frontend sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: unleash-frontend
            source: ${source.dir}/unleash/frontend/node_modules
        - name: production dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable
            CI=true pnpm prune --prod --ignore-scripts
        - name: copy app files
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/opt/unleash"

            cp -r build/dist "${target.dir}/opt/unleash/"
            cp -r build/frontend "${target.dir}/opt/unleash/"
            cp build/package.json "${target.dir}/opt/unleash/"
            cp -r node_modules "${target.dir}/opt/unleash/"
      outputs:
        - source: ${target.dir}/opt/unleash
          target: /opt/unleash
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/unleash
          target: /opt/docker/sbom/unleash
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/unleash-frontend
          target: /opt/docker/sbom/unleash-frontend
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/node:22.22.3-debian13@sha256:c9990145d92701f8955d5f08c9016ec8b9a1bf2ca569a7c33681374b97e880ec
      excludes:
        - etc
        - var/run
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /opt/unleash
environment:
  DEBIAN_FRONTEND: noninteractive
  NODE_ENV: production
  TZ: UTC
annotations:
  org.opencontainers.image.description: A minimal Unleash image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - node
cmd:
  - /opt/unleash/dist/server.js
ports:
  - 4242/tcp
