# syntax=dhi.io/build:2-debian13

name: unleash 7.x (dev)
image: dhi.io/unleash
variant: dev
tags:
  - 7-dev
  - 7.6-dev
  - 7.6.3-dev
  - 7-debian13-dev
  - 7.6-debian13-dev
  - 7.6.3-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-06-11"
vars:
  COMMIT_SHA: a67d282c77bb719db6bd5bef006fdd564a9c1add
  NODE_BUILD_REFERENCE: dhi/node:22.22.2-debian13-dev@sha256:a081f196e5a6c4d7756822de19f6202c4668d54f695c75aa22e93ec155a5a466
  NODE_RUNTIME_REFERENCE: dhi/node:22.22.2-debian13@sha256:630af71fcc709a1f1a5da4f541f4aae89692838b9828cd2e8b511fab001cfa64
  SEMVER_MAJOR_MINOR_VERSION: "7.6"
  SEMVER_MAJOR_VERSION: "7"
  SEMVER_VERSION: 7.6.3
  VERSION: 7.6.3
contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: unleash
      uses: dhi.io/node:22.22.2-debian13-dev@sha256:a081f196e5a6c4d7756822de19f6202c4668d54f695c75aa22e93ec155a5a466
      work-dir: ${source.dir}/unleash
      caches:
        - path: /usr/local/share/.cache/yarn
      contents:
        files:
          - url: git+https://github.com/Unleash/unleash.git#v7.6.3
            checksum: a67d282c77bb719db6bd5bef006fdd564a9c1add
            path: ${source.dir}/unleash
            spdx:
              name: unleash
              version: 7.6.3
              packages:
                - name: unleash
                  purl: pkg:npm/unleash-server@7.6.3
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: install and build
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable
            yarn install --immutable
            yarn prepare:backend
            yarn local:package
            yarn build:frontend:if-needed
        - name: reorganize build
          runs: |
            set -eux -o pipefail

            # Move frontend build into the build output directory
            mkdir -p build/frontend
            mv frontend/build build/frontend/build
        - name: frontend sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: unleash-frontend
            source: ${source.dir}/unleash/frontend/node_modules
        - name: production dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable

            # Clean node_modules fully before production install
            # to ensure dev dependencies are completely removed
            rm -rf node_modules frontend/node_modules
            yarn workspaces focus -A --production
        - name: copy app files
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/opt/unleash"

            cp -r build/dist "${target.dir}/opt/unleash/"
            cp -r build/frontend "${target.dir}/opt/unleash/"
            cp build/package.json "${target.dir}/opt/unleash/"
            cp -r node_modules "${target.dir}/opt/unleash/"
      outputs:
        - source: ${target.dir}/opt/unleash
          target: /opt/unleash
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/unleash
          target: /opt/docker/sbom/unleash
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/unleash-frontend
          target: /opt/docker/sbom/unleash-frontend
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/node:22.22.2-debian13@sha256:630af71fcc709a1f1a5da4f541f4aae89692838b9828cd2e8b511fab001cfa64
      excludes:
        - etc
        - var/run
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /opt/unleash
environment:
  DEBIAN_FRONTEND: noninteractive
  NODE_ENV: production
  TZ: UTC
annotations:
  org.opencontainers.image.description: A minimal Unleash image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - node
cmd:
  - /opt/unleash/dist/server.js
ports:
  - 4242/tcp
