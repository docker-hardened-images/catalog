# syntax=dhi.io/build:2-debian13

name: unleash 7.x (dev)
image: dhi.io/unleash
variant: dev
tags:
  - 7-dev
  - 7.6-dev
  - 7.6.4-dev
  - 7-debian13-dev
  - 7.6-debian13-dev
  - 7.6.4-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-06-11"
vars:
  COMMIT_SHA: 97cfa86cfb0e7423d3ff0605227b04b71709be0c
  NODE_BUILD_REFERENCE: dhi/node:22.22.3-debian13-dev@sha256:ba2cfd44252787ae238f9ca6a353c813fe63ffe5e8e961b190b825080d0416fd
  NODE_RUNTIME_REFERENCE: dhi/node:22.22.3-debian13@sha256:c9990145d92701f8955d5f08c9016ec8b9a1bf2ca569a7c33681374b97e880ec
  SEMVER_MAJOR_MINOR_VERSION: "7.6"
  SEMVER_MAJOR_VERSION: "7"
  SEMVER_VERSION: 7.6.4
  VERSION: 7.6.4
contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: unleash
      uses: dhi.io/node:22.22.3-debian13-dev@sha256:ba2cfd44252787ae238f9ca6a353c813fe63ffe5e8e961b190b825080d0416fd
      work-dir: ${source.dir}/unleash
      caches:
        - path: /usr/local/share/.cache/yarn
      contents:
        files:
          - url: git+https://github.com/Unleash/unleash.git#v7.6.4
            checksum: 97cfa86cfb0e7423d3ff0605227b04b71709be0c
            path: ${source.dir}/unleash
            spdx:
              name: unleash
              version: 7.6.4
              packages:
                - name: unleash
                  purl: pkg:npm/unleash-server@7.6.4
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump yarn deps
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable

            # Add resolutions for vulnerable packages to package.json.
            # We use jq instead of `yarn set resolution` because the latter
            # only accepts flat descriptors (e.g. pkg@npm:range) and rejects
            # path-based keys like "ajv/fast-uri" with "Invalid descriptor".
            # CVE-2026-6322, CVE-2026-6321 (ajv/fast-uri)
            # CVE-2026-8723 (body-parser/qs, express/qs)
            # CVE-2026-42338 (unleash-client/ip-address, express-rate-limit/ip-address, ip-address)
            # CVE-2026-42570 (devalue)
            # CVE-2026-42567, GHSA-f3cj-j4f6-wq85, CVE-2026-42573, CVE-2026-42599 (svelte)
            # CVE-2026-33532 (yaml)
            jq '.resolutions += {
              "ajv/fast-uri": "3.1.2",
              "body-parser/qs": "6.15.2",
              "express/qs": "6.15.2",
              "unleash-client/ip-address": "10.1.1",
              "express-rate-limit/ip-address": "10.1.1",
              "ip-address": "10.1.1",
              "devalue": "5.8.1",
              "svelte": "5.55.7",
              "yaml": "1.10.3"
            }' package.json > package.tmp.json
            mv package.tmp.json package.json

            # frontend/ has its own yarn.lock; add resolutions there too
            jq '.resolutions += {
              "ajv/fast-uri": "3.1.2",
              "devalue": "5.8.1",
              "svelte": "5.55.7",
              "yaml": "1.10.3"
            }' frontend/package.json > frontend/package.tmp.json
            mv frontend/package.tmp.json frontend/package.json

            # Allow lockfile updates from the new resolutions;
            # build-frontend-if-needed.sh runs yarn install --immutable
            # which must be relaxed for resolutions to take effect
            sed -i 's/--immutable//' scripts/build-frontend-if-needed.sh
        - name: install and build
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable
            yarn install
            yarn prepare:backend
            yarn local:package
            yarn build:frontend:if-needed
        - name: reorganize build
          runs: |
            set -eux -o pipefail

            # Move frontend build into the build output directory
            mkdir -p build/frontend
            mv frontend/build build/frontend/build
        - name: fix frontend dependency classification
          uses: git/patch@v1
          with:
            dir: ${source.dir}/unleash
            patch: ${source.dir}/patches/frontend-deps.patch
        - name: production dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable

            # Clean node_modules fully before production install
            # to ensure dev dependencies are completely removed
            rm -rf node_modules frontend/node_modules

            # Install root production dependencies
            yarn workspaces focus -A --production

            # frontend/ is an independent package (its own yarn.lock),
            # not a Yarn workspace member, so it needs a separate install
            cd frontend
            yarn workspaces focus --production
        - name: frontend sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: unleash-frontend
            source: ${source.dir}/unleash/frontend/node_modules
        - name: copy app files
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/opt/unleash"

            cp -r build/dist "${target.dir}/opt/unleash/"
            cp -r build/frontend "${target.dir}/opt/unleash/"
            cp build/package.json "${target.dir}/opt/unleash/"
            cp -r node_modules "${target.dir}/opt/unleash/"
      paths:
        - type: file
          path: ${source.dir}/patches/frontend-deps.patch
          uid: 0
          gid: 0
          source: image/unleash/patch/frontend-deps.patch
      outputs:
        - source: ${target.dir}/opt/unleash
          target: /opt/unleash
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/unleash
          target: /opt/docker/sbom/unleash
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/unleash-frontend
          target: /opt/docker/sbom/unleash-frontend
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/node:22.22.3-debian13@sha256:c9990145d92701f8955d5f08c9016ec8b9a1bf2ca569a7c33681374b97e880ec
      excludes:
        - etc
        - var/run
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /opt/unleash
environment:
  DEBIAN_FRONTEND: noninteractive
  NODE_ENV: production
  TZ: UTC
annotations:
  org.opencontainers.image.description: A minimal Unleash image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - node
cmd:
  - /opt/unleash/dist/server.js
ports:
  - 4242/tcp
