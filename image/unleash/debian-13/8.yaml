# syntax=dhi.io/build:2-debian13

name: unleash 8.x
image: dhi.io/unleash
variant: runtime
tags:
  - "8"
  - "8.0"
  - 8.0.2
  - 8-debian
  - 8-debian13
  - 8.0-debian
  - 8.0-debian13
  - 8.0.2-debian
  - 8.0.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-09"
vars:
  COMMIT_SHA: 8ee9e914cec88ee18e7677f41a84db7c8eeda8fb
  SEMVER_MAJOR_MINOR_VERSION: "8.0"
  SEMVER_MAJOR_VERSION: "8"
  SEMVER_VERSION: 8.0.2
  VERSION: 8.0.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!base-files'
    - base-files
    - ca-certificates-bundle
    - libc6
    - libgomp1
    - libstdc++6
    - netbase
    - nodejs-24
    - tzdata
  builds:
    - name: unleash
      work-dir: ${source.dir}/unleash
      caches:
        - path: /root/.local/share/pnpm/store
      contents:
        packages:
          - base-files
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - git
          - libc6
          - libstdc++6
          - mawk
          - nodejs-24
          - node-corepack
          - npm
          - sed
          - yarn-classic
          - yq
        files:
          - url: git+https://github.com/Unleash/unleash.git#v8.0.2
            checksum: 8ee9e914cec88ee18e7677f41a84db7c8eeda8fb
            path: ${source.dir}/unleash
            spdx:
              name: unleash
              version: 8.0.2
              packages:
                - name: unleash
                  purl: pkg:npm/unleash-server@8.0.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump pnpm deps for cve fixes
          runs: |
            set -eux -o pipefail

            # Unleash v8 declares pnpm `overrides` in pnpm-workspace.yaml, so a
            # package.json `pnpm.overrides` block would be ignored. Inject the
            # override into that file instead.
            # GHSA-p6gq-j5cr-w38f (nodemailer)
            yq -Y -i '.overrides."nodemailer" = "9.0.1"' pnpm-workspace.yaml

            # nodemailer 9.0.1 may be newer than the configured minimumReleaseAge
            # (7 days); allow it so the override resolves regardless of build date.
            yq -Y -i '.minimumReleaseAgeExclude += ["nodemailer@9.0.1"]' pnpm-workspace.yaml
        - name: install and build
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable
            # --no-frozen-lockfile so the new override updates the lockfile.
            pnpm install --no-frozen-lockfile --ignore-scripts
            pnpm prepare:backend
            pnpm local:package
            pnpm build:frontend:if-needed
        - name: reorganize build
          runs: |
            set -eux -o pipefail

            mkdir -p build/frontend
            mv frontend/build build/frontend/build
        - name: frontend sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: unleash-frontend
            source: ${source.dir}/unleash/frontend/node_modules
        - name: production dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable
            CI=true pnpm prune --prod --ignore-scripts
        - name: copy app files
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/opt/unleash"

            cp -r build/dist "${target.dir}/opt/unleash/"
            cp -r build/frontend "${target.dir}/opt/unleash/"
            cp build/package.json "${target.dir}/opt/unleash/"
            cp -r node_modules "${target.dir}/opt/unleash/"
      outputs:
        - source: ${target.dir}/opt/unleash
          target: /opt/unleash
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/unleash
          target: /opt/docker/sbom/unleash
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/unleash-frontend
          target: /opt/docker/sbom/unleash-frontend
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /opt/unleash
environment:
  NODE_ENV: production
  TZ: UTC
annotations:
  org.opencontainers.image.description: A minimal Unleash image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - node
cmd:
  - /opt/unleash/dist/server.js
ports:
  - 4242/tcp
