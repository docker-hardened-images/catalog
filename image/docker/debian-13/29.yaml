  SEMVER_MAJOR_MINOR_VERSION: "29.6"
  SEMVER_MAJOR_VERSION: "29"
  SEMVER_VERSION: 29.6.0
  VERSION: 29.6.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates
    - libc6
  builds:
    - name: buildx
      work-dir: /go/src/github.com/docker/buildx
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - gnu-which
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/docker/buildx.git#v0.35.0
            checksum: a319e5b15052cf6557ceb666eb8ff6e32380b782
            path: /go/src/github.com/docker/buildx
            spdx:
              name: docker-buildx
              version: 0.35.0
              packages:
                - name: buildx
                  purl: pkg:golang/github.com/docker/buildx@0.35.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/docker/buildx
          with:
            deps:
              - github.com/in-toto/in-toto-golang@v0.11.0
              - github.com/moby/spdystream@v0.5.1
              - github.com/containerd/containerd/v2@v2.2.5
            download: true
            tidy: true
        - name: go build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/docker/buildx/version.Version=0.35.0
              - -X github.com/docker/buildx/version.Revision=a319e5b15052cf6557ceb666eb8ff6e32380b782
              - -X github.com/docker/buildx/version.Package=github.com/docker/buildx
            output: ${target.dir}/usr/local/libexec/docker/cli-plugins/docker-buildx
            packages: ./cmd/buildx
      outputs:
        - source: ${target.dir}/usr/local/libexec/docker/cli-plugins/docker-buildx
          target: /usr/local/libexec/docker/cli-plugins/docker-buildx
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/docker-buildx
          target: /opt/docker/sbom/docker-buildx
          uid: 0
          gid: 0
    - name: compose
      work-dir: /go/src/github.com/docker/compose
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - btrfs-progs
          - build-essential
          - ca-certificates
          - libseccomp-dev
          - libtool
          - linux-libc-dev
          - liblvm2-dev
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/docker/compose.git#v5.2.0
            checksum: 3d0dd57fbd634d78fd440c08bd4c143eb1f9d5e0
            path: /go/src/github.com/docker/compose
            spdx:
              name: docker-compose
              version: 5.2.0
              packages:
                - name: compose
                  purl: pkg:golang/github.com/docker/compose@5.2.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v2
          with:
            deps:
              - github.com/containerd/containerd/v2@v2.2.5
              - github.com/in-toto/in-toto-golang@v0.11.0
            tidy: true
        - uses: go/hermetic@v1
        - name: build
          privileged: true
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/local/libexec/docker/cli-plugins"
            GODEBUG="fips140=on" DESTDIR="${target.dir}/usr/local/libexec/docker/cli-plugins" make build
      outputs:
        - source: ${target.dir}/usr/local/libexec/docker/cli-plugins/docker-compose
          target: /usr/local/libexec/docker/cli-plugins/docker-compose
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/docker-compose
          target: /opt/docker/sbom/docker-compose
          uid: 0
          gid: 0
    - name: scout
      work-dir: /go/src/github.com/docker/scout-cli-plugin
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/docker/scout-cli-plugin.git#v1.20.4
            checksum: fb59552651671b31cca99eba9895522871678c46
            path: /go/src/github.com/docker/scout-cli-plugin
            spdx:
              name: scout-cli
              version: 1.20.4
              packages:
                - name: scout-cli
                  purl: pkg:github/docker/scout-cli-plugin@1.20.4
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v2
          with:
            deps:
              - github.com/cloudflare/circl@v1.6.3
              - github.com/containerd/containerd@v1.7.33
              - github.com/containerd/containerd/v2@v2.2.5
              - github.com/go-git/go-git/v5@v5.17.1
              - github.com/go-git/go-git/v5@v5.19.1
              - github.com/hashicorp/go-getter@v1.8.6
              - github.com/in-toto/in-toto-golang@v0.11.0
              - github.com/moby/buildkit@v0.28.1
              - github.com/sigstore/sigstore/pkg/signature/kms/aws@v1.10.4
              - github.com/sigstore/sigstore/pkg/signature/kms/azure@v1.10.4
              - github.com/sigstore/sigstore/pkg/signature/kms/gcp@v1.10.4
              - github.com/sigstore/sigstore/pkg/signature/kms/hashivault@v1.10.4
              - github.com/sigstore/timestamp-authority/v2@v2.0.6
              - helm.sh/helm/v3@v3.20.2
            replaces:
              - github.com/sigstore/sigstore=github.com/sigstore/sigstore@v1.10.4
            tidy: true
        - uses: go/hermetic@v1
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/docker/scout-cli-plugin/internal/version.version=1.20.4
              - -X github.com/docker/scout-cli-plugin/internal/version.commit=fb59552651671b31cca99eba9895522871678c46
            output: ${target.dir}/usr/local/libexec/docker/cli-plugins/docker-scout
            packages: ./cmd/docker-scout
      outputs:
        - source: ${target.dir}/usr/local/libexec/docker/cli-plugins/docker-scout
          target: /usr/local/libexec/docker/cli-plugins/docker-scout
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/scout-cli
          target: /opt/docker/sbom/scout-cli
          uid: 0
          gid: 0
    - name: docker-cli
      work-dir: /go/src/github.com/docker/cli
      environment:
        GOPATH: /go
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - btrfs-progs
          - build-essential
          - ca-certificates
          - libseccomp-dev
          - libtool
          - linux-libc-dev
          - liblvm2-dev
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/docker/cli.git#v29.6.0
            checksum: fb59821d450bc76c97e52617f66dde0c6035e332
            path: /go/src/github.com/docker/cli
            spdx:
              name: docker-cli
              version: 29.6.0
              packages:
                - name: docker-cli
                  purl: pkg:golang/github.com/docker/cli@29.6.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build
          work-dir: /go/src/github.com/docker/cli
          runs: |
            set -eux -o pipefail

            export DISABLE_WARN_OUTSIDE_CONTAINER=1
            export LDFLAGS=""
            export CGO_ENABLED=1

            make VERSION="29.6.0" dynbinary

            install -Dm755 build/docker-linux-* "${target.dir}/usr/local/bin/docker"
      outputs:
        - source: ${target.dir}/usr/local/bin/docker
          target: /usr/local/bin/docker
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/docker-cli
          target: /opt/docker/sbom/docker-cli
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: docker
      gid: 2375
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DOCKER_BUILDX_VERSION: 0.35.0
  DOCKER_COMPOSE_VERSION: 5.2.0
