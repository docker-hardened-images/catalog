# syntax=dhi.io/build:2-debian13

name: Docker 29.x (cli)
image: dhi.io/docker
variant: runtime
flavor: cli
tags:
  - 29-cli
  - 29.6-cli
  - 29.6.0-cli
  - 29-debian-cli
  - 29-debian13-cli
  - 29.6-debian-cli
  - 29.6-debian13-cli
  - 29.6.0-debian-cli
  - 29.6.0-debian13-cli
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BUILDX_COMMIT_SHA: a319e5b15052cf6557ceb666eb8ff6e32380b782
  BUILDX_VERSION: 0.35.0
  COMMIT_SHA: fb59821d450bc76c97e52617f66dde0c6035e332
  COMPOSE_COMMIT_SHA: 3d0dd57fbd634d78fd440c08bd4c143eb1f9d5e0
  COMPOSE_VERSION: 5.2.0
