    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - grep
    - libc-bin
    - libc6
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: buildx
      uses: dhi.io/golang:1.25.9-debian13-dev@sha256:2714b77de923fab1c1567b41a53a8647c7f4f511cae36ad030b6de2e9037759c
      work-dir: /go/src/github.com/docker/buildx
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - gnu-which
        files:
          - url: git+https://github.com/docker/buildx.git#v0.33.0
            checksum: f7897eba028583e0071642db3c011e860444f8cf
            path: /go/src/github.com/docker/buildx
            spdx:
              name: docker-buildx
              version: 0.33.0
              packages:
                - name: buildx
                  purl: pkg:golang/github.com/docker/buildx@0.33.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          work-dir: /go/src/github.com/docker/buildx
          privileged: true
          environment:
            GODEBUG: ""
            GOFIPS140: ""
          runs: |
            set -eux -o pipefail

            go get github.com/sigstore/rekor@v1.5.0               # CVE-2026-24117, CVE-2026-23831
            go get github.com/theupdateframework/go-tuf/v2@v2.4.1 # CVE-2026-24686
            go get go.opentelemetry.io/otel/sdk@v1.40.0           # CVE-2026-24051
            go get github.com/cloudflare/circl@v1.6.3             # CVE-2026-1229
            go get google.golang.org/grpc@v1.79.3                 # CVE-2026-33186
            go mod tidy
            go mod vendor
        - name: go build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/docker/buildx/version.Version=0.33.0
              - -X github.com/docker/buildx/version.Revision=f7897eba028583e0071642db3c011e860444f8cf
              - -X github.com/docker/buildx/version.Package=github.com/docker/buildx
            output: ${target.dir}/usr/local/libexec/docker/cli-plugins/docker-buildx
            packages: ./cmd/buildx
      outputs:
        - source: ${target.dir}/usr/local/libexec/docker/cli-plugins/docker-buildx
          target: /usr/local/libexec/docker/cli-plugins/docker-buildx
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/docker-buildx
          target: /opt/docker/sbom/docker-buildx
          uid: 0
          gid: 0
