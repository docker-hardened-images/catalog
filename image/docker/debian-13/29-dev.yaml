          - libtool
          - linux-libc-dev
          - liblvm2-dev
        files:
          - url: git+https://github.com/docker/compose.git#v5.1.1
            checksum: b043368028e9fcb4545fa340c8ad635c370825da
            path: /go/src/github.com/docker/compose
            spdx:
              name: docker-compose
              version: 5.1.1
              packages:
                - name: compose
                  purl: pkg:golang/github.com/docker/compose@5.1.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v1
          with:
            deps:
              - go.opentelemetry.io/otel/sdk@v1.40.0
              - github.com/sigstore/sigstore@v1.10.4
              - google.golang.org/grpc@v1.79.3
            tidy: true
        - uses: go/hermetic@v1
        - name: build
          privileged: true
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/local/libexec/docker/cli-plugins"
            GODEBUG="fips140=on" DESTDIR="${target.dir}/usr/local/libexec/docker/cli-plugins" make build
      outputs:
        - source: ${target.dir}/usr/local/libexec/docker/cli-plugins/docker-compose
          target: /usr/local/libexec/docker/cli-plugins/docker-compose
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/docker-compose
          target: /opt/docker/sbom/docker-compose
          uid: 0
          gid: 0
    - name: scout
      uses: dhi.io/golang:1.25.9-debian13-dev@sha256:2714b77de923fab1c1567b41a53a8647c7f4f511cae36ad030b6de2e9037759c
      work-dir: /go/src/github.com/docker/scout-cli-plugin
      contents:
        files:
          - url: git+https://github.com/docker/scout-cli-plugin.git#v1.20.3
            checksum: 3d7473c3cd29fc1c10c7915445efd2f9f00929f5
            path: /go/src/github.com/docker/scout-cli-plugin
            spdx:
              name: scout-cli
              version: 1.20.3
              packages:
                - name: scout-cli
                  purl: pkg:github/docker/scout-cli-plugin@1.20.3
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v1
          with:
            deps:
              - github.com/theupdateframework/go-tuf/v2@v2.4.1
              - github.com/sigstore/rekor@v1.5.0
              - github.com/sigstore/sigstore@v1.10.4
              - github.com/cloudflare/circl@v1.6.3
              - go.opentelemetry.io/otel/sdk@v1.40.0
              - google.golang.org/grpc@v1.79.3
            replaces:
              - github.com/sigstore/sigstore=github.com/sigstore/sigstore@v1.10.4
            tidy: true
        - uses: go/hermetic@v1
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/docker/scout-cli-plugin/internal/version.version=1.20.3
              - -X github.com/docker/scout-cli-plugin/internal/version.commit=3d7473c3cd29fc1c10c7915445efd2f9f00929f5
            output: ${target.dir}/usr/local/libexec/docker/cli-plugins/docker-scout
            packages: ./cmd/docker-scout
      outputs:
        - source: ${target.dir}/usr/local/libexec/docker/cli-plugins/docker-scout
          target: /usr/local/libexec/docker/cli-plugins/docker-scout
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/scout-cli
          target: /opt/docker/sbom/scout-cli
          uid: 0
          gid: 0
    - name: docker-cli
      uses: dhi.io/golang:1.25.9-debian13-dev@sha256:2714b77de923fab1c1567b41a53a8647c7f4f511cae36ad030b6de2e9037759c
      contents:
        packages:
          - bash
          - btrfs-progs
          - build-essential
          - ca-certificates
          - libseccomp-dev
          - libtool
          - linux-libc-dev
          - liblvm2-dev
        files:
          - url: git+https://github.com/docker/cli.git#v29.4.0
            checksum: 9d7ad9ff180b43ae5577d048a7bac1159ce7bacf
            path: /go/src/github.com/docker/cli
            spdx:
              name: docker-cli
              version: 29.4.0
              packages:
                - name: docker-cli
                  purl: pkg:golang/github.com/docker/cli@29.4.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build
          work-dir: /go/src/github.com/docker/cli
          runs: |
            set -eux -o pipefail

            export DISABLE_WARN_OUTSIDE_CONTAINER=1
            export LDFLAGS=""
            export CGO_ENABLED=1

            make VERSION="29.4.0" dynbinary

            install -Dm755 build/docker-linux-* "${target.dir}/usr/local/bin/docker"
      outputs:
        - source: ${target.dir}/usr/local/bin/docker
          target: /usr/local/bin/docker
          uid: 0
