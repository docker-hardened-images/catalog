          - name: dhi.io/rust:1.96.0-debian13@sha256:81361752ec850a3d42d0c06cc814267a6432c8ff6544c65ecc2a073f421af54b
            includes:
              - usr/local/bin/cargo
              - usr/local/bin/rustc
              - usr/local/lib
            uid: 0
            gid: 0
          - name: dhi.io/pkg-go-yq:4.53.3-debian13@sha256:71e4e1bb3ff331c65e76445a7a43a4acc37e3b836527dcfdd19f5ef8d1ced717
            includes:
              - usr/local/bin/yq
            uid: 0
            gid: 0
      pipeline:
        - name: install uv
          privileged: true
          runs: |
            set -eux -o pipefail

            pip install uv
        - name: edit constraints
          work-dir: ${source.dir}/airflow
          runs: |
            set -eux -o pipefail

            # Patch constraints file with targeted upgrades to remediate CVEs
            # Create empty overrides file (used by uv pip install --overrides if needed)
            touch ./overrides.txt

            # cryptography 46.0.7 fixes CVE-2026-39892 (medium severity, buffer bounds issue).
            # 3.2.0 constraints pin 46.0.6, which is one patch behind the fix.
            sed -i 's/cryptography==46\.0\.6/cryptography==46.0.7/g' ./constraints.txt # CVE-2026-39892

            sed -i 's/Pygments==2\.19\.2/Pygments==2.20.0/' ./constraints.txt # CVE-2026-4539

            # Upgrade to allow for new litellm
            sed -i 's/^google-cloud-aiplatform==1\.148\.1/google-cloud-aiplatform==1.155.0/g' ./constraints.txt

            # Match this to google-cloud-aiplatform
            # Fixes CVE-2026-40217
            sed -i 's/litellm==1\.82\.6/litellm==1.85.4/' ./constraints.txt
            for pkg in importlib_metadata; do
              version=$(grep -i "^${pkg}==" ./constraints.txt | head -1 | sed 's/.*==//')
              if [ -n "$version" ]; then
                echo "${pkg}==${version}" >> ./overrides.txt
              fi
            done

            # aiohttp 3.14.0 fixes multiple CVEs (CVE-2026-47265, CVE-2026-34993).
            sed -i 's/^aiohttp==3\.13\.5/aiohttp==3.14.0/g' ./constraints.txt

            sed -i 's/python-multipart==0\.0\.26/python-multipart==0.0.27/' ./constraints.txt # CVE-2026-42561

            sed -i 's/Mako==1\.3\.11/Mako==1.3.12/' ./constraints.txt # CVE-2026-44307

            sed -i 's/urllib3==2\.6\.3/urllib3==2.7.0/' ./constraints.txt # CVE-2026-44432, CVE-2026-44431

            sed -i 's/Authlib==1\.6\.9/Authlib==1.6.12/' ./constraints.txt # GHSA-jj8c-mmj3-mmgv, CVE-2026-44681

            sed -i 's/GitPython==3\.1\.46/GitPython==3.1.50/' ./constraints.txt # CVE-2026-44244, CVE-2026-44243

            sed -i 's/idna==3\.11/idna==3.15/' ./constraints.txt # CVE-2026-45409

            sed -i 's/asyncssh==2\.22\.0/asyncssh==2.23.0/' ./constraints.txt # CVE-2026-45309

            # apache-airflow-providers-smtp 3.0.0 fixes CVE-2026-41016
            sed -i 's/apache-airflow-providers-smtp==2\.4\.5/apache-airflow-providers-smtp==3.0.0/' ./constraints.txt # CVE-2026-41016

            # apache-airflow-providers-elasticsearch 6.5.3 fixes CVE-2026-41018
            sed -i 's/apache-airflow-providers-elasticsearch==6\.5\.2/apache-airflow-providers-elasticsearch==6.5.3/' ./constraints.txt # CVE-2026-41018

            # apache-airflow-providers-google 22.0.0 fixes CVE-2026-45361
            sed -i 's/apache-airflow-providers-google==21\.1\.0/apache-airflow-providers-google==22.0.0/' ./constraints.txt # CVE-2026-45361

            # PyJWT 2.13.0 fixes CVE-2026-48526, CVE-2026-48525, CVE-2026-48522, CVE-2026-48524
            sed -i 's/PyJWT==2\.12\.1/PyJWT==2.13.0/' ./constraints.txt # CVE-2026-48526, CVE-2026-48525, CVE-2026-48522, CVE-2026-48524
        - name: build
          work-dir: ${source.dir}/airflow
          privileged: true
          runs: |
            set -eux -o pipefail

            # Build the core packages
            uv build --package apache-airflow
            uv build --package apache-airflow-core
            uv build --package apache-airflow-task-sdk

            # Build the few core providers
            providers="common-compat common-io common-sql smtp standard"
            providers_only_binary_flags=""
            for provider in $providers; do
              ${source.dir}/scripts/build-provider $provider
              providers_only_binary_flags="$providers_only_binary_flags --only-binary=apache-airflow-providers-$provider"
            done

            # https://github.com/astral-sh/uv/issues/6384
            echo '[tool.uv.extra-build-dependencies]' >> pyproject.toml
            echo 'wirerope = ["setuptools==80.8.0"]' >> pyproject.toml

            # Remove wait period to allow us to patch sooner
            sed -i '/^exclude-newer = "4 days"$/d' ./pyproject.toml

            # Bump up build concurrency
            export UV_CONCURRENT_BUILDS="$(nproc)"
            export CMAKE_BUILD_PARALLEL_LEVEL="$(nproc)"

            uv pip install \
              --constraints constraints.txt \
              --overrides overrides.txt \
              --no-binary=:all: \
              --only-binary=apache-airflow \
              --only-binary=apache-airflow-core \
              --only-binary=apache-airflow-task-sdk \
              $providers_only_binary_flags \
              --prefix ${target.dir}/opt/airflow \
              dist/*.whl

            git stash
        - name: create default config
          runs: |
            set -eux -o pipefail

            # Create the default configuration file. Otherwise, airflow will try to create it on startup and fail if it doesn't have permission.
            export PYTHONPATH="${target.dir}/opt/airflow/lib/python3.13/site-packages"
            "${target.dir}/opt/airflow/bin/airflow" config list --defaults > "${target.dir}/opt/airflow/airflow.cfg"
        - name: build main ui
          privileged: true
          runs: |
            set -eux -o pipefail

            # Previous build steps checked out tags for different providers
            cd "${source.dir}/airflow"
            git checkout "cde4885818be51a6cdcfdf9275e100bf070025de"

            # pkg-node currently does not contain corepack
            npm install -g corepack

            export PATH=/opt/nodejs/node-v22.22.3/bin:$PATH

            # we must cd as corepack has no flag to set cwd (nodejs/corepack#677)
            cd '${source.dir}/airflow/airflow-core/src/airflow/ui'

            corepack pnpm config set dangerously-allow-all-builds true --location project

            touch pnpm-workspace.yaml

            # CVE-2024-53382
            yq -i '.overrides."prismjs" = "1.30.0"' pnpm-workspace.yaml

            # CVE-2026-42264, CVE-2026-42035, CVE-2026-42033, CVE-2026-42043, CVE-2026-42039, CVE-2026-42038, CVE-2026-42044, CVE-2026-42042, CVE-2026-42037, CVE-2026-42036, CVE-2026-42034, CVE-2026-42041, CVE-2026-42040, CVE-2026-44494, CVE-2026-44492, CVE-2026-44490, CVE-2026-44489
            corepack pnpm up axios@1.16.0

            # CVE-2026-41691
            corepack pnpm up i18next-http-backend@3.0.5

            # CVE-2026-42211, CVE-2026-33245, CVE-2026-42342, CVE-2026-40181, CVE-2026-33244
            corepack pnpm up react-router-dom@7.15.0

            corepack pnpm install
            corepack pnpm run build --outDir ${target.dir}/ui

            # prep for sbom
            rm -rf node_modules
            corepack pnpm install --frozen-lockfile --production
        - name: main ui sbom
          uses: sbom@v1
          with:
            extraScanners: javascript-package-cataloger
            prefix: airflow-ui
            source: ${source.dir}/airflow/airflow-core/src/airflow/ui
        - name: build simple auth ui
          work-dir: ${source.dir}/airflow/airflow-core/src/airflow/api_fastapi/auth/managers/simple/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            export PATH=/opt/nodejs/node-v22.22.3/bin:$PATH

            corepack pnpm config set dangerously-allow-all-builds true --location project

            # CVE-2026-42264, CVE-2026-42035, CVE-2026-42033, CVE-2026-42043, CVE-2026-42039, CVE-2026-42038, CVE-2026-42044, CVE-2026-42042, CVE-2026-42037, CVE-2026-42036, CVE-2026-42034, CVE-2026-42041, CVE-2026-42040, CVE-2026-44494, CVE-2026-44492, CVE-2026-44490, CVE-2026-44489
            corepack pnpm up axios@1.16.0

            # CVE-2026-42211, CVE-2026-33245, CVE-2026-42342, CVE-2026-40181, CVE-2026-33244
            corepack pnpm up react-router-dom@7.15.0

            corepack pnpm install
            corepack pnpm run build --outDir ${target.dir}/simple-auth-ui

            # prep for sbom
            rm -rf node_modules
            corepack pnpm install --frozen-lockfile --production
        - name: simple auth ui sbom
          uses: sbom@v1
          with:
            extraScanners: javascript-package-cataloger
            prefix: airflow-simple-auth-ui
            source: ${source.dir}/airflow/airflow-core/src/airflow/api_fastapi/auth/managers/simple/ui
      paths:
        - type: file
          path: ${source.dir}/scripts/build-provider
          uid: 0
          gid: 0
          mode: "0755"
          source: image/airflow/bin/build-provider
      outputs:
        - source: ${target.dir}/opt/airflow
          target: /opt/airflow
          uid: 0
          gid: 0
        - source: ${target.dir}/ui
          target: /opt/airflow/lib/python3.13/site-packages/airflow/ui/dist
          uid: 0
          gid: 0
        - source: ${target.dir}/simple-auth-ui
          target: /opt/airflow/lib/python3.13/site-packages/airflow/api_fastapi/auth/managers/simple/ui/dist
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/airflow-ui
          target: /opt/docker/sbom/airflow-ui
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/airflow-simple-auth-ui
          target: /opt/docker/sbom/airflow-simple-auth-ui
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/airflow
          target: /opt/docker/sbom/airflow
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.13.13-debian13@sha256:dc8f7c6aab976c2d0bc03737705888ce5c39a5b52036e4df1d84e4448bfdaa1c
