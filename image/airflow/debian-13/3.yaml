          - pkg-config
          - patchelf
          - unixodbc-dev
        files:
          - url: git+https://github.com/apache/airflow.git#3.2.2
            checksum: cde4885818be51a6cdcfdf9275e100bf070025de
            path: ${source.dir}/airflow
