# syntax=dhi.io/build:2-debian13

name: Airflow 3.x (compat)
image: dhi.io/airflow
variant: runtime
flavor: compat
tags:
  - 3-compat
  - 3.2-compat
  - 3.2.0-compat
  - 3-debian13-compat
  - 3-python3.13-compat
  - 3.2-debian13-compat
  - 3.2-python3.13-compat
  - 3.2.0-debian13-compat
  - 3.2.0-python3.13-compat
  - 3-python3.13-debian13-compat
  - 3.2-python3.13-debian13-compat
  - 3.2.0-python3.13-debian13-compat
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-04-22"
vars:
  COMMIT_SHA: 3bc3ccfacc3dec9f359a3b153bfd4fc706c661ba
  NODE_DIGEST: sha256:b69017f57b76d5656ef204059067d52bea8eee0ef1fd0767c7a963dab49ce8a9
  NODE_VERSION: 22.22.2
  PYTHON_BUILD_DIGEST: sha256:845321bee112dc8c2220dfaecc5204096bd8f8ab349a7d8bb862693751aa0e2d
  PYTHON_BUILD_VERSION: 3.13.13
  PYTHON_DIGEST: sha256:cb9222e6852d4017973551e444ee5e4af8e601e462415b12c80e7bfecb6efc45
  PYTHON_FIPS_TAG: ""
  PYTHON_MAJOR_MINOR_VERSION: "3.13"
  PYTHON_VERSION: 3.13.13
  RUST_DIGEST: sha256:a3832b9b80008f5449fbdd552a76d98a933edeebdac06c8e49ffb6f33efb2665
  RUST_VERSION: 1.94.1
  SEMVER_MAJOR_MINOR_VERSION: "3.2"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.2.0
  VERSION: 3.2.0
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - ca-certificates
    - libffi8
    - libldap2
    - libmariadb3
    - libpq5
    - libsasl2-2
    - libxml2
    - libxslt1.1
    - tzdata
    - unixodbc
  builds:
    - name: airflow
      uses: dhi.io/python:3.13.13-debian13-dev@sha256:845321bee112dc8c2220dfaecc5204096bd8f8ab349a7d8bb862693751aa0e2d
      environment:
        UV_NO_MANAGED_PYTHON: "true"
        UV_PYTHON_DOWNLOADS: never
      contents:
        packages:
          - bash
          - build-essential
          - g++
          - gfortran
          - git
          - libffi-dev
          - libldap2-dev
          - libmariadb-dev
          - libpq-dev
          - libsasl2-dev
          - libssl-dev
          - libxml2-dev
          - libxslt1-dev
          - pkg-config
          - patchelf
          - unixodbc-dev
        files:
          - url: git+https://github.com/apache/airflow.git#3.2.0
            checksum: 3bc3ccfacc3dec9f359a3b153bfd4fc706c661ba
            path: ${source.dir}/airflow
            spdx:
              name: airflow
              version: 3.2.0
              packages:
                - name: airflow
                  purl: pkg:dhi/airflow@3.2.0
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://raw.githubusercontent.com/apache/airflow/constraints-3.2.0/constraints-3.13.txt
            path: ${source.dir}/airflow/constraints.txt
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/pkg-node:22.22.2-debian13@sha256:b69017f57b76d5656ef204059067d52bea8eee0ef1fd0767c7a963dab49ce8a9
            includes:
              - opt/nodejs
              - usr/local/bin/node
              - usr/local/bin/npm
            uid: 0
            gid: 0
          - name: dhi.io/rust:1.94.1-debian13@sha256:a3832b9b80008f5449fbdd552a76d98a933edeebdac06c8e49ffb6f33efb2665
            includes:
              - usr/local/bin/cargo
              - usr/local/bin/rustc
              - usr/local/lib
            uid: 0
            gid: 0
      pipeline:
        - name: install uv
          privileged: true
          runs: |
            set -eux -o pipefail

            pip install uv
        - name: edit constraints
          work-dir: ${source.dir}/airflow
          runs: |
            set -eux -o pipefail

            # Patch constraints file with targeted upgrades to remediate CVEs
            # Create empty overrides file (used by uv pip install --overrides if needed)
            touch ./overrides.txt

            # cryptography 46.0.7 fixes CVE-2026-39892 (medium severity, buffer bounds issue).
            # 3.2.0 constraints pin 46.0.6, which is one patch behind the fix.
            sed -i 's/cryptography==46\.0\.6/cryptography==46.0.7/g' ./constraints.txt # CVE-2026-39892

            sed -i 's/Pygments==2\.19\.2/Pygments==2.20.0/' ./constraints.txt # CVE-2026-4539

            # litellm 1.83.0 fixes CVE-2026-35030 and CVE-2026-35029.
            # google-cloud-aiplatform[evaluation] pins litellm<=1.82.6 because versions
            # 1.82.7–1.82.8 were compromised in a supply chain attack and yanked from PyPI.
            # 1.83.0 is the clean post-incident release and is safe to use; the upstream
            # pin hasn't been updated yet.
            sed -i 's/litellm==1\.82\.6/litellm==1.83.0/' ./constraints.txt # CVE-2026-35030, CVE-2026-35029
            echo "litellm==1.83.0" >> ./overrides.txt                       # CVE-2026-35030, CVE-2026-35029

            # aiohttp 3.13.4 fixes multiple CVEs (CVE-2026-22815, CVE-2026-34513–CVE-2026-34520, CVE-2026-34525).
            sed -i 's/^aiohttp==3\.13\.3/aiohttp==3.13.4/g' ./constraints.txt

            sed -i 's/python-multipart==0\.0\.22/python-multipart==0.0.26/' ./constraints.txt # CVE-2026-40347
        - name: build
          work-dir: ${source.dir}/airflow
          privileged: true
          runs: |
            set -eux -o pipefail

            # Build the core packages
            uv build --package apache-airflow
            uv build --package apache-airflow-core
            uv build --package apache-airflow-task-sdk

            # Build the few core providers
            providers="common-compat common-io common-sql smtp standard"
            providers_only_binary_flags=""
            for provider in $providers; do
              ${source.dir}/scripts/build-provider $provider
              providers_only_binary_flags="$providers_only_binary_flags --only-binary=apache-airflow-providers-$provider"
            done

            # https://github.com/astral-sh/uv/issues/6384
            echo '[tool.uv.extra-build-dependencies]' >> pyproject.toml
            echo 'wirerope = ["setuptools==80.8.0"]' >> pyproject.toml

            uv pip install \
              --constraints constraints.txt \
              --overrides overrides.txt \
              --no-binary=:all: \
              --only-binary=apache-airflow \
              --only-binary=apache-airflow-core \
              --only-binary=apache-airflow-task-sdk \
              $providers_only_binary_flags \
              --prefix ${target.dir}/opt/airflow \
              dist/*.whl

            git stash
        - name: build providers and install extra packages for compat image
          work-dir: ${source.dir}/airflow
          privileged: true
          runs: |
            set -eux -o pipefail

            # no need to reinstall wheels from core image
            rm -rf dist/*.whl

            providers="amazon celery cncf-kubernetes common-messaging docker elasticsearch fab ftp git google grpc hashicorp http microsoft-azure mysql odbc openlineage postgres redis sendgrid sftp slack snowflake ssh"
            providers_only_binary_flags=""
            for provider in $providers; do
              ${source.dir}/scripts/build-provider $provider
              providers_only_binary_flags="$providers_only_binary_flags --only-binary=apache-airflow-providers-$provider"
            done

            # More packages that the default airflow image has
            extra_packages="aiobotocore[boto3] authlib eventlet gevent greenlet graphviz python-ldap pandas[sql-other] statsd"

            # Some packages don't have source distributions on pypi.
            no_source_only_binary_flags="--only-binary=redshift-connector --only-binary=ray --only-binary=protoc-wheel-0 --only-binary=openlineage-integration-common --only-binary=openlineage-python"
            # Some packages aren't worth the hassle and time right now to build from source.
            # Future improvements could include building these from source.
            annoying_only_binary_flags="--only-binary=pyarrow --only-binary=shapely --only-binary=grpcio --only-binary=scipy --only-binary=numpy --only-binary=adbc-driver-sqlite --only-binary=adbc-driver-postgresql --only-binary=hf-xet"

            # https://github.com/astral-sh/uv/issues/6384
            echo '[tool.uv.extra-build-dependencies]' >> pyproject.toml
            echo 'wirerope = ["setuptools==80.8.0"]' >> pyproject.toml

            uv pip install \
              --constraints constraints.txt \
              --overrides overrides.txt \
              --no-binary=:all: \
              $providers_only_binary_flags \
              $no_source_only_binary_flags \
              $annoying_only_binary_flags \
              --prefix ${target.dir}/opt/airflow \
              dist/*.whl \
              $extra_packages

            git stash
        - name: patch ray bundled aiohttp for compat image
          privileged: true
          runs: |
            set -eux -o pipefail

            # The compat image installs the Google provider which pulls in ray.
            # ray bundles its own aiohttp internally; patch it to fix multiple CVEs
            # (CVE-2026-22815, CVE-2026-34513–CVE-2026-34520, CVE-2026-34525).
            uv pip install -U --target ${target.dir}/opt/airflow/lib/python3.13/site-packages/ray/_private/runtime_env/agent/thirdparty_files 'aiohttp>=3.13.4'
        - name: create default config
          runs: |
            set -eux -o pipefail

            # Create the default configuration file. Otherwise, airflow will try to create it on startup and fail if it doesn't have permission.
            export PYTHONPATH="${target.dir}/opt/airflow/lib/python3.13/site-packages"
            "${target.dir}/opt/airflow/bin/airflow" config list --defaults > "${target.dir}/opt/airflow/airflow.cfg"
        - name: build main ui
          privileged: true
          runs: |
            set -eux -o pipefail

            # Previous build steps checked out tags for different providers
            cd "${source.dir}/airflow"
            git checkout "3bc3ccfacc3dec9f359a3b153bfd4fc706c661ba"

            # pkg-node currently does not contain corepack
            npm install -g corepack

            export PATH=/opt/nodejs/node-v22.22.2/bin:$PATH

            # we must cd as corepack has no flag to set cwd (nodejs/corepack#677)
            cd '${source.dir}/airflow/airflow-core/src/airflow/ui'

            npm pkg set pnpm.overrides.prismjs=1.30.0
            npm pkg set pnpm.overrides.axios=1.15.0
            npm pkg set pnpm.overrides.mdast-util-to-hast=13.2.1
            npm pkg set pnpm.overrides."@remix-run/router"=1.23.2
            npm pkg set pnpm.overrides.react-router-dom=6.30.2
            npm pkg set pnpm.overrides.lodash=4.18.0
            npm pkg set pnpm.overrides.yaml=2.8.3
            npm pkg set pnpm.overrides.defu=6.1.5
            npm pkg set pnpm.overrides.follow-redirects=1.16.0

            corepack pnpm install
            corepack pnpm run build --outDir ${target.dir}/ui

            # prep for sbom
            rm -rf node_modules
            corepack pnpm install --frozen-lockfile --production
        - name: main ui sbom
          uses: sbom@v1
          with:
            extraScanners: javascript-package-cataloger
            prefix: airflow-ui
            source: ${source.dir}/airflow/airflow-core/src/airflow/ui
        - name: build simple auth ui
          work-dir: ${source.dir}/airflow/airflow-core/src/airflow/api_fastapi/auth/managers/simple/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            export PATH=/opt/nodejs/node-v22.22.2/bin:$PATH

            npm pkg set pnpm.overrides.axios=1.15.0
            npm pkg set pnpm.overrides."@remix-run/router"=1.23.2
            npm pkg set pnpm.overrides.react-router-dom=6.30.2
            npm pkg set pnpm.overrides.yaml=2.8.3
            npm pkg set pnpm.overrides.defu=6.1.5
            npm pkg set pnpm.overrides.follow-redirects=1.16.0

            corepack pnpm install
            corepack pnpm run build --outDir ${target.dir}/simple-auth-ui

            # prep for sbom
            rm -rf node_modules
            corepack pnpm install --frozen-lockfile --production
        - name: simple auth ui sbom
          uses: sbom@v1
          with:
            extraScanners: javascript-package-cataloger
            prefix: airflow-simple-auth-ui
            source: ${source.dir}/airflow/airflow-core/src/airflow/api_fastapi/auth/managers/simple/ui
      paths:
        - type: file
          path: ${source.dir}/scripts/build-provider
          uid: 0
          gid: 0
          mode: "0755"
          source: image/airflow/bin/build-provider
      outputs:
        - source: ${target.dir}/opt/airflow
          target: /opt/airflow
          uid: 0
          gid: 0
        - source: ${target.dir}/ui
          target: /opt/airflow/lib/python3.13/site-packages/airflow/ui/dist
          uid: 0
          gid: 0
        - source: ${target.dir}/simple-auth-ui
          target: /opt/airflow/lib/python3.13/site-packages/airflow/api_fastapi/auth/managers/simple/ui/dist
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/airflow-ui
          target: /opt/docker/sbom/airflow-ui
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/airflow-simple-auth-ui
          target: /opt/docker/sbom/airflow-simple-auth-ui
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/airflow
          target: /opt/docker/sbom/airflow
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.13.13-debian13@sha256:cb9222e6852d4017973551e444ee5e4af8e601e462415b12c80e7bfecb6efc45
      includes:
        - opt/**
        - usr/**
      uid: 0
      gid: 0
accounts:
  run-as: airflow
  users:
    - name: airflow
      uid: 50000
      gid: 50000
  groups:
    - name: airflow
      gid: 50000
      members:
        - airflow
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /opt/airflow
environment:
  AIRFLOW_HOME: /opt/airflow
  PATH: /opt/airflow/bin:/opt/python/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  PYTHONPATH: /opt/airflow/lib/python3.13/site-packages
paths:
  - type: directory
    path: /opt/airflow/logs
    uid: 50000
    gid: 50000
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Airflow image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - airflow
ports:
  - 8080/tcp
