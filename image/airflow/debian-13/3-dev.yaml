# syntax=dhi.io/build:2-debian13

name: Airflow 3.x (dev)
image: dhi.io/airflow
variant: dev
tags:
  - 3-dev
  - 3.2-dev
  - 3.2.1-dev
  - 3-debian13-dev
  - 3-python3.13-dev
  - 3.2-debian13-dev
  - 3.2-python3.13-dev
  - 3.2.1-debian13-dev
  - 3.2.1-python3.13-dev
  - 3-python3.13-debian13-dev
  - 3.2-python3.13-debian13-dev
  - 3.2.1-python3.13-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-04-22"
vars:
  COMMIT_SHA: e5968b88e45f2af9d1047a51188355af7cbe79f4
  NODE_DIGEST: sha256:25c58bd46f6755d04193092b9220c4bf53b06674e5b60973f10dbac2322410c1
  NODE_VERSION: 22.22.2
  PYTHON_BUILD_DIGEST: sha256:c96d691f22c82f3dfc7f78c7935331a127d5f44e273265a1e03912f819eb640e
  PYTHON_BUILD_VERSION: 3.13.13
  PYTHON_DIGEST: sha256:4369c0807870672a38a820b6ab2e24a0d80c13e88f7b303e3404c1fffca63977
  PYTHON_FIPS_TAG: ""
  PYTHON_MAJOR_MINOR_VERSION: "3.13"
  PYTHON_VERSION: 3.13.13
  RUST_DIGEST: sha256:9ad552bf137d3b8536146f2dd376b576dd9f5d5357331cf245fcadbd55dee6d2
  RUST_VERSION: 1.95.0
  SEMVER_MAJOR_MINOR_VERSION: "3.2"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.2.1
  VERSION: 3.2.1
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libffi8
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: airflow
      uses: dhi.io/python:3.13.13-debian13-dev@sha256:c96d691f22c82f3dfc7f78c7935331a127d5f44e273265a1e03912f819eb640e
      environment:
        UV_NO_MANAGED_PYTHON: "true"
        UV_PYTHON_DOWNLOADS: never
      contents:
        packages:
          - bash
          - build-essential
          - g++
          - gfortran
          - git
          - libffi-dev
          - libldap2-dev
          - libmariadb-dev
          - libpq-dev
          - libsasl2-dev
          - libssl-dev
          - libxml2-dev
          - libxslt1-dev
          - pkg-config
          - patchelf
          - unixodbc-dev
        files:
          - url: git+https://github.com/apache/airflow.git#3.2.1
            checksum: e5968b88e45f2af9d1047a51188355af7cbe79f4
            path: ${source.dir}/airflow
            spdx:
              name: airflow
              version: 3.2.1
              packages:
                - name: airflow
                  purl: pkg:dhi/airflow@3.2.1
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://raw.githubusercontent.com/apache/airflow/constraints-3.2.1/constraints-3.13.txt
            path: ${source.dir}/airflow/constraints.txt
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/pkg-node:22.22.2-debian13@sha256:25c58bd46f6755d04193092b9220c4bf53b06674e5b60973f10dbac2322410c1
            includes:
              - opt/nodejs
              - usr/local/bin/node
              - usr/local/bin/npm
            uid: 0
            gid: 0
          - name: dhi.io/rust:1.95.0-debian13@sha256:9ad552bf137d3b8536146f2dd376b576dd9f5d5357331cf245fcadbd55dee6d2
            includes:
              - usr/local/bin/cargo
              - usr/local/bin/rustc
              - usr/local/lib
            uid: 0
            gid: 0
      pipeline:
        - name: install uv
          privileged: true
          runs: |
            set -eux -o pipefail

            pip install uv
        - name: edit constraints
          work-dir: ${source.dir}/airflow
          runs: |
            set -eux -o pipefail

            # Patch constraints file with targeted upgrades to remediate CVEs
            # Create empty overrides file (used by uv pip install --overrides if needed)
            touch ./overrides.txt

            # cryptography 46.0.7 fixes CVE-2026-39892 (medium severity, buffer bounds issue).
            # 3.2.0 constraints pin 46.0.6, which is one patch behind the fix.
            sed -i 's/cryptography==46\.0\.6/cryptography==46.0.7/g' ./constraints.txt # CVE-2026-39892

            sed -i 's/Pygments==2\.19\.2/Pygments==2.20.0/' ./constraints.txt # CVE-2026-4539

            # litellm 1.83.7 fixes CVE-2026-35030, CVE-2026-35029, GHSA-xqmj-j6mv-4862.
            # google-cloud-aiplatform[evaluation] pins litellm<=1.82.6 — override that.
            # litellm 1.83.7 also hard-pins several deps to older versions (pydantic,
            # click, jsonschema, etc.); override those to keep the constraint versions.
            sed -i 's/litellm==1\.82\.6/litellm==1.83.7/' ./constraints.txt
            echo "litellm==1.83.7" >> ./overrides.txt
            for pkg in click importlib_metadata jsonschema openai pydantic pydantic_core python-dotenv; do
              version=$(grep -i "^${pkg}==" ./constraints.txt | head -1 | sed 's/.*==//')
              if [ -n "$version" ]; then
                echo "${pkg}==${version}" >> ./overrides.txt
              fi
            done

            # aiohttp 3.13.4 fixes multiple CVEs (CVE-2026-22815, CVE-2026-34513–CVE-2026-34520, CVE-2026-34525).
            sed -i 's/^aiohttp==3\.13\.3/aiohttp==3.13.4/g' ./constraints.txt

            sed -i 's/python-multipart==0\.0\.22/python-multipart==0.0.26/' ./constraints.txt # CVE-2026-40347

            sed -i 's/Mako==1\.3\.10/Mako==1.3.11/' ./constraints.txt # GHSA-v92g-xgxw-vvmm

            # lxml is pinned to 6.0.2 out of caution but 6.1.0 is compatible
            sed -i 's/lxml==6\.0\.2/lxml==6.1.0/' ./constraints.txt # CVE-2026-41066
            echo "lxml==6.1.0" >> ./overrides.txt

            sed -i 's/Authlib==1\.6\.9/Authlib==1.6.11/' ./constraints.txt # GHSA-jj8c-mmj3-mmgv
        - name: build
          work-dir: ${source.dir}/airflow
          privileged: true
          runs: |
            set -eux -o pipefail

            # Build the core packages
            uv build --package apache-airflow
            uv build --package apache-airflow-core
            uv build --package apache-airflow-task-sdk

            # Build the few core providers
            providers="common-compat common-io common-sql smtp standard"
            providers_only_binary_flags=""
            for provider in $providers; do
              ${source.dir}/scripts/build-provider $provider
              providers_only_binary_flags="$providers_only_binary_flags --only-binary=apache-airflow-providers-$provider"
            done

            # https://github.com/astral-sh/uv/issues/6384
            echo '[tool.uv.extra-build-dependencies]' >> pyproject.toml
            echo 'wirerope = ["setuptools==80.8.0"]' >> pyproject.toml

            uv pip install \
              --constraints constraints.txt \
              --overrides overrides.txt \
              --no-binary=:all: \
              --only-binary=apache-airflow \
              --only-binary=apache-airflow-core \
              --only-binary=apache-airflow-task-sdk \
              $providers_only_binary_flags \
              --prefix ${target.dir}/opt/airflow \
              dist/*.whl

            git stash
        - name: create default config
          runs: |
            set -eux -o pipefail

            # Create the default configuration file. Otherwise, airflow will try to create it on startup and fail if it doesn't have permission.
            export PYTHONPATH="${target.dir}/opt/airflow/lib/python3.13/site-packages"
            "${target.dir}/opt/airflow/bin/airflow" config list --defaults > "${target.dir}/opt/airflow/airflow.cfg"
        - name: build main ui
          privileged: true
          runs: |
            set -eux -o pipefail

            # Previous build steps checked out tags for different providers
            cd "${source.dir}/airflow"
            git checkout "e5968b88e45f2af9d1047a51188355af7cbe79f4"

            # pkg-node currently does not contain corepack
            npm install -g corepack

            export PATH=/opt/nodejs/node-v22.22.2/bin:$PATH

            # we must cd as corepack has no flag to set cwd (nodejs/corepack#677)
            cd '${source.dir}/airflow/airflow-core/src/airflow/ui'

            npm pkg set pnpm.overrides.prismjs=1.30.0
            npm pkg set pnpm.overrides.axios=1.15.0
            npm pkg set pnpm.overrides.mdast-util-to-hast=13.2.1
            npm pkg set pnpm.overrides."@remix-run/router"=1.23.2
            npm pkg set pnpm.overrides.react-router-dom=6.30.2
            npm pkg set pnpm.overrides.lodash=4.18.0
            npm pkg set pnpm.overrides.yaml=2.8.3
            npm pkg set pnpm.overrides.defu=6.1.5
            npm pkg set pnpm.overrides.follow-redirects=1.16.0
            npm pkg set pnpm.overrides.i18next-http-backend=3.0.5

            corepack pnpm install
            corepack pnpm run build --outDir ${target.dir}/ui

            # prep for sbom
            rm -rf node_modules
            corepack pnpm install --frozen-lockfile --production
        - name: main ui sbom
          uses: sbom@v1
          with:
            extraScanners: javascript-package-cataloger
            prefix: airflow-ui
            source: ${source.dir}/airflow/airflow-core/src/airflow/ui
        - name: build simple auth ui
          work-dir: ${source.dir}/airflow/airflow-core/src/airflow/api_fastapi/auth/managers/simple/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            export PATH=/opt/nodejs/node-v22.22.2/bin:$PATH

            npm pkg set pnpm.overrides.axios=1.15.0
            npm pkg set pnpm.overrides."@remix-run/router"=1.23.2
            npm pkg set pnpm.overrides.react-router-dom=6.30.2
            npm pkg set pnpm.overrides.yaml=2.8.3
            npm pkg set pnpm.overrides.defu=6.1.5
            npm pkg set pnpm.overrides.follow-redirects=1.16.0

            corepack pnpm install
            corepack pnpm run build --outDir ${target.dir}/simple-auth-ui

            # prep for sbom
            rm -rf node_modules
            corepack pnpm install --frozen-lockfile --production
        - name: simple auth ui sbom
          uses: sbom@v1
          with:
            extraScanners: javascript-package-cataloger
            prefix: airflow-simple-auth-ui
            source: ${source.dir}/airflow/airflow-core/src/airflow/api_fastapi/auth/managers/simple/ui
        - name: add constraints for dev
          runs: |
            set -eux -o pipefail

            # This allows users to use the same constraints when installing providers
            cp ${source.dir}/airflow/constraints.txt ${target.dir}/opt/airflow/constraints.txt
      paths:
        - type: file
          path: ${source.dir}/scripts/build-provider
          uid: 0
          gid: 0
          mode: "0755"
          source: image/airflow/bin/build-provider
      outputs:
        - source: ${target.dir}/opt/airflow
          target: /opt/airflow
          uid: 0
          gid: 0
        - source: ${target.dir}/ui
          target: /opt/airflow/lib/python3.13/site-packages/airflow/ui/dist
          uid: 0
          gid: 0
        - source: ${target.dir}/simple-auth-ui
          target: /opt/airflow/lib/python3.13/site-packages/airflow/api_fastapi/auth/managers/simple/ui/dist
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/airflow-ui
          target: /opt/docker/sbom/airflow-ui
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/airflow-simple-auth-ui
          target: /opt/docker/sbom/airflow-simple-auth-ui
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/airflow
          target: /opt/docker/sbom/airflow
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.13.13-debian13-dev@sha256:c96d691f22c82f3dfc7f78c7935331a127d5f44e273265a1e03912f819eb640e
      includes:
        - opt/**
        - usr/**
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
