# syntax=dhi.io/build:2-debian13

name: Kubeflow Pipelines - Metadata Writer 2.16.x (dev)
image: dhi.io/kubeflow-pipelines-metadata-writer
variant: dev
tags:
  - 2-dev
  - 2.16-dev
  - 2.16.1-dev
  - 2-debian-dev
  - 2-debian13-dev
  - 2.16-debian-dev
  - 2.16-debian13-dev
  - 2.16.1-debian-dev
  - 2.16.1-debian13-dev
platforms:
  - linux/amd64
vars:
  COMMIT_SHA: 67a73cf809f7c76fee33c749f302f2bceedd8fab
  SEMVER_MAJOR_MINOR_VERSION: "2.16"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.16.1
  VERSION: 2.16.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libstdc++6
    - mawk
    - perl-base
    - python-3.11
    - python-3.11-dev
    - python3-pip
    - python3-setuptools
    - python3-wheel
    - sed
    - tzdata
    - util-linux
  builds:
    - name: kubeflow-pipelines-metadata-writer
      contents:
        packages:
          - python-3.11
          - python-3.11-dev
          - python3-pip
          - python3-setuptools
          - python3-wheel
          - libstdc++6
          - bash
          - coreutils
          - diffutils
          - findutils
          - gawk
          - grep
          - sed
          - build-essential
        files:
          - url: git+https://github.com/kubeflow/pipelines.git#2.16.1
            checksum: 67a73cf809f7c76fee33c749f302f2bceedd8fab
            path: ${source.dir}/kubeflow-pipelines
            spdx:
              name: kubeflow-pipelines
              version: 2.16.1
              packages:
                - name: kubeflow-pipelines
                  purl: pkg:github/kubeflow/pipelines@2.16.1#backend/metadata_writer
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: install
          work-dir: ${source.dir}/kubeflow-pipelines/backend/metadata_writer
          privileged: true
          runs: |
            set -eux -o pipefail

            # CVE-2024-47081, CVE-2025-4565, CVE-2026-25645
            sed -i 's/requests==2\.32\.5/requests==2.33.0/g; s/protobuf==.*/protobuf==4.25.8/g; s/ml-metadata==.*/ml-metadata==1.17.0/g' \
              'requirements.txt'
            # CVE-2026-21441, CVE-2026-44432, CVE-2026-44431
            sed -i 's/urllib3==.*/urllib3==2.7.0/g' 'requirements.txt'

            # CVE-2026-23490, CVE-2026-30922
            sed -i 's/pyasn1==0\.6\.2/pyasn1==0.6.3/g' 'requirements.txt'

            # CVE-2026-45409
            sed -i 's/idna==3\.10/idna==3.15/g' 'requirements.txt'

            cp -a 'src' '${target.dir}/app'

            python3 -m venv '${target.dir}/app/.venv'
            '${target.dir}/app/.venv/bin/python3' -m pip install -r 'requirements.txt'
      outputs:
        - source: ${target.dir}/app
          target: /app
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kubeflow-pipelines
          target: /opt/docker/sbom/kubeflow-pipelines
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  PYTHONUNBUFFERED: "1"
annotations:
  org.opencontainers.image.description: A minimal Kubeflow Pipelines metadata writer image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /app/.venv/bin/python3
  - /app/metadata_writer.py
