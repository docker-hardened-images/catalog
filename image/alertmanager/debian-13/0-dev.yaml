# syntax=dhi.io/build:2-debian13

name: Alertmanager 0.x (dev)
image: dhi.io/alertmanager
variant: dev
tags:
  - 0-dev
  - 0.32-dev
  - 0.32.2-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.32-debian-dev
  - 0.32-debian13-dev
  - 0.32.2-debian-dev
  - 0.32.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "0.32"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.32.2
  SUFFIX: -dev
  VERSION: 0.32.2-0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - alertmanager-dev=0.32.2-0
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /alertmanager
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: file
    path: /etc/alertmanager/alertmanager.yml
    uid: 65532
    gid: 65532
    mode: "0644"
    source: image/alertmanager/config/alertmanager.yml
annotations:
  org.opencontainers.image.description: A minimal Alertmanager image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/alertmanager
cmd:
  - --config.file=/etc/alertmanager/alertmanager.yml
  - --storage.path=/alertmanager
