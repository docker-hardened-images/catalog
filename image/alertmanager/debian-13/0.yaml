name: Alertmanager 0.x
image: dhi.io/alertmanager
variant: runtime
tags:
  - "0"
  - "0.32"
  - 0.32.0
  - 0-debian13
  - 0.32-debian13
  - 0.32.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 685a2a1c6bb01b2c17bc1bfae995cb3416c1115e
  GOLANG_REFERENCE: dhi/golang:1.25.9-debian13-dev@sha256:2714b77de923fab1c1567b41a53a8647c7f4f511cae36ad030b6de2e9037759c
  NODE_REFERENCE: dhi/pkg-node:24.14.1-debian13@sha256:1b731780521d67e5895f492b6e0cf412e0411358c1f02ba7dded2b230300990b
  SEMVER_MAJOR_MINOR_VERSION: "0.32"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.32.0
  VERSION: 0.32.0
contents:
  packages:
    - '!base-files'
  builds:
    - name: alertmanager
      uses: dhi.io/golang:1.25.9-debian13-dev@sha256:2714b77de923fab1c1567b41a53a8647c7f4f511cae36ad030b6de2e9037759c
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - nix-bin
        files:
          - url: git+https://github.com/prometheus/alertmanager.git#v0.32.0
            checksum: 685a2a1c6bb01b2c17bc1bfae995cb3416c1115e
            path: /go/src/github.com/prometheus/alertmanager
            spdx:
              name: alertmanager
              version: 0.32.0
              packages:
                - name: alertmanager
                  purl: pkg:golang/github.com/prometheus/alertmanager@0.32.0
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/pkg-node:24.14.1-debian13@sha256:1b731780521d67e5895f492b6e0cf412e0411358c1f02ba7dded2b230300990b
            includes:
              - opt/nodejs
              - opt/npm
              - usr/local/bin/node
              - usr/local/bin/npm
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/prometheus/alertmanager
          with:
            deps: []
            download: true
        - name: build ui
          work-dir: /go/src/github.com/prometheus/alertmanager/ui/app
          privileged: true
          caches:
            - path: /nix/store
          runs: |
            set -eux -o pipefail

            # Install JS deps first so node_modules/.bin exists. Skip elm's postinstall:
            # it tries to download a linux-arm64 binary that upstream never released.
            npm ci --ignore-scripts

            # Build under a nix-shell that provides a native linux-arm64 elm compiler
            # (nixpkgs has one, upstream elm/compiler does not). --run executes the
            # commands non-interactively inside the shell; --pure keeps host PATH out.
            nix-shell -I nixpkgs=channel:nixpkgs-unstable -p elmPackages.elm --run '
              set -eux -o pipefail
              ln -sf "$(command -v elm)" node_modules/.bin/elm
              npm run build
            '
        - name: run tests (without acceptance tests)
          work-dir: /go/src/github.com/prometheus/alertmanager
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            go test -race -count=1 -v $(go list ./... | grep -v './test')
        - name: build alertmanager
          uses: go/build@v1
          work-dir: /go/src/github.com/prometheus/alertmanager
          with:
            ldflags:
              - -s
              - -w
              - -X github.com/prometheus/common/version.Version=0.32.0
              - -X github.com/prometheus/common/version.Revision=685a2a1c6bb01b2c17bc1bfae995cb3416c1115e
              - -X github.com/prometheus/common/version.BuildUser=dhi
              - -X github.com/prometheus/common/version.BuildDate=${SOURCE_DATE_EPOCH}
            output: ${target.dir}/usr/local/bin/alertmanager
            packages: ./cmd/alertmanager
        - name: build amtool
          uses: go/build@v1
          work-dir: /go/src/github.com/prometheus/alertmanager
          with:
            ldflags:
              - -s
              - -w
              - -X github.com/prometheus/common/version.Version=0.32.0
              - -X github.com/prometheus/common/version.Revision=685a2a1c6bb01b2c17bc1bfae995cb3416c1115e
              - -X github.com/prometheus/common/version.BuildUser=dhi
              - -X github.com/prometheus/common/version.BuildDate=${SOURCE_DATE_EPOCH}
            output: ${target.dir}/usr/local/bin/amtool
            packages: ./cmd/amtool
        - name: run acceptance tests
          work-dir: /go/src/github.com/prometheus/alertmanager
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            ln -s "${target.dir}/usr/local/bin/alertmanager" ./alertmanager
            ln -s "${target.dir}/usr/local/bin/amtool" ./amtool

            go test -count=1 -v ./test/...
        - name: copy config
          runs: |
            set -eux -o pipefail

            cp -r /go/src/github.com/prometheus/alertmanager/examples/ha/alertmanager.yml ${target.dir}/alertmanager.yml
      outputs:
        - source: ${target.dir}/usr/local/bin/alertmanager
          target: /usr/local/bin/alertmanager
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/amtool
          target: /usr/local/bin/amtool
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/alertmanager
          target: /opt/docker/sbom/alertmanager
          uid: 0
          gid: 0
        - source: ${target.dir}/alertmanager.yml
          target: /etc/alertmanager/alertmanager.yml
          uid: 65532
          gid: 65532
          mode: "0644"
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
