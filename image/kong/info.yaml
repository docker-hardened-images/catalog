metadata:
  display-name: Kong
  short-description: Cloud-native, platform-agnostic, scalable API Gateway with plugin ecosystem for authentication, rate limiting, and observability. Supports REST, GraphQL, gRPC, and WebSocket protocols with DB-less and declarative configuration modes.
  featured: false
  home-url: https://github.com/Kong/kong
  categories:
    - networking
    - security
  included-tools:
    - name: kong
      description: Main Kong Gateway binary for routing, authentication, rate limiting, request/response transformations, and traffic control for APIs and microservices
    - name: kong-health
      description: Health check utility for Kong container health monitoring and readiness probes
    - name: luarocks
      description: Lua package manager for installing and managing custom Kong plugins
    - name: luarocks-admin
      description: Administrative tool for LuaRocks package management and plugin administration
    - name: nginx
      description: OpenResty NGINX web server that powers Kong's proxy and admin API functionality
    - name: luajit
      description: LuaJIT interpreter for executing Lua code used by Kong plugins and configuration
