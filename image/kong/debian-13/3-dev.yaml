# syntax=dhi.io/build:2-debian13

name: Kong 3.x (dev)
image: dhi.io/kong
variant: dev
tags:
  - 3-dev
  - 3.9-dev
  - 3.9.1-dev
  - 3-debian13-dev
  - 3.9-debian13-dev
  - 3.9.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2024-12-12"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  BAZEL_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "arm64" }'
  BAZEL_VERSION: 7.7.1
  COMMIT_SHA: b724fc7154de3a9971e33490097d5ea2c1bae93b
  SEMVER_MAJOR_MINOR_VERSION: "3.9"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.9.1
  VERSION: 3.9.1
contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libstdc++6
    - libyaml-0-2
    - mawk
    - perl
    - perl-base
    - sed
    - util-linux
  builds:
    - name: kong
      contents:
        packages:
          - bash
          - coreutils
          - findutils
          - automake
          - build-essential
          - ca-certificates
          - curl
          - file
          - git
          - grep
          - gzip
          - libyaml-dev
          - libprotobuf-dev
          - m4
          - perl
          - pkg-config
          - procps
          - sed
          - unzip
          - valgrind
          - zlib1g-dev
        files:
          - url: git+https://github.com/Kong/kong.git#3.9.1
            checksum: b724fc7154de3a9971e33490097d5ea2c1bae93b
            path: ${source.dir}/kong
            spdx:
              name: kong
              version: 3.9.1
              packages:
                - name: kong
                  purl: pkg:github/Kong/kong@3.9.1
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://github.com/bazelbuild/bazel/releases/download/7.7.1/bazel-7.7.1-linux-${BAZEL_ARCH}
            checksum: https://github.com/bazelbuild/bazel/releases/download/7.7.1/bazel-7.7.1-linux-${BAZEL_ARCH}.sha256
            path: /opt/bazel/bin/bazel
            uid: 0
            gid: 0
            mode: "0755"
      pipeline:
        - name: apply patch
          uses: git/patch@v1
          work-dir: ${source.dir}/kong
          with:
            options: -p1
            patch: ${source.dir}/patch/no-github-cli.patch
        - name: build kong
          work-dir: ${source.dir}/kong
          privileged: true
          runs: |
            set -eux -o pipefail

            BAZEL_ARGS=(
              --config=release
              --verbose_failures
              --action_env=BUILD_NAME=kong-dev
            )
            test '${target.fips}' = 'true' && BAZEL_ARGS+=("--//:fips=true")

            /opt/bazel/bin/bazel build "${BAZEL_ARGS[@]}" //build:kong //build:venv
        - name: install kong artifacts
          work-dir: ${source.dir}/kong
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/local/"

            # Copy complete OpenResty installation
            cp -r bazel-bin/build/kong-dev/openresty "${target.dir}/usr/local/"

            # Copy Kong libraries and assets
            cp -r bazel-bin/build/kong-dev/kong "${target.dir}/usr/local/"

            # Copy proto files from Kong source (OpenTelemetry and Kong model protos)
            # These must be copied AFTER the build output to merge both sets of proto files:
            # - Build output includes Google protobuf headers from @protoc
            # - Source includes OpenTelemetry and Kong model proto files
            cp -r kong/include/* "${target.dir}/usr/local/kong/include/"

            # Copy Lua libraries
            cp -r bazel-bin/build/kong-dev/lib "${target.dir}/usr/local/"

            # Copy Kong Lua modules
            cp -r bazel-bin/build/kong-dev/share "${target.dir}/usr/local/"

            # # Copy configuration files
            # cp -r bazel-bin/build/kong-dev/etc "${target.dir}/usr/local/"

            # Install LuaRocks binaries
            install -D -m 755 bazel-bin/build/kong-dev/bin/luarocks "${target.dir}/usr/local/bin/luarocks"
            install -D -m 755 bazel-bin/build/kong-dev/bin/luarocks-admin "${target.dir}/usr/local/bin/luarocks-admin"

            # Install Kong CLI binaries from repository
            install -D -m 755 bin/kong "${target.dir}/usr/local/bin/kong"
            install -D -m 755 bin/kong-health "${target.dir}/usr/local/bin/kong-health"

            # Copy Kong configuration to /etc/kong
            mkdir -p "${target.dir}/etc/kong"
            cp bazel-bin/build/kong-dev/etc/kong/kong.conf.default "${target.dir}/etc/kong/"

            # Ensure OpenResty tree is 0755 (directories and all files)
            find "${target.dir}/usr/local/openresty" -exec chmod 0755 {} \;
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/kong/patch
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/openresty
          target: /usr/local/openresty
          uid: 65532
          gid: 65532
        - source: ${target.dir}/usr/local/lib
          target: /usr/local/lib
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/share
          target: /usr/local/share
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/kong
          target: /usr/local/kong
          uid: 65532
          gid: 65532
        - source: ${target.dir}/etc/kong
          target: /etc/kong
          uid: 65532
          gid: 65532
        - source: /opt/docker/sbom/kong
          target: /opt/docker/sbom/kong
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: kong
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: kong
      gid: 65532
      members:
        - kong
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  KONG_NGINX_DAEMON: "off"
  KONG_PREFIX: /usr/local/kong
  KONG_VERSION: 3.9.1
  PATH: /usr/local/bin:/usr/local/openresty/bin:/usr/local/openresty/nginx/sbin:/usr/local/openresty/luajit/bin:/usr/bin:/bin
paths:
  - type: file
    path: /docker-entrypoint.sh
    uid: 65532
    gid: 65532
    mode: "0755"
    source: image/kong/bin/docker-entrypoint.sh
  - type: directory
    path: /usr/local/kong
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /etc/kong
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Kong image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /docker-entrypoint.sh
cmd:
  - kong
  - docker-start
ports:
  - 8000/tcp
  - 8001/tcp
  - 8443/tcp
  - 8444/tcp
