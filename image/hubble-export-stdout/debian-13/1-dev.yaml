# syntax=dhi.io/build:2-debian13

name: Hubble Export Stdout 1.x (dev)
image: dhi.io/hubble-export-stdout
variant: dev
tags:
  - 1-dev
  - 1.2-dev
  - 1.2.0-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.2-debian-dev
  - 1.2-debian13-dev
  - 1.2.0-debian-dev
  - 1.2.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-26"
vars:
  COMMIT_SHA: 16388e39bbf6919a0be34faf5cb98c865bad8040
  SEMVER_MAJOR_MINOR_VERSION: "1.2"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.2.0
  VERSION: 1.2.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - busybox
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: hubble-export-stdout
      shell: /bin/busybox sh
      contents:
        packages:
          - busybox
        files:
          - url: git+https://github.com/cilium/hubble-export-stdout.git#v1.2.0
            checksum: 16388e39bbf6919a0be34faf5cb98c865bad8040
            path: ${source.dir}/hubble-export-stdout
            spdx:
              name: hubble-export-stdout
              version: 1.2.0
              packages:
                - name: hubble-export-stdout
                  purl: pkg:github/cilium/hubble-export-stdout@1.2.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: stage the script
          runs: |
            set -eux -o pipefail

            /bin/busybox mkdir -p /usr/local/bin
            /bin/busybox cp "${source.dir}/hubble-export-stdout/hubble-export-stdout" \
              /usr/local/bin/hubble-export-stdout
      outputs:
        - source: /usr/local/bin/hubble-export-stdout
          target: /usr/local/bin/hubble-export-stdout
          uid: 0
          gid: 0
          mode: "0755"
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: Cilium Hubble Export to Stdout - streams Hubble network flow logs to stdout
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /bin/sh
  - /usr/local/bin/hubble-export-stdout
