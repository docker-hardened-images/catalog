  - linux/arm64
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: fe0af119897a54f4c7db117a5912a5559c46532f
  GOLANG_REFERENCE: dhi/golang:1.25.9-debian13-dev@sha256:2714b77de923fab1c1567b41a53a8647c7f4f511cae36ad030b6de2e9037759c
  MODULE_MAJOR_VERSION: v4
  SEMVER_MAJOR_MINOR_VERSION: "4.0"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.0.4
  VERSION: 4.0.4
contents:
  packages:
    - '!base-files'
  builds:
    - name: argo-workflow-controller
      uses: dhi.io/golang:1.25.9-debian13-dev@sha256:2714b77de923fab1c1567b41a53a8647c7f4f511cae36ad030b6de2e9037759c
      contents:
        files:
          - url: git+https://github.com/argoproj/argo-workflows.git#v4.0.4
            checksum: fe0af119897a54f4c7db117a5912a5559c46532f
            path: /go/src/github.com/argoproj/argo-workflows
            spdx:
              name: argo-workflow-controller
              version: 4.0.4
              packages:
                - name: argo-workflow-controller
                  purl: pkg:golang/github.com/argoproj/argo-workflows@4.0.4
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          with:
            deps:
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.0
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
            dir: /go/src/github.com/argoproj/argo-workflows
            download: true
        - name: test
          work-dir: /go/src/github.com/argoproj/argo-workflows
          runs: |
            set -eux -o pipefail

            echo "Testing core functionality after patching..."

            # Test core workflow functionality
            go test -v -count=1 -timeout=3m ./workflow/validate -run="TestDAG"
            go test -v -count=1 -timeout=3m ./workflow/common

            # Test all util packages except telemetry (which fails due to network requirements)
            UTIL_PACKAGES=$(go list ./util/... | grep -v './util/telemetry')
            go test -v -count=1 -timeout=4m $UTIL_PACKAGES
        - name: build-backend
          uses: go/build@v1
          work-dir: /go/src/github.com/argoproj/argo-workflows
          with:
            ldflags:
              - -X github.com/argoproj/argo-workflows/v4.version=4.0.4
              - -X github.com/argoproj/argo-workflows/v4.gitCommit=fe0af119897a54f4c7db117a5912a5559c46532f
            output: ${target.dir}/usr/local/bin/workflow-controller
            packages: ./cmd/workflow-controller
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/argo-workflow-controller
          target: /opt/docker/sbom/argo-workflow-controller
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: argocd
  users:
    - name: argocd
      uid: 8737
      gid: 8737
  groups:
    - name: argocd
      gid: 8737
      members:
        - argocd
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
