# syntax=dhi.io/build:2-debian13

name: Grafana Beyla 2.x
image: dhi.io/beyla
variant: runtime
tags:
  - "2"
  - "2.5"
  - 2.5.8
  - 2-debian
  - 2-debian13
  - 2.5-debian
  - 2.5-debian13
  - 2.5.8-debian
  - 2.5.8-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-07-22"
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "2.5"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.5.8
  SUFFIX: ""
  VERSION: 2.5.8-0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - beyla=2.5.8-0
    - ca-certificates-bundle
    - tzdata
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
  - type: symlink
    path: /usr/local/bin/beyla
    uid: 0
    gid: 0
    source: /usr/bin/beyla
  - type: symlink
    path: /beyla
    uid: 0
    gid: 0
    source: /usr/bin/beyla
annotations:
  org.opencontainers.image.description: A minimal Grafana Beyla image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/beyla
