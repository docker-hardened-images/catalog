# syntax=dhi.io/build:2-debian13

name: InfluxDB 2.x (dev)
image: dhi.io/influxdb
variant: dev
tags:
  - 2-dev
  - 2.9-dev
  - 2.9.1-dev
  - 2-debian-dev
  - 2-debian13-dev
  - 2.9-debian-dev
  - 2.9-debian13-dev
  - 2.9.1-debian-dev
  - 2.9.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2020-11-09"
vars:
  CLI_COMMIT_SHA: 8cdf40161d7662e942582086853fca948fc1a842
  CLI_VERSION: 2.8.0
  COMMIT_SHA: d4fa1941fd4adb29a556e774de426dfbab72f346
  GO_TAGS: libsqlite3,sqlite_foreign_keys,sqlite_json,assets,noasm
  GO_VERSION: 1.25.12
  GOLANG_REFERENCE: dhi/golang:1.25.12-debian13-dev@sha256:17ddaac165a3b1451aa8b1002edf8c3d8f9ecca09fad1e10c1d7a715f6dd3074
  OPENAPI_COMMIT_SHA: 8b5f1bbb2cd388eb454dc9da19e3d2c4061cdf5f
  PROTOC_GEN_GO_VERSION: v1.36.5
  SEMVER_MAJOR_MINOR_VERSION: "2.9"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.9.1
  UI_COMMIT_SHA: 78dfa9097c67dcbe91a417e7feb21ed313629101
  UI_VERSION: 2.9.0
  VERSION: 2.9.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libc6
    - libgcc-s1
    - libsqlite3-0
    - libstdc++6
    - mawk
    - openssl
    - perl-base
    - sed
    - tar
    - tzdata
    - util-linux
  builds:
    - name: influxdb
      uses: dhi.io/golang:1.25.12-debian13-dev@sha256:17ddaac165a3b1451aa8b1002edf8c3d8f9ecca09fad1e10c1d7a715f6dd3074
      caches:
        - path: /root/.cargo
      contents:
        packages:
          - libprotobuf-dev
          - libsqlite3-dev
          - pkg-config
          - protobuf-compiler
          - base-files
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - git
          - libc6
          - libstdc++6
          - cargo-1.97
          - rustc-1.97
          - mawk
          - nodejs-24
          - node-corepack
          - npm
          - sed
          - yarn-classic
        files:
          - url: https://raw.githubusercontent.com/influxdata/openapi/8b5f1bbb2cd388eb454dc9da19e3d2c4061cdf5f/contracts/oss.json
            path: ${source.dir}/swagger.json
            uid: 0
            gid: 0
          - url: git+https://github.com/influxdata/ui.git#OSS-v2.9.0
            checksum: 78dfa9097c67dcbe91a417e7feb21ed313629101
            path: ${source.dir}/ui
            uid: 0
            gid: 0
          - url: git+https://github.com/influxdata/influxdb.git#v2.9.1
            checksum: d4fa1941fd4adb29a556e774de426dfbab72f346
            path: /go/src/github.com/influxdata/influxdb
            spdx:
              name: influxdb
              version: 2.9.1
              packages:
                - name: influxdb
                  purl: pkg:golang/github.com/influxdata/influxdb@2.9.1
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: build ui
          work-dir: ${source.dir}/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            yarn build
        - name: place ui into go source for embedding
          work-dir: ${source.dir}/ui
          runs: |
            set -eux -o pipefail

            mkdir -p /go/src/github.com/influxdata/influxdb/static/data
            cp -r build /go/src/github.com/influxdata/influxdb/static/data/build
        - name: place openapi into go source for embedding
          runs: |
            set -eux -o pipefail

            cp ${source.dir}/swagger.json /go/src/github.com/influxdata/influxdb/static/data/
        - name: generate embedded ui and openapi
          work-dir: /go/src/github.com/influxdata/influxdb
          privileged: true
          runs: |
            set -eux -o pipefail

            go generate --tags libsqlite3,sqlite_foreign_keys,sqlite_json,assets,noasm ./static
        - name: install extra go tools
          work-dir: /go/src/github.com/influxdata/influxdb
          privileged: true
          runs: |
            set -eux -o pipefail

            go install "google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.5"
            go install github.com/benbjohnson/tmpl
            go install golang.org/x/tools/cmd/stringer
            go install golang.org/x/tools/cmd/goimports
            go install github.com/influxdata/pkg-config
        - name: go generate
          work-dir: /go/src/github.com/influxdata/influxdb
          runs: |
            set -eux -o pipefail

            go generate --tags libsqlite3,sqlite_foreign_keys,sqlite_json,assets,noasm ./influxql/... ./models/... ./pkg/... ./storage/... ./tsdb/... ./v1/...
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/influxdata/influxdb
          with:
            deps:
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/buger/jsonparser@v1.1.2
              - github.com/eclipse/paho.mqtt.golang@v1.5.1
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/hashicorp/go-retryablehttp@v0.7.7
              - github.com/hashicorp/vault/api@v1.9.2
              - go.opentelemetry.io/otel@v1.43.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: test
          work-dir: /go/src/github.com/influxdata/influxdb
          privileged: true
          runs: |
            set -eux -o pipefail

            # This flux rust gets compiled via the pkg-config shim installed above.
            # The pkg-config shim uses the CARGO envvar to override the default cargo binary.
            # The same envvar is used below in the build step.
            export CARGO=${source.dir}/helpers/bin/cargo-wrapper.sh

            # The one subtest we're skipping expects a "permission denied" error on /dev/core but gets a "file in special file system" error.
            # The errors are functionally equivalent; the test is checking an error specific to a particular environment. There is no real bug here.
            go test --tags libsqlite3,sqlite_foreign_keys,sqlite_json,assets,noasm ./... -skip TestService/DryRun_-_stack/file_URL//dev/core
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/influxdata/influxdb
          with:
            cgo_enabled: 1
            extra_env: CARGO=${source.dir}/helpers/bin/cargo-wrapper.sh
            ldflags:
              - -X main.commit=d4fa1941fd4adb29a556e774de426dfbab72f346
              - -X main.version=v2.9.1
              - -X main.date=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
            output: ${target.dir}/usr/local/bin/influxd
            packages: ./cmd/influxd
            tags: libsqlite3,sqlite_foreign_keys,sqlite_json,assets,noasm
      paths:
        - type: file
          path: ${source.dir}/helpers/bin/cargo-wrapper.sh
          uid: 0
          gid: 0
          mode: "0755"
          source: image/influxdb/bin/2/cargo-wrapper.sh
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/influxdb
          target: /opt/docker/sbom/influxdb
          uid: 0
          gid: 0
    - name: influx-cli
      uses: dhi.io/golang:1.25.12-debian13-dev@sha256:17ddaac165a3b1451aa8b1002edf8c3d8f9ecca09fad1e10c1d7a715f6dd3074
      contents:
        files:
          - url: git+https://github.com/influxdata/influx-cli.git#v2.8.0
            checksum: 8cdf40161d7662e942582086853fca948fc1a842
            path: /go/src/github.com/influxdata/influx-cli
            spdx:
              name: influx-cli
              version: 2.8.0
              packages:
                - name: influx-cli
                  purl: pkg:golang/github.com/influxdata/influx-cli@2.8.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/influxdata/influx-cli
          with:
            deps:
              - golang.org/x/sys@v0.44.0
            download: true
        - name: test
          work-dir: /go/src/github.com/influxdata/influx-cli
          privileged: true
          runs: |
            set -eux -o pipefail

            go test ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/influxdata/influx-cli
          with:
            ldflags:
              - -X main.commit=8cdf40161d7662e942582086853fca948fc1a842
              - -X main.version=v2.8.0
              - -X main.date=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
            output: ${target.dir}/usr/local/bin/influx
            packages: ./cmd/influx
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/influx-cli
          target: /opt/docker/sbom/influx-cli
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  INFLUX_CONFIGS_PATH: /var/lib/influx-cli/configs
  INFLUXD_CONFIG_PATH: /etc/influxdb/
paths:
  - type: file
    path: /etc/influxdb/config.yaml
    uid: 0
    gid: 0
    mode: "0644"
    source: image/influxdb/data/2/default-config.yaml
  - type: directory
    path: /var/lib/influxdb
    uid: 65532
    gid: 65532
  - type: directory
    path: /var/lib/influx-cli
    uid: 65532
    gid: 65532
annotations:
  org.opencontainers.image.description: A minimal InfluxDB image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - influxd
ports:
  - 8086/tcp
