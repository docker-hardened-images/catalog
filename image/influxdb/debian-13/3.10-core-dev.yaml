# syntax=dhi.io/build:2-debian13

name: InfluxDB 3.10.x Core (core, dev)
image: dhi.io/influxdb
variant: dev
flavor: core
tags:
  - 3-core-dev
  - 3.10-core-dev
  - 3.10.3-core-dev
  - 3-debian-core-dev
  - 3-debian13-core-dev
  - 3.10-debian-core-dev
  - 3.10-debian13-core-dev
  - 3.10.3-debian-core-dev
  - 3.10.3-debian13-core-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-17"
vars:
  COMMIT_SHA: 4ec130dc2032a373466627c3f71d47f031d6a818
  PYTHON_MAJOR_MINOR_VERSION: "3.13"
  SEMVER_MAJOR_MINOR_VERSION: "3.10"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.10.3
  VERSION: 3.10.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libc6
    - libgcc-s1
    - libstdc++6
    - mawk
    - openssl
    - perl-base
    - python-3.13
    - python-3.13-dev
    - python3-pip
    - python3-setuptools
    - python3-wheel
    - sed
    - tar
    - tzdata
    - util-linux
  builds:
    - name: influxdb3
      shell: /bin/bash
      caches:
        - path: /root/.cargo
      contents:
        packages:
          - build-essential
          - cargo-1.97
          - rustc-1.97
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - gawk
          - binutils
          - git
          - grep
          - libprotobuf-dev
          - lld
          - protobuf-compiler
          - sed
          - python-3.13
          - python-3.13-dev
          - python3-pip
          - python3-setuptools
          - python3-wheel
        files:
          - url: git+https://github.com/influxdata/influxdb.git#v3.10.3
            checksum: 4ec130dc2032a373466627c3f71d47f031d6a818
            path: ${source.dir}/influxdb3
            spdx:
              name: influxdb3
              version: 3.10.3
              packages:
                - name: influxdb3
                  purl: pkg:cargo/influxdb3@3.10.3
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: bump cargo deps
          work-dir: ${source.dir}/influxdb3
          privileged: true
          runs: |
            set -eux -o pipefail

            # GHSA-4w2j-m93h-cj5j: quinn-proto 0.11.14 -> 0.11.15 (patch bump,
            # stays within the existing 0.11.x requirement).
            cargo update --package quinn-proto --precise 0.11.15

            # GHSA-36hh-v3qg-5jq4, GHSA-chgr-c6px-7xpp: pyo3 -> 0.29.0.
            # pyo3 0.x minor releases are semver-incompatible, so relax the
            # workspace requirement before pinning the lock to the fixed release.
            sed -i -E 's/^pyo3 = \{ version = "[^"]*"/pyo3 = { version = "0.29"/' Cargo.toml
            cargo update --package pyo3 --precise 0.29.0
        - name: bump crossbeam-epoch cargo dep
          work-dir: ${source.dir}/influxdb3
          privileged: true
          runs: |
            set -eux -o pipefail

            # RUSTSEC-2026-0204: crossbeam-epoch 0.9.18 -> 0.9.20
            cargo update --package crossbeam-epoch --precise 0.9.20
        - name: bump anyhow cargo dep
          work-dir: ${source.dir}/influxdb3
          privileged: true
          runs: |
            set -eux -o pipefail

            # RUSTSEC-2026-0190: anyhow 1.0.102 -> 1.0.103
            cargo update --package anyhow --precise 1.0.103
        - name: cargo sbom
          uses: sbom@v1
          with:
            extra-scanners: rust-cargo-lock-cataloger
            prefix: influxdb3-cargo
            source: ${source.dir}/influxdb3
        - name: configure PYO3
          runs: |
            set -eux -o pipefail

            cat > "${source.dir}/pyo3_config_file.txt" << EOF
            implementation=CPython
            version=3.13
            shared=true
            abi3=false
            lib_name=python3.13
            lib_dir=/usr/lib
            executable=/usr/bin/python3.13
            pointer_width=64
            build_flags=
            suppress_build_script_link_lines=false
            EOF
        - name: build
          work-dir: ${source.dir}/influxdb3
          privileged: true
          runs: |
            set -eux -o pipefail

            export PYO3_CONFIG_FILE="${source.dir}/pyo3_config_file.txt"
            cargo build --release
        - name: install
          work-dir: ${source.dir}/influxdb3
          runs: |
            set -eux -o pipefail

            install -D target/release/influxdb3 \
              '${target.dir}/usr/local/bin/influxdb3'
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/influxdb3
          target: /opt/docker/sbom/influxdb3
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/influxdb3-cargo
          target: /opt/docker/sbom/influxdb3-cargo
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  INFLUX_CONFIGS_PATH: /var/lib/influx-cli/configs
  INFLUXD_CONFIG_PATH: /etc/influxdb/
  INFLUXDB3_DB_DIR: /var/lib/influxdb3
  INFLUXDB3_PLUGIN_DIR: /plugins
paths:
  - type: directory
    path: /var/lib/influxdb3
    uid: 65532
    gid: 65532
  - type: directory
    path: /plugins
    uid: 65532
    gid: 65532
annotations:
  org.opencontainers.image.description: A minimal InfluxDB image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - influxdb3
ports:
  - 8181/tcp
