# syntax=dhi.io/build:2-debian13

name: InfluxDB 3.9.x Core (core, dev)
image: dhi.io/influxdb
variant: dev
flavor: core
tags:
  - 3.9-core-dev
  - 3.9.6-core-dev
  - 3.9-debian-core-dev
  - 3.9-debian13-core-dev
  - 3.9.6-debian-core-dev
  - 3.9.6-debian13-core-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-01"
vars:
  COMMIT_SHA: ecadc94474260465eb69c139f3ea09d3edc262c3
  PYTHON_MAJOR_MINOR_VERSION: "3.13"
  RUST_REFERENCE: dhi/rust:1.96.1-debian13@sha256:9f7bef84b7b212a84a62f3ca39c76e72bc2ae2180c07568b8c94e83f11436f0f
  RUST_VERSION: 1.96.1
  SEMVER_MAJOR_MINOR_VERSION: "3.9"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.9.6
  VERSION: 3.9.6
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libc6
    - mawk
    - openssl
    - perl-base
    - python-3.13
    - python-3.13-dev
    - python3-pip
    - python3-setuptools
    - python3-wheel
    - sed
    - tar
    - tzdata
    - util-linux
  builds:
    - name: influxdb3
      uses: dhi.io/rust:1.96.1-debian13@sha256:9f7bef84b7b212a84a62f3ca39c76e72bc2ae2180c07568b8c94e83f11436f0f
      contents:
        packages:
          - binutils
          - git
          - grep
          - libprotobuf-dev
          - lld
          - protobuf-compiler
          - sed
          - python-3.13
          - python-3.13-dev
          - python3-pip
          - python3-setuptools
          - python3-wheel
        files:
          - url: git+https://github.com/influxdata/influxdb.git#v3.9.6
            checksum: ecadc94474260465eb69c139f3ea09d3edc262c3
            path: ${source.dir}/influxdb3
            spdx:
              name: influxdb3
              version: 3.9.6
              packages:
                - name: influxdb3
                  purl: pkg:cargo/influxdb3@3.9.6
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: bump tar cargo dep
          work-dir: ${source.dir}/influxdb3
          privileged: true
          runs: |
            set -eux -o pipefail

            # GHSA-3pv8-6f4r-ffg2: tar 0.4.45 -> 0.4.46 (3.9 workspace only)
            cargo update --package tar --precise 0.4.46
        - name: bump cargo deps
          work-dir: ${source.dir}/influxdb3
          privileged: true
          runs: |
            set -eux -o pipefail

            # Patch Cargo.lock directly to avoid triggering a git fetch for
            # git-sourced transitive deps (e.g. arrow-datafusion) which are
            # unreachable from within the build container on some platforms.
            python3 - << 'EOF'
            import pathlib
            lock = pathlib.Path('Cargo.lock')
            c = lock.read_text()
            # GHSA-pwjx-qhcg-rvj4, GHSA-965h-392x-2mh5, GHSA-xgp8-3hg3-c2mh, GHSA-82j2-j2ch-gfr8: rustls-webpki 0.103.9 -> 0.103.13
            c = c.replace(
                'name = "rustls-webpki"\nversion = "0.103.9"\nsource = "registry+https://github.com/rust-lang/crates.io-index"\nchecksum = "d7df23109aa6c1567d1c575b9952556388da57401e4ace1d15f79eedad0d8f53"',
                'name = "rustls-webpki"\nversion = "0.103.13"\nsource = "registry+https://github.com/rust-lang/crates.io-index"\nchecksum = "61c429a8649f110dddef65e2a5ad240f747e85f7758a6bccc7e5777bd33f756e"',
            )
            c = c.replace('"rustls-webpki 0.103.9"', '"rustls-webpki 0.103.13"')
            # GHSA-cq8v-f236-94qc: rand 0.9.2 -> 0.9.3
            c = c.replace(
                'name = "rand"\nversion = "0.9.2"\nsource = "registry+https://github.com/rust-lang/crates.io-index"\nchecksum = "6db2770f06117d490610c7488547d543617b21bfa07796d7a12f6f1bd53850d1"',
                'name = "rand"\nversion = "0.9.3"\nsource = "registry+https://github.com/rust-lang/crates.io-index"\nchecksum = "7ec095654a25171c2124e9e3393a930bddbffdc939556c914957a4c3e0a87166"',
            )
            c = c.replace('"rand 0.9.2"', '"rand 0.9.3"')
            lock.write_text(c)
            print('patched: rustls-webpki 0.103.9->0.103.13, rand 0.9.2->0.9.3')
            EOF
        - name: bump anyhow cargo dep
          work-dir: ${source.dir}/influxdb3
          privileged: true
          runs: |
            set -eux -o pipefail

            # RUSTSEC-2026-0190: anyhow 1.0.102 -> 1.0.103
            cargo update --package anyhow --precise 1.0.103
        - name: bump quinn-proto and pyo3 cargo deps
          work-dir: ${source.dir}/influxdb3
          privileged: true
          runs: |
            set -eux -o pipefail

            # GHSA-4w2j-m93h-cj5j: quinn-proto 0.11.14 -> 0.11.15 (patch bump,
            # stays within the existing 0.11.x requirement).
            cargo update --package quinn-proto --precise 0.11.15

            # GHSA-36hh-v3qg-5jq4, GHSA-chgr-c6px-7xpp: pyo3 -> 0.29.0.
            # pyo3 0.x minor releases are semver-incompatible, so relax the
            # workspace requirement before pinning the lock to the fixed release.
            sed -i -E 's/^pyo3 = \{ version = "[^"]*"/pyo3 = { version = "0.29"/' Cargo.toml
            cargo update --package pyo3 --precise 0.29.0
        - name: cargo sbom
          uses: sbom@v1
          with:
            extra-scanners: rust-cargo-lock-cataloger
            prefix: influxdb3-cargo
            source: ${source.dir}/influxdb3
        - name: configure PYO3
          runs: |
            set -eux -o pipefail

            cat > "${source.dir}/pyo3_config_file.txt" << EOF
            implementation=CPython
            version=3.13
            shared=true
            abi3=false
            lib_name=python3.13
            lib_dir=/usr/lib
            executable=/usr/bin/python3.13
            pointer_width=64
            build_flags=
            suppress_build_script_link_lines=false
            EOF
        - name: build
          work-dir: ${source.dir}/influxdb3
          privileged: true
          caches:
            - path: /usr/local/cargo/git/db
            - path: /usr/local/cargo/registry
          runs: |
            set -eux -o pipefail

            export PYO3_CONFIG_FILE="${source.dir}/pyo3_config_file.txt"
            cargo build --release
        - name: install
          work-dir: ${source.dir}/influxdb3
          runs: |
            set -eux -o pipefail

            install -D target/release/influxdb3 \
              '${target.dir}/usr/local/bin/influxdb3'
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/influxdb3
          target: /opt/docker/sbom/influxdb3
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/influxdb3-cargo
          target: /opt/docker/sbom/influxdb3-cargo
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  INFLUX_CONFIGS_PATH: /var/lib/influx-cli/configs
  INFLUXD_CONFIG_PATH: /etc/influxdb/
  INFLUXDB3_DB_DIR: /var/lib/influxdb3
  INFLUXDB3_PLUGIN_DIR: /plugins
paths:
  - type: directory
    path: /var/lib/influxdb3
    uid: 65532
    gid: 65532
  - type: directory
    path: /plugins
    uid: 65532
    gid: 65532
annotations:
  org.opencontainers.image.description: A minimal InfluxDB image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - influxdb3
ports:
  - 8181/tcp
