# syntax=dhi.io/build:2-debian13

name: PyTorch 2.11.x (dev)
image: dhi.io/pytorch
variant: dev
tags:
  - 2.11.0-cuda12.9-cudnn9-python3.12-debian-dev
  - 2.11.0-cuda12.9-cudnn9-python3.12-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BINUTILS_ARCH: '#{ target.arch == "amd64" ? "x86-64" : "aarch64" }'
  COMMIT_SHA: 70d99e998b4955e0049d13a98d77ae1b14db1f45
  CUDA_MAJOR_MINOR_VERSION: "12.9"
  CUDA_MAJOR_VERSION: "12"
  CUDA_MINOR_VERSION: "9"
  CUDA_PATH: cu129
  CUDA_REFERENCE: nvidia/cuda:12.9.0-cudnn-devel-ubuntu22.04@sha256:67d62b0967a91447f4f1ef22453dac317724e64cd7b29f4ad790216e5e2c3541
  CUDNN_VERSION: "9"
  DEBIAN_VERSION: "13"
  PIP_CMAKE_VERSION: 4.1.2
  PIP_IPYTHON_VERSION: 9.6.0
  PIP_NUMPY_VERSION: 2.3.4
  PIP_PYYAML_VERSION: 6.0.3
  PYTHON_DEV_REFERENCE: dhi/python:3.12.13-debian13-dev@sha256:7c161ce166268133e93a8b54f968db362533ab235e4da826c39f06aa0ba4ef47
  PYTHON_REFERENCE: dhi/python:3.12.13-debian13@sha256:fc13650792139b015c6af632ac58c78063aa32d78883696c26239ce135771fd2
  PYTORCH_CUDA_VERSION: 12.9.1
  PYTORCH_CUDNN_VERSION: 9.19.0.56
  PYTORCH_PYTHON_VERSION: "3.12"
  TAG_CUDA_VERSION: "12.9"
  TAG_CUDNN_VERSION: "9"
  TAG_TORCH_VERSION: "2.11"
  TORCHAUDIO_MAJOR_MINOR: "2.11"
  TORCHAUDIO_VERSION: 2.11.0
  TORCHVISION_VERSION: 0.26.0
  VERSION: 2.11.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!binutils'
    - '!binutils-aarch64-linux-gnu'
    - '!binutils-common'
    - '!binutils-x86-64-linux-gnu'
    - '!gawk'
    - '!libbinutils'
    - '!libctf-nobfd0'
    - '!libctf0'
    - '!libelogind0'
    - '!libgprofng0'
    - '!libsframe1'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - binutils-latest
    - binutils-latest-${BINUTILS_ARCH}-linux-gnu
    - build-essential
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libctf-nobfd0-latest
    - libctf0-latest
    - libgprofng0-latest
    - libstdc++6
    - mawk
    - perl-base
    - python-3.12
    - python-3.12-dev
    - python3-pip
    - python3-setuptools
    - python3-wheel
    - sed
    - tzdata
    - util-linux
    - zlib1g-dev
  builds:
    - name: pytorch build
      environment:
        CUDA_PATH: cu129
        INDEX_ARGS: --index-url https://download.pytorch.org/whl/cu129/
        INSTALL_CHANNEL: whl
        PATH: /usr/local/nvidia/bin:/usr/local/cuda/bin:/usr/local/bin:/usr/bin:/bin
      contents:
        packages:
          - base-files
          - build-essential
          - ca-certificates
          - ccache
          - cmake
          - ninja-build
          - coreutils
          - curl
          - bash
          - grep
          - libc-bin
          - sed
          - libjpeg-dev
          - python-3.12
          - python-3.12-dev
          - python3-pip
          - python3-setuptools
          - python3-wheel
          - libstdc++6
          - diffutils
          - findutils
          - gawk
          - make
        files:
          - url: git+https://github.com/pytorch/pytorch.git#v2.11.0
            checksum: 70d99e998b4955e0049d13a98d77ae1b14db1f45
            path: ${source.dir}/pytorch-src
            uid: 0
            gid: 0
        artifacts:
          - name: nvidia/cuda:12.9.0-cudnn-devel-ubuntu22.04@sha256:67d62b0967a91447f4f1ef22453dac317724e64cd7b29f4ad790216e5e2c3541
            includes:
              - usr/local/cuda-*
            uid: 0
            gid: 0
      pipeline:
        - name: create cuda symlinks
          work-dir: /usr/local
          runs: |
            set -eux -o pipefail

            # Create standard symlinks for the build process.
            [ -d /usr/local/cuda-12.9 ]
            ln -sf cuda-12.9 /usr/local/cuda-12
            ln -sf cuda-12 /usr/local/cuda
        - name: run ccache (logic from dev-base build in upstream)
          work-dir: ${source.dir}/pytorch-src
          runs: |
            set -eux -o pipefail

            /usr/sbin/update-ccache-symlinks
            mkdir -p /opt/ccache
            ccache --set-config=cache_dir=/opt/ccache
        - name: install runtime requirements
          work-dir: ${source.dir}/pytorch-src
          privileged: true
          runs: |
            set -eux -o pipefail

            pip install PyYAML==6.0.3 numpy==2.3.4 ipython==9.6.0 cmake==4.1.2
            pip install urllib3==2.7.0   # CVE-2026-21441 CVE-2026-44431 CVE-2026-44432
            pip install pillow==12.2.0   # CVE-2026-25990 CVE-2026-40192 CVE-2026-42308 CVE-2026-42309 CVE-2026-42310 CVE-2026-42311
            pip install filelock==3.20.3 # CVE-2025-68146 CVE-2026-22701
        - name: install OpenAI triton from binary captured by the pytorch dev team
          work-dir: ${source.dir}/pytorch-src
          privileged: true
          runs: |
            set -eux -o pipefail

            make triton
        - name: install primary torch package
          work-dir: ${source.dir}
          privileged: true
          runs: |
            set -eux -o pipefail

            pip install $INDEX_ARGS torch==2.11.0
            python3 -c 'import torch'
        - name: verify pytorch base package and GPU integration
          runs: |
            set -eux -o pipefail

            IS_CUDA=$(python3 -c 'import torch; print(torch.cuda._is_compiled())')
            if [ "${IS_CUDA}" != "True" ]; then
              echo "ERROR: CUDA support not found in PyTorch installation for ${ARCH}!"
              exit 1
            fi
        - name: install torchvision, torchaudio matching versions in upstream
          work-dir: ${source.dir}
          privileged: true
          runs: |
            set -eux -o pipefail

            pip install $INDEX_ARGS \
              torch==2.11.0 \
              torchvision==0.26.0 \
              torchaudio==2.11.0

            python3 -c "import torchvision"
            python3 -c "import torchaudio"
        - name: remove site-packages setuptools
          work-dir: ${source.dir}
          runs: |
            set -eux -o pipefail

            rm -rf /usr/lib/python3.12/site-packages/setuptools
            rm -rf /usr/lib/python3.12/site-packages/setuptools-*
      outputs:
        - source: /usr/lib/python3.12
          target: /usr/lib/python3.12
          uid: 0
          gid: 0
          diff: true
  artifacts:
    - name: nvidia/cuda:12.9.0-cudnn-devel-ubuntu22.04@sha256:67d62b0967a91447f4f1ef22453dac317724e64cd7b29f4ad790216e5e2c3541
      includes:
        - NGC-DL-CONTAINER-LICENSE
        - usr/local/cuda-12.9
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
