# syntax=dhi.io/build:2-debian13

name: git-sync 4.x
image: dhi.io/git-sync
variant: runtime
tags:
  - "4"
  - "4.7"
  - 4.7.1
  - 4-debian
  - 4-debian13
  - 4.7-debian
  - 4.7-debian13
  - 4.7.1-debian
  - 4.7.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2023-08-18"
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "4.7"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.7.1
  SUFFIX: ""
  VERSION: 4.7.1-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - bash
    - ca-certificates-bundle
    - coreutils
    - git
    - git-sync=4.7.1-1
    - grep
    - openssh-client
    - sed
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  GITSYNC_ROOT: /git
  HOME: /tmp
paths:
  - type: directory
    path: /git
    uid: 65532
    gid: 65532
    mode: "02775"
annotations:
  org.opencontainers.image.description: A minimal git-sync image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - git-sync
