# syntax=dhi.io/build:2-debian13

name: git-sync 4.x (dev)
image: dhi.io/git-sync
variant: dev
tags:
  - 4-dev
  - 4.7-dev
  - 4.7.0-dev
  - 4-debian-dev
  - 4-debian13-dev
  - 4.7-debian-dev
  - 4.7-debian13-dev
  - 4.7.0-debian-dev
  - 4.7.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2023-08-18"
vars:
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "4.7"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.7.0
  SUFFIX: -dev
  VERSION: 4.7.0-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - git
    - git-sync-dev=4.7.0-1
    - grep
    - libc-bin
    - mawk
    - openssh-client
    - perl-base
    - sed
    - tzdata
    - util-linux
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  GITSYNC_ROOT: /git
  HOME: /tmp
annotations:
  org.opencontainers.image.description: A minimal git-sync image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - git-sync
