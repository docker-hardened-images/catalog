vars:
  BUILD_NUMBER: "300"
  COMMIT_SHA: 44f991fe48d881fd0649e4c9c2e784fea28b9939
  DOTNET_8_REFERENCE: dhi/dotnet:8.0.422-sdk-debian13@sha256:80b10022fa4a223591c2a31f0d6a71e6f688c8ab43aa3d9d3468d91e1f201716
  DOTNET_8_VERSION: 8.0.422
  DOTNET_10_REFERENCE: dhi/dotnet:10.0.301-sdk-debian13@sha256:f4b0e67c726920772026aefe19b5099ca713761334877be3f0cde43b70191269
  DOTNET_10_VERSION: 10.0.301
  EXT_BUNDLE_COMMIT_SHA: d8ef3b89db4a81174f9fbd35304d15d6cedad8d5
