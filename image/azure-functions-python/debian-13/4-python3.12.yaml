# syntax=dhi.io/build:2-debian13

name: Azure Functions 4.x for Python 3.12.x (python3.12)
image: dhi.io/azure-functions-python
variant: runtime
flavor: python3.12
tags:
  - 4-python3.12
  - 4.1052-python3.12
  - 4-debian-python3.12
  - 4-debian13-python3.12
  - 4.1052.200-python3.12
  - 4.1052-debian-python3.12
  - 4.1052-debian13-python3.12
  - 4.1052.200-debian-python3.12
  - 4.1052.200-debian13-python3.12
platforms:
  - linux/amd64
vars:
  BUILD_NUMBER: "200"
  COMMIT_SHA: 95f7d1e24e3cda9befb46846e3289f708a07a4fb
  DOTNET_8_REFERENCE: dhi/dotnet:8.0.422-sdk-debian13@sha256:71696f29d447add86fc0771b001246e8a15b27edbedd85034e49811d90a970be
  DOTNET_8_VERSION: 8.0.422
  DOTNET_10_REFERENCE: dhi/dotnet:10.0.301-sdk-debian13@sha256:65ba9478dcdb619906bc2f42664001d2171c26b40bf134a48afdf13f89e5185d
  DOTNET_10_VERSION: 10.0.301
  EXT_BUNDLE_COMMIT_SHA: 072a30a27ec63d64fc72fe8a9acb4bf905188e11
  EXT_BUNDLE_VERSION: 4.37.1
  FUNCTIONS_WORKER: python
  PYTHON_MAJOR_MINOR_VERSION: "3.12"
  SEMVER_MAJOR_MINOR_VERSION: "4.1052"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.1052.200
  TEMPLATES_BUILDID: "288237"
  TEMPLATES_DOWNLOADURL: https://artprodwus21.artifacts.visualstudio.com/Ad1c51fbc-4477-4a0f-b99f-fc9013009a58/ae7e3bf3-d41a-4480-9ac0-b6cf9df9ac24/_apis/artifact/cGlwZWxpbmVhcnRpZmFjdDovL2F6ZnVuYy9wcm9qZWN0SWQvYWU3ZTNiZjMtZDQxYS00NDgwLTlhYzAtYjZjZjlkZjlhYzI0L2J1aWxkSWQvMjg4MjM3L2FydGlmYWN0TmFtZS9kcm9w0/content?format=zip
  VERSION: 4.1052.200
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/microsoft-signing-key.gpg] https://packages.microsoft.com/debian/13/prod trixie main
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://packages.microsoft.com/keys/microsoft-2025.asc
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - libglib2.0-0t64
    - libicu76
    - libsm6
    - libstdc++6
    - libxext6
    - libxrender-dev
    - msodbcsql18
    - mssql-tools18
    - python-3.12
    - python-3.12-dev
    - python3-pip
    - python3-setuptools
    - python3-wheel
    - unixodbc
  builds:
    - name: azure-functions-host
      uses: dhi.io/dotnet:10.0.301-sdk-debian13@sha256:65ba9478dcdb619906bc2f42664001d2171c26b40bf134a48afdf13f89e5185d
      contents:
        packages:
          - bash
          - findutils
        files:
          - url: git+https://github.com/Azure/azure-functions-host.git#v4.1052.200
            checksum: 95f7d1e24e3cda9befb46846e3289f708a07a4fb
            path: ${source.dir}/azure-functions-host
            spdx:
              name: azure-functions-host
              version: 4.1052.200
              packages:
                - name: azure-functions-host
                  purl: pkg:github/Azure/azure-functions-host@4.1052.200
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: bump nuget dependencies
          work-dir: ${source.dir}/azure-functions-host
          runs: |
            set -eux -o pipefail

            # CVE-2026-40182, CVE-2026-40891, CVE-2026-42191: OpenTelemetry.Exporter.OpenTelemetryProtocol 1.14.0 -> 1.15.3
            find . -name "*.csproj" -o -name "*.props" | xargs sed -i 's/OpenTelemetry\.Exporter\.OpenTelemetryProtocol" Version="1\.14\.0"/OpenTelemetry.Exporter.OpenTelemetryProtocol" Version="1.15.3"/g'
            # CVE-2026-40894: OpenTelemetry.Api 1.14.0 -> 1.15.3
            find . -name "*.csproj" -o -name "*.props" | xargs sed -i 's/OpenTelemetry\.Api" Version="1\.14\.0"/OpenTelemetry.Api" Version="1.15.3"/g'
            # GHSA-g4vj-cjjj-v7hg: NuGet.Packaging 5.11.6 -> 5.11.7
            find . -name "*.csproj" -o -name "*.props" | xargs sed -i 's/NuGet\.Packaging" Version="5\.11\.6"/NuGet.Packaging" Version="5.11.7"/g'
            # GHSA-g4vj-cjjj-v7hg: NuGet.Protocol 5.11.6 -> 5.11.7
            find . -name "*.csproj" -o -name "*.props" | xargs sed -i 's/NuGet\.Protocol" Version="5\.11\.6"/NuGet.Protocol" Version="5.11.7"/g'
            # GHSA-g4vj-cjjj-v7hg: Ensure NuGet packages are in Directory.Packages.props for CPM
            if [ -f "Directory.Packages.props" ]; then
              if ! grep -q 'Include="NuGet.Packaging"' Directory.Packages.props; then
                sed -i 's|</ItemGroup>|  <PackageVersion Include="NuGet.Packaging" Version="5.11.7" />\n  </ItemGroup>|' Directory.Packages.props
              fi
              if ! grep -q 'Include="NuGet.Protocol"' Directory.Packages.props; then
                sed -i 's|</ItemGroup>|  <PackageVersion Include="NuGet.Protocol" Version="5.11.7" />\n  </ItemGroup>|' Directory.Packages.props
              fi
            fi
        - name: build
          work-dir: ${source.dir}/azure-functions-host
          privileged: true
          runs: |
            set -eux -o pipefail

            dotnet publish -v q \
              /p:BuildNumber='200' /p:CommitHash='95f7d1e24e3cda9befb46846e3289f708a07a4fb' \
              src/WebJobs.Script.WebHost/WebJobs.Script.WebHost.csproj \
              -c Release \
              --output '${target.dir}/azure-functions-host' \
              --runtime linux-x64 --self-contained
        - name: install
          runs: |
            set -eux -o pipefail

            find '${target.dir}/azure-functions-host/workers' -type d -mindepth 1 -maxdepth 1 -not -name 'python' -exec rm -rf '{}' \;
      outputs:
        - source: ${target.dir}/azure-functions-host
          target: /azure-functions-host
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/azure-functions-host
          target: /opt/docker/sbom/azure-functions-host
          uid: 0
          gid: 0
    - name: azure-functions-extension-bundles
      uses: dhi.io/dotnet:8.0.422-sdk-debian13@sha256:71696f29d447add86fc0771b001246e8a15b27edbedd85034e49811d90a970be
      contents:
        packages:
          - bash
          - ca-certificates
          - sed
          - unzip
        files:
          - url: git+https://github.com/Azure/azure-functions-extension-bundles.git#4.37.1
            checksum: 072a30a27ec63d64fc72fe8a9acb4bf905188e11
            path: ${source.dir}/azure-functions-extension-bundles
            spdx:
              name: azure-functions-extension-bundles
              version: 4.37.1
              packages:
                - name: azure-functions-extension-bundles
                  purl: pkg:github/Azure/azure-functions-extension-bundles@4.37.1
                  license: MIT
            uid: 0
            gid: 0
          - url: https://artprodwus21.artifacts.visualstudio.com/Ad1c51fbc-4477-4a0f-b99f-fc9013009a58/ae7e3bf3-d41a-4480-9ac0-b6cf9df9ac24/_apis/artifact/cGlwZWxpbmVhcnRpZmFjdDovL2F6ZnVuYy9wcm9qZWN0SWQvYWU3ZTNiZjMtZDQxYS00NDgwLTlhYzAtYjZjZjlkZjlhYzI0L2J1aWxkSWQvMjg4MjM3L2FydGlmYWN0TmFtZS9kcm9w0/content?format=zip
            path: ${source.dir}/templatesArtifacts.zip
            uid: 0
            gid: 0
      pipeline:
        - name: extract templates
          work-dir: ${source.dir}/azure-functions-extension-bundles
          runs: |
            set -eux -o pipefail

            unzip ${source.dir}/templatesArtifacts.zip
            mv drop templatesArtifacts
        - name: patch source
          uses: patch@v1
          with:
            dir: ${source.dir}/azure-functions-extension-bundles
            options: -p1
            patches:
              - ${source.dir}/patch/linux_bundles.patch
              - ${source.dir}/patch/message_pack.patch
        - name: build
          work-dir: ${source.dir}/azure-functions-extension-bundles/build
          privileged: true
          runs: |
            set -eux -o pipefail

            sed -E -i '${source.dir}/azure-functions-extension-bundles/src/Microsoft.Azure.Functions.ExtensionBundle/NuGet.Config' \
              -e 's|azure-functions-extension-bundles|nuget.org|' \
              -e 's|https://pkgs.dev.azure.com/[^"]+|https://api.nuget.org/v3/index.json|'

            TEMPLATES_ARTIFACTS_DIRECTORY=1 dotnet run \
              skip:GenerateVulnerabilityReport,PackageNetCoreV3BundlesWindows,CreateRUPackage,CreateCDNStoragePackage,CreateCDNStoragePackageWindows,BuildBundleBinariesForWindows
        - name: install
          work-dir: ${source.dir}/azure-functions-extension-bundles/artifacts
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/FuncExtensionBundles/Microsoft.Azure.Functions.ExtensionBundle/4.37.1
            unzip Microsoft.Azure.Functions.ExtensionBundle.4.37.1_linux-x64.zip \
              -d ${target.dir}/FuncExtensionBundles/Microsoft.Azure.Functions.ExtensionBundle/4.37.1
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: ecosystem/azure-functions/patch
      outputs:
        - source: ${target.dir}/FuncExtensionBundles
          target: /FuncExtensionBundles
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/azure-functions-extension-bundles
          target: /opt/docker/sbom/azure-functions-extension-bundles
          uid: 0
          gid: 0
