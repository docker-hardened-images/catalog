              - -X github.com/projectcalico/calico/pkg/buildinfo.GitRevision=eb1cf57823a1dd8d25c48b82fd023ea9e3e17996
            output: ${target.dir}/usr/local/bin/goldmane
            packages: ./cmd
        - name: build-health
