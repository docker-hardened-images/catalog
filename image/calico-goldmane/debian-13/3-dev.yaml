# syntax=dhi.io/build:2-debian13

name: Calico Goldmane 3.x (dev)
image: dhi.io/calico-goldmane
variant: dev
tags:
  - 3-dev
  - 3.32-dev
  - 3.32.0-dev
  - 3-debian-dev
  - 3-debian13-dev
  - 3.32-debian-dev
  - 3.32-debian13-dev
  - 3.32.0-debian-dev
  - 3.32.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-30"
vars:
  COMMIT_SHA: eb1cf57823a1dd8d25c48b82fd023ea9e3e17996
  SEMVER_MAJOR_MINOR_VERSION: "3.32"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.32.0
  VERSION: 3.32.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: calico-goldmane
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/projectcalico/calico.git#v3.32.0
            checksum: eb1cf57823a1dd8d25c48b82fd023ea9e3e17996
            path: /go/src/github.com/projectcalico/calico
            spdx:
              name: calico-goldmane
              version: 3.32.0
              packages:
                - name: calico-goldmane
                  purl: pkg:golang/github.com/projectcalico/calico@3.32.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/projectcalico/calico
          with:
            deps:
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: test
          work-dir: /go/src/github.com/projectcalico/calico/goldmane
          runs: |
            set -eux -o pipefail

            # Run unit tests only; skip fv packages that require a running daemon.
            CGO_ENABLED=0 go test $(go list ./... | grep -v -E '/fv$')
        - name: build-goldmane
          uses: go/build@v1
          work-dir: /go/src/github.com/projectcalico/calico/goldmane
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X github.com/projectcalico/calico/pkg/buildinfo.BuildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
              - -X github.com/projectcalico/calico/pkg/buildinfo.Version=3.32.0
              - -X github.com/projectcalico/calico/pkg/buildinfo.GitRevision=eb1cf57823a1dd8d25c48b82fd023ea9e3e17996
            output: ${target.dir}/usr/local/bin/goldmane
            packages: ./cmd
        - name: build-health
          uses: go/build@v1
          work-dir: /go/src/github.com/projectcalico/calico/goldmane
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/health
            packages: ./cmd/health
      outputs:
        - source: ${target.dir}/usr/local/bin/goldmane
          target: /usr/local/bin/goldmane
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/health
          target: /usr/local/bin/health
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/calico-goldmane
          target: /opt/docker/sbom/calico-goldmane
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: goldmane
      uid: 10001
      gid: 10001
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: goldmane
      gid: 10001
      members:
        - goldmane
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /goldmane
    uid: 0
    gid: 0
    source: /usr/local/bin/goldmane
  - type: symlink
    path: /health
    uid: 0
    gid: 0
    source: /usr/local/bin/health
annotations:
  org.opencontainers.image.description: A minimal Calico Goldmane flow aggregation image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /goldmane
