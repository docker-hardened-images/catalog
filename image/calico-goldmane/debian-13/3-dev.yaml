        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/projectcalico/calico.git#v3.32.0
            checksum: eb1cf57823a1dd8d25c48b82fd023ea9e3e17996
            path: /go/src/github.com/projectcalico/calico
