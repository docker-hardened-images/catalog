# syntax=dhi.io/build:2-alpine3.23

name: Eclipse Temurin 26.x JDK (dev)
image: dhi.io/eclipse-temurin
variant: dev
tags:
  - 26-jdk-alpine-dev
  - 26.0-jdk-alpine-dev
  - 26-jdk-alpine3.24-dev
  - 26.0.1-jdk-alpine-dev
  - 26.0-jdk-alpine3.24-dev
  - 26.0.1.8-jdk-alpine-dev
  - 26.0.1-jdk-alpine3.24-dev
  - 26.0.1.8-jdk-alpine3.24-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-23"
  end-of-life: "2026-09-15"
vars:
  JAVA_MAJOR_MINOR_VERSION: "26.0"
  JAVA_MAJOR_VERSION: "26"
  JAVA_VERSION: 26.0.1
  JAVA_VERSION_SUFFIX: "8"
  VERSION: 26.0.1.8-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - apk-tools
    - busybox
    - ca-certificates
    - ca-certificates-bundle
    - eclipse-temurin-26-jdk-oci-config=26.0.1.8-r0
    - eclipse-temurin-26-jdk=26.0.1.8-r0
    - musl
    - tzdata
accounts:
  root: true
  run-as: root
  users:
