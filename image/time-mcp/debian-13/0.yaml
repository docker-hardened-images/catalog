# syntax=dhi.io/build:2-debian13

name: Time MCP Server 2026.x
image: dhi.io/time-mcp
variant: runtime
tags:
  - "2026"
  - "2026.6"
  - latest
  - 2026.6.16
  - 2026-debian
  - 2026-debian13
  - 2026.6-debian
  - 2026.6-debian13
  - 2026.6.16-debian
  - 2026.6.16-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  COMMIT_SHA: 2182f5959fcea9fe8f033708242919a18a14d113
  PYTHON_DEV_REFERENCE: dhi/python:3.14.6-debian13-sfw-dev@sha256:325558c55bf52064b9c961137806ba33e07c43d424668e83450d3090601af5ab
  PYTHON_REFERENCE: dhi/python:3.14.6-debian13@sha256:4469b5c5732c2f2776df15ce8f5eb2a057e8ec092d3626ddbbebc10fc99d873d
  SEMVER_MAJOR_MINOR_VERSION: "2026.6"
  SEMVER_MAJOR_VERSION: "2026"
  SEMVER_VERSION: 2026.6.16
  UV_VERSION: 0.11.22
  VERSION: 2026.6.16
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: time-mcp
      uses: dhi.io/python:3.14.6-debian13-sfw-dev@sha256:325558c55bf52064b9c961137806ba33e07c43d424668e83450d3090601af5ab
      environment:
        UV_COMPILE_BYTECODE: "1"
      contents:
        packages:
          - gzip
          - tar
        files:
          - url: https://github.com/astral-sh/uv/releases/download/0.11.22/uv-${ARCH}-unknown-linux-gnu.tar.gz
            path: ${source.dir}/uv-unknown-linux-gnu.tar.gz
            uid: 0
            gid: 0
          - url: git+https://github.com/modelcontextprotocol/servers.git#2026.6.16
            checksum: 2182f5959fcea9fe8f033708242919a18a14d113
            path: ${source.dir}/servers
            spdx:
              name: time-mcp
              version: 2026.6.16
              packages:
                - name: time-mcp
                  purl: pkg:dhi/time-mcp@2026.6.16
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: setup uv
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            tar -xzf "${source.dir}/uv-unknown-linux-gnu.tar.gz" -C /usr/local/bin --strip-components=1
            chmod +x /usr/local/bin/uv
        - name: move to /app
          runs: |
            set -eux -o pipefail

            cp -r "${source.dir}/servers/src/time" /app
        - name: patch dependencies
          runs: |
            set -eux -o pipefail

            # starlette is a transitive dep from mcp/uvicorn, explicitly stating it will bump it to the desired version
            # CVE-2026-54283
            sed -i '/dependencies = \[/a\    "starlette>=1.3.1",' /app/pyproject.toml
        - name: build python package
          work-dir: /app
          privileged: true
          runs: |
            set -eux -o pipefail

            rm .python-version

            sfw uv lock --upgrade
            sfw uv sync --locked --no-install-project --no-dev --no-editable
            sfw uv sync --locked --no-dev --no-editable
      outputs:
        - source: /app/.venv
          target: /app/.venv
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/time-mcp
          target: /opt/docker/sbom/time-mcp
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.14.6-debian13@sha256:4469b5c5732c2f2776df15ce8f5eb2a057e8ec092d3626ddbbebc10fc99d873d
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  LOCAL_TIMEZONE: UTC
  PATH: /app/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
annotations:
  org.opencontainers.image.description: Time MCP Server
  org.opencontainers.image.licenses: MIT
labels:
  io.modelcontextprotocol.server.name: io.github.modelcontextprotocol/server-time
entrypoint:
  - mcp-server-time
