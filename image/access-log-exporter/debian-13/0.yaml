# syntax=dhi.io/build:2-debian13

name: Access Log Exporter 0.x
image: dhi.io/access-log-exporter
variant: runtime
tags:
  - "0"
  - "0.4"
  - 0.4.0
  - 0-debian
  - 0-debian13
  - 0.4-debian
  - 0.4-debian13
  - 0.4.0-debian
  - 0.4.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-08-11"
vars:
  COMMIT_SHA: 1931589bd1944d77405727b404dd377f7c9e77b9
  SEMVER_MAJOR_MINOR_VERSION: "0.4"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.4.0
  VERSION: 0.4.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: access-log-exporter
      work-dir: /go/src/github.com/jkroepke/access-log-exporter
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/jkroepke/access-log-exporter.git#v0.4.0
            checksum: 1931589bd1944d77405727b404dd377f7c9e77b9
            path: /go/src/github.com/jkroepke/access-log-exporter
            spdx:
              name: access-log-exporter
              version: 0.4.0
              packages:
                - name: access-log-exporter
                  purl: pkg:golang/github.com/jkroepke/access-log-exporter@0.4.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps: []
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            go test -short ./... -count=1 -skip "TestIT" -v
        - name: build access-log-exporter
          uses: go/build@v1
          with:
            ldflags:
              - -s -w
              - -X github.com/prometheus/common/version.Version=0.4.0
              - -X github.com/prometheus/common/version.Revision=1931589bd1944d77405727b404dd377f7c9e77b9
              - -X github.com/prometheus/common/version.Branch=HEAD
              - -X github.com/prometheus/common/version.BuildUser=dhi@build
              - -X github.com/prometheus/common/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +%Y%m%d-%H:%M:%S)
            output: ${target.dir}/usr/local/bin/access-log-exporter
            packages: ./cmd/access-log-exporter
      outputs:
        - source: ${target.dir}/usr/local/bin/access-log-exporter
          target: /usr/local/bin/access-log-exporter
          uid: 0
          gid: 0
        - source: /go/src/github.com/jkroepke/access-log-exporter/packaging/etc/access-log-exporter/config.yaml
          target: /etc/access-log-exporter/config.yaml
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/access-log-exporter
          target: /opt/docker/sbom/access-log-exporter
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /bin/access-log-exporter
    uid: 0
    gid: 0
    source: /usr/local/bin/access-log-exporter
annotations:
  org.opencontainers.image.description: A minimal Access Log Exporter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/access-log-exporter
cmd:
  - --config=/etc/access-log-exporter/config.yaml
