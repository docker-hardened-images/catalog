# syntax=dhi.io/build:2-debian13

name: karpenter 1.x
image: dhi.io/karpenter
variant: runtime
tags:
  - "1"
  - "1.13"
  - 1.13.0
  - 1-debian
  - 1-debian13
  - 1.13-debian
  - 1.13-debian13
  - 1.13.0-debian
  - 1.13.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-11"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 2be95547983a8948b7172aa66bf92c905fbbf001
  GOLANG_REFERENCE: dhi/golang:1.26.4-debian13-dev@sha256:9a675e23c51e343854caccdcf56c40a9f39b5c3024ca02ae045b48786d0d7a42
  SEMVER_MAJOR_MINOR_VERSION: "1.13"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.13.0
  VERSION: 1.13.0
contents:
  packages:
    - '!base-files'
  builds:
    - name: karpenter-go
      uses: dhi.io/golang:1.26.4-debian13-dev@sha256:9a675e23c51e343854caccdcf56c40a9f39b5c3024ca02ae045b48786d0d7a42
      work-dir: /go/src/github.com/aws/karpenter-provider-aws
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/aws/karpenter-provider-aws#v1.13.0
            checksum: 2be95547983a8948b7172aa66bf92c905fbbf001
            path: /go/src/github.com/aws/karpenter-provider-aws
            spdx:
              name: karpenter
              version: 1.13.0
              packages:
                - name: karpenter
                  purl: pkg:dhi/karpenter@1.13.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            # Controller/provider packages use envtest (etcd at
            # /usr/local/kubebuilder/bin/etcd), which is not in the DHI build
            # image. Runtime behavior is covered by image/karpenter/tests.
            PKGS=$(go list ./... | grep -vE '/(test|tests|integration|e2e|fuzz)(/|$)|/pkg/(controllers|cloudprovider|apis/v1)|/pkg/operator$|/pkg/providers/[^/]+$')
            go test -short $PKGS -count=1
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X main.Version=1.13.0
              - -X main.GitSHA=2be95547983a8948b7172aa66bf92c905fbbf001
              - -X main.BuiltAt=$(date -u -d @${SOURCE_DATE_EPOCH} +'%F-%T')
            output: ${target.dir}/usr/local/bin/controller
            packages: ./cmd/controller
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/karpenter
          target: /opt/docker/sbom/karpenter
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
annotations:
  org.opencontainers.image.description: A minimal karpenter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/controller
ports:
  - 8080/tcp
