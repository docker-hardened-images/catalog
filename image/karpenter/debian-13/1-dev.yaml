# syntax=dhi.io/build:2-debian13

name: karpenter 1.x (dev)
image: dhi.io/karpenter
variant: dev
tags:
  - 1-dev
  - 1.11-dev
  - 1.11.3-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.11-debian-dev
  - 1.11-debian13-dev
  - 1.11.3-debian-dev
  - 1.11.3-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-11"
vars:
  COMMIT_SHA: 0c4e1cfeb0757c2dca913e607d825dde8f7a06d3
  SEMVER_MAJOR_MINOR_VERSION: "1.11"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.11.3
  VERSION: 1.11.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: karpenter-go
      work-dir: /go/src/github.com/aws/karpenter-provider-aws
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/aws/karpenter-provider-aws#v1.11.3
            checksum: 0c4e1cfeb0757c2dca913e607d825dde8f7a06d3
            path: /go/src/github.com/aws/karpenter-provider-aws
            spdx:
              name: karpenter
              version: 1.11.3
              packages:
                - name: karpenter
                  purl: pkg:dhi/karpenter@1.11.3
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/text@v0.39.0
              - golang.org/x/net@v0.56.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Controller/provider packages use envtest (etcd at
            # /usr/local/kubebuilder/bin/etcd), which is not in the DHI build
            # image. Runtime behavior is covered by image/karpenter/tests.
            PKGS=$(go list ./... | grep -vE '/(test|tests|integration|e2e|fuzz)(/|$)|/pkg/(controllers|cloudprovider|apis/v1)|/pkg/operator$|/pkg/providers/[^/]+$')
            go test -short $PKGS -count=1
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X main.Version=1.11.3
              - -X main.GitSHA=0c4e1cfeb0757c2dca913e607d825dde8f7a06d3
              - -X main.BuiltAt=$(date -u -d @${SOURCE_DATE_EPOCH} +'%F-%T')
            output: ${target.dir}/usr/local/bin/controller
            packages: ./cmd/controller
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/karpenter
          target: /opt/docker/sbom/karpenter
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
annotations:
  org.opencontainers.image.description: A minimal karpenter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/controller
ports:
  - 8080/tcp
