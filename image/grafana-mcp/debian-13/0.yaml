# syntax=dhi.io/build:2-debian13

name: Grafana MCP Server 0.x
image: dhi.io/grafana-mcp
variant: runtime
tags:
  - "0"
  - "0.17"
  - 0.17.1
  - latest
  - 0-debian
  - 0-debian13
  - 0.17-debian
  - 0.17-debian13
  - 0.17.1-debian
  - 0.17.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: aa5b912ac36a2e0211794fb8c5110d87faec8fe1
  SEMVER_MAJOR_MINOR_VERSION: "0.17"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.17.1
  VERSION: 0.17.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: grafana-mcp
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/grafana/mcp-grafana.git#v0.17.1
            checksum: aa5b912ac36a2e0211794fb8c5110d87faec8fe1
            path: /go/src/github.com/grafana/mcp-grafana
            spdx:
              name: grafana-mcp
              version: 0.17.1
              packages:
                - name: grafana-mcp
                  purl: pkg:dhi/grafana-mcp@0.17.1
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/grafana/mcp-grafana
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - github.com/prometheus/prometheus@v0.311.3
            download: true
        - name: test
          work-dir: /go/src/github.com/grafana/mcp-grafana
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/grafana/mcp-grafana
          with:
            ldflags:
              - -X github.com/grafana/mcp-grafana.version=0.17.1
            output: ${target.dir}/server/mcp-grafana
            packages: ./cmd/mcp-grafana
      outputs:
        - source: ${target.dir}/server/mcp-grafana
          target: /usr/local/bin/mcp-grafana
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/grafana-mcp
          target: /opt/docker/sbom/grafana-mcp
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: Grafana MCP Server
  org.opencontainers.image.licenses: AGPL-3.0
labels:
  io.modelcontextprotocol.server.name: io.github.grafana/mcp-grafana
entrypoint:
  - mcp-grafana
cmd:
  - --transport
  - stdio
