# syntax=dhi.io/build:2-debian13

name: csi-hostpath-plugin 1.18.x
image: dhi.io/csi-hostpath-plugin
variant: runtime
tags:
  - "1"
  - "1.18"
  - 1.18.0
  - 1-debian
  - 1-debian13
  - 1.18-debian
  - 1.18-debian13
  - 1.18.0-debian
  - 1.18.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: cc78ee78ae23908c9e0607df2fe09c7ecfa52597
  SEMVER_MAJOR_MINOR_VERSION: "1.18"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.18.0
  VERSION: 1.18.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: csi-hostpath-plugin
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kubernetes-csi/csi-driver-host-path.git#v1.18.0
            checksum: cc78ee78ae23908c9e0607df2fe09c7ecfa52597
            path: /go/src/github.com/kubernetes-csi/csi-driver-host-path
            spdx:
              name: csi-hostpath-plugin
              version: 1.18.0
              packages:
                - name: csi-hostpath-plugin
                  purl: pkg:golang/github.com/kubernetes-csi/csi-driver-host-path@1.18.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: remove vendor directory
          work-dir: /go/src/github.com/kubernetes-csi/csi-driver-host-path
          runs: |
            set -eux -o pipefail

            rm -rf vendor
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/kubernetes-csi/csi-driver-host-path
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - google.golang.org/grpc@v1.82.1
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/kubernetes-csi/csi-driver-host-path
          with:
            ldflags:
              - -X main.version=1.18.0
            output: ${target.dir}/usr/local/bin/hostpathplugin
            packages: ./cmd/hostpathplugin
      outputs:
        - source: ${target.dir}/usr/local/bin/hostpathplugin
          target: /usr/local/bin/hostpathplugin
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/csi-hostpath-plugin
          target: /opt/docker/sbom/csi-hostpath-plugin
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal csi-hostpath-plugin image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/hostpathplugin
