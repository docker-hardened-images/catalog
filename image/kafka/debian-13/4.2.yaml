# syntax=dhi.io/build:2-debian13

name: Apache Kafka 4.2.x
image: dhi.io/kafka
variant: runtime
tags:
  - "4.2"
  - 4.2.1
  - 4.2-debian
  - 4.2-debian13
  - 4.2.1-debian
  - 4.2.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-17"
vars:
  COMMIT_SHA: 18d5ecd939c8d510fdd72d0abb1f7099659dcd58
  GRADLE_REFERENCE: dhi/gradle:9.6.1-jdk21-debian13-dev@sha256:4a63386840a951b8a28f1ae703812296c99615274fd024ea9fd461588b86ffc1
  GRADLE_VERSION: 9.6.1
  JAVA_FIPS_SUFFIX: ""
  JDK_MAJOR_VERSION: "21"
  KAFKA_MAJOR_MINOR_VERSION: ${KAFKA_VERSION:([0-9]+.[0-9]+).*$}
  KAFKA_MAJOR_VERSION: ${KAFKA_VERSION:([0-9]+).*$}
  SCALA_VERSION: "2.13"
  SEMVER_MAJOR_MINOR_VERSION: "4.2"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.2.1
  VERSION: 4.2.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - eclipse-temurin-21-jre
    - eclipse-temurin-21-jre-oci-config
    - grep
    - netbase
    - sed
    - tzdata
  builds:
    - name: kafka
      uses: dhi.io/gradle:9.6.1-jdk21-debian13-dev@sha256:4a63386840a951b8a28f1ae703812296c99615274fd024ea9fd461588b86ffc1
      caches:
        - path: /root/.gradle/caches
        - path: /root/.gradle/wrapper
      contents:
        packages:
          - gzip
          - patch
          - sed
          - tar
        files:
          - url: git+https://github.com/apache/kafka.git#4.2.1
            checksum: 18d5ecd939c8d510fdd72d0abb1f7099659dcd58
            path: ${source.dir}/kafka
            spdx:
              name: kafka
              version: 4.2.1
              packages:
                - name: kafka
                  purl: pkg:github/apache/kafka@4.2.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: apply jline remote-telnet cve patch
          uses: git/patch@v1
          work-dir: ${source.dir}/kafka
          with:
            patch: ${source.dir}/patch/jline-remote-telnet-cve.patch
        - name: apply gradle 9.5 projectdependency compatibility patch
          uses: git/patch@v1
          work-dir: ${source.dir}/kafka
          with:
            patch: ${source.dir}/patch/gradle-9.5-projectdependency-4.2.patch
        - name: configure gradle mirror
          runs: |
            set -eux -o pipefail

            mkdir -p /root/.gradle
            cat > /root/.gradle/init.gradle << 'EOF'
            def mavenCentralMirror = uri("https://maven-central.storage-download.googleapis.com/maven2/")

            def mirrorMavenCentral = { repo ->
                if (repo instanceof org.gradle.api.artifacts.repositories.MavenArtifactRepository &&
                    repo.url.toString() == "https://repo.maven.apache.org/maven2/") {
                    repo.setUrl(mavenCentralMirror)
                }
            }

            settingsEvaluated { settings ->
                settings.pluginManagement.repositories.configureEach(mirrorMavenCentral)
                settings.dependencyResolutionManagement.repositories.configureEach(mirrorMavenCentral)
            }

            allprojects {
                buildscript.repositories.configureEach(mirrorMavenCentral)
                repositories.configureEach(mirrorMavenCentral)
            }

            // jackson-databind PolymorphicTypeValidator bypass family
            // (CVE-2026-54512, -54513, -54514, -54516, -54517, -54518) plus
            // GHSA-72hv-8253-57qq (jackson-core DoS). Force databind/core to
            // 2.21.4 across all Kafka versions (4.1/4.2/4.3 use a single
            // `jackson` catalog property, so this version-agnostic force avoids
            // a per-version patch). Also force jackson-annotations to 2.21:
            // annotations has no 2.21.4 artifact on Maven Central, but databind
            // 2.21.4 requires JsonSerializeAs from annotations 2.21+ at build
            // time (MessageGenerator / processMessages). CVE-2026-54515's fix
            // (2.21.5) is not yet on the GCS Maven Central mirror and is
            // documented via VEX.
            allprojects {
                configurations.all {
                    resolutionStrategy.eachDependency { details ->
                        if (details.requested.group == "com.fasterxml.jackson.core" &&
                                (details.requested.name == "jackson-databind" ||
                                 details.requested.name == "jackson-core")) {
                            details.useVersion("2.21.4")
                            details.because("CVE remediation: GHSA-72hv-8253-57qq, CVE-2026-54512, CVE-2026-54513, CVE-2026-54514, CVE-2026-54516, CVE-2026-54517, CVE-2026-54518")
                        }
                        if (details.requested.group == "com.fasterxml.jackson.core" &&
                                details.requested.name == "jackson-annotations") {
                            details.useVersion("2.21")
                            details.because("align jackson-annotations with jackson-databind 2.21.4 for MessageGenerator")
                        }
                    }
                }
            }
            EOF
        - name: build kafka distribution
          work-dir: ${source.dir}/kafka
          privileged: true
          runs: |
            set -eux -o pipefail

            gradle clean releaseTarGz \
              -PscalaVersion=2.13 \
              --no-daemon \
              --console=plain \
              --warning-mode=summary
        - name: extract distribution
          work-dir: ${source.dir}/kafka
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/opt/kafka

            tar -xzf "core/build/distributions/kafka_2.13-4.2.1.tgz" \
              --strip-components=1 \
              -C ${target.dir}/opt/kafka
        - name: configure
          work-dir: ${source.dir}/kafka
          runs: |
            set -eux -o pipefail

            cp docker/server.properties \
              ${target.dir}/opt/kafka/config/server.properties

            sed -i \
              -e 's|^advertised\.listeners=PLAINTEXT://localhost:9092|advertised.listeners=PLAINTEXT://:9092|' \
              ${target.dir}/opt/kafka/config/server.properties

            chown -Rh 65532:65532 ${target.dir}/opt/kafka/config
            chmod -R 755 ${target.dir}/opt/kafka/config
      paths:
        - type: file
          path: ${source.dir}/patch/fips-sha256-log-cleaner.patch
          uid: 0
          gid: 0
          source: image/kafka/patch/fips-sha256-log-cleaner.patch
        - type: file
          path: ${source.dir}/patch/jline-remote-telnet-cve.patch
          uid: 0
          gid: 0
          source: image/kafka/patch/jline-remote-telnet-cve.patch
        - type: file
          path: ${source.dir}/patch/gradle-9.5-projectdependency-4.2.patch
          uid: 0
          gid: 0
          source: image/kafka/patch/gradle-9.5-projectdependency-4.2.patch
      outputs:
        - source: ${target.dir}/opt/kafka
          target: /opt/kafka
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kafka
          target: /opt/docker/sbom/kafka
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
accounts:
  run-as: kafka
  users:
    - name: kafka
      uid: 65532
      gid: 65532
  groups:
    - name: kafka
      gid: 65532
      members:
        - kafka
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /opt/kafka
environment:
  JAVA_HOME: /usr/lib/jvm/temurin-21
  KAFKA_LOG4J_OPTS: -Dkafka.logs.dir=/opt/kafka/logs/ -Dlog4j2.configurationFile=file:/opt/kafka/config/log4j2.yaml
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
paths:
  - type: directory
    path: /opt/kafka/logs
    uid: 65532
    gid: 65532
    mode: "0775"
  - type: directory
    path: /tmp/kraft-combined-logs
    uid: 65532
    gid: 65532
    mode: "0775"
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
  - type: file
    path: /usr/local/bin/docker-entrypoint.sh
    uid: 0
    gid: 0
    mode: "0755"
    source: image/kafka/bin/docker-entrypoint.sh
annotations:
  org.opencontainers.image.description: A minimal Kafka image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/docker-entrypoint.sh
ports:
  - 9092/tcp
