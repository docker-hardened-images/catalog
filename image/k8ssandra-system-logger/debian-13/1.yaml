# syntax=dhi.io/build:2-debian13

name: K8ssandra System Logger 1.30.x
image: dhi.io/k8ssandra-system-logger
variant: runtime
tags:
  - "1"
  - "1.30"
  - 1.30.0
  - 1-debian13
  - 1.30-debian13
  - 1.30.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2024-06-17"
vars:
  COMMIT_SHA: c5a43b79af96fa7404827ad85c5623a7bc48cc03
  SEMVER_MAJOR_MINOR_VERSION: "1.30"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.30.0
  VECTOR_REFERENCE: dhi/vector:0.55.0-debian13@sha256:df95b692cd6d20610efaae3b45f3a9d8154ea7a0777a515506a2fe9ee75fa77b
  VERSION: 1.30.0
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - ca-certificates
    - curl
    - libstdc++6
  builds:
    - name: install-vector
      contents:
        packages:
          - ca-certificates
          - bash
          - coreutils
        files:
          - url: git+https://github.com/k8ssandra/cass-operator.git#v1.30.0
            checksum: c5a43b79af96fa7404827ad85c5623a7bc48cc03
            path: ${source.dir}/cass-operator
            spdx:
              name: k8ssandra-cass-operator
              version: 1.30.0
              packages:
                - name: k8ssandra-cass-operator
                  purl: pkg:golang/github.com/k8ssandra/cass-operator@1.30.0
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/vector:0.55.0-debian13@sha256:df95b692cd6d20610efaae3b45f3a9d8154ea7a0777a515506a2fe9ee75fa77b
            includes:
              - usr/local/bin/vector
            uid: 0
            gid: 0
      pipeline:
        - name: install vector
          privileged: true
          runs: |
            set -eux -o pipefail

            # Install the vector configuration
            install -D -m 0644 \
              "${source.dir}/cass-operator/config/logger/vector_config.toml" \
              "${target.dir}/etc/vector/vector.toml"
      outputs:
        - source: /usr/local/bin/vector
          target: /usr/bin/vector
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/etc/vector
          target: /etc/vector
          uid: 0
          gid: 0
          mode: "0755"
accounts:
  run-as: "999"
  users:
    - name: cassandra
      uid: 999
      gid: 999
  groups:
    - name: cassandra
      gid: 999
      members:
        - cassandra
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /var/log/cassandra
    uid: 999
    gid: 999
    mode: "0755"
  - type: directory
    path: /var/lib/vector
    uid: 999
    gid: 999
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal k8ssandra-system-logger image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/vector
cmd:
  - --config
  - /etc/vector/vector.toml
