metadata:
  display-name: k8ssandra-system-logger
  short-description: |
    k8ssandra-system-logger packages Vector (vectordotdev/vector) as a small sidecar
    image that tails Cassandra system logs and writes them to stdout. It is
    designed to run as a nonroot sidecar alongside Cassandra to surface
    /var/log/cassandra/*.log to container stdout for collection by cluster
    logging agents or centralized logging systems.
  featured: false
  home-url: https://github.com/vectordotdev/vector
  categories:
    - monitoring-and-observability
  included-tools:
    - name: vector
      description: Vector log agent binary installed at /usr/bin/vector; used to read /var/log/cassandra/*.log and write to stdout
