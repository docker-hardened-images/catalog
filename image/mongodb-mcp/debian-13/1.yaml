  builds:
    - name: mongodb-mcp
      uses: dhi.io/node:24.16.0-debian13-sfw-dev@sha256:60bd0b9b528bf18e1df5ee16543296dfd66af8711ed05604b2026b3b604f63fa
      contents:
        files:
          - url: git+https://github.com/mongodb-js/mongodb-mcp-server.git#v1.11.0
            checksum: 0b60655c8a8920d46c3ac78bf012af8cba0a8d7a
            path: ${source.dir}/mongodb-mcp-server-0b60655c8a8920d46c3ac78bf012af8cba0a8d7a
            spdx:
              name: mongodb-mcp-server
              version: 1.11.0
              packages:
                - name: mongodb-mcp-server
                  purl: pkg:dhi/mongodb-mcp@1.11.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump pnpm dependencies
          work-dir: ${source.dir}/mongodb-mcp-server-0b60655c8a8920d46c3ac78bf012af8cba0a8d7a
          privileged: true
          runs: |
            set -eux -o pipefail

            npm pkg set pnpm.overrides.minimatch=10.2.3                   # CVE-2026-26996, CVE-2026-27903, CVE-2026-27904
            npm pkg set pnpm.overrides.qs=6.15.2                          # CVE-2026-2391, CVE-2026-8723
            npm pkg set pnpm.overrides."@modelcontextprotocol/sdk"=1.26.0 # CVE-2026-25536
            npm pkg set pnpm.overrides.hono=4.12.18                       # CVE-2026-44456, CVE-2026-44457, CVE-2026-44455, CVE-2026-44458, CVE-2026-44459
            npm pkg set pnpm.overrides.fast-xml-parser=5.7.0              # CVE-2026-41650
            npm pkg set pnpm.overrides.ip-address=10.1.1                  # CVE-2026-42338
        - name: build
          work-dir: ${source.dir}/mongodb-mcp-server-0b60655c8a8920d46c3ac78bf012af8cba0a8d7a
          privileged: true
          runs: |
            set -eux -o pipefail

            # Remove lockfile to ensure overrides take effect
            rm -f pnpm-lock.yaml

            pnpm install

            npm run build

            # Keep workspace-linked packages (@mongodb-js/mcp-metrics, mcp-types)
            # in node_modules; a fresh prod install drops workspace:* deps.
            export CI=true
            pnpm prune --prod --ignore-scripts
      outputs:
        - source: ${source.dir}/mongodb-mcp-server-0b60655c8a8920d46c3ac78bf012af8cba0a8d7a/node_modules
          target: /app/node_modules
