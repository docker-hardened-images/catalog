      contents:
        files:
          - url: git+https://github.com/mongodb-js/mongodb-mcp-server.git#v1.12.0
            checksum: a0ce7320434575a811b0b93b3c843cf850a858f6
            path: ${source.dir}/mongodb-mcp-server-a0ce7320434575a811b0b93b3c843cf850a858f6
            spdx:
              name: mongodb-mcp-server
              version: 1.12.0
              packages:
                - name: mongodb-mcp-server
                  purl: pkg:dhi/mongodb-mcp@1.12.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump pnpm dependencies
          work-dir: ${source.dir}/mongodb-mcp-server-a0ce7320434575a811b0b93b3c843cf850a858f6
          privileged: true
          runs: |
            set -eux -o pipefail

            npm pkg set pnpm.overrides.minimatch=10.2.3                   # CVE-2026-26996, CVE-2026-27903, CVE-2026-27904
            npm pkg set pnpm.overrides.qs=6.15.2                          # CVE-2026-2391, CVE-2026-8723
            npm pkg set pnpm.overrides."@modelcontextprotocol/sdk"=1.26.0 # CVE-2026-25536
            npm pkg set pnpm.overrides.hono=4.12.21                       # CVE-2026-47673, CVE-2026-47674, CVE-2026-47675, CVE-2026-47676
            npm pkg set pnpm.overrides.fast-xml-parser=5.7.0              # CVE-2026-41650
            npm pkg set pnpm.overrides.ip-address=10.1.1                  # CVE-2026-42338
        - name: build
          work-dir: ${source.dir}/mongodb-mcp-server-a0ce7320434575a811b0b93b3c843cf850a858f6
          privileged: true
          runs: |
            set -eux -o pipefail

            # Remove lockfile to ensure overrides take effect
            rm -f pnpm-lock.yaml

            pnpm install

            npm run build

            # Keep workspace-linked packages (@mongodb-js/mcp-metrics, mcp-types)
            # in node_modules; a fresh prod install drops workspace:* deps.
            export CI=true
            pnpm prune --prod --ignore-scripts
      outputs:
        - source: ${source.dir}/mongodb-mcp-server-a0ce7320434575a811b0b93b3c843cf850a858f6/node_modules
