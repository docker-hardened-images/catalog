# syntax=dhi.io/build:2-debian13

name: MongoDB MCP Server 1.x
image: dhi.io/mongodb-mcp
variant: runtime
tags:
  - "1"
  - "1.14"
  - 1.14.0
  - 1-debian
  - 1-debian13
  - 1.14-debian
  - 1.14-debian13
  - 1.14.0-debian
  - 1.14.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: b7d2a8ea682f99e794215415c71407ba96114f7d
  SEMVER_MAJOR_MINOR_VERSION: "1.14"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.14.0
  VERSION: 1.14.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - libc6
    - libgomp1
    - libstdc++6
    - netbase
    - nodejs-24
    - tzdata
  builds:
    - name: mongodb-mcp
      contents:
        packages:
          - base-files
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - git
          - libc6
          - libstdc++6
          - mawk
          - nodejs-24
          - node-corepack
          - npm
          - sed
          - yarn-classic
        files:
          - url: git+https://github.com/mongodb-js/mongodb-mcp-server.git#v1.14.0
            checksum: b7d2a8ea682f99e794215415c71407ba96114f7d
            path: ${source.dir}/mongodb-mcp-server-b7d2a8ea682f99e794215415c71407ba96114f7d
            spdx:
              name: mongodb-mcp-server
              version: 1.14.0
              packages:
                - name: mongodb-mcp-server
                  purl: pkg:dhi/mongodb-mcp@1.14.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump pnpm dependencies
          work-dir: ${source.dir}/mongodb-mcp-server-b7d2a8ea682f99e794215415c71407ba96114f7d
          privileged: true
          runs: |
            set -eux -o pipefail

            npm pkg set pnpm.overrides.minimatch=10.2.3                   # CVE-2026-26996, CVE-2026-27903, CVE-2026-27904
            npm pkg set pnpm.overrides.qs=6.15.2                          # CVE-2026-2391, CVE-2026-8723
            npm pkg set pnpm.overrides."@modelcontextprotocol/sdk"=1.26.0 # CVE-2026-25536
            npm pkg set pnpm.overrides.hono=4.12.25                       # CVE-2026-54290, CVE-2026-54288, CVE-2026-54286, CVE-2026-54287, CVE-2026-54289
            npm pkg set pnpm.overrides.fast-xml-parser=5.7.0              # CVE-2026-41650
            npm pkg set pnpm.overrides.ip-address=10.1.1                  # CVE-2026-42338
        - name: build
          work-dir: ${source.dir}/mongodb-mcp-server-b7d2a8ea682f99e794215415c71407ba96114f7d
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable
            corepack prepare pnpm@latest --activate

            # Remove lockfile to ensure overrides take effect
            rm -f pnpm-lock.yaml

            pnpm install

            npm run build

            # Keep workspace-linked packages (@mongodb-js/mcp-metrics, mcp-types)
            # in node_modules; a fresh prod install drops workspace:* deps.
            export CI=true
            pnpm prune --prod --ignore-scripts
      outputs:
        - source: ${source.dir}/mongodb-mcp-server-b7d2a8ea682f99e794215415c71407ba96114f7d/node_modules
          target: /app/node_modules
          uid: 0
          gid: 0
        - source: ${source.dir}/mongodb-mcp-server-b7d2a8ea682f99e794215415c71407ba96114f7d/dist
          target: /app/dist
          uid: 0
          gid: 0
        - source: ${source.dir}/mongodb-mcp-server-b7d2a8ea682f99e794215415c71407ba96114f7d/packages/metrics
          target: /app/packages/metrics
          uid: 0
          gid: 0
        - source: ${source.dir}/mongodb-mcp-server-b7d2a8ea682f99e794215415c71407ba96114f7d/packages/types
          target: /app/packages/types
          uid: 0
          gid: 0
accounts:
  run-as: node
  users:
    - name: node
      uid: 1000
      gid: 1000
  groups:
    - name: node
      gid: 1000
      members:
        - node
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  MDB_MCP_LOGGERS: stderr,mcp
annotations:
  org.opencontainers.image.description: MongoDB MCP Server
  org.opencontainers.image.licenses: Apache-2.0
labels:
  io.modelcontextprotocol.server.name: io.github.mongodb-js/mongodb-mcp-server
entrypoint:
  - node
  - /app/dist/esm/index.js
