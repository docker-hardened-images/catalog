# syntax=dhi.io/build:2-debian13

name: NATS CLI 0.x (dev)
image: dhi.io/natscli
variant: dev
tags:
  - 0-dev
  - 0.4-dev
  - 0.4.0-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.4-debian-dev
  - 0.4-debian13-dev
  - 0.4.0-debian-dev
  - 0.4.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-09-22"
vars:
  COMMIT_SHA: 21e276a53dc7ff2b73e67c3ab39303d0c3a1f831
  SEMVER_MAJOR_MINOR_VERSION: "0.4"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.4.0
  VERSION: 0.4.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: natscli
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/nats-io/natscli.git#v0.4.0
            checksum: 21e276a53dc7ff2b73e67c3ab39303d0c3a1f831
            path: /go/src/github.com/nats-io/natscli
            spdx:
              name: natscli
              version: 0.4.0
              packages:
                - name: natscli
                  purl: pkg:golang/github.com/nats-io/natscli@0.4.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/nats-io/natscli
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: unit test
          work-dir: /go/src/github.com/nats-io/natscli
          privileged: true
          runs: |
            set -eux -o pipefail

            # Run a subset of tests to verify the build works
            # Skip flaky tests (TestStreamPeerRemove needs a multi-node cluster and fails in CI)
            go list ./... | grep -F -e asciigraph -v | xargs go test -v -skip 'TestNatsSubscribe|TestServerCheck|TestJetStreamSubscribe|TestStreamPeerRemove' --failfast -p=1
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/nats-io/natscli
          with:
            output: ${target.dir}/usr/local/bin/nats
            packages: ./nats
      outputs:
        - source: ${target.dir}/usr/local/bin/nats
          target: /usr/local/bin/nats
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/natscli
          target: /opt/docker/sbom/natscli
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal NATS CLI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - nats
