      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/nats-io/natscli
          with:
            deps:
              - github.com/nats-io/nats-server/v2@v2.12.6
            download: true
        - name: unit test
          work-dir: /go/src/github.com/nats-io/natscli
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              # Some unit tests will actually try to use X25519 which is not allowed in FIPS mode
              export GODEBUG=fips140=on
            fi

            # Run a subset of tests to verify the build works
            # Skip flaky tests
            go list ./... | grep -F -e asciigraph -v | xargs go test -v -skip 'TestNatsSubscribe|TestServerCheck|TestJetStreamSubscribe' --failfast -p=1
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/nats-io/natscli
          with:
            output: ${target.dir}/usr/local/bin/nats
            packages: ./nats
      outputs:
        - source: ${target.dir}/usr/local/bin/nats
          target: /usr/local/bin/nats
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/natscli
