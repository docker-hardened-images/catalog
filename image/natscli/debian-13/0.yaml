  builds:
    - name: natscli
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:39947402d8e52fcaeb8f8a3b00f4377414464fb89437c7ba67358cf4c5caaac9
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/nats-io/natscli.git#v0.3.2
            checksum: 0a24703a25682e845459fb93968b5499d6858695
            path: /go/src/github.com/nats-io/natscli
            spdx:
