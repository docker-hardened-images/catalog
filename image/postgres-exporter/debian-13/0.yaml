# syntax=dhi.io/build:2-debian13

name: Postgres Exporter 0.x
image: dhi.io/postgres-exporter
variant: runtime
tags:
  - "0"
  - "0.19"
  - 0.19.1
  - 0-debian
  - 0-debian13
  - 0.19-debian
  - 0.19-debian13
  - 0.19.1-debian
  - 0.19.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-05"
vars:
  COMMIT_SHA: 333363aeb548b66340a61a7fb2b3f0e8a8d39f90
  SEMVER_MAJOR_MINOR_VERSION: "0.19"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.19.1
  VERSION: 0.19.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: postgres_exporter
      work-dir: /go/src/github.com/prometheus-community/postgres_exporter
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/prometheus-community/postgres_exporter.git#v0.19.1
            checksum: 333363aeb548b66340a61a7fb2b3f0e8a8d39f90
            path: /go/src/github.com/prometheus-community/postgres_exporter
            spdx:
              name: postgres_exporter
              version: 0.19.1
              packages:
                - name: postgres_exporter
                  purl: pkg:golang/github.com/prometheus-community/postgres_exporter@0.19.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Run unit tests only, skip integration tests
            go test -short ./... -count=1 -v
        - name: build postgres_exporter
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/prometheus/common/version.Version=0.19.1
              - -X github.com/prometheus/common/version.Revision=333363aeb548b66340a61a7fb2b3f0e8a8d39f90
              - -X github.com/prometheus/common/version.Branch=HEAD
              - -X github.com/prometheus/common/version.BuildUser=dhi
              - -X github.com/prometheus/common/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +%Y%m%d-%H:%M:%S)
            output: ${target.dir}/usr/local/bin/postgres_exporter
            packages: ./cmd/postgres_exporter
      outputs:
        - source: ${target.dir}/usr/local/bin/postgres_exporter
          target: /usr/local/bin/postgres_exporter
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/postgres_exporter
          target: /opt/docker/sbom/postgres_exporter
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /bin/postgres_exporter
    uid: 0
    gid: 0
    source: /usr/local/bin/postgres_exporter
annotations:
  org.opencontainers.image.description: A minimal Postgres Exporter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/postgres_exporter
ports:
  - 9187/tcp
