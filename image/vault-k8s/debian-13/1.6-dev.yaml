# syntax=dhi.io/build:2-debian13

name: vault-k8s 1.6.x (dev)
image: dhi.io/vault-k8s
variant: dev
tags:
  - 1.6-dev
  - 1.6.2-dev
  - 1.6-debian-dev
  - 1.6-debian13-dev
  - 1.6.2-debian-dev
  - 1.6.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-02-26"
vars:
  COMMIT_SHA: d71b447f1e75b7def6a426c8bb78a2db6d1055b8
  SEMVER_MAJOR_MINOR_VERSION: "1.6"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.6.2
  VERSION: 1.6.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: vault-k8s-go
      work-dir: /go/src/github.com/hashicorp/vault-k8s
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/hashicorp/vault-k8s.git#v1.6.2
            checksum: d71b447f1e75b7def6a426c8bb78a2db6d1055b8
            path: /go/src/github.com/hashicorp/vault-k8s
            spdx:
              name: vault-k8s
              version: 1.6.2
              packages:
                - name: vault-k8s
                  purl: pkg:dhi/vault-k8s@1.6.2
                  license: MPL-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.6 only)
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.56.0
              - golang.org/x/text@v0.39.0
            download: true
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/hashicorp/vault-k8s/version.Version=1.6.2
            output: ${target.dir}/usr/local/bin/vault-k8s
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin/vault-k8s
          target: /usr/local/bin/vault-k8s
          uid: 0
          gid: 0
          mode: "0755"
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal vault-k8s image
  org.opencontainers.image.licenses: MPL-2.0
entrypoint:
  - /usr/local/bin/vault-k8s
