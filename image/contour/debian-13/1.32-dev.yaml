# syntax=dhi.io/build:2-debian13

name: Contour 1.x (dev)
image: dhi.io/contour
variant: dev
tags:
  - 1.32-dev
  - 1.32.5-dev
  - 1.32-debian-dev
  - 1.32-debian13-dev
  - 1.32.5-debian-dev
  - 1.32.5-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-05-15"
vars:
  COMMIT_SHA: d908675ac6b180f1897ed3681c02d0fd29fa0e27
  SEMVER_MAJOR_MINOR_VERSION: "1.32"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.32.5
  VERSION: 1.32.5
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: contour
      work-dir: /go/src/github.com/projectcontour/contour
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/projectcontour/contour.git#v1.32.5
            checksum: d908675ac6b180f1897ed3681c02d0fd29fa0e27
            path: /go/src/github.com/projectcontour/contour
            spdx:
              name: contour
              version: 1.32.5
              packages:
                - name: contour
                  purl: pkg:golang/github.com/projectcontour/contour@1.32.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.32 only)
          uses: go/bump@v2
          with:
            deps:
              - google.golang.org/grpc@v1.82.1
            download: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            go test ./...
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X github.com/projectcontour/contour/internal/build.Version=1.32.5
              - -X github.com/projectcontour/contour/internal/build.Sha=d908675ac6b180f1897ed3681c02d0fd29fa0e27
            output: ${target.dir}/usr/local/bin/contour
            packages: ./cmd/contour
            tags: oidc,gcp,osusergo,netgo
      outputs:
        - source: ${target.dir}/usr/local/bin/contour
          target: /usr/local/bin/contour
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/contour
          target: /opt/docker/sbom/contour
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal contour image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/contour
