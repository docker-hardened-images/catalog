# syntax=dhi.io/build:2-debian13

name: Contour 1.x
image: dhi.io/contour
variant: runtime
tags:
  - "1.31"
  - 1.31.6
  - 1.31-debian
  - 1.31-debian13
  - 1.31.6-debian
  - 1.31.6-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-05-06"
vars:
  COMMIT_SHA: 415bf10c9c99083f6428b738ce2dbdeceed2184a
  SEMVER_MAJOR_MINOR_VERSION: "1.31"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.31.6
  VERSION: 1.31.6
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: contour
      work-dir: /go/src/github.com/projectcontour/contour
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/projectcontour/contour.git#v1.31.6
            checksum: 415bf10c9c99083f6428b738ce2dbdeceed2184a
            path: /go/src/github.com/projectcontour/contour
            spdx:
              name: contour
              version: 1.31.6
              packages:
                - name: contour
                  purl: pkg:golang/github.com/projectcontour/contour@1.31.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.31 only)
          uses: go/bump@v2
          with:
            deps:
              - google.golang.org/grpc@v1.82.1
            download: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            go test ./...
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X github.com/projectcontour/contour/internal/build.Version=1.31.6
              - -X github.com/projectcontour/contour/internal/build.Sha=415bf10c9c99083f6428b738ce2dbdeceed2184a
            output: ${target.dir}/usr/local/bin/contour
            packages: ./cmd/contour
            tags: oidc,gcp,osusergo,netgo
      outputs:
        - source: ${target.dir}/usr/local/bin/contour
          target: /usr/local/bin/contour
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/contour
          target: /opt/docker/sbom/contour
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal contour image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/contour
