# syntax=dhi.io/build:2-debian13

name: KServe Agent 0.x (dev)
image: dhi.io/kserve-agent
variant: dev
tags:
  - 0-dev
  - 0.19-dev
  - 0.19.0-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.19-debian-dev
  - 0.19-debian13-dev
  - 0.19.0-debian-dev
  - 0.19.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: b0eda63d2c105479140af8ec9149d992b7e44be5
  SEMVER_MAJOR_MINOR_VERSION: "0.19"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.19.0
  VERSION: 0.19.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: kserve-agent
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kserve/kserve.git#v0.19.0
            checksum: b0eda63d2c105479140af8ec9149d992b7e44be5
            path: /go/src/github.com/kserve/kserve
            spdx:
              name: kserve-agent
              version: 0.19.0
              packages:
                - name: kserve-agent
                  purl: pkg:golang/github.com/kserve/kserve@0.19.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/kserve/kserve
          with:
            deps:
              - golang.org/x/text@v0.39.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.82.1
              - github.com/kedacore/keda/v2@v2.18.3
            download: true
            replaces:
              - google.golang.org/grpc=google.golang.org/grpc@v1.82.1
        - name: test
          work-dir: /go/src/github.com/kserve/kserve
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -C /go/src/github.com/kserve/kserve/cmd/agent ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            output: ${target.dir}/usr/local/bin/kserve-agent
            packages: ./cmd/agent
      outputs:
        - source: ${target.dir}/usr/local/bin/kserve-agent
          target: /usr/local/bin/kserve-agent
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/kserve-agent
          target: /opt/docker/sbom/kserve-agent
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: KServe Agent - ML inference sidecar container
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - kserve-agent
ports:
  - 9081/tcp
