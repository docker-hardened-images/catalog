# syntax=dhi.io/build:2-debian13

name: Fluentd 1.19.x (dev)
image: dhi.io/fluentd
variant: dev
tags:
  - 1-dev
  - 1.19-dev
  - 1.19.3-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.19-debian-dev
  - 1.19-debian13-dev
  - 1.19.3-debian-dev
  - 1.19.3-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BINUTILS_ARCH: '#{ target.arch == "amd64" ? "x86-64" : "aarch64" }'
  GEM_HOME: /usr/local/bundle
  JEMALLOC_VERSION: 5.3.1
  RUBY_MAJOR_MINOR_VERSION: "3.4"
  RUBY_VERSION: 3.4.10-7
  SEMVER_MAJOR_MINOR_VERSION: "1.19"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.19.3
  VERSION: 1.19.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!binutils'
    - '!binutils-aarch64-linux-gnu'
    - '!binutils-common'
    - '!binutils-x86-64-linux-gnu'
    - '!gawk'
    - '!libbinutils'
    - '!libctf-nobfd0'
    - '!libctf0'
    - '!libelogind0'
    - '!libgprofng0'
    - '!libsframe1'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - binutils-latest
    - binutils-latest-${BINUTILS_ARCH}-linux-gnu
    - build-essential
    - ca-certificates
    - coreutils
    - curl
    - diffutils
    - dpkg
    - findutils
    - git
    - grep
    - libc-bin
    - libc6
    - libcrypt1
    - libctf-nobfd0-latest
    - libctf0-latest
    - libffi8
    - libgcc-s1
    - libgmp10
    - libgprofng0-latest
    - libjemalloc2
    - libssl3t64
    - libstdc++6
    - libyaml-0-2
    - libyaml-dev
    - make
    - mawk
    - perl-base
    - ruby-3.4-dev=3.4.10-7
    - ruby-3.4=3.4.10-7
    - sed
    - tini
    - tzdata
    - util-linux
    - zlib1g
  builds:
    - name: jemalloc
      environment:
        PATH: /usr/local/bundle/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - mawk
          - grep
          - libc-bin
          - sed
          - ruby-3.4-dev=3.4.10-7
          - ruby-3.4=3.4.10-7
          - libc6-dev
          - libcrypt-dev
          - libffi-dev
          - libgmp-dev
          - libjemalloc-dev
          - libssl-dev
          - libyaml-dev
          - zlib1g-dev
        files:
          - url: https://github.com/jemalloc/jemalloc/releases/download/5.3.1/jemalloc-5.3.1.tar.bz2
            path: ${source.dir}/jemalloc.tar.bz2
            spdx:
              name: jemalloc
              version: 5.3.1
              packages:
                - name: jemalloc
                  purl: pkg:dhi/jemalloc@5.3.1
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: install jemalloc
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/opt/jemalloc
            tar -xjf ${source.dir}/jemalloc.tar.bz2 -C ${target.dir}/opt/jemalloc --strip-components=1
            cd ${target.dir}/opt/jemalloc

            # Don't use MADV_FREE to reduce memory usage and improve stability
            # https://github.com/fluent/fluentd-docker-image/pull/350
            echo "je_cv_madv_free=no" > config.cache

            ncpus=$(getconf _NPROCESSORS_ONLN)
            ncpus=$((ncpus > 6 ? 6 : ncpus))

            ./configure -C
            make -j${ncpus}
      outputs:
        - source: ${target.dir}/opt/jemalloc/lib
          target: /usr/lib/libjemalloc
          uid: 0
          gid: 0
    - name: fluent
      environment:
        BUNDLE_APP_CONFIG: ${BUNDLE_APP_CONFIG}
        BUNDLE_SILENCE_ROOT_WARNING: ${BUNDLE_SILENCE_ROOT_WARNING}
        GEM_HOME: /usr/local/bundle
        PATH: /usr/local/bundle/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - ruby-3.4-dev=3.4.10-7
          - ruby-3.4=3.4.10-7
          - libc6-dev
          - libcrypt-dev
          - libffi-dev
          - libgmp-dev
          - libjemalloc-dev
          - libssl-dev
          - libyaml-dev
          - zlib1g-dev
          - build-essential
          - make
      pipeline:
        - name: install fluentd gem
          privileged: true
          runs: |
            set -eux -o pipefail

            gem install oj
            gem install json
            gem install rexml
            gem install async
            gem install async-http
            gem install fluentd -v 1.19.3 --no-doc
        - name: test-dev
          runs: |
            set -eux -o pipefail

            fluent-binlog-reader --version
            fluent-ca-generate --version
            fluent-cat --version
            fluent-ctl --version
            fluent-debug --help # --version does not exist
            fluent-gem --version
            fluent-plugin-config-format --version
            fluent-plugin-generate --version

            if gem list -i cap > /dev/null 2>&1; then
              fluent-cap-ctl --version
            fi
      outputs:
        - source: /usr/local/bundle
          target: /usr/local/bundle
          uid: 0
          gid: 0
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  BUNDLE_APP_CONFIG: /usr/local/bundle
  BUNDLE_SILENCE_ROOT_WARNING: "true"
  DEBIAN_FRONTEND: noninteractive
  GEM_HOME: /usr/local/bundle
  PATH: /usr/local/bundle/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: directory
    path: /etc/fluent
    uid: 0
    gid: 0
  - type: directory
    path: /etc/fluent/plugins
    uid: 0
    gid: 0
  - type: directory
    path: /var/log/fluent
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: file
    path: /usr/local/bin/docker-entrypoint.sh
    uid: 0
    gid: 0
    mode: "0755"
    source: image/fluentd/bin/docker-entrypoint.sh
  - type: file
    path: /etc/fluent/fluent.conf
    uid: 0
    gid: 0
    mode: "0755"
    source: image/fluentd/config/fluent.conf
annotations:
  org.opencontainers.image.description: A minimal Fluentd image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/tini
  - --
  - /usr/local/bin/docker-entrypoint.sh
cmd:
  - fluentd
ports:
  - 24224/tcp
  - 5140/tcp
