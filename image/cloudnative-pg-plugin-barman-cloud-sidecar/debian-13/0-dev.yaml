  - linux/arm64
dates:
  release: "2026-04-14"
vars:
  BARMAN_CLOUD_REFERENCE: dhi/cloudnative-pg-plugin-barman-cloud:0.13.0-debian13@sha256:6186ee33f413b5cd1ca6b34d84bd40a669d49db154d461c452e14be07135767d
  BARMAN_COMMIT_SHA: 9444450d405d34b07740505d85dd4f31b9c48639
  BARMAN_VERSION: 3.19.1
  SEMVER_MAJOR_MINOR_VERSION: "0.13"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.13.0
  VERSION: 0.13.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libpq5
    - libstdc++6
    - mawk
    - perl-base
    - python-3.14
    - python-3.14-dev
    - python3-pip
    - python3-setuptools
    - python3-wheel
    - sed
    - tzdata
    - util-linux
  builds:
    - name: cloudnative-pg-plugin-barman-cloud-sidecar
      work-dir: ${source.dir}/barman
      environment:
        CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      caches:
        - path: /root/.cache/pip
        - path: /root/.cargo
      contents:
        packages:
          - base-files
          - build-essential
          - pkg-config
          - postgresql-common
          - postgresql-server-dev-all
          - python-3.14
          - python-3.14-dev
          - python3-pip
          - python3-setuptools
          - python3-wheel
          - libstdc++6
          - libssl-dev
          - libffi-dev
          - cargo
          - rustc
          - bash
          - coreutils
          - diffutils
          - findutils
          - gawk
          - grep
          - sed
        files:
          - url: git+https://github.com/EnterpriseDB/barman.git#release/3.19.1
            checksum: 9444450d405d34b07740505d85dd4f31b9c48639
            path: ${source.dir}/barman
            spdx:
              name: barman
              version: 3.19.1
              packages:
                - purl: pkg:pypi/barman@3.19.1
                  license: GPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: create virtual environment
          runs: |
            set -eux -o pipefail

            mkdir -p "/app/"
            python3 -m venv "/app/.venv"
        - name: install python requirements
          privileged: true
          runs: |
            set -eux -o pipefail

            "/app/.venv/bin/python3" -m pip install --no-binary=cryptography,psycopg2 --no-cache-dir ".[all]"
      outputs:
        - source: /app/.venv
          target: /app/.venv
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/barman
          target: /opt/docker/sbom/barman
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/cloudnative-pg-plugin-barman-cloud:0.13.0-debian13@sha256:6186ee33f413b5cd1ca6b34d84bd40a669d49db154d461c452e14be07135767d
      includes:
        - usr/local/bin/manager
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  PATH: /app/.venv/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: symlink
    path: /manager
    uid: 0
    gid: 0
    source: /usr/local/bin/manager
annotations:
  org.opencontainers.image.description: A minimal CloudNativePG Barman Cloud Plugin Sidecar image
  org.opencontainers.image.licenses: Apache 2.0
entrypoint:
