# syntax=dhi.io/build:2-debian13

name: csi-snapshotter 8.6.x
image: dhi.io/csi-snapshotter
variant: runtime
tags:
  - "8"
  - "8.6"
  - 8.6.0
  - 8-debian
  - 8-debian13
  - 8.6-debian
  - 8.6-debian13
  - 8.6.0-debian
  - 8.6.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 78e32cd84e0abec2621924a30e38c755f93e180a
  SEMVER_MAJOR_MINOR_VERSION: "8.6"
  SEMVER_MAJOR_VERSION: "8"
  SEMVER_VERSION: 8.6.0
  VERSION: 8.6.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: csi-snapshotter
      work-dir: /go/src/github.com/kubernetes-csi/external-snapshotter
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kubernetes-csi/external-snapshotter.git#v8.6.0
            checksum: 78e32cd84e0abec2621924a30e38c755f93e180a
            path: /go/src/github.com/kubernetes-csi/external-snapshotter
            spdx:
              name: csi-snapshotter
              version: 8.6.0
              packages:
                - name: csi-snapshotter
                  purl: pkg:golang/github.com/kubernetes-csi/external-snapshotter@8.6.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: remove vendor directory
          runs: |
            set -eux -o pipefail

            rm -rf vendor
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.81.1
            download: true
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X main.version=8.6.0
            output: ${target.dir}/usr/local/bin/csi-snapshotter
            packages: ./cmd/csi-snapshotter
      outputs:
        - source: ${target.dir}/usr/local/bin/csi-snapshotter
          target: /usr/local/bin/csi-snapshotter
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/csi-snapshotter
          target: /opt/docker/sbom/csi-snapshotter
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal csi-snapshotter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/csi-snapshotter
