# syntax=dhi.io/build:2-debian13

name: loki-helm-test 3.7.x
image: dhi.io/loki-helm-test
variant: runtime
tags:
  - "3"
  - "3.7"
  - 3.7.4
  - 3-debian
  - 3-debian13
  - 3.7-debian
  - 3.7-debian13
  - 3.7.4-debian
  - 3.7.4-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-26"
vars:
  COMMIT_SHA: b318f2829f0ae2094ab3a1e90780450e9e4b03be
  SEMVER_MAJOR_MINOR_VERSION: "3.7"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.7.4
  VERSION: 3.7.4
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: loki-helm-test
      work-dir: /go/src/github.com/grafana/loki
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - make
          - bash
          - sed
          - hostname
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - git
        files:
          - url: git+https://github.com/grafana/loki.git#v3.7.4
            checksum: b318f2829f0ae2094ab3a1e90780450e9e4b03be
            path: /go/src/github.com/grafana/loki
            spdx:
              name: loki
              version: 3.7.4
              packages:
                - name: loki
                  purl: pkg:golang/github.com/grafana/loki@3.7.4
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies and vendor
          uses: go/bump@v2
          with:
            deps: []
            download: true
        - name: build loki helm test
          runs: |
            set -eux -o pipefail

            make clean
            make BUILD_IN_CONTAINER=false helm-test
      paths:
        - type: file
          path: ${source.dir}/patch/canary_test_3.5.patch
          uid: 0
          gid: 0
          source: image/loki-helm-test/patch/canary_test_3.5.patch
        - type: file
          path: ${source.dir}/patch/canary_test_3.6.patch
          uid: 0
          gid: 0
          source: image/loki-helm-test/patch/canary_test_3.6.patch
      outputs:
        - source: /go/src/github.com/grafana/loki/production/helm/loki/src/helm-test/helm-test
          target: /usr/local/bin/helm-test
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/loki
          target: /opt/docker/sbom/loki
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal loki-helm-test image
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - /usr/local/bin/helm-test
