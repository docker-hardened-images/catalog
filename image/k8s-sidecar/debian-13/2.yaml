# syntax=dhi.io/build:2-debian13

name: k8s-sidecar 2.x
image: dhi.io/k8s-sidecar
variant: runtime
tags:
  - "2"
  - "2.7"
  - 2.7.4
  - 2-debian
  - 2-debian13
  - 2.7-debian
  - 2.7-debian13
  - 2.7.4-debian
  - 2.7.4-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 13c8eb36aab205019aa8b9429b5d3f70c435e512
  PYTHON_BUILD_REF: dhi/python:3.14.6-debian13-dev@sha256:8eb7494ef9c51643958a11c386bd4fa3866d899c29c9cb4cf0e372a58ef7f023
  PYTHON_REF: dhi/python:3.14.6-debian13@sha256:4469b5c5732c2f2776df15ce8f5eb2a057e8ec092d3626ddbbebc10fc99d873d
  SEMVER_MAJOR_MINOR_VERSION: "2.7"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.7.4
  VERSION: 2.7.4
contents:
  packages:
    - '!gawk'
    - '!gcc-14'
    - '!gcc-14-base'
    - '!libelogind0'
    - '!libmpfr6'
    - '!libreadline8t64'
    - '!libsigsegv'
    - '!libsigsegv2'
    - '!libtinfo6'
    - '!mawk'
    - '!mpfr4'
    - '!ncurses'
    - '!original-awk'
    - '!readline'
    - '!readline-common'
    - base-files
    - ca-certificates
    - libffi8
    - tzdata
  builds:
    - name: k8s-sidecar
      uses: dhi.io/python:3.14.6-debian13-dev@sha256:8eb7494ef9c51643958a11c386bd4fa3866d899c29c9cb4cf0e372a58ef7f023
      contents:
        packages:
          - build-essential
          - libssl-dev
          - ca-certificates
          - bash
          - coreutils
          - git
        files:
          - url: git+https://github.com/kiwigrid/k8s-sidecar.git#2.7.4
            checksum: 13c8eb36aab205019aa8b9429b5d3f70c435e512
            path: ${source.dir}/k8s-sidecar
            spdx:
              name: k8s-sidecar
              version: 2.7.4
              packages:
                - name: k8s-sidecar
                  purl: pkg:github/kiwigrid/k8s-sidecar@2.7.4
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: create virtual environment
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/app"
            python3 -m venv "${target.dir}/app/.venv"
        - name: install python package
          work-dir: ${source.dir}/k8s-sidecar
          privileged: true
          runs: |
            set -eux -o pipefail

            "${target.dir}/app/.venv/bin/python3" -m pip install --no-cache-dir .

            # Remediate CVEs by upgrading packages
            "${target.dir}/app/.venv/bin/python3" -m pip install --no-cache-dir "pip==26.1.2"          # CVE-2026-8643
            "${target.dir}/app/.venv/bin/python3" -m pip install --no-cache-dir "urllib3==2.7.0"       # CVE-2026-21441, CVE-2026-44431, CVE-2026-44432
            "${target.dir}/app/.venv/bin/python3" -m pip install --no-cache-dir "cryptography==48.0.1" # CVE-2026-26007, CVE-2026-34073, CVE-2026-39892, GHSA-537c-gmf6-5ccf
        - name: clean python cache and tests
          runs: |
            set -eux -o pipefail

            # Remove compiled Python files (.pyc, .pyo) and __pycache__ directories
            # Remove test directories (test, tests) to reduce image size
            find "${target.dir}/app/.venv" \
              \( -type d -a \( -name test -o -name tests -o -name __pycache__ \) \) \
              -o \( -type f -a \( -name '*.pyc' -o -name '*.pyo' \) \) \
              -exec rm -rf '{}' + || true
        - name: python dependencies sbom
          uses: sbom@v1
          with:
            extra-scanners: python-package-cataloger
            prefix: k8s-sidecar-python
            source: /app/.venv
      outputs:
        - source: ${target.dir}/app
          target: /app
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.14.6-debian13@sha256:4469b5c5732c2f2776df15ce8f5eb2a057e8ec092d3626ddbbebc10fc99d873d
      includes:
        - opt/**
        - usr/**
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  PATH: /app/.venv/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
  PYTHONUNBUFFERED: "1"
paths:
  - type: directory
    path: /app
    uid: 0
    gid: 0
    mode: "0755"
  - type: directory
    path: /tmp/config
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /etc/config
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal k8s-sidecar image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /app/.venv/bin/python
  - -u
  - -m
  - sidecar
ports:
  - 8080/tcp
