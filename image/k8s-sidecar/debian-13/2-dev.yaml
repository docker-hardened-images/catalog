# syntax=dhi.io/build:2-debian13

name: k8s-sidecar 2.x (dev)
image: dhi.io/k8s-sidecar
variant: dev
tags:
  - 2-dev
  - 2.8-dev
  - 2.8.1-dev
  - 2-debian-dev
  - 2-debian13-dev
  - 2.8-debian-dev
  - 2.8-debian13-dev
  - 2.8.1-debian-dev
  - 2.8.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: f4fa3abcb095ef128631ed22a657dc09d856c738
  SEMVER_MAJOR_MINOR_VERSION: "2.8"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.8.1
  VERSION: 2.8.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libffi8
    - libstdc++6
    - mawk
    - perl-base
    - python-3.14
    - python-3.14-dev
    - python3-pip
    - python3-setuptools
    - python3-wheel
    - sed
    - tzdata
    - util-linux
  builds:
    - name: k8s-sidecar
      contents:
        packages:
          - build-essential
          - libssl-dev
          - ca-certificates
          - bash
          - coreutils
          - git
          - python-3.14
          - python-3.14-dev
          - python3-pip
          - python3-setuptools
          - python3-wheel
          - libstdc++6
          - diffutils
          - findutils
          - gawk
          - grep
          - sed
        files:
          - url: git+https://github.com/kiwigrid/k8s-sidecar.git#2.8.1
            checksum: f4fa3abcb095ef128631ed22a657dc09d856c738
            path: ${source.dir}/k8s-sidecar
            spdx:
              name: k8s-sidecar
              version: 2.8.1
              packages:
                - name: k8s-sidecar
                  purl: pkg:github/kiwigrid/k8s-sidecar@2.8.1
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: create virtual environment
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/app"
            python3 -m venv "${target.dir}/app/.venv"
        - name: install python package
          work-dir: ${source.dir}/k8s-sidecar
          privileged: true
          runs: |
            set -eux -o pipefail

            "${target.dir}/app/.venv/bin/python3" -m pip install --no-cache-dir .

            # Remediate CVEs by upgrading packages
            "${target.dir}/app/.venv/bin/python3" -m pip install --no-cache-dir "urllib3==2.7.0"       # CVE-2026-21441, CVE-2026-44431, CVE-2026-44432
            "${target.dir}/app/.venv/bin/python3" -m pip install --no-cache-dir "cryptography==48.0.1" # CVE-2026-26007, CVE-2026-34073, CVE-2026-39892, GHSA-537c-gmf6-5ccf
        - name: clean python cache and tests
          runs: |
            set -eux -o pipefail

            # Remove compiled Python files (.pyc, .pyo) and __pycache__ directories
            # Remove test directories (test, tests) to reduce image size
            find "${target.dir}/app/.venv" \
              \( -type d -a \( -name test -o -name tests -o -name __pycache__ \) \) \
              -o \( -type f -a \( -name '*.pyc' -o -name '*.pyo' \) \) \
              -exec rm -rf '{}' + || true
        - name: python dependencies sbom
          uses: sbom@v1
          with:
            extra-scanners: python-package-cataloger
            prefix: k8s-sidecar-python
            source: /app/.venv
      outputs:
        - source: ${target.dir}/app
          target: /app
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  DEBIAN_FRONTEND: noninteractive
  PATH: /app/.venv/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
  PYTHONUNBUFFERED: "1"
paths:
  - type: directory
    path: /app
    uid: 0
    gid: 0
    mode: "0755"
  - type: directory
    path: /tmp/config
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /tmp
    uid: 0
    gid: 0
    mode: "1777"
  - type: directory
    path: /etc/config
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal k8s-sidecar image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /app/.venv/bin/python
  - -u
  - -m
  - sidecar
ports:
  - 8080/tcp
