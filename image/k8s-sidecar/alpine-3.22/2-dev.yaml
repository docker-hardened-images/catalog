# syntax=dhi.io/build:2-alpine3.22

name: k8s-sidecar 2.x (dev)
image: dhi.io/k8s-sidecar
variant: dev
tags:
  - 2-alpine3.22-dev
  - 2.5-alpine3.22-dev
  - 2.5.4-alpine3.22-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 465b4914235515e18d2e6c21cfa05e090b77715c
  PYTHON_BUILD_REF: dhi/python:3.14.3-alpine3.22-dev@sha256:beb10dd1c6ecbb6b0c2d6ae41083bd62770c5de98c245585fec8229d97dd50cd
  PYTHON_REF: dhi/python:3.14.3-alpine3.22@sha256:67bc97aea35e32c659b76c59386ac9f9f90a39507d3bd06398ee5ef75e1e4abf
  SEMVER_MAJOR_MINOR_VERSION: "2.5"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.5.4
  VERSION: 2.5.4
contents:
  repositories:
    - https://dl-cdn.alpinelinux.org/alpine/v3.22/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.22/community
  packages:
    - apk-tools
    - bash
    - busybox
    - ca-certificates-bundle
    - coreutils
    - findutils
    - libffi
    - tzdata
  builds:
    - name: k8s-sidecar
      uses: dhi.io/python:3.14.3-alpine3.22-dev@sha256:beb10dd1c6ecbb6b0c2d6ae41083bd62770c5de98c245585fec8229d97dd50cd
      contents:
        files:
          - url: git+https://github.com/kiwigrid/k8s-sidecar.git#2.5.4
            checksum: 465b4914235515e18d2e6c21cfa05e090b77715c
            path: ${source.dir}/k8s-sidecar
            spdx:
              name: k8s-sidecar
              version: 2.5.4
              packages:
                - name: k8s-sidecar
                  purl: pkg:github/kiwigrid/k8s-sidecar@2.5.4
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: create virtual environment
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/app"
            python3 -m venv "${target.dir}/app/.venv"
        - name: install python package
          work-dir: ${source.dir}/k8s-sidecar
          privileged: true
          runs: |
            set -eux -o pipefail

            "${target.dir}/app/.venv/bin/python3" -m pip install --no-cache-dir .

            # Remediate CVEs by upgrading packages
            "${target.dir}/app/.venv/bin/python3" -m pip install --no-cache-dir "urllib3==2.6.3"       # CVE-2026-21441
            "${target.dir}/app/.venv/bin/python3" -m pip install --no-cache-dir "cryptography==46.0.5" # CVE-2026-26007
        - name: clean python cache and tests
          runs: |
            set -eux -o pipefail

            # Remove compiled Python files (.pyc, .pyo) and __pycache__ directories
            # Remove test directories (test, tests) to reduce image size
            find "${target.dir}/app/.venv" \
              \( -type d -a \( -name test -o -name tests -o -name __pycache__ \) \) \
              -o \( -type f -a \( -name '*.pyc' -o -name '*.pyo' \) \) \
              -exec rm -rf '{}' + || true
        - name: python dependencies sbom
          uses: sbom@v1
          with:
            extra-scanners: python-package-cataloger
            prefix: k8s-sidecar-python
            source: /app/.venv
      outputs:
        - source: ${target.dir}/app
          target: /app
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.14.3-alpine3.22@sha256:67bc97aea35e32c659b76c59386ac9f9f90a39507d3bd06398ee5ef75e1e4abf
      includes:
        - opt/**
        - usr/**
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.22"
  pretty-name: Docker Hardened Images/Alpine Linux v3.22
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  PATH: /app/.venv/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
  PYTHONUNBUFFERED: "1"
paths:
  - type: directory
    path: /app
    uid: 0
    gid: 0
    mode: "0755"
  - type: directory
    path: /tmp/config
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /etc/config
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal k8s-sidecar image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /app/.venv/bin/python
  - -u
  - -m
  - sidecar
ports:
  - 8080/tcp
