# syntax=dhi.io/build:2-alpine3.23

name: k8s-sidecar 2.x (dev)
image: dhi.io/k8s-sidecar
variant: dev
tags:
  - 2-alpine-dev
  - 2.8-alpine-dev
  - 2-alpine3.23-dev
  - 2.8.0-alpine-dev
  - 2.8-alpine3.23-dev
  - 2.8.0-alpine3.23-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: b7e3d5b745f7fe98bb37fb992e356d4a5c4cebe6
  PYTHON_BUILD_REF: dhi/python:3.14.6-alpine3.23-dev@sha256:b94df002dd21c108f680a9962bb66580424ea8c068dd580756acb99faf2f22e0
  PYTHON_REF: dhi/python:3.14.6-alpine3.23@sha256:02c5b2242c0527db97922e46af51003b25e498de6dcaeb40938dbb99a5097984
  SEMVER_MAJOR_MINOR_VERSION: "2.8"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.8.0
  VERSION: 2.8.0
contents:
  repositories:
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  packages:
    - apk-tools
    - bash
    - busybox
    - ca-certificates-bundle
    - coreutils
    - findutils
    - libffi
    - tzdata
  builds:
    - name: k8s-sidecar
      uses: dhi.io/python:3.14.6-alpine3.23-dev@sha256:b94df002dd21c108f680a9962bb66580424ea8c068dd580756acb99faf2f22e0
      contents:
        files:
          - url: git+https://github.com/kiwigrid/k8s-sidecar.git#2.8.0
            checksum: b7e3d5b745f7fe98bb37fb992e356d4a5c4cebe6
            path: ${source.dir}/k8s-sidecar
            spdx:
              name: k8s-sidecar
              version: 2.8.0
              packages:
                - name: k8s-sidecar
                  purl: pkg:github/kiwigrid/k8s-sidecar@2.8.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: create virtual environment
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/app"
            python3 -m venv "${target.dir}/app/.venv"
        - name: install python package
          work-dir: ${source.dir}/k8s-sidecar
          privileged: true
          runs: |
            set -eux -o pipefail

            "${target.dir}/app/.venv/bin/python3" -m pip install --no-cache-dir .

            # Remediate CVEs by upgrading packages
            "${target.dir}/app/.venv/bin/python3" -m pip install --no-cache-dir "pip==26.1.2"          # CVE-2026-8643
            "${target.dir}/app/.venv/bin/python3" -m pip install --no-cache-dir "urllib3==2.7.0"       # CVE-2026-21441, CVE-2026-44431, CVE-2026-44432
            "${target.dir}/app/.venv/bin/python3" -m pip install --no-cache-dir "cryptography==48.0.1" # CVE-2026-26007, CVE-2026-34073, CVE-2026-39892, GHSA-537c-gmf6-5ccf
        - name: clean python cache and tests
          runs: |
            set -eux -o pipefail

            # Remove compiled Python files (.pyc, .pyo) and __pycache__ directories
            # Remove test directories (test, tests) to reduce image size
            find "${target.dir}/app/.venv" \
              \( -type d -a \( -name test -o -name tests -o -name __pycache__ \) \) \
              -o \( -type f -a \( -name '*.pyc' -o -name '*.pyo' \) \) \
              -exec rm -rf '{}' + || true
        - name: python dependencies sbom
          uses: sbom@v1
          with:
            extra-scanners: python-package-cataloger
            prefix: k8s-sidecar-python
            source: /app/.venv
      outputs:
        - source: ${target.dir}/app
          target: /app
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.14.6-alpine3.23@sha256:02c5b2242c0527db97922e46af51003b25e498de6dcaeb40938dbb99a5097984
      includes:
        - opt/**
        - usr/**
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  PATH: /app/.venv/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
  PYTHONUNBUFFERED: "1"
paths:
  - type: directory
    path: /app
    uid: 0
    gid: 0
    mode: "0755"
  - type: directory
    path: /tmp/config
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /etc/config
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal k8s-sidecar image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /app/.venv/bin/python
  - -u
  - -m
  - sidecar
ports:
  - 8080/tcp
