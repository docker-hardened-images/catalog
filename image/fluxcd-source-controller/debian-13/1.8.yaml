  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 36331268fa45dad784f15ef085315b3658b1fb4f
  GOLANG_REFERENCE: dhi/golang:1.26.2-debian13-dev@sha256:b50864310796206ff91b76f04e0cd4f13c29b7721d7571336bfc75a116c40693
  SEMVER_MAJOR_MINOR_VERSION: "1.8"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.8.3
  VERSION: 1.8.3
contents:
  packages:
    - '!base-files'
  builds:
    - name: fluxcd-source-controller
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:b50864310796206ff91b76f04e0cd4f13c29b7721d7571336bfc75a116c40693
      work-dir: /go/src/github.com/fluxcd/source-controller
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/fluxcd/source-controller#v1.8.3
            checksum: 36331268fa45dad784f15ef085315b3658b1fb4f
            path: /go/src/github.com/fluxcd/source-controller
            spdx:
              name: fluxcd-source-controller
              version: 1.8.3
              packages:
                - name: fluxcd-source-controller
                  purl: pkg:golang/github.com/fluxcd/source-controller@1.8.3
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v2
          with:
            deps:
              - github.com/Azure/go-ntlmssp@v0.1.1
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            # Exclude packages that cannot run in the build environment:
            # - internal/controller: requires testenv (live k8s API server via etcd)
            # - internal/bucket/minio: requires Docker socket (testcontainers)
            # - internal/oci/notation: makes live network calls to ghcr.io
            # - internal/fs: tests rely on chmod 0000 permission checks that root bypasses
            CGO_ENABLED=0 go test $(go list ./internal/... | grep -vE '/internal/(controller|bucket/minio|oci/notation|fs)')
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/source-controller
      outputs:
        - source: ${target.dir}/usr/local/bin/source-controller
          target: /usr/local/bin/source-controller
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-source-controller
          target: /opt/docker/sbom/fluxcd-source-controller
          uid: 0
          gid: 0
  artifacts:
