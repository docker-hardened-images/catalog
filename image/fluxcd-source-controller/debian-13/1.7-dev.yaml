    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: fluxcd-source-controller
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:b50864310796206ff91b76f04e0cd4f13c29b7721d7571336bfc75a116c40693
      work-dir: /go/src/github.com/fluxcd/source-controller
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/fluxcd/source-controller#v1.7.4
            checksum: 2eb5a81a22b414215f25d7981fd3ab7b078ad6ca
            path: /go/src/github.com/fluxcd/source-controller
            spdx:
              name: fluxcd-source-controller
              version: 1.7.4
              packages:
                - name: fluxcd-source-controller
                  purl: pkg:golang/github.com/fluxcd/source-controller@1.7.4
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v2
          with:
            deps:
              - helm.sh/helm/v3@v3.20.2
              - google.golang.org/grpc@v1.79.3
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/contrib/exporters/autoexport@v0.68.0
              - go.opentelemetry.io/otel@v1.43.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/go-git/go-git/v5@v5.18.0
              - github.com/theupdateframework/go-tuf/v2@v2.4.1
              - github.com/cloudflare/circl@v1.6.3
              - github.com/sigstore/rekor@v1.5.0
              - github.com/sigstore/cosign/v2@v2.6.2
              - github.com/sigstore/fulcio@v1.8.5
              - github.com/sigstore/timestamp-authority/v2@v2.0.6
            download: true
        - name: patch
          uses: go/bump@v2
          with:
            deps:
              - github.com/Azure/go-ntlmssp@v0.1.1
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            # Exclude packages that cannot run in the build environment:
            # - internal/controller: requires testenv (live k8s API server via etcd)
            # - internal/bucket/minio: requires Docker socket (testcontainers)
            # - internal/oci/notation: makes live network calls to ghcr.io
            # - internal/fs: tests rely on chmod 0000 permission checks that root bypasses
            CGO_ENABLED=0 go test $(go list ./internal/... | grep -vE '/internal/(controller|bucket/minio|oci/notation|fs)')
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/source-controller
      outputs:
        - source: ${target.dir}/usr/local/bin/source-controller
          target: /usr/local/bin/source-controller
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-source-controller
