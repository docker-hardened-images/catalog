# syntax=dhi.io/build:2-debian13

name: fluxcd source controller 1.8.x (dev)
image: dhi.io/fluxcd-source-controller
variant: dev
tags:
  - 1-dev
  - 1.8-dev
  - 1.8.5-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.8-debian-dev
  - 1.8-debian13-dev
  - 1.8.5-debian-dev
  - 1.8.5-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-21"
vars:
  COMMIT_SHA: e9faef49c4f039ef57d58a3edfa481a3a25a5487
  SEMVER_MAJOR_MINOR_VERSION: "1.8"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.8.5
  VERSION: 1.8.5
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: fluxcd-source-controller
      work-dir: /go/src/github.com/fluxcd/source-controller
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/fluxcd/source-controller#v1.8.5
            checksum: e9faef49c4f039ef57d58a3edfa481a3a25a5487
            path: /go/src/github.com/fluxcd/source-controller
            spdx:
              name: fluxcd-source-controller
              version: 1.8.5
              packages:
                - name: fluxcd-source-controller
                  purl: pkg:golang/github.com/fluxcd/source-controller@1.8.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch (1.8 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/Azure/go-ntlmssp@v0.1.1
              - github.com/go-git/go-git/v5@v5.19.1
              - github.com/in-toto/in-toto-golang@v0.11.0
              - github.com/sigstore/rekor@v1.5.2
              - github.com/sigstore/timestamp-authority/v2@v2.0.6
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Exclude packages that cannot run in the build environment:
            # - internal/controller: requires testenv (live k8s API server via etcd)
            # - internal/bucket/minio: requires Docker socket (testcontainers)
            # - internal/oci/notation: makes live network calls to ghcr.io
            # - internal/fs: tests rely on chmod 0000 permission checks that root bypasses
            CGO_ENABLED=0 go test $(go list ./internal/... | grep -vE '/internal/(controller|bucket/minio|oci/notation|fs)')
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/source-controller
      outputs:
        - source: ${target.dir}/usr/local/bin/source-controller
          target: /usr/local/bin/source-controller
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-source-controller
          target: /opt/docker/sbom/fluxcd-source-controller
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Flux CD source-controller image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/source-controller
