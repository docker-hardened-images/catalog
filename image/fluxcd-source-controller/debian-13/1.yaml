# syntax=dhi.io/build:2-debian13

name: fluxcd source controller 1.9.x
image: dhi.io/fluxcd-source-controller
variant: runtime
tags:
  - "1"
  - "1.9"
  - 1.9.2
  - 1-debian
  - 1-debian13
  - 1.9-debian
  - 1.9-debian13
  - 1.9.2-debian
  - 1.9.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-17"
vars:
  COMMIT_SHA: 38cf78c3f2fc533614a0c1589db0449bc5396c90
  SEMVER_MAJOR_MINOR_VERSION: "1.9"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.9.2
  VERSION: 1.9.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: fluxcd-source-controller
      work-dir: /go/src/github.com/fluxcd/source-controller
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/fluxcd/source-controller#v1.9.2
            checksum: 38cf78c3f2fc533614a0c1589db0449bc5396c90
            path: /go/src/github.com/fluxcd/source-controller
            spdx:
              name: fluxcd-source-controller
              version: 1.9.2
              packages:
                - name: fluxcd-source-controller
                  purl: pkg:golang/github.com/fluxcd/source-controller@1.9.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch (1 only)
          uses: go/bump@v2
          with:
            deps:
              - github.com/sigstore/fulcio@v1.8.6
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Exclude packages that cannot run in the build environment:
            # - internal/controller: requires testenv (live k8s API server via etcd)
            # - internal/bucket/azure and internal/bucket/gcp: proxy tests expect
            #   local connection refusal but sandbox networking returns timeouts
            # - internal/bucket/minio: requires Docker socket (testcontainers)
            # - internal/oci/cosign: requires a reachable local registry/proxy
            # - internal/oci/notation: makes live network calls to ghcr.io
            # - internal/fs: tests rely on chmod 0000 permission checks that root bypasses
            CGO_ENABLED=0 go test $(go list ./internal/... | grep -vE '/internal/(controller|bucket/(azure|gcp|minio)|oci/cosign|oci/notation|fs)')
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/source-controller
      outputs:
        - source: ${target.dir}/usr/local/bin/source-controller
          target: /usr/local/bin/source-controller
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-source-controller
          target: /opt/docker/sbom/fluxcd-source-controller
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Flux CD source-controller image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/source-controller
