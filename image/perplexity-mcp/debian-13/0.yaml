# syntax=dhi.io/build:2-debian13

name: Perplexity MCP Server 0.x
image: dhi.io/perplexity-mcp
variant: runtime
tags:
  - "0"
  - "0.9"
  - 0.9.0
  - 0-debian
  - 0-debian13
  - 0.9-debian
  - 0.9-debian13
  - 0.9.0-debian
  - 0.9.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-23"
vars:
  COMMIT_SHA: 79ce21c5798f6993af7cac81da8067a6dc81e20d
  SEMVER_MAJOR_MINOR_VERSION: "0.9"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.9.0
  VERSION: 0.9.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - libc6
    - libgomp1
    - libstdc++6
    - netbase
    - nodejs-24
    - tzdata
  builds:
    - name: perplexity-mcp
      work-dir: ${source.dir}/modelcontextprotocol
      caches:
        - path: /root/.npm
      contents:
        packages:
          - base-files
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - git
          - libc6
          - libstdc++6
          - mawk
          - nodejs-24
          - node-corepack
          - npm
          - sed
          - yarn-classic
        files:
          - url: git+https://github.com/perplexityai/modelcontextprotocol.git#79ce21c5798f6993af7cac81da8067a6dc81e20d
            checksum: 79ce21c5798f6993af7cac81da8067a6dc81e20d
            path: ${source.dir}/modelcontextprotocol
            spdx:
              name: perplexity-mcp-server
              version: 0.9.0
              packages:
                - name: '@perplexity-ai/mcp-server'
                  purl: pkg:npm/%40perplexity-ai/mcp-server@0.9.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: bump dependencies
          uses: npm/bump@v1
          privileged: true
          environment:
            DHI_NO_SFW: "true"
          with:
            bumps: ${source.dir}/patch/npm-bump.json
            npm-root: ${source.dir}/modelcontextprotocol
        - name: build
          privileged: true
          runs: |
            set -eux -o pipefail

            # install (not ci): regenerate lockfile from pinned overrides
            npm install --ignore-scripts
            npm run build

            # strip dev deps from image and manifest
            npm prune --omit=dev
            npm pkg delete devDependencies
      paths:
        - type: file
          path: ${source.dir}/patch/npm-bump.json
          uid: 0
          gid: 0
          source: image/perplexity-mcp/patch/npm-bump.json
      outputs:
        - source: ${source.dir}/modelcontextprotocol/dist
          target: /app/dist
          uid: 0
          gid: 0
        - source: ${source.dir}/modelcontextprotocol/node_modules
          target: /app/node_modules
          uid: 0
          gid: 0
        - source: ${source.dir}/modelcontextprotocol/package.json
          target: /app/package.json
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/perplexity-mcp-server
          target: /opt/docker/sbom/perplexity-mcp-server
          uid: 0
          gid: 0
    - name: server.json
      contents:
        packages:
          - bash
          - sed
      pipeline:
        - runs: |
            set -eux -o pipefail

            sed -i "s/_VERSION_/0.9.0/g" "${source.dir}/config/server.json"
      paths:
        - type: file
          path: ${source.dir}/config/server.json
          uid: 0
          gid: 0
          source: image/perplexity-mcp/config/server.json
      attestations:
        - predicate-type: https://modelcontextprotocol.io/server.json/v1
          source: ${source.dir}/config/server.json
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  NODE_ENV: production
annotations:
  org.opencontainers.image.description: A minimal Perplexity MCP Server image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - node
  - /app/dist/index.js
