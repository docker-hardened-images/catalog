    - name: virt-exportproxy
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:b50864310796206ff91b76f04e0cd4f13c29b7721d7571336bfc75a116c40693
      work-dir: /go/src/kubevirt.io/kubevirt
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/kubevirt/kubevirt.git#v1.8.2
            checksum: 3203e9d1ce77af32f6a9ce72b9f954830666f72c
            path: /go/src/kubevirt.io/kubevirt
            spdx:
              name: virt-exportproxy
              version: 1.8.2
              packages:
                - name: virt-exportproxy
                  purl: pkg:golang/kubevirt.io/kubevirt@1.8.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch go dependencies
          uses: go/bump@v2
          with:
            deps:
              - github.com/containers/common@v0.60.4
              - github.com/opencontainers/selinux@v1.13.0
              - golang.org/x/crypto@v0.47.0
