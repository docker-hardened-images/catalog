              - golang.org/x/oauth2@v0.36.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: patch runc (1.8 only)
          uses: go/bump@v2
          with:
            deps:
              - github.com/opencontainers/runc@v1.2.8
            download: true
        - name: patch runc cgroup devices API compat (1.8 only)
          uses: patch@v1
          with:
            options: -p1
            patch: ${source.dir}/patch/runc-cgroup-devices-api-compat.patch
        - name: test
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              # Some unit tests will actually try to use X25519 which is not allowed in FIPS mode
              export GODEBUG=fips140=on
            fi

            CGO_ENABLED=0 go test ./cmd/virt-exportproxy/...
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X kubevirt.io/client-go/version.gitVersion=v1.8.2
              - -X kubevirt.io/client-go/version.gitCommit=3203e9d1ce77af32f6a9ce72b9f954830666f72c
            output: ${target.dir}/usr/local/bin/virt-exportproxy
            packages: ./cmd/virt-exportproxy
      paths:
        - type: file
          path: ${source.dir}/patch/runc-cgroup-devices-api-compat.patch
          uid: 0
          gid: 0
          source: image/virt-exportproxy/patch/runc-cgroup-devices-api-compat.patch
        - type: file
          path: ${source.dir}/patch/kubevirt-cve-backports-1.6.patch
          uid: 0
          gid: 0
          source: image/virt-exportproxy/patch/kubevirt-cve-backports-1.6.patch
