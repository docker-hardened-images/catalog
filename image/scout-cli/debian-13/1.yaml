# syntax=dhi.io/build:2-debian13

name: Docker Scout CLI 1.x
image: dhi.io/scout-cli
variant: runtime
tags:
  - "1"
  - "1.21"
  - 1.21.0
  - 1-debian
  - 1-debian13
  - 1.21-debian
  - 1.21-debian13
  - 1.21.0-debian
  - 1.21.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "1.21"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.21.0
  SUFFIX: ""
  VERSION: 1.21.0-2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - scout-cli=1.21.0-2
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  COLORTERM: "true"
paths:
  - type: symlink
    path: /docker-scout
    uid: 0
    gid: 0
    source: /usr/bin/docker-scout
annotations:
  org.opencontainers.image.description: Docker Scout CLI
entrypoint:
  - /docker-scout
