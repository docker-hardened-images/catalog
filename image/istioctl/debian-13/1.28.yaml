# syntax=dhi.io/build:2-debian13

name: istioctl 1.28.x
image: dhi.io/istioctl
variant: runtime
tags:
  - "1.28"
  - 1.28.9
  - 1.28-debian
  - 1.28-debian13
  - 1.28.9-debian
  - 1.28.9-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-11-05"
  end-of-life: "2026-07-31"
vars:
  COMMIT_SHA: 4c6838d7f5b97e2e3bc80c7492e99e6707e61ca4
  SEMVER_MAJOR_MINOR_VERSION: "1.28"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.28.9
  VERSION: 1.28.9
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: istioctl
      work-dir: /go/src/github.com/istio/istio
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/istio/istio.git#1.28.9
            checksum: 4c6838d7f5b97e2e3bc80c7492e99e6707e61ca4
            path: /go/src/github.com/istio/istio
            spdx:
              name: istioctl
              version: 1.28.9
              packages:
                - name: istio
                  purl: pkg:golang/istio.io/istio@1.28.9
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.28 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/moby/spdystream@v0.5.1
            download: true
        - uses: go/hermetic@v1
        - name: run upstream istioctl tests
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -v ./operator/... ./istioctl/...
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X istio.io/istio/pkg/version.buildVersion=1.28.9
              - -X istio.io/istio/pkg/version.buildGitRevision=4c6838d7f5b97e2e3bc80c7492e99e6707e61ca4
              - -X istio.io/istio/pkg/version.buildStatus=Clean
              - -X istio.io/istio/pkg/version.buildTag=1.28.9
              - -X istio.io/istio/pkg/version.buildHub=docker.io/dhi
              - -X istio.io/istio/pkg/version.buildOS=$(go env GOOS)
              - -X istio.io/istio/pkg/version.buildArch=$(go env GOARCH)
            output: ${target.dir}/usr/local/bin/istioctl
            packages: ./istioctl/cmd/istioctl
            tags: vtprotobuf,disable_pgv
      outputs:
        - source: ${target.dir}/usr/local/bin/istioctl
          target: /usr/local/bin/istioctl
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/istioctl
          target: /opt/docker/sbom/istioctl
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Istioctl image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/istioctl
