# syntax=dhi.io/build:2-debian13

name: istioctl 1.29.x (dev)
image: dhi.io/istioctl
variant: dev
tags:
  - 1.29-dev
  - 1.29.6-dev
  - 1.29-debian-dev
  - 1.29-debian13-dev
  - 1.29.6-debian-dev
  - 1.29.6-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-11"
  end-of-life: "2026-07-31"
vars:
  COMMIT_SHA: 7019d6d3608e4995e9a36d2977cfec3a341431cd
  SEMVER_MAJOR_MINOR_VERSION: "1.29"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.29.6
  VERSION: 1.29.6
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: istioctl
      work-dir: /go/src/github.com/istio/istio
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/istio/istio.git#1.29.6
            checksum: 7019d6d3608e4995e9a36d2977cfec3a341431cd
            path: /go/src/github.com/istio/istio
            spdx:
              name: istioctl
              version: 1.29.6
              packages:
                - name: istio
                  purl: pkg:golang/istio.io/istio@1.29.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.29 only)
          uses: go/bump@v2
          with:
            deps:
              - github.com/moby/spdystream@v0.5.1
              - helm.sh/helm/v3@v3.20.2
            download: true
        - uses: go/hermetic@v1
        - name: run upstream istioctl tests
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -v ./operator/... ./istioctl/...
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X istio.io/istio/pkg/version.buildVersion=1.29.6
              - -X istio.io/istio/pkg/version.buildGitRevision=7019d6d3608e4995e9a36d2977cfec3a341431cd
              - -X istio.io/istio/pkg/version.buildStatus=Clean
              - -X istio.io/istio/pkg/version.buildTag=1.29.6
              - -X istio.io/istio/pkg/version.buildHub=docker.io/dhi
              - -X istio.io/istio/pkg/version.buildOS=$(go env GOOS)
              - -X istio.io/istio/pkg/version.buildArch=$(go env GOARCH)
            output: ${target.dir}/usr/local/bin/istioctl
            packages: ./istioctl/cmd/istioctl
            tags: vtprotobuf,disable_pgv
      outputs:
        - source: ${target.dir}/usr/local/bin/istioctl
          target: /usr/local/bin/istioctl
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/istioctl
          target: /opt/docker/sbom/istioctl
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Istioctl image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/istioctl
