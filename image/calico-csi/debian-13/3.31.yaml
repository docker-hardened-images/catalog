# syntax=dhi.io/build:2-debian13

name: Calico CSI 3.31.x
image: dhi.io/calico-csi
variant: runtime
tags:
  - "3.31"
  - 3.31.6
  - v3.31.6
  - 3.31-debian
  - 3.31-debian13
  - 3.31.6-debian
  - 3.31.6-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-22"
vars:
  FLAVORED_SUFFIX: ""
  PACKAGE_VERSION: 3.31.6-1
  SEMVER_MAJOR_MINOR_VERSION: "3.31"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.31.6
  SUFFIX: ""
  VERSION: 3.31.6
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - calico-csi-driver-3.31=3.31.6-1
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Calico CSI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/csi-driver
