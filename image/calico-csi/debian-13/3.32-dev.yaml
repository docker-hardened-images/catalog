# syntax=dhi.io/build:2-debian13

name: Calico CSI 3.32.x (dev)
image: dhi.io/calico-csi
variant: dev
tags:
  - 3-dev
  - 3.32-dev
  - 3.32.1-dev
  - 3-debian-dev
  - 3-debian13-dev
  - 3.32-debian-dev
  - 3.32-debian13-dev
  - 3.32.1-debian-dev
  - 3.32.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-30"
vars:
  FLAVORED_SUFFIX: -dev
  PACKAGE_VERSION: 3.32.1-1
  SEMVER_MAJOR_MINOR_VERSION: "3.32"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.32.1
  SUFFIX: -dev
  VERSION: 3.32.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - calico-csi-driver-3.32-dev=3.32.1-1
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Calico CSI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/csi-driver
