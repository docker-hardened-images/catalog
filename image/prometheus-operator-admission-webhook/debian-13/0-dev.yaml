# syntax=dhi.io/build:2-debian13

name: Prometheus Operator Admission Webhook 0.x (dev)
image: dhi.io/prometheus-operator-admission-webhook
variant: dev
tags:
  - 0-dev
  - 0.92-dev
  - 0.92.1-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.92-debian-dev
  - 0.92-debian13-dev
  - 0.92.1-debian-dev
  - 0.92.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates: {}
vars:
  COMMIT_SHA: 5d9ff4a3fe45a51b7fead3c6ad1c3093176a10e5
  SEMVER_MAJOR_MINOR_VERSION: "0.92"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.92.1
  VERSION: 0.92.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: prometheus-operator-admission-webhook
      work-dir: /go/src/github.com/prometheus-operator/prometheus-operator
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/prometheus-operator/prometheus-operator.git#v0.92.1
            checksum: 5d9ff4a3fe45a51b7fead3c6ad1c3093176a10e5
            path: /go/src/github.com/prometheus-operator/prometheus-operator
            spdx:
              name: prometheus-operator
              version: 0.92.1
              packages:
                - name: prometheus-operator
                  purl: pkg:golang/github.com/prometheus-operator/prometheus-operator@0.92.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/text@v0.39.0
            download: true
        - name: go test after dependency bump
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test ./cmd/admission-webhook/... -count=1
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/prometheus/common/version.Version=0.92.1
              - -X github.com/prometheus/common/version.Revision=5d9ff4a3fe45a51b7fead3c6ad1c3093176a10e5
              - -X github.com/prometheus/common/version.Branch=dhi
              - -X github.com/prometheus/common/version.BuildUser=dhi
              - -X github.com/prometheus/common/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%F-%T')
            output: ${target.dir}/usr/local/bin/admission-webhook
            packages: ./cmd/admission-webhook/
      outputs:
        - source: ${target.dir}/usr/local/bin/admission-webhook
          target: /usr/local/bin/admission-webhook
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/prometheus-operator
          target: /opt/docker/sbom/prometheus-operator
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Prometheus Operator Admission Webhook image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/admission-webhook
ports:
  - 8443/tcp
