metadata:
  display-name: Node Problem Detector
  short-description: A Kubernetes daemon that detects node-level problems — kernel issues, hardware faults, and runtime failures — and reports them to the API server as Events and NodeConditions.
  featured: false
  home-url: https://github.com/kubernetes/node-problem-detector
  categories:
    - monitoring-and-observability
  included-tools:
    - name: node-problem-detector
      description: The main daemon that detects node problems and reports them to the API server as Events and NodeConditions.
    - name: health-checker
      description: Checks the health of the kubelet and container runtime and can trigger repairs.
    - name: log-counter
      description: Counts occurrences of patterns in the systemd journal for use by custom plugins.
