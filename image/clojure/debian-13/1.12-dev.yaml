  TOOLS_DEPS_LIB_VERSION: 0.30.1607
  TOOLS_DEPS_VERSION: 1.12.5.1638
  VERSION: 1.12.5
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
