              version: 2.12.0
              packages:
                - name: leiningen
                  purl: pkg:dhi/leiningen@2.12.0
                  license: EPL-1.0
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: strip Sonatype Central publishing plugin from Clojure pom
          work-dir: ${source.dir}/clojure
          runs: |
            set -eux -o pipefail

            if grep -Fq 'central-publishing-maven-plugin' pom.xml; then
              sed -i '/<!-- deploy artifacts to central -->/,/<\/plugin>/d' pom.xml
            fi
        - name: build clojure core
          work-dir: ${source.dir}/clojure
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            mvn -Plocal clean install -DskipTests
        - name: patch leiningen
          uses: mvn/patch@v1
          with:
            dependencies: ${source.dir}/patch/mvn-deps.json
            mvn-root: ${source.dir}/leiningen/leiningen-core
        - name: patch project.clj
          uses: git/patch@v1
          work-dir: ${source.dir}/leiningen
          with:
            patch: ${source.dir}/patch/project.clj.patch
        - name: build leiningen
          work-dir: ${source.dir}/leiningen/leiningen-core
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            mvn clean install -DskipTests
            mvn dependency:build-classpath -Dmdep.outputFile=.lein-bootstrap

            cd ..
            bin/lein uberjar
      paths:
        - type: file
          path: ${source.dir}/patch/mvn-deps.json
          uid: 0
