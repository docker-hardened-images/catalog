  builds:
    - name: clojure-core
      uses: dhi.io/maven:3.9.15-jdk21-debian13-dev@sha256:ee36e4d9023b20bcaf7eada220bf4c15d7db2e5a33a3c0ba2ead122028df20af
      work-dir: ${source.dir}/clojure
      contents:
        files:
          - url: git+https://github.com/clojure/clojure.git#clojure-1.12.5
            checksum: 3bc2b3e91fdff462620d84bbdfd40379d9c562e5
            path: ${source.dir}/clojure
            spdx:
              name: clojure
              version: 1.12.5
              packages:
                - name: clojure
                  purl: pkg:dhi/clojure@1.12.5
                  license: EPL-1.0
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: strip Sonatype Central publishing plugin from Clojure pom
          runs: |
            set -eux -o pipefail

            # Upstream registers central-publishing-maven-plugin as a build extension.
            # Resolving it fails in the image builder; we only install locally.
            if grep -Fq 'central-publishing-maven-plugin' pom.xml; then
              sed -i '/<!-- deploy artifacts to central -->/,/<\/plugin>/d' pom.xml
            fi
        - name: build clojure core
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            mvn -Plocal clean install -DskipTests
      outputs:
        - source: ${source.dir}/clojure/target/clojure-1.12.5.jar
          target: /usr/local/lib/clojure/clojure-1.12.5.jar
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/clojure
          target: /opt/docker/sbom/clojure
          uid: 0
          gid: 0
    - name: tools-deps
      uses: dhi.io/maven:3.9.15-jdk21-debian13-dev@sha256:ee36e4d9023b20bcaf7eada220bf4c15d7db2e5a33a3c0ba2ead122028df20af
      work-dir: ${source.dir}/tools.deps
      contents:
        packages:
          - jq
        files:
          - url: git+https://github.com/clojure/tools.deps.git#v0.30.1607
            checksum: 2b0ffa7ee452983f03e37ccbcf873fbdd8cc7b9b
            path: ${source.dir}/tools.deps
            spdx:
              name: tools.deps
              version: 0.30.1607
              packages:
                - name: tools.deps
                  purl: pkg:dhi/tools.deps@0.30.1607
                  license: EPL-1.0
            uid: 0
            gid: 0
          - url: git+https://github.com/clojure/brew-install.git#1.12.5.1638
            checksum: 2209ac9f5d9a938a6575ad1d7f9b8cb8f8fb2be4
            path: ${source.dir}/brew-install
            spdx:
              name: clojure-tools
              version: 1.12.5.1638
              packages:
                - name: clojure-tools
                  purl: pkg:dhi/clojure-tools@1.12.5.1638
                  license: EPL-1.0
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: patch tools.deps
          uses: mvn/patch@v1
          with:
            dependencies: ${source.dir}/patch/mvn-deps.json
            mvn-root: ${source.dir}/tools.deps
        - name: pin plexus-utils direct (CVE-2025-67030)
          work-dir: ${source.dir}/tools.deps
          runs: |
            set -eux -o pipefail

            # Force plexus-utils 3.6.1 as a direct <dependency> so it wins over
            # the 3.3.1 pulled in transitively via maven-core 3.8.8. Stays on the
            # 3.x line because 4.x removed the org.codehaus.plexus.util.xml.pull
            # API that maven/aether still imports.
            sed -i '/<\/dependencies>/i \    <dependency>\n      <groupId>org.codehaus.plexus<\/groupId>\n      <artifactId>plexus-utils<\/artifactId>\n      <version>3.6.1<\/version>\n    <\/dependency>' pom.xml
        - name: patch cli scripts
          runs: |
            set -eux -o pipefail

            SCRIPTS="${source.dir}/brew-install/src/main/resources/clojure/install"
            mkdir -p "${target.dir}/usr/local/bin"
            sed -e "s|PREFIX|/usr/local/lib/clojure|g" -e "s|\${project.version}|1.12.5.1638|g" "${SCRIPTS}/clojure" > "${target.dir}/usr/local/bin/clojure"
            sed "s|BINDIR|/usr/local/bin|g" "${SCRIPTS}/clj" > "${target.dir}/usr/local/bin/clj"
            chmod +x "${target.dir}/usr/local/bin/clojure" "${target.dir}/usr/local/bin/clj"
            # Point tools classpath at individual JARs (we don't ship the clojure-tools uber JAR)
            sed -i 's|^tools_cp=.*|tools_cp="$install_dir/tools.deps-0.30.1607.jar:$install_dir/deps/*"|' "${target.dir}/usr/local/bin/clojure"
        - name: build tools.deps
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            mvn clean install -DskipTests
            mvn dependency:copy-dependencies -DoutputDirectory=${target.dir}/usr/local/lib/clojure/deps

            # Build libexec/exec.jar so `clj -T:build` and `clj -X` can locate clojure.run.exec
            mkdir -p "${target.dir}/usr/local/lib/clojure/libexec"
            jar cf "${target.dir}/usr/local/lib/clojure/libexec/exec.jar" -C "${source.dir}/brew-install/src/main/clojure" .
      paths:
        - type: file
          path: /src/patch/mvn-deps.json
          uid: 0
          gid: 0
          source: image/clojure/patch/mvn-deps-tools-deps.json
      outputs:
        - source: ${source.dir}/tools.deps/target/tools.deps-0.30.1607.jar
          target: /usr/local/lib/clojure/tools.deps-0.30.1607.jar
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/lib/clojure/deps
          target: /usr/local/lib/clojure/deps
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/lib/clojure/libexec
          target: /usr/local/lib/clojure/libexec
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: ${source.dir}/brew-install/src/main/resources/clojure/install/deps.edn
          target: /usr/local/lib/clojure/deps.edn
          uid: 0
          gid: 0
        - source: ${source.dir}/brew-install/src/main/resources/clojure/install/example-deps.edn
          target: /usr/local/lib/clojure/example-deps.edn
          uid: 0
          gid: 0
        - source: ${source.dir}/brew-install/src/main/resources/clojure/install/tools.edn
          target: /usr/local/lib/clojure/tools.edn
          uid: 0
          gid: 0
        - source: ${source.dir}/brew-install/doc/clojure.1
          target: /usr/local/share/man/man1/clojure.1
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/tools.deps
          target: /opt/docker/sbom/tools.deps
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/clojure-tools
          target: /opt/docker/sbom/clojure-tools
          uid: 0
          gid: 0
    - name: leiningen
      uses: dhi.io/maven:3.9.15-jdk21-debian13-dev@sha256:ee36e4d9023b20bcaf7eada220bf4c15d7db2e5a33a3c0ba2ead122028df20af
      contents:
        files:
          - url: git+https://github.com/clojure/clojure.git#clojure-1.12.5
            checksum: 3bc2b3e91fdff462620d84bbdfd40379d9c562e5
            path: ${source.dir}/clojure
            spdx:
