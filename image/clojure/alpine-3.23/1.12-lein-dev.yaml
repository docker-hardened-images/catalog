# syntax=dhi.io/build:2-alpine3.23

name: Clojure 1.12.x (lein, dev)
image: dhi.io/clojure
variant: dev
flavor: lein
tags:
  - 1-alpine3.23-lein-dev
  - 1.12-alpine3.23-lein-dev
  - 1.12.5-alpine3.23-lein-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 3bc2b3e91fdff462620d84bbdfd40379d9c562e5
  JRE_REFERENCE: dhi/eclipse-temurin:21.0.11.10-alpine3.23@sha256:ede34400113cc9c0537e9d480d3ea3ca2afa757900c0dd3c75a015dc91ece17c
  JRE_VERSION: 21.0.11.10
  LEIN_COMMIT_SHA: 40227328d4a9c8945362d6d626d19c2449175df6
  LEIN_VERSION: 2.12.0
  MAVEN_REFERENCE: dhi/maven:3.9.15-jdk21-alpine3.22-dev@sha256:298aef4e5057e84f9bd440bb5e7b9dcdd2dc114adfa3ef8e976a90b4648d5a52
  SEMVER_MAJOR_MINOR_VERSION: "1.12"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.12.5
  VERSION: 1.12.5
contents:
  repositories:
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  packages:
    - alpine-baselayout-data
    - apk-tools
    - bash
    - coreutils
    - ncurses-terminfo-base
    - rlwrap
  builds:
    - name: clojure-core
      uses: dhi.io/maven:3.9.15-jdk21-alpine3.22-dev@sha256:298aef4e5057e84f9bd440bb5e7b9dcdd2dc114adfa3ef8e976a90b4648d5a52
      work-dir: ${source.dir}/clojure
      contents:
        packages:
          - bash
        files:
          - url: git+https://github.com/clojure/clojure.git#clojure-1.12.5
            checksum: 3bc2b3e91fdff462620d84bbdfd40379d9c562e5
            path: ${source.dir}/clojure
            spdx:
              name: clojure
              version: 1.12.5
              packages:
                - name: clojure
                  purl: pkg:dhi/clojure@1.12.5
                  license: EPL-1.0
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: strip Sonatype Central publishing plugin from Clojure pom
          runs: |
            set -eux -o pipefail

            # Upstream registers central-publishing-maven-plugin as a build extension.
            # Resolving it fails in the image builder; we only install locally.
            if grep -Fq 'central-publishing-maven-plugin' pom.xml; then
              sed -i '/<!-- deploy artifacts to central -->/,/<\/plugin>/d' pom.xml
            fi
        - name: build clojure core
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            mvn -Plocal clean install -DskipTests
      outputs:
        - source: ${source.dir}/clojure/target/clojure-1.12.5.jar
          target: /usr/local/lib/clojure/clojure-1.12.5.jar
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/clojure
          target: /opt/docker/sbom/clojure
          uid: 0
          gid: 0
    - name: leiningen
      uses: dhi.io/maven:3.9.15-jdk21-alpine3.22-dev@sha256:298aef4e5057e84f9bd440bb5e7b9dcdd2dc114adfa3ef8e976a90b4648d5a52
      contents:
        packages:
          - bash
        files:
          - url: git+https://github.com/clojure/clojure.git#clojure-1.12.5
            checksum: 3bc2b3e91fdff462620d84bbdfd40379d9c562e5
            path: ${source.dir}/clojure
            spdx:
              name: clojure
              version: 1.12.5
              packages:
                - name: clojure
                  purl: pkg:dhi/clojure@1.12.5
                  license: EPL-1.0
            uid: 0
            gid: 0
          - url: git+https://github.com/technomancy/leiningen.git#2.12.0
            checksum: 40227328d4a9c8945362d6d626d19c2449175df6
            path: ${source.dir}/leiningen
            spdx:
              name: leiningen
              version: 2.12.0
              packages:
                - name: leiningen
                  purl: pkg:dhi/leiningen@2.12.0
                  license: EPL-1.0
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: strip Sonatype Central publishing plugin from Clojure pom
          work-dir: ${source.dir}/clojure
          runs: |
            set -eux -o pipefail

            if grep -Fq 'central-publishing-maven-plugin' pom.xml; then
              sed -i '/<!-- deploy artifacts to central -->/,/<\/plugin>/d' pom.xml
            fi
        - name: build clojure core
          work-dir: ${source.dir}/clojure
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            mvn -Plocal clean install -DskipTests
        - name: patch leiningen pom
          work-dir: ${source.dir}/leiningen/leiningen-core
          privileged: true
          runs: |
            set -eux -o pipefail

            POM="pom.xml"
            # Add commons-io dependency
            sed -i '/<\/dependencies>/i \    <dependency>\n      <groupId>commons-io<\/groupId>\n      <artifactId>commons-io<\/artifactId>\n      <version>2.17.0<\/version>\n    <\/dependency>' "$POM"
            # Add commons-lang3 dependency
            sed -i '/<\/dependencies>/i \    <dependency>\n      <groupId>org.apache.commons<\/groupId>\n      <artifactId>commons-lang3<\/artifactId>\n      <version>3.18.0<\/version>\n    <\/dependency>' "$POM"
            # Pin plexus-utils to CVE-2025-67030 backport version (3.6.1, last 3.x; 4.x drops required XmlPull API)
            sed -i '/<\/dependencies>/i \    <dependency>\n      <groupId>org.codehaus.plexus<\/groupId>\n      <artifactId>plexus-utils<\/artifactId>\n      <version>3.6.1<\/version>\n    <\/dependency>' "$POM"
        - name: patch project.clj
          uses: git/patch@v1
          work-dir: ${source.dir}/leiningen
          with:
            patch: ${source.dir}/patch/project.clj.patch
        - name: build leiningen
          work-dir: ${source.dir}/leiningen/leiningen-core
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            mvn clean install -DskipTests
            mvn dependency:build-classpath -Dmdep.outputFile=.lein-bootstrap

            cd ..
            bin/lein uberjar
      paths:
        - type: file
          path: ${source.dir}/patch/project.clj.patch
          uid: 0
          gid: 0
          source: image/clojure/patch/project.clj.patch
      outputs:
        - source: ${source.dir}/leiningen/bin/lein-pkg
          target: /usr/local/bin/lein
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${source.dir}/leiningen/target/leiningen-2.12.0-standalone.jar
          target: /usr/share/java/leiningen-2.12.0-standalone.jar
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/leiningen
          target: /opt/docker/sbom/leiningen
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.11.10-alpine3.23@sha256:ede34400113cc9c0537e9d480d3ea3ca2afa757900c0dd3c75a015dc91ece17c
      includes:
        - opt/**
        - usr/bin/java
        - usr/lib/jvm/**
        - usr/local/bin/**
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /tmp
environment:
  LEIN_ROOT: "1"
  LEIN_VERSION: 2.12.0
annotations:
  org.opencontainers.image.description: A minimal Clojure image
  org.opencontainers.image.licenses: EPL-1.0
cmd:
  - lein
  - version
