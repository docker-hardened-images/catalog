  VERSION_MAJOR_MINOR_PATCH: 1.5.0
contents:
  packages:
    - '!base-files'
    - ca-certificates
    - krb5-config
    - krb5-user
    - libaio1t64
    - libffi8
    - libkrb5-3
    - libkrb5support0
    - libldap2
    - libodbc2
    - librdkafka1
    - libsasl2-2
    - libsasl2-modules
    - libsasl2-modules-gssapi-mit
    - libsasl2-modules-ldap
    - tzdata
    - unixodbc
  builds:
    - name: datahub-ingestion
      uses: dhi.io/python:3.10.20-debian13-dev@sha256:5bad1c4f86aa0985dd6c6649a28ca36f38dc89f15cb1c1f1f721d9e335bd9c5c
      work-dir: ${source.dir}
      environment:
        UV_NO_MANAGED_PYTHON: "true"
        UV_PYTHON_DOWNLOADS: never
      caches:
        - path: /root/.cache/uv
      contents:
        packages:
          - bash
          - build-essential
          - g++
          - libaio-dev
          - libffi-dev
          - libkrb5-dev
          - libldap2-dev
          - librdkafka-dev
          - libsasl2-dev
          - libssl-dev
          - libxml2-dev
          - libxslt1-dev
          - pkg-config
          - unixodbc-dev
        files:
          - url: https://files.pythonhosted.org/packages/source/a/acryl-datahub/acryl_datahub-1.5.0.7.tar.gz
            checksum: sha256:5a170b6ef48ed1deabfdd05ddef0450bdd293969c048f4e980dc2a3f8a74a5e6
            path: ${source.dir}/acryl_datahub.tar.gz
            spdx:
              name: acryl-datahub
              version: 1.5.0.7
              packages:
                - name: acryl-datahub
                  purl: pkg:pypi/acryl-datahub@1.5.0.7
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: install uv
          privileged: true
          runs: |
            set -eux -o pipefail

            pip install uv
        - name: install datahub-ingestion
          privileged: true
          runs: |
            set -eux -o pipefail

            cat > ${source.dir}/overrides.txt << 'EOF'
            urllib3>=2.7.0
            lxml>=6.1.0
            EOF

            UV_LINK_MODE=copy uv pip install \
              --prefix ${target.dir}/opt/datahub \
              --override ${source.dir}/overrides.txt \
              "${source.dir}/acryl_datahub.tar.gz[base,datahub-rest,datahub-kafka,snowflake,bigquery,redshift,mysql,postgres,s3-slim,gcs-slim,abs-slim,clickhouse,glue,dbt,looker,lookml,tableau,powerbi,superset,datahub-business-glossary]"
        - name: python dependencies sbom
          uses: sbom@v1
          with:
            extra-scanners: python-package-cataloger
            prefix: datahub-ingestion
            source: ${target.dir}/opt/datahub
        - name: clean python cache and tests
          runs: |
            set -eux -o pipefail

            find ${target.dir}/opt/datahub \
              \( -type d -a \( -name test -o -name tests -o -name __pycache__ \) \) \
              -o \( -type f -a \( -name '*.pyc' -o -name '*.pyo' \) \) \
              -exec rm -rf '{}' + || true
      outputs:
        - source: ${target.dir}/opt/datahub
          target: /opt/datahub
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/datahub-ingestion
          target: /opt/docker/sbom/datahub-ingestion
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.10.20-debian13@sha256:c4e85a66c6893d23481a1496090b059d64a060a5f105639c8905b5924f58f7c7
      includes:
        - opt/**
        - usr/**
      uid: 0
      gid: 0
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
