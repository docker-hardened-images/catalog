  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  EXTRAS: base,datahub-rest,datahub-kafka,snowflake,bigquery,redshift,mysql,postgres,s3-slim,gcs-slim,abs-slim,clickhouse,glue,dbt,looker,lookml,tableau,powerbi,superset,datahub-business-glossary
  PYTHON_BUILD_REFERENCE: dhi/python:3.10.20-debian13-dev@sha256:5bad1c4f86aa0985dd6c6649a28ca36f38dc89f15cb1c1f1f721d9e335bd9c5c
  PYTHON_BUILD_VERSION: 3.10.20
