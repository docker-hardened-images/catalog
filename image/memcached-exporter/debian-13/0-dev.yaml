# syntax=dhi.io/build:2-debian13

name: Memcached Exporter 0.x (dev)
image: dhi.io/memcached-exporter
variant: dev
tags:
  - 0-dev
  - 0.16-dev
  - 0.16.0-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.16-debian-dev
  - 0.16-debian13-dev
  - 0.16.0-debian-dev
  - 0.16.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-01-17"
vars:
  COMMIT_SHA: 63f5c3fb86f5b79e345bc67fcd45d3c485b3eeca
  SEMVER_MAJOR_MINOR_VERSION: "0.16"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.16.0
  VERSION: 0.16.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: memcached_exporter
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/prometheus/memcached_exporter.git#v0.16.0
            checksum: 63f5c3fb86f5b79e345bc67fcd45d3c485b3eeca
            path: /go/src/github.com/prometheus/memcached_exporter
            spdx:
              name: memcached_exporter
              version: 0.16.0
              packages:
                - name: memcached_exporter
                  purl: pkg:golang/github.com/prometheus/memcached_exporter@0.16.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/prometheus/memcached_exporter
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          work-dir: /go/src/github.com/prometheus/memcached_exporter
          privileged: true
          runs: |
            set -eux -o pipefail

            go test -short ./pkg/...
        - name: build memcached_exporter
          uses: go/build@v1
          work-dir: /go/src/github.com/prometheus/memcached_exporter
          with:
            ldflags:
              - -X github.com/prometheus/common/version.Version=0.16.0
              - -X github.com/prometheus/common/version.Revision=63f5c3fb86f5b79e345bc67fcd45d3c485b3eeca
              - -X github.com/prometheus/common/version.Branch=HEAD
              - -X github.com/prometheus/common/version.BuildUser=dhi@build
              - -X github.com/prometheus/common/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +%Y%m%d-%H:%M:%S)
            output: ${target.dir}/usr/local/bin/memcached_exporter
            packages: ./cmd/memcached_exporter
      outputs:
        - source: ${target.dir}/usr/local/bin/memcached_exporter
          target: /usr/local/bin/memcached_exporter
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/memcached_exporter
          target: /opt/docker/sbom/memcached_exporter
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /bin/memcached_exporter
    uid: 0
    gid: 0
    source: /usr/local/bin/memcached_exporter
annotations:
  org.opencontainers.image.description: A minimal memcached-exporter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /bin/memcached_exporter
ports:
  - 9150/tcp
