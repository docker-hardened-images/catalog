metadata:
  display-name: Knative Serving Activator
  short-description: |
    Buffers and routes requests for scaled-to-zero Knative Services.

    The activator is a data-plane component of Knative Serving. It receives
    requests for Revisions that have no available pods, reports load to the
    autoscaler, and forwards traffic once capacity is ready.
  featured: false
  home-url: https://knative.dev/docs/serving/
  categories:
    - networking
