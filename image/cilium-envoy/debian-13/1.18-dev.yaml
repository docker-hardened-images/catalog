# syntax=dhi.io/build:2-debian13

name: Cilium Envoy 1.18.x (dev)
image: dhi.io/cilium-envoy
variant: dev
tags:
  - 1.18-dev
  - 1.18.12-dev
  - 1.18-debian-dev
  - 1.18-debian13-dev
  - 1.18.12-debian-dev
  - 1.18.12-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-07-29"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  BAZEL_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "arm64" }'
  BAZEL_VERSION: 7.7.1
  CILIUM_COMMIT_SHA: c2cd21cf99352ac16f451c684ba62807b18542e3
  CILIUM_ENVOY_COMMIT_SHA: edeb3f2af56c37c407efa1f63f0b32f595399bbc
  CILIUM_ENVOY_VERSION: 1.36.9
  CLANG_VERSION: "18"
  SEMVER_MAJOR_MINOR_VERSION: "1.18"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.18.12
  VERSION: 1.18.12
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libatomic1
    - libc++1-18
    - libc++abi1-18
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: cilium-envoy
      environment:
        PATH: /opt/bazel/bin:/go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      caches:
        - path: /bazel-disk-cache
        - path: /bazel-repo-cache
        - path: /go/pkg/mod
      contents:
        packages:
          - autoconf
          - automake
          - build-essential
          - ca-certificates
          - clang
          - clang-18
          - clang-format-18
          - clang-tidy-18
          - clang-tools-18
          - clangd-18
          - cmake
          - coreutils
          - curl
          - git
          - golang-1.26
          - gzip
          - libatomic1
          - libc++-18-dev
          - libc++abi-18-dev
          - libtool
          - lld-18
          - lldb-18
          - llvm-18-dev
          - ninja-build
          - patch
          - patchelf
          - python-3.12
          - python-3.12-dev
          - python3-pip
          - python3-setuptools
          - python3-wheel
          - libstdc++6
          - bash
          - diffutils
          - findutils
          - gawk
          - grep
          - sed
          - make
        files:
          - url: git+https://github.com/cilium/proxy.git#edeb3f2af56c37c407efa1f63f0b32f595399bbc
            path: /go/src/github.com/cilium/proxy
            spdx:
              name: cilium-envoy
              version: 1.36.9
              packages:
                - name: proxy
                  purl: pkg:golang/github.com/cilium/proxy@edeb3f2af56c37c407efa1f63f0b32f595399bbc
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://github.com/bazelbuild/bazel/releases/download/7.7.1/bazel-7.7.1-linux-${BAZEL_ARCH}
            checksum: https://github.com/bazelbuild/bazel/releases/download/7.7.1/bazel-7.7.1-linux-${BAZEL_ARCH}.sha256
            path: /opt/bazel/bin/bazel
            uid: 0
            gid: 0
            mode: "0755"
      pipeline:
        - name: update go dependencies (1.18 only)
          uses: go/bump@v2
          work-dir: /go/src/github.com/cilium/proxy
          caches:
            - path: /go/pkg/mod
          with:
            deps:
              - golang.org/x/sys@v0.46.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: setup
          work-dir: /go/src/github.com/cilium/proxy
          privileged: true
          runs: |
            set -eux -o pipefail

            echo edeb3f2af56c37c407efa1f63f0b32f595399bbc > SOURCE_VERSION

            # Match upstream's builder image for cilium/proxy@2437d2e:
            # unversioned LLVM tool names resolve to clang/llvm 18.
            ln -sf "$(command -v clang-18)" /usr/bin/clang
            ln -sf "$(command -v clang++-18)" /usr/bin/clang++
            ln -sf "$(command -v clang-cpp-18)" /usr/bin/clang-cpp
            ln -sf "$(command -v lld-18)" /usr/bin/lld
            ln -sf "$(command -v ld.lld-18)" /usr/bin/ld.lld
            ln -sf "$(command -v lldb-18)" /usr/bin/lldb
            ln -sf "$(command -v clang-format-18)" /usr/bin/clang-format
            ln -sf "$(command -v clang-tidy-18)" /usr/bin/clang-tidy
            ln -sf "$(command -v run-clang-tidy-18)" /usr/bin/run-clang-tidy
            ln -sf "$(command -v llvm-ar-18)" /usr/bin/ar
            ln -sf "$(command -v llvm-ar-18)" /usr/bin/llvm-ar
            ln -sf "$(command -v llvm-ranlib-18)" /usr/bin/ranlib
            ln -sf "$(command -v llvm-ranlib-18)" /usr/bin/llvm-ranlib
            ln -sf "$(command -v llvm-nm-18)" /usr/bin/llvm-nm
            ln -sf "$(command -v llvm-strip-18)" /usr/bin/llvm-strip
            ln -sf "$(command -v llvm-objcopy-18)" /usr/bin/llvm-objcopy
            ln -sf "$(command -v llvm-objdump-18)" /usr/bin/llvm-objdump
            ln -sf "$(command -v llvm-dwp-18)" /usr/bin/llvm-dwp
            ln -sf "$(command -v llvm-cov-18)" /usr/bin/llvm-cov
            ln -sf "$(command -v llvm-config-18)" /usr/bin/llvm-config
        - name: build-proxylib
          work-dir: /go/src/github.com/cilium/proxy/proxylib
          privileged: true
          runs: |
            set -eux -o pipefail

            # Build the Go proxylib against the FIPS Go Cryptographic Module for
            # FIPS targets. GOFIPS140 is a build-time module selector and must be
            # scoped to this step rather than the image environment (DHI-FIPS-016).
            if [ "${target.fips}" = "true" ]; then
              export GOFIPS140=v1.0.0
            fi

            make test all

            # Copy instead of moving so that tests find the artifact.
            install -D libcilium.so ${target.dir}/usr/lib/libcilium.so
        - name: build-proxy
          work-dir: /go/src/github.com/cilium/proxy
          privileged: true
          runs: |
            set -eux -o pipefail

            BAZEL_BUILD_OPTS=(
              --curses=no
              --keep_going=false
              --verbose_failures
              --sandbox_debug
              --output_filter='.*'
              --jobs=auto
              --disk_cache=/bazel-disk-cache
              --repository_cache=/bazel-repo-cache
              --experimental_guard_against_concurrent_changes
              --experimental_disk_cache_gc_max_size=5G
              --experimental_disk_cache_gc_max_age=30d
            )

            # Configure FIPS BoringSSL if requested.
            if [ "${target.fips}" = "true" ]; then
              BAZEL_BUILD_OPTS+=(
                --define=boringssl=fips
                --cxxopt=-stdlib=libc++
                --linkopt=-lc++
                --linkopt=-lc++abi
              )
            fi

            # Configure architecture-specific build flags
            test '${target.arch}' = 'arm64' && BAZEL_BUILD_OPTS+=(--cpu=aarch64)

            CARGO_BAZEL_REPIN=true BAZEL_OPTS=--batch BAZELRC_FILE="${PWD}/clang.bazelrc" DESTDIR=${target.dir}/ \
              BAZEL_BUILD_OPTS="${BAZEL_BUILD_OPTS[@]}" PKG_BUILD=1 V=1 make install
        - name: envoy bazel sbom
          work-dir: /go/src/github.com/cilium/proxy
          privileged: true
          runs: |
            set -eux -o pipefail

            mkdir -p /opt/docker/sbom/envoy
            python ${source.dir}/bin/envoy-bazel-to-spdx.py cilium-envoy 1.36.9 > /opt/docker/sbom/envoy/.spdx.envoy.json
        - name: test-proxy
          work-dir: /go/src/github.com/cilium/proxy
          privileged: true
          runs: |
            set -eux -o pipefail

            BAZEL_BUILD_OPTS=(
              --curses=no
              --keep_going=false
              --verbose_failures
              --sandbox_debug
              --jobs=auto
              --disk_cache=/bazel-disk-cache
              --repository_cache=/bazel-repo-cache
              --experimental_guard_against_concurrent_changes
              --experimental_disk_cache_gc_max_size=5G
              --experimental_disk_cache_gc_max_age=30d
            )

            # Tier A (unit) + tier B (tcp integration): see envoy-tests-tier-ab.mk
            BAZEL_OPTS=--batch BAZEL_BUILD_OPTS="${BAZEL_BUILD_OPTS[@]}" PKG_BUILD=1 V=1 \
              make -f Makefile -f "${source.dir}/debian-13/envoy-tests-tier-ab.mk" envoy-tests-ci
      paths:
        - type: file
          path: ${source.dir}/debian-13/envoy-tests-tier-ab.mk
          uid: 0
          gid: 0
          source: image/cilium-envoy/debian-13/envoy-tests-tier-ab.mk
        - type: file
          path: ${source.dir}/bin/envoy-bazel-to-spdx.py
          uid: 0
          gid: 0
          source: image/cilium-envoy/bin/envoy-bazel-to-spdx.py
      outputs:
        - source: ${target.dir}/usr/bin/cilium-envoy
          target: /usr/bin/cilium-envoy
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/bin/cilium-envoy-starter
          target: /usr/bin/cilium-envoy-starter
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/lib/libcilium.so
          target: /usr/lib/libcilium.so
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/cilium-envoy
          target: /opt/docker/sbom/cilium-envoy
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/envoy
          target: /opt/docker/sbom/envoy
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
