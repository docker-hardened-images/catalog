# syntax=dhi.io/build:2-debian13

name: Wikipedia MCP Server 2.x
image: dhi.io/wikipedia-mcp
variant: runtime
tags:
  - "2"
  - "2.0"
  - 2.0.1
  - latest
  - 2-debian
  - 2-debian13
  - 2.0-debian
  - 2.0-debian13
  - 2.0.1-debian
  - 2.0.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-21"
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  COMMIT_SHA: c3206e326937e9d326c2e311e858c9c8c43626fd
  PYTHON_BUILD_REFERENCE: dhi/python:3.14.5-debian13-dev@sha256:d8917bb8ab38b3e474a222142f4f07b54ebc5e69ace9cf957acc5f258b00c8c3
  PYTHON_REFERENCE: dhi/python:3.14.5-debian13@sha256:4c20a9a5ea50f6cbce78dc399e535462df723e05d805e81bea68e626f44706ec
  SEMVER_MAJOR_MINOR_VERSION: "2.0"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.0.1
  UV_VERSION: 0.11.21
  VERSION: 2.0.1
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: wikipedia-mcp
      uses: dhi.io/python:3.14.5-debian13-dev@sha256:d8917bb8ab38b3e474a222142f4f07b54ebc5e69ace9cf957acc5f258b00c8c3
      work-dir: ${source.dir}/wikipedia-mcp
      caches:
        - path: /root/.cache/uv
      contents:
        packages:
          - gzip
          - tar
        files:
          - url: https://github.com/astral-sh/uv/releases/download/0.11.21/uv-${ARCH}-unknown-linux-gnu.tar.gz
            path: ${source.dir}/uv-unknown-linux-gnu.tar.gz
            spdx:
              name: uv
              version: 0.11.21
              packages:
                - name: uv
                  purl: pkg:generic/uv@0.11.21
                  license: MIT
            uid: 0
            gid: 0
          - url: git+https://github.com/Rudra-ravi/wikipedia-mcp.git#v2.0.1
            checksum: c3206e326937e9d326c2e311e858c9c8c43626fd
            path: ${source.dir}/wikipedia-mcp
            spdx:
              name: wikipedia-mcp
              version: 2.0.1
              packages:
                - name: wikipedia-mcp
                  purl: pkg:dhi/wikipedia-mcp@2.0.1
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: setup uv
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            tar -xzf "${source.dir}/uv-unknown-linux-gnu.tar.gz" -C /usr/local/bin --strip-components=1
            chmod +x /usr/local/bin/uv
        - name: move to /app
          runs: |
            set -eux -o pipefail

            cp -r "${source.dir}/wikipedia-mcp" /app
        - name: install python package
          work-dir: /app
          privileged: true
          runs: |
            set -eux -o pipefail

            rm -f .python-version

            uv lock --upgrade
            uv sync --locked --no-install-project --no-dev --no-editable
            uv sync --locked --no-dev --no-editable
      outputs:
        - source: /app/.venv
          target: /app/.venv
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/wikipedia-mcp
          target: /opt/docker/sbom/wikipedia-mcp
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.14.5-debian13@sha256:4c20a9a5ea50f6cbce78dc399e535462df723e05d805e81bea68e626f44706ec
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  PATH: /app/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
annotations:
  org.opencontainers.image.description: Wikipedia MCP Server - Model Context Protocol server providing Wikipedia search, article retrieval, and summary tools for LLMs
  org.opencontainers.image.licenses: MIT
labels:
  io.modelcontextprotocol.server.name: io.github.rudra-ravi/wikipedia-mcp
entrypoint:
  - wikipedia-mcp
cmd:
  - --log-level
  - INFO
