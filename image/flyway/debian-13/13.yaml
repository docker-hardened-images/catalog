dates:
  release: "2026-07-20"
vars:
  COMMIT_SHA: c5e20fc77341d4117e7a291214e23f89c1371516
  GITHUB_USERNAME: docker-hardened-images
  JDK_DIGEST: sha256:1fbc09d023f6fa08248856cc8c5957745cede8171ae5263e3efe4c7dd12fc03a
  JDK_MAJOR_VERSION: "23"
  JDK_VERSION: 23.0.2.7
  JRE_DIGEST: sha256:32f38497a1407da908ab81dee46c3f372c61dc82f9605a41c70fbf0d3f740050
  JRE_PATH: /opt/java/openjdk/23-jre
  JRE_VERSION: 23.0.2.7
  MAVEN_DIGEST: sha256:97e4283d662a0a0dd680bc67c7cfa519d9cf6ef21567f0a727d050a760df3ff8
  MAVEN_VERSION: 3.9.11
  SEMVER_MAJOR_MINOR_VERSION: "13.0"
  SEMVER_MAJOR_VERSION: "13"
  SEMVER_VERSION: 13.0.0
  VERSION: 13.0.0
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
  builds:
    - name: flyway
      contents:
        packages:
          - coreutils
          - bash
          - gzip
          - hostname
          - sed
          - unzip
          - zip
          - findutils
          - yq
        files:
          - url: git+https://github.com/flyway/flyway.git#flyway-13.0.0
            checksum: c5e20fc77341d4117e7a291214e23f89c1371516
            path: ${source.dir}/src/flyway
            spdx:
              name: flyway
              version: 13.0.0
              packages:
                - name: flyway
                  purl: pkg:dhi/flyway@13.0.0
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/org/postgresql/postgresql/42.7.11/postgresql-42.7.11.jar
            path: ${source.dir}/patch/deps/postgresql-42.7.11.jar
            spdx:
              name: postgresql
              version: 42.7.11
              packages:
                - name: postgresql
                  purl: pkg:maven/org.postgresql/postgresql@42.7.11
                  license: BSD-2-Clause
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/io/netty/netty-transport-native-epoll/4.2.15.Final/netty-transport-native-epoll-4.2.15.Final-linux-x86_64.jar
            path: ${source.dir}/patch/deps/netty-transport-native-epoll-4.2.15.Final-linux-x86_64.jar
            spdx:
              name: netty-transport-native-epoll
              version: 4.2.15.Final
              packages:
                - name: netty-transport-native-epoll
                  purl: pkg:maven/io.netty/netty-transport-native-epoll@4.2.15.Final
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/io/netty/netty-transport-native-epoll/4.2.15.Final/netty-transport-native-epoll-4.2.15.Final-linux-aarch_64.jar
            path: ${source.dir}/patch/deps/netty-transport-native-epoll-4.2.15.Final-linux-aarch_64.jar
            spdx:
              name: netty-transport-native-epoll
              version: 4.2.15.Final
              packages:
                - name: netty-transport-native-epoll
                  purl: pkg:maven/io.netty/netty-transport-native-epoll@4.2.15.Final
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/io/opentelemetry/opentelemetry-api/1.62.0/opentelemetry-api-1.62.0.jar
            path: ${source.dir}/patch/deps/opentelemetry-api-1.62.0.jar
            spdx:
              name: opentelemetry-api
              version: 1.62.0
              packages:
                - name: opentelemetry-api
                  purl: pkg:maven/io.opentelemetry/opentelemetry-api@1.62.0
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/maven:3.9.11-jdk23-dev@sha256:97e4283d662a0a0dd680bc67c7cfa519d9cf6ef21567f0a727d050a760df3ff8
            includes:
              - opt/**
              - usr/local/bin/**
            uid: 0
            gid: 0
          - name: dhi.io/eclipse-temurin:23.0.2.7-jdk-dev@sha256:1fbc09d023f6fa08248856cc8c5957745cede8171ae5263e3efe4c7dd12fc03a
            includes:
              - usr/local/bin/**
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
          environment:
            MAVEN_MIRROR_OF: external:*,!flyway-community-db-support
        - name: install
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
            - id: github_token
              env: GITHUB_TOKEN
          runs: |
            set -eux -o pipefail

            export MAVEN_HOME="/opt/java/apache-maven-3.9.11"
            export MAVEN_VERSION="3.9.11"
            export JAVA_HOME="/opt/java/openjdk/23"

            mkdir -p "${target.dir}/flyway"
            cd "${source.dir}/src/flyway"

            cat > "${source.dir}/gpr-settings.xml" << EOF
            <settings>
              <servers>
                <server>
                  <id>flyway-community-db-support</id>
                  <username>docker-hardened-images</username>
                  <password>${GITHUB_TOKEN}</password>
                </server>
              </servers>
            </settings>
            EOF

            mvn clean install \
              -DskipTests \
              -pl flyway-commandline,flyway-core \
              -am \
              --global-settings "${source.dir}/gpr-settings.xml"

            cp "flyway-commandline/target/flyway-commandline-13.0.0.jar" "${target.dir}/flyway/flyway.jar"

            mvn dependency:copy-dependencies \
              -pl flyway-commandline \
              -DoutputDirectory="${target.dir}/flyway/lib" \
              --global-settings "${source.dir}/gpr-settings.xml"

            if [ "13" = "11" ]; then
              lib="${target.dir}/flyway/lib"
              for jar in \
                "${lib}"/jackson-databind-*.jar \
                "${lib}"/jackson-core-*.jar \
                "${lib}"/jackson-annotations-*.jar; do
                [ -e "${jar}" ] || continue
                case "$(basename "${jar}")" in
                  jackson-annotations-2.21.jar) continue ;;
                  *-2.21.4.jar | *-3.1.4.jar) continue ;;
                  *) rm -f "${jar}" ;;
                esac
              done

              for artifact in \
                com.fasterxml.jackson.core:jackson-databind:2.21.4 \
                com.fasterxml.jackson.core:jackson-core:2.21.4 \
                com.fasterxml.jackson.core:jackson-annotations:2.21 \
                tools.jackson.core:jackson-databind:3.1.4 \
                tools.jackson.core:jackson-core:3.1.4 \
                tools.jackson.dataformat:jackson-dataformat-toml:3.1.4; do
                mvn dependency:copy \
                  -Dartifact="${artifact}" \
                  -DoutputDirectory="${lib}" \
                  -q
              done

              rm -f "${target.dir}/flyway/lib/postgresql-42.7.2.jar"
              install -m 0644 "${source.dir}/patch/deps/postgresql-42.7.11.jar" "${target.dir}/flyway/lib/postgresql-42.7.11.jar"

              rm -f "${target.dir}/flyway/lib/opentelemetry-api-1.52.0.jar"
              install -m 0644 "${source.dir}/patch/deps/opentelemetry-api-1.62.0.jar" "${target.dir}/flyway/lib/opentelemetry-api-1.62.0.jar"

              for arch in x86_64 aarch_64; do
                old_epoll="${target.dir}/flyway/lib/netty-transport-native-epoll-4.2.9.Final-linux-${arch}.jar"
                if [ -f "${old_epoll}" ]; then
                  rm -f "${old_epoll}"
                  install -m 0644 \
                    "${source.dir}/patch/deps/netty-transport-native-epoll-4.2.15.Final-linux-${arch}.jar" \
                    "${target.dir}/flyway/lib/netty-transport-native-epoll-4.2.15.Final-linux-${arch}.jar"
                fi
              done
            fi

            core_io_jar=$(find "${target.dir}/flyway/lib" -name 'core-io-*.jar' | head -1)
            if [ -n "${core_io_jar}" ]; then
              echo "Stripping embedded netty classes from ${core_io_jar}..."
              netty_entries=$(mktemp)
              unzip -Z1 "${core_io_jar}" | awk '/^(io\/netty\/|META-INF\/maven\/io.netty\/|META-INF\/native-image\/io.netty\/)/ {print}' > "${netty_entries}"
              if [ -s "${netty_entries}" ]; then
                zip -qd "${core_io_jar}" -@ < "${netty_entries}"
              fi
              rm -f "${netty_entries}"
            fi

            cat > "${target.dir}/flyway/flyway" << EOF
            #!/bin/sh
            exec java -cp "/opt/flyway/flyway.jar:/opt/flyway/lib/*" org.flywaydb.commandline.Main "\$@"
            EOF
            chmod +x "${target.dir}/flyway/flyway"
      paths:
        - type: directory
          path: /src/patch
          uid: 0
          gid: 0
          source: image/flyway/patch
      outputs:
        - source: ${target.dir}/flyway/flyway
          target: /usr/local/bin/flyway
          uid: 0
          gid: 0
        - source: ${target.dir}/flyway
          target: /opt/flyway
          uid: 0
          gid: 0
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:23.0.2.7@sha256:32f38497a1407da908ab81dee46c3f372c61dc82f9605a41c70fbf0d3f740050
      includes:
        - opt/**
        - usr/local/bin/**
      uid: 0
      gid: 0
