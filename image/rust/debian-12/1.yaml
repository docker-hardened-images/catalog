# syntax=dhi.io/build:2-debian12

name: Rust 1.x
image: dhi.io/rust
variant: runtime
tags:
  - 1-debian12
  - 1.95-debian12
  - 1.95.0-debian12
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-09-18"
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  BINUTILS_DIGEST: sha256:6c33a7e6bb1b75a710993895f624975e758e11743781455add63ceeeab23d55b
  BINUTILS_VERSION: "2.46"
  SEMVER_MAJOR_MINOR_VERSION: "1.95"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.95.0
  VERSION: 1.95.0
contents:
  packages:
    - '!acl'
    - '!binutils'
    - '!binutils-aarch64-linux-gnu'
    - '!binutils-common'
    - '!binutils-x86-64-linux-gnu'
    - '!cdebconf'
    - '!debconf'
    - '!dpkg'
    - '!libbinutils'
    - '!libctf-nobfd0'
    - '!libctf0'
    - '!libelogind0'
    - '!libgprofng0'
    - '!libsframe1'
    - '!libslang2'
    - '!make-guile'
    - '!original-awk'
    - '!patch'
    - base-files
    - bash
    - build-essential
    - ca-certificates
    - coreutils
    - gcc
  builds:
    - name: rust
      contents:
        packages:
          - bash
          - coreutils
          - findutils
          - grep
          - sed
        files:
          - url: https://static.rust-lang.org/dist/rust-1.95.0-${ARCH}-unknown-linux-gnu.tar.xz
            path: ${source.dir}
            spdx:
              name: rust
              version: 1.95.0
              packages:
                - name: rust
                  purl: pkg:dhi/rust@1.95.0
                  license: MIT
                - name: cargo
                  purl: pkg:dhi/cargo@1.95.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: install
          runs: |
            set -eux -o pipefail

            cd "rust-1.95.0-${ARCH}-unknown-linux-gnu"
            ./install.sh --destdir="${target.dir}" --disable-ldconfig

            # remove html documentation
            rm -rf "${target.dir}/usr/local/share/doc/rust"
      outputs:
        - source: ${target.dir}
          target: /
          uid: 0
          gid: 0
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/pkg-binutils:2.46-debian12@sha256:6c33a7e6bb1b75a710993895f624975e758e11743781455add63ceeeab23d55b
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "12"
  version-codename: bookworm
  pretty-name: Docker Hardened Images/Debian GNU/Linux 12 (bookworm)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /build
environment:
  RUST_VERSION: 1.95.0
annotations:
  org.opencontainers.image.description: A minimal Rust image
  org.opencontainers.image.licenses: MIT
cmd:
  - rustc
  - --help
