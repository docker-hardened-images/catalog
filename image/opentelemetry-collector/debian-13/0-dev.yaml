# syntax=dhi.io/build:2-debian13

name: opentelemetry-collector 0.x (dev)
image: dhi.io/opentelemetry-collector
variant: dev
tags:
  - 0-dev
  - 0.154-dev
  - 0.154.0-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.154-debian-dev
  - 0.154-debian13-dev
  - 0.154.0-debian-dev
  - 0.154.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 4ae7f285f3df635cb3c456f8dfba045973bb4d91
  DIST_NAME: otelcol
  SEMVER_MAJOR_MINOR_VERSION: "0.154"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.154.0
  VERSION: 0.154.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: opentelemetry-collector
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - findutils
          - golang-1.26
          - make
          - mawk
          - sed
        files:
          - url: git+https://github.com/open-telemetry/opentelemetry-collector-releases.git#4ae7f285f3df635cb3c456f8dfba045973bb4d91
            checksum: 4ae7f285f3df635cb3c456f8dfba045973bb4d91
            path: /go/src/github.com/open-telemetry/opentelemetry-collector-releases
            spdx:
              name: opentelemetry-collector-releases
              version: 0.154.0
              packages:
                - name: opentelemetry-collector-releases
                  purl: pkg:golang/github.com/open-telemetry/opentelemetry-collector-releases@0.154.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: generate code
          work-dir: /go/src/github.com/open-telemetry/opentelemetry-collector-releases
          privileged: true
          runs: |
            set -eux -o pipefail

            # Temporarily use lenient FIPS mode during code generation to allow
            # downloading the builder tool from the Go module proxy (requires X25519)

            make generate DISTRIBUTIONS='otelcol'
        - name: update go dependencies (core)
          uses: go/bump@v1
          work-dir: /go/src/github.com/open-telemetry/opentelemetry-collector-releases/distributions/otelcol/_build
          with:
            deps:
              - github.com/buger/jsonparser@v1.1.2
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/open-telemetry/opentelemetry-collector-releases/distributions/otelcol/_build
          with:
            ldflags:
              - -X github.com/open-telemetry/opentelemetry-collector-releases/distributions/otelcol/_build/version.Version=0.154.0
            output: ${target.dir}/usr/local/bin/otelcol
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /go/src/github.com/open-telemetry/opentelemetry-collector-releases/distributions/otelcol/config.yaml
          target: /etc/otelcol/config.yaml
          uid: 0
          gid: 0
          mode: "0644"
        - source: /opt/docker/sbom/opentelemetry-collector-releases
          target: /opt/docker/sbom/opentelemetry-collector-releases
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /otelcol
    uid: 0
    gid: 0
    source: /usr/local/bin/otelcol
annotations:
  org.opencontainers.image.description: A minimal OpenTelemetry Collector Contrib image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/otelcol
cmd:
  - --config
  - /etc/otelcol/config.yaml
