metadata:
  display-name: Kubernetes API Server (kube-apiserver)
  short-description: |
    Front end for the Kubernetes control plane.

    kube-apiserver exposes the Kubernetes API over HTTP(S), performs request validation,
    authentication and authorization, runs admission control, and persists cluster state
    to an etcd backend.
  featured: false
  home-url: https://kubernetes.io/
  categories:
    - developer-tools
