# syntax=dhi.io/build:2-debian13

name: cert-exporter 2.x (dev)
image: dhi.io/cert-exporter
variant: dev
tags:
  - 2-dev
  - 2.18-dev
  - 2.18.0-dev
  - 2-debian-dev
  - 2-debian13-dev
  - 2.18-debian-dev
  - 2.18-debian13-dev
  - 2.18.0-debian-dev
  - 2.18.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2020-03-29"
vars:
  COMMIT_SHA: e64e8740d8550fee5a98f9f044bf06a4e36ddc17
  SEMVER_MAJOR_MINOR_VERSION: "2.18"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.18.0
  VERSION: 2.18.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: cert-exporter
      work-dir: /go/src/github.com/joe-elliott/cert-exporter
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/joe-elliott/cert-exporter.git#v2.18.0
            checksum: e64e8740d8550fee5a98f9f044bf06a4e36ddc17
            path: /go/src/github.com/joe-elliott/cert-exporter
            spdx:
              name: cert-exporter
              version: 2.18.0
              packages:
                - name: cert-exporter
                  purl: pkg:golang/github.com/joe-elliott/cert-exporter@2.18.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.56.0
              - golang.org/x/text@v0.39.0
              - github.com/cert-manager/cert-manager@v1.15.4
            download: true
        - name: test
          work-dir: /go/src/github.com/joe-elliott/cert-exporter
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -v -coverprofile=coverage.txt -covermode=atomic ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/joe-elliott/cert-exporter
          with:
            output: /usr/local/bin/cert-exporter
            packages: .
            strip: true
      outputs:
        - source: /usr/local/bin/cert-exporter
          target: /usr/local/bin/cert-exporter
          uid: 0
          gid: 0
          mode: "0555"
        - source: /opt/docker/sbom/cert-exporter
          target: /opt/docker/sbom/cert-exporter
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal cert-exporter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/cert-exporter
ports:
  - 8080/tcp
