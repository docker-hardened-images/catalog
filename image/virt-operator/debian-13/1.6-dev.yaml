# syntax=dhi.io/build:2-debian13

name: Virt Operator 1.6.x (dev)
image: dhi.io/virt-operator
variant: dev
tags:
  - 1.6-dev
  - 1.6.6-dev
  - 1.6-debian-dev
  - 1.6-debian13-dev
  - 1.6.6-debian-dev
  - 1.6.6-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-11-11"
vars:
  COMMIT_SHA: 75581da2192a3c4f9e0c48e7e37255ed2257780d
  SEMVER_MAJOR_MINOR_VERSION: "1.6"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.6.6
  VERSION: 1.6.6
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: virt-operator
      work-dir: /go/src/kubevirt.io/kubevirt
      caches:
        - path: /go/pkg/mod
        - path: /root/.cache/go-build
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
        files:
          - url: git+https://github.com/kubevirt/kubevirt.git#v1.6.6
            checksum: 75581da2192a3c4f9e0c48e7e37255ed2257780d
            path: /go/src/kubevirt.io/kubevirt
            spdx:
              name: virt-operator
              version: 1.6.6
              packages:
                - name: virt-operator
                  purl: pkg:golang/kubevirt.io/kubevirt@1.6.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch go dependencies (1.6 only)
          uses: go/bump@v2
          with:
            deps:
              - github.com/containers/common@v0.60.4
              - github.com/opencontainers/selinux@v1.13.0
              - golang.org/x/crypto@v0.47.0
              - golang.org/x/net@v0.48.0
              - golang.org/x/oauth2@v0.36.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: test
          work-dir: /go/src/kubevirt.io/kubevirt/cmd/virt-operator
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/kubevirt.io/kubevirt/cmd/virt-operator
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X kubevirt.io/client-go/version.gitVersion=v1.6.6
              - -X kubevirt.io/client-go/version.gitCommit=75581da2192a3c4f9e0c48e7e37255ed2257780d
            output: ${target.dir}/usr/local/bin/virt-operator
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/virt-operator/patch
      outputs:
        - source: ${target.dir}/usr/local/bin/virt-operator
          target: /usr/local/bin/virt-operator
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/virt-operator
          target: /opt/docker/sbom/virt-operator
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Virt Operator image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/virt-operator
