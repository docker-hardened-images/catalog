# syntax=dhi.io/build:2-debian13

name: fluxcd notification controller 1.9.x (dev)
image: dhi.io/fluxcd-notification-controller
variant: dev
tags:
  - 1-dev
  - 1.9-dev
  - 1.9.2-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.9-debian-dev
  - 1.9-debian13-dev
  - 1.9.2-debian-dev
  - 1.9.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-19"
vars:
  COMMIT_SHA: 8d2ed585e37c72177bb773867f40fa7d887bdcef
  SEMVER_MAJOR_MINOR_VERSION: "1.9"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.9.2
  VERSION: 1.9.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: fluxcd-notification-controller
      work-dir: /go/src/github.com/fluxcd/notification-controller
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/fluxcd/notification-controller#v1.9.2
            checksum: 8d2ed585e37c72177bb773867f40fa7d887bdcef
            path: /go/src/github.com/fluxcd/notification-controller
            spdx:
              name: fluxcd-notification-controller
              version: 1.9.2
              packages:
                - name: fluxcd-notification-controller
                  purl: pkg:golang/github.com/fluxcd/notification-controller@1.9.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch (1 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/text@v0.39.0
              - google.golang.org/grpc@v1.82.1
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Exclude packages that cannot run in the build environment:
            # - internal/controller: requires testenv (live k8s API server via etcd)
            # - internal/server: Test_handlePayload/CEL_filtering_a_GCR_receiver calls
            #   oauth2.googleapis.com to verify a GCR ID token; network is unreachable in the
            #   build environment, causing the handler to return 400 instead of the expected 200
            #
            # Skip individual tests within otherwise-passing packages:
            # - TestNewAzureEventHub/Default_Azure_Credential: attempts to reach 169.254.169.254
            #   (Azure IMDS) to obtain a managed identity token; unreachable in the build environment
            CGO_ENABLED=0 go test \
              -skip 'TestNewAzureEventHub/Default_Azure_Credential' \
              $(go list ./internal/... | grep -vE '/internal/(controller|server)')
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/notification-controller
      outputs:
        - source: ${target.dir}/usr/local/bin/notification-controller
          target: /usr/local/bin/notification-controller
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-notification-controller
          target: /opt/docker/sbom/fluxcd-notification-controller
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Flux CD notification-controller image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/notification-controller
