# syntax=dhi.io/build:2-debian13

name: fluxcd notification controller 1.6.x
image: dhi.io/fluxcd-notification-controller
variant: runtime
tags:
  - "1.6"
  - 1.6.0
  - 1.6-debian
  - 1.6-debian13
  - 1.6.0-debian
  - 1.6.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-05-27"
vars:
  COMMIT_SHA: 3a6de1fcef16947f8abe6fc589bc02977663931e
  SEMVER_MAJOR_MINOR_VERSION: "1.6"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.6.0
  VERSION: 1.6.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: fluxcd-notification-controller
      work-dir: /go/src/github.com/fluxcd/notification-controller
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/fluxcd/notification-controller#v1.6.0
            checksum: 3a6de1fcef16947f8abe6fc589bc02977663931e
            path: /go/src/github.com/fluxcd/notification-controller
            spdx:
              name: fluxcd-notification-controller
              version: 1.6.0
              packages:
                - name: fluxcd-notification-controller
                  purl: pkg:golang/github.com/fluxcd/notification-controller@1.6.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch (1.6 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/cloudflare/circl@v1.6.3
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel@v1.43.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.82.1
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Exclude packages that cannot run in the build environment:
            # - internal/controller: requires testenv (live k8s API server via etcd)
            # - internal/server: Test_handlePayload/CEL_filtering_a_GCR_receiver calls
            #   oauth2.googleapis.com to verify a GCR ID token; network is unreachable in the
            #   build environment, causing the handler to return 400 instead of the expected 200
            #
            # Skip individual tests within otherwise-passing packages:
            # - TestNewAzureEventHub/Default_Azure_Credential: attempts to reach 169.254.169.254
            #   (Azure IMDS) to obtain a managed identity token; unreachable in the build environment
            CGO_ENABLED=0 go test \
              -skip 'TestNewAzureEventHub/Default_Azure_Credential' \
              $(go list ./internal/... | grep -vE '/internal/(controller|server)')
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/notification-controller
      outputs:
        - source: ${target.dir}/usr/local/bin/notification-controller
          target: /usr/local/bin/notification-controller
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-notification-controller
          target: /opt/docker/sbom/fluxcd-notification-controller
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Flux CD notification-controller image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/notification-controller
