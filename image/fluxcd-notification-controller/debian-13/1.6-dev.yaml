  builds:
    - name: fluxcd-notification-controller
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:6e257a15c0aa81a30cd698e950469f07dd71d6c7e4c6a30e0badbf9494b1d6f3
      work-dir: /go/src/github.com/fluxcd/notification-controller
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/fluxcd/notification-controller#v1.6.0
            checksum: 3a6de1fcef16947f8abe6fc589bc02977663931e
            path: /go/src/github.com/fluxcd/notification-controller
            spdx:
              name: fluxcd-notification-controller
              version: 1.6.0
              packages:
                - name: fluxcd-notification-controller
                  purl: pkg:golang/github.com/fluxcd/notification-controller@1.6.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v2
          with:
            deps:
              - github.com/moby/spdystream@v0.5.1
              - github.com/cloudflare/circl@v1.6.3
            download: true
        - name: patch
          uses: go/bump@v2
          with:
            deps:
              - google.golang.org/grpc@v1.79.3
              - go.opentelemetry.io/otel@v1.43.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            # Exclude packages that cannot run in the build environment:
            # - internal/controller: requires testenv (live k8s API server via etcd)
            # - internal/server: Test_handlePayload/CEL_filtering_a_GCR_receiver calls
            #   oauth2.googleapis.com to verify a GCR ID token; network is unreachable in the
            #   build environment, causing the handler to return 400 instead of the expected 200
            #
            # Skip individual tests within otherwise-passing packages:
            # - TestNewAzureEventHub/Default_Azure_Credential: attempts to reach 169.254.169.254
            #   (Azure IMDS) to obtain a managed identity token; unreachable in the build environment
            CGO_ENABLED=0 go test \
              -skip 'TestNewAzureEventHub/Default_Azure_Credential' \
              $(go list ./internal/... | grep -vE '/internal/(controller|server)')
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/notification-controller
      outputs:
        - source: ${target.dir}/usr/local/bin/notification-controller
          target: /usr/local/bin/notification-controller
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-notification-controller
