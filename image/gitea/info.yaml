metadata:
  display-name: Gitea
  short-description: Gitea is a self-hosted, all-in-one software development platform that provides Git repository hosting, code review, issue tracking, a package registry, and CI/CD through Gitea Actions.
  featured: false
  home-url: https://about.gitea.com/
  categories:
    - developer-tools
    - integration-and-delivery
  included-tools:
    - name: gitea
      description: Gitea server binary; also the admin/config CLI (gitea admin, gitea config), reachable through the /usr/local/bin/gitea wrapper.
    - name: environment-to-ini
      description: Wrapper that applies GITEA__SECTION__KEY environment overrides to app.ini via gitea config edit-ini.
    - name: git
      description: Git client used by Gitea for all repository operations.
