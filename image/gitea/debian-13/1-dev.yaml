# syntax=dhi.io/build:2-debian13

name: Gitea 1.x (dev)
image: dhi.io/gitea
variant: dev
tags:
  - 1-dev
  - 1.27-dev
  - 1.27.0-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.27-debian-dev
  - 1.27-debian13-dev
  - 1.27.0-debian-dev
  - 1.27.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2016-12-23"
vars:
  COMMIT_SHA: b969123b7fac51c88daab5cb64e5b2f4abd53288
  FLAVORED_SUFFIX: -dev
  SEMVER_MAJOR_MINOR_VERSION: "1.27"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.27.0
  SUFFIX: -dev
  VERSION: 1.27.0-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - curl
    - diffutils
    - dpkg
    - dumb-init
    - findutils
    - gettext-base
    - git
    - gitea-dev=1.27.0-1
    - gnupg
    - grep
    - libc-bin
    - mawk
    - openssh-client
    - perl-base
    - sed
    - util-linux
  files:
    - url: https://raw.githubusercontent.com/go-gitea/gitea/b969123b7fac51c88daab5cb64e5b2f4abd53288/docker/rootless/usr/local/bin/docker-entrypoint.sh
      path: /usr/local/bin/docker-entrypoint.sh
      uid: 0
      gid: 0
      mode: "0755"
    - url: https://raw.githubusercontent.com/go-gitea/gitea/b969123b7fac51c88daab5cb64e5b2f4abd53288/docker/rootless/usr/local/bin/docker-setup.sh
      path: /usr/local/bin/docker-setup.sh
      uid: 0
      gid: 0
      mode: "0755"
    - url: https://raw.githubusercontent.com/go-gitea/gitea/b969123b7fac51c88daab5cb64e5b2f4abd53288/docker/rootless/etc/templates/app.ini
      path: /etc/templates/app.ini
      uid: 0
      gid: 0
      mode: "0644"
accounts:
  root: true
  run-as: root
  users:
    - name: git
      uid: 1000
      gid: 1000
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: git
      gid: 1000
      members:
        - git
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /var/lib/gitea
environment:
  DEBIAN_FRONTEND: noninteractive
  GITEA_APP_INI: /etc/gitea/app.ini
  GITEA_CUSTOM: /var/lib/gitea/custom
  GITEA_TEMP: /tmp/gitea
  GITEA_WORK_DIR: /var/lib/gitea
  HOME: /var/lib/gitea/git
  TMPDIR: /tmp/gitea
paths:
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
  - type: file
    path: /usr/local/bin/gitea
    uid: 0
    gid: 0
    mode: "0755"
    source: image/gitea/config/gitea
  - type: file
    path: /usr/local/bin/environment-to-ini
    uid: 0
    gid: 0
    mode: "0755"
    source: image/gitea/config/environment-to-ini
  - type: file
    path: /usr/local/bin/docker-entrypoint-dhi.sh
    uid: 0
    gid: 0
    mode: "0755"
    source: image/gitea/config/docker-entrypoint-dhi.sh
  - type: directory
    path: /var/lib/gitea
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /etc/gitea
    uid: 1000
    gid: 1000
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Gitea image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /usr/bin/dumb-init
  - --
  - /usr/local/bin/docker-entrypoint-dhi.sh
ports:
  - "2222"
  - "3000"
