# syntax=dhi.io/build:2-debian13

name: SpiceDB 1.x
image: dhi.io/spicedb
variant: runtime
tags:
  - "1"
  - "1.54"
  - 1.54.0
  - 1-debian
  - 1-debian13
  - 1.54-debian
  - 1.54-debian13
  - 1.54.0-debian
  - 1.54.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-18"
vars:
  FLAVORED_SUFFIX: ""
  GRPC_HEALTH_PROBE_VERSION: 0.4.53-0
  SEMVER_MAJOR_MINOR_VERSION: "1.54"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.54.0
  SUFFIX: ""
  VERSION: 1.54.0-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - grpc-health-probe=0.4.53-0
    - spicedb=1.54.0-1
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
    mode: "0755"
  - type: symlink
    path: /usr/local/bin/spicedb
    uid: 0
    gid: 0
    source: /usr/bin/spicedb
  - type: symlink
    path: /usr/local/bin/grpc_health_probe
    uid: 0
    gid: 0
    source: /usr/bin/grpc_health_probe
annotations:
  org.opencontainers.image.description: A minimal SpiceDB image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - spicedb
ports:
  - 50051/tcp
