metadata:
  display-name: Docker dind
  short-description: Docker-in-Docker (dind) runs a full Docker Engine inside a container so you can build and run containers within a container, for CI pipelines and nested workloads.
  featured: false
  home-url: https://github.com/moby/moby
  categories:
    - developer-tools
  included-tools:
    - name: Docker Engine
      description: The Docker daemon (dockerd) that builds and runs containers
    - name: Docker CLI
      description: The official Docker command-line client
    - name: Docker Buildx
      description: Docker Buildx builds images with BuildKit
    - name: containerd
      description: The container runtime that manages the container lifecycle
    - name: runc
      description: The low-level OCI container runtime
