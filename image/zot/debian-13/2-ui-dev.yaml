# syntax=dhi.io/build:2-debian13

name: Zot 2.x (ui, dev)
image: dhi.io/zot
variant: dev
flavor: ui
tags:
  - 2-ui-dev
  - 2.1-ui-dev
  - 2.1.18-ui-dev
  - 2-debian-ui-dev
  - 2-debian13-ui-dev
  - 2.1-debian-ui-dev
  - 2.1-debian13-ui-dev
  - 2.1.18-debian-ui-dev
  - 2.1.18-debian13-ui-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-08"
vars:
  COMMIT_SHA: 7bb211bcd4352b90f3e99752607fbd1f050bf7ca
  SEMVER_MAJOR_MINOR_VERSION: "2.1"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.1.18
  VERSION: 2.1.18
  ZOT_BUILD_TAGS: sync,search,scrub,metrics,lint,mgmt,profile,userprefs,imagetrust,events,ui
  ZUI_SHA256: 47517fd4a60786025a77f707e2351b44303c2f0bf04d381ab2fd20a800d4f307
  ZUI_VERSION: commit-89a04ea
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: zot
      work-dir: /go/src/github.com/project-zot/zot
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
          - gzip
        files:
          - url: git+https://github.com/project-zot/zot.git#v2.1.18
            checksum: 7bb211bcd4352b90f3e99752607fbd1f050bf7ca
            path: /go/src/github.com/project-zot/zot
            spdx:
              name: zot
              version: 2.1.18
              packages:
                - name: zot
                  purl: pkg:golang/github.com/project-zot/zot/v2@2.1.18
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://github.com/project-zot/zui/releases/download/commit-89a04ea/zui.tgz
            checksum: sha256:47517fd4a60786025a77f707e2351b44303c2f0bf04d381ab2fd20a800d4f307
            path: ${source.dir}/zui.tgz
            spdx:
              name: zui
              version: commit-89a04ea
              packages:
                - name: zui
                  purl: pkg:github/project-zot/zui@commit-89a04ea
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - github.com/Azure/go-ntlmssp@v0.1.1
              - github.com/go-git/go-git/v5@v5.19.1
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/in-toto/in-toto-golang@v0.11.0
              - github.com/regclient/regclient@v0.11.5
              - go.opentelemetry.io/otel/sdk@v1.44.0
              - github.com/hashicorp/go-getter@v1.8.6
              - github.com/sigstore/rekor@v1.5.2
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.20.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.44.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.44.0
              - github.com/distribution/distribution/v3@v3.1.1
              - oras.land/oras-go/v2@v2.6.1
            tidy: true
        - uses: go/hermetic@v1
        - name: test
          runs: |
            set -eux -o pipefail

            # Skip tests that assume non-root (TLS permission checks) or flake in CI (scheduler timing, htpasswd watcher race)
            # Exclude packages that need external infra (trivy, redis) or root-sensitive file ops
            go test -v -count=1 -short \
              -skip 'TestTSLFailedReadingOfCACert|TestHTTPClient|TestCommon|TestScheduler|TestHTPasswdWatcherOriginal' \
              $(go list ./... | grep -v -E '(extensions/search|pkg/test/(image-utils|common)$|pkg/storage)')
        - name: unpack zot ui (zui) assets
          work-dir: /go/src/github.com/project-zot/zot
          runs: |
            set -eux -o pipefail

            mkdir -p pkg/extensions
            tar -xzf "${source.dir}/zui.tgz" -C pkg/extensions
            test -d pkg/extensions/build
        - name: build zot
          uses: go/build@v1
          with:
            experiments: jsonv2
            ldflags:
              - -X zotregistry.dev/zot/v2/pkg/buildinfo.ReleaseTag=2.1.18
              - -X zotregistry.dev/zot/v2/pkg/buildinfo.Commit=v2.1.18-7bb211bcd4352b90f3e99752607fbd1f050bf7ca
              - -X zotregistry.dev/zot/v2/pkg/buildinfo.BinaryType=full
              - -s
              - -w
            output: ${target.dir}/usr/local/bin/zot
            packages: ./cmd/zot
            tags: sync,search,scrub,metrics,lint,mgmt,profile,userprefs,imagetrust,events,ui
      paths:
        - type: file
          path: ${source.dir}/etc/zot/config.json
          uid: 0
          gid: 0
          source: image/zot/config/config.json
      outputs:
        - source: ${target.dir}/usr/local/bin/zot
          target: /usr/local/bin/zot
          uid: 0
          gid: 0
        - source: ${source.dir}/etc/zot/config.json
          target: /etc/zot/config.json
          uid: 0
          gid: 0
          mode: "0644"
        - source: /opt/docker/sbom/zot
          target: /opt/docker/sbom/zot
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /var/lib/registry
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /etc/zot
    uid: 0
    gid: 0
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Zot image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/zot
cmd:
  - serve
  - /etc/zot/config.json
ports:
  - 5000/tcp
