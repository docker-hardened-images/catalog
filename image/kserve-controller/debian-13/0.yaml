# syntax=dhi.io/build:2-debian13

name: KServe Controller 0.19.x
image: dhi.io/kserve-controller
variant: runtime
tags:
  - "0"
  - "0.19"
  - 0.19.0
  - 0-debian
  - 0-debian13
  - 0.19-debian
  - 0.19-debian13
  - 0.19.0-debian
  - 0.19.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: b0eda63d2c105479140af8ec9149d992b7e44be5
  SEMVER_MAJOR_MINOR_VERSION: "0.19"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.19.0
  VERSION: 0.19.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - libc6
    - tzdata
  builds:
    - name: kserve-controller
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - ca-certificates
          - clang
          - cmake
          - openssl
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kserve/kserve.git#v0.19.0
            checksum: b0eda63d2c105479140af8ec9149d992b7e44be5
            path: /go/src/github.com/kserve/kserve
            spdx:
              name: kserve
              version: 0.19.0
              packages:
                - name: kserve
                  purl: pkg:golang/github.com/kserve/kserve@0.19.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/expr-lang/expr@v1.17.7
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
              - github.com/kedacore/keda/v2@v2.18.3
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            output: ${target.dir}/usr/local/bin/manager
            packages: ./cmd/manager
      outputs:
        - source: ${target.dir}/usr/local/bin/manager
          target: /usr/local/bin/manager
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kserve
          target: /opt/docker/sbom/kserve
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /manager
    uid: 0
    gid: 0
    source: /usr/local/bin/manager
annotations:
  org.opencontainers.image.description: KServe provides a Kubernetes Custom Resource Definition for serving predictive and generative machine learning (ML) models.
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /manager
