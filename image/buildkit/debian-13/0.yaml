# syntax=dhi.io/build:2-debian13

name: Moby Buildkit 0.x
image: dhi.io/buildkit
variant: runtime
tags:
  - "0"
  - "0.31"
  - 0.31.2
  - 0-debian
  - 0-debian13
  - 0.31-debian
  - 0.31-debian13
  - 0.31.2-debian
  - 0.31.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates: {}
vars:
  COMMIT_SHA: e42e1bfd389af7203238cce77b1f7dad447285e9
  LIBPATHRS_VERSION: 0.2.5
  RUNC_COMMIT_SHA: 8f2685a471d3347a686ad3909783d8aafc6bb208
  RUNC_VERSION: 1.5.1
  SEMVER_MAJOR_MINOR_VERSION: "0.31"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.31.2
  VERSION: 0.31.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - fuse-overlayfs
    - fuse3
    - git
    - isal
    - libc6
    - libgcc-s1
    - libstdc++6
    - openssh-client
    - openssl
    - rootlesskit-3
    - tzdata
    - uidmap
    - xz-utils
  builds:
    - name: buildkit
      work-dir: /go/src/github.com/moby/buildkit
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
        files:
          - url: git+https://github.com/moby/buildkit.git#v0.31.2
            checksum: e42e1bfd389af7203238cce77b1f7dad447285e9
            path: /go/src/github.com/moby/buildkit
            spdx:
              name: moby-buildkit
              version: 0.31.2
              packages:
                - name: buildkit
                  purl: pkg:golang/github.com/moby/buildkit@0.31.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - github.com/containerd/containerd/v2@v2.2.5
            download: true
        - name: build buildkitd
          uses: go/build@v1
          with:
            ldflags:
              - -X 'github.com/moby/buildkit/version.Version=v0.31.2'
              - -X 'github.com/moby/buildkit/version.Revision=e42e1bfd389af7203238cce77b1f7dad447285e9'
            output: ${target.dir}/usr/local/bin/buildkitd
            packages: ./cmd/buildkitd
        - name: build buildctl
          uses: go/build@v1
          with:
            ldflags:
              - -X 'github.com/moby/buildkit/version.Version=v0.31.2'
              - -X 'github.com/moby/buildkit/version.Revision=e42e1bfd389af7203238cce77b1f7dad447285e9'
            output: ${target.dir}/usr/local/bin/buildctl
            packages: ./cmd/buildctl
      outputs:
        - source: ${target.dir}/usr/local/bin/buildkitd
          target: /usr/local/bin/buildkitd
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/buildctl
          target: /usr/local/bin/buildctl
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/moby-buildkit
          target: /opt/docker/sbom/moby-buildkit
          uid: 0
          gid: 0
    - name: runc
      work-dir: /go/src/github.com/opencontainers/runc
      caches:
        - path: /go/pkg/mod
        - path: /root/.cargo
      contents:
        packages:
          - bash
          - build-essential
          - cargo-1.97
          - rustc-1.97
          - ca-certificates-bundle
          - coreutils
          - gawk
          - golang-1.26
          - gpg
          - gpg-agent
          - libseccomp-dev
          - linux-libc-dev
          - pkgconf
          - sed
          - tar
          - util-linux
          - xz-utils
          - zstd
        files:
          - url: git+https://github.com/opencontainers/runc#v1.5.1
            checksum: 8f2685a471d3347a686ad3909783d8aafc6bb208
            path: /go/src/github.com/opencontainers/runc
            spdx:
              name: runc
              version: 1.5.1
              packages:
                - name: runc
                  purl: pkg:golang/github.com/opencontainers/runc@1.5.1
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://github.com/cyphar/libpathrs/releases/download/v0.2.5/libpathrs-0.2.5.tar.xz.asc
            path: ${source.dir}/libpathrs-0.2.5.tar.xz.asc
            uid: 0
            gid: 0
          - url: https://github.com/cyphar/libpathrs/releases/download/v0.2.5/libpathrs-0.2.5.tar.xz
            checksum: https://github.com/cyphar/libpathrs/releases/download/v0.2.5/libpathrs.sha256sum
            path: ${source.dir}/libpathrs-0.2.5.tar.xz
            spdx:
              name: libpathrs
              version: 0.2.5
              packages:
                - name: libpathrs
                  purl: pkg:cargo/libpathrs@0.2.5
                  license: MPL-2.0
            uid: 0
            gid: 0
          - url: https://github.com/cyphar/libpathrs/releases/download/v0.2.5/libpathrs.vendor.tar.zst.asc
            path: ${source.dir}/libpathrs.vendor.tar.zst.asc
            uid: 0
            gid: 0
          - url: https://github.com/cyphar/libpathrs/releases/download/v0.2.5/libpathrs.vendor.tar.zst
            checksum: https://github.com/cyphar/libpathrs/releases/download/v0.2.5/libpathrs.sha256sum
            path: ${source.dir}/libpathrs.vendor.tar.zst
            uid: 0
            gid: 0
      pipeline:
        - name: verify libpathrs
          uses: gpg/verify@v1
          with:
            file: ${source.dir}/libpathrs-0.2.5.tar.xz
            keys: ${source.dir}/key/C9C370B246B09F6DBCFC744C34401015D1D2D386.asc
            signature: ${source.dir}/libpathrs-0.2.5.tar.xz.asc
        - name: verify libpathrs vendored sources
          uses: gpg/verify@v1
          with:
            file: ${source.dir}/libpathrs.vendor.tar.zst
            keys: ${source.dir}/key/C9C370B246B09F6DBCFC744C34401015D1D2D386.asc
            signature: ${source.dir}/libpathrs.vendor.tar.zst.asc
        - name: extract libpathrs
          runs: |
            set -eux -o pipefail

            mkdir -p "${source.dir}/libpathrs"
            tar -xJf "${source.dir}/libpathrs-0.2.5.tar.xz" \
              -C "${source.dir}/libpathrs" --strip-components=1

            zstd -dc "${source.dir}/libpathrs.vendor.tar.zst" \
              | sed -n '/PaxHeaders/,$p' \
              | tar -x -C "${source.dir}/libpathrs"
        - name: build libpathrs
          work-dir: ${source.dir}/libpathrs
          runs: |
            set -eux -o pipefail

            mkdir -p "${source.dir}/libpathrs/.cargo"
            cat > "${source.dir}/libpathrs/.cargo/config.toml" << 'EOF'
            [source.crates-io]
            replace-with = "vendored-sources"

            [source.vendored-sources]
            directory = "vendor"
            EOF

            export LIBPATHRS_CAPI_BUILDMODE=staticlib

            cargo rustc --features=capi --release --frozen \
              --crate-type=${LIBPATHRS_CAPI_BUILDMODE} \
              -- -C panic=abort

            ./install.sh --enable-static --disable-dynamic
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/net@v0.55.0
            download: true
        - name: build runc
          uses: go/build@v1
          with:
            cgo_enabled: 1
            ldflags:
              - -extldflags '-static'
              - -X 'main.gitCommit=8f2685a471d3347a686ad3909783d8aafc6bb208'
            output: ${target.dir}/usr/local/bin/runc
            tags: seccomp,libpathrs,netgo,osusergo
      paths:
        - type: directory
          path: ${source.dir}/key
          uid: 0
          gid: 0
          source: image/buildkit/key
      outputs:
        - source: ${target.dir}/usr/local/bin/runc
          target: /usr/local/bin/runc
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/runc
          target: /opt/docker/sbom/runc
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/libpathrs
          target: /opt/docker/sbom/libpathrs
          uid: 0
          gid: 0
    - name: fix uidmap caps
      contents:
        packages:
          - bash
          - uidmap
          - libcap2-bin
      pipeline:
        - name: setcap
          runs: |
            set -eux -o pipefail

            setcap cap_setuid+eip /usr/bin/newuidmap
            setcap cap_setgid+eip /usr/bin/newgidmap
      outputs:
        - source: /usr/bin/newuidmap
          target: /usr/bin/newuidmap
          uid: 0
          gid: 0
        - source: /usr/bin/newgidmap
          target: /usr/bin/newgidmap
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 1000
      gid: 1000
  groups:
    - name: nonroot
      gid: 1000
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  BUILDKIT_HOST: unix:///run/user/1000/buildkit/buildkitd.sock
  HOME: /home/nonroot
  USER: nonroot
  XDG_RUNTIME_DIR: /run/user/1000
paths:
  - type: file
    path: /etc/subuid
    content: nonroot:100000:65536
    uid: 0
    gid: 0
  - type: file
    path: /etc/subgid
    content: nonroot:100000:65536
    uid: 0
    gid: 0
  - type: directory
    path: /run/user/1000
    uid: 1000
    gid: 1000
  - type: directory
    path: /home/nonroot
    uid: 1000
    gid: 1000
  - type: directory
    path: /home/nonroot/.local/share/buildkit
    uid: 1000
    gid: 1000
  - type: directory
    path: /etc/cdi
    uid: 1000
    gid: 1000
  - type: directory
    path: /run/cdi
    uid: 1000
    gid: 1000
  - type: directory
    path: /etc/buildkit/cdi
    uid: 1000
    gid: 1000
  - type: directory
    path: /var/lib/buildkit
    uid: 1000
    gid: 1000
  - type: directory
    path: /var/lib/containerd
    uid: 1000
    gid: 1000
annotations:
  org.opencontainers.image.description: A minimal buildkit builder toolkit image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - rootlesskit
  - buildkitd
  - --root=/var/lib/buildkit
