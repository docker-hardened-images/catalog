          - pkgconf
          - gcc
          - libseccomp-dev
        files:
          - url: git+https://github.com/opencontainers/runc#v1.4.2
            checksum: c241c0bb5e60a8e8c1b2e53d4eca8d0068d8d57e
            path: /go/src/github.com/opencontainers/runc
            spdx:
