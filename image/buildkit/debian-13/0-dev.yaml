      work-dir: /go/src/github.com/rootless-containers/rootlesskit/v3
      contents:
        files:
          - url: git+https://github.com/rootless-containers/rootlesskit#v2.3.6
            checksum: a1d6ded184cf5915981a2978c61116013b91189f
            path: /go/src/github.com/rootless-containers/rootlesskit/v3
            spdx:
              name: rootlesskit
              version: 2.3.6
              packages:
                - name: rootlesskit
                  purl: pkg:golang/github.com/rootless-containers/rootlesskit/v3@2.3.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/net@v0.48.0
            download: true
        - name: build binary
          uses: go/build@v1
          with:
            ldflags:
              - -X 'github.com/rootless-containers/rootlesskit/v3/pkg/version.Version=v2.3.6'
            output: ${target.dir}/usr/local/bin/rootlesskit
            packages: ./cmd/rootlesskit
      outputs:
        - source: ${target.dir}/usr/local/bin/rootlesskit
          target: /usr/local/bin/rootlesskit
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/rootlesskit
          target: /opt/docker/sbom/rootlesskit
          uid: 0
          gid: 0
    - name: buildkit
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:b50864310796206ff91b76f04e0cd4f13c29b7721d7571336bfc75a116c40693
      work-dir: /go/src/github.com/moby/buildkit
      contents:
