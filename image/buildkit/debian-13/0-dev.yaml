    - util-linux
    - xz-utils
  builds:
    - name: fix uidmap caps
      contents:
        packages:
          - bash
          - uidmap
          - libcap2-bin
      pipeline:
        - name: setcap
          runs: |
            set -eux -o pipefail

            setcap cap_setuid+eip /usr/bin/newuidmap
            setcap cap_setgid+eip /usr/bin/newgidmap
      outputs:
        - source: /usr/bin/newuidmap
          target: /usr/bin/newuidmap
          uid: 0
          gid: 0
        - source: /usr/bin/newgidmap
          target: /usr/bin/newgidmap
          uid: 0
          gid: 0
    - name: rootlesskit
