# syntax=dhi.io/build:2-debian13

name: Ceph CSI 3.17.x (dev)
image: dhi.io/cephcsi
variant: dev
tags:
  - 3-dev
  - 3.17-dev
  - 3.17.0-dev
  - 3-debian-dev
  - 3-debian13-dev
  - 3.17-debian-dev
  - 3.17-debian13-dev
  - 3.17.0-debian-dev
  - 3.17.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2020-07-27"
vars:
  CEPH_REFERENCE: dhi/ceph:20.3.0-debian13@sha256:cebf4c772a47c3a79982c7fbe503c3a8f9a123847462f74ddf32015afd7724db
  COMMIT_SHA: 9d08300466de72d7b99dffd81e9c23883b1cf87b
  SEMVER_MAJOR_MINOR_VERSION: "3.17"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.17.0
  VERSION: 3.17.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!libpython3-stdlib'
    - '!libpython3.13-minimal'
    - '!libpython3.13-stdlib'
    - '!original-awk'
    - '!python3'
    - '!python3-minimal'
    - '!python3.13'
    - '!python3.13-minimal'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - cryptsetup-bin
    - diffutils
    - dpkg
    - e2fsprogs
    - findutils
    - grep
    - kmod
    - libc-bin
    - libc6
    - libnl-genl-3-200
    - mawk
    - mount
    - nfs-common
    - perl-base
    - python-3.13
    - sed
    - tzdata
    - util-linux
    - xfsprogs
  builds:
    - name: cephcsi
      work-dir: /go/src/github.com/ceph/ceph-csi
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - gcc
          - libcephfs-dev
          - librados-dev
          - librbd-dev
          - make
          - pkg-config
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/ceph/ceph-csi.git#v3.17.0
            checksum: 9d08300466de72d7b99dffd81e9c23883b1cf87b
            path: /go/src/github.com/ceph/ceph-csi
            spdx:
              name: ceph-csi
              version: 3.17.0
              packages:
                - name: ceph-csi
                  purl: pkg:golang/github.com/ceph/ceph-csi@3.17.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: Update go dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/ceph/ceph-csi
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - github.com/go-jose/go-jose/v4@v4.1.4
            download: true
        - name: run targeted go tests
          work-dir: /go/src/github.com/ceph/ceph-csi
          environment:
            GOFLAGS: -mod=vendor -buildvcs=false
          runs: |
            set -eux -o pipefail

            # Match upstream's current Makefile, which keeps ceph_preview enabled
            # because ceph-csi still builds/tests against go-ceph preview APIs.
            go test -tags=ceph_preview ./cmd/...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/ceph/ceph-csi
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 1
            ldflags:
              - -X github.com/ceph/ceph-csi/internal/util.GitCommit=9d08300466de72d7b99dffd81e9c23883b1cf87b
              - -X github.com/ceph/ceph-csi/internal/util.DriverVersion=3.17.0
            output: ${target.dir}/usr/local/bin/cephcsi
            packages: ./cmd
            tags: ceph_preview
      outputs:
        - source: ${target.dir}/usr/local/bin/cephcsi
          target: /usr/local/bin/cephcsi
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/ceph-csi
          target: /opt/docker/sbom/cephcsi
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/ceph:20.3.0-debian13@sha256:cebf4c772a47c3a79982c7fbe503c3a8f9a123847462f74ddf32015afd7724db
      includes:
        - opt/python
        - opt/python-*/**
        - usr/bin/bash
        - usr/bin/sh
        - usr/lib/*-linux-gnu/lib*.so*
        - usr/local/bin/ceph
        - usr/local/bin/ceph-fuse
        - usr/local/bin/ceph.real
        - usr/local/bin/rbd
        - usr/local/bin/rbd-nbd
        - usr/local/lib/ceph/**
        - usr/local/lib/libceph*.so*
        - usr/local/lib/librados*.so*
        - usr/local/lib/librbd*.so*
        - usr/local/lib/python*/site-packages/**
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /etc/ceph
    uid: 0
    gid: 0
    mode: "0755"
  - type: symlink
    path: /etc/mtab
    uid: 0
    gid: 0
    source: /proc/mounts
  - type: symlink
    path: /usr/sbin/mount.ceph
    uid: 0
    gid: 0
    source: /usr/bin/mount
annotations:
  org.opencontainers.image.description: A minimal Ceph CSI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/cephcsi
