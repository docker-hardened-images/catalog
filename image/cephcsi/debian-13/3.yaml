# syntax=dhi.io/build:2-debian13

name: Ceph CSI 3.17.x
image: dhi.io/cephcsi
variant: runtime
tags:
  - "3"
  - "3.17"
  - 3.17.0
  - 3-debian13
  - 3.17-debian13
  - 3.17.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2020-07-27"
vars:
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:cd26c6fe4eaa4bc2ecd022223dd3cd2dc01101c13344fb3f9793dfd4c7179b77
  CEPH_REFERENCE: dhi/ceph:20.3.0-debian13@sha256:cbc4699610116f1131cd47c2e7b323cc99b66622d493fef90d27b3a1ef8b4ace
  COMMIT_SHA: 9d08300466de72d7b99dffd81e9c23883b1cf87b
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:5d1f9634fc21d351b8712212864d435bfe4204eca3d60b61cc7cfd491d776357
  SEMVER_MAJOR_MINOR_VERSION: "3.17"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.17.0
  VERSION: 3.17.0
contents:
  packages:
    - '!base-files'
    - cryptsetup-bin
    - e2fsprogs
    - kmod
    - libnl-genl-3-200
    - mount
    - nfs-common
    - util-linux
    - xfsprogs
  builds:
    - name: cephcsi
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:5d1f9634fc21d351b8712212864d435bfe4204eca3d60b61cc7cfd491d776357
      work-dir: /go/src/github.com/ceph/ceph-csi
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - gcc
          - libcephfs-dev
          - librados-dev
          - librbd-dev
          - make
          - pkg-config
        files:
          - url: git+https://github.com/ceph/ceph-csi.git#v3.17.0
            checksum: 9d08300466de72d7b99dffd81e9c23883b1cf87b
            path: /go/src/github.com/ceph/ceph-csi
            spdx:
              name: ceph-csi
              version: 3.17.0
              packages:
                - name: ceph-csi
                  purl: pkg:golang/github.com/ceph/ceph-csi@3.17.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: run targeted go tests
          work-dir: /go/src/github.com/ceph/ceph-csi
          environment:
            GOFLAGS: -mod=vendor -buildvcs=false
          runs: |
            set -eux -o pipefail

            # Match upstream's current Makefile, which keeps ceph_preview enabled
            # because ceph-csi still builds/tests against go-ceph preview APIs.
            go test -tags=ceph_preview ./cmd/...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/ceph/ceph-csi
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 1
            ldflags:
              - -X github.com/ceph/ceph-csi/internal/util.GitCommit=9d08300466de72d7b99dffd81e9c23883b1cf87b
              - -X github.com/ceph/ceph-csi/internal/util.DriverVersion=3.17.0
            output: ${target.dir}/usr/local/bin/cephcsi
            packages: ./cmd
            tags: ceph_preview
      outputs:
        - source: ${target.dir}/usr/local/bin/cephcsi
          target: /usr/local/bin/cephcsi
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/ceph-csi
          target: /opt/docker/sbom/cephcsi
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/ceph:20.3.0-debian13@sha256:cbc4699610116f1131cd47c2e7b323cc99b66622d493fef90d27b3a1ef8b4ace
      includes:
        - opt/python
        - opt/python-*/**
        - usr/bin/bash
        - usr/bin/sh
        - usr/lib/*-linux-gnu/lib*.so*
        - usr/local/bin/ceph
        - usr/local/bin/ceph-fuse
        - usr/local/bin/ceph.real
        - usr/local/bin/rbd
        - usr/local/bin/rbd-nbd
        - usr/local/lib/ceph/**
        - usr/local/lib/libceph*.so*
        - usr/local/lib/librados*.so*
        - usr/local/lib/librbd*.so*
        - usr/local/lib/python*/site-packages/**
      uid: 0
      gid: 0
    - name: dhi.io/static:20250419-glibc-debian13@sha256:cd26c6fe4eaa4bc2ecd022223dd3cd2dc01101c13344fb3f9793dfd4c7179b77
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /etc/ceph
    uid: 0
    gid: 0
    mode: "0755"
  - type: symlink
    path: /etc/mtab
    uid: 0
    gid: 0
    source: /proc/mounts
  - type: symlink
    path: /usr/sbin/mount.ceph
    uid: 0
    gid: 0
    source: /usr/bin/mount
annotations:
  org.opencontainers.image.description: A minimal Ceph CSI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/cephcsi
