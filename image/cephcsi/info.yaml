metadata:
  display-name: Ceph CSI
  short-description: Container Storage Interface driver for Ceph-backed RBD, CephFS, NFS, and NVMe-oF workloads on Kubernetes.
  featured: false
  home-url: https://github.com/ceph/ceph-csi
  categories:
    - databases-and-storage
  included-tools:
    - name: cephcsi
      description: The Ceph CSI driver binary for Kubernetes controller and node workloads.
    - name: ceph
      description: Ceph CLI for cluster and pool administration tasks used by Ceph CSI features.
    - name: rbd
      description: RBD CLI for mapping and managing Ceph block images.
    - name: rbd-nbd
      description: RBD NBD client used for network block device based RBD mapping workflows.
    - name: ceph-fuse
      description: CephFS FUSE client used when the kernel mounter is unavailable.
