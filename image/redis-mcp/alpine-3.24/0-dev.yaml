# syntax=dhi.io/build:2-alpine3.24

name: Redis MCP Server 0.x (dev)
image: dhi.io/redis-mcp
variant: dev
tags:
  - 0-alpine-dev
  - 0.5-alpine-dev
  - 0-alpine3.24-dev
  - 0.5.0-alpine-dev
  - 0.5-alpine3.24-dev
  - 0.5.0-alpine3.24-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-23"
vars:
  COMMIT_SHA: d82bfe1a2ca1e521d3d2c78ecbdf3d628a97ca19
  SEMVER_MAJOR_MINOR_VERSION: "0.5"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.5.0
  UV_PLATFORM: '#{ target.arch == "amd64" ? "x86_64-unknown-linux-musl" : "aarch64-unknown-linux-musl" }'
  UV_VERSION: 0.11.30
  VERSION: 0.5.0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - apk-tools
    - bash
    - busybox
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - findutils
    - musl-utils
    - python-3.14
    - tzdata
  builds:
    - name: redis-mcp
      work-dir: /app
      environment:
        UV_COMPILE_BYTECODE: "1"
      contents:
        packages:
          - busybox
          - gzip
          - python-3.14
          - tar
        files:
          - url: https://github.com/astral-sh/uv/releases/download/0.11.30/uv-${UV_PLATFORM}.tar.gz
            path: ${source.dir}/uv-unknown-linux-musl.tar.gz
            spdx:
              name: uv
              version: 0.11.30
              packages:
                - name: uv
                  purl: pkg:github/astral-sh/uv@0.11.30
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: git+https://github.com/redis/mcp-redis.git#0.5.0
            checksum: d82bfe1a2ca1e521d3d2c78ecbdf3d628a97ca19
            path: /app
            spdx:
              name: redis-mcp-server
              version: 0.5.0
              packages:
                - name: redis-mcp-server
                  purl: pkg:pypi/redis-mcp-server@0.5.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: setup uv
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            tar -xzf "${source.dir}/uv-unknown-linux-musl.tar.gz" -C /usr/local/bin --strip-components=1
            chmod +x /usr/local/bin/uv
        - name: build python package
          privileged: true
          runs: |
            set -eux -o pipefail

            rm -rf /app/.git /app/tests

            python3 - << 'PY'
            from pathlib import Path

            pyproject = Path("pyproject.toml")
            data = pyproject.read_text()
            if "[tool.uv]" in data:
                raise SystemExit("pyproject.toml already defines [tool.uv]; merge constraint-dependencies manually")
            constraints = [
                "aiohttp>=3.14.1",
                "cryptography>=48.0.1",
                "idna>=3.15",
                "pygments>=2.20.0",
                "pyjwt>=2.13.0",
                "python-dotenv>=1.2.2",
                "python-multipart>=0.0.31",
                "requests>=2.33.0",
                "starlette>=1.3.1",
                "urllib3>=2.7.0",
            ]
            constraint_lines = "\n".join(f'    "{constraint}",' for constraint in constraints)
            pyproject.write_text(
                data.rstrip()
                + f'\n\n[tool.uv]\nconstraint-dependencies = [\n{constraint_lines}\n]\n'
            )

            main = Path("src/main.py")
            data = main.read_text()
            if "from src.version import __version__" not in data:
                data = data.replace(
                    "from src.common.logging_utils import configure_logging\n",
                    "from src.common.logging_utils import configure_logging\nfrom src.version import __version__\n",
                )
            if "@click.version_option(__version__)" not in data:
                data = data.replace("@click.command()\n", "@click.command()\n@click.version_option(__version__)\n")
            main.write_text(data)
            PY

            if command -v sfw > /dev/null 2>&1; then
              sfw uv lock --upgrade
              sfw uv sync --locked --no-dev --no-editable
            else
              uv lock --upgrade
              uv sync --locked --no-dev --no-editable
            fi
      outputs:
        - source: /app/.venv
          target: /app/.venv
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/redis-mcp-server
          target: /opt/docker/sbom/redis-mcp-server
          uid: 0
          gid: 0
    - name: server.json
      contents:
        packages:
          - bash
          - busybox
          - sed
      pipeline:
        - runs: |
            set -eux -o pipefail

            sed -i "s/_VERSION_/0.5.0/g" "${source.dir}/config/server.json"
      paths:
        - type: file
          path: ${source.dir}/config/server.json
          uid: 0
          gid: 0
          source: image/redis-mcp/config/server.json
      attestations:
        - predicate-type: https://modelcontextprotocol.io/server.json/v1
          source: ${source.dir}/config/server.json
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  PATH: /app/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
annotations:
  org.opencontainers.image.description: A minimal Redis MCP Server image
  org.opencontainers.image.licenses: MIT
labels:
  io.modelcontextprotocol.server.name: io.github.redis/mcp-redis
entrypoint:
  - redis-mcp-server
