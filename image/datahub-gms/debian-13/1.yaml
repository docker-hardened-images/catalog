vars:
  COMMIT_SHA: 9fa880ef1890ce1052cc06d5fb3b7f9e114f528c
  DOCKERIZE_COMMIT_SHA: a21f69ff60cdf1b2d54dadb7d04f28c8b6723c19
  DOCKERIZE_VERSION: 0.24.3
  GOLANG_REFERENCE: dhi/golang:1.26.4-debian13-dev@sha256:9a675e23c51e343854caccdcf56c40a9f39b5c3024ca02ae045b48786d0d7a42
  GRADLE_DIGEST: sha256:92b8d59b79fd82421f7948a51e2abefd26bdeac9dd06beff74565118aeded960
  GRADLE_REFERENCE: dhi/gradle:8.14.5-jdk17-debian13-dev@sha256:92b8d59b79fd82421f7948a51e2abefd26bdeac9dd06beff74565118aeded960
  GRADLE_VERSION: 8.14.5
  JMX_PROMETHEUS_SHA256: 8b67ed40485d475648c36d11d21464b484406f85faf912b3363f71a6a7861320
  JMX_PROMETHEUS_VERSION: 0.20.0
  JRE_DIGEST: sha256:fe7a19789911864852abce7a89fa6e0330750f55d014a6570af19c5a8e171aee
  JRE_REFERENCE: dhi/eclipse-temurin:17.0.19.10-debian13@sha256:fe7a19789911864852abce7a89fa6e0330750f55d014a6570af19c5a8e171aee
  JRE_VERSION: 17.0.19.10
  OTEL_JAVAAGENT_SHA256: bd01fea1304e8c8803fff827a0bdda02b2266742a85c62548053c6761474bb5b
  OTEL_JAVAAGENT_VERSION: 2.27.0
  SEMVER_MAJOR_MINOR_VERSION: "1.5"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.5.0
  VERSION: 1.5.0.7
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - curl
    - grep
    - libsnappy1v5
    - libsqlite3-0
    - tzdata
    - wget
  builds:
    - name: dockerize
      uses: dhi.io/golang:1.26.4-debian13-dev@sha256:9a675e23c51e343854caccdcf56c40a9f39b5c3024ca02ae045b48786d0d7a42
      work-dir: /go/src/github.com/powerman/dockerize
      contents:
        files:
          - url: git+https://github.com/powerman/dockerize.git#v0.24.3
            checksum: a21f69ff60cdf1b2d54dadb7d04f28c8b6723c19
            path: /go/src/github.com/powerman/dockerize
            spdx:
              name: dockerize
              version: 0.24.3
              packages:
                - name: dockerize
                  purl: pkg:golang/github.com/powerman/dockerize@0.24.3
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: bump go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/sys@v0.45.0
              - golang.org/x/crypto@v0.52.0
            download: true
        - name: test dockerize
          runs: |
            set -eux -o pipefail

            go test ./...
        - name: build dockerize
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/dockerize
            packages: ./
      outputs:
        - source: ${target.dir}/usr/local/bin/dockerize
          target: /usr/local/bin/dockerize
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/dockerize
          target: /opt/docker/sbom/dockerize
          uid: 0
          gid: 0
    - name: datahub-gms
      uses: dhi.io/gradle:8.14.5-jdk17-debian13-dev@sha256:92b8d59b79fd82421f7948a51e2abefd26bdeac9dd06beff74565118aeded960
      work-dir: ${source.dir}/datahub
      caches:
        - path: /root/.gradle
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - curl
          - findutils
          - git
          - grep
          - gzip
          - sed
          - tar
        files:
          - url: git+https://github.com/datahub-project/datahub.git#v1.5.0.7
            checksum: 9fa880ef1890ce1052cc06d5fb3b7f9e114f528c
            path: ${source.dir}/datahub
            spdx:
              name: datahub
              version: 1.5.0.7
              packages:
                - name: datahub
                  purl: pkg:dhi/datahub-gms@1.5.0.7
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: install gradle init scripts
          runs: |
            set -eux -o pipefail

            # GHSA-72hv-8253-57qq: force jackson-core 2.21.1 at resolution time.
            # Installed as an init script so the force applies before lock refresh
            # and is not defeated by --update-locks against the Spring Boot BOM.
            install -D -m 0644 \
              ${source.dir}/patch/force-cve-deps.gradle \
              /root/.gradle/init.d/force-cve-deps.gradle
        - name: patch maven central for build cloud rate limits
          runs: |
            set -eux -o pipefail

            # Maven Central rate-limits Docker Build Cloud egress IPs (HTTP 429).
            #
            # Replace `mavenCentral()` with Google's CDN mirror of Maven Central.
            #
            # Replace `gradlePluginPortal()` with an inline Maven repository
            # at plugins.gradle.org/m2/ that restricts metadataSources to
            # mavenPom() + artifact() only. The default Plugin Portal config
            # also asks for `.module` (Gradle Module Metadata) files; Plugin
            # Portal 303-redirects .module requests to repo.maven.apache.org
            # which 429s. Skipping that lookup is the difference between
            # success and a 429 failure on every plugin artifact lookup.
            MIRROR='maven { url "https://maven-central.storage-download.googleapis.com/maven2/" }'
            PORTAL=$'maven {\\n    url "https://plugins.gradle.org/m2/"\\n    metadataSources { mavenPom(); artifact(); ignoreGradleMetadataRedirection() }\\n}'
            find . \( -name "*.gradle" -o -name "*.gradle.kts" \) -print0 \
              | xargs -0 sed -i \
                -e "s|mavenCentral()|${MIRROR}|g" \
                -e "s|gradlePluginPortal()|${PORTAL}|g"
        - name: bump vulnerable dependency versions
          runs: |
            set -eux -o pipefail

            # Force versions of transitive deps the upstream BOM does not
            # cover. These ride in via Pegasus/Kafka/etc., not via Spring
            # Boot, so bumping springBootVersion alone is not enough.
            #
            # netty 4.1.135.Final fixes CVE-2026-45674, -47691, -44249,
            #   -44893, -44250, -44890, -45416, -46340, -45673, -47244,
            #   -45536 (and prior CVEs: -42583, -42579, -42587, -33870,
            #   -42584, -33871).
            # aircompressor 2.0.3 fixes CVE-2025-67721.
            # spring-webmvc 6.2.18 fixes CVE-2026-22737, -22745, -22735,
            #   -22741.
            # jackson-core 2.21.1 fixes GHSA-72hv-8253-57qq for the unshaded
            #   copies via force-cve-deps.gradle (init script). We tried forcing
            #   here with `--update-locks 'com.fasterxml.jackson.core:*'` but
            #   Gradle re-resolves the lock against the Spring Boot BOM and
            #   writes back the BOM-managed 2.19.2, defeating the force. The
            #   shaded 2.15.2 Hazelcast copy is handled separately via VEX
            #   because Gradle cannot reach it.
            # log4j-core 2.25.4 fixes CVE-2026-34477, -34478, -34480.
            # commons-lang3 3.18.0 fixes CVE-2025-48924.
            # avro 1.11.5 fixes CVE-2025-33042 (avro-compiler).
            # jakarta.mail 1.6.8 fixes CVE-2025-7962.
            # opentelemetry 1.62.0 fixes CVE-2026-45292.
            # logback 1.5.25 fixes CVE-2026-1225.
            # rhino 1.7.14.1 fixes CVE-2025-66453 while staying on the 1.7.x
            #   line used by upstream DataHub.
            cat >> build.gradle << 'GRADLE'

            // ===== DHI CVE remediation: force minimum versions =====
            // Added by the DHI build pipeline (image/datahub-gms/...inc.yaml).
            // Forces minimum versions for transitive deps not pinned by the
            // upstream Spring Boot BOM, to remediate HIGH/CRITICAL CVEs.
            allprojects {
                configurations.configureEach {
                    resolutionStrategy.eachDependency { details ->
                        def req = details.requested
                        if (req.group == 'io.netty'
                                && req.name.startsWith('netty-')
                                && !req.name.startsWith('netty-tcnative')) {
                            // netty-tcnative-* tracks its own version line
                            // (2.0.x) — only force core netty-*.
                            details.useVersion '4.1.135.Final'
                            details.because 'DHI CVE remediation: CVE-2026-45674, CVE-2026-47691, CVE-2026-44249, CVE-2026-44893, CVE-2026-44250, CVE-2026-44890, CVE-2026-45416, CVE-2026-46340, CVE-2026-45673, CVE-2026-47244, CVE-2026-45536'
                        }
                        if (req.group == 'io.airlift' && req.name == 'aircompressor') {
                            details.useVersion '2.0.3'
                            details.because 'DHI CVE remediation: CVE-2025-67721'
                        }
                        if (req.group == 'org.springframework'
                                && req.name == 'spring-webmvc') {
                            details.useVersion '6.2.18'
                            details.because 'DHI CVE remediation: CVE-2026-22737, CVE-2026-22745, CVE-2026-22735, CVE-2026-22741'
                        }
                        if (req.group == 'org.apache.logging.log4j'
                                && req.name.startsWith('log4j-')) {
                            details.useVersion '2.25.4'
                            details.because 'DHI CVE remediation: CVE-2026-34477, CVE-2026-34478, CVE-2026-34480'
                        }
                        if (req.group == 'org.apache.commons'
                                && req.name == 'commons-lang3') {
                            details.useVersion '3.18.0'
                            details.because 'DHI CVE remediation: CVE-2025-48924'
                        }
                        if (req.group == 'org.apache.avro'
                                && req.name.startsWith('avro')) {
                            details.useVersion '1.11.5'
                            details.because 'DHI CVE remediation: CVE-2025-33042'
                        }
                        if (req.group == 'com.sun.mail'
                                && req.name == 'jakarta.mail') {
                            details.useVersion '1.6.8'
                            details.because 'DHI CVE remediation: CVE-2025-7962'
                        }
                        if (req.group == 'io.opentelemetry'
                                && req.name.startsWith('opentelemetry-')) {
                            details.useVersion '1.62.0'
                            details.because 'DHI CVE remediation: CVE-2026-45292'
                        }
                        if (req.group == 'ch.qos.logback'
                                && req.name.startsWith('logback-')) {
                            details.useVersion '1.5.25'
                            details.because 'DHI CVE remediation: CVE-2026-1225'
                        }
                        if (req.group == 'org.mozilla'
                                && req.name == 'rhino') {
                            details.useVersion '1.7.14.1'
                            details.because 'DHI CVE remediation: CVE-2025-66453'
                        }
                    }
                }
            }
            GRADLE
        - name: build war
          privileged: true
          runs: |
            set -eux -o pipefail

            # `:assemble` (vs `:build`) skips the `:check` task graph entirely
            # — no Spotless, no static analysis. Combined with --parallel +
            # --max-workers=4 this trims ~30 min off the cold build and
            # keeps us under the Docker Build Cloud 90-min cap.
            #
            # `--update-locks` lets Gradle's dependency-locking refresh the
            # pinned versions for the modules we bumped (and their transitive
            # children). Without this, `gradle.lockfile` entries override our
            # build.gradle bumps and fail with "strictly X" constraint errors.
            #
            # Removed com.fasterxml.jackson.core:* and
            # com.fasterxml.jackson.dataformat:* from the update-locks list
            # so the force-cve-deps.gradle init script force to 2.21.1
            # (GHSA-72hv-8253-57qq) is not defeated by lock refresh against
            # the Spring Boot BOM.
            ./gradlew --init-script ${source.dir}/files/init.gradle \
              :metadata-service:war:assemble \
              -x test \
              --parallel --max-workers=4 \
              --update-locks 'org.apache.zookeeper:*,org.eclipse.jetty:*,org.postgresql:*,org.springframework.boot:*,org.springframework:*,io.netty:*,io.airlift:*,org.apache.logging.log4j:*,org.apache.commons:*,org.apache.avro:*,com.sun.mail:*,io.opentelemetry:*,ch.qos.logback:*,org.mozilla:*' \
              --no-daemon --console=plain
        - name: stage runtime files
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/datahub/datahub-gms/bin"
            mkdir -p "${target.dir}/datahub/datahub-gms/scripts"
            mkdir -p "${target.dir}/datahub/datahub-gms/resources"
            mkdir -p "${target.dir}/datahub/datahub-gms/lib"

            cp metadata-service/war/build/libs/war.war \
              "${target.dir}/datahub/datahub-gms/bin/war.war"
            cp metadata-models/src/main/resources/entity-registry.yml \
              "${target.dir}/datahub/datahub-gms/resources/entity-registry.yml"
            cp docker/monitoring/client-prometheus-config.yaml \
              "${target.dir}/datahub/datahub-gms/scripts/prometheus-config.yaml"

            # Patched start.sh (absolute paths for bundled Java agents under DHI).
            cp "${source.dir}/files/start.sh" \
              "${target.dir}/datahub/datahub-gms/scripts/start.sh"
            chmod 0755 "${target.dir}/datahub/datahub-gms/scripts/start.sh"
        - name: fetch otel javaagent
          privileged: true
          runs: |
            set -eux -o pipefail

            curl -fsSL -o /tmp/opentelemetry-javaagent.jar \
              "https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v2.27.0/opentelemetry-javaagent.jar"
            echo "bd01fea1304e8c8803fff827a0bdda02b2266742a85c62548053c6761474bb5b  /tmp/opentelemetry-javaagent.jar" | sha256sum -c -
            mv /tmp/opentelemetry-javaagent.jar \
              "${target.dir}/datahub/datahub-gms/lib/opentelemetry-javaagent.jar"
        - name: fetch jmx prometheus javaagent
          privileged: true
          runs: |
            set -eux -o pipefail

            # Use Google's Maven Central mirror — repo1.maven.org rate-limits
            # the Docker Build Cloud egress IPs (HTTP 429).
            curl -fsSL -o /tmp/jmx_prometheus_javaagent.jar \
              "https://maven-central.storage-download.googleapis.com/maven2/io/prometheus/jmx/jmx_prometheus_javaagent/0.20.0/jmx_prometheus_javaagent-0.20.0.jar"
            echo "8b67ed40485d475648c36d11d21464b484406f85faf912b3363f71a6a7861320  /tmp/jmx_prometheus_javaagent.jar" | sha256sum -c -
            mv /tmp/jmx_prometheus_javaagent.jar \
              "${target.dir}/datahub/datahub-gms/lib/jmx_prometheus_javaagent.jar"
      paths:
        - type: file
          path: ${source.dir}/files/start.sh
          uid: 0
          gid: 0
          source: image/datahub-gms/files/start.sh
        - type: file
          path: ${source.dir}/files/init.gradle
          uid: 0
          gid: 0
          source: image/datahub-gms/files/init.gradle
        - type: file
          path: ${source.dir}/patch/force-cve-deps.gradle
          uid: 0
          gid: 0
          source: image/datahub-gms/patch/force-cve-deps.gradle
      outputs:
        - source: ${target.dir}/datahub/datahub-gms
          target: /datahub/datahub-gms
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/datahub
          target: /opt/docker/sbom/datahub
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:17.0.19.10-debian13@sha256:fe7a19789911864852abce7a89fa6e0330750f55d014a6570af19c5a8e171aee
      includes:
