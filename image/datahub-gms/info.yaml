metadata:
  display-name: DataHub GMS
  short-description: The General Metadata Service (GMS) is the core backend of the DataHub open-source AI data catalog, providing REST and GraphQL APIs for metadata ingestion, search, and governance across datasets, pipelines, dashboards, and ML models.
  featured: false
  home-url: https://datahub.com
  categories:
    - databases-and-storage
  included-tools:
    - name: java
      description: Eclipse Temurin OpenJDK 17 JRE runtime used to launch the GMS WAR via start.sh.
    - name: dockerize
      description: Service-readiness wait utility (powerman/dockerize) used by start.sh to block on Kafka, Elasticsearch, and Neo4j availability before the JVM starts.
