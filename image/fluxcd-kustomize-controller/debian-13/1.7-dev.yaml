    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tini
    - util-linux
  builds:
    - name: fluxcd-kustomize-controller
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:6e257a15c0aa81a30cd698e950469f07dd71d6c7e4c6a30e0badbf9494b1d6f3
      work-dir: /go/src/github.com/fluxcd/kustomize-controller
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/fluxcd/kustomize-controller#v1.7.3
            checksum: 090c49bdb679f827353d1658a7ab60a168dbb3a5
            path: /go/src/github.com/fluxcd/kustomize-controller
            spdx:
              name: fluxcd-kustomize-controller
              version: 1.7.3
              packages:
                - name: fluxcd-kustomize-controller
                  purl: pkg:golang/github.com/fluxcd/kustomize-controller@1.7.3
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch (1.6 or 1.7 only)
          uses: go/bump@v2
          with:
            deps:
              - filippo.io/edwards25519@v1.1.1
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/cloudflare/circl@v1.6.3
              - github.com/go-git/go-git/v5@v5.19.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel@v1.43.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            # Exclude packages that cannot run without external tools or a live k8s API server:
            # - internal/controller: requires envtest (live k8s API server via etcd)
            # - internal/decryptor: TestDecryptor_ImportKeys requires gpg in $PATH
            # - internal/sops/keyservice: TestServer_EncryptDecrypt_PGP requires gpg in $PATH
            # CGO_ENABLED=0 go test $(go list ./internal/... | grep -vE '/internal/(controller|decryptor|sops/keyservice)')
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/kustomize-controller
      outputs:
        - source: ${target.dir}/usr/local/bin/kustomize-controller
          target: /usr/local/bin/kustomize-controller
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-kustomize-controller
          target: /opt/docker/sbom/fluxcd-kustomize-controller
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
