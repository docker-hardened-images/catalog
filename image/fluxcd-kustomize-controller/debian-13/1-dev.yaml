# syntax=dhi.io/build:2-debian13

name: fluxcd kustomize controller 1.9.x (dev)
image: dhi.io/fluxcd-kustomize-controller
variant: dev
tags:
  - 1-dev
  - 1.9-dev
  - 1.9.1-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.9-debian-dev
  - 1.9-debian13-dev
  - 1.9.1-debian-dev
  - 1.9.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2023-07-04"
vars:
  COMMIT_SHA: ab0e492125fb80bab6be5ddc610bae5738ed1022
  SEMVER_MAJOR_MINOR_VERSION: "1.9"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.9.1
  VERSION: 1.9.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tini
    - tzdata
    - util-linux
  builds:
    - name: fluxcd-kustomize-controller
      work-dir: /go/src/github.com/fluxcd/kustomize-controller
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/fluxcd/kustomize-controller#v1.9.1
            checksum: ab0e492125fb80bab6be5ddc610bae5738ed1022
            path: /go/src/github.com/fluxcd/kustomize-controller
            spdx:
              name: fluxcd-kustomize-controller
              version: 1.9.1
              packages:
                - name: fluxcd-kustomize-controller
                  purl: pkg:golang/github.com/fluxcd/kustomize-controller@1.9.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: test
          runs: |
            set -eux -o pipefail

            # Exclude packages that cannot run without external tools or a live k8s API server:
            # - internal/controller: requires envtest (live k8s API server via etcd)
            # - internal/decryptor: TestDecryptor_ImportKeys requires gpg in $PATH
            # - internal/sops/keyservice: TestServer_EncryptDecrypt_PGP requires gpg in $PATH
            # CGO_ENABLED=0 go test $(go list ./internal/... | grep -vE '/internal/(controller|decryptor|sops/keyservice)')
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/kustomize-controller
      outputs:
        - source: ${target.dir}/usr/local/bin/kustomize-controller
          target: /usr/local/bin/kustomize-controller
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fluxcd-kustomize-controller
          target: /opt/docker/sbom/fluxcd-kustomize-controller
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  GNUPGHOME: /tmp
annotations:
  org.opencontainers.image.description: A minimal Flux CD kustomize-controller image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - tini
  - --
  - /usr/local/bin/kustomize-controller
