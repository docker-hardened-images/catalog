# syntax=dhi.io/build:2-debian13

name: Kyverno Policy Reporter UI 2.x
image: dhi.io/kyverno-policy-reporter-ui
variant: runtime
tags:
  - "2"
  - "2.6"
  - 2.6.1
  - 2-debian
  - 2-debian13
  - 2.6-debian
  - 2.6-debian13
  - 2.6.1-debian
  - 2.6.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-29"
vars:
  COMMIT_SHA: ef5ecce0d60f15d29fd77569b721ed50c7ee9db2
  SEMVER_MAJOR_MINOR_VERSION: "2.6"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.6.1
  VERSION: 2.6.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: kyverno-policy-reporter-ui
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
          - jq
          - bun
        files:
          - url: git+https://github.com/kyverno/policy-reporter-ui.git#v2.6.1
            checksum: ef5ecce0d60f15d29fd77569b721ed50c7ee9db2
            path: /go/src/github.com/kyverno/policy-reporter-ui
            spdx:
              name: kyverno-policy-reporter-ui
              version: 2.6.1
              packages:
                - name: kyverno-policy-reporter-ui
                  purl: pkg:golang/github.com/kyverno/policy-reporter-ui@2.6.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build-frontend
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/frontend
          privileged: true
          runs: |
            set -eux -o pipefail

            bun pm pkg set overrides.form-data="4.0.6" # CVE-2026-12143

            # Move nuxt to devDependencies since it's needed for build-time only.
            jq '.devDependencies.nuxt = .dependencies.nuxt | del(.dependencies.nuxt)' package.json > package.json.tmp
            mv package.json.tmp package.json

            # Pin transitive brace-expansion 2.1.1 -> 2.1.2 for CVE-2026-13149 (both minimatch@5.x/9.x
            # entries); bun ignores nested/scoped overrides, so patch the lockfile in place. The 5.x
            # entry is unaffected. sha512 is brace-expansion@2.1.2's npm integrity.
            sed -i 's|brace-expansion@2.1.1", "", { "dependencies": { "balanced-match": "^1.0.0" } }, "sha512-WR1cURNjuvBLMZBMbqM0UoE+WAfdUcEV1ccD8PVBVOI+Z3ND4+SZbN8RsfT2bMuG1qwz5RFvPukSZm5fF2D5eA==|brace-expansion@2.1.2", "", { "dependencies": { "balanced-match": "^1.0.0" } }, "sha512-w5JZcKgdhDOgOwm8H+KgbosopHMuGcl6qbulwjtz3SM7I7P3yW1eAjzMPLrIE+NQ9vjgANKHWeMHnrT0OXW1oA==|g' bun.lock

            bun install
            bun run generate

            mkdir ${target.dir}/kodata
            cp -r dist ${target.dir}/kodata/ui
        - name: prepare ui for sbom
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/frontend
          privileged: true
          runs: |
            set -eux -o pipefail

            rm -rf node_modules

            # --ignore-scripts skips the frontend "postinstall" nuxt script
            bun install --production --ignore-scripts

            # Remove esbuild from node modules to avoid phantom golang vulnerabilities in sbom
            rm -rf node_modules/@esbuild
            find node_modules -type d -name esbuild -exec rm -rf {} + 2> /dev/null || true
        - name: ui-sbom
          uses: sbom@v1
          with:
            prefix: kyverno-policy-reporter-ui-frontend
            source: /go/src/github.com/kyverno/policy-reporter-ui/frontend
        - name: copy-templates
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/backend
          runs: |
            set -eux -o pipefail

            cp -r templates ${target.dir}/kodata/templates
        - name: download backend dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/backend
          with:
            deps: []
        - name: test
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/backend
          privileged: true
          runs: |
            set -eux -o pipefail

            go test $(go list ./... | grep -v '/util')
        - name: build-backend
          uses: go/build@v1
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/backend
          privileged: true
          with:
            output: ${target.dir}/usr/local/bin/kyverno-policy-reporter-ui
      outputs:
        - source: ${target.dir}/usr/local/bin/kyverno-policy-reporter-ui
          target: /usr/local/bin/kyverno-policy-reporter-ui
          uid: 0
          gid: 0
        - source: ${target.dir}/kodata
          target: /kodata
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kyverno-policy-reporter-ui
          target: /opt/docker/sbom/kyverno-policy-reporter-ui
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kyverno-policy-reporter-ui-frontend
          target: /opt/docker/sbom/kyverno-policy-reporter-ui-frontend
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  KO_DATA_PATH: /kodata
annotations:
  org.opencontainers.image.description: A minimal Kyverno Policy Reporter UI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/kyverno-policy-reporter-ui
ports:
  - 8080/tcp
