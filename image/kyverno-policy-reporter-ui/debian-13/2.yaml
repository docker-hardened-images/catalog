# syntax=dhi.io/build:2-debian13

name: Kyverno Policy Reporter UI 2.x
image: dhi.io/kyverno-policy-reporter-ui
variant: runtime
tags:
  - "2"
  - "2.5"
  - 2.5.4
  - 2-debian
  - 2-debian13
  - 2.5-debian
  - 2.5-debian13
  - 2.5.4-debian
  - 2.5.4-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-29"
vars:
  BUN_REFERENCE: dhi/bun:1.2.23-debian13-dev@sha256:2a5df837b30bf3435a8790f4bba88a07dd09ecd7fa80e7d9c5e58e0102e31ccc
  COMMIT_SHA: dcf782d867b5276dd63be4b32594babc2b8a40e3
  SEMVER_MAJOR_MINOR_VERSION: "2.5"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.5.4
  VERSION: 2.5.4
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: kyverno-policy-reporter-ui
      uses: dhi.io/bun:1.2.23-debian13-dev@sha256:2a5df837b30bf3435a8790f4bba88a07dd09ecd7fa80e7d9c5e58e0102e31ccc
      environment:
        PATH: /go/bin:/usr/local/go/bin:${PATH}
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/kyverno/policy-reporter-ui.git#v2.5.4
            checksum: dcf782d867b5276dd63be4b32594babc2b8a40e3
            path: /go/src/github.com/kyverno/policy-reporter-ui
            spdx:
              name: kyverno-policy-reporter-ui
              version: 2.5.4
              packages:
                - name: kyverno-policy-reporter-ui
                  purl: pkg:golang/github.com/kyverno/policy-reporter-ui@2.5.4
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build-frontend
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/frontend
          privileged: true
          runs: |
            set -eux -o pipefail

            bun pm pkg set overrides.form-data="4.0.6" # CVE-2026-12143

            bun install
            bun run generate

            mkdir ${target.dir}/kodata
            cp -r dist ${target.dir}/kodata/ui
        - name: prepare ui for sbom
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/frontend
          privileged: true
          runs: |
            set -eux -o pipefail

            rm -rf node_modules

            bun install --production

            # Remove esbuild from node modules to avoid phantom golang vulnerabilities in sbom
            rm -rf node_modules/@esbuild
            find node_modules -type d -name esbuild -exec rm -rf {} + 2> /dev/null || true
        - name: ui-sbom
          uses: sbom@v1
          with:
            prefix: kyverno-policy-reporter-ui-frontend
            source: /go/src/github.com/kyverno/policy-reporter-ui/frontend
        - name: copy-templates
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/backend
          runs: |
            set -eux -o pipefail

            cp -r templates ${target.dir}/kodata/templates
        - name: patch backend dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/backend
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
            tidy: true
        - name: test
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/backend
          runs: |
            set -eux -o pipefail

            go test $(go list ./... | grep -v '/util')
        - name: build-backend
          uses: go/build@v1
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/backend
          privileged: true
          with:
            output: ${target.dir}/usr/local/bin/kyverno-policy-reporter-ui
      outputs:
        - source: ${target.dir}/usr/local/bin/kyverno-policy-reporter-ui
          target: /usr/local/bin/kyverno-policy-reporter-ui
          uid: 0
          gid: 0
        - source: ${target.dir}/kodata
          target: /kodata
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kyverno-policy-reporter-ui
          target: /opt/docker/sbom/kyverno-policy-reporter-ui
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kyverno-policy-reporter-ui-frontend
          target: /opt/docker/sbom/kyverno-policy-reporter-ui-frontend
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  KO_DATA_PATH: /kodata
annotations:
  org.opencontainers.image.description: A minimal Kyverno Policy Reporter UI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/kyverno-policy-reporter-ui
ports:
  - 8080/tcp
