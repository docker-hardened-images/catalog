# syntax=dhi.io/build:2-debian13

name: Nessie 0.x
image: dhi.io/nessie
variant: runtime
tags:
  - "0"
  - "0.108"
  - 0.108.2
  - 0-debian
  - 0-debian13
  - 0.108-debian
  - 0.108-debian13
  - 0.108.2-debian
  - 0.108.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-09"
vars:
  COMMIT_SHA: dd713e03f4d4733c92cf03bcf7b212baf0db73e9
  JDK_MAJOR_VERSION: "21"
  SEMVER_MAJOR_MINOR_VERSION: "0.108"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.108.2
  VERSION: 0.108.2
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - eclipse-temurin-21-jre
    - eclipse-temurin-21-jre-oci-config
  builds:
    - name: nessie-server
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - curl
          - findutils
          - git
          - grep
          - libc6
          - libstdc++6
          - mawk
          - sed
          - eclipse-temurin-21-jdk
          - gradle-8
        files:
          - url: git+https://github.com/projectnessie/nessie.git#nessie-0.108.2
            checksum: dd713e03f4d4733c92cf03bcf7b212baf0db73e9
            path: ${source.dir}/nessie
            spdx:
              name: nessie
              version: 0.108.2
              packages:
                - name: nessie
                  purl: pkg:github/projectnessie/nessie@0.108.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: force jackson-core 2.22.0 (GHSA-72hv-8253-57qq)
          uses: git/patch@v1
          work-dir: ${source.dir}/nessie
          with:
            patch: ${source.dir}/patch/jackson-core-2.21.1.patch
        - name: force netty 4.2.15 (multiple CVEs)
          uses: git/patch@v1
          work-dir: ${source.dir}/nessie
          with:
            patch: ${source.dir}/patch/netty-4.2.15.patch
        - name: force reactor-netty 1.2.18 and reactor-core 3.7.19 (CVE-2025-22227)
          uses: git/patch@v1
          work-dir: ${source.dir}/nessie
          with:
            patch: ${source.dir}/patch/reactor-core-3.7.19.patch
        - name: force opentelemetry 1.62.0 (CVE-2026-45292)
          uses: git/patch@v1
          work-dir: ${source.dir}/nessie
          with:
            patch: ${source.dir}/patch/opentelemetry-1.62.0.patch
        - name: force postgresql 42.7.11 (CVE-2026-42198)
          uses: git/patch@v1
          work-dir: ${source.dir}/nessie
          with:
            patch: ${source.dir}/patch/postgresql-vertx.patch
        - name: build
          work-dir: ${source.dir}/nessie
          privileged: true
          runs: |
            set -eux -o pipefail

            export GRADLE_HOME="/usr/share/java/gradle"
            export JAVA_HOME="/usr/lib/jvm/temurin-21"
            export PATH="${GRADLE_HOME}/bin:${JAVA_HOME}/bin:${PATH}"

            # Temporarily adding these flags to see if we can diagnose more Maven Central 429s
            ./gradlew :nessie-quarkus:clean :nessie-quarkus:quarkusBuild --stacktrace --info

            cp -r ${source.dir}/nessie/servers/quarkus-server/build/quarkus-app \
              ${target.dir}/quarkus-app
      paths:
        - type: file
          path: ${source.dir}/patch/jackson-core-2.21.1.patch
          uid: 0
          gid: 0
          source: image/nessie/patch/jackson-core-2.21.1.patch
        - type: file
          path: ${source.dir}/patch/netty-4.2.15.patch
          uid: 0
          gid: 0
          source: image/nessie/patch/netty-4.2.15.patch
        - type: file
          path: ${source.dir}/patch/reactor-core-3.7.19.patch
          uid: 0
          gid: 0
          source: image/nessie/patch/reactor-core-3.7.19.patch
        - type: file
          path: ${source.dir}/patch/opentelemetry-1.62.0.patch
          uid: 0
          gid: 0
          source: image/nessie/patch/opentelemetry-1.62.0.patch
        - type: file
          path: ${source.dir}/patch/postgresql-vertx.patch
          uid: 0
          gid: 0
          source: image/nessie/patch/postgresql-vertx.patch
        - type: file
          path: ${source.dir}/patch/test.patch
          uid: 0
          gid: 0
          source: image/nessie/patch/test.patch
      outputs:
        - source: ${target.dir}/quarkus-app
          target: /opt/quarkus-app
          uid: 10000
          gid: 10001
        - source: /opt/docker/sbom/nessie
          target: /opt/docker/sbom/nessie
          uid: 0
          gid: 0
accounts:
  run-as: nessie
  users:
    - name: nessie
      uid: 10000
      gid: 10001
  groups:
    - name: nessie
      gid: 10001
      members:
        - nessie
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /home/nessie
environment:
  AB_JOLOKIA_OFF: ""
  JAVA_APP_JAR: /opt/quarkus-app/quarkus-run.jar
  JAVA_HOME: /usr/lib/jvm/temurin-21
  LANGUAGE: en_US:en
paths:
  - type: directory
    path: /home/nessie
    uid: 10000
    gid: 10001
annotations:
  org.opencontainers.image.description: A minimal Nessie image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - java
  - -jar
  - /opt/quarkus-app/quarkus-run.jar
ports:
  - 19120/tcp
