# syntax=dhi.io/build:2-debian13

name: Nessie 0.x (dev)
image: dhi.io/nessie
variant: dev
tags:
  - 0-dev
  - 0.107-dev
  - 0.107.9-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.107-debian-dev
  - 0.107-debian13-dev
  - 0.107.9-debian-dev
  - 0.107.9-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-09"
vars:
  COMMIT_SHA: 0a15f1e2fb7461035514594c1a851bb12c4f1bfb
  GRADLE_REFERENCE: dhi/gradle:8.14.5-jdk21-debian13-dev@sha256:110a0859dee51f81140e9765573f6230cdb19db36fe0e380e533605daa6bdce9
  GRADLE_VERSION: 8.14.5
  JAVA_MAJOR_VERSION: "21"
  JAVA_VERSION: 21.0.11.10
  JRE_REFERENCE: dhi/eclipse-temurin:21.0.11.10-debian13@sha256:d3c099f29d6d0a0b804d1a253186f5273af3a22c07de03b7e1370f0f27990b81
  SEMVER_MAJOR_MINOR_VERSION: "0.107"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.107.9
  VERSION: 0.107.9
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: nessie-server
      uses: dhi.io/gradle:8.14.5-jdk21-debian13-dev@sha256:110a0859dee51f81140e9765573f6230cdb19db36fe0e380e533605daa6bdce9
      contents:
        packages:
          - curl
          - grep
        files:
          - url: git+https://github.com/projectnessie/nessie.git#nessie-0.107.9
            checksum: 0a15f1e2fb7461035514594c1a851bb12c4f1bfb
            path: ${source.dir}/nessie
            spdx:
              name: nessie
              version: 0.107.9
              packages:
                - name: nessie
                  purl: pkg:github/projectnessie/nessie@0.107.9
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: force jackson-core 2.21.1 (GHSA-72hv-8253-57qq)
          uses: git/patch@v1
          work-dir: ${source.dir}/nessie
          with:
            patch: ${source.dir}/patch/jackson-core-2.21.1.patch
        - name: force netty 4.1.133 (multiple CVEs)
          uses: git/patch@v1
          work-dir: ${source.dir}/nessie
          with:
            patch: ${source.dir}/patch/netty-4.2.13.patch
        - name: force opentelemetry 1.62.0 (CVE-2026-45292)
          uses: git/patch@v1
          work-dir: ${source.dir}/nessie
          with:
            patch: ${source.dir}/patch/opentelemetry-1.62.0.patch
        - name: force postgresql 42.7.11 and vert.x 4.5.27 (CVE-2026-42198, CVE-2026-6860)
          uses: git/patch@v1
          work-dir: ${source.dir}/nessie
          with:
            patch: ${source.dir}/patch/postgresql-vertx.patch
        - name: build
          work-dir: ${source.dir}/nessie
          privileged: true
          runs: |
            set -eux -o pipefail

            # Temporarily adding these flags to see if we can diagnose more Maven Central 429s
            ./gradlew :nessie-quarkus:clean :nessie-quarkus:quarkusBuild --stacktrace --info

            cp -r ${source.dir}/nessie/servers/quarkus-server/build/quarkus-app \
              ${target.dir}/quarkus-app
      paths:
        - type: file
          path: ${source.dir}/patch/jackson-core-2.21.1.patch
          uid: 0
          gid: 0
          source: image/nessie/patch/jackson-core-2.21.1.patch
        - type: file
          path: ${source.dir}/patch/netty-4.2.13.patch
          uid: 0
          gid: 0
          source: image/nessie/patch/netty-4.2.13.patch
        - type: file
          path: ${source.dir}/patch/opentelemetry-1.62.0.patch
          uid: 0
          gid: 0
          source: image/nessie/patch/opentelemetry-1.62.0.patch
        - type: file
          path: ${source.dir}/patch/postgresql-vertx.patch
          uid: 0
          gid: 0
          source: image/nessie/patch/postgresql-vertx.patch
        - type: file
          path: ${source.dir}/patch/test.patch
          uid: 0
          gid: 0
          source: image/nessie/patch/test.patch
      outputs:
        - source: ${target.dir}/quarkus-app
          target: /opt/quarkus-app
          uid: 10000
          gid: 10001
        - source: /opt/docker/sbom/nessie
          target: /opt/docker/sbom/nessie
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.11.10-debian13@sha256:d3c099f29d6d0a0b804d1a253186f5273af3a22c07de03b7e1370f0f27990b81
      includes:
        - opt/**
        - usr/local/bin/**
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nessie
      uid: 10000
      gid: 10001
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nessie
      gid: 10001
      members:
        - nessie
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /home/nessie
environment:
  AB_JOLOKIA_OFF: ""
  DEBIAN_FRONTEND: noninteractive
  JAVA_APP_JAR: /opt/quarkus-app/quarkus-run.jar
  LANGUAGE: en_US:en
paths:
  - type: directory
    path: /home/nessie
    uid: 10000
    gid: 10001
annotations:
  org.opencontainers.image.description: A minimal Nessie image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - java
  - -jar
  - /opt/quarkus-app/quarkus-run.jar
ports:
  - 19120/tcp
