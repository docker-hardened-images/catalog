            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/sigs.k8s.io/container-object-storage-interface
          with:
            deps:
              - golang.org/x/net@v0.45.0
              - google.golang.org/grpc@v1.82.1
            download: true
        - name: sync vendor directory
          work-dir: /go/src/sigs.k8s.io/container-object-storage-interface
          runs: |
            set -eux -o pipefail

            go mod vendor
        - name: test
          work-dir: /go/src/sigs.k8s.io/container-object-storage-interface/sidecar/cmd
          runs: |
            set -eux -o pipefail

            go test ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/sigs.k8s.io/container-object-storage-interface/sidecar/cmd
          caches:
