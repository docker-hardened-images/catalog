        - source: ${target.dir}/sidecar
          target: /sidecar
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/objectstorage-sidecar
          target: /opt/docker/sbom/objectstorage-sidecar
          uid: 0
          gid: 0
