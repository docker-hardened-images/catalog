# syntax=dhi.io/build:2-debian13

name: Obsidian MCP Server 0.2.x
image: dhi.io/mcp-obsidian
variant: runtime
tags:
  - "0"
  - "0.2"
  - 0.2.2
  - latest
  - 0-debian
  - 0-debian13
  - 0.2-debian
  - 0.2-debian13
  - 0.2.2-debian
  - 0.2.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  COMMIT_SHA: 32285e9ac07049a8a23ea7d7903603a3e48a1bf7
  PYTHON_DEV_REFERENCE: dhi/python:3.14.5-debian13-sfw-dev@sha256:8b32e63c47398398b90588eba16fd38811c0ce860535785eca4acbc243c00d02
  PYTHON_REFERENCE: dhi/python:3.14.5-debian13@sha256:4b669716481a34691219b9148cd81b27801111339a37fb0ebb2108149d4b99ca
  SEMVER_MAJOR_MINOR_VERSION: "0.2"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.2.2
  UV_VERSION: 0.11.17
  VERSION: 0.2.2
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: mcp-obsidian
      uses: dhi.io/python:3.14.5-debian13-sfw-dev@sha256:8b32e63c47398398b90588eba16fd38811c0ce860535785eca4acbc243c00d02
      environment:
        UV_COMPILE_BYTECODE: "1"
      contents:
        packages:
          - gzip
          - tar
        files:
          - url: https://github.com/astral-sh/uv/releases/download/0.11.17/uv-${ARCH}-unknown-linux-gnu.tar.gz
            path: ${source.dir}/uv-unknown-linux-gnu.tar.gz
            uid: 0
            gid: 0
          - url: git+https://github.com/MarkusPfundstein/mcp-obsidian.git#32285e9ac07049a8a23ea7d7903603a3e48a1bf7
            checksum: 32285e9ac07049a8a23ea7d7903603a3e48a1bf7
            path: ${source.dir}/mcp-obsidian
            spdx:
              name: mcp-obsidian
              version: 0.2.2
              packages:
                - name: mcp-obsidian
                  purl: pkg:dhi/mcp-obsidian@0.2.2
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: setup uv
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            tar -xzf "${source.dir}/uv-unknown-linux-gnu.tar.gz" -C /usr/local/bin --strip-components=1
            chmod +x /usr/local/bin/uv
        - name: move to /app
          runs: |
            set -eux -o pipefail

            cp -r "${source.dir}/mcp-obsidian" /app
        - name: build python package
          work-dir: /app
          privileged: true
          runs: |
            set -eux -o pipefail

            sfw uv lock --upgrade
            sfw uv sync --locked --no-install-project --no-dev --no-editable
            sfw uv sync --locked --no-dev --no-editable
      outputs:
        - source: /app/.venv
          target: /app/.venv
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/mcp-obsidian
          target: /opt/docker/sbom/mcp-obsidian
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.14.5-debian13@sha256:4b669716481a34691219b9148cd81b27801111339a37fb0ebb2108149d4b99ca
      excludes:
        - etc/group
        - etc/passwd
        - etc/shadow
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  PATH: /app/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
annotations:
  org.opencontainers.image.description: Obsidian MCP Server - Model Context Protocol server for Obsidian vaults
  org.opencontainers.image.licenses: MIT
labels:
  io.modelcontextprotocol.server.name: io.github.markuspfundstein/mcp-obsidian
entrypoint:
  - mcp-obsidian
