  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: grpc health probe
      work-dir: /go/src/github.com/grpc-ecosystem/grpc-health-probe
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/grpc-ecosystem/grpc-health-probe.git#v0.4.53
            checksum: 64350b746e427bb84b0f1bf3572dabe03a73fe0b
            path: /go/src/github.com/grpc-ecosystem/grpc-health-probe
            spdx:
              name: grpc-health-probe
              version: 0.4.53
              packages:
                - name: grpc-health-probe
                  purl: pkg:golang/github.com/grpc-ecosystem/grpc-health-probe@0.4.53
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/text@v0.39.0
              - golang.org/x/net@v0.56.0
              - google.golang.org/grpc@v1.82.1
            tidy: true
        - name: compile
          uses: go/build@v1
          with:
            ldflags:
              - -s
              - -w
              - -X main.versionTag=0.4.53
            output: ${target.dir}/usr/local/bin/grpc_health_probe
            packages: ./main.go
        - name: tests
          runs: |
            set -eux -o pipefail

            "${target.dir}/usr/local/bin/grpc_health_probe" --version
      outputs:
        - source: ${target.dir}/usr/local/bin/grpc_health_probe
          target: /usr/local/bin/grpc_health_probe
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/grpc-health-probe
          target: /opt/docker/sbom/grpc-health-probe
          uid: 0
          gid: 0
    - name: openfga
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/openfga/openfga.git#v1.18.1
            checksum: 69efbd95b3d44afb2e2567d485dcc792c7d79e3f
            path: /go/src/github.com/openfga/openfga
            spdx:
              name: openfga
              version: 1.18.1
              packages:
                - name: openfga
                  purl: pkg:golang/github.com/openfga/openfga@1.18.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/openfga/openfga
          with:
            deps:
              - golang.org/x/text@v0.39.0
              - golang.org/x/net@v0.56.0
              - google.golang.org/grpc@v1.82.1
            download: true
        - name: compile
          uses: go/build@v1
          work-dir: /go/src/github.com/openfga/openfga
          with:
            ldflags:
              - -X github.com/openfga/openfga/internal/build.Version=v1.18.1
              - -X github.com/openfga/openfga/internal/build.Commit=69efbd95b3d44afb2e2567d485dcc792c7d79e3f
              - -X github.com/openfga/openfga/internal/build.Date=$(date -u -d @${SOURCE_DATE_EPOCH} +%Y-%m-%dT%TZ)
              - -X github.com/openfga/openfga/internal/build.ProjectName=openfga
            output: ${target.dir}/usr/local/bin/openfga
            packages: ./cmd/openfga
        - name: tests
          work-dir: /go/src/github.com/openfga/openfga
          runs: |
            set -eux -o pipefail

            "${target.dir}/usr/local/bin/openfga" version
      outputs:
        - source: ${target.dir}/usr/local/bin/openfga
          target: /usr/local/bin/openfga
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/openfga
          target: /opt/docker/sbom/openfga
          uid: 0
          gid: 0
accounts:
