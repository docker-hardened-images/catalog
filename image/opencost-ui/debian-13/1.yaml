# syntax=dhi.io/build:2-debian13

name: OpenCost UI 1.x
image: dhi.io/opencost-ui
variant: runtime
tags:
  - "1"
  - "1.120"
  - 1.120.3
  - 1-debian
  - 1-debian13
  - 1.120-debian
  - 1.120-debian13
  - 1.120.3-debian
  - 1.120.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-09"
vars:
  COMMIT_SHA: 38b342b47b3cad332cc8157180f2a5866af55010
  NGINX_REFERENCE: dhi/nginx:1.31.1-debian13@sha256:4aca154cf2aaa8fe05bb6c156d963227c0498e756b40b97c86aa76685c5ec3e3
  NODE_BUILD_REFERENCE: dhi/node:20.20.2-debian13-dev@sha256:34d9db54ee36826c8033fe6c3cd84bde9022f0259f069cf20a5d56d4618987fe
  SEMVER_MAJOR_MINOR_VERSION: "1.120"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.120.3
  VERSION: 1.120.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - bash
    - ca-certificates-bundle
    - coreutils
    - findutils
    - gettext-base
    - sed
    - tzdata
  builds:
    - name: opencost-ui
      uses: dhi.io/node:20.20.2-debian13-dev@sha256:34d9db54ee36826c8033fe6c3cd84bde9022f0259f069cf20a5d56d4618987fe
      work-dir: ${source.dir}/opencost-ui
      caches:
        - path: ${source.dir}/opencost-ui/node_modules
      contents:
        packages:
          - less
        files:
          - url: git+https://github.com/opencost/opencost-ui.git#v1.120.3
            checksum: 38b342b47b3cad332cc8157180f2a5866af55010
            path: ${source.dir}/opencost-ui
            spdx:
              name: opencost-ui
              version: 1.120.3
              packages:
                - name: opencost-ui
                  purl: pkg:github/opencost/opencost-ui@v1.120.3
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump dependencies
          uses: npm/bump@v1
          privileged: true
          environment:
            DHI_NO_SFW: "true"
          with:
            bumps: ${source.dir}/patch/npm-bumps.json
            npm-root: ${source.dir}/opencost-ui
        - name: bump react-router family
          privileged: true
          runs: |
            set -eux -o pipefail

            # Drop the stale react-router family entries from the lockfile so the
            # install below re-resolves the whole family fresh at 7.15.0 (whose
            # inter-package peers are mutually consistent), instead of fighting a
            # 7.12.0 -> 7.15.0 transition against the pinned-7.12.0 lock.
            tmp=$(mktemp)
            jq 'del(.packages["node_modules/react-router","node_modules/@react-router/node","node_modules/@react-router/serve","node_modules/@react-router/dev"])' \
              package-lock.json > "$tmp" && mv "$tmp" package-lock.json

            npm install --fund=false --audit=false \
              react-router@7.15.0 \
              @react-router/node@7.15.0 \
              @react-router/serve@7.15.0 \
              @react-router/dev@7.15.0
        - name: install dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

            npm ci
        - name: build standard UI
          runs: |
            set -eux -o pipefail

            # Standard (non-legacy) build — output lands in build/client/
            NODE_ENV=production npm run build
            mkdir -p "${target.dir}/var/www"
            cp -r build/client/. "${target.dir}/var/www/"
        - name: build legacy UI
          runs: |
            set -eux -o pipefail

            # Legacy build overwrites build/client/; copy separately.
            VITE_LEGACY_MODE=true NODE_ENV=production npm run build:legacy
            mkdir -p "${target.dir}/var/www/legacy"
            cp -r build/client/. "${target.dir}/var/www/legacy/"
        - name: prepare for sbom
          runs: |
            set -eux -o pipefail

            # Add resolved version to package.json for accurate SBOM generation.
            tmp=$(mktemp)
            jq --arg version "1.120.3" '.version = $version' package.json > "$tmp" && mv "$tmp" package.json
        - name: reinstall dependencies for sbom
          privileged: true
          runs: |
            set -eux -o pipefail

            # Clean and reinstall only production dependencies for accurate SBOM.
            rm -rf node_modules
            npm install --omit=dev --ignore-scripts
        - name: generate sbom
          uses: sbom@v1
          with:
            prefix: opencost-ui
            source: ${source.dir}/opencost-ui
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/opencost-ui/patch
      outputs:
        - source: ${target.dir}/var/www
          target: /var/www
          uid: 65532
          gid: 65532
          mode: "0755"
        - source: ${target.dir}/var/www/legacy
          target: /var/www/legacy
          uid: 65532
          gid: 65532
          mode: "0755"
        - source: /opt/docker/sbom/opencost-ui
          target: /opt/docker/sbom/opencost-ui
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/nginx:1.31.1-debian13@sha256:4aca154cf2aaa8fe05bb6c156d963227c0498e756b40b97c86aa76685c5ec3e3
      excludes:
        - usr/lib/ssl/certs
        - usr/lib/ssl/private
        - usr/share/nginx/html/**
      uid: 65532
      gid: 65532
accounts:
  run-as: nginx
  users:
    - name: nginx
      uid: 65532
      gid: 65532
  groups:
    - name: nginx
      gid: 65532
      members:
        - nginx
    - name: www-data
      gid: 82
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  API_PORT: "9003"
  API_SERVER: 0.0.0.0
  BASE_URL: /model
  HEAD: 38b342b47b3cad332cc8157180f2a5866af55010
  LEGACY_MODE: "false"
  PROXY_CONNECT_TIMEOUT: 60s
  PROXY_READ_TIMEOUT: 60s
  PROXY_SEND_TIMEOUT: 60s
  UI_PATH: /
  UI_PORT: "9090"
  VERSION: 1.120.3
paths:
  - type: directory
    path: /run/nginx
    uid: 65532
    gid: 65532
    mode: "0777"
  - type: directory
    path: /var/cache/nginx
    uid: 65532
    gid: 65532
    mode: "0777"
  - type: file
    path: /etc/nginx/nginx.conf
    uid: 65532
    gid: 65532
    mode: "0644"
    source: image/opencost-ui/config/nginx.conf
  - type: file
    path: /etc/nginx/conf.d/default.nginx.conf.template
    uid: 65532
    gid: 65532
    mode: "0644"
    source: image/opencost-ui/config/default.nginx.conf.template
  - type: file
    path: /usr/local/bin/docker-entrypoint.sh
    uid: 65532
    gid: 65532
    mode: "0755"
    source: image/opencost-ui/entrypoint/docker-entrypoint.sh
annotations:
  org.opencontainers.image.description: A minimal OpenCost UI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/docker-entrypoint.sh
cmd:
  - nginx
  - -g
  - daemon off;
ports:
  - 9090/tcp
