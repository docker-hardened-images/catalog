# syntax=dhi.io/build:2-debian13

name: Stakater Reloader 1.x (dev)
image: dhi.io/stakater-reloader
variant: dev
tags:
  - 1-dev
  - 1.4-dev
  - 1.4.19-dev
  - v1.4.19-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.4-debian-dev
  - 1.4-debian13-dev
  - 1.4.19-debian-dev
  - 1.4.19-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "amd64" : "arm64" }'
  COMMIT_SHA: 430c1efb706b45c41b72f99abdffaa7d5df61620
  SEMVER_MAJOR_MINOR_VERSION: "1.4"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.4.19
  VERSION: 1.4.19
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!gcc-14'
    - '!libelogind0'
    - '!libslang2'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: go
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/stakater/Reloader.git#v1.4.19
            checksum: 430c1efb706b45c41b72f99abdffaa7d5df61620
            path: /go/src/github.com/stakater/Reloader
            spdx:
              name: reloader
              version: 1.4.19
              packages:
                - name: reloader
                  purl: pkg:golang/github.com/stakater/Reloader@1.4.19
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/stakater/Reloader
          with:
            deps:
              - golang.org/x/net@v0.55.0
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/stakater/Reloader
          with:
            ldflags:
              - -X github.com/stakater/Reloader/main.Version=1.4.19
            output: ${target.dir}/usr/local/bin/Reloader
      outputs:
        - source: ${target.dir}/usr/local/bin/Reloader
          target: /usr/local/bin/Reloader
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/reloader
          target: /opt/docker/sbom/reloader
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal stakater/reloader image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - Reloader
