# syntax=dhi.io/build:2-debian13

name: VictoriaMetrics VMInsert 1.x (dev)
image: dhi.io/victoriametrics-vminsert
variant: dev
tags:
  - 1-dev
  - 1.146-dev
  - 1.146.0-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.146-debian-dev
  - 1.146-debian13-dev
  - 1.146.0-debian-dev
  - 1.146.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: e8cfb1e17236a7df5770fce768e29e48f1ccf49a
  SEMVER_MAJOR_MINOR_VERSION: "1.146"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.146.0
  VERSION: 1.146.0-cluster
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: victoriametrics-vminsert
      work-dir: /go/src/github.com/VictoriaMetrics/VictoriaMetrics
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/VictoriaMetrics/VictoriaMetrics.git#v1.146.0-cluster
            checksum: e8cfb1e17236a7df5770fce768e29e48f1ccf49a
            path: /go/src/github.com/VictoriaMetrics/VictoriaMetrics
            spdx:
              name: victoriametrics-vminsert
              version: 1.146.0-cluster
              packages:
                - name: victoriametrics-vminsert
                  purl: pkg:golang/github.com/VictoriaMetrics/VictoriaMetrics@1.146.0-cluster
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          work-dir: /go/src/github.com/VictoriaMetrics/VictoriaMetrics
          with:
            deps: []
        - uses: go/hermetic@v1
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test ./lib/... ./app/...
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X 'github.com/VictoriaMetrics/VictoriaMetrics/lib/buildinfo.Version=vminsert-1.146.0-cluster'
            output: ${target.dir}/usr/local/bin/vminsert
            packages: ./app/vminsert
      outputs:
        - source: ${target.dir}/usr/local/bin/vminsert
          target: /usr/local/bin/vminsert
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/victoriametrics-vminsert
          target: /opt/docker/sbom/victoriametrics-vminsert
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal VictoriaMetrics VMInsert image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/vminsert
ports:
