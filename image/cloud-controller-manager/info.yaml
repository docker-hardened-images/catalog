metadata:
  display-name: Kubernetes Cloud Controller Manager (cloud-controller-manager)
  short-description: |
    Runs cloud-provider-specific control loops in the Kubernetes control plane.

    cloud-controller-manager embeds the cloud-specific control loops that integrate
    a Kubernetes cluster with the underlying cloud provider's APIs.
  featured: false
  home-url: https://kubernetes.io/
  categories:
    - developer-tools
