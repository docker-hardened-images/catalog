# syntax=dhi.io/build:2-debian13

name: AWS Mountpoint S3 CSI Driver 2.x
image: dhi.io/aws-mountpoint-s3-csi-driver
variant: runtime
tags:
  - "2"
  - "2.7"
  - 2.7.0
  - 2-debian
  - 2-debian13
  - 2.7-debian
  - 2.7-debian13
  - 2.7.0-debian
  - 2.7.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-01-07"
vars:
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:c15d7b64f2933c44a0572422287bfa97eb43bfb1c5e15c1b82e997bc5a1ba16d
  COMMIT_SHA: a2d4b067c1bbe3c171e1431cd063cfb59f672d95
  GOLANG_REFERENCE: dhi/golang:1.26.4-debian13-dev@sha256:9a675e23c51e343854caccdcf56c40a9f39b5c3024ca02ae045b48786d0d7a42
  MOUNTPOINT_VERSION: 1.22.0
  MP_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "arm64" }'
  SEMVER_MAJOR_MINOR_VERSION: "2.7"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.7.0
  VERSION: 2.7.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!base-files'
    - libfuse2t64
    - mount
    - zlib1g
  builds:
    - name: mountpoint-s3
      contents:
        packages:
          - bash
          - coreutils
          - gpg
          - gpg-agent
          - grep
          - gzip
          - tar
        files:
          - url: https://s3.amazonaws.com/mountpoint-s3-release/public_keys/KEYS
            path: ${source.dir}/KEYS
            uid: 0
            gid: 0
          - url: https://s3.amazonaws.com/mountpoint-s3-release/1.22.0/${MP_ARCH}/mount-s3-1.22.0-${MP_ARCH}.tar.gz
            path: ${source.dir}/mount-s3.tar.gz
            spdx:
              name: mountpoint-s3
              version: 1.22.0
              packages:
                - name: mountpoint-s3
                  purl: pkg:github/awslabs/mountpoint-s3@1.22.0
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://s3.amazonaws.com/mountpoint-s3-release/1.22.0/${MP_ARCH}/mount-s3-1.22.0-${MP_ARCH}.tar.gz.asc
            path: ${source.dir}/mount-s3.tar.gz.asc
            uid: 0
            gid: 0
      pipeline:
        - name: verify mount-s3 signature
          uses: gpg/verify@v1
          with:
            file: ${source.dir}/mount-s3.tar.gz
            keys: ${source.dir}/KEYS
            signature: ${source.dir}/mount-s3.tar.gz.asc
        - name: extract mount-s3
          runs: |
            set -eux -o pipefail

            tar -xzf "${source.dir}/mount-s3.tar.gz" -C "${source.dir}"
            mkdir -p "${target.dir}/usr/bin"
            cp "${source.dir}/bin/mount-s3" "${target.dir}/usr/bin/mount-s3"
      outputs:
        - source: ${target.dir}/usr/bin/mount-s3
          target: /usr/bin/mount-s3
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/mountpoint-s3
          target: /opt/docker/sbom/mountpoint-s3
          uid: 0
          gid: 0
    - name: aws-mountpoint-s3-csi-driver
      uses: dhi.io/golang:1.26.4-debian13-dev@sha256:9a675e23c51e343854caccdcf56c40a9f39b5c3024ca02ae045b48786d0d7a42
      work-dir: /go/src/github.com/awslabs/mountpoint-s3-csi-driver
      environment:
        LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu:/usr/lib/aarch64-linux-gnu
      contents:
        packages:
          - zlib1g
        files:
          - url: git+https://github.com/awslabs/mountpoint-s3-csi-driver.git#v2.7.0
            checksum: a2d4b067c1bbe3c171e1431cd063cfb59f672d95
            path: /go/src/github.com/awslabs/mountpoint-s3-csi-driver
            spdx:
              name: aws-mountpoint-s3-csi-driver
              version: 2.7.0
              packages:
                - name: aws-mountpoint-s3-csi-driver
                  purl: pkg:golang/github.com/awslabs/mountpoint-s3-csi-driver@2.7.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (2 only)
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - google.golang.org/grpc@v1.79.3
            tidy: true
        - uses: go/hermetic@v1
        - name: test
          runs: |
            set -eux -o pipefail

            # Run unit tests for cmd and pkg (skip mounter tests - they require Unix sockets)
            go test -v ./cmd/... $(go list ./pkg/... | grep -v 'pkg/driver/node/mounter$')

            # Skip controller tests - we don't implement controller for static provisioning
            go test -v ./tests/sanity/... -ginkgo.skip="ControllerGetCapabilities" -ginkgo.skip="ValidateVolumeCapabilities" -ginkgo.skip="should remove target path"
        - name: build aws-s3-csi-driver
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/awslabs/mountpoint-s3-csi-driver/pkg/driver/version.driverVersion=2.7.0
              - -X github.com/awslabs/mountpoint-s3-csi-driver/pkg/driver/version.gitCommit=a2d4b067c1bbe3c171e1431cd063cfb59f672d95
              - -X github.com/awslabs/mountpoint-s3-csi-driver/pkg/driver/version.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/local/bin/aws-s3-csi-driver
            packages: ./cmd/aws-s3-csi-driver
        - name: build aws-s3-csi-controller
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/awslabs/mountpoint-s3-csi-driver/pkg/driver/version.driverVersion=2.7.0
              - -X github.com/awslabs/mountpoint-s3-csi-driver/pkg/driver/version.gitCommit=a2d4b067c1bbe3c171e1431cd063cfb59f672d95
              - -X github.com/awslabs/mountpoint-s3-csi-driver/pkg/driver/version.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/local/bin/aws-s3-csi-controller
            packages: ./cmd/aws-s3-csi-controller
        - name: build aws-s3-csi-mounter
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/awslabs/mountpoint-s3-csi-driver/pkg/driver/version.driverVersion=2.7.0
              - -X github.com/awslabs/mountpoint-s3-csi-driver/pkg/driver/version.gitCommit=a2d4b067c1bbe3c171e1431cd063cfb59f672d95
              - -X github.com/awslabs/mountpoint-s3-csi-driver/pkg/driver/version.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/local/bin/aws-s3-csi-mounter
            packages: ./cmd/aws-s3-csi-mounter
      outputs:
        - source: ${target.dir}/usr/local/bin/aws-s3-csi-driver
          target: /usr/bin/aws-s3-csi-driver
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/aws-s3-csi-controller
          target: /usr/bin/aws-s3-csi-controller
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/aws-s3-csi-mounter
          target: /usr/bin/aws-s3-csi-mounter
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/aws-mountpoint-s3-csi-driver
          target: /opt/docker/sbom/aws-mountpoint-s3-csi-driver
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-glibc-debian13@sha256:c15d7b64f2933c44a0572422287bfa97eb43bfb1c5e15c1b82e997bc5a1ba16d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  MOUNTPOINT_BIN_DIR: /usr/bin
  MOUNTPOINT_VERSION: 1.22.0
annotations:
  org.opencontainers.image.description: A minimal AWS Mountpoint for Amazon S3 CSI Driver image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/aws-s3-csi-driver
