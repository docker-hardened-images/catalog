# syntax=dhi.io/build:2-debian13

name: WireMock GUI 3.x (dev)
image: dhi.io/wiremock-gui
variant: dev
tags:
  - 3-dev
  - 3.13-dev
  - 3-debian-dev
  - 3-debian13-dev
  - 3.13-debian-dev
  - 3.13-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2023-08-23"
vars:
  COMMIT_SHA: ed8592d9dfe3ba4165fb0f00b8a66ada52a3c24f
  GRADLE_REFERENCE: dhi/gradle:8.14.5-jdk17-debian13-dev@sha256:7633899d0be0d7b151bee39c198091904db0a81f83ed853b49ad1429550566a8
  GRADLE_VERSION: 8.14.5
  JAVA_HOME_PATH: /opt/java/openjdk/17-jre
  JAVA_MAJOR_VERSION: "17"
  JRE_REFERENCE: dhi/eclipse-temurin:17.0.19.10-debian13@sha256:662dc35b17b9de4db61f914af1012e2051147bc8a6d33c4b6d5f183dee80b8c0
  JRE_VERSION: 17.0.19.10
  SEMVER_MAJOR_MINOR_VERSION: "3.13"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.13.178
  VERSION: 3.13.178
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: wiremock-gui
      uses: dhi.io/gradle:8.14.5-jdk17-debian13-dev@sha256:7633899d0be0d7b151bee39c198091904db0a81f83ed853b49ad1429550566a8
      work-dir: ${source.dir}/wiremock-gui
      caches:
        - path: /root/.gradle
        - path: /root/.npm
      contents:
        packages:
          - bash
          - coreutils
          - findutils
          - git
          - jq
          - libatomic1
          - libc6
          - libstdc++6
          - nodejs
          - npm
        files:
          - url: git+https://github.com/holomekc/wiremock.git#3.13.178
            checksum: ed8592d9dfe3ba4165fb0f00b8a66ada52a3c24f
            path: ${source.dir}/wiremock-gui
            spdx:
              name: wiremock-gui
              version: 3.13.178
              packages:
                - name: wiremock-gui
                  purl: pkg:github/holomekc/wiremock@3.13.178
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: prepare npm resolution for the forced angular bump
          work-dir: ${source.dir}/wiremock-gui/webapp/wiremock
          runs: |
            set -eux -o pipefail

            printf 'force=true\n' > .npmrc
        - name: pin patched webapp dependencies for cve remediation
          uses: npm/bump@v1
          privileged: true
          environment:
            npm_config_ignore_scripts: "true"
          with:
            bumps: ${source.dir}/patch/npm-bumps.json
            npm-root: ${source.dir}/wiremock-gui/webapp/wiremock
        - name: build
          privileged: true
          runs: |
            set -eux -o pipefail

            export GRADLE_HOME="/opt/java/gradle/gradle-8.14.5"
            export PATH="${GRADLE_HOME}/bin:${PATH}"
            gradle shadowJar --no-daemon --console=plain \
              -x spotlessCheck -x spotlessJavaCheck -x spotlessJava
        - name: install production dependencies for sbom
          work-dir: ${source.dir}/wiremock-gui/webapp/wiremock
          privileged: true
          runs: |
            set -eux -o pipefail

            rm -rf node_modules
            npm install --omit=dev --ignore-scripts
        - name: ui sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: wiremock-gui-ui
            source: ${source.dir}/wiremock-gui/webapp/wiremock/node_modules
        - name: install
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/local/bin"
            mkdir -p "${target.dir}/etc/wiremock"
            find build/libs -name "wiremock-standalone*.jar" -type f | head -1 | xargs -I {} cp {} "${target.dir}/usr/local/bin/wiremock-standalone.jar"
      paths:
        - type: file
          path: ${source.dir}/patch/npm-bumps.json
          uid: 0
          gid: 0
          source: image/wiremock-gui/patch/npm-bumps.json
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/etc/wiremock
          target: /etc/wiremock
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/wiremock-gui-ui
          target: /opt/docker/sbom/wiremock-gui-ui
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:17.0.19.10-debian13@sha256:662dc35b17b9de4db61f914af1012e2051147bc8a6d33c4b6d5f183dee80b8c0
      includes:
        - opt/**
        - usr/local/bin/**
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /home/wiremock
environment:
  DEBIAN_FRONTEND: noninteractive
  JAVA_HOME: /opt/java/openjdk/17-jre
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  PATH: /usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: directory
    path: /home/wiremock
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /home/wiremock/__files
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /home/wiremock/mappings
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal WireMock GUI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - java
cmd:
  - -jar
  - /usr/local/bin/wiremock-standalone.jar
ports:
  - 8080/tcp
  - 8443/tcp
