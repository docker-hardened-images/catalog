# syntax=dhi.io/build:2-debian13

name: OpenBao 2.x (dev)
image: dhi.io/openbao
variant: dev
tags:
  - 2-dev
  - 2.5-dev
  - 2.5.3-dev
  - 2-debian13-dev
  - 2.5-debian13-dev
  - 2.5.3-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-05"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 988c88d7ef54b4d4581629b229488dfba5e085ba
  GOLANG_REFERENCE: dhi/golang:1.25.10-debian13-dev@sha256:375eb677024bb497cf14a3a63048d5b63e800451878d3fca7a3dd5970b9baec0
  SEMVER_MAJOR_MINOR_VERSION: "2.5"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.5.3
  VERSION: 2.5.3
contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: openbao-go
      uses: dhi.io/golang:1.25.10-debian13-dev@sha256:375eb677024bb497cf14a3a63048d5b63e800451878d3fca7a3dd5970b9baec0
      work-dir: /go/src/github.com/openbao/openbao
      contents:
        packages:
          - binutils
          - binutils-gold
        files:
          - url: git+https://github.com/openbao/openbao.git#v2.5.3
            checksum: 988c88d7ef54b4d4581629b229488dfba5e085ba
            path: /go/src/github.com/openbao/openbao
            spdx:
              name: openbao
              version: 2.5.3
              packages:
                - name: openbao
                  purl: pkg:dhi/openbao@2.5.3
                  license: MPL-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v1
          with:
            deps:
              - github.com/cloudflare/circl@v1.6.3
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - go.opentelemetry.io/otel/sdk@v1.43.0
            download: true
        - uses: go/hermetic@v1
        - name: grab static files
          runs: |
            set -eux -o pipefail

            cp /go/src/github.com/openbao/openbao/LICENSE "${target.dir}/LICENSE"
        - name: generate
          runs: |
            set -eux -o pipefail

            go generate ./...
        - name: bootstrap
          privileged: true
          runs: |
            set -eux -o pipefail

            # Retry bootstrap to handle transient network errors from proxy.golang.org
            for attempt in 1 2 3; do
              if make bootstrap; then
                break
              elif [ "$attempt" -eq 3 ]; then
                echo "Bootstrap failed after 3 attempts" >&2
                exit 1
              else
                echo "Bootstrap attempt $attempt failed, retrying..." >&2
                sleep 5
              fi
            done
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X github.com/openbao/openbao/version.fullVersion=2.5.3
              - -X github.com/openbao/openbao/version.GitCommit=988c88d7ef54b4d4581629b229488dfba5e085ba
              - -X github.com/openbao/openbao/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
            output: ${target.dir}/usr/local/bin/bao
      outputs:
        - source: ${target.dir}/LICENSE
          target: /licenses/mozilla.txt
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/bao
          target: /usr/local/bin/bao
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/openbao
          target: /opt/docker/sbom/openbao
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: openbao
      uid: 1000
      gid: 1000
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: openbao
      gid: 1000
      members:
        - openbao
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /openbao
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /openbao/logs
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /openbao/file
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /openbao/config
    uid: 1000
    gid: 1000
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal OpenBao image
  org.opencontainers.image.licenses: MPL-2.0
entrypoint:
  - bao
cmd:
  - server
  - -config=/openbao/config
ports:
  - 8200/tcp
