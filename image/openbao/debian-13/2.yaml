# syntax=dhi.io/build:2-debian13

name: OpenBao 2.x
image: dhi.io/openbao
variant: runtime
tags:
  - "2"
  - "2.6"
  - 2.6.1
  - 2-debian
  - 2-debian13
  - 2.6-debian
  - 2.6-debian13
  - 2.6.1-debian
  - 2.6.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-05"
vars:
  COMMIT_SHA: ba7ad8861d0578cd4da4f7b9e5a6756d30484f8f
  SEMVER_MAJOR_MINOR_VERSION: "2.6"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.6.1
  VERSION: 2.6.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: openbao-go
      work-dir: /go/src/github.com/openbao/openbao
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - binutils
          - binutils-gold
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - make
          - mawk
          - sed
        files:
          - url: git+https://github.com/openbao/openbao.git#v2.6.1
            checksum: ba7ad8861d0578cd4da4f7b9e5a6756d30484f8f
            path: /go/src/github.com/openbao/openbao
            spdx:
              name: openbao
              version: 2.6.1
              packages:
                - name: openbao
                  purl: pkg:dhi/openbao@2.6.1
                  license: MPL-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v1
          with:
            deps:
              - github.com/Azure/go-ntlmssp@v0.1.1
              - github.com/cloudflare/circl@v1.6.3
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - google.golang.org/grpc@v1.82.1
            download: true
        - uses: go/hermetic@v1
        - name: grab static files
          runs: |
            set -eux -o pipefail

            cp /go/src/github.com/openbao/openbao/LICENSE "${target.dir}/LICENSE"
        - name: generate
          runs: |
            set -eux -o pipefail

            go generate ./...
        - name: bootstrap
          privileged: true
          runs: |
            set -eux -o pipefail

            # Retry bootstrap to handle transient network errors from proxy.golang.org
            for attempt in 1 2 3; do
              if make bootstrap; then
                break
              elif [ "$attempt" -eq 3 ]; then
                echo "Bootstrap failed after 3 attempts" >&2
                exit 1
              else
                echo "Bootstrap attempt $attempt failed, retrying..." >&2
                sleep 5
              fi
            done
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X github.com/openbao/openbao/version.fullVersion=2.6.1
              - -X github.com/openbao/openbao/version.GitCommit=ba7ad8861d0578cd4da4f7b9e5a6756d30484f8f
              - -X github.com/openbao/openbao/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
            output: ${target.dir}/usr/local/bin/bao
      outputs:
        - source: ${target.dir}/LICENSE
          target: /licenses/mozilla.txt
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/bao
          target: /usr/local/bin/bao
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/openbao
          target: /opt/docker/sbom/openbao
          uid: 0
          gid: 0
accounts:
  run-as: openbao
  users:
    - name: openbao
      uid: 1000
      gid: 1000
  groups:
    - name: openbao
      gid: 1000
      members:
        - openbao
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /openbao
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /openbao/logs
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /openbao/file
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /openbao/config
    uid: 1000
    gid: 1000
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal OpenBao image
  org.opencontainers.image.licenses: MPL-2.0
entrypoint:
  - bao
cmd:
  - server
  - -config=/openbao/config
ports:
  - 8200/tcp
