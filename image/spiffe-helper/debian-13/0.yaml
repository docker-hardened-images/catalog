# syntax=dhi.io/build:2-debian13

name: SPIFFE Helper 0.x
image: dhi.io/spiffe-helper
variant: runtime
tags:
  - "0"
  - "0.11"
  - 0.11.0
  - 0-debian
  - 0-debian13
  - 0.11-debian
  - 0.11-debian13
  - 0.11.0-debian
  - 0.11.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2023-02-27"
vars:
  COMMIT_SHA: 1d0551d63787b528926b3e17fac949a376040bec
  SEMVER_MAJOR_MINOR_VERSION: "0.11"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.11.0
  VERSION: 0.11.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: spiffe-helper
      work-dir: /go/src/github.com/spiffe/spiffe-helper
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/spiffe/spiffe-helper.git#v0.11.0
            checksum: 1d0551d63787b528926b3e17fac949a376040bec
            path: /go/src/github.com/spiffe/spiffe-helper
            spdx:
              name: spiffe-helper
              version: 0.11.0
              packages:
                - name: spiffe-helper
                  purl: pkg:golang/github.com/spiffe/spiffe-helper@0.11.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/text@v0.39.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - google.golang.org/grpc@v1.82.1
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            EXCLUDES='/pkg/sidecar'
            PKGS=$(go list ./... | egrep -v "${EXCLUDES}")
            CGO_ENABLED=0 go test -short -count=1 -v $PKGS
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -s
              - -w
              - -X github.com/spiffe/spiffe-helper/pkg/version.gittag=0.11.0
              - -X github.com/spiffe/spiffe-helper/pkg/version.githash=1d0551d63787b528926b3e17fac949a376040bec
            output: ${target.dir}/usr/local/bin/spiffe-helper
            packages: ./cmd/spiffe-helper
      outputs:
        - source: ${target.dir}/usr/local/bin/spiffe-helper
          target: /usr/local/bin/spiffe-helper
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/spiffe-helper
          target: /opt/docker/sbom/spiffe-helper
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /spiffe-helper
    uid: 0
    gid: 0
    source: /usr/local/bin/spiffe-helper
annotations:
  org.opencontainers.image.description: A minimal SPIFFE Helper image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /spiffe-helper
