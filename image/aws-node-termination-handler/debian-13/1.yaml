# syntax=dhi.io/build:2-debian13

name: AWS Node Termination Handler 1.x
image: dhi.io/aws-node-termination-handler
variant: runtime
tags:
  - "1"
  - "1.25"
  - 1.25.6
  - 1-debian
  - 1-debian13
  - 1.25-debian
  - 1.25-debian13
  - 1.25.6-debian
  - 1.25.6-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-02-28"
vars:
  COMMIT_SHA: 77ca841d1329504e981542775f78403feb114048
  SEMVER_MAJOR_MINOR_VERSION: "1.25"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.25.6
  VERSION: 1.25.6
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: aws-node-termination-handler
      work-dir: /go/src/github.com/aws/aws-node-termination-handler
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/aws/aws-node-termination-handler.git#v1.25.6
            checksum: 77ca841d1329504e981542775f78403feb114048
            path: /go/src/github.com/aws/aws-node-termination-handler
            spdx:
              name: aws-node-termination-handler
              version: 1.25.6
              packages:
                - name: aws-node-termination-handler
                  purl: pkg:golang/github.com/aws/aws-node-termination-handler@1.25.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.56.0
              - golang.org/x/text@v0.39.0
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel@v1.41.0
            download: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -short ./cmd/... -count=1 -v
        - name: build
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/node-termination-handler
            packages: ./cmd
            strip: true
            tags: nthlinux
      outputs:
        - source: ${target.dir}/usr/local/bin/node-termination-handler
          target: /usr/local/bin/node-termination-handler
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/aws-node-termination-handler
          target: /opt/docker/sbom/aws-node-termination-handler
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /node-termination-handler
    uid: 0
    gid: 0
    source: /usr/local/bin/node-termination-handler
annotations:
  org.opencontainers.image.description: A minimal AWS Node Termination Handler image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/node-termination-handler
