# syntax=dhi.io/build:2-debian13

name: Nginx Ingress 5.x
image: dhi.io/nginx-ingress
variant: runtime
tags:
  - "5"
  - "5.5"
  - 5.5.3
  - 5-debian
  - 5-debian13
  - 5.5-debian
  - 5.5-debian13
  - 5.5.3-debian
  - 5.5.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-04-16"
vars:
  COMMIT_SHA: 202a0bc8052675ed78908f968d3eda410c9da4d5
  NGINX_AGENT_COMMIT_SHA: 4a95e5301c7d06a6b7c75971868bd508b724dfab
  NGINX_AGENT_VERSION: 3.8.0
  SEMVER_MAJOR_MINOR_VERSION: "5.5"
  SEMVER_MAJOR_VERSION: "5"
  SEMVER_VERSION: 5.5.3
  VERSION: 5.5.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - ca-certificates
    - coreutils
    - dash
    - libc6
    - libcrypt1
    - libgcc-s1
    - libgrpc++1.51t64
    - libgrpc29t64
    - libpcre2-8-0
    - libprotobuf32t64
    - libssl3t64
    - libstdc++6
    - libxml2
    - nginx-mainline
    - nginx-mainline-module-njs
    - nginx-mainline-module-otel
    - opentelemetry-cpp
    - zlib1g
  builds:
    - name: setcap nginx
      contents:
        repositories:
          - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
        keyring:
          - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
        packages:
          - bash
          - base-files
          - coreutils
          - libcap2-bin
          - nginx-mainline
      pipeline:
        - name: setcap
          runs: |
            set -eux -o pipefail

            setcap 'cap_net_bind_service=+eip' /usr/sbin/nginx
            setcap -v 'cap_net_bind_service=+eip' /usr/sbin/nginx

            # nginx-debug ships in nginx-mainline alongside nginx and upstream
            # grants it the same capability so debug builds can also bind
            # privileged ports.
            setcap 'cap_net_bind_service=+eip' /usr/sbin/nginx-debug
            setcap -v 'cap_net_bind_service=+eip' /usr/sbin/nginx-debug

            chown -R 101:0 /etc/nginx
            chmod -R g+w /etc/nginx
      outputs:
        - source: /usr/sbin/nginx
          target: /usr/sbin/nginx
          uid: 0
          gid: 0
        - source: /usr/sbin/nginx-debug
          target: /usr/sbin/nginx-debug
          uid: 0
          gid: 0
        - source: /etc/nginx
          target: /etc/nginx
          uid: 101
          gid: 0
    - name: build nginx-agent
      work-dir: /go/src/github.com/nginx/agent
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/nginx/agent.git#v3.8.0
            checksum: 4a95e5301c7d06a6b7c75971868bd508b724dfab
            path: /go/src/github.com/nginx/agent
            spdx:
              name: nginx-agent
              version: 3.8.0
              packages:
                - name: nginx-agent
                  purl: pkg:golang/nginx/agent@3.8.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/antchfx/xpath@v1.3.6
              - go.opentelemetry.io/collector/pdata/xpdata@v0.148.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
              - github.com/prometheus/prometheus@v0.311.3
            download: true
        - uses: go/hermetic@v1
        - name: build go
          uses: go/build@v1
          with:
            extra-args: -pgo=default.pgo
            ldflags:
              - -X main.version=3.8.0
              - -X main.commit=4a95e5301c7d06a6b7c75971868bd508b724dfab
              - -X main.date=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/nginx-agent
            packages: ./cmd/agent
        - name: setup config
          runs: |
            set -eux -o pipefail

            cp -a /go/src/github.com/nginx/agent/nginx-agent.conf "${target.dir}/nginx-agent.conf"
      outputs:
        - source: ${target.dir}/nginx-agent
          target: /usr/bin/nginx-agent
          uid: 0
          gid: 0
        - source: ${target.dir}/nginx-agent.conf
          target: /etc/nginx-agent/nginx-agent.conf
          uid: 0
          gid: 0
          mode: "0640"
        - source: /opt/docker/sbom/nginx-agent
          target: /opt/docker/sbom/nginx-agent
          uid: 0
          gid: 0
    - name: nginx-ingress
      work-dir: /go/src/github.com/nginx/kubernetes-ingress
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - git
          - libcap2-bin
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/nginx/kubernetes-ingress.git#v5.5.3
            checksum: 202a0bc8052675ed78908f968d3eda410c9da4d5
            path: /go/src/github.com/nginx/kubernetes-ingress
            spdx:
              name: nginx-ingress
              version: 5.5.3
              packages:
                - name: nginx-ingress
                  purl: pkg:golang/nginx/nginx-ingress@5.5.3
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump go dependencies
          uses: go/bump@v2
          with:
            deps:
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.44.0
            download: true
        - uses: go/hermetic@v1
        - name: build go
          uses: go/build@v1
          with:
            output: ${target.dir}/nginx-ingress
            packages: ./cmd/nginx-ingress
        - name: setcap
          runs: |
            set -eux -o pipefail

            setcap 'cap_net_bind_service=+ep' "${target.dir}/nginx-ingress"
            setcap -v 'cap_net_bind_service=+ep' "${target.dir}/nginx-ingress"
        - name: setup dirs and configs
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/etc/nginx/njs"
            cp -a internal/configs/njs/* "${target.dir}/etc/nginx/njs"

            mkdir -p "${target.dir}/configs"
            cp -a internal/configs/version1/nginx.ingress.tmpl \
              internal/configs/version1/nginx.tmpl \
              internal/configs/version2/nginx.virtualserver.tmpl \
              internal/configs/version2/nginx.transportserver.tmpl \
              "${target.dir}/configs"
      outputs:
        - source: ${target.dir}/nginx-ingress
          target: /nginx-ingress
          uid: 101
          gid: 0
        - source: ${target.dir}/etc/nginx/njs
          target: /etc/nginx/njs
          uid: 101
          gid: 0
        - source: ${target.dir}/configs/*
          target: /
          uid: 101
          gid: 0
        - source: /opt/docker/sbom/nginx-ingress
          target: /opt/docker/sbom/nginx-ingress
          uid: 0
          gid: 0
accounts:
  run-as: "101"
  users:
    - name: "101"
      uid: 101
      gid: 0
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  BUILD_OS: debian
paths:
  - type: directory
    path: /etc/nginx-agent
    uid: 101
    gid: 0
  - type: directory
    path: /var/lib/nginx-agent
    uid: 101
    gid: 0
  - type: directory
    path: /var/log/nginx-agent
    uid: 101
    gid: 0
  - type: directory
    path: /etc/nginx/secrets
    uid: 101
    gid: 0
  - type: directory
    path: /var/lib/nginx/stream-config.d
    uid: 101
    gid: 0
  - type: directory
    path: /etc/nginx
    uid: 101
    gid: 0
  - type: directory
    path: /var/cache/nginx
    uid: 101
    gid: 0
  - type: directory
    path: /var/lib/nginx
    uid: 101
    gid: 0
  - type: directory
    path: /var/log/nginx
    uid: 101
    gid: 0
annotations:
  org.opencontainers.image.description: A minimal Nginx Ingress image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /nginx-ingress
ports:
  - "80"
  - "443"
