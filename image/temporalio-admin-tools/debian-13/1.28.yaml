# syntax=dhi.io/build:2-debian13

name: Temporal Admin Tools 1.28.x
image: dhi.io/temporalio-admin-tools
variant: runtime
tags:
  - "1.28"
  - 1.28.4
  - 1.28-debian13
  - 1.28.4-debian13
  - 1.28.4-cli-1.6.2
  - 1.28.4-cli-1.6.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  CLI_VERSION: 1.6.2
  DEBIAN_EPOCH_MAJOR_MINOR_VERSION: "1.28"
  DEBIAN_EPOCH_MAJOR_VERSION: "1"
  DEBIAN_EPOCH_VERSION: 1.28.4
  DEBIAN_VERSION: "13"
  PYTHON_BUILD_REFERENCE: dhi/python:3.13.13-debian13-dev@sha256:19e0e6b0a08de7e47295401cb9273d2020f724bb7de6b67ba16576a44b2fa3b0
  PYTHON_REFERENCE: dhi/python:3.13.13-debian13@sha256:ce35145dcd0016ab6f17a1eade4e57d37850d05a1cfcee6190762a496567b440
  SEMVER_MAJOR_MINOR_VERSION: "1.28"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.28.4
  TEMPORALIO_SERVER_DIGEST: sha256:0b455dbd54bf92a0d09e30f9d9a28cb6e33996dbb0d5511a3c62b403886644c3
  VARIANT_SUFFIX: ""
  VERSION: 1.28.4
contents:
  packages:
    - bash
    - bash-completion
    - ca-certificates
    - coreutils
    - curl
    - jq
    - tini
    - tzdata
  builds:
    - name: add bash completion
      contents:
        packages:
          - bash
          - coreutils
        artifacts:
          - name: dhi.io/temporalio-server:1.28.4-debian13@sha256:0b455dbd54bf92a0d09e30f9d9a28cb6e33996dbb0d5511a3c62b403886644c3
            includes:
              - usr/local/bin/temporal
            uid: 0
            gid: 0
      pipeline:
        - name: install bash completion
          runs: |
            set -eux -o pipefail

            # [The OS] has a /etc/bash/bashrc that sources all files named /etc/bash/*.sh for
            # interactive shells, so we can add completion logic in /etc/bash/temporal-completion.sh
            # Completion for temporal depends on the bash-completion package.
            mkdir -p "${target.dir}"/etc/bash/
            /usr/local/bin/temporal completion bash > "${target.dir}"/etc/bash/temporal-completion.sh
      outputs:
        - source: ${target.dir}/etc/bash/temporal-completion.sh
          target: /etc/bash/temporal-completion.sh
          uid: 0
          gid: 0
    - name: add cqlsh
      uses: dhi.io/python:3.13.13-debian13-dev@sha256:19e0e6b0a08de7e47295401cb9273d2020f724bb7de6b67ba16576a44b2fa3b0
      contents:
        packages:
          - bash
          - ca-certificates
      pipeline:
        - name: add cqlsh
          privileged: true
          runs: |
            set -eux -o pipefail

            export VIRTUAL_ENV='/opt/cqlsh'
            python3 -m venv "$VIRTUAL_ENV"

            # CVE-2024-5569: zipp 1.0.0 → 3.19.1+
            "$VIRTUAL_ENV/bin/python3" -m pip install 'zipp>=3.19.1'

            "$VIRTUAL_ENV/bin/python3" -m pip install cqlsh

            # Make cqlsh executable available in PATH
            mkdir -p /usr/local/bin
            ln -s ../../../opt/cqlsh/bin/cqlsh /usr/local/bin
      outputs:
        - source: /opt/cqlsh
          target: /opt/cqlsh
          uid: 0
          gid: 0
        - source: /usr/local/bin/cqlsh
          target: /usr/local/bin/cqlsh
          uid: 0
          gid: 0
    - name: add yq
      uses: dhi.io/python:3.13.13-debian13-dev@sha256:19e0e6b0a08de7e47295401cb9273d2020f724bb7de6b67ba16576a44b2fa3b0
      contents:
        packages:
          - bash
          - ca-certificates
      pipeline:
        - name: add yq
          privileged: true
          runs: |
            set -eux -o pipefail

            export VIRTUAL_ENV='/opt/yq'
            python3 -m venv "$VIRTUAL_ENV"

            # CVE-2024-5569: zipp 1.0.0 → 3.19.1+
            "$VIRTUAL_ENV/bin/python3" -m pip install 'zipp>=3.19.1'

            "$VIRTUAL_ENV/bin/python3" -m pip install yq

            # Make yq executable available in PATH
            mkdir -p /usr/local/bin
            ln -s ../../../opt/yq/bin/yq /usr/local/bin
      outputs:
        - source: /opt/yq
          target: /opt/yq
          uid: 0
          gid: 0
        - source: /usr/local/bin/yq
          target: /usr/local/bin/yq
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/temporalio-server:1.28.4-debian13@sha256:0b455dbd54bf92a0d09e30f9d9a28cb6e33996dbb0d5511a3c62b403886644c3
      includes:
        - etc/temporal/schema/**
        - usr/local/bin/tdbg
        - usr/local/bin/temporal
        - usr/local/bin/temporal-cassandra-tool
        - usr/local/bin/temporal-sql-tool
      uid: 0
      gid: 0
    - name: dhi.io/python:3.13.13-debian13@sha256:ce35145dcd0016ab6f17a1eade4e57d37850d05a1cfcee6190762a496567b440
      includes:
        - opt/**
        - usr/**
      uid: 0
      gid: 0
accounts:
  run-as: temporal
  users:
    - name: temporal
      uid: 1000
      gid: 1000
  groups:
    - name: temporal
      gid: 1000
      members:
        - temporal
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /etc/temporal
environment:
  TEMPORAL_HOME: /etc/temporal
paths:
  - type: directory
    path: /etc/temporal/config
    uid: 1000
    gid: 1000
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal Temporal Admin Tools image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /usr/bin/tini
  - --
  - sleep
  - infinity
