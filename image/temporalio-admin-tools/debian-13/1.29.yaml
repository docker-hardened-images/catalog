# syntax=dhi.io/build:2-debian13

name: Temporal Admin Tools 1.29.x
image: dhi.io/temporalio-admin-tools
variant: runtime
tags:
  - "1.29"
  - 1.29.6
  - 1.29-debian
  - 1.29-debian13
  - 1.29.6-debian
  - 1.29.6-debian13
  - 1.29.6-cli-1.7.1
  - 1.29.6-cli-1.7.1-debian
  - 1.29.6-cli-1.7.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  CLI_VERSION: 1.7.1
  DEBIAN_EPOCH_MAJOR_MINOR_VERSION: "1.29"
  DEBIAN_EPOCH_MAJOR_VERSION: "1"
  DEBIAN_EPOCH_VERSION: 1.29.6
  DEBIAN_VERSION: "13"
  PYTHON_BUILD_REFERENCE: dhi/python:3.13.13-debian13-dev@sha256:5b78c28a771d041c50b083431e26741677a3565b41a0a02284b8991c604fc71b
  PYTHON_REFERENCE: dhi/python:3.13.13-debian13@sha256:dc8f7c6aab976c2d0bc03737705888ce5c39a5b52036e4df1d84e4448bfdaa1c
  SEMVER_MAJOR_MINOR_VERSION: "1.29"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.29.6
  TEMPORALIO_SERVER_DIGEST: sha256:cc64b2650f56a530d518486d5b01aea028c448aad5830d1b7f9cc90b2c1633a8
  VARIANT_SUFFIX: ""
  VERSION: 1.29.6
contents:
  packages:
    - bash
    - bash-completion
    - ca-certificates
    - coreutils
    - curl
    - jq
    - tini
    - tzdata
  builds:
    - name: add bash completion
      contents:
        packages:
          - bash
          - coreutils
        artifacts:
          - name: dhi.io/temporalio-server:1.29.6-debian13@sha256:cc64b2650f56a530d518486d5b01aea028c448aad5830d1b7f9cc90b2c1633a8
            includes:
              - usr/local/bin/temporal
            uid: 0
            gid: 0
      pipeline:
        - name: install bash completion
          runs: |
            set -eux -o pipefail

            # [The OS] has a /etc/bash/bashrc that sources all files named /etc/bash/*.sh for
            # interactive shells, so we can add completion logic in /etc/bash/temporal-completion.sh
            # Completion for temporal depends on the bash-completion package.
            mkdir -p "${target.dir}"/etc/bash/
            /usr/local/bin/temporal completion bash > "${target.dir}"/etc/bash/temporal-completion.sh
      outputs:
        - source: ${target.dir}/etc/bash/temporal-completion.sh
          target: /etc/bash/temporal-completion.sh
          uid: 0
          gid: 0
    - name: add cqlsh
      uses: dhi.io/python:3.13.13-debian13-dev@sha256:5b78c28a771d041c50b083431e26741677a3565b41a0a02284b8991c604fc71b
      contents:
        packages:
          - bash
          - ca-certificates
      pipeline:
        - name: add cqlsh
          privileged: true
          runs: |
            set -eux -o pipefail

            export VIRTUAL_ENV='/opt/cqlsh'
            python3 -m venv "$VIRTUAL_ENV"

            # CVE-2024-5569: zipp 1.0.0 → 3.19.1+
            "$VIRTUAL_ENV/bin/python3" -m pip install 'zipp>=3.19.1'

            "$VIRTUAL_ENV/bin/python3" -m pip install cqlsh

            # Make cqlsh executable available in PATH
            mkdir -p /usr/local/bin
            ln -s ../../../opt/cqlsh/bin/cqlsh /usr/local/bin
      outputs:
        - source: /opt/cqlsh
          target: /opt/cqlsh
          uid: 0
          gid: 0
        - source: /usr/local/bin/cqlsh
          target: /usr/local/bin/cqlsh
          uid: 0
          gid: 0
    - name: add yq
      uses: dhi.io/python:3.13.13-debian13-dev@sha256:5b78c28a771d041c50b083431e26741677a3565b41a0a02284b8991c604fc71b
      contents:
        packages:
          - bash
          - ca-certificates
      pipeline:
        - name: add yq
          privileged: true
          runs: |
            set -eux -o pipefail

            export VIRTUAL_ENV='/opt/yq'
            python3 -m venv "$VIRTUAL_ENV"

            # CVE-2024-5569: zipp 1.0.0 → 3.19.1+
            "$VIRTUAL_ENV/bin/python3" -m pip install 'zipp>=3.19.1'

            "$VIRTUAL_ENV/bin/python3" -m pip install yq

            # Make yq executable available in PATH
            mkdir -p /usr/local/bin
            ln -s ../../../opt/yq/bin/yq /usr/local/bin
      outputs:
        - source: /opt/yq
          target: /opt/yq
          uid: 0
          gid: 0
        - source: /usr/local/bin/yq
          target: /usr/local/bin/yq
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/temporalio-server:1.29.6-debian13@sha256:cc64b2650f56a530d518486d5b01aea028c448aad5830d1b7f9cc90b2c1633a8
      includes:
        - etc/temporal/schema/**
        - usr/local/bin/tdbg
        - usr/local/bin/temporal
        - usr/local/bin/temporal-cassandra-tool
        - usr/local/bin/temporal-sql-tool
      uid: 0
      gid: 0
    - name: dhi.io/python:3.13.13-debian13@sha256:dc8f7c6aab976c2d0bc03737705888ce5c39a5b52036e4df1d84e4448bfdaa1c
      includes:
        - opt/**
        - usr/**
      uid: 0
      gid: 0
accounts:
  run-as: temporal
  users:
    - name: temporal
      uid: 1000
      gid: 1000
  groups:
    - name: temporal
      gid: 1000
      members:
        - temporal
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /etc/temporal
environment:
  TEMPORAL_HOME: /etc/temporal
paths:
  - type: directory
    path: /etc/temporal/config
    uid: 1000
    gid: 1000
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal Temporal Admin Tools image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /usr/bin/tini
  - --
  - sleep
  - infinity
