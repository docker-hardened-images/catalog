# syntax=dhi.io/build:2-debian13

name: vault-csi-provider 1.7.x
image: dhi.io/vault-csi-provider
variant: runtime
tags:
  - "1"
  - "1.7"
  - 1.7.3
  - 1-debian
  - 1-debian13
  - 1.7-debian
  - 1.7-debian13
  - 1.7.3-debian
  - 1.7.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 8f6c0088ccc3595be1bbee7981c4d6e645bb2707
  SEMVER_MAJOR_MINOR_VERSION: "1.7"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.7.3
  VERSION: 1.7.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: vault-csi-provider-go
      work-dir: /go/src/github.com/hashicorp/vault-csi-provider
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/hashicorp/vault-csi-provider.git#v1.7.3
            checksum: 8f6c0088ccc3595be1bbee7981c4d6e645bb2707
            path: /go/src/github.com/hashicorp/vault-csi-provider
            spdx:
              name: vault-csi-provider
              version: 1.7.3
              packages:
                - name: vault-csi-provider
                  purl: pkg:golang/github.com/hashicorp/vault-csi-provider@1.7.3
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - uses: go/bump@v1
          with:
            deps:
              - github.com/go-jose/go-jose/v4@v4.1.4
              - google.golang.org/grpc@v1.82.1
            download: true
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/hashicorp/vault-csi-provider/internal/version.Major=$(echo 1.7.3 | cut -d. -f1)
              - -X github.com/hashicorp/vault-csi-provider/internal/version.Minor=$(echo 1.7.3 | cut -d. -f2)
              - -X github.com/hashicorp/vault-csi-provider/internal/version.Patch=$(echo 1.7.3 | cut -d. -f3)
              - -X github.com/hashicorp/vault-csi-provider/internal/version.GitVersion=v1.7.3
              - -X github.com/hashicorp/vault-csi-provider/internal/version.GitCommit=8f6c0088ccc3595be1bbee7981c4d6e645bb2707
              - -X github.com/hashicorp/vault-csi-provider/internal/version.GitTreeState=clean
              - -X github.com/hashicorp/vault-csi-provider/internal/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%S%z' 2>/dev/null || date -u +'%Y-%m-%dT%H:%M:%S%z')
              - -X github.com/hashicorp/vault-csi-provider/internal/version.GoVersion=$(go version | awk '{print $3}')
              - -X github.com/hashicorp/vault-csi-provider/internal/version.Compiler=gc
              - -X github.com/hashicorp/vault-csi-provider/internal/version.Platform=${GOOS}/${GOARCH}
              - -X github.com/hashicorp/vault-csi-provider/internal/version.MinDriverVersion=v0.0.21
            output: ${target.dir}/usr/local/bin/vault-csi-provider
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/vault-csi-provider
          target: /opt/docker/sbom/vault-csi-provider
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal vault-csi-provider image
  org.opencontainers.image.licenses: BUSL-1.1
entrypoint:
  - /usr/local/bin/vault-csi-provider
