# syntax=dhi.io/build:2-debian13

name: Harbor Portal 2.12.x (dev)
image: dhi.io/harbor-portal
variant: dev
tags:
  - 2.12-dev
  - 2.12.4-dev
  - 2.12-debian-dev
  - 2.12-debian13-dev
  - 2.12.4-debian-dev
  - 2.12.4-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2024-11-05"
vars:
  COMMIT_SHA: 6b4981d4dd46a20481be5a3a7cdf435bc20f4dcb
  GOLANG_REFERENCE: dhi/golang:1.25.11-debian13-dev@sha256:a6c681505166d94975a51fb5200a908aef55e0515da0dbac835669b2c0117569
  NODE_REFERENCE: dhi/node:24.16.0-debian13-dev@sha256:5b4f1c85c63ab8517bf84e864276f3d047a3e29a90a735b2f9a66af16c2c0209
  SEMVER_MAJOR_MINOR_VERSION: "2.12"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.12.4
  VERSION: 2.12.4
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libc6
    - libcrypt1
    - libpcre2-8-0
    - libssl3t64
    - mawk
    - nginx-mainline
    - perl-base
    - sed
    - tzdata
    - util-linux
    - zlib1g
  builds:
    - name: harbor-portal
      uses: dhi.io/node:24.16.0-debian13-dev@sha256:5b4f1c85c63ab8517bf84e864276f3d047a3e29a90a735b2f9a66af16c2c0209
      contents:
        packages:
          - build-essential
          - bash
          - coreutils
          - python3-setuptools
          - yq
        files:
          - url: git+https://github.com/goharbor/harbor.git#v2.12.4
            checksum: 6b4981d4dd46a20481be5a3a7cdf435bc20f4dcb
            path: ${source.dir}/goharbor/harbor
            spdx:
              name: harbor-portal
              version: 2.12.4
              packages:
                - name: harbor-portal
                  purl: pkg:github/goharbor/harbor@2.12.4#src/portal
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: copy swagger file
          work-dir: ${source.dir}/goharbor/harbor
          runs: |
            set -eux -o pipefail

            cp api/v2.0/swagger.yaml src/portal/swagger.yaml
        - name: npm install
          work-dir: ${source.dir}/goharbor/harbor/src/portal
          privileged: true
          runs: |
            set -eux -o pipefail

            npm install --unsafe-perm
            npm run postinstall

            npm run generate-build-timestamp
        - name: build node portal
          work-dir: ${source.dir}/goharbor/harbor/src/portal
          runs: |
            set -eux -o pipefail

            node --max_old_space_size=2048 'node_modules/@angular/cli/bin/ng' build --configuration production
        - name: build node swagger
          work-dir: ${source.dir}/goharbor/harbor/src/portal/app-swagger-ui
          privileged: true
          runs: |
            set -eux -o pipefail

            npm install
            npm run build
        - name: build swagger
          work-dir: ${source.dir}/goharbor/harbor/src/portal
          runs: |
            set -eux -o pipefail

            yq . swagger.yaml > dist/swagger.json
        - name: reinstall dependencies for sbom
          work-dir: ${source.dir}/goharbor/harbor/src/portal
          runs: |
            set -eux -o pipefail

            # Clean and reinstall only production dependencies for accurate SBOM
            rm -rf node_modules
            npm install --omit=dev --ignore-scripts
        - name: harbor-portal-sbom
          uses: sbom@v1
          with:
            prefix: harbor-portal
            source: ${source.dir}/goharbor/harbor/src/portal
      outputs:
        - source: ${source.dir}/goharbor/harbor/src/portal/dist
          target: /usr/share/nginx/html
          uid: 65532
          gid: 65532
          mode: "0755"
        - source: ${source.dir}/goharbor/harbor/src/portal/app-swagger-ui/dist
          target: /usr/share/nginx/html
          uid: 65532
          gid: 65532
          mode: "0755"
accounts:
  root: true
  run-as: root
  users:
    - name: nginx
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nginx
      gid: 65532
      members:
        - nginx
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: directory
    path: /run
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: file
    path: /etc/nginx/nginx.conf
    uid: 65532
    gid: 65532
    mode: "0644"
    source: image/harbor-portal/config/default.conf
  - type: directory
    path: /tmp
    uid: 65532
    gid: 65532
    mode: "1777"
  - type: symlink
    path: /var/log/nginx/access.log
    uid: 0
    gid: 0
    source: /dev/stdout
  - type: symlink
    path: /var/log/nginx/error.log
    uid: 0
    gid: 0
    source: /dev/stderr
  - type: directory
    path: /cache/nginx
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Harbor Portal web interface image.
  org.opencontainers.image.licenses: Apache-2.0
cmd:
  - nginx
  - -g
  - daemon off;
ports:
  - 8080/tcp
