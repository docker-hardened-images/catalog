# syntax=dhi.io/build:2-debian13

name: Meilisearch 1.x (dev)
image: dhi.io/meilisearch
variant: dev
tags:
  - 1-dev
  - 1.46-dev
  - 1.46.0-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.46-debian-dev
  - 1.46-debian13-dev
  - 1.46.0-debian-dev
  - 1.46.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2023-02-06"
vars:
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:cd26c6fe4eaa4bc2ecd022223dd3cd2dc01101c13344fb3f9793dfd4c7179b77
  COMMIT_SHA: b4f4527f30a1692ebfff636fcc38bf61db19e0da
  RUST_REFERENCE: dhi/rust:1.96.0-debian13-dev@sha256:a52f2624b143986f6b8304111efe6f080837301687b2d1ebd047b64d3aaa0131
  SEMVER_MAJOR_MINOR_VERSION: "1.46"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.46.0
  VERSION: 1.46.0
contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: meilisearch
      uses: dhi.io/rust:1.96.0-debian13-dev@sha256:a52f2624b143986f6b8304111efe6f080837301687b2d1ebd047b64d3aaa0131
      work-dir: ${source.dir}/meilisearch
      contents:
        packages:
          - bash
          - build-essential
          - ca-certificates
          - coreutils
          - findutils
          - git
          - libssl-dev
          - pkg-config
          - sed
        files:
          - url: git+https://github.com/meilisearch/meilisearch.git#v1.46.0
            checksum: b4f4527f30a1692ebfff636fcc38bf61db19e0da
            path: ${source.dir}/meilisearch
            spdx:
              name: meilisearch
              version: 1.46.0
              packages:
                - name: meilisearch
                  purl: pkg:cargo/meilisearch@1.46.0
                  license: MIT
                - name: meilitool
                  purl: pkg:cargo/meilitool@1.46.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: cargo sbom
          uses: sbom@v1
          with:
            extra-scanners: rust-cargo-lock-cataloger
            prefix: meilisearch-cargo
            source: ${source.dir}/meilisearch
        - name: bump cargo dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

            # GHSA-3pv8-6f4r-ffg2 → tar ≥0.4.46
            cargo update --package tar --precise 0.4.46

            # RUSTSEC-2026-0001 → rkyv ≥0.7.46
            cargo update --package rkyv --precise 0.7.46
        - name: build
          privileged: true
          runs: |
            set -eux -o pipefail

            export VERGEN_GIT_SHA="b4f4527f30a1692ebfff636fcc38bf61db19e0da"
            export VERGEN_GIT_DESCRIBE="v1.46.0"
            export VERGEN_GIT_COMMIT_TIMESTAMP="$(git show -s --format=%cI HEAD)"

            cargo build --release -p meilisearch -p meilitool

            install -D target/release/meilisearch \
              '${target.dir}/usr/local/bin/meilisearch'
            install -D target/release/meilitool \
              '${target.dir}/usr/local/bin/meilitool'
      outputs:
        - source: ${target.dir}/usr/local/bin/meilisearch
          target: /usr/local/bin/meilisearch
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/meilitool
          target: /usr/local/bin/meilitool
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/meilisearch
          target: /opt/docker/sbom/meilisearch
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/meilisearch-cargo
          target: /opt/docker/sbom/meilisearch-cargo
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-glibc-debian13@sha256:cd26c6fe4eaa4bc2ecd022223dd3cd2dc01101c13344fb3f9793dfd4c7179b77
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /meili_data
environment:
  DEBIAN_FRONTEND: noninteractive
  MEILI_HTTP_ADDR: 0.0.0.0:7700
  MEILI_SERVER_PROVIDER: docker
paths:
  - type: symlink
    path: /bin/meilisearch
    uid: 0
    gid: 0
    source: /usr/local/bin/meilisearch
  - type: symlink
    path: /bin/meilitool
    uid: 0
    gid: 0
    source: /usr/local/bin/meilitool
  - type: symlink
    path: /meilisearch
    uid: 0
    gid: 0
    source: /usr/local/bin/meilisearch
  - type: directory
    path: /meili_data
    uid: 65532
    gid: 65532
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal Meilisearch image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /bin/meilisearch
ports:
  - 7700/tcp
