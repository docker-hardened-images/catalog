# syntax=dhi.io/build:2-debian13

name: Meilisearch 1.x (dev)
image: dhi.io/meilisearch
variant: dev
tags:
  - 1-dev
  - 1.49-dev
  - 1.49.0-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.49-debian-dev
  - 1.49-debian13-dev
  - 1.49.0-debian-dev
  - 1.49.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2023-02-06"
vars:
  COMMIT_SHA: 17758dce3fcc21d8e2415176c29d1106e905de00
  RUST_REFERENCE: dhi/rust:1.97.0-debian13-dev@sha256:77b1139a279b66c92eb7306380119609edc493aad17d374bd52f57077a044fbe
  SEMVER_MAJOR_MINOR_VERSION: "1.49"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.49.0
  VERSION: 1.49.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - gcc-14-base
    - grep
    - libc-bin
    - libc6
    - libgcc-s1
    - libncursesw6
    - libstdc++6
    - libtinfo6
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: meilisearch
      uses: dhi.io/rust:1.97.0-debian13-dev@sha256:77b1139a279b66c92eb7306380119609edc493aad17d374bd52f57077a044fbe
      work-dir: ${source.dir}/meilisearch
      contents:
        packages:
          - bash
          - build-essential
          - ca-certificates
          - coreutils
          - findutils
          - git
          - libssl-dev
          - pkg-config
          - sed
        files:
          - url: git+https://github.com/meilisearch/meilisearch.git#v1.49.0
            checksum: 17758dce3fcc21d8e2415176c29d1106e905de00
            path: ${source.dir}/meilisearch
            spdx:
              name: meilisearch
              version: 1.49.0
              packages:
                - name: meilisearch
                  purl: pkg:cargo/meilisearch@1.49.0
                  license: MIT
                - name: meilitool
                  purl: pkg:cargo/meilitool@1.49.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: bump cargo dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

            # GHSA-3pv8-6f4r-ffg2 → tar ≥0.4.46
            cargo update --package tar --precise 0.4.46

            # RUSTSEC-2026-0001 → rkyv ≥0.7.46
            cargo update --package rkyv --precise 0.7.46

            # GHSA-4w2j-m93h-cj5j → quinn-proto ≥0.11.15
            cargo update --package quinn-proto --precise 0.11.15

            # RUSTSEC-2026-0186 → memmap2 ≥0.9.11
            cargo update --package memmap2 --precise 0.9.11

            # RUSTSEC-2026-0190 → anyhow ≥1.0.103
            cargo update --package anyhow --precise 1.0.103

            # RUSTSEC-2026-0204 → crossbeam-epoch ≥0.9.20
            cargo update --package crossbeam-epoch --precise 0.9.20
        - name: cargo sbom
          uses: sbom@v1
          with:
            extra-scanners: rust-cargo-lock-cataloger
            prefix: meilisearch-cargo
            source: ${source.dir}/meilisearch
        - name: build
          privileged: true
          runs: |
            set -eux -o pipefail

            export VERGEN_GIT_SHA="17758dce3fcc21d8e2415176c29d1106e905de00"
            export VERGEN_GIT_DESCRIBE="v1.49.0"
            export VERGEN_GIT_COMMIT_TIMESTAMP="$(git show -s --format=%cI HEAD)"

            cargo build --release -p meilisearch -p meilitool

            install -D target/release/meilisearch \
              '${target.dir}/usr/local/bin/meilisearch'
            install -D target/release/meilitool \
              '${target.dir}/usr/local/bin/meilitool'
      outputs:
        - source: ${target.dir}/usr/local/bin/meilisearch
          target: /usr/local/bin/meilisearch
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/meilitool
          target: /usr/local/bin/meilitool
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/meilisearch
          target: /opt/docker/sbom/meilisearch
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/meilisearch-cargo
          target: /opt/docker/sbom/meilisearch-cargo
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /meili_data
environment:
  DEBIAN_FRONTEND: noninteractive
  MEILI_HTTP_ADDR: 0.0.0.0:7700
  MEILI_SERVER_PROVIDER: docker
paths:
  - type: symlink
    path: /bin/meilisearch
    uid: 0
    gid: 0
    source: /usr/local/bin/meilisearch
  - type: symlink
    path: /bin/meilitool
    uid: 0
    gid: 0
    source: /usr/local/bin/meilitool
  - type: symlink
    path: /meilisearch
    uid: 0
    gid: 0
    source: /usr/local/bin/meilisearch
  - type: directory
    path: /meili_data
    uid: 65532
    gid: 65532
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal Meilisearch image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /bin/meilisearch
ports:
  - 7700/tcp
