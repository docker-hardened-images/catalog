name: Upstash Context7 MCP 2.x
image: dhi.io/context7-mcp
variant: runtime
tags:
  - "2"
  - "2.2"
  - 2.2.5
  - latest
  - 2-debian13
  - 2.2-debian13
  - 2.2.5-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 13f3ef03d9956c2a43b3db43d46341f237732ca2
  NODE_BUILD_REFERENCE: dhi/node:24.15.0-debian13-sfw-dev@sha256:e0218745e57efb6c8809a49df79887c31717adad635392f8a9f0fb38e223ad29
  NODE_RUNTIME_REFERENCE: dhi/node:24.15.0-debian13@sha256:36c6a39aadb0d2d10180e0fb0e653966457480afc6b02b0669656757d5c8da5b
  SEMVER_MAJOR_MINOR_VERSION: "2.2"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.2.5
  VERSION: 2.2.5
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: context7-mcp
      uses: dhi.io/node:24.15.0-debian13-sfw-dev@sha256:e0218745e57efb6c8809a49df79887c31717adad635392f8a9f0fb38e223ad29
      contents:
        files:
          - url: git+https://github.com/upstash/context7.git#@upstash/context7-mcp@2.2.5
            checksum: 13f3ef03d9956c2a43b3db43d46341f237732ca2
            path: ${source.dir}/context7
            spdx:
              name: context7-mcp
              version: 2.2.5
              packages:
                - name: context7-mcp
                  purl: pkg:dhi/context7-mcp@2.2.5
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update dependencies
          work-dir: ${source.dir}/context7
          privileged: true
          runs: |
            set -eux -o pipefail

            npm pkg set pnpm.overrides."@modelcontextprotocol/sdk"=1.25.2 # CVE-2026-25536 (1.26.0 breaks MCP server)
            npm pkg set pnpm.overrides.hono=4.12.14                       # CVE-2026-39409, CVE-2026-39408, GHSA-26pp-8wgv-hjvm, CVE-2026-39407, CVE-2026-39410, GHSA-458j-xx4x-4375
            npm pkg set pnpm.overrides."@hono/node-server"=1.19.13        # CVE-2026-39406
            npm pkg set pnpm.overrides.picomatch=4.0.4                    # CVE-2026-33671, CVE-2026-33672
            npm pkg set pnpm.overrides.minimatch=10.2.3                   # CVE-2026-26996, CVE-2026-27903, CVE-2026-27904
            npm pkg set pnpm.overrides.qs=6.14.2                          # CVE-2025-15284, CVE-2026-2391
            npm pkg set pnpm.overrides."body-parser"=2.2.1                # CVE-2025-13466
            npm pkg set pnpm.overrides.undici=6.24.0                      # CVE-2026-1526, CVE-2026-1528, CVE-2026-2229
            npm pkg set pnpm.overrides.rollup=4.59.0                      # CVE-2026-27606
            npm pkg set pnpm.overrides.path-to-regexp=8.4.0               # CVE-2026-4926, CVE-2026-4923
            npm pkg set pnpm.overrides.vite=7.3.2                         # GHSA-p9ff-h696-f583, GHSA-v2wj-q39q-566r, GHSA-4w7w-66w2-5vf9
            # pnpm 10+ fails on unapproved dependency build scripts; these
            # dependency rewrites do not need lifecycle hooks to run.
            sfw pnpm update --ignore-scripts
        - name: update dependencies
          work-dir: ${source.dir}/context7/packages/mcp
          privileged: true
          runs: |
            set -eux -o pipefail

            npm pkg set pnpm.overrides.hono=4.12.14                # CVE-2026-39409, CVE-2026-39408, GHSA-26pp-8wgv-hjvm, CVE-2026-39407, CVE-2026-39410, GHSA-458j-xx4x-4375
            npm pkg set pnpm.overrides."@hono/node-server"=1.19.13 # CVE-2026-39406
            npm pkg set pnpm.overrides.picomatch=4.0.4             # CVE-2026-33671, CVE-2026-33672
            npm pkg set pnpm.overrides.minimatch=10.2.3            # CVE-2026-26996, CVE-2026-27903, CVE-2026-27904
            npm pkg set pnpm.overrides.qs=6.14.2                   # CVE-2025-15284, CVE-2026-2391
            npm pkg set pnpm.overrides."body-parser"=2.2.1         # CVE-2025-13466
            npm pkg set pnpm.overrides.undici=6.24.0               # CVE-2026-1526, CVE-2026-1528, CVE-2026-2229
            npm pkg set pnpm.overrides.rollup=4.59.0               # CVE-2026-27606
            npm pkg set pnpm.overrides.vite=7.3.2                  # GHSA-p9ff-h696-f583, GHSA-v2wj-q39q-566r, GHSA-4w7w-66w2-5vf9
            # pnpm 10+ fails on unapproved dependency build scripts; these
            # dependency rewrites do not need lifecycle hooks to run.
            sfw pnpm add hono@4.12.14 --filter @upstash/context7-mcp --save-exact --ignore-scripts
            sfw pnpm update --ignore-scripts
        - name: build
          work-dir: ${source.dir}/context7
          privileged: true
          runs: |
            set -eux -o pipefail

            # Avoid pnpm's unapproved dependency build-script failure; this
            # package builds with tsc and does not require install hooks.
            sfw pnpm install --frozen-lockfile --ignore-scripts
            sfw pnpm --filter @upstash/context7-mcp build
        - name: setup
          work-dir: ${source.dir}/context7
          privileged: true
          environment:
            CI: "true"
          runs: |
            set -eux -o pipefail

            # Production install only needs resolved packages; skip lifecycle
            # hooks and remove esbuild afterward to keep it out of the SBOM.
            sfw pnpm install --frozen-lockfile --prod --filter @upstash/context7-mcp --ignore-scripts

            # remove all esbuild dependencies
            rm -rf node_modules/.pnpm/*esbuild*
      outputs:
        - source: ${source.dir}/context7/packages/mcp
          target: /app/packages/mcp
          uid: 0
          gid: 0
        - source: ${source.dir}/context7/node_modules
          target: /app/node_modules
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/context7-mcp
          target: /opt/docker/sbom/context7-mcp
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/node:24.15.0-debian13@sha256:36c6a39aadb0d2d10180e0fb0e653966457480afc6b02b0669656757d5c8da5b
      uid: 0
      gid: 0
