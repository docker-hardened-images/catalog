tags:
  - "2"
  - "2.1"
  - 2.1.3
  - latest
  - 2-debian13
  - 2.1-debian13
  - 2.1.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x64" : "arm64" }'
  COMMIT_SHA: 7e0309b7187ed59f17a29b9cb7469f4e82f23b4a
  NODE_BUILD_REFERENCE: dhi/node:24.14.0-debian13-sfw-dev@sha256:28c56ab1c6ea37772bead800ab3ea9944ad60f3ae06366798b4c7a20bf38320e
  NODE_RUNTIME_REFERENCE: dhi/node:24.14.0-debian13@sha256:ff4f2e2296608e840e8822815d4407c6bae872fb85c664375a189dc70249f1ce
  PNPM_VERSION: 10.30.3
  SEMVER_MAJOR_MINOR_VERSION: "2.1"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.1.3
  VERSION: 2.1.3
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: context7-mcp
      uses: dhi.io/node:24.14.0-debian13-sfw-dev@sha256:28c56ab1c6ea37772bead800ab3ea9944ad60f3ae06366798b4c7a20bf38320e
      contents:
        files:
          - url: https://github.com/pnpm/pnpm/releases/download/v10.30.3/pnpm-linux-${ARCH}
            path: /usr/local/bin/pnpm
            uid: 0
            gid: 0
            mode: "0755"
          - url: git+https://github.com/upstash/context7.git#@upstash/context7-mcp@2.1.3
            checksum: 7e0309b7187ed59f17a29b9cb7469f4e82f23b4a
            path: ${source.dir}/context7-7e0309b7187ed59f17a29b9cb7469f4e82f23b4a
            spdx:
              name: context7-mcp
              version: 2.1.3
              packages:
                - name: context7-mcp
                  purl: pkg:dhi/context7-mcp@2.1.3
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update dependencies
          work-dir: ${source.dir}/context7-7e0309b7187ed59f17a29b9cb7469f4e82f23b4a
          privileged: true
          runs: |
            set -eux -o pipefail

            npm pkg set pnpm.overrides."@modelcontextprotocol/sdk"=1.25.2 # CVE-2026-25536 (1.26.0 breaks MCP server)
            npm pkg set pnpm.overrides.hono=4.11.10                       # CVE-2026-24398, CVE-2026-24472, CVE-2026-24473, CVE-2026-24771, GHSA-gq3j-xvxp-8hrf
            npm pkg set pnpm.overrides.minimatch=10.2.3                   # CVE-2026-26996, CVE-2026-27903, CVE-2026-27904
            npm pkg set pnpm.overrides.qs=6.14.2                          # CVE-2025-15284, CVE-2026-2391
            npm pkg set pnpm.overrides."body-parser"=2.2.1                # CVE-2025-13466
            npm pkg set pnpm.overrides.undici=6.23.0                      # CVE-2026-22036
            npm pkg set pnpm.overrides.rollup=4.59.0                      # CVE-2026-27606
            sfw pnpm update
        - name: update dependencies
          work-dir: ${source.dir}/context7-7e0309b7187ed59f17a29b9cb7469f4e82f23b4a/packages/mcp
          privileged: true
          runs: |
            set -eux -o pipefail

            npm pkg set pnpm.overrides.hono=4.11.10        # CVE-2026-24398, CVE-2026-24472, CVE-2026-24473, CVE-2026-24771, GHSA-gq3j-xvxp-8hrf
            npm pkg set pnpm.overrides.minimatch=10.2.3    # CVE-2026-26996, CVE-2026-27903, CVE-2026-27904
            npm pkg set pnpm.overrides.qs=6.14.2           # CVE-2025-15284, CVE-2026-2391
            npm pkg set pnpm.overrides."body-parser"=2.2.1 # CVE-2025-13466
            npm pkg set pnpm.overrides.undici=6.23.0       # CVE-2026-22036
            npm pkg set pnpm.overrides.rollup=4.59.0       # CVE-2026-27606
            sfw pnpm add hono@4.11.10 --filter @upstash/context7-mcp --save-exact
            sfw pnpm update
        - name: build
          work-dir: ${source.dir}/context7-7e0309b7187ed59f17a29b9cb7469f4e82f23b4a
          privileged: true
          runs: |
            set -eux -o pipefail

            sfw pnpm install --frozen-lockfile
            sfw pnpm --filter @upstash/context7-mcp build
        - name: setup
          work-dir: ${source.dir}/context7-7e0309b7187ed59f17a29b9cb7469f4e82f23b4a
          privileged: true
          environment:
            CI: "true"
          runs: |
            set -eux -o pipefail

            sfw pnpm install --frozen-lockfile --prod --filter @upstash/context7-mcp

            # remove all esbuild dependencies
            rm -rf node_modules/.pnpm/*esbuild*
      outputs:
        - source: ${source.dir}/context7-7e0309b7187ed59f17a29b9cb7469f4e82f23b4a/packages/mcp
          target: /app/packages/mcp
          uid: 0
          gid: 0
        - source: ${source.dir}/context7-7e0309b7187ed59f17a29b9cb7469f4e82f23b4a/node_modules
          target: /app/node_modules
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/context7-mcp
          target: /opt/docker/sbom/context7-mcp
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/node:24.14.0-debian13@sha256:ff4f2e2296608e840e8822815d4407c6bae872fb85c664375a189dc70249f1ce
      uid: 0
      gid: 0
