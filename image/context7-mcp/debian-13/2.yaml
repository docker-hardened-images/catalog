# syntax=dhi.io/build:2-debian13

name: Upstash Context7 MCP 2.x
image: dhi.io/context7-mcp
variant: runtime
tags:
  - "2"
  - "2.1"
  - 2.1.8
  - latest
  - 2-debian13
  - 2.1-debian13
  - 2.1.8-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x64" : "arm64" }'
  COMMIT_SHA: c31528d0cde3d00cbb542ae44fde59f3fd7144dc
  NODE_BUILD_REFERENCE: dhi/node:24.14.1-debian13-sfw-dev@sha256:df8622ac78486f140b81a64ba50d3e8ab6bed6d3455af89dd8ab8c32bfa066b3
  NODE_RUNTIME_REFERENCE: dhi/node:24.14.1-debian13@sha256:59de022a711c1e7bab2941994fe13e09577291d6d66989f32b33a8f904174977
  PNPM_VERSION: 10.33.1
  SEMVER_MAJOR_MINOR_VERSION: "2.1"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.1.8
  VERSION: 2.1.8
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: context7-mcp
      uses: dhi.io/node:24.14.1-debian13-sfw-dev@sha256:df8622ac78486f140b81a64ba50d3e8ab6bed6d3455af89dd8ab8c32bfa066b3
      contents:
        files:
          - url: https://github.com/pnpm/pnpm/releases/download/v10.33.1/pnpm-linux-${ARCH}
            path: /usr/local/bin/pnpm
            uid: 0
            gid: 0
            mode: "0755"
          - url: git+https://github.com/upstash/context7.git#@upstash/context7-mcp@2.1.8
            checksum: c31528d0cde3d00cbb542ae44fde59f3fd7144dc
            path: ${source.dir}/context7
            spdx:
              name: context7-mcp
              version: 2.1.8
              packages:
                - name: context7-mcp
                  purl: pkg:dhi/context7-mcp@2.1.8
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update dependencies
          work-dir: ${source.dir}/context7
          privileged: true
          runs: |
            set -eux -o pipefail

            npm pkg set pnpm.overrides."@modelcontextprotocol/sdk"=1.25.2 # CVE-2026-25536 (1.26.0 breaks MCP server)
            npm pkg set pnpm.overrides.hono=4.12.7                        # CVE-2026-29045, CVE-2026-2908, CVE-2026-29086, GHSA-v8w9-8mx6-g223
            npm pkg set pnpm.overrides."@hono/node-server"=1.19.11        # CVE-2026-29087
            npm pkg set pnpm.overrides.picomatch=4.0.4                    # CVE-2026-33671, CVE-2026-33672
            npm pkg set pnpm.overrides.minimatch=10.2.3                   # CVE-2026-26996, CVE-2026-27903, CVE-2026-27904
            npm pkg set pnpm.overrides.qs=6.14.2                          # CVE-2025-15284, CVE-2026-2391
            npm pkg set pnpm.overrides."body-parser"=2.2.1                # CVE-2025-13466
            npm pkg set pnpm.overrides.undici=6.24.0                      # CVE-2026-1526, CVE-2026-1528, CVE-2026-2229
            npm pkg set pnpm.overrides.rollup=4.59.0                      # CVE-2026-27606
            npm pkg set pnpm.overrides.path-to-regexp=8.4.0               # CVE-2026-4926, CVE-2026-4923
            npm pkg set pnpm.overrides.vite=7.3.2                         # GHSA-p9ff-h696-f583, GHSA-v2wj-q39q-566r, GHSA-4w7w-66w2-5vf9
            sfw pnpm update
        - name: update dependencies
          work-dir: ${source.dir}/context7/packages/mcp
          privileged: true
          runs: |
            set -eux -o pipefail

            npm pkg set pnpm.overrides.hono=4.12.7                 # CVE-2026-29045, CVE-2026-2908, CVE-2026-29086, GHSA-v8w9-8mx6-g223
            npm pkg set pnpm.overrides."@hono/node-server"=1.19.11 # CVE-2026-29087
            npm pkg set pnpm.overrides.picomatch=4.0.4             # CVE-2026-33671, CVE-2026-33672
            npm pkg set pnpm.overrides.minimatch=10.2.3            # CVE-2026-26996, CVE-2026-27903, CVE-2026-27904
            npm pkg set pnpm.overrides.qs=6.14.2                   # CVE-2025-15284, CVE-2026-2391
            npm pkg set pnpm.overrides."body-parser"=2.2.1         # CVE-2025-13466
            npm pkg set pnpm.overrides.undici=6.24.0               # CVE-2026-1526, CVE-2026-1528, CVE-2026-2229
            npm pkg set pnpm.overrides.rollup=4.59.0               # CVE-2026-27606
            npm pkg set pnpm.overrides.vite=7.3.2                  # GHSA-p9ff-h696-f583, GHSA-v2wj-q39q-566r, GHSA-4w7w-66w2-5vf9
            sfw pnpm add hono@4.12.7 --filter @upstash/context7-mcp --save-exact
            sfw pnpm update
        - name: build
          work-dir: ${source.dir}/context7
          privileged: true
          runs: |
            set -eux -o pipefail

            sfw pnpm install --frozen-lockfile
            sfw pnpm --filter @upstash/context7-mcp build
        - name: setup
          work-dir: ${source.dir}/context7
          privileged: true
          environment:
            CI: "true"
          runs: |
            set -eux -o pipefail

            sfw pnpm install --frozen-lockfile --prod --filter @upstash/context7-mcp

            # remove all esbuild dependencies
            rm -rf node_modules/.pnpm/*esbuild*
      outputs:
        - source: ${source.dir}/context7/packages/mcp
          target: /app/packages/mcp
          uid: 0
          gid: 0
        - source: ${source.dir}/context7/node_modules
          target: /app/node_modules
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/context7-mcp
          target: /opt/docker/sbom/context7-mcp
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/node:24.14.1-debian13@sha256:59de022a711c1e7bab2941994fe13e09577291d6d66989f32b33a8f904174977
      uid: 0
      gid: 0
accounts:
  run-as: node
  users:
    - name: node
      uid: 1000
      gid: 1000
  groups:
    - name: node
      gid: 1000
      members:
        - node
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app/packages/mcp
annotations:
  org.opencontainers.image.description: Upstash Context7 MCP Server
  org.opencontainers.image.licenses: MIT
labels:
  io.modelcontextprotocol.server.name: io.upstash/context7-mcp
cmd:
  - node
  - dist/index.js
  - --transport
  - http
  - --port
  - "8080"
ports:
  - 8080/tcp
