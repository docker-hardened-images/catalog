  NODE_BUILD_REFERENCE: dhi/node:24.14.0-debian13-sfw-dev@sha256:11d24d132863ab312a4c1a65266de99591da3aa173259280194ca8ec0c9b44e1
  NODE_RUNTIME_REFERENCE: dhi/node:24.14.0-debian13@sha256:139b06c52d868b294ef96af34093c579c4b634d940c5cba582bdbaa1863c62a5
  PNPM_VERSION: 10.32.1
  SEMVER_MAJOR_MINOR_VERSION: "2.1"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.1.4
  VERSION: 2.1.4
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: context7-mcp
      uses: dhi.io/node:24.14.0-debian13-sfw-dev@sha256:11d24d132863ab312a4c1a65266de99591da3aa173259280194ca8ec0c9b44e1
      contents:
        files:
          - url: https://github.com/pnpm/pnpm/releases/download/v10.32.1/pnpm-linux-${ARCH}
            path: /usr/local/bin/pnpm
            uid: 0
            gid: 0
            mode: "0755"
          - url: git+https://github.com/upstash/context7.git#@upstash/context7-mcp@2.1.4
            checksum: 945f9aec8ba0f351977fa3d75abff19394003ab1
            path: ${source.dir}/context7-945f9aec8ba0f351977fa3d75abff19394003ab1
            spdx:
              name: context7-mcp
              version: 2.1.4
              packages:
                - name: context7-mcp
                  purl: pkg:dhi/context7-mcp@2.1.4
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update dependencies
          work-dir: ${source.dir}/context7-945f9aec8ba0f351977fa3d75abff19394003ab1
          privileged: true
          runs: |
            set -eux -o pipefail

            npm pkg set pnpm.overrides."@modelcontextprotocol/sdk"=1.25.2 # CVE-2026-25536 (1.26.0 breaks MCP server)
            npm pkg set pnpm.overrides.hono=4.12.4                        # CVE-2026-29045, CVE-2026-2908, CVE-2026-29086
            npm pkg set pnpm.overrides."@hono/node-server"=1.19.11        # CVE-2026-29087
            npm pkg set pnpm.overrides.minimatch=10.2.3                   # CVE-2026-26996, CVE-2026-27903, CVE-2026-27904
            npm pkg set pnpm.overrides.qs=6.14.2                          # CVE-2025-15284, CVE-2026-2391
            npm pkg set pnpm.overrides."body-parser"=2.2.1                # CVE-2025-13466
            npm pkg set pnpm.overrides.undici=6.23.0                      # CVE-2026-22036
            npm pkg set pnpm.overrides.rollup=4.59.0                      # CVE-2026-27606
            sfw pnpm update
        - name: update dependencies
          work-dir: ${source.dir}/context7-945f9aec8ba0f351977fa3d75abff19394003ab1/packages/mcp
          privileged: true
          runs: |
            set -eux -o pipefail

            npm pkg set pnpm.overrides.hono=4.12.4                 # CVE-2026-29045, CVE-2026-2908, CVE-2026-29086
            npm pkg set pnpm.overrides."@hono/node-server"=1.19.11 # CVE-2026-29087
            npm pkg set pnpm.overrides.minimatch=10.2.3            # CVE-2026-26996, CVE-2026-27903, CVE-2026-27904
            npm pkg set pnpm.overrides.qs=6.14.2                   # CVE-2025-15284, CVE-2026-2391
            npm pkg set pnpm.overrides."body-parser"=2.2.1         # CVE-2025-13466
            npm pkg set pnpm.overrides.undici=6.23.0               # CVE-2026-22036
            npm pkg set pnpm.overrides.rollup=4.59.0               # CVE-2026-27606
            sfw pnpm add hono@4.12.4 --filter @upstash/context7-mcp --save-exact
            sfw pnpm update
        - name: build
          work-dir: ${source.dir}/context7-945f9aec8ba0f351977fa3d75abff19394003ab1
          privileged: true
          runs: |
            set -eux -o pipefail

            sfw pnpm install --frozen-lockfile
            sfw pnpm --filter @upstash/context7-mcp build
        - name: setup
          work-dir: ${source.dir}/context7-945f9aec8ba0f351977fa3d75abff19394003ab1
          privileged: true
          environment:
            CI: "true"
          runs: |
            set -eux -o pipefail

            sfw pnpm install --frozen-lockfile --prod --filter @upstash/context7-mcp

            # remove all esbuild dependencies
            rm -rf node_modules/.pnpm/*esbuild*
      outputs:
        - source: ${source.dir}/context7-945f9aec8ba0f351977fa3d75abff19394003ab1/packages/mcp
          target: /app/packages/mcp
          uid: 0
          gid: 0
        - source: ${source.dir}/context7-945f9aec8ba0f351977fa3d75abff19394003ab1/node_modules
          target: /app/node_modules
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/context7-mcp
          target: /opt/docker/sbom/context7-mcp
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/node:24.14.0-debian13@sha256:139b06c52d868b294ef96af34093c579c4b634d940c5cba582bdbaa1863c62a5
