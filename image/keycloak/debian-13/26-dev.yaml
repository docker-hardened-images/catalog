# syntax=dhi.io/build:2-debian13

name: Keycloak 26.x (dev)
image: dhi.io/keycloak
variant: dev
tags:
  - 26-dev
  - 26.6-dev
  - 26.6.1-dev
  - 26-debian13-dev
  - 26.6-debian13-dev
  - 26.6.1-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-09-30"
vars:
  COMMIT_SHA: 5bebfac09dd9abc5fe8b43f00ac596f0a5c998d1
  DEBIAN_EPOCH_MAJOR_MINOR_VERSION: "26.6"
  DEBIAN_EPOCH_MAJOR_VERSION: "26"
  DEBIAN_EPOCH_VERSION: 26.6.1
  JRE_REFERENCE: dhi/eclipse-temurin:21.0.10.7-debian13@sha256:5691e83dfdba43d0bf72a09cb793f5ac78563e7e1b76d31544c7b310a797c8aa
  JRE_VERSION: 21.0.10.7
  MAVEN_REFERENCE: dhi/maven:3.9.14-jdk21-debian13-dev@sha256:65f448b4a08a41ada20fd50c68fe771ed60fc55a298361a69aa303f26c42bb84
  MAVEN_VERSION: 3.9.14
  NODE_BUILD_REFERENCE: dhi/node:24.15.0-debian13-dev@sha256:04768889c40fa471029691aabe84dc75304c20e105c591984d95e4f4065bbda6
  NODE_BUILD_VERSION: 24.15.0
  NODE_REFERENCE: sha256:f4224680e72e4235283a924b299ae04eea7b722dc732cd2353a80ea274538c9c
  NODE_VERSION: 24.11.1
  VERSION: 26.6.1
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: keycloak
      uses: dhi.io/maven:3.9.14-jdk21-debian13-dev@sha256:65f448b4a08a41ada20fd50c68fe771ed60fc55a298361a69aa303f26c42bb84
      contents:
        packages:
          - coreutils
          - findutils
          - sed
          - bash
          - tar
          - gzip
        files:
          - url: git+https://github.com/keycloak/keycloak.git#26.6.1
            checksum: 5bebfac09dd9abc5fe8b43f00ac596f0a5c998d1
            path: ${source.dir}/keycloak
            spdx:
              name: keycloak
              version: 26.6.1
              packages:
                - name: keycloak
                  purl: pkg:dhi/keycloak@26.6.1
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:24.15.0-debian13-dev@sha256:04768889c40fa471029691aabe84dc75304c20e105c591984d95e4f4065bbda6
            includes:
              - opt/**
              - usr/local/bin
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: mvn/patch@v1
          with:
            dependencies: /src/patch/mvn-deps.json
            dependencies-key: dependencyManagement.dependencies
            mvn-root: ${source.dir}/keycloak
            properties: /src/patch/mvn-properties.json
        - name: build ui
          work-dir: ${source.dir}/keycloak/js
          privileged: true
          runs: |
            set -eux -o pipefail

            cat >> pnpm-workspace.yaml << EOF

            overrides:
              "jquery@3.4.1": "3.5.0"  # CVE-2020-11023, CVE-2020-11022, CVE-2020-23064
              "mdast-util-to-hast@13.2.0": "13.2.1"    # CVE-2025-66400
              "@remix-run/router": "1.23.2" # CVE-2026-22029
              "lodash-es": "4.18.0" # CVE-2026-4800, CVE-2026-2950
              "lodash": "4.18.0" # CVE-2026-4800, CVE-2026-2950
              "simple-git": "3.32.3" # CVE-2026-28292
              "yaml": "2.8.3" # CVE-2026-33532
            EOF

            pnpm i --prefer-offline --ignore-scripts

            # OpenAPI client generation (admin-client postinstall; skipped with
            # --ignore-scripts). Required before keycloak-admin-client builds.
            # Kiota is .NET: builder image has no libicu; invariant mode avoids ICU.
            export DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1
            pnpm --filter @keycloak/keycloak-admin-client run generate:openapi

            pnpm build
        - name: build
          work-dir: ${source.dir}/keycloak
          privileged: true
          runs: |
            set -eux -o pipefail

            mvn install -Dskip.pnpm -DskipTests -DskipExamples -DskipTestsuite -DskipProtoLock=true -Pdistribution
        - name: install
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/opt/keycloak"
            tar -xzf "${source.dir}/keycloak/quarkus/dist/target/keycloak-26.6.1.tar.gz" -C "${target.dir}/opt/keycloak" --strip-components=1

            "${target.dir}/opt/keycloak/bin/kc.sh" build

            chown -R 65532:65532 "${target.dir}/opt/keycloak"
        - name: prepare for sbom
          work-dir: ${source.dir}/keycloak/js
          privileged: true
          runs: |
            set -eux -o pipefail

            rm $(find . -type d -name 'node_modules') -rf

            export PATH="/opt/nodejs/node-v24.15.0/bin:$PATH"

            pnpm config --global set node-linker hoisted
            pnpm install -prod --prefer-offline --frozen-lockfile --ignore-scripts
        - name: sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: keycloak-ui
            source: ${source.dir}/keycloak/js/node_modules
      paths:
        - type: file
          path: /src/patch/mvn-properties.json
          uid: 0
          gid: 0
          source: image/keycloak/patch/mvn-properties.json
        - type: file
          path: /src/patch/mvn-deps.json
          uid: 0
          gid: 0
          source: image/keycloak/patch/mvn-deps.json
      outputs:
        - source: ${target.dir}/opt/keycloak
          target: /opt/keycloak
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/keycloak
          target: /opt/docker/sbom/keycloak
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/keycloak-ui
          target: /opt/docker/sbom/keycloak-ui
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.10.7-debian13@sha256:5691e83dfdba43d0bf72a09cb793f5ac78563e7e1b76d31544c7b310a797c8aa
      includes:
        - opt/**
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
