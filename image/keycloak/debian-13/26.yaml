# syntax=dhi.io/build:2-debian13

name: Keycloak 26.x
image: dhi.io/keycloak
variant: runtime
tags:
  - "26"
  - "26.6"
  - 26.6.4
  - 26-debian
  - 26-debian13
  - 26.6-debian
  - 26.6-debian13
  - 26.6.4-debian
  - 26.6.4-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-09-30"
vars:
  COMMIT_SHA: dc1bfc54bf1462f7e79822adb4c59aba7e25d50f
  DEBIAN_EPOCH_MAJOR_MINOR_VERSION: "26.6"
  DEBIAN_EPOCH_MAJOR_VERSION: "26"
  DEBIAN_EPOCH_VERSION: 26.6.4
  JRE_REFERENCE: dhi/eclipse-temurin:21.0.11.10-debian13@sha256:800bdc5077c5bbb1c8bfd6fb3c6009279c6d6502b802be53f7f89b49189d8552
  JRE_VERSION: 21.0.11.10
  MAVEN_REFERENCE: dhi/maven:3.9.16-jdk21-debian13-dev@sha256:8199c6479653f5e1b1d205c8dfa75cb8f311be8cd942552e2cc01d5c97b7a0e6
  MAVEN_VERSION: 3.9.16
  VERSION: 26.6.4
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - coreutils
    - findutils
    - sed
  builds:
    - name: keycloak
      uses: dhi.io/maven:3.9.16-jdk21-debian13-dev@sha256:8199c6479653f5e1b1d205c8dfa75cb8f311be8cd942552e2cc01d5c97b7a0e6
      contents:
        packages:
          - coreutils
          - findutils
          - sed
          - bash
          - tar
          - gzip
          - xmlstarlet
          - base-files
          - ca-certificates
          - git
          - libc6
          - libstdc++6
          - mawk
          - nodejs-24
          - node-corepack
          - npm
          - yarn-classic
        files:
          - url: git+https://github.com/keycloak/keycloak.git#26.6.4
            checksum: dc1bfc54bf1462f7e79822adb4c59aba7e25d50f
            path: ${source.dir}/keycloak
            spdx:
              name: keycloak
              version: 26.6.4
              packages:
                - name: keycloak
                  purl: pkg:dhi/keycloak@26.6.4
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://maven-central.storage-download.googleapis.com/maven2/io/netty/netty-transport-native-epoll/4.1.135.Final/netty-transport-native-epoll-4.1.135.Final-linux-x86_64.jar
            path: ${source.dir}/patch/deps/netty-transport-native-epoll-4.1.135.Final-linux-x86_64.jar
            uid: 0
            gid: 0
          - url: https://maven-central.storage-download.googleapis.com/maven2/io/netty/netty-transport-native-epoll/4.1.135.Final/netty-transport-native-epoll-4.1.135.Final-linux-aarch_64.jar
            path: ${source.dir}/patch/deps/netty-transport-native-epoll-4.1.135.Final-linux-aarch_64.jar
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: configure maven mirror
          runs: |
            set -eux -o pipefail

            # Overwrite the Cloudsmith mirror with GCS (public Maven Central
            # read replica). Used when MAVEN_USER/MAVEN_PASSWORD are unavailable
            # locally; mirrors the druid pattern for the same reason.
            mkdir -p /root/.m2
            cat > /root/.m2/settings.xml << 'EOF'
            <?xml version="1.0" encoding="UTF-8"?>
            <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
              <mirrors>
                <mirror>
                  <id>google-maven-central</id>
                  <name>GCS Maven Central mirror</name>
                  <url>https://maven-central.storage-download.googleapis.com/maven2/</url>
                  <mirrorOf>central</mirrorOf>
                </mirror>
              </mirrors>
            </settings>
            EOF
        - name: patch
          uses: mvn/patch@v1
          with:
            dependencies: /src/patch/mvn-deps.json
            dependencies-key: dependencyManagement.dependencies
            mvn-root: ${source.dir}/keycloak
            properties: /src/patch/mvn-properties.json
        - name: pin netty epoll native transport
          work-dir: ${source.dir}/keycloak
          runs: |
            set -eux -o pipefail

            for classifier in linux-x86_64 linux-aarch_64; do
              xmlstarlet ed -L \
                -N m="http://maven.apache.org/POM/4.0.0" \
                -s "/m:project/m:dependencyManagement/m:dependencies" -t elem -n "dependencyTMP" -v "" \
                -s "/m:project/m:dependencyManagement/m:dependencies/dependencyTMP" -t elem -n "groupId" -v "io.netty" \
                -s "/m:project/m:dependencyManagement/m:dependencies/dependencyTMP" -t elem -n "artifactId" -v "netty-transport-native-epoll" \
                -s "/m:project/m:dependencyManagement/m:dependencies/dependencyTMP" -t elem -n "version" -v "4.1.135.Final" \
                -s "/m:project/m:dependencyManagement/m:dependencies/dependencyTMP" -t elem -n "classifier" -v "${classifier}" \
                -r "/m:project/m:dependencyManagement/m:dependencies/dependencyTMP" -v "dependency" \
                pom.xml
            done
        - name: build ui
          work-dir: ${source.dir}/keycloak/js
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable
            corepack prepare pnpm@latest --activate

            # Upstream js/package.json already declares pnpm.overrides. In pnpm 10,
            # those take precedence over pnpm-workspace.yaml overrides, so adding
            # ours to pnpm-workspace.yaml has no effect for keys upstream pins
            # (and even for unrelated keys, the package.json overrides win).
            # Merge our CVE overrides directly into js/package.json#pnpm.overrides.
            node -e '
              const fs = require("fs");
              const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
              p.pnpm = p.pnpm || {};
              p.pnpm.overrides = Object.assign({}, p.pnpm.overrides, {
                "jquery": "3.5.0",
                "mdast-util-to-hast": "13.2.1",
                "@remix-run/router": "1.23.3",
                "react-router": "6.30.4",
                "lodash": "4.18.0",
                "lodash-es": "4.18.0",
                "simple-git": "3.36.0",
                "uuid": "13.0.1",
                "yaml": "2.8.3"
              });
              fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
            '

            pnpm install --prefer-offline --ignore-scripts --no-frozen-lockfile

            # OpenAPI client generation (admin-client postinstall; skipped with
            # --ignore-scripts). Required before keycloak-admin-client builds.
            # Kiota is .NET: builder image has no libicu; invariant mode avoids ICU.
            export DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1
            pnpm --filter @keycloak/keycloak-admin-client run generate:openapi

            pnpm build
        - name: remove maven build cache extension
          work-dir: ${source.dir}/keycloak
          runs: |
            set -eux -o pipefail

            # maven-build-cache-extension is not in the DHI Maven mirror and
            # provides no value in an isolated Docker build (no cache to reuse).
            # Use local-name() so the XPath matches regardless of whether the
            # file declares an xmlns or not.
            ext_xml=".mvn/extensions.xml"
            if [ -f "${ext_xml}" ]; then
              xmlstarlet ed -L \
                -d "//*[local-name()='extension'][*[local-name()='artifactId']='maven-build-cache-extension']" \
                "${ext_xml}"
            fi
        - name: build
          work-dir: ${source.dir}/keycloak
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            mvn install -Dskip.pnpm -DskipTests -DskipExamples -DskipTestsuite -DskipProtoLock=true -Pdistribution
        - name: install
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/opt/keycloak"
            tar -xzf "${source.dir}/keycloak/quarkus/dist/target/keycloak-26.6.4.tar.gz" -C "${target.dir}/opt/keycloak" --strip-components=1

            "${target.dir}/opt/keycloak/bin/kc.sh" build

            chown -R 65532:65532 "${target.dir}/opt/keycloak"
        - name: patch native netty classifier jars
          runs: |
            set -eux -o pipefail

            # mvn/patch bumps netty dependencyManagement to 4.1.135.Final, but
            # classifier JARs stay on the upstream line unless swapped explicitly
            # (CVE-2026-45536). Matches flyway/activemq-artemis pattern.
            kc_root="${target.dir}/opt/keycloak"
            netty_version="4.1.135.Final"

            for arch in x86_64 aarch_64; do
              find "${kc_root}" \
                -name "netty-transport-native-epoll-*-linux-${arch}.jar" \
                ! -name "netty-transport-native-epoll-${netty_version}-linux-${arch}.jar" \
                -delete

              epoll_lib=$(find "${kc_root}" -path '*/lib/main' -type d 2> /dev/null | head -1)
              if [ -z "${epoll_lib}" ]; then
                handler_jar=$(find "${kc_root}" -name 'netty-handler-*.jar' -print -quit)
                if [ -n "${handler_jar}" ]; then
                  epoll_lib=$(dirname "${handler_jar}")
                fi
              fi
              if [ -n "${epoll_lib}" ]; then
                install -m 0644 \
                  "${source.dir}/patch/deps/netty-transport-native-epoll-${netty_version}-linux-${arch}.jar" \
                  "${epoll_lib}/netty-transport-native-epoll-${netty_version}-linux-${arch}.jar"
              fi
            done

            chown -R 65532:65532 "${kc_root}"
        - name: prepare for sbom
          work-dir: ${source.dir}/keycloak/js
          privileged: true
          runs: |
            set -eux -o pipefail

            find . -depth -type d -name node_modules -exec rm -rf {} +

            export PATH="/usr/bin:$PATH"

            pnpm config --global set node-linker hoisted
            pnpm install -prod --prefer-offline --frozen-lockfile --ignore-scripts
        - name: sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: keycloak-ui
            source: ${source.dir}/keycloak/js/node_modules
      paths:
        - type: file
          path: /src/patch/mvn-properties.json
          uid: 0
          gid: 0
          source: image/keycloak/patch/mvn-properties.json
        - type: file
          path: /src/patch/mvn-deps.json
          uid: 0
          gid: 0
          source: image/keycloak/patch/mvn-deps.json
      outputs:
        - source: ${target.dir}/opt/keycloak
          target: /opt/keycloak
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/keycloak
          target: /opt/docker/sbom/keycloak
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/keycloak-ui
          target: /opt/docker/sbom/keycloak-ui
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.11.10-debian13@sha256:800bdc5077c5bbb1c8bfd6fb3c6009279c6d6502b802be53f7f89b49189d8552
      includes:
        - opt/**
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
