# syntax=dhi.io/build:2-debian13

name: Keycloak 26.x
image: dhi.io/keycloak
variant: runtime
tags:
  - "26"
  - "26.6"
  - 26.6.1
  - 26-debian13
  - 26.6-debian13
  - 26.6.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-09-30"
vars:
  COMMIT_SHA: 5bebfac09dd9abc5fe8b43f00ac596f0a5c998d1
  DEBIAN_EPOCH_MAJOR_MINOR_VERSION: "26.6"
  DEBIAN_EPOCH_MAJOR_VERSION: "26"
  DEBIAN_EPOCH_VERSION: 26.6.1
  JRE_REFERENCE: dhi/eclipse-temurin:21.0.11.10-debian13@sha256:1a1dbb27530b1f279f8ca73354a3da9b8d64b8c9a5540a3e58b3030eb8322f3d
  JRE_VERSION: 21.0.11.10
  MAVEN_REFERENCE: dhi/maven:3.9.15-jdk21-debian13-dev@sha256:ee36e4d9023b20bcaf7eada220bf4c15d7db2e5a33a3c0ba2ead122028df20af
  MAVEN_VERSION: 3.9.15
  NODE_BUILD_REFERENCE: dhi/node:24.15.0-debian13-dev@sha256:bb3cc390be776ca02e6c155cba987b610f8755d561fc42261622f7a2d04c9a22
  NODE_BUILD_VERSION: 24.15.0
  NODE_REFERENCE: sha256:f4224680e72e4235283a924b299ae04eea7b722dc732cd2353a80ea274538c9c
  NODE_VERSION: 24.11.1
  VERSION: 26.6.1
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - coreutils
    - findutils
    - sed
  builds:
    - name: keycloak
      uses: dhi.io/maven:3.9.15-jdk21-debian13-dev@sha256:ee36e4d9023b20bcaf7eada220bf4c15d7db2e5a33a3c0ba2ead122028df20af
      contents:
        packages:
          - coreutils
          - findutils
          - sed
          - bash
          - tar
          - gzip
        files:
          - url: git+https://github.com/keycloak/keycloak.git#26.6.1
            checksum: 5bebfac09dd9abc5fe8b43f00ac596f0a5c998d1
            path: ${source.dir}/keycloak
            spdx:
              name: keycloak
              version: 26.6.1
              packages:
                - name: keycloak
                  purl: pkg:dhi/keycloak@26.6.1
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:24.15.0-debian13-dev@sha256:bb3cc390be776ca02e6c155cba987b610f8755d561fc42261622f7a2d04c9a22
            includes:
              - opt/**
              - usr/local/bin
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: patch
          uses: mvn/patch@v1
          with:
            dependencies: /src/patch/mvn-deps.json
            dependencies-key: dependencyManagement.dependencies
            mvn-root: ${source.dir}/keycloak
            properties: /src/patch/mvn-properties.json
        - name: build ui
          work-dir: ${source.dir}/keycloak/js
          privileged: true
          runs: |
            set -eux -o pipefail

            # Upstream js/package.json already declares pnpm.overrides. In pnpm 10,
            # those take precedence over pnpm-workspace.yaml overrides, so adding
            # ours to pnpm-workspace.yaml has no effect for keys upstream pins
            # (and even for unrelated keys, the package.json overrides win).
            # Merge our CVE overrides directly into js/package.json#pnpm.overrides.
            node -e '
              const fs = require("fs");
              const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
              p.pnpm = p.pnpm || {};
              p.pnpm.overrides = Object.assign({}, p.pnpm.overrides, {
                "jquery": "3.5.0",
                "mdast-util-to-hast": "13.2.1",
                "@remix-run/router": "1.23.2",
                "lodash": "4.18.0",
                "lodash-es": "4.18.0",
                "simple-git": "3.36.0",
                "uuid": "13.0.1",
                "yaml": "2.8.3"
              });
              fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
            '

            pnpm install --prefer-offline --ignore-scripts --no-frozen-lockfile

            # OpenAPI client generation (admin-client postinstall; skipped with
            # --ignore-scripts). Required before keycloak-admin-client builds.
            # Kiota is .NET: builder image has no libicu; invariant mode avoids ICU.
            export DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1
            pnpm --filter @keycloak/keycloak-admin-client run generate:openapi

            pnpm build
        - name: build
          work-dir: ${source.dir}/keycloak
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            mvn install -Dskip.pnpm -DskipTests -DskipExamples -DskipTestsuite -DskipProtoLock=true -Pdistribution
        - name: install
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/opt/keycloak"
            tar -xzf "${source.dir}/keycloak/quarkus/dist/target/keycloak-26.6.1.tar.gz" -C "${target.dir}/opt/keycloak" --strip-components=1

            "${target.dir}/opt/keycloak/bin/kc.sh" build

            chown -R 65532:65532 "${target.dir}/opt/keycloak"
        - name: prepare for sbom
          work-dir: ${source.dir}/keycloak/js
          privileged: true
          runs: |
            set -eux -o pipefail

            find . -depth -type d -name node_modules -exec rm -rf {} +

            export PATH="/opt/nodejs/node-v24.15.0/bin:$PATH"

            pnpm config --global set node-linker hoisted
            pnpm install -prod --prefer-offline --frozen-lockfile --ignore-scripts
        - name: sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: keycloak-ui
            source: ${source.dir}/keycloak/js/node_modules
      paths:
        - type: file
          path: /src/patch/mvn-properties.json
          uid: 0
          gid: 0
          source: image/keycloak/patch/mvn-properties.json
        - type: file
          path: /src/patch/mvn-deps.json
          uid: 0
          gid: 0
          source: image/keycloak/patch/mvn-deps.json
      outputs:
        - source: ${target.dir}/opt/keycloak
          target: /opt/keycloak
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/keycloak
          target: /opt/docker/sbom/keycloak
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/keycloak-ui
          target: /opt/docker/sbom/keycloak-ui
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.11.10-debian13@sha256:1a1dbb27530b1f279f8ca73354a3da9b8d64b8c9a5540a3e58b3030eb8322f3d
      includes:
        - opt/**
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
