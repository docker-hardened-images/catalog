vars:
  COMMIT_SHA: 619bd51f27dc73c6ccfa4442cd5d05addaa70ed9
  GO_VERSION: "1"
  GOLANG_REFERENCE: dhi/golang:1.26.2-debian13-dev@sha256:f23dec55948a320ec1663d6d40d7fd052fcf7b2ecb43c3ecdf1900843403d301
  NODE_REFERENCE: dhi/node:22.22.2-debian13-dev@sha256:a620047a62f01b4a96525c42280dc2b9b02f3793b743ce0d7e96548a6dedc28d
