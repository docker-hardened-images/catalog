  PYTHON_VERSION: 3.13.13
  RUST_REFERENCE: dhi/rust:1.94.1-debian13@sha256:79aad500c2d71d40c93d80fe1dfc3e5a88e05aac4ac9557224f8e4ed8142f6d2
  RUST_VERSION: 1.94.1
  SEMVER_MAJOR_MINOR_VERSION: "12.1"
  SEMVER_MAJOR_VERSION: "12"
  SEMVER_VERSION: 12.1.10
  VERSION: 12.1.10
contents:
  packages:
    - '!dpkg'
    - '!gawk'
    - '!libelogind0'
    - '!libslang2'
    - '!mawk'
    - '!original-awk'
    - '!tar'
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - findutils
    - tar
  builds:
    - name: grafana
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:f23dec55948a320ec1663d6d40d7fd052fcf7b2ecb43c3ecdf1900843403d301
      caches:
        - path: /usr/local/share/.cache/yarn
      contents:
        packages:
          - bash
          - sed
          - grep
          - make
          - build-essential
          - python3-setuptools
          - grep
          - gcc
          - chromium
          - jq
        files:
          - url: git+https://github.com/grafana/grafana.git#v12.1.10
            checksum: 619bd51f27dc73c6ccfa4442cd5d05addaa70ed9
            path: /go/src/github.com/grafana/grafana
            spdx:
              name: grafana
              version: 12.1.10
              packages:
                - name: grafana
                  purl: pkg:dhi/grafana@12.1.10
                  license: AGPL-3.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:22.22.2-debian13-dev@sha256:a620047a62f01b4a96525c42280dc2b9b02f3793b743ce0d7e96548a6dedc28d
            includes:
              - opt/**
              - usr/local/bin
            uid: 0
            gid: 0
          - name: dhi.io/python:3.13.13-debian13-dev@sha256:845321bee112dc8c2220dfaecc5204096bd8f8ab349a7d8bb862693751aa0e2d
            includes:
              - opt/**
              - usr/local/bin
            uid: 0
            gid: 0
          - name: dhi.io/rust:1.94.1-debian13@sha256:79aad500c2d71d40c93d80fe1dfc3e5a88e05aac4ac9557224f8e4ed8142f6d2
            includes:
              - opt/**
              - usr/local/bin
            uid: 0
            gid: 0
      pipeline:
        - name: update version
          work-dir: /go/src/github.com/grafana/grafana
          runs: |
            set -eux -o pipefail

            # The tagged source contains an old version in package.json
            sed -i "s/\"version\": \"[0-9]\+\.[0-9]\+\.[0-9]\+\"/\"version\": \"12.1.10\"/g" package.json
        - name: update node-gyp
          work-dir: /go/src/github.com/grafana/grafana
          privileged: true
          runs: |
            set -eux -o pipefail

            # Update node-gyp version to be compatible with Python >=3.12
            jq '.resolutions += { "node-gyp" : "^10.0.0" }' package.json > package.new.json
            rm package.json
            mv package.new.json package.json

            # Update lockfile with updated versions
            yarn install
        - name: build ui
          work-dir: /go/src/github.com/grafana/grafana
          privileged: true
          runs: |
            set -eux -o pipefail

            export NODE_OPTIONS=--max_old_space_size=8000
            yarn install --immutable

            export NODE_ENV=production
            yarn build

            mkdir -p "${target.dir}/usr/share/grafana/public/"
            cp -r public/* "${target.dir}/usr/share/grafana/public/"
        - name: update go dependencies 12.1
          uses: go/bump@v1
          work-dir: /go/src/github.com/grafana/grafana
          with:
            deps:
              - golang.org/x/crypto@v0.45.0
              - github.com/cloudflare/circl@v1.6.3
              - github.com/go-git/go-git/v5@v5.16.5
              - go.opentelemetry.io/otel/sdk@v1.40.0
              - google.golang.org/grpc@v1.79.3
              - github.com/buger/jsonparser@v1.1.2
              - github.com/cloudflare/circl@v1.6.3
            downgrade: true
        - name: compile
          work-dir: /go/src/github.com/grafana/grafana
          privileged: true
          runs: |
            set -eux -o pipefail

            make build-go
        - name: install
          work-dir: /go/src/github.com/grafana/grafana
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/share/grafana/bin/"
            cp ./bin/*/grafana* "${target.dir}/usr/share/grafana/bin/"

            mkdir -p "${target.dir}/etc/grafana/"
            cp conf/sample.ini "${target.dir}/etc/grafana/grafana.ini"
            cp conf/ldap.toml "${target.dir}/etc/grafana/ldap.toml"

            mkdir -p "${target.dir}/usr/share/grafana/conf/"
            cp -r conf/* "${target.dir}/usr/share/grafana/conf/"
      outputs:
        - source: ${target.dir}/usr/share/grafana/public
          target: /usr/share/grafana/public
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/share/grafana/bin
          target: /usr/share/grafana/bin
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/grafana
          target: /etc/grafana
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/share/grafana/conf
          target: /usr/share/grafana/conf
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/grafana
          target: /opt/docker/sbom/grafana
          uid: 0
          gid: 0
