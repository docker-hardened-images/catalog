  PYTHON_REFERENCE: dhi/python:3.13.12-debian13-dev@sha256:05dabce7a0e0236e3fe1a78813cbd915f3095fbc7500d8f8241340fa227e09d5
  PYTHON_VERSION: 3.13.12
  RUST_REFERENCE: dhi/rust:1.94.0-debian13@sha256:8066ca1113783f15644672868139bacfa10bda4eff49e39c3ff8c59f8e4b4dcd
  RUST_VERSION: 1.94.0
  SEMVER_MAJOR_MINOR_VERSION: "12.3"
  SEMVER_MAJOR_VERSION: "12"
