vars:
  COMMIT_SHA: 6b96ceff49a8b6a5cb85773061d2ee8b1bef8f56
  GO_VERSION: "1"
  GOLANG_REFERENCE: dhi/golang:1.26.1-debian13-dev@sha256:aa167fed4e25a97975901c225acab6751b26dfd23084033b80a610e4be860bab
