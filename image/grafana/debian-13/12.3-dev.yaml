  VERSION: 12.3.5
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tar
    - util-linux
  builds:
    - name: grafana
      uses: dhi.io/golang:1.26.1-debian13-dev@sha256:aa167fed4e25a97975901c225acab6751b26dfd23084033b80a610e4be860bab
      caches:
        - path: /usr/local/share/.cache/yarn
      contents:
        packages:
          - bash
          - sed
          - grep
          - make
          - build-essential
          - python3-setuptools
          - grep
          - gcc
          - chromium
          - jq
        files:
          - url: git+https://github.com/grafana/grafana.git#v12.3.5
            checksum: 6b96ceff49a8b6a5cb85773061d2ee8b1bef8f56
            path: /go/src/github.com/grafana/grafana
            spdx:
              name: grafana
              version: 12.3.5
              packages:
                - name: grafana
                  purl: pkg:dhi/grafana@12.3.5
                  license: AGPL-3.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:22.22.1-debian13-dev@sha256:238e724502a5c1186ef01a69fb5eb6256744e71fea63045ac699406b97d403eb
            includes:
              - opt/**
              - usr/local/bin
            uid: 0
            gid: 0
          - name: dhi.io/python:3.13.12-debian13-dev@sha256:05dabce7a0e0236e3fe1a78813cbd915f3095fbc7500d8f8241340fa227e09d5
            includes:
              - opt/**
              - usr/local/bin
            uid: 0
            gid: 0
          - name: dhi.io/rust:1.94.0-debian13@sha256:8066ca1113783f15644672868139bacfa10bda4eff49e39c3ff8c59f8e4b4dcd
            includes:
              - opt/**
              - usr/local/bin
            uid: 0
            gid: 0
      pipeline:
        - name: update version
          work-dir: /go/src/github.com/grafana/grafana
          runs: |
            set -eux -o pipefail

            # The tagged source contains an old version in package.json
            sed -i "s/\"version\": \"[0-9]\+\.[0-9]\+\.[0-9]\+\"/\"version\": \"12.3.5\"/g" package.json
        - name: update node-gyp
          work-dir: /go/src/github.com/grafana/grafana
          privileged: true
          runs: |
            set -eux -o pipefail

            # Update node-gyp version to be compatible with Python >=3.12
            jq '.resolutions += { "node-gyp" : "^10.0.0" }' package.json > package.new.json
            rm package.json
            mv package.new.json package.json

            # Update lockfile with updated versions
            yarn install
        - name: build ui
          work-dir: /go/src/github.com/grafana/grafana
          privileged: true
          runs: |
            set -eux -o pipefail

            export NODE_OPTIONS=--max_old_space_size=8000
            yarn install --immutable

            export NODE_ENV=production
            yarn build

            mkdir -p "${target.dir}/usr/share/grafana/public/"
            cp -r public/* "${target.dir}/usr/share/grafana/public/"
        - name: update go dependencies 12.3
          uses: go/bump@v1
          work-dir: /go/src/github.com/grafana/grafana
          with:
            deps:
              - golang.org/x/crypto@v0.45.0
              - github.com/openfga/openfga@v1.11.1
              - go.opentelemetry.io/otel/sdk@v1.40.0
              - github.com/cloudflare/circl@v1.6.3
            downgrade: true
        - name: compile
          work-dir: /go/src/github.com/grafana/grafana
          privileged: true
          runs: |
            set -eux -o pipefail

            make build-go
        - name: install
          work-dir: /go/src/github.com/grafana/grafana
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/share/grafana/bin/"
            cp ./bin/*/grafana* "${target.dir}/usr/share/grafana/bin/"

            mkdir -p "${target.dir}/etc/grafana/"
            cp conf/sample.ini "${target.dir}/etc/grafana/grafana.ini"
            cp conf/ldap.toml "${target.dir}/etc/grafana/ldap.toml"

            mkdir -p "${target.dir}/usr/share/grafana/conf/"
            cp -r conf/* "${target.dir}/usr/share/grafana/conf/"
      outputs:
        - source: ${target.dir}/usr/share/grafana/public
          target: /usr/share/grafana/public
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/share/grafana/bin
          target: /usr/share/grafana/bin
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/grafana
          target: /etc/grafana
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/share/grafana/conf
          target: /usr/share/grafana/conf
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/grafana
          target: /opt/docker/sbom/grafana
          uid: 0
          gid: 0
