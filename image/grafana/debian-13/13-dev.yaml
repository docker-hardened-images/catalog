# syntax=dhi.io/build:2-debian13

name: Grafana 13.1.x (dev)
image: dhi.io/grafana
variant: dev
tags:
  - 13-dev
  - 13.1-dev
  - 13.1.0-dev
  - 13-debian-dev
  - 13-debian13-dev
  - 13.1-debian-dev
  - 13.1-debian13-dev
  - 13.1.0-debian-dev
  - 13.1.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-14"
  end-of-life: "2026-08-18"
vars:
  COMMIT_SHA: b309c9bb3b81a748c3a75289236a27309ed2566a
  RUST_REFERENCE: dhi/rust:1.96.1-debian13@sha256:9f7bef84b7b212a84a62f3ca39c76e72bc2ae2180c07568b8c94e83f11436f0f
  RUST_VERSION: 1.96.1
  SEMVER_MAJOR_MINOR_VERSION: "13.1"
  SEMVER_MAJOR_VERSION: "13"
  SEMVER_VERSION: 13.1.0
  VERSION: 13.1.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!dpkg'
    - '!gawk'
    - '!libelogind0'
    - '!libslang2'
    - '!mawk'
    - '!original-awk'
    - '!tar'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tar
    - tzdata
    - util-linux
  builds:
    - name: grafana front end
      caches:
        - path: /usr/local/share/.cache/yarn
      contents:
        packages:
          - bash
          - sed
          - grep
          - make
          - build-essential
          - python3-setuptools
          - grep
          - gcc
          - chromium
          - jq
          - base-files
          - ca-certificates
          - coreutils
          - findutils
          - git
          - libc6
          - libstdc++6
          - mawk
          - nodejs-24
          - node-corepack
          - npm
          - yarn-classic
          - python-3.13
          - python-3.13-dev
          - python3-pip
          - python3-wheel
          - diffutils
          - gawk
        files:
          - url: git+https://github.com/grafana/grafana.git#v13.1.0
            checksum: b309c9bb3b81a748c3a75289236a27309ed2566a
            path: /go/src/github.com/grafana/grafana
            spdx:
              name: grafana
              version: 13.1.0
              packages:
                - name: grafana
                  purl: pkg:dhi/grafana@13.1.0
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update version
          work-dir: /go/src/github.com/grafana/grafana
          runs: |
            set -eux -o pipefail

            # The tagged source contains an old version in package.json
            sed -i "s/\"version\": \"[0-9]\+\.[0-9]\+\.[0-9]\+\"/\"version\": \"13.1.0\"/g" package.json
        - name: update node-gyp
          work-dir: /go/src/github.com/grafana/grafana
          privileged: true
          runs: |
            set -eux -o pipefail

            # Update node-gyp version to be compatible with Python >=3.12
            jq '.resolutions += { "node-gyp" : "^10.0.0" }' package.json > package.new.json
            rm package.json
            mv package.new.json package.json

            # Update lockfile with updated versions
            yarn install
        - name: build ui
          work-dir: /go/src/github.com/grafana/grafana
          privileged: true
          runs: |
            set -eux -o pipefail

            export NODE_OPTIONS=--max_old_space_size=8000
            yarn install --immutable

            export NODE_ENV=production
            yarn build

            mkdir -p "${target.dir}/usr/share/grafana/public/"
            cp -r public/* "${target.dir}/usr/share/grafana/public/"
      outputs:
        - source: ${target.dir}/usr/share/grafana/public
          target: /usr/share/grafana/public
          uid: 0
          gid: 0
    - name: grafana back end
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - sed
          - grep
          - make
          - build-essential
          - grep
          - gcc
          - jq
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
        files:
          - url: git+https://github.com/grafana/grafana.git#v13.1.0
            checksum: b309c9bb3b81a748c3a75289236a27309ed2566a
            path: /go/src/github.com/grafana/grafana
            spdx:
              name: grafana
              version: 13.1.0
              packages:
                - name: grafana
                  purl: pkg:dhi/grafana@13.1.0
                  license: AGPL-3.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/rust:1.96.1-debian13@sha256:9f7bef84b7b212a84a62f3ca39c76e72bc2ae2180c07568b8c94e83f11436f0f
            includes:
              - opt/**
              - usr/local/bin
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies 12.2 (13 only)
          uses: go/bump@v2
          work-dir: /go/src/github.com/grafana/grafana
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/buger/jsonparser@v1.1.2
              - github.com/cloudflare/circl@v1.6.3
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - github.com/moby/spdystream@v0.5.1
              - github.com/openfga/openfga@v1.18.0
              - go.opentelemetry.io/otel/log@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - software.sslmate.com/src/go-pkcs12@v0.7.2
        - name: compile
          work-dir: /go/src/github.com/grafana/grafana
          privileged: true
          runs: |
            set -eux -o pipefail

            make build-go
        - name: install
          work-dir: /go/src/github.com/grafana/grafana
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/share/grafana/bin/"
            # Grafana may emit binaries under bin/linux/<arch>/ (nested) or bin/*/ (one level); a
            # single * does not match bin/linux/arm64/grafana*, so collect by name.
            find ./bin -type f -name 'grafana*' -exec cp {} "${target.dir}/usr/share/grafana/bin/" \;

            mkdir -p "${target.dir}/etc/grafana/"
            cp conf/sample.ini "${target.dir}/etc/grafana/grafana.ini"
            cp conf/ldap.toml "${target.dir}/etc/grafana/ldap.toml"

            mkdir -p "${target.dir}/usr/share/grafana/conf/"
            cp -r conf/* "${target.dir}/usr/share/grafana/conf/"
      outputs:
        - source: ${target.dir}/usr/share/grafana/bin
          target: /usr/share/grafana/bin
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/grafana
          target: /etc/grafana
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/share/grafana/conf
          target: /usr/share/grafana/conf
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/grafana
          target: /opt/docker/sbom/grafana
          uid: 0
          gid: 0
accounts:
