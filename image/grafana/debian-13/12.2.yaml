# syntax=dhi.io/build:2-debian13

name: Grafana 12.2.x
image: dhi.io/grafana
variant: runtime
tags:
  - "12.2"
  - 12.2.8
  - 12.2-debian13
  - 12.2.8-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-09-23"
  end-of-life: "2026-06-23"
vars:
  COMMIT_SHA: 576f2e81b33bc857df779c95cb38effaa6c58b03
  GO_VERSION: "1"
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:4209a08b8d03addadd22d98483519296d2f1fb78e6dd84c459b2b3d6d478ac4b
  NODE_REFERENCE: dhi/node:22.22.2-debian13-dev@sha256:2b93f110a0acddc09660b1a2e0d45c596842751c3d00fa58f26a7b3f7e4287c2
  NODE_VERSION: 22.22.2
  PYTHON_REFERENCE: dhi/python:3.13.13-debian13-dev@sha256:c96d691f22c82f3dfc7f78c7935331a127d5f44e273265a1e03912f819eb640e
  PYTHON_VERSION: 3.13.13
  RUST_REFERENCE: dhi/rust:1.95.0-debian13@sha256:7821ed9522b94e31eeb1b4a3403f20f70f430ac08bc31a63e47d51a56cd0eb0e
  RUST_VERSION: 1.95.0
  SEMVER_MAJOR_MINOR_VERSION: "12.2"
  SEMVER_MAJOR_VERSION: "12"
  SEMVER_VERSION: 12.2.8
  VERSION: 12.2.8
contents:
  packages:
    - '!dpkg'
    - '!gawk'
    - '!libelogind0'
    - '!libslang2'
    - '!mawk'
    - '!original-awk'
    - '!tar'
    - base-files
    - ca-certificates
    - tzdata
  builds:
    - name: grafana
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:4209a08b8d03addadd22d98483519296d2f1fb78e6dd84c459b2b3d6d478ac4b
      caches:
        - path: /usr/local/share/.cache/yarn
      contents:
        packages:
          - bash
          - sed
          - grep
          - make
          - build-essential
          - python3-setuptools
          - grep
          - gcc
          - chromium
          - jq
        files:
          - url: git+https://github.com/grafana/grafana.git#v12.2.8
            checksum: 576f2e81b33bc857df779c95cb38effaa6c58b03
            path: /go/src/github.com/grafana/grafana
            spdx:
              name: grafana
              version: 12.2.8
              packages:
                - name: grafana
                  purl: pkg:dhi/grafana@12.2.8
                  license: AGPL-3.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:22.22.2-debian13-dev@sha256:2b93f110a0acddc09660b1a2e0d45c596842751c3d00fa58f26a7b3f7e4287c2
            includes:
              - opt/**
              - usr/local/bin
            uid: 0
            gid: 0
          - name: dhi.io/python:3.13.13-debian13-dev@sha256:c96d691f22c82f3dfc7f78c7935331a127d5f44e273265a1e03912f819eb640e
            includes:
              - opt/**
              - usr/local/bin
            uid: 0
            gid: 0
          - name: dhi.io/rust:1.95.0-debian13@sha256:7821ed9522b94e31eeb1b4a3403f20f70f430ac08bc31a63e47d51a56cd0eb0e
            includes:
              - opt/**
              - usr/local/bin
            uid: 0
            gid: 0
      pipeline:
        - name: update version
          work-dir: /go/src/github.com/grafana/grafana
          runs: |
            set -eux -o pipefail

            # The tagged source contains an old version in package.json
            sed -i "s/\"version\": \"[0-9]\+\.[0-9]\+\.[0-9]\+\"/\"version\": \"12.2.8\"/g" package.json
        - name: update node-gyp
          work-dir: /go/src/github.com/grafana/grafana
          privileged: true
          runs: |
            set -eux -o pipefail

            # Update node-gyp version to be compatible with Python >=3.12
            jq '.resolutions += { "node-gyp" : "^10.0.0" }' package.json > package.new.json
            rm package.json
            mv package.new.json package.json

            # Update lockfile with updated versions
            yarn install
        - name: build ui
          work-dir: /go/src/github.com/grafana/grafana
          privileged: true
          runs: |
            set -eux -o pipefail

            export NODE_OPTIONS=--max_old_space_size=8000
            yarn install --immutable

            export NODE_ENV=production
            yarn build

            mkdir -p "${target.dir}/usr/share/grafana/public/"
            cp -r public/* "${target.dir}/usr/share/grafana/public/"
        - name: update go dependencies 12.2
          uses: go/bump@v2
          work-dir: /go/src/github.com/grafana/grafana
          with:
            deps:
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/cloudwatchlogs@v1.65.0
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/cloudflare/circl@v1.6.3
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/stdout/stdoutlog@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
              - github.com/buger/jsonparser@v1.1.2
              - github.com/moby/spdystream@v0.5.1
              - github.com/jackc/pgx/v5@v5.9.2
              - github.com/openfga/openfga@v1.14.1
              - github.com/apache/thrift@v0.23.0
        - name: compile
          work-dir: /go/src/github.com/grafana/grafana
          privileged: true
          runs: |
            set -eux -o pipefail

            make build-go
        - name: install
          work-dir: /go/src/github.com/grafana/grafana
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/share/grafana/bin/"
            # Grafana may emit binaries under bin/linux/<arch>/ (nested) or bin/*/ (one level); a
            # single * does not match bin/linux/arm64/grafana*, so collect by name.
            find ./bin -type f -name 'grafana*' -exec cp {} "${target.dir}/usr/share/grafana/bin/" \;

            mkdir -p "${target.dir}/etc/grafana/"
            cp conf/sample.ini "${target.dir}/etc/grafana/grafana.ini"
            cp conf/ldap.toml "${target.dir}/etc/grafana/ldap.toml"

            mkdir -p "${target.dir}/usr/share/grafana/conf/"
            cp -r conf/* "${target.dir}/usr/share/grafana/conf/"
      outputs:
        - source: ${target.dir}/usr/share/grafana/public
          target: /usr/share/grafana/public
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/share/grafana/bin
          target: /usr/share/grafana/bin
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/grafana
          target: /etc/grafana
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/share/grafana/conf
          target: /usr/share/grafana/conf
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/grafana
          target: /opt/docker/sbom/grafana
          uid: 0
          gid: 0
accounts:
  run-as: grafana
  users:
