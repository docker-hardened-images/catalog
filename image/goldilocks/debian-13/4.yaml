# syntax=dhi.io/build:2-debian13

name: Goldilocks 4.x
image: dhi.io/goldilocks
variant: runtime
tags:
  - "4"
  - "4.15"
  - 4.15.1
  - 4-debian
  - 4-debian13
  - 4.15-debian
  - 4.15-debian13
  - 4.15.1-debian
  - 4.15.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-01-21"
vars:
  COMMIT_SHA: 93e16c312bede765ede4fe2823c014b992fbbc0c
  SEMVER_MAJOR_MINOR_VERSION: "4.15"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.15.1
  VERSION: 4.15.1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: goldilocks
      work-dir: /go/src/github.com/fairwindsops/goldilocks
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/FairwindsOps/goldilocks.git#v4.15.1
            checksum: 93e16c312bede765ede4fe2823c014b992fbbc0c
            path: /go/src/github.com/fairwindsops/goldilocks
            spdx:
              name: goldilocks
              version: 4.15.1
              packages:
                - name: goldilocks
                  purl: pkg:golang/github.com/fairwindsops/goldilocks@4.15.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/text@v0.39.0
              - golang.org/x/net@v0.56.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Run unit tests
            go test ./... -short -count=1 -v
        - name: build goldilocks
          uses: go/build@v1
          with:
            ldflags:
              - -X main.version=4.15.1
              - -X main.commit=93e16c312bede765ede4fe2823c014b992fbbc0c
              - -s
              - -w
            output: ${target.dir}/usr/local/bin/goldilocks
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin/goldilocks
          target: /usr/local/bin/goldilocks
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/goldilocks
          target: /opt/docker/sbom/goldilocks
          uid: 0
          gid: 0
accounts:
  run-as: "10324"
  users:
    - name: goldilocks
      uid: 10324
      gid: 10324
  groups:
    - name: goldilocks
      gid: 10324
      members:
        - goldilocks
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /goldilocks
    uid: 0
    gid: 0
    source: /usr/local/bin/goldilocks
annotations:
  org.opencontainers.image.description: A minimal Goldilocks image
  org.opencontainers.image.licenses: Apache-2.0
cmd:
  - /goldilocks
ports:
  - 8080/tcp
