# syntax=dhi.io/build:2-alpine3.23

name: Socat 1.x (dev)
image: dhi.io/socat
variant: dev
tags:
  - 1-alpine-dev
  - 1.8-alpine-dev
  - 1-alpine3.24-dev
  - 1.8.1-alpine-dev
  - 1.8-alpine3.24-dev
  - 1.8.1-alpine3.24-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-05-15"
vars:
  CHECKSUM: f68b602c80e94b4b7498d74ec408785536fe33534b39467977a82ab2f7f01ddb
  SEMVER_MAJOR_MINOR_VERSION: "1.8"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.8.1
  SRC_VERSION: 1.8.1.1
  VERSION: 1.8.1.1-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - apk-tools
    - busybox
    - ca-certificates
    - coreutils
    - findutils
    - libcrypto3
    - libssl3
    - readline
  builds:
    - name: socat
      contents:
        repositories:
          - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
        packages:
          - busybox
          - gcc
          - libc-dev
          - linux-headers
          - make
          - musl-utils
          - openssl-dev
          - readline-dev
        files:
          - url: http://www.dest-unreach.org/socat/download/socat-1.8.1.1.tar.gz
            checksum: sha256:f68b602c80e94b4b7498d74ec408785536fe33534b39467977a82ab2f7f01ddb
            path: ${source.dir}/socat.tar.gz
            spdx:
              name: socat
              version: 1.8.1.1-r0
              packages:
                - name: socat
                  purl: pkg:dhi/socat@1.8.1.1-r0
                  license: GPL-2.0-only WITH OpenSSL-Exception
            uid: 0
            gid: 0
      pipeline:
        - name: build and install
          runs: |
            set -eux -o pipefail

            echo "f68b602c80e94b4b7498d74ec408785536fe33534b39467977a82ab2f7f01ddb  socat.tar.gz" | sha256sum -c -
            mkdir -p socat
            tar -xzf socat.tar.gz -C socat --strip-components=1
            cd socat

            ./configure \
              --prefix="${target.dir}/opt/socat"

            ncpus=$(getconf _NPROCESSORS_ONLN)
            ncpus=$((ncpus > 6 ? 6 : ncpus))

            make -j"$ncpus"
            make install
      outputs:
        - source: ${target.dir}/opt/socat
          target: /opt/socat
          uid: 0
          gid: 0
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  PATH: /opt/socat/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  SOCAT_VERSION: 1.8.1.1-r0
annotations:
  org.opencontainers.image.description: A minimal socat image
  org.opencontainers.image.licenses: GPL-2.0-only WITH OpenSSL-Exception
entrypoint:
  - socat
cmd:
  - -h
