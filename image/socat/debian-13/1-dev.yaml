# syntax=dhi.io/build:2-debian13

name: Socat 1.x (dev)
image: dhi.io/socat
variant: dev
tags:
  - 1-dev
  - 1.8-dev
  - 1.8.0-dev
  - 1-debian13-dev
  - 1.8-debian13-dev
  - 1.8.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-05-15"
vars:
  CHECKSUM: a9f9eb6cfb9aa6b1b4b8fe260edbac3f2c743f294db1e362b932eb3feca37ba4
  SEMVER_MAJOR_MINOR_VERSION: "1.8"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.8.0
  VERSION: 1.8.0.3
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libreadline8t64
    - libssl3t64
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: socat
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - gzip
          - libc-bin
          - libssl-dev
          - libreadline-dev
          - sed
        files:
          - url: http://www.dest-unreach.org/socat/download/socat-1.8.0.3.tar.gz
            checksum: sha256:a9f9eb6cfb9aa6b1b4b8fe260edbac3f2c743f294db1e362b932eb3feca37ba4
            path: ${source.dir}/socat.tar.gz
            spdx:
              name: socat
              version: 1.8.0.3
              packages:
                - name: socat
                  purl: pkg:dhi/socat@1.8.0.3
                  license: GPL-2.0-only WITH OpenSSL-Exception
            uid: 0
            gid: 0
      pipeline:
        - name: build and install
          runs: |
            set -eux -o pipefail

            echo "a9f9eb6cfb9aa6b1b4b8fe260edbac3f2c743f294db1e362b932eb3feca37ba4  socat.tar.gz" | sha256sum -c -
            mkdir -p socat
            tar -xzf socat.tar.gz -C socat --strip-components=1
            cd socat

            ./configure \
              --prefix="${target.dir}/opt/socat"

            ncpus=$(getconf _NPROCESSORS_ONLN)
            ncpus=$((ncpus > 6 ? 6 : ncpus))

            make -j"$ncpus"
            make install
      outputs:
        - source: ${target.dir}/opt/socat
          target: /opt/socat
          uid: 0
          gid: 0
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  PATH: /opt/socat/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  SOCAT_VERSION: 1.8.0.3
annotations:
  org.opencontainers.image.description: A minimal socat image
  org.opencontainers.image.licenses: GPL-2.0-only WITH OpenSSL-Exception
entrypoint:
  - socat
cmd:
  - -h
