# syntax=dhi.io/build:2-debian13

name: ChartMuseum 0.x (dev)
image: dhi.io/chartmuseum
variant: dev
tags:
  - 0-dev
  - 0.16-dev
  - 0.16.5-dev
  - 0-debian-dev
  - 0-debian13-dev
  - 0.16-debian-dev
  - 0.16-debian13-dev
  - 0.16.5-debian-dev
  - 0.16.5-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2023-06-14"
vars:
  COMMIT_SHA: 7508866ec40195cbcb285e4981c092bcb9451944
  SEMVER_MAJOR_MINOR_VERSION: "0.16"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.16.5
  VERSION: 0.16.5
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: chartmuseum
      work-dir: /go/src/helm.sh/chartmuseum
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - findutils
          - golang-1.25
          - mawk
          - sed
        files:
          - url: git+https://github.com/helm/chartmuseum.git#v0.16.5
            checksum: 7508866ec40195cbcb285e4981c092bcb9451944
            path: /go/src/helm.sh/chartmuseum
            spdx:
              name: chartmuseum
              version: 0.16.5
              packages:
                - name: chartmuseum
                  purl: pkg:golang/helm.sh/chartmuseum@0.16.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - github.com/containerd/containerd@v1.7.33
              - helm.sh/helm/v3@v3.20.2
              - oras.land/oras-go/v2@v2.6.1
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            go test ./cmd/chartmuseum/... -short -count=1
        - name: build chartmuseum
          uses: go/build@v1
          with:
            ldflags:
              - -w
              - -X main.Version=0.16.5
              - -X main.Revision=7508866ec40195cbcb285e4981c092bcb9451944
              - -s
            output: ${target.dir}/usr/local/bin/chartmuseum
            packages: ./cmd/chartmuseum
      outputs:
        - source: ${target.dir}/usr/local/bin/chartmuseum
          target: /usr/local/bin/chartmuseum
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/chartmuseum
          target: /opt/docker/sbom/chartmuseum
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: chartmuseum
      uid: 1000
      gid: 1000
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: chartmuseum
      gid: 1000
      members:
        - chartmuseum
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /chartmuseum
    uid: 0
    gid: 0
    source: /usr/local/bin/chartmuseum
  - type: directory
    path: /chartstorage
    uid: 1000
    gid: 1000
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal ChartMuseum image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /chartmuseum
ports:
  - 8080/tcp
