# syntax=dhi.io/build:2-debian13

name: Piraeus Operator 2.x
image: dhi.io/piraeus-operator
variant: runtime
tags:
  - "2"
  - "2.10"
  - 2.10.8
  - 2-debian
  - 2-debian13
  - 2.10-debian
  - 2.10-debian13
  - 2.10.8-debian
  - 2.10.8-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 899a34be0cc88c164669265c4355d0d363bca685
  SEMVER_MAJOR_MINOR_VERSION: "2.10"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.10.8
  VERSION: 2.10.8
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: piraeus-operator
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/piraeusdatastore/piraeus-operator.git#v2.10.8
            checksum: 899a34be0cc88c164669265c4355d0d363bca685
            path: /go/src/github.com/piraeusdatastore/piraeus-operator
            spdx:
              name: piraeus-operator
              version: 2.10.8
              packages:
                - name: piraeus-operator
                  purl: pkg:golang/github.com/piraeusdatastore/piraeus-operator/v2@2.10.8
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/piraeusdatastore/piraeus-operator
          with:
            deps: []
            download: true
        - name: test
          work-dir: /go/src/github.com/piraeusdatastore/piraeus-operator
          privileged: true
          runs: |
            set -eux -o pipefail

            # Skip test packages that require kubebuilder tools (etcd, kube-apiserver)
            # which are not available in the build environment. These tests require
            # a full Kubernetes test environment and are typically run in CI/CD pipelines.
            CGO_ENABLED=0 go test $(go list ./... | grep -v '/internal/controller' | grep -v '/internal/webhook' | grep -v '/pkg/k8sgc')
        - name: build-manager
          uses: go/build@v1
          work-dir: /go/src/github.com/piraeusdatastore/piraeus-operator
          with:
            ldflags:
              - -X github.com/piraeusdatastore/piraeus-operator/v2/pkg/vars.Version=2.10.8
            output: ${target.dir}/usr/local/bin/manager
            packages: ./cmd
        - name: build-gencert
          uses: go/build@v1
          work-dir: /go/src/github.com/piraeusdatastore/piraeus-operator
          with:
            ldflags:
              - -X github.com/piraeusdatastore/piraeus-operator/v2/pkg/vars.Version=2.10.8
            output: ${target.dir}/usr/local/bin/gencert
            packages: ./cmd/gencert
      outputs:
        - source: ${target.dir}/usr/local/bin/manager
          target: /usr/local/bin/manager
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/gencert
          target: /usr/local/bin/gencert
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/piraeus-operator
          target: /opt/docker/sbom/piraeus-operator
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /manager
    uid: 0
    gid: 0
    source: /usr/local/bin/manager
annotations:
  org.opencontainers.image.description: Kubernetes operator that manages LINSTOR clusters
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /manager
