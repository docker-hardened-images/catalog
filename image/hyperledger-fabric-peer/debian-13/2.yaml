# syntax=dhi.io/build:2-debian13

name: Hyperledger Fabric Peer 2.x
image: dhi.io/hyperledger-fabric-peer
variant: runtime
tags:
  - "2"
  - "2.5"
  - 2.5.16
  - 2-debian
  - 2-debian13
  - 2.5-debian
  - 2.5-debian13
  - 2.5.16-debian
  - 2.5.16-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-13"
vars:
  COMMIT_SHA: f871cf92a026aba7b12e6f06d71ded3e6e659d71
  SEMVER_MAJOR_MINOR_VERSION: "2.5"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.5.16
  VERSION: 2.5.16
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: hyperledger-fabric-peer
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/hyperledger/fabric.git#v2.5.16
            checksum: f871cf92a026aba7b12e6f06d71ded3e6e659d71
            path: /go/src/github.com/hyperledger/fabric
            spdx:
              name: hyperledger-fabric-peer
              version: 2.5.16
              packages:
                - name: hyperledger-fabric-peer
                  purl: pkg:golang/github.com/hyperledger/fabric@2.5.16
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies (2 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/hyperledger/fabric
          caches:
            - path: /go/pkg/mod
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - google.golang.org/grpc@v1.79.3
            tidy: true
        - uses: go/hermetic@v1
          work-dir: /go/src/github.com/hyperledger/fabric
        - name: test
          work-dir: /go/src/github.com/hyperledger/fabric
          runs: |
            set -eux -o pipefail

            # TestPluginLoadingFailure is skipped - it loads .so plugins which requires CGO
            CGO_ENABLED=0 go test ./cmd/peer -skip TestPluginLoadingFailure
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/hyperledger/fabric/cmd/peer
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X github.com/hyperledger/fabric/common/metadata.Version=2.5.16
              - -X github.com/hyperledger/fabric/common/metadata.CommitSHA=f871cf92a026aba7b12e6f06d71ded3e6e659d71
            output: ${target.dir}/usr/local/bin/peer
      outputs:
        - source: ${target.dir}/usr/local/bin/
          target: /usr/local/bin/
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/hyperledger-fabric-peer
          target: /opt/docker/sbom/hyperledger-fabric-peer
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  FABRIC_CFG_PATH: /etc/hyperledger/fabric
  FABRIC_VER: v2.5.16
annotations:
  org.opencontainers.image.description: A minimal Hyperledger Fabric Peer image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/peer
cmd:
  - node
  - start
ports:
  - 7051/tcp
