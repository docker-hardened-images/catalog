# syntax=dhi.io/build:2-debian13

name: MLflow 3.x
image: dhi.io/mlflow
variant: runtime
tags:
  - "3"
  - "3.11"
  - 3.11.1
  - 3-debian13
  - 3.11-debian13
  - 3.11.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-10"
vars:
  COMMIT_SHA: 09179c65741c4d40df2e934950e32f526a2c0e9e
  NODE_DIGEST: sha256:25c58bd46f6755d04193092b9220c4bf53b06674e5b60973f10dbac2322410c1
  NODE_VERSION: 22.22.2
  PYTHON_MAJOR_MINOR_VERSION: "3.12"
  PYTHON_REFERENCE: dhi/python:3.12.13-debian13@sha256:606c8d924a058885509c1684a39277f8d463c66de7ef46be50c88044681d96e6
  PYTHON_VERSION: 3.12.13
  SEMVER_MAJOR_MINOR_VERSION: "3.11"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.11.1
  VERSION: 3.11.1
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - libpq5
  builds:
    - name: mlflow
      uses: dhi.io/python:3.12.13-debian13@sha256:606c8d924a058885509c1684a39277f8d463c66de7ef46be50c88044681d96e6
      caches:
        - path: /root/.cache/pip
        - path: /root/.yarn
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - findutils
          - libpq-dev
          - pkg-config
          - sed
        files:
          - url: git+https://github.com/mlflow/mlflow.git#v3.11.1
            checksum: 09179c65741c4d40df2e934950e32f526a2c0e9e
            path: ${source.dir}/mlflow
            spdx:
              name: mlflow
              version: 3.11.1
              packages:
                - name: mlflow
                  purl: pkg:pypi/mlflow@3.11.1
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/pkg-node:22.22.2-debian13@sha256:25c58bd46f6755d04193092b9220c4bf53b06674e5b60973f10dbac2322410c1
            includes:
              - opt/nodejs
              - opt/yarn
              - usr/local/bin/node
              - usr/local/bin/yarn
            uid: 0
            gid: 0
      pipeline:
        - name: build ui
          work-dir: ${source.dir}/mlflow/mlflow/server/js
          privileged: true
          runs: |
            set -eux -o pipefail

            export YARN_CACHE_FOLDER=/root/.yarn
            yarn install
            yarn build
        - name: install
          work-dir: ${source.dir}/mlflow
          privileged: true
          runs: |
            set -eux -o pipefail

            python3 -m venv ${target.dir}/opt/mlflow

            ${target.dir}/opt/mlflow/bin/python3 -m pip install .
            # Pin to a version for reproducibility/security. OK to bump in the future
            ${target.dir}/opt/mlflow/bin/python3 -m pip install --no-binary=psycopg2 --no-cache-dir "psycopg2==2.9.12"

            # Remediate CVEs by upgrading packages
            ${target.dir}/opt/mlflow/bin/python3 -m pip install --upgrade "urllib3==2.6.3"       # CVE-2026-21441
            ${target.dir}/opt/mlflow/bin/python3 -m pip install --upgrade "cryptography==46.0.7" # CVE-2026-26007, CVE-2026-34073, CVE-2026-39892
            ${target.dir}/opt/mlflow/bin/python3 -m pip install --upgrade "pillow==12.2.0"       # CVE-2026-25990, CVE-2026-40192

            find '${target.dir}/opt/mlflow/bin' -type f -executable -exec sed -i '1s|^#!${target.dir}|#!|' {} +
      outputs:
        - source: ${target.dir}/opt/mlflow
          target: /opt/mlflow
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/mlflow
          target: /opt/docker/sbom/mlflow
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.12.13-debian13@sha256:606c8d924a058885509c1684a39277f8d463c66de7ef46be50c88044681d96e6
      includes:
        - opt/**
        - usr/**
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /opt/mlflow/data
environment:
  PATH: /opt/mlflow/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  VIRTUAL_ENV: /opt/mlflow
paths:
  - type: directory
    path: /opt/mlflow/data
    uid: 65532
    gid: 65532
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal MLflow image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /opt/mlflow/bin/mlflow
