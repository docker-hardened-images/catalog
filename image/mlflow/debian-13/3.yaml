# syntax=dhi.io/build:2-debian13

name: MLflow 3.x
image: dhi.io/mlflow
variant: runtime
tags:
  - "3"
  - "3.14"
  - 3.14.0
  - 3-debian
  - 3-debian13
  - 3.14-debian
  - 3.14-debian13
  - 3.14.0-debian
  - 3.14.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-10"
vars:
  COMMIT_SHA: 86cd7f5a1dc25a1387ad07c87811bbc30f62951c
  NODE_DIGEST: sha256:0fec1c45943f7a82d80981d831581fceda28960b63ba2a9f622cd5d5bc48ce7c
  NODE_VERSION: 22.23.1
  PYTHON_MAJOR_MINOR_VERSION: "3.12"
  SEMVER_MAJOR_MINOR_VERSION: "3.14"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.14.0
  VERSION: 3.14.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - libpq5
    - libstdc++6
    - python-3.12
    - python-3.12-dev
    - python3-pip
    - python3-setuptools
    - python3-wheel
  builds:
    - name: mlflow
      caches:
        - path: /root/.cache/pip
        - path: /root/.yarn
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - findutils
          - libpq-dev
          - pkg-config
          - sed
          - python-3.12
          - python-3.12-dev
          - python3-pip
          - python3-setuptools
          - python3-wheel
          - libstdc++6
          - diffutils
          - gawk
          - grep
        files:
          - url: git+https://github.com/mlflow/mlflow.git#v3.14.0
            checksum: 86cd7f5a1dc25a1387ad07c87811bbc30f62951c
            path: ${source.dir}/mlflow
            spdx:
              name: mlflow
              version: 3.14.0
              packages:
                - name: mlflow
                  purl: pkg:pypi/mlflow@3.14.0
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/pkg-node:22.23.1-debian13@sha256:0fec1c45943f7a82d80981d831581fceda28960b63ba2a9f622cd5d5bc48ce7c
            includes:
              - opt/nodejs
              - opt/yarn
              - usr/local/bin/node
              - usr/local/bin/yarn
            uid: 0
            gid: 0
      pipeline:
        - name: build ui
          work-dir: ${source.dir}/mlflow/mlflow/server/js
          privileged: true
          runs: |
            set -eux -o pipefail

            export YARN_CACHE_FOLDER=/root/.yarn
            yarn install
            yarn build
        - name: install
          work-dir: ${source.dir}/mlflow
          privileged: true
          runs: |
            set -eux -o pipefail

            python3 -m venv ${target.dir}/opt/mlflow

            ${target.dir}/opt/mlflow/bin/python3 -m pip install .
            # Pin to a version for reproducibility/security. OK to bump in the future
            ${target.dir}/opt/mlflow/bin/python3 -m pip install --no-binary=psycopg2 --no-cache-dir "psycopg2==2.9.12"

            # Remediate CVEs by upgrading packages
            ${target.dir}/opt/mlflow/bin/python3 -m pip install --upgrade "urllib3==2.7.0"       # CVE-2026-21441, CVE-2026-44431, CVE-2026-44432
            ${target.dir}/opt/mlflow/bin/python3 -m pip install --upgrade "cryptography==48.0.1" # CVE-2026-26007, CVE-2026-34073, CVE-2026-39892, GHSA-537c-gmf6-5ccf
            ${target.dir}/opt/mlflow/bin/python3 -m pip install --upgrade "pillow==12.3.0"       # CVE-2026-25990, CVE-2026-40192, CVE-2026-54059, CVE-2026-54060, CVE-2026-55379, CVE-2026-55380, CVE-2026-55798
            ${target.dir}/opt/mlflow/bin/python3 -m pip install --upgrade "starlette==1.3.1"     # CVE-2026-48710, CVE-2026-48818, CVE-2026-54283, CVE-2026-48817, CVE-2026-54282

            find '${target.dir}/opt/mlflow/bin' -type f -executable -exec sed -i '1s|^#!${target.dir}|#!|' {} +
      outputs:
        - source: ${target.dir}/opt/mlflow
          target: /opt/mlflow
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/mlflow
          target: /opt/docker/sbom/mlflow
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /opt/mlflow/data
environment:
  PATH: /opt/mlflow/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  VIRTUAL_ENV: /opt/mlflow
paths:
  - type: directory
    path: /opt/mlflow/data
    uid: 65532
    gid: 65532
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal MLflow image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /opt/mlflow/bin/mlflow
