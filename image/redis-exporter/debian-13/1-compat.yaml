# syntax=dhi.io/build:2-debian13

name: redis-exporter 1.87.x (compat)
image: dhi.io/redis-exporter
variant: runtime
flavor: compat
tags:
  - 1-compat
  - 1.87-compat
  - 1.87.0-compat
  - 1-debian-compat
  - 1-debian13-compat
  - 1.87-debian-compat
  - 1.87-debian13-compat
  - 1.87.0-debian-compat
  - 1.87.0-debian13-compat
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-21"
vars:
  COMMIT_SHA: 5119c25b081ffc9d195c07424dc4ab9e18b1974d
  SEMVER_MAJOR_MINOR_VERSION: "1.87"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.87.0
  VERSION: 1.87.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - bash
    - ca-certificates
    - ca-certificates-bundle
    - coreutils
    - findutils
    - tzdata
  builds:
    - name: redis-exporter-go
      work-dir: /go/src/github.com/oliver006/redis_exporter
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/oliver006/redis_exporter.git#v1.87.0
            checksum: 5119c25b081ffc9d195c07424dc4ab9e18b1974d
            path: /go/src/github.com/oliver006/redis_exporter
            spdx:
              name: redis-exporter
              version: 1.87.0
              packages:
                - name: redis-exporter
                  purl: pkg:dhi/redis-exporter@1.87.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v2
          with:
            deps: []
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Exporter subpackage tests require an external Redis instance via TEST_REDIS_URI.
            go test . -count=1
        - name: build
          uses: go/build@v1
          with:
            ldflags: -X main.BuildVersion=1.87.0 -X main.BuildCommitSha=5119c25b081ffc9d195c07424dc4ab9e18b1974d -X main.BuildDate=$(date -d @${SOURCE_DATE_EPOCH} +'%F-%T')
            output: ${target.dir}/usr/local/bin/redis-exporter
      outputs:
        - source: ${target.dir}/usr/local/bin/redis-exporter
          target: /usr/local/bin/redis-exporter
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/redis-exporter
          target: /opt/docker/sbom/redis-exporter
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal redis-exporter image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /usr/local/bin/redis-exporter
ports:
  - 9121/tcp
