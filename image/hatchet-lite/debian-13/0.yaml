  VERSION: 0.88.0
contents:
  packages:
    - '!base-files'
    - bash
    - ca-certificates
    - tzdata
  builds:
    - name: hatchet-frontend
      uses: dhi.io/node:22.22.3-debian13-dev@sha256:cbe1cbec93a0eb5ca704355825021de4362704a5181768afc24fac2082d13fca
      work-dir: ${source.dir}/hatchet/frontend/app
      environment:
        CI: "true"
        PNPM_HOME: /pnpm
      caches:
        - path: /pnpm/store
      contents:
        packages:
          - python3
        files:
          - url: git+https://github.com/hatchet-dev/hatchet.git#v0.88.0
            checksum: e6d1f252552935828c7e746fe27311b7651084cc
            path: ${source.dir}/hatchet
            spdx:
              name: hatchet-frontend
              version: 0.88.0
              packages:
                - name: hatchet-frontend
                  purl: pkg:dhi/hatchet-frontend@0.88.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: generate docs index
          work-dir: ${source.dir}/hatchet/frontend/snippets
          runs: |
            set -eux -o pipefail

            python3 generate.py
        - name: install dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable
            corepack prepare pnpm@10.16.1 --activate
            pnpm install --frozen-lockfile
            pnpm store prune
        - name: build frontend
          runs: |
            set -eux -o pipefail

            pnpm run build
        - name: stage assets
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/static-assets
            cp -a dist/. ${target.dir}/static-assets/
      outputs:
        - source: ${target.dir}/static-assets
          target: /static-assets
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/hatchet-frontend
          target: /opt/docker/sbom/hatchet-frontend
          uid: 0
          gid: 0
    - name: hatchet
      uses: dhi.io/golang:1.26.4-debian13-dev@sha256:9a675e23c51e343854caccdcf56c40a9f39b5c3024ca02ae045b48786d0d7a42
      work-dir: /go/src/github.com/hatchet-dev/hatchet
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/hatchet-dev/hatchet.git#v0.88.0
            checksum: e6d1f252552935828c7e746fe27311b7651084cc
            path: /go/src/github.com/hatchet-dev/hatchet
            spdx:
              name: hatchet
              version: 0.88.0
              packages:
                - name: hatchet
                  purl: pkg:golang/github.com/hatchet-dev/hatchet@0.88.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - github.com/slack-go/slack@v0.23.1
              - golang.org/x/crypto@v0.52.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Narrow to the three binaries we ship. ./cmd/hatchet-cli includes a flaky
            # concurrent-file-lock test (TestConcurrentOperationsWithLock) that fails
            # under xsmall-runner contention; that binary isn't built into this image.
            CGO_ENABLED=0 go test -short -count=1 -v \
              ./cmd/hatchet-lite/... \
              ./cmd/hatchet-admin/... \
              ./cmd/hatchet-migrate/...
        - name: build hatchet-lite
          uses: go/build@v1
          with:
            ldflags:
              - -X main.Version=v0.88.0
            output: ${target.dir}/usr/local/bin/hatchet-lite
            packages: ./cmd/hatchet-lite
        - name: build hatchet-admin
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/hatchet-dev/hatchet/cmd/hatchet-admin/cli.Version=v0.88.0
            output: ${target.dir}/usr/local/bin/hatchet-admin
            packages: ./cmd/hatchet-admin
        - name: build hatchet-migrate
          uses: go/build@v1
          with:
            ldflags:
              - -X main.Version=v0.88.0
            output: ${target.dir}/usr/local/bin/hatchet-migrate
            packages: ./cmd/hatchet-migrate
      outputs:
        - source: ${target.dir}/usr/local/bin/hatchet-lite
          target: /usr/local/bin/hatchet-lite
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/hatchet-admin
          target: /usr/local/bin/hatchet-admin
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/hatchet-migrate
          target: /usr/local/bin/hatchet-migrate
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/hatchet
          target: /opt/docker/sbom/hatchet
