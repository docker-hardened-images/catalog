metadata:
  display-name: Hatchet Lite
  short-description: An orchestration engine for background tasks, AI agents, and durable workflows
  featured: false
  home-url: https://hatchet.run
  categories:
    - developer-tools
  included-tools:
    - name: hatchet-lite
      description: The all-in-one Hatchet server combining engine, API, and the static file server for the web UI.
    - name: hatchet-admin
      description: Administrative CLI used at first start to generate the initial config and seed credentials under /config.
    - name: hatchet-migrate
      description: Applies database schema migrations against the configured PostgreSQL instance.
