# syntax=dhi.io/build:2-debian13

name: Ceph CSI Operator 1.x
image: dhi.io/ceph-csi-operator
variant: runtime
tags:
  - "1"
  - "1.0"
  - 1.0.4
  - 1-debian
  - 1-debian13
  - 1.0-debian
  - 1.0-debian13
  - 1.0.4-debian
  - 1.0.4-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-18"
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "1.0"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.0.4
  SUFFIX: ""
  VERSION: 1.0.4-1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - ceph-csi-operator=1.0.4-1
    - tzdata
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /manager
    uid: 0
    gid: 0
    source: /usr/bin/ceph-csi-operator
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
  - type: symlink
    path: /usr/local/bin/ceph-csi-operator
    uid: 0
    gid: 0
    source: /usr/bin/ceph-csi-operator
annotations:
  org.opencontainers.image.description: A minimal Ceph CSI Operator image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /manager
