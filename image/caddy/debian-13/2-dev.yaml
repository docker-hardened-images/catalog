# syntax=dhi.io/build:2-debian13

name: Caddy 2.11.x (dev)
image: dhi.io/caddy
variant: dev
tags:
  - 2-dev
  - 2.11-dev
  - 2.11.2-dev
  - 2-debian13-dev
  - 2.11-debian13-dev
  - 2.11.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2020-05-04"
vars:
  COMMIT_SHA: ffb6ab0644f24c5ee6542aca6bd59b7a1b0a8f91
  GOLANG_REFERENCE: dhi/golang:1.26.2-debian13-dev@sha256:39947402d8e52fcaeb8f8a3b00f4377414464fb89437c7ba67358cf4c5caaac9
  SEMVER_MAJOR_MINOR_VERSION: "2.11"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.11.2
  VERSION: 2.11.2
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: caddy build
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:39947402d8e52fcaeb8f8a3b00f4377414464fb89437c7ba67358cf4c5caaac9
      work-dir: /go/src/github.com/caddyserver/caddy
      contents:
        files:
          - url: git+https://github.com/caddyserver/caddy.git#v2.11.2
            checksum: ffb6ab0644f24c5ee6542aca6bd59b7a1b0a8f91
            path: /go/src/github.com/caddyserver/caddy
            spdx:
              name: caddy
              version: 2.11.2
              packages:
                - name: caddy
                  purl: pkg:golang/caddyserver/caddy@v2.11.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          with:
            deps:
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - golang.org/x/net@v0.52.0
              - google.golang.org/grpc@v1.79.3
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
              - go.step.sm/crypto@v0.77.1
              - github.com/smallstep/certificates@v0.30.1
            downgrade: true
            download: true
        - uses: go/hermetic@v1
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test $(go list ./... | grep -v caddytest/integration)
        - name: build caddy
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/caddy
            packages: ./cmd/caddy
            tags:
              - nobadger
              - nomysql
              - nopgx
      outputs:
        - source: ${target.dir}/usr/local/bin/caddy
          target: /usr/local/bin/caddy
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/caddy
          target: /opt/docker/sbom/caddy
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /srv
environment:
  DEBIAN_FRONTEND: noninteractive
  XDG_CONFIG_HOME: /config
  XDG_DATA_HOME: /data
paths:
  - type: directory
    path: /etc/caddy
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /srv
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /usr/share/caddy
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /var/lib/caddy
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /config/caddy
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /data/caddy
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: file
    path: /etc/caddy/Caddyfile
    uid: 65532
    gid: 65532
    mode: "0644"
    source: image/caddy/config/Caddyfile
  - type: file
    path: /usr/share/caddy/index.html
    uid: 65532
    gid: 65532
    mode: "0644"
    source: image/caddy/config/index.html
annotations:
  org.opencontainers.image.description: A minimal Caddy image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/caddy
cmd:
  - run
  - --config
  - /etc/caddy/Caddyfile
