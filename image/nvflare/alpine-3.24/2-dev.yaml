# syntax=dhi.io/build:2-alpine3.24

name: NVFlare 2.8.x (dev)
image: dhi.io/nvflare
variant: dev
tags:
  - 2-alpine-dev
  - 2.8-alpine-dev
  - 2-alpine3.24-dev
  - 2.8.1-alpine-dev
  - 2.8-alpine3.24-dev
  - 2.8.1-alpine3.24-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-04"
vars:
  SEMVER_MAJOR_MINOR_VERSION: "2.8"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.8.1
  VERSION: 2.8.1-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - apk-tools
    - busybox
    - ca-certificates
    - ca-certificates-bundle
    - libffi
    - nvflare
    - python3
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /opt/nvflare
environment:
  PATH: /opt/nvflare/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
  PYTHONUNBUFFERED: "1"
paths:
  - type: directory
    path: /opt/nvflare
    uid: 0
    gid: 0
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal nvflare image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /opt/nvflare/bin/nvflare
