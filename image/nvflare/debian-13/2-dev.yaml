# syntax=dhi.io/build:2-debian13

name: NVFlare 2.8.x (dev)
image: dhi.io/nvflare
variant: dev
tags:
  - 2-dev
  - 2.8-dev
  - 2.8.0-dev
  - 2-debian-dev
  - 2-debian13-dev
  - 2.8-debian-dev
  - 2.8-debian13-dev
  - 2.8.0-debian-dev
  - 2.8.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-04"
vars:
  SEMVER_MAJOR_MINOR_VERSION: "2.8"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.8.0
  VERSION: 2.8.0-0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - libffi8
    - libstdc++6
    - mawk
    - nvflare
    - perl-base
    - python3
    - sed
    - util-linux
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /opt/nvflare
environment:
  DEBIAN_FRONTEND: noninteractive
  PATH: /opt/nvflare/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
  PYTHONUNBUFFERED: "1"
paths:
  - type: directory
    path: /opt/nvflare
    uid: 0
    gid: 0
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal nvflare image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /opt/nvflare/bin/nvflare
