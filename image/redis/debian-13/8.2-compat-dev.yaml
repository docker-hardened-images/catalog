# syntax=dhi.io/build:2-debian13

name: Redis 8.2.x (compat, dev)
image: dhi.io/redis
variant: dev
flavor: compat
tags:
  - 8.2-compat-dev
  - 8.2.6-compat-dev
  - 8.2-debian13-compat-dev
  - 8.2.6-debian13-compat-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-08-04"
vars:
  COMMIT_SHA: b45c31a9ba7aa5dcaf76d5bb1b19d87888c64b3c
  HAS_MODULES: "true"
  REDIS_LICENSE: AGPL-3.0-only
  SEMVER_MAJOR_MINOR_VERSION: "8.2"
  SEMVER_MAJOR_VERSION: "8"
  SEMVER_VERSION: 8.2.6
  VERSION: 8.2.6
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - hostname
    - libc-bin
    - libpcre2-8-0
    - libssl3t64
    - libstdc++6
    - mawk
    - openssl
    - perl-base
    - procps
    - sed
    - tini
    - util-linux
  builds:
    - name: redis
      work-dir: ${source.dir}/redis
      contents:
        packages:
          - autoconf
          - automake
          - bash
          - ca-certificates
          - clang
          - cmake
          - coreutils
          - findutils
          - g++
          - gcc
          - git
          - gnu-which
          - grep
          - libc6-dev
          - libssl-dev
          - libtool
          - make
          - pkgconf
          - python3
          - python3-dev
          - python3-pip
          - python3-venv
          - rsync
          - sed
          - unzip
          - wget
          - xz-utils
        files:
          - url: git+https://github.com/redis/redis.git#8.2.6
            checksum: b45c31a9ba7aa5dcaf76d5bb1b19d87888c64b3c
            path: ${source.dir}/redis
            spdx:
              name: redis
              version: 8.2.6
              packages:
                - name: redis
                  purl: pkg:github/redis/redis@8.2.6
                  license: AGPL-3.0-only
            uid: 0
            gid: 0
      pipeline:
        - name: patch build
          runs: |
            set -eux -o pipefail

            # https://github.com/redis/redis/commit/edd4d555df57dc84265fdfb4ef59a4678832f6da
            # grep -E '^ *createBoolConfig[(]"protected-mode",.*, *1 *,.*[)],$' '${source.dir}/redis/src/config.c'
            # sed -ri 's!^( *createBoolConfig[(]"protected-mode",.*, *)1( *,.*[)],)$!\10\2!' '${source.dir}/redis/src/config.c'
            # grep -E '^ *createBoolConfig[(]"protected-mode",.*, *0 *,.*[)],$' '${source.dir}/redis/src/config.c'

            # https://github.com/jemalloc/jemalloc/issues/467
            if [ ${target.arch} = arm64 ]; then
              jemallocFlags="--build=aarch64-linux-gnu --with-lg-page=16 --with-lg-hugepage=21"
            else
              jemallocFlags="--build=x86_64-linux-gnu --with-lg-page=12 --with-lg-hugepage=21"
            fi
            grep -F 'cd jemalloc && ./configure ' '${source.dir}/redis/deps/Makefile'
            sed -ri 's!cd jemalloc && ./configure !&'"$jemallocFlags"' !' '${source.dir}/redis/deps/Makefile'
            grep -F "cd jemalloc && ./configure $jemallocFlags " '${source.dir}/redis/deps/Makefile'
        - name: build and install
          privileged: true
          runs: |
            set -eux -o pipefail

            export BUILD_TLS=yes BUILD_WITH_MODULES=yes INSTALL_RUST_TOOLCHAIN=yes DISABLE_WERRORS=yes

            make all -j"$(nproc)"
            make install V=1 PREFIX=${target.dir}/usr/local
        - name: patch config
          runs: |
            set -eux -o pipefail

            echo 'include /etc/redis/conf.d/*.conf' >> '${source.dir}/redis/redis.conf'
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/lib/redis/modules
          target: /usr/local/lib/redis/modules
          uid: 0
          gid: 0
        - source: ${source.dir}/redis/redis.conf
          target: /etc/redis/redis.conf
          uid: 0
          gid: 0
        - source: ${source.dir}/redis/redis-full.conf
          target: /etc/redis/redis-full.conf
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/redis
          target: /opt/docker/sbom/redis
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /data
environment:
  DEBIAN_FRONTEND: noninteractive
  REDIS_VERSION: 8.2.6
paths:
  - type: directory
    path: /var/lib/redis
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /var/log/redis
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /run/redis
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /data
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: file
    path: /etc/redis/conf.d/docker.conf
    content: |
      daemonize no
      bind 0.0.0.0 -::1
      logfile ""
    uid: 0
    gid: 0
    mode: "0555"
  - type: file
    path: /usr/local/bin/docker-entrypoint.sh
    content: |
      #!/bin/sh
      set -e

      if [ "${1#-}" != "$1" ]; then
        # docker run dhi/redis --flag
        set -- /etc/redis/redis.conf "$@"
      fi

      if [ "${1%.conf}" != "$1" ]; then
        # docker run dhi/redis /path/to/custom/conf [optional flags]
        set -- redis-server "$@"
      fi

      # set an appropriate umask (if one isn't set)
      # - https://github.com/redis/redis/blob/bb875603fb7ff3f9d19aad906bd45d7db98d9a39/utils/systemd-redis_server.service#L37
      um="$(umask)"
      if [ "$um" = '0022' ]; then
        umask 0077
      fi

      exec "$@"
    uid: 0
    gid: 0
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Redis image
  org.opencontainers.image.licenses: AGPL-3.0-only
entrypoint:
  - /usr/bin/tini
  - --
  - /usr/local/bin/docker-entrypoint.sh
cmd:
  - redis-server
  - /etc/redis/redis.conf
