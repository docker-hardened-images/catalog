# syntax=dhi.io/build:2-debian13

name: Redis 8.4.x
image: dhi.io/redis
variant: runtime
tags:
  - "8.4"
  - 8.4.3
  - 8.4-debian13
  - 8.4.3-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-08-04"
vars:
  COMMIT_SHA: 4d8dba63771da2bb133f97a0c48dc9c3d715b8b2
  HAS_MODULES: "true"
  REDIS_LICENSE: AGPL-3.0-only
  SEMVER_MAJOR_MINOR_VERSION: "8.4"
  SEMVER_MAJOR_VERSION: "8"
  SEMVER_VERSION: 8.4.3
  VERSION: 8.4.3
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - ca-certificates
    - libpcre2-8-0
    - libssl3t64
    - libstdc++6
    - tini
  builds:
    - name: redis
      work-dir: ${source.dir}/redis
      contents:
        packages:
          - autoconf
          - automake
          - bash
          - ca-certificates
          - clang
          - cmake
          - coreutils
          - findutils
          - g++
          - gcc
          - git
          - gnu-which
          - grep
          - libc6-dev
          - libssl-dev
          - libtool
          - make
          - pkgconf
          - python3
          - python3-dev
          - python3-pip
          - python3-venv
          - rsync
          - sed
          - unzip
          - wget
          - xz-utils
        files:
          - url: git+https://github.com/redis/redis.git#8.4.3
            checksum: 4d8dba63771da2bb133f97a0c48dc9c3d715b8b2
            path: ${source.dir}/redis
            spdx:
              name: redis
              version: 8.4.3
              packages:
                - name: redis
                  purl: pkg:github/redis/redis@8.4.3
                  license: AGPL-3.0-only
            uid: 0
            gid: 0
      pipeline:
        - name: patch build
          runs: |
            set -eux -o pipefail

            # https://github.com/redis/redis/commit/edd4d555df57dc84265fdfb4ef59a4678832f6da
            # grep -E '^ *createBoolConfig[(]"protected-mode",.*, *1 *,.*[)],$' '${source.dir}/redis/src/config.c'
            # sed -ri 's!^( *createBoolConfig[(]"protected-mode",.*, *)1( *,.*[)],)$!\10\2!' '${source.dir}/redis/src/config.c'
            # grep -E '^ *createBoolConfig[(]"protected-mode",.*, *0 *,.*[)],$' '${source.dir}/redis/src/config.c'

            # https://github.com/jemalloc/jemalloc/issues/467
            if [ ${target.arch} = arm64 ]; then
              jemallocFlags="--build=aarch64-linux-gnu --with-lg-page=16 --with-lg-hugepage=21"
            else
              jemallocFlags="--build=x86_64-linux-gnu --with-lg-page=12 --with-lg-hugepage=21"
            fi
            grep -F 'cd jemalloc && ./configure ' '${source.dir}/redis/deps/Makefile'
            sed -ri 's!cd jemalloc && ./configure !&'"$jemallocFlags"' !' '${source.dir}/redis/deps/Makefile'
            grep -F "cd jemalloc && ./configure $jemallocFlags " '${source.dir}/redis/deps/Makefile'
        - name: build and install
          privileged: true
          runs: |
            set -eux -o pipefail

            export BUILD_TLS=yes BUILD_WITH_MODULES=yes INSTALL_RUST_TOOLCHAIN=yes DISABLE_WERRORS=yes

            make all -j"$(nproc)"
            make install V=1 PREFIX=${target.dir}/usr/local
        - name: patch config
          runs: |
            set -eux -o pipefail

            echo 'include /etc/redis/conf.d/*.conf' >> '${source.dir}/redis/redis.conf'
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/lib/redis/modules
          target: /usr/local/lib/redis/modules
          uid: 0
          gid: 0
        - source: ${source.dir}/redis/redis.conf
          target: /etc/redis/redis.conf
          uid: 0
          gid: 0
        - source: ${source.dir}/redis/redis-full.conf
          target: /etc/redis/redis-full.conf
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/redis
          target: /opt/docker/sbom/redis
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /data
environment:
  REDIS_VERSION: 8.4.3
paths:
  - type: directory
    path: /var/lib/redis
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /var/log/redis
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /run/redis
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /data
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: file
    path: /etc/redis/conf.d/docker.conf
    content: |
      daemonize no
      bind 0.0.0.0 -::1
      logfile ""
    uid: 0
    gid: 0
    mode: "0555"
annotations:
  org.opencontainers.image.description: A minimal Redis image
  org.opencontainers.image.licenses: AGPL-3.0-only
entrypoint:
  - /usr/bin/tini
  - --
cmd:
  - redis-server
  - /etc/redis/redis.conf
