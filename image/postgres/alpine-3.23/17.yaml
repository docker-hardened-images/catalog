# syntax=dhi.io/build:2-alpine3.23

name: PostgreSQL 17.x
image: dhi.io/postgres
variant: runtime
tags:
  - 17-alpine3.23
  - 17.9-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2024-09-26"
  end-of-life: "2029-11-08"
vars:
  MAJOR_VERSION: "17"
  MINOR_VERSION: "9"
  PGDATA: /var/lib/postgresql/17/data
  VERSION: 17.9-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - bash
    - busybox
    - ca-certificates-bundle
    - icu-data-full
    - icu-libs
    - krb5-libs
    - less
    - libcrypto3
    - libldap
    - libselinux
    - libssl3
    - libuuid
    - libxml2
    - libxslt
    - linux-pam
    - llvm20-libs
    - lz4-libs
    - postgresql17-contrib=17.9-r0
    - postgresql17-jit=17.9-r0
    - postgresql17=17.9-r0
    - readline
    - tzdata
    - zlib
    - zstd-libs
  builds:
    - name: postgres
      contents:
        packages:
          - busybox
          - postgresql17=17.9-r0
      pipeline:
        - name: configure defaults
          work-dir: /usr/share/postgresql17
          runs: |
            set -eux -o pipefail

            sed -E -i postgresql.conf.sample \
              -e "s|^#?(listen_addresses)\s*=\s*\S+.*|\1 = '*'|"
      outputs:
        - source: /usr/share/postgresql17/postgresql.conf.sample
          target: /usr/share/postgresql17/postgresql.conf.sample
          uid: 0
          gid: 0
accounts:
  run-as: postgres
  users:
    - name: postgres
      uid: 70
      gid: 70
  groups:
    - name: postgres
      gid: 70
      members:
        - postgres
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
stop-signal: SIGINT
environment:
  PG_MAJOR: "17"
  PG_MINOR: "9"
  PGDATA: /var/lib/postgresql/17/data
paths:
  - type: directory
    path: /var/lib/postgresql/17/data
    uid: 70
    gid: 70
    mode: "0700"
  - type: file
    path: /usr/local/bin/docker-entrypoint.sh
    uid: 0
    gid: 0
    mode: "0755"
    source: image/postgres/bin/docker-entrypoint.sh
  - type: directory
    path: /run/postgresql
    uid: 70
    gid: 70
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal PostgreSQL image
  org.opencontainers.image.licenses: PostgreSQL
entrypoint:
  - /usr/local/bin/docker-entrypoint.sh
ports:
  - 5432/tcp
