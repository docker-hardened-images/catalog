          work-dir: ${source.dir}/piraeus
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/usr/bin
            install -m 0755 dockerfiles/piraeus-server/entry.sh ${target.dir}/usr/bin/piraeus-entry.sh
      outputs:
        - source: ${target.dir}/usr/bin/piraeus-entry.sh
