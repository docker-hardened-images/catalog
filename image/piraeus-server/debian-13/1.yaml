  builds:
    - name: fix caps
      contents:
        packages:
          - bash
          - util-linux
          - hostname
          - libcap2-bin
      pipeline:
        - name: setcap
          runs: |
            set -eux -o pipefail

            setcap cap_sys_admin+ep /usr/bin/unshare
            setcap cap_sys_admin,cap_net_admin+ep /usr/bin/hostname
      outputs:
        - source: /usr/bin/unshare
          target: /usr/bin/unshare
          uid: 0
          gid: 0
        - source: /usr/bin/hostname
          target: /usr/bin/hostname
          uid: 0
          gid: 0
    - name: k8s-await-election
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
        files:
          - url: git+https://github.com/LINBIT/k8s-await-election.git#v0.4.2
