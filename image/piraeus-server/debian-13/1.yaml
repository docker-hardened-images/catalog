          uses: go/bump@v2
          work-dir: /go/src/github.com/linbit/k8s-await-election
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.56.0
              - golang.org/x/text@v0.39.0
            download: true
        - name: build-k8s-await-election
          uses: go/build@v1
          work-dir: /go/src/github.com/linbit/k8s-await-election
          with:
            output: ${target.dir}/usr/bin/k8s-await-election
      outputs:
        - source: ${target.dir}/usr/bin/k8s-await-election
          target: /usr/bin/k8s-await-election
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/k8s-await-election
          target: /opt/docker/sbom/k8s-await-election
          uid: 0
          gid: 0
    - name: losetup
      work-dir: ${source.dir}/losetup
      caches:
        - path: /root/.cargo
      contents:
        packages:
          - build-essential
          - cargo-1.97
          - rustc-1.97
          - bash
          - ca-certificates-bundle
          - cmake
          - coreutils
          - findutils
          - grep
          - libclang-dev
          - sed
        files:
          - url: git+https://github.com/LINBIT/losetup-container.git#v1.1.0
            checksum: c1b24da76a9eaa95a0d3561f6a4f995e3a28c0d2
            path: ${source.dir}/losetup
            spdx:
              name: losetup-container
              version: v1.1.0
              packages:
                - name: losetup-container
                  purl: pkg:github/LINBIT/losetup-container@v1.1.0
                  license: GPL-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: ui sbom
          uses: sbom@v1
          with:
            extra-scanners: rust-cargo-lock-cataloger
            prefix: losetup-cargo
            source: ${source.dir}/losetup
        - name: build
          privileged: true
          runs: |
            set -eux -o pipefail

            cargo build --release -vv
        - name: install
          runs: |
            set -eux -o pipefail

            install -D target/release/losetup-container \
              '${target.dir}/usr/local/sbin/losetup-container'
        - name: install-losetup-container
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/usr/local/sbin
            printf '#!/bin/sh\nLOSETUP_CONTAINER_ORIGINAL_LOSETUP=/usr/sbin/losetup exec /usr/local/sbin/losetup-container "$@"\n' > ${target.dir}/usr/local/sbin/losetup
      outputs:
        - source: ${target.dir}/usr/local/sbin/losetup-container
          target: /usr/local/sbin/losetup-container
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/sbin/losetup
          target: /usr/local/sbin/losetup
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/losetup-container
          target: /opt/docker/sbom/losetup-container
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/losetup-cargo
          target: /opt/docker/sbom/losetup-cargo
          uid: 0
          gid: 0
    - name: piraeus-server
