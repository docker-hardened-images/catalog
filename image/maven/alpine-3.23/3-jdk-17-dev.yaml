# syntax=dhi.io/build:2-alpine3.23

name: Maven 3.x JDK 17.x (dev)
image: dhi.io/maven
variant: dev
tags:
  - 3-jdk17-alpine3.23-dev
  - 3.9-jdk17-alpine3.23-dev
  - 3.9.15-r0-jdk17-alpine3.23-dev
platforms:
  - linux/amd64
dates:
  release: "2013-10-22"
vars:
  JAVA_MAJOR_VERSION: "17"
  JAVA_VERSION: 17.0.19.10-r6
  MAVEN_MAJOR_MINOR_VERSION: "3.9"
  MAVEN_MAJOR_VERSION: "3"
  MAVEN_VERSION: 3.9.15-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
    - apk-tools
    - busybox
    - ca-certificates
    - ca-certificates-bundle
    - eclipse-temurin-17-jdk-oci-config=17.0.19.10-r6
    - eclipse-temurin-17-jdk=17.0.19.10-r6
    - maven=3.9.15-r0
    - musl
    - tzdata
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /build
environment:
  MAVEN_VERSION: 3.9.15-r0
paths:
  - type: directory
    path: /build
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Maven image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - mvn
