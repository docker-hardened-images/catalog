# syntax=dhi.io/build:2-debian13

name: Grafana Operator 5.x
image: dhi.io/grafana-operator
variant: runtime
tags:
  - "5"
  - "5.24"
  - 5.24.0
  - 5-debian
  - 5-debian13
  - 5.24-debian
  - 5.24-debian13
  - 5.24.0-debian
  - 5.24.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-01-05"
vars:
  COMMIT_SHA: 065a718a1fe83728d08054c299de7f8577e88f79
  SEMVER_MAJOR_MINOR_VERSION: "5.24"
  SEMVER_MAJOR_VERSION: "5"
  SEMVER_VERSION: 5.24.0
  VERSION: 5.24.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - tzdata
  builds:
    - name: grafana-operator
      work-dir: /go/src/github.com/grafana/grafana-operator/v5
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26
          - findutils
          - mawk
          - sed
        files:
          - url: git+https://github.com/grafana/grafana-operator.git#v5.24.0
            checksum: 065a718a1fe83728d08054c299de7f8577e88f79
            path: /go/src/github.com/grafana/grafana-operator/v5
            spdx:
              name: grafana-operator
              version: 5.24.0
              packages:
                - name: grafana-operator
                  purl: pkg:golang/github.com/grafana/grafana-operator/v5@5.24.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            # Run unit tests, skip integration tests and packages that require external access
            go test $(go list ./... | grep -v '/fetchers') -short -count=1 -v
        - name: build grafana-operator
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/grafana/grafana-operator/v5/embeds.Version=5.24.0
            output: ${target.dir}/usr/local/bin/grafana-operator
            packages: .
      outputs:
        - source: ${target.dir}/usr/local/bin/grafana-operator
          target: /usr/local/bin/grafana-operator
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/grafana-operator
          target: /opt/docker/sbom/grafana-operator
          uid: 0
          gid: 0
accounts:
  run-as: "65532"
  users:
    - name: "65532"
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - "65532"
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Grafana Operator image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/grafana-operator
ports:
  - 8080/tcp
  - 8081/tcp
