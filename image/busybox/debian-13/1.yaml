# syntax=dhi.io/build:2-debian13

name: BusyBox 1.x
image: dhi.io/busybox
variant: runtime
tags:
  - "1"
  - "1.37"
  - 1.37.0
  - 1-debian
  - 1-debian13
  - 1.37-debian
  - 1.37-debian13
  - 1.37.0-debian
  - 1.37.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  DEBIAN_EPOCH_MAJOR_MINOR_VERSION: "1.37"
  DEBIAN_EPOCH_MAJOR_VERSION: "1"
  DEBIAN_EPOCH_VERSION: 1.37.0
  VERSION: 1:1.37.0-6+dhi1
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - busybox=1:1.37.0-6+dhi1
    - ca-certificates-bundle
    - libc6
    - tzdata
  builds:
    - name: busybox
      shell: /bin/busybox sh
      contents:
        packages:
          - busybox
      pipeline:
        - name: install busybox
          runs: |
            set -eux -o pipefail

            busybox --install -s /usr/bin
      outputs:
        - source: /usr/bin
          target: /usr/bin
          uid: 0
          gid: 0
          diff: true
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  BUSYBOX_VERSION: 1.37.0
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
annotations:
  org.opencontainers.image.description: A minimal busybox image
  org.opencontainers.image.licenses: GPL-2.0-only
cmd:
  - /bin/sh
