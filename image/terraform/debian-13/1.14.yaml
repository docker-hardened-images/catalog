# syntax=dhi.io/build:2-debian13

name: Terraform 1.14.x
image: dhi.io/terraform
variant: runtime
tags:
  - "1"
  - "1.14"
  - 1.14.8
  - 1-debian13
  - 1.14-debian13
  - 1.14.8-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-11-19"
vars:
  COMMIT_SHA: dff269398bbefc12212a507e9590f305f487a6ce
  GOLANG_REFERENCE: dhi/golang:1.26.2-debian13-dev@sha256:39947402d8e52fcaeb8f8a3b00f4377414464fb89437c7ba67358cf4c5caaac9
  SEMVER_MAJOR_MINOR_VERSION: "1.14"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.14.8
  VERSION: 1.14.8
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - ca-certificates
    - git
  builds:
    - name: terraform
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:39947402d8e52fcaeb8f8a3b00f4377414464fb89437c7ba67358cf4c5caaac9
      work-dir: /go/src/github.com/hashicorp/terraform
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/hashicorp/terraform.git#v1.14.8
            checksum: dff269398bbefc12212a507e9590f305f487a6ce
            path: /go/src/github.com/hashicorp/terraform
            spdx:
              name: terraform
              version: 1.14.8
              packages:
                - name: terraform
                  purl: pkg:golang/github.com/hashicorp/terraform@v1.14.8
                  license: BUSL-1.1
            uid: 65532
            gid: 65532
      pipeline:
        - name: update go dependencies (1.14 only)
          uses: go/bump@v1
          with:
            deps:
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
              - github.com/hashicorp/go-getter@v1.8.6
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            download: true
            replaces:
              - go.opentelemetry.io/contrib/instrumentation/google.golang.org/grpc/otelgrpc=go.opentelemetry.io/contrib/instrumentation/google.golang.org/grpc/otelgrpc@v0.60.0
            tidy: true
        - runs: |
            set -eux -o pipefail

            # Module cache is root-owned after go/bump; test and build run as nonroot.
            mkdir -p /go/pkg/mod/cache/download
            chown -R nonroot:nonroot /go/pkg/mod
        - name: run tests
          run-as: nonroot
          privileged: true
          runs: |
            set -eux -o pipefail

            # v1.13.x: TestTelemetryInTests panics in go-cmp on OTel attribute.Set unexported fields (module skew in upstream go.mod).
            if [ "1.14" = "1.13" ]; then
              go test ./... -skip '^TestTelemetryInTests$'
            else
              go test ./...
            fi
        - name: build
          uses: go/build@v1
          run-as: nonroot
          with:
            ldflags:
              - -X github.com/hashicorp/terraform/version.dev=no
            output: ./terraform
      accounts:
        root: true
        run-as: root
        users:
          - name: nonroot
            uid: 65532
            gid: 65532
        groups:
          - name: nonroot
            gid: 65532
            members:
              - nonroot
      outputs:
        - source: /go/src/github.com/hashicorp/terraform/terraform
          target: /usr/local/bin/terraform
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/terraform
          target: /opt/docker/sbom/terraform
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Terraform image
  org.opencontainers.image.licenses: BUSL-1.1
entrypoint:
  - /usr/local/bin/terraform
