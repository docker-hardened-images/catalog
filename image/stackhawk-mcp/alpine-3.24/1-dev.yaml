# syntax=dhi.io/build:2-alpine3.24

name: StackHawk MCP Server 1.x (dev)
image: dhi.io/stackhawk-mcp
variant: dev
tags:
  - 1-alpine-dev
  - 1.2-alpine-dev
  - 1-alpine3.24-dev
  - 1.2.4-alpine-dev
  - 1.2-alpine3.24-dev
  - 1.2.4-alpine3.24-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-07-14"
vars:
  SEMVER_MAJOR_MINOR_VERSION: "1.2"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.2.4
  VERSION: 1.2.4-r0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - apk-tools
    - busybox
    - ca-certificates
    - ca-certificates-bundle
    - python-3.14
    - stackhawk-mcp=1.2.4-r0
  builds:
    - name: server.json
      contents:
        packages:
          - bash
          - sed
      pipeline:
        - runs: |
            set -eux -o pipefail

            sed -i "s/_VERSION_/1.2.4/g" "${source.dir}/config/server.json"
      paths:
        - type: file
          path: ${source.dir}/config/server.json
          uid: 0
          gid: 0
          source: image/stackhawk-mcp/config/server.json
      attestations:
        - predicate-type: https://modelcontextprotocol.io/server.json/v1
          source: ${source.dir}/config/server.json
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: StackHawk MCP Server - Model Context Protocol server for interacting with the StackHawk application security testing platform
  org.opencontainers.image.licenses: Apache-2.0
labels:
  io.modelcontextprotocol.server.name: com.stackhawk/stackhawk
entrypoint:
  - stackhawk-mcp
