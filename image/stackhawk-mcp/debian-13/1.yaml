# syntax=dhi.io/build:2-debian13

name: StackHawk MCP Server 1.x
image: dhi.io/stackhawk-mcp
variant: runtime
tags:
  - "1"
  - "1.2"
  - 1.2.4
  - 1-debian
  - 1-debian13
  - 1.2-debian
  - 1.2-debian13
  - 1.2.4-debian
  - 1.2.4-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-07-14"
vars:
  FLAVORED_SUFFIX: ""
  SEMVER_MAJOR_MINOR_VERSION: "1.2"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.2.4
  SUFFIX: ""
  VERSION: 1.2.4-0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - base-files
    - ca-certificates-bundle
    - python-3.14
    - stackhawk-mcp=1.2.4-0
    - tzdata
  builds:
    - name: server.json
      contents:
        packages:
          - bash
          - sed
      pipeline:
        - runs: |
            set -eux -o pipefail

            sed -i "s/_VERSION_/1.2.4/g" "${source.dir}/config/server.json"
      paths:
        - type: file
          path: ${source.dir}/config/server.json
          uid: 0
          gid: 0
          source: image/stackhawk-mcp/config/server.json
      attestations:
        - predicate-type: https://modelcontextprotocol.io/server.json/v1
          source: ${source.dir}/config/server.json
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: StackHawk MCP Server - Model Context Protocol server for interacting with the StackHawk application security testing platform
  org.opencontainers.image.licenses: Apache-2.0
labels:
  io.modelcontextprotocol.server.name: com.stackhawk/stackhawk
entrypoint:
  - stackhawk-mcp
