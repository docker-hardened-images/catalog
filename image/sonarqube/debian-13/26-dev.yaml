      pipeline:
        - name: set elasticsearch arch
          work-dir: ${source.dir}/sonarqube/sonar-application
          runs: |
            set -eux -o pipefail

            if [ '${target.arch}' = "arm64" ]; then
              sed -i '/zipDist "elasticsearch:elasticsearch:${elasticSearchServerVersion}-linux-x86_64@tar.gz"/s/x86_64/aarch64/g' build.gradle
            fi
        - name: build distribution
          work-dir: ${source.dir}/sonarqube
          privileged: true
          runs: |
            set -eux -o pipefail

            export JAVA_HOME="/opt/java/openjdk/21"
            export PATH="/opt/java/openjdk/21/bin:$PATH"
            ./gradlew :sonar-application:zip -x test --no-daemon --console=plain
        - name: extract and verify
          work-dir: ${source.dir}/sonarqube
          runs: |
            set -eux -o pipefail

            dist_zip=$(find . -name "sonar-application-*.zip" -type f)
            unzip -q "$dist_zip" -d "${target.dir}"
            dist_dir=$(find "${target.dir}" -name "sonarqube-*" -type d)
            mv "$dist_dir" "${target.dir}/sonarqube"
        - name: patch vulnerable JARs
          runs: |
            set -eux -o pipefail

            echo "Apply patches"
            # Apply runtime vulnerability patches using generic DHI patcher
            chmod +x "${source.dir}/patch/dhi-runtime-patch.sh"
            "${source.dir}/patch/dhi-runtime-patch.sh" \
              --app-root "${target.dir}/sonarqube" \
              --patch-dir "${source.dir}/patch/deps" \
              --config "${source.dir}/patch/dhi-patch-config.json"
        - name: patch bundled sshd in scanner engine
          runs: |
            set -eux -o pipefail

            scanner_jar=$(find "${target.dir}/sonarqube/lib/scanner" -name 'sonar-scanner-engine-community-*.jar' -type f | head -1)
            if [[ -z "${scanner_jar}" ]]; then
              echo "ERROR: sonar-scanner-engine-community jar not found" >&2
              exit 1
            fi

            patch_dir="$(mktemp -d)"
            repack_dir="${patch_dir}/repack"
            overlay_dir="${patch_dir}/overlay"
            trap 'rm -rf "${patch_dir}"' EXIT
            mkdir -p "${repack_dir}" "${overlay_dir}"

            (cd "${repack_dir}" && jar xf "${scanner_jar}")
            rm -rf "${repack_dir}/org/apache/sshd" "${repack_dir}/META-INF/maven/org.apache.sshd"

            for dep in sshd-common sshd-core; do
              (cd "${overlay_dir}" && jar xf "${source.dir}/patch/deps/${dep}-2.12.0.jar")
            done
            cp -a "${overlay_dir}/org/apache/sshd" "${repack_dir}/org/apache/sshd"
            mkdir -p "${repack_dir}/META-INF/maven"
            cp -a "${overlay_dir}/META-INF/maven/org.apache.sshd" "${repack_dir}/META-INF/maven/org.apache.sshd"

            scanner_new="${patch_dir}/scanner-repacked.jar"
            (cd "${repack_dir}" && jar --create --file "${scanner_new}" --manifest META-INF/MANIFEST.MF .)
            mv "${scanner_new}" "${scanner_jar}"

            unzip -p "${scanner_jar}" META-INF/maven/org.apache.sshd/sshd-common/pom.properties | grep -q "version=2.12.0"
            unzip -p "${scanner_jar}" META-INF/maven/org.apache.sshd/sshd-core/pom.properties | grep -q "version=2.12.0"
      paths:
        - type: file
          path: ${source.dir}/patch/dhi-patch-config.json
          uid: 0
          gid: 0
          source: image/sonarqube/patch/dhi-patch-config.json
        - type: file
