      pipeline:
        - name: set elasticsearch arch
          work-dir: ${source.dir}/sonarqube/sonar-application
          runs: |
            set -eux -o pipefail

            if [ '${target.arch}' = "arm64" ]; then
              sed -i '/zipDist "elasticsearch:elasticsearch:${elasticSearchServerVersion}-linux-x86_64@tar.gz"/s/x86_64/aarch64/g' build.gradle
            fi
        - name: build distribution
          work-dir: ${source.dir}/sonarqube
          privileged: true
          runs: |
            set -eux -o pipefail

            ./gradlew :sonar-application:zip -x test --no-daemon --console=plain
        - name: extract and verify
          work-dir: ${source.dir}/sonarqube
          runs: |
            set -eux -o pipefail

            dist_zip=$(find . -name "sonar-application-*.zip" -type f)
            unzip -q "$dist_zip" -d "${target.dir}"
            dist_dir=$(find "${target.dir}" -name "sonarqube-*" -type d)
            mv "$dist_dir" "${target.dir}/sonarqube"
        - name: patch vulnerable JARs
          runs: |
            set -eux -o pipefail

            echo "Apply patches"
            # Apply runtime vulnerability patches using generic DHI patcher
            chmod +x "${source.dir}/patch/dhi-runtime-patch.sh"
            "${source.dir}/patch/dhi-runtime-patch.sh" \
              --app-root "${target.dir}/sonarqube" \
              --patch-dir "${source.dir}/patch/deps" \
              --config "${source.dir}/patch/dhi-patch-config.json"
        - name: patch bundled sshd in scanner engine
          runs: |
            set -eux -o pipefail

            scanner_jar=$(find "${target.dir}/sonarqube/lib/scanner" -name 'sonar-scanner-engine-community-*.jar' -type f | head -1)
            if [[ -z "${scanner_jar}" ]]; then
              echo "ERROR: sonar-scanner-engine-community jar not found" >&2
              exit 1
            fi

            patch_dir="$(mktemp -d)"
            repack_dir="${patch_dir}/repack"
            overlay_dir="${patch_dir}/overlay"
            trap 'rm -rf "${patch_dir}"' EXIT
            mkdir -p "${repack_dir}" "${overlay_dir}"

            (cd "${repack_dir}" && jar xf "${scanner_jar}")
            rm -rf "${repack_dir}/org/apache/sshd" "${repack_dir}/META-INF/maven/org.apache.sshd"

            for dep in sshd-common sshd-core; do
              (cd "${overlay_dir}" && jar xf "${source.dir}/patch/deps/${dep}-2.12.0.jar")
            done
            cp -a "${overlay_dir}/org/apache/sshd" "${repack_dir}/org/apache/sshd"
            mkdir -p "${repack_dir}/META-INF/maven"
            cp -a "${overlay_dir}/META-INF/maven/org.apache.sshd" "${repack_dir}/META-INF/maven/org.apache.sshd"

            scanner_new="${patch_dir}/scanner-repacked.jar"
            (cd "${repack_dir}" && jar --create --file "${scanner_new}" --manifest META-INF/MANIFEST.MF .)
            mv "${scanner_new}" "${scanner_jar}"

            unzip -p "${scanner_jar}" META-INF/maven/org.apache.sshd/sshd-common/pom.properties | grep -q "version=2.12.0"
            unzip -p "${scanner_jar}" META-INF/maven/org.apache.sshd/sshd-core/pom.properties | grep -q "version=2.12.0"
        - name: patch bundled jackson databind
          runs: |
            set -eux -o pipefail

            shopt -s nullglob

            patched_count=0

            patch_databind() {
              local group_id="$1"
              local class_dir="$2"
              local patch_jar="$3"
              local expected_version="$4"
              local metadata_dir="META-INF/maven/${group_id}/jackson-databind"
              local pom_properties="${repack_dir}/${metadata_dir}/pom.properties"

              if [[ ! -f "${pom_properties}" ]]; then
                return
              fi

              if grep -q "version=${expected_version}" "${pom_properties}"; then
                return
              fi

              rm -rf "${repack_dir:?}/${class_dir}" "${repack_dir:?}/${metadata_dir}"
              rm -rf "${overlay_dir:?}"/*
              (cd "${overlay_dir}" && jar xf "${patch_jar}")

              mkdir -p "${repack_dir}/$(dirname "${class_dir}")" "${repack_dir}/META-INF/maven/${group_id}"
              cp -a "${overlay_dir}/${class_dir}" "${repack_dir}/${class_dir}"
              cp -a "${overlay_dir}/${metadata_dir}" "${repack_dir}/${metadata_dir}"
              grep -q "version=${expected_version}" "${repack_dir}/${metadata_dir}/pom.properties"

              patched_count=$((patched_count + 1))
            }

            patch_fat_jar() {
              local relative_glob="$1"
              local matches=("${target.dir}/sonarqube"/${relative_glob})
              if [[ "${#matches[@]}" -ne 1 ]]; then
                echo "ERROR: expected exactly one JAR for ${relative_glob}, found ${#matches[@]}" >&2
                exit 1
              fi

              local outer_jar="${matches[0]}"
              local before_count="${patched_count}"
              patch_dir="$(mktemp -d)"
              repack_dir="${patch_dir}/repack"
              overlay_dir="${patch_dir}/overlay"
              mkdir -p "${repack_dir}" "${overlay_dir}"

              (cd "${repack_dir}" && jar xf "${outer_jar}")

              patch_databind \
                "com.fasterxml.jackson.core" \
                "com/fasterxml/jackson/databind" \
                "${source.dir}/patch/deps/jackson-databind-2.21.4.jar" \
                "2.21.4"
              patch_databind \
                "tools.jackson.core" \
                "tools/jackson/databind" \
                "${source.dir}/patch/deps/jackson-databind-3.1.4.jar" \
                "3.1.4"

              if [[ "${patched_count}" -eq "${before_count}" ]]; then
                echo "ERROR: no jackson-databind metadata patched in ${outer_jar}" >&2
                exit 1
              fi

              patched_jar="${patch_dir}/$(basename "${outer_jar}")"
              (cd "${repack_dir}" && jar --create --file "${patched_jar}" --manifest META-INF/MANIFEST.MF .)
              mv "${patched_jar}" "${outer_jar}"
              rm -rf "${patch_dir}"
            }

            patch_fat_jar "lib/extensions/sonar-python-plugin-*.jar"
            patch_fat_jar "lib/extensions/sonar-text-plugin-*.jar"
            patch_fat_jar "lib/scanner/sonar-scanner-engine-community-*.jar"
            patch_fat_jar "lib/sonar-application-*.jar"

            if [[ "${patched_count}" -ne 5 ]]; then
              echo "ERROR: expected 5 bundled jackson-databind patches, got ${patched_count}" >&2
              exit 1
            fi

            echo "Patched ${patched_count} bundled jackson-databind JARs"
      paths:
        - type: file
          path: ${source.dir}/patch/dhi-patch-config.json
          uid: 0
          gid: 0
          source: image/sonarqube/patch/dhi-patch-config.json
        - type: file
