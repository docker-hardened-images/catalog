# syntax=dhi.io/build:2-debian13

name: AWS CLI 1.x (dev)
image: dhi.io/awscli
variant: dev
tags:
  - 1-dev
  - 1.45-dev
  - 1.45.39-dev
  - 1-debian-dev
  - 1-debian13-dev
  - 1.45-debian-dev
  - 1.45-debian13-dev
  - 1.45.39-debian-dev
  - 1.45.39-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  COMMIT_SHA: ab2238dc1180478afe188708570d11f4cf186c3a
  SEMVER_MAJOR_MINOR_VERSION: "1.45"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.45.39
  VERSION: 1.45.39
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - groff-base
    - less
    - libc-bin
    - libffi8
    - libstdc++6
    - mawk
    - ncurses-base
    - ncurses-bin
    - perl-base
    - python-3.13
    - python-3.13-dev
    - python3-pip
    - python3-setuptools
    - python3-wheel
    - sed
    - util-linux
    - zlib1g
  builds:
    - name: awscli
      contents:
        packages:
          - ca-certificates
          - coreutils
          - unzip
          - python-3.13
          - python-3.13-dev
          - python3-pip
          - python3-setuptools
          - python3-wheel
          - libstdc++6
          - bash
          - diffutils
          - findutils
          - gawk
          - grep
          - sed
          - build-essential
        files:
          - url: https://s3.amazonaws.com/aws-cli/awscli-bundle-1.45.39.zip
            path: ${source.dir}/awscli.zip
            spdx:
              name: awscli
              version: 1.45.39
              packages:
                - name: awscli
                  purl: pkg:dhi/awscli@1.45.39
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: install
          work-dir: ${source.dir}
          runs: |
            set -eux -o pipefail

            unzip -q awscli.zip
            ./awscli-bundle/install -i "${target.dir}/opt/aws-cli"
        - name: bump
          work-dir: ${target.dir}/opt/aws-cli
          privileged: true
          runs: |
            set -eux -o pipefail

            ${target.dir}/opt/aws-cli/bin/python -m pip install --upgrade 'pyasn1>=0.6.2' # CVE-2026-23490
        - name: cleanup dependencies
          work-dir: ${target.dir}/opt/aws-cli
          runs: |
            set -eux -o pipefail

            ${target.dir}/opt/aws-cli/bin/python -m pip uninstall -y setuptools setuptools-scm wheel
        - name: fix paths
          runs: |
            set -eux -o pipefail

            # replace invalid reference to /out directory
            sed -i "s|${target.dir}/opt/aws-cli/bin/python|/opt/aws-cli/bin/python|g" ${target.dir}/opt/aws-cli/bin/aws
      outputs:
        - source: ${target.dir}/opt/aws-cli
          target: /opt/aws-cli
          uid: 0
          gid: 0
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  AWS_CLI_VERSION: 1.45.39
  DEBIAN_FRONTEND: noninteractive
  PATH: /opt/aws-cli/bin:/usr/sbin:/sbin:/usr/bin:/bin
annotations:
  org.opencontainers.image.description: A minimal AWS CLI image
cmd:
  - aws
  - help
