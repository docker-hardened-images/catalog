# syntax=dhi.io/build:2-debian13

name: Virt API 1.8.x
image: dhi.io/virt-api
variant: runtime
tags:
  - "1"
  - "1.8"
  - 1.8.1
  - 1-debian13
  - 1.8-debian13
  - 1.8.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-18"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: ae865b624b443450f7aedadc30cf9223a6176015
  GOLANG_REFERENCE: dhi/golang:1.26.2-debian13-dev@sha256:39947402d8e52fcaeb8f8a3b00f4377414464fb89437c7ba67358cf4c5caaac9
  SEMVER_MAJOR_MINOR_VERSION: "1.8"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.8.1
  VERSION: 1.8.1
contents:
  packages:
    - '!base-files'
  builds:
    - name: virt-api
      uses: dhi.io/golang:1.26.2-debian13-dev@sha256:39947402d8e52fcaeb8f8a3b00f4377414464fb89437c7ba67358cf4c5caaac9
      work-dir: /go/src/kubevirt.io/kubevirt
      caches:
        - path: /go/pkg/mod
        - path: /root/.cache/go-build
      contents:
        files:
          - url: git+https://github.com/kubevirt/kubevirt.git#v1.8.1
            checksum: ae865b624b443450f7aedadc30cf9223a6176015
            path: /go/src/kubevirt.io/kubevirt
            spdx:
              name: virt-api
              version: 1.8.1
              packages:
                - name: virt-api
                  purl: pkg:golang/kubevirt.io/kubevirt@1.8.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch no-op
          uses: go/bump@v1
          environment:
            GOWORK: "off"
          with:
            deps: []
            download: false
        - name: manual patch vulnerable Go dependencies
          privileged: true
          environment:
            GODEBUG: ""
            GOFIPS140: ""
          runs: |
            set -eux -o pipefail

            go get golang.org/x/crypto@v0.47.0               # CVE-2025-47913, CVE-2025-22869
            go get github.com/opencontainers/selinux@v1.13.0 # CVE-2025-52881
            go get golang.org/x/oauth2@v0.27.0               # CVE-2025-22868
            go get golang.org/x/net@v0.45.0                  # CVE-2025-58190, CVE-2025-47911
            go get google.golang.org/grpc@v1.79.3            # CVE-2026-33186 — after oauth2/net or grpc resolves to v1.73.0-dev

            if [ "1.8.1" = "1.8.1" ]; then
              go get github.com/opencontainers/runc@v1.2.8 # CVE-2025-52881, CVE-2025-52565, CVE-2025-31133
            fi

            go mod tidy
            # requires manual patch due to go/bump not supporting GOWORK=true (uses go mod vendor)
            if [ -f go.work ]; then
              go work vendor
            else
              go mod vendor
            fi
        - name: patch runc cgroup devices API compat
          uses: patch@v1
          with:
            options: -p1
            patch: ${source.dir}/patch/runc-cgroup-devices-api-compat.patch
        - name: test
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              # FIPS 140 mode: Downgrade from fips140=only to fips140=on
              # Some unit tests use X25519 cryptography which is not allowed in FIPS-only mode
              export GODEBUG=fips140=on
            fi

            # -vet=off: virt-api v1.5.x has non-constant format strings caught by Go 1.26's linting
            CGO_ENABLED=0 go test -vet=off ./cmd/virt-api/... ./pkg/virt-api/...
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X kubevirt.io/client-go/version.gitVersion=v1.8.1
              - -X kubevirt.io/client-go/version.gitCommit=ae865b624b443450f7aedadc30cf9223a6176015
            output: ${target.dir}/usr/local/bin/virt-api
            packages: ./cmd/virt-api
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/virt-api/patch
      outputs:
        - source: ${target.dir}/usr/local/bin/virt-api
          target: /usr/local/bin/virt-api
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/virt-api
          target: /opt/docker/sbom/virt-api
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: "65532"
  users:
