# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-livenessprobe
variant: runtime
tags:
  - 2.18.0-alpine3.23
  - 2.18.0-r2-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: d2354a913222736a137ab16d1cb696bc18b20e5a
  GOLANG_VERSION: 1.26.1-r3
  PACKAGE_NAME: livenessprobe
  REL: "2"
  SEMVER_MAJOR_MINOR_VERSION: "2.18"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.18.0
  VERSION: 2.18.0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: livenessprobe
      work-dir: /go/src/github.com/kubernetes-csi/livenessprobe
      contents:
        packages:
          - busybox
          - bash
          - golang-1.26=1.26.1-r3
          - golang-1.26-oci-config=1.26.1-r3
        files:
          - url: git+https://github.com/kubernetes-csi/livenessprobe.git#v2.18.0
            checksum: d2354a913222736a137ab16d1cb696bc18b20e5a
            path: /go/src/github.com/kubernetes-csi/livenessprobe
            uid: 0
            gid: 0
      pipeline:
        - name: remove vendor directory
          runs: |
            set -eux -o pipefail

            rm -rf vendor
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps: []
            tidy: true
        - uses: go/hermetic@v1
        - name: build
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X main.version=2.18.0
            output: ${target.dir}/usr/bin/livenessprobe
            packages: ./cmd/livenessprobe
        - name: build dev
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X main.version=2.18.0
            output: ${target.dir}/usr/bin/livenessprobe-dev
            packages: ./cmd/livenessprobe
            strip: false
        - uses: sbom@v1
          with:
            prefix: livenessprobe-go
            source: ${target.dir}
        - uses: abuild/setup@v1
          work-dir: ${source.dir}/aports/livenessprobe
        - uses: abuild/apk@v1
          work-dir: ${source.dir}/aports/livenessprobe
          with:
            description: A sidecar container that monitors liveness of CSI drivers
            functions:
              dev: |
                pkgdesc="$pkgdesc (dev)"
                mkdir -p "$subpkgdir/usr/bin"
                mv "$pkgdir/usr/bin/livenessprobe-dev" "$subpkgdir/usr/bin/livenessprobe"
            license: Apache-2.0
            name: livenessprobe
            options: '!check !strip'
            rel: 2
            subpackages: $pkgname-dev
            url: https://github.com/kubernetes-csi/livenessprobe
            version: 2.18.0
        - uses: abuild/build@v1
          work-dir: ${source.dir}/aports/livenessprobe
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
