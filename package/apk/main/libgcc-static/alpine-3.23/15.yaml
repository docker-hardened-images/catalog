# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-libgcc-static
variant: runtime
tags:
  - 15.2.0-alpine3.23
  - 15.2.0-r0-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  _REL: "2"
  COMMIT_SHA: 7fa6e7fd3465c5ff89cc33a56d20bf4d59105aaf
  DHI_TEST_APK_PACKAGES: libgcc-static-15.2.0-r0
  PACKAGE_NAME: main/gcc
  REL: "0"
  SEMVER_MAJOR_MINOR_VERSION: "15.2"
  SEMVER_MAJOR_VERSION: "15"
  SEMVER_VERSION: 15.2.0
  VERSION: 15.2.0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
