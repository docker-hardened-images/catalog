  packages:
    - alpine-baselayout-data
  builds:
    - name: abuild
      work-dir: ${source.dir}/aports/main/gcc
      contents:
        packages:
          - build-base
          - binutils
          - bison
          - flex
          - texinfo
          - gawk
          - zip
          - gmp-dev
          - mpfr-dev
          - mpc1-dev
          - zlib-dev
          - libucontext-dev
          - gcc-gdc-bootstrap
          - gcc-gnat-bootstrap
          - linux-headers
          - isl-dev
          - libucontext-dev
          - '!gettext-dev'
        files:
          - url: git+https://github.com/alpinelinux/aports.git#7fa6e7fd3465c5ff89cc33a56d20bf4d59105aaf
            path: ${source.dir}/aports
            uid: 0
            gid: 0
          - url: https://gcc.gnu.org/pub/gcc/releases/gcc-15.2.0/gcc-15.2.0.tar.xz
            path: /var/cache/distfiles/gcc-15.2.0.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: abuild/setup@v1
        - uses: git/patch@v1
          with:
            patch: ${source.dir}/patch/libgcc-static-subpackage.patch
        - uses: abuild/bump@v1
          with:
            rel: 0
        - uses: abuild/disable@v1
          with:
            function: check
        - uses: abuild/build@v1
        - name: keep libgcc-static apks only
          work-dir: ${source.dir}/aports
          runs: |
            set -eux -o pipefail

            find apk packages/apk -name '*.apk' -type f ! -name 'libgcc-static-*.apk' -delete 2> /dev/null || true
      paths:
        - type: file
          path: ${source.dir}/patch/libgcc-static-subpackage.patch
          uid: 0
          gid: 0
          source: package/apk/main/libgcc-static/alpine-3.23/patch/libgcc-static-subpackage.patch
