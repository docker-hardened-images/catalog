# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-pushgateway
variant: runtime
tags:
  - 1.11.2-alpine3.23
  - 1.11.2-r2-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: ace6bf252df95246501059f17ace076f1081144e
  GOLANG_VERSION: 1.26.1-r2
  PACKAGE_NAME: pushgateway
  REL: "2"
  SEMVER_MAJOR_MINOR_VERSION: "1.11"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.11.2
  VERSION: 1.11.2
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: pushgateway
      work-dir: /go/src/github.com/prometheus/pushgateway
      contents:
        packages:
          - busybox
          - bash
          - golang-1.26=1.26.1-r2
          - golang-1.26-oci-config=1.26.1-r2
        files:
          - url: git+https://github.com/prometheus/pushgateway#v1.11.2
            checksum: ace6bf252df95246501059f17ace076f1081144e
            path: /go/src/github.com/prometheus/pushgateway
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.45.0
            tidy: true
        - uses: go/hermetic@v1
        - name: build
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X github.com/prometheus/common/version.Version=1.11.2
              - -X github.com/prometheus/common/version.Revision=ace6bf252df95246501059f17ace076f1081144e
              - -X github.com/prometheus/common/version.Branch=master
              - -X github.com/prometheus/common/version.BuildUser=DHI
              - -X github.com/prometheus/common/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%Y%m%d-%H:%M:%S')
            output: ${target.dir}/usr/bin/pushgateway
            packages: .
        - name: build dev
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X github.com/prometheus/common/version.Version=1.11.2
              - -X github.com/prometheus/common/version.Revision=ace6bf252df95246501059f17ace076f1081144e
              - -X github.com/prometheus/common/version.Branch=master
              - -X github.com/prometheus/common/version.BuildUser=DHI
              - -X github.com/prometheus/common/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%Y%m%d-%H:%M:%S')
            output: ${target.dir}/usr/bin/pushgateway-dev
            packages: .
            strip: false
        - uses: sbom@v1
          with:
            prefix: pushgateway-go
            source: ${target.dir}
        - uses: abuild/setup@v1
          work-dir: ${source.dir}/aports/pushgateway
        - uses: abuild/apk@v1
          work-dir: ${source.dir}/aports/pushgateway
          with:
            description: Prometheus Pushgateway
            functions:
              dev: |
                pkgdesc="$pkgdesc (dev)"
                mkdir -p "$subpkgdir/usr/bin"
                mv "$pkgdir/usr/bin/pushgateway-dev" "$subpkgdir/usr/bin/pushgateway"
            license: Apache-2.0
            name: pushgateway
            options: '!check !strip'
            rel: 2
            subpackages: $pkgname-dev
            url: https://github.com/prometheus/pushgateway
            version: 1.11.2
        - uses: abuild/build@v1
          work-dir: ${source.dir}/aports/pushgateway
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
