# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-gradle
variant: runtime
tags:
  - 9.5.0-alpine3.23
  - 9.5.0-r3-alpine3.23
platforms:
  - linux/amd64
vars:
  COMMIT_SHA: 3fe117d68f3907790f3809f121aa36303a9151f8
  PACKAGE_NAME: gradle-9
  REL: "3"
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.0
  VERSION: 9.5.0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: gradle-9
      work-dir: ${source.dir}/gradle
      contents:
        packages:
          - unzip
          - openjdk17
        files:
          - url: git+https://github.com/gradle/gradle.git#v9.5.0
            checksum: 3fe117d68f3907790f3809f121aa36303a9151f8
            path: ${source.dir}/gradle
            uid: 0
            gid: 0
      pipeline:
        - name: patch disable deprecation warnings
          uses: git/patch@v1
          with:
            patch: 0004-Disable-deprecation-warnings.patch
        - name: build
          uses: dhi/gradle:9-jdk17-dev
          privileged: true
          runs: |
            set -eux -o pipefail

            # remove the daemon jvm properties file
            rm gradle/gradle-daemon-jvm.properties

            gradle :distributions-full:binDistributionZip -Pversion="9.5.0"
        - name: install
          runs: |
            set -eux -o pipefail

            unzip "packaging/distributions-full/build/distributions/gradle-9.5.0-bin.zip"

            cd gradle-*

            gradlehome="/usr/share/java/gradle"
            distdir="${target.dir}/${gradlehome}"

            mkdir -p "${distdir}"

            install -dm755 "${distdir}/bin"
            rm bin/*.bat
            install -m755 bin/* "${distdir}/bin"

            install -dm755 "${target.dir}/usr/bin"
            ln -sf "${gradlehome}/bin/gradle" "${target.dir}/usr/bin/gradle"

            install -dm755 "${distdir}/lib"
            cp -a lib "${distdir}/"

            # NOTICE file should be redistributed for derivative works
            for file in LICENSE NOTICE; do
              install -m644 -D ${file} "${target.dir}/usr/share/licenses/gradle-9/${file}"
            done
        - name: test
          runs: |
            set -eux -o pipefail

            "${target.dir}/usr/share/java/gradle/bin/gradle" --version
        - uses: sbom@v1
          privileged: true
          with:
            prefix: gradle-9-deps
            source: ${target.dir}
        - uses: abuild/setup@v1
          work-dir: ${source.dir}/aports/gradle-9
        - uses: abuild/apk@v1
          work-dir: ${source.dir}/aports/gradle-9
          with:
            arch: noarch
            description: A powerful build system for the JVM
            license: Apache-2.0
            name: gradle-9
            provider_priority: 900
            provides: gradle=9.5.0-r3
            rel: 3
            replaces: gradle
            replaces_priority: 900
            url: https://gradle.org/
            version: 9.5.0
        - uses: abuild/build@v1
          work-dir: ${source.dir}/aports/gradle-9
      paths:
        - type: file
          path: ${source.dir}/gradle/0002-Update-org.eclipse.jgit-org.eclipse.jgit-7.2.1.2025.patch
          uid: 0
          gid: 0
          source: package/apk/main/gradle/patch/0002-Update-org.eclipse.jgit-org.eclipse.jgit-7.2.1.2025.patch
        - type: file
          path: ${source.dir}/gradle/0004-Disable-deprecation-warnings.patch
          uid: 0
          gid: 0
          source: package/apk/main/gradle/patch/0004-Disable-deprecation-warnings.patch
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
