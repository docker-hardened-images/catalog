# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-gradle
variant: runtime
tags:
  - 8.14.4-alpine3.23
  - 8.14.4-r3-alpine3.23
platforms:
  - linux/amd64
vars:
  COMMIT_SHA: ad5ff774b4b0e9a8a0cf1a14ca70d7230003c3ad
  PACKAGE_NAME: gradle-8
  REL: "3"
  SEMVER_MAJOR_MINOR_VERSION: "8.14"
  SEMVER_MAJOR_VERSION: "8"
  SEMVER_VERSION: 8.14.4
  VERSION: 8.14.4
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: gradle-8
      work-dir: ${source.dir}/gradle
      contents:
        packages:
          - unzip
          - openjdk17
        files:
          - url: git+https://github.com/gradle/gradle.git#v8.14.4
            checksum: ad5ff774b4b0e9a8a0cf1a14ca70d7230003c3ad
            path: ${source.dir}/gradle
            uid: 0
            gid: 0
      pipeline:
        - name: patch bouncycastle
          uses: git/patch@v1
          with:
            patch: 0001-Update-org.bouncycastle-bcprov-jdk18on-1.78.patch
        - name: patch jgit
          uses: git/patch@v1
          with:
            patch: 0002-Update-org.eclipse.jgit-org.eclipse.jgit-7.2.1.2025.patch
        - name: patch commons-lang3
          uses: git/patch@v1
          with:
            patch: 0003-Update-org.apache.commons-commons-lang3-3.18.0.patch
        - name: patch jackson-core
          uses: git/patch@v1
          with:
            patch: 0005-Update-com.fasterxml.jackson.core-jackson-core-2.18.6.patch
        - name: patch plexus-utils
          uses: git/patch@v1
          with:
            patch: 0006-Update-org.codehaus.plexus.plexus-utils-3.6.1.patch
        - name: build
          uses: dhi/gradle:8-jdk17-dev
          privileged: true
          runs: |
            set -eux -o pipefail

            # remove the daemon jvm properties file
            rm gradle/gradle-daemon-jvm.properties

            gradle :distributions-full:binDistributionZip -Pversion="8.14.4"
        - name: install
          runs: |
            set -eux -o pipefail

            unzip "packaging/distributions-full/build/distributions/gradle-8.14.4-bin.zip"

            cd gradle-*

            gradlehome="/usr/share/java/gradle"
            distdir="${target.dir}/${gradlehome}"

            mkdir -p "${distdir}"

            install -dm755 "${distdir}/bin"
            rm bin/*.bat
            install -m755 bin/* "${distdir}/bin"

            install -dm755 "${target.dir}/usr/bin"
            ln -sf "${gradlehome}/bin/gradle" "${target.dir}/usr/bin/gradle"

            install -dm755 "${distdir}/lib"
            cp -a lib "${distdir}/"

            # NOTICE file should be redistributed for derivative works
            for file in LICENSE NOTICE; do
              install -m644 -D ${file} "${target.dir}/usr/share/licenses/gradle-8/${file}"
            done
        - name: test
          runs: |
            set -eux -o pipefail

            "${target.dir}/usr/share/java/gradle/bin/gradle" --version
        - uses: sbom@v1
          privileged: true
          with:
            prefix: gradle-8-deps
            source: ${target.dir}
        - uses: abuild/setup@v1
          work-dir: ${source.dir}/aports/gradle-8
        - uses: abuild/apk@v1
          work-dir: ${source.dir}/aports/gradle-8
          with:
            arch: noarch
            description: A powerful build system for the JVM
            license: Apache-2.0
            name: gradle-8
            provider_priority: 800
            provides: gradle=8.14.4-r3
            rel: 3
            replaces: gradle
            replaces_priority: 800
            url: https://gradle.org/
            version: 8.14.4
        - uses: abuild/build@v1
          work-dir: ${source.dir}/aports/gradle-8
      paths:
        - type: file
          path: ${source.dir}/gradle/0001-Update-org.bouncycastle-bcprov-jdk18on-1.78.patch
          uid: 0
          gid: 0
          source: package/apk/main/gradle/patch/0001-Update-org.bouncycastle-bcprov-jdk18on-1.78.patch
        - type: file
          path: ${source.dir}/gradle/0002-Update-org.eclipse.jgit-org.eclipse.jgit-7.2.1.2025.patch
          uid: 0
          gid: 0
          source: package/apk/main/gradle/patch/0002-Update-org.eclipse.jgit-org.eclipse.jgit-7.2.1.2025.patch
        - type: file
          path: ${source.dir}/gradle/0003-Update-org.apache.commons-commons-lang3-3.18.0.patch
          uid: 0
          gid: 0
          source: package/apk/main/gradle/patch/0003-8-Update-org.apache.commons-commons-lang3-3.18.0.patch
        - type: file
          path: ${source.dir}/gradle/0004-Disable-deprecation-warnings.patch
          uid: 0
          gid: 0
          source: package/apk/main/gradle/patch/0004-Disable-deprecation-warnings.patch
        - type: file
          path: ${source.dir}/gradle/0005-Update-com.fasterxml.jackson.core-jackson-core-2.18.6.patch
          uid: 0
          gid: 0
          source: package/apk/main/gradle/patch/0005-8-Update-com.fasterxml.jackson.core-jackson-core-2.18.6.patch
        - type: file
          path: ${source.dir}/gradle/0006-Update-org.codehaus.plexus.plexus-utils-3.6.1.patch
          uid: 0
          gid: 0
          source: package/apk/main/gradle/patch/0006-8-Update-org.codehaus.plexus.plexus-utils-3.6.1.patch
os-release:
