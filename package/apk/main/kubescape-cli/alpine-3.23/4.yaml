# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-kubescape-cli
variant: runtime
tags:
  - 4.0.3-alpine3.23
  - 4.0.3-r1-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: b79488dca6a1e1dc3a1c602de082b0de47a32d91
  GOLANG_VERSION: 1.26.2-r3
  PACKAGE_NAME: kubescape-cli
  REL: "1"
  SEMVER_MAJOR_MINOR_VERSION: "4.0"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.0.3
  VERSION: 4.0.3
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: kubescape-cli
      work-dir: /go/src/github.com/kubescape/kubescape
      contents:
        packages:
          - busybox
          - bash
          - golang-1.26=1.26.2-r3
          - golang-1.26-oci-config=1.26.2-r3
        files:
          - url: git+https://github.com/kubescape/kubescape.git#v4.0.3
            checksum: b79488dca6a1e1dc3a1c602de082b0de47a32d91
            path: /go/src/github.com/kubescape/kubescape
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v1
          with:
            deps:
              - github.com/anchore/grype@v0.104.1
              - go.opentelemetry.io/otel/sdk@v1.40.0
              - github.com/theupdateframework/go-tuf/v2@v2.4.1
              - github.com/sigstore/rekor@v1.5.0
              - github.com/sigstore/sigstore@v1.10.4
              - github.com/sigstore/cosign/v3@v3.0.4
              - github.com/go-git/go-git/v5@v5.16.5
              - github.com/sigstore/fulcio@v1.8.5
              - github.com/cloudflare/circl@v1.6.3
            download: true
        - uses: go/hermetic@v1
        - name: build
          uses: go/build@v1
          with:
            fips: false
            output: ${target.dir}/usr/bin/kubescape
            packages: ./cmd
        - name: build dev
          uses: go/build@v1
          with:
            fips: false
            output: ${target.dir}/usr/bin/kubescape-dev
            packages: ./cmd
            strip: false
        - uses: sbom@v1
          with:
            prefix: kubescape-cli-go
            source: ${target.dir}
        - uses: abuild/setup@v1
          work-dir: ${source.dir}/aports/kubescape-cli
        - uses: abuild/apk@v1
          work-dir: ${source.dir}/aports/kubescape-cli
          with:
            description: Kubescape CLI for Kubernetes security scanning
            functions:
              dev: |
                pkgdesc="$pkgdesc (dev)"
                mkdir -p "$subpkgdir/usr/bin"
                mv "$pkgdir/usr/bin/kubescape-dev" "$subpkgdir/usr/bin/kubescape"
            license: Apache-2.0
            name: kubescape-cli
            options: '!check !strip'
            rel: 1
            subpackages: $pkgname-dev
            url: https://github.com/kubescape/kubescape
            version: 4.0.3
        - uses: abuild/build@v1
          work-dir: ${source.dir}/aports/kubescape-cli
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
