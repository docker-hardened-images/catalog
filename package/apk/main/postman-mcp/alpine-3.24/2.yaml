# syntax=dhi.io/build:2-alpine3.24

image: dhi.io/pkg-postman-mcp
variant: runtime
tags:
  - 2.11.1-alpine3.24
  - 2.11.1-r1-alpine3.24
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 3164d701abf602c46940ce28f01dcc39f8708355
  PNPM_VERSION: 10.6.2
  REL: "1"
  SEMVER_MAJOR_MINOR_VERSION: "2.11"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.11.1
  VERSION: 2.11.1
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: postman-mcp
      work-dir: ${source.dir}/app-src
      contents:
        packages:
          - bash
          - busybox
          - ca-certificates-bundle
          - coreutils
          - corepack
          - nodejs-22
        files:
          - url: git+https://github.com/postmanlabs/postman-mcp-server.git#v2.11.1
            checksum: 3164d701abf602c46940ce28f01dcc39f8708355
            path: ${source.dir}/app-src
            spdx:
              name: postman-mcp
              version: 2.11.1
              packages:
                - name: postman-mcp
                  purl: pkg:github/postmanlabs/postman-mcp-server@2.11.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build and stage payload
          privileged: true
          runs: |
            set -eux -o pipefail

            cd "${source.dir}/app-src"

            node -e '
              const fs = require("fs");
              const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
              p.pnpm = p.pnpm || {};
              Object.assign(p.pnpm.overrides = p.pnpm.overrides || {}, {
                "handlebars": "4.7.9",
                "node-forge": "1.4.0",
                "flatted": "3.4.2",
                "fast-uri": "3.1.2",
                "hono": "4.12.25",
                "lodash": "4.18.0",
                "path-to-regexp": "8.4.0",
                "underscore": "1.13.8",
                "express-rate-limit": "8.2.2",
                "qs": "6.15.2",              // CVE-2025-15284, CVE-2026-8723
                "uuid": "13.0.1",            // CVE-2026-41907
                "ip-address": "10.1.1",      // CVE-2026-42338
                "jose": "4.15.5",            // CVE-2024-28176
                "@hono/node-server": "1.19.13", // CVE-2026-39406
              });
              fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
            '

            corepack enable
            corepack prepare pnpm@10.6.2 --activate

            pnpm install --no-frozen-lockfile
            node ./node_modules/typescript/bin/tsc

            rm -rf node_modules
            pnpm install --no-frozen-lockfile --prod

            mkdir -p "${target.dir}/usr/lib/nodejs/postman-mcp"
            cp -a dist node_modules package.json "${target.dir}/usr/lib/nodejs/postman-mcp/"

            mkdir -p /opt/docker/sbom/postman-mcp
            chmod -R 0777 /opt/docker/sbom
        - uses: abuild/setup@v1
          work-dir: ${source.dir}/aports/postman-mcp
        - uses: abuild/apk@v1
          work-dir: ${source.dir}/aports/postman-mcp
          with:
            arch: noarch
            depends: nodejs
            description: Postman MCP server (Model Context Protocol server for the Postman API)
            files:
              - usr/lib/nodejs/postman-mcp
            license: Apache-2.0
            name: postman-mcp
            options: '!check !strip !fhs'
            rel: 1
            url: https://www.postman.com/product/mcp-server/
            version: 2.11.1
        - uses: abuild/build@v1
          work-dir: ${source.dir}/aports/postman-mcp
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
