  JAVA_JRE_CHECKSUM: https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.11+10/OpenJDK21U-jre_${ARCH}_alpine-linux_hotspot_21.0.11_10.tar.gz.sha256.txt
  JAVA_JRE_DOWNLOAD: https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.11+10/OpenJDK21U-jre_${ARCH}_alpine-linux_hotspot_21.0.11_10.tar.gz
