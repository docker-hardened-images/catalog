        files:
          - url: https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.11+10/OpenJDK21U-jdk_${ARCH}_alpine-linux_hotspot_21.0.11_10.tar.gz
            checksum: https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.11+10/OpenJDK21U-jdk_${ARCH}_alpine-linux_hotspot_21.0.11_10.tar.gz.sha256.txt
            path: ${source.dir}/OpenJDK.tar.gz
