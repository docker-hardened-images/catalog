            uid: 0
            gid: 0
            mode: "0444"
      pipeline:
        - name: stage
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/lib/jvm/temurin-21"
            tar -xzf "${source.dir}/OpenJDK.tar.gz" -C "${target.dir}/usr/lib/jvm/temurin-21" --strip-components=1

            # Make the JVM available on PATH. We use /usr/bin (FHS-friendly).
            mkdir -p "${target.dir}/usr/bin"
            for tool in java javac jar jcmd jdeps jfr jimage jinfo jlink jmap jmod jps jrunscript jshell jstack jstat jstatd keytool rmiregistry; do
              if [ -e "${target.dir}/usr/lib/jvm/temurin-21/bin/${tool}" ]; then
                ln -sf "../lib/jvm/temurin-21/bin/${tool}" "${target.dir}/usr/bin/${tool}"
              fi
            done
        - name: create BCFKS FIPS store
          runs: |
            set -eux -o pipefail

            # Creates a FIPS compatible keystore
            JAVA_HOME="${target.dir}/usr/lib/jvm/temurin-21"
            KEYTOOL="$JAVA_HOME/bin/keytool"
            BCFIPS_JAR="${target.dir}/usr/lib/bouncycastle/bc-fips-2.1.2.jar"
            PASS="changeit" # Default known secret password in Java keystores

            CACERTS_PATH="/usr/lib/jvm/temurin-21/lib/security"
            # If JAVA_MAJOR_VERSION is 8, we need to use the jre/lib/security subdirectory
            if [ "21" == "8" ]; then
              # If this is a JDK, we need to use the jre/lib/security subdirectory
              if [ "JDK" == "JDK" ]; then
                CACERTS_PATH="/usr/lib/jvm/temurin-21/jre/lib/security"
              else
                CACERTS_PATH="/usr/lib/jvm/temurin-21/lib/security"
              fi
            fi

            # We must use SUN provider for this converstion to avoid errors on older JDKs
            "$KEYTOOL" \
              -J-Dsecurerandom.source=file:/dev/urandom \
              -J-Dsecurerandom.strongAlgorithms=NativePRNGBlocking:SUN \
              -J-Djava.security.egd=file:/dev/./urandom \
              -J-Djava.security.SecureRandom.NativePRNG=/dev/urandom \
              -J-XX:TieredStopAtLevel=1 \
              -importkeystore \
              -srckeystore "${target.dir}${CACERTS_PATH}/cacerts" -srcstoretype "PKCS12" -srcstorepass "$PASS" \
              -destkeystore "${target.dir}${CACERTS_PATH}/cacerts.bcfks" -deststoretype BCFKS -deststorepass "$PASS" \
              -providerclass org.bouncycastle.jcajce.provider.BouncyCastleFipsProvider \
              -providerpath "$BCFIPS_JAR" \
              -providerName BCFIPS \
              -noprompt

            # This properties file is not used by the JVM but kept for information purposes
            cat << EOF >> "${target.dir}${CACERTS_PATH}/fips-ssl.properties"
              javax.net.ssl.trustStore=${CACERTS_PATH}/cacerts.bcfks
              javax.net.ssl.trustStoreType=FIPS
              javax.net.ssl.trustStoreProvider=BCFIPS
              javax.net.ssl.trustStorePassword=changeit
            EOF
        - name: configure bouncycastle
          runs: |
            set -eux -o pipefail

            SECURITY_CONFIG_PATH="/usr/lib/jvm/temurin-21/conf/security"
            # If JAVA_MAJOR_VERSION is 8, we need to use the jre/lib/security subdirectory
            if [ "21" == "8" ]; then
              # If this is a JDK, we need to use the jre/lib/security subdirectory
              if [ "JDK" == "JDK" ]; then
                SECURITY_CONFIG_PATH="/usr/lib/jvm/temurin-21/jre/lib/security"
              else
                SECURITY_CONFIG_PATH="/usr/lib/jvm/temurin-21/lib/security"
              fi
            fi

            cd "${target.dir}${SECURITY_CONFIG_PATH}"
            cat << 'EOF' > java.security.fips

            ### Standard Java security configuration good defaults ###

            jdk.certpath.disabledAlgorithms=MD2, MD5, SHA1 jdkCA & usage TLSServer, \
                RSA keySize < 1024, DSA keySize < 1024, EC keySize < 224, \
                SHA1 usage SignedJAR & denyAfter 2019-01-01

            jdk.security.legacyAlgorithms=SHA1, \
                RSA keySize < 2048, DSA keySize < 2048, \
                DES, DESede, MD5, RC2, ARCFOUR

            jdk.jar.disabledAlgorithms=MD2, MD5, RSA keySize < 1024, \
                DSA keySize < 1024, SHA1 denyAfter 2019-01-01

            http.auth.digest.disabledAlgorithms = MD5, SHA-1

            jdk.tls.disabledAlgorithms=SSLv3, TLSv1, TLSv1.1, DTLSv1.0, RC4, DES, \
                MD5withRSA, DH keySize < 1024, EC keySize < 224, 3DES_EDE_CBC, anon, NULL, \
                ECDH, TLS_RSA_*, rsa_pkcs1_sha1 usage HandshakeSignature, \
                ecdsa_sha1 usage HandshakeSignature, dsa_sha1 usage HandshakeSignature

            jdk.xml.dsig.secureValidationPolicy=\
                disallowAlg http://www.w3.org/TR/1999/REC-xslt-19991116,\
                disallowAlg http://www.w3.org/2001/04/xmldsig-more#rsa-md5,\
                disallowAlg http://www.w3.org/2001/04/xmldsig-more#hmac-md5,\
                disallowAlg http://www.w3.org/2001/04/xmldsig-more#md5,\
                disallowAlg http://www.w3.org/2000/09/xmldsig#sha1,\
                disallowAlg http://www.w3.org/2000/09/xmldsig#dsa-sha1,\
                disallowAlg http://www.w3.org/2000/09/xmldsig#rsa-sha1,\
                disallowAlg http://www.w3.org/2007/05/xmldsig-more#sha1-rsa-MGF1,\
                disallowAlg http://www.w3.org/2001/04/xmldsig-more#ecdsa-sha1,\
                maxTransforms 5,\
                maxReferences 30,\
                disallowReferenceUriSchemes file http https,\
                minKeySize RSA 1024,\
                minKeySize DSA 1024,\
                minKeySize EC 224,\
                noDuplicateIds,\
                noRetrievalMethodLoops

            jceks.key.serialFilter = java.base/java.lang.Enum;java.base/java.security.KeyRep;\
                java.base/java.security.KeyRep$Type;java.base/javax.crypto.spec.SecretKeySpec;!*

            jdk.security.caDistrustPolicies=SYMANTEC_TLS,ENTRUST_TLS,CAMERFIRMA_TLS

            ### Actual FIPS Configuration starts here ###

            # JENT cant be used yet on Alpine as it requires glibc
            # securerandom.strongAlgorithms=ENTROPY:BCRNG

            # Kernel entropy
            securerandom.source=file:/dev/urandom
            securerandom.strongAlgorithms=DRBG:BCFIPS,DRBG:SUN,NativePRNGBlocking:SUN

            security.provider.1=org.bouncycastle.jcajce.provider.BouncyCastleFipsProvider C:DEFRND[SHA256];ENABLE{ALL};
            security.provider.2=org.bouncycastle.jsse.provider.BouncyCastleJsseProvider fips:BCFIPS
            # security.provider.3=org.bouncycastle.entropy.provider.BouncyCastleEntropyProvider # cant be used yet on Alpine
            security.provider.3=sun.security.provider.Sun
            security.provider.4=com.sun.net.ssl.internal.ssl.Provider

            ssl.KeyManagerFactory.algorithm=PKIX
            ssl.TrustManagerFactory.algorithm=PKIX
            keystore.type=PKCS12
            EOF

            cat << 'EOF' >> java.policy
            grant {
                permission java.lang.PropertyPermission "java.runtime.name", "read";

                permission java.lang.RuntimePermission "accessClassInPackage.sun.security.internal.spec";
                permission java.lang.RuntimePermission "getProtectionDomain";
                permission java.lang.RuntimePermission "accessDeclaredMembers";

                permission org.bouncycastle.crypto.CryptoServicesPermission "tlsAlgorithmsEnabled";
                permission org.bouncycastle.crypto.CryptoServicesPermission "exportKeys";
            };
            EOF
        - name: fips oci config
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/opt/docker/config"
            cat << 'EOF' > "${target.dir}/opt/docker/config/eclipse-temurin-21-jdk-fips.yaml"
            environment:
              CLASSPATH: "/usr/lib/bouncycastle/*:./*:."
              JAVA_FIPS_CLASSPATH: "/usr/lib/bouncycastle/*"
              JAVA_HOME: /usr/lib/jvm/temurin-21
              JAVA_TOOL_OPTIONS: "-Djava.security.properties=/usr/lib/jvm/temurin-21/conf/security/java.security.fips --module-path=/usr/lib/bouncycastle/*"
              JAVA_TRUSTSTORE_OPTIONS: -Djavax.net.ssl.trustStoreType=FIPS
              JAVA_VERSION: jdk-21.0.11+10
              JDK_JAVA_FIPS_OPTIONS: --add-exports=java.base/sun.security.internal.spec=ALL-UNNAMED --add-exports=java.base/sun.security.provider=ALL-UNNAMED
              JDK_JAVA_OPTIONS: --add-exports=java.base/sun.security.internal.spec=ALL-UNNAMED --add-exports=java.base/sun.security.provider=ALL-UNNAMED -Dorg.bouncycastle.fips.approved_only=true
              JDK_JAVAC_FIPS_OPTIONS: --add-exports=java.base/sun.security.internal.spec=ALL-UNNAMED --add-exports=java.base/sun.security.provider=ALL-UNNAMED
              JDK_JAVAC_OPTIONS: --add-exports=java.base/sun.security.internal.spec=ALL-UNNAMED --add-exports=java.base/sun.security.provider=ALL-UNNAMED
            EOF
        - uses: abuild/setup@v1
          work-dir: ${source.dir}/aports/eclipse-temurin-21-jdk
        - uses: abuild/apk@v1
          work-dir: ${source.dir}/aports/eclipse-temurin-21-jdk
          with:
            depends: ca-certificates-bundle libgcc libstdc++ musl tzdata so:libasound.so.2
            description: Eclipse Temurin JDK 21
            files:
              - usr
              - opt
            functions:
              fips: |
                pkgdesc="$pkgdesc (fips)"
                depends="$pkgname"

                CACERTS_PATH="/usr/lib/jvm/temurin-21/lib/security"
                SECURITY_CONFIG_PATH="/usr/lib/jvm/temurin-21/conf/security"
                # If JAVA_MAJOR_VERSION is 8, we need to use the jre/lib/security subdirectory
                if [ "21" == "8" ]; then
                  # If this is a JDK, we need to use the jre/lib/security subdirectory
                  if [ "JDK" == "JDK" ]; then
                    SECURITY_CONFIG_PATH="/usr/lib/jvm/temurin-21/jre/lib/security"
                    CACERTS_PATH="/usr/lib/jvm/temurin-21/jre/lib/security"
                  else
                    SECURITY_CONFIG_PATH="/usr/lib/jvm/temurin-21/lib/security"
                    CACERTS_PATH="/usr/lib/jvm/temurin-21/lib/security"
                  fi
                fi

                amove /usr/lib/bouncycastle
                amove ${CACERTS_PATH}/fips-ssl.properties
                amove ${CACERTS_PATH}/cacerts.bcfks
                amove ${SECURITY_CONFIG_PATH}/java.security.fips
                amove ${SECURITY_CONFIG_PATH}/java.policy
              fips_oci_config: |
                pkgdesc="OCI configuration for eclipse-temurin-21-jdk-fips"
                depends="eclipse-temurin-21-jdk"

                amove /opt/docker/config/eclipse-temurin-21-jdk-fips.yaml
            license: GPL-2.0-with-classpath-exception
            name: eclipse-temurin-21-jdk
            oci-config:
              environment:
                JAVA_HOME: /usr/lib/jvm/temurin-21
                JAVA_VERSION: jdk-21.0.11+10
            options: '!check !strip !tracedeps !fhs'
            rel: 4
            subpackages: $pkgname-fips::noarch $pkgname-fips-oci-config:fips_oci_config:noarch
            url: https://adoptium.net/
            version: 21.0.11.10
        - uses: abuild/build@v1
          work-dir: ${source.dir}/aports/eclipse-temurin-21-jdk
        - uses: abuild/upload@v1
