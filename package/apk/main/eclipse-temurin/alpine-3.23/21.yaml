          - url: https://repo1.maven.org/maven2/org/bouncycastle/bc-rng-jent/1.3.6/bc-rng-jent-1.3.6.jar
            checksum: https://repo1.maven.org/maven2/org/bouncycastle/bc-rng-jent/1.3.6/bc-rng-jent-1.3.6.jar.sha256
            path: ${target.dir}/usr/lib/bouncycastle/bc-rng-jent-1.3.6.jar
