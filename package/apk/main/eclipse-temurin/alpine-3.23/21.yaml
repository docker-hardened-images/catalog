          - url: https://repo1.maven.org/maven2/org/bouncycastle/bcutil-fips/2.1.6/bcutil-fips-2.1.6.jar
            checksum: https://repo1.maven.org/maven2/org/bouncycastle/bcutil-fips/2.1.6/bcutil-fips-2.1.6.jar.sha256
