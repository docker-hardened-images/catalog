            checksum: https://repo1.maven.org/maven2/org/bouncycastle/bctls-fips/2.1.23/bctls-fips-2.1.23.jar.sha256
            path: ${target.dir}/usr/lib/bouncycastle/bctls-fips-2.1.23.jar
            spdx:
