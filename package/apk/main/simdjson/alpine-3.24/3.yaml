# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-simdjson
variant: runtime
tags:
  - 4.2.4-alpine3.24
  - 4.2.4-r0-alpine3.24
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: a7627d81649ac8d3a81982a1998e0ce9a26ae827
  PACKAGE_NAME: main/simdjson
  REL: "0"
  SEMVER_MAJOR_MINOR_VERSION: "4.2"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.2.4
  VERSION: 4.2.4
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: abuild
      work-dir: ${source.dir}/aports/main/simdjson
      contents:
        packages:
          - cmake
          - samurai
        files:
          - url: git+https://github.com/alpinelinux/aports.git#a7627d81649ac8d3a81982a1998e0ce9a26ae827
            path: ${source.dir}/aports
            uid: 0
            gid: 0
          - url: https://github.com/simdjson/simdjson/archive/v4.2.4/simdjson-4.2.4.tar.gz
            path: /var/cache/distfiles/simdjson-4.2.4.tar.gz
            uid: 0
            gid: 0
      pipeline:
        - uses: abuild/setup@v1
        - name: fix lib directory
          runs: |
            set -eux -o pipefail

            # Set lib directory to /usr/lib instead of /usr/lib64
            sed -i 's|-DCMAKE_INSTALL_PREFIX=/usr|-DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_INSTALL_LIBDIR=/usr/lib|g' APKBUILD
        - uses: abuild/build@v1
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
