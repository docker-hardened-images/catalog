  SEMVER_VERSION: 3.11.15
  SETUPTOOLS_CHECKSUM: sha256:a59e362652f08dcd477c78bb6e7bd9d80a7995bc73ce773050228a348ce2e5bb
  SETUPTOOLS_URL: https://files.pythonhosted.org/packages/9d/76/f789f7a86709c6b087c5a2f52f911838cad707cc613162401badc665acfe/setuptools-82.0.1-py3-none-any.whl
  SETUPTOOLS_VERSION: ""
  VERSION: 3.11.15
  WHEEL_CHECKSUM: sha256:212281cab4dff978f6cedd499cd893e1f620791ca6ff7107cf270781e587eced
  WHEEL_URL: https://files.pythonhosted.org/packages/87/1b/9e33c09813d65e248f7f773119148a612516a4bea93e9c6f545f78455b7c/wheel-0.47.0-py3-none-any.whl
  WHEEL_VERSION: 0.47.0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: python
      contents:
        packages:
          - ca-certificates-bundle
          - busybox
          - musl
          - dpkg-dev
          - dpkg
          - bluez-dev
          - bzip2-dev
          - expat-dev
          - gcc
          - gdbm-dev
          - libc-dev
          - libffi-dev
          - libnsl-dev
          - libtirpc-dev
          - linux-headers
          - make
          - mpdecimal-dev
          - ncurses-dev
          - openssl-dev
          - readline-dev
          - sqlite-dev
          - tcl-dev
          - xz-dev
          - zlib-dev
          - git
          - zip
          - cosign-3
          - musl-locales
        files:
          - url: https://files.pythonhosted.org/packages/70/7a/be4bd8bcbb24ea475856dd68159d78b03b2bb53dae369f69c9606b8888f5/pip-26.1-py3-none-any.whl
            checksum: sha256:4e8486d821d814b77319acb7b9e8bf5a4ee7590a643e7cb21029f209be8573c1
            path: ${source.dir}/pip-26.1-py3-none-any.whl
            uid: 0
            gid: 0
          - url: https://files.pythonhosted.org/packages/87/1b/9e33c09813d65e248f7f773119148a612516a4bea93e9c6f545f78455b7c/wheel-0.47.0-py3-none-any.whl
            checksum: sha256:212281cab4dff978f6cedd499cd893e1f620791ca6ff7107cf270781e587eced
            path: ${source.dir}/wheel-0.47.0-py3-none-any.whl
            uid: 0
            gid: 0
          - url: https://www.python.org/ftp/python/3.11.15/Python-3.11.15.tar.xz.sigstore
            path: ${source.dir}/python.tar.xz.sigstore
            uid: 0
            gid: 0
          - url: https://www.python.org/ftp/python/3.11.15/Python-3.11.15.tar.xz
            path: ${source.dir}/python.tar.xz
            spdx:
              name: python
              version: 3.11.15
              packages:
                - name: python
                  purl: pkg:dhi/python@3.11.15
                  license: PSF-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: verify
          uses: cosign/verify-blob@v1
          with:
            blob: ${source.dir}/python.tar.xz
            certificate-identity: pablogsal@python.org
            certificate-oidc-issuer: https://accounts.google.com
            offline: true
            signature: ${source.dir}/python.tar.xz.sigstore
        - name: install
          runs: |
            set -eux -o pipefail

            tar -xaf python.tar.xz --strip-components=1

            for _subdir in common "3.11"; do
              _dir="${source.dir}/patch/${_subdir}"
              [ -d "${_dir}" ] || continue
              for _p in $(find "${_dir}" -maxdepth 1 -type f -name '*.patch' | LC_ALL=C sort); do
                git apply "${_p}"
              done
            done

            gnuArch="$(dpkg-architecture --query DEB_BUILD_GNU_TYPE)"

            # setuptools wheel checks: avoid zipfile CLI piped to grep/head (BrokenPipeError with pipefail)
            _wheel_name_contains() {
              python3 -c 'import sys, zipfile; w, frag = sys.argv[1], sys.argv[2]; sys.exit(0 if any(frag in n for n in zipfile.ZipFile(w).namelist()) else 1)' "$1" "$2"
            }

            if [ -f "${source.dir}/pip-26.1-py3-none-any.whl" ]; then
              rm -rf Lib/ensurepip/_bundled/pip*
              cp "${source.dir}/pip-26.1-py3-none-any.whl" Lib/ensurepip/_bundled/
              sed -i "s/_PIP_VERSION = \".*\"/_PIP_VERSION = \"26.1\"/g" Lib/ensurepip/__init__.py
            fi

            if [ -f "${source.dir}/setuptools--py3-none-any.whl" ]; then
              rm -rf Lib/ensurepip/_bundled/setuptools*
              cp "${source.dir}/setuptools--py3-none-any.whl" Lib/ensurepip/_bundled/
              sed -i "s/_SETUPTOOLS_VERSION = \".*\"/_SETUPTOOLS_VERSION = \"\"/g" Lib/ensurepip/__init__.py
            fi

            if [ -f "${source.dir}/wheel-0.47.0-py3-none-any.whl" ]; then
              rm -rf Lib/ensurepip/_bundled/wheel*
              cp "${source.dir}/wheel-0.47.0-py3-none-any.whl" Lib/ensurepip/_bundled/
              sed -i "s/_WHEEL_VERSION = \".*\"/_WHEEL_VERSION = \"0.47.0\"/g" Lib/ensurepip/__init__.py
            fi

            # Replace vendored wheel in setuptools if present
            if [ -f "${source.dir}/setuptools--py3-none-any.whl" ] && [ -f "${source.dir}/wheel-0.47.0-py3-none-any.whl" ]; then
              # Verify wheel files are valid zip archives before extracting
              if ! python3 -m zipfile -t "${source.dir}/setuptools--py3-none-any.whl" > /dev/null 2>&1; then
                echo "Error: setuptools wheel file is not a valid zip archive"
                exit 1
              fi
              if ! python3 -m zipfile -t "${source.dir}/wheel-0.47.0-py3-none-any.whl" > /dev/null 2>&1; then
                echo "Error: wheel file is not a valid zip archive"
                exit 1
              fi

              # Extract both wheels
              python3 -m zipfile -e "${source.dir}/setuptools--py3-none-any.whl" setuptools_temp/
              python3 -m zipfile -e "${source.dir}/wheel-0.47.0-py3-none-any.whl" wheel_temp/

              # Remove old vendored wheel from setuptools
              rm -rf setuptools_temp/setuptools/_vendor/wheel*

              # Copy new wheel into setuptools vendor directory
              cp -r wheel_temp/wheel/ setuptools_temp/setuptools/_vendor/
              cp -r wheel_temp/wheel-0.47.0.dist-info/ setuptools_temp/setuptools/_vendor/

              # Repackage setuptools with all its contents (including _distutils_hack, etc.)
              (cd setuptools_temp && zip -r "../setuptools--patched.whl" .)

              # Verify _distutils_hack is still present in the repacked wheel if it was in the original
              if _wheel_name_contains "${source.dir}/setuptools--py3-none-any.whl" "_distutils_hack"; then
                if ! _wheel_name_contains "setuptools--patched.whl" "_distutils_hack"; then
                  echo "ERROR: _distutils_hack was present in original setuptools but missing from repacked wheel!"
                  python3 -c 'import zipfile,sys; print("\n".join(zipfile.ZipFile(sys.argv[1]).namelist()[:30]))' "setuptools--patched.whl"
                  exit 1
                fi
              fi

              mv "setuptools--patched.whl" "Lib/ensurepip/_bundled/setuptools--py3-none-any.whl"
              rm -rf setuptools_temp wheel_temp
            fi

            # Verify the bundled setuptools wheel still has _distutils_hack if it should
            if _wheel_name_contains "${source.dir}/setuptools--py3-none-any.whl" "_distutils_hack"; then
              if ! _wheel_name_contains "Lib/ensurepip/_bundled/setuptools--py3-none-any.whl" "_distutils_hack"; then
                echo "ERROR: _distutils_hack not in bundled setuptools wheel!"
                python3 -c 'import zipfile,sys; print("\n".join(zipfile.ZipFile(sys.argv[1]).namelist()[:30]))' "Lib/ensurepip/_bundled/setuptools--py3-none-any.whl"
                exit 1
              fi
            fi

            # force system libs
            rm -r Modules/expat

            nproc="$(nproc)"

            # set thread stack size to 2MB so we don't segfault before we hit
            # sys.getrecursionlimit()
            # note: raised from 1 as we ran into some stack limit on x86_64 too
            # sometimes, but not recursion
            stacksize=0x200000

            # we want -O2 here for more speed for such a large interpreter.
            export CFLAGS_NODIST="-O2 -DTHREAD_STACK_SIZE=$stacksize"
            export CXXFLAGS_NODIST="-O2"
            export LDFLAGS_NODIST="-Wl,-z,stack-size=$stacksize"

            unset LDFLAGS CFLAGS CXXFLAGS CPPFLAGS

            ./configure \
              --prefix=/usr \
              --enable-ipv6 \
              --enable-loadable-sqlite-extensions \
              --enable-optimizations \
              --enable-shared \
              --with-lto \
              --with-computed-gotos \
              --with-dbmliborder=gdbm:ndbm \
              --with-system-expat \
              --with-system-libmpdec \
              --without-ensurepip

            # Skip test_re during PGO (musl doesn't support iso88591 locale encoding)
            # Python 3.13's test_re includes locale tests that fail on Alpine/musl
            make -j "$nproc" PROFILE_TASK='-m test --pgo --timeout=1200 -x test_re'

            make DESTDIR="${target.dir}" install maninstall

            install -Dm644 LICENSE "${target.dir}/usr/share/licenses/python-3.11/LICENSE"

            ln -s python3 "${target.dir}/usr/bin/python"
            ln -s python3-config "${target.dir}/usr/bin/python-config"
            ln -s idle3 "${target.dir}/usr/bin/idle"
            ln -s pydoc3 "${target.dir}/usr/bin/pydoc"

            # Verify _distutils_hack was installed if it was present in the wheel
            if _wheel_name_contains "Lib/ensurepip/_bundled/setuptools--py3-none-any.whl" "_distutils_hack"; then
              if [ ! -d "${target.dir}/usr/lib/python3.11/site-packages/_distutils_hack" ]; then
                echo "ERROR: _distutils_hack directory not found in installed site-packages!"
                ls -la "${target.dir}/usr/lib/python3.11/site-packages/" | head -20
                exit 1
              fi
              if [ ! -f "${target.dir}/usr/lib/python3.11/site-packages/_distutils_hack/override.py" ]; then
                echo "ERROR: _distutils_hack/override.py file not found!"
                ls -la "${target.dir}/usr/lib/python3.11/site-packages/_distutils_hack/"
                exit 1
              fi
            fi
        - uses: abuild/setup@v1
        - uses: abuild/apk@v1
          work-dir: ${source.dir}/aports/python-3.11
          with:
            description: Python programming language
            functions:
              _default_pyc: |
                replaces="python3-pyc"
                provides="python3-pyc=3.11.15-r6"
                pkgdesc="$pkgdesc (install .pyc cache files)"
                install_if="$pkgname=$pkgver-r$pkgrel"
                depends="
                  $pkgname-pycache-pyc0=$pkgver-r$pkgrel
                  pyc-3.11
                  "
                mkdir -p "$subpkgdir"
              _pyc_meta: |
                replaces="pyc"
                provides="pyc=3.11.15-r6"
                pkgdesc="Meta package for pulling in all -pyc packages"
                depends=""
                mkdir -p "$subpkgdir"
              dev: |
                replaces="python3-dev"
                provides="python3-dev=3.11.15-r6"
                default_dev

                # pyconfig.h is needed runtime so we move it back
                mkdir -p "$pkgdir"/usr/include/python3.11
                mv "$subpkgdir"/usr/include/python3.11/pyconfig.h \
                  "$pkgdir"/usr/include/python3.11/
              gdbm: |
                replaces="python3-gdbm"
                provides="python3-gdbm=3.11.15-r6"
                pkgdesc="Python backend for GNU gdbm"
                amove usr/lib/python3.11*/lib-dynload/_gdbm.cpython*
              pyc0: |
                replaces="python3-pycache-pyc0"
                provides="python3-pycache-pyc0=3.11.15-r6"
                pkgdesc="$pkgdesc (.pyc pycache files)"
                cd "$pkgdir"
                amove $(find usr/lib/python3* -name "*.pyc")
              pyc1: |
                replaces="python3-pycache-pyc1"
                provides="python3-pycache-pyc1=3.11.15-r6"
                pkgdesc="$pkgdesc (.opt-1.pyc pycache files)"
                cd "$pkgdir"
                amove $(find usr/lib/python3* -name "*.opt-1.pyc")
              pyc2: |
                replaces="python3-pycache-pyc2"
                provides="python3-pycache-pyc2=3.11.15-r6"
                pkgdesc="$pkgdesc (.opt-2.pyc pycache files)"
                cd "$pkgdir"
                amove $(find usr/lib/python3* -name "*.opt-2.pyc")
              tests: |
                replaces="python3-tests"
                provides="python3-tests=3.11.15-r6"
                pkgdesc="The test modules from the main python package"
                amove usr/lib/python3.11/test
            license: PSF-2.0
            name: python-3.11
            options: '!check'
            provider_priority: 200
            provides: python3=3.11.15-r6
            rel: 6
            replaces: python3
            subpackages: $pkgname-dbg $pkgname-dev $pkgname-doc $pkgname-tests::noarch $pkgname-pyc:_default_pyc $pkgname-pycache-pyc2 $pkgname-pycache-pyc1 $pkgname-pycache-pyc0 $pkgname-gdbm pyc-3.11:_pyc_meta:noarch
            url: https://www.python.org/
            version: 3.11.15
        - uses: abuild/build@v1
          work-dir: ${source.dir}/aports/python-3.11
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: package/apk/main/python/patch
          recursive: true
