image: dhi.io/pkg-python
variant: runtime
tags:
  - 3.11.15-apk-alpine3.23
  - 3.11.15-r6-apk-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COSIGN_DIGEST: sha256:9dfbfe297449aa1f23f4ea8dc1872c91ce40c810b851ae075e0a703461426dc1
  COSIGN_VERSION: 2.5.0
  OIDC_IDENTITY: pablogsal@python.org
  OIDC_ISSUER: https://accounts.google.com
  PACKAGE_NAME: python-3.11
  PATCH_CVE-2025-12084: ""
  PATCH_CVE-2025-13836: ""
  PATCH_CVE-2025-13837: ""
  PIP_CHECKSUM: sha256:4e8486d821d814b77319acb7b9e8bf5a4ee7590a643e7cb21029f209be8573c1
  PIP_URL: https://files.pythonhosted.org/packages/70/7a/be4bd8bcbb24ea475856dd68159d78b03b2bb53dae369f69c9606b8888f5/pip-26.1-py3-none-any.whl
  PIP_VERSION: "26.1"
  PYTHON_MAJOR_MINOR_VERSION: "3.11"
  PYTHON_MAJOR_VERSION: "3"
