image: dhi.io/pkg-kubectl
variant: runtime
tags:
  - 1.33.11-alpine3.23
  - 1.33.11-r1-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 9efa99e5a155c9af625d2e6271ea6f8514b24df7
  GOLANG_VERSION: 1.26.3-r0
  PACKAGE_NAME: kubectl
  REL: "1"
  SEMVER_MAJOR_MINOR_VERSION: "1.33"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.33.11
  VERSION: 1.33.11
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: kubectl
      work-dir: /go/src/k8s.io/kubernetes
      contents:
        packages:
          - bash
          - coreutils
          - findutils
          - jq
          - make
          - rsync
          - ca-certificates-bundle
          - git
          - golang-1.26=1.26.3-r0
          - golang-1.26-oci-config=1.26.3-r0
        files:
          - url: git+https://github.com/kubernetes/kubernetes.git#v1.33.11
            checksum: 9efa99e5a155c9af625d2e6271ea6f8514b24df7
            path: /go/src/k8s.io/kubernetes
            uid: 0
            gid: 0
      pipeline:
        - name: update dependencies
          privileged: true
          environment:
            GODEBUG: ""
          runs: |
            set -eux -o pipefail

            # Keep in sync with image/kubectl CVE pinning behavior.
            ./hack/pin-dependency.sh golang.org/x/net v0.45.0 # CVE-2025-47911, CVE-2025-58190
            ./hack/pin-dependency.sh golang.org/x/oauth2 v0.27.0
            ./hack/update-vendor.sh
        - name: build
          runs: |
            set -eux -o pipefail

            make WHAT=cmd/kubectl DBG=0
            make WHAT=cmd/kubectl-convert DBG=0
        - name: install
          runs: |
            set -eux -o pipefail

            # Use FHS-friendly paths for packages.
            install -D -m 0755 _output/bin/kubectl "${target.dir}/usr/bin/kubectl"
            install -D -m 0755 _output/bin/kubectl-convert "${target.dir}/usr/bin/kubectl-convert"
        - uses: sbom@v1
          with:
            prefix: kubectl-go
            source: ${target.dir}
        - uses: abuild/setup@v1
          work-dir: ${source.dir}/aports/kubectl
        - uses: abuild/apk@v1
          work-dir: ${source.dir}/aports/kubectl
          with:
            depends: ca-certificates-bundle
            description: Kubernetes command-line tool (kubectl)
            license: Apache-2.0
            name: kubectl
            options: '!check !strip'
            rel: 1
            url: https://github.com/kubernetes/kubernetes
            version: 1.33.11
        - uses: abuild/build@v1
          work-dir: ${source.dir}/aports/kubectl
