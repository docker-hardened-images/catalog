# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-curl
variant: runtime
tags:
  - 8.20.0-alpine3.23
  - 8.20.0-r1-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  _REL: "1"
  _VERSION: 8.20.0
  COMMIT_SHA: 569f95fb8ed6715db0bb9c3a024d99dc40aed25b
  PACKAGE_NAME: main/curl
  REL: "1"
  SEMVER_MAJOR_MINOR_VERSION: "8.20"
  SEMVER_MAJOR_VERSION: "8"
  SEMVER_VERSION: 8.20.0
  VERSION: 8.20.0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: abuild
      work-dir: ${source.dir}/aports/main/curl
      contents:
        packages:
          - nghttp2
          - python3
          - perl
          - groff
          - brotli-dev
          - c-ares-dev
          - libidn2-dev
          - libpsl-dev
          - nghttp2-dev
          - nghttp3-dev
          - openssl-dev
          - zlib-dev
          - zstd-dev
          - ngtcp2-dev
        files:
          - url: git+https://github.com/alpinelinux/aports.git#569f95fb8ed6715db0bb9c3a024d99dc40aed25b
            path: ${source.dir}/aports
            uid: 0
            gid: 0
          - url: https://curl.se/download/curl-8.20.0.tar.xz
            checksum: sha256:63fe2dc148ba0ceae89922ef838f7e5c946272c2e78b7c59fab4b79d3ce2b896
            path: /var/cache/distfiles/curl-8.20.0.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: abuild/setup@v1
        - runs: |
            set -eux -o pipefail

            # curl dropped openssl quic support in 8.19.0: https://github.com/curl/curl/pull/20226
            sed -i 's/--with-openssl-quic//' APKBUILD
            sed -i 's/--with-nghttp3//' APKBUILD
        - uses: abuild/disable@v1
          with:
            function: check
        - uses: abuild/build@v1
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
