  builds:
    - name: abuild
      work-dir: ${source.dir}/aports/community/librdkafka
      contents:
        packages:
          - bsd-compat-headers
          - cmake
          - cyrus-sasl-dev
          - lz4-dev
          - openssl-dev
          - rapidjson-dev
          - samurai
          - zlib-dev
          - zstd-dev
