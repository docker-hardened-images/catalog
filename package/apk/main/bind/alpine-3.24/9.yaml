# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-bind
variant: runtime
tags:
  - 9.20.24-alpine3.24
  - 9.20.24-r0-alpine3.24
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: fa822f06a25117d1a9fdee1a5fa142aff63f9220
  PACKAGE_NAME: main/bind
  REL: "0"
  SEMVER_MAJOR_MINOR_VERSION: "9.20"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.20.24
  VERSION: 9.20.24
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: abuild
      work-dir: ${source.dir}/aports/main/bind
      contents:
        packages:
          - bash
          - fstrm-dev
          - krb5-dev
          - libcap-dev
          - libuv-dev
          - libxml2-dev
          - linux-headers
          - nghttp2-dev
          - openldap-dev
          - openssl-dev
          - perl
          - protobuf-c-dev
          - dnssec-root
          - userspace-rcu-dev
          - json-c-dev
        files:
          - url: git+https://github.com/alpinelinux/aports.git#fa822f06a25117d1a9fdee1a5fa142aff63f9220
            path: ${source.dir}/aports
            uid: 0
            gid: 0
          - url: https://downloads.isc.org/isc/bind9/9.20.24/bind-9.20.24.tar.xz
            path: /var/cache/distfiles/bind-9.20.24.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: abuild/setup@v1
        - name: Ensure named user exists in post-install
          runs: |
            set -eux -o pipefail

            cat > bind.post-install << 'POSTINSTALL'
            #!/bin/sh

            # Minimal roots (e.g. apk --initdb without alpine-baselayout) lack
            # /etc/passwd and /etc/group, so create them before addgroup/adduser.
            [ -f /etc/group ] || : > /etc/group
            [ -f /etc/passwd ] || : > /etc/passwd
            addgroup -S named 2>/dev/null
            adduser -S -D -H -h /etc/bind -s /sbin/nologin -G named -g named named 2>/dev/null

            # Generate key required for reload to work -> creates /etc/bind/rndc.key
            if ! [ -f etc/bind/rndc.key ]; then
                rndc-confgen -a -c etc/bind/rndc.key
                chown named:named etc/bind/rndc.key
            fi
            POSTINSTALL
        - uses: abuild/build@v1
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
