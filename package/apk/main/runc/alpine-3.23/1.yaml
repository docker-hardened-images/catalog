# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-runc
variant: runtime
tags:
  - 1.5.1-alpine3.23
  - 1.5.1-r2-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  _REL: "1"
  COMMIT_SHA: 0cb09842aed9af2a1b16b1081d6fe76a2c6a6eff
  GOLANG_VERSION: 1.26.5-r0
  PACKAGE_NAME: community/runc
  REL: "2"
  SEMVER_MAJOR_MINOR_VERSION: "1.5"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.5.1
  VERSION: 1.5.1
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: abuild
      work-dir: ${source.dir}/aports/community/runc
      contents:
        packages:
          - bash
          - golang-1.26=1.26.5-r0
          - golang-1.26-oci-config=1.26.5-r0
          - go-md2man
          - libseccomp-dev
          - libtool
        files:
          - url: git+https://github.com/alpinelinux/aports.git#0cb09842aed9af2a1b16b1081d6fe76a2c6a6eff
            path: ${source.dir}/aports
            uid: 0
            gid: 0
          - url: https://github.com/opencontainers/runc/archive/v1.5.1/runc-1.5.1.tar.gz
            path: /var/cache/distfiles/runc-1.5.1.tar.gz
            uid: 0
            gid: 0
      pipeline:
        - uses: abuild/setup@v1
        - uses: abuild/bump@v1
          with:
            rel: 2
        - name: patch go dependencies
          runs: |
            set -eux -o pipefail

            # Go writes the sumdb cache under GOPATH/pkg/sumdb during `go get`.
            # The abuild user cannot create directories there, so pre-create
            # and chmod it here (this runs as root, before abuild drops privs).
            install -d -m 0777 "$(go env GOPATH)/pkg/sumdb/sum.golang.org"

            # Inject prepare() to bump golang.org/x/net for:
            # - CVE-2026-33814 (HIGH, fixed in 0.53.0)
            # - CVE-2025-58190 (MEDIUM, fixed in 0.45.0)
            # - CVE-2025-47911 (MEDIUM, fixed in 0.45.0)
            # $builddir below is an abuild-runtime variable; written literally to APKBUILD.
            # shellcheck disable=SC2154
            cat >> APKBUILD << 'EOF'

            prepare() {
                default_prepare
                cd "$builddir"
                go get golang.org/x/net@v0.53.0
                go mod tidy
                go mod vendor
            }
            EOF
        - uses: abuild/build@v1
          privileged: true
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
