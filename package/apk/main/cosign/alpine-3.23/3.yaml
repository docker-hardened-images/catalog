            deps:
              - github.com/sigstore/timestamp-authority/v2@v2.0.6
            tidy: true
        - uses: go/hermetic@v1
        - name: test
          privileged: true
          environment:
            CGO_ENABLED: "0"
            GODEBUG: ""
          runs: |
            set -eux -o pipefail

            go test ./...
        - name: build
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X github.com/sigstore/cosign/version.Version=3.0.6
              - -X sigs.k8s.io/release-utils/version.gitVersion=3.0.6
              - -X sigs.k8s.io/release-utils/version.gitCommit=f1ad3ee952313be5d74a49d67ba0aa8d0d5e351f
              - -X sigs.k8s.io/release-utils/version.gitTreeState=clean
              - -X sigs.k8s.io/release-utils/version.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/bin/cosign
            packages: ./cmd/cosign
        - name: build dev
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X github.com/sigstore/cosign/version.Version=3.0.6
              - -X sigs.k8s.io/release-utils/version.gitVersion=3.0.6
              - -X sigs.k8s.io/release-utils/version.gitCommit=f1ad3ee952313be5d74a49d67ba0aa8d0d5e351f
              - -X sigs.k8s.io/release-utils/version.gitTreeState=clean
              - -X sigs.k8s.io/release-utils/version.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/bin/cosign-dev
            packages: ./cmd/cosign
            strip: false
        - uses: sbom@v1
          with:
            prefix: cosign-3-go
            source: ${target.dir}
        - uses: abuild/setup@v1
          work-dir: ${source.dir}/aports/cosign-3
        - uses: abuild/apk@v1
          work-dir: ${source.dir}/aports/cosign-3
          with:
            description: Container signing tool with support for ephemeral keys and Sigstore signing
            functions:
              dev: |
                pkgdesc="$pkgdesc (dev)"
                mkdir -p "$subpkgdir/usr/bin"
                mv "$pkgdir/usr/bin/cosign-dev" "$subpkgdir/usr/bin/cosign"
            license: Apache-2.0
            name: cosign-3
            options: '!check !strip'
            provider_priority: 200
            provides: cosign=3.0.6-r2
            rel: 2
            replaces: cosign
            subpackages: $pkgname-dev
