    - name: cosign-3
      work-dir: /go/src/github.com/sigstore/cosign
      contents:
        packages:
          - busybox
          - bash
          - golang-1.26=1.26.2-r3
          - golang-1.26-oci-config=1.26.2-r3
        files:
          - url: git+https://github.com/sigstore/cosign.git#v3.0.6
            checksum: f1ad3ee952313be5d74a49d67ba0aa8d0d5e351f
            path: /go/src/github.com/sigstore/cosign
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
