# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-claude-code
variant: runtime
tags:
  - 2.1.71-alpine3.23
  - 2.1.71-r1-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x64" : "arm64" }'
  PACKAGE_NAME: claude-code
  REL: "1"
  SEMVER_MAJOR_MINOR_VERSION: "2.1"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.1.71
  VERSION: 2.1.71
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: claude-code
      contents:
        files:
          - url: https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases/2.1.71/linux-${ARCH}-musl/claude
            path: ${source.dir}/claude
            uid: 0
            gid: 0
            mode: "0755"
      pipeline:
        - name: install
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/bin"
            mv "${source.dir}/claude" "${target.dir}/usr/bin/claude"
        - uses: abuild/setup@v1
        - uses: abuild/apk@v1
          work-dir: ${source.dir}/aports/claude-code
          with:
            depends: nodejs ripgrep git busybox
            description: Claude Code is an agentic coding tool that lives in your terminal
            files:
              - usr
            license: https://github.com/anthropics/claude-code/blob/main/LICENSE.md
            name: claude-code
            options: '!strip !check'
            rel: 1
            url: https://github.com/anthropics/claude-code
            version: 2.1.71
        - uses: abuild/build@v1
          work-dir: ${source.dir}/aports/claude-code
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
