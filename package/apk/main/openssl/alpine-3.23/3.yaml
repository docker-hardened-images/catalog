    - name: abuild
      work-dir: ${source.dir}/aports/main/openssl
      contents:
        packages:
          - patchutils
          - perl
          - linux-headers
        files:
          - url: git+https://github.com/alpinelinux/aports.git#9e1970e03323430e65dfe64e6cefd4b74aa223f0
            path: ${source.dir}/aports
            uid: 0
            gid: 0
          - url: https://github.com/openssl/openssl/releases/download/openssl-3.5.5/openssl-3.5.5.tar.gz
            path: /var/cache/distfiles/openssl-3.5.5.tar.gz
            uid: 0
            gid: 0
          - url: https://github.com/openssl/openssl/commit/85977e013f32ceb96aa034c0e741adddc1a05e34.patch
            path: ${source.dir}/patch/CVE-2026-2673.patch
            uid: 0
            gid: 0
      pipeline:
