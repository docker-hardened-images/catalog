        - runs: |
            set -eux -o pipefail

            sed -i 's,https://github.com/openssl/openssl/releases/download/openssl-$pkgver/openssl-$pkgver.tar.gz,https://github.com/openssl/openssl/releases/download/openssl-3.5.5/openssl-3.5.5.tar.gz,' APKBUILD
            sed -i 's,auxv.patch,auxv.patch\n\tCVE-2026-2673-code-only.patch,' APKBUILD
