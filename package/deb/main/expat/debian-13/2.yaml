# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-expat
variant: runtime
tags:
  - 2.7.1-2dhi0
  - 2.7.1-2dhi0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  DEBIAN_VERSION: 2.7.1-2
  DHI_REL: "0"
  DHI_VERSION: 2.7.1-2dhi0
  TAG_VERSION: 2.7.1-2dhi0
  UPSTREAM_VERSION: 2.7.1
contents:
  packages:
    - '!base-files'
  builds:
    - name: expat deb
      work-dir: ${source.dir}/expat
      contents:
        packages:
          - autoconf
          - automake
          - build-essential
          - debhelper
          - docbook-to-man
          - docbook2x
          - dpkg-dev
          - libtool
        files:
          - url: https://deb.debian.org/debian/pool/main/e/expat/expat_2.7.1-2.dsc
            path: ${source.dir}/expat_2.7.1-2.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/e/expat/expat_2.7.1.orig.tar.gz
            path: ${source.dir}/expat_2.7.1.orig.tar.gz
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/e/expat/expat_2.7.1-2.debian.tar.xz
            path: ${source.dir}/expat_2.7.1-2.debian.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: expat_2.7.1-2.dsc
            path: expat
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Rebuild
            version: 2.7.1-2dhi0
        - uses: dpkg/build@v1
          with:
            args: -uc -us -d
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
