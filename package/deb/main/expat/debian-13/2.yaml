# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-deb-expat
variant: runtime
tags:
  - "2"
  - "2.7"
  - 2-1
  - 2.7.5
  - 2.7-1
  - 2.7.5-1
  - 2-debian13
  - 2.7-debian13
  - 2-1-debian13
  - 2.7.5-debian13
  - 2.7-1-debian13
  - 2.7.5-1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  MAJOR_MINOR_VERSION: "2.7"
  MAJOR_VERSION: "2"
  PACKAGE_VERSION: 2.7.5-1
  REL: "1"
  VERSION: 2.7.5
contents:
  packages:
    - base-files
  builds:
    - name: expat deb
      contents:
        packages:
          - autoconf
          - automake
          - build-essential
          - debhelper
          - docbook-to-man
          - docbook2x
          - dpkg-dev
          - libtool
        files:
          - url: https://deb.debian.org/debian/pool/main/e/expat/expat_2.7.5-1.dsc
            path: ${source.dir}/expat_2.7.5-1.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/e/expat/expat_2.7.5.orig.tar.gz
            path: ${source.dir}/expat_2.7.5.orig.tar.gz
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/e/expat/expat_2.7.5-1.debian.tar.xz
            path: ${source.dir}/expat_2.7.5-1.debian.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - name: extract source package
          runs: |
            set -eux -o pipefail

            dpkg-source -x expat_2.7.5-1.dsc expat-2.7.5
        - name: build packages
          uses: dpkg/build@v1
          work-dir: ${source.dir}/expat-2.7.5
          with:
            args: -uc -us -b -d
        - name: collect packages
          runs: |
            set -eux -o pipefail

            mkdir -p /debian/deb
            cp -f ${source.dir}/*.deb ${source.dir}/*.dsc ${source.dir}/*.tar.* \
              ${source.dir}/*.changes ${source.dir}/*.buildinfo /debian/deb/
      outputs:
        - source: /debian/deb
          target: /debian/deb
          uid: 0
          gid: 0
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
