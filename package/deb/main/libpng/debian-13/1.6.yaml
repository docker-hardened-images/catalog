# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-deb-libpng
variant: runtime
tags:
  - 1.6.56-1dhi3
  - 1.6.56-1dhi3-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  DEBIAN_EPOCH_MAJOR_MINOR_VERSION: "1.6"
  DEBIAN_EPOCH_MAJOR_VERSION: "1"
  DEBIAN_EPOCH_VERSION: 1.6.56
  DHI_REL: "3"
  DHI_VERSION: 1.6.56-1dhi3
  UPSTREAM_VERSION: 1.6.56
  VERSION: 1.6.56-1
  VERSION_TAG: 1.6.56-1dhi3
contents:
  packages:
    - base-files
  builds:
    - name: libpng deb
      contents:
        packages:
          - build-essential
          - cmake
          - debhelper
          - dpkg-dev
          - mawk
          - zlib1g-dev
        files:
          - url: https://deb.debian.org/debian/pool/main/libp/libpng1.6/libpng1.6_1.6.56-1.dsc
            path: ${source.dir}/libpng1.6_1.6.56-1.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/libp/libpng1.6/libpng1.6_1.6.56.orig.tar.gz
            path: ${source.dir}/libpng1.6_1.6.56.orig.tar.gz
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/libp/libpng1.6/libpng1.6_1.6.56-1.debian.tar.xz
            path: ${source.dir}/libpng1.6_1.6.56-1.debian.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: libpng1.6_1.6.56-1.dsc
            path: libpng1.6-1.6.56
        - uses: dpkg/bump@v1
          work-dir: ${source.dir}/libpng1.6-1.6.56
          with:
            changelog:
              - DHI Rebuild
            version: 1.6.56-1dhi3
        - name: build packages
          uses: dpkg/build@v1
          work-dir: ${source.dir}/libpng1.6-1.6.56
          with:
            args: -uc -us -b -d
        - name: collect packages
          runs: |
            set -eux -o pipefail

            mkdir -p /debian/deb
            cp -f ${source.dir}/*.deb ${source.dir}/*.dsc ${source.dir}/*.tar.* \
              ${source.dir}/*.changes ${source.dir}/*.buildinfo /debian/deb/
      outputs:
        - source: /debian/deb
          target: /debian/deb
          uid: 0
          gid: 0
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
