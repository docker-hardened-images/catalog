# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-sfw-free
variant: runtime
tags:
  - 1.13.1-0
  - 1.13.1-0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "arm64" }'
  DHI_REL: "0"
  DHI_VERSION: 1.13.1-0
  VERSION: 1.13.1
contents:
  packages:
    - '!base-files'
  builds:
    - name: sfw-free deb
      work-dir: ${source.dir}/sfw-free
      environment:
        SFW_ARCH: ${ARCH}
        SFW_VERSION: 1.13.1
      contents:
        packages:
          - bash
          - debhelper
          - dpkg-dev
        files:
          - url: https://github.com/SocketDev/sfw-free/releases/download/v1.13.1/sfw-free-linux-${ARCH}
            path: ${source.dir}/sfw-free-linux-${ARCH}
            uid: 0
            gid: 0
            mode: "0755"
          - url: https://raw.githubusercontent.com/SocketDev/sfw-free/refs/tags/v1.13.1/LICENSE.md
            path: ${source.dir}/LICENSE.md
            uid: 0
            gid: 0
      pipeline:
        - name: setup
          runs: |
            set -eux -o pipefail

            chmod +x debian/create-aliases.sh
        - uses: dpkg/bump@v1
          with:
            version: 1.13.1-0
        - uses: dpkg/build@v1
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/sfw-free/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/sfw-free/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
