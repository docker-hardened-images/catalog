contents:
  packages:
    - '!base-files'
  builds:
    - name: openssl deb
      work-dir: ${source.dir}/openssl
      contents:
        packages:
          - debhelper
          - dpkg-dev
          - libzstd-dev
          - perl
          - zlib1g-dev
        files:
          - url: https://deb.debian.org/debian-security/pool/updates/main/o/openssl/openssl_3.5.6-1~deb13u2.dsc
            checksum: sha256:6a7f8fef28a5134eeb1a88435c35704f6200a268b913232eca09775651a19210
            path: ${source.dir}/openssl_3.5.6-1~deb13u2.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian-security/pool/updates/main/o/openssl/openssl_3.5.6.orig.tar.gz
            checksum: sha256:deae7c80cba99c4b4f940ecadb3c3338b13cb77418409238e57d7f31f2a3b736
            path: ${source.dir}/openssl_3.5.6.orig.tar.gz
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian-security/pool/updates/main/o/openssl/openssl_3.5.6.orig.tar.gz.asc
            checksum: sha256:581c536bd4c5bf7e325feaa90d6ce01c3da297737b5be3213c4e8087323fb623
            path: ${source.dir}/openssl_3.5.6.orig.tar.gz.asc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian-security/pool/updates/main/o/openssl/openssl_3.5.6-1~deb13u2.debian.tar.xz
            checksum: sha256:322797f9ac320606e91eb07540fd4c7ba910ee84f52fa455c7f8619dd53f9bcc
            path: ${source.dir}/openssl_3.5.6-1~deb13u2.debian.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: openssl_3.5.6-1~deb13u2.dsc
            path: openssl
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Rebuild
            version: 3.5.6-1~deb13u2+dhi0
        - uses: dpkg/build@v1
          environment:
            DEB_BUILD_PROFILES: noudeb
          with:
            args: -uc -us -d
        - name: stage OCI config snippets for openssl
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/opt/docker/config"
            cat > "${target.dir}/opt/docker/config/openssl-provider-fips.yaml" << EOF
            environment:
              OPENSSL_CONF: /usr/lib/ssl/openssl.cnf
              OPENSSL_MODULES: /usr/lib/${ARCH}-linux-gnu/ossl-modules
            EOF
        - name: build OCI config split .debs for openssl
          work-dir: ${source.dir}
          runs: |
            set -eux -o pipefail

            build_oci_config_deb() {
              pkg_name="$1"
              provides="$2"
              description="$3"
              yaml_src="$4"
              yaml_dest="$5"
              depends_pkg="$6"

              stage="${source.dir}/oci-config-stage/${pkg_name}"
              rm -rf "${stage}"
              mkdir -p "${stage}/DEBIAN" "${stage}/$(dirname "${yaml_dest}")"

              install -m 0644 "${yaml_src}" "${stage}/${yaml_dest}"

              cat > "${stage}/DEBIAN/control" << EOF
            Package: ${pkg_name}
            Source: openssl
            Version: 3.5.6-1~deb13u2+dhi0
            Architecture: all
            Maintainer: Docker Hardened Images <dhi@docker.com>
            Section: libs
            Priority: optional
            Depends: ${depends_pkg} (>= 3.5.6-1~deb13u2)
            Provides: ${provides}
            Homepage: https://docker.com/dhi
            Description: ${description}
             Ships a DHI build-time configuration snippet (environment) that
             downstream image definitions consume via apt-get install ${pkg_name}.
             Mirrors the apk openssl-provider-fips-oci-config subpackage.
            EOF

              dpkg-deb --root-owner-group --build "${stage}" "${source.dir}/"

              mkdir -p /debian/deb
              cp -p "${source.dir}/${pkg_name}_3.5.6-1~deb13u2+dhi0_all.deb" /debian/deb/
            }

            build_oci_config_deb \
              "openssl-provider-fips-oci-config" \
              "openssl-fips-oci-config, openssl-provider-fips-oci-config" \
              "FIPS-mode OCI build-time configuration snippet for openssl" \
              "${target.dir}/opt/docker/config/openssl-provider-fips.yaml" \
              "opt/docker/config/openssl-provider-fips.yaml" \
              "openssl-provider-fips"

            ls -la /debian/deb/openssl-provider-fips-oci-config*.deb
