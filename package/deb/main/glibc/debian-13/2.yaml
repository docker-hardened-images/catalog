# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-glibc
variant: runtime
tags:
  - 2.41-12-deb13u2
  - 2.41-12-deb13u2-dhi2
  - 2.41-12-deb13u2-debian13
  - 2.41-12-deb13u2-dhi2-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  REL: "2"
  UPSTREAM_VERSION: "2.41"
  VERSION: 2.41-12+deb13u2
  VERSION_TAG: 2.41-12-deb13u2
contents:
  packages:
    - '!base-files'
  builds:
    - name: glibc deb
      work-dir: ${source.dir}/glibc-2.41
      contents:
        packages:
          - autoconf
          - bison
          - binutils-for-host
          - debhelper
          - dpkg-dev
          - file
          - g++-14-for-host
          - gawk
          - gettext
          - gperf
          - libaudit-dev
          - libcap-dev
          - libgd-dev
          - libidn2-0
          - libselinux1-dev
          - linux-libc-dev
          - netbase
          - python3
          - quilt
          - rdfind
          - symlinks
          - xz-utils
          - util-linux
        files:
          - url: https://deb.debian.org/debian/pool/main/g/glibc/glibc_2.41-12+deb13u2.dsc
            path: ${source.dir}/glibc_2.41-12+deb13u2.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/g/glibc/glibc_2.41.orig.tar.xz
            path: ${source.dir}/glibc_2.41.orig.tar.xz
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/g/glibc/glibc_2.41-12+deb13u2.debian.tar.xz
            path: ${source.dir}/glibc_2.41-12+deb13u2.debian.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: glibc_2.41-12+deb13u2.dsc
            path: glibc-2.41
        - uses: dpkg/patch@v1
          with:
            apply: true
            patches:
              - ${source.dir}/patch/CVE-2026-4437.patch
              - ${source.dir}/patch/CVE-2026-4438.patch
              - ${source.dir}/patch/CVE-2026-4046.patch
        - uses: dpkg/bump@v1
          with:
            changelog:
              - Backports fix for CVE-2025-15281, CVE-2026-0861, CVE-2026-0915, CVE-2026-4437 and CVE-2026-4438
              - Backport fix for CVE-2026-4046
            local: dhi
        - uses: dpkg/build@v1
          environment:
            DEB_BUILD_PROFILES: nobiarch noudeb
          with:
            args: -uc -us -d -G
            options: nocheck
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: package/deb/main/glibc/patch
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
