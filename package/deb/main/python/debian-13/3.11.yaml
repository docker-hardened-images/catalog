# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-python
variant: runtime
tags:
  - 3.11.15-10
  - 3.11.15-10-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COSIGN_DIGEST: sha256:9dfbfe297449aa1f23f4ea8dc1872c91ce40c810b851ae075e0a703461426dc1
  COSIGN_VERSION: 2.5.0
  DHI_REL: "10"
  DHI_VERSION: 3.11.15-10
  OIDC_IDENTITY: pablogsal@python.org
  OIDC_ISSUER: https://accounts.google.com
  PACKAGE_WORK_DIR: python3.11
  PROVIDES_PYTHON3: ""
  PYTHON_MAJOR_MINOR_VERSION: "3.11"
  VERSION: 3.11.15
contents:
  packages:
    - '!base-files'
  builds:
    - name: python deb
      work-dir: ${source.dir}/python3.11
      environment:
        PYTHON_MAJOR_MINOR_VERSION: "3.11"
      contents:
        packages:
          - bash
          - build-essential
          - ca-certificates
          - coreutils
          - debhelper
          - dpkg-dev
          - findutils
          - g++
          - gawk
          - gcc
          - git
          - grep
          - libbluetooth-dev
          - libbz2-dev
          - libc6
          - libc6-dev
          - libdb-dev
          - libffi-dev
          - libgdbm-compat-dev
          - libgdbm-dev
          - liblzma-dev
          - libncurses-dev
          - libreadline-dev
          - libsqlite3-dev
          - libssl-dev
          - libzstd-dev
          - make
          - pkg-config
          - sed
          - tk-dev
          - uuid-dev
          - zip
          - zlib1g-dev
        files:
          - url: https://www.python.org/ftp/python/3.11.15/Python-3.11.15.tar.xz.sigstore
            path: ${source.dir}/Python-3.11.15.tar.xz.sigstore
            uid: 0
            gid: 0
          - url: https://www.python.org/ftp/python/3.11.15/Python-3.11.15.tar.xz
            path: ${source.dir}/python.tar.xz
            spdx:
              name: python
              version: 3.11.15
              packages:
                - name: python
                  purl: pkg:dhi/python@3.11.15
                  license: PSF-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/cosign:2.5.0@sha256:9dfbfe297449aa1f23f4ea8dc1872c91ce40c810b851ae075e0a703461426dc1
            includes:
              - usr/local/bin/cosign
            uid: 0
            gid: 0
      pipeline:
        - name: verify
          uses: cosign/verify-blob@v1
          with:
            blob: ${source.dir}/python.tar.xz
            certificate-identity: pablogsal@python.org
            certificate-oidc-issuer: https://accounts.google.com
            offline: true
            signature: ${source.dir}/Python-3.11.15.tar.xz.sigstore
        - name: setup
          runs: |
            set -eux -o pipefail

            tar -xaf "${source.dir}/python.tar.xz" --strip-components=1

            for _subdir in common "3.11"; do
              _dir="${source.dir}/patch/${_subdir}"
              [ -d "${_dir}" ] || continue
              for _p in $(find "${_dir}" -maxdepth 1 -type f -name '*.patch' | LC_ALL=C sort); do
                git apply "${_p}"
              done
            done

            for f in debian/control.in debian/changelog debian/rules debian/not-installed.in \
              debian/libpython-minimal.install.in \
              debian/libpython.install.in \
              debian/libpython-dev.install.in \
              debian/python-minimal.install.in \
              debian/python.install.in \
              debian/python-dev.install.in; do
              sed -i \
                -e "s/@PYTHON_MINOR@/3.11/g" \
                -e "s/@VERSION@/3.11.15/g" \
                "${f}"
            done

            # All versions provide their versioned python@minor@ names plus the
            # dhi-* virtuals (used for mutual exclusion between our own minors).
            # The default Python minor (currently 3.13) additionally provides the
            # unversioned python3 / libpython3 names so it is the system python3.
            # Real Debian names carry a versioned "(= ${binary:Version})" so they
            # satisfy versioned dependencies (e.g. "python3 (>= 3.13)"); the
            # dhi-* virtuals stay unversioned as pure conflict tokens.
            if [ "" = "yes" ]; then
              sed -i 's/^@PROVIDES_LIBPYTHON3_MINIMAL@$/Provides: libpython3-minimal (= ${binary:Version}), libpython3.11-minimal (= ${binary:Version}), dhi-libpython3-minimal/' debian/control.in
              sed -i 's/^@PROVIDES_LIBPYTHON3_STDLIB@$/Provides: libpython3-stdlib (= ${binary:Version}), libpython3.11-stdlib (= ${binary:Version}), dhi-libpython3-stdlib/' debian/control.in
              sed -i 's/^@PROVIDES_LIBPYTHON3@$/Provides: libpython3.11 (= ${binary:Version}), dhi-libpython3/' debian/control.in
              sed -i 's/^@PROVIDES_PYTHON3_MINIMAL@$/Provides: python3-minimal (= ${binary:Version}), python3.11-minimal (= ${binary:Version}), dhi-python3-minimal/' debian/control.in
              sed -i 's/^@PROVIDES_PYTHON3@$/Provides: python3 (= ${binary:Version}), python3.11 (= ${binary:Version}), dhi-python3/' debian/control.in
              sed -i 's/^@PROVIDES_LIBPYTHON3_DEV@$/Provides: libpython3-dev (= ${binary:Version}), libpython3.11-dev (= ${binary:Version}), dhi-libpython3-dev/' debian/control.in
              sed -i 's/^@PROVIDES_PYTHON3_DEV@$/Provides: python3-dev (= ${binary:Version}), python3.11-dev (= ${binary:Version}), dhi-python3-dev/' debian/control.in
            else
              sed -i 's/^@PROVIDES_LIBPYTHON3_MINIMAL@$/Provides: libpython3.11-minimal (= ${binary:Version}), dhi-libpython3-minimal/' debian/control.in
              sed -i 's/^@PROVIDES_LIBPYTHON3_STDLIB@$/Provides: libpython3.11-stdlib (= ${binary:Version}), dhi-libpython3-stdlib/' debian/control.in
              sed -i 's/^@PROVIDES_LIBPYTHON3@$/Provides: libpython3.11 (= ${binary:Version}), dhi-libpython3/' debian/control.in
              sed -i 's/^@PROVIDES_PYTHON3_MINIMAL@$/Provides: python3.11-minimal (= ${binary:Version}), dhi-python3-minimal/' debian/control.in
              sed -i 's/^@PROVIDES_PYTHON3@$/Provides: python3.11 (= ${binary:Version}), dhi-python3/' debian/control.in
              sed -i 's/^@PROVIDES_LIBPYTHON3_DEV@$/Provides: libpython3.11-dev (= ${binary:Version}), dhi-libpython3-dev/' debian/control.in
              sed -i 's/^@PROVIDES_PYTHON3_DEV@$/Provides: python3.11-dev (= ${binary:Version}), dhi-python3-dev/' debian/control.in
            fi

            mv debian/control.in debian/control
            mv debian/libpython-minimal.install.in "debian/libpython-3.11-minimal.install"
            mv debian/libpython.install.in "debian/libpython-3.11.install"
            mv debian/libpython-dev.install.in "debian/libpython-3.11-dev.install"
            mv debian/python-minimal.install.in "debian/python-3.11-minimal.install"
            mv debian/python.install.in "debian/python-3.11.install"
            mv debian/python-dev.install.in "debian/python-3.11-dev.install"
            mv debian/not-installed.in debian/not-installed
        - uses: dpkg/bump@v1
          with:
            version: 3.11.15-10
        - uses: dpkg/build@v1
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: package/deb/main/python/patch
          recursive: true
        - type: directory
          path: ${source.dir}/python3.11/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/python/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
