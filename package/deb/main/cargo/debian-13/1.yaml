# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-cargo
variant: runtime
tags:
  - 1.97.0-0
  - 1.97.0-0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  COMMIT_SHA: 2d8144b7880597b6e6d3dfd63a9a9efae3f533d3
  DHI_REL: "0"
  DHI_VERSION: 1.97.0-0
  PACKAGE_NAME: cargo-1.97
  SEMVER_MAJOR_MINOR_VERSION: "1.97"
  VERSION: 1.97.0
contents:
  packages:
    - '!base-files'
  builds:
    - name: cargo
      work-dir: ${source.dir}/cargo
      environment:
        ARCH: ${ARCH}
        VERSION: 1.97.0
      contents:
        repositories:
          - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
        keyring:
          - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
        packages:
          - bash
          - binutils
          - coreutils
          - debhelper
          - dpkg-dev
          - findutils
          - grep
          - sed
          - python3
          - git
          - gcc
          - pkg-config
          - libc6
          - libc-bin
          - cmake
          - curl
          - libcurl4-openssl-dev
          - libssl-dev
          - libsqlite3-dev
          - zlib1g-dev
        files:
          - url: git+https://github.com/rust-lang/rust.git#1.97.0
            checksum: 2d8144b7880597b6e6d3dfd63a9a9efae3f533d3
            path: ${source.dir}/cargo
            spdx:
              name: cargo
              version: 1.97.0
              packages:
                - name: cargo
                  purl: pkg:dhi/cargo@1.97.0
                  license: MIT OR Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: configure bootstrapping
          runs: |
            set -eux -o pipefail

            cat > bootstrap.toml << EOF
            change-id = 154508

            [build]
            build-stage = 2
            test-stage = 2
            doc-stage = 2
            target = [ "${ARCH}-unknown-linux-gnu" ]
            extended = true
            tools = ["cargo"]

            [llvm]
            download-ci-llvm = true

            [gcc]
            download-ci-gcc = false

            [rust]
            channel = "auto-detect"
            download-rustc = false
            llvm-bitcode-linker = true
            remap-debuginfo = true

            [dist]
            compression-profile = "balanced"

            [install]
            prefix = "/usr"
            sysconfdir = "/etc"
            EOF
        - name: setup
          runs: |
            set -eux -o pipefail

            sed -i -e "s/@PACKAGE_NAME@/cargo-1.97/g" \
              -e "s/@MAJOR_MINOR_VERSION@/1.97/g" \
              debian/control.in debian/changelog debian/cargo.install.in
            mv debian/control.in debian/control
            mv debian/cargo.install.in "debian/cargo-1.97.install"
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 1.97.0-0
        - uses: dpkg/build@v1
          privileged: true
          environment:
            LIBSQLITE3_SYS_USE_PKG_CONFIG: "1"
            OPENSSL_NO_VENDOR: "1"
            SRC: ${source.dir}
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/cargo/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/cargo/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
