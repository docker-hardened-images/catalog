        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Rebuild
            version: 0.21.2-1.1+dhi0
        - name: disable gtk-doc and XSLT-generated man pages
          runs: |
            set -eux -o pipefail

            sed -i 's/--enable-gtk-doc/--disable-gtk-doc/' debian/rules
            sed -i '/gtk-doc/d' debian/libpsl-dev.install
