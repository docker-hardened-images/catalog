          - url: git+https://github.com/LINBIT/drbd-reactor.git#v1.11.0
            checksum: 8fb5c64950ed07e6f21d60891abc7168ff99d806
            path: ${source.dir}/drbd-reactor/src
            spdx:
              name: drbd-reactor
              version: 1.11.0
              packages:
                - name: drbd-reactor
                  purl: pkg:cargo/drbd-reactor@1.11.0
                  license: GPL-2.0
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 1.11.0-1
        - uses: dpkg/build@v1
          privileged: true
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/drbd-reactor/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/drbd-reactor/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
