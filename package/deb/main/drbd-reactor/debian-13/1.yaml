image: dhi.io/pkg-drbd-reactor
variant: runtime
tags:
  - 1.11.0-1
  - 1.11.0-1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 8fb5c64950ed07e6f21d60891abc7168ff99d806
  DHI_REL: "1"
  DHI_VERSION: 1.11.0-1
