# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-linux
variant: runtime
tags:
  - 6.12.88-1-dhi1
  - 6.12.88-1-dhi1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  DEBIAN_DEBIAN_CHECKSUM: sha256:5d499f004da3c0d8e715cc24a873b3068b040ebe68a653325ea0fc4a71fe3b7f
  DEBIAN_DEBIAN_FILENAME: linux_6.12.88-1.debian.tar.xz
  DEBIAN_DEBIAN_URL: https://deb.debian.org/debian-security/pool/updates/main/l/linux/linux_6.12.88-1.debian.tar.xz
  DEBIAN_DSC_CHECKSUM: sha256:741aae72868c1a0c637322618bd2c698d5a76a35fd269f58e988844107a95c9e
  DEBIAN_DSC_FILENAME: linux_6.12.88-1.dsc
  DEBIAN_DSC_URL: https://deb.debian.org/debian-security/pool/updates/main/l/linux/linux_6.12.88-1.dsc
  DEBIAN_FILENAME_VERSION: 6.12.88-1
  DEBIAN_ORIG_CHECKSUM: sha256:4181175d5c45476060292e8150687e088cf3f6cc0c4db5166587e79547bb883e
  DEBIAN_ORIG_FILENAME: linux_6.12.88.orig.tar.xz
  DEBIAN_ORIG_URL: https://deb.debian.org/debian-security/pool/updates/main/l/linux/linux_6.12.88.orig.tar.xz
  DEBIAN_VERSION: 6.12.88-1
  DHI_REL: "1"
  DHI_VERSION: 6.12.88-1+dhi1
  TAG_VERSION: 6.12.88-1-dhi1
  UPSTREAM_VERSION: 6.12.88
contents:
  packages:
    - '!base-files'
  builds:
    - name: linux deb
      work-dir: ${source.dir}/linux
      contents:
        packages:
          - '!base-files'
          - bison
          - build-essential
          - debhelper
          - dh-python
          - dpkg-dev
          - flex
          - kernel-wedge
          - libelf-dev
          - libncurses-dev
          - libssl-dev
          - pahole
          - patch
          - patchutils
          - perl
          - pkgconf
          - python3
          - python3-dacite
          - python3-jinja2
          - quilt
          - rsync
          - time
          - xz-utils
          - zlib1g-dev
        files:
          - url: https://deb.debian.org/debian-security/pool/updates/main/l/linux/linux_6.12.88-1.dsc
            checksum: sha256:741aae72868c1a0c637322618bd2c698d5a76a35fd269f58e988844107a95c9e
            path: ${source.dir}/linux_6.12.88-1.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian-security/pool/updates/main/l/linux/linux_6.12.88.orig.tar.xz
            checksum: sha256:4181175d5c45476060292e8150687e088cf3f6cc0c4db5166587e79547bb883e
            path: ${source.dir}/linux_6.12.88.orig.tar.xz
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian-security/pool/updates/main/l/linux/linux_6.12.88-1.debian.tar.xz
            checksum: sha256:5d499f004da3c0d8e715cc24a873b3068b040ebe68a653325ea0fc4a71fe3b7f
            path: ${source.dir}/linux_6.12.88-1.debian.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: linux_6.12.88-1.dsc
            path: linux
        - name: allow DHI linux revision suffix
          runs: |
            set -eux -o pipefail

            patch -p1 < ${source.dir}/patch/dhi-allow-dhi-revision.patch
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Rebuild
            version: 6.12.88-1+dhi1
        - name: regenerate linux control metadata
          runs: |
            set -eux -o pipefail

            log="$(mktemp)"
            if make -f debian/rules debian/control-real > "$log" 2>&1; then
              rm "$log"
              exit 0
            fi

            cat "$log"
            grep -q "generated SUCCESSFULLY" "$log"
            md5sum --check debian/control.md5sum --status
            rm "$log"
        - name: provide yacc for linux kbuild
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            ln -sf /usr/bin/bison /usr/local/bin/yacc
        - uses: dpkg/build@v1
          environment:
            DEB_BUILD_PROFILES: pkg.linux.nokernel pkg.linux.mintools pkg.linux.nometa noudeb nodoc
          with:
            args: -uc -us -d
            options: parallel=4
      paths:
        - type: file
          path: ${source.dir}/patch/dhi-allow-dhi-revision.patch
          uid: 0
          gid: 0
          source: package/deb/main/linux/patch/dhi-allow-dhi-revision.patch
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
