# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-linux
variant: runtime
tags:
  - 6.12.96-1-dhi0
  - 6.12.96-1-dhi0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  DEBIAN_DEBIAN_CHECKSUM: sha256:6052af0c3d43d5676853e25d1a52521d09440fa000dd73c30350783d47271918
  DEBIAN_DEBIAN_FILENAME: linux_6.12.96-1.debian.tar.xz
  DEBIAN_DEBIAN_URL: https://deb.debian.org/debian-security/pool/updates/main/l/linux/linux_6.12.96-1.debian.tar.xz
  DEBIAN_DSC_CHECKSUM: sha256:4fca3ebc4d2c1c2c7b88e05dc67fef7a7f539f03b19b4308f61d7ee3e2f1b738
  DEBIAN_DSC_FILENAME: linux_6.12.96-1.dsc
  DEBIAN_DSC_URL: https://deb.debian.org/debian-security/pool/updates/main/l/linux/linux_6.12.96-1.dsc
  DEBIAN_FILENAME_VERSION: 6.12.96-1
  DEBIAN_ORIG_CHECKSUM: sha256:59f9548e0384dbafd08eaf05872576de8de50206f972b091c567a9fc91867ca7
  DEBIAN_ORIG_FILENAME: linux_6.12.96.orig.tar.xz
  DEBIAN_ORIG_URL: https://deb.debian.org/debian-security/pool/updates/main/l/linux/linux_6.12.96.orig.tar.xz
  DEBIAN_VERSION: 6.12.96-1
  DHI_REL: "0"
  DHI_VERSION: 6.12.96-1+dhi0
  TAG_VERSION: 6.12.96-1-dhi0
  UPSTREAM_VERSION: 6.12.96
contents:
  packages:
    - '!base-files'
  builds:
    - name: linux deb
      work-dir: ${source.dir}/linux
      contents:
        packages:
          - '!base-files'
          - bison
          - build-essential
          - debhelper
          - dh-python
          - dpkg-dev
          - flex
          - kernel-wedge
          - libelf-dev
          - libncurses-dev
          - libssl-dev
          - pahole
          - patch
          - patchutils
          - perl
          - pkgconf
          - python3
          - python3-dacite
          - python3-jinja2
          - quilt
          - rsync
          - time
          - xz-utils
          - zlib1g-dev
        files:
          - url: https://deb.debian.org/debian-security/pool/updates/main/l/linux/linux_6.12.96-1.dsc
            checksum: sha256:4fca3ebc4d2c1c2c7b88e05dc67fef7a7f539f03b19b4308f61d7ee3e2f1b738
            path: ${source.dir}/linux_6.12.96-1.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian-security/pool/updates/main/l/linux/linux_6.12.96.orig.tar.xz
            checksum: sha256:59f9548e0384dbafd08eaf05872576de8de50206f972b091c567a9fc91867ca7
            path: ${source.dir}/linux_6.12.96.orig.tar.xz
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian-security/pool/updates/main/l/linux/linux_6.12.96-1.debian.tar.xz
            checksum: sha256:6052af0c3d43d5676853e25d1a52521d09440fa000dd73c30350783d47271918
            path: ${source.dir}/linux_6.12.96-1.debian.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: linux_6.12.96-1.dsc
            path: linux
        - name: allow DHI linux revision suffix
          runs: |
            set -eux -o pipefail

            patch -p1 < ${source.dir}/patch/dhi-allow-dhi-revision.patch
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Rebuild
            version: 6.12.96-1+dhi0
        - name: regenerate linux control metadata
          runs: |
            set -eux -o pipefail

            log="$(mktemp)"
            if make -f debian/rules debian/control-real > "$log" 2>&1; then
              rm "$log"
              exit 0
            fi

            cat "$log"
            grep -q "generated SUCCESSFULLY" "$log"
            md5sum --check debian/control.md5sum --status
            rm "$log"
        - name: provide yacc for linux kbuild
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            ln -sf /usr/bin/bison /usr/local/bin/yacc
        - uses: dpkg/build@v1
          environment:
            DEB_BUILD_PROFILES: pkg.linux.nokernel pkg.linux.mintools pkg.linux.nometa noudeb nodoc
          with:
            args: -uc -us -d
            options: parallel=4
      paths:
        - type: file
          path: ${source.dir}/patch/dhi-allow-dhi-revision.patch
          uid: 0
          gid: 0
          source: package/deb/main/linux/patch/dhi-allow-dhi-revision.patch
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
