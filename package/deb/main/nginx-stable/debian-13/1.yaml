      work-dir: ${source.dir}/nginx-stable
      contents:
        packages:
          - build-essential
          - cmake
          - debhelper
          - dpkg-dev
          - libedit-dev
          - libgd-dev
          - libgrpc++-dev
          - libpcre2-dev
          - libperl-dev
          - libprotobuf-dev
          - libssl-dev
          - libxml2-dev
          - libxslt1-dev
          - opentelemetry-cpp-dev
          - pkg-config
          - protobuf-compiler
          - protobuf-compiler-grpc
          - zlib1g-dev
        files:
          - url: git+https://github.com/nginx/nginx.git#release-1.30.3
            checksum: 47c3628d23efaa1bfb1a32afbe9e3d013f860c2c
            path: ${source.dir}/nginx-stable/nginx-src
            uid: 0
            gid: 0
          - url: git+https://github.com/nginx/njs.git#0.9.9
            checksum: 9ead4e71f74a27279f3212bdb6cadb0e86981a1b
            path: ${source.dir}/nginx-stable/njs
            uid: 0
            gid: 0
          - url: git+https://github.com/nginxinc/nginx-otel.git#v0.1.2
            checksum: 72d8eed53af4c2cd6f3e30a2efe0e38d66f5e176
            path: ${source.dir}/nginx-stable/nginx-otel
            uid: 0
            gid: 0
          - url: git+https://github.com/open-telemetry/opentelemetry-proto.git#v1.5.0
            checksum: 2bd940b2b77c1ab57c27166af21384906da7bb2b
            path: ${source.dir}/nginx-stable/opentelemetry-proto
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 1.30.3-4
        - uses: dpkg/build@v1
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/nginx-stable/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/nginx-stable/debian-13/debian
os-release:
