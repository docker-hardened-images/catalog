image: dhi.io/pkg-nginx-stable
variant: runtime
tags:
  - 1.30.3-4
  - 1.30.3-4-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 47c3628d23efaa1bfb1a32afbe9e3d013f860c2c
  DHI_REL: "4"
  DHI_VERSION: 1.30.3-4
  NJS_COMMIT_SHA: 9ead4e71f74a27279f3212bdb6cadb0e86981a1b
