# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-nginx-stable
variant: runtime
tags:
  - 1.30.3-0
  - 1.30.3-0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 47c3628d23efaa1bfb1a32afbe9e3d013f860c2c
  DHI_REL: "0"
  DHI_VERSION: 1.30.3-0
  VERSION: 1.30.3
contents:
  packages:
    - '!base-files'
  builds:
    - name: nginx-stable deb
      work-dir: ${source.dir}/nginx-stable
      contents:
        packages:
          - build-essential
          - debhelper
          - dpkg-dev
          - libpcre2-dev
          - libssl-dev
          - zlib1g-dev
        files:
          - url: git+https://github.com/nginx/nginx.git#release-1.30.3
            checksum: 47c3628d23efaa1bfb1a32afbe9e3d013f860c2c
            path: ${source.dir}/nginx-stable/nginx-src
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 1.30.3-0
        - uses: dpkg/build@v1
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/nginx-stable/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/nginx-stable/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
