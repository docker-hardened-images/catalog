              packages:
                - name: bouncycastle
                  purl: pkg:maven/org.bouncycastle/bc-rng-jent@1.3.6
                  license: MIT
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/org/bouncycastle/bcpkix-fips/2.1.11/bcpkix-fips-2.1.11.jar
            checksum: https://repo1.maven.org/maven2/org/bouncycastle/bcpkix-fips/2.1.11/bcpkix-fips-2.1.11.jar.sha256
            path: ${source.dir}/eclipse-temurin-11-jdk/fips/bcpkix-fips-2.1.11.jar
            spdx:
              name: bouncycastle-pkix
              version: 2.1.11
              packages:
                - name: bouncycastle
                  purl: pkg:maven/org.bouncycastle/bcpkix-fips@2.1.11
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: setup
          runs: |
            set -eux -o pipefail

            # Extract the prebuilt Adoptium tarball into the work-dir, alongside
            # the staged debian/ directory and the downloaded fips/ jars.
            tar -xzf "${source.dir}/eclipse-temurin-11-jdk.tar.gz" --strip-components=1

            # Finalize the DHI-owned debian/ templates for this variant.
            sed -i \
              -e "s/@PACKAGE_NAME@/eclipse-temurin-11-jdk/g" \
              -e "s/@JAVA_MAJOR_VERSION@/11/g" \
              -e "s/@JAVA_TYPE@/JDK/g" \
              debian/control.in debian/changelog \
              debian/eclipse-temurin.install.in \
              debian/eclipse-temurin-oci-config.install.in \
              debian/eclipse-temurin-fips.install.in \
              debian/eclipse-temurin-fips-oci-config.install.in
            mv debian/control.in debian/control
            mv debian/eclipse-temurin.install.in "debian/eclipse-temurin-11-jdk.install"
            mv debian/eclipse-temurin-oci-config.install.in "debian/eclipse-temurin-11-jdk-oci-config.install"
            mv debian/eclipse-temurin-fips.install.in "debian/eclipse-temurin-11-jdk-fips.install"
            mv debian/eclipse-temurin-fips-oci-config.install.in "debian/eclipse-temurin-11-jdk-fips-oci-config.install"
        - name: configure bouncycastle fips
          runs: |
            set -eux -o pipefail

            # Build a FIPS BCFKS truststore from the bundled cacerts using this
            # variant's own keytool. All FIPS payload lives under fips/ and ships
            # in the -fips package under /usr/lib/bouncycastle (kept out of the
            # base JVM tree so each file is owned by exactly one .deb).
            # Java 8 JDK keeps cacerts under jre/lib/security; everything else
            # (modern JDK/JRE, Java 8 JRE) uses lib/security.
            CACERTS_SRC="lib/security/cacerts"
            if [ "11" = "8" ] && [ "JDK" = "JDK" ]; then
              CACERTS_SRC="jre/lib/security/cacerts"
            fi
            ./bin/keytool \
              -J-Dsecurerandom.source=file:/dev/urandom \
              -J-Dsecurerandom.strongAlgorithms=NativePRNGBlocking:SUN \
              -J-Djava.security.egd=file:/dev/./urandom \
              -J-Djava.security.SecureRandom.NativePRNG=/dev/urandom \
              -J-XX:TieredStopAtLevel=1 \
              -importkeystore \
              -srckeystore "$CACERTS_SRC" -srcstoretype "JKS" -srcstorepass changeit \
              -destkeystore fips/cacerts.bcfks -deststoretype BCFKS -deststorepass changeit \
              -providerclass org.bouncycastle.jcajce.provider.BouncyCastleFipsProvider \
              -providerpath "fips/bc-fips-2.1.2.jar" \
              -providerName BCFIPS \
              -noprompt

            # Informational only; the JVM is pointed at the store via the OCI config.
            cat > fips/fips-ssl.properties << 'EOF'
            javax.net.ssl.trustStore=/usr/lib/bouncycastle/cacerts.bcfks
            javax.net.ssl.trustStoreType=FIPS
            javax.net.ssl.trustStoreProvider=BCFIPS
            javax.net.ssl.trustStorePassword=changeit
            EOF

            cat > fips/java.security.fips << 'EOF'
            jdk.certpath.disabledAlgorithms=MD2, MD5, SHA1 jdkCA & usage TLSServer, \
                RSA keySize < 1024, DSA keySize < 1024, EC keySize < 224, \
                SHA1 usage SignedJAR & denyAfter 2019-01-01

            jdk.security.legacyAlgorithms=SHA1, \
                RSA keySize < 2048, DSA keySize < 2048, \
                DES, DESede, MD5, RC2, ARCFOUR

            jdk.jar.disabledAlgorithms=MD2, MD5, RSA keySize < 1024, \
                DSA keySize < 1024, SHA1 denyAfter 2019-01-01

            http.auth.digest.disabledAlgorithms = MD5, SHA-1

            jdk.tls.disabledAlgorithms=SSLv3, TLSv1, TLSv1.1, DTLSv1.0, RC4, DES, \
                MD5withRSA, DH keySize < 1024, EC keySize < 224, 3DES_EDE_CBC, anon, NULL, \
                ECDH, TLS_RSA_*, rsa_pkcs1_sha1 usage HandshakeSignature, \
                ecdsa_sha1 usage HandshakeSignature, dsa_sha1 usage HandshakeSignature

            jdk.xml.dsig.secureValidationPolicy=\
                disallowAlg http://www.w3.org/TR/1999/REC-xslt-19991116,\
                disallowAlg http://www.w3.org/2001/04/xmldsig-more#rsa-md5,\
                disallowAlg http://www.w3.org/2001/04/xmldsig-more#hmac-md5,\
                disallowAlg http://www.w3.org/2001/04/xmldsig-more#md5,\
                disallowAlg http://www.w3.org/2000/09/xmldsig#sha1,\
                disallowAlg http://www.w3.org/2000/09/xmldsig#dsa-sha1,\
                disallowAlg http://www.w3.org/2000/09/xmldsig#rsa-sha1,\
                disallowAlg http://www.w3.org/2007/05/xmldsig-more#sha1-rsa-MGF1,\
                disallowAlg http://www.w3.org/2001/04/xmldsig-more#ecdsa-sha1,\
                maxTransforms 5,\
                maxReferences 30,\
                disallowReferenceUriSchemes file http https,\
                minKeySize RSA 1024,\
                minKeySize DSA 1024,\
                minKeySize EC 224,\
                noDuplicateIds,\
                noRetrievalMethodLoops

            jceks.key.serialFilter = java.base/java.lang.Enum;java.base/java.security.KeyRep;\
                java.base/java.security.KeyRep$Type;java.base/javax.crypto.spec.SecretKeySpec;!*

            jdk.security.caDistrustPolicies=SYMANTEC_TLS,ENTRUST_TLS,CAMERFIRMA_TLS

            # Debian is glibc, so the BouncyCastle JENT entropy provider is enabled
            # (unlike the musl/Alpine apk build which falls back to kernel entropy).
            securerandom.strongAlgorithms=ENTROPY:BCRNG

            # Kernel entropy fallback (emulation-safe) — kept for reference, disabled.
            # securerandom.source=file:/dev/urandom
            # securerandom.strongAlgorithms=NativePRNGBlocking:SUN,DRBG:SUN

            security.provider.1=org.bouncycastle.jcajce.provider.BouncyCastleFipsProvider C:DEFRND[SHA256];ENABLE{ALL};
            security.provider.2=org.bouncycastle.jsse.provider.BouncyCastleJsseProvider fips:BCFIPS
            security.provider.3=org.bouncycastle.entropy.provider.BouncyCastleEntropyProvider
            security.provider.4=sun.security.provider.Sun
            security.provider.5=com.sun.net.ssl.internal.ssl.Provider

            ssl.KeyManagerFactory.algorithm=PKIX
            ssl.TrustManagerFactory.algorithm=PKIX
            keystore.type=JKS
            EOF

            # Shipped separately and applied via -Djava.security.policy in the
            # FIPS OCI config, instead of mutating the base package's java.policy.
            cat > fips/java.policy.fips << 'EOF'
            grant {
                permission java.lang.PropertyPermission "java.runtime.name", "read";

                permission java.lang.RuntimePermission "accessClassInPackage.sun.security.internal.spec";
                permission java.lang.RuntimePermission "getProtectionDomain";
                permission java.lang.RuntimePermission "accessDeclaredMembers";

                permission org.bouncycastle.crypto.CryptoServicesPermission "tlsAlgorithmsEnabled";
                permission org.bouncycastle.crypto.CryptoServicesPermission "exportKeys";
            };
            EOF
        - name: generate oci config
          runs: |
            set -eux -o pipefail

            mkdir -p oci-config

            # Non-FIPS OCI config: consuming images inherit JAVA_HOME/JAVA_VERSION.
            cat > "oci-config/eclipse-temurin-11-jdk.yaml" << EOF
            environment:
              JAVA_HOME: /usr/lib/jvm/temurin-11
              JAVA_VERSION: jdk-11.0.31+11
            EOF

            # FIPS OCI config: enable BouncyCastle FIPS mode + security overrides.
            # Java 8 has no module system, so it drops --module-path; and since
            # Java 8 ignores JDK_JAVA_OPTIONS, approved-only rides on
            # JAVA_TOOL_OPTIONS (which Java 8 does read). Modern majors use the
            # module path and carry approved-only via JDK_JAVA_OPTIONS below.
            FIPS_TOOL_OPTS="-Djava.security.properties=/usr/lib/bouncycastle/java.security.fips -Djava.security.policy=/usr/lib/bouncycastle/java.policy.fips"
            if [ "11" = "8" ]; then
              FIPS_TOOL_OPTS="$FIPS_TOOL_OPTS -Dorg.bouncycastle.fips.approved_only=true"
            else
              FIPS_TOOL_OPTS="$FIPS_TOOL_OPTS --module-path=/usr/lib/bouncycastle/*"
            fi
            cat > "oci-config/eclipse-temurin-11-jdk-fips.yaml" << EOF
            environment:
              CLASSPATH: "/usr/lib/bouncycastle/*:./*:."
              JAVA_FIPS_CLASSPATH: "/usr/lib/bouncycastle/*"
              JAVA_HOME: /usr/lib/jvm/temurin-11
              JAVA_TOOL_OPTIONS: "$FIPS_TOOL_OPTS"
              JAVA_TRUSTSTORE_OPTIONS: -Djavax.net.ssl.trustStoreType=FIPS
              JAVA_VERSION: jdk-11.0.31+11
              JDK_JAVA_FIPS_OPTIONS: --add-exports=java.base/sun.security.internal.spec=ALL-UNNAMED --add-exports=java.base/sun.security.provider=ALL-UNNAMED
              JDK_JAVA_OPTIONS: --add-exports=java.base/sun.security.internal.spec=ALL-UNNAMED --add-exports=java.base/sun.security.provider=ALL-UNNAMED -Dorg.bouncycastle.fips.approved_only=true
              JDK_JAVAC_FIPS_OPTIONS: --add-exports=java.base/sun.security.internal.spec=ALL-UNNAMED --add-exports=java.base/sun.security.provider=ALL-UNNAMED
              JDK_JAVAC_OPTIONS: --add-exports=java.base/sun.security.internal.spec=ALL-UNNAMED --add-exports=java.base/sun.security.provider=ALL-UNNAMED
            EOF
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 11.0.31.11-0
        - uses: dpkg/build@v1
          environment:
            JAVA_MAJOR_VERSION: "11"
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/eclipse-temurin-11-jdk/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/eclipse-temurin/debian-13/debian
