  JAVA_DEB_VERSION: 11.0.31
  JAVA_JDK_CHECKSUM: https://github.com/adoptium/temurin11-binaries/releases/download/jdk-11.0.31+11/OpenJDK11U-jdk_${ARCH}_linux_hotspot_11.0.31_11.tar.gz.sha256.txt
  JAVA_JDK_DOWNLOAD: https://github.com/adoptium/temurin11-binaries/releases/download/jdk-11.0.31+11/OpenJDK11U-jdk_${ARCH}_linux_hotspot_11.0.31_11.tar.gz
  JAVA_JRE_CHECKSUM: https://github.com/adoptium/temurin11-binaries/releases/download/jdk-11.0.31+11/OpenJDK11U-jre_${ARCH}_linux_hotspot_11.0.31_11.tar.gz.sha256.txt
  JAVA_JRE_DOWNLOAD: https://github.com/adoptium/temurin11-binaries/releases/download/jdk-11.0.31+11/OpenJDK11U-jre_${ARCH}_linux_hotspot_11.0.31_11.tar.gz
  JAVA_MAJOR_MINOR_VERSION: "11.0"
  JAVA_MAJOR_VERSION: "11"
  JAVA_VERSION: 11.0.31
  JAVA_VERSION_SUFFIX: "11"
  KEYSTORE_TYPE: JKS
  OS: linux
  PACKAGE_NAME: eclipse-temurin-11
  VERSION: jdk-11.0.31+11
contents:
  packages:
    - '!base-files'
  builds:
    - name: eclipse-temurin-11-jdk
      work-dir: ${source.dir}/eclipse-temurin-11-jdk
      contents:
        packages:
          - bash
          - coreutils
          - debhelper
          - dpkg-dev
          - findutils
          - tar
        files:
          - url: https://github.com/adoptium/temurin11-binaries/releases/download/jdk-11.0.31+11/OpenJDK11U-jdk_${ARCH}_linux_hotspot_11.0.31_11.tar.gz
            checksum: https://github.com/adoptium/temurin11-binaries/releases/download/jdk-11.0.31+11/OpenJDK11U-jdk_${ARCH}_linux_hotspot_11.0.31_11.tar.gz.sha256.txt
            path: ${source.dir}/eclipse-temurin-11-jdk.tar.gz
            spdx:
              name: eclipse-temurin
              version: 11.0.31
              packages:
                - name: eclipse-temurin
                  purl: pkg:dhi/eclipse-temurin@11.0.31+11
                  license: GPL-2.0-with-classpath-exception
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/org/bouncycastle/bc-fips/2.1.2/bc-fips-2.1.2.jar
            checksum: https://repo1.maven.org/maven2/org/bouncycastle/bc-fips/2.1.2/bc-fips-2.1.2.jar.sha256
            path: ${source.dir}/eclipse-temurin-11-jdk/fips/bc-fips-2.1.2.jar
            spdx:
              name: bouncycastle
              version: 2.1.2
              packages:
                - name: bouncycastle
