# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-golang
variant: runtime
tags:
  - 1.26.4-0
  - 1.26.4-0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BOOTSTRAP_VERSION: "1.25"
  COMMIT_SHA: a9ce111d580581fb925ae88f125c69b7d93504ea
  DHI_REL: "0"
  DHI_VERSION: 1.26.4-0
  PACKAGE_NAME: golang-1.26
  SEMVER_MAJOR_MINOR_VERSION: "1.26"
  VERSION: 1.26.4
contents:
  packages:
    - '!base-files'
  builds:
    - name: golang-1.26
      work-dir: ${source.dir}/golang-1.26
      contents:
        repositories:
          - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
        keyring:
          - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
        packages:
          - bash
          - build-essential
          - binutils
          - coreutils
          - debhelper
          - dpkg-dev
          - findutils
          - golang-1.25
          - grep
          - git
          - sed
        files:
          - url: git+https://github.com/golang/go.git#go1.26.4
            checksum: a9ce111d580581fb925ae88f125c69b7d93504ea
            path: ${source.dir}/golang-1.26
            uid: 0
            gid: 0
      pipeline:
        - name: setup
          runs: |
            set -eux -o pipefail

            # Remove .git artifacts from the source
            rm -rf .git .gitattributes .github .gitignore

            # Finalize debian/ templates in-place
            sed -i -e "s/@PACKAGE_NAME@/golang-1.26/g" \
              -e "s/@MAJOR_MINOR_VERSION@/1.26/g" \
              debian/control.in debian/changelog \
              debian/golang-oci-config.install.in \
              debian/golang-fips-oci-config.install.in
            mv debian/control.in debian/control
            mv debian/golang.install.in "debian/golang-1.26.install"
            mv debian/golang-oci-config.install.in "debian/golang-1.26-oci-config.install"
            mv debian/golang-fips-oci-config.install.in "debian/golang-1.26-fips-oci-config.install"
        - name: generate oci config
          runs: |
            set -eux -o pipefail

            mkdir -p oci-config
            cat > oci-config/golang-1.26.yaml << 'EOF'
            environment:
              GODEBUG: "tarinsecurepath=0,zipinsecurepath=0"
              GOPATH: /go
              GOTOOLCHAIN: "local"
              PATH: /go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            paths:
              - type: directory
                path: /go
                uid: 65532
                gid: 65532
                mode: "0755"
              - type: directory
                path: /go/bin
                uid: 65532
                gid: 65532
                mode: "0755"
              - type: directory
                path: /go/src
                uid: 65532
                gid: 65532
                mode: "0755"
              - type: directory
                path: /usr/src
                uid: 65532
                gid: 65532
                mode: "0755"
              - type: directory
                path: /go/pkg
                uid: 65532
                gid: 65532
                mode: "0755"
            EOF
            cat > oci-config/golang-1.26-fips.yaml << 'EOF'
            environment:
              GODEBUG: "fips140=on,tarinsecurepath=0,zipinsecurepath=0"
              # https://go.dev/doc/security/fips140#the-gofips140-environment-variable
              # set to the version that is currently undergoing FIPS certification
              GOFIPS140: v1.0.0
            EOF
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 1.26.4-0
        - uses: dpkg/build@v1
          environment:
            DHI_GOROOT_BOOTSTRAP: /usr/lib/go-1.25
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/golang-1.26/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/golang/debian-13/debian
    - name: golang-1.26-dev
      work-dir: ${source.dir}/golang-1.26-dev
      contents:
        repositories:
          - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
        keyring:
          - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
        packages:
          - bash
          - build-essential
          - binutils
          - coreutils
          - debhelper
          - dpkg-dev
          - findutils
          - golang-1.25
          - grep
          - git
          - sed
        files:
          - url: git+https://github.com/golang/go.git#go1.26.4
            checksum: a9ce111d580581fb925ae88f125c69b7d93504ea
            path: ${source.dir}/golang-1.26-dev
            uid: 0
            gid: 0
      pipeline:
        - name: setup
          runs: |
            set -eux -o pipefail

            # Remove .git artifacts from the source
            rm -rf .git .gitattributes .github .gitignore

            # Finalize debian/ templates in-place
            sed -i -e "s/@PACKAGE_NAME@/golang-1.26-dev/g" \
              -e "s/@MAJOR_MINOR_VERSION@/1.26/g" \
              debian/control.in debian/changelog \
              debian/golang-oci-config.install.in \
              debian/golang-fips-oci-config.install.in
            mv debian/control.in debian/control
            mv debian/golang.install.in "debian/golang-1.26-dev.install"
            mv debian/golang-oci-config.install.in "debian/golang-1.26-dev-oci-config.install"
            mv debian/golang-fips-oci-config.install.in "debian/golang-1.26-dev-fips-oci-config.install"
        - name: generate oci config
          runs: |
            set -eux -o pipefail

            mkdir -p oci-config
            cat > oci-config/golang-1.26-dev.yaml << 'EOF'
            environment:
              GODEBUG: "tarinsecurepath=0,zipinsecurepath=0"
              GOPATH: /go
              GOTOOLCHAIN: "local"
              PATH: /go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            paths:
              - type: directory
                path: /go
                uid: 0
                gid: 0
                mode: "0755"
              - type: directory
                path: /go/bin
                uid: 0
                gid: 0
                mode: "0755"
              - type: directory
                path: /go/src
                uid: 0
                gid: 0
                mode: "0755"
              - type: directory
                path: /usr/src
                uid: 0
                gid: 0
                mode: "0755"
              - type: directory
                path: /go/pkg
                uid: 0
                gid: 0
                mode: "0755"
            EOF
            cat > oci-config/golang-1.26-dev-fips.yaml << 'EOF'
            environment:
              GODEBUG: "fips140=on,tarinsecurepath=0,zipinsecurepath=0"
              # https://go.dev/doc/security/fips140#the-gofips140-environment-variable
              # set to the version that is currently undergoing FIPS certification
              GOFIPS140: v1.0.0
            EOF
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 1.26.4-0
        - uses: dpkg/build@v1
          environment:
            DHI_GOROOT_BOOTSTRAP: /usr/lib/go-1.25
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/golang-1.26-dev/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/golang/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
