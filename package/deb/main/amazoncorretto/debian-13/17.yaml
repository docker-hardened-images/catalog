            EOF
            gpg --import corretto-gpg-key
            gpg --batch --verify \
              "${source.dir}/amazoncorretto-17-jdk.tar.gz.sig" \
              "${source.dir}/amazoncorretto-17-jdk.tar.gz"

            # Extract the prebuilt Corretto tarball into the work-dir, alongside
            # the staged debian/ directory and the downloaded fips/ payload.
            tar -xzf "${source.dir}/amazoncorretto-17-jdk.tar.gz" --strip-components=1

            # Finalize the DHI-owned debian/ templates for this build.
            sed -i \
              -e "s/@PACKAGE_NAME@/amazoncorretto-17-jdk/g" \
              -e "s/@JAVA_MAJOR_VERSION@/17/g" \
              -e "s#@JAVA_DST_BASENAME@#java-17-amazon-corretto#g" \
              debian/control.in debian/changelog \
              debian/amazoncorretto.install.in \
              debian/amazoncorretto-oci-config.install.in \
              debian/amazoncorretto-fips.install.in \
              debian/amazoncorretto-fips-oci-config.install.in
            mv debian/control.in debian/control
            mv debian/amazoncorretto.install.in "debian/amazoncorretto-17-jdk.install"
            mv debian/amazoncorretto-oci-config.install.in "debian/amazoncorretto-17-jdk-oci-config.install"
            mv debian/amazoncorretto-fips.install.in "debian/amazoncorretto-17-jdk-fips.install"
            mv debian/amazoncorretto-fips-oci-config.install.in "debian/amazoncorretto-17-jdk-fips-oci-config.install"
        - name: generate oci config
          runs: |
            set -eux -o pipefail

            mkdir -p oci-config

            # Non-FIPS OCI config: consuming images inherit JAVA_HOME/JAVA_VERSION.
            cat > "oci-config/amazoncorretto-17-jdk.yaml" << EOF
            environment:
              JAVA_HOME: /usr/lib/jvm/java-17-amazon-corretto
              JAVA_VERSION: 17.0.19.10.1
            EOF

            # FIPS OCI config: enable the AmazonCorrettoCryptoProvider (ACCP) via
            # the module path + the ACCP java.security overlay shipped in the
            # -fips package under /opt/aws-lc.
            cat > "oci-config/amazoncorretto-17-jdk-fips.yaml" << EOF
            environment:
              CLASSPATH: "/opt/aws-lc/*:./*:."
              JAVA_FIPS_CLASSPATH: "/opt/aws-lc/*"
              JAVA_HOME: /usr/lib/jvm/java-17-amazon-corretto
              JAVA_TOOL_OPTIONS: "--module-path=/opt/aws-lc/*"
              JAVA_TRUSTSTORE_OPTIONS: -Djavax.net.ssl.trustStoreType=FIPS
              JAVA_VERSION: 17.0.19.10.1
              JDK_JAVA_FIPS_OPTIONS: -Djava.security.properties=/opt/aws-lc/java-fips.security
              JDK_JAVA_OPTIONS: -Djava.security.properties=/opt/aws-lc/java-fips.security
            EOF
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 17.0.19.10.1-0
        - uses: dpkg/build@v1
          environment:
            JAVA_DST_BASENAME: java-17-amazon-corretto
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/amazoncorretto-17-jdk/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/amazoncorretto/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
