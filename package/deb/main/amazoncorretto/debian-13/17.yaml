image: dhi.io/pkg-amazoncorretto
variant: runtime
tags:
  - 17.0.19.10.1-0
  - 17.0.19.10.1-0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x64" : "aarch64" }'
  BASE_VERSION: 17.0.19.10.1
  DHI_REL: "0"
  DHI_VERSION: 17.0.19.10.1-0
  FIPS_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch_64" }'
  FIPS_VERSION: 2.5.0
  JAVA_DST_BASENAME: java-17-amazon-corretto
  JAVA_JDK_DOWNLOAD: https://corretto.aws/downloads/resources/17.0.19.10.1/amazon-corretto-17.0.19.10.1-linux-${ARCH}.tar.gz
  JAVA_JDK_SIG: https://corretto.aws/downloads/resources/17.0.19.10.1/amazon-corretto-17.0.19.10.1-linux-${ARCH}.tar.gz.sig
  JAVA_MAJOR_MINOR_VERSION: "17.0"
  JAVA_MAJOR_VERSION: "17"
  JAVA_SRC_BASENAME: amazon-corretto-17.0.19.10.1-linux-${ARCH}
  JAVA_VERSION: 17.0.19
  JAVA_VERSION_SUFFIX: "10.1"
  PACKAGE_NAME: amazoncorretto-17
  VERSION: 17.0.19.10.1
contents:
  packages:
    - '!base-files'
  builds:
    - name: amazoncorretto-17-jdk
      work-dir: ${source.dir}/amazoncorretto-17-jdk
      contents:
        packages:
          - bash
          - coreutils
          - debhelper
          - dpkg-dev
          - findutils
          - gpg
          - gpg-agent
          - gzip
          - tar
        files:
          - url: https://corretto.aws/downloads/resources/17.0.19.10.1/amazon-corretto-17.0.19.10.1-linux-${ARCH}.tar.gz.sig
            path: ${source.dir}/amazoncorretto-17-jdk.tar.gz.sig
            uid: 0
            gid: 0
          - url: https://corretto.aws/downloads/resources/17.0.19.10.1/amazon-corretto-17.0.19.10.1-linux-${ARCH}.tar.gz
            path: ${source.dir}/amazoncorretto-17-jdk.tar.gz
            spdx:
              name: amazoncorretto
              version: 17.0.19.10.1
              packages:
                - name: amazoncorretto
                  purl: pkg:dhi/amazoncorretto@17.0.19.10.1
                  license: GPL-2.0-only WITH Classpath-exception-2.0
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/software/amazon/cryptools/AmazonCorrettoCryptoProvider-FIPS/2.5.0/AmazonCorrettoCryptoProvider-FIPS-2.5.0.jar
            checksum: https://repo1.maven.org/maven2/software/amazon/cryptools/AmazonCorrettoCryptoProvider-FIPS/2.5.0/AmazonCorrettoCryptoProvider-FIPS-2.5.0.jar.sha256
            path: ${source.dir}/amazoncorretto-17-jdk/fips/AmazonCorrettoCryptoProvider-FIPS-2.5.0.jar
            spdx:
              name: amazon-corretto-crypto-provider
              version: 2.5.0
              packages:
                - name: amazon-corretto-crypto-provider
                  purl: pkg:maven/software.amazon.cryptools/AmazonCorrettoCryptoProvider-FIPS@2.5.0
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/software/amazon/cryptools/AmazonCorrettoCryptoProvider-FIPS/2.5.0/AmazonCorrettoCryptoProvider-FIPS-2.5.0-linux-${FIPS_ARCH}.jar
            checksum: https://repo1.maven.org/maven2/software/amazon/cryptools/AmazonCorrettoCryptoProvider-FIPS/2.5.0/AmazonCorrettoCryptoProvider-FIPS-2.5.0-linux-${FIPS_ARCH}.jar.sha256
            path: ${source.dir}/amazoncorretto-17-jdk/fips/AmazonCorrettoCryptoProvider-FIPS-2.5.0-linux-${FIPS_ARCH}.jar
            spdx:
              name: amazon-corretto-crypto-provider
              version: 2.5.0
              packages:
                - name: amazon-corretto-crypto-provider
                  purl: pkg:maven/software.amazon.cryptools/AmazonCorrettoCryptoProvider-FIPS@2.5.0?classifier=linux-${FIPS_ARCH}
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://raw.githubusercontent.com/corretto/amazon-corretto-crypto-provider/refs/heads/main/etc/amazon-corretto-crypto-provider-jdk15.security
            path: ${source.dir}/amazoncorretto-17-jdk/fips/java-fips.security
            uid: 0
            gid: 0
      pipeline:
        - name: setup
          runs: |
            set -eux -o pipefail

            # Verify the Corretto tarball's GPG signature against the Amazon
            # Corretto release key.
            GNUPGHOME="$(mktemp -d)"
            export GNUPGHOME
            cat > corretto-gpg-key << 'EOF'
            -----BEGIN PGP PUBLIC KEY BLOCK-----
            Version: GnuPG v2.0.22 (GNU/Linux)

