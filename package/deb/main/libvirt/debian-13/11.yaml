contents:
  packages:
    - '!base-files'
  builds:
    - name: libvirt deb
      work-dir: ${source.dir}/libvirt
      contents:
        packages:
          - build-essential
          - debhelper
          - dpkg-dev
          - meson
          - augeas-tools
          - bash-completion
          - dh-apparmor
          - kmod
          - libacl1-dev
          - libapparmor-dev
          - libattr1-dev
          - libaudit-dev
          - libblkid-dev
          - libbsd-dev
          - libcap-ng-dev
          - libcurl4-gnutls-dev
          - libdevmapper-dev
          - libfuse3-dev
          - libglib2.0-dev
          - libglusterfs-dev
          - libgnutls28-dev
          - libiscsi-dev
          - libjson-c-dev
          - libnl-3-dev
          - libnl-route-3-dev
          - libnuma-dev
          - libparted-dev
          - libpcap0.8-dev
          - libpciaccess-dev
          - librados-dev
          - librbd-dev
          - libreadline-dev
          - libsanlock-dev
          - libsasl2-dev
          - libselinux1-dev
          - libssh-dev
          - libssh2-1-dev
          - libtasn1-6-dev
          - libtirpc-dev
          - libudev-dev
          - libwireshark-dev
          - libxen-dev
          - libxml2-dev
          - libxml2-utils
          - lvm2
          - multipath-tools
          - numad
          - open-iscsi
          - parted
          - po-debconf
          - util-linux
          - python3
          - python3-docutils
          - qemu-utils
          - systemtap-sdt-dev
          - xsltproc
        files:
          - url: https://deb.debian.org/debian/pool/main/libv/libvirt/libvirt_11.3.0-3+deb13u2.dsc
            checksum: sha256:b3c0d8fde8c31231215a4a523fc4119dc5c0aef135dc4b947f57918de154f036
            path: ${source.dir}/libvirt_11.3.0-3+deb13u2.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/libv/libvirt/libvirt_11.3.0.orig.tar.xz
            checksum: sha256:6bcb0c42c4580436fea262ced56f68a6afe20f7390b1bea2116718cc034a0283
            path: ${source.dir}/libvirt_11.3.0.orig.tar.xz
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/libv/libvirt/libvirt_11.3.0.orig.tar.xz.asc
            checksum: sha256:766b7fc6622bd627fee9af93a62070b33d6f5de1aec0b348583da5c45193a83f
            path: ${source.dir}/libvirt_11.3.0.orig.tar.xz.asc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/libv/libvirt/libvirt_11.3.0-3+deb13u2.debian.tar.xz
            checksum: sha256:38f9fd66c1bf1d916bcb66faf483bb7456c30a9a2ce8dcf4fc32701207462973
            path: ${source.dir}/libvirt_11.3.0-3+deb13u2.debian.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: libvirt_11.3.0-3+deb13u2.dsc
            path: libvirt
        - name: enable and package the modular virtqemud daemon (Debian ships only monolithic libvirtd)
          work-dir: ${source.dir}/libvirt
          runs: |
            set -eux -o pipefail

            sed -i 's/-Dremote_default_mode=legacy/-Dremote_default_mode=direct/' debian/rules
            echo usr/sbin/virtqemud >> debian/libvirt-daemon.install.in
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Rebuild
            version: 11.3.0-3+deb13u2+dhi1
        - uses: dpkg/build@v1
          with:
            args: -uc -us -d
        - name: assert virtqemud is packaged
          work-dir: ${source.dir}
          runs: |
            set -eux -o pipefail

            deb=$(find . -maxdepth 2 -name 'libvirt-daemon_*.deb' ! -name '*-dbgsym_*' -print -quit)
            test -n "$deb"
            dpkg-deb -c "$deb" > /tmp/libvirt-daemon-contents.txt
            grep -qE 'usr/sbin/virtqemud$' /tmp/libvirt-daemon-contents.txt
