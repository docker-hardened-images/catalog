# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-coreutils
variant: runtime
tags:
  - 9.7-3dhi0
  - 9.7-3dhi0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  DEBIAN_VERSION: 9.7-3
  DHI_REL: "0"
  DHI_VERSION: 9.7-3dhi0
  TAG_VERSION: 9.7-3dhi0
  UPSTREAM_VERSION: "9.7"
contents:
  packages:
    - '!base-files'
  builds:
    - name: coreutils deb
      work-dir: ${source.dir}/coreutils
      contents:
        packages:
          - bison
          - debhelper
          - gettext
          - gperf
          - libacl1-dev
          - libattr1-dev
          - libgmp3-dev
          - libselinux1-dev
          - libssl-dev
          - libsystemd-dev
          - texinfo
          - xz-utils
        files:
          - url: https://deb.debian.org/debian/pool/main/c/coreutils/coreutils_9.7-3.dsc
            path: ${source.dir}/coreutils_9.7-3.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/c/coreutils/coreutils_9.7.orig.tar.xz
            path: ${source.dir}/coreutils_9.7.orig.tar.xz
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/c/coreutils/coreutils_9.7.orig.tar.xz.asc
            path: ${source.dir}/coreutils_9.7.orig.tar.xz.asc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/c/coreutils/coreutils_9.7-3.debian.tar.xz
            path: ${source.dir}/coreutils_9.7-3.debian.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: coreutils_9.7-3.dsc
            path: coreutils
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Rebuild
            version: 9.7-3dhi0
        - uses: dpkg/build@v1
          environment:
            FORCE_UNSAFE_CONFIGURE: "1"
          with:
            args: -uc -us -d
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
