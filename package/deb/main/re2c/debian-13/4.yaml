  DHI_REL: "2"
  DHI_VERSION: 4.1-1+dhi2
  TAG_VERSION: 4.1-1-dhi2
  UPSTREAM_VERSION: "4.1"
contents:
  packages:
    - '!base-files'
  builds:
    - name: re2c deb
      work-dir: ${source.dir}/re2c
      contents:
        packages:
          - bison
          - build-essential
          - debhelper
          - dpkg-dev
          - jdupes
          - python3
          - python3-docutils
          - python3-pygments
          - quilt
          - util-linux
        files:
          - url: https://deb.debian.org/debian/pool/main/r/re2c/re2c_4.1-1.dsc
            checksum: sha256:5ad52d523cfa8e1faddfbd4634f85a038bf689344d0155eba88f14fb5d5aa988
            path: ${source.dir}/re2c_4.1-1.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/r/re2c/re2c_4.1.orig.tar.xz
            checksum: sha256:cd7d9bbadb3f04f20da25e20e155655de57beef48e0807266938069f0e322e8b
            path: ${source.dir}/re2c_4.1.orig.tar.xz
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/r/re2c/re2c_4.1-1.debian.tar.xz
            checksum: sha256:2fce4a5645fe9242f98cc0a644fde9f293ed817824f190fd27b6f840bbdc8069
            path: ${source.dir}/re2c_4.1-1.debian.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: re2c_4.1-1.dsc
            path: re2c
        - name: create debian patch stack directory
          runs: |
            set -eux -o pipefail

            mkdir -p debian/patches
        - uses: dpkg/patch@v1
          with:
            apply: true
            patches:
              - ${source.dir}/patch/dhi-cve-2026-2903-actions-without-rules.patch
        - uses: dpkg/bump@v1
          with:
            changelog:
              - Backport upstream fix for CVE-2026-2903
            version: 4.1-1+dhi2
        - uses: dpkg/build@v1
          with:
            args: -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: package/deb/main/re2c/patch
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
