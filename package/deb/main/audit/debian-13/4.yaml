contents:
  packages:
    - '!base-files'
  builds:
    - name: audit deb
      work-dir: ${source.dir}/audit
      contents:
        packages:
          - build-essential
          - debhelper
          - dpkg-dev
          - autoconf
          - automake
          - dh-python
          - libcap-ng-dev
          - libkrb5-dev
          - libldap-dev
          - libtool
          - python3-dev
          - swig
          - libwrap0-dev
          - linux-libc-dev
          - liburing-dev
        files:
          - url: https://deb.debian.org/debian/pool/main/a/audit/audit_4.0.2-2.dsc
            checksum: sha256:d0b9457933409cd3287bc0b8bfb10f41c08fb5b24bd5c5b8364125d5a6894974
            path: ${source.dir}/audit_4.0.2-2.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/a/audit/audit_4.0.2.orig.tar.gz
            checksum: sha256:d5d1b5d50ee4a2d0d17875bc6ae6bd6a7d5b34d9557ea847a39faec531faaa0a
            path: ${source.dir}/audit_4.0.2.orig.tar.gz
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/a/audit/audit_4.0.2-2.debian.tar.xz
            checksum: sha256:33030d53299c57cda73e9e45813b8488f9bc3ad8992aef0b740afabbf66a2ba2
            path: ${source.dir}/audit_4.0.2-2.debian.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: audit_4.0.2-2.dsc
            path: audit
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Rebuild
            version: 1:4.0.2-2+dhi0
        - name: clean up install files
          runs: |
            set -eux -o pipefail

            rm -f debian/golang-libaudit-dev.install
            rm -f debian/golang-redhat-audit-dev.install
        - name: ensure adm group exists for dh_fixperms
          runs: |
            set -eux -o pipefail

            grep -q '^adm:' /etc/group || echo 'adm:x:4:' >> /etc/group
        - uses: dpkg/build@v1
          environment:
            DEB_BUILD_PROFILES: nopython pkg.audit.nogo
          with:
            args: -uc -us -d
            options: nocheck
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
