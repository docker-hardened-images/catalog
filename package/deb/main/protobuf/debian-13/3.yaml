# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-protobuf
variant: runtime
tags:
  - 3.21.12-11dhi0
  - 3.21.12-11dhi0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  DEBIAN_VERSION: 3.21.12-11
  DHI_REL: "0"
  DHI_VERSION: 3.21.12-11dhi0
  TAG_VERSION: 3.21.12-11dhi0
  UPSTREAM_VERSION: 3.21.12
contents:
  packages:
    - '!base-files'
  builds:
    - name: protobuf deb
      work-dir: ${source.dir}/protobuf
      contents:
        packages:
          - build-essential
          - debhelper
          - dh-python
          - dpkg-dev
          - libgmock-dev
          - libgtest-dev
          - libpython3-all-dev
          - python3-all
          - python3-setuptools
          - python3-six
          - quilt
          - util-linux
          - xmlto
          - zlib1g-dev
        files:
          - url: https://deb.debian.org/debian/pool/main/p/protobuf/protobuf_3.21.12-11.dsc
            path: ${source.dir}/protobuf_3.21.12-11.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/p/protobuf/protobuf_3.21.12.orig.tar.gz
            path: ${source.dir}/protobuf_3.21.12.orig.tar.gz
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/p/protobuf/protobuf_3.21.12-11.debian.tar.xz
            path: ${source.dir}/protobuf_3.21.12-11.debian.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: protobuf_3.21.12-11.dsc
            path: protobuf
        - name: remove incomplete CVE-2024-7254 patch
          environment:
            QUILT_PATCHES: debian/patches
          runs: |
            set -eux -o pipefail

            quilt pop -a
            quilt delete CVE-2024-7254.patch
            quilt push -a
        - uses: dpkg/patch@v1
          with:
            apply: true
            patches:
              - ${source.dir}/patch/CVE-2024-7254-1.patch
              - ${source.dir}/patch/CVE-2024-7254-2.patch
              - ${source.dir}/patch/CVE-2024-7254-3.patch
              - ${source.dir}/patch/CVE-2024-7254-4.patch
              - ${source.dir}/patch/CVE-2024-7254-5.patch
              - ${source.dir}/patch/CVE-2025-4565-1.patch
              - ${source.dir}/patch/CVE-2025-4565-2.patch
              - ${source.dir}/patch/CVE-2025-4565-3.patch
        - name: skip xmlto manpage generation
          runs: |
            set -eux -o pipefail

            sed -i 's/xmlto man debian\/protoc.xml/touch protoc.1/' debian/rules
        - uses: dpkg/bump@v1
          with:
            changelog:
              - Replace incomplete CVE-2024-7254 patch with complete fix from Debian sid (3.21.12-15)
              - Apply Debian sid patches to fix CVE-2025-4565
            version: 3.21.12-11dhi0
        - uses: dpkg/build@v1
          environment:
            DEB_BUILD_PROFILES: noruby
          with:
            args: --build=source,any -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: package/deb/main/protobuf/patch
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
