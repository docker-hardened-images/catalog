# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-bun
variant: runtime
tags:
  - 1.3.14-0
  - 1.3.14-0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x64-baseline" : "aarch64" }'
  DHI_REL: "0"
  DHI_VERSION: 1.3.14-0
  VERSION: 1.3.14
contents:
  packages:
    - '!base-files'
  builds:
    - name: bun deb
      work-dir: ${source.dir}/bun
      contents:
        packages:
          - debhelper
          - dpkg-dev
          - gnupg
          - unzip
        files:
          - url: https://keys.openpgp.org/vks/v1/by-fingerprint/F3DCC08A8572C0749B3E18888EAB4D40A7B22B59
            path: ${source.dir}/keys/bun-key.asc
            uid: 0
            gid: 0
          - url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.14/SHASUMS256.txt.asc
            path: ${source.dir}/SHASUMS256.txt.asc
            uid: 0
            gid: 0
          - url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.14/bun-linux-${ARCH}.zip
            path: ${source.dir}/bun-linux-${ARCH}.zip
            uid: 0
            gid: 0
      pipeline:
        - name: install
          work-dir: ${source.dir}
          runs: |
            set -eux -o pipefail

            GNUPGHOME="$(mktemp -d)"
            export GNUPGHOME

            gpg --batch --import keys/bun-key.asc
            gpg --batch --decrypt --output SHASUMS256.txt SHASUMS256.txt.asc

            grep " bun-linux-${ARCH}.zip\$" SHASUMS256.txt | sha256sum -c -
            unzip "bun-linux-${ARCH}.zip" -d bun-extract

            mkdir -p bun-staging
            mv "bun-extract/bun-linux-${ARCH}/bun" bun-staging/bun
            chmod +x bun-staging/bun
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 1.3.14-0
        - uses: dpkg/build@v1
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/bun/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/bun/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
