            version: 8.14.1-2+deb13u2dhi2
        - uses: dpkg/build@v1
          environment:
            DEB_BUILD_OPTIONS: nocheck
          with:
            args: -d -uc -us
        - name: stage deb packages
          work-dir: ${source.dir}
          runs: |
            set -eux -o pipefail

            mkdir -p /debian/deb
            cp -Rf *.deb *.dsc *.tar.* *.changes *.buildinfo /debian/deb/
      outputs:
        - source: /debian/deb/
          target: /debian/deb/
          uid: 0
          gid: 0
