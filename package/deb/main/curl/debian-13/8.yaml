  UPSTREAM_VERSION: 8.14.1
  VERSION: 8.14.1-2+deb13u2
  VERSION_TAG: 8.14.1-2-deb13u2dhi2
contents:
  packages:
    - base-files
  builds:
    - name: curl deb
      work-dir: ${source.dir}/curl
      contents:
        repositories:
