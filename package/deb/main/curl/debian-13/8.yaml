          - dpkg-dev
          - autoconf
          - automake
          - ca-certificates
          - gnutls-bin
          - groff-base
          - libbrotli-dev
          - libgnutls28-dev
          - libidn2-dev
          - libkrb5-dev
          - libldap2-dev
          - libnghttp2-dev
          - libnghttp3-dev
          - libngtcp2-crypto-gnutls-dev
          - libngtcp2-crypto-ossl-dev
          - libngtcp2-dev
          - libpsl-dev
          - librtmp-dev
          - libssh2-1-dev
          - libssl-dev
          - libtool
          - libzstd-dev
          - locales-all
          - openssh-server
          - python3-impacket
          - python3
          - quilt
          - stunnel4
          - zlib1g-dev
        files:
          - url: https://deb.debian.org/debian/pool/main/c/curl/curl_8.14.1-2+deb13u2.dsc
            path: ${source.dir}/curl_8.14.1-2+deb13u2.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/c/curl/curl_8.14.1.orig.tar.gz
            path: ${source.dir}/curl_8.14.1.orig.tar.gz
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/c/curl/curl_8.14.1.orig.tar.gz.asc
            path: ${source.dir}/curl_8.14.1.orig.tar.gz.asc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/c/curl/curl_8.14.1-2+deb13u2.debian.tar.xz
            path: ${source.dir}/curl_8.14.1-2+deb13u2.debian.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: curl_8.14.1-2+deb13u2.dsc
            path: curl
        - uses: dpkg/bump@v1
