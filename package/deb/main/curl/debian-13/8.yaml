# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-curl
variant: runtime
tags:
  - 8.19.0dhi1
  - 8.19.0dhi1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 07f1ba3356a56ee28dc553648c310ef1409bcab4
  DHI_REL: "1"
  DHI_VERSION: 8.19.0dhi1
  TAG: debian/8.19.0-3
  VERSION: 8.19.0
  VERSION_TAG: 8.19.0dhi1
contents:
  packages:
    - base-files
  builds:
    - name: curl deb
      work-dir: ${source.dir}/curl
      contents:
        repositories:
          - deb [signed-by=/usr/share/keyrings/archive-key-13.asc] http://deb.debian.org/debian trixie-backports main
        keyring:
          - https://ftp-master.debian.org/keys/archive-key-13.asc
        packages:
          - debhelper
          - dpkg-dev
          - autoconf
          - automake
          - ca-certificates
          - gnutls-bin
          - groff-base
          - libbrotli-dev
          - libgnutls28-dev
          - libidn2-dev
          - libkrb5-dev
          - libldap2-dev
          - libnghttp2-dev
          - libnghttp3-dev
          - libngtcp2-crypto-gnutls-dev
          - libngtcp2-crypto-ossl-dev
          - libngtcp2-dev
          - libpsl-dev
          - librtmp-dev
          - libssh2-1-dev
          - libssl-dev
          - libtool
          - libzstd-dev
          - locales-all
          - openssh-server
          - python3-impacket
          - python3
          - stunnel4
          - zlib1g-dev
        files:
          - url: git+https://salsa.debian.org/debian/curl.git#debian/8.19.0-3
            checksum: 07f1ba3356a56ee28dc553648c310ef1409bcab4
            path: ${source.dir}/curl
            uid: 0
            gid: 0
          - url: https://curl.se/download/curl-8.19.0.tar.xz
            path: ${source.dir}/curl_8.19.0.orig.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/extract@v1
          with:
            file: ${source.dir}/curl_8.19.0.orig.tar.xz
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Rebuild
            version: 8.19.0-dhi1
        - uses: dpkg/build@v1
          environment:
            DEB_BUILD_OPTIONS: nocheck
          with:
            args: -d -uc -us
        - name: stage deb packages
          work-dir: ${source.dir}
          runs: |
            set -eux -o pipefail

            mkdir -p /debian/deb
            cp -Rf *.deb *.dsc *.tar.* *.changes *.buildinfo /debian/deb/
      outputs:
        - source: /debian/deb/
          target: /debian/deb/
          uid: 0
          gid: 0
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
