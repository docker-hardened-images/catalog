# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-php
variant: runtime
tags:
  - 8.2.32-0
  - 8.2.32-0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  CHECKSUM: e02aa173c236c12791696254d607da680e6d5516f8f5c2339642de7c4f944bd2
  DHI_REL: "0"
  DHI_VERSION: 8.2.32-0
  OPCACHE_BUILTIN: "false"
  PACKAGE_NAME: php-8.2
  PACKAGE_WORK_DIR: php-8.2
  PHP_MAJOR_MINOR: "8.2"
  PHP_SYSCONFDIR: /etc/php-8.2
  VERSION: 8.2.32
contents:
  packages:
    - '!base-files'
  builds:
    - name: php-8.2 deb
      work-dir: ${source.dir}/php-8.2
      shell: bash
      environment:
        CFLAGS: -fstack-protector-strong -fpic -fpie -O2 -D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64
        CPPFLAGS: -fstack-protector-strong -fpic -fpie -O2 -D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64
        LDFLAGS: -Wl,-O1 -pie
        PHP_BUILD_PROVIDER: https://github.com/docker-hardened-images/definitions
        PHP_UNAME: Linux - Docker Hardened Images
      contents:
        packages:
          - bash
          - bison
          - build-essential
          - coreutils
          - debhelper
          - dpkg-dev
          - findutils
          - gawk
          - grep
          - libargon2-dev
          - libcurl4-openssl-dev
          - libicu-dev
          - libonig-dev
          - libpcre2-dev
          - libreadline-dev
          - libsodium-dev
          - libsqlite3-dev
          - libssl-dev
          - libxml2-dev
          - make
          - pkg-config
          - re2c
          - sed
          - xz-utils
          - zlib1g-dev
        files:
          - url: https://www.php.net/distributions/php-8.2.32.tar.xz.asc
            path: ${source.dir}/php-8.2.32.tar.xz.asc
            uid: 0
            gid: 0
          - url: https://www.php.net/distributions/php-8.2.32.tar.xz
            checksum: sha256:e02aa173c236c12791696254d607da680e6d5516f8f5c2339642de7c4f944bd2
            path: ${source.dir}/php-8.2.32.tar.xz
            spdx:
              name: php
              version: 8.2.32
              packages:
                - name: php
                  purl: pkg:dhi/php@8.2.32
                  license: PHP-3.01
            uid: 0
            gid: 0
      pipeline:
        - name: verify php-8.2.32.tar.xz
          uses: gpg/verify@v1
          work-dir: ${source.dir}
          with:
            file: ${source.dir}/php-8.2.32.tar.xz
            keys: ${source.dir}/keyring.asc
            signature: ${source.dir}/php-8.2.32.tar.xz.asc
        - name: extract source
          runs: |
            set -eux -o pipefail

            tar -xaf "${source.dir}/php-8.2.32.tar.xz" --strip-components=1
        - name: prepare debian metadata
          runs: |
            set -eux -o pipefail

            for f in debian/control.in debian/changelog \
              debian/php.install.in debian/php-fpm.install.in \
              debian/php-phpdbg.install.in debian/php-dev.install.in \
              debian/php-doc.install.in debian/php-oci-config.install.in \
              debian/not-installed.in; do
              sed -i \
                -e "s/@PHP_MAJOR_MINOR@/8.2/g" \
                -e "s/@VERSION@/8.2.32/g" \
                -e "s/@PACKAGE_NAME@/php-8.2/g" \
                -e "s/@OPCACHE_BUILTIN@/false/g" \
                "${f}"
            done

            mv debian/control.in debian/control
            mv debian/php.install.in "debian/php-8.2.install"
            mv debian/php-fpm.install.in "debian/php-8.2-fpm.install"
            mv debian/php-phpdbg.install.in "debian/php-8.2-phpdbg.install"
            mv debian/php-dev.install.in "debian/php-8.2-dev.install"
            mv debian/php-doc.install.in "debian/php-8.2-doc.install"
            mv debian/php-oci-config.install.in "debian/php-8.2-oci-config.install"
            mv debian/not-installed.in debian/not-installed
        - name: build and install
          runs: |
            set -eux -o pipefail

            PHP_SYSCONFDIR="etc/php-8.2"
            install_root="${PWD}/install-root"

            ./configure \
              --enable-option-checking=fatal \
              --prefix=/usr \
              --sysconfdir="//etc/php-8.2" \
              --datadir="/usr/share/php-8.2" \
              --localstatedir=/var \
              --mandir=/usr/share/man \
              --with-config-file-path="//etc/php-8.2" \
              --with-config-file-scan-dir="//etc/php-8.2/conf.d" \
              --program-suffix="-8.2" \
              --disable-static \
              --disable-cgi \
              --enable-filter \
              --enable-tokenizer \
              --enable-ctype \
              --enable-fileinfo \
              --enable-mbstring --enable-mbregex \
              --enable-intl \
              --enable-mysqlnd \
              --enable-session \
              --enable-xml --enable-simplexml --enable-dom \
              --enable-pdo \
              --with-sqlite3 \
              --with-pdo-sqlite \
              --with-password-argon2 \
              --with-sodium \
              --with-openssl \
              --with-external-pcre=/usr --with-pcre-jit \
              --with-iconv \
              --with-libxml \
              --with-curl \
              --with-readline \
              --with-zlib \
              --with-pear \
              --enable-fpm --with-fpm-user=nonroot --with-fpm-group=nonroot \
              --enable-phpdbg --enable-phpdbg-readline

            make -j"$(nproc)"
            make install INSTALL_ROOT="${install_root}"

            if [ -f "${install_root}/usr/sbin/php-fpm" ]; then
              mv "${install_root}/usr/sbin/php-fpm" \
                "${install_root}/usr/sbin/php-fpm-8.2"
            fi

            # Man pages are not shipped; drop them so dh_missing stays clean.
            rm -rf "${install_root}/usr/share/man"
        - name: install php.ini
          runs: |
            set -eux -o pipefail

            PHP_SYSCONFDIR="etc/php-8.2"
            install_root="${PWD}/install-root"

            install -d "${install_root}//etc/php-8.2/conf.d"
            # Runtime default is production; example inis ship with -dev.
            install -m644 php.ini-production \
              "${install_root}//etc/php-8.2/php.ini"
            install -m644 -t "${install_root}//etc/php-8.2" \
              php.ini-development php.ini-production

            if [ "false" != "true" ]; then
              {
                echo '; https://wiki.php.net/rfc/make_opcache_required'
                echo 'zend_extension=opcache'
              } > "${install_root}//etc/php-8.2/conf.d/opcache.ini"
            fi
        - name: activate php-fpm config
          runs: |
            set -eux -o pipefail

            PHP_SYSCONFDIR="etc/php-8.2"
            install_root="${PWD}/install-root"

            # Activate container-native php-fpm configuration so that
            # `php-fpm` runs out of the box, foreground, listening on all
            # interfaces and logging to the container's stderr.
            install -m644 "${install_root}//etc/php-8.2/php-fpm.conf.default" \
              "${install_root}//etc/php-8.2/php-fpm.conf"
            sed -ri \
              -e 's|^;?\s*daemonize\s*=.*|daemonize = no|' \
              -e 's|^;?\s*error_log\s*=.*|error_log = /proc/self/fd/2|' \
              "${install_root}//etc/php-8.2/php-fpm.conf"

            install -m644 "${install_root}//etc/php-8.2/php-fpm.d/www.conf.default" \
              "${install_root}//etc/php-8.2/php-fpm.d/www.conf"
            sed -ri \
              -e 's|^;?\s*listen\s*=.*|listen = 9000|' \
              -e 's|^;?\s*access\.log\s*=.*|access.log = /proc/self/fd/2|' \
              -e 's|^;?\s*catch_workers_output\s*=.*|catch_workers_output = yes|' \
              -e 's|^;?\s*decorate_workers_output\s*=.*|decorate_workers_output = no|' \
              -e 's|^;?\s*clear_env\s*=.*|clear_env = no|' \
              "${install_root}//etc/php-8.2/php-fpm.d/www.conf"
        - name: stage compatibility symlinks and license
          runs: |
            set -eux -o pipefail

            install_root="${PWD}/install-root"

            install -d "${install_root}/usr/share/licenses/php-8.2"
            install -m644 LICENSE \
              "${install_root}/usr/share/licenses/php-8.2/LICENSE"

            install -d "${install_root}/usr/bin" "${install_root}/usr/sbin"
            ln -sf "phar-8.2" "${install_root}/usr/bin/phar"
            ln -sf "php-8.2" "${install_root}/usr/bin/php"
            ln -sf "phpize-8.2" "${install_root}/usr/bin/phpize"
            ln -sf "php-config-8.2" "${install_root}/usr/bin/php-config"
            ln -sf "phpdbg-8.2" "${install_root}/usr/bin/phpdbg"
            ln -sf "php-fpm-8.2" "${install_root}/usr/sbin/php-fpm"

            # A shared extensions directory only exists when at least one
            # extension is built as a shared module (e.g. OPcache). When OPcache
            # is compiled into the binary (PHP 8.5+), no shared extensions are
            # produced and the directory is absent.
            if [ -d "${install_root}/usr/lib/php/extensions" ]; then
              PHP_EXT_DIR="$(basename "$(find "${install_root}/usr/lib/php/extensions" -mindepth 1 -maxdepth 1 -type d | head -1)")"
              test -n "${PHP_EXT_DIR}"
              echo "usr/lib/php/extensions/${PHP_EXT_DIR}" >> "debian/php-8.2.install"
            fi
        - name: generate oci config
          runs: |
            set -eux -o pipefail

            install_root="${PWD}/install-root"
            install -d "${install_root}/opt/docker/config"

            # Consumed by the dhi/build frontend: environment + paths declared
            # here are merged into any image that installs this package. Only
            # environment and paths belong here; entrypoint/ports/etc. are the
            # consuming image's responsibility.
            cat > "${install_root}/opt/docker/config/php-8.2.yaml" << 'EOF'
            environment:
              PHP_INI_DIR: /etc/php-8.2
              PHP_VERSION: 8.2.32
            paths:
              - type: directory
                path: /var/www/html
                uid: 65532
                gid: 65532
                mode: "0755"
            EOF
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 8.2.32-0
        - uses: dpkg/build@v1
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/php-8.2/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/php/debian-13/debian
        - type: file
          path: ${source.dir}/keyring.asc
          uid: 0
          gid: 0
          source: package/deb/main/php/debian-13/key/php8.2.keyring.asc
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
