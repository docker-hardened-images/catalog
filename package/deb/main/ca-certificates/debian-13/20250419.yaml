# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-ca-certificates
variant: runtime
tags:
  - 20250419-dhi2
  - 20250419-dhi2-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  DEBIAN_DEBIAN_FILENAME: ${DEBIAN_DEBIAN_URL:^.+/(.+)$}
  DEBIAN_DSC_CHECKSUM: sha256:3fc919369a3b84e34a959faa8bdffb9bd2c5a7d4a948a4b07a09a5d43e257030
  DEBIAN_DSC_FILENAME: ca-certificates_20250419.dsc
  DEBIAN_DSC_URL: https://deb.debian.org/debian/pool/main/c/ca-certificates/ca-certificates_20250419.dsc
  DEBIAN_FILENAME_VERSION: "20250419"
  DEBIAN_ORIG_CHECKSUM: sha256:33b44ef78653ecd3f0f2f13e5bba6be466be2e7da72182f737912b81798ba5d2
  DEBIAN_ORIG_FILENAME: ca-certificates_20250419.tar.xz
  DEBIAN_ORIG_URL: https://deb.debian.org/debian/pool/main/c/ca-certificates/ca-certificates_20250419.tar.xz
  DEBIAN_VERSION: "20250419"
  DHI_REL: "2"
  DHI_VERSION: 20250419+dhi2
  TAG_VERSION: 20250419-dhi2
  UPSTREAM_VERSION: "20250419"
contents:
  packages:
    - '!base-files'
  builds:
    - name: ca-certificates deb
      work-dir: ${source.dir}/ca-certificates
      contents:
        packages:
          - debhelper
          - dpkg-dev
          - openssl
          - po-debconf
          - python3
          - python3-cryptography
        files:
          - url: https://deb.debian.org/debian/pool/main/c/ca-certificates/ca-certificates_20250419.dsc
            checksum: sha256:3fc919369a3b84e34a959faa8bdffb9bd2c5a7d4a948a4b07a09a5d43e257030
            path: ${source.dir}/ca-certificates_20250419.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/c/ca-certificates/ca-certificates_20250419.tar.xz
            checksum: sha256:33b44ef78653ecd3f0f2f13e5bba6be466be2e7da72182f737912b81798ba5d2
            path: ${source.dir}/ca-certificates_20250419.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: ca-certificates_20250419.dsc
            path: ca-certificates
            remove-original: false
        - name: remove upstream source artifacts
          work-dir: ${source.dir}
          runs: |
            set -eux -o pipefail

            rm ca-certificates_20250419.dsc ca-certificates_20250419.tar.xz
        - name: add ca-certificates-bundle binary package
          uses: patch@v1
          with:
            options: -p1
            patches:
              - ${source.dir}/patch/dhi-ca-certificates-bundle.patch
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Rebuild
            version: 20250419+dhi2
        - uses: dpkg/build@v1
          with:
            args: -uc -us -d
      paths:
        - type: file
          path: ${source.dir}/patch/dhi-ca-certificates-bundle.patch
          uid: 0
          gid: 0
          source: package/deb/main/ca-certificates/patch/dhi-ca-certificates-bundle.patch
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
