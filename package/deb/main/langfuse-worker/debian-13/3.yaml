# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-langfuse-worker
variant: runtime
tags:
  - 3.219.0-0
  - 3.219.0-0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2024-12-09"
vars:
  COMMIT_SHA: 81b6a180ed1f6f4c945094a18a3b5b37147ef122
  DHI_REL: "0"
  DHI_VERSION: 3.219.0-0
  NODEJS_MAJOR: "24"
  NODEJS_VERSION: 24.18.0-0
  PNPM_VERSION: 11.4.0
  SEMVER_MAJOR_MINOR_VERSION: "3.219"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.219.0
  TURBO_VERSION: 2.9.14
  VERSION: 3.219.0
contents:
  packages:
    - '!base-files'
  builds:
    - name: langfuse-worker deb
      work-dir: ${source.dir}/langfuse-worker
      environment:
        CI: "true"
        DOCKER_BUILD: "1"
        PNPM_HOME: /pnpm
        PNPM_VERSION: 11.4.0
        SEMVER_MAJOR_VERSION: "3"
      caches:
        - path: /pnpm/store
        - path: /root/.cache
      contents:
        repositories:
          - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
        keyring:
          - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
        packages:
          - bash
          - ca-certificates
          - coreutils
          - debhelper
          - dpkg-dev
          - findutils
          - git
          - nodejs-24=24.18.0-0
          - npm
          - node-corepack
          - yq-go
        files:
          - url: git+https://github.com/langfuse/langfuse.git#v3.219.0
            checksum: 81b6a180ed1f6f4c945094a18a3b5b37147ef122
            path: ${source.dir}/src
            spdx:
              name: langfuse-worker
              version: 3.219.0
              packages:
                - name: langfuse-worker
                  purl: pkg:github/langfuse/langfuse@3.219.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: prune and patch worker source
          privileged: true
          runs: |
            set -eux -o pipefail

            cd "${source.dir}/src"

            corepack enable
            corepack prepare pnpm@11.4.0 --activate
            npm install -g --no-package-lock --no-save turbo@2.9.14
            export PATH="$(npm config get prefix)/bin:${PATH}"

            turbo prune --scope=worker --docker

            cd ./out
            cp -a json/. .
            # overlay full source before patching package.json, else it clobbers the override
            cp -a full/. .

            # CVE remediation via pnpm overrides; build installs non-frozen
            node -e '
              const fs = require("fs");
              const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
              p.pnpm = p.pnpm || {};
              Object.assign(p.pnpm.overrides = p.pnpm.overrides || {}, {
                "axios": "1.16.0", // CVE-2026-44486,44487,44488,44492,44494,44496 (HIGH)
                // range selector: bare @0.1 missed the express-nested 0.1.10 on pnpm 9
                "path-to-regexp@<0.1.13": "0.1.13", // CVE-2024-52798, CVE-2026-4867 (HIGH, ReDoS)
                "handlebars": "4.7.9", // CVE-2026-33937 (CRIT),33938,33939,33940,33941 (HIGH)
                "kysely": "0.28.17", // CVE-2026-32763,33468,44635 (HIGH, SQLi)
                "nodemailer": "7.0.11", // CVE-2025-14874 (HIGH)
                "path-to-regexp@8": "8.4.0", // CVE-2026-4926 (HIGH, ReDoS), CVE-2026-4923
                "js-yaml@4": "4.2.0", // CVE-2026-53550 (ReDoS)
                "uuid@>=13.0.0 <13.0.1": "13.0.1", // CVE-2026-41907
                "@opentelemetry/core@2": "2.8.0", // CVE-2026-54285 (DoS)
                "protobufjs@7": "7.6.3", // CVE-2026-54269 (uncontrolled recursion)
                "lodash": "4.18.1", // CVE-2025-13465, CVE-2026-2950 (MEDIUM, prototype pollution)
                "postcss@8": "8.5.10", // CVE-2026-41305 (MEDIUM, XSS)
                "@babel/runtime@7": "7.26.10", // CVE-2025-27789 (MEDIUM, ReDoS)
                "cookie@<0.7.0": "0.7.0", // CVE-2024-47764 (LOW, CRLF injection)
                "qs@<6.15.2": "6.15.2", // CVE-2025-15284, CVE-2026-2391, CVE-2026-8723 (MEDIUM, DoS)
                "fast-xml-parser@>=4.0.0 <4.5.5": "4.5.5", // CVE-2026-27942, CVE-2026-33349
                "fast-xml-parser@>=5.0.0 <5.7.0": "5.7.0", // CVE-2026-27942, CVE-2026-33349, CVE-2026-41650
                "yaml@>=1.0.0 <1.10.3": "1.10.3", // CVE-2026-33532 (MEDIUM, stack overflow)
                "yaml@>=2.0.0 <2.8.3": "2.8.3", // CVE-2026-33532 (MEDIUM, stack overflow)
                "dd-trace@>=5.0.0 <=5.100.0": "5.101.0", // CVE-2026-50272 (HIGH, DoS)
                "@smithy/config-resolver@>=4.0.0 <4.4.0": "4.4.0", // GHSA-6475-r3vj-m8vf (LOW)
              });
              fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
            '

            # pnpm 10+ (v3 builds with pnpm 11) no longer reads "pnpm.overrides" from
            # package.json -- it reads overrides from pnpm-workspace.yaml. Mirror the
            # same map into the workspace file so the CVE pins apply on the v3 line too;
            # the v2 line (pnpm 9) keeps reading them from package.json above.
            PNPM_OVERRIDES="$(
              node -e '
                const fs = require("fs");
                const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
                process.stdout.write(JSON.stringify((p.pnpm || {}).overrides || {}));
              '
            )"
            export PNPM_OVERRIDES
            yq -i \
              '.overrides = ((.overrides // {}) * (strenv(PNPM_OVERRIDES) | from_json)) | .overrides style=""' \
              pnpm-workspace.yaml

            # stage pruned workspace as the deb source tree
            rm -rf "${source.dir}/langfuse-worker/worker-src"
            mkdir -p "${source.dir}/langfuse-worker/worker-src"
            cp -a . "${source.dir}/langfuse-worker/worker-src/"
        - name: prepare debian metadata
          runs: |
            set -eux -o pipefail

            cd "${source.dir}/langfuse-worker"
            # per-major name: substitute in control + changelog (dpkg reads the
            # source name from changelog), then rename the matching .install
            sed -i "s/@MAJOR@/3/g" debian/control.in debian/changelog
            mv debian/control.in debian/control
            mv debian/langfuse-worker.install "debian/langfuse-worker-3.install"
        - uses: dpkg/bump@v1
          with:
            version: 3.219.0-0
        - uses: dpkg/build@v1
          privileged: true
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/langfuse-worker/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/langfuse-worker/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
