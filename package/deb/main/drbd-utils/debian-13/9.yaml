# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-drbd-utils
variant: runtime
tags:
  - 9.34.0-1
  - 9.34.0-1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 7fe34d56a7264cfc92fc5270471827bb3f7773e6
  DHI_REL: "1"
  DHI_VERSION: 9.34.0-1
  VERSION: 9.34.0
contents:
  packages:
    - '!base-files'
  builds:
    - name: drbd-utils deb
      work-dir: ${source.dir}/drbd-utils
      contents:
        packages:
          - autoconf
          - automake
          - autotools-dev
          - bash
          - build-essential
          - debhelper
          - dpkg-dev
          - flex
          - gawk
          - git
          - libkeyutils-dev
          - libtool
          - m4
          - pkg-config
        files:
          - url: git+https://github.com/LINBIT/drbd-utils.git#v9.34.0
            checksum: 7fe34d56a7264cfc92fc5270471827bb3f7773e6
            path: ${source.dir}/drbd-utils
            spdx:
              name: drbd-utils
              version: 9.34.0
              packages:
                - name: drbd-utils
                  purl: pkg:dhi/drbd-utils@9.34.0
                  license: GPL-2.0-or-later
            uid: 0
            gid: 0
      pipeline:
        - name: remove upstream debian metadata
          runs: |
            set -eux -o pipefail

            rm -f debian/compat
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 9.34.0-1
        - uses: dpkg/build@v1
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/drbd-utils/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/drbd-utils/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
