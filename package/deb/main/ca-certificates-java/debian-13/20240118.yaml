image: dhi.io/pkg-ca-certificates-java
variant: runtime
tags:
  - 20240118dhi0
  - 20240118dhi0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  DEBIAN_DEBIAN_FILENAME: ${DEBIAN_DEBIAN_URL:^.+/(.+)$}
  DEBIAN_DSC_CHECKSUM: sha256:1b69c89b50f705bbe70ea19add2937c331dc02539f0630a87a4db86e734368b9
  DEBIAN_DSC_FILENAME: ca-certificates-java_20240118.dsc
  DEBIAN_DSC_URL: https://deb.debian.org/debian/pool/main/c/ca-certificates-java/ca-certificates-java_20240118.dsc
  DEBIAN_FILENAME_VERSION: "20240118"
  DEBIAN_ORIG_CHECKSUM: sha256:41eed3fec4fac8d32b20d744059151749ed4077f55644623fdd2d15bc51d8e57
  DEBIAN_ORIG_FILENAME: ca-certificates-java_20240118.tar.xz
  DEBIAN_ORIG_URL: https://deb.debian.org/debian/pool/main/c/ca-certificates-java/ca-certificates-java_20240118.tar.xz
  DEBIAN_VERSION: "20240118"
  DHI_REL: "0"
  DHI_VERSION: 20240118dhi0
  TAG_VERSION: 20240118dhi0
  UPSTREAM_VERSION: "20240118"
contents:
  packages:
    - '!base-files'
  builds:
    - name: ca-certificates-java deb
      work-dir: ${source.dir}/ca-certificates-java
      contents:
        packages:
          - debhelper
          - default-jdk-headless
          - dpkg-dev
          - javahelper
          - java-common
          - junit4
        files:
          - url: https://deb.debian.org/debian/pool/main/c/ca-certificates-java/ca-certificates-java_20240118.dsc
            checksum: sha256:1b69c89b50f705bbe70ea19add2937c331dc02539f0630a87a4db86e734368b9
            path: ${source.dir}/ca-certificates-java_20240118.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/c/ca-certificates-java/ca-certificates-java_20240118.tar.xz
            checksum: sha256:41eed3fec4fac8d32b20d744059151749ed4077f55644623fdd2d15bc51d8e57
            path: ${source.dir}/ca-certificates-java_20240118.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: ca-certificates-java_20240118.dsc
            path: ca-certificates-java
            remove-original: false
        - name: remove upstream source artifacts
          work-dir: ${source.dir}
          runs: |
            set -eux -o pipefail

            rm ca-certificates-java_20240118.dsc ca-certificates-java_20240118.tar.xz
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Rebuild
            version: 20240118dhi0
        - name: wire openjdk tools on PATH
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            jbindir=""
            for d in /usr/lib/jvm/java-*/bin; do
              if [ -x "${d}/jar" ] && [ -x "${d}/java" ]; then
                jbindir="${d}"
                break
              fi
            done
            test -n "${jbindir}"
            ln -sf "${jbindir}/java" /usr/local/bin/java
            ln -sf "${jbindir}/jar" /usr/local/bin/jar
        - uses: dpkg/build@v1
          with:
            args: -uc -us -d
