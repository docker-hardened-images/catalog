# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-dotnet-sdk
variant: runtime
tags:
  - 9.0.316-0
  - 9.0.316-0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x64" : "arm64" }'
  CHECKSUM: '#{ target.arch == "arm64" ? "98d8195bb0a072ba1d3d26126f6c9788a4381a529ba85dccdf4079a7961b68c9" : "f3df20e692b4c9cf25b3a6a6f213e3c79c95d46e4fbc6ab53f772fbc9164a4d1" }'
  CHECKSUM_AMD64: f3df20e692b4c9cf25b3a6a6f213e3c79c95d46e4fbc6ab53f772fbc9164a4d1
  CHECKSUM_ARM64: 98d8195bb0a072ba1d3d26126f6c9788a4381a529ba85dccdf4079a7961b68c9
  DHI_REL: "0"
  DHI_VERSION: 9.0.316-0
  PACKAGE_NAME: dotnet-sdk-9
  SEMVER_MAJOR_VERSION: "9"
  VERSION: 9.0.316
contents:
  packages:
    - '!base-files'
  builds:
    - name: dotnet-sdk-9
      work-dir: ${source.dir}/dotnet-sdk-9
      contents:
        packages:
          - bash
          - coreutils
          - debhelper
          - dpkg-dev
          - findutils
          - tar
        files:
          - url: https://builds.dotnet.microsoft.com/dotnet/Sdk/9.0.316/dotnet-sdk-9.0.316-linux-${ARCH}.tar.gz
            checksum: sha256:${CHECKSUM}
            path: ${source.dir}/dotnet-sdk-9.tar.gz
            spdx:
              name: dotnet-sdk
              version: 9.0.316
              packages:
                - name: dotnet-sdk
                  purl: pkg:dhi/microsoft/dotnet-sdk@9.0.316
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: setup
          runs: |
            set -eux -o pipefail

            tar -xzf "${source.dir}/dotnet-sdk-9.tar.gz" --strip-components=1

            sed -i -e "s/@PACKAGE_NAME@/dotnet-sdk-9/g" \
              -e "s/@MAJOR_VERSION@/9/g" \
              debian/control.in debian/changelog \
              debian/dotnet-sdk.install.in \
              debian/dotnet-sdk-oci-config.install.in
            mv debian/control.in debian/control
            mv debian/dotnet-sdk.install.in "debian/dotnet-sdk-9.install"
            mv debian/dotnet-sdk-oci-config.install.in "debian/dotnet-sdk-9-oci-config.install"
        - name: generate oci config
          runs: |
            set -eux -o pipefail

            mkdir -p oci-config
            cat > "oci-config/dotnet-sdk-9.yaml" << EOF
            environment:
              DOTNET_CLI_TELEMETRY_OPTOUT: "true"
              DOTNET_GENERATE_ASPNET_CERTIFICATE: "false"
              DOTNET_ROOT: /usr/lib/dotnet
              DOTNET_VERSION: 9.0.316
              PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            EOF
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 9.0.316-0
        - uses: dpkg/build@v1
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/dotnet-sdk-9/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/dotnet-sdk/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
