# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-dotnet-sdk
variant: runtime
tags:
  - 10.0.302-0
  - 10.0.302-0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x64" : "arm64" }'
  CHECKSUM: '#{ target.arch == "arm64" ? "1c56318e4099990719f6369184e08bbad0248c09c5ad7532d2516e3cdfc3ab6d" : "264a838d6f5d1a252489c7bb2e2946a579d6a881391d50ffd175a01e4d948c1c" }'
  CHECKSUM_AMD64: 264a838d6f5d1a252489c7bb2e2946a579d6a881391d50ffd175a01e4d948c1c
  CHECKSUM_ARM64: 1c56318e4099990719f6369184e08bbad0248c09c5ad7532d2516e3cdfc3ab6d
  DHI_REL: "0"
  DHI_VERSION: 10.0.302-0
  PACKAGE_NAME: dotnet-sdk-10
  SEMVER_MAJOR_VERSION: "10"
  VERSION: 10.0.302
contents:
  packages:
    - '!base-files'
  builds:
    - name: dotnet-sdk-10
      work-dir: ${source.dir}/dotnet-sdk-10
      contents:
        packages:
          - bash
          - coreutils
          - debhelper
          - dpkg-dev
          - findutils
          - tar
        files:
          - url: https://builds.dotnet.microsoft.com/dotnet/Sdk/10.0.302/dotnet-sdk-10.0.302-linux-${ARCH}.tar.gz
            checksum: sha256:${CHECKSUM}
            path: ${source.dir}/dotnet-sdk-10.tar.gz
            spdx:
              name: dotnet-sdk
              version: 10.0.302
              packages:
                - name: dotnet-sdk
                  purl: pkg:dhi/microsoft/dotnet-sdk@10.0.302
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: setup
          runs: |
            set -eux -o pipefail

            tar -xzf "${source.dir}/dotnet-sdk-10.tar.gz" --strip-components=1

            sed -i -e "s/@PACKAGE_NAME@/dotnet-sdk-10/g" \
              -e "s/@MAJOR_VERSION@/10/g" \
              debian/control.in debian/changelog \
              debian/dotnet-sdk.install.in \
              debian/dotnet-sdk-oci-config.install.in
            mv debian/control.in debian/control
            mv debian/dotnet-sdk.install.in "debian/dotnet-sdk-10.install"
            mv debian/dotnet-sdk-oci-config.install.in "debian/dotnet-sdk-10-oci-config.install"
        - name: generate oci config
          runs: |
            set -eux -o pipefail

            mkdir -p oci-config
            cat > "oci-config/dotnet-sdk-10.yaml" << EOF
            environment:
              DOTNET_CLI_TELEMETRY_OPTOUT: "true"
              DOTNET_GENERATE_ASPNET_CERTIFICATE: "false"
              DOTNET_ROOT: /usr/lib/dotnet
              DOTNET_VERSION: 10.0.302
              PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            EOF
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 10.0.302-0
        - uses: dpkg/build@v1
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/dotnet-sdk-10/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/dotnet-sdk/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
