# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-dotnet-sdk
variant: runtime
tags:
  - 8.0.423-0
  - 8.0.423-0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x64" : "arm64" }'
  CHECKSUM: '#{ target.arch == "arm64" ? "ccb7cf301ded08e614b6f5bafa82f59b335aaef1c4757c4c5d6dd8aeef5f3390" : "05e69a3c48f6ce37bdf18e9db527d26fc7fc46d4d99fa143660fe09bf23acd4d" }'
  CHECKSUM_AMD64: 05e69a3c48f6ce37bdf18e9db527d26fc7fc46d4d99fa143660fe09bf23acd4d
  CHECKSUM_ARM64: ccb7cf301ded08e614b6f5bafa82f59b335aaef1c4757c4c5d6dd8aeef5f3390
  DHI_REL: "0"
  DHI_VERSION: 8.0.423-0
  PACKAGE_NAME: dotnet-sdk-8
  SEMVER_MAJOR_VERSION: "8"
  VERSION: 8.0.423
contents:
  packages:
    - '!base-files'
  builds:
    - name: dotnet-sdk-8
      work-dir: ${source.dir}/dotnet-sdk-8
      contents:
        packages:
          - bash
          - coreutils
          - debhelper
          - dpkg-dev
          - findutils
          - tar
        files:
          - url: https://builds.dotnet.microsoft.com/dotnet/Sdk/8.0.423/dotnet-sdk-8.0.423-linux-${ARCH}.tar.gz
            checksum: sha256:${CHECKSUM}
            path: ${source.dir}/dotnet-sdk-8.tar.gz
            spdx:
              name: dotnet-sdk
              version: 8.0.423
              packages:
                - name: dotnet-sdk
                  purl: pkg:dhi/microsoft/dotnet-sdk@8.0.423
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: setup
          runs: |
            set -eux -o pipefail

            tar -xzf "${source.dir}/dotnet-sdk-8.tar.gz" --strip-components=1

            sed -i -e "s/@PACKAGE_NAME@/dotnet-sdk-8/g" \
              -e "s/@MAJOR_VERSION@/8/g" \
              debian/control.in debian/changelog \
              debian/dotnet-sdk.install.in \
              debian/dotnet-sdk-oci-config.install.in
            mv debian/control.in debian/control
            mv debian/dotnet-sdk.install.in "debian/dotnet-sdk-8.install"
            mv debian/dotnet-sdk-oci-config.install.in "debian/dotnet-sdk-8-oci-config.install"
        - name: generate oci config
          runs: |
            set -eux -o pipefail

            mkdir -p oci-config
            cat > "oci-config/dotnet-sdk-8.yaml" << EOF
            environment:
              DOTNET_CLI_TELEMETRY_OPTOUT: "true"
              DOTNET_GENERATE_ASPNET_CERTIFICATE: "false"
              DOTNET_ROOT: /usr/lib/dotnet
              DOTNET_VERSION: 8.0.423
              PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            EOF
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 8.0.423-0
        - uses: dpkg/build@v1
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/dotnet-sdk-8/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/dotnet-sdk/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
