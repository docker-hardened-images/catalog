# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-snyk
variant: runtime
tags:
  - 1.1306.0-0
  - 1.1306.0-0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  DHI_REL: "0"
  DHI_VERSION: 1.1306.0-0
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.1306.0
  SNYK_AMD64_CHECKSUM: sha256:aad6d43f936e4357b3bda299c02d446c80602106484c36615bb4b654ef7de740
  SNYK_ARM64_CHECKSUM: sha256:768f0d925f3646cdd17f5caa14e9c8153c9059ea24136c67635f9b6368fac02f
  SNYK_ASSET: '#{ target.arch == "arm64" ? "snyk-linux-arm64" : "snyk-linux" }'
  SNYK_CHECKSUM: '#{ target.arch == "arm64" ? "sha256:768f0d925f3646cdd17f5caa14e9c8153c9059ea24136c67635f9b6368fac02f" : "sha256:aad6d43f936e4357b3bda299c02d446c80602106484c36615bb4b654ef7de740" }'
  VERSION: 1.1306.0
contents:
  packages:
    - '!base-files'
  builds:
    - name: snyk deb
      work-dir: ${source.dir}/snyk
      contents:
        packages:
          - debhelper
          - dpkg-dev
          - make
        files:
          - url: https://github.com/snyk/cli/releases/download/v1.1306.0/${SNYK_ASSET}
            checksum: ${SNYK_CHECKSUM}
            path: ${source.dir}/snyk/${SNYK_ASSET}
            uid: 0
            gid: 0
      pipeline:
        - name: stage binary
          runs: |
            set -eux -o pipefail

            install -m0755 "${SNYK_ASSET}" snyk
            rm -f "${SNYK_ASSET}"
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 1.1306.0-0
        - uses: dpkg/build@v1
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/snyk/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/snyk/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
