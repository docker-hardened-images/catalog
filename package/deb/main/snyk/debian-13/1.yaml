# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-snyk
variant: runtime
tags:
  - 1.1305.2-0
  - 1.1305.2-0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  DHI_REL: "0"
  DHI_VERSION: 1.1305.2-0
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.1305.2
  SNYK_ASSET: '#{ target.arch == "arm64" ? "snyk-linux-arm64" : "snyk-linux" }'
  SNYK_CHECKSUM: '#{ target.arch == "arm64" ? "sha256:3288cae60114c7b49e0ee9ae68f0d538a743c5a15cff29f9fb42c3015cad98e8" : "sha256:60e7cb5538a8cf024344cde041a1aa2bf8bc0e54a59c041a4114ec84a7e966ed" }'
  VERSION: 1.1305.2
contents:
  packages:
    - '!base-files'
  builds:
    - name: snyk deb
      work-dir: ${source.dir}/snyk
      contents:
        packages:
          - debhelper
          - dpkg-dev
          - make
        files:
          - url: https://github.com/snyk/cli/releases/download/v1.1305.2/${SNYK_ASSET}
            checksum: ${SNYK_CHECKSUM}
            path: ${source.dir}/snyk/${SNYK_ASSET}
            spdx:
              name: snyk
              version: 1.1305.2
              packages:
                - name: snyk
                  purl: pkg:npm/snyk@1.1305.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: stage binary
          runs: |
            set -eux -o pipefail

            install -m0755 "${SNYK_ASSET}" snyk
            rm -f "${SNYK_ASSET}"
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 1.1305.2-0
        - uses: dpkg/build@v1
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/snyk/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/snyk/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
