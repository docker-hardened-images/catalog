contents:
  packages:
    - '!base-files'
  builds:
    - name: hostname deb
      work-dir: ${source.dir}/hostname
      contents:
        packages:
          - build-essential
          - debhelper
          - dpkg-dev
        files:
          - url: https://deb.debian.org/debian/pool/main/h/hostname/hostname_3.25.dsc
            checksum: sha256:80aadf116c3423044be69a4cef8ba2766f412bd4d46a500aacb61f303c19c4ef
            path: ${source.dir}/hostname_3.25.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/h/hostname/hostname_3.25.tar.xz
            checksum: sha256:5bb5d1be011158090157c9e7587ae5606c262a5020ecdc5caac6686b9910592e
            path: ${source.dir}/hostname_3.25.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: hostname_3.25.dsc
            path: hostname
            remove-original: false
        - name: remove upstream source artifacts
          work-dir: ${source.dir}
          runs: |
            set -eux -o pipefail

            rm hostname_3.25.dsc hostname_3.25.tar.xz
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Rebuild
            version: 3.25dhi0
        - name: update version in hostname.c
          runs: |
            set -eux -o pipefail

            sed -i 's/#define VERSION ".*"/#define VERSION "3.25dhi0"/' hostname.c
        - uses: dpkg/build@v1
          with:
            args: -uc -us -d
