  DEBIAN_ORIG_URL: https://deb.debian.org/debian/pool/main/h/hostname/hostname_3.25.tar.xz
  DEBIAN_VERSION: "3.25"
  DHI_REL: "0"
  DHI_VERSION: 3.25dhi0
  TAG_VERSION: 3.25dhi0
