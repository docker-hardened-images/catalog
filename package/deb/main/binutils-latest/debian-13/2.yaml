# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-binutils-latest
variant: runtime
tags:
  - 2.46.1-0-dhi0
  - 2.46.1-0-dhi0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86-64" : "aarch64" }'
  ARCH_TRIPLET: '#{ target.arch == "amd64" ? "x86_64-linux-gnu" : "aarch64-linux-gnu" }'
  DEBIAN_DEBIAN_FILENAME: ${DEBIAN_DEBIAN_URL:^.+/(.+)$}
  DEBIAN_DSC_FILENAME: ${DEBIAN_DSC_URL:^.+/(.+)$}
  DEBIAN_FILENAME_VERSION: 2.46.1-0
  DEBIAN_ORIG_FILENAME: ${DEBIAN_ORIG_URL:^.+/(.+)$}
  DEBIAN_VERSION: 2.46.1-0
  DHI_REL: "0"
  DHI_VERSION: 2.46.1-0+dhi0
  TAG_VERSION: 2.46.1-0-dhi0
  UPSTREAM_VERSION: 2.46.1
  VERSION: 2.46.1
contents:
  packages:
    - '!base-files'
  builds:
    - name: binutils-latest deb
      work-dir: ${source.dir}/binutils-2.46.1
      contents:
        packages:
          - base-files
          - bash
          - coreutils
          - findutils
          - make
          - build-essential
          - gpg
          - gpg-agent
          - automake
          - autotools-dev
          - gzip
          - sed
          - grep
          - diffutils
          - bison
          - flex
          - texinfo
          - zlib1g-dev
          - pkg-config
          - libjansson-dev
          - debhelper
          - dpkg-dev
        files:
          - url: https://ftp.gnu.org/gnu/gnu-keyring.gpg
            path: /tmp/build/keys/gnu-keyring.gpg
            uid: 0
            gid: 0
          - url: https://ftp.gnu.org/gnu/binutils/binutils-2.46.1.tar.gz.sig
            path: /tmp/build/sig/binutils-2.46.1.tar.gz.sig
            uid: 0
            gid: 0
          - url: https://ftp.gnu.org/gnu/binutils/binutils-2.46.1.tar.gz
            path: /tmp/build/binutils-2.46.1.tar.gz
            uid: 0
            gid: 0
      pipeline:
        - name: verify
          uses: gpg/verify@v1
          with:
            file: /tmp/build/binutils-2.46.1.tar.gz
            keys: /tmp/build/keys/gnu-keyring.gpg
            signature: /tmp/build/sig/binutils-2.46.1.tar.gz.sig
        - name: extract
          work-dir: ${source.dir}
          runs: |
            set -eux -o pipefail

            tar -xaf "/tmp/build/binutils-2.46.1.tar.gz"
        - name: finalize debian packaging templates
          runs: |
            set -eux -o pipefail

            # Finalize debian/ templates in-place
            sed -i -e "s/@ARCH@/${ARCH}/g" \
              -e "s/@ARCH_TRIPLET@/${ARCH_TRIPLET}/g" \
              debian/control.in \
              "debian/binutils-latest-arch-linux-gnu.install.in"
            mv debian/control.in debian/control
            mv "debian/binutils-latest-arch-linux-gnu.install.in" \
              "debian/binutils-latest-${ARCH}-linux-gnu.install"
        - uses: dpkg/bump@v1
          with:
            version: 2.46.1-0+dhi0
        - uses: dpkg/build@v1
          environment:
            DEB_BUILD_PROFILES: nobiarch
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/binutils-2.46.1/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/binutils-latest/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
