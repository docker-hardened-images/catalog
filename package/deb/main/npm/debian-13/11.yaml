# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-npm
variant: runtime
tags:
  - 11.17.0-0
  - 11.17.0-0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  DHI_REL: "0"
  DHI_VERSION: 11.17.0-0
  VERSION: 11.17.0
contents:
  packages:
    - '!base-files'
  builds:
    - name: npm deb
      work-dir: ${source.dir}/npm
      contents:
        packages:
          - build-essential
          - debhelper
          - dpkg-dev
          - nodejs
        files:
          - url: https://registry.npmjs.org/npm/-/npm-11.17.0.tgz
            path: ${source.dir}/npm-11.17.0.tgz
            uid: 0
            gid: 0
          - url: https://registry.npmjs.org/picomatch/-/picomatch-4.0.4.tgz
            checksum: sha256:515b5ab666558ed9a117483a310892aede54a68dd78f2d8db6604513e578571c
            path: ${source.dir}/vendor/picomatch-4.0.4.tgz
            uid: 0
            gid: 0
          - url: https://registry.npmjs.org/brace-expansion/-/brace-expansion-5.0.5.tgz
            checksum: sha256:e919c0ac902f05c2b3bbd31fd71af6c8ddfd74fadc85321231184d39ca990f31
            path: ${source.dir}/vendor/brace-expansion-5.0.5.tgz
            uid: 0
            gid: 0
      pipeline:
        - name: setup
          runs: |
            set -eux -o pipefail

            chmod +x debian/vendor-replace.sh
        - uses: dpkg/bump@v1
          with:
            changelog:
              - Bump picomatch to 4.0.4 (CVE-2026-33671, CVE-2026-33672) and bump brace-expansion to 5.0.5 (CVE-2026-33750)
            version: 11.17.0-0
        - uses: dpkg/build@v1
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/npm/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/npm/debian-13/debian
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
