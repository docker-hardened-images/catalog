contents:
  packages:
    - '!base-files'
  builds:
    - name: harfbuzz deb
      work-dir: ${source.dir}/harfbuzz
      contents:
        packages:
          - build-essential
          - debhelper
          - gobject-introspection
          - dpkg-dev
          - gir1.2-freedesktop-dev
          - gir1.2-glib-2.0-dev
          - gtk-doc-tools
          - docbook-xsl
          - libcairo2-dev
          - libchafa-dev
          - libfreetype-dev
          - libgirepository1.0-dev
          - libglib2.0-dev
          - libgraphite2-dev
          - libicu-dev
          - meson
          - ninja-build
          - pkgconf
        files:
          - url: https://deb.debian.org/debian/pool/main/h/harfbuzz/harfbuzz_10.2.0-1.dsc
            checksum: sha256:be25f4a4d1ca2032fbb51530649579fa843fa39c3f1941d1c644955e741f282d
            path: ${source.dir}/harfbuzz_10.2.0-1.dsc
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/h/harfbuzz/harfbuzz_10.2.0.orig.tar.xz
            checksum: sha256:620e3468faec2ea8685d32c46a58469b850ef63040b3565cde05959825b48227
            path: ${source.dir}/harfbuzz_10.2.0.orig.tar.xz
            uid: 0
            gid: 0
          - url: https://deb.debian.org/debian/pool/main/h/harfbuzz/harfbuzz_10.2.0-1.debian.tar.xz
            checksum: sha256:9bbdda73722f662b8a52c39a7d4d9ef6e024c0d4dd2cb41d825b066b6d170633
            path: ${source.dir}/harfbuzz_10.2.0-1.debian.tar.xz
            uid: 0
            gid: 0
      pipeline:
        - uses: dpkg/source@v1
          work-dir: ${source.dir}
          with:
            file: harfbuzz_10.2.0-1.dsc
            path: harfbuzz
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Rebuild
            version: 10.2.0-1dhi0
        - name: gtk-doc offline DocBook XSL (chunk.xsl)
          runs: |
            set -eux -o pipefail

            xf=/usr/share/gtk-doc/data/gtk-doc.xsl
            test -f "$xf"
            test -f /usr/share/xml/docbook/stylesheet/docbook-xsl/html/chunk.xsl
            sed -i \
              's|http://docbook.sourceforge.net/release/xsl/current/html/chunk\.xsl|file:///usr/share/xml/docbook/stylesheet/docbook-xsl/html/chunk.xsl|g' \
              "$xf"
        - uses: dpkg/build@v1
          environment:
            DEB_BUILD_OPTIONS: parallel=1
            MAKEFLAGS: -j1
            NINJAFLAGS: -j1
          with:
            args: -uc -us -d
