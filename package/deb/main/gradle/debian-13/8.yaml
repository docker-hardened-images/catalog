# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-gradle
variant: runtime
tags:
  - 8.14.5-0
  - 8.14.5-0-debian13
platforms:
  - linux/amd64
vars:
  COMMIT_SHA: 62345becae08b13e793521816d585102fea66398
  DHI_REL: "0"
  DHI_VERSION: 8.14.5-0
  JDK_VERSION: 17.0.19.10-0
  PACKAGE_NAME: gradle-8
  SEMVER_MAJOR_VERSION: "8"
  VERSION: 8.14.5
contents:
  packages:
    - '!base-files'
  builds:
    - name: gradle-8 deb
      work-dir: ${source.dir}/gradle
      contents:
        repositories:
          - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
        keyring:
          - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
        packages:
          - debhelper
          - dpkg-dev
          - eclipse-temurin-17-jdk=17.0.19.10-0
          - git
          - quilt
          - unzip
        files:
          - url: git+https://github.com/gradle/gradle.git#v8.14.5
            checksum: 62345becae08b13e793521816d585102fea66398
            path: ${source.dir}/gradle
            uid: 0
            gid: 0
      pipeline:
        - name: setup
          runs: |
            set -eux -o pipefail

            sed -i -e "s/@PACKAGE_NAME@/gradle-8/g" \
              -e "s/@VERSION@/8.14.5/g" \
              -e "s/@SEMVER_MAJOR_VERSION@/8/g" \
              debian/control.in debian/changelog debian/gradle.install.in debian/rules
            mv debian/control.in debian/control
            mv debian/gradle.install.in "debian/gradle-8.install"
            mkdir -p debian/patches
        - uses: dpkg/patch@v1
          with:
            patches:
              - ${source.dir}/patch/0002-Update-org.eclipse.jgit-org.eclipse.jgit-7.2.1.2025.patch
              - ${source.dir}/patch/0003-8-Update-org.apache.commons-commons-lang3-3.18.0.patch
              - ${source.dir}/patch/0006-8-Update-org.codehaus.plexus.plexus-utils-3.6.1.patch
              - ${source.dir}/patch/0007-8-Update-com.fasterxml.jackson.core-jackson-databind-2.18.8.patch
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 8.14.5-0
        - uses: dpkg/build@v1
          privileged: true
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/gradle/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/gradle/debian-13/debian
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: package/deb/main/gradle/patch
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
