# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-gradle
variant: runtime
tags:
  - 9.6.1-0
  - 9.6.1-0-debian13
platforms:
  - linux/amd64
vars:
  COMMIT_SHA: 309d128bd9fe8c0b71311878fc660b9cbaa07c51
  DHI_REL: "0"
  DHI_VERSION: 9.6.1-0
  JDK_VERSION: 17.0.19.10-0
  PACKAGE_NAME: gradle-9
  SEMVER_MAJOR_VERSION: "9"
  VERSION: 9.6.1
contents:
  packages:
    - '!base-files'
  builds:
    - name: gradle-9 deb
      work-dir: ${source.dir}/gradle
      contents:
        repositories:
          - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
        keyring:
          - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
        packages:
          - debhelper
          - dpkg-dev
          - eclipse-temurin-17-jdk=17.0.19.10-0
          - git
          - quilt
          - unzip
        files:
          - url: git+https://github.com/gradle/gradle.git#v9.6.1
            checksum: 309d128bd9fe8c0b71311878fc660b9cbaa07c51
            path: ${source.dir}/gradle
            uid: 0
            gid: 0
      pipeline:
        - name: setup
          runs: |
            set -eux -o pipefail

            sed -i -e "s/@PACKAGE_NAME@/gradle-9/g" \
              -e "s/@VERSION@/9.6.1/g" \
              -e "s/@SEMVER_MAJOR_VERSION@/9/g" \
              debian/control.in debian/changelog debian/gradle.install.in debian/rules
            mv debian/control.in debian/control
            mv debian/gradle.install.in "debian/gradle-9.install"
            mkdir -p debian/patches
        - uses: dpkg/patch@v1
          with:
            patches:
              - ${source.dir}/patch/0004-Disable-deprecation-warnings.patch
              - ${source.dir}/patch/0007-9-Update-com.fasterxml.jackson.core-jackson-databind-2.18.8.patch
        - uses: dpkg/bump@v1
          with:
            changelog:
              - DHI Build
            version: 9.6.1-0
        - uses: dpkg/build@v1
          privileged: true
          with:
            args: -b -uc -us -d
      paths:
        - type: directory
          path: ${source.dir}/gradle/debian
          uid: 0
          gid: 0
          mode: "0600"
          source: package/deb/main/gradle/debian-13/debian
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: package/deb/main/gradle/patch
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
