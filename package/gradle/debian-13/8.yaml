# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-gradle
variant: runtime
tags:
  - "8"
  - "8.14"
  - 8.14.5
  - 8-debian13
  - 8.14-debian13
  - 8.14.5-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  GRADLE_COMMIT_SHA: 62345becae08b13e793521816d585102fea66398
  GRADLE_MAJOR_MINOR_VERSION: "8.14"
  GRADLE_MAJOR_VERSION: "8"
  GRADLE_VERSION: 8.14.5
  JAVA_DIGEST: sha256:c22318b0d60922ea6b70fb5a8d8da3c58f759b80f69623660e50c4b5b7e7b355
  JAVA_VERSION: 17.0.19.10
contents:
  packages:
    - '!base-files'
  builds:
    - name: gradle
      uses: dhi.io/eclipse-temurin:17.0.19.10-jdk-debian13-dev@sha256:c22318b0d60922ea6b70fb5a8d8da3c58f759b80f69623660e50c4b5b7e7b355
      work-dir: ${source.dir}/gradle
      environment:
        PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      contents:
        packages:
          - git
          - unzip
          - gnu-which
          - libudev-dev
          - sed
          - libstdc++6
        files:
          - url: git+https://github.com/gradle/gradle.git#v8.14.5
            checksum: 62345becae08b13e793521816d585102fea66398
            path: ${source.dir}/gradle
            spdx:
              name: gradle
              version: 8.14.5
              packages:
                - name: gradle
                  purl: pkg:dhi/gradle@8.14.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch jgit
          uses: git/patch@v1
          with:
            patch: ${source.dir}/patch/0002-Update-org.eclipse.jgit-org.eclipse.jgit-6.10.1.2025.patch
        - name: patch commons-lang3
          uses: git/patch@v1
          with:
            patch: ${source.dir}/patch/0003-Update-org.apache.commons-commons-lang3-3.18.0.patch
        - name: patch plexus-utils
          uses: git/patch@v1
          with:
            patch: ${source.dir}/patch/0006-Update-org.codehaus.plexus.plexus-utils-3.6.1.patch
        - name: install
          privileged: true
          runs: |
            set -eux -o pipefail

            # TODO cd: we need to download the gradle wrapper ahead of time
            ./gradlew :distributions-full:binDistributionZip -Pversion="8.14.5"

            unzip "packaging/distributions-full/build/distributions/gradle-8.14.5-bin.zip"
            mkdir -p "${target.dir}/opt/java/gradle/gradle-8.14.5"
            cd gradle-*

            # shellcheck disable=SC2035
            cp -r * "${target.dir}/opt/java/gradle/gradle-8.14.5"

            mkdir -p "${target.dir}/usr/local/bin"
            find "${target.dir}/opt/java/gradle/gradle-8.14.5/bin" -type f -executable -o -type l | while read -r file; do
              filename=$(basename "$file")
              ln -s "/opt/java/gradle/gradle-8.14.5/bin/$filename" "${target.dir}/usr/local/bin/$filename"
            done
        - name: test
          runs: |
            set -eux -o pipefail

            "${target.dir}/opt/java/gradle/gradle-8.14.5/bin/gradle" --version
      paths:
        - type: file
          path: ${source.dir}/patch/0002-Update-org.eclipse.jgit-org.eclipse.jgit-6.10.1.2025.patch
          uid: 0
          gid: 0
          source: package/gradle/patch/0002-Update-org.eclipse.jgit-org.eclipse.jgit-6.10.1.2025.patch
        - type: file
          path: ${source.dir}/patch/0003-Update-org.apache.commons-commons-lang3-3.18.0.patch
          uid: 0
          gid: 0
          source: package/gradle/patch/0003-8-Update-org.apache.commons-commons-lang3-3.18.0.patch
        - type: file
          path: ${source.dir}/patch/0004-Disable-deprecation-warnings.patch
          uid: 0
          gid: 0
          source: package/gradle/patch/0004-Disable-deprecation-warnings.patch
        - type: file
          path: ${source.dir}/patch/0006-Update-org.codehaus.plexus.plexus-utils-3.6.1.patch
          uid: 0
          gid: 0
          source: package/gradle/patch/0006-8-Update-org.codehaus.plexus.plexus-utils-3.6.1.patch
      outputs:
        - source: ${target.dir}/opt/java/gradle/gradle-8.14.5
          target: /opt/java/gradle/gradle-8.14.5
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/gradle
          target: /opt/docker/sbom/gradle
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  GRADLE_HOME: /opt/java/gradle/gradle-8.14.5
  GRADLE_VERSION: 8.14.5
