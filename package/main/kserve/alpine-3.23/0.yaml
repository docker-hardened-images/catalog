# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-kserve
variant: runtime
tags:
  - 0.18.0-alpine
  - 0.18.0-r2-alpine
  - 0.18.0-alpine3.23
  - 0.18.0-r2-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 3a432a84880407b15c63f458080258838eff2792
  GOLANG_MAJOR_MINOR_VERSION: "1.26"
  GOLANG_VERSION: 1.26.4-r0
  REL: "2"
  SEMVER_MAJOR_MINOR_VERSION: "0.18"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.18.0
  VERSION: 0.18.0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: kserve
      work-dir: /go/src/github.com/kserve/kserve
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - ca-certificates
          - clang
          - cmake
          - openssl
          - golang-1.26=1.26.4-r0
          - golang-1.26-oci-config=1.26.4-r0
        files:
          - url: git+https://github.com/kserve/kserve.git#v0.18.0
            checksum: 3a432a84880407b15c63f458080258838eff2792
            path: /go/src/github.com/kserve/kserve
            spdx:
              name: kserve
              version: 0.18.0
              packages:
                - name: kserve
                  purl: pkg:golang/github.com/kserve/kserve@0.18.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            deps:
              - github.com/expr-lang/expr@v1.17.7
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: build manager
          uses: go/build@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            fips: false
            output: ${target.dir}/usr/bin/manager
            packages: ./cmd/manager
        - name: build manager dev
          uses: go/build@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            fips: false
            output: ${target.dir}/usr/bin/manager-dev
            packages: ./cmd/manager
            strip: false
        - name: build agent
          uses: go/build@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            fips: false
            output: ${target.dir}/usr/bin/agent
            packages: ./cmd/agent
        - name: build agent dev
          uses: go/build@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            fips: false
            output: ${target.dir}/usr/bin/agent-dev
            packages: ./cmd/agent
            strip: false
        - name: build router
          uses: go/build@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            fips: false
            output: ${target.dir}/usr/bin/router
            packages: ./cmd/router
        - name: build router dev
          uses: go/build@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            fips: false
            output: ${target.dir}/usr/bin/router-dev
            packages: ./cmd/router
            strip: false
        - name: build localmodel
          uses: go/build@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            fips: false
            output: ${target.dir}/usr/bin/localmodel
            packages: ./cmd/localmodel
        - name: build localmodel dev
          uses: go/build@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            fips: false
            output: ${target.dir}/usr/bin/localmodel-dev
            packages: ./cmd/localmodel
            strip: false
        - name: build localmodelnode
          uses: go/build@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            fips: false
            output: ${target.dir}/usr/bin/localmodelnode
            packages: ./cmd/localmodelnode
        - name: build localmodelnode dev
          uses: go/build@v1
          work-dir: /go/src/github.com/kserve/kserve
          with:
            fips: false
            output: ${target.dir}/usr/bin/localmodelnode-dev
            packages: ./cmd/localmodelnode
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Kserve binaries
            files:
              - usr/bin/manager
            license: Apache-2.0
            name: kserve
            rel: 2
            subpackages:
              - files:
                  - path: usr/bin/agent
                name: agent
              - files:
                  - path: usr/bin/router
                name: router
              - files:
                  - path: usr/bin/localmodel
                name: localmodel
              - files:
                  - path: usr/bin/localmodelnode
                name: localmodelnode
              - files:
                  - path: usr/bin/manager
                    source: usr/bin/manager-dev
                name: kserve-dev
              - files:
                  - path: usr/bin/agent
                    source: usr/bin/agent-dev
                name: agent-dev
              - files:
                  - path: usr/bin/router
                    source: usr/bin/router-dev
                name: router-dev
              - files:
                  - path: usr/bin/localmodel
                    source: usr/bin/localmodel-dev
                name: localmodel-dev
              - files:
                  - path: usr/bin/localmodelnode
                    source: usr/bin/localmodelnode-dev
                name: localmodelnode-dev
            url: https://github.com/kserve/kserve
            version: 0.18.0
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
