                  - path: usr/bin/docker-scout
                    source: usr/bin/docker-scout-dev
                name: scout-cli-dev
              - depends:
                  - scout-cli
                description: Docker CLI plugin for scout-cli
                files:
                  - path: usr/local/libexec/docker/cli-plugins/docker-scout
                    source: usr/local/libexec/docker/cli-plugins/docker-scout
                name: docker-cli-scout-cli
