              - -X github.com/docker/scout-cli-plugin/internal/version.commit=fb59552651671b31cca99eba9895522871678c46
            output: ${target.dir}/usr/bin/docker-scout
            packages: ./cmd/docker-scout
        - name: build dev
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X github.com/docker/scout-cli-plugin/internal/version.version=1.20.4
              - -X github.com/docker/scout-cli-plugin/internal/version.commit=fb59552651671b31cca99eba9895522871678c46
            output: ${target.dir}/usr/bin/docker-scout-dev
            packages: ./cmd/docker-scout
            strip: false
        - name: create docker cli symlink
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/local/libexec/docker/cli-plugins"
            ln -s /usr/bin/docker-scout "${target.dir}/usr/local/libexec/docker/cli-plugins/docker-scout"
        - uses: dhi/build-pkg:0
