# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-couchbase-mcp
variant: runtime
tags:
  - 1.0.0
  - 1.0.0-r0
  - 1.0.0-debian13
  - 1.0.0-r0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-06-26"
vars:
  COMMIT_SHA: 02e488a45380b16595ff48aee4dd8eacf2704c7f
  PYTHON_MINOR: "3.13"
  PYTHON_VERSION: 3.13.14-3
  REL: "0"
  SEMVER_MAJOR_MINOR_VERSION: "1.0"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.0.0
  UPSTREAM_VERSION: 1.0.0.post1
  UV_ARCH: '#{ target.arch == "amd64" ? "x86_64-unknown-linux-gnu" : "aarch64-unknown-linux-gnu" }'
  UV_VERSION: 0.11.31
  VERSION: 1.0.0
contents:
  packages:
    - base-files
  builds:
    - name: couchbase-mcp
      work-dir: ${source.dir}
      environment:
        UV_COMPILE_BYTECODE: "1"
      caches:
        - path: /root/.cache/uv
      contents:
        repositories:
          - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
        keyring:
          - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
        packages:
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - git
          - gzip
          - sed
          - tar
          - gcc
          - libc6-dev
          - libffi-dev
          - libssl-dev
          - libpython-3.13=3.13.14-3
          - libpython-3.13-minimal=3.13.14-3
          - libpython-3.13-stdlib=3.13.14-3
          - python-3.13-minimal=3.13.14-3
          - python-3.13=3.13.14-3
          - python-3.13-dev=3.13.14-3
        files:
          - url: https://github.com/astral-sh/uv/releases/download/0.11.31/uv-${UV_ARCH}.tar.gz
            checksum: https://github.com/astral-sh/uv/releases/download/0.11.31/uv-${UV_ARCH}.tar.gz.sha256
            path: ${source.dir}/uv.tar.gz
            spdx:
              name: uv-binary
              version: 0.11.31
              packages:
                - name: uv
                  purl: pkg:github/astral-sh/uv@0.11.31
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: git+https://github.com/couchbase/mcp-server-couchbase.git#v1.0.0.post1
            checksum: 02e488a45380b16595ff48aee4dd8eacf2704c7f
            path: ${source.dir}/source
            spdx:
              name: couchbase-mcp
              version: 1.0.0.post1
              packages:
                - name: couchbase-mcp
                  purl: pkg:github/couchbase/mcp-server-couchbase@1.0.0.post1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: setup uv
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            tar -xzf "${source.dir}/uv.tar.gz" -C /usr/local/bin --strip-components=1
            chmod +x /usr/local/bin/uv
        - name: build venv at final path and stage it
          privileged: true
          runs: |
            set -eux -o pipefail

            export SOURCE_DIR="${source.dir}" TARGET_DIR="${target.dir}" PYTHON_BIN=/usr/bin/python3.13
            bash "${source.dir}/build-venv.sh"
        - uses: dhi/build-pkg:0
          with:
            depends:
              - python-3.13
            description: Couchbase MCP server (Model Context Protocol server for Couchbase)
            files:
              - opt/couchbase-mcp
              - usr/bin/couchbase-mcp-server
            formats:
              - deb
            license: Apache-2.0
            name: couchbase-mcp
            rel: 0
            url: https://github.com/couchbase/mcp-server-couchbase
            version: 1.0.0
      paths:
        - type: file
          path: ${source.dir}/build-venv.sh
          uid: 0
          gid: 0
          mode: "0755"
          source: package/main/couchbase-mcp/build-venv.sh
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
