# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-cosign
variant: runtime
tags:
  - 2.6.3-alpine3.23
  - 2.6.3-r3-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: fecddd3c22045a39f52392e71e79f66854b41352
  GOLANG_VERSION: 1.26.2-r3
  PACKAGE_NAME: cosign-2
  REL: "3"
  SEMVER_MAJOR_MINOR_VERSION: "2.6"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.6.3
  VERSION: 2.6.3
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: cosign-2
      work-dir: /go/src/github.com/sigstore/cosign
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - golang-1.26=1.26.2-r3
          - golang-1.26-oci-config=1.26.2-r3
        files:
          - url: git+https://github.com/sigstore/cosign.git#v2.6.3
            checksum: fecddd3c22045a39f52392e71e79f66854b41352
            path: /go/src/github.com/sigstore/cosign
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - github.com/sigstore/fulcio@v1.8.5
              - github.com/sigstore/rekor@v1.5.0
              - github.com/sigstore/timestamp-authority/v2@v2.0.6
              - github.com/theupdateframework/go-tuf/v2@v2.4.1
            tidy: true
        - uses: go/hermetic@v1
        - name: test
          privileged: true
          environment:
            CGO_ENABLED: "0"
            GODEBUG: ""
          runs: |
            set -eux -o pipefail

            go test ./...
        - name: build
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X github.com/sigstore/cosign/version.Version=2.6.3
              - -X sigs.k8s.io/release-utils/version.gitVersion=2.6.3
              - -X sigs.k8s.io/release-utils/version.gitCommit=fecddd3c22045a39f52392e71e79f66854b41352
              - -X sigs.k8s.io/release-utils/version.gitTreeState=clean
              - -X sigs.k8s.io/release-utils/version.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/bin/cosign
            packages: ./cmd/cosign
        - name: build dev
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X github.com/sigstore/cosign/version.Version=2.6.3
              - -X sigs.k8s.io/release-utils/version.gitVersion=2.6.3
              - -X sigs.k8s.io/release-utils/version.gitCommit=fecddd3c22045a39f52392e71e79f66854b41352
              - -X sigs.k8s.io/release-utils/version.gitTreeState=clean
              - -X sigs.k8s.io/release-utils/version.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/bin/cosign-dev
            packages: ./cmd/cosign
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Container signing tool with support for ephemeral keys and Sigstore signing
            files:
              - usr/bin/cosign
            license: Apache-2.0
            name: cosign-2
            priority: "200"
            provides: cosign=$pkg_full_version
            rel: 3
            replaces: cosign
            subpackages:
              - files:
                  - path: usr/bin/cosign
                    source: usr/bin/cosign-dev
                name: cosign-2-dev
            url: https://github.com/sigstore/cosign
            version: 2.6.3
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
