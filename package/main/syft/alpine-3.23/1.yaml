              - -X main.gitDescription=1.42.4
              - -X main.gitCommit=f6189175279981a79d8d8c15669c570f15a00568
              - -X main.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/bin/syft
            packages: ./cmd/syft
        - name: build dev
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X main.version=1.42.4
              - -X main.gitDescription=1.42.4
              - -X main.gitCommit=f6189175279981a79d8d8c15669c570f15a00568
              - -X main.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/bin/syft-dev
            packages: ./cmd/syft
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Generate a Software Bill of Materials (SBOM) from container images and filesystems
            files:
              - usr/bin/syft
            license: Apache-2.0
            name: syft
            rel: 1
            subpackages:
              - description: Generate a Software Bill of Materials (SBOM) from container images and filesystems (dev)
                files:
                  - path: usr/bin/syft
                    source: usr/bin/syft-dev
                name: syft-dev
            url: https://github.com/anchore/syft
            version: 1.42.4
      paths:
        - type: file
          path: /go/src/github.com/anchore/syft/disable-update-check.patch
          uid: 0
          gid: 0
          source: package/main/syft/patch/disable-update-check.patch
