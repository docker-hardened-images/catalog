            path: /go/src/github.com/anchore/syft
            uid: 0
            gid: 0
      pipeline:
        - name: patch disable update check
          uses: git/patch@v1
          with:
            patch: disable-update-check.patch
        - name: update go dependencies
          uses: go/bump@v1
          with:
