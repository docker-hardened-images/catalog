# syntax=dhi.io/build:2-alpine3.24

image: dhi.io/pkg-gitea
variant: runtime
tags:
  - 1.26.4-alpine3.24
  - 1.26.4-r1-alpine3.24
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2016-12-23"
vars:
  COMMIT_SHA: 95ba37d9af58db7d9163f9e92e07b5eb4f792bbc
  GO_BUILD_TAGS: bindata,timetzdata,sqlite,sqlite_unlock_notify
  GOLANG_VERSION: 1.26.5-r0
  PACKAGE_NAME: gitea
  REL: "1"
  SEMVER_MAJOR_MINOR_VERSION: "1.26"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.26.4
  VERSION: 1.26.4
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: gitea
      work-dir: /go/src/code.gitea.io/gitea
      contents:
        packages:
          - bash
          - build-base
          - ca-certificates-bundle
          - corepack
          - git
          - golang-1.26=1.26.5-r0
          - golang-1.26-oci-config=1.26.5-r0
          - nodejs-22
        files:
          - url: git+https://github.com/go-gitea/gitea.git#v1.26.4
            checksum: 95ba37d9af58db7d9163f9e92e07b5eb4f792bbc
            path: /go/src/code.gitea.io/gitea
            spdx:
              name: gitea
              version: 1.26.4
              packages:
                - name: gitea
                  purl: pkg:golang/code.gitea.io/gitea@v1.26.4
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/image@v0.43.0
              - github.com/go-git/go-git/v5@v5.19.1
              - github.com/Azure/go-ntlmssp@v0.1.1
            download: true
        - uses: go/hermetic@v1
        - name: test
          runs: |
            set -eux -o pipefail

            GITEA_I_AM_BEING_UNSAFE_RUNNING_AS_ROOT=true \
              go test ./modules/setting/... ./modules/util/...
        - name: build frontend
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "$(printf '%s\n%s' "1.26.4" '1.26.999' | sort -V | tail -1)" != '1.26.999' ]; then
              echo "VERSION 1.26.4 exceeds reviewed baseline 1.26.x — re-validate pnpm.overrides below"
              exit 1
            fi

            node -e '
              const fs = require("fs");
              const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
              p.pnpm = p.pnpm || {};
              p.pnpm.overrides = Object.assign({}, p.pnpm.overrides, {
                "lodash-es": "4.18.0",
                "vite": "8.0.16",
                "ws": "8.21.0",
                "form-data": "4.0.6",
                "dompurify": "3.4.11",
                "js-yaml": "4.2.0",
                "uuid": "11.1.1",
                "postcss": "8.5.16",
                "esbuild": "0.28.1"
              });
              fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
            '

            corepack pnpm install --lockfile-only
            corepack pnpm install --frozen-lockfile
            corepack pnpm exec vite build
        - name: prune frontend dev dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack pnpm prune --prod
        - name: frontend sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: gitea-frontend
            source: /go/src/code.gitea.io/gitea/node_modules
        - name: generate backend
          runs: |
            set -eux -o pipefail

            CC= GOOS= GOARCH= CGO_ENABLED=0 go generate -tags 'bindata,timetzdata,sqlite,sqlite_unlock_notify' ./...
        - name: build gitea
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 1
            fips: false
            ldflags:
              - -linkmode=external
              - -extldflags=-static
              - -X main.Version=1.26.4
            output: ${target.dir}/usr/bin/gitea
            packages: .
            tags: bindata,timetzdata,sqlite,sqlite_unlock_notify
        - name: build gitea dev
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 1
            fips: false
            ldflags:
              - -linkmode=external
              - -extldflags=-static
              - -X main.Version=1.26.4
            output: ${target.dir}/usr/bin/gitea-dev
            packages: .
            strip: false
            tags: bindata,timetzdata,sqlite,sqlite_unlock_notify
        - uses: dhi/build-pkg:0
          with:
            depends:
              - git
            description: Gitea, a painless self-hosted Git service
            files:
              - usr/bin/gitea
            license: MIT
            name: gitea
            rel: 1
            subpackages:
              - files:
                  - path: usr/bin/gitea
                    source: usr/bin/gitea-dev
                name: gitea-dev
            url: https://about.gitea.com/
            version: 1.26.4
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
