          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test ./cmd/node-cache/... \
              -skip 'TestUpdateCoreFile|TestUpdateIPv6CoreFile' # skip test that fails on fips mode due to dns config not loading in time
        - name: build
          uses: go/build@v1
