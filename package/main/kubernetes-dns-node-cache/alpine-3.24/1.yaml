              - -X k8s.io/client-go/pkg/version.gitCommit=9aa70b8f97dc751445a7370960cd45e411506003
              - -X k8s.io/client-go/pkg/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
              - -X k8s.io/dns/pkg/version.VERSION=1.26.8
            output: ${target.dir}/usr/bin/node-cache
            packages: ./cmd/node-cache
        - name: build dev
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X k8s.io/client-go/pkg/version.gitVersion=1.26.8
              - -X k8s.io/client-go/pkg/version.gitCommit=9aa70b8f97dc751445a7370960cd45e411506003
              - -X k8s.io/client-go/pkg/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
              - -X k8s.io/dns/pkg/version.VERSION=1.26.8
            output: ${target.dir}/usr/bin/node-cache-dev
            packages: ./cmd/node-cache
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Kubernetes node cache
            files:
