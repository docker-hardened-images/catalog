# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-httpbin
variant: runtime
tags:
  - 0.2.3
  - 0.2.3-r0
  - 0.2.3-debian13
  - 0.2.3-r0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2022-06-23"
vars:
  COMMIT_SHA: ec8b2e11ef11f06edf945d7579005b41565399c6
  PYTHON_VERSION: 3.13.14-3
  REL: "0"
  SEMVER_MAJOR_MINOR_VERSION: "0.2"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.2.3
  VERSION: 0.2.3
contents:
  packages:
    - base-files
  builds:
    - name: httpbin
      work-dir: ${source.dir}
      environment:
        HTTPBIN_VERSION: 0.2.3
      contents:
        repositories:
          - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
        keyring:
          - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
        packages:
          - bash
          - build-essential
          - ca-certificates
          - coreutils
          - findutils
          - git
          - libffi-dev
          - python-3.13=3.13.14-3
          - python-3.13-dev=3.13.14-3
          - python3-pip
          - python3-venv
          - sed
        files:
          - url: git+https://github.com/Kong/httpbin.git#0.2.3
            checksum: ec8b2e11ef11f06edf945d7579005b41565399c6
            path: ${source.dir}/src
            spdx:
              name: httpbin
              version: 0.2.3
              packages:
                - name: httpbin
                  purl: pkg:github/Kong/httpbin@0.2.3
                  license: ISC
            uid: 0
            gid: 0
      pipeline:
        - name: build venv at final path and stage it
          privileged: true
          runs: |
            set -eux -o pipefail

            export SOURCE_DIR="${source.dir}" TARGET_DIR="${target.dir}"
            bash "${source.dir}/build-venv.sh"
        - uses: dhi/build-pkg:0
          with:
            deb:
              depends:
                - libffi8
                - libstdc++6
                - libgcc-s1
            depends:
              - python-3.13
            description: HTTP request and response testing service
            files:
              - usr/lib/httpbin
            formats:
              - deb
            license: ISC
            name: httpbin
            rel: 0
            url: https://github.com/Kong/httpbin
            version: 0.2.3
      paths:
        - type: file
          path: ${source.dir}/requirements.txt
          uid: 0
          gid: 0
          source: package/main/httpbin/requirements.txt
        - type: file
          path: ${source.dir}/entrypoint.py
          uid: 0
          gid: 0
          source: package/main/httpbin/entrypoint.py
        - type: file
          path: ${source.dir}/build-venv.sh
          uid: 0
          gid: 0
          mode: "0755"
          source: package/main/httpbin/build-venv.sh
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
