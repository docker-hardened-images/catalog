# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-gitlab-workhorse
variant: runtime
tags:
  - 19.1.2-alpine3.23
  - 19.1.2-r1-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: d1f345880dd57c37109825f74c4a2bcffabd64af
  GOLANG_VERSION: 1.26.5-r0
  PACKAGE_NAME: gitlab-workhorse
  REL: "1"
  SEMVER_MAJOR_MINOR_VERSION: "19.1"
  SEMVER_MAJOR_VERSION: "19"
  SEMVER_VERSION: 19.1.2
  VERSION: 19.1.2
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: gitlab-workhorse
      work-dir: /go/src/gitlab.com/gitlab-org/gitlab/workhorse
      contents:
        packages:
          - bash
          - ca-certificates-bundle
          - coreutils
          - findutils
          - golang-1.26=1.26.5-r0
          - golang-1.26-oci-config=1.26.5-r0
          - mawk
          - sed
        files:
          - url: git+https://gitlab.com/gitlab-org/gitlab-foss.git#v19.1.2
            checksum: d1f345880dd57c37109825f74c4a2bcffabd64af
            path: /go/src/gitlab.com/gitlab-org/gitlab
            spdx:
              name: gitlab-workhorse
              version: 19.1.2
              packages:
                - name: gitlab-workhorse
                  purl: pkg:golang/gitlab.com/gitlab-org/gitlab/workhorse@19.1.2
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.53.0
              - golang.org/x/net@v0.55.0
              - golang.org/x/image@v0.43.0
            download: true
            replaces:
              - github.com/aws/aws-sdk-go-v2/service/s3=github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
        - uses: go/hermetic@v1
        - name: test bumped dependencies
          runs: |
            set -eux -o pipefail

            go test -count=1 ./cmd/gitlab-resize-image/...
        - name: build gitlab-workhorse
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X main.Version=v19.1.2
              - -X main.BuildTime=$(date -u -d @${SOURCE_DATE_EPOCH} +'%Y%m%d.%H%M%S')
            output: ${target.dir}/usr/bin/gitlab-workhorse
            packages: ./cmd/gitlab-workhorse
            tags: tracer_static,tracer_static_jaeger,continuous_profiler_stackdriver
        - name: build gitlab-resize-image
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X main.Version=v19.1.2
              - -X main.BuildTime=$(date -u -d @${SOURCE_DATE_EPOCH} +'%Y%m%d.%H%M%S')
            output: ${target.dir}/usr/bin/gitlab-resize-image
            packages: ./cmd/gitlab-resize-image
            tags: tracer_static,tracer_static_jaeger,continuous_profiler_stackdriver
        - name: build gitlab-zip-cat
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X main.Version=v19.1.2
              - -X main.BuildTime=$(date -u -d @${SOURCE_DATE_EPOCH} +'%Y%m%d.%H%M%S')
            output: ${target.dir}/usr/bin/gitlab-zip-cat
            packages: ./cmd/gitlab-zip-cat
            tags: tracer_static,tracer_static_jaeger,continuous_profiler_stackdriver
        - name: build gitlab-zip-metadata
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X main.Version=v19.1.2
              - -X main.BuildTime=$(date -u -d @${SOURCE_DATE_EPOCH} +'%Y%m%d.%H%M%S')
            output: ${target.dir}/usr/bin/gitlab-zip-metadata
            packages: ./cmd/gitlab-zip-metadata
            tags: tracer_static,tracer_static_jaeger,continuous_profiler_stackdriver
        - uses: dhi/build-pkg:0
          with:
            description: GitLab Workhorse, the smart reverse proxy that fronts GitLab Rails
            files:
              - usr/bin/gitlab-workhorse
              - usr/bin/gitlab-resize-image
              - usr/bin/gitlab-zip-cat
              - usr/bin/gitlab-zip-metadata
            license: MIT
            name: gitlab-workhorse
            rel: 1
            url: https://gitlab.com/gitlab-org/gitlab/-/tree/master/workhorse
            version: 19.1.2
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
