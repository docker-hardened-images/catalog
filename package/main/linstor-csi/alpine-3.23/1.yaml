# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-linstor-csi
variant: runtime
tags:
  - 1.12.0-alpine3.23
  - 1.12.0-r0-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 44aa98afcf289f7300c97eddd9a10b11b1890bcd
  GOLANG_VERSION: 1.26.5-r0
  PACKAGE_NAME: linstor-csi
  REL: "0"
  SEMVER_MAJOR_MINOR_VERSION: "1.12"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.12.0
  VERSION: 1.12.0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: linstor-csi
      work-dir: /go/src/github.com/piraeusdatastore/linstor-csi
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - golang-1.26=1.26.5-r0
          - golang-1.26-oci-config=1.26.5-r0
        files:
          - url: git+https://github.com/piraeusdatastore/linstor-csi.git#v1.12.0
            checksum: 44aa98afcf289f7300c97eddd9a10b11b1890bcd
            path: /go/src/github.com/piraeusdatastore/linstor-csi
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps: []
            tidy: true
        - uses: go/hermetic@v1
        - name: test
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test ./...
        - name: build
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X github.com/piraeusdatastore/linstor-csi/pkg/driver.Version=1.12.0
            output: ${target.dir}/usr/bin/linstor-csi
            packages: ./cmd/linstor-csi/linstor-csi.go
        - name: build dev
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X github.com/piraeusdatastore/linstor-csi/pkg/driver.Version=1.12.0
            output: ${target.dir}/usr/bin/linstor-csi-dev
            packages: ./cmd/linstor-csi/linstor-csi.go
            strip: false
        - name: build nfs
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X github.com/piraeusdatastore/linstor-csi/pkg/driver.Version=1.12.0
            output: ${target.dir}/usr/bin/nfs-helper
            packages: ./cmd/nfs-helper
        - name: build nfs dev
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X github.com/piraeusdatastore/linstor-csi/pkg/driver.Version=1.12.0
            output: ${target.dir}/usr/bin/nfs-helper-dev
            packages: ./cmd/nfs-helper
            strip: false
        - name: copy nfs services
          runs: |
            set -eux -o pipefail

            src=nfs/service
            units=${target.dir}/usr/lib/systemd/system

            mkdir -p "$units" "$units/drbd@.service.d" "$units/drbd-demote-or-escalate@.service.d"
            mkdir -p ${target.dir}/etc/nfs-helper ${target.dir}/etc/systemd

            cp "$src/nfs-ganesha@.service" \
              "$src/growfs@.service" "$src/growfs@.timer" \
              "$src/mount-export@.service" "$src/mount-recovery@.service" \
              "$src/chmod@.service" \
              "$src/prepare-device-links@.service" \
              "$src/advertise-nfs-endpoint@.service" "$src/clean-nfs-endpoint@.service" \
              "$src/start-stop-reactor.service" \
              "$units/"

            cp "$src/drbd@.service.override.conf" \
              "$units/drbd@.service.d/container.conf"
            cp "$src/drbd-demote-or-escalate@.service.override.conf" \
              "$units/drbd-demote-or-escalate@.service.d/container.conf"

            cp "$src/default-config.tmpl" ${target.dir}/etc/nfs-helper/default-config.tmpl
            cp "$src/journald.conf" ${target.dir}/etc/systemd/journald.conf
        - uses: dhi/build-pkg:0
          with:
            description: CSI plugin for LINSTOR
            files:
              - usr/bin/linstor-csi
            license: Apache-2.0
            name: linstor-csi
            rel: 0
            subpackages:
              - files:
                  - path: usr/bin/linstor-csi
                    source: usr/bin/linstor-csi-dev
                name: linstor-csi-dev
              - files:
                  - path: usr/bin/nfs-helper
                  - path: usr/lib/systemd/system/nfs-ganesha@.service
                  - path: usr/lib/systemd/system/growfs@.service
                  - path: usr/lib/systemd/system/growfs@.timer
                  - path: usr/lib/systemd/system/mount-export@.service
                  - path: usr/lib/systemd/system/mount-recovery@.service
                  - path: usr/lib/systemd/system/chmod@.service
                  - path: usr/lib/systemd/system/prepare-device-links@.service
                  - path: usr/lib/systemd/system/advertise-nfs-endpoint@.service
                  - path: usr/lib/systemd/system/clean-nfs-endpoint@.service
                  - path: usr/lib/systemd/system/start-stop-reactor.service
                  - path: usr/lib/systemd/system/drbd@.service.d/container.conf
                  - path: usr/lib/systemd/system/drbd-demote-or-escalate@.service.d/container.conf
                  - path: etc/nfs-helper/default-config.tmpl
                  - path: etc/systemd/journald.conf
                name: linstor-csi-nfs-helper
              - files:
                  - path: usr/bin/nfs-helper
                    source: usr/bin/nfs-helper-dev
                  - path: usr/lib/systemd/system/nfs-ganesha@.service
                  - path: usr/lib/systemd/system/growfs@.service
                  - path: usr/lib/systemd/system/growfs@.timer
                  - path: usr/lib/systemd/system/mount-export@.service
                  - path: usr/lib/systemd/system/mount-recovery@.service
                  - path: usr/lib/systemd/system/chmod@.service
                  - path: usr/lib/systemd/system/prepare-device-links@.service
                  - path: usr/lib/systemd/system/advertise-nfs-endpoint@.service
                  - path: usr/lib/systemd/system/clean-nfs-endpoint@.service
                  - path: usr/lib/systemd/system/start-stop-reactor.service
                  - path: usr/lib/systemd/system/drbd@.service.d/container.conf
                  - path: usr/lib/systemd/system/drbd-demote-or-escalate@.service.d/container.conf
                  - path: etc/nfs-helper/default-config.tmpl
                  - path: etc/systemd/journald.conf
                name: linstor-csi-nfs-helper-dev
            url: https://github.com/piraeusdatastore/linstor-csi
            version: 1.12.0
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
