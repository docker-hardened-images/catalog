contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: openbao
      work-dir: /go/src/github.com/openbao/openbao
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - make
          - golang-1.26=1.26.5-r0
          - golang-1.26-oci-config=1.26.5-r0
        files:
          - url: git+https://github.com/openbao/openbao.git#v2.6.0
            checksum: 03e3a243b6f07d17c60ce0a182adee7cf4c424eb
            path: /go/src/github.com/openbao/openbao
            spdx:
              name: openbao
              version: 2.6.0
              packages:
                - name: openbao
                  purl: pkg:golang/openbao/openbao@2.6.0
                  license: MPL-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/net@v0.55.0
              - github.com/Azure/go-ntlmssp@v0.1.1
              - github.com/cloudflare/circl@v1.6.3
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
            download: true
        - uses: go/hermetic@v1
        - name: grab static files
          runs: |
            set -eux -o pipefail

            cp /go/src/github.com/openbao/openbao/LICENSE "${target.dir}/LICENSE"
        - name: generate
          runs: |
            set -eux -o pipefail

            go generate ./...
        - name: bootstrap
          privileged: true
          runs: |
            set -eux -o pipefail

            for attempt in 1 2 3; do
              if make bootstrap; then
                break
              elif [ "$attempt" -eq 3 ]; then
                echo "Bootstrap failed after 3 attempts" >&2
                exit 1
              else
                echo "Bootstrap attempt $attempt failed, retrying..." >&2
                sleep 5
              fi
            done
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            fips: false
            ldflags:
              - -X github.com/openbao/openbao/version.fullVersion=2.6.0
              - -X github.com/openbao/openbao/version.GitCommit=03e3a243b6f07d17c60ce0a182adee7cf4c424eb
              - -X github.com/openbao/openbao/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
            output: ${target.dir}/usr/bin/bao
        - name: build dev
          uses: go/build@v1
          work-dir: /go/src/github.com/openbao/openbao
          with:
            fips: false
            ldflags:
              - -X github.com/openbao/openbao/version.fullVersion=2.6.0
              - -X github.com/openbao/openbao/version.GitCommit=03e3a243b6f07d17c60ce0a182adee7cf4c424eb
              - -X github.com/openbao/openbao/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
            output: ${target.dir}/usr/bin/bao-dev
            packages: .
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Openbao
            files:
              - usr/bin/bao
            license: MPL-2.0
            name: bao
            rel: 0
            subpackages:
              - files:
                  - path: usr/bin/bao
                    source: usr/bin/bao-dev
                name: bao-dev
            url: https://github.com/openbao/openbao
            version: 2.6.0
