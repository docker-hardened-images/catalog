  - 2.6.0-r0-alpine3.24
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-05"
vars:
  COMMIT_SHA: 03e3a243b6f07d17c60ce0a182adee7cf4c424eb
  GOLANG_MAJOR_MINOR_VERSION: "1.26"
  GOLANG_VERSION: 1.26.5-r0
