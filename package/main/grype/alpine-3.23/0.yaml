# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-grype
variant: runtime
tags:
  - 0.115.0-alpine3.23
  - 0.115.0-r0-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: fa8b7e2a528cf1f8b098123f256c61db9e5df69c
  GOLANG_VERSION: 1.26.4-r1
  PACKAGE_NAME: grype
  REL: "0"
  SEMVER_MAJOR_MINOR_VERSION: "0.115"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.115.0
  VERSION: 0.115.0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: grype
      work-dir: /go/src/github.com/anchore/grype
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - golang-1.26=1.26.4-r1
          - golang-1.26-oci-config=1.26.4-r1
          - zstd
          - make
          - openssl
        files:
          - url: git+https://github.com/anchore/grype.git#v0.115.0
            checksum: fa8b7e2a528cf1f8b098123f256c61db9e5df69c
            path: /go/src/github.com/anchore/grype
            uid: 0
            gid: 0
      pipeline:
        - name: patch update check
          uses: git/patch@v1
          with:
            patch: disable-update-check.patch
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - github.com/cloudflare/circl@v1.6.3
              - github.com/containerd/containerd/v2@v2.3.2
              - github.com/go-git/go-git/v5@v5.19.1
        - uses: go/hermetic@v1
        - name: test
          privileged: true
          environment:
            CGO_ENABLED: "0"
            GODEBUG: ""
          runs: |
            set -eux -o pipefail

            # skipped tests require docker run or registry services to be available which aren't in our builds
            go test -skip 'Test_descriptorNameAndVersionSet|TestMatchByImage.*|TestCompareSBOMInputToLibResults|TestSubprocessStdin|TestDBProviders.*|TestCmd|TestPrepareWritableDB|TestSyftLocationExcludes.*|TestRegistryAuth|SarifIsValid|CycloneDX_Valid.*' ./...
        - name: build
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X main.version=0.115.0
              - -X main.gitDescription=0.115.0
              - -X main.gitCommit=fa8b7e2a528cf1f8b098123f256c61db9e5df69c
              - -X main.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/bin/grype
            packages: ./cmd/grype
        - name: build dev
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X main.version=0.115.0
              - -X main.gitDescription=0.115.0
              - -X main.gitCommit=fa8b7e2a528cf1f8b098123f256c61db9e5df69c
              - -X main.buildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/bin/grype-dev
            packages: ./cmd/grype
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: A vulnerability scanner for container images and filesystems
            files:
              - usr/bin/grype
            license: Apache-2.0
            name: grype
            rel: 0
            subpackages:
              - description: A vulnerability scanner for container images and filesystems (dev)
                files:
                  - path: usr/bin/grype
                    source: usr/bin/grype-dev
                name: grype-dev
            url: https://github.com/anchore/grype
            version: 0.115.0
      paths:
        - type: file
          path: /go/src/github.com/anchore/grype/disable-update-check.patch
          uid: 0
          gid: 0
          source: package/main/grype/patch/disable-update-check.patch
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
