            output: ${target.dir}/usr/bin/kyverno-cli-dev
            packages: ./cmd/cli/kubectl-kyverno
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Kyverno policy engine and controller binaries
            files:
