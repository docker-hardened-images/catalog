        files:
          - url: git+https://github.com/kyverno/kyverno.git#v1.16.4
            checksum: ead0a548e9b0e8746c6175abb53f8edff0aa5f1e
            path: /go/src/github.com/kyverno/kyverno
            spdx:
              name: kyverno
              version: 1.16.4
              packages:
                - name: kyverno
                  purl: pkg:golang/github.com/kyverno/kyverno@1.16.4
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://github.com/gotestyourself/gotestsum/releases/download/v1.13.0/gotestsum_1.13.0_linux_${target.arch}.tar.gz
            checksum: ${GOTESTSUM_SHA256}
            path: ${source.dir}/gotestsum.tar.gz
            spdx:
              name: gotestsum
              version: 1.13.0
              packages:
                - name: gotestsum
