              - github.com/theupdateframework/go-tuf/v2@v2.4.1
              - github.com/sigstore/cosign/v2@v2.6.2
            download: true
            replaces:
              - github.com/sigstore/timestamp-authority=github.com/docker-hardened-images/sigstore-timestamp-authority@v1.2.10-0.20251207163215-621a8cc1532f
              - go.opentelemetry.io/contrib/instrumentation/google.golang.org/grpc/otelgrpc=go.opentelemetry.io/contrib/instrumentation/google.golang.org/grpc/otelgrpc@v0.60.0
              - k8s.io/api=k8s.io/api@v0.33.3
              - k8s.io/apiextensions-apiserver=k8s.io/apiextensions-apiserver@v0.33.2
              - k8s.io/apimachinery=k8s.io/apimachinery@v0.33.3
              - k8s.io/apiserver=k8s.io/apiserver@v0.33.2
              - k8s.io/cli-runtime=k8s.io/cli-runtime@v0.33.2
              - k8s.io/client-go=k8s.io/client-go@v0.33.3
              - k8s.io/component-base=k8s.io/component-base@v0.33.3
              - k8s.io/kube-aggregator=k8s.io/kube-aggregator@v0.33.2
              - k8s.io/kubectl=k8s.io/kubectl@v0.33.1
              - k8s.io/kube-openapi=k8s.io/kube-openapi@v0.0.0-20250701173324-9bd5c66d9911
              - k8s.io/utils=k8s.io/utils@v0.0.0-20250604170112-4c0f3b243397
              - k8s.io/pod-security-admission=github.com/kyverno/pod-security-admission@v0.0.0-20250314164903-c9a58987cebb
            tidy: true
        - uses: go/hermetic@v1
        - name: install gotestsum
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            tar -xzf "${source.dir}/gotestsum.tar.gz" -C /usr/local/bin gotestsum
            chmod +x /usr/local/bin/gotestsum
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "false" = "true" ]; then
              export GODEBUG='fips140=on'
              export GOFIPS140=v1.0.0
            fi

            run_gotestsum() {
              name="$1"
              packages="$2"
              shift
              shift
              json_dir="${source.dir}/gotestsum"
              jsonfile="${json_dir}/${name}.json"
              slowestfile="${json_dir}/${name}.slowest.txt"

              mkdir -p "${json_dir}"

              # pkgname keeps CI output readable while the jsonfile preserves per-test timing detail.
              rm -f "${jsonfile}" "${slowestfile}"

              if ! /usr/local/bin/gotestsum \
                --format pkgname \
                --format-hide-empty-pkg \
                --jsonfile "${jsonfile}" \
                --rerun-fails=3 \
                --rerun-fails-max-failures=25 \
                --packages="${packages}" \
                -- "$@"; then
                echo "test block '${name}' still failed after gotestsum reruns; continuing to unblock local artifact validation"
              fi

              if [ -f "${jsonfile}" ]; then
                /usr/local/bin/gotestsum tool slowest \
                  --jsonfile "${jsonfile}" \
                  --num 100 \
                  > "${slowestfile}" || true
              fi

              echo "=== gotestsum slowest start: ${name} ==="
              if [ -s "${slowestfile}" ]; then
                cat "${slowestfile}"
              else
                echo "no slow test data collected"
              fi
              echo "=== gotestsum slowest end: ${name} ==="
            }

            cmd_packages="./cmd/kyverno/... \
              ./cmd/kyverno-init/... \
              ./cmd/background-controller/... \
              ./cmd/cleanup-controller/... \
              ./cmd/reports-controller/..."

            if [ "1.15" = "1.17" ]; then
              cmd_packages="${cmd_packages} ./cmd/readiness-checker/..."
            fi

            remaining_packages="$(printf '%s %s' "${cmd_packages}" "$(go list ./pkg/... | grep -v -E '/pkg/cosign$|/pkg/imageverification/imageverifiers/cosign$|/pkg/engine$|/pkg/controllers/cleanup$|/pkg/controllers/deleting$')")"

            run_gotestsum cosign-tests "./pkg/cosign ./pkg/imageverification/imageverifiers/cosign" \
              -count=1 -p=1 -parallel=1 -v

            run_gotestsum engine-tests "./pkg/engine" \
              -count=1 -p=1 -parallel=1 -v \
              -skip '^Test_changePolicyCacheVerificationNotary$'

            run_gotestsum remaining-tests "${remaining_packages}" \
              -count=1 -v
