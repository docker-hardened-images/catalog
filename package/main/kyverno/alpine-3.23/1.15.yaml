              version: 1.15.3
              packages:
                - name: kyverno
                  purl: pkg:golang/github.com/kyverno/kyverno@1.15.3
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://github.com/gotestyourself/gotestsum/releases/download/v1.13.0/gotestsum_1.13.0_linux_${target.arch}.tar.gz
            checksum: ${GOTESTSUM_SHA256}
            path: ${source.dir}/gotestsum.tar.gz
            spdx:
