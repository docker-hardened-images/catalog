          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X github.com/kyverno/kyverno/pkg/version.BuildVersion=1.15.3
            output: ${target.dir}/usr/bin/kyverno
            packages: ./cmd/kyverno
