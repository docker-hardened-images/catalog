            uid: 0
            gid: 0
      pipeline:
        - name: patch (1.15 only)
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.47.0
              - go.opentelemetry.io/otel/sdk@v1.40.0
              - google.golang.org/grpc@v1.79.3
