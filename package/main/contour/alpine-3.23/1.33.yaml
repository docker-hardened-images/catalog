# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-contour
variant: runtime
tags:
  - 1.33.5-alpine
  - 1.33.5-r2-alpine
  - 1.33.5-alpine3.23
  - 1.33.5-r2-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-09-08"
vars:
  COMMIT_SHA: 2713ad0e0ebd5d192a53803cef4c1c3a69692b1c
  GOLANG_MAJOR_MINOR_VERSION: "1.26"
  GOLANG_VERSION: 1.26.3-r0
  PACKAGE_NAME: contour-1.33
  REL: "2"
  SEMVER_MAJOR_MINOR_VERSION: "1.33"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.33.5
  VERSION: 1.33.5
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: contour-1.33
      work-dir: /go/src/github.com/projectcontour/contour
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - golang-1.26=1.26.3-r0
          - golang-1.26-oci-config=1.26.3-r0
        files:
          - url: git+https://github.com/projectcontour/contour.git#v1.33.5
            checksum: 2713ad0e0ebd5d192a53803cef4c1c3a69692b1c
            path: /go/src/github.com/projectcontour/contour
            spdx:
              name: contour
              version: 1.33.5
              packages:
                - name: contour
                  purl: pkg:golang/github.com/projectcontour/contour@1.33.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.33 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/projectcontour/contour
          with:
            deps:
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: test
          work-dir: /go/src/github.com/projectcontour/contour
          privileged: true
          runs: |
            set -eux -o pipefail

            go test ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/projectcontour/contour
          with:
            fips: false
            ldflags:
              - -X github.com/projectcontour/contour/internal/build.Version=1.33.5
              - -X github.com/projectcontour/contour/internal/build.Sha=2713ad0e0ebd5d192a53803cef4c1c3a69692b1c
            output: ${target.dir}/usr/bin/contour
            packages: ./cmd/contour
            tags: oidc,gcp,osusergo,netgo
        - name: build dev
          uses: go/build@v1
          work-dir: /go/src/github.com/projectcontour/contour
          with:
            fips: false
            output: ${target.dir}/usr/bin/contour-dev
            packages: ./cmd/contour
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Contour
            files:
              - usr/bin/contour
            license: Apache-2.0
            name: contour-1.33
            priority: "200"
            provides: contour=$pkg_full_version
            rel: 2
            replaces: contour
            subpackages:
              - files:
                  - path: usr/bin/contour
                    source: usr/bin/contour-dev
                name: contour-1.33-dev
            url: https://github.com/projectcontour/contour
            version: 1.33.5
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
