              - -X main.version=0.70.0
              - -X main.commit=8a3177aedf7ee0864920eb1852eef031cd3742b8
              - -X main.date=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/bin/trivy-dev
            packages: ./cmd/trivy
            strip: false
        - uses: dhi/build-pkg:0
