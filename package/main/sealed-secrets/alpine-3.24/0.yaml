                  purl: pkg:golang/github.com/bitnami-labs/sealed-secrets@0.38.4
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: test
          work-dir: /go/src/github.com/bitnami-labs/sealed-secrets
          privileged: true
          runs: |
            set -eux -o pipefail

            # pkg/controller tests start an HTTP server on localhost; skip during image build.
            CGO_ENABLED=0 go test $(go list ./... | grep -v '/pkg/controller$')
        - name: build controller
          uses: go/build@v1
          work-dir: /go/src/github.com/bitnami-labs/sealed-secrets
          with:
            fips: false
            ldflags:
              - -X main.VERSION=0.38.4
            output: ${target.dir}/usr/bin/controller
            packages: ./cmd/controller
        - name: build controller dev
          uses: go/build@v1
          work-dir: /go/src/github.com/bitnami-labs/sealed-secrets
          with:
            fips: false
            ldflags:
              - -X main.VERSION=0.38.4
            output: ${target.dir}/usr/bin/controller-dev
            packages: ./cmd/controller
            strip: false
        - name: build kubeseal
          uses: go/build@v1
          work-dir: /go/src/github.com/bitnami-labs/sealed-secrets
          with:
            fips: false
            ldflags:
              - -X main.VERSION=0.38.4
            output: ${target.dir}/usr/bin/kubeseal
            packages: ./cmd/kubeseal
        - name: build kubeseal dev
          uses: go/build@v1
          work-dir: /go/src/github.com/bitnami-labs/sealed-secrets
          with:
            fips: false
            ldflags:
              - -X main.VERSION=0.38.4
            output: ${target.dir}/usr/bin/kubeseal-dev
            packages: ./cmd/kubeseal
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Sealed-secrets binaries
            files:
              - usr/bin/controller
            license: Apache-2.0
            name: sealed-secrets
            rel: 0
            subpackages:
              - files:
                  - path: usr/bin/kubeseal
                name: kubeseal
              - files:
                  - path: usr/bin/controller
                    source: usr/bin/controller-dev
                name: sealed-secrets-dev
              - files:
                  - path: usr/bin/kubeseal
                    source: usr/bin/kubeseal-dev
                name: kubeseal-dev
            url: https://github.com/bitnami-labs/sealed-secrets
            version: 0.38.4
