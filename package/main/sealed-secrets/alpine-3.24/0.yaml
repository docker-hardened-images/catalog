    - name: sealed-secrets
      work-dir: /go/src/github.com/bitnami-labs/sealed-secrets
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - coreutils
          - findutils
          - mawk
          - sed
          - golang-1.26=1.26.5-r0
          - golang-1.26-oci-config=1.26.5-r0
        files:
          - url: git+https://github.com/bitnami-labs/sealed-secrets.git#v0.38.4
            checksum: 0cc547ad0c3756726768dcc916e39de3ac5b101b
            path: /go/src/github.com/bitnami-labs/sealed-secrets
            spdx:
              name: sealed-secrets-controller
