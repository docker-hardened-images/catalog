      pipeline:
        - name: pin dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

            ./hack/pin-dependency.sh golang.org/x/crypto v0.45.0
            ./hack/pin-dependency.sh go.opentelemetry.io/otel/sdk v1.43.0
            ./hack/pin-dependency.sh google.golang.org/grpc v1.79.3
            # selinux >=v1.13.0 transitively requires filepath-securejoin v0.6+,
            # which dropped top-level OpenInRoot/Reopen used by kubelet in
            # k8s <= 1.34. Pin only on releases where the kubelet vendor
            # already uses the v0.6 API. Leave SELINUX_VERSION empty otherwise.
            if [ -n "v1.13.0" ]; then
              ./hack/pin-dependency.sh github.com/opencontainers/selinux "v1.13.0"
            fi
            # filepath-securejoin is normally resolved transitively. Allow a
            # per-release override (e.g. to lock the top-level API kubelet uses)
            # when something else in the graph forces an incompatible upgrade.
            if [ -n "" ]; then
              ./hack/pin-dependency.sh github.com/cyphar/filepath-securejoin ""
            fi

            export TMP_DIR="$(mktemp -d /tmp/update-vendor.XXXX)"
            dump_update_vendor_log() {
              status=$?
              if [ "${status}" -ne 0 ] && [ -f "${TMP_DIR}/update-vendor.log" ]; then
                echo "=== update-vendor.log start ==="
                cat "${TMP_DIR}/update-vendor.log"
                echo "=== update-vendor.log end ==="
              fi
              exit "${status}"
