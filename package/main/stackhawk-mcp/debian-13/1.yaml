# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-stackhawk-mcp
variant: runtime
tags:
  - 1.2.4
  - 1.2.4-r0
  - 1.2.4-debian13
  - 1.2.4-r0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-07-14"
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  COMMIT_SHA: df2fb6283e0daa6221aa2cdbfa0ffe88d97c466f
  PYTHON_MINOR: "3.14"
  PYTHON_VERSION: 3.14.6-2
  REL: "0"
  SEMVER_MAJOR_MINOR_VERSION: "1.2"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.2.4
  UV_VERSION: 0.11.23
  VERSION: 1.2.4
contents:
  packages:
    - base-files
  builds:
    - name: stackhawk-mcp
      work-dir: ${source.dir}
      environment:
        UV_COMPILE_BYTECODE: "1"
      caches:
        - path: /root/.cache/uv
      contents:
        repositories:
          - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
        keyring:
          - https://dhi.io/keyring/dhi-deb-gpg.D46852F6925E9F71.key
        packages:
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - git
          - gzip
          - sed
          - tar
          - libpython-3.14-minimal=3.14.6-2
          - libpython-3.14-stdlib=3.14.6-2
          - python-3.14-minimal=3.14.6-2
          - python-3.14=3.14.6-2
          - python-3.14-dev=3.14.6-2
        files:
          - url: https://github.com/astral-sh/uv/releases/download/0.11.23/uv-${ARCH}-unknown-linux-gnu.tar.gz
            path: ${source.dir}/uv-unknown-linux-gnu.tar.gz
            uid: 0
            gid: 0
          - url: git+https://github.com/stackhawk/stackhawk-mcp.git#v1.2.4
            checksum: df2fb6283e0daa6221aa2cdbfa0ffe88d97c466f
            path: ${source.dir}/src
            spdx:
              name: stackhawk-mcp
              version: 1.2.4
              packages:
                - name: stackhawk-mcp
                  purl: pkg:github/stackhawk/stackhawk-mcp@1.2.4
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: setup uv
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            tar -xzf "${source.dir}/uv-unknown-linux-gnu.tar.gz" -C /usr/local/bin --strip-components=1
            chmod +x /usr/local/bin/uv
        - name: build venv at final path and stage it
          privileged: true
          runs: |
            set -eux -o pipefail

            export SOURCE_DIR="${source.dir}" TARGET_DIR="${target.dir}" PYTHON_BIN=/usr/bin/python3.14
            bash "${source.dir}/build-venv.sh"
        - uses: dhi/build-pkg:0
          with:
            depends:
              - python-3.14
            description: StackHawk MCP server
            files:
              - usr/lib/stackhawk-mcp
              - usr/bin/stackhawk-mcp
            formats:
              - deb
            license: Apache-2.0
            name: stackhawk-mcp
            rel: 0
            url: https://github.com/stackhawk/stackhawk-mcp
            version: 1.2.4
      paths:
        - type: file
          path: ${source.dir}/build-venv.sh
          uid: 0
          gid: 0
          mode: "0755"
          source: package/main/stackhawk-mcp/build-venv.sh
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
