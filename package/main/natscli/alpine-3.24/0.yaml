# syntax=dhi.io/build:2-alpine3.24

image: dhi.io/pkg-natscli
variant: runtime
tags:
  - 0.4.0-alpine3.24
  - 0.4.0-r0-alpine3.24
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-09-22"
vars:
  COMMIT_SHA: 21e276a53dc7ff2b73e67c3ab39303d0c3a1f831
  GOLANG_MAJOR_MINOR_VERSION: "1.26"
  GOLANG_VERSION: 1.26.5-r0
  REL: "0"
  SEMVER_MAJOR_MINOR_VERSION: "0.4"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.4.0
  VERSION: 0.4.0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.24/main
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.24/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: natscli
      work-dir: /go/src/github.com/nats-io/natscli
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - coreutils
          - findutils
          - mawk
          - sed
          - golang-1.26=1.26.5-r0
          - golang-1.26-oci-config=1.26.5-r0
        files:
          - url: git+https://github.com/nats-io/natscli.git#v0.4.0
            checksum: 21e276a53dc7ff2b73e67c3ab39303d0c3a1f831
            path: /go/src/github.com/nats-io/natscli
            spdx:
              name: natscli
              version: 0.4.0
              packages:
                - name: natscli
                  purl: pkg:golang/nats-io/natscli@0.4.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/nats-io/natscli
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
            download: true
        - name: unit test
          work-dir: /go/src/github.com/nats-io/natscli
          privileged: true
          runs: |
            set -eux -o pipefail

            # Run a subset of tests to verify the build works
            # Skip flaky tests (TestStreamPeerRemove needs a multi-node cluster and fails in CI)
            go list ./... | grep -F -e asciigraph -v | xargs go test -v -skip 'TestNatsSubscribe|TestServerCheck|TestJetStreamSubscribe|TestStreamPeerRemove' --failfast -p=1
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/nats-io/natscli
          with:
            fips: false
            output: ${target.dir}/usr/bin/nats
            packages: ./nats
        - name: build dev
          uses: go/build@v1
          work-dir: /go/src/github.com/nats-io/natscli
          with:
            fips: false
            output: ${target.dir}/usr/bin/nats-dev
            packages: ./nats
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Natscli
            files:
              - usr/bin/nats
            license: Apache-2.0
            name: nats
            rel: 0
            subpackages:
              - files:
                  - path: usr/bin/nats
                    source: usr/bin/nats-dev
                name: nats-dev
            url: https://github.com/nats-io/natscli
            version: 0.4.0
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
