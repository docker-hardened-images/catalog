              - golang.org/x/net@v0.55.0
            tidy: true
        - uses: go/hermetic@v1
        - name: install gotestsum
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            tar -xzf "${source.dir}/gotestsum.tar.gz" -C /usr/local/bin gotestsum
            chmod +x /usr/local/bin/gotestsum
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "false" = "true" ]; then
              export GODEBUG='fips140=on'
              export GOFIPS140=v1.0.0
            fi

            /usr/local/bin/gotestsum \
              --format pkgname \
              --format-hide-empty-pkg \
              --packages="./cmd/... ./pkg/..." \
              -- -count=1
