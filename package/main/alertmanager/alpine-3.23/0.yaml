              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            tidy: true
        - uses: go/hermetic@v1
        - name: unpack frontend assets
          work-dir: /go/src/github.com/prometheus/alertmanager
          runs: |
            set -eux -o pipefail

            tar -xzf "${source.dir}/alertmanager-web-ui-0.33.1.tar.gz" -C ui/app
        - name: build alertmanager
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -s
              - -w
              - -X github.com/prometheus/common/version.Version=0.33.1
              - -X github.com/prometheus/common/version.Revision=2c8da51e03f3dbbed24f9711ca2d76aab4eef9c5
              - -X github.com/prometheus/common/version.BuildUser=dhi
              - -X github.com/prometheus/common/version.BuildDate=${SOURCE_DATE_EPOCH}
            output: ${target.dir}/usr/bin/alertmanager
            packages: ./cmd/alertmanager
        - name: build amtool
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -s
              - -w
              - -X github.com/prometheus/common/version.Version=0.33.1
              - -X github.com/prometheus/common/version.Revision=2c8da51e03f3dbbed24f9711ca2d76aab4eef9c5
              - -X github.com/prometheus/common/version.BuildUser=dhi
              - -X github.com/prometheus/common/version.BuildDate=${SOURCE_DATE_EPOCH}
            output: ${target.dir}/usr/bin/amtool
            packages: ./cmd/amtool
        - name: build alertmanager dev
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -s
              - -w
              - -X github.com/prometheus/common/version.Version=0.33.1
              - -X github.com/prometheus/common/version.Revision=2c8da51e03f3dbbed24f9711ca2d76aab4eef9c5
              - -X github.com/prometheus/common/version.BuildUser=dhi
              - -X github.com/prometheus/common/version.BuildDate=${SOURCE_DATE_EPOCH}
            output: ${target.dir}/usr/bin/alertmanager-dev
            packages: ./cmd/alertmanager
            strip: false
        - name: build amtool dev
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -s
              - -w
              - -X github.com/prometheus/common/version.Version=0.33.1
              - -X github.com/prometheus/common/version.Revision=2c8da51e03f3dbbed24f9711ca2d76aab4eef9c5
              - -X github.com/prometheus/common/version.BuildUser=dhi
              - -X github.com/prometheus/common/version.BuildDate=${SOURCE_DATE_EPOCH}
            output: ${target.dir}/usr/bin/amtool-dev
            packages: ./cmd/amtool
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Prometheus Alertmanager
            files:
              - usr/bin/alertmanager
              - usr/bin/amtool
            license: Apache-2.0
            name: alertmanager
            rel: 2
            subpackages:
              - files:
                  - path: usr/bin/alertmanager
                    source: usr/bin/alertmanager-dev
