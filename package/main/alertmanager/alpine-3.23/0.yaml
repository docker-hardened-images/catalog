          - ca-certificates-bundle
          - golang-1.26=1.26.5-r0
          - golang-1.26-oci-config=1.26.5-r0
        files:
          - url: git+https://github.com/prometheus/alertmanager.git#v0.33.1
            checksum: 2c8da51e03f3dbbed24f9711ca2d76aab4eef9c5
            path: /go/src/github.com/prometheus/alertmanager
            uid: 0
            gid: 0
          - url: https://github.com/prometheus/alertmanager/releases/download/v0.33.1/alertmanager-web-ui-0.33.1.tar.gz
            checksum: https://github.com/prometheus/alertmanager/releases/download/v0.33.1/sha256sums.txt
            path: ${source.dir}/alertmanager-web-ui-0.33.1.tar.gz
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
