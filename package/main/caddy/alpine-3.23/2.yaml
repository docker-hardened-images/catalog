            output: ${target.dir}/usr/bin/caddy
            packages: ./cmd/caddy
            tags:
              - nobadger
              - nomysql
              - nopgx
        - name: build dev
          uses: go/build@v1
          work-dir: /go/src/github.com/caddyserver/caddy
          with:
            fips: false
            output: ${target.dir}/usr/bin/caddy-dev
            packages: ./cmd/caddy
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Caddy
            files:
              - usr/bin/caddy
            license: Apache-2.0
            name: caddy
            rel: 0
            subpackages:
              - files:
                  - path: usr/bin/caddy
                    source: usr/bin/caddy-dev
                name: caddy-dev
            url: https://github.com/caddyserver/caddy
            version: 2.11.4
