    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: caddy
      work-dir: /go/src/github.com/caddyserver/caddy
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - coreutils
          - findutils
          - mawk
          - sed
          - golang-1.26=1.26.5-r0
          - golang-1.26-oci-config=1.26.5-r0
        files:
          - url: git+https://github.com/caddyserver/caddy.git#v2.11.4
            checksum: e2eee6a7fce366321294c9c2a79f3146891dcbdf
            path: /go/src/github.com/caddyserver/caddy
            spdx:
              name: caddy
              version: 2.11.4
              packages:
                - name: caddy
                  purl: pkg:golang/caddyserver/caddy@v2.11.4
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch (2 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            downgrade: true
            download: true
            tidy: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test $(go list ./... | grep -v caddytest/integration)
        - name: build caddy
          uses: go/build@v1
          with:
            fips: false
            ldflags:
