# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-helm-controller
variant: runtime
tags:
  - 1.3.0-alpine3.23
  - 1.3.0-r0-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-05-28"
vars:
  COMMIT_SHA: e47f47f1282d1c66b180be7a386f5afbe3f5ae26
  GOLANG_MAJOR_MINOR_VERSION: "1.26"
  GOLANG_VERSION: 1.26.5-r0
  REL: "0"
  SEMVER_MAJOR_MINOR_VERSION: "1.3"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.3.0
  VERSION: 1.3.0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: helm-controller
      work-dir: /go/src/github.com/fluxcd/helm-controller
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - coreutils
          - findutils
          - mawk
          - sed
          - golang-1.26=1.26.5-r0
          - golang-1.26-oci-config=1.26.5-r0
        files:
          - url: git+https://github.com/fluxcd/helm-controller#v1.3.0
            checksum: e47f47f1282d1c66b180be7a386f5afbe3f5ae26
            path: /go/src/github.com/fluxcd/helm-controller
            spdx:
              name: fluxcd-helm-controller
              version: 1.3.0
              packages:
                - name: fluxcd-helm-controller
                  purl: pkg:golang/github.com/fluxcd/helm-controller@1.3.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch (1.3 only)
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/moby/spdystream@v0.5.1
              - google.golang.org/grpc@v1.79.3
              - github.com/containerd/containerd@v1.7.33
              - helm.sh/helm/v3@v3.20.2
            download: true
            replaces:
              - oras.land/oras-go/v2=oras.land/oras-go/v2@v2.6.1
        - name: test
          runs: |
            set -eux -o pipefail

            # Exclude packages that require envtest (live k8s API server via etcd):
            # internal/controller, internal/controller_test, internal/action, internal/reconcile
            CGO_ENABLED=0 go test $(go list ./internal/... | grep -vE '/internal/(controller|action|reconcile)')
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            fips: false
            output: ${target.dir}/usr/bin/fluxcd-helm-controller
        - name: build dev
          uses: go/build@v1
          work-dir: /go/src/github.com/fluxcd/helm-controller
          with:
            fips: false
            output: ${target.dir}/usr/bin/fluxcd-helm-controller-dev
            packages: .
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Helm-controller
            files:
              - usr/bin/fluxcd-helm-controller
            license: Apache-2.0
            name: fluxcd-helm-controller
            rel: 0
            subpackages:
              - files:
                  - path: usr/bin/fluxcd-helm-controller
                    source: usr/bin/fluxcd-helm-controller-dev
                name: fluxcd-helm-controller-dev
            url: https://github.com/fluxcd/helm-controller
            version: 1.3.0
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
