# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-aws-node-termination-handler
variant: runtime
tags:
  - 1.25.6-alpine3.23
  - 1.25.6-r2-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-02-28"
vars:
  COMMIT_SHA: 77ca841d1329504e981542775f78403feb114048
  GOLANG_MAJOR_MINOR_VERSION: "1.26"
  GOLANG_VERSION: 1.26.3-r0
  REL: "2"
  SEMVER_MAJOR_MINOR_VERSION: "1.25"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.25.6
  VERSION: 1.25.6
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: aws-node-termination-handler
      work-dir: /go/src/github.com/aws/aws-node-termination-handler
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - golang-1.26=1.26.3-r0
          - golang-1.26-oci-config=1.26.3-r0
        files:
          - url: git+https://github.com/aws/aws-node-termination-handler.git#v1.25.6
            checksum: 77ca841d1329504e981542775f78403feb114048
            path: /go/src/github.com/aws/aws-node-termination-handler
            spdx:
              name: aws-node-termination-handler
              version: 1.25.6
              packages:
                - name: aws-node-termination-handler
                  purl: pkg:golang/github.com/aws/aws-node-termination-handler@1.25.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel@v1.41.0
            download: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              # The runtime image uses fips140=on, but the FIPS Go toolchain
              # defaults to fips140=only at compile/test time. Mirror the
              # runtime setting so upstream tests that exercise client-go's
              # X25519 path don't fail under strict FIPS.
              export GODEBUG=fips140=on
            fi

            CGO_ENABLED=0 go test -short ./cmd/... -count=1 -v
        - name: build
          uses: go/build@v1
          with:
            extra-env: GODEBUG=fips140=on
            fips: false
            output: ${target.dir}/usr/bin/node-termination-handler
            packages: ./cmd
            strip: true
            tags: nthlinux
        - name: build dev
          uses: go/build@v1
          work-dir: /go/src/github.com/aws/aws-node-termination-handler
          with:
            fips: false
            output: ${target.dir}/usr/bin/node-termination-handler-dev
            packages: ./cmd
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Aws-node-termination-handler
            files:
              - usr/bin/node-termination-handler
            license: Apache-2.0
            name: aws-node-termination-handler
            rel: 2
            subpackages:
              - files:
                  - path: usr/bin/node-termination-handler
                    source: usr/bin/node-termination-handler-dev
                name: aws-node-termination-handler-dev
            url: https://github.com/aws/aws-node-termination-handler
            version: 1.25.6
