# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-argo-workflows
variant: runtime
tags:
  - 4.0.6-alpine3.23
  - 4.0.6-r0-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 277e9cef0ad16d7eaaab253573d0695951a65dbd
  GOLANG_MAJOR_MINOR_VERSION: "1.26"
  GOLANG_VERSION: 1.26.4-r0
  MODULE_MAJOR_VERSION: v4
  PACKAGE_NAME: argo-workflows-4
  REL: "0"
  SEMVER_MAJOR_MINOR_VERSION: "4.0"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.0.6
  VERSION: 4.0.6
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: argo-workflows-4
      work-dir: /go/src/github.com/argoproj/argo-workflows
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - golang-1.26=1.26.4-r0
          - golang-1.26-oci-config=1.26.4-r0
        files:
          - url: git+https://github.com/argoproj/argo-workflows.git#v4.0.6
            checksum: 277e9cef0ad16d7eaaab253573d0695951a65dbd
            path: /go/src/github.com/argoproj/argo-workflows
            spdx:
              name: argo-workflow-controller
              version: 4.0.6
              packages:
                - name: argo-workflow-controller
                  purl: pkg:golang/argoproj/argo-workflows@4.0.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
            dir: /go/src/github.com/argoproj/argo-workflows
            download: true
        - name: test
          work-dir: /go/src/github.com/argoproj/argo-workflows
          runs: |
            set -eux -o pipefail

            echo "Testing core functionality after patching..."

            # Test core workflow functionality
            go test -v -count=1 -timeout=3m ./workflow/validate -run="TestDAG"
            go test -v -count=1 -timeout=3m ./workflow/common

            # Test all util packages except telemetry (which fails due to network requirements)
            UTIL_PACKAGES=$(go list ./util/... | grep -v './util/telemetry')
            go test -v -count=1 -timeout=4m $UTIL_PACKAGES
        - name: build-backend
          uses: go/build@v1
          work-dir: /go/src/github.com/argoproj/argo-workflows
          with:
            fips: false
            ldflags:
              - -X github.com/argoproj/argo-workflows/v4.version=4.0.6
              - -X github.com/argoproj/argo-workflows/v4.gitCommit=277e9cef0ad16d7eaaab253573d0695951a65dbd
            output: ${target.dir}/usr/bin/workflow-controller
            packages: ./cmd/workflow-controller
        - name: build dev
          uses: go/build@v1
          work-dir: /go/src/github.com/argoproj/argo-workflows
          with:
            fips: false
            output: ${target.dir}/usr/bin/workflow-controller-dev
            packages: ./cmd/workflow-controller
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Argo-workflows
            files:
              - usr/bin/workflow-controller
            license: Apache-2.0
            name: argo-workflows-4
            priority: "200"
            provides: argo-workflows=$pkg_full_version
            rel: 0
            replaces: argo-workflows
            subpackages:
              - files:
                  - path: usr/bin/workflow-controller
                    source: usr/bin/workflow-controller-dev
                name: argo-workflows-4-dev
            url: https://github.com/argoproj/argo-workflows
            version: 4.0.6
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
