# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-notation
variant: runtime
tags:
  - 1.3.2-alpine3.23
  - 1.3.2-r5-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 001cc919603c1dc16c6aad387c94b4209cb9c901
  GOLANG_VERSION: 1.26.2-r3
  PACKAGE_NAME: notation
  REL: "5"
  SEMVER_MAJOR_MINOR_VERSION: "1.3"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.3.2
  VERSION: 1.3.2
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: notation
      work-dir: /go/src/github.com/notaryproject/notation
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - golang-1.26=1.26.2-r3
          - golang-1.26-oci-config=1.26.2-r3
        files:
          - url: git+https://github.com/notaryproject/notation.git#v1.3.2
            checksum: 001cc919603c1dc16c6aad387c94b4209cb9c901
            path: /go/src/github.com/notaryproject/notation
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/crypto@v0.45.0
            tidy: true
        - uses: go/hermetic@v1
        - name: test
          environment:
            CGO_ENABLED: "0"
            GODEBUG: ""
          runs: |
            set -eux -o pipefail

            EXCLUDES='cmd/notation/internal/truststore|/internal/tree|/internal/osutil|cmd/notation/plugin|pkg/configutil'
            PKGS=$(go list ./... | egrep -v "${EXCLUDES}")

            CGO_ENABLED=0 go test $PKGS
        - name: build
          uses: go/build@v1
          with:
            fips: false
            output: ${target.dir}/usr/bin/notation
            packages: ./cmd/notation
        - name: build dev
          uses: go/build@v1
          with:
            fips: false
            output: ${target.dir}/usr/bin/notation-dev
            packages: ./cmd/notation
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: A CLI tool for signing and verifying OCI artifacts
            files:
              - usr/bin/notation
            license: Apache-2.0
            name: notation
            rel: 5
            subpackages:
              - files:
                  - path: usr/bin/notation
                    source: usr/bin/notation-dev
                name: notation-dev
            url: https://notaryproject.dev/
            version: 1.3.2
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
