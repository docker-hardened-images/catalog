    - alpine-baselayout-data
  builds:
    - name: victoriametrics-cluster
      work-dir: /go/src/github.com/VictoriaMetrics/VictoriaMetrics
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - coreutils
          - golang-1.26=1.26.4-r0
          - golang-1.26-oci-config=1.26.4-r0
        files:
          - url: git+https://github.com/VictoriaMetrics/VictoriaMetrics.git#v1.144.0-cluster
            checksum: 874424cf7f6fbd10704b4c46d3feb7230591a527
            path: /go/src/github.com/VictoriaMetrics/VictoriaMetrics
            spdx:
              name: victoriametrics-vminsert
