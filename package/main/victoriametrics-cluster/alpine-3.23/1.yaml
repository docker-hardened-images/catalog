            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          work-dir: /go/src/github.com/VictoriaMetrics/VictoriaMetrics
          with:
            deps:
              - golang.org/x/sys@v0.44.0
        - uses: go/hermetic@v1
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            CGO_ENABLED=0 go test ./lib/... ./app/...
        - name: build vminsert
          uses: go/build@v1
          work-dir: /go/src/github.com/VictoriaMetrics/VictoriaMetrics
          with:
            fips: false
            ldflags:
              - -X 'github.com/VictoriaMetrics/VictoriaMetrics/lib/buildinfo.Version=vminsert-1.144.0-cluster'
            output: ${target.dir}/usr/bin/vminsert
            packages: ./app/vminsert
        - name: build vminsert dev
          uses: go/build@v1
          work-dir: /go/src/github.com/VictoriaMetrics/VictoriaMetrics
          with:
            fips: false
            ldflags:
              - -X 'github.com/VictoriaMetrics/VictoriaMetrics/lib/buildinfo.Version=vminsert-1.144.0-cluster'
            output: ${target.dir}/usr/bin/vminsert-dev
            packages: ./app/vminsert
            strip: false
        - name: build vmselect
          uses: go/build@v1
          work-dir: /go/src/github.com/VictoriaMetrics/VictoriaMetrics
          with:
            fips: false
            ldflags:
              - -X 'github.com/VictoriaMetrics/VictoriaMetrics/lib/buildinfo.Version=vmselect-1.144.0-cluster'
            output: ${target.dir}/usr/bin/vmselect
            packages: ./app/vmselect
        - name: build vmselect dev
          uses: go/build@v1
          work-dir: /go/src/github.com/VictoriaMetrics/VictoriaMetrics
          with:
            fips: false
            ldflags:
              - -X 'github.com/VictoriaMetrics/VictoriaMetrics/lib/buildinfo.Version=vmselect-1.144.0-cluster'
            output: ${target.dir}/usr/bin/vmselect-dev
            packages: ./app/vmselect
            strip: false
        - name: build vmstorage
          uses: go/build@v1
          work-dir: /go/src/github.com/VictoriaMetrics/VictoriaMetrics
          with:
            fips: false
            ldflags:
              - -X 'github.com/VictoriaMetrics/VictoriaMetrics/lib/buildinfo.Version=vmstorage-1.144.0-cluster'
            output: ${target.dir}/usr/bin/vmstorage
            packages: ./app/vmstorage
        - name: build vmstorage dev
          uses: go/build@v1
          work-dir: /go/src/github.com/VictoriaMetrics/VictoriaMetrics
          with:
            fips: false
            ldflags:
              - -X 'github.com/VictoriaMetrics/VictoriaMetrics/lib/buildinfo.Version=vmstorage-1.144.0-cluster'
            output: ${target.dir}/usr/bin/vmstorage-dev
            packages: ./app/vmstorage
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Victoriametrics-cluster binaries
            files:
              - usr/bin/vminsert
            license: Apache-2.0
            name: victoriametrics-cluster
            rel: 2
            subpackages:
              - files:
                  - path: usr/bin/vmselect
                name: vmselect
              - files:
                  - path: usr/bin/vmstorage
                name: vmstorage
              - files:
                  - path: usr/bin/vminsert
                    source: usr/bin/vminsert-dev
                name: victoriametrics-cluster-dev
              - files:
                  - path: usr/bin/vmselect
                    source: usr/bin/vmselect-dev
                name: vmselect-dev
              - files:
                  - path: usr/bin/vmstorage
                    source: usr/bin/vmstorage-dev
                name: vmstorage-dev
            url: https://github.com/VictoriaMetrics/VictoriaMetrics
            version: 1.144.0-cluster
