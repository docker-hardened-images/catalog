# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-hubble
variant: runtime
tags:
  - 1.18.12-alpine3.23
  - 1.18.12-r0-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-07-29"
vars:
  COMMIT_SHA: c2cd21cf99352ac16f451c684ba62807b18542e3
  GOLANG_MAJOR_MINOR_VERSION: "1.26"
  GOLANG_VERSION: 1.26.5-r0
  PACKAGE_NAME: hubble-1.18
  PROTOC_GEN_GO_GRPC_VERSION: 1.5.1
  PROTOC_GEN_GO_JSON_VERSION: 1.5.0
  PROTOC_GEN_GO_VERSION: 1.36.10
  REL: "0"
  SEMVER_MAJOR_MINOR_VERSION: "1.18"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.18.12
  VERSION: 1.18.12
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: hubble-1.18
      work-dir: /go/src/github.com/cilium/cilium
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - golang-1.26=1.26.5-r0
          - golang-1.26-oci-config=1.26.5-r0
        files:
          - url: git+https://github.com/cilium/cilium.git#v1.18.12
            checksum: c2cd21cf99352ac16f451c684ba62807b18542e3
            path: /go/src/github.com/cilium/cilium
            spdx:
              name: cilium
              version: 1.18.12
              packages:
                - name: cilium
                  purl: pkg:golang/github.com/cilium/cilium@1.18.12
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - golang.org/x/crypto@v0.52.0
              - golang.org/x/net@v0.55.0
              - golang.org/x/sys@v0.45.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.mongodb.org/mongo-driver@v1.17.7
              - go.opentelemetry.io/otel@v1.41.0
              - google.golang.org/grpc@v1.82.1
            download: true
        - uses: go/hermetic@v1
        - name: test
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -mod=vendor -v \
              ./hubble-relay/... \
              ./api/v1/...
        - name: build hubble-relay
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X github.com/cilium/cilium/pkg/version.ciliumVersion=1.18.12
            output: ${target.dir}/usr/bin/hubble-relay
            packages: ./hubble-relay
            tags: osusergo
        - name: build hubble-relay dev
          uses: go/build@v1
          with:
            fips: false
            ldflags:
              - -X github.com/cilium/cilium/pkg/version.ciliumVersion=1.18.12
            output: ${target.dir}/usr/bin/hubble-relay-dev
            packages: ./hubble-relay
            strip: false
            tags: osusergo
        - name: install hubble-proto generators
          privileged: true
          runs: |
            set -eux -o pipefail

            for pkg in \
              "google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10" \
              "google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1" \
              "github.com/mfridman/protoc-gen-go-json@v1.5.0"; do
              CGO_ENABLED=0 go install "${pkg}"
            done
        - name: build hubble-proto
          work-dir: /go/src/github.com/cilium/cilium
          runs: |
            set -eux -o pipefail

            gobin="$(go env GOPATH)/bin"
            for bin in protoc-gen-go protoc-gen-go-grpc protoc-gen-go-json; do
              install -D -m 0755 "${gobin}/${bin}" "${target.dir}/usr/bin/hubble-proto/${bin}"
            done
        - uses: dhi/build-pkg:0
          with:
            description: Hubble relay and protoc generator binaries
            files:
              - usr/bin/hubble-relay
            license: Apache-2.0
            name: hubble-1.18
            priority: "200"
            rel: 0
            subpackages:
              - files:
                  - path: usr/bin/hubble-relay
                name: hubble-relay-1.18
              - files:
                  - path: usr/bin/hubble-proto
                name: hubble-proto-1.18
              - files:
                  - path: usr/bin/hubble-relay
                    source: usr/bin/hubble-relay-dev
                name: hubble-1.18-dev
              - files:
                  - path: usr/bin/hubble-relay
                    source: usr/bin/hubble-relay-dev
                name: hubble-relay-1.18-dev
              - files:
                  - path: usr/bin/hubble-proto
                name: hubble-proto-1.18-dev
            url: https://github.com/cilium/cilium
            version: 1.18.12
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
