# syntax=dhi.io/build:2-alpine3.23

image: dhi.io/pkg-argo-rollouts
variant: runtime
tags:
  - 1.9.0-alpine3.23
  - 1.9.0-r2-alpine3.23
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-06-05"
vars:
  COMMIT_SHA: 838d4e792be666ec11bd0c80331e0c5511b5010e
  GOLANG_MAJOR_MINOR_VERSION: "1.26"
  GOLANG_VERSION: 1.26.3-r0
  REL: "2"
  SEMVER_MAJOR_MINOR_VERSION: "1.9"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.9.0
  VERSION: 1.9.0
contents:
  repositories:
    - https://dhi.io/apk/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: argo-rollouts
      work-dir: /go/src/github.com/argoproj/argo-rollouts
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - binutils-gold
          - golang-1.26=1.26.3-r0
          - golang-1.26-oci-config=1.26.3-r0
        files:
          - url: git+https://github.com/argoproj/argo-rollouts.git#v1.9.0
            checksum: 838d4e792be666ec11bd0c80331e0c5511b5010e
            path: /go/src/github.com/argoproj/argo-rollouts
            spdx:
              name: argo-rollouts
              version: 1.9.0
              packages:
                - name: argo-rollouts
                  purl: pkg:golang/argoproj/argo-rollouts@1.9.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/argoproj/argo-rollouts
          with:
            deps:
              - github.com/aws/aws-sdk-go@v1.55.5
              - github.com/expr-lang/expr@v1.17.7
              - github.com/moby/spdystream@v0.5.1
              - github.com/slack-go/slack@v0.23.1
              - go.opentelemetry.io/otel/sdk@v1.40.0
              - go.opentelemetry.io/otel@v1.41.0
              - golang.org/x/crypto@v0.52.0
              - google.golang.org/grpc@v1.79.3
              - k8s.io/kubernetes@v1.34.2
            download: true
        - uses: go/hermetic@v1
        - name: test
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            # Skip TestListWithWatch: flaky test with timing/race condition where
            # the third watch event doesn't arrive before the test timeout.
            # The test expects 3 output lines but only receives 2.
            go test -skip 'TestListWithWatch' $(go list ./... | grep -v -e ./test/cmd/metrics-plugin-sample -e github.com/argoproj/argo-rollouts/rollout$)
        - name: build rollouts-controller
          uses: go/build@v1
          work-dir: /go/src/github.com/argoproj/argo-rollouts
          with:
            fips: false
            output: ${target.dir}/usr/bin/rollouts-controller
            packages: ./cmd/rollouts-controller
        - name: build rollouts-controller dev
          uses: go/build@v1
          work-dir: /go/src/github.com/argoproj/argo-rollouts
          with:
            fips: false
            output: ${target.dir}/usr/bin/rollouts-controller-dev
            packages: ./cmd/rollouts-controller
            strip: false
        - name: build kubectl-argo-rollouts
          uses: go/build@v1
          work-dir: /go/src/github.com/argoproj/argo-rollouts
          with:
            fips: false
            output: ${target.dir}/usr/bin/kubectl-argo-rollouts
            packages: ./cmd/kubectl-argo-rollouts
        - name: build kubectl-argo-rollouts dev
          uses: go/build@v1
          work-dir: /go/src/github.com/argoproj/argo-rollouts
          with:
            fips: false
            output: ${target.dir}/usr/bin/kubectl-argo-rollouts-dev
            packages: ./cmd/kubectl-argo-rollouts
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Argo-rollouts binaries
            files:
              - usr/bin/rollouts-controller
            license: Apache-2.0
            name: argo-rollouts
            rel: 2
            subpackages:
              - files:
                  - path: usr/bin/kubectl-argo-rollouts
                name: kubectl-argo-rollouts
              - files:
                  - path: usr/bin/rollouts-controller
                    source: usr/bin/rollouts-controller-dev
                name: argo-rollouts-dev
              - files:
                  - path: usr/bin/kubectl-argo-rollouts
                    source: usr/bin/kubectl-argo-rollouts-dev
                name: kubectl-argo-rollouts-dev
            url: https://github.com/argoproj/argo-rollouts
            version: 1.9.0
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: Docker Hardened Images/Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
