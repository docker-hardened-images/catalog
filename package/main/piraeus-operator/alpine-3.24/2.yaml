    - https://dhi.io/keyring/dhi-apk@docker-0F81AD7700D99184.rsa.pub
  packages:
    - alpine-baselayout-data
  builds:
    - name: piraeus-operator
      work-dir: /go/src/github.com/piraeusdatastore/piraeus-operator
      contents:
        packages:
          - busybox
          - bash
          - ca-certificates-bundle
          - coreutils
          - findutils
          - mawk
          - sed
          - golang-1.26=1.26.5-r0
          - golang-1.26-oci-config=1.26.5-r0
        files:
          - url: git+https://github.com/piraeusdatastore/piraeus-operator.git#v2.10.8
            checksum: 899a34be0cc88c164669265c4355d0d363bca685
            path: /go/src/github.com/piraeusdatastore/piraeus-operator
            spdx:
              name: piraeus-operator
              version: 2.10.8
              packages:
                - name: piraeus-operator
                  purl: pkg:golang/github.com/piraeusdatastore/piraeus-operator/v2@2.10.8
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: test
          work-dir: /go/src/github.com/piraeusdatastore/piraeus-operator
          privileged: true
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test $(go list ./... | grep -v '/internal/controller' | grep -v '/internal/webhook' | grep -v '/pkg/k8sgc')
        - name: build gencert
          uses: go/build@v1
          work-dir: /go/src/github.com/piraeusdatastore/piraeus-operator
          with:
            fips: false
            ldflags:
              - -X github.com/piraeusdatastore/piraeus-operator/v2/pkg/vars.Version=2.10.8
            output: ${target.dir}/usr/bin/gencert
            packages: ./cmd/gencert
        - name: build gencert dev
          uses: go/build@v1
          work-dir: /go/src/github.com/piraeusdatastore/piraeus-operator
          with:
            fips: false
            ldflags:
              - -X github.com/piraeusdatastore/piraeus-operator/v2/pkg/vars.Version=2.10.8
            output: ${target.dir}/usr/bin/gencert-dev
            packages: ./cmd/gencert
            strip: false
        - name: build manager
          uses: go/build@v1
          work-dir: /go/src/github.com/piraeusdatastore/piraeus-operator
          with:
            fips: false
            ldflags:
              - -X github.com/piraeusdatastore/piraeus-operator/v2/pkg/vars.Version=2.10.8
            output: ${target.dir}/usr/bin/manager
            packages: ./cmd
        - name: build manager dev
          uses: go/build@v1
          work-dir: /go/src/github.com/piraeusdatastore/piraeus-operator
          with:
            fips: false
            ldflags:
              - -X github.com/piraeusdatastore/piraeus-operator/v2/pkg/vars.Version=2.10.8
            output: ${target.dir}/usr/bin/manager-dev
            packages: ./cmd
            strip: false
        - uses: dhi/build-pkg:0
          with:
            description: Piraeus-operator binaries
            files:
              - usr/bin/manager
            license: Apache-2.0
            name: piraeus-operator
            rel: 0
            subpackages:
              - files:
                  - path: usr/bin/gencert
                name: gencert
              - files:
                  - path: usr/bin/manager
                    source: usr/bin/manager-dev
                name: piraeus-operator-dev
              - files:
                  - path: usr/bin/gencert
                    source: usr/bin/gencert-dev
                name: gencert-dev
            url: https://github.com/piraeusdatastore/piraeus-operator
            version: 2.10.8
